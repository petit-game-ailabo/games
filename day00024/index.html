<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>⚡ NEON SWARM</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000}
body{display:flex;justify-content:center;align-items:flex-start;overflow:hidden}
#wrap{position:relative;width:100%;max-width:540px;height:100vh;height:100dvh}
canvas{display:block;width:100%;height:100%;touch-action:none}
#skilltree{display:none;position:absolute;top:0;left:0;width:100%;height:100%;background:#000507;flex-direction:column;z-index:10}
#st-hdr{flex-shrink:0;padding:10px 14px 6px;border-bottom:1px solid #0d2233}
#st-hdr-top{display:flex;justify-content:space-between;align-items:center}
#st-title{color:#00ffff;font:bold 18px monospace;text-shadow:0 0 14px #00ffff}
#st-coins{color:#ffdd44;font:bold 15px monospace}
#st-hint{color:#445566;font:10px monospace;margin-top:3px}
#st-wrap{flex:1;overflow:auto;-webkit-overflow-scrolling:touch;position:relative}
#st-canvas{position:relative;}
.st-node{position:absolute;width:108px;height:62px;border-radius:7px;border:1px solid #1a3550;background:#050c19;padding:7px 8px;cursor:default;user-select:none;transition:border-color 0.1s,box-shadow 0.1s}
.st-node .sn-name{font:bold 11px monospace;color:#8899aa;line-height:1.2;margin-bottom:2px}
.st-node .sn-desc{font:9px sans-serif;color:#334455;line-height:1.3;margin-bottom:3px}
.st-node .sn-cost{font:bold 11px monospace;color:#445566}
.st-node.sn-avail{border-color:#0077cc;cursor:pointer;box-shadow:0 0 8px #0044aa55}
.st-node.sn-avail .sn-name{color:#cce6ff}
.st-node.sn-avail .sn-desc{color:#556677}
.st-node.sn-avail .sn-cost{color:#ffdd44}
.st-node.sn-avail:active{transform:scale(0.95);background:#001e3c}
.st-node.sn-cheapest{border-color:#00ffaa!important;box-shadow:0 0 12px #00ffaa88!important;}
.st-node.sn-cheapest .sn-cost{color:#00ffaa!important;}
.st-node.sn-bought{border-color:#1a5533;background:#00120c}
.st-node.sn-bought .sn-name{color:#44cc88}
.st-node.sn-bought .sn-cost{color:#44cc88}
.st-node.sn-blocked{opacity:0.3}
#st-footer{flex-shrink:0;padding:8px 14px;border-top:1px solid #0d2233}
#st-next{width:100%;padding:13px;background:rgba(0,22,50,0.95);border:2px solid #0077ee;border-radius:9px;color:#fff;font:bold 16px monospace;cursor:pointer}
#st-next:active{transform:scale(0.97)}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="skilltree">

      <div id="st-hdr-top">

    <div id="st-wrap"><div id="st-canvas"></div></div>

</div>

'use strict';
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
function syncSize(){const w=canvas.offsetWidth,h=canvas.offsetHeight;if(w>0&&h>0){canvas.width=w;canvas.height=h;}}
const ro=new ResizeObserver(syncSize);ro.observe(canvas);
setTimeout(syncSize,0);setTimeout(syncSize,100);

// ── Audio ──────────────────────────────────────────────────────────
const AC=new(window.AudioContext||window.webkitAudioContext)();
function resumeAC(){if(AC.state==='suspended')AC.resume();}
function playCoin(){resumeAC();const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.frequency.value=700+Math.random()*300;g.gain.setValueAtTime(0.06,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.04);o.start();o.stop(AC.currentTime+0.04);}
function playKill(){resumeAC();const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type='square';o.frequency.setValueAtTime(220,AC.currentTime);o.frequency.exponentialRampToValueAtTime(70,AC.currentTime+0.08);g.gain.setValueAtTime(0.08,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.08);o.start();o.stop(AC.currentTime+0.08);}
function playLevelUp(){resumeAC();[523,659,784,1047].forEach((f,i)=>{const t=AC.currentTime+i*0.08,o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.frequency.value=f;g.gain.setValueAtTime(0.12,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.12);o.start(t);o.stop(t+0.14);});}
function playTick(last){resumeAC();const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.frequency.value=last?880:440;g.gain.setValueAtTime(last?0.18:0.10,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.12);o.start();o.stop(AC.currentTime+0.12);}
function playDash(){resumeAC();const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type='sawtooth';o.frequency.setValueAtTime(440,AC.currentTime);o.frequency.exponentialRampToValueAtTime(130,AC.currentTime+0.13);g.gain.setValueAtTime(0.09,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.13);o.start();o.stop(AC.currentTime+0.13);}
function playBeacon(){resumeAC();[523,659,784,1047,1319].forEach((f,i)=>{const t=AC.currentTime+i*0.055,o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.frequency.value=f;g.gain.setValueAtTime(0.09,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.15);o.start(t);o.stop(t+0.16);});}
function playCannonFire(){resumeAC();
  // ズドン！という重い砲撃音
  [80,60,50].forEach((f,i)=>{const t=AC.currentTime+i*0.04,o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type='sawtooth';o.frequency.setValueAtTime(f*2,t);o.frequency.exponentialRampToValueAtTime(f*0.3,t+0.4);g.gain.setValueAtTime(0.22,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.45);o.start(t);o.stop(t+0.45);});
  // 高周波の轟音レイヤー
  const o2=AC.createOscillator(),g2=AC.createGain();o2.connect(g2);g2.connect(AC.destination);o2.type='square';o2.frequency.setValueAtTime(440,AC.currentTime);o2.frequency.exponentialRampToValueAtTime(80,AC.currentTime+0.3);g2.gain.setValueAtTime(0.14,AC.currentTime);g2.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.3);o2.start();o2.stop(AC.currentTime+0.3);}
function playArenaExpand(){resumeAC();[220,330,440,660,880,1100].forEach((f,i)=>{const t=AC.currentTime+i*0.09,o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type='triangle';o.frequency.setValueAtTime(f,t);o.frequency.exponentialRampToValueAtTime(f*1.5,t+0.18);g.gain.setValueAtTime(0.13,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.28);o.start(t);o.stop(t+0.28);});}

const TREE_W=C5+NW+12;

// ── States ─────────────────────────────────────────────────────────
const S_TITLE=0,S_BATTLE=1,S_SKILLTREE=2;
let gState=S_TITLE;

// ── Game vars ──────────────────────────────────────────────────────
let player,enemies,coinsArr,particles,lightnings,rings,flyCoins;
let roundTime,roundElapsed,totalCoins,spentCoins,round;
let killCount=0;
let skills={};
let eliteTimer=0,hunterTimer=0;
let beacons=[];
let lastTS,repopT,lastRemSec=99,roundCoins=0,roundStartT=0,prevArenaLevel=0;
let cannonPending=[],cannonFiring=[];
let shakeT=0,shakeMag=0;
let comboCount=0,comboTimer=0,comboPeak=0;
let dashCD=0,timeScale=1;
let eid=0;
function nid(){return++eid;}

// ── Save / Load ────────────────────────────────────────────────────
const SAVE_KEY='ns2_save2';
function hasSave(){return!!localStorage.getItem(SAVE_KEY);}
function saveGame(){localStorage.setItem(SAVE_KEY,JSON.stringify({skills,totalCoins,spentCoins,round}));}
function loadGame(){
  const d=JSON.parse(localStorage.getItem(SAVE_KEY)||'null');
  if(!d)return false;
  skills=d.skills||{};totalCoins=d.totalCoins||0;spentCoins=d.spentCoins||0;round=d.round||1;
  return true;
}
function continueGame(){
  if(!loadGame()){startGame();return;}
  comboPeak=0;prevArenaLevel=getArenaLevel();
  initRound();gState=S_BATTLE;lastTS=null;requestAnimationFrame(loop);
}
let titleBtns={cont:null,fresh:null};

// ── Skill helpers ──────────────────────────────────────────────────
function lv(id){return skills[id]||0;}
function available(){return totalCoins-spentCoins;}
function getArenaLevel(){return lv('mapx')+lv('mapx2')+lv('mapx3')+lv('mapx4')+lv('mapx5')+lv('mapx6')+lv('mapx7')+lv('mapx8');}
function getRoundTime(){return 5+lv('t1')*5+lv('t2')*5+lv('t3')*10;}
function getEnemyCap(){return 100+Math.max(0,getArenaLevel()-4)*80;}
function getInitCount(){
  const al=getArenaLevel();
  const highBonus=Math.max(0,al-4)*50; // mapx5以降: +50/段階
  return 10+lv('e1')*5+lv('emore')*8+lv('e2')*8+lv('e3')*10+lv('e4')*12+al*12+highBonus+lv('e5')*20+lv('erp6')*15+lv('erp7')*20+lv('erp8')*30+lv('erp9')*40;
}
function getCoinMult(){return 1;} // コイン倍率なし。稼ぎはアリーナ規模と敵分母で決まる
function getLaserN(){const base=Math.min(8,2+lv('core')+lv('wl2'));return lv('overdrive')>0?Math.min(16,base*2):base;}
function getLaserL(){if(lv('godbeam')>0)return 2000;return 80+lv('wlen')*40+lv('wlen3')*80;}
function getLaserW(){const base=2+lv('wwid')*3;return lv('overdrive')>0?base*2:base;}
function getLaserRS(){return 1.8+lv('wrot')*0.5+lv('wrot2')*0.8;}

// ── Helpers ────────────────────────────────────────────────────────
function ptSegDSq(px,py,ax,ay,bx,by){
  const dx=bx-ax,dy=by-ay,l=dx*dx+dy*dy;
  if(!l)return(px-ax)**2+(py-ay)**2;
  const t=Math.max(0,Math.min(1,((px-ax)*dx+(py-ay)*dy)/l));
  return(px-ax-t*dx)**2+(py-ay-t*dy)**2;
}
function addPart(x,y,col,n){
  const budget=Math.min(n,Math.max(0,160-particles.length));
  for(let i=0;i<budget;i++){
    const a=Math.random()*Math.PI*2,s=1+Math.random()*4;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,decay:0.025+Math.random()*0.028,r:2+Math.random()*3,col});
  }
}
function addZap(x1,y1,x2,y2){lightnings.push({x1,y1,x2,y2,life:0.22});}

// ── Arena (常に固定サイズ) ─────────────────────────────────────────
// ── World Scale (アリーナ拡張で実際にアリーナが広がる) ────────────
// mapx強化でアリーナ・自機・敵がすべて大きくなる
const WORLD_SCALES=[0.54,0.65,0.80,0.90,1.0,0.75,0.60,0.45,0.35];
function getWS(){return WORLD_SCALES[Math.min(getArenaLevel(),8)];}

function getArena(){
  const W=canvas.width,H=canvas.height;
  const ws=getWS();
  const sz=Math.min(W,H)*0.78*ws;
  const h=Math.min(sz*1.14,H*0.94*ws);
  return{w:sz,h,x:(W-sz)/2,y:(H-h)/2};
}

// ── Spawn ──────────────────────────────────────────────────────────
function spawnEnemy(){
  const ar=getArena();
  const pool=getEnemyPool();
  const tier=pool[Math.floor(Math.random()*pool.length)];
  const m=16;
  enemies.push({
    id:nid(),

    y:ar.y+m+Math.random()*(ar.h-m*2),
    r:10+Math.random()*10,
    val:tier.val,
    col:tier.col,
    spd:0.35+Math.random()*0.7,
    wanderA:Math.random()*Math.PI*2,wanderT:0
  });
}

// ── Hunter spawn ───────────────────────────────────────────────────
function spawnHunter(){
  const ar=getArena(),side=Math.floor(Math.random()*4);
  let x,y;
  if(side===0){x=ar.x+Math.random()*ar.w;y=ar.y+4;}
  else if(side===1){x=ar.x+ar.w-4;y=ar.y+Math.random()*ar.h;}
  else if(side===2){x=ar.x+Math.random()*ar.w;y=ar.y+ar.h-4;}
  else{x=ar.x+4;y=ar.y+Math.random()*ar.h;}
  const spd=1.4+(lv('mapx3')+lv('mapx4'))*0.35;
  const hn=2+lv('mapx2');
  const hl=70+lv('mapx2')*20+lv('mapx3')*20;
  enemies.push({id:nid(),x,y,r:16,val:0,col:'#8800ff',spd,
    wanderA:Math.atan2(player.y-y,player.x-x),wanderT:0,hunter:true,
    laserA:Math.random()*Math.PI*2,laserN:hn,laserL:hl,laserW:2,laserRS:1.4});
}

// ── Beacons ────────────────────────────────────────────────────────
function initBeacons(){
  beacons=[];
  if(!lv('guard')) return;
  const ar=getArena();
  const pos=[
    {x:ar.x+ar.w*0.2,y:ar.y+ar.h*0.2},
    {x:ar.x+ar.w*0.8,y:ar.y+ar.h*0.2},
    {x:ar.x+ar.w*0.2,y:ar.y+ar.h*0.8},
    {x:ar.x+ar.w*0.8,y:ar.y+ar.h*0.8},
  ];
  if(lv('mapx2')>0){
    pos.push({x:ar.x+ar.w*0.5,y:ar.y+ar.h*0.12});
    pos.push({x:ar.x+ar.w*0.5,y:ar.y+ar.h*0.88});
  }
  if(lv('mapx3')>0||lv('mapx4')>0){
    pos.push({x:ar.x+ar.w*0.12,y:ar.y+ar.h*0.5});
    pos.push({x:ar.x+ar.w*0.88,y:ar.y+ar.h*0.5});
  }
  if(lv('bcount')>0){
    pos.push({x:ar.x+ar.w*0.5,y:ar.y+ar.h*0.35});
    pos.push({x:ar.x+ar.w*0.5,y:ar.y+ar.h*0.65});
    pos.push({x:ar.x+ar.w*0.35,y:ar.y+ar.h*0.5});
    pos.push({x:ar.x+ar.w*0.65,y:ar.y+ar.h*0.5});
  }
  beacons=pos.map((p,i)=>({...p,active:false,activeProg:0,id:i}));
}

// ── Kill — iterative BFS (no recursion → no stack overflow) ────────
function killEnemy(startE, outerVisited){
  if(startE.hunter) return; // ハンターは何があっても死なない
  const visited=outerVisited||new Set();
  if(visited.has(startE.id)) return;
  const queue=[startE];
  let first=true;
  while(queue.length>0){
    const e=queue.shift();
    if(e.hunter) continue; // ハンターはループ内でも絶対に除去しない
    if(visited.has(e.id)) continue;
    visited.add(e.id);
    const idx=enemies.indexOf(e);
    if(idx===-1) continue;
    enemies.splice(idx,1);
    const earn=Math.ceil(e.val*getCoinMult());
    totalCoins+=earn;roundCoins+=earn;
    // コイン飛翔パーティクル (最大3個/kill、パフォーマンス考慮)
    const nfly=Math.min(earn,3);
    for(let fi=0;fi<nfly;fi++){
      const W=canvas.width;
      flyCoins.push({x:e.x+(Math.random()-0.5)*10,y:e.y+(Math.random()-0.5)*10,
        tx:W*0.07,ty:26,col:e.col,prog:0,spd:1.2+Math.random()*0.6});
    }
    comboCount++;comboTimer=1.8;
    if(comboCount>comboPeak) comboPeak=comboCount;
    killCount++;
    if(lv('coinbomb')>0&&killCount%50===0){totalCoins+=500;rings.push({x:player.x,y:player.y,r:10,life:1.5,col:'#ffff00'});}
    if(lv('eternal')>0) roundTime+=2;
    if(first){playKill();first=false;}
    addPart(e.x,e.y,e.col,10+Math.random()*8|0);
    rings.push({x:e.x,y:e.y,r:8,life:1,col:e.col});
    if(coinsArr.length<300){
      for(let i=0;i<e.val;i++){
        const a=Math.random()*Math.PI*2,d=Math.random()*20;
        coinsArr.push({x:e.x+Math.cos(a)*d,y:e.y+Math.sin(a)*d,r:4,life:6,col:e.col});
      }
    }
    // Chain: queue nearby enemies (safe — iterative, no stack risk)
    if(lv('chain')>0){
      for(const ne of enemies){
        if(!visited.has(ne.id)&&(ne.x-e.x)**2+(ne.y-e.y)**2<60**2) queue.push(ne);
      }
    }
  }
}

// ── Dash ───────────────────────────────────────────────────────────
function doPhaseDash(tx,ty){
  if(!lv('dash')||dashCD>0||gState!==S_BATTLE) return;
  const dx=tx-player.x,dy=ty-player.y;
  const dist=Math.sqrt(dx*dx+dy*dy)||1;
  const mv=Math.min(dist,185);
  const nx=dx/dist,ny=dy/dist;
  const ar=getArena();
  const ox=player.x,oy=player.y;
  const newX=Math.max(ar.x+player.r,Math.min(ar.x+ar.w-player.r,ox+nx*mv));
  const newY=Math.max(ar.y+player.r,Math.min(ar.y+ar.h-player.r,oy+ny*mv));
  const vis=new Set();
  const snap=[...enemies];
  for(const e of snap){
    if(ptSegDSq(e.x,e.y,ox,oy,newX,newY)<=(e.r+4)**2) killEnemy(e,vis);
  }
  for(let t=0;t<=1;t+=0.2) player.trail.push({x:ox+nx*mv*t,y:oy+ny*mv*t});
  addZap(ox,oy,newX,newY);
  for(let i=0;i<16;i++){
    const a=Math.random()*Math.PI*2,s=2+Math.random()*5;
    particles.push({x:newX,y:newY,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,decay:0.02+Math.random()*0.03,r:2+Math.random()*3,col:'#00ffff'});
  }
  shakeT=0.1;shakeMag=4;
  player.x=newX;player.y=newY;
  dashCD=2.0;
  playDash();
}

// ── Init Round ─────────────────────────────────────────────────────
function initRound(){
  const W=canvas.width,H=canvas.height;
  player={x:W/2,y:H/2,r:18,vx:0,vy:0,speed:2.8,trail:[],
    laserN:getLaserN(),laserL:getLaserL(),laserW:getLaserW(),laserRS:getLaserRS(),laserA:Math.random()*Math.PI*2};
  enemies=[];coinsArr=[];particles=[];lightnings=[];rings=[];flyCoins=[];cannonPending=[];cannonFiring=[];
  roundTime=getRoundTime();roundElapsed=0;
  timeScale=lv('ts')?0.8:1;
  repopT=0;eliteTimer=0;hunterTimer=0;dashCD=0;eid=0;lastRemSec=99;
  killCount=0;roundCoins=0;roundStartT=1.8;
  // アリーナ拡張時にファンファーレ
  if(getArenaLevel()>prevArenaLevel&&prevArenaLevel>=0){setTimeout(playArenaExpand,100);}
  prevArenaLevel=getArenaLevel();
  initBeacons();
  comboCount=0;comboTimer=0;
  shakeT=0;shakeMag=0;
  for(let i=0;i<getInitCount();i++) spawnEnemy();
  // アリーナ拡張済みならラウンド開始時点からハンター出現
  if(getArenaLevel()>=1){
    const hcap=Math.max(1,getArenaLevel()-1);
    for(let i=0;i<hcap;i++) spawnHunter();
  }
}

// ── Update ─────────────────────────────────────────────────────────
function update(rawDt){
  const dt=Math.min(rawDt,0.05)*timeScale;
  const ar=getArena();
  roundElapsed+=dt;
  if(roundElapsed>=roundTime){endBattle();return;}

  // Player movement
  player.trail.push({x:player.x,y:player.y});
  if(player.trail.length>14) player.trail.shift();
  const spd=player.speed*265;
  let kx=0,ky=0;
  if(keys['ArrowLeft']||keys['a']||keys['A']) kx-=1;
  if(keys['ArrowRight']||keys['d']||keys['D']) kx+=1;
  if(keys['ArrowUp']||keys['w']||keys['W']) ky-=1;
  if(keys['ArrowDown']||keys['s']||keys['S']) ky+=1;
  if(kx||ky){const km=Math.sqrt(kx*kx+ky*ky);player.x+=kx/km*spd*dt;player.y+=ky/km*spd*dt;}
  else{const mag=Math.sqrt(player.vx**2+player.vy**2);if(mag>0){const sc=Math.min(mag,spd*dt)/mag;player.x+=player.vx*sc;player.y+=player.vy*sc;}}
  player.x=Math.max(ar.x+player.r,Math.min(ar.x+ar.w-player.r,player.x));
  player.y=Math.max(ar.y+player.r,Math.min(ar.y+ar.h-player.r,player.y));
  player.laserA+=player.laserRS*dt;
  player.laserL=getLaserL();
  if(dashCD>0) dashCD-=dt;

  // Hunter-player collision → HP damage
  const ws=getWS();
  // ハンターはプレイヤーに接触してもゲームオーバーにならない (ただの邪魔)
  for(const e of enemies){
    if(!e.hunter) continue;
    if(!e.hitCD) e.hitCD=0;
    e.hitCD=Math.max(0,e.hitCD-dt);
    if(e.hitCD<=0&&(player.x-e.x)**2+(player.y-e.y)**2<((player.r+e.r)*ws)**2){
      e.hitCD=0.8;
    }
  }

  // Elite spawn
  if(lv('erush')>0){
    eliteTimer+=dt;
    const freq=lv('elite2')>0?3.5:6.0;
    const cap=lv('elite2')>0?3:1;
    if(eliteTimer>=freq&&enemies.filter(e=>e.elite).length<cap){spawnElite();eliteTimer=0;}
  }

  // Hunter spawn (after mapx1+)
  if(getArenaLevel()>=1){
    hunterTimer+=dt;
    const hfreq=Math.max(5.0,12.0-getArenaLevel()*1.5);
    const hcap=Math.max(1,getArenaLevel()-1);
    if(hunterTimer>=hfreq&&enemies.filter(e=>e.hunter).length<hcap){spawnHunter();hunterTimer=0;}
  }

  // Hunter beam: steal coins from player (suppressed when hunter is in active beacon radius)
  for(const e of enemies){
    if(!e.hunter) continue;
    const inBeacon=beacons.some(b=>b.active&&(e.x-b.x)**2+(e.y-b.y)**2<(lv('brange')>0?140:80)**2);
    e.beamActive=!inBeacon;
    if(e.beamActive){
      const dx=player.x-e.x,dy=player.y-e.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<200){
        const steal=2*dt;
        totalCoins=Math.max(0,totalCoins-steal);
        // 視覚フィードバック: 稀に揺れ
        if(Math.random()<0.02){shakeT=0.08;shakeMag=3;}
      }
    }
  }

  // Beacon activation (player stands near inactive beacon)
  for(const b of beacons){
    const d=Math.sqrt((player.x-b.x)**2+(player.y-b.y)**2);
    if(d<38&&!b.active){
      b.activeProg=Math.min(1,b.activeProg+dt/(lv('bspeed')>0?0.7:1.5));
      if(b.activeProg>=1&&!b.active){b.active=true;playBeacon();for(let i=0;i<24;i++){const a=Math.random()*Math.PI*2;particles.push({x:b.x,y:b.y,vx:Math.cos(a)*(2+Math.random()*4),vy:Math.sin(a)*(2+Math.random()*4),life:1,decay:0.018+Math.random()*0.012,r:2+Math.random()*3,col:'#00ffff'});}}
    }
  }
  // Active beacons suppress hunter beams (hunters are NOT killed — they never die)

  // Hunter lasers: rotate and kill normal enemies (score goes to nobody)
  for(const h of enemies){
    if(!h.hunter) continue;
    h.laserA+=h.laserRS*dt;
    const hsnap=[...enemies];
    for(const e of hsnap){
      if(e.hunter||e.elite) continue;
      for(let li=0;li<h.laserN;li++){
        const ang=h.laserA+(li/h.laserN)*Math.PI*2;
        if(ptSegDSq(e.x,e.y,h.x,h.y,
            h.x+Math.cos(ang)*h.laserL,
            h.y+Math.sin(ang)*h.laserL)<=(e.r*ws+h.laserW)**2){
          // ハンターが敵を倒す — プレイヤーのコインにはならない
          const idx=enemies.indexOf(e);
          if(idx!==-1){
            enemies.splice(idx,1);
            addPart(e.x,e.y,'#8800ff',6);
            rings.push({x:e.x,y:e.y,r:6,life:0.7,col:'#8800ff'});
          }
          break;
        }
      }
    }
  }

  // Timewarp: slow enemies
  const enemySpeedMult=lv('timewarp')>0?(lv('timestop')>0?0.15:0.4):1.0;

  // Enemies wander / hunter behavior
  for(const e of enemies){
    e.wanderT-=dt;
    if(e.wanderT<=0){
      if(e.hunter){
        // ハンター: ビーコン(非活性)かプレイヤーを追う
        const inactiveB=beacons.filter(b=>!b.active);
        const target=inactiveB.length>0&&Math.random()<0.5
          ? inactiveB[Math.floor(Math.random()*inactiveB.length)]
          : {x:player.x,y:player.y};
        e.wanderA=Math.atan2(target.y-e.y,target.x-e.x)+(Math.random()-0.5)*0.5;
      } else if(e.elite){
        // エリート: プレイヤーから逃げる
        e.wanderA=Math.atan2(e.y-player.y,e.x-player.x)+(Math.random()-0.5)*1.2;
      } else {
        e.wanderA+=(Math.random()-0.5)*1.8;
      }
      e.wanderT=0.4+Math.random()*(e.hunter?0.5:0.8);
    }
    e.x+=Math.cos(e.wanderA)*e.spd*55*dt*enemySpeedMult;
    e.y+=Math.sin(e.wanderA)*e.spd*55*dt*enemySpeedMult;
    // ハンターがビーコンを破壊
    if(e.hunter){
      for(const b of beacons){
        if(b.active&&(e.x-b.x)**2+(e.y-b.y)**2<22**2){b.active=false;b.activeProg=0;shakeT=0.15;shakeMag=5;}
      }
    }
    if(e.x<ar.x+e.r){e.x=ar.x+e.r;e.wanderA=Math.PI-e.wanderA;}
    if(e.x>ar.x+ar.w-e.r){e.x=ar.x+ar.w-e.r;e.wanderA=Math.PI-e.wanderA;}
    if(e.y<ar.y+e.r){e.y=ar.y+e.r;e.wanderA=-e.wanderA;}
    if(e.y>ar.y+ar.h-e.r){e.y=ar.y+ar.h-e.r;e.wanderA=-e.wanderA;}
  }

  // Repop
  if(lv('erep')>0){
    const al=getArenaLevel();
    // アリーナ拡張ごとにリポップも加速 (-0.15秒/段階)
    const freq=Math.max(0.08,1.2-lv('erp2')*0.32-lv('erp3')*0.32-lv('erp4')*0.32-lv('erp5')*0.22-al*0.15);
    const cap=getEnemyCap();
    repopT+=dt;
    if(repopT>=freq&&enemies.length<cap){
      const baseN=lv('erp9')>0?5:lv('erp8')>0?4:lv('emass')>0?3:lv('erep2x')>0?2:1;
      const n=baseN+Math.max(0,al-4)*3; // mapx5以降: +3/段階
      for(let i=0;i<n&&enemies.length<cap;i++) spawnEnemy();
      repopT=0;
    }
  }

  // Cannon: 画面外からのビーム砲撃 (予告→発射)
  if(lv('cannon')>0){
    if(!player._cannonT) player._cannonT=0;
    player._cannonT-=dt;
    const W=canvas.width,H=canvas.height;
    const nShots=lv('cannon3')>0?4:lv('cannon2')>0?3:1;
    const warnDur=lv('cannon3')>0?1.0:1.8;
    const cooldown=lv('cannon3')>0?1.4:lv('cannon2')>0?2.5:4.0;
    if(player._cannonT<=0&&cannonPending.length<6){
      const valid=enemies.filter(e=>!e.hunter);
      const cols=['#00ccff','#ff44ff','#ffcc00','#ff6644'];
      for(let i=0;i<nShots&&valid.length>0;i++){
        // ターゲット: ランダムに選択
        const tgt=valid[Math.floor(Math.random()*valid.length)];
        // 発射源: 画面外の4辺からランダム
        const side=Math.floor(Math.random()*4);
        let sx,sy;
        if(side===0){sx=Math.random()*W;sy=-80;}
        else if(side===1){sx=W+80;sy=Math.random()*H;}
        else if(side===2){sx=Math.random()*W;sy=H+80;}
        else{sx=-80;sy=Math.random()*H;}
        cannonPending.push({sx,sy,tx:tgt.x,ty:tgt.y,warn:warnDur,col:cols[i%cols.length],w:20});
      }
      player._cannonT=cooldown;
    }
    // 予告フェーズ更新
    for(let i=cannonPending.length-1;i>=0;i--){
      const p=cannonPending[i];
      p.warn-=dt;
      if(p.warn<=0){
        // 発射！ ビームラインを登録
        const dx=p.tx-p.sx,dy=p.ty-p.sy,len=Math.sqrt(dx*dx+dy*dy)||1;
        const ex=p.sx+(dx/len)*(len+900),ey=p.sy+(dy/len)*(len+900);
        cannonFiring.push({sx:p.sx,sy:p.sy,ex,ey,tx:p.tx,ty:p.ty,t:1,col:p.col,w:p.w});
        // ビーム経路上の全敵を消滅
        const beamR=p.w*0.6+10;
        const snap=[...enemies];
        for(const e of snap){
          if(e.hunter) continue;
          if(ptSegDSq(e.x,e.y,p.sx,p.sy,ex,ey)<beamR*beamR){
            if(lv('endless')>0){totalCoins+=e.val;roundCoins+=e.val;addPart(e.x,e.y,e.col,8);}
            else killEnemy(e,new Set());
          }
        }
        playCannonFire();
        cannonPending.splice(i,1);
      }
    }
    // 発射ビーム フェードアウト
    for(let i=cannonFiring.length-1;i>=0;i--){
      cannonFiring[i].t-=dt*2.5;
      if(cannonFiring[i].t<=0)cannonFiring.splice(i,1);
    }
  }

  // Leech: ハンターに触れてコインを大量ドレイン
  if(lv('leech')>0){
    if(!player._leechFlyT)player._leechFlyT=0;
    player._leechFlyT-=dt;
    for(const e of enemies){
      if(!e.hunter) continue;
      const d=Math.sqrt((player.x-e.x)**2+(player.y-e.y)**2);
      if(d<(player.r+e.r)*ws){
        const rate=lv('cascade')>0?600:200;
        const earn=rate*dt;
        totalCoins+=earn;roundCoins+=earn;
        if(player._leechFlyT<=0){
          // コイン飛翔 (紫: ハンターの色)
          for(let fi=0;fi<8;fi++)
            flyCoins.push({x:e.x+(Math.random()-0.5)*24,y:e.y+(Math.random()-0.5)*24,
              tx:canvas.width*0.07,ty:26,col:'#cc88ff',prog:0,spd:1.6+Math.random()*0.6});
          player._leechFlyT=0.08;
        }
      }
    }
  }

  // Nova: periodic explosion
  if(lv('nova')>0){
    if(!player._novaT) player._novaT=0;
    player._novaT-=dt;
    const novaFreq=lv('meganova')>0?5:10;
    if(player._novaT<=0){
      const novaR=(lv('meganova')>0?ar.w*0.7:ar.w*0.45);
      const snap=[...enemies];
      for(const e of snap){
        if(e.hunter) continue;
        const d=Math.sqrt((e.x-player.x)**2+(e.y-player.y)**2);
        if(d<novaR){
          if(lv('endless')>0){totalCoins+=e.val;addPart(e.x,e.y,e.col,5);}
          else killEnemy(e,new Set());
        }
      }
      rings.push({x:player.x,y:player.y,r:8,life:1.5,col:'#ff8800'});
      addZap(player.x,player.y,player.x+novaR,player.y);
      addZap(player.x,player.y,player.x-novaR,player.y);
      addZap(player.x,player.y,player.x,player.y+novaR);
      addZap(player.x,player.y,player.x,player.y-novaR);
      player._novaT=novaFreq;
    }
  }

  // Laser hits — snapshot prevents index errors when enemies are removed mid-loop
  const vis=new Set();
  const snapE=[...enemies];
  for(const e of snapE){
    if(vis.has(e.id)) continue;
    if(e.hunter) continue;  // ハンターはレーザーで倒せない
    for(let li=0;li<player.laserN;li++){
      const ang=player.laserA+(li/player.laserN)*Math.PI*2;
      if(ptSegDSq(e.x,e.y,player.x,player.y,
          player.x+Math.cos(ang)*player.laserL,
          player.y+Math.sin(ang)*player.laserL)<=(e.r*ws+player.laserW)**2){
        if(lv('endless')>0){
          const earn=e.val*(lv('cascade')>0?2:1);
          totalCoins+=earn;addPart(e.x,e.y,e.col,5);comboCount++;comboTimer=1.8;
          if(comboCount>comboPeak)comboPeak=comboCount;
          vis.add(e.id);
        } else {
          killEnemy(e,vis);
        }
        break;
      }
    }
  }

  // Coins
  const magnet=lv('cmag')>0,magR=lv('cmag2')>0?160:100;
  for(let i=coinsArr.length-1;i>=0;i--){
    const c=coinsArr[i];
    c.life-=dt;
    const cdx=player.x-c.x,cdy=player.y-c.y,cd=Math.sqrt(cdx**2+cdy**2);
    if(magnet&&cd<magR){c.x+=cdx/cd*170*dt;c.y+=cdy/cd*170*dt;}
    let picked=cd<(player.r+c.r)*ws;
    if(!picked){
      for(let li=0;li<player.laserN;li++){
        const ang=player.laserA+(li/player.laserN)*Math.PI*2;
        if(ptSegDSq(c.x,c.y,player.x,player.y,
            player.x+Math.cos(ang)*player.laserL,
            player.y+Math.sin(ang)*player.laserL)<=(c.r*ws+player.laserW+4)**2){picked=true;break;}
      }
    }
    if(picked){playCoin();coinsArr.splice(i,1);}
    else if(c.life<=0) coinsArr.splice(i,1);
  }

  // Particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx*55*dt;p.y+=p.vy*55*dt;p.vx*=0.91;p.vy*=0.91;
    p.life-=p.decay*55*dt;if(p.life<=0)particles.splice(i,1);
  }
  for(let i=rings.length-1;i>=0;i--){rings[i].r+=195*dt;rings[i].life-=dt*3;if(rings[i].life<=0)rings.splice(i,1);}
  for(let i=lightnings.length-1;i>=0;i--){lightnings[i].life-=dt;if(lightnings[i].life<=0)lightnings.splice(i,1);}
  if(comboTimer>0){comboTimer-=dt;if(comboTimer<=0)comboCount=0;}
  // カウントダウン音 (残り5秒以下)
  const remSec=Math.ceil(roundTime-roundElapsed);
  if(remSec<=5&&remSec>=1&&remSec!==lastRemSec){playTick(remSec===1);lastRemSec=remSec;}
  if(shakeT>0) shakeT-=dt;
  if(roundStartT>0) roundStartT=Math.max(0,roundStartT-dt*1.2);
  // コイン飛翔アニメーション更新
  for(let i=flyCoins.length-1;i>=0;i--){
    const f=flyCoins[i];
    f.prog=Math.min(1,f.prog+dt*f.spd*(0.6+f.prog*1.2));
    const t=f.prog;
    const cpx=(f.x+f.tx)*0.5-30,cpy=Math.min(f.y,f.ty)-50;
    f.cx=(1-t)*(1-t)*f.x+2*(1-t)*t*cpx+t*t*f.tx;
    f.cy=(1-t)*(1-t)*f.y+2*(1-t)*t*cpy+t*t*f.ty;
    if(f.prog>=1)flyCoins.splice(i,1);
  }
}

// ── End Battle ─────────────────────────────────────────────────────
function endBattle(){
  gState=S_SKILLTREE;
  round++;
  saveGame();
  buildSkillTree();
  document.getElementById('skilltree').style.display='flex';
}

// ── Skill Tree UI ──────────────────────────────────────────────────
function buildSkillTree(){
  document.getElementById('st-coins').innerHTML=`<span style="display:inline-block;width:11px;height:11px;background:#ffdd44;border-radius:50%;vertical-align:middle;margin-right:5px;box-shadow:0 0 6px #ffaa00"></span>${Math.floor(available())}`;
  const hint=document.getElementById('st-hint');
  hint.textContent=roundCoins>0?`このラウンドで +${Math.floor(roundCoins)} コイン獲得！　ノードをタップして強化。`:'ノードをタップして強化。上流スキルが必要です。';
  document.getElementById('st-next').textContent=`▶ ラウンド ${round+1} 開始`;
  const stEl=document.getElementById('st-canvas');
  stEl.style.width=TREE_W+'px';
  stEl.style.height=TREE_H+'px';

  let svg='';
  for(const node of TREE_NODES){
    if(!node.parent) continue;
    const par=TREE_NODES.find(n=>n.id===node.parent);
    if(!par) continue;
    const bought=lv(node.id)>0,parBought=lv(node.parent)>0;
    const col=bought?'#44ff88':parBought?'#1a5070':'#0d1f2d';
    const sw=parBought?2:1;
    const sameRow=Math.abs(par.y-node.y)<5;
    let d;
    if(sameRow){
      // 同じ行: 親の右端 → 子の左端 を水平に繋ぐ
      const ym=par.y+NH/2;
      const lx=Math.min(par.x+NW,node.x),rx=Math.max(par.x+NW,node.x);
      d=`M${lx},${ym} L${rx},${ym}`;
    } else {
      // 異なる行: 親の直下ギャップ(+4px)を水平に通り、子の列を垂直に降りる
      const x1=par.x+NW/2,y1=par.y+NH,x2=node.x+NW/2,y2=node.y;
      const yb=y1+4; // 親の行とその下の行のギャップ内
      d=`M${x1},${y1} L${x1},${yb} L${x2},${yb} L${x2},${y2}`;
    }
    svg+=`<path d="${d}" stroke="${col}" stroke-width="${sw}" fill="none"/>`;
  }

  let cheapestAvail=null,cheapestCost=Infinity;
  for(const node of TREE_NODES){
    const bought=lv(node.id)>0;
    const parentOk=!node.parent||lv(node.parent)>0;
    const cost=node.cost||0;
    if(!bought&&parentOk&&available()>=cost&&cost<cheapestCost){cheapestCost=cost;cheapestAvail=node.id;}
  }
  let html='';
  for(const node of TREE_NODES){
    const bought=lv(node.id)>0;
    const parentOk=!node.parent||lv(node.parent)>0;
    const canBuy=parentOk&&!bought&&available()>=node.cost;
    let cls='st-node'+(bought?' sn-bought':!parentOk?' sn-blocked':canBuy?' sn-avail':'')+(node.id===cheapestAvail?' sn-cheapest':'');
    const coinDot=`<span style="display:inline-block;width:8px;height:8px;background:#ffdd44;border-radius:50%;vertical-align:middle;margin-right:3px"></span>`;
    const costLabel=bought?'✓':parentOk?`${coinDot}${node.cost}`:'🔒';
    html+=`<div class="${cls}" style="left:${node.x}px;top:${node.y}px" data-id="${node.id}" data-cost="${node.cost}">
      <div class="sn-name">${node.name}</div>
      <div class="sn-desc">${node.desc}</div>
      <div class="sn-cost">${costLabel}</div>
    </div>`;
  }
  stEl.innerHTML=`<svg style="position:absolute;top:0;left:0;width:${TREE_W}px;height:${TREE_H}px;pointer-events:none" xmlns="http://www.w3.org/2000/svg">${svg}</svg>${html}`;
  stEl.querySelectorAll('.sn-avail').forEach(el=>{
    el.addEventListener('click',()=>{
      const id=el.dataset.id,cost=+el.dataset.cost;
      if(available()>=cost&&!skills[id]){spentCoins+=cost;skills[id]=1;buildSkillTree();playLevelUp();}
    });
  });
}

document.getElementById('st-next').addEventListener('click',()=>{
  document.getElementById('skilltree').style.display='none';
  gState=S_BATTLE;initRound();lastTS=null;requestAnimationFrame(loop);
});

// ── Draw helpers ───────────────────────────────────────────────────
function roundRect(x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

// ── Draw Battle ────────────────────────────────────────────────────
function drawBattle(W,H){
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='#0a1520';ctx.lineWidth=1;
  for(let x=0;x<W;x+=36){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=36){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  const ar=getArena();
  ctx.fillStyle='rgba(0,6,18,0.5)';ctx.fillRect(ar.x,ar.y,ar.w,ar.h);
  ctx.strokeStyle='#0055aa';ctx.lineWidth=1.5;ctx.shadowBlur=14;ctx.shadowColor='#0055ff';
  ctx.strokeRect(ar.x,ar.y,ar.w,ar.h);ctx.shadowBlur=0;

  // ラウンド開始フラッシュ
  if(roundStartT>0){
    const p=roundStartT/1.8;
    ctx.globalAlpha=p*0.85;
    ctx.fillStyle='rgba(0,150,255,0.15)';
    ctx.fillRect(ar.x,ar.y,ar.w,ar.h);
    ctx.globalAlpha=Math.min(1,p*2);
    ctx.textAlign='center';
    const rfs=Math.round(W*0.09);
    ctx.font=`bold ${rfs}px monospace`;
    ctx.fillStyle='#88ccff';ctx.shadowBlur=20;ctx.shadowColor='#0088ff';
    ctx.fillText(`ROUND ${round}`,W/2,ar.y+ar.h*0.5);
    ctx.shadowBlur=0;ctx.globalAlpha=1;
  }
  // アリーナ拡張レベル表示 (ラウンド開始時のみ)
  if(roundStartT>0&&getArenaLevel()>0){
    const p=Math.min(1,roundStartT/1.2);
    ctx.globalAlpha=p;ctx.textAlign='center';
    const afs=Math.round(W*0.055);
    ctx.font=`bold ${afs}px monospace`;
    ctx.fillStyle='#ffaa00';ctx.shadowBlur=12;ctx.shadowColor='#ff6600';
    ctx.fillText(`ARENA Lv${getArenaLevel()}`,W/2,ar.y+ar.h*0.5+afs*1.4);
    ctx.shadowBlur=0;ctx.globalAlpha=1;
  }

  // 砲台 予告ライン描画
  const now=Date.now();
  for(const p of cannonPending){
    const progress=(p.warn<1.8?1.8-p.warn:0)/1.8;
    const flicker=0.5+0.5*Math.sin(now*0.025);
    // 予告ライン (画面外→ターゲット)
    ctx.globalAlpha=Math.min(1,progress*2)*0.55*flicker;
    ctx.strokeStyle=p.col;ctx.lineWidth=1.5;ctx.setLineDash([8,5]);
    ctx.shadowBlur=8;ctx.shadowColor=p.col;
    ctx.beginPath();ctx.moveTo(p.sx,p.sy);ctx.lineTo(p.tx,p.ty);ctx.stroke();
    ctx.setLineDash([]);ctx.shadowBlur=0;
    // ターゲットサークル (点滅・収縮)
    const cr=30-(p.warn/1.8)*14;
    ctx.globalAlpha=Math.min(1,progress*3)*flicker;
    ctx.strokeStyle=p.col;ctx.lineWidth=2.5;ctx.shadowBlur=14;ctx.shadowColor=p.col;
    ctx.beginPath();ctx.arc(p.tx,p.ty,Math.max(6,cr),0,Math.PI*2);ctx.stroke();
    // 十字マーカー
    const cs=8;
    ctx.beginPath();ctx.moveTo(p.tx-cs,p.ty);ctx.lineTo(p.tx+cs,p.ty);
    ctx.moveTo(p.tx,p.ty-cs);ctx.lineTo(p.tx,p.ty+cs);ctx.stroke();
    ctx.shadowBlur=0;ctx.globalAlpha=1;
  }
  // 砲台 発射ビーム描画
  for(const f of cannonFiring){
    const a=Math.min(1,f.t*2);
    // 外側グロー
    ctx.globalAlpha=a*0.35;ctx.strokeStyle=f.col;ctx.lineWidth=f.w*3.5;
    ctx.shadowBlur=40;ctx.shadowColor=f.col;
    ctx.beginPath();ctx.moveTo(f.sx,f.sy);ctx.lineTo(f.ex,f.ey);ctx.stroke();
    // 中間グロー
    ctx.globalAlpha=a*0.7;ctx.strokeStyle=f.col;ctx.lineWidth=f.w;
    ctx.shadowBlur=20;ctx.shadowColor=f.col;
    ctx.beginPath();ctx.moveTo(f.sx,f.sy);ctx.lineTo(f.ex,f.ey);ctx.stroke();
    // コア白線
    ctx.globalAlpha=a;ctx.strokeStyle='#ffffff';ctx.lineWidth=f.w*0.35;
    ctx.shadowBlur=10;ctx.shadowColor='#fff';
    ctx.beginPath();ctx.moveTo(f.sx,f.sy);ctx.lineTo(f.ex,f.ey);ctx.stroke();
    ctx.shadowBlur=0;ctx.globalAlpha=1;
  }

  for(const r of rings){
    ctx.globalAlpha=r.life*0.7;ctx.strokeStyle=r.col;ctx.shadowBlur=8;ctx.shadowColor=r.col;
    ctx.lineWidth=2;ctx.beginPath();ctx.arc(r.x,r.y,r.r,0,Math.PI*2);ctx.stroke();
  }
  ctx.globalAlpha=1;ctx.shadowBlur=0;

  const ws=getWS();
  for(const c of coinsArr){
    ctx.globalAlpha=Math.min(1,c.life*0.45);ctx.fillStyle=c.col;
    ctx.beginPath();ctx.arc(c.x,c.y,c.r*ws,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;

  // コイン飛翔アニメーション描画
  for(const f of flyCoins){
    if(f.cx===undefined)continue;
    const alpha=f.prog<0.8?1:(1-f.prog)/0.2;
    const r=Math.max(2,(1-f.prog)*5+2);
    ctx.globalAlpha=alpha;ctx.fillStyle=f.col;ctx.shadowBlur=6;ctx.shadowColor=f.col;
    ctx.beginPath();ctx.arc(f.cx,f.cy,r,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;ctx.shadowBlur=0;

  // Particles — skip shadowBlur when many (performance)
  const useShadow=particles.length<70;
  for(const p of particles){
    ctx.globalAlpha=p.life;
    if(useShadow){ctx.shadowBlur=4;ctx.shadowColor=p.col;}
    ctx.fillStyle=p.col;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;ctx.shadowBlur=0;

  // Beacons
  for(const b of beacons){
    if(b.active){
      // 保護範囲
      ctx.globalAlpha=0.07+0.03*Math.sin(Date.now()*0.003);ctx.fillStyle='#00ffff';
      const br=lv('brange')>0?140:80;ctx.beginPath();ctx.arc(b.x,b.y,br,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=0.5;ctx.strokeStyle='#00ffff';ctx.lineWidth=2;ctx.shadowBlur=14;ctx.shadowColor='#00ffff';
      ctx.beginPath();ctx.arc(b.x,b.y,16,0,Math.PI*2);ctx.stroke();
      ctx.shadowBlur=0;
    } else {
      ctx.globalAlpha=0.3;ctx.strokeStyle='#334466';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(b.x,b.y,16,0,Math.PI*2);ctx.stroke();
      if(b.activeProg>0){
        ctx.globalAlpha=0.9;ctx.strokeStyle='#0088ff';ctx.lineWidth=3;ctx.shadowBlur=7;ctx.shadowColor='#0088ff';
        ctx.beginPath();ctx.arc(b.x,b.y,16,-Math.PI/2,-Math.PI/2+b.activeProg*Math.PI*2);ctx.stroke();
        ctx.shadowBlur=0;
      }
      // 近いと「近づいて」表示
      const bd=Math.sqrt((player.x-b.x)**2+(player.y-b.y)**2);
      if(bd<60){
        ctx.globalAlpha=Math.max(0,(60-bd)/60);ctx.textAlign='center';ctx.font='bold 10px monospace';
        ctx.fillStyle='#00aaff';ctx.fillText('▼',b.x,b.y-20);
      }
    }
    ctx.globalAlpha=1;ctx.shadowBlur=0;
  }

  for(const e of enemies){
    if(e.hunter){
      // ハンター: 紫の六角形 + ☠
      const p=0.5+0.5*Math.sin(Date.now()*0.008);
      const er=e.r*ws;
      ctx.shadowBlur=16+p*8;ctx.shadowColor='#aa00ff';
      ctx.fillStyle='#110022';ctx.strokeStyle='#9900ee';ctx.lineWidth=3;
      ctx.beginPath();
      for(let i=0;i<6;i++){const a=i*Math.PI/3;i===0?ctx.moveTo(e.x+Math.cos(a)*er,e.y+Math.sin(a)*er):ctx.lineTo(e.x+Math.cos(a)*er,e.y+Math.sin(a)*er);}
      ctx.closePath();ctx.fill();ctx.stroke();
      ctx.shadowBlur=0;ctx.strokeStyle='#cc66ff';ctx.lineWidth=2;
      const xs=Math.max(3,5*ws),ys=Math.max(3,5*ws);
      ctx.beginPath();ctx.moveTo(e.x-xs,e.y-ys);ctx.lineTo(e.x+xs,e.y+ys);ctx.moveTo(e.x+xs,e.y-ys);ctx.lineTo(e.x-xs,e.y+ys);ctx.stroke();
      // ハンターのレーザーアーム
      const inBeacon=beacons.some(b=>b.active&&(e.x-b.x)**2+(e.y-b.y)**2<(lv('brange')>0?140:80)**2);
      if(!inBeacon&&e.laserA!==undefined){
        ctx.shadowBlur=10;ctx.shadowColor='#cc00ff';ctx.strokeStyle='#aa44ff';ctx.lineWidth=e.laserW||2;
        for(let li=0;li<e.laserN;li++){
          const ang=e.laserA+(li/e.laserN)*Math.PI*2;
          ctx.beginPath();ctx.moveTo(e.x,e.y);
          ctx.lineTo(e.x+Math.cos(ang)*e.laserL,e.y+Math.sin(ang)*e.laserL);ctx.stroke();
        }
        ctx.shadowBlur=0;
      }
    } else if(e.elite){
      // エリート: 8角星形 + パルス
      const p=0.5+0.5*Math.sin(Date.now()*0.006);
      const er=e.r*ws;
      ctx.shadowBlur=18+p*12;ctx.shadowColor=e.col;
      ctx.strokeStyle=e.col;ctx.fillStyle='rgba(0,0,0,0.75)';ctx.lineWidth=2.5;
      ctx.beginPath();
      for(let i=0;i<8;i++){
        const a=i*Math.PI/4-Math.PI/8;
        const r=i%2===0?er:er*0.45;
        i===0?ctx.moveTo(e.x+Math.cos(a)*r,e.y+Math.sin(a)*r):ctx.lineTo(e.x+Math.cos(a)*r,e.y+Math.sin(a)*r);
      }
      ctx.closePath();ctx.fill();ctx.stroke();
      // ポイント表示
      ctx.shadowBlur=0;ctx.globalAlpha=0.9;ctx.textAlign='center';
      ctx.font=`bold ${Math.round(er*0.85)}px monospace`;ctx.fillStyle=e.col;
      ctx.fillText(e.val+'pt',e.x,e.y+er+11);
      ctx.globalAlpha=1;
    } else {
      ctx.shadowBlur=9;ctx.shadowColor=e.col;ctx.fillStyle=e.col;
      ctx.beginPath();ctx.arc(e.x,e.y,e.r*ws,0,Math.PI*2);ctx.fill();
      if(e.val>1){
        ctx.shadowBlur=0;ctx.globalAlpha=0.9;ctx.textAlign='center';
        ctx.font=`bold ${Math.max(7,Math.round(e.r*ws*0.7))}px monospace`;ctx.fillStyle=e.col;
        ctx.fillText(e.val,e.x,e.y+e.r*ws+9);ctx.globalAlpha=1;
      }
    }
  }
  ctx.shadowBlur=0;

  for(const l of lightnings){
    ctx.globalAlpha=l.life/0.22;ctx.strokeStyle='#fff';ctx.shadowBlur=8;ctx.shadowColor='#ffff44';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(l.x1,l.y1);
    for(let s=1;s<5;s++){const t=s/5;ctx.lineTo(l.x1+(l.x2-l.x1)*t+(Math.random()-0.5)*14,l.y1+(l.y2-l.y1)*t+(Math.random()-0.5)*14);}
    ctx.lineTo(l.x2,l.y2);ctx.stroke();
  }
  ctx.globalAlpha=1;ctx.shadowBlur=0;

  for(let i=0;i<player.trail.length;i++){
    const t=player.trail[i],a=(i/player.trail.length)*0.26;
    ctx.globalAlpha=a;ctx.fillStyle='#00ffff';
    ctx.beginPath();ctx.arc(t.x,t.y,player.r*ws*0.42*(i/player.trail.length),0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;

  for(let li=0;li<player.laserN;li++){
    const ang=player.laserA+(li/player.laserN)*Math.PI*2;
    ctx.shadowBlur=13;ctx.shadowColor='#4488ff';ctx.strokeStyle='#88ccff';ctx.lineWidth=player.laserW;
    ctx.beginPath();ctx.moveTo(player.x,player.y);
    ctx.lineTo(player.x+Math.cos(ang)*player.laserL,player.y+Math.sin(ang)*player.laserL);
    ctx.stroke();
  }
  ctx.shadowBlur=0;

  const pr=player.r*ws;
  ctx.shadowBlur=16;ctx.shadowColor='#00ffff';ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(player.x,player.y,pr,0,Math.PI*2);ctx.fill();
  const gr=ctx.createRadialGradient(player.x,player.y,0,player.x,player.y,pr);
  gr.addColorStop(0,'rgba(0,255,255,0.65)');gr.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=gr;ctx.beginPath();ctx.arc(player.x,player.y,pr,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;

  if(lv('dash')>0&&dashCD<=0){
    const pulse=0.22+0.18*Math.sin(Date.now()*0.008);
    ctx.globalAlpha=pulse;ctx.strokeStyle='#00ffff';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(player.x,player.y,pr+9,0,Math.PI*2);ctx.stroke();
    ctx.globalAlpha=1;
  }

  if(comboCount>=3&&comboTimer>0){
    ctx.globalAlpha=Math.min(1,comboTimer*2);ctx.textAlign='center';
    const cfs=Math.min(W*0.065,42);ctx.font=`bold ${cfs}px monospace`;
    const cc=comboCount>=10?'#ff44ff':comboCount>=5?'#ff8800':'#ffff44';
    const cg=comboCount>=10?'#ff00ff':comboCount>=5?'#ff4400':'#ffaa00';
    ctx.shadowBlur=22;ctx.shadowColor=cg;ctx.fillStyle=cc;
    ctx.fillText(`${comboCount} COMBO!`,W/2,H*0.76);
    ctx.shadowBlur=0;ctx.globalAlpha=1;
  }

  // ハンター接近警告: 紫ビネット
  const hunterNear=enemies.some(e=>e.hunter&&(player.x-e.x)**2+(player.y-e.y)**2<(160*ws)**2);
  if(hunterNear){
    const pulse=0.3+0.2*Math.sin(Date.now()*0.012);
    const vg=ctx.createRadialGradient(W/2,H/2,H*0.22,W/2,H/2,H*0.65);
    vg.addColorStop(0,'rgba(0,0,0,0)');
    vg.addColorStop(1,`rgba(140,0,220,${pulse})`);
    ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
  }

  // HUD
  ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,W,48);
  const rem=Math.max(0,Math.ceil(roundTime-roundElapsed));
  if(rem<=5&&rem>=1){
    // カウントダウン: アリーナ枠の外・上部に大きく表示
    const pulse=0.6+0.4*Math.sin(Date.now()*0.018);
    const fs=Math.round(W*0.18*(0.85+0.15*pulse));
    const cy=ar.y-fs*0.1; // アリーナ上枠のすぐ上
    ctx.textAlign='center';ctx.font=`bold ${fs}px monospace`;
    ctx.globalAlpha=0.15*pulse;ctx.fillStyle='#ff0000';
    ctx.fillText(rem,W/2,cy);
    ctx.globalAlpha=1;
    ctx.fillStyle='#ff3333';ctx.shadowBlur=30+pulse*20;ctx.shadowColor='#ff0000';
    ctx.fillText(rem,W/2,cy);
    ctx.shadowBlur=0;
    ctx.font='bold 22px monospace';
    ctx.fillStyle='#ff4444';ctx.shadowBlur=12;ctx.shadowColor='#ff0000';
    ctx.fillText(rem+'s',W/2,28);ctx.shadowBlur=0;
  } else {
    ctx.textAlign='center';ctx.font='bold 22px monospace';
    ctx.fillStyle='#fff';ctx.shadowBlur=7;ctx.shadowColor='#aaaaff';
    ctx.fillText(rem+'s',W/2,28);ctx.shadowBlur=0;
  }
  // コインアイコン (canvas内ではemojiが化けるため円で描画)
  ctx.shadowBlur=5;ctx.shadowColor='#ffaa00';ctx.fillStyle='#ffdd44';
  ctx.beginPath();ctx.arc(16,21,6,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#000';ctx.font='bold 8px monospace';ctx.textAlign='center';
  ctx.fillText('C',16,24);ctx.shadowBlur=0;
  ctx.textAlign='left';ctx.font='bold 13px monospace';ctx.fillStyle='#ffdd44';
  ctx.shadowBlur=3;ctx.shadowColor='#ffaa00';ctx.fillText(` ${Math.floor(available())}`,22,26);ctx.shadowBlur=0;
  ctx.textAlign='right';ctx.font='12px monospace';ctx.fillStyle='#667788';
  ctx.fillText(`R${round}  x${enemies.length}`,W-10,26);
  ctx.fillStyle='#0a1a2a';ctx.fillRect(0,44,W,4);
  ctx.fillStyle='#0077ee';ctx.fillRect(0,44,W*(roundElapsed/roundTime),4);
}

// ── Draw Title ─────────────────────────────────────────────────────
let demoEs=[];
function initDemo(){
  demoEs=[];const W=canvas.width||420,H=canvas.height||700;
  for(let i=0;i<16;i++){
    const tier=E_TIERS[i%E_TIERS.length];
    demoEs.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-0.5)*1.4,vy:(Math.random()-0.5)*1.4,r:6+Math.random()*10,col:tier.col});
  }
}
function drawTitle(W,H){
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='#0a1520';ctx.lineWidth=1;
  for(let x=0;x<W;x+=36){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=36){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  for(const e of demoEs){
    e.x+=e.vx;e.y+=e.vy;
    if(e.x<0||e.x>W)e.vx*=-1;if(e.y<0||e.y>H)e.vy*=-1;
    ctx.shadowBlur=9;ctx.shadowColor=e.col;ctx.fillStyle=e.col;ctx.globalAlpha=0.45;
    ctx.beginPath();ctx.arc(e.x,e.y,e.r,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;ctx.shadowBlur=0;
  const fs=Math.min(W*0.1,40);
  ctx.font=`bold ${fs}px monospace`;ctx.textAlign='center';
  ctx.shadowBlur=20;ctx.shadowColor='#00ffff';ctx.fillStyle='#fff';
  ctx.fillText('⚡ NEON SWARM',W/2,H*0.24);ctx.shadowBlur=0;
  const fs2=Math.min(Math.floor(W*0.036),14);
  ctx.font=`${fs2}px sans-serif`;ctx.fillStyle='#778899';
  ctx.fillText('ドラッグ/WASD で移動　レーザーが敵を自動で倒す',W/2,H*0.33);
  ctx.fillStyle='#88ddcc';ctx.font=`bold ${fs2}px sans-serif`;
  ctx.fillText('コインを稼いでスキルツリーで強化！',W/2,H*0.39);
  // Color guide
  const tiers=[{col:'#44ff88',t:'緑=1pt'},{col:'#ffdd00',t:'黄=2pt'},{col:'#ff7700',t:'橙=3pt'},{col:'#ff3333',t:'赤=5pt'}];
  ctx.font=`bold ${fs2}px monospace`;
  const tw=W*0.22,tx0=W/2-tw*2+tw*0.5;
  tiers.forEach((t,i)=>{
    ctx.fillStyle=t.col;ctx.shadowBlur=6;ctx.shadowColor=t.col;
    ctx.fillText(t.t,tx0+i*tw,H*0.46);
  });
  ctx.shadowBlur=0;
  ctx.fillStyle='#ffcc44';ctx.font=`bold ${fs2}px sans-serif`;
  ctx.fillText('何ラウンドまで積み上げられる？',W/2,H*0.52);
  const hs=parseInt(localStorage.getItem('ns2_hs')||'0');
  if(hs>0){
    ctx.font=`bold ${Math.floor(fs2*1.1)}px monospace`;ctx.fillStyle='#ffdd44';
    ctx.shadowBlur=5;ctx.shadowColor='#ffaa00';ctx.fillText(`BEST: ${hs}pt`,W/2,H*0.58);ctx.shadowBlur=0;
  }
  const bw=Math.min(W*0.5,270),bh=48,bx=W/2-bw/2;
  if(hasSave()){
    // 続きから (メインボタン)
    const by=H*0.63;
    titleBtns.cont={x:bx,y:by,w:bw,h:bh};
    ctx.fillStyle='rgba(0,22,55,0.96)';ctx.strokeStyle='#00aaff';ctx.lineWidth=2.5;
    ctx.shadowBlur=14;ctx.shadowColor='#00aaff';
    roundRect(bx,by,bw,bh,8);ctx.fill();ctx.stroke();ctx.shadowBlur=0;
    ctx.font='bold 19px monospace';ctx.fillStyle='#fff';ctx.shadowBlur=6;ctx.shadowColor='#00ccff';
    ctx.fillText('続きから',W/2,by+31);ctx.shadowBlur=0;
    // はじめから (目立たないテキストリンク)
    const by2=by+bh+18;
    titleBtns.fresh={x:W/2-60,y:by2-16,w:120,h:24};
    ctx.globalAlpha=0.38;ctx.font=`13px monospace`;ctx.fillStyle='#667788';
    ctx.fillText('はじめから',W/2,by2);ctx.globalAlpha=1;
  } else {
    titleBtns.cont=null;
    const by=H*0.65;
    titleBtns.fresh={x:bx,y:by,w:bw,h:bh};
    ctx.fillStyle='rgba(0,15,40,0.94)';ctx.strokeStyle='#0088ff';ctx.lineWidth=2;
    ctx.shadowBlur=10;ctx.shadowColor='#0088ff';
    roundRect(bx,by,bw,bh,8);ctx.fill();ctx.stroke();ctx.shadowBlur=0;
    ctx.font='bold 18px monospace';ctx.fillStyle='#fff';ctx.shadowBlur=4;ctx.shadowColor='#00aaff';
    ctx.fillText('TAP TO START',W/2,by+31);ctx.shadowBlur=0;
  }
}

// ── Loop ───────────────────────────────────────────────────────────
function loop(ts){
  const W=canvas.width,H=canvas.height;
  if(gState===S_TITLE){drawTitle(W,H);requestAnimationFrame(loop);return;}
  if(gState===S_SKILLTREE) return;
  if(gState!==S_BATTLE) return;
  if(!lastTS) lastTS=ts;
  const dt=(ts-lastTS)/1000;lastTS=ts;
  update(dt);
  ctx.save();
  if(shakeT>0) ctx.translate((Math.random()-0.5)*shakeMag*(shakeT/0.3),(Math.random()-0.5)*shakeMag*(shakeT/0.3));
  drawBattle(W,H);
  ctx.restore();
  requestAnimationFrame(loop);
}

// ── Input ──────────────────────────────────────────────────────────
const keys={};
let dragging=false,dLastX=0,dLastY=0,touchStartX=0,touchStartY=0;
window.addEventListener('keydown',e=>keys[e.key]=true);
window.addEventListener('keyup',e=>keys[e.key]=false);
function getPos(e){
  const rect=canvas.getBoundingClientRect();
  const sx=canvas.width/rect.width,sy=canvas.height/rect.height;
  if(e.touches)return{x:(e.touches[0].clientX-rect.left)*sx,y:(e.touches[0].clientY-rect.top)*sy};
  return{x:(e.clientX-rect.left)*sx,y:(e.clientY-rect.top)*sy};
}
function handleTitleTap(p){
  function inBtn(b){return b&&p.x>=b.x&&p.x<=b.x+b.w&&p.y>=b.y&&p.y<=b.y+b.h;}
  if(inBtn(titleBtns.cont))continueGame();
  else if(inBtn(titleBtns.fresh))startGame();
}
canvas.addEventListener('mousedown',e=>{
  e.preventDefault();resumeAC();
  const p=getPos(e);
  if(gState===S_TITLE){handleTitleTap(p);}
  else if(gState===S_BATTLE&&e.button===0) doPhaseDash(p.x,p.y);
});
canvas.addEventListener('contextmenu',e=>e.preventDefault());
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();resumeAC();
  if(gState===S_TITLE){handleTitleTap(getPos(e));return;}
  const p=getPos(e);
  dragging=true;dLastX=p.x;dLastY=p.y;touchStartX=p.x;touchStartY=p.y;
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();if(!dragging)return;
  const p=getPos(e);
  if(gState===S_BATTLE){player.vx=p.x-dLastX;player.vy=p.y-dLastY;}
  dLastX=p.x;dLastY=p.y;
},{passive:false});
canvas.addEventListener('touchend',e=>{
  e.preventDefault();dragging=false;
  if(gState===S_BATTLE){
    player.vx=0;player.vy=0;
    const dx=dLastX-touchStartX,dy=dLastY-touchStartY;
    if(dx*dx+dy*dy<400) doPhaseDash(touchStartX,touchStartY);
  }
},{passive:false});

// ── Start ──────────────────────────────────────────────────────────
function startGame(){
  skills={};totalCoins=0;spentCoins=0;round=1;comboPeak=0;
  initRound();gState=S_BATTLE;lastTS=null;
  requestAnimationFrame(loop);
}

initDemo();
requestAnimationFrame(loop);
</script>
