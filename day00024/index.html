<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>⚡ NEON SWARM</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%}
body{background:#000;display:flex;justify-content:center;align-items:flex-start;overflow:hidden;font-family:'Segoe UI',sans-serif}
#wrap{position:relative;width:100%;max-width:900px;height:100vh;height:100dvh}
@media(max-width:600px){#wrap{max-width:420px}}
canvas{display:block;width:100%;height:100%;background:#000;touch-action:none}
#levelup{position:absolute;top:0;left:0;width:100%;height:100%;display:none;flex-direction:column;align-items:center;justify-content:center;pointer-events:all;background:rgba(0,0,0,0.75)}
#levelup h2{color:#fff;font-size:28px;text-shadow:0 0 20px #ffff00,0 0 40px #ffff00;margin-bottom:6px;letter-spacing:3px}
#levelup p{color:#aaa;font-size:13px;margin-bottom:20px}
#choices{display:flex;flex-direction:column;gap:10px;width:92%;max-width:360px}
.choice-btn{background:rgba(15,15,35,0.95);border:1px solid #336;color:#eee;padding:12px 16px;border-radius:8px;cursor:pointer;font-size:14px;text-align:left;transition:all 0.12s;pointer-events:all}
.choice-btn:hover,.choice-btn:active{background:rgba(30,30,70,0.95);border-color:#66f;box-shadow:0 0 12px #44f}
.choice-btn .name{font-weight:bold;color:#88aaff;font-size:15px}
.choice-btn .desc{font-size:11px;color:#999;margin-top:3px}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="levelup">
    <h2>LEVEL UP!</h2>
    <p>パワーアップを選択してください</p>
    <div id="choices"></div>
  </div>
</div>
<script>
'use strict';

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('wrap');
const levelupDiv = document.getElementById('levelup');
const choicesDiv = document.getElementById('choices');

function syncCanvasSize() {
  const w = canvas.offsetWidth, h = canvas.offsetHeight;
  if (w > 0 && h > 0) { canvas.width = w; canvas.height = h; }
}
const ro = new ResizeObserver(syncCanvasSize);
ro.observe(canvas);
// フォールバック: レイアウト確定後に確実にサイズ設定
setTimeout(syncCanvasSize, 0);
setTimeout(syncCanvasSize, 100);

// ── Audio ──────────────────────────────────────────────────────────
const AC = new (window.AudioContext || window.webkitAudioContext)();
function resumeAC() { if (AC.state === 'suspended') AC.resume(); }

function beep(freq, dur, vol, type) {
  const o = AC.createOscillator(), g = AC.createGain();
  o.connect(g); g.connect(AC.destination);
  o.type = type || 'sine';
  o.frequency.setValueAtTime(freq, AC.currentTime);
  o.frequency.exponentialRampToValueAtTime(freq * 0.5, AC.currentTime + dur);
  g.gain.setValueAtTime(vol, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
  o.start(); o.stop(AC.currentTime + dur);
}
function playLaserHit() { resumeAC(); beep(700, 0.07, 0.12); }
function playExplosion() {
  resumeAC();
  const buf = AC.createBuffer(1, AC.sampleRate * 0.12, AC.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1)*(1-i/d.length);
  const s = AC.createBufferSource(), g = AC.createGain(), f = AC.createBiquadFilter();
  f.type = 'lowpass'; f.frequency.value = 350;
  s.buffer = buf; s.connect(f); f.connect(g); g.connect(AC.destination);
  g.gain.setValueAtTime(0.35, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + 0.12);
  s.start();
}
function playLevelUp() {
  resumeAC();
  [261,329,392,523].forEach((f,i)=>{
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g); g.connect(AC.destination);
    o.frequency.value=f;
    const t=AC.currentTime+i*0.1;
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(0.18,t+0.05);
    g.gain.exponentialRampToValueAtTime(0.001,t+0.2);
    o.start(t); o.stop(t+0.22);
  });
}
function playDamage() { resumeAC(); beep(160, 0.15, 0.25, 'sawtooth'); }
function playDash() {
  resumeAC();
  const o=AC.createOscillator(), g=AC.createGain();
  o.connect(g); g.connect(AC.destination);
  o.type='sine';
  o.frequency.setValueAtTime(1200, AC.currentTime);
  o.frequency.exponentialRampToValueAtTime(300, AC.currentTime+0.18);
  g.gain.setValueAtTime(0.22, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime+0.18);
  o.start(); o.stop(AC.currentTime+0.18);
}
function playOverload() {
  resumeAC();
  [261,330,392,523,660,880].forEach((f,i)=>{
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g); g.connect(AC.destination);
    o.frequency.value=f;
    const t=AC.currentTime+i*0.07;
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(0.2,t+0.04);
    g.gain.exponentialRampToValueAtTime(0.001,t+0.25);
    o.start(t); o.stop(t+0.27);
  });
  setTimeout(()=>{
    const buf=AC.createBuffer(1,AC.sampleRate*0.25,AC.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*(1-i/d.length)*0.8;
    const s=AC.createBufferSource(),g=AC.createGain(),f=AC.createBiquadFilter();
    f.type='lowpass'; f.frequency.value=600;
    s.buffer=buf; s.connect(f); f.connect(g); g.connect(AC.destination);
    g.gain.setValueAtTime(0.6,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.25);
    s.start();
  },420);
}

// ── Constants ──────────────────────────────────────────────────────
const S_TITLE=0, S_PLAY=1, S_OVER=2, S_CLEAR=3;

const POWERUPS = [
  {id:'laser_add',    name:'+1 レーザー',   desc:'レーザーの本数を1本追加（最大6本）'},
  {id:'laser_len',    name:'レーザー延長',   desc:'レーザーの長さ+40px'},
  {id:'speed_up',     name:'高速移動',       desc:'プレイヤーの移動速度+20%'},
  {id:'orb_range',    name:'オーブ引き寄せ', desc:'XPオーブの吸収範囲+30px'},
  {id:'chain_light',  name:'チェーン雷',     desc:'敵死亡時に周囲80px内に連鎖雷（最大3回）'},
  {id:'beam_widen',   name:'ビームウィドゥン',desc:'レーザーの幅+3px'},
  {id:'rot_speed',    name:'回転加速',       desc:'レーザーの回転速度+0.6rad/sec'},
  {id:'barrier',      name:'バリア',         desc:'3秒ごとに周囲に衝撃波バリア発生'},
];

const ETYPES = {
  seeker:  {r:10, hp:1, spd:0.8,  col:'#ff3333', score:100},
  shooter: {r:12, hp:2, spd:0.6,  col:'#ff8800', score:200},
  charger: {r:12, hp:1, spd:0.7,  col:'#aa44ff', score:150},
  splitter:{r:12, hp:2, spd:0.5,  col:'#44ff88', score:300},
  splitlet:{r:7,  hp:1, spd:0.75, col:'#44ff88', score:80},
};

// ── State ──────────────────────────────────────────────────────────
let gState = S_TITLE;
let player, enemies, bullets, xpOrbs, particles, lightnings, rings, lvRings;
let score, kills, gameTime, timeScale, lastTS;
let laserCD, flashT, spawnT, barrierT;
let eid = 0;
// PHASE DASH
let dashCD = 0;
// OVERLOAD
let overloadMeter = 0, overloadActive = false, overloadTimer = 0, overloadFlash = 0;
// Screen shake
let shakeT = 0, shakeMag = 0;
// Kill combo
let comboCount = 0, comboTimer = 0, comboPeak = 0;

function nid() { return ++eid; }

function initGame() {
  const W=canvas.width, H=canvas.height;
  player = {
    x:W/2, y:H/2, r:16,
    vx:0, vy:0, speed:3,
    hp:3, maxHp:3,
    invT:0,
    laserN:2, laserL:80, laserW:2, laserRS:1.8, laserA:0,
    orbR:60,
    chainLight:false, hasBarrier:false,
    trail:[],
    xp:0, level:1, xpNeed:10,
  };
  enemies=[]; bullets=[]; xpOrbs=[]; particles=[];
  lightnings=[]; rings=[]; lvRings=[];
  score=0; kills=0; gameTime=120; timeScale=1;
  lastTS=null; laserCD={}; flashT=0; spawnT=0; barrierT=0;
  eid=0; mouseTarget=null; Object.keys(keys).forEach(k=>delete keys[k]);
  dashCD=0; overloadMeter=0; overloadActive=false; overloadTimer=0; overloadFlash=0;
}

// ── Spawn ──────────────────────────────────────────────────────────
function spawnEnemy(type) {
  const W=canvas.width, H=canvas.height;
  let x,y;
  const side=Math.random()*4|0;
  if(side===0){x=Math.random()*W;y=-20;}
  else if(side===1){x=W+20;y=Math.random()*H;}
  else if(side===2){x=Math.random()*W;y=H+20;}
  else{x=-20;y=Math.random()*H;}
  const T=ETYPES[type];
  enemies.push({
    id:nid(), type, x, y, r:T.r, hp:T.hp, maxHp:T.hp,
    spd:T.spd, col:T.col, score:T.score,
    vx:0, vy:0,
    shootT:Math.random()*2, chargeT:Math.random()*3,
    chargeMode:false, chargeVx:0, chargeVy:0, chargeDur:0,
    wanderA:Math.random()*Math.PI*2,
  });
}

function trySpawn() {
  if(enemies.length>=200) return;
  const t=120-gameTime;
  let types;
  if(t<30)       types=['seeker','seeker','seeker','shooter'];
  else if(t<60)  types=['seeker','seeker','shooter','shooter'];
  else if(t<90)  types=['seeker','charger','charger','shooter','splitter'];
  else           types=['seeker','charger','shooter','splitter','splitter'];
  spawnEnemy(types[Math.random()*types.length|0]);
}

// ── Helpers ───────────────────────────────────────────────────────
function ptSegDSq(px,py,ax,ay,bx,by) {
  const dx=bx-ax,dy=by-ay,l=dx*dx+dy*dy;
  if(!l) return (px-ax)**2+(py-ay)**2;
  const t=Math.max(0,Math.min(1,((px-ax)*dx+(py-ay)*dy)/l));
  return (px-ax-t*dx)**2+(py-ay-t*dy)**2;
}
function addPart(x,y,col,n) {
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, s=1+Math.random()*3;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,decay:0.025+Math.random()*0.025,r:2+Math.random()*2,col});
  }
}
function addZap(x1,y1,x2,y2){ lightnings.push({x1,y1,x2,y2,life:0.3}); }

function chainZap(x,y,depth,excl) {
  if(depth<=0) return;
  for(const e of enemies){
    if(excl.includes(e.id)) continue;
    if((e.x-x)**2+(e.y-y)**2<6400 && Math.random()<0.2){
      addZap(x,y,e.x,e.y);
      addPart(e.x,e.y,'#ffff00',8);
      e.hp--;
      excl.push(e.id);
      if(e.hp<=0) killEnemy(e,true,false);
      chainZap(e.x,e.y,depth-1,excl);
      break;
    }
  }
}

function killEnemy(e,fromChain,isDash) {
  score+=e.score; kills++;
  overloadMeter = Math.min(100, overloadMeter + (isDash ? 12 : 8));
  // Kill combo
  comboCount++; comboTimer=2.0;
  if(comboCount>comboPeak) comboPeak=comboCount;
  playExplosion();
  addPart(e.x,e.y,e.col,16+(Math.random()*8|0));
  xpOrbs.push({x:e.x,y:e.y,r:5,life:1,val:Math.ceil(e.score/50)});
  if(!fromChain && player.chainLight) chainZap(e.x,e.y,3,[e.id]);
  if(e.type==='splitter'){
    for(let i=0;i<3;i++){
      const a=(i/3)*Math.PI*2;
      const T=ETYPES.splitlet;
      enemies.push({
        id:nid(),type:'splitlet',
        x:e.x+Math.cos(a)*16,y:e.y+Math.sin(a)*16,
        r:T.r,hp:1,maxHp:1,spd:T.spd,col:T.col,score:T.score,
        vx:0,vy:0,shootT:0,chargeT:0,chargeMode:false,
        chargeVx:0,chargeVy:0,chargeDur:0,wanderA:a,
      });
    }
  }
  const idx=enemies.indexOf(e);
  if(idx!==-1) enemies.splice(idx,1);
}

// ── Update ────────────────────────────────────────────────────────
function update(rawDt) {
  const dt=Math.min(rawDt,0.05)*timeScale;
  const W=canvas.width, H=canvas.height;

  gameTime-=dt;
  if(gameTime<=0){ gameTime=0; endGame(true); return; }

  // Spawn
  spawnT+=dt;
  const elapsed=120-gameTime;
  const interval=elapsed<30?1.0:elapsed<60?0.7:elapsed<90?0.5:0.3;
  if(spawnT>=interval){ trySpawn(); spawnT=0; }

  // Player
  player.trail.push({x:player.x,y:player.y});
  if(player.trail.length>15) player.trail.shift();

  const spd=player.speed*300; // px/sec
  // キーボード入力
  let kx=0, ky=0;
  if(keys['ArrowLeft']||keys['a']||keys['A']) kx-=1;
  if(keys['ArrowRight']||keys['d']||keys['D']) kx+=1;
  if(keys['ArrowUp']||keys['w']||keys['W']) ky-=1;
  if(keys['ArrowDown']||keys['s']||keys['S']) ky+=1;
  if(kx!==0||ky!==0){
    const km=Math.sqrt(kx*kx+ky*ky);
    player.x+=kx/km*spd*dt;
    player.y+=ky/km*spd*dt;
  } else if(mouseTarget){
    // マウス: カーソル位置へ直接追従
    const mdx=mouseTarget.x-player.x, mdy=mouseTarget.y-player.y;
    const md=Math.sqrt(mdx*mdx+mdy*mdy);
    if(md>1){
      const move=Math.min(md, spd*dt);
      player.x+=mdx/md*move;
      player.y+=mdy/md*move;
    }
  } else {
    // タッチドラッグ（相対移動）
    const mag=Math.sqrt(player.vx*player.vx+player.vy*player.vy);
    if(mag>0){
      const sc=Math.min(mag,spd*dt)/mag;
      player.x+=player.vx*sc;
      player.y+=player.vy*sc;
    }
  }
  player.x=Math.max(player.r,Math.min(W-player.r,player.x));
  player.y=Math.max(player.r,Math.min(H-player.r,player.y));
  player.laserA+=player.laserRS*dt;
  if(player.invT>0) player.invT-=dt;

  // Barrier
  if(player.hasBarrier){
    barrierT-=dt;
    if(barrierT<=0){
      barrierT=3;
      rings.push({x:player.x,y:player.y,r:20,life:1});
      for(let i=enemies.length-1;i>=0;i--){
        const e=enemies[i];
        if((e.x-player.x)**2+(e.y-player.y)**2<3600){
          e.hp--; addPart(e.x,e.y,'#00ffff',6);
          if(e.hp<=0) killEnemy(e,false,false);
        }
      }
    }
  }

  // Enemies
  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];
    const dx=player.x-e.x, dy=player.y-e.y;
    const dist=Math.sqrt(dx*dx+dy*dy)||1;
    const nx=dx/dist, ny=dy/dist;

    if(e.type==='seeker'||e.type==='splitlet'){
      e.x+=nx*e.spd*60*dt; e.y+=ny*e.spd*60*dt;
    } else if(e.type==='shooter'){
      if(dist>150){ e.x+=nx*e.spd*60*dt; e.y+=ny*e.spd*60*dt; }
      else if(dist<100){ e.x-=nx*e.spd*60*dt; e.y-=ny*e.spd*60*dt; }
      e.shootT-=dt;
      if(e.shootT<=0){
        e.shootT=2;
        bullets.push({x:e.x,y:e.y,vx:nx*3,vy:ny*3,r:5,life:1});
      }
    } else if(e.type==='charger'){
      if(e.chargeMode){
        e.x+=e.chargeVx*dt; e.y+=e.chargeVy*dt;
        e.chargeDur-=dt;
        if(e.chargeDur<=0){ e.chargeMode=false; e.chargeT=3; }
      } else {
        e.wanderA+=(Math.random()-0.5)*0.4;
        e.x+=Math.cos(e.wanderA)*e.spd*60*dt;
        e.y+=Math.sin(e.wanderA)*e.spd*60*dt;
        e.chargeT-=dt;
        if(e.chargeT<=0){
          e.chargeMode=true;
          e.chargeVx=nx*e.spd*8*60; e.chargeVy=ny*e.spd*8*60;
          e.chargeDur=0.25;
        }
      }
    } else if(e.type==='splitter'){
      e.x+=nx*e.spd*60*dt; e.y+=ny*e.spd*60*dt;
    }
    e.x=Math.max(-30,Math.min(W+30,e.x));
    e.y=Math.max(-30,Math.min(H+30,e.y));
  }

  // Laser hits
  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];
    if((laserCD[e.id]||0)>0){ laserCD[e.id]-=dt; continue; }
    for(let li=0;li<player.laserN;li++){
      const ang=player.laserA+(li/player.laserN)*Math.PI*2;
      const lx2=player.x+Math.cos(ang)*player.laserL;
      const ly2=player.y+Math.sin(ang)*player.laserL;
      const hr=e.r+player.laserW;
      if(ptSegDSq(e.x,e.y,player.x,player.y,lx2,ly2)<=hr*hr){
        e.hp--;
        laserCD[e.id]=0.15;
        playLaserHit();
        addPart(e.x,e.y,e.col,6);
        if(e.hp<=0) killEnemy(e,false,false);
        break;
      }
    }
  }

  // Player-enemy collision
  if(player.invT<=0){
    for(const e of enemies){
      if((player.x-e.x)**2+(player.y-e.y)**2<(player.r+e.r)**2){
        player.hp--; player.invT=1.5; flashT=0.15; playDamage();
        if(player.hp<=0){ endGame(false); return; }
        break;
      }
    }
  }

  // Bullets
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];
    b.x+=b.vx*60*dt; b.y+=b.vy*60*dt; b.life-=dt*0.5;
    if(b.x<-20||b.x>W+20||b.y<-20||b.y>H+20||b.life<=0){ bullets.splice(i,1); continue; }
    if(player.invT<=0 && (player.x-b.x)**2+(player.y-b.y)**2<(player.r+b.r)**2){
      bullets.splice(i,1);
      player.hp--; player.invT=1.5; flashT=0.15; playDamage();
      if(player.hp<=0){ endGame(false); return; }
    }
  }

  // XP orbs
  for(let i=xpOrbs.length-1;i>=0;i--){
    const o=xpOrbs[i];
    o.life-=dt*0.15;
    const dx=player.x-o.x, dy=player.y-o.y;
    const d=Math.sqrt(dx*dx+dy*dy)||1;
    if(d<player.orbR){
      o.x+=(dx/d)*5*60*dt; o.y+=(dy/d)*5*60*dt;
      if(Math.sqrt((player.x-o.x)**2+(player.y-o.y)**2)<player.r+5){
        player.xp+=o.val; xpOrbs.splice(i,1);
        if(player.xp>=player.xpNeed){
          player.xp-=player.xpNeed;
          player.level++;
          player.xpNeed=Math.ceil(player.xpNeed*1.3);
          lvRings.push({x:player.x,y:player.y,r:0,life:1});
          showLevelUp();
        }
        continue;
      }
    }
    if(o.life<=0) xpOrbs.splice(i,1);
  }

  // Particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx*60*dt; p.y+=p.vy*60*dt;
    p.vx*=0.92; p.vy*=0.92;
    p.life-=p.decay*60*dt;
    if(p.life<=0) particles.splice(i,1);
  }

  // Lightnings
  for(let i=lightnings.length-1;i>=0;i--){
    lightnings[i].life-=dt;
    if(lightnings[i].life<=0) lightnings.splice(i,1);
  }

  // Rings
  for(let i=rings.length-1;i>=0;i--){
    rings[i].r+=130*dt; rings[i].life-=dt*2;
    if(rings[i].life<=0) rings.splice(i,1);
  }
  for(let i=lvRings.length-1;i>=0;i--){
    lvRings[i].r+=200*dt; lvRings[i].life-=dt*1.5;
    if(lvRings[i].life<=0) lvRings.splice(i,1);
  }

  if(flashT>0) flashT-=dt;
  if(shakeT>0) shakeT-=dt;

  // Kill combo タイマー
  if(comboTimer>0){ comboTimer-=dt; if(comboTimer<=0){ comboCount=0; comboPeak=0; } }

  // PHASE DASH クールダウン
  if(dashCD>0) dashCD-=dt;

  // OVERLOAD 自然減少（ゆっくり）
  if(!overloadActive) overloadMeter = Math.max(0, overloadMeter - 0.5*dt);

  // OVERLOAD タイマー
  if(overloadActive){
    overloadTimer-=dt;
    if(overloadTimer<=0){ overloadActive=false; overloadTimer=0; }
    // 触れた敵は即死
    for(let i=enemies.length-1;i>=0;i--){
      const e=enemies[i];
      if(laserCD[e.id]>0) continue;
      for(let li=0;li<player.laserN;li++){
        const ang=player.laserA+(li/player.laserN)*Math.PI*2;
        const lx2=player.x+Math.cos(ang)*(W*0.7);
        const ly2=player.y+Math.sin(ang)*(W*0.7);
        const hr=e.r+player.laserW;
        if(ptSegDSq(e.x,e.y,player.x,player.y,lx2,ly2)<=hr*hr){
          laserCD[e.id]=0.15;
          killEnemy(e,false,false);
          break;
        }
      }
    }
  }

  // OVERLOAD フラッシュ
  if(overloadFlash>0) overloadFlash-=dt;

  // OVERLOAD発動キー (SPACE)
  if(keys[' '] && !keys['_overloadUsed'] && overloadMeter>=100 && !overloadActive){
    keys['_overloadUsed']=true;
    overloadActive=true; overloadTimer=2.5; overloadMeter=0; overloadFlash=0.25;
    shakeT=0.4; shakeMag=12;
    playOverload();
  }
  if(!keys[' ']) keys['_overloadUsed']=false;
}

// ── Level Up UI ───────────────────────────────────────────────────
function showLevelUp() {
  timeScale=0; playLevelUp(); // 完全停止
  // HP1回復（最大HPまで）
  player.hp=Math.min(player.maxHp, player.hp+1);
  const picks=[...POWERUPS].sort(()=>Math.random()-0.5).slice(0,3);
  choicesDiv.innerHTML='';
  picks.forEach(pu=>{
    const btn=document.createElement('button');
    btn.className='choice-btn';
    btn.innerHTML=`<div class="name">${pu.name}</div><div class="desc">${pu.desc}</div>`;
    btn.onclick=()=>{ applyPU(pu.id); levelupDiv.style.display='none'; timeScale=1; lastTS=null; };
    choicesDiv.appendChild(btn);
  });
  levelupDiv.style.display='flex';
}
function applyPU(id){
  if(id==='laser_add')   player.laserN=Math.min(6,player.laserN+1);
  else if(id==='laser_len')   player.laserL+=40;
  else if(id==='speed_up')    player.speed*=1.2;
  else if(id==='orb_range')   player.orbR+=30;
  else if(id==='chain_light') player.chainLight=true;
  else if(id==='beam_widen')  player.laserW+=3;
  else if(id==='rot_speed')   player.laserRS+=0.6;
  else if(id==='barrier'){    player.hasBarrier=true; barrierT=3; }
}

function endGame(win) {
  gState=win?S_CLEAR:S_OVER;

// ── Input ─────────────────────────────────────────────────────────
let dragging=false, dLastX=0, dLastY=0;
let mouseTarget=null; // マウス追従用
const keys={}; // キーボード状態
let touchStartX=0, touchStartY=0;
window.addEventListener('keydown',e=>{ keys[e.key]=true; });
window.addEventListener('keyup',e=>{ keys[e.key]=false; });

function doPhaseDash(tx, ty) {
  if(gState!==S_PLAY || dashCD>0) return;
  resumeAC();
  const dx=tx-player.x, dy=ty-player.y;
  const dist=Math.sqrt(dx*dx+dy*dy)||1;
  const maxDash=200;
  const moveDist=Math.min(dist, maxDash);
  const nx=dx/dist, ny=dy/dist;
  const oldX=player.x, oldY=player.y;
  const W=canvas.width, H=canvas.height;
  const newX=Math.max(player.r, Math.min(W-player.r, player.x+nx*moveDist));
  const newY=Math.max(player.r, Math.min(H-player.r, player.y+ny*moveDist));
  // 軌跡上の敵を撃破
  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];
    if(ptSegDSq(e.x,e.y,oldX,oldY,newX,newY)<=(e.r+4)**2){
      killEnemy(e,false,true);
    }
  }
  // 電撃トレイル
  for(let t=0;t<=1;t+=0.2){
    player.trail.push({x:oldX+nx*moveDist*t, y:oldY+ny*moveDist*t});
  }
  addZap(oldX,oldY,newX,newY);
  // Burst particles at destination
  for(let i=0;i<18;i++){
    const a=Math.random()*Math.PI*2, s=2+Math.random()*5;
    particles.push({x:newX,y:newY,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,decay:0.02+Math.random()*0.03,r:2+Math.random()*3,col:'#00ffff'});
  }
  // Shake on dash kill
  shakeT=0.12; shakeMag=4;
  player.x=newX; player.y=newY;
  dashCD=2.5;
  playDash();
}
function getPos(e){
  const rect=canvas.getBoundingClientRect();
  const sx=canvas.width/rect.width, sy=canvas.height/rect.height;
  if(e.touches) return{x:(e.touches[0].clientX-rect.left)*sx,y:(e.touches[0].clientY-rect.top)*sy};
  return{x:(e.clientX-rect.left)*sx,y:(e.clientY-rect.top)*sy};
}
// マウス: カーソル位置を追従（クリック不要、常に追従）
canvas.addEventListener('mousemove',e=>{ mouseTarget=getPos(e); resumeAC(); });
canvas.addEventListener('mouseleave',()=>{ mouseTarget=null; });
canvas.addEventListener('mousedown',e=>{ resumeAC(); if(e.button===0){ const p=getPos(e); doPhaseDash(p.x,p.y); } if(e.button===2 && overloadMeter>=100 && !overloadActive && gState===S_PLAY){ overloadActive=true; overloadTimer=2.5; overloadMeter=0; overloadFlash=0.25; shakeT=0.4; shakeMag=12; playOverload(); } });
canvas.addEventListener('contextmenu',e=>{ e.preventDefault(); });
canvas.addEventListener('touchstart',e=>{ e.preventDefault(); mouseTarget=null; const p=getPos(e); dragging=true; dLastX=p.x; dLastY=p.y; touchStartX=p.x; touchStartY=p.y; resumeAC(); },{passive:false});
canvas.addEventListener('touchmove',e=>{ e.preventDefault(); if(!dragging)return; const p=getPos(e); if(gState===S_PLAY){ player.vx=p.x-dLastX; player.vy=p.y-dLastY; } dLastX=p.x; dLastY=p.y; },{passive:false});
canvas.addEventListener('touchend',e=>{ e.preventDefault(); dragging=false; if(gState===S_PLAY){ player.vx=0; player.vy=0; const dx=dLastX-touchStartX,dy=dLastY-touchStartY; if(dx*dx+dy*dy<400) doPhaseDash(touchStartX,touchStartY); } },{passive:false});

canvas.addEventListener('click',e=>{
  const p=getPos(e);
  const W=canvas.width, H=canvas.height;
  if(gState===S_TITLE){ startGame(false); return; }
  if(gState===S_OVER||gState===S_CLEAR){
    const bw=W*0.6,bh=54,bx=W/2-W*0.3,by=H*0.68;
    if(p.x>=bx&&p.x<=bx+bw&&p.y>=by&&p.y<=by+bh) startGame();
  }
});

function startGame(){ initGame(); gState=S_PLAY; lastTS=null; requestAnimationFrame(loop); }

// ── Draw helpers ──────────────────────────────────────────────────
function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function drawGrid(W,H){
  ctx.strokeStyle='#111'; ctx.lineWidth=1; ctx.shadowBlur=0;
  for(let x=0;x<W;x+=40){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for(let y=0;y<H;y+=40){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
}

let demoEs=[];

  ctx.fillStyle='#00ffff'; ctx.shadowBlur=8; ctx.shadowColor='#00aaff';
  ctx.fillText('クリック/タップ : PHASE DASH（瞬間移動で敵を一掃）',W/2,H*0.41);
  ctx.fillStyle='#ffaa00'; ctx.shadowBlur=8; ctx.shadowColor='#ff6600';
  ctx.fillText('SPACE/右クリック : OVERLOAD（メーター満タン時に全画面爆発）',W/2,H*0.455);
  ctx.shadowBlur=0;
  ctx.fillStyle='#aabbcc';

  const hs=parseInt(localStorage.getItem('neonswarm_hs')||'0');

  ctx.fillText('TAP TO START',W/2,by+34);

// ── Game Draw ─────────────────────────────────────────────────────
function drawGame(W,H){
  ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
  drawGrid(W,H);

  // Level-up rings
  for(const r of lvRings){
    ctx.globalAlpha=r.life*0.5; ctx.strokeStyle='#ffff00';
    ctx.shadowBlur=20; ctx.shadowColor='#ffff00';
    ctx.lineWidth=3; ctx.beginPath(); ctx.arc(r.x,r.y,r.r,0,Math.PI*2); ctx.stroke();
  }
  ctx.globalAlpha=1; ctx.shadowBlur=0;

  // Barrier rings
  for(const r of rings){
    ctx.globalAlpha=r.life; ctx.strokeStyle='#00ffff';
    ctx.shadowBlur=10; ctx.shadowColor='#00ffff';
    ctx.lineWidth=2; ctx.beginPath(); ctx.arc(r.x,r.y,r.r,0,Math.PI*2); ctx.stroke();
  }
  ctx.globalAlpha=1; ctx.shadowBlur=0;

  // XP orbs
  ctx.shadowBlur=8; ctx.shadowColor='#ffff44'; ctx.fillStyle='#ffff88';
  for(const o of xpOrbs){
    ctx.globalAlpha=Math.min(1,o.life*2);
    ctx.beginPath(); ctx.arc(o.x,o.y,o.r,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1; ctx.shadowBlur=0;

  // Bullets
  ctx.shadowBlur=8; ctx.shadowColor='#ff8800'; ctx.fillStyle='#ffaa44';
  for(const b of bullets){
    ctx.globalAlpha=b.life;
    ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1; ctx.shadowBlur=0;

  // Particles
  for(const p of particles){
    ctx.globalAlpha=p.life; ctx.shadowBlur=6; ctx.shadowColor=p.col; ctx.fillStyle=p.col;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1; ctx.shadowBlur=0;

  // Enemies
  for(const e of enemies){
    ctx.shadowBlur=10; ctx.shadowColor=e.col; ctx.fillStyle=e.col;
    ctx.beginPath(); ctx.arc(e.x,e.y,e.r,0,Math.PI*2); ctx.fill();
    if(e.maxHp>1){
      ctx.shadowBlur=0;
      ctx.fillStyle='#333'; ctx.fillRect(e.x-e.r,e.y-e.r-6,e.r*2,3);
      ctx.fillStyle=e.col; ctx.fillRect(e.x-e.r,e.y-e.r-6,e.r*2*(e.hp/e.maxHp),3);
    }
    if(e.type==='charger'&&!e.chargeMode){
      const f=1-e.chargeT/3;
      ctx.strokeStyle=`rgba(180,100,255,${f})`; ctx.lineWidth=2;
      ctx.shadowBlur=5; ctx.shadowColor='#aa44ff';
      ctx.beginPath(); ctx.arc(e.x,e.y,e.r+4,-Math.PI/2,-Math.PI/2+Math.PI*2*f); ctx.stroke();
    }
  }
  ctx.shadowBlur=0;

  // Lightnings
  for(const l of lightnings){
    ctx.globalAlpha=l.life/0.3; ctx.strokeStyle='#ffffff';
    ctx.shadowBlur=10; ctx.shadowColor='#ffff44'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(l.x1,l.y1);
    for(let s=1;s<6;s++){
      const t=s/6;
      ctx.lineTo(l.x1+(l.x2-l.x1)*t+(Math.random()-0.5)*20,l.y1+(l.y2-l.y1)*t+(Math.random()-0.5)*20);
    }
    ctx.lineTo(l.x2,l.y2); ctx.stroke();
  }
  ctx.globalAlpha=1; ctx.shadowBlur=0;

  // Player trail
  for(let i=0;i<player.trail.length;i++){
    const t=player.trail[i], a=(i/player.trail.length)*0.35;
    ctx.globalAlpha=a; ctx.fillStyle='#00ffff';
    ctx.shadowBlur=8; ctx.shadowColor='#00ffff';
    ctx.beginPath(); ctx.arc(t.x,t.y,player.r*0.55*(i/player.trail.length),0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1; ctx.shadowBlur=0;

  // Lasers
  for(let li=0;li<player.laserN;li++){
    const ang=player.laserA+(li/player.laserN)*Math.PI*2;
    const laserLen = overloadActive ? W*0.7 : player.laserL;
    const laserCol = overloadActive ? '#ffdd00' : '#88ccff';
    const laserGlow = overloadActive ? '#ffaa00' : '#4488ff';
    ctx.shadowBlur=overloadActive?30:15; ctx.shadowColor=laserGlow;
    ctx.strokeStyle=laserCol; ctx.lineWidth=overloadActive?player.laserW+2:player.laserW;
    ctx.beginPath();
    ctx.moveTo(player.x,player.y);
    ctx.lineTo(player.x+Math.cos(ang)*laserLen,player.y+Math.sin(ang)*laserLen);
    ctx.stroke();
  }
  ctx.shadowBlur=0;

  // Player body
  const blink=player.invT>0&&Math.floor(player.invT*10)%2===0;
  if(!blink){
    ctx.shadowBlur=20; ctx.shadowColor='#00ffff';
    ctx.fillStyle='#ffffff';
    ctx.beginPath(); ctx.arc(player.x,player.y,player.r,0,Math.PI*2); ctx.fill();
    const gr=ctx.createRadialGradient(player.x,player.y,0,player.x,player.y,player.r);
    gr.addColorStop(0,'rgba(0,255,255,0.7)'); gr.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=gr;
    ctx.beginPath(); ctx.arc(player.x,player.y,player.r,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
  }

  // DASH ready ring (点滅シアンリング)
  if(dashCD<=0 && gState===S_PLAY){
    const pulse=0.3+0.25*Math.sin(Date.now()*0.008);
    ctx.globalAlpha=pulse; ctx.strokeStyle='#00ffff';
    ctx.shadowBlur=12; ctx.shadowColor='#00ffff';
    ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(player.x,player.y,player.r+10,0,Math.PI*2); ctx.stroke();
    ctx.globalAlpha=1; ctx.shadowBlur=0;
  }

  // Barrier ring indicator
  if(player.hasBarrier){
    const f=1-barrierT/3;
    ctx.strokeStyle=`rgba(0,255,255,${0.2+f*0.35})`; ctx.lineWidth=1.5;
    ctx.shadowBlur=5; ctx.shadowColor='#00ffff';
    ctx.beginPath(); ctx.arc(player.x,player.y,player.r+22,0,Math.PI*2*f); ctx.stroke();
    ctx.shadowBlur=0;
  }

  // ── HUD (2行構成) ──────────────────────────────────────────────
  ctx.fillStyle='rgba(0,0,0,0.6)';
  ctx.fillRect(0,0,W,54);

  // --- 行1: Lv+XPバー | タイマー | スコア ---
  // 左: Lv + XPバー
  ctx.textAlign='left'; ctx.font='bold 15px monospace';
  ctx.fillStyle='#88aaff'; ctx.shadowBlur=5; ctx.shadowColor='#4466ff';
  ctx.fillText(`Lv.${player.level}`,10,16); ctx.shadowBlur=0;
  const bW=Math.min(130,W*0.16);
  ctx.fillStyle='#222244'; ctx.fillRect(10,20,bW,6);
  ctx.fillStyle='#4466ff'; ctx.shadowBlur=4; ctx.shadowColor='#4466ff';
  ctx.fillRect(10,20,bW*Math.min(1,player.xp/player.xpNeed),6); ctx.shadowBlur=0;
  ctx.strokeStyle='#334466'; ctx.lineWidth=1; ctx.strokeRect(10,20,bW,6);

  // 中央: タイマー
  const ts=Math.ceil(gameTime);
  ctx.font=`bold 28px monospace`; ctx.textAlign='center';
  ctx.fillStyle=ts<=10?'#ff4444':'#ffffff';
  ctx.shadowBlur=10; ctx.shadowColor=ts<=10?'#ff0000':'#aaaaff';
  ctx.fillText(ts+'s',W/2,28); ctx.shadowBlur=0;

  // 右: スコア
  ctx.textAlign='right'; ctx.font='bold 15px monospace';
  ctx.fillStyle='#ffff88'; ctx.shadowBlur=5; ctx.shadowColor='#ffff00';
  ctx.fillText(score.toLocaleString(),W-10,18); ctx.shadowBlur=0;

  // --- 行2: DASHゲージ | 中央(空) | OVERLOADバー + HP ---
  const gaugeY=32, gaugeH=8;
  const sideW=Math.min(200, W*0.26);

  // 左: DASHゲージ
  const dashReady=dashCD<=0;
  ctx.fillStyle='#112233'; ctx.fillRect(10,gaugeY,sideW,gaugeH);
  const dashPct=dashReady?1:Math.max(0,(2.5-dashCD)/2.5);
  ctx.fillStyle=dashReady?'#00ffff':'#224455';
  ctx.shadowBlur=dashReady?8:0; ctx.shadowColor='#00ffff';
  ctx.fillRect(10,gaugeY,sideW*dashPct,gaugeH); ctx.shadowBlur=0;
  ctx.strokeStyle='#224455'; ctx.lineWidth=1; ctx.strokeRect(10,gaugeY,sideW,gaugeH);
  ctx.font=`9px monospace`; ctx.textAlign='left';
  ctx.fillStyle=dashReady?'#00ffff':'#336677';
  ctx.fillText(dashReady?'DASH READY':'DASH',10,gaugeY+gaugeH+9);

  // 右: OVERLOADバー + HP
  const obW=Math.min(160, W*0.22);
  const obX=W-10-obW;
  const pct=overloadMeter/100;
  ctx.fillStyle='#221100'; ctx.fillRect(obX,gaugeY,obW,gaugeH);
  const rr=255, gg=Math.floor((1-pct)*100);
  ctx.fillStyle=`rgb(${rr},${gg},0)`;
  ctx.shadowBlur=overloadMeter>=100?10:0; ctx.shadowColor='#ff6600';
  ctx.fillRect(obX,gaugeY,obW*pct,gaugeH); ctx.shadowBlur=0;
  ctx.strokeStyle='#442200'; ctx.lineWidth=1; ctx.strokeRect(obX,gaugeY,obW,gaugeH);

  // OVERLOAD ラベル (右揃え)
  if(overloadMeter>=100 && !overloadActive){
    const blinkOL=Math.floor(Date.now()/350)%2===0;
    ctx.font=`bold 9px monospace`; ctx.textAlign='right';
    ctx.fillStyle=blinkOL?'#ff8800':'#ff4400';
    ctx.shadowBlur=6; ctx.shadowColor='#ff4400';
    ctx.fillText('OVERLOAD! [SPC/RC]',W-10,gaugeY+gaugeH+9); ctx.shadowBlur=0;
  } else {
    ctx.font=`9px monospace`; ctx.textAlign='right';
    ctx.fillStyle=overloadActive?'#ffdd00':'#664400';
    ctx.fillText('OVERLOAD',W-10,gaugeY+gaugeH+9);
  }

  // HP (OVERLOADバーの上に表示)
  ctx.font='14px serif'; ctx.textAlign='right';
  ctx.fillStyle='#ff4444'; ctx.shadowBlur=5; ctx.shadowColor='#ff0000';
  let hp=''; for(let i=0;i<player.maxHp;i++) hp+=i<player.hp?'♥':'♡';
  ctx.fillText(hp,W-10,gaugeY-2); ctx.shadowBlur=0;

  // Kill combo display
  if(comboCount>=3 && comboTimer>0){
    const fade=Math.min(1,comboTimer*2);
    ctx.globalAlpha=fade;
    ctx.textAlign='center';
    const cfs=Math.min(W*0.08,56);
    ctx.font=`bold ${cfs}px monospace`;
    let comboCol='#ffff44', comboGlow='#ffaa00';
    if(comboCount>=10){ comboCol='#ff44ff'; comboGlow='#ff00ff'; }
    else if(comboCount>=5){ comboCol='#ff8800'; comboGlow='#ff4400'; }
    ctx.shadowBlur=30; ctx.shadowColor=comboGlow;
    ctx.fillStyle=comboCol;
    ctx.fillText(`${comboCount} COMBO!`, W/2, H*0.75);
    ctx.shadowBlur=0; ctx.globalAlpha=1;
  }

  // OVERLOAD flash
  if(overloadFlash>0){ ctx.globalAlpha=overloadFlash/0.25*0.5; ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,W,H); ctx.globalAlpha=1; }

  // Damage flash
  if(flashT>0){ ctx.globalAlpha=flashT/0.15*0.38; ctx.fillStyle='#ff0000'; ctx.fillRect(0,0,W,H); ctx.globalAlpha=1; }

  // OVERLOAD発動中の大テキスト
  if(overloadActive){
    const blinkOA=Math.floor(Date.now()/400)%2===0;
    if(blinkOA){
      ctx.font=`bold ${Math.floor(W*0.07)}px monospace`;
      ctx.textAlign='center';
      ctx.fillStyle='#ffdd00'; ctx.shadowBlur=30; ctx.shadowColor='#ff8800';
      ctx.fillText('⚡OVERLOAD⚡',W/2,H*0.14); ctx.shadowBlur=0;
    }
  }
}

function drawEnd(win,W,H){
  ctx.fillStyle='rgba(0,0,0,0.82)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.font=`bold ${Math.min(W*0.1,40)}px monospace`;
  ctx.fillStyle=win?'#ffff44':'#ff4444';
  ctx.shadowBlur=20; ctx.shadowColor=win?'#ffff00':'#ff0000';
  ctx.fillText(win?'CLEAR!':'GAME OVER',W/2,H*0.22); ctx.shadowBlur=0;

  const lfs=Math.floor(W*0.045);
  ctx.font=`${lfs}px monospace`; ctx.fillStyle='#ccddff';
  ctx.fillText(`スコア: ${score.toLocaleString()}`,W/2,H*0.35);
  ctx.fillText(`レベル: ${player.level}`,W/2,H*0.42);
  ctx.fillText(`撃破数: ${kills}`,W/2,H*0.49);

  const hs=parseInt(localStorage.getItem('neonswarm_hs')||'0');
  if(score>0&&score>=hs){
    ctx.font=`bold ${Math.floor(W*0.055)}px monospace`;
    ctx.fillStyle='#ffd700'; ctx.shadowBlur=20; ctx.shadowColor='#ffd700';
    ctx.fillText('NEW RECORD!',W/2,H*0.57); ctx.shadowBlur=0;
  } else if(hs>0){
    ctx.font=`${lfs}px monospace`; ctx.fillStyle='#777';
    ctx.fillText(`BEST: ${hs.toLocaleString()}`,W/2,H*0.57);
  }

  const bw=W*0.6,bh=54,bx=W/2-W*0.3,by=H*0.68;
  ctx.fillStyle='rgba(20,0,40,0.92)'; ctx.strokeStyle=win?'#ffff44':'#ff4444';
  ctx.lineWidth=2; ctx.shadowBlur=12; ctx.shadowColor=win?'#ffff44':'#ff4444';
  roundRect(bx,by,bw,bh,8); ctx.fill(); ctx.stroke(); ctx.shadowBlur=0;
  ctx.font=`bold ${Math.floor(W*0.052)}px monospace`; ctx.fillStyle='#ffffff';
  ctx.fillText('もう一度',W/2,by+36);
}

// ── Main Loop ─────────────────────────────────────────────────────
function loop(ts) {
  const W=canvas.width, H=canvas.height;
  if(!lastTS) lastTS=ts;
  const rawDt=(ts-lastTS)/1000;
  lastTS=ts;

  if(gState===S_PLAY && timeScale>0) update(rawDt);

  // Screen shake
  ctx.save();
  if(shakeT>0){
    const sx=(Math.random()-0.5)*shakeMag*(shakeT/0.4);
    const sy=(Math.random()-0.5)*shakeMag*(shakeT/0.4);
    ctx.translate(sx,sy);
  }

  if(gState===S_PLAY||gState===S_OVER||gState===S_CLEAR) drawGame(W,H);
  if(gState===S_OVER||gState===S_CLEAR) drawEnd(gState===S_CLEAR,W,H);
  ctx.restore();

  if(gState===S_PLAY||gState===S_OVER||gState===S_CLEAR) requestAnimationFrame(loop);
}

// Title loop
function titleLoop(ts){
  if(gState!==S_TITLE) return;
  const W=canvas.width, H=canvas.height;
  if(W&&H) drawTitle(W,H);
  requestAnimationFrame(titleLoop);
}

// Init
initDemo();
requestAnimationFrame(()=>{ requestAnimationFrame(()=>{ gState=S_TITLE; titleLoop(); }); });
</script>
