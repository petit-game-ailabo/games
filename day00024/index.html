<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>⚡ NEON SWARM</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000}
body{display:flex;justify-content:center;align-items:flex-start;overflow:hidden}

canvas{display:block;width:100%;height:100%;touch-action:none}
/* Skill Tree overlay */

#st-coins{color:#ffdd44;font:bold 15px monospace}

#st-canvas{position:relative;/* size set by JS */}
/* Node cards */
.st-node{position:absolute;width:108px;height:62px;border-radius:7px;border:1px solid #1a3550;background:rgba(5,12,25,0.95);padding:7px 8px;cursor:default;user-select:none;transition:border-color 0.1s,box-shadow 0.1s}
.st-node .sn-name{font:bold 11px monospace;color:#8899aa;line-height:1.2;margin-bottom:2px}

.st-node.sn-bought{border-color:#1a5533;background:rgba(0,18,12,0.95)}
.st-node.sn-bought .sn-name{color:#44cc88}
.st-node.sn-bought .sn-cost{color:#44cc88}

.st-sec-hdr{position:absolute;font:bold 11px monospace;color:#334455;letter-spacing:1px}

<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="skilltree">
    <div id="st-hdr">
      <div id="st-hdr-top">
        <div id="st-title">⚡ SKILL TREE</div>
        <div id="st-coins">🪙 0</div>
      </div>
      <div id="st-hint">ノードをタップして強化。上流スキルが必要です。</div>
    </div>
    <div id="st-wrap"><div id="st-canvas"></div></div>
    <div id="st-footer"><button id="st-start">▶ 次のラウンドへ</button></div>
  </div>
</div>
<script>
'use strict';
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const wrap=document.getElementById('wrap');
function syncSize(){const w=canvas.offsetWidth,h=canvas.offsetHeight;if(w>0&&h>0){canvas.width=w;canvas.height=h;}}
const ro=new ResizeObserver(syncSize);ro.observe(canvas);
setTimeout(syncSize,0);setTimeout(syncSize,100);

// ── Audio ──────────────────────────────────────────────────────────
const AC=new(window.AudioContext||window.webkitAudioContext)();
function resumeAC(){if(AC.state==='suspended')AC.resume();}
function beep(f,d,v,t){const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type=t||'sine';o.frequency.value=f;g.gain.setValueAtTime(v||0.12,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+d);o.start();o.stop(AC.currentTime+d);}
function playCoin(){resumeAC();beep(700+Math.random()*300,0.04,0.06,'sine');}
function playKill(){resumeAC();const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type='square';o.frequency.setValueAtTime(220,AC.currentTime);o.frequency.exponentialRampToValueAtTime(70,AC.currentTime+0.08);g.gain.setValueAtTime(0.08,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.08);o.start();o.stop(AC.currentTime+0.08);}
function playLevelUp(){resumeAC();[523,659,784,1047].forEach((f,i)=>{const t=AC.currentTime+i*0.08,o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.frequency.value=f;g.gain.setValueAtTime(0.12,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.12);o.start(t);o.stop(t+0.14);});}
function playDash(){resumeAC();const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type='sawtooth';o.frequency.setValueAtTime(440,AC.currentTime);o.frequency.exponentialRampToValueAtTime(130,AC.currentTime+0.13);g.gain.setValueAtTime(0.09,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.13);o.start();o.stop(AC.currentTime+0.13);}

// ── Skill Tree Definition ──────────────────────────────────────────
// Single unified tree. One root, branching into 4 paths, converging at coins.
// Total cost ~300 coins ≈ 1h play (60 rounds × ~5 avg coins/round)
// Layout: 5 columns (col 0-4), 8 rows. NW=108, NH=62, CX=116, RY=86
const NW=108,NH=62,CX=116,RY=86;
// col x positions
const C0=0,C1=CX,C2=CX*2,C3=CX*3,C4=CX*4;
// row y positions
const R0=0,R1=RY,R2=RY*2,R3=RY*3,R4=RY*4,R5=RY*5,R6=RY*6,R7=RY*7;

/*
Tree shape (col,row):
                   [core]
                 (col2,R0)
         /        /     \       \
      [wrot]  [wlen]   [t1]    [e1]
     (0,R1)  (1,R1)  (3,R1)  (4,R1)
     /    \     \      |      /   \
  [wl2] [wwid][wlen2] [t2]  [e2] [ebst]
  (0,R2)(1,R2)(2,R2) (3,R2)(4,R2)(3,R2)→conflict
→ ebst at (4,R2), e2 at (3,R2)? No, t2 is at (3,R2)...
→ Put t2 at (2,R2) and wlen2 at (1,R2), e2 at (4,R2), ebst at (4,R3)
*/

const TREE_NODES=[
  // Root
  {id:'core', x:C2,  y:R0, name:'+1 レーザー',  desc:'レーザー本数+1 射程+40px', cost:5,  parent:null},

  // Row 1 — 4 branches from root
  {id:'wrot', x:C0,  y:R1, name:'回転加速',      desc:'回転速度+0.4rad/s',       cost:5,  parent:'core'},
  {id:'wlen', x:C1,  y:R1, name:'レーザー延長',  desc:'射程+40px',               cost:5,  parent:'core'},
  {id:'t1',   x:C3,  y:R1, name:'+5秒',          desc:'ラウンド時間+5秒',         cost:4,  parent:'core'},
  {id:'e1',   x:C4,  y:R1, name:'初期敵+3',      desc:'開始時の敵+3体',          cost:3,  parent:'core'},

  // Row 2
  {id:'wl2',  x:C0,  y:R2, name:'+1 レーザー',   desc:'レーザー本数+1',          cost:7,  parent:'wrot'},
  {id:'wwid', x:C1,  y:R2, name:'ビーム幅UP',    desc:'レーザーの幅+2px',        cost:7,  parent:'wlen'},
  {id:'wlen2',x:C2,  y:R2, name:'レーザー延長',  desc:'射程+40px',               cost:7,  parent:'wlen'},
  {id:'t2',   x:C3,  y:R2, name:'+5秒',          desc:'ラウンド時間+5秒',         cost:5,  parent:'t1'},
  {id:'e2',   x:C4,  y:R2, name:'初期敵+3',      desc:'開始時の敵+3体',          cost:5,  parent:'e1'},

  // Row 3
  {id:'wchain',x:C0, y:R3, name:'連鎖爆発',      desc:'撃破で周囲に爆発連鎖',    cost:18, parent:'wl2'},
  {id:'wdash', x:C1, y:R3, name:'DASH解放',      desc:'タップで瞬間移動',        cost:14, parent:'wwid'},
  {id:'ts',    x:C2, y:R3, name:'スロータイム',  desc:'時間経過-20% 余裕UP',     cost:10, parent:'t2'},
  {id:'t3',    x:C3, y:R3, name:'+10秒',         desc:'ラウンド時間+10秒',        cost:8,  parent:'t2'},
  {id:'erep',  x:C4, y:R3, name:'リポップ',      desc:'倒した敵が時間で復活',    cost:9,  parent:'e2'},

  // Row 4
  {id:'wdsh2', x:C1, y:R4, name:'DASH短縮',      desc:'DASHのCD-0.7秒',          cost:10, parent:'wdash'},
  {id:'ebst',  x:C2, y:R4, name:'バースト召喚',  desc:'撃破時に確率で敵追加',    cost:10, parent:'ts'},
  {id:'t4',    x:C3, y:R4, name:'+15秒',         desc:'ラウンド時間+15秒',        cost:14, parent:'t3'},
  {id:'erp2',  x:C4, y:R4, name:'リポップ加速',  desc:'復活間隔が短縮',          cost:7,  parent:'erep'},

  // Row 5 — Coin convergence node (requires wl2 path OR t3 path)
  // Using wdsh2 as prerequisite to be reachable from weapon side
  {id:'c1',    x:C2, y:R5, name:'コイン×1.5',   desc:'獲得コイン+50%',          cost:12, parent:'t4'},

  // Row 6
  {id:'c2',    x:C1, y:R6, name:'コイン×2',     desc:'獲得コイン2倍',           cost:18, parent:'c1'},
  {id:'cmag',  x:C3, y:R6, name:'コイン磁石',   desc:'コインが自動吸収',        cost:14, parent:'c1'},

  // Row 7
  {id:'c3',    x:C1, y:R7, name:'コイン×3',     desc:'獲得コイン3倍',           cost:30, parent:'c2'},
  {id:'cmag2', x:C3, y:R7, name:'磁石強化',     desc:'吸収範囲が2倍に拡大',     cost:10, parent:'cmag'},
];
// Total cost: 5+5+5+4+3+7+7+7+5+5+18+14+10+8+9+10+10+14+7+12+18+14+30+10 = 257
// ~260 coins → 1h play with ~4-5 coins/round × 55 rounds

const TREE_W=C4+NW+12;
const TREE_H=R7+NH+16;

// ── States ─────────────────────────────────────────────────────────
const S_TITLE=0,S_BATTLE=1,S_SKILLTREE=2,S_OVER=3;
let gState=S_TITLE;

// ── Game State ─────────────────────────────────────────────────────
let player,enemies,coinsArr,particles,lightnings,rings;
let roundTime,roundElapsed,totalCoins,spentCoins,round;
let skills;
let lastTS,repopT;
let shakeT=0,shakeMag=0;
let comboCount=0,comboTimer=0,comboPeak=0;
let dashCD=0,timeScale=1;
let eid=0;
function nid(){return ++eid;}

// ── Skill helpers ──────────────────────────────────────────────────
function lv(id){return skills[id]||0;}
function available(){return totalCoins-spentCoins;}

function getRoundTime(){return 10+lv('t1')*5+lv('t2')*5+lv('t3')*10+lv('t4')*15;}
function getInitCount(){return 6+lv('e1')*3+lv('e2')*3;}
function getCoinMult(){return 1+(lv('c1')?0.5:0)+(lv('c2')?0.5:0)+(lv('c3')?1:0);}
function getTimeScale(){return lv('ts')?0.8:1;}
function getDashCD(){return Math.max(0.8,2.2-lv('wdsh2')*0.7);}
function getLaserN(){return Math.min(6,2+lv('core')+lv('wl2'));}
function getLaserL(){return 80+lv('wlen')*40+lv('wlen2')*40;}
function getLaserW(){return 2+lv('wwid')*2;}
function getLaserRS(){return 1.8+lv('wrot')*0.5;}

// ── Helpers ────────────────────────────────────────────────────────
function ptSegDSq(px,py,ax,ay,bx,by){
  const dx=bx-ax,dy=by-ay,l=dx*dx+dy*dy;
  if(!l)return(px-ax)**2+(py-ay)**2;
  const t=Math.max(0,Math.min(1,((px-ax)*dx+(py-ay)*dy)/l));
  return(px-ax-t*dx)**2+(py-ay-t*dy)**2;
}
function addPart(x,y,col,n){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=1+Math.random()*4;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,decay:0.025+Math.random()*0.028,r:2+Math.random()*3,col});
  }
}
function addZap(x1,y1,x2,y2){lightnings.push({x1,y1,x2,y2,life:0.22});}

// ── Arena (fixed, no expansion) ────────────────────────────────────
function getArena(){
  const W=canvas.width,H=canvas.height;
  const sz=Math.min(W,H)*0.78;
  const h=Math.min(sz*1.14,H*0.94);
  return{w:sz,h,x:(W-sz)/2,y:(H-h)/2};
}

// ── Spawn ──────────────────────────────────────────────────────────
const ECOLS=['#ff3333','#ff7700','#aa44ff','#44ff88','#ff44aa','#44aaff','#ffdd00'];
function spawnEnemy(){
  const ar=getArena();
  const m=16;
  enemies.push({
    id:nid(),
    x:ar.x+m+Math.random()*(ar.w-m*2),
    y:ar.y+m+Math.random()*(ar.h-m*2),
    r:8+Math.random()*9,
    val:1+Math.random()*2|0,
    col:ECOLS[Math.random()*ECOLS.length|0],
    spd:0.35+Math.random()*0.7,
    wanderA:Math.random()*Math.PI*2,wanderT:0
  });
}

// ── Kill (visited set prevents infinite recursion) ─────────────────
function killEnemy(e, visited, fromChain){
  if(!visited) visited=new Set();
  if(visited.has(e.id)) return;
  visited.add(e.id);
  const idx=enemies.indexOf(e);
  if(idx===-1) return;
  enemies.splice(idx,1);
  const earn=Math.ceil(e.val*getCoinMult());
  totalCoins+=earn;
  comboCount++;comboTimer=1.8;
  if(comboCount>comboPeak) comboPeak=comboCount;
  playKill();
  addPart(e.x,e.y,e.col,14+Math.random()*10|0);
  rings.push({x:e.x,y:e.y,r:8,life:1,col:e.col});
  if(coinsArr.length<300){
    for(let i=0;i<e.val;i++){
      const a=Math.random()*Math.PI*2,d=Math.random()*20;
      coinsArr.push({x:e.x+Math.cos(a)*d,y:e.y+Math.sin(a)*d,r:4,life:6,col:e.col});
    }
  }
  // Chain explosion (no burst during chain)
  if(lv('wchain')>0){
    const snap=[...enemies];
    snap.filter(ne=>(ne.x-e.x)**2+(ne.y-e.y)**2<60**2)
      .forEach(ne=>killEnemy(ne,visited,true));
  }
  // Burst spawn (only on direct kills, not chain, cap enemies)
  if(!fromChain && lv('ebst')>0 && enemies.length<60){
    const chance=0.12+lv('ebst2')*0.1;
    if(Math.random()<chance){
      const n=Math.min(3,60-enemies.length);
      for(let i=0;i<n;i++) spawnEnemy();
    }
  }
}

// ── Dash ───────────────────────────────────────────────────────────
function doPhaseDash(tx,ty){
  if(lv('wdash')<1||dashCD>0||gState!==S_BATTLE) return;
  const dx=tx-player.x,dy=ty-player.y;
  const dist=Math.sqrt(dx*dx+dy*dy)||1;
  const mv=Math.min(dist,185);
  const nx=dx/dist,ny=dy/dist;
  const ar=getArena();
  const ox=player.x,oy=player.y;
  const newX=Math.max(ar.x+player.r,Math.min(ar.x+ar.w-player.r,ox+nx*mv));
  const newY=Math.max(ar.y+player.r,Math.min(ar.y+ar.h-player.r,oy+ny*mv));
  const vis=new Set();
  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];
    if(ptSegDSq(e.x,e.y,ox,oy,newX,newY)<=(e.r+4)**2) killEnemy(e,vis,false);
  }
  for(let t=0;t<=1;t+=0.2) player.trail.push({x:ox+nx*mv*t,y:oy+ny*mv*t});
  addZap(ox,oy,newX,newY);
  for(let i=0;i<16;i++){
    const a=Math.random()*Math.PI*2,s=2+Math.random()*5;
    particles.push({x:newX,y:newY,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,decay:0.02+Math.random()*0.03,r:2+Math.random()*3,col:'#00ffff'});
  }
  shakeT=0.1;shakeMag=4;
  player.x=newX;player.y=newY;
  dashCD=getDashCD();
  playDash();
}

// ── Init Round ─────────────────────────────────────────────────────
function initRound(){
  const W=canvas.width,H=canvas.height;
  player={x:W/2,y:H/2,r:14,vx:0,vy:0,speed:2.8,trail:[],
    laserN:getLaserN(),laserL:getLaserL(),laserW:getLaserW(),laserRS:getLaserRS(),laserA:Math.random()*Math.PI*2};
  enemies=[];coinsArr=[];particles=[];lightnings=[];rings=[];
  roundTime=getRoundTime();roundElapsed=0;timeScale=getTimeScale();
  repopT=0;dashCD=0;eid=0;
  comboCount=0;comboTimer=0;
  shakeT=0;shakeMag=0;
  for(let i=0;i<getInitCount();i++) spawnEnemy();
}

// ── Update ─────────────────────────────────────────────────────────
function update(rawDt){
  const dt=Math.min(rawDt,0.05)*timeScale;
  const ar=getArena();
  roundElapsed+=dt;
  if(roundElapsed>=roundTime){endBattle();return;}

  player.trail.push({x:player.x,y:player.y});
  if(player.trail.length>14) player.trail.shift();
  const spd=player.speed*265;
  let kx=0,ky=0;
  if(keys['ArrowLeft']||keys['a']||keys['A']) kx-=1;
  if(keys['ArrowRight']||keys['d']||keys['D']) kx+=1;
  if(keys['ArrowUp']||keys['w']||keys['W']) ky-=1;
  if(keys['ArrowDown']||keys['s']||keys['S']) ky+=1;
  if(kx||ky){const km=Math.sqrt(kx*kx+ky*ky);player.x+=kx/km*spd*dt;player.y+=ky/km*spd*dt;}
  else{const mag=Math.sqrt(player.vx**2+player.vy**2);if(mag>0){const sc=Math.min(mag,spd*dt)/mag;player.x+=player.vx*sc;player.y+=player.vy*sc;}}
  player.x=Math.max(ar.x+player.r,Math.min(ar.x+ar.w-player.r,player.x));
  player.y=Math.max(ar.y+player.r,Math.min(ar.y+ar.h-player.r,player.y));
  player.laserA+=player.laserRS*dt;
  if(dashCD>0) dashCD-=dt;

  // Enemies wander
  for(const e of enemies){
    e.wanderT-=dt;
    if(e.wanderT<=0){e.wanderA+=(Math.random()-0.5)*1.8;e.wanderT=0.5+Math.random()*1.5;}
    e.x+=Math.cos(e.wanderA)*e.spd*55*dt;
    e.y+=Math.sin(e.wanderA)*e.spd*55*dt;
    if(e.x<ar.x+e.r){e.x=ar.x+e.r;e.wanderA=Math.PI-e.wanderA;}
    if(e.x>ar.x+ar.w-e.r){e.x=ar.x+ar.w-e.r;e.wanderA=Math.PI-e.wanderA;}
    if(e.y<ar.y+e.r){e.y=ar.y+e.r;e.wanderA=-e.wanderA;}
    if(e.y>ar.y+ar.h-e.r){e.y=ar.y+ar.h-e.r;e.wanderA=-e.wanderA;}
  }

  // Repop
  if(lv('erep')>0){
    const freq=Math.max(0.25,1.2-lv('erp2')*0.28);
    repopT+=dt;
    if(repopT>=freq&&enemies.length<100){spawnEnemy();repopT=0;}
  }

  // Laser hits
  const vis=new Set();
  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];
    if(vis.has(e.id)) continue;
    for(let li=0;li<player.laserN;li++){
      const ang=player.laserA+(li/player.laserN)*Math.PI*2;
      if(ptSegDSq(e.x,e.y,player.x,player.y,
          player.x+Math.cos(ang)*player.laserL,
          player.y+Math.sin(ang)*player.laserL)
        <=(e.r+player.laserW)**2){
        killEnemy(e,vis,false);break;
      }
    }
  }

  // Coin collection (player body + laser sweep)
  const magnet=lv('cmag')>0, magR=lv('cmag2')>0?160:100;
  for(let i=coinsArr.length-1;i>=0;i--){
    const c=coinsArr[i];
    c.life-=dt;
    const cdx=player.x-c.x,cdy=player.y-c.y,cd=Math.sqrt(cdx**2+cdy**2);
    // Magnet pull
    if(magnet&&cd<magR){c.x+=cdx/cd*170*dt;c.y+=cdy/cd*170*dt;}
    // Body pickup
    let picked=cd<player.r+c.r;
    // Laser pickup
    if(!picked){
      for(let li=0;li<player.laserN;li++){
        const ang=player.laserA+(li/player.laserN)*Math.PI*2;
        if(ptSegDSq(c.x,c.y,player.x,player.y,
            player.x+Math.cos(ang)*player.laserL,
            player.y+Math.sin(ang)*player.laserL) <= (c.r+player.laserW+4)**2){
          picked=true; break;
        }
      }
    }
    if(picked){playCoin();coinsArr.splice(i,1);}
    else if(c.life<=0) coinsArr.splice(i,1);
  }

  // Particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx*55*dt;p.y+=p.vy*55*dt;p.vx*=0.91;p.vy*=0.91;
    p.life-=p.decay*55*dt;if(p.life<=0) particles.splice(i,1);
  }
  for(let i=rings.length-1;i>=0;i--){rings[i].r+=195*dt;rings[i].life-=dt*3;if(rings[i].life<=0)rings.splice(i,1);}
  for(let i=lightnings.length-1;i>=0;i--){lightnings[i].life-=dt;if(lightnings[i].life<=0)lightnings.splice(i,1);}
  if(comboTimer>0){comboTimer-=dt;if(comboTimer<=0)comboCount=0;}
  if(shakeT>0) shakeT-=dt;
}

// ── End Battle ─────────────────────────────────────────────────────
function endBattle(){
  gState=S_SKILLTREE;
  round++;
  buildSkillTree();
  document.getElementById('skilltree').style.display='flex';
}

// ── Skill Tree UI ──────────────────────────────────────────────────
function buildSkillTree(){
  document.getElementById('st-coins').textContent=`🪙 ${available()}`;
  const stCanvas=document.getElementById('st-canvas');
  stCanvas.style.width=TREE_W+'px';
  stCanvas.style.height=TREE_H+'px';

  // SVG lines — bezier curves for a polished tree look
  let lines='';
  for(const node of TREE_NODES){
    if(!node.parent) continue;
    const par=TREE_NODES.find(n=>n.id===node.parent);
    if(!par) continue;
    const x1=par.x+NW/2, y1=par.y+NH;
    const x2=node.x+NW/2, y2=node.y;
    const cy=(y1+y2)/2;
    const parentBought=lv(node.parent)>0;
    const selfBought=lv(node.id)>0;
    const col=selfBought?'#44ff88':parentBought?'#1a5070':'#0d1f2d';
    const w=parentBought?2:1;
    lines+=`<path d="M${x1},${y1} C${x1},${cy} ${x2},${cy} ${x2},${y2}" stroke="${col}" stroke-width="${w}" fill="none"/>`;
  }

  // Node cards
  let nodes='';
  for(const node of TREE_NODES){
    const bought=lv(node.id)>0;
    const parentOk=!node.parent||lv(node.parent)>0;
    const canBuy=parentOk&&!bought&&available()>=node.cost;
    let cls='st-node';
    if(bought) cls+=' sn-bought';
    else if(!parentOk) cls+=' sn-blocked';
    else if(canBuy) cls+=' sn-avail';
    const costLabel=bought?'✓':parentOk?`🪙${node.cost}`:'🔒';
    nodes+=`<div class="${cls}" style="left:${node.x}px;top:${node.y}px" data-id="${node.id}" data-cost="${node.cost}">
      <div class="sn-name">${node.name}</div>
      <div class="sn-desc">${node.desc}</div>
      <div class="sn-cost">${costLabel}</div>
    </div>`;
  }

  stCanvas.innerHTML=`<svg style="position:absolute;top:0;left:0;width:${TREE_W}px;height:${TREE_H}px;pointer-events:none" xmlns="http://www.w3.org/2000/svg">${lines}</svg>${nodes}`;

  // Click handlers
  stCanvas.querySelectorAll('.sn-avail').forEach(el=>{
    el.addEventListener('click',()=>{
      const id=el.dataset.id, cost=parseInt(el.dataset.cost);
      if(available()>=cost&&!skills[id]){
        spentCoins+=cost; skills[id]=1;
        buildSkillTree(); playLevelUp();
      }
    });
  });
}

document.getElementById('st-start').addEventListener('click',()=>{
  document.getElementById('skilltree').style.display='none';
  gState=S_BATTLE; initRound(); lastTS=null;
  requestAnimationFrame(loop);
});

// ── Draw helpers ───────────────────────────────────────────────────
function roundRect(x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

// ── Draw Battle ────────────────────────────────────────────────────
function drawBattle(W,H){
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='#0a1520';ctx.lineWidth=1;
  for(let x=0;x<W;x+=36){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=36){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  const ar=getArena();
  ctx.fillStyle='rgba(0,6,18,0.5)';ctx.fillRect(ar.x,ar.y,ar.w,ar.h);
  ctx.strokeStyle='#0055aa';ctx.lineWidth=1.5;ctx.shadowBlur=14;ctx.shadowColor='#0055ff';
  ctx.strokeRect(ar.x,ar.y,ar.w,ar.h);ctx.shadowBlur=0;

  // Rings
  for(const r of rings){
    ctx.globalAlpha=r.life*0.7;ctx.strokeStyle=r.col;ctx.shadowBlur=10;ctx.shadowColor=r.col;
    ctx.lineWidth=2;ctx.beginPath();ctx.arc(r.x,r.y,r.r,0,Math.PI*2);ctx.stroke();
  }
  ctx.globalAlpha=1;ctx.shadowBlur=0;

  // Coins
  for(const c of coinsArr){
    ctx.globalAlpha=Math.min(1,c.life*0.45);ctx.shadowBlur=5;ctx.shadowColor=c.col;ctx.fillStyle=c.col;
    ctx.beginPath();ctx.arc(c.x,c.y,c.r,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;ctx.shadowBlur=0;

  // Particles
  for(const p of particles){
    ctx.globalAlpha=p.life;ctx.shadowBlur=4;ctx.shadowColor=p.col;ctx.fillStyle=p.col;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;ctx.shadowBlur=0;

  // Enemies
  for(const e of enemies){
    ctx.shadowBlur=9;ctx.shadowColor=e.col;ctx.fillStyle=e.col;
    ctx.beginPath();ctx.arc(e.x,e.y,e.r,0,Math.PI*2);ctx.fill();
  }
  ctx.shadowBlur=0;

  // Lightnings
  for(const l of lightnings){
    ctx.globalAlpha=l.life/0.22;ctx.strokeStyle='#fff';ctx.shadowBlur=8;ctx.shadowColor='#ffff44';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(l.x1,l.y1);
    for(let s=1;s<5;s++){const t=s/5;ctx.lineTo(l.x1+(l.x2-l.x1)*t+(Math.random()-0.5)*14,l.y1+(l.y2-l.y1)*t+(Math.random()-0.5)*14);}
    ctx.lineTo(l.x2,l.y2);ctx.stroke();
  }
  ctx.globalAlpha=1;ctx.shadowBlur=0;

  // Player trail
  for(let i=0;i<player.trail.length;i++){
    const t=player.trail[i],a=(i/player.trail.length)*0.26;
    ctx.globalAlpha=a;ctx.fillStyle='#00ffff';
    ctx.beginPath();ctx.arc(t.x,t.y,player.r*0.42*(i/player.trail.length),0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;

  // Lasers
  for(let li=0;li<player.laserN;li++){
    const ang=player.laserA+(li/player.laserN)*Math.PI*2;
    ctx.shadowBlur=13;ctx.shadowColor='#4488ff';ctx.strokeStyle='#88ccff';ctx.lineWidth=player.laserW;
    ctx.beginPath();ctx.moveTo(player.x,player.y);
    ctx.lineTo(player.x+Math.cos(ang)*player.laserL,player.y+Math.sin(ang)*player.laserL);
    ctx.stroke();
  }
  ctx.shadowBlur=0;

  // Player
  ctx.shadowBlur=16;ctx.shadowColor='#00ffff';ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(player.x,player.y,player.r,0,Math.PI*2);ctx.fill();
  const gr=ctx.createRadialGradient(player.x,player.y,0,player.x,player.y,player.r);
  gr.addColorStop(0,'rgba(0,255,255,0.65)');gr.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=gr;ctx.beginPath();ctx.arc(player.x,player.y,player.r,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;

  // Dash ready indicator
  if(lv('wdash')>0&&dashCD<=0){
    const pulse=0.22+0.18*Math.sin(Date.now()*0.008);
    ctx.globalAlpha=pulse;ctx.strokeStyle='#00ffff';ctx.shadowBlur=7;ctx.shadowColor='#00ffff';
    ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(player.x,player.y,player.r+9,0,Math.PI*2);ctx.stroke();
    ctx.globalAlpha=1;ctx.shadowBlur=0;
  }

  // Combo
  if(comboCount>=3&&comboTimer>0){
    ctx.globalAlpha=Math.min(1,comboTimer*2);ctx.textAlign='center';
    const cfs=Math.min(W*0.065,42);ctx.font=`bold ${cfs}px monospace`;
    let cc='#ffff44',cg='#ffaa00';
    if(comboCount>=10){cc='#ff44ff';cg='#ff00ff';}
    else if(comboCount>=5){cc='#ff8800';cg='#ff4400';}
    ctx.shadowBlur=22;ctx.shadowColor=cg;ctx.fillStyle=cc;
    ctx.fillText(`${comboCount} COMBO!`,W/2,H*0.76);
    ctx.shadowBlur=0;ctx.globalAlpha=1;
  }

  // HUD
  ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,W,48);
  const rem=Math.max(0,Math.ceil(roundTime-roundElapsed));
  ctx.textAlign='center';ctx.font='bold 22px monospace';
  ctx.fillStyle=rem<=5?'#ff4444':'#fff';ctx.shadowBlur=7;ctx.shadowColor=rem<=5?'#ff0000':'#aaaaff';
  ctx.fillText(rem+'s',W/2,28);ctx.shadowBlur=0;
  ctx.textAlign='left';ctx.font='bold 13px monospace';ctx.fillStyle='#ffdd44';
  ctx.shadowBlur=3;ctx.shadowColor='#ffaa00';ctx.fillText(`🪙 ${totalCoins}`,10,26);ctx.shadowBlur=0;
  ctx.textAlign='right';ctx.font='12px monospace';ctx.fillStyle='#667788';
  ctx.fillText(`R${round}  👾${enemies.length}`,W-10,26);
  ctx.fillStyle='#0a1a2a';ctx.fillRect(0,44,W,4);
  ctx.fillStyle='#0077ee';ctx.fillRect(0,44,W*(roundElapsed/roundTime),4);
}

// ── Draw Title ─────────────────────────────────────────────────────
let demoEs=[];
function initDemo(){
  demoEs=[];const W=canvas.width||420,H=canvas.height||700;
  for(let i=0;i<14;i++) demoEs.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-0.5)*1.4,vy:(Math.random()-0.5)*1.4,r:6+Math.random()*10,col:ECOLS[i%ECOLS.length]});
}
function drawTitle(W,H){
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='#0a1520';ctx.lineWidth=1;
  for(let x=0;x<W;x+=36){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=36){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  for(const e of demoEs){
    e.x+=e.vx;e.y+=e.vy;
    if(e.x<0||e.x>W)e.vx*=-1;if(e.y<0||e.y>H)e.vy*=-1;
    ctx.shadowBlur=9;ctx.shadowColor=e.col;ctx.fillStyle=e.col;ctx.globalAlpha=0.45;
    ctx.beginPath();ctx.arc(e.x,e.y,e.r,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;ctx.shadowBlur=0;
  const fs=Math.min(W*0.1,40);
  ctx.font=`bold ${fs}px monospace`;ctx.textAlign='center';
  ctx.shadowBlur=20;ctx.shadowColor='#00ffff';ctx.fillStyle='#fff';
  ctx.fillText('⚡ NEON SWARM',W/2,H*0.25);ctx.shadowBlur=0;
  const fs2=Math.min(Math.floor(W*0.036),14);
  ctx.font=`${fs2}px sans-serif`;ctx.fillStyle='#778899';
  ctx.fillText('ドラッグ/WASD で移動　レーザーが敵を自動で倒す',W/2,H*0.34);
  ctx.fillStyle='#88ddcc';ctx.font=`bold ${fs2}px sans-serif`;
  ctx.fillText('コインを稼いでスキルツリーで強化！',W/2,H*0.40);
  ctx.fillStyle='#ffcc44';
  ctx.fillText('何ラウンドまで積み上げられる？',W/2,H*0.45);
  const hs=parseInt(localStorage.getItem('ns2_hs')||'0');
  if(hs>0){
    ctx.font=`bold ${Math.floor(fs2*1.1)}px monospace`;ctx.fillStyle='#ffdd44';
    ctx.shadowBlur=5;ctx.shadowColor='#ffaa00';ctx.fillText(`BEST: 🪙${hs}`,W/2,H*0.51);ctx.shadowBlur=0;
  }
  const bw=Math.min(W*0.5,270),bh=48,bx=W/2-bw/2,by=H*0.60;
  ctx.fillStyle='rgba(0,15,40,0.94)';ctx.strokeStyle='#0088ff';ctx.lineWidth=2;
  ctx.shadowBlur=10;ctx.shadowColor='#0088ff';
  roundRect(bx,by,bw,bh,8);ctx.fill();ctx.stroke();ctx.shadowBlur=0;
  ctx.font='bold 18px monospace';ctx.fillStyle='#fff';ctx.shadowBlur=4;ctx.shadowColor='#00aaff';
  ctx.fillText('TAP TO START',W/2,by+31);ctx.shadowBlur=0;
}

// ── Draw Result ────────────────────────────────────────────────────
function drawOver(W,H){
  ctx.fillStyle='rgba(0,0,0,0.92)';ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.font=`bold ${Math.min(W*0.08,32)}px monospace`;
  ctx.fillStyle='#aabbcc';ctx.shadowBlur=14;ctx.shadowColor='#445566';
  ctx.fillText('RESULT',W/2,H*0.12);ctx.shadowBlur=0;
  ctx.font=`bold ${Math.min(W*0.2,80)}px monospace`;
  ctx.fillStyle='#ffdd44';ctx.shadowBlur=28;ctx.shadowColor='#ffaa00';
  ctx.fillText(`🪙${totalCoins}`,W/2,H*0.32);ctx.shadowBlur=0;
  ctx.font=`${Math.floor(W*0.037)}px monospace`;ctx.fillStyle='#99aabb';
  ctx.fillText(`ラウンド ${round-1}　最大コンボ ${comboPeak}`,W/2,H*0.40);
  const hs=parseInt(localStorage.getItem('ns2_hs')||'0');
  if(totalCoins>hs) localStorage.setItem('ns2_hs',totalCoins);
  if(totalCoins>0&&totalCoins>=hs){
    ctx.font=`bold ${Math.floor(W*0.048)}px monospace`;ctx.fillStyle='#ffd700';
    ctx.shadowBlur=14;ctx.shadowColor='#ffd700';ctx.fillText('🏆 NEW RECORD!',W/2,H*0.50);ctx.shadowBlur=0;
  } else if(hs>0){
    ctx.font=`${Math.floor(W*0.034)}px monospace`;ctx.fillStyle='#445566';
    ctx.fillText(`BEST: 🪙${hs}`,W/2,H*0.50);
  }
  const bw=W*0.54,bh=44,bx=W/2-W*0.27;
  // Share
  ctx.fillStyle='rgba(0,0,0,0.9)';ctx.strokeStyle='#1d9bf0';ctx.lineWidth=1.5;
  ctx.shadowBlur=7;ctx.shadowColor='#1d9bf044';
  roundRect(bx,H*0.60,bw,bh,22);ctx.fill();ctx.stroke();ctx.shadowBlur=0;
  ctx.font=`bold ${Math.floor(W*0.038)}px monospace`;ctx.fillStyle='#1d9bf0';
  ctx.fillText('𝕏 シェア',W/2,H*0.60+28);
  // Retry
  ctx.fillStyle='rgba(18,0,38,0.94)';ctx.strokeStyle='#aa44ff';ctx.lineWidth=2;
  ctx.shadowBlur=9;ctx.shadowColor='#aa44ff';
  roundRect(bx,H*0.71,bw,bh,8);ctx.fill();ctx.stroke();ctx.shadowBlur=0;
  ctx.font=`bold ${Math.floor(W*0.042)}px monospace`;ctx.fillStyle='#fff';
  ctx.fillText('もう一度',W/2,H*0.71+28);
}

// ── Loop ───────────────────────────────────────────────────────────
function loop(ts){
  const W=canvas.width,H=canvas.height;
  if(gState===S_TITLE){drawTitle(W,H);requestAnimationFrame(loop);return;}
  if(gState===S_OVER){drawOver(W,H);requestAnimationFrame(loop);return;}
  if(gState!==S_BATTLE)return;
  if(!lastTS)lastTS=ts;
  const dt=(ts-lastTS)/1000;lastTS=ts;
  update(dt);
  ctx.save();
  if(shakeT>0){
    ctx.translate((Math.random()-0.5)*shakeMag*(shakeT/0.3),(Math.random()-0.5)*shakeMag*(shakeT/0.3));
  }
  drawBattle(W,H);
  ctx.restore();
  requestAnimationFrame(loop);
}

// ── Input ──────────────────────────────────────────────────────────
const keys={};
let dragging=false,dLastX=0,dLastY=0,touchStartX=0,touchStartY=0;
window.addEventListener('keydown',e=>keys[e.key]=true);
window.addEventListener('keyup',e=>keys[e.key]=false);
function getPos(e){
  const rect=canvas.getBoundingClientRect();
  const sx=canvas.width/rect.width,sy=canvas.height/rect.height;
  if(e.touches)return{x:(e.touches[0].clientX-rect.left)*sx,y:(e.touches[0].clientY-rect.top)*sy};
  return{x:(e.clientX-rect.left)*sx,y:(e.clientY-rect.top)*sy};
}
function handleTap(px,py){
  if(gState===S_TITLE){startGame();return;}
  if(gState===S_BATTLE){doPhaseDash(px,py);return;}
  if(gState===S_OVER){
    const W=canvas.width,H=canvas.height,bw=W*0.54,bx=W/2-W*0.27;
    if(px>=bx&&px<=bx+bw&&py>=H*0.60&&py<=H*0.60+44){
      const txt=`⚡ NEON SWARM 🪙${totalCoins}コイン | R${round-1} | 最大${comboPeak}コンボ #NeonSwarm`;
      if(navigator.share)navigator.share({text:txt});
      else window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(txt),'_blank');
      return;
    }
    if(px>=bx&&px<=bx+bw&&py>=H*0.71&&py<=H*0.71+44){startGame();return;}
  }
}
canvas.addEventListener('mousedown',e=>{resumeAC();if(e.button===0){const p=getPos(e);handleTap(p.x,p.y);}e.preventDefault();});
canvas.addEventListener('contextmenu',e=>e.preventDefault());
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();resumeAC();
  if(gState===S_TITLE){startGame();return;}
  const p=getPos(e);
  if(gState===S_OVER){handleTap(p.x,p.y);return;}
  dragging=true;dLastX=p.x;dLastY=p.y;touchStartX=p.x;touchStartY=p.y;
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();if(!dragging)return;
  const p=getPos(e);
  if(gState===S_BATTLE){player.vx=p.x-dLastX;player.vy=p.y-dLastY;}
  dLastX=p.x;dLastY=p.y;
},{passive:false});
canvas.addEventListener('touchend',e=>{
  e.preventDefault();dragging=false;
  if(gState===S_BATTLE){
    player.vx=0;player.vy=0;
    const dx=dLastX-touchStartX,dy=dLastY-touchStartY;
    if(dx*dx+dy*dy<400)doPhaseDash(touchStartX,touchStartY);
  }
},{passive:false});

// ── Start ──────────────────────────────────────────────────────────
function startGame(){
  skills={};totalCoins=0;spentCoins=0;round=1;comboPeak=0;
  initRound();gState=S_BATTLE;lastTS=null;
  requestAnimationFrame(loop);
}

initDemo();
requestAnimationFrame(loop);
</script>
