<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>幻想星力無双2D</title>
  <style>
    :root {
      color-scheme: dark;
      --panel: rgba(12, 15, 22, 0.78);
      --line: rgba(220, 242, 255, 0.22);
      --gold: #ffe27a;
      --cyan: #8df4ff;
      --pink: #ff8fc7;
      --red: #ff5d69;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #081018;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #f8fbff;
      touch-action: none;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      background: #101823;
    }

    .hud {
      position: fixed;
      inset: 18px 18px auto 18px;
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      gap: 10px;
      align-items: start;
      pointer-events: none;
      z-index: 4;
    }

    .panel,
    .meter,
    .ko,
    .boss {
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: 0 16px 36px rgba(0, 0, 0, 0.22);
      backdrop-filter: blur(12px);
    }

    .panel {
      min-width: 210px;
      padding: 14px 16px;
    }

    .panel b {
      display: block;
      font-size: 18px;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .panel span {
      display: block;
      margin-top: 4px;
      color: rgba(244, 250, 255, 0.72);
      font-size: 12px;
    }

    .meter,
    .ko,
    .boss {
      min-width: 88px;
      padding: 12px 13px;
      font-size: 18px;
      font-weight: 800;
      text-align: right;
      white-space: nowrap;
    }

    .meter {
      color: var(--gold);
    }

    .ko {
      color: var(--pink);
    }

    .boss {
      color: var(--cyan);
    }

    .center {
      position: fixed;
      left: 50%;
      top: 50%;
      z-index: 6;
      width: min(420px, calc(100vw - 36px));
      transform: translate(-50%, -50%);
      padding: 22px;
      border: 1px solid var(--line);
      background: rgba(12, 15, 22, 0.88);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.42);
      backdrop-filter: blur(16px);
      text-align: center;
    }

    .center h1 {
      margin: 0;
      font-size: 25px;
      letter-spacing: 0;
    }

    .center p {
      margin: 10px auto 18px;
      max-width: 32em;
      color: rgba(244, 250, 255, 0.74);
      font-size: 14px;
      line-height: 1.6;
    }

    button {
      border: 0;
      color: #081018;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }

    .center button {
      min-width: 112px;
      padding: 12px 16px;
      background: linear-gradient(135deg, #ffe27a, #8df4ff);
      box-shadow: 0 10px 28px rgba(141, 244, 255, 0.18);
    }

    .pad {
      position: fixed;
      right: max(18px, env(safe-area-inset-right));
      bottom: max(18px, env(safe-area-inset-bottom));
      z-index: 5;
      display: grid;
      grid-template-columns: 76px 76px;
      grid-template-rows: 76px 76px;
      gap: 12px;
    }

    .cmd {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      font-size: 29px;
      border: 2px solid rgba(255, 255, 255, 0.52);
      color: #081018;
      box-shadow: inset 0 10px 22px rgba(255, 255, 255, 0.34), 0 12px 32px rgba(0, 0, 0, 0.3);
    }

    #triangle {
      grid-column: 1 / span 2;
      justify-self: center;
      background: radial-gradient(circle at 35% 28%, #f1feff 0, #8df4ff 46%, #5c97ff 100%);
    }

    #square {
      background: radial-gradient(circle at 35% 28%, #fff6bf 0, #ffe27a 48%, #ff9d5d 100%);
    }

    #circle {
      background: radial-gradient(circle at 35% 28%, #fff1fb 0, #ff98c8 45%, #c78dff 100%);
    }

    .stick {
      position: fixed;
      left: max(22px, env(safe-area-inset-left));
      bottom: max(30px, env(safe-area-inset-bottom));
      z-index: 5;
      width: 138px;
      height: 138px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.2);
      background: rgba(10, 13, 19, 0.38);
      box-shadow: inset 0 0 28px rgba(255, 255, 255, 0.08);
    }

    .knob {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 56px;
      height: 56px;
      margin: -28px;
      border-radius: 50%;
      background: #eafaff;
      box-shadow: 0 10px 30px rgba(141, 244, 255, 0.24);
    }

    .technique {
      position: fixed;
      left: 50%;
      bottom: 178px;
      z-index: 5;
      min-width: 220px;
      max-width: calc(100vw - 36px);
      transform: translateX(-50%);
      padding: 12px 18px;
      border: 1px solid var(--line);
      background: rgba(12, 15, 22, 0.76);
      color: #fff0b4;
      text-align: center;
      font-size: 20px;
      font-weight: 900;
      text-shadow: 0 2px 20px rgba(255, 226, 122, 0.4);
      pointer-events: none;
    }

    .credits {
      position: fixed;
      right: 14px;
      bottom: 5px;
      z-index: 3;
      color: rgba(255, 255, 255, 0.52);
      font-size: 11px;
      pointer-events: none;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 520px) {
      .hud {
        inset: 12px 12px auto 12px;
        grid-template-columns: 1fr auto;
        gap: 7px;
      }

      .panel {
        grid-row: 1 / span 2;
        min-width: 0;
        padding: 12px;
      }

      .panel b {
        font-size: 17px;
      }

      .meter,
      .ko,
      .boss {
        min-width: 82px;
        padding: 10px;
        font-size: 17px;
      }

      .boss {
        grid-column: 2;
      }

      .pad {
        grid-template-columns: 70px 70px;
        grid-template-rows: 70px 70px;
      }

      .cmd {
        width: 70px;
        height: 70px;
      }

      .stick {
        width: 128px;
        height: 128px;
      }
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div class="hud">
    <div class="panel">
      <b>幻想星力無双2D</b>
      <span>danmaku field control</span>
    </div>
    <div class="meter" id="star">星力 60</div>
    <div class="ko" id="ko">KO 0</div>
    <div class="boss" id="boss">異変 100%</div>
  </div>
  <div class="center" id="startPanel">
    <h1>弾幕で戦場を塗り替えろ</h1>
    <p>箒で叩いて星くず印を付け、スペルカードで起爆する。敵群を整えてから弾幕ごと崩せ。</p>
    <button id="start">スタート</button>
  </div>
  <div class="stick" id="stick"><div class="knob" id="knob"></div></div>
  <div class="pad">
    <button class="cmd" id="triangle" aria-label="danmaku field">△</button>
    <button class="cmd" id="square" aria-label="star shot">□</button>
    <button class="cmd" id="circle" aria-label="star cannon">○</button>
  </div>
  <div class="technique hidden" id="technique"></div>
  <div class="credits">Powered by Canvas 2D</div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const starEl = document.getElementById("star");
    const koEl = document.getElementById("ko");
    const bossEl = document.getElementById("boss");
    const startPanel = document.getElementById("startPanel");
    const startBtn = document.getElementById("start");
    const stick = document.getElementById("stick");
    const knob = document.getElementById("knob");
    const techniqueEl = document.getElementById("technique");

    const W = 1800;
    const H = 1200;
    const keys = new Set();
    const input = { x: 0, y: 0 };
    const camera = { x: 0, y: 0, shake: 0 };
    const player = { x: W / 2, y: H - 170, vx: 0, vy: 0, r: 18, angle: -Math.PI / 2, inv: 0 };
    const state = {
      running: false,
      won: false,
      star: 60,
      maxStar: 100,
      ko: 0,
      time: 0,
      combo: 0,
      broomStep: 0,
      broomTimer: 0,
      bossHp: 260,
      bossMaxHp: 260,
      techniqueTimer: 0,
      cooldown: { square: 0, triangle: 0, circle: 0 },
      grazePulse: 0
    };

    const enemies = [];
    const bullets = [];
    const slashes = [];
    const fields = [];
    const sparks = [];
    const enemyShots = [];
    const boss = { x: W / 2, y: 138, r: 38, phase: 0, shot: 0 };
    let audioContext = null;
    let last = performance.now();

    function rand(seed) {
      return Math.abs(Math.sin(seed * 9817.21) * 43758.5453) % 1;
    }

    function resize() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = Math.floor(window.innerWidth * dpr);
      canvas.height = Math.floor(window.innerHeight * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function playTone(freq, duration = 0.05, type = "triangle", gain = 0.035) {
      try {
        audioContext ??= new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioContext.createOscillator();
        const amp = audioContext.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioContext.currentTime);
        amp.gain.setValueAtTime(gain, audioContext.currentTime);
        amp.gain.exponentialRampToValueAtTime(0.0001, audioContext.currentTime + duration);
        osc.connect(amp).connect(audioContext.destination);
        osc.start();
        osc.stop(audioContext.currentTime + duration);
      } catch {
        // Sound is optional.
      }
    }

    function showTechnique(text) {
      techniqueEl.textContent = text;
      techniqueEl.classList.remove("hidden");
      state.techniqueTimer = 0.9;
    }

    function startGame() {
      if (state.won) resetGame();
      state.running = true;
      startPanel.classList.add("hidden");
      audioContext?.resume?.();
    }

    function resetGame() {
      enemies.length = 0;
      bullets.length = 0;
      slashes.length = 0;
      fields.length = 0;
      sparks.length = 0;
      enemyShots.length = 0;
      Object.assign(player, { x: W / 2, y: H - 170, vx: 0, vy: 0, angle: -Math.PI / 2, inv: 0 });
      Object.assign(state, {
        running: false,
        won: false,
        star: 60,
        ko: 0,
        time: 0,
        combo: 0,
        broomStep: 0,
        broomTimer: 0,
        bossHp: 260,
        techniqueTimer: 0,
        cooldown: { square: 0, triangle: 0, circle: 0 },
        grazePulse: 0
      });
      for (let i = 0; i < 38; i += 1) spawnEnemy(i);
      for (let i = 0; i < 34; i += 1) {
        enemies.push({
          x: W / 2 + (rand(i + 200) - 0.5) * 520,
          y: H - 430 - rand(i + 230) * 360,
          r: i % 7 === 0 ? 18 : 13,
          hp: i % 7 === 0 ? 30 : 12,
          speed: i % 7 === 0 ? 50 : 70,
          type: i % 7 === 0 ? "elite" : i % 5 === 0 ? "shot" : "mob",
          phase: rand(i + 260) * Math.PI * 2,
          shot: rand(i + 280) * 1.6
        });
      }
      startPanel.classList.remove("hidden");
      startPanel.querySelector("h1").textContent = "弾幕で戦場を塗り替えろ";
      startPanel.querySelector("p").textContent = "箒で叩いて星くず印を付け、スペルカードで起爆する。敵群を整えてから弾幕ごと崩せ。";
    }

    function endGame(won) {
      state.running = false;
      state.won = won;
      startPanel.classList.remove("hidden");
      startPanel.querySelector("h1").textContent = won ? "異変の核を撃破" : "弾幕に飲まれた";
      startPanel.querySelector("p").textContent = won
        ? "敵群を陣に引き込み、星弾で戦場を制圧した。次は敵側の弾幕パターンを増やす。"
        : "グレイズで星力を戻し、陣を切らさず戦場を塗り返せば押し切れる。";
    }

    function spawnEnemy(i = state.ko + enemies.length) {
      const side = rand(i + state.time * 0.1) > 0.5 ? -1 : 1;
      const lane = rand(i + 4) * H * 0.72 + 120;
      const typeRoll = rand(i + 19);
      const type = typeRoll > 0.82 ? "elite" : typeRoll > 0.62 ? "shot" : "mob";
      enemies.push({
        x: side < 0 ? -60 : W + 60,
        y: lane,
        r: type === "elite" ? 18 : 13,
        hp: type === "elite" ? 38 : 16,
        speed: type === "elite" ? 54 : type === "shot" ? 68 : 82,
        type,
        phase: rand(i + 31) * Math.PI * 2,
        shot: rand(i + 44) * 1.6
      });
    }

    function spawnSpark(x, y, color, count = 14, force = 180) {
      for (let i = 0; i < count; i += 1) {
        const a = rand(i + x + y) * Math.PI * 2;
        const s = force * (0.25 + rand(i + y) * 0.75);
        sparks.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: 0.55, max: 0.55, color });
      }
    }

    function spawnBullet(x, y, angle, speed, damage, life, color, size = 5) {
      bullets.push({ x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, damage, life, max: life, color, size });
    }

    function angleDelta(from, to) {
      return Math.atan2(Math.sin(to - from), Math.cos(to - from));
    }

    function markEnemy(enemy, power = 1) {
      enemy.mark = Math.min(3, (enemy.mark || 0) + power);
      enemy.markTime = 5.5;
    }

    function markedEnemies() {
      return enemies.filter((enemy) => enemy.mark > 0 && enemy.markTime > 0);
    }

    function killEnemy(enemy, color = "#ffe27a") {
      const i = enemies.indexOf(enemy);
      if (i < 0) return;
      enemies.splice(i, 1);
      state.ko += 1;
      state.combo += 1;
      state.star = Math.min(state.maxStar, state.star + 1.6);
      camera.shake = Math.max(camera.shake, 5);
      spawnSpark(enemy.x, enemy.y, color, enemy.type === "elite" ? 22 : 12, enemy.type === "elite" ? 240 : 165);
      if (enemies.length < 70) spawnEnemy(state.ko + enemies.length + 80);
      if (navigator.vibrate && state.combo % 18 === 0) navigator.vibrate(18);
    }

    function damageBoss(amount, color = "#8df4ff") {
      if (state.bossHp <= 0) return;
      state.bossHp = Math.max(0, state.bossHp - amount);
      camera.shake = Math.max(camera.shake, 8);
      spawnSpark(boss.x, boss.y, color, 18, 220);
      if (state.bossHp <= 0) {
        spawnSpark(boss.x, boss.y, "#ffe27a", 70, 360);
        endGame(true);
      }
    }

    function squareAttack() {
      startGame();
      if (!state.running || state.cooldown.square > 0) return;
      state.cooldown.square = 0.16;
      state.broomStep = state.broomTimer > 0 ? (state.broomStep % 3) + 1 : 1;
      state.broomTimer = 0.78;
      const base = player.angle;
      const range = 78 + state.broomStep * 14;
      const width = 0.78 + state.broomStep * 0.12;
      slashes.push({ x: player.x, y: player.y, angle: base, range, width, life: 0.16, max: 0.16, step: state.broomStep });
      let hits = 0;
      for (const enemy of [...enemies]) {
        const dx = enemy.x - player.x;
        const dy = enemy.y - player.y;
        const dist = Math.hypot(dx, dy);
        const facing = Math.atan2(dy, dx);
        if (dist < range + enemy.r && Math.abs(angleDelta(base, facing)) < width) {
          hits += 1;
          enemy.hp -= 3 + state.broomStep * 2;
          markEnemy(enemy, 1);
          const push = 34 + state.broomStep * 10;
          enemy.x += Math.cos(base) * push;
          enemy.y += Math.sin(base) * push;
          spawnSpark(enemy.x, enemy.y, "#ffe27a", 4, 90);
          if (enemy.hp <= 0) killEnemy(enemy, "#ffe27a");
        }
      }
      if (state.bossHp > 0) {
        const dx = boss.x - player.x;
        const dy = boss.y - player.y;
        if (Math.hypot(dx, dy) < range + boss.r && Math.abs(angleDelta(base, Math.atan2(dy, dx))) < width) damageBoss(2 + state.broomStep, "#ffe27a");
      }
      state.star = Math.min(state.maxStar, state.star + 1.2 + hits * 0.7);
      camera.shake = Math.max(camera.shake, hits ? 5 : 2);
      showTechnique(`□ 箒連撃 ${state.broomStep}`);
      playTone(300 + state.broomStep * 80, 0.04, "square", 0.02);
    }

    function triangleAttack() {
      startGame();
      if (!state.running || state.cooldown.triangle > 0) return;
      if (state.star < 20) {
        showTechnique("△ 星力不足");
        playTone(120, 0.08, "square", 0.02);
        return;
      }
      state.star -= 20;
      state.cooldown.triangle = 0.58;
      const marked = markedEnemies();
      if (marked.length) {
        showTechnique(`△ 星くず起爆 x${marked.length}`);
        camera.shake = Math.max(camera.shake, 10);
        for (const enemy of [...marked]) {
          const mark = enemy.mark || 1;
          enemy.mark = 0;
          enemy.markTime = 0;
          spawnSpark(enemy.x, enemy.y, "#ffe27a", 10 + mark * 5, 170 + mark * 35);
          fields.push({
            x: enemy.x,
            y: enemy.y,
            r: 28,
            maxR: 74 + mark * 22,
            angle: player.angle + mark,
            spin: mark % 2 ? 1 : -1,
            pulse: 0,
            life: 1.05 + mark * 0.18,
            max: 1.05 + mark * 0.18,
            damageTick: 0,
            colorA: "#ffe27a",
            colorB: "#ff8fc7",
            burst: mark >= 3
          });
          enemy.hp -= 12 + mark * 8;
          if (enemy.hp <= 0) killEnemy(enemy, "#ffe27a");
        }
        playTone(520, 0.12, "sawtooth", 0.04);
        return;
      }
      const distance = 180;
      const x = player.x + Math.cos(player.angle) * distance;
      const y = player.y + Math.sin(player.angle) * distance;
      fields.push({
        x,
        y,
        r: 34,
        maxR: 172,
        angle: player.angle,
        spin: Math.random() > 0.5 ? 1 : -1,
        pulse: 0,
        life: 4.3,
        max: 4.3,
        damageTick: 0,
        colorA: "#ffe27a",
        colorB: "#8df4ff"
      });
      showTechnique("△ 星雲制圧陣");
      camera.shake = Math.max(camera.shake, 6);
      playTone(260, 0.12, "triangle", 0.035);
    }

    function circleAttack() {
      startGame();
      if (!state.running || state.cooldown.circle > 0) return;
      if (state.star < 56) {
        showTechnique("○ 星力不足");
        playTone(90, 0.09, "square", 0.02);
        return;
      }
      state.star -= 56;
      state.cooldown.circle = 1.0;
      showTechnique("○ 星河決壊");
      const base = player.angle;
      for (let row = -8; row <= 8; row += 1) {
        for (let i = 0; i < 9; i += 1) {
          spawnBullet(
            player.x + Math.cos(base + Math.PI / 2) * row * 10,
            player.y + Math.sin(base + Math.PI / 2) * row * 10,
            base + row * 0.018,
            820 + i * 28,
            18,
            0.9,
            row % 2 ? "#ff8fc7" : "#8df4ff",
            8
          );
        }
      }
      fields.push({
        x: player.x + Math.cos(base) * 270,
        y: player.y + Math.sin(base) * 270,
        r: 80,
        maxR: 260,
        angle: base,
        spin: 1,
        pulse: 0,
        life: 1.45,
        max: 1.45,
        damageTick: 0,
        colorA: "#ff8fc7",
        colorB: "#8df4ff",
        burst: true
      });
      camera.shake = Math.max(camera.shake, 14);
      playTone(95, 0.18, "sawtooth", 0.05);
      if (navigator.vibrate) navigator.vibrate([20, 30, 70]);
    }

    function fireEnemyShot(x, y, angle, speed = 170) {
      enemyShots.push({ x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, r: 5, life: 4, grazed: false });
    }

    function readInput() {
      let x = input.x;
      let y = input.y;
      if (keys.has("arrowleft") || keys.has("a")) x -= 1;
      if (keys.has("arrowright") || keys.has("d")) x += 1;
      if (keys.has("arrowup") || keys.has("w")) y -= 1;
      if (keys.has("arrowdown") || keys.has("s")) y += 1;
      const len = Math.hypot(x, y);
      if (len > 1) return { x: x / len, y: y / len };
      return { x, y };
    }

    function updatePlayer(dt) {
      const move = readInput();
      const speed = 310;
      player.vx += (move.x * speed - player.vx) * (1 - Math.pow(0.0004, dt));
      player.vy += (move.y * speed - player.vy) * (1 - Math.pow(0.0004, dt));
      player.x = Math.max(48, Math.min(W - 48, player.x + player.vx * dt));
      player.y = Math.max(70, Math.min(H - 48, player.y + player.vy * dt));
      if (Math.hypot(player.vx, player.vy) > 22) player.angle = Math.atan2(player.vy, player.vx);
      player.inv = Math.max(0, player.inv - dt);
    }

    function updateEnemies(dt) {
      for (const enemy of [...enemies]) {
        const dx = player.x - enemy.x;
        const dy = player.y - enemy.y;
        const dist = Math.max(0.001, Math.hypot(dx, dy));
        enemy.markTime = Math.max(0, (enemy.markTime || 0) - dt);
        if (enemy.markTime <= 0) enemy.mark = 0;
        const avoid = fields.reduce((push, f) => {
          const fx = enemy.x - f.x;
          const fy = enemy.y - f.y;
          const fd = Math.hypot(fx, fy);
          if (fd < f.r + 28 && fd > 0.001) {
            push.x += (fx / fd) * 110;
            push.y += (fy / fd) * 110;
          }
          return push;
        }, { x: 0, y: 0 });
        enemy.x += ((dx / dist) * enemy.speed + avoid.x + Math.sin(state.time * 2 + enemy.phase) * 24) * dt;
        enemy.y += ((dy / dist) * enemy.speed + avoid.y + Math.cos(state.time * 2.2 + enemy.phase) * 24) * dt;

        enemy.shot -= dt;
        if ((enemy.type === "shot" || enemy.type === "elite") && enemy.shot <= 0) {
          enemy.shot = enemy.type === "elite" ? 1.3 : 1.75;
          fireEnemyShot(enemy.x, enemy.y, Math.atan2(player.y - enemy.y, player.x - enemy.x), enemy.type === "elite" ? 210 : 170);
        }

        if (dist < enemy.r + player.r && player.inv <= 0) {
          player.inv = 0.8;
          state.star = Math.max(0, state.star - 9);
          state.combo = 0;
          camera.shake = Math.max(camera.shake, 12);
          spawnSpark(player.x, player.y, "#ff5d69", 18, 260);
          if (state.star <= 0) endGame(false);
        }
      }
    }

    function updateBoss(dt) {
      if (state.bossHp <= 0 || !state.running) return;
      boss.phase += dt;
      boss.shot -= dt;
      boss.x = W / 2 + Math.sin(boss.phase * 0.8) * 170;
      if (boss.shot <= 0) {
        boss.shot = 1.15;
        const base = Math.atan2(player.y - boss.y, player.x - boss.x);
        for (let i = -3; i <= 3; i += 1) fireEnemyShot(boss.x, boss.y, base + i * 0.18, 190);
      }
    }

    function updateBullets(dt) {
      for (let i = bullets.length - 1; i >= 0; i -= 1) {
        const b = bullets[i];
        b.x += b.vx * dt;
        b.y += b.vy * dt;
        b.life -= dt;
        for (const enemy of [...enemies]) {
          if (Math.hypot(enemy.x - b.x, enemy.y - b.y) < enemy.r + b.size) {
            enemy.hp -= b.damage;
            b.life = 0;
            if (enemy.hp <= 0) killEnemy(enemy, b.color);
            break;
          }
        }
        if (state.bossHp > 0 && Math.hypot(boss.x - b.x, boss.y - b.y) < boss.r + b.size) {
          damageBoss(b.damage * 0.35, b.color);
          b.life = 0;
        }
        if (b.life <= 0 || b.x < -120 || b.x > W + 120 || b.y < -120 || b.y > H + 120) bullets.splice(i, 1);
      }
    }

    function updateFields(dt) {
      for (let i = fields.length - 1; i >= 0; i -= 1) {
        const f = fields[i];
        f.life -= dt;
        f.pulse += dt;
        f.r += (f.maxR - f.r) * (1 - Math.pow(0.001, dt));
        f.angle += f.spin * dt * (f.burst ? 3.2 : 1.7);
        f.damageTick -= dt;
        if (f.damageTick <= 0) {
          f.damageTick = 0.12;
          for (const enemy of [...enemies]) {
            const d = Math.hypot(enemy.x - f.x, enemy.y - f.y);
            if (d < f.r) {
              enemy.hp -= f.burst ? 18 : 11;
              spawnSpark(enemy.x, enemy.y, f.colorA, 3, 90);
              if (enemy.hp <= 0) killEnemy(enemy, f.colorA);
            }
          }
          if (state.bossHp > 0 && Math.hypot(boss.x - f.x, boss.y - f.y) < f.r + boss.r) damageBoss(f.burst ? 8 : 4, f.colorB);
        }
        if (f.life <= 0) {
          spawnSpark(f.x, f.y, f.colorB, f.burst ? 34 : 22, f.burst ? 280 : 210);
          fields.splice(i, 1);
        }
      }
    }

    function updateEnemyShots(dt) {
      for (let i = enemyShots.length - 1; i >= 0; i -= 1) {
        const s = enemyShots[i];
        s.x += s.vx * dt;
        s.y += s.vy * dt;
        s.life -= dt;
        const d = Math.hypot(player.x - s.x, player.y - s.y);
        if (!s.grazed && d < 44 && d > player.r + s.r) {
          s.grazed = true;
          state.star = Math.min(state.maxStar, state.star + 4.2);
          state.grazePulse = 0.28;
          showTechnique("Graze +星力");
          playTone(680, 0.035, "triangle", 0.018);
        }
        if (d < player.r + s.r && player.inv <= 0) {
          player.inv = 0.9;
          state.star = Math.max(0, state.star - 12);
          camera.shake = Math.max(camera.shake, 12);
          spawnSpark(player.x, player.y, "#ff5d69", 18, 260);
          s.life = 0;
          if (state.star <= 0) endGame(false);
        }
        if (s.life <= 0 || s.x < -140 || s.x > W + 140 || s.y < -140 || s.y > H + 140) enemyShots.splice(i, 1);
      }
    }

    function updateSparks(dt) {
      for (let i = sparks.length - 1; i >= 0; i -= 1) {
        const p = sparks[i];
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vx *= Math.pow(0.03, dt);
        p.vy *= Math.pow(0.03, dt);
        p.life -= dt;
        if (p.life <= 0) sparks.splice(i, 1);
      }
    }

    function updateSlashes(dt) {
      for (let i = slashes.length - 1; i >= 0; i -= 1) {
        const slash = slashes[i];
        slash.life -= dt;
        if (slash.life <= 0) slashes.splice(i, 1);
      }
    }

    function update(dt) {
      if (state.running) {
        state.time += dt;
        state.cooldown.square = Math.max(0, state.cooldown.square - dt);
        state.cooldown.triangle = Math.max(0, state.cooldown.triangle - dt);
        state.cooldown.circle = Math.max(0, state.cooldown.circle - dt);
        state.broomTimer = Math.max(0, state.broomTimer - dt);
        if (state.broomTimer <= 0) state.broomStep = 0;
        state.techniqueTimer = Math.max(0, state.techniqueTimer - dt);
        state.grazePulse = Math.max(0, state.grazePulse - dt);
        techniqueEl.classList.toggle("hidden", state.techniqueTimer <= 0);
        updatePlayer(dt);
        updateEnemies(dt);
        updateBoss(dt);
        if (enemies.length < 52) spawnEnemy(state.ko + enemies.length + Math.floor(state.time * 8));
      }
      updateBullets(dt);
      updateFields(dt);
      updateSlashes(dt);
      updateEnemyShots(dt);
      updateSparks(dt);
      camera.shake = Math.max(0, camera.shake - dt * 32);
      camera.x += (player.x - camera.x) * (1 - Math.pow(0.002, dt));
      camera.y += (player.y - camera.y) * (1 - Math.pow(0.002, dt));
      starEl.textContent = `星力 ${Math.floor(state.star)}`;
      koEl.textContent = `KO ${state.ko}`;
      bossEl.textContent = `異変 ${Math.ceil((state.bossHp / state.bossMaxHp) * 100)}%`;
    }

    function worldToScreen(x, y) {
      const viewW = window.innerWidth;
      const viewH = window.innerHeight;
      const shakeX = (rand(state.time * 77) - 0.5) * camera.shake;
      const shakeY = (rand(state.time * 91) - 0.5) * camera.shake;
      return {
        x: x - camera.x + viewW / 2 + shakeX,
        y: y - camera.y + viewH / 2 + shakeY
      };
    }

    function drawStar(x, y, r, color, rot = 0) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(rot);
      ctx.beginPath();
      for (let i = 0; i < 10; i += 1) {
        const a = -Math.PI / 2 + (i / 10) * Math.PI * 2;
        const rr = i % 2 ? r * 0.44 : r;
        ctx.lineTo(Math.cos(a) * rr, Math.sin(a) * rr);
      }
      ctx.closePath();
      ctx.fillStyle = color;
      ctx.fill();
      ctx.restore();
    }

    function drawWorld() {
      const viewW = window.innerWidth;
      const viewH = window.innerHeight;
      const bg = ctx.createLinearGradient(0, 0, 0, viewH);
      bg.addColorStop(0, "#101622");
      bg.addColorStop(0.5, "#173d35");
      bg.addColorStop(1, "#19332d");
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, viewW, viewH);

      const topLeft = worldToScreen(0, 0);
      ctx.save();
      ctx.translate(topLeft.x, topLeft.y);
      ctx.fillStyle = "#374d58";
      ctx.fillRect(W / 2 - 96, 0, 192, H);
      ctx.fillStyle = "#7d2531";
      for (const y of [170, 520, 900]) {
        ctx.fillRect(W / 2 - 165, y - 8, 330, 16);
        ctx.fillRect(W / 2 - 118, y - 8, 18, 82);
        ctx.fillRect(W / 2 + 100, y - 8, 18, 82);
      }
      ctx.fillStyle = "#f2ead7";
      ctx.fillRect(W / 2 - 135, 58, 270, 78);
      ctx.fillStyle = "#291e26";
      ctx.fillRect(W / 2 - 164, 42, 328, 24);
      ctx.fillStyle = "#b92b3a";
      ctx.beginPath();
      ctx.arc(W / 2, 138, 105, 0, Math.PI * 2);
      ctx.globalAlpha = 0.18;
      ctx.fill();
      ctx.globalAlpha = 1;
      for (let i = 0; i < 34; i += 1) {
        const x = rand(i) * W;
        const y = rand(i + 10) * H;
        if (Math.abs(x - W / 2) < 150) continue;
        ctx.fillStyle = "#2db378";
        ctx.beginPath();
        ctx.arc(x, y, 22 + rand(i + 4) * 16, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#7c5438";
        ctx.fillRect(x - 5, y + 12, 10, 24);
      }
      ctx.restore();
    }

    function drawFields() {
      for (const f of fields) {
        const p = worldToScreen(f.x, f.y);
        const alpha = Math.max(0, f.life / f.max);
        ctx.save();
        ctx.globalAlpha = 0.18 + alpha * 0.2;
        const grad = ctx.createRadialGradient(p.x, p.y, 6, p.x, p.y, f.r);
        grad.addColorStop(0, f.colorA);
        grad.addColorStop(0.48, "rgba(141, 244, 255, 0.22)");
        grad.addColorStop(1, "rgba(255, 143, 199, 0)");
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(p.x, p.y, f.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 0.82 * alpha;
        ctx.strokeStyle = f.colorB;
        ctx.lineWidth = f.burst ? 4 : 2;
        ctx.beginPath();
        ctx.arc(p.x, p.y, f.r, 0, Math.PI * 2);
        ctx.stroke();
        for (let i = 0; i < 28; i += 1) {
          const a = f.angle + i * Math.PI * 2 / 28;
          const rr = f.r * (0.35 + (i % 4) * 0.17);
          drawStar(p.x + Math.cos(a) * rr, p.y + Math.sin(a) * rr, f.burst ? 8 : 6, i % 2 ? f.colorA : f.colorB, -a);
        }
        ctx.restore();
      }
    }

    function drawSlashes() {
      for (const slash of slashes) {
        const p = worldToScreen(slash.x, slash.y);
        const alpha = Math.max(0, slash.life / slash.max);
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(slash.angle);
        ctx.globalAlpha = alpha;
        ctx.strokeStyle = slash.step === 3 ? "#ff8fc7" : "#ffe27a";
        ctx.lineWidth = 11 + slash.step * 2;
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.arc(0, 0, slash.range, -slash.width, slash.width);
        ctx.stroke();
        ctx.globalAlpha = alpha * 0.5;
        ctx.strokeStyle = "#ffffff";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(0, 0, slash.range + 10, -slash.width * 0.8, slash.width * 0.8);
        ctx.stroke();
        ctx.restore();
      }
    }

    function drawActors() {
      if (state.bossHp > 0) {
        const b = worldToScreen(boss.x, boss.y);
        ctx.save();
        ctx.fillStyle = "#731f2e";
        ctx.beginPath();
        ctx.arc(b.x, b.y, boss.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "#ff8fc7";
        ctx.lineWidth = 4;
        ctx.stroke();
        drawStar(b.x, b.y - 4, 16, "#ffe27a", state.time);
        ctx.restore();
      }

      for (const enemy of enemies) {
        const p = worldToScreen(enemy.x, enemy.y);
        ctx.fillStyle = enemy.type === "elite" ? "#673149" : enemy.type === "shot" ? "#2e4c65" : "#202833";
        ctx.beginPath();
        ctx.arc(p.x, p.y, enemy.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#ff8fc7";
        ctx.beginPath();
        ctx.arc(p.x + enemy.r * 0.24, p.y - enemy.r * 0.2, enemy.r * 0.35, 0, Math.PI * 2);
        ctx.fill();
        if (enemy.mark > 0 && enemy.markTime > 0) {
          ctx.save();
          ctx.globalAlpha = Math.min(1, 0.42 + enemy.mark * 0.18);
          ctx.strokeStyle = "#ffe27a";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(p.x, p.y, enemy.r + 8 + enemy.mark * 3 + Math.sin(state.time * 9) * 2, 0, Math.PI * 2);
          ctx.stroke();
          for (let i = 0; i < enemy.mark; i += 1) {
            drawStar(p.x - 10 + i * 10, p.y - enemy.r - 11, 5, "#ffe27a", state.time * 5 + i);
          }
          ctx.restore();
        }
      }

      const p = worldToScreen(player.x, player.y);
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(player.angle);
      ctx.globalAlpha = player.inv > 0 ? 0.65 + Math.sin(state.time * 42) * 0.25 : 1;
      ctx.fillStyle = "#ffe27a";
      ctx.beginPath();
      ctx.moveTo(22, 0);
      ctx.lineTo(-16, -15);
      ctx.lineTo(-7, 0);
      ctx.lineTo(-16, 15);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = "#3df0ff";
      ctx.beginPath();
      ctx.arc(-2, 0, 11 + state.grazePulse * 18, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawProjectiles() {
      for (const b of bullets) {
        const p = worldToScreen(b.x, b.y);
        ctx.globalAlpha = Math.max(0.25, b.life / b.max);
        drawStar(p.x, p.y, b.size, b.color, state.time * 10);
      }
      ctx.globalAlpha = 1;
      for (const s of enemyShots) {
        const p = worldToScreen(s.x, s.y);
        ctx.fillStyle = s.grazed ? "#ffcfeb" : "#ff5d69";
        ctx.beginPath();
        ctx.arc(p.x, p.y, s.r, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawSparks() {
      for (const s of sparks) {
        const p = worldToScreen(s.x, s.y);
        ctx.globalAlpha = Math.max(0, s.life / s.max);
        ctx.fillStyle = s.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 2 + (1 - s.life / s.max) * 5, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    function render() {
      ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
      drawWorld();
      drawFields();
      drawSlashes();
      drawProjectiles();
      drawActors();
      drawSparks();
    }

    function frame(now) {
      const dt = Math.min(0.033, (now - last) / 1000);
      last = now;
      update(dt);
      render();
      requestAnimationFrame(frame);
    }

    function setStick(clientX, clientY) {
      const rect = stick.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const dx = clientX - cx;
      const dy = clientY - cy;
      const len = Math.hypot(dx, dy);
      const max = 42;
      const scale = len > max ? max / len : 1;
      const x = dx * scale;
      const y = dy * scale;
      knob.style.transform = `translate(${x}px, ${y}px)`;
      input.x = x / max;
      input.y = y / max;
    }

    function releaseStick() {
      knob.style.transform = "translate(0, 0)";
      input.x = 0;
      input.y = 0;
    }

    document.getElementById("square").addEventListener("pointerdown", (event) => {
      event.preventDefault();
      squareAttack();
    });
    document.getElementById("triangle").addEventListener("pointerdown", (event) => {
      event.preventDefault();
      triangleAttack();
    });
    document.getElementById("circle").addEventListener("pointerdown", (event) => {
      event.preventDefault();
      circleAttack();
    });
    startBtn.addEventListener("click", startGame);
    window.addEventListener("resize", resize);
    window.addEventListener("keydown", (event) => {
      keys.add(event.key.toLowerCase());
      if (event.key === "Enter") startGame();
      if (event.key === " " || event.key.toLowerCase() === "j") {
        event.preventDefault();
        squareAttack();
      }
      if (event.key.toLowerCase() === "k") {
        event.preventDefault();
        triangleAttack();
      }
      if (event.key.toLowerCase() === "l") {
        event.preventDefault();
        circleAttack();
      }
    });
    window.addEventListener("keyup", (event) => keys.delete(event.key.toLowerCase()));
    stick.addEventListener("pointerdown", (event) => {
      stick.setPointerCapture(event.pointerId);
      setStick(event.clientX, event.clientY);
      startGame();
    });
    stick.addEventListener("pointermove", (event) => {
      if (event.buttons) setStick(event.clientX, event.clientY);
    });
    stick.addEventListener("pointerup", releaseStick);
    stick.addEventListener("pointercancel", releaseStick);

    resize();
    resetGame();
    requestAnimationFrame(frame);
  </script>
</body>
</html>
