<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>幻想星力無双 Character Prototype</title>
  <style>
    :root {
      color-scheme: dark;
      --panel: rgba(9, 12, 18, 0.78);
      --line: rgba(226, 242, 255, 0.2);
      --gold: #ffe27a;
      --cyan: #8df4ff;
      --pink: #ff8fc7;
      --red: #ff5d69;
      --ink: #0b1018;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #071018;
      color: #f8fbff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      touch-action: none;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    .hud {
      position: fixed;
      inset: 16px 16px auto 16px;
      z-index: 5;
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 10px;
      pointer-events: none;
    }

    .panel,
    .pill,
    .character,
    .technique {
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: 0 16px 42px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(14px);
    }

    .panel {
      min-width: 220px;
      padding: 13px 15px;
    }

    .panel b {
      display: block;
      font-size: 18px;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .panel span {
      display: block;
      margin-top: 4px;
      color: rgba(244, 250, 255, 0.72);
      font-size: 12px;
    }

    .pill {
      min-width: 90px;
      padding: 12px 13px;
      text-align: right;
      font-size: 18px;
      font-weight: 900;
      white-space: nowrap;
    }

    #ko {
      color: var(--pink);
    }

    #mode {
      color: var(--cyan);
    }

    .character {
      position: fixed;
      left: 50%;
      bottom: max(20px, env(safe-area-inset-bottom));
      z-index: 6;
      width: min(380px, calc(100vw - 230px));
      min-width: 222px;
      transform: translateX(-50%);
      display: grid;
      grid-template-columns: 58px 1fr;
      gap: 12px;
      align-items: center;
      padding: 10px 12px;
      pointer-events: none;
    }

    .portrait {
      width: 58px;
      height: 58px;
      display: grid;
      place-items: center;
      border: 2px solid rgba(255, 226, 122, 0.78);
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 36%, #fff8d8 0 18%, transparent 19%),
        radial-gradient(circle at 48% 55%, #ffe27a 0 9%, transparent 10%),
        linear-gradient(150deg, #2f2335 0 43%, #151d29 44% 100%);
      box-shadow: 0 0 24px rgba(255, 226, 122, 0.26);
      color: var(--gold);
      font-size: 24px;
      font-weight: 900;
    }

    .starText {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 7px;
      color: var(--gold);
      font-size: 13px;
      font-weight: 900;
    }

    #starValue {
      font-size: 20px;
      line-height: 1;
    }

    .bar {
      height: 13px;
      overflow: hidden;
      border: 1px solid rgba(255, 226, 122, 0.4);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.1);
    }

    #starFill {
      width: 100%;
      height: 100%;
      transform-origin: left center;
      background: linear-gradient(90deg, #ffe27a, #8df4ff);
      box-shadow: 0 0 18px rgba(141, 244, 255, 0.36);
    }

    .pad {
      position: fixed;
      right: max(18px, env(safe-area-inset-right));
      bottom: max(18px, env(safe-area-inset-bottom));
      z-index: 7;
      display: grid;
      grid-template-columns: 76px 76px;
      grid-template-rows: 76px 76px;
      gap: 12px;
    }

    button {
      border: 0;
      color: var(--ink);
      font: inherit;
      font-weight: 900;
      cursor: pointer;
    }

    .cmd {
      width: 76px;
      height: 76px;
      border: 2px solid rgba(255, 255, 255, 0.55);
      border-radius: 50%;
      box-shadow: inset 0 10px 22px rgba(255, 255, 255, 0.32), 0 12px 34px rgba(0, 0, 0, 0.34);
      font-size: 29px;
    }

    #triangle {
      grid-column: 1 / span 2;
      justify-self: center;
      background: radial-gradient(circle at 35% 28%, #f1feff 0, #8df4ff 46%, #5c97ff 100%);
    }

    #square {
      background: radial-gradient(circle at 35% 28%, #fff6bf 0, #ffe27a 48%, #ff9d5d 100%);
    }

    #circle {
      background: radial-gradient(circle at 35% 28%, #fff1fb 0, #ff98c8 45%, #c78dff 100%);
    }

    .stick {
      position: fixed;
      left: max(22px, env(safe-area-inset-left));
      bottom: max(30px, env(safe-area-inset-bottom));
      z-index: 7;
      width: 138px;
      height: 138px;
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      background: rgba(10, 13, 19, 0.38);
      box-shadow: inset 0 0 28px rgba(255, 255, 255, 0.08);
    }

    .knob {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 56px;
      height: 56px;
      margin: -28px;
      border-radius: 50%;
      background: #eafaff;
      box-shadow: 0 10px 30px rgba(141, 244, 255, 0.24);
    }

    .technique {
      position: fixed;
      left: 50%;
      bottom: 178px;
      z-index: 6;
      min-width: 220px;
      max-width: calc(100vw - 36px);
      transform: translateX(-50%);
      padding: 12px 18px;
      color: #fff0b4;
      text-align: center;
      font-size: 20px;
      font-weight: 900;
      text-shadow: 0 2px 20px rgba(255, 226, 122, 0.4);
      pointer-events: none;
    }

    .center {
      position: fixed;
      left: 50%;
      top: 50%;
      z-index: 8;
      width: min(430px, calc(100vw - 36px));
      transform: translate(-50%, -50%);
      padding: 22px;
      border: 1px solid var(--line);
      background: rgba(9, 12, 18, 0.88);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.44);
      backdrop-filter: blur(16px);
      text-align: center;
    }

    .center h1 {
      margin: 0;
      font-size: 25px;
      letter-spacing: 0;
    }

    .center p {
      margin: 10px auto 18px;
      max-width: 31em;
      color: rgba(244, 250, 255, 0.74);
      font-size: 14px;
      line-height: 1.6;
    }

    .center button {
      min-width: 112px;
      padding: 12px 18px;
      background: linear-gradient(135deg, #ffe27a, #8df4ff);
      box-shadow: 0 10px 28px rgba(141, 244, 255, 0.18);
    }

    .credits {
      position: fixed;
      right: 14px;
      bottom: 5px;
      z-index: 4;
      color: rgba(255, 255, 255, 0.52);
      font-size: 11px;
      pointer-events: none;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 540px) {
      .hud {
        inset: 12px 12px auto 12px;
        grid-template-columns: 1fr auto;
        gap: 7px;
      }

      .panel {
        grid-row: 1 / span 2;
        min-width: 0;
        padding: 12px;
      }

      .panel b {
        font-size: 17px;
      }

      .pill {
        min-width: 82px;
        padding: 10px;
        font-size: 17px;
      }

      #mode {
        grid-column: 2;
      }

      .character {
        bottom: max(190px, env(safe-area-inset-bottom));
        width: min(300px, calc(100vw - 28px));
      }

      .pad {
        grid-template-columns: 70px 70px;
        grid-template-rows: 70px 70px;
      }

      .cmd {
        width: 70px;
        height: 70px;
      }

      .stick {
        width: 128px;
        height: 128px;
      }
    }
  </style>
</head>
<body>
  <div class="hud">
    <div class="panel">
      <b>幻想星力無双</b>
      <span>original star-witch character prototype</span>
    </div>
    <div class="pill" id="ko">HIT 0</div>
    <div class="pill" id="mode">星魔女</div>
  </div>

  <div class="center" id="startPanel">
    <h1>星魔女を動かす</h1>
    <p>オリジナルの星魔女キャラで、箒連撃、スペルカード、星力ゲージ、大技の見た目を確認するプロトタイプ。</p>
    <button id="start">スタート</button>
  </div>

  <div class="stick" id="stick"><div class="knob" id="knob"></div></div>
  <div class="character">
    <div class="portrait">☆</div>
    <div>
      <div class="starText"><span>星力</span><span id="starValue">8/8</span></div>
      <div class="bar"><div id="starFill"></div></div>
    </div>
  </div>

  <div class="pad">
    <button class="cmd" id="triangle" aria-label="spell card">△</button>
    <button class="cmd" id="square" aria-label="broom attack">□</button>
    <button class="cmd" id="circle" aria-label="star cannon">○</button>
  </div>
  <div class="technique hidden" id="technique"></div>
  <div class="credits">Powered by Three.js</div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";

    const starValueEl = document.getElementById("starValue");
    const starFillEl = document.getElementById("starFill");
    const hitEl = document.getElementById("ko");
    const modeEl = document.getElementById("mode");
    const techniqueEl = document.getElementById("technique");
    const startPanel = document.getElementById("startPanel");
    const startBtn = document.getElementById("start");
    const stick = document.getElementById("stick");
    const knob = document.getElementById("knob");
    const keys = new Set();
    const input = { x: 0, y: 0 };

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x071018);
    scene.fog = new THREE.Fog(0x071018, 26, 72);

    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.prepend(renderer.domElement);

    const camera = new THREE.PerspectiveCamera(47, window.innerWidth / window.innerHeight, 0.1, 120);
    const cameraTarget = new THREE.Vector3();
    const clock = new THREE.Clock();

    const hemi = new THREE.HemisphereLight(0xcaf8ff, 0x17341f, 1.65);
    scene.add(hemi);
    const sun = new THREE.DirectionalLight(0xfff2c6, 2.4);
    sun.position.set(-8, 16, 8);
    sun.castShadow = true;
    sun.shadow.mapSize.set(1024, 1024);
    sun.shadow.camera.left = -28;
    sun.shadow.camera.right = 28;
    sun.shadow.camera.top = 28;
    sun.shadow.camera.bottom = -28;
    scene.add(sun);

    const materials = {
      ground: new THREE.MeshStandardMaterial({ color: 0x17352e, roughness: 0.95 }),
      path: new THREE.MeshStandardMaterial({ color: 0x485e69, roughness: 0.92 }),
      gold: new THREE.MeshStandardMaterial({ color: 0xffd765, metalness: 0.15, roughness: 0.36, emissive: 0x251700 }),
      cyan: new THREE.MeshStandardMaterial({ color: 0x8df4ff, emissive: 0x185a66, roughness: 0.36 }),
      pink: new THREE.MeshStandardMaterial({ color: 0xff8fc7, emissive: 0x40112c, roughness: 0.42 }),
      black: new THREE.MeshStandardMaterial({ color: 0x181923, roughness: 0.76 }),
      dress: new THREE.MeshStandardMaterial({ color: 0xf5d568, roughness: 0.58 }),
      skin: new THREE.MeshStandardMaterial({ color: 0xffd8bd, roughness: 0.55 }),
      hair: new THREE.MeshStandardMaterial({ color: 0xf8e082, roughness: 0.62 }),
      broom: new THREE.MeshStandardMaterial({ color: 0x8a5732, roughness: 0.7 }),
      straw: new THREE.MeshStandardMaterial({ color: 0xe6b957, roughness: 0.78 }),
      enemy: new THREE.MeshStandardMaterial({ color: 0x2d3440, emissive: 0x100000, roughness: 0.6 })
    };

    const state = {
      running: false,
      time: 0,
      star: 8,
      maxStar: 8,
      hits: 0,
      lastAttackTime: -99,
      lastAttackWall: -99,
      cooldown: { square: 0, triangle: 0, circle: 0 },
      action: "idle",
      actionTime: 0,
      actionMax: 1,
      broomStep: 0,
      broomTimer: 0,
      techniqueTimer: 0,
      shake: 0
    };

    const player = {
      group: new THREE.Group(),
      velocity: new THREE.Vector3(),
      angle: Math.PI,
      speed: 8.3
    };

    const rig = {};
    const effects = [];
    const dummies = [];
    let lastWall = performance.now() / 1000;

    function makeMesh(geometry, material, position, rotation, scale, cast = true) {
      const mesh = new THREE.Mesh(geometry, material);
      if (position) mesh.position.set(position[0], position[1], position[2]);
      if (rotation) mesh.rotation.set(rotation[0], rotation[1], rotation[2]);
      if (scale) mesh.scale.set(scale[0], scale[1], scale[2]);
      mesh.castShadow = cast;
      mesh.receiveShadow = !cast;
      return mesh;
    }

    function buildWorld() {
      const ground = makeMesh(new THREE.PlaneGeometry(86, 86), materials.ground, [0, 0, 0], [-Math.PI / 2, 0, 0], null, false);
      ground.receiveShadow = true;
      scene.add(ground);

      const path = makeMesh(new THREE.PlaneGeometry(10, 86), materials.path, [0, 0.012, 0], [-Math.PI / 2, 0, 0], null, false);
      path.receiveShadow = true;
      scene.add(path);

      for (let i = 0; i < 46; i += 1) {
        const a = i * 1.91;
        const r = 16 + (i % 5) * 4.4;
        const x = Math.cos(a) * r + Math.sin(i * 0.7) * 8;
        const z = Math.sin(a) * r + Math.cos(i * 0.4) * 7;
        if (Math.abs(x) < 7) continue;
        const trunk = makeMesh(new THREE.CylinderGeometry(0.12, 0.16, 1.1, 8), materials.broom, [x, 0.55, z], null, null);
        const crown = makeMesh(new THREE.ConeGeometry(0.9 + (i % 3) * 0.18, 1.9, 9), new THREE.MeshStandardMaterial({ color: i % 2 ? 0x22654a : 0x2f7b53, roughness: 0.75 }), [x, 1.85, z], null, null);
        scene.add(trunk, crown);
      }

      for (let i = 0; i < 8; i += 1) {
        const y = -25 + i * 7;
        const rail = makeMesh(new THREE.BoxGeometry(13, 0.12, 0.18), materials.pink, [0, 0.07, y], null, null, false);
        rail.material = rail.material.clone();
        rail.material.emissive = new THREE.Color(0x240715);
        scene.add(rail);
      }
    }

    function buildCharacter() {
      player.group.position.set(0, 0, 9);

      rig.root = new THREE.Group();
      rig.root.position.y = 0;
      player.group.add(rig.root);

      rig.body = makeMesh(new THREE.ConeGeometry(0.58, 1.28, 20), materials.dress, [0, 1.02, 0], null, null);
      rig.body.rotation.x = Math.PI;
      rig.root.add(rig.body);

      rig.torso = makeMesh(new THREE.CapsuleGeometry(0.36, 0.42, 8, 18), materials.black, [0, 1.62, 0], null, [1, 1.05, 0.78]);
      rig.root.add(rig.torso);

      rig.head = makeMesh(new THREE.SphereGeometry(0.35, 24, 16), materials.skin, [0, 2.16, 0], null, null);
      rig.root.add(rig.head);

      const face = makeMesh(new THREE.SphereGeometry(0.055, 12, 8), materials.cyan, [0.17, 2.18, -0.31], null, null);
      const face2 = face.clone();
      face2.position.x = -0.17;
      rig.root.add(face, face2);

      rig.hair = makeMesh(new THREE.SphereGeometry(0.39, 24, 12, 0, Math.PI * 2, 0, Math.PI * 0.62), materials.hair, [0, 2.27, 0.04], [Math.PI, 0, 0], null);
      rig.root.add(rig.hair);

      const braidGeo = new THREE.SphereGeometry(0.16, 14, 10);
      for (let i = 0; i < 4; i += 1) {
        const braid = makeMesh(braidGeo, materials.hair, [0.34, 1.96 - i * 0.22, 0.16 + i * 0.03], null, [1, 0.82, 1]);
        rig.root.add(braid);
      }

      const brim = makeMesh(new THREE.CylinderGeometry(0.62, 0.62, 0.08, 32), materials.black, [0, 2.45, 0], [0.08, 0, 0], [1, 0.38, 1]);
      const cone = makeMesh(new THREE.ConeGeometry(0.46, 0.86, 28), materials.black, [0, 2.91, 0.02], [0.16, 0, 0.1], null);
      const star = makeStarMesh(0.16, materials.gold);
      star.position.set(0.3, 2.63, -0.29);
      star.rotation.set(-0.25, 0, 0.25);
      rig.root.add(brim, cone, star);

      rig.leftArm = makeMesh(new THREE.CapsuleGeometry(0.085, 0.7, 6, 10), materials.skin, [-0.5, 1.56, 0], [0.08, 0, -0.36], null);
      rig.rightArm = makeMesh(new THREE.CapsuleGeometry(0.085, 0.7, 6, 10), materials.skin, [0.5, 1.56, 0], [0.08, 0, 0.36], null);
      rig.leftLeg = makeMesh(new THREE.CapsuleGeometry(0.1, 0.72, 6, 10), materials.black, [-0.19, 0.36, 0], [0.1, 0, 0], null);
      rig.rightLeg = makeMesh(new THREE.CapsuleGeometry(0.1, 0.72, 6, 10), materials.black, [0.19, 0.36, 0], [0.1, 0, 0], null);
      rig.root.add(rig.leftArm, rig.rightArm, rig.leftLeg, rig.rightLeg);

      rig.broom = new THREE.Group();
      const shaft = makeMesh(new THREE.CylinderGeometry(0.045, 0.045, 2.15, 10), materials.broom, [0, 0, 0], [0, 0, Math.PI / 2], null);
      const brush = makeMesh(new THREE.ConeGeometry(0.22, 0.55, 12), materials.straw, [1.22, 0, 0], [0, 0, -Math.PI / 2], [1, 1.4, 1]);
      const starTip = makeStarMesh(0.14, materials.gold);
      starTip.position.set(-1.13, 0, 0);
      rig.broom.add(shaft, brush, starTip);
      rig.broom.position.set(0, 1.34, -0.44);
      rig.broom.rotation.set(0.2, 0.1, -0.18);
      rig.root.add(rig.broom);

      scene.add(player.group);
    }

    function makeStarMesh(radius, material) {
      const shape = new THREE.Shape();
      for (let i = 0; i < 10; i += 1) {
        const a = -Math.PI / 2 + i * Math.PI / 5;
        const r = i % 2 ? radius * 0.43 : radius;
        const x = Math.cos(a) * r;
        const y = Math.sin(a) * r;
        if (i === 0) shape.moveTo(x, y);
        else shape.lineTo(x, y);
      }
      shape.closePath();
      const mesh = new THREE.Mesh(new THREE.ExtrudeGeometry(shape, { depth: 0.035, bevelEnabled: false }), material);
      mesh.castShadow = true;
      return mesh;
    }

    function makeDummies() {
      for (let i = 0; i < 24; i += 1) {
        const row = Math.floor(i / 6);
        const col = i % 6;
        const x = (col - 2.5) * 2.4 + (row % 2) * 1.1;
        const z = -5 - row * 3.0;
        const group = new THREE.Group();
        group.position.set(x, 0, z);
        const body = makeMesh(new THREE.CapsuleGeometry(0.33, 0.55, 8, 12), materials.enemy, [0, 0.72, 0], null, null);
        const eye = makeMesh(new THREE.SphereGeometry(0.06, 10, 8), materials.pink, [0.13, 0.9, -0.3], null, null);
        const eye2 = eye.clone();
        eye2.position.x = -0.13;
        group.add(body, eye, eye2);
        group.userData = { hp: 18, maxHp: 18, hitFlash: 0 };
        scene.add(group);
        dummies.push(group);
      }
    }

    function showTechnique(text) {
      techniqueEl.textContent = text;
      techniqueEl.classList.remove("hidden");
      state.techniqueTimer = 0.9;
      modeEl.textContent = text.replace(/^[□△○]\s*/, "").slice(0, 7);
    }

    function startGame() {
      state.running = true;
      startPanel.classList.add("hidden");
    }

    function readInput() {
      let x = input.x;
      let z = input.y;
      if (keys.has("arrowleft") || keys.has("a")) x -= 1;
      if (keys.has("arrowright") || keys.has("d")) x += 1;
      if (keys.has("arrowup") || keys.has("w")) z -= 1;
      if (keys.has("arrowdown") || keys.has("s")) z += 1;
      const len = Math.hypot(x, z);
      if (len > 1) return { x: x / len, z: z / len };
      return { x, z };
    }

    function squareAttack() {
      startGame();
      if (state.cooldown.square > 0) return;
      state.lastAttackTime = state.time;
      state.lastAttackWall = performance.now() / 1000;
      state.cooldown.square = 0.17;
      state.broomStep = state.broomTimer > 0 ? (state.broomStep % 3) + 1 : 1;
      state.broomTimer = 0.78;
      state.action = "square";
      state.actionTime = 0;
      state.actionMax = 0.24;
      showTechnique(`□ 箒連撃 ${state.broomStep}`);
      spawnSlash(state.broomStep);
      hitDummies(2.2 + state.broomStep * 0.35, 1.15, 4 + state.broomStep * 2, () => {
        if (Math.random() < 0.15) {
          state.star = Math.min(state.maxStar, state.star + 1);
          spawnBurst(player.group.position, 8, materials.cyan);
        }
      });
    }

    function triangleAttack() {
      startGame();
      if (state.cooldown.triangle > 0) return;
      if (state.star < 2) {
        showTechnique("△ 星力不足");
        return;
      }
      state.lastAttackTime = state.time;
      state.lastAttackWall = performance.now() / 1000;
      state.star -= 2;
      state.cooldown.triangle = 0.58;
      state.action = "triangle";
      state.actionTime = 0;
      state.actionMax = 0.72;
      showTechnique("△ 星雲制圧陣");
      const center = forwardPoint(3.2);
      spawnSpellField(center);
      hitDummies(4.2, Math.PI, 8);
    }

    function circleAttack() {
      startGame();
      if (state.cooldown.circle > 0) return;
      if (state.star < 6) {
        showTechnique("○ 星力不足");
        return;
      }
      state.lastAttackTime = state.time;
      state.lastAttackWall = performance.now() / 1000;
      state.star -= 6;
      state.cooldown.circle = 1.15;
      state.action = "circle";
      state.actionTime = 0;
      state.actionMax = 1.05;
      showTechnique("○ 星光砲");
      spawnBeam();
      hitDummies(12, 0.32, 20);
      state.shake = Math.max(state.shake, 0.42);
      if (navigator.vibrate) navigator.vibrate([18, 24, 58]);
    }

    function forwardPoint(distance) {
      return new THREE.Vector3(
        player.group.position.x + Math.sin(player.angle) * distance,
        0.05,
        player.group.position.z + Math.cos(player.angle) * distance
      );
    }

    function hitDummies(range, width, damage, onHit) {
      const origin = player.group.position;
      let hits = 0;
      for (const dummy of dummies) {
        const dx = dummy.position.x - origin.x;
        const dz = dummy.position.z - origin.z;
        const d = Math.hypot(dx, dz);
        if (d > range) continue;
        const a = Math.atan2(dx, dz);
        const delta = Math.atan2(Math.sin(a - player.angle), Math.cos(a - player.angle));
        if (Math.abs(delta) > width) continue;
        dummy.userData.hp -= damage;
        dummy.userData.hitFlash = 0.22;
        hits += 1;
        spawnBurst(dummy.position, 6, materials.gold);
        onHit?.();
        if (dummy.userData.hp <= 0) {
          dummy.userData.hp = dummy.userData.maxHp;
          dummy.position.x = (Math.random() - 0.5) * 14;
          dummy.position.z = -5 - Math.random() * 17;
          spawnBurst(dummy.position, 18, materials.pink);
        }
      }
      if (hits) {
        state.hits += hits;
        state.shake = Math.max(state.shake, Math.min(0.3, hits * 0.025));
      }
    }

    function spawnSlash(step) {
      const group = new THREE.Group();
      const ring = new THREE.Mesh(
        new THREE.TorusGeometry(1.4 + step * 0.25, 0.035 + step * 0.008, 8, 72, Math.PI * 1.1),
        new THREE.MeshBasicMaterial({ color: step === 3 ? 0xff8fc7 : 0xffe27a, transparent: true, opacity: 0.9 })
      );
      ring.rotation.x = Math.PI / 2;
      ring.rotation.z = -0.55;
      group.add(ring);
      const p = forwardPoint(1.55);
      group.position.copy(p);
      group.rotation.y = player.angle;
      scene.add(group);
      effects.push({ obj: group, life: 0.22, max: 0.22, kind: "slash" });
    }

    function spawnSpellField(center) {
      const group = new THREE.Group();
      for (let i = 0; i < 3; i += 1) {
        const ring = new THREE.Mesh(
          new THREE.TorusGeometry(1.4 + i * 0.55, 0.025, 8, 96),
          new THREE.MeshBasicMaterial({ color: i % 2 ? 0x8df4ff : 0xffe27a, transparent: true, opacity: 0.85 })
        );
        ring.rotation.x = Math.PI / 2;
        group.add(ring);
      }
      for (let i = 0; i < 10; i += 1) {
        const star = makeStarMesh(0.13, i % 2 ? materials.cyan : materials.gold);
        const a = i / 10 * Math.PI * 2;
        star.position.set(Math.cos(a) * 1.9, 0.08, Math.sin(a) * 1.9);
        star.rotation.set(-Math.PI / 2, 0, -a);
        group.add(star);
      }
      group.position.copy(center);
      scene.add(group);
      effects.push({ obj: group, life: 1.25, max: 1.25, kind: "field" });
    }

    function spawnBeam() {
      const group = new THREE.Group();
      const beam = new THREE.Mesh(
        new THREE.BoxGeometry(1.2, 0.34, 12),
        new THREE.MeshBasicMaterial({ color: 0x8df4ff, transparent: true, opacity: 0.72 })
      );
      beam.position.z = 6;
      const core = new THREE.Mesh(
        new THREE.BoxGeometry(0.4, 0.52, 12.5),
        new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.9 })
      );
      core.position.z = 6;
      group.add(beam, core);
      group.position.copy(player.group.position);
      group.position.y = 1.18;
      group.rotation.y = player.angle;
      scene.add(group);
      effects.push({ obj: group, life: 0.42, max: 0.42, kind: "beam" });
    }

    function spawnBurst(position, count, material) {
      for (let i = 0; i < count; i += 1) {
        const mesh = new THREE.Mesh(new THREE.SphereGeometry(0.055 + Math.random() * 0.05, 8, 6), material);
        mesh.position.set(position.x, 0.8 + Math.random() * 0.7, position.z);
        mesh.castShadow = true;
        scene.add(mesh);
        const a = Math.random() * Math.PI * 2;
        const s = 1.8 + Math.random() * 4;
        effects.push({
          obj: mesh,
          life: 0.52,
          max: 0.52,
          kind: "spark",
          velocity: new THREE.Vector3(Math.cos(a) * s, 2.2 + Math.random() * 2.5, Math.sin(a) * s)
        });
      }
    }

    function updatePlayer(dt) {
      const move = readInput();
      const moving = Math.hypot(move.x, move.z) > 0.05;
      const targetV = new THREE.Vector3(move.x * player.speed, 0, move.z * player.speed);
      player.velocity.lerp(targetV, 1 - Math.pow(0.0005, dt));
      player.group.position.addScaledVector(player.velocity, dt);
      player.group.position.x = THREE.MathUtils.clamp(player.group.position.x, -18, 18);
      player.group.position.z = THREE.MathUtils.clamp(player.group.position.z, -22, 18);
      if (moving && state.actionTime > state.actionMax * 0.45) {
        player.angle = Math.atan2(move.x, move.z);
      }
      player.group.rotation.y = THREE.MathUtils.lerp(player.group.rotation.y, player.angle, 1 - Math.pow(0.0007, dt));
    }

    function updateRig(dt) {
      const t = state.time;
      const speed = player.velocity.length();
      const moving = speed > 0.4;
      state.actionTime += dt;
      if (state.actionTime > state.actionMax) state.action = moving ? "run" : "idle";

      const bob = Math.sin(t * (moving ? 12 : 3)) * (moving ? 0.08 : 0.035);
      rig.root.position.y = 0.02 + Math.max(0, bob);
      rig.body.rotation.z = Math.sin(t * 2.2) * 0.04;
      rig.head.rotation.z = Math.sin(t * 1.7) * 0.035;
      rig.leftLeg.rotation.x = moving ? Math.sin(t * 12) * 0.55 : 0.08;
      rig.rightLeg.rotation.x = moving ? -Math.sin(t * 12) * 0.55 : 0.08;
      rig.leftArm.rotation.z = -0.34 + (moving ? -Math.sin(t * 12) * 0.18 : Math.sin(t * 2) * 0.05);
      rig.rightArm.rotation.z = 0.34 + (moving ? Math.sin(t * 12) * 0.18 : -Math.sin(t * 2) * 0.05);
      rig.broom.rotation.set(0.2, 0.1, -0.18);
      rig.broom.position.set(0, 1.34, -0.44);

      if (state.action === "square") {
        const p = Math.min(1, state.actionTime / state.actionMax);
        const swing = Math.sin(p * Math.PI);
        rig.root.rotation.z = (state.broomStep - 2) * 0.12 + swing * 0.28;
        rig.rightArm.rotation.z = 1.05 - swing * 1.9;
        rig.leftArm.rotation.z = -0.85 + swing * 1.2;
        rig.broom.position.set(0.08, 1.25, -0.55);
        rig.broom.rotation.set(0.15, 0.25, -1.0 + swing * 2.2);
      } else if (state.action === "triangle") {
        const p = Math.min(1, state.actionTime / state.actionMax);
        rig.root.rotation.z = Math.sin(p * Math.PI) * 0.11;
        rig.leftArm.rotation.z = -1.15;
        rig.rightArm.rotation.z = 1.15;
        rig.broom.position.set(0, 1.56 + Math.sin(p * Math.PI) * 0.35, -0.34);
        rig.broom.rotation.set(0.55, 0.08, 0.0);
      } else if (state.action === "circle") {
        const p = Math.min(1, state.actionTime / state.actionMax);
        rig.root.rotation.x = -Math.sin(p * Math.PI) * 0.08;
        rig.rightArm.rotation.z = 1.35;
        rig.leftArm.rotation.z = -1.35;
        rig.broom.position.set(0, 1.42, -0.72);
        rig.broom.rotation.set(1.05, 0, 0);
      } else {
        rig.root.rotation.set(0, 0, 0);
      }
    }

    function updateDummies(dt) {
      for (const dummy of dummies) {
        dummy.userData.hitFlash = Math.max(0, dummy.userData.hitFlash - dt);
        dummy.position.y = Math.sin(state.time * 2 + dummy.position.x) * 0.04;
        const scale = dummy.userData.hitFlash > 0 ? 1.15 : 1;
        dummy.scale.lerp(new THREE.Vector3(scale, scale, scale), 1 - Math.pow(0.001, dt));
      }
    }

    function updateEffects(dt) {
      for (let i = effects.length - 1; i >= 0; i -= 1) {
        const e = effects[i];
        e.life -= dt;
        const p = Math.max(0, e.life / e.max);
        if (e.kind === "spark") {
          e.velocity.y -= 8.5 * dt;
          e.obj.position.addScaledVector(e.velocity, dt);
          e.obj.scale.setScalar(Math.max(0.2, p));
        } else {
          e.obj.scale.setScalar(0.55 + (1 - p) * (e.kind === "field" ? 1.2 : 0.35));
          e.obj.traverse((child) => {
            if (child.material && "opacity" in child.material) child.material.opacity = Math.min(child.material.opacity, p);
          });
          if (e.kind === "field") e.obj.rotation.y += dt * 1.8;
        }
        if (e.life <= 0) {
          scene.remove(e.obj);
          effects.splice(i, 1);
        }
      }
    }

    function updateUI(dt, wallDt) {
      state.techniqueTimer = Math.max(0, state.techniqueTimer - dt);
      techniqueEl.classList.toggle("hidden", state.techniqueTimer <= 0);
      if (state.techniqueTimer <= 0) modeEl.textContent = player.velocity.length() > 0.4 ? "疾走" : "星魔女";
      const idleTime = performance.now() / 1000 - state.lastAttackWall;
      if (idleTime > 2.4 && state.star < state.maxStar) {
        state.star = Math.min(state.maxStar, state.star + (state.maxStar / 3) * wallDt);
      }
      const shown = Math.max(0, Math.min(state.maxStar, state.star));
      starValueEl.textContent = `${Math.floor(shown)}/${state.maxStar}`;
      starFillEl.style.transform = `scaleX(${shown / state.maxStar})`;
      hitEl.textContent = `HIT ${state.hits}`;
    }

    function updateCamera(dt) {
      cameraTarget.set(player.group.position.x, 1.6, player.group.position.z);
      const shake = state.shake;
      state.shake = Math.max(0, state.shake - dt * 1.8);
      const wanted = new THREE.Vector3(
        player.group.position.x + Math.sin(player.angle + Math.PI) * 5.5 + (Math.random() - 0.5) * shake,
        6.2 + (Math.random() - 0.5) * shake,
        player.group.position.z + Math.cos(player.angle + Math.PI) * 8.2 + 5 + (Math.random() - 0.5) * shake
      );
      camera.position.lerp(wanted, 1 - Math.pow(0.001, dt));
      camera.lookAt(cameraTarget);
    }

    function update(dt, wallDt) {
      if (state.running) {
        state.time += dt;
        state.cooldown.square = Math.max(0, state.cooldown.square - dt);
        state.cooldown.triangle = Math.max(0, state.cooldown.triangle - dt);
        state.cooldown.circle = Math.max(0, state.cooldown.circle - dt);
        state.broomTimer = Math.max(0, state.broomTimer - dt);
        if (state.broomTimer <= 0) state.broomStep = 0;
        updatePlayer(dt);
      }
      updateRig(dt);
      updateDummies(dt);
      updateEffects(dt);
      updateUI(dt, wallDt);
      updateCamera(dt);
    }

    function frame() {
      const rawDt = clock.getDelta();
      const nowWall = performance.now() / 1000;
      const wallDt = Math.min(0.25, nowWall - lastWall);
      lastWall = nowWall;
      const dt = Math.min(0.033, rawDt);
      update(dt, wallDt);
      renderer.render(scene, camera);
      requestAnimationFrame(frame);
    }

    function setStick(clientX, clientY) {
      const rect = stick.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const dx = clientX - cx;
      const dy = clientY - cy;
      const len = Math.hypot(dx, dy);
      const max = 42;
      const scale = len > max ? max / len : 1;
      const x = dx * scale;
      const y = dy * scale;
      knob.style.transform = `translate(${x}px, ${y}px)`;
      input.x = x / max;
      input.y = y / max;
    }

    function releaseStick() {
      knob.style.transform = "translate(0, 0)";
      input.x = 0;
      input.y = 0;
    }

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    window.addEventListener("keydown", (event) => {
      keys.add(event.key.toLowerCase());
      if (event.key === "Enter") startGame();
      if (event.key === " " || event.key.toLowerCase() === "j") {
        event.preventDefault();
        squareAttack();
      }
      if (event.key.toLowerCase() === "k") {
        event.preventDefault();
        triangleAttack();
      }
      if (event.key.toLowerCase() === "l") {
        event.preventDefault();
        circleAttack();
      }
    });
    window.addEventListener("keyup", (event) => keys.delete(event.key.toLowerCase()));

    document.getElementById("square").addEventListener("pointerdown", (event) => {
      event.preventDefault();
      squareAttack();
    });
    document.getElementById("triangle").addEventListener("pointerdown", (event) => {
      event.preventDefault();
      triangleAttack();
    });
    document.getElementById("circle").addEventListener("pointerdown", (event) => {
      event.preventDefault();
      circleAttack();
    });
    startBtn.addEventListener("click", startGame);

    stick.addEventListener("pointerdown", (event) => {
      stick.setPointerCapture(event.pointerId);
      setStick(event.clientX, event.clientY);
      startGame();
    });
    stick.addEventListener("pointermove", (event) => {
      if (event.buttons) setStick(event.clientX, event.clientY);
    });
    stick.addEventListener("pointerup", releaseStick);
    stick.addEventListener("pointercancel", releaseStick);

    buildWorld();
    buildCharacter();
    makeDummies();
    camera.position.set(0, 7, 18);
    camera.lookAt(0, 1.6, 8);
    frame();
  </script>
</body>
</html>
