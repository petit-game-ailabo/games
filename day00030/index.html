<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>幻想星力無双3D</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #11151c;
      color: #f8fafc;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      touch-action: none;
      user-select: none;
    }

    #game {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
    }

    .hud {
      position: fixed;
      inset: max(14px, env(safe-area-inset-top)) 14px auto 14px;
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      gap: 8px;
      align-items: center;
      pointer-events: none;
      z-index: 5;
    }

    .brand,
    .meter,
    .ko,
    .time {
      min-height: 42px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(9, 12, 18, 0.62);
      backdrop-filter: blur(14px);
      border-radius: 8px;
      box-shadow: 0 10px 32px rgba(0, 0, 0, 0.25);
    }

    .brand {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 7px 10px;
      min-width: 0;
    }

    .brand b {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 15px;
      line-height: 1.15;
    }

    .brand span {
      color: #cbd5e1;
      font-size: 11px;
      line-height: 1.2;
    }

    .meter,
    .time {
      display: grid;
      place-items: center;
      min-width: 70px;
      padding: 0 10px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .meter {
      color: #ffdf74;
    }

    .time {
      color: #b9f3ff;
    }

    .ko {
      color: #ff9ec4;
    }

    .center-panel {
      position: fixed;
      left: 50%;
      top: 50%;
      width: min(88vw, 430px);
      transform: translate(-50%, -50%);
      z-index: 6;
      padding: 22px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(10, 14, 20, 0.78);
      backdrop-filter: blur(18px);
      border-radius: 8px;
      box-shadow: 0 22px 70px rgba(0, 0, 0, 0.38);
    }

    .center-panel h1 {
      margin: 0 0 10px;
      font-size: clamp(26px, 8vw, 42px);
      line-height: 1.02;
      letter-spacing: 0;
    }

    .center-panel p {
      margin: 0 0 18px;
      color: #dbe6f3;
      font-size: 15px;
      line-height: 1.55;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      min-height: 48px;
      border: 0;
      border-radius: 8px;
      padding: 0 18px;
      color: #11151c;
      background: #ffdf74;
      font-weight: 800;
      font-size: 15px;
      cursor: pointer;
    }

    button.secondary {
      color: #f8fafc;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.18);
    }

    .stick {
      position: fixed;
      left: 22px;
      bottom: max(22px, env(safe-area-inset-bottom));
      width: 116px;
      height: 116px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(9, 12, 18, 0.42);
      z-index: 4;
      touch-action: none;
    }

    .command-pad {
      position: fixed;
      right: 24px;
      bottom: max(28px, env(safe-area-inset-bottom));
      z-index: 4;
      display: grid;
      grid-template-columns: 72px 72px;
      grid-template-rows: 72px 72px;
      gap: 8px;
      touch-action: none;
    }

    .command {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255, 255, 255, 0.24);
      color: #11151c;
      font-size: 27px;
      font-weight: 900;
      box-shadow: 0 14px 36px rgba(0, 0, 0, 0.34);
      touch-action: none;
      cursor: pointer;
      padding: 0;
    }

    .square {
      grid-column: 1;
      grid-row: 2;
      background: radial-gradient(circle at 35% 28%, #fff3b8 0, #ffdf74 42%, #ff8c5b 100%);
    }

    .triangle {
      grid-column: 1 / span 2;
      grid-row: 1;
      margin: 0 auto;
      background: radial-gradient(circle at 35% 28%, #dffcff 0, #85eaff 42%, #5b8cff 100%);
    }

    .circle {
      grid-column: 2;
      grid-row: 2;
      background: radial-gradient(circle at 35% 28%, #ffe9fa 0, #ff9ec4 42%, #b980ff 100%);
    }

    .technique {
      position: fixed;
      left: 50%;
      top: 88px;
      z-index: 4;
      min-width: min(74vw, 520px);
      transform: translateX(-50%);
      padding: 10px 16px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      background: rgba(9, 12, 18, 0.68);
      color: #fff3b8;
      font-size: 18px;
      font-weight: 900;
      text-align: center;
      text-shadow: 0 2px 14px rgba(0, 0, 0, 0.75);
      pointer-events: none;
    }

    .spell-ready {
      animation: pulse 900ms ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.06); }
    }

    .knob {
      position: absolute;
      left: 38px;
      top: 38px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #e7f8ff;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
    }

    .credits {
      position: fixed;
      right: 16px;
      bottom: max(22px, env(safe-area-inset-bottom));
      z-index: 4;
      max-width: 180px;
      color: #cbd5e1;
      font-size: 12px;
      line-height: 1.45;
      text-align: right;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.75);
      pointer-events: none;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 430px) {
      .hud {
        grid-template-columns: 1fr auto;
      }

      .time {
        grid-column: 2;
      }

      .meter {
        grid-column: 2;
        grid-row: 2;
      }

      .ko {
        grid-column: 2;
        grid-row: 3;
      }

      .brand {
        grid-row: 1 / span 2;
      }

      .credits {
        display: none;
      }
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div class="hud">
    <div class="brand">
      <b>幻想星力無双3D</b>
      <span>danmaku crowd action</span>
    </div>
    <div class="meter" id="score">星 45 / 80</div>
    <div class="ko" id="ko">KO 0</div>
    <div class="time" id="time">士気 50</div>
  </div>
  <div class="center-panel" id="panel">
    <h1>星の魔女で駆けろ</h1>
    <p>参道を突破し、奥の敵武将を倒す。星力を使ってスペルを切り替えろ。</p>
    <div class="actions">
      <button id="start">スタート</button>
      <button class="secondary" id="reset">リセット</button>
    </div>
  </div>
  <div class="stick" id="stick"><div class="knob" id="knob"></div></div>
  <div class="command-pad">
    <button class="command triangle" id="triangle" aria-label="triangle">△</button>
    <button class="command square" id="square" aria-label="square">□</button>
    <button class="command circle" id="circle" aria-label="circle">○</button>
  </div>
  <div class="technique hidden" id="technique"></div>
  <div class="credits">Powered by Three.js</div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";

    const canvas = document.getElementById("game");
    const scoreEl = document.getElementById("score");
    const koEl = document.getElementById("ko");
    const timeEl = document.getElementById("time");
    const panel = document.getElementById("panel");
    const startBtn = document.getElementById("start");
    const resetBtn = document.getElementById("reset");
    const stick = document.getElementById("stick");
    const knob = document.getElementById("knob");
    const squareBtn = document.getElementById("square");
    const triangleBtn = document.getElementById("triangle");
    const circleBtn = document.getElementById("circle");
    const techniqueEl = document.getElementById("technique");

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x11151c);
    scene.fog = new THREE.Fog(0x11151c, 20, 64);

    const camera = new THREE.PerspectiveCamera(48, 1, 0.1, 120);
    camera.position.set(0, 14.5, 20);
    camera.lookAt(0, 0, 0);

    const hemi = new THREE.HemisphereLight(0xb9f3ff, 0x2b1937, 2.2);
    scene.add(hemi);

    const sun = new THREE.DirectionalLight(0xffe0a1, 2.7);
    sun.position.set(-7, 13, 8);
    sun.castShadow = true;
    sun.shadow.mapSize.set(1024, 1024);
    scene.add(sun);

    const arena = new THREE.Group();
    scene.add(arena);

    const materials = {
      grass: new THREE.MeshStandardMaterial({ color: 0x2f9c68, roughness: 0.82 }),
      path: new THREE.MeshStandardMaterial({ color: 0x415466, roughness: 0.95 }),
      shrineRed: new THREE.MeshStandardMaterial({ color: 0xc6283b, roughness: 0.58 }),
      shrineWall: new THREE.MeshStandardMaterial({ color: 0xf3ead8, roughness: 0.82 }),
      roof: new THREE.MeshStandardMaterial({ color: 0x26222b, roughness: 0.7 }),
      wood: new THREE.MeshStandardMaterial({ color: 0x6c4731, roughness: 0.86 }),
      player: new THREE.MeshStandardMaterial({ color: 0xffdf74, roughness: 0.45, metalness: 0.12 }),
      playerAccent: new THREE.MeshStandardMaterial({ color: 0x3be5ff, roughness: 0.35, emissive: 0x064a55 }),
      enemy: new THREE.MeshStandardMaterial({ color: 0x282c36, roughness: 0.86 }),
      enemyMark: new THREE.MeshStandardMaterial({ color: 0xff9ec4, roughness: 0.55, emissive: 0x2c0716 }),
      shield: new THREE.MeshStandardMaterial({ color: 0x54606c, roughness: 0.86 }),
      ranged: new THREE.MeshStandardMaterial({ color: 0x2c4664, roughness: 0.78 }),
      caster: new THREE.MeshStandardMaterial({ color: 0x53376e, roughness: 0.78, emissive: 0x12071c }),
      boss: new THREE.MeshStandardMaterial({ color: 0x731f2e, roughness: 0.7, emissive: 0x22040a }),
      baseRed: new THREE.MeshStandardMaterial({ color: 0xb92b3a, roughness: 0.72 }),
      baseBlue: new THREE.MeshStandardMaterial({ color: 0x4fc3ff, roughness: 0.52, emissive: 0x062632 }),
      talisman: new THREE.MeshBasicMaterial({ color: 0xfff0a6 }),
      slash: new THREE.MeshBasicMaterial({ color: 0xfff0a6, transparent: true, opacity: 0.56, side: THREE.DoubleSide }),
      trunk: new THREE.MeshStandardMaterial({ color: 0x7c5438, roughness: 0.86 }),
      leaf: new THREE.MeshStandardMaterial({ color: 0x2db378, roughness: 0.78 })
    };

    const WORLD = { minX: -16, maxX: 16, minZ: -34, maxZ: 18 };

    const floor = new THREE.Mesh(new THREE.BoxGeometry(35, 1, 58), materials.grass);
    floor.position.y = -0.55;
    floor.position.z = -8;
    floor.receiveShadow = true;
    arena.add(floor);

    const path = new THREE.Mesh(new THREE.BoxGeometry(7.2, 0.12, 48), materials.path);
    path.position.set(0, 0.02, -6);
    path.receiveShadow = true;
    arena.add(path);

    const plaza = new THREE.Mesh(new THREE.TorusGeometry(7.8, 1.05, 8, 64), materials.path);
    plaza.rotation.x = Math.PI / 2;
    plaza.position.set(0, 0.04, 3);
    plaza.receiveShadow = true;
    arena.add(plaza);

    function makeTorii(x, z, s = 1) {
      const torii = new THREE.Group();
      const postGeo = new THREE.BoxGeometry(0.38 * s, 4.2 * s, 0.38 * s);
      const beamGeo = new THREE.BoxGeometry(5.2 * s, 0.42 * s, 0.48 * s);
      const capGeo = new THREE.BoxGeometry(6.2 * s, 0.32 * s, 0.58 * s);
      const left = new THREE.Mesh(postGeo, materials.shrineRed);
      const right = new THREE.Mesh(postGeo, materials.shrineRed);
      const beam = new THREE.Mesh(beamGeo, materials.shrineRed);
      const cap = new THREE.Mesh(capGeo, materials.roof);
      left.position.set(-1.9 * s, 2 * s, 0);
      right.position.set(1.9 * s, 2 * s, 0);
      beam.position.set(0, 3.8 * s, 0);
      cap.position.set(0, 4.25 * s, 0);
      torii.add(left, right, beam, cap);
      torii.position.set(x, 0, z);
      torii.traverse((item) => { if (item.isMesh) item.castShadow = true; });
      arena.add(torii);
    }

    function makeShrine() {
      const shrine = new THREE.Group();
      const base = new THREE.Mesh(new THREE.BoxGeometry(7.5, 2.4, 4.2), materials.shrineWall);
      base.position.y = 1.2;
      const roof = new THREE.Mesh(new THREE.ConeGeometry(5.8, 1.7, 4), materials.roof);
      roof.position.y = 3.0;
      roof.rotation.y = Math.PI / 4;
      const steps = new THREE.Mesh(new THREE.BoxGeometry(8.5, 0.35, 2.4), materials.wood);
      steps.position.set(0, 0.2, 2.7);
      shrine.add(base, roof, steps);
      shrine.position.set(0, 0, -29);
      shrine.traverse((item) => { if (item.isMesh) { item.castShadow = true; item.receiveShadow = true; } });
      arena.add(shrine);
    }

    makeTorii(0, 15, 1);
    makeTorii(0, -7, 0.78);
    makeShrine();

    function makeTree(x, z, s) {
      const tree = new THREE.Group();
      const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.16 * s, 0.22 * s, 1.3 * s, 6), materials.trunk);
      trunk.position.y = 0.55 * s;
      trunk.castShadow = true;
      const leaf = new THREE.Mesh(new THREE.IcosahedronGeometry(0.78 * s, 0), materials.leaf);
      leaf.position.y = 1.45 * s;
      leaf.castShadow = true;
      tree.add(trunk, leaf);
      tree.position.set(x, 0, z);
      arena.add(tree);
    }

    for (let i = 0; i < 26; i += 1) {
      const a = (i / 26) * Math.PI * 2;
      const r = 14.2 + Math.sin(i * 4.1) * 1.1;
      makeTree(Math.cos(a) * r, Math.sin(a) * r, 0.8 + (i % 4) * 0.12);
    }

    const player = new THREE.Group();
    const body = new THREE.Mesh(new THREE.ConeGeometry(0.58, 1.35, 5), materials.player);
    body.position.y = 0.85;
    body.castShadow = true;
    const head = new THREE.Mesh(new THREE.IcosahedronGeometry(0.38, 0), materials.playerAccent);
    head.position.y = 1.65;
    head.castShadow = true;
    const shadowDisc = new THREE.Mesh(new THREE.CylinderGeometry(0.7, 0.7, 0.03, 24), new THREE.MeshBasicMaterial({ color: 0x10151c, transparent: true, opacity: 0.28 }));
    shadowDisc.position.y = 0.03;
    player.add(body, head, shadowDisc);
    scene.add(player);

    const enemies = [];
    const bases = [];
    const talismans = [];
    const slashes = [];
    const particles = [];
    let boss = null;
    const keys = new Set();
    const state = {
      running: false,
      won: false,
      star: 45,
      maxStar: 80,
      morale: 50,
      kills: 0,
      combo: 0,
      spell: 0,
      spawnedEnemies: 0,
      time: 0,
      attackCooldown: 0,
      comboStep: 0,
      comboTimer: 0,
      techniqueTimer: 0,
      spellFlash: 0,
      hitStop: 0,
      screenShake: 0,
      velocity: new THREE.Vector3(),
      input: new THREE.Vector2(),
      lastHit: 0
    };

    let audioContext = null;

    function playTone(freq, duration = 0.055, type = "triangle", gain = 0.035) {
      try {
        audioContext ??= new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioContext.createOscillator();
        const amp = audioContext.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioContext.currentTime);
        amp.gain.setValueAtTime(gain, audioContext.currentTime);
        amp.gain.exponentialRampToValueAtTime(0.0001, audioContext.currentTime + duration);
        osc.connect(amp).connect(audioContext.destination);
        osc.start();
        osc.stop(audioContext.currentTime + duration);
      } catch {
        // Audio feedback is optional; gameplay should continue if Web Audio is unavailable.
      }
    }

    function rand(seed) {
      return Math.abs(Math.sin(seed * 9283.193) * 43758.5453) % 1;
    }

    function placeOnRing(item, index, count, radius, jitter) {
      const a = (index / count) * Math.PI * 2 + rand(index + 3) * 0.4;
      const r = radius + (rand(index + 7) - 0.5) * jitter;
      item.position.set(Math.cos(a) * r, 0, Math.sin(a) * r);
    }

    function makeEnemy(type = "melee") {
      const enemy = new THREE.Group();
      const bodyMat = type === "shield" ? materials.shield : type === "ranged" ? materials.ranged : type === "caster" ? materials.caster : materials.enemy;
      const body = new THREE.Mesh(new THREE.CylinderGeometry(0.28, 0.34, 0.82, 5), bodyMat);
      body.position.y = 0.48;
      body.castShadow = true;
      const head = new THREE.Mesh(new THREE.IcosahedronGeometry(0.23, 0), materials.enemyMark);
      head.position.y = 1.03;
      head.castShadow = true;
      const blade = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.08, 0.72), materials.enemyMark);
      blade.position.set(0.32, 0.66, 0.1);
      blade.rotation.z = 0.5;
      enemy.add(body, head, blade);
      if (type === "shield") {
        const shield = new THREE.Mesh(new THREE.BoxGeometry(0.72, 0.55, 0.12), materials.shield);
        shield.position.set(0, 0.62, 0.34);
        shield.castShadow = true;
        enemy.add(shield);
      }
      if (type === "ranged") {
        const bow = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.08, 0.9), materials.ranged);
        bow.position.set(-0.34, 0.66, 0.04);
        bow.rotation.z = -0.4;
        enemy.add(bow);
      }
      enemy.userData.speed = 1.1 + rand(state.spawnedEnemies + 11) * 0.9;
      enemy.userData.phase = rand(state.spawnedEnemies + 23) * Math.PI * 2;
      enemy.userData.type = type;
      return enemy;
    }

    function spawnEnemy(index = state.spawnedEnemies) {
      const types = ["melee", "melee", "shield", "ranged", "caster"];
      const enemy = makeEnemy(types[index % types.length]);
      const side = rand(index + 37) > 0.5 ? 1 : -1;
      const lane = index < 18 ? 3.8 + rand(index + 41) * 4.4 : 8.5 + rand(index + 43) * 5.2;
      const z = index < 18 ? 10 - rand(index + 47) * 14 : 10 - rand(index + 53) * 38;
      enemy.position.set(side * lane, 0, z);
      enemy.rotation.y = side > 0 ? -Math.PI / 2 : Math.PI / 2;
      scene.add(enemy);
      enemies.push(enemy);
      state.spawnedEnemies += 1;
    }

    function makeBoss() {
      const unit = new THREE.Group();
      const body = new THREE.Mesh(new THREE.CylinderGeometry(0.65, 0.82, 1.9, 6), materials.boss);
      body.position.y = 1;
      body.castShadow = true;
      const head = new THREE.Mesh(new THREE.IcosahedronGeometry(0.44, 0), materials.enemyMark);
      head.position.y = 2.22;
      head.castShadow = true;
      const weapon = new THREE.Mesh(new THREE.BoxGeometry(0.16, 0.16, 2.2), materials.shrineRed);
      weapon.position.set(0.75, 1.2, 0.12);
      weapon.rotation.z = 0.55;
      unit.add(body, head, weapon);
      unit.position.set(0, 0, -25);
      unit.userData.hp = 160;
      unit.userData.maxHp = 160;
      unit.userData.lastAttack = 0;
      unit.traverse((item) => { if (item.isMesh) item.castShadow = true; });
      scene.add(unit);
      boss = unit;
    }

    function makeBase(x, z) {
      const base = new THREE.Group();
      const pad = new THREE.Mesh(new THREE.CylinderGeometry(1.45, 1.45, 0.14, 18), materials.baseRed);
      pad.position.y = 0.08;
      const banner = new THREE.Mesh(new THREE.BoxGeometry(0.16, 1.8, 0.16), materials.wood);
      banner.position.set(0, 0.95, 0);
      const flag = new THREE.Mesh(new THREE.BoxGeometry(1.05, 0.52, 0.06), materials.baseRed);
      flag.position.set(0.52, 1.52, 0);
      base.add(pad, banner, flag);
      base.position.set(x, 0, z);
      base.userData.captured = false;
      arena.add(base);
      bases.push(base);
    }

    function removeObjectList(list) {
      list.forEach((item) => item.parent?.remove(item));
      list.length = 0;
    }

    function killEnemy(enemy, burst = 0xff9ec4) {
      const index = enemies.indexOf(enemy);
      if (index === -1) return;
      const away = enemy.position.clone().sub(player.position).normalize();
      spawnSpark(enemy.position.clone().addScaledVector(away, 0.45), burst, 18, 7);
      spawnSpark(enemy.position, burst);
      scene.remove(enemy);
      enemies.splice(index, 1);
      state.kills += 1;
      state.combo += 1;
      state.star = Math.min(state.maxStar, state.star + 6);
      state.morale = Math.min(100, state.morale + 1);
      state.hitStop = Math.max(state.hitStop, 0.035);
      state.screenShake = Math.max(state.screenShake, 0.18);
      playTone(220 + Math.min(18, state.combo) * 18, 0.045, "square", 0.032);
      if (state.spawnedEnemies < 82) spawnEnemy(state.spawnedEnemies + state.kills);
      if (navigator.vibrate && state.combo % 8 === 0) navigator.vibrate(18);
      checkWin();
    }

    function damageBoss(amount, burst = 0xfff0a6) {
      if (!boss || boss.userData.hp <= 0) return;
      boss.userData.hp = Math.max(0, boss.userData.hp - amount);
      spawnSpark(boss.position.clone().add(new THREE.Vector3(0, 1.2, 0)), burst, 16, 7);
      state.hitStop = Math.max(state.hitStop, 0.05);
      state.screenShake = Math.max(state.screenShake, 0.2);
      state.star = Math.min(state.maxStar, state.star + 4);
      if (boss.userData.hp <= 0) {
        state.morale = 100;
        spawnSpark(boss.position.clone().add(new THREE.Vector3(0, 1, 0)), 0xfff0a6, 40, 11);
        boss.parent?.remove(boss);
        boss = null;
        endGame(true);
      }
    }

    function checkWin() {
      if (!boss) endGame(true);
    }

    function forwardVector() {
      return new THREE.Vector3(Math.sin(player.rotation.y), 0, Math.cos(player.rotation.y));
    }

    function spawnTalisman(angle, speed, life, color = 0xfff0a6) {
      const mesh = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.03, 0.5), materials.talisman.clone());
      mesh.material.color.setHex(color);
      mesh.position.copy(player.position);
      mesh.position.y = 0.75;
      mesh.rotation.y = angle;
      mesh.userData.life = life;
      mesh.userData.vel = new THREE.Vector3(Math.sin(angle) * speed, 0, Math.cos(angle) * speed);
      scene.add(mesh);
      talismans.push(mesh);
    }

    function showTechnique(name) {
      techniqueEl.textContent = name;
      techniqueEl.classList.remove("hidden");
      state.techniqueTimer = 0.72;
    }

    function slashAttack(style = 1) {
      const fwd = forwardVector();
      const origin = player.position.clone();
      const slash = new THREE.Mesh(new THREE.TorusGeometry(1.45 + style * 0.18, 0.035, 6, 40, Math.PI * (1.05 + style * 0.12)), materials.slash.clone());
      slash.position.copy(origin).addScaledVector(fwd, 0.9 + style * 0.12);
      slash.position.y = 0.65;
      slash.rotation.set(Math.PI / 2, 0, -player.rotation.y + 0.62 + style * 0.12);
      slash.userData.life = 0.18;
      scene.add(slash);
      slashes.push(slash);
      state.screenShake = Math.max(state.screenShake, 0.05 + style * 0.02);
      playTone(360 + style * 60, 0.04, "sawtooth", 0.018);

      for (let i = -style; i <= style; i += 1) {
        spawnTalisman(player.rotation.y + i * 0.18, 9.5 + style, 0.32 + style * 0.06, i % 2 ? 0xb9f3ff : 0xfff0a6);
      }

      for (const enemy of [...enemies]) {
        const toEnemy = enemy.position.clone().sub(origin);
        const dist = toEnemy.length();
        if (dist < 2.35 + style * 0.38 && toEnemy.normalize().dot(fwd) > -0.18) {
          killEnemy(enemy, 0xfff0a6);
        }
      }
      if (boss) {
        const toBoss = boss.position.clone().sub(origin);
        if (toBoss.length() < 2.7 + style * 0.42 && toBoss.normalize().dot(fwd) > -0.05) damageBoss(5 + style * 3, 0xfff0a6);
      }
    }

    function stardustBreak() {
      showTechnique("△ 星屑ブレイク");
      const fwd = forwardVector();
      for (let i = -4; i <= 4; i += 1) spawnTalisman(player.rotation.y + i * 0.07, 14, 0.58, 0xfff0a6);
      for (const enemy of [...enemies]) {
        const toEnemy = enemy.position.clone().sub(player.position);
        if (toEnemy.length() < 7.4 && toEnemy.normalize().dot(fwd) > 0.58) killEnemy(enemy, 0xfff0a6);
      }
      if (boss) {
        const toBoss = boss.position.clone().sub(player.position);
        if (toBoss.length() < 8.2 && toBoss.normalize().dot(fwd) > 0.5) damageBoss(18, 0xfff0a6);
      }
    }

    function cometSweep() {
      showTechnique("△ 彗星スイープ");
      for (let i = -8; i <= 8; i += 1) spawnTalisman(player.rotation.y + i * 0.16, 11.2, 0.54, i % 2 ? 0xff9ec4 : 0xb9f3ff);
      for (const enemy of [...enemies]) {
        if (enemy.position.distanceTo(player.position) < 4.8) killEnemy(enemy, 0xff9ec4);
      }
      if (boss && boss.position.distanceTo(player.position) < 5.3) damageBoss(16, 0xff9ec4);
    }

    function milkyOrbit() {
      showTechnique("△ 天河オービット");
      for (let i = 0; i < 24; i += 1) spawnTalisman(player.rotation.y + (i / 24) * Math.PI * 2, 9.6, 0.78, i % 2 ? 0xfff0a6 : 0xb9f3ff);
      for (const enemy of [...enemies]) {
        if (enemy.position.distanceTo(player.position) < 6.6) killEnemy(enemy, 0xb9f3ff);
      }
      if (boss && boss.position.distanceTo(player.position) < 7.2) damageBoss(22, 0xb9f3ff);
    }

    function circleBurst() {
      state.spellFlash = 0.55;
      showTechnique("○ 星光砲");
      const fwd = forwardVector();
      for (let row = -3; row <= 3; row += 1) {
        for (let i = 0; i < 7; i += 1) {
          spawnTalisman(player.rotation.y + row * 0.035, 17 + i * 0.3, 0.76, row % 2 ? 0xfff0a6 : 0xb9f3ff);
        }
      }
      for (const enemy of [...enemies]) {
        const toEnemy = enemy.position.clone().sub(player.position);
        if (toEnemy.length() < 14 && toEnemy.normalize().dot(fwd) > 0.42) killEnemy(enemy, 0xb9f3ff);
      }
      if (boss) {
        const toBoss = boss.position.clone().sub(player.position);
        if (toBoss.length() < 17 && toBoss.normalize().dot(fwd) > 0.35) damageBoss(46, 0xb9f3ff);
      }
      spawnSpark(player.position, 0xfff0a6);
      state.hitStop = Math.max(state.hitStop, 0.08);
      state.screenShake = Math.max(state.screenShake, 0.42);
      playTone(95, 0.18, "sawtooth", 0.05);
      if (navigator.vibrate) navigator.vibrate([25, 25, 60]);
    }

    function squareAttack() {
      startGame();
      if (!state.running || state.attackCooldown > 0) return;
      state.comboStep = state.comboTimer > 0 ? (state.comboStep % 4) + 1 : 1;
      state.comboTimer = 0.82;
      state.attackCooldown = 0.2;
      state.star = Math.min(state.maxStar, state.star + 3);
      showTechnique(`□ ${state.comboStep}段`);
      slashAttack(state.comboStep);
      if (state.comboStep === 4) {
        for (let i = -5; i <= 5; i += 1) spawnTalisman(player.rotation.y + i * 0.12, 12.6, 0.52, 0xff9ec4);
      }
      updateHud();
    }

    function triangleAttack() {
      startGame();
      if (!state.running || state.attackCooldown > 0) return;
      const direction = readInput();
      const cost = 14;
      if (state.star < cost) {
        showTechnique("△ 星力不足");
        playTone(120, 0.08, "square", 0.02);
        return;
      }
      state.star -= cost;
      state.attackCooldown = 0.46;
      state.comboTimer = 0;
      state.comboStep = 0;
      if (direction.z < -0.45) stardustBreak();
      else if (Math.abs(direction.x) > 0.45) cometSweep();
      else if (direction.z > 0.45) milkyOrbit();
      else cometSweep();
      updateHud();
    }

    function circleAttack() {
      startGame();
      if (!state.running || state.attackCooldown > 0) return;
      if (state.star >= 70) {
        state.attackCooldown = 0.72;
        state.star -= 70;
        circleBurst();
      } else {
        state.attackCooldown = 0.26;
        showTechnique("○ 星力が足りない");
        playTone(90, 0.08, "square", 0.02);
      }
      updateHud();
    }

    function resetWorld() {
      removeObjectList(enemies);
      removeObjectList(bases);
      removeObjectList(talismans);
      removeObjectList(slashes);
      removeObjectList(particles);
      boss?.parent?.remove(boss);
      boss = null;

      player.position.set(0, 0, 14);
      player.rotation.set(0, 0, 0);
      state.running = false;
      state.won = false;
      state.star = 45;
      state.maxStar = 80;
      state.morale = 50;
      state.kills = 0;
      state.combo = 0;
      state.spawnedEnemies = 0;
      state.time = 0;
      state.attackCooldown = 0;
      state.comboStep = 0;
      state.comboTimer = 0;
      state.techniqueTimer = 0;
      state.spellFlash = 0;
      state.hitStop = 0;
      state.screenShake = 0;
      state.velocity.set(0, 0, 0);
      state.input.set(0, 0);
      panel.classList.remove("hidden");
      panel.querySelector("h1").textContent = "星の魔女で駆けろ";
      panel.querySelector("p").textContent = "参道を突破し、奥の敵武将を倒す。星力を使ってスペルを切り替えろ。";

      makeBase(-5.8, 2);
      makeBase(5.6, -12);
      makeBoss();
      for (let i = 0; i < 30; i += 1) spawnEnemy(i);

      updateHud();
    }

    function updateHud() {
      scoreEl.textContent = `星 ${Math.floor(state.star)} / ${state.maxStar}`;
      koEl.textContent = `KO ${state.kills}`;
      timeEl.textContent = `士気 ${Math.floor(state.morale)}`;
      circleBtn.classList.toggle("spell-ready", state.star >= 70);
      circleBtn.style.opacity = state.star >= 70 ? "1" : "0.72";
    }

    function startGame() {
      if (state.won) resetWorld();
      state.running = true;
      panel.classList.add("hidden");
    }

    function endGame(won) {
      state.running = false;
      state.won = won;
      panel.classList.remove("hidden");
      panel.querySelector("h1").textContent = won ? "敵武将撃破！" : "士気崩壊";
      panel.querySelector("p").textContent = won
        ? "参道を突破して敵将を討ち取った。次は武将戦の駆け引きを濃くする。"
        : "拠点を取り返し、星力を切らさず押し返せばまだ戦える。";
    }

    function spawnSpark(position, color, count = 12, force = 5) {
      const geo = new THREE.IcosahedronGeometry(0.08, 0);
      for (let i = 0; i < count; i += 1) {
        const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 1 });
        const dot = new THREE.Mesh(geo, mat);
        dot.position.copy(position);
        dot.userData.life = 0.55;
        dot.userData.vel = new THREE.Vector3((rand(i + position.x) - 0.5) * force, rand(i + 9) * (2.6 + force * 0.18), (rand(i + position.z) - 0.5) * force);
        scene.add(dot);
        particles.push(dot);
      }
    }

    function readInput() {
      let x = state.input.x;
      let y = state.input.y;
      if (keys.has("arrowleft") || keys.has("a")) x -= 1;
      if (keys.has("arrowright") || keys.has("d")) x += 1;
      if (keys.has("arrowup") || keys.has("w")) y -= 1;
      if (keys.has("arrowdown") || keys.has("s")) y += 1;
      const v = new THREE.Vector3(x, 0, y);
      if (v.lengthSq() > 1) v.normalize();
      return v;
    }

    function updatePlayer(dt) {
      const input = readInput();
      const targetSpeed = 8.8;
      state.velocity.lerp(input.multiplyScalar(targetSpeed), 1 - Math.pow(0.0008, dt));
      player.position.addScaledVector(state.velocity, dt);

      player.position.x = THREE.MathUtils.clamp(player.position.x, WORLD.minX + 1.2, WORLD.maxX - 1.2);
      player.position.z = THREE.MathUtils.clamp(player.position.z, WORLD.minZ + 1.2, WORLD.maxZ - 1.2);

      if (state.velocity.lengthSq() > 0.05) {
        player.rotation.y = Math.atan2(state.velocity.x, state.velocity.z);
      }

      body.rotation.z = Math.sin(performance.now() / 95) * 0.08 * Math.min(1, state.velocity.length() / targetSpeed);
    }

    function updateEnemies(dt, time) {
      for (const enemy of [...enemies]) {
        const toPlayer = player.position.clone().sub(enemy.position);
        const dist = Math.max(0.001, toPlayer.length());
        const dir = toPlayer.multiplyScalar(1 / dist);
        const orbit = new THREE.Vector3(-dir.z, 0, dir.x).multiplyScalar(Math.sin(time * 1.7 + enemy.userData.phase) * 0.48);
        const preferred = enemy.userData.type === "ranged" ? 6.2 : enemy.userData.type === "caster" ? 5.2 : 2.2;
        const speed = enemy.userData.speed * (dist > preferred ? 1 : -0.55);
        enemy.position.addScaledVector(dir.add(orbit).normalize(), dt * speed);
        enemy.rotation.y = Math.atan2(dir.x, dir.z);
        enemy.children[0].rotation.z = Math.sin(time * 7 + enemy.userData.phase) * 0.12;

        if (state.running && performance.now() - state.lastHit > 650 && dist < 0.95) {
          state.lastHit = performance.now();
          state.morale = Math.max(0, state.morale - 2);
          state.combo = 0;
          state.velocity.addScaledVector(dir, 2.5);
          spawnSpark(player.position, 0xff9ec4);
        }
      }
    }

    function updateBoss(dt, time) {
      if (!boss || !state.running) return;
      const toPlayer = player.position.clone().sub(boss.position);
      const dist = Math.max(0.001, toPlayer.length());
      const dir = toPlayer.multiplyScalar(1 / dist);
      if (dist < 15 && dist > 3.2) {
        boss.position.addScaledVector(dir, dt * 1.8);
      }
      boss.rotation.y = Math.atan2(dir.x, dir.z);
      boss.children[2].rotation.z = 0.55 + Math.sin(time * 5) * 0.24;
      if (dist < 3.2 && time - boss.userData.lastAttack > 1.25) {
        boss.userData.lastAttack = time;
        state.morale = Math.max(0, state.morale - 7);
        state.velocity.addScaledVector(dir, 5);
        state.screenShake = Math.max(state.screenShake, 0.22);
        spawnSpark(player.position, 0xc6283b, 18, 7);
        showTechnique(`敵武将 ${Math.ceil((boss.userData.hp / boss.userData.maxHp) * 100)}%`);
      }
    }

    function updateBases() {
      for (const base of bases) {
        if (base.userData.captured) continue;
        const nearEnemies = enemies.some((enemy) => enemy.position.distanceTo(base.position) < 4.2);
        if (!nearEnemies && player.position.distanceTo(base.position) < 2.4) {
          base.userData.captured = true;
          base.children[0].material = materials.baseBlue;
          base.children[2].material = materials.baseBlue;
          state.morale = Math.min(100, state.morale + 18);
          state.star = Math.min(state.maxStar, state.star + 18);
          spawnSpark(base.position.clone().add(new THREE.Vector3(0, 1, 0)), 0x4fc3ff, 24, 8);
          showTechnique("拠点制圧");
        }
      }
    }

    function updateTalismans(dt) {
      for (let i = talismans.length - 1; i >= 0; i -= 1) {
        const talisman = talismans[i];
        talisman.userData.life -= dt;
        talisman.position.addScaledVector(talisman.userData.vel, dt);
        talisman.rotation.y += dt * 8;

        for (const enemy of [...enemies]) {
          if (enemy.position.distanceTo(talisman.position) < 0.8) {
            killEnemy(enemy, talisman.material.color.getHex());
            talisman.userData.life = 0;
            break;
          }
        }
        if (boss && boss.position.distanceTo(talisman.position) < 1.45) {
          damageBoss(4, talisman.material.color.getHex());
          talisman.userData.life = 0;
        }

        if (talisman.userData.life <= 0) {
          scene.remove(talisman);
          talismans.splice(i, 1);
        }
      }
    }

    function updateSlashes(dt) {
      for (let i = slashes.length - 1; i >= 0; i -= 1) {
        const slash = slashes[i];
        slash.userData.life -= dt;
        slash.scale.multiplyScalar(1 + dt * 3.6);
        slash.material.opacity = Math.max(0, slash.userData.life / 0.18) * 0.56;
        if (slash.userData.life <= 0) {
          scene.remove(slash);
          slashes.splice(i, 1);
        }
      }
    }

    function updateParticles(dt) {
      for (let i = particles.length - 1; i >= 0; i -= 1) {
        const p = particles[i];
        p.userData.life -= dt;
        p.position.addScaledVector(p.userData.vel, dt);
        p.userData.vel.y -= 7 * dt;
        p.material.opacity = Math.max(0, p.userData.life / 0.55);
        if (p.userData.life <= 0) {
          scene.remove(p);
          particles.splice(i, 1);
        }
      }
    }

    function resize() {
      const width = window.innerWidth;
      const height = window.innerHeight;
      renderer.setSize(width, height, false);
      camera.aspect = width / height;
      camera.updateProjectionMatrix();
    }

    let last = performance.now();
    function frame(now) {
      const dt = Math.min(0.033, (now - last) / 1000);
      last = now;
      const t = now / 1000;
      let simDt = dt;

      if (state.hitStop > 0) {
        state.hitStop = Math.max(0, state.hitStop - dt);
        simDt = 0;
      }

      if (state.running) {
        state.time += simDt;
        state.attackCooldown = Math.max(0, state.attackCooldown - simDt);
        state.comboTimer = Math.max(0, state.comboTimer - simDt);
        if (state.comboTimer <= 0) state.comboStep = 0;
        state.techniqueTimer = Math.max(0, state.techniqueTimer - simDt);
        techniqueEl.classList.toggle("hidden", state.techniqueTimer <= 0);
        state.spellFlash = Math.max(0, state.spellFlash - simDt);
        state.screenShake = Math.max(0, state.screenShake - dt);
        updatePlayer(simDt);
        updateBases();
        if (state.morale <= 0 && !state.won) endGame(false);
      }

      updateEnemies(simDt, t);
      updateBoss(simDt, t);
      updateTalismans(simDt);
      updateSlashes(dt);
      updateParticles(dt);
      arena.rotation.y = 0;
      scene.fog.color.setHex(state.spellFlash > 0 ? 0x2b1436 : 0x11151c);
      const shake = state.screenShake > 0 ? state.screenShake * 0.32 : 0;
      camera.position.x = player.position.x * 0.35 + (rand(t * 91) - 0.5) * shake;
      camera.position.z = 18 + player.position.z * 0.45 + (rand(t * 103) - 0.5) * shake;
      camera.position.y = 14.5 + (rand(t * 87) - 0.5) * shake;
      camera.lookAt(player.position.x * 0.35, 0.5, player.position.z * 0.45 - 4.5);
      updateHud();
      renderer.render(scene, camera);
      requestAnimationFrame(frame);
    }

    function setStick(clientX, clientY) {
      const rect = stick.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const dx = clientX - cx;
      const dy = clientY - cy;
      const len = Math.hypot(dx, dy);
      const max = 38;
      const scale = len > max ? max / len : 1;
      const x = dx * scale;
      const y = dy * scale;
      knob.style.transform = `translate(${x}px, ${y}px)`;
      state.input.set(x / max, y / max);
    }

    function releaseStick() {
      knob.style.transform = "translate(0, 0)";
      state.input.set(0, 0);
    }

    startBtn.addEventListener("click", startGame);
    resetBtn.addEventListener("click", resetWorld);
    squareBtn.addEventListener("pointerdown", (event) => {
      event.preventDefault();
      squareAttack();
    });
    triangleBtn.addEventListener("pointerdown", (event) => {
      event.preventDefault();
      triangleAttack();
    });
    circleBtn.addEventListener("pointerdown", (event) => {
      event.preventDefault();
      circleAttack();
    });
    window.addEventListener("resize", resize);
    window.addEventListener("keydown", (event) => {
      keys.add(event.key.toLowerCase());
      if (event.key === "Enter") startGame();
      if (event.key === " " || event.key.toLowerCase() === "j") {
        event.preventDefault();
        squareAttack();
      }
      if (event.key.toLowerCase() === "k") {
        event.preventDefault();
        triangleAttack();
      }
      if (event.key.toLowerCase() === "l") {
        event.preventDefault();
        circleAttack();
      }
    });
    window.addEventListener("keyup", (event) => keys.delete(event.key.toLowerCase()));
    stick.addEventListener("pointerdown", (event) => {
      stick.setPointerCapture(event.pointerId);
      setStick(event.clientX, event.clientY);
      startGame();
    });
    stick.addEventListener("pointermove", (event) => {
      if (event.buttons) setStick(event.clientX, event.clientY);
    });
    stick.addEventListener("pointerup", releaseStick);
    stick.addEventListener("pointercancel", releaseStick);

    resize();
    resetWorld();
    requestAnimationFrame(frame);
  </script>
</body>
</html>
