<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ぷちゲーム部-AIラボ</title>
    <meta name="description" content="毎日新しいミニゲームをお届けします🎮 AI自動生成ゲーム">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        h1 {
            font-size: 3em;
            margin-bottom: 10px;
        }
        
        .emoji {
            font-size: 1.5em;
        }
        
        .tagline {
            font-size: 1.2em;
            opacity: 0.9;
        }
        
        .latest-game {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            text-align: center;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }
        
        .latest-game h2 {
            margin-bottom: 20px;
            font-size: 2em;
        }
        
        .play-button {
            display: inline-block;
            background: #fff;
            color: #667eea;
            padding: 15px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2em;
            transition: transform 0.2s;
        }
        
        .play-button:hover {
            transform: scale(1.05);
        }
        
        .game-list {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }
        
        .game-list h2 {
            margin-bottom: 20px;
        }
        
        .game-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .game-item a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }
        
        .game-item a:hover {
            text-decoration: underline;
        }
        
        .date {
            opacity: 0.7;
            font-size: 0.9em;
        }
        
        footer {
            text-align: center;
            margin-top: 40px;
            opacity: 0.7;
        }
        
        footer a {
            color: white;
            margin: 0 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><span class="emoji">🎮</span> ぷちゲーム部-AIラボ</h1>
            <p class="tagline">毎日新しいミニゲームをお届けします</p>
        </header>
        
        <div class="latest-game">
            <h2>📅 今日のゲーム</h2>
            <p id="latest-info">読み込み中...</p>
            <br>
            <a href="#" id="play-link" class="play-button">プレイする 🎮</a>
        </div>
        
        <div class="game-list">
            <h2>🕐 過去のゲーム</h2>
            <div id="game-list-content">
                <p>過去のゲームはこちらに表示されます...</p>
            </div>
        </div>
        
        <footer>
            <p>Powered by <a href="https://phaser.io/" target="_blank">Phaser.js</a></p>
            <p>
                <a href="https://twitter.com/TodaysMinigame" target="_blank">Twitter</a> |
                <a href="https://youtube.com/@TodaysMinigame" target="_blank">YouTube</a>
            </p>
        </footer>
    </div>
    
    <script>
        // ゲームリスト（自動更新）
        const games = [
            { day: 'day00001', title: 'タップゲーム' },
            { day: 'day00002', title: 'タップゲーム v2' },
            { day: 'day00003', title: '避けゲー' },
            { day: 'day00004', title: '品質管理ゲーム' },
            { day: 'day00005', title: 'リズムタップ' },
            { day: 'day00006', title: 'グラビティスイッチ' },
            { day: 'day00007', title: '屋根ラン' },
            { day: 'day00008', title: 'ヘックス制圧' }
        ];
        
        // day番号を人が読みやすい形式に変換
        function formatDayNumber(dayStr) {
            const num = parseInt(dayStr.replace('day', ''));
            return `${num}日目`;
        }
        
        // 最新ゲームへのリンク
        const playLink = document.getElementById('play-link');
        const latestInfo = document.getElementById('latest-info');
        
        if (games.length > 0) {
            const latestGame = games[games.length - 1];
            playLink.href = `./${latestGame.day}/`;
            latestInfo.textContent = `${formatDayNumber(latestGame.day)}: ${latestGame.title}`;
        } else {
            playLink.href = '#';
            latestInfo.textContent = 'ゲームを準備中...';
        }
        
        // ゲーム一覧表示（新しい順）
        const gameListContent = document.getElementById('game-list-content');
        if (games.length > 0) {
            gameListContent.innerHTML = games.slice().reverse().map(game => `
                <div class="game-item">
                    <div>
                        <a href="./${game.day}/">${game.title}</a>
                    </div>
                    <div class="date">${formatDayNumber(game.day)}</div>
                </div>
            `).join('');
        } else {
            gameListContent.innerHTML = '<p>ゲームはまだありません...</p>';
        }
    </script>
</body>
</html>
