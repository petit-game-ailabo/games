<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Bloom Battle - プロトタイプ</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
  background: #1a1a2e; color: #eee; font-family: 'Helvetica Neue', Arial, sans-serif;
  display: flex; justify-content: center; align-items: center; min-height: 100vh;
  overflow: hidden;
}
#game { width: 420px; max-width: 100vw; padding: 12px; }

/* Header */
.stage-info { text-align: center; margin-bottom: 10px; font-size: 14px; color: #aaa; }
.stage-info .stage-num { font-size: 20px; font-weight: bold; color: #f0c060; }

/* Enemy */
.enemy-area { 
  background: #2a1a3a; border-radius: 12px; padding: 16px; margin-bottom: 12px;
  text-align: center; border: 1px solid #4a2a6a;
}
.enemy-name { font-size: 18px; font-weight: bold; color: #ff6b8a; margin-bottom: 8px; }
.enemy-emoji { font-size: 48px; margin: 8px 0; }
.hp-bar-container { background: #333; border-radius: 8px; height: 18px; position: relative; overflow: hidden; }
.hp-bar { height: 100%; border-radius: 8px; transition: width 0.5s ease; }
.hp-bar.enemy { background: linear-gradient(90deg, #ff4466, #ff6b8a); }
.hp-text { position: absolute; top: 0; left: 0; right: 0; text-align: center; font-size: 12px; line-height: 18px; font-weight: bold; }

/* Allies */
.allies-area { display: flex; gap: 6px; margin-bottom: 12px; }
.ally-card {
  flex: 1; background: #1e2d1e; border-radius: 10px; padding: 10px 6px;
  text-align: center; border: 2px solid #3a5a3a; transition: all 0.3s; cursor: pointer;
  min-width: 0;
}
.ally-card.selected { border-color: #80ff80; box-shadow: 0 0 12px rgba(128,255,128,0.3); }
.ally-card.dead { opacity: 0.3; border-color: #555; cursor: default; }
.ally-card.acting { border-color: #ffdd57; }
.ally-name { font-size: 13px; font-weight: bold; margin-bottom: 4px; white-space: nowrap; overflow: hidden; }
.ally-emoji { font-size: 28px; }
.bloom-stage { font-size: 11px; color: #f0c060; margin: 4px 0; }
.ally-hp-bar { background: #333; border-radius: 4px; height: 10px; margin-top: 4px; position: relative; overflow: hidden; }
.ally-hp-bar .hp-bar { background: linear-gradient(90deg, #44cc66, #80ff80); }
.ally-hp-bar .hp-text { font-size: 9px; line-height: 10px; }

/* Commands */
.command-area { 
  background: #16213e; border-radius: 12px; padding: 14px; margin-bottom: 10px;
  border: 1px solid #1a3a5e;
}
.command-label { font-size: 12px; color: #888; margin-bottom: 8px; }
.commands { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.cmd-btn {
  padding: 12px 8px; border-radius: 8px; border: 2px solid #3a5a8a;
  background: #1a2a4a; color: #eee; font-size: 14px; font-weight: bold;
  cursor: pointer; transition: all 0.2s; text-align: center;
}
.cmd-btn:hover:not(:disabled) { background: #2a3a5a; border-color: #5a8abb; }
.cmd-btn:active:not(:disabled) { transform: scale(0.95); }
.cmd-btn:disabled { opacity: 0.3; cursor: default; }
.cmd-btn.bloom-btn { border-color: #8a5a3a; background: #3a2a1a; }
.cmd-btn.bloom-btn:hover:not(:disabled) { background: #4a3a2a; border-color: #bb8a5a; }

/* Log */
.log-area {
  background: #111; border-radius: 8px; padding: 10px; height: 120px;
  overflow-y: auto; font-size: 12px; line-height: 1.6;
}
.log-area .dmg { color: #ff6b6b; }
.log-area .heal { color: #6bff6b; }
.log-area .bloom-log { color: #ffcc44; }
.log-area .info { color: #88aacc; }
.log-area .dead { color: #888; }

/* Overlay */
.overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.85); display: flex; justify-content: center;
  align-items: center; z-index: 100; flex-direction: column;
}
.overlay h2 { font-size: 28px; margin-bottom: 12px; }
.overlay p { font-size: 16px; color: #aaa; margin-bottom: 20px; text-align: center; line-height: 1.6; }
.overlay button {
  padding: 14px 40px; border-radius: 10px; border: none;
  background: #f0c060; color: #1a1a2e; font-size: 18px; font-weight: bold;
  cursor: pointer;
}
.overlay button:hover { background: #ffdd88; }

.hidden { display: none !important; }

/* Bloom animation */
@keyframes bloomFlash {
  0% { filter: brightness(1); }
  50% { filter: brightness(2) saturate(2); }
  100% { filter: brightness(1); }
}
.bloom-anim { animation: bloomFlash 0.6s ease; }

/* Damage flash */
@keyframes damageFlash {
  0%, 100% { opacity: 1; }
  25%, 75% { opacity: 0.3; }
}
.damage-anim { animation: damageFlash 0.4s ease; }
</style>
</head>
<body>

<div id="game">
  <!-- Stage Info -->
  <div class="stage-info">
    STAGE <span class="stage-num" id="stageNum">1</span> / 3
  </div>

  <!-- Enemy -->
  <div class="enemy-area">
    <div class="enemy-name" id="enemyName">スライム</div>
    <div class="enemy-emoji" id="enemyEmoji">👾</div>
    <div class="hp-bar-container">
      <div class="hp-bar enemy" id="enemyHpBar" style="width:100%"></div>
      <div class="hp-text" id="enemyHpText">100 / 100</div>
    </div>
  </div>

  <!-- Allies -->
  <div class="allies-area" id="alliesArea"></div>

  <!-- Commands -->
  <div class="command-area" id="commandArea">
    <div class="command-label" id="commandLabel">行動を選択</div>
    <div class="commands" id="commands"></div>
  </div>

  <!-- Log -->
  <div class="log-area" id="logArea"></div>
</div>

<!-- Start Screen -->
<div class="overlay" id="startScreen">
  <h2>🌸 Bloom Battle</h2>
  <p>花の少女たちを率いて3体の敵を倒せ。<br>
  戦うほど開花が進み強くなる。<br>
  しかし満開の先は……散る。</p>
  <button onclick="startGame()">はじめる</button>
</div>

<!-- Result Screen -->
<div class="overlay hidden" id="resultScreen">
  <h2 id="resultTitle">勝利！</h2>
  <p id="resultText"></p>
  <button onclick="startGame()">もう一度</button>
</div>

<script>
// === Data ===
const BLOOM_STAGES = ['つぼみ', '一分咲き', '三分咲き', '五分咲き', '七分咲き', '満開', '散る'];
const BLOOM_EMOJI = ['🌱', '🌷', '🌸', '💮', '🏵️', '🌺', '🥀'];

const ALLY_DATA = [
  { name: '桜花', emoji: '🌸', flower: 'sakura', baseHp: 80, baseAtk: 18, baseDef: 8,
    skills: [
      null,
      { name: '花びら斬り', power: 1.5, desc: '1.5倍ダメージ' },
      { name: '回復の蜜', power: 0, heal: 30, desc: 'HP30回復' },
      { name: '花粉の舞', power: 1.3, debuff: true, desc: '1.3倍+敵攻撃↓' },
      { name: '花吹雪', power: 2.0, desc: '2倍ダメージ' },
      { name: '満開一閃', power: 3.0, desc: '3倍ダメージ！' }
    ]
  },
  { name: '蓮華', emoji: '🪷', flower: 'lotus', baseHp: 100, baseAtk: 12, baseDef: 12,
    skills: [
      null,
      { name: '蓮の盾', power: 0, shield: 15, desc: '全員に防御+15' },
      { name: '浄化の光', power: 1.2, healAll: 15, desc: '攻撃+全員HP15回復' },
      { name: '泥中の華', power: 0, heal: 50, desc: 'HP50回復' },
      { name: '蓮華結界', power: 0, shield: 30, desc: '全員に防御+30' },
      { name: '極楽浄土', power: 2.5, healAll: 30, desc: '2.5倍+全員HP30回復' }
    ]
  },
  { name: '百合', emoji: '🏵️', flower: 'lily', baseHp: 60, baseAtk: 25, baseDef: 5,
    skills: [
      null,
      { name: '突撃', power: 1.8, recoil: 10, desc: '1.8倍(反動10)' },
      { name: '二連撃', power: 1.3, hits: 2, desc: '1.3倍×2回' },
      { name: '貫通撃', power: 1.6, pierce: true, desc: '1.6倍(防御無視)' },
      { name: '百花繚乱', power: 2.2, hits: 2, desc: '2.2倍×2回' },
      { name: '散華', power: 4.0, desc: '4倍！最強の一撃' }
    ]
  }
];

const ENEMY_DATA = [
  { name: 'ゴブリン', emoji: '👺', hp: 100, atk: 12, def: 5 },
  { name: 'オーガ', emoji: '👹', hp: 180, atk: 20, def: 10 },
  { name: 'ドラゴン', emoji: '🐉', hp: 300, atk: 28, def: 15 }
];

// === State ===
let allies = [];
let enemy = null;
let stage = 0; // 0-2
let currentAlly = 0; // whose turn
let phase = 'player'; // player | enemy | transition
let turnOrder = [];
let turnIndex = 0;

// === Init ===
function startGame() {
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('resultScreen').classList.add('hidden');
  document.getElementById('logArea').innerHTML = '';
  
  allies = ALLY_DATA.map((d, i) => ({
    ...d, id: i,
    hp: d.baseHp, maxHp: d.baseHp,
    atk: d.baseAtk, def: d.baseDef,
    bloom: 0, dead: false, shieldBuff: 0
  }));
  
  stage = 0;
  startStage();
}

function startStage() {
  const ed = ENEMY_DATA[stage];
  enemy = { ...ed, maxHp: ed.hp };
  
  document.getElementById('stageNum').textContent = stage + 1;
  updateEnemyUI();
  updateAlliesUI();
  
  log(`<span class="info">── STAGE ${stage + 1}: ${enemy.name}が現れた！ ──</span>`);
  
  startPlayerPhase();
}

function getBloomMultiplier(bloom) {
  return 1 + bloom * 0.2; // 0: x1.0, 1: x1.2, ... 5: x2.0
}

function getAllyStats(ally) {
  const m = getBloomMultiplier(ally.bloom);
  return {
    atk: Math.floor(ally.baseAtk * m),
    def: Math.floor(ally.baseDef * m),
    maxHp: Math.floor(ally.baseHp * m)
  };
}

// === Player Phase ===
function startPlayerPhase() {
  phase = 'player';
  turnOrder = allies.filter(a => !a.dead).map(a => a.id);
  turnIndex = 0;
  
  if (turnOrder.length === 0) {
    gameOver(false);
    return;
  }
  
  promptAction();
}

function promptAction() {
  if (turnIndex >= turnOrder.length) {
    startEnemyPhase();
    return;
  }
  
  currentAlly = turnOrder[turnIndex];
  const ally = allies[currentAlly];
  
  updateAlliesUI();
  showCommands(ally);
}

function showCommands(ally) {
  const cmds = document.getElementById('commands');
  const label = document.getElementById('commandLabel');
  label.textContent = `${ally.name}の行動`;
  
  const stats = getAllyStats(ally);
  let html = '';
  
  // Attack
  html += `<button class="cmd-btn" onclick="doAttack()">⚔️ 攻撃</button>`;
  
  // Skill
  const skill = ally.skills[ally.bloom];
  if (skill) {
    html += `<button class="cmd-btn" onclick="doSkill()">${skill.name}<br><span style="font-size:10px;color:#aaa">${skill.desc}</span></button>`;
  } else {
    html += `<button class="cmd-btn" disabled>スキルなし</button>`;
  }
  
  // Bloom (voluntary)
  const canBloom = ally.bloom < 5;
  const bloomLabel = canBloom ? `🌸 開花<br><span style="font-size:10px;color:#f0c060">${BLOOM_STAGES[ally.bloom]}→${BLOOM_STAGES[ally.bloom+1]}</span>` : '満開済み';
  html += `<button class="cmd-btn bloom-btn" onclick="doBloom()" ${!canBloom ? 'disabled' : ''}>${bloomLabel}</button>`;
  
  // Defend
  html += `<button class="cmd-btn" onclick="doDefend()">🛡️ 防御</button>`;
  
  cmds.innerHTML = html;
}

// === Actions ===
function doAttack() {
  if (phase !== 'player') return;
  const ally = allies[currentAlly];
  const stats = getAllyStats(ally);
  const dmg = Math.max(1, stats.atk - enemy.def + Math.floor(Math.random() * 6) - 2);
  
  enemy.hp = Math.max(0, enemy.hp - dmg);
  log(`${ally.name}の攻撃！ <span class="dmg">${dmg}ダメージ</span>`);
  
  animateEnemy();
  updateEnemyUI();
  
  if (enemy.hp <= 0) {
    enemyDefeated();
    return;
  }
  
  nextTurn();
}

function doSkill() {
  if (phase !== 'player') return;
  const ally = allies[currentAlly];
  const skill = ally.skills[ally.bloom];
  if (!skill) return;
  
  const stats = getAllyStats(ally);
  
  log(`<span class="bloom-log">${ally.name}の${skill.name}！</span>`);
  
  if (skill.power > 0) {
    const hits = skill.hits || 1;
    let totalDmg = 0;
    for (let i = 0; i < hits; i++) {
      let dmg = Math.max(1, Math.floor(stats.atk * skill.power) - (skill.pierce ? 0 : enemy.def) + Math.floor(Math.random() * 6) - 2);
      totalDmg += dmg;
      enemy.hp = Math.max(0, enemy.hp - dmg);
    }
    log(`<span class="dmg">${totalDmg}ダメージ${skill.hits > 1 ? `(${skill.hits}hit)` : ''}</span>`);
    animateEnemy();
    
    if (skill.recoil) {
      ally.hp = Math.max(1, ally.hp - skill.recoil);
      log(`<span class="dmg">反動で${skill.recoil}ダメージ</span>`);
    }
  }
  
  if (skill.heal) {
    const newStats = getAllyStats(ally);
    ally.hp = Math.min(newStats.maxHp, ally.hp + skill.heal);
    log(`<span class="heal">${ally.name}のHPが${skill.heal}回復</span>`);
  }
  
  if (skill.healAll) {
    allies.forEach(a => {
      if (!a.dead) {
        const s = getAllyStats(a);
        a.hp = Math.min(s.maxHp, a.hp + skill.healAll);
      }
    });
    log(`<span class="heal">全員のHPが${skill.healAll}回復</span>`);
  }
  
  if (skill.shield) {
    allies.forEach(a => { if (!a.dead) a.shieldBuff += skill.shield; });
    log(`<span class="info">全員の防御+${skill.shield}</span>`);
  }
  
  if (skill.debuff) {
    enemy.atk = Math.max(1, enemy.atk - 3);
    log(`<span class="info">敵の攻撃力が下がった</span>`);
  }
  
  updateEnemyUI();
  updateAlliesUI();
  
  if (enemy.hp <= 0) {
    enemyDefeated();
    return;
  }
  
  nextTurn();
}

function doBloom() {
  if (phase !== 'player') return;
  const ally = allies[currentAlly];
  if (ally.bloom >= 5) return;
  
  ally.bloom++;
  const stats = getAllyStats(ally);
  ally.maxHp = stats.maxHp;
  // HP stays the same (voluntary bloom = no heal)
  ally.hp = Math.min(ally.hp, ally.maxHp);
  
  log(`<span class="bloom-log">🌸 ${ally.name}が${BLOOM_STAGES[ally.bloom]}に開花！ ステータスUP！</span>`);
  
  const card = document.querySelectorAll('.ally-card')[ally.id];
  if (card) { card.classList.add('bloom-anim'); setTimeout(() => card.classList.remove('bloom-anim'), 600); }
  
  updateAlliesUI();
  showCommands(ally); // Don't consume turn - let them act again? No, bloom IS the action.
  nextTurn();
}

function doDefend() {
  if (phase !== 'player') return;
  const ally = allies[currentAlly];
  ally.defending = true;
  log(`${ally.name}は身を守っている`);
  nextTurn();
}

function nextTurn() {
  turnIndex++;
  setTimeout(() => promptAction(), 300);
}

// === Enemy Phase ===
function startEnemyPhase() {
  phase = 'enemy';
  document.getElementById('commands').innerHTML = '<div style="text-align:center;color:#888;grid-column:1/-1">敵のターン...</div>';
  
  setTimeout(() => {
    // Enemy attacks random alive ally
    const alive = allies.filter(a => !a.dead);
    if (alive.length === 0) { gameOver(false); return; }
    
    const target = alive[Math.floor(Math.random() * alive.length)];
    const tStats = getAllyStats(target);
    const def = tStats.def + target.shieldBuff + (target.defending ? 15 : 0);
    const dmg = Math.max(1, enemy.atk - def + Math.floor(Math.random() * 8) - 3);
    
    target.hp -= dmg;
    log(`${enemy.name}の攻撃→${target.name}に <span class="dmg">${dmg}ダメージ</span>`);
    
    // Animate
    const card = document.querySelectorAll('.ally-card')[target.id];
    if (card) { card.classList.add('damage-anim'); setTimeout(() => card.classList.remove('damage-anim'), 400); }
    
    if (target.hp <= 0) {
      target.hp = 0;
      // Defeated: bloom +3 and revive
      const oldBloom = target.bloom;
      target.bloom = Math.min(target.bloom + 3, 6);
      
      if (target.bloom >= 6) {
        // 散る
        target.dead = true;
        target.hp = 0;
        log(`<span class="dead">🥀 ${target.name}は散ってしまった……</span>`);
      } else {
        const newStats = getAllyStats(target);
        target.hp = newStats.maxHp;
        target.maxHp = newStats.maxHp;
        log(`<span class="bloom-log">🌸 ${target.name}が倒れたが${BLOOM_STAGES[target.bloom]}に覚醒！ HP全回復！</span>`);
      }
    }
    
    // Reset defend flags
    allies.forEach(a => { a.defending = false; a.shieldBuff = 0; });
    
    updateAlliesUI();
    
    // Check if all dead
    if (allies.every(a => a.dead)) {
      gameOver(false);
      return;
    }
    
    setTimeout(() => startPlayerPhase(), 500);
  }, 800);
}

// === Stage Transition ===
function enemyDefeated() {
  log(`<span class="info">🎉 ${enemy.name}を倒した！</span>`);
  
  // All alive allies bloom +1
  allies.forEach(a => {
    if (!a.dead) {
      const oldBloom = a.bloom;
      a.bloom = Math.min(a.bloom + 1, 6);
      
      if (a.bloom >= 6) {
        a.dead = true;
        a.hp = 0;
        log(`<span class="dead">🥀 ${a.name}は満開を超え、散ってしまった……</span>`);
      } else {
        const stats = getAllyStats(a);
        a.maxHp = stats.maxHp;
        // HP stays after victory bloom
        a.hp = Math.min(a.hp, a.maxHp);
        log(`<span class="bloom-log">🌸 ${a.name}が${BLOOM_STAGES[a.bloom]}に開花</span>`);
      }
    }
  });
  
  updateAlliesUI();
  
  if (stage >= 2) {
    gameOver(true);
    return;
  }
  
  if (allies.every(a => a.dead)) {
    gameOver(false);
    return;
  }
  
  stage++;
  setTimeout(() => startStage(), 1000);
}

function gameOver(won) {
  const screen = document.getElementById('resultScreen');
  screen.classList.remove('hidden');
  
  if (won) {
    const alive = allies.filter(a => !a.dead);
    document.getElementById('resultTitle').textContent = '🌸 勝利！';
    let text = '全ての敵を倒した！\n\n';
    allies.forEach(a => {
      if (a.dead) {
        text += `🥀 ${a.name} — 散華\n`;
      } else {
        text += `${BLOOM_EMOJI[a.bloom]} ${a.name} — ${BLOOM_STAGES[a.bloom]} (HP: ${a.hp})\n`;
      }
    });
    document.getElementById('resultText').innerHTML = text.replace(/\n/g, '<br>');
  } else {
    document.getElementById('resultTitle').textContent = '💀 全滅…';
    document.getElementById('resultText').textContent = '全員散ってしまった……';
  }
}

// === UI Updates ===
function updateEnemyUI() {
  document.getElementById('enemyName').textContent = enemy.name;
  document.getElementById('enemyEmoji').textContent = ENEMY_DATA[stage].emoji;
  const pct = Math.max(0, (enemy.hp / enemy.maxHp) * 100);
  document.getElementById('enemyHpBar').style.width = pct + '%';
  document.getElementById('enemyHpText').textContent = `${Math.max(0, enemy.hp)} / ${enemy.maxHp}`;
}

function updateAlliesUI() {
  const area = document.getElementById('alliesArea');
  area.innerHTML = '';
  
  allies.forEach((ally, i) => {
    const stats = getAllyStats(ally);
    const pct = ally.dead ? 0 : Math.max(0, (ally.hp / stats.maxHp) * 100);
    const isActing = (phase === 'player' && i === currentAlly);
    
    const card = document.createElement('div');
    card.className = `ally-card${ally.dead ? ' dead' : ''}${isActing ? ' acting' : ''}`;
    
    card.innerHTML = `
      <div class="ally-emoji">${ally.dead ? '🥀' : BLOOM_EMOJI[ally.bloom]}</div>
      <div class="ally-name">${ally.name}</div>
      <div class="bloom-stage">${BLOOM_STAGES[ally.bloom]}</div>
      <div class="ally-hp-bar">
        <div class="hp-bar" style="width:${pct}%"></div>
        <div class="hp-text">${ally.dead ? '散華' : `${ally.hp}/${stats.maxHp}`}</div>
      </div>
    `;
    area.appendChild(card);
  });
}

function animateEnemy() {
  const el = document.getElementById('enemyEmoji');
  el.classList.add('damage-anim');
  setTimeout(() => el.classList.remove('damage-anim'), 400);
}

function log(msg) {
  const area = document.getElementById('logArea');
  area.innerHTML += msg + '<br>';
  area.scrollTop = area.scrollHeight;
}
</script>
</body>
</html>
