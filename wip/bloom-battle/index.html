<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Bloom Battle - プロトタイプ v2</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
  background: #1a1a2e; color: #eee; font-family: 'Helvetica Neue', Arial, sans-serif;
  display: flex; justify-content: center; align-items: center; min-height: 100vh;
  overflow: hidden;
}
#game { width: 440px; max-width: 100vw; padding: 10px; user-select: none; }

.stage-info { text-align: center; margin-bottom: 8px; font-size: 13px; color: #aaa; }
.stage-info .stage-num { font-size: 18px; font-weight: bold; color: #f0c060; }

/* Enemies area */
.enemies-area { display: flex; gap: 6px; margin-bottom: 10px; }
.enemy-card {
  flex: 1; background: #2a1a3a; border-radius: 10px; padding: 10px 6px;
  text-align: center; border: 1px solid #4a2a6a; min-width: 0; transition: all 0.3s;
}
.enemy-card.boss { border-color: #8a3a5a; background: #3a1a2a; }
.enemy-card.dead-enemy { opacity: 0.2; }
.enemy-card.targeted { border-color: #ff6b8a; box-shadow: 0 0 10px rgba(255,107,138,0.4); }
.enemy-name { font-size: 11px; font-weight: bold; color: #ff6b8a; }
.enemy-emoji { font-size: 32px; margin: 4px 0; }
.hp-bar-container { background: #333; border-radius: 6px; height: 14px; position: relative; overflow: hidden; }
.hp-bar { height: 100%; border-radius: 6px; transition: width 0.4s ease; }
.hp-bar.enemy-hp { background: linear-gradient(90deg, #ff4466, #ff6b8a); }
.hp-bar.ally-hp { background: linear-gradient(90deg, #44cc66, #80ff80); }
.hp-text { position: absolute; top: 0; left: 0; right: 0; text-align: center; font-size: 10px; line-height: 14px; font-weight: bold; }

/* Allies */
.allies-area { display: flex; gap: 6px; margin-bottom: 8px; }
.ally-card {
  flex: 1; background: #1e2d1e; border-radius: 10px; padding: 8px 4px;
  text-align: center; border: 2px solid #3a5a3a; transition: all 0.3s; cursor: pointer; min-width: 0;
}
.ally-card.acting { border-color: #ffdd57; box-shadow: 0 0 10px rgba(255,221,87,0.3); }
.ally-card.dead { opacity: 0.25; border-color: #555; cursor: default; }
.ally-card.bloomed-this-turn { border-color: #f0c060; }
.ally-name { font-size: 12px; font-weight: bold; margin-bottom: 2px; }
.ally-emoji { font-size: 24px; }
.bloom-stage { font-size: 10px; color: #f0c060; margin: 2px 0; }
.ally-hp-bar { background: #333; border-radius: 4px; height: 10px; margin-top: 3px; position: relative; overflow: hidden; }
.ally-hp-bar .hp-text { font-size: 8px; line-height: 10px; }

/* Skill Tree Panel */
.skill-tree-panel {
  background: #0e1525; border-radius: 10px; padding: 10px; margin-bottom: 8px;
  border: 1px solid #2a3a5e; display: none;
}
.skill-tree-panel.visible { display: block; }
.skill-tree-title { font-size: 12px; color: #f0c060; margin-bottom: 6px; font-weight: bold; }
.skill-tree-row {
  display: flex; align-items: center; gap: 6px; padding: 3px 0; font-size: 11px;
  border-bottom: 1px solid #1a2a3e;
}
.skill-tree-row:last-child { border-bottom: none; }
.skill-tree-row.locked { color: #555; }
.skill-tree-row.current { color: #80ff80; font-weight: bold; }
.skill-tree-row.future { color: #888; }
.skill-bloom-label { width: 55px; font-size: 10px; }
.skill-name { flex: 1; }
.skill-desc { color: #aaa; font-size: 10px; }

/* Commands */
.command-area { background: #16213e; border-radius: 10px; padding: 10px; margin-bottom: 8px; border: 1px solid #1a3a5e; }
.command-label { font-size: 11px; color: #888; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
.commands { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.cmd-btn {
  padding: 10px 6px; border-radius: 8px; border: 2px solid #3a5a8a;
  background: #1a2a4a; color: #eee; font-size: 13px; font-weight: bold;
  cursor: pointer; transition: all 0.2s; text-align: center;
}
.cmd-btn:hover:not(:disabled) { background: #2a3a5a; border-color: #5a8abb; }
.cmd-btn:active:not(:disabled) { transform: scale(0.95); }
.cmd-btn:disabled { opacity: 0.3; cursor: default; }
.cmd-btn.bloom-btn { border-color: #8a5a3a; background: #3a2a1a; }
.cmd-btn.bloom-btn:hover:not(:disabled) { background: #4a3a2a; border-color: #bb8a5a; }
.cmd-btn .sub { font-size: 9px; color: #aaa; display: block; margin-top: 2px; }

/* Target select */
.target-select { margin-top: 6px; }
.target-btn {
  padding: 8px 12px; margin: 3px; border-radius: 6px; border: 1px solid #5a3a3a;
  background: #2a1a1a; color: #eee; cursor: pointer; font-size: 12px;
}
.target-btn:hover { background: #4a2a2a; border-color: #8a5a5a; }

/* Log */
.log-area {
  background: #111; border-radius: 8px; padding: 8px; height: 100px;
  overflow-y: auto; font-size: 11px; line-height: 1.5;
}
.log-area .dmg { color: #ff6b6b; }
.log-area .heal { color: #6bff6b; }
.log-area .bloom-log { color: #ffcc44; }
.log-area .info { color: #88aacc; }
.log-area .dead-log { color: #666; font-style: italic; }
.log-area .summon { color: #cc88ff; }

/* Overlay */
.overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.88); display: flex; justify-content: center;
  align-items: center; z-index: 100; flex-direction: column; padding: 20px;
}
.overlay h2 { font-size: 26px; margin-bottom: 12px; }
.overlay p { font-size: 14px; color: #aaa; margin-bottom: 16px; text-align: center; line-height: 1.6; }
.overlay button {
  padding: 12px 36px; border-radius: 10px; border: none;
  background: #f0c060; color: #1a1a2e; font-size: 16px; font-weight: bold; cursor: pointer;
}
.overlay button:hover { background: #ffdd88; }
.hidden { display: none !important; }

@keyframes bloomFlash {
  0% { filter: brightness(1); }
  50% { filter: brightness(2.5) saturate(2); }
  100% { filter: brightness(1); }
}
.bloom-anim { animation: bloomFlash 0.6s ease; }

@keyframes damageFlash {
  0%,100% { opacity:1; transform: translateX(0); }
  25% { opacity:0.4; transform: translateX(-4px); }
  75% { opacity:0.4; transform: translateX(4px); }
}
.damage-anim { animation: damageFlash 0.35s ease; }

@keyframes deathFade {
  0% { opacity:1; transform: scale(1); }
  100% { opacity:0; transform: scale(0.5); }
}
.death-anim { animation: deathFade 0.8s ease forwards; }
</style>
</head>
<body>

<div id="game">
  <div class="stage-info">STAGE <span class="stage-num" id="stageNum">1</span> / 3</div>
  <div class="enemies-area" id="enemiesArea"></div>
  <div class="allies-area" id="alliesArea"></div>
  <div class="skill-tree-panel" id="skillTreePanel"></div>
  <div class="command-area" id="commandArea">
    <div class="command-label"><span id="commandLabel">行動を選択</span><button style="background:none;border:1px solid #555;color:#aaa;border-radius:4px;padding:2px 8px;font-size:10px;cursor:pointer" onclick="toggleSkillTree()">スキル一覧</button></div>
    <div class="commands" id="commands"></div>
  </div>
  <div class="log-area" id="logArea"></div>
</div>

<div class="overlay" id="startScreen">
  <h2>🌸 Bloom Battle</h2>
  <p>花の少女たちを率いて3体のボスを倒せ。<br>
  開花するほど強くなる。<br>
  しかし満開の先は——散る。<br><br>
  <span style="font-size:12px;color:#f0c060">開花はターン消費なし（1ターン1回まで）<br>
  倒されると一気に3段階開花して復活<br>
  満開を超えたキャラは永久退場</span></p>
  <button onclick="startGame()">はじめる</button>
</div>

<div class="overlay hidden" id="resultScreen">
  <h2 id="resultTitle"></h2>
  <p id="resultText"></p>
  <button onclick="startGame()">もう一度</button>
</div>

<script>
const BLOOM = ['つぼみ','一分咲き','三分咲き','五分咲き','七分咲き','満開','散る'];
const BEMOJI = ['🌱','🌷','🌸','💮','🏵️','🌺','🥀'];

const ALLIES = [
  { name:'桜花', emoji:'🌸', baseHp:90, baseAtk:20, baseDef:10,
    skills: [
      null,
      { name:'花びら斬り', power:1.6, desc:'1.6倍ダメージ' },
      { name:'癒しの蜜', power:0, heal:40, desc:'自分HP40回復' },
      { name:'花粉の霧', power:1.4, debuff:true, desc:'1.4倍+敵攻撃↓' },
      { name:'花吹雪', power:2.2, aoe:true, desc:'全体2.2倍' },
      { name:'満開一閃', power:3.5, desc:'3.5倍！' }
    ]
  },
  { name:'蓮華', emoji:'🪷', baseHp:120, baseAtk:14, baseDef:14,
    skills: [
      null,
      { name:'蓮の盾', power:0, shieldAll:20, desc:'全員防御+20' },
      { name:'浄化の光', power:1.3, healAll:20, desc:'1.3倍+全員HP20回復' },
      { name:'泥中の華', power:0, heal:60, desc:'自分HP60回復' },
      { name:'蓮華結界', power:0, shieldAll:35, desc:'全員防御+35' },
      { name:'極楽浄土', power:2.8, healAll:40, desc:'2.8倍+全員HP40回復' }
    ]
  },
  { name:'百合', emoji:'🏵️', baseHp:70, baseAtk:28, baseDef:6,
    skills: [
      null,
      { name:'突撃', power:2.0, recoil:10, desc:'2倍(反動10)' },
      { name:'二連撃', power:1.5, hits:2, desc:'1.5倍×2回' },
      { name:'貫通撃', power:1.8, pierce:true, desc:'1.8倍(防御無視)' },
      { name:'百花繚乱', power:2.5, hits:2, aoe:true, desc:'全体2.5倍×2' },
      { name:'散華', power:5.0, desc:'5倍！究極の一撃' }
    ]
  }
];

const STAGES = [
  { boss: { name:'ゴーレム', emoji:'🗿', hp:300, atk:70, def:10 }, minions: [] },
  { boss: { name:'キメラ', emoji:'🦁', hp:500, atk:85, def:14 },
    minions: [
      { name:'子蛇', emoji:'🐍', hp:80, atk:50, def:3, summonTurn:1 },
      { name:'子蛇', emoji:'🐍', hp:80, atk:50, def:3, summonTurn:3 }
    ]
  },
  { boss: { name:'邪龍', emoji:'🐉', hp:800, atk:105, def:20 },
    minions: [
      { name:'骸骨兵', emoji:'💀', hp:100, atk:60, def:5, summonTurn:1 },
      { name:'骸骨兵', emoji:'💀', hp:100, atk:60, def:5, summonTurn:2 },
      { name:'闇術師', emoji:'🧙', hp:70, atk:75, def:3, summonTurn:3 }
    ]
  }
];

let allies=[], enemies=[], stage=0, currentAlly=0, phase='', turnOrder=[], turnIndex=0;
let stageTurn=0, pendingAction=null, selectedTarget=null, skillTreeVisible=false;
let bloomedThisTurn = new Set();

function startGame() {
  hide('startScreen'); hide('resultScreen');
  el('logArea').innerHTML='';
  allies = ALLIES.map((d,i) => ({
    ...d, id:i, hp:d.baseHp, maxHp:d.baseHp,
    atk:d.baseAtk, def:d.baseDef,
    bloom:0, dead:false, shieldBuff:0, defending:false
  }));
  stage=0; startStage();
}

function startStage() {
  const sd = STAGES[stage];
  enemies = [{ ...sd.boss, maxHp:sd.boss.hp, isBoss:true, dead:false, id:'boss' }];
  stageTurn=0;
  el('stageNum').textContent=stage+1;
  log(`<span class="info">── STAGE ${stage+1}: ${sd.boss.name}が現れた！ ──</span>`);
  updateUI(); startPlayerPhase();
}

function bm(b) { return 1+b*0.25; }
function astat(a) {
  const m=bm(a.bloom);
  return { atk:Math.floor(a.baseAtk*m), def:Math.floor(a.baseDef*m), maxHp:Math.floor(a.baseHp*m) };
}

// === Player Phase ===
function startPlayerPhase() {
  phase='player'; stageTurn++;
  bloomedThisTurn.clear();
  allies.forEach(a=>{ a.defending=false; a.shieldBuff=0; });
  
  // Summon minions
  const sd=STAGES[stage];
  sd.minions.forEach((md,i) => {
    if(md.summonTurn===stageTurn && !enemies.find(e=>e.id==='m'+i)) {
      const m={...md, maxHp:md.hp, isBoss:false, dead:false, id:'m'+i};
      enemies.push(m);
      log(`<span class="summon">⚡ ${md.name}が召喚された！</span>`);
    }
  });
  
  turnOrder=allies.filter(a=>!a.dead).map(a=>a.id);
  turnIndex=0;
  
  if(!turnOrder.length){ gameOver(false); return; }
  updateUI(); promptAction();
}

function promptAction() {
  if(turnIndex>=turnOrder.length){ startEnemyPhase(); return; }
  currentAlly=turnOrder[turnIndex];
  updateUI(); showCommands(allies[currentAlly]);
}

function showCommands(a) {
  const s=astat(a), sk=a.skills[a.bloom], cmds=el('commands');
  el('commandLabel').textContent=`${a.name}（${BLOOM[a.bloom]}）`;
  
  const canBloom = a.bloom<5 && !bloomedThisTurn.has(a.id);
  const aliveEnemies = enemies.filter(e=>!e.dead);
  const multiTarget = aliveEnemies.length>1;
  
  let h='';
  // Attack
  h+=`<button class="cmd-btn" onclick="chooseTarget('attack')">⚔️ 攻撃<span class="sub">ATK:${s.atk}</span></button>`;
  // Skill
  if(sk) h+=`<button class="cmd-btn" onclick="chooseTarget('skill')">✨ ${sk.name}<span class="sub">${sk.desc}</span></button>`;
  else h+=`<button class="cmd-btn" disabled>スキルなし</button>`;
  // Bloom
  h+=`<button class="cmd-btn bloom-btn" onclick="doBloom()" ${!canBloom?'disabled':''}>${canBloom?`🌸 開花<span class="sub">${BLOOM[a.bloom]}→${BLOOM[a.bloom+1]}</span>`:(a.bloom>=5?'満開済み':'開花済(このターン)')}</button>`;
  // Defend
  h+=`<button class="cmd-btn" onclick="doDefend()">🛡️ 防御<span class="sub">被ダメ半減</span></button>`;
  
  cmds.innerHTML=h;
}

function chooseTarget(action) {
  const aliveEnemies=enemies.filter(e=>!e.dead);
  const a=allies[currentAlly], sk=a.skills[a.bloom];
  
  // AOE skills hit all
  if(action==='skill' && sk && sk.aoe) {
    if(action==='skill') doSkillOn(null); // null = all
    return;
  }
  
  if(aliveEnemies.length===1) {
    if(action==='attack') doAttackOn(aliveEnemies[0].id);
    else doSkillOn(aliveEnemies[0].id);
    return;
  }
  
  // Show target selection
  let h=`<div class="target-select"><div style="font-size:11px;color:#aaa;margin-bottom:4px">対象を選択:</div>`;
  aliveEnemies.forEach(e=>{
    h+=`<button class="target-btn" onclick="${action==='attack'?`doAttackOn('${e.id}')`:`doSkillOn('${e.id}')`}">${e.emoji} ${e.name} (HP:${e.hp})</button>`;
  });
  h+=`<button class="target-btn" onclick="promptAction()" style="border-color:#555">戻る</button></div>`;
  el('commands').innerHTML+=h;
}

function doAttackOn(tid) {
  if(phase!=='player') return;
  const a=allies[currentAlly], s=astat(a);
  const t=enemies.find(e=>e.id===tid);
  if(!t||t.dead) return;
  
  const dmg=Math.max(1, s.atk - t.def + rng(-3,4));
  t.hp=Math.max(0,t.hp-dmg);
  log(`${a.name}→${t.name}に<span class="dmg">${dmg}ダメージ</span>`);
  animateEl(tid);
  
  checkEnemyDeath(t);
  updateUI();
  if(checkAllEnemiesDead()) return;
  nextTurn();
}

function doSkillOn(tid) {
  if(phase!=='player') return;
  const a=allies[currentAlly], sk=a.skills[a.bloom], s=astat(a);
  if(!sk) return;
  
  log(`<span class="bloom-log">${a.name}の${sk.name}！</span>`);
  
  if(sk.power>0) {
    const targets = sk.aoe ? enemies.filter(e=>!e.dead) : [enemies.find(e=>e.id===tid)];
    targets.forEach(t=>{
      if(!t||t.dead) return;
      const hits=sk.hits||1;
      let total=0;
      for(let i=0;i<hits;i++){
        const d=Math.max(1, Math.floor(s.atk*sk.power) - (sk.pierce?0:t.def) + rng(-3,5));
        total+=d; t.hp=Math.max(0,t.hp-d);
      }
      log(`→${t.name}に<span class="dmg">${total}${hits>1?`(${hits}hit)`:''}</span>`);
      animateEl(t.id);
      checkEnemyDeath(t);
    });
    if(sk.recoil){ a.hp=Math.max(1,a.hp-sk.recoil); log(`<span class="dmg">反動${sk.recoil}</span>`); }
  }
  if(sk.heal){ const ms=astat(a); a.hp=Math.min(ms.maxHp,a.hp+sk.heal); log(`<span class="heal">${a.name} HP+${sk.heal}</span>`); }
  if(sk.healAll){ allies.forEach(x=>{ if(!x.dead){ const ms=astat(x); x.hp=Math.min(ms.maxHp,x.hp+sk.healAll); }}); log(`<span class="heal">全員 HP+${sk.healAll}</span>`); }
  if(sk.shieldAll){ allies.forEach(x=>{ if(!x.dead) x.shieldBuff+=sk.shieldAll; }); log(`<span class="info">全員 防御+${sk.shieldAll}</span>`); }
  if(sk.debuff){ enemies.forEach(e=>{ if(!e.dead) e.atk=Math.max(1,e.atk-5); }); log(`<span class="info">敵全体の攻撃↓</span>`); }
  
  updateUI();
  if(checkAllEnemiesDead()) return;
  nextTurn();
}

function doBloom() {
  if(phase!=='player') return;
  const a=allies[currentAlly];
  if(a.bloom>=5 || bloomedThisTurn.has(a.id)) return;
  
  a.bloom++;
  bloomedThisTurn.add(a.id);
  const s=astat(a);
  a.maxHp=s.maxHp;
  a.hp=Math.min(a.hp,a.maxHp);
  
  log(`<span class="bloom-log">🌸 ${a.name}が${BLOOM[a.bloom]}に開花！</span>`);
  if(a.skills[a.bloom]) log(`<span class="bloom-log">→「${a.skills[a.bloom].name}」習得！</span>`);
  
  const card=document.querySelectorAll('.ally-card')[a.id];
  if(card){ card.classList.add('bloom-anim'); setTimeout(()=>card.classList.remove('bloom-anim'),600); }
  
  updateUI();
  // No turn consumption — show commands again
  showCommands(a);
}

function doDefend() {
  if(phase!=='player') return;
  allies[currentAlly].defending=true;
  log(`${allies[currentAlly].name}は身を守っている`);
  nextTurn();
}

function nextTurn() { turnIndex++; setTimeout(()=>promptAction(),250); }

// === Enemy Phase ===
function startEnemyPhase() {
  phase='enemy';
  el('commands').innerHTML='<div style="text-align:center;color:#666;grid-column:1/-1;font-size:12px">敵のターン...</div>';
  
  const alive=enemies.filter(e=>!e.dead);
  let delay=0;
  alive.forEach((e,i)=>{
    setTimeout(()=>enemyAttack(e, i===alive.length-1), delay);
    delay+=900;
  });
}

function enemyAttack(e, isLast) {
  const aliveAllies=allies.filter(a=>!a.dead);
  if(!aliveAllies.length){ gameOver(false); return; }
  
  const t=aliveAllies[Math.floor(Math.random()*aliveAllies.length)];
  const ts=astat(t);
  const def=ts.def + t.shieldBuff + (t.defending?999:0);
  const dmg=Math.max(1, e.atk - def + rng(-4,5));
  
  t.hp-=dmg;
  log(`${e.emoji}${e.name}→${t.name}に<span class="dmg">${dmg}ダメージ</span>`);
  const card=document.querySelectorAll('.ally-card')[t.id];
  if(card){ card.classList.add('damage-anim'); setTimeout(()=>card.classList.remove('damage-anim'),350); }
  
  if(t.hp<=0) {
    t.hp=0;
    const ob=t.bloom;
    t.bloom=Math.min(t.bloom+3, 6);
    if(t.bloom>=6){
      t.dead=true;
      log(`<span class="dead-log">🥀 ${t.name}は散ってしまった……</span>`);
    } else {
      const ns=astat(t);
      t.hp=ns.maxHp; t.maxHp=ns.maxHp;
      log(`<span class="bloom-log">🌸 ${t.name}が倒れたが${BLOOM[t.bloom]}に覚醒！ HP全回復！</span>`);
      for(let b=ob+1;b<=t.bloom;b++){
        if(t.skills[b]) log(`<span class="bloom-log">→「${t.skills[b].name}」習得！</span>`);
      }
    }
  }
  
  updateUI();
  
  if(isLast) {
    if(allies.every(a=>a.dead)){ setTimeout(()=>gameOver(false),500); return; }
    setTimeout(()=>startPlayerPhase(),500);
  }
}

// === Stage transitions ===
function checkEnemyDeath(t) {
  if(t.hp<=0) { t.dead=true; log(`<span class="info">💥 ${t.name}を撃破！</span>`); }
}

function checkAllEnemiesDead() {
  if(!enemies.every(e=>e.dead)) return false;
  
  log(`<span class="info">🎉 STAGE ${stage+1} クリア！</span>`);
  
  // Victory bloom +1
  allies.forEach(a=>{
    if(!a.dead){
      a.bloom=Math.min(a.bloom+1,6);
      if(a.bloom>=6){ a.dead=true; a.hp=0; log(`<span class="dead-log">🥀 ${a.name}は満開を超え散った……</span>`); }
      else { const s=astat(a); a.maxHp=s.maxHp; a.hp=Math.min(a.hp,a.maxHp); log(`<span class="bloom-log">🌸 ${a.name}→${BLOOM[a.bloom]}</span>`); }
    }
  });
  
  updateUI();
  
  if(stage>=2){ setTimeout(()=>gameOver(true),800); return true; }
  if(allies.every(a=>a.dead)){ setTimeout(()=>gameOver(false),800); return true; }
  
  stage++;
  setTimeout(()=>startStage(),1200);
  return true;
}

function gameOver(won) {
  const s=el('resultScreen'); s.classList.remove('hidden');
  if(won){
    el('resultTitle').textContent='🌸 勝利！';
    let t='全ての敵を討ち倒した！\n\n';
    allies.forEach(a=>{ t += a.dead ? `🥀 ${a.name} — 散華\n` : `${BEMOJI[a.bloom]} ${a.name} — ${BLOOM[a.bloom]} (HP:${a.hp})\n`; });
    el('resultText').innerHTML=t.replace(/\n/g,'<br>');
  } else {
    el('resultTitle').textContent='💀 全滅…';
    el('resultText').textContent='全ての花が散ってしまった……';
  }
}

// === Skill Tree ===
function toggleSkillTree() {
  skillTreeVisible=!skillTreeVisible;
  const p=el('skillTreePanel');
  if(!skillTreeVisible){ p.classList.remove('visible'); return; }
  
  const a=allies[currentAlly];
  if(!a){ p.classList.remove('visible'); return; }
  
  let h=`<div class="skill-tree-title">${a.name} のスキルツリー</div>`;
  for(let i=0;i<=5;i++){
    const sk=a.skills[i];
    const cls = i<a.bloom?'locked': i===a.bloom?'current':'future';
    const icon = i<=a.bloom?'✅':'🔒';
    h+=`<div class="skill-tree-row ${cls}">`
      +`<span class="skill-bloom-label">${BEMOJI[i]} ${BLOOM[i]}</span>`
      +`<span class="skill-name">${sk?`${icon} ${sk.name}`:`${icon} (なし)`}</span>`
      +`<span class="skill-desc">${sk?sk.desc:'-'}</span>`
      +`</div>`;
  }
  p.innerHTML=h;
  p.classList.add('visible');
}

// === UI ===
function updateUI() {
  // Enemies
  const ea=el('enemiesArea'); ea.innerHTML='';
  enemies.forEach(e=>{
    if(e.dead){
      ea.innerHTML+=`<div class="enemy-card dead-enemy"><div class="enemy-emoji">💀</div><div class="enemy-name">${e.name}</div></div>`;
      return;
    }
    const pct=(e.hp/e.maxHp*100);
    ea.innerHTML+=`<div class="enemy-card${e.isBoss?' boss':''}" id="ecard-${e.id}">`
      +`<div class="enemy-name">${e.name}${e.isBoss?' 👑':''}</div>`
      +`<div class="enemy-emoji">${e.emoji}</div>`
      +`<div class="hp-bar-container"><div class="hp-bar enemy-hp" style="width:${pct}%"></div>`
      +`<div class="hp-text">${e.hp}/${e.maxHp}</div></div></div>`;
  });
  
  // Allies
  const aa=el('alliesArea'); aa.innerHTML='';
  allies.forEach((a,i)=>{
    const s=astat(a), pct=a.dead?0:(a.hp/s.maxHp*100);
    const acting=(phase==='player'&&i===currentAlly);
    const btt=bloomedThisTurn.has(i);
    aa.innerHTML+=`<div class="ally-card${a.dead?' dead':''}${acting?' acting':''}${btt?' bloomed-this-turn':''}" onclick="viewAllySkills(${i})">`
      +`<div class="ally-emoji">${a.dead?'🥀':BEMOJI[a.bloom]}</div>`
      +`<div class="ally-name">${a.name}</div>`
      +`<div class="bloom-stage">${BLOOM[a.bloom]}</div>`
      +`<div class="ally-hp-bar"><div class="hp-bar ally-hp" style="width:${pct}%"></div>`
      +`<div class="hp-text">${a.dead?'散華':`${a.hp}/${s.maxHp}`}</div></div></div>`;
  });
  
  if(skillTreeVisible) toggleSkillTree(); // refresh
}

function viewAllySkills(i) {
  // Clicking an ally card shows their skill tree
  const a=allies[i]; if(!a) return;
  const p=el('skillTreePanel');
  let h=`<div class="skill-tree-title">${a.name} のスキルツリー</div>`;
  for(let b=0;b<=5;b++){
    const sk=a.skills[b];
    const cls=b<a.bloom?'locked':b===a.bloom?'current':'future';
    const icon=b<=a.bloom?'✅':'🔒';
    h+=`<div class="skill-tree-row ${cls}">`
      +`<span class="skill-bloom-label">${BEMOJI[b]} ${BLOOM[b]}</span>`
      +`<span class="skill-name">${sk?`${icon} ${sk.name}`:`${icon} (なし)`}</span>`
      +`<span class="skill-desc">${sk?sk.desc:'-'}</span>`
      +`</div>`;
  }
  p.innerHTML=h;
  p.classList.add('visible');
  skillTreeVisible=true;
}

function animateEl(id) {
  const c=document.getElementById('ecard-'+id);
  if(c){ c.classList.add('damage-anim'); setTimeout(()=>c.classList.remove('damage-anim'),350); }
}

function rng(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
function el(id){ return document.getElementById(id); }
function hide(id){ el(id).classList.add('hidden'); }
function log(m){ const a=el('logArea'); a.innerHTML+=m+'<br>'; a.scrollTop=a.scrollHeight; }
</script>
</body>
</html>
