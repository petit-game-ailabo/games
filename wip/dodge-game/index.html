<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>【開発中】避けゲー - 今日のミニゲーム</title>
    <meta name="description" content="※これは開発中のゲームです。何秒生き延びられる？">
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        
        #game-container {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        canvas {
            display: block;
            margin: 0 auto;
        }
        
        .info {
            position: fixed;
            bottom: 60px;
            left: 0;
            right: 0;
            text-align: center;
            color: white;
            font-size: 14px;
            padding: 10px;
            background: rgba(0,0,0,0.3);
        }
        
        .credits {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.7);
            font-size: 12px;
        }

        @media (min-width: 768px) {
            .info {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <div class="info">何秒生き延びられる？タップした位置に移動！</div>
    <div class="credits">Powered by Phaser</div>
    
    <script>
        // 効果音生成（Web Audio API）
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        
        function playDodgeSound() {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.value = 600;
            oscillator.type = 'sine';
            
            gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.05);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.05);
        }
        
        function playGameOverSound() {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.value = 200;
            oscillator.type = 'sawtooth';
            
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.5);
        }

        const config = {
            type: Phaser.AUTO,
            width: 800,
            height: 600,
            parent: 'game-container',
            backgroundColor: '#1a1a2e',
            scale: {
                mode: Phaser.Scale.FIT,
                autoCenter: Phaser.Scale.CENTER_BOTH
            },
            physics: {
                default: 'arcade',
                arcade: {
                    gravity: { y: 0 },
                    debug: true  // デバッグモード有効
                }
            },
            scene: {
                preload: preload,
                create: create,
                update: update
            }
        };

        const game = new Phaser.Game(config);
        
        let player;
        let obstacles;
        let score = 0;
        let survivalTime = 0;
        let gameStarted = false;
        let gameOver = false;
        let scoreText;
        let timeText;
        let startText;
        let resultText;
        let timerEvent;
        let obstacleTimer;
        let playerSpeed = 400;
        let obstacleSpeed = 500;  // 200 → 500（デバッグ用に速く）
        let spawnRate = 1000; // 1秒ごと
        let debugText;

        function preload() {
            // 画像なし・シンプルな図形のみ
        }

        function create() {
            // スコア表示
            scoreText = this.add.text(20, 20, 'スコア: 0', {
                fontSize: '48px',
                fill: '#fff',
                fontStyle: 'bold',
                stroke: '#000',
                strokeThickness: 4
            });

            // 時間表示
            timeText = this.add.text(600, 20, '0.0秒', {
                fontSize: '48px',
                fill: '#FFD700',
                fontStyle: 'bold',
                stroke: '#000',
                strokeThickness: 4
            });
            
            // デバッグテキスト（スマホで確認用）
            debugText = this.add.text(20, 150, 'デバッグ', {
                fontSize: '24px',
                fill: '#00ff00',
                stroke: '#000',
                strokeThickness: 2
            });

            // スタートテキスト
            startText = this.add.text(400, 300, 'タップしてスタート！\n\nタップした位置に移動するわよ', {
                fontSize: '36px',
                fill: '#fff',
                fontStyle: 'bold',
                align: 'center'
            });
            startText.setOrigin(0.5);

            // プレイヤー（青い円）
            player = this.add.circle(400, 550, 30, 0x4ecdc4);
            this.physics.add.existing(player);
            player.body.setCollideWorldBounds(true);
            player.setVisible(false);

            // 障害物グループ
            obstacles = this.physics.add.group();

            // 衝突検出（sceneを保持）
            const scene = this;
            this.physics.add.overlap(player, obstacles, (p, o) => hitObstacle(scene, p, o));

            // タップ/クリックイベント
            this.input.on('pointerdown', handleInput, this);
        }

        function handleInput(pointer) {
            if (!gameStarted && !gameOver) {
                // ゲーム開始
                startGame(this);
            } else if (gameStarted && !gameOver) {
                // タップした位置にプレイヤーを移動
                const targetX = Phaser.Math.Clamp(pointer.x, 30, 770); // 画面端からマージン
                
                // スムーズに移動
                this.tweens.add({
                    targets: player,
                    x: targetX,
                    duration: 150,
                    ease: 'Power2'
                });
                
                // 移動音
                playDodgeSound();
            } else if (gameOver) {
                // 再スタート
                resetGame(this);
            }
        }

        function startGame(scene) {
            gameStarted = true;
            startText.setVisible(false);
            player.setVisible(true);
            
            // スコアタイマー
            timerEvent = scene.time.addEvent({
                delay: 100, // 0.1秒ごと
                callback: () => updateScore(scene),
                loop: true
            });
            
            // 最初の障害物を即座に生成
            spawnObstacle(scene);
            
            // 障害物生成タイマー
            obstacleTimer = scene.time.addEvent({
                delay: spawnRate,
                callback: () => spawnObstacle(scene),
                loop: true
            });
        }

        function updateScore(scene) {
            survivalTime += 0.1;
            score = Math.floor(survivalTime * 10);
            
            scoreText.setText('スコア: ' + score);
            timeText.setText(survivalTime.toFixed(1) + '秒');
            
            // 難易度上昇
            if (survivalTime > 10 && spawnRate > 700) {
                spawnRate = 700;
                obstacleSpeed = 250;
                if (obstacleTimer) {
                    obstacleTimer.remove();
                    obstacleTimer = scene.time.addEvent({
                        delay: spawnRate,
                        callback: () => spawnObstacle(scene),
                        loop: true
                    });
                }
            }
            if (survivalTime > 20 && spawnRate > 500) {
                spawnRate = 500;
                obstacleSpeed = 300;
                if (obstacleTimer) {
                    obstacleTimer.remove();
                    obstacleTimer = scene.time.addEvent({
                        delay: spawnRate,
                        callback: () => spawnObstacle(scene),
                        loop: true
                    });
                }
            }
            if (survivalTime > 30 && spawnRate > 400) {
                spawnRate = 400;
                obstacleSpeed = 350;
                if (obstacleTimer) {
                    obstacleTimer.remove();
                    obstacleTimer = scene.time.addEvent({
                        delay: spawnRate,
                        callback: () => spawnObstacle(scene),
                        loop: true
                    });
                }
            }
        }

        function spawnObstacle(scene) {
            if (!gameStarted || gameOver) return;
            
            console.log('spawnObstacle開始 - obstacleSpeed:', obstacleSpeed);
            
            // ランダムなX座標
            const x = Phaser.Math.Between(50, 750);
            
            // 障害物（赤い円）を作成 - デバッグ用に大きく
            const obstacle = scene.add.circle(x, 50, 40, 0xff6b6b);  // y=-30 → 50, radius=25 → 40
            
            // 物理ボディを追加（第二引数 true で有効化）
            scene.physics.add.existing(obstacle, false);
            
            // 速度を明示的に設定
            if (obstacle.body) {
                obstacle.body.setVelocity(0, obstacleSpeed);  // setVelocity(x, y) 形式に変更
                console.log('速度設定 - Y:', obstacle.body.velocity.y, 'obstacleSpeed:', obstacleSpeed);
            } else {
                console.error('物理ボディがない！');
            }
            
            // グループに追加
            obstacles.add(obstacle);
            
            // 画面外に出たら削除
            scene.time.delayedCall(5000, () => {
                if (obstacle && obstacle.active) {
                    obstacle.destroy();
                }
            });
        }

        function hitObstacle(scene, player, obstacle) {
            if (gameOver) return;
            
            // ゲームオーバー
            gameOver = true;
            gameStarted = false;
            
            // タイマー停止
            timerEvent.remove();
            obstacleTimer.remove();
            
            // 全ての障害物を停止
            obstacles.children.iterate((obs) => {
                obs.body.setVelocity(0, 0);
            });
            
            // プレイヤーを赤くする
            player.fillColor = 0xff0000;
            
            // 爆発エフェクト
            const explosion = scene.add.circle(player.x, player.y, 30, 0xffffff, 0.8);
            scene.tweens.add({
                targets: explosion,
                alpha: 0,
                scale: 3,
                duration: 500,
                onComplete: () => explosion.destroy()
            });
            
            // ゲームオーバー音
            playGameOverSound();
            
            // 結果表示
            const grade = survivalTime >= 30 ? 'S' : survivalTime >= 20 ? 'A' : survivalTime >= 10 ? 'B' : 'C';
            resultText = scene.add.text(400, 300, `ゲームオーバー！\n\n生存時間: ${survivalTime.toFixed(1)}秒\nスコア: ${score}\nランク: ${grade}\n\nタップで再プレイ`, {
                fontSize: '42px',
                fill: '#fff',
                fontStyle: 'bold',
                align: 'center',
                stroke: '#000',
                strokeThickness: 4
            });
            resultText.setOrigin(0.5);
        }

        function resetGame(scene) {
            // リセット
            score = 0;
            survivalTime = 0;
            gameOver = false;
            spawnRate = 1000;
            obstacleSpeed = 500;
            
            scoreText.setText('スコア: 0');
            timeText.setText('0.0秒');
            
            // プレイヤーをリセット
            player.x = 400;
            player.y = 550;
            player.fillColor = 0x4ecdc4;
            player.body.setVelocity(0, 0);
            
            // 障害物を全削除
            obstacles.clear(true, true);
            
            // 結果テキスト削除
            if (resultText) {
                resultText.destroy();
            }
            
            // スタート画面表示
            startText.setVisible(true);
            startText.setText('タップしてスタート！\n\nタップした位置に移動するわよ');
            player.setVisible(false);
        }

        function update() {
            // デバッグ情報表示（スマホで確認用）
            if (debugText && gameStarted) {
                const obstacleCount = obstacles.getChildren().length;
                let firstObstacleInfo = 'なし';
                if (obstacleCount > 0) {
                    const firstObs = obstacles.getChildren()[0];
                    firstObstacleInfo = `y=${Math.floor(firstObs.y)} vy=${firstObs.body ? firstObs.body.velocity.y : 'なし'}`;
                }
                debugText.setText(`障害物数: ${obstacleCount}\n最初: ${firstObstacleInfo}\nspeed: ${obstacleSpeed}`);
            }
        }
    </script>
</body>
</html>
