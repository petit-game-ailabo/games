<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>One Shot Deck</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;color:#e6edf3;font-family:'Helvetica Neue',Arial,sans-serif;display:flex;justify-content:center;min-height:100vh;overflow-x:hidden}
#game{width:460px;max-width:100vw;padding:8px;user-select:none}

.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;font-size:11px;color:#8b949e}
.stage-label{font-size:15px;font-weight:bold;color:#f0c060}

/* Boss */
.boss-area{background:#1a1020;border:2px solid #4a2060;border-radius:10px;padding:10px;margin-bottom:8px;text-align:center;position:relative}
.boss-row{display:flex;align-items:center;gap:10px;justify-content:center}
.boss-emoji{font-size:36px}
.boss-info{text-align:left}
.boss-name{font-size:14px;font-weight:bold;color:#ff6b8a}
.hp-bar{background:#333;border-radius:6px;height:16px;position:relative;overflow:hidden;width:200px;margin-top:4px}
.hp-fill{height:100%;background:linear-gradient(90deg,#ff4466,#ff6b8a);border-radius:6px;transition:width 0.6s}
.hp-text{position:absolute;top:0;left:0;right:0;text-align:center;font-size:10px;line-height:16px;font-weight:bold}
.dmg-popup{position:absolute;right:10px;top:8px;font-size:22px;font-weight:bold;color:#ff4444;text-shadow:0 0 8px rgba(255,68,68,0.6);opacity:0;transition:opacity 0.3s}
.dmg-popup.show{opacity:1}
.dmg-popup.big{color:#ff0;font-size:28px;text-shadow:0 0 16px rgba(255,255,0,0.8)}

/* Stats bar */
.stats-bar{display:flex;justify-content:space-around;background:#161b22;border-radius:8px;padding:6px;margin-bottom:8px;font-size:11px}
.stat{text-align:center}
.stat-val{font-size:14px;font-weight:bold;color:#58a6ff}
.stat-label{color:#8b949e;font-size:9px}

/* Hand */
.section-label{font-size:11px;color:#8b949e;margin:6px 0 4px;display:flex;justify-content:space-between}
.hand-area{display:flex;gap:4px;flex-wrap:wrap;min-height:80px;margin-bottom:6px}
.card{border-radius:8px;padding:6px 4px;text-align:center;cursor:pointer;transition:all 0.15s;position:relative}
.card:hover{transform:translateY(-3px);filter:brightness(1.15)}
.card:active{transform:scale(0.93)}
.hand-card{width:72px;min-height:85px;background:#161b22;border:2px solid #30363d}
.shop-card{width:100%;min-height:80px;background:#161b22;border:2px solid #30363d}
.card .c-emoji{font-size:22px}
.card .c-name{font-size:9px;font-weight:bold;margin:2px 0}
.card .c-desc{font-size:8px;color:#8b949e;line-height:1.2}
.card .c-cost{position:absolute;top:2px;right:4px;font-size:9px;color:#ffd700}
.card.disabled{opacity:0.3;cursor:default;transform:none!important}

/* Type colors */
.t-gem{border-color:#3fb950}.t-gem .c-name{color:#3fb950}
.t-atk{border-color:#da3633}.t-atk .c-name{color:#ff6b6b}
.t-mult{border-color:#ffd700}.t-mult .c-name{color:#ffd700}
.t-draw{border-color:#58a6ff}.t-draw .c-name{color:#58a6ff}
.t-heal{border-color:#f778ba}.t-heal .c-name{color:#f778ba}
.t-thin{border-color:#a371f7}.t-thin .c-name{color:#a371f7}
.t-util{border-color:#79c0ff}.t-util .c-name{color:#79c0ff}

/* Shop */
.shop-area{background:#111820;border:1px solid #21262d;border-radius:8px;padding:8px;margin-bottom:6px}
.shop-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr;gap:4px}
.shop-card .c-cost{position:static;display:block;margin-top:3px;font-size:10px}

/* Played zone */
.played-zone{background:#0a1628;border:1px dashed #1f3a5f;border-radius:8px;padding:6px;margin-bottom:6px;min-height:40px}
.played-row{display:flex;gap:3px;flex-wrap:wrap}
.played-mini{background:#1a2a44;border:1px solid #2a4a6a;border-radius:4px;padding:3px;text-align:center;width:42px;font-size:7px}
.played-mini .c-emoji{font-size:14px}
.turn-summary{font-size:11px;margin-top:4px}
.turn-summary .atk-val{color:#ff6b6b;font-weight:bold}
.turn-summary .gem-val{color:#3fb950;font-weight:bold}

/* Buttons */
.btn-row{display:flex;gap:6px;margin-bottom:6px}
.btn{flex:1;padding:10px;border-radius:8px;border:none;font-size:13px;font-weight:bold;cursor:pointer;transition:all 0.15s}
.btn:hover{filter:brightness(1.2)}.btn:active{transform:scale(0.97)}
.btn:disabled{opacity:0.3;cursor:default;filter:none;transform:none}
.btn-end{background:#238636;color:#fff}
.btn-alt{background:#21262d;color:#e6edf3;border:1px solid #30363d}

/* Log */
.log-area{background:#0d1117;border:1px solid #21262d;border-radius:6px;padding:6px;height:70px;overflow-y:auto;font-size:10px;line-height:1.4;color:#8b949e}
.log-area .hit{color:#ff6b6b}.log-area .buy{color:#3fb950}.log-area .info{color:#58a6ff}.log-area .thin{color:#a371f7}

/* Overlay */
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.9);display:flex;justify-content:center;align-items:center;z-index:100;flex-direction:column;padding:20px}
.overlay h2{font-size:24px;margin-bottom:10px}
.overlay p{font-size:13px;color:#8b949e;margin-bottom:14px;text-align:center;line-height:1.8}
.overlay button{padding:12px 32px;border-radius:10px;border:none;background:#238636;color:#fff;font-size:15px;font-weight:bold;cursor:pointer}
.hidden{display:none!important}

@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.shake{animation:shake 0.3s ease}
</style>
</head>
<body>

<div id="game">
  <div class="top-bar">
    <span class="stage-label" id="stageLabel">STAGE 1</span>
    <span>ターン <span id="turnNum">1</span></span>
    <span>デッキ <span id="deckCount">0</span> | 捨札 <span id="discardCount">0</span></span>
  </div>

  <div class="boss-area" id="bossArea">
    <div class="boss-row">
      <div class="boss-emoji" id="bossEmoji">👹</div>
      <div class="boss-info">
        <div class="boss-name" id="bossName">ゴブリン将軍</div>
        <div class="hp-bar"><div class="hp-fill" id="hpFill" style="width:100%"></div><div class="hp-text" id="hpText">200/200</div></div>
      </div>
    </div>
    <div class="dmg-popup" id="dmgPopup"></div>
  </div>

  <div class="stats-bar">
    <div class="stat"><div class="stat-val" id="gemCount">0</div><div class="stat-label">💎 宝石</div></div>
    <div class="stat"><div class="stat-val" id="atkCount">0</div><div class="stat-label">⚔️ 攻撃力</div></div>
    <div class="stat"><div class="stat-val" id="multCount">×1</div><div class="stat-label">🔥 倍率</div></div>
    <div class="stat"><div class="stat-val" id="drawCount">0</div><div class="stat-label">🃏 追加ドロー</div></div>
  </div>

  <div class="section-label"><span>🃏 手札</span><span id="handCount"></span></div>
  <div class="hand-area" id="handArea"></div>

  <div class="played-zone">
    <div class="played-row" id="playedRow"></div>
    <div class="turn-summary" id="turnSummary"></div>
  </div>

  <div class="shop-area">
    <div class="section-label" style="margin-top:0"><span>🛒 サプライ（宝石で購入）</span></div>
    <div class="shop-grid" id="shopGrid"></div>
  </div>

  <div class="btn-row">
    <button class="btn btn-end" id="endTurnBtn" onclick="endTurn()">ターン終了</button>
  </div>

  <div class="log-area" id="logArea"></div>
</div>

<div class="overlay" id="startScreen">
  <h2>🃏 One Shot Deck</h2>
  <p>デッキを回して、コンボを組んで、<br>ワンショットでボスを倒せ！<br><br>
  <span style="font-size:11px;color:#ffd700">
  💎 宝石カードでサプライからカードを購入<br>
  ⚔️ 攻撃カードでダメージを与える<br>
  🔥 倍率カードで攻撃力を乗算<br>
  🗑️ 圧縮カードでデッキを薄くする<br><br>
  カードを使う → 捨札 → デッキが尽きたらシャッフルして再利用</span></p>
  <button onclick="startGame()">はじめる</button>
</div>

<div class="overlay hidden" id="resultScreen">
  <h2 id="resultTitle"></h2>
  <p id="resultText"></p>
  <button onclick="startGame()">もう一度</button>
</div>

<script>
// === Card Definitions ===
function gem(v){return{name:`宝石(${v})`,emoji:'💎',type:'gem',value:v,desc:`${v}💎`,cost:0}}
function atkCard(name,emoji,dmg,cost,desc){return{name,emoji,type:'atk',dmg,cost,desc:desc||`${dmg}ダメージ`}}
function multCard(name,emoji,mult,cost){return{name,emoji,type:'mult',mult,cost,desc:`攻撃×${mult}`}}
function drawCard(name,emoji,draw,cost){return{name,emoji,type:'draw',draw,cost,desc:`+${draw}ドロー`}}
function healCard(name,emoji,heal,cost){return{name,emoji,type:'heal',heal,cost,desc:`HP${heal}回復`}}
function thinCard(name,emoji,cost,thinCount){return{name,emoji,type:'thin',cost,thinCount:thinCount||1,desc:`手札${thinCount||1}枚廃棄`}}
function utilCard(name,emoji,cost,effect,desc){return{name,emoji,type:'util',cost,effect,desc}}

// Starter cards
const STARTER_ATK = atkCard('銅の剣','⚔️',5,0);
const STARTER_GEM = gem(1);

// Supply cards (available for purchase)
const SUPPLY_POOL = [
  // Gems
  gem(2), gem(3),
  // Attacks
  atkCard('鉄の剣','🗡️',10,3),
  atkCard('炎の剣','🔥',18,5),
  atkCard('聖剣','⚡',30,8),
  atkCard('魔剣','💀',50,12),
  // Multipliers
  multCard('気合','🔥',2,4),
  multCard('怒り','💢',3,7),
  multCard('覚醒','✨',2,5),
  // Draw
  drawCard('閃き','💡',2,3),
  drawCard('知恵の書','📚',3,6),
  // Heal
  healCard('薬草','🌿',20,2),
  healCard('聖水','💧',50,5),
  // Thin (deck compression)
  thinCard('鍛冶屋','🔨',3,1),
  thinCard('商人','🧹',4,2),
  // Utility
  utilCard('金脈','💰',3,'gainGem2','次ターン+2💎'),
  utilCard('略奪','🏴‍☠️',5,'doubleGems','宝石の価値2倍(このターン)'),
];

const BOSSES = [
  {name:'ゴブリン将軍',emoji:'👺',hp:200,atk:8,turnLimit:20},
  {name:'炎の魔人',emoji:'🔥',hp:600,atk:15,turnLimit:18},
  {name:'闇竜王',emoji:'🐉',hp:1500,atk:25,turnLimit:15},
];

// === State ===
let deck=[],hand=[],discard=[],played=[];
let supply=[];
let turnGems=0,turnAtk=0,turnMult=1,turnDraw=0,turnEffects=[];
let bossHp=0,bossMaxHp=0,bossAtk=0;
let playerHp=0,playerMaxHp=100;
let stage=0,turnNum=0,turnLimit=20;
let phase=''; // play | end

function startGame(){
  hide('startScreen');hide('resultScreen');
  el('logArea').innerHTML='';
  stage=0; playerHp=100; playerMaxHp=100;
  
  // Build starter deck: 1 attack + 4 gems
  deck=[];
  deck.push({...STARTER_ATK});
  for(let i=0;i<4;i++) deck.push({...STARTER_GEM});
  
  discard=[]; hand=[]; played=[];
  shuffleDeck();
  startStage();
}

function startStage(){
  const boss=BOSSES[stage];
  bossHp=boss.hp; bossMaxHp=boss.hp; bossAtk=boss.atk; turnLimit=boss.turnLimit;
  turnNum=0;
  
  // Generate supply (random selection from pool)
  supply=[];
  const pool=shuffle([...SUPPLY_POOL]);
  for(let i=0;i<5;i++){
    const card={...pool[i], qty: 99}; // unlimited stock for simplicity
    supply.push(card);
  }
  
  el('stageLabel').textContent=`STAGE ${stage+1}`;
  el('bossName').textContent=boss.name;
  el('bossEmoji').textContent=boss.emoji;
  updateBossHp();
  renderSupply();
  log(`<span class="info">── STAGE ${stage+1}: ${boss.name} HP:${boss.hp} ATK:${boss.atk} ──</span>`);
  
  startTurn();
}

function shuffleDeck(){
  deck=shuffle(discard.concat(deck));
  discard=[];
}

function drawCards(n){
  for(let i=0;i<n;i++){
    if(deck.length===0){
      if(discard.length===0) return; // no cards left
      shuffleDeck();
      log(`<span class="info">🔄 デッキシャッフル</span>`);
    }
    hand.push(deck.pop());
  }
}

function startTurn(){
  turnNum++;
  phase='play';
  turnGems=0; turnAtk=0; turnMult=1; turnDraw=0; turnEffects=[];
  played=[];
  
  drawCards(5);
  
  el('turnNum').textContent=turnNum;
  updateCounts();
  renderHand();
  renderPlayed();
  renderSupply();
  el('endTurnBtn').disabled=false;
}

// === Play a card from hand ===
function playHandCard(idx){
  if(phase!=='play') return;
  const card=hand.splice(idx,1)[0];
  played.push(card);
  
  applyCard(card);
  
  // Process extra draws
  while(turnDraw>0){
    turnDraw--;
    drawCards(1);
  }
  
  updateCounts();
  renderHand();
  renderPlayed();
  renderSupply(); // update affordability
}

function applyCard(card){
  switch(card.type){
    case 'gem':
      let val=card.value;
      if(turnEffects.includes('doubleGems')) val*=2;
      turnGems+=val;
      break;
    case 'atk':
      turnAtk+=card.dmg;
      break;
    case 'mult':
      turnMult*=card.mult;
      break;
    case 'draw':
      turnDraw+=card.draw;
      break;
    case 'heal':
      playerHp=Math.min(playerMaxHp, playerHp+card.heal);
      log(`<span class="info">💚 HP+${card.heal} (${playerHp}/${playerMaxHp})</span>`);
      break;
    case 'thin':
      // Mark phase for trashing from hand
      if(hand.length>0){
        const toTrash=Math.min(card.thinCount, hand.length);
        // Auto-trash weakest gems first
        for(let i=0;i<toTrash;i++){
          const gemIdx=hand.findIndex(c=>c.type==='gem'&&c.value===1);
          if(gemIdx>=0){
            const trashed=hand.splice(gemIdx,1)[0];
            log(`<span class="thin">🗑️ ${trashed.name}を廃棄</span>`);
          } else if(hand.length>0){
            // Trash first card
            const trashed=hand.splice(0,1)[0];
            log(`<span class="thin">🗑️ ${trashed.name}を廃棄</span>`);
          }
        }
      }
      break;
    case 'util':
      if(card.effect==='gainGem2') turnGems+=2;
      if(card.effect==='doubleGems') turnEffects.push('doubleGems');
      break;
  }
}

// === Buy from supply ===
function buySupply(idx){
  if(phase!=='play') return;
  const card=supply[idx];
  if(turnGems<card.cost) return;
  
  turnGems-=card.cost;
  discard.push({...card}); // goes to discard
  log(`<span class="buy">📦 ${card.name}を購入 → 捨札へ</span>`);
  
  updateCounts();
  renderSupply();
}

// === End Turn ===
function endTurn(){
  if(phase!=='play') return;
  phase='end';
  el('endTurnBtn').disabled=true;
  
  // Calculate damage
  const totalDmg=Math.floor(turnAtk*turnMult);
  
  if(totalDmg>0){
    bossHp=Math.max(0,bossHp-totalDmg);
    log(`<span class="hit">⚔️ ${turnAtk}${turnMult>1?'×'+turnMult:''}= ${totalDmg}ダメージ！</span>`);
    showDmg(totalDmg);
    el('bossArea').classList.add('shake');
    setTimeout(()=>el('bossArea').classList.remove('shake'),300);
    updateBossHp();
  }
  
  // Boss attacks player
  if(bossHp>0){
    playerHp=Math.max(0,playerHp-bossAtk);
    log(`👹 ボスの反撃！ ${bossAtk}ダメージ (HP:${playerHp})`);
  }
  
  // Discard hand + played
  discard=discard.concat(hand).concat(played);
  hand=[]; played=[];
  
  setTimeout(()=>{
    if(bossHp<=0){
      log(`<span class="info">🎉 ${BOSSES[stage].name}を撃破！</span>`);
      if(stage>=BOSSES.length-1){
        gameOver(true);
      } else {
        stage++;
        setTimeout(()=>startStage(),600);
      }
      return;
    }
    
    if(playerHp<=0){
      gameOver(false);
      return;
    }
    
    if(turnNum>=turnLimit){
      gameOver(false);
      return;
    }
    
    startTurn();
  },800);
}

// === Render ===
function renderHand(){
  const area=el('handArea');
  area.innerHTML='';
  hand.forEach((c,i)=>{
    area.innerHTML+=`<div class="card hand-card t-${c.type}" onclick="playHandCard(${i})">
      <div class="c-emoji">${c.emoji}</div>
      <div class="c-name">${c.name}</div>
      <div class="c-desc">${c.desc}</div>
    </div>`;
  });
  el('handCount').textContent=`${hand.length}枚`;
}

function renderPlayed(){
  const row=el('playedRow');
  row.innerHTML='';
  played.forEach(c=>{
    row.innerHTML+=`<div class="played-mini"><div class="c-emoji">${c.emoji}</div>${c.name}</div>`;
  });
  
  const totalDmg=Math.floor(turnAtk*turnMult);
  const sum=el('turnSummary');
  sum.innerHTML=`💎<span class="gem-val">${turnGems}</span> ⚔️<span class="atk-val">${turnAtk}${turnMult>1?'×'+turnMult+'='+totalDmg:''}</span> ❤️${playerHp}`;
}

function renderSupply(){
  const grid=el('shopGrid');
  grid.innerHTML='';
  supply.forEach((c,i)=>{
    const affordable=turnGems>=c.cost;
    grid.innerHTML+=`<div class="card shop-card t-${c.type}${affordable?'':' disabled'}" onclick="buySupply(${i})">
      <div class="c-emoji">${c.emoji}</div>
      <div class="c-name">${c.name}</div>
      <div class="c-desc">${c.desc}</div>
      <div class="c-cost">💎${c.cost}</div>
    </div>`;
  });
}

function updateCounts(){
  el('gemCount').textContent=turnGems;
  el('atkCount').textContent=turnAtk;
  el('multCount').textContent='×'+turnMult;
  el('drawCount').textContent=turnDraw;
  el('deckCount').textContent=deck.length;
  el('discardCount').textContent=discard.length;
}

function updateBossHp(){
  const pct=Math.max(0,(bossHp/bossMaxHp)*100);
  el('hpFill').style.width=pct+'%';
  el('hpText').textContent=`${bossHp} / ${bossMaxHp}`;
}

function showDmg(val){
  const popup=el('dmgPopup');
  popup.textContent='-'+val;
  popup.className='dmg-popup show'+(val>=100?' big':'');
  setTimeout(()=>popup.className='dmg-popup',1500);
}

function gameOver(won){
  el('resultScreen').classList.remove('hidden');
  if(won){
    el('resultTitle').textContent='🏆 完全勝利！';
    el('resultText').innerHTML=`全ボスを撃破！<br>ターン数: ${turnNum}<br>残りHP: ${playerHp}`;
  } else {
    let reason=playerHp<=0?'HPが0になった…':'ターン制限に達した…';
    el('resultTitle').textContent='💀 敗北…';
    el('resultText').innerHTML=`${BOSSES[stage].name}に敗北<br>${reason}<br>残りボスHP: ${bossHp}`;
  }
}

// === Utils ===
function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]}return arr}
function el(id){return document.getElementById(id)}
function hide(id){el(id).classList.add('hidden')}
function log(m){const a=el('logArea');a.innerHTML+=m+'<br>';a.scrollTop=a.scrollHeight}
</script>
</body>
</html>
