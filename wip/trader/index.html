<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>波乗りトレーダー - 今日のミニゲーム</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; }
        body {
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; background: #0a0a1a; overflow: hidden;
        }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <script>
        const W = 400, H = 700;
        const config = {
            type: Phaser.AUTO, width: W, height: H,
            parent: 'game-container',
            backgroundColor: '#0f1628',
            scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
            scene: { create, update }
        };
        const game = new Phaser.Game(config);

        const P = {
            accent: 0x88ccff, purple: 0x9b6dff, pink: 0xff6b9d,
            green: 0x6bff8e, red: 0xff4757, yellow: 0xffe66b, white: 0xecf0f1,
        };

        let state = 'title';
        let money = 1000, holdings = 0, buyPrice = 0;
        let totalProfit = 0, trades = 0, bestTrades = 0;
        let timeLeft = 90; // 90秒（育成の時間）
        let countdownTimer;

        // チャート
        let price = 100, priceHistory = [], maHistory = [];
        const CHART_POINTS = 80;
        let chartGfx;
        let tick = 0;

        // 波動
        let wavePhase = 0;
        const WAVE_SPEED = 0.035, WAVE_AMP = 25;
        let subPhase = 0;
        const SUB_SPEED = 0.08, SUB_AMP = 8;
        let basePrice = 100;

        // === 育成（アップグレード）===
        let analysisLv = 0;  // 分析ツール
        let intelLv = 0;     // 情報網
        let instinctLv = 0;  // 直感力

        const UPGRADES = {
            analysis: {
                icon: '🔍', name: '分析',
                costs: [80, 150, 250],
                desc: ['予測矢印', '精度UP', '高精度'],
            },
            intel: {
                icon: '📰', name: '情報網',
                costs: [60, 120, 200],
                desc: ['FAKE検出30%', '60%', '90%'],
            },
            instinct: {
                icon: '💹', name: '直感',
                costs: [100, 180, 300],
                desc: ['売買ゲージ', '精度UP', '高精度'],
            },
        };

        // ニュース
        let activeNews = null, newsTimer = 0, nextNewsAt = 0;
        const NEWS_GOOD = [
            { text: '📰 好決算発表！', effect: 20 },
            { text: '📰 新製品が大ヒット！', effect: 15 },
            { text: '📰 大型提携を発表！', effect: 25 },
            { text: '📰 業績予想を上方修正！', effect: 18 },
        ];
        const NEWS_BAD = [
            { text: '📰 業績下方修正…', effect: -20 },
            { text: '📰 不正会計が発覚！', effect: -25 },
            { text: '📰 主力商品にリコール！', effect: -18 },
            { text: '📰 CEOが突然辞任！', effect: -22 },
        ];
        const NEWS_FAKE = [
            { text: '📰 噂: 買収されるらしい…', fakeDir: 1 },
            { text: '📰 噂: 倒産の危機…', fakeDir: -1 },
            { text: '📰 噂: 超大型案件受注…', fakeDir: 1 },
            { text: '📰 噂: 大規模リストラ…', fakeDir: -1 },
        ];

        // 予測矢印
        let predictionArrows = []; // {tick, direction, x, y}

        let ui = {}, endObjs = [], sceneRef;

        // 音
        const actx = new (window.AudioContext || window.webkitAudioContext)();
        function snd(f, t='sine', d=0.1, v=0.2) {
            const o=actx.createOscillator(), g=actx.createGain();
            o.connect(g); g.connect(actx.destination);
            o.frequency.value=f; o.type=t;
            g.gain.setValueAtTime(v, actx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, actx.currentTime+d);
            o.start(); o.stop(actx.currentTime+d);
        }
        function sndBuy() { snd(440,'sine',0.05); setTimeout(()=>snd(550,'sine',0.05),40); }
        function sndProfit() { snd(523,'sine',0.06); setTimeout(()=>snd(659,'sine',0.06),50); setTimeout(()=>snd(784,'sine',0.1),100); }
        function sndLoss() { snd(200,'square',0.15,0.12); }
        function sndNews() { snd(800,'square',0.03,0.15); setTimeout(()=>snd(1000,'square',0.03,0.15),60); }
        function sndUpgrade() { snd(880,'square',0.05); setTimeout(()=>snd(1100,'square',0.05),50); setTimeout(()=>snd(1320,'square',0.1),100); }

        function create() {
            sceneRef = this;

            // 背景グリッド
            const bg = this.add.graphics();
            bg.lineStyle(1, 0x1a2540, 0.5);
            for (let y = 0; y < H; y += 30) bg.lineBetween(0, y, W, y);
            for (let x = 0; x < W; x += 30) bg.lineBetween(x, 0, x, H);

            // チャートエリア
            this.add.rectangle(W/2, 280, W - 16, 220, 0x0a0f1e, 0.8).setStrokeStyle(1, P.accent, 0.2);
            chartGfx = this.add.graphics();

            // === HUD ===
            ui.topBg = this.add.rectangle(W/2, 45, W, 90, 0x0a0f1e, 0.9);
            ui.priceLabel = this.add.text(W/2, 8, '¥100', {
                fontSize: '30px', fill: '#88ccff', fontFamily: 'monospace', fontStyle: 'bold'
            }).setOrigin(0.5, 0);
            ui.priceChange = this.add.text(W/2, 42, '+0.0%', {
                fontSize: '13px', fill: '#6bff8e', fontFamily: 'monospace'
            }).setOrigin(0.5, 0);
            ui.moneyText = this.add.text(12, 60, '💰 ¥1,000', {
                fontSize: '12px', fill: '#ffe66b', fontFamily: 'monospace', fontStyle: 'bold'
            });
            ui.holdText = this.add.text(W-12, 60, '📦 0株', {
                fontSize: '12px', fill: '#888', fontFamily: 'monospace', fontStyle: 'bold'
            }).setOrigin(1, 0);
            ui.timeText = this.add.text(W/2, 60, '90s', {
                fontSize: '12px', fill: '#9b6dff', fontFamily: 'monospace'
            }).setOrigin(0.5, 0);
            ui.plText = this.add.text(W/2, 76, '', {
                fontSize: '11px', fill: '#888', fontFamily: 'monospace'
            }).setOrigin(0.5, 0);

            // 直感メーター（RSI風）
            ui.instinctBg = this.add.rectangle(W - 25, 280, 16, 200, 0x111111);
            ui.instinctBg.setStrokeStyle(1, 0x333, 0.5);
            ui.instinctBar = this.add.rectangle(W - 25, 380, 12, 4, P.accent);
            ui.instinctHigh = this.add.text(W - 25, 185, '売', { fontSize: '10px', fill: '#ff4757' }).setOrigin(0.5);
            ui.instinctLow = this.add.text(W - 25, 375, '買', { fontSize: '10px', fill: '#6bff8e' }).setOrigin(0.5);
            ui.instinctLabel = this.add.text(W - 25, 390, '💹', { fontSize: '14px' }).setOrigin(0.5);

            // ニュースティッカー
            ui.newsBg = this.add.rectangle(W/2, 405, W - 16, 30, 0x1a1030, 0.9);
            ui.newsBg.setStrokeStyle(1, P.purple, 0.3);
            ui.newsText = this.add.text(W/2, 400, '', {
                fontSize: '13px', fill: '#fff', fontStyle: 'bold', stroke: '#000', strokeThickness: 1
            }).setOrigin(0.5);
            ui.newsHint = this.add.text(W/2, 414, '', {
                fontSize: '10px', fill: '#888', fontFamily: 'monospace'
            }).setOrigin(0.5);

            // === 売買ボタン ===
            const btnY = 455, btnH = 50, btnW = 185;

            ui.buyBtn = this.add.rectangle(W/4+3, btnY, btnW, btnH, 0x1a3a2a, 0.95);
            ui.buyBtn.setStrokeStyle(2, P.green, 0.6);
            ui.buyBtn.setInteractive();
            ui.buyBtn.on('pointerdown', () => doBuy());
            ui.buyLabel = this.add.text(W/4+3, btnY-6, '📈 買う', { fontSize: '18px', fill: '#6bff8e', fontStyle: 'bold' }).setOrigin(0.5);
            ui.buyCost = this.add.text(W/4+3, btnY+15, '¥100', { fontSize: '12px', fill: '#6bff8e', fontFamily: 'monospace' }).setOrigin(0.5);

            ui.sellBtn = this.add.rectangle(3*W/4-3, btnY, btnW, btnH, 0x3a1a2a, 0.95);
            ui.sellBtn.setStrokeStyle(2, P.red, 0.6);
            ui.sellBtn.setInteractive();
            ui.sellBtn.on('pointerdown', () => doSell());
            ui.sellLabel = this.add.text(3*W/4-3, btnY-6, '📉 売る', { fontSize: '18px', fill: '#ff4757', fontStyle: 'bold' }).setOrigin(0.5);
            ui.sellInfo = this.add.text(3*W/4-3, btnY+15, '保有なし', { fontSize: '12px', fill: '#666', fontFamily: 'monospace' }).setOrigin(0.5);

            // 全力ボタン
            ui.buyAllBtn = this.add.rectangle(W/4+3, btnY+40, btnW, 22, 0x0a0f1e);
            ui.buyAllBtn.setStrokeStyle(1, P.green, 0.3);
            ui.buyAllBtn.setInteractive();
            ui.buyAllBtn.on('pointerdown', () => doBuy(true));
            ui.buyAllText = this.add.text(W/4+3, btnY+40, '全力買い', { fontSize: '10px', fill: '#6bff8e', fontFamily: 'monospace' }).setOrigin(0.5);

            ui.sellAllBtn = this.add.rectangle(3*W/4-3, btnY+40, btnW, 22, 0x0a0f1e);
            ui.sellAllBtn.setStrokeStyle(1, P.red, 0.3);
            ui.sellAllBtn.setInteractive();
            ui.sellAllBtn.on('pointerdown', () => doSell(true));
            ui.sellAllText = this.add.text(3*W/4-3, btnY+40, '全売り', { fontSize: '10px', fill: '#ff4757', fontFamily: 'monospace' }).setOrigin(0.5);

            // === アップグレードボタン ===
            const upY = 540;
            const upKeys = ['analysis', 'intel', 'instinct'];
            const upXs = [70, 200, 330];
            ui.upBtns = {};

            upKeys.forEach((key, i) => {
                const u = UPGRADES[key];
                const bg = this.add.rectangle(upXs[i], upY, 120, 55, 0x0a0f1e, 0.9);
                bg.setStrokeStyle(1, P.purple, 0.4);
                bg.setInteractive();
                bg.on('pointerdown', () => buyUpgrade(key));

                const icon = this.add.text(upXs[i], upY - 12, `${u.icon} ${u.name}`, {
                    fontSize: '13px', fill: '#bbb', fontStyle: 'bold'
                }).setOrigin(0.5);
                const cost = this.add.text(upXs[i], upY + 8, `${u.costs[0]}c`, {
                    fontSize: '12px', fill: '#ffe66b', fontFamily: 'monospace'
                }).setOrigin(0.5);
                const lv = this.add.text(upXs[i] + 55, upY - 22, 'Lv0', {
                    fontSize: '9px', fill: '#9b6dff', fontFamily: 'monospace'
                }).setOrigin(1, 0);

                ui.upBtns[key] = { bg, icon, cost, lv };
            });

            // 累計利益
            ui.profitText = this.add.text(W/2, 585, '累計利益: ¥0', {
                fontSize: '14px', fill: '#888', fontFamily: 'monospace', fontStyle: 'bold'
            }).setOrigin(0.5);

            // 凡例
            ui.legend1 = this.add.text(22, 172, '― 価格  ', { fontSize: '9px', fill: '#88ccff', fontFamily: 'monospace' }).setAlpha(0.5);
            ui.legend2 = this.add.text(90, 172, '― 平均', { fontSize: '9px', fill: '#9b6dff', fontFamily: 'monospace' }).setAlpha(0.5);

            setGameUIVisible(false);

            // === スタート画面 ===
            ui.startBg = this.add.rectangle(W/2, H/2, W, H, 0x0f1628);
            const picoC = this.add.container(W/2, 120);
            picoC.add(this.add.ellipse(0, 15, 50, 60, 0x88ccff));
            picoC.add(this.add.circle(0, -20, 25, 0xffddbb));
            picoC.add(this.add.circle(-25, -15, 12, 0x9b6dff));
            picoC.add(this.add.circle(25, -15, 12, 0x9b6dff));
            picoC.add(this.add.circle(-8, -22, 3, 0x333));
            picoC.add(this.add.circle(8, -22, 3, 0x333));
            picoC.add(this.add.text(0, -14, '◡', { fontSize: '10px', fill: '#cc8877' }).setOrigin(0.5));
            picoC.add(this.add.rectangle(-8, -22, 12, 6, 0x333));
            picoC.add(this.add.rectangle(8, -22, 12, 6, 0x333));
            picoC.add(this.add.rectangle(0, -22, 8, 2, 0x333));
            ui.picoChar = picoC;
            this.tweens.add({ targets: picoC, y: 115, duration: 1500, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });

            ui.titleText = this.add.text(W/2, 200, '波乗りトレーダー', {
                fontSize: '28px', fill: '#fff', fontStyle: 'bold', stroke: '#0a0a1a', strokeThickness: 4
            }).setOrigin(0.5);
            ui.titleSub = this.add.text(W/2, 232, 'WAVE RIDER TRADER', {
                fontSize: '10px', fill: '#9b6dff', fontFamily: 'monospace'
            }).setOrigin(0.5);

            const mc = this.add.graphics();
            mc.lineStyle(2, P.accent, 0.3);
            mc.beginPath();
            for (let i = 0; i < 200; i++) {
                const x = 50 + i * 1.5, y = 310 + Math.sin(i * 0.05) * 25 + Math.sin(i * 0.12) * 10;
                if (i === 0) mc.moveTo(x, y); else mc.lineTo(x, y);
            }
            mc.strokePath();
            ui.miniChart = mc;

            ui.titleDesc = this.add.text(W/2, 400,
                '📈 波を読んで安く買い、高く売る\n📰 ニュースで値動きを予測\n🔍 利益で分析ツールをアップグレード\n⚠ フェイクニュースに注意！\n💰 90秒で資産を最大化', {
                fontSize: '14px', fill: '#bdc3c7', align: 'center', lineSpacing: 5
            }).setOrigin(0.5);

            let bs = ''; try { const b = localStorage.getItem('trader2_best'); if (b) bs = `BEST: +¥${b}`; } catch(e) {}
            ui.titleBest = this.add.text(W/2, 490, bs, {
                fontSize: '16px', fill: '#ffe66b', fontFamily: 'monospace', fontStyle: 'bold'
            }).setOrigin(0.5);

            ui.titleStart = this.add.text(W/2, 540, '▶ TAP TO START', {
                fontSize: '22px', fill: '#88ccff', fontStyle: 'bold', fontFamily: 'monospace'
            }).setOrigin(0.5);
            this.tweens.add({ targets: ui.titleStart, alpha: 0.3, duration: 800, yoyo: true, repeat: -1 });

            this.add.text(W/2, H - 10, 'Powered by Phaser', { fontSize: '10px', fill: '#fff' }).setOrigin(0.5).setAlpha(0.2);

            this.input.on('pointerdown', (ptr) => { if (state === 'title') startGame(this); });
        }

        function setGameUIVisible(v) {
            const els = [ui.topBg, ui.priceLabel, ui.priceChange, ui.moneyText, ui.holdText, ui.timeText, ui.plText,
                ui.instinctBg, ui.instinctBar, ui.instinctHigh, ui.instinctLow, ui.instinctLabel,
                ui.newsBg, ui.newsText, ui.newsHint,
                ui.buyBtn, ui.buyLabel, ui.buyCost, ui.buyAllBtn, ui.buyAllText,
                ui.sellBtn, ui.sellLabel, ui.sellInfo, ui.sellAllBtn, ui.sellAllText,
                ui.profitText, ui.legend1, ui.legend2];
            els.forEach(e => e && e.setVisible(v));
            Object.values(ui.upBtns).forEach(b => Object.values(b).forEach(o => o.setVisible(v)));
            // 直感メーターは直感Lv1以上で表示
            const showInstinct = v && instinctLv > 0;
            [ui.instinctBg, ui.instinctBar, ui.instinctHigh, ui.instinctLow, ui.instinctLabel].forEach(e => e.setVisible(showInstinct));
        }

        function startGame(scene) {
            state = 'playing';
            [ui.startBg, ui.picoChar, ui.titleText, ui.titleSub, ui.miniChart, ui.titleDesc, ui.titleBest, ui.titleStart].forEach(o => o.setVisible(false));
            scene.tweens.killAll();
            setGameUIVisible(true);

            money = 1000; holdings = 0; buyPrice = 0;
            totalProfit = 0; trades = 0; bestTrades = 0;
            timeLeft = 90; tick = 0;
            price = 100; basePrice = 100;
            priceHistory = []; maHistory = [];
            analysisLv = 0; intelLv = 0; instinctLv = 0;
            wavePhase = Math.random() * Math.PI * 2;
            subPhase = Math.random() * Math.PI * 2;
            activeNews = null; newsTimer = 0;
            nextNewsAt = Phaser.Math.Between(50, 90);
            predictionArrows = [];

            for (let i = 0; i < CHART_POINTS; i++) priceHistory.push(100 + Math.sin(i * WAVE_SPEED) * WAVE_AMP * 0.5);
            calcMA();
            updateUpgradeUI();
            updateAllUI();

            countdownTimer = scene.time.addEvent({
                delay: 1000,
                callback: () => {
                    timeLeft--;
                    ui.timeText.setText(`${timeLeft}s`);
                    if (timeLeft <= 10) ui.timeText.setFill('#ff4757');
                    if (timeLeft <= 0) endGame(scene);
                },
                loop: true
            });
        }

        function calcMA() {
            maHistory = [];
            for (let i = 0; i < priceHistory.length; i++) {
                const s = Math.max(0, i - 19);
                const sl = priceHistory.slice(s, i + 1);
                maHistory.push(sl.reduce((a, b) => a + b, 0) / sl.length);
            }
        }

        // === 予測矢印（分析ツール） ===
        function generatePrediction() {
            if (analysisLv <= 0) return;
            // 次の波の方向を予測
            const futurePhase = wavePhase + WAVE_SPEED * 30;
            const futurePrice = basePrice + Math.sin(futurePhase) * WAVE_AMP;
            const direction = futurePrice > price ? 1 : -1;

            // 精度（レベルで上がる）
            const accuracy = [0, 0.6, 0.75, 0.9][analysisLv];
            const isCorrect = Math.random() < accuracy;
            const showDir = isCorrect ? direction : -direction;

            // チャート右端に矢印表示
            const arrow = sceneRef.add.text(W - 45, showDir > 0 ? 195 : 370, showDir > 0 ? '▲' : '▼', {
                fontSize: '20px', fill: showDir > 0 ? '#6bff8e' : '#ff4757', fontStyle: 'bold'
            }).setOrigin(0.5).setAlpha(0.8);

            sceneRef.tweens.add({
                targets: arrow, alpha: 0, duration: 3000,
                onComplete: () => arrow.destroy()
            });
        }

        // === 直感メーター（RSI風） ===
        function updateInstinctMeter() {
            if (instinctLv <= 0) {
                [ui.instinctBg, ui.instinctBar, ui.instinctHigh, ui.instinctLow, ui.instinctLabel].forEach(e => e.setVisible(false));
                return;
            }
            [ui.instinctBg, ui.instinctBar, ui.instinctHigh, ui.instinctLow, ui.instinctLabel].forEach(e => e.setVisible(true));

            // 波の位相から「買われすぎ/売られすぎ」を算出
            const sineVal = Math.sin(wavePhase); // -1 ~ 1
            const noise = instinctLv >= 3 ? 0 : instinctLv >= 2 ? Phaser.Math.FloatBetween(-0.1, 0.1) : Phaser.Math.FloatBetween(-0.25, 0.25);
            const rsi = Math.max(-1, Math.min(1, sineVal + noise));

            // バー位置（上=売られすぎ=-1、下=買われすぎ=1）
            const meterY = 185;
            const meterH = 190;
            const barY = meterY + (1 - rsi) / 2 * meterH;

            ui.instinctBar.setPosition(W - 25, barY);

            // 色
            if (rsi > 0.5) {
                ui.instinctBar.setFillStyle(P.red); // 売りどき
            } else if (rsi < -0.5) {
                ui.instinctBar.setFillStyle(P.green); // 買いどき
            } else {
                ui.instinctBar.setFillStyle(P.accent);
            }
        }

        function triggerNews() {
            const roll = Math.random();
            let news;
            if (roll < 0.35) {
                const n = Phaser.Utils.Array.GetRandom(NEWS_GOOD);
                news = { text: n.text, effect: n.effect, isFake: false };
            } else if (roll < 0.70) {
                const n = Phaser.Utils.Array.GetRandom(NEWS_BAD);
                news = { text: n.text, effect: n.effect, isFake: false };
            } else {
                const n = Phaser.Utils.Array.GetRandom(NEWS_FAKE);
                news = { text: n.text, effect: Phaser.Math.Between(-5, 5), isFake: true, fakeDir: n.fakeDir };
            }

            activeNews = news;
            newsTimer = 180;
            sndNews();

            ui.newsText.setText(news.text);

            if (news.isFake) {
                // 情報網レベルでフェイク検出
                const detectChance = [0, 0.3, 0.6, 0.9][intelLv];
                if (Math.random() < detectChance) {
                    ui.newsHint.setText('🔍 FAKE検出！信用するな').setFill('#ff6b9d');
                } else {
                    const hint = news.fakeDir > 0 ? '↑ 上昇の噂' : '↓ 下落の噂';
                    ui.newsHint.setText(hint).setFill(news.fakeDir > 0 ? '#6bff8e' : '#ff4757');
                }
            } else {
                ui.newsHint.setText(news.effect > 0 ? '↑ 価格上昇の予兆' : '↓ 価格下落の予兆');
                ui.newsHint.setFill(news.effect > 0 ? '#6bff8e' : '#ff4757');
            }

            nextNewsAt = tick + Phaser.Math.Between(80, 140);
        }

        function updatePrice() {
            tick++;

            if (tick >= nextNewsAt && !activeNews) triggerNews();

            if (newsTimer > 0) {
                newsTimer--;
                if (newsTimer <= 0) {
                    basePrice += activeNews.effect * 0.15;
                    basePrice = Math.max(30, Math.min(250, basePrice));
                    if (activeNews.isFake) {
                        ui.newsText.setText('❌ フェイクでした！');
                        ui.newsHint.setText('');
                        setTimeout(() => { if (state === 'playing') { ui.newsText.setText(''); ui.newsHint.setText(''); } }, 1200);
                    } else {
                        ui.newsText.setText(''); ui.newsHint.setText('');
                    }
                    activeNews = null;
                }
            }

            wavePhase += WAVE_SPEED;
            subPhase += SUB_SPEED;
            price = basePrice + Math.sin(wavePhase) * WAVE_AMP + Math.sin(subPhase) * SUB_AMP + Phaser.Math.FloatBetween(-0.8, 0.8);
            price = Math.max(20, Math.min(300, price));

            priceHistory.push(price);
            if (priceHistory.length > CHART_POINTS) priceHistory.shift();
            calcMA();

            // 分析予測（60tickごと）
            if (tick % 60 === 0) generatePrediction();
        }

        function drawChart() {
            chartGfx.clear();
            const cX = 20, cY = 172, cW = W - 55, cH = 210;
            const min = Math.min(...priceHistory) - 5;
            const max = Math.max(...priceHistory) + 5;
            const range = max - min || 1;
            const toS = (v, i) => ({ x: cX + (i / (CHART_POINTS - 1)) * cW, y: cY + cH - ((v - min) / range) * cH });

            // 購入ライン
            if (holdings > 0) {
                const by = cY + cH - ((buyPrice - min) / range) * cH;
                if (by >= cY && by <= cY + cH) {
                    chartGfx.lineStyle(1, P.yellow, 0.35);
                    chartGfx.lineBetween(cX, by, cX + cW, by);
                }
            }

            // 移動平均
            chartGfx.lineStyle(1.5, P.purple, 0.45);
            chartGfx.beginPath();
            maHistory.forEach((v, i) => { const p = toS(v, i); i === 0 ? chartGfx.moveTo(p.x, p.y) : chartGfx.lineTo(p.x, p.y); });
            chartGfx.strokePath();

            // 塗りつぶし
            const pts = priceHistory.map((v, i) => toS(v, i));
            chartGfx.fillStyle(P.accent, 0.06);
            chartGfx.beginPath();
            chartGfx.moveTo(pts[0].x, cY + cH);
            pts.forEach(p => chartGfx.lineTo(p.x, p.y));
            chartGfx.lineTo(pts[pts.length-1].x, cY + cH);
            chartGfx.closePath();
            chartGfx.fillPath();

            // 価格ライン
            chartGfx.lineStyle(2.5, P.accent, 0.9);
            chartGfx.beginPath();
            pts.forEach((p, i) => { i === 0 ? chartGfx.moveTo(p.x, p.y) : chartGfx.lineTo(p.x, p.y); });
            chartGfx.strokePath();

            // ドット
            const last = pts[pts.length - 1];
            chartGfx.fillStyle(P.white, 1); chartGfx.fillCircle(last.x, last.y, 4);
            chartGfx.fillStyle(P.accent, 1); chartGfx.fillCircle(last.x, last.y, 2);

            // ガイド
            chartGfx.lineStyle(1, 0x333, 0.2);
            for (let i = 0; i <= 4; i++) chartGfx.lineBetween(cX, cY + cH / 4 * i, cX + cW, cY + cH / 4 * i);
        }

        function doBuy(all = false) {
            if (state !== 'playing') return;
            const p = Math.floor(price);
            if (all) {
                const n = Math.floor(money / p);
                if (n <= 0) { snd(100,'square',0.1,0.1); return; }
                buyPrice = holdings > 0 ? ((buyPrice * holdings + n * p) / (holdings + n)) : p;
                holdings += n; money -= n * p;
            } else {
                if (money < p) { snd(100,'square',0.1,0.1); return; }
                buyPrice = holdings > 0 ? ((buyPrice * holdings + p) / (holdings + 1)) : p;
                holdings += 1; money -= p;
            }
            trades++; sndBuy();
            showEffect(true); updateAllUI();
        }

        function doSell(all = false) {
            if (state !== 'playing' || holdings <= 0) { snd(100,'square',0.1,0.1); return; }
            const p = Math.floor(price);
            const n = all ? holdings : 1;
            const rev = n * p, profit = rev - n * buyPrice;
            totalProfit += profit; money += rev;
            holdings -= n;
            if (holdings <= 0) { holdings = 0; buyPrice = 0; }
            trades++; bestTrades = Math.max(bestTrades, profit);
            profit > 0 ? sndProfit() : sndLoss();
            showEffect(false, profit); updateAllUI();
        }

        function showEffect(isBuy, profit = 0) {
            const x = isBuy ? W/4 + 3 : 3*W/4 - 3, y = 430;
            const txt = sceneRef.add.text(x, y,
                isBuy ? '📈 BUY!' : `📉 ${profit >= 0 ? '+' : ''}¥${Math.floor(profit)}`, {
                fontSize: '16px', fill: isBuy ? '#6bff8e' : (profit >= 0 ? '#6bff8e' : '#ff4757'),
                fontStyle: 'bold', stroke: '#000', strokeThickness: 2
            }).setOrigin(0.5);
            sceneRef.tweens.add({ targets: txt, y: y - 30, alpha: 0, duration: 500, onComplete: () => txt.destroy() });
        }

        function buyUpgrade(key) {
            if (state !== 'playing') return;
            let lv, costs;
            if (key === 'analysis') { lv = analysisLv; costs = UPGRADES.analysis.costs; }
            else if (key === 'intel') { lv = intelLv; costs = UPGRADES.intel.costs; }
            else { lv = instinctLv; costs = UPGRADES.instinct.costs; }

            if (lv >= costs.length) { snd(100,'square',0.1,0.1); return; }
            const cost = costs[lv];
            if (totalProfit < cost && money < cost) { snd(100,'square',0.1,0.1); return; }

            // 所持金から引く
            if (money >= cost) { money -= cost; }
            else { snd(100,'square',0.1,0.1); return; }

            if (key === 'analysis') analysisLv++;
            else if (key === 'intel') intelLv++;
            else instinctLv++;

            sndUpgrade();
            updateUpgradeUI();
            updateAllUI();

            // エフェクト
            const u = UPGRADES[key];
            const lvNow = key === 'analysis' ? analysisLv : key === 'intel' ? intelLv : instinctLv;
            const fx = sceneRef.add.text(W/2, 520, `${u.icon} ${u.name} Lv${lvNow}!`, {
                fontSize: '20px', fill: '#9b6dff', fontStyle: 'bold', stroke: '#000', strokeThickness: 2
            }).setOrigin(0.5);
            sceneRef.tweens.add({ targets: fx, y: 490, alpha: 0, scale: 1.2, duration: 700, onComplete: () => fx.destroy() });
        }

        function updateUpgradeUI() {
            const lvs = { analysis: analysisLv, intel: intelLv, instinct: instinctLv };
            for (const [key, b] of Object.entries(ui.upBtns)) {
                const lv = lvs[key];
                const u = UPGRADES[key];
                b.lv.setText(`Lv${lv}`);
                if (lv >= u.costs.length) {
                    b.cost.setText('MAX');
                    b.bg.setAlpha(0.4);
                } else {
                    b.cost.setText(`¥${u.costs[lv]}`);
                    const canBuy = money >= u.costs[lv];
                    b.bg.setAlpha(canBuy ? 0.9 : 0.4);
                    [b.icon, b.cost].forEach(e => e.setAlpha(canBuy ? 1 : 0.4));
                }
            }
        }

        function updateAllUI() {
            const p = Math.floor(price);
            ui.priceLabel.setText(`¥${p}`);
            if (priceHistory.length >= 2) {
                const prev = priceHistory[priceHistory.length - 2];
                const ch = ((price - prev) / prev * 100).toFixed(1);
                ui.priceChange.setText(`${ch >= 0 ? '+' : ''}${ch}%`).setFill(ch >= 0 ? '#6bff8e' : '#ff4757');
            }
            ui.moneyText.setText(`💰 ¥${money.toLocaleString()}`);
            ui.holdText.setText(`📦 ${holdings}株`);
            ui.buyCost.setText(`¥${p}/株`);
            if (holdings > 0) {
                const pl = Math.floor((price - buyPrice) * holdings);
                ui.sellInfo.setText(`${pl >= 0 ? '+' : ''}¥${pl}`).setFill(pl >= 0 ? '#6bff8e' : '#ff4757');
                ui.plText.setText(`平均¥${Math.floor(buyPrice)}×${holdings}株`);
                ui.holdText.setFill('#ffe66b');
            } else {
                ui.sellInfo.setText('保有なし').setFill('#666');
                ui.plText.setText('');
                ui.holdText.setFill('#666');
            }
            ui.profitText.setText(`利益: ${totalProfit >= 0 ? '+' : ''}¥${Math.floor(totalProfit).toLocaleString()}`).setFill(totalProfit >= 0 ? '#6bff8e' : '#ff4757');

            [ui.buyBtn, ui.buyLabel, ui.buyCost, ui.buyAllBtn, ui.buyAllText].forEach(e => e.setAlpha(money >= p ? 1 : 0.35));
            [ui.sellBtn, ui.sellLabel, ui.sellInfo, ui.sellAllBtn, ui.sellAllText].forEach(e => e.setAlpha(holdings > 0 ? 1 : 0.35));

            updateInstinctMeter();
            updateUpgradeUI();
        }

        function update() {
            if (state !== 'playing') return;
            updatePrice();
            drawChart();
            updateAllUI();
        }

        function endGame(scene) {
            state = 'over';
            countdownTimer.remove();
            if (holdings > 0) {
                totalProfit += holdings * (Math.floor(price) - buyPrice);
                money += holdings * Math.floor(price);
                holdings = 0;
            }
            setGameUIVisible(false);
            chartGfx.clear();

            const profit = Math.floor(totalProfit);
            const prev = parseInt(localStorage.getItem('trader2_best') || '0');
            const isNew = profit > prev;
            if (isNew) try { localStorage.setItem('trader2_best', String(profit)); } catch(e) {}

            let rank = 'D';
            if (profit >= 500) rank = 'S';
            else if (profit >= 300) rank = 'A';
            else if (profit >= 100) rank = 'B';
            else if (profit >= 0) rank = 'C';
            const rc = { D: '#ff6b9d', C: '#ffe66b', B: '#88ccff', A: '#6bff8e', S: '#9b6dff' };

            endObjs = [];
            endObjs.push(scene.add.rectangle(W/2, H/2, W, H, 0x000000, 0.8));
            const card = scene.add.rectangle(W/2, H/2, 350, 440, 0x0f1628, 0.95);
            card.setStrokeStyle(2, P.purple, 0.5);
            endObjs.push(card);

            endObjs.push(scene.add.text(W/2, 170, '📊 取引終了', { fontSize: '26px', fill: '#fff', fontStyle: 'bold' }).setOrigin(0.5));
            endObjs.push(scene.add.text(W/2, 210, '累計利益', { fontSize: '13px', fill: '#888', fontFamily: 'monospace' }).setOrigin(0.5));
            endObjs.push(scene.add.text(W/2, 245, `${profit >= 0 ? '+' : ''}¥${profit.toLocaleString()}`, {
                fontSize: '38px', fill: profit >= 0 ? '#6bff8e' : '#ff4757', fontStyle: 'bold', fontFamily: 'monospace'
            }).setOrigin(0.5));
            endObjs.push(scene.add.text(W/2, 285, 'RANK', { fontSize: '13px', fill: '#888', fontFamily: 'monospace' }).setOrigin(0.5));
            endObjs.push(scene.add.text(W/2, 318, rank, { fontSize: '48px', fill: rc[rank], fontStyle: 'bold', fontFamily: 'monospace' }).setOrigin(0.5));
            endObjs.push(scene.add.text(W/2, 370,
                `💰 最終: ¥${money.toLocaleString()}  📊 ${trades}回\n🔍 分析Lv${analysisLv}  📰 情報Lv${intelLv}  💹 直感Lv${instinctLv}`, {
                fontSize: '12px', fill: '#bbb', fontFamily: 'monospace', align: 'center', lineSpacing: 6
            }).setOrigin(0.5));

            if (isNew) {
                const nb = scene.add.text(W/2, 410, '🎉 NEW BEST!', { fontSize: '16px', fill: '#ffe66b', fontStyle: 'bold' }).setOrigin(0.5);
                scene.tweens.add({ targets: nb, scale: 1.2, duration: 500, yoyo: true, repeat: -1 });
                endObjs.push(nb);
            }

            const btn = scene.add.rectangle(W/2, 465, 170, 48, P.purple);
            btn.setStrokeStyle(2, 0xffffff, 0.4); btn.setInteractive();
            btn.on('pointerdown', () => resetGame(scene));
            endObjs.push(btn);
            endObjs.push(scene.add.text(W/2, 465, '▶ RETRY', { fontSize: '18px', fill: '#fff', fontStyle: 'bold', fontFamily: 'monospace' }).setOrigin(0.5));
        }

        function resetGame(scene) {
            for (const o of endObjs) o.destroy();
            endObjs = []; scene.tweens.killAll();
            state = 'title';
            const b = localStorage.getItem('trader2_best');
            ui.titleBest.setText(b ? `BEST: +¥${b}` : '');
            [ui.startBg, ui.picoChar, ui.miniChart, ui.titleText, ui.titleSub, ui.titleDesc, ui.titleBest, ui.titleStart].forEach(o => o.setVisible(true));
            scene.tweens.add({ targets: ui.titleStart, alpha: 0.3, duration: 800, yoyo: true, repeat: -1 });
            scene.tweens.add({ targets: ui.picoChar, y: 115, duration: 1500, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });
        }
    </script>
