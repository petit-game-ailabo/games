<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>波乗りトレーダー - 今日のミニゲーム</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; }
        body {
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; background: #0a0a1a; overflow: hidden;
        }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <script>
        const W = 400, H = 700;
        const config = {
            type: Phaser.AUTO, width: W, height: H,
            parent: 'game-container',
            backgroundColor: '#0f1628',
            scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
            scene: { create, update }
        };
        const game = new Phaser.Game(config);

        const P = {
            accent: 0x88ccff, purple: 0x9b6dff, pink: 0xff6b9d,
            green: 0x6bff8e, red: 0xff4757, yellow: 0xffe66b, white: 0xecf0f1,
        };

        // ゲーム状態
        let state = 'title';
        let money = 1000, holdings = 0, buyPrice = 0;
        let totalProfit = 0, trades = 0, bestTrades = 0;
        let timeLeft = 60;
        let countdownTimer;

        // チャート
        let price = 100;
        let priceHistory = [];
        let maHistory = [];      // 移動平均
        const CHART_POINTS = 80;
        let chartGfx;
        let tick = 0;

        // 波動パラメータ（規則的な波 + 小さいノイズ）
        let wavePhase = 0;
        const WAVE_SPEED = 0.035;  // メインの波の速さ
        const WAVE_AMP = 25;       // メインの波の振幅
        let subPhase = 0;
        const SUB_SPEED = 0.08;
        const SUB_AMP = 8;
        let basePrice = 100;       // ベース価格（ニュースで変動）

        // ニュースシステム
        let newsQueue = [];        // {text, effect, delay, isFake}
        let activeNews = null;
        let newsTimer = 0;
        let nextNewsAt = 0;
        const NEWS_GOOD = [
            { text: '📰 好決算発表！', effect: 20 },
            { text: '📰 新製品が大ヒット！', effect: 15 },
            { text: '📰 大型提携を発表！', effect: 25 },
            { text: '📰 業績予想を上方修正！', effect: 18 },
            { text: '📰 政府が支援策発表！', effect: 22 },
        ];
        const NEWS_BAD = [
            { text: '📰 業績下方修正…', effect: -20 },
            { text: '📰 不正会計が発覚！', effect: -25 },
            { text: '📰 主力商品にリコール！', effect: -18 },
            { text: '📰 CEOが突然辞任！', effect: -22 },
            { text: '📰 競合が市場を奪取…', effect: -15 },
        ];
        const NEWS_FAKE = [
            { text: '⚠ 噂: 買収されるらしい…？', realEffect: 0, fakeDirection: 1 },
            { text: '⚠ 噂: 倒産の危機…？', realEffect: 0, fakeDirection: -1 },
            { text: '⚠ 噂: 超大型案件受注…？', realEffect: 0, fakeDirection: 1 },
        ];

        let ui = {};
        let endObjs = [];
        let sceneRef;

        // 音
        const actx = new (window.AudioContext || window.webkitAudioContext)();
        function snd(freq, type='sine', dur=0.1, vol=0.2) {
            const o = actx.createOscillator(), g = actx.createGain();
            o.connect(g); g.connect(actx.destination);
            o.frequency.value = freq; o.type = type;
            g.gain.setValueAtTime(vol, actx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + dur);
            o.start(); o.stop(actx.currentTime + dur);
        }
        function sndBuy() { snd(440, 'sine', 0.05); setTimeout(() => snd(550, 'sine', 0.05), 40); }
        function sndSell() { snd(660, 'sine', 0.05); setTimeout(() => snd(880, 'sine', 0.08), 40); }
        function sndProfit() { snd(523, 'sine', 0.06); setTimeout(() => snd(659, 'sine', 0.06), 50); setTimeout(() => snd(784, 'sine', 0.1), 100); }
        function sndLoss() { snd(200, 'square', 0.15, 0.12); }
        function sndNews() { snd(800, 'square', 0.03, 0.15); setTimeout(() => snd(1000, 'square', 0.03, 0.15), 60); }

        function create() {
            sceneRef = this;

            // 背景グリッド
            const bgGfx = this.add.graphics();
            bgGfx.lineStyle(1, 0x1a2540, 0.5);
            for (let y = 0; y < H; y += 30) bgGfx.lineBetween(0, y, W, y);
            for (let x = 0; x < W; x += 30) bgGfx.lineBetween(x, 0, x, H);

            // チャートエリア
            this.add.rectangle(W/2, 325, W - 20, 250, 0x0a0f1e, 0.8)
                .setStrokeStyle(1, P.accent, 0.2);

            chartGfx = this.add.graphics();

            // === HUD上部 ===
            ui.topBg = this.add.rectangle(W/2, 50, W, 100, 0x0a0f1e, 0.9);

            ui.priceLabel = this.add.text(W/2, 12, '¥100', {
                fontSize: '34px', fill: '#88ccff', fontFamily: 'monospace', fontStyle: 'bold'
            }).setOrigin(0.5, 0);

            ui.priceChange = this.add.text(W/2, 50, '+0.0%', {
                fontSize: '14px', fill: '#6bff8e', fontFamily: 'monospace'
            }).setOrigin(0.5, 0);

            ui.moneyText = this.add.text(15, 70, '💰 ¥1,000', {
                fontSize: '13px', fill: '#ffe66b', fontFamily: 'monospace', fontStyle: 'bold'
            });
            ui.holdText = this.add.text(W - 15, 70, '📦 0株', {
                fontSize: '13px', fill: '#888', fontFamily: 'monospace', fontStyle: 'bold'
            }).setOrigin(1, 0);
            ui.timeText = this.add.text(W/2, 70, '60s', {
                fontSize: '13px', fill: '#9b6dff', fontFamily: 'monospace'
            }).setOrigin(0.5, 0);

            ui.plText = this.add.text(W/2, 88, '', {
                fontSize: '12px', fill: '#888', fontFamily: 'monospace'
            }).setOrigin(0.5, 0);

            // === ニュースティッカー ===
            ui.newsBg = this.add.rectangle(W/2, 470, W - 20, 36, 0x1a1030, 0.9);
            ui.newsBg.setStrokeStyle(1, P.purple, 0.3);
            ui.newsText = this.add.text(W/2, 470, '', {
                fontSize: '14px', fill: '#fff', fontStyle: 'bold',
                stroke: '#000', strokeThickness: 1
            }).setOrigin(0.5);
            ui.newsHint = this.add.text(W/2, 488, '', {
                fontSize: '10px', fill: '#888', fontFamily: 'monospace'
            }).setOrigin(0.5);

            // === 買い/売りボタン ===
            const btnY = 535, btnH = 60, btnW = 170;

            ui.buyBtn = this.add.rectangle(W/4 + 5, btnY, btnW, btnH, 0x1a3a2a, 0.95);
            ui.buyBtn.setStrokeStyle(2, P.green, 0.6);
            ui.buyBtn.setInteractive();
            ui.buyBtn.on('pointerdown', () => doBuy());
            ui.buyLabel = this.add.text(W/4 + 5, btnY - 8, '📈 買う', {
                fontSize: '20px', fill: '#6bff8e', fontStyle: 'bold'
            }).setOrigin(0.5);
            ui.buyCost = this.add.text(W/4 + 5, btnY + 16, '¥100', {
                fontSize: '13px', fill: '#6bff8e', fontFamily: 'monospace'
            }).setOrigin(0.5);

            ui.sellBtn = this.add.rectangle(3*W/4 - 5, btnY, btnW, btnH, 0x3a1a2a, 0.95);
            ui.sellBtn.setStrokeStyle(2, P.red, 0.6);
            ui.sellBtn.setInteractive();
            ui.sellBtn.on('pointerdown', () => doSell());
            ui.sellLabel = this.add.text(3*W/4 - 5, btnY - 8, '📉 売る', {
                fontSize: '20px', fill: '#ff4757', fontStyle: 'bold'
            }).setOrigin(0.5);
            ui.sellInfo = this.add.text(3*W/4 - 5, btnY + 16, '保有なし', {
                fontSize: '13px', fill: '#ff4757', fontFamily: 'monospace'
            }).setOrigin(0.5);

            // 全額/全売ボタン
            ui.buyAllBtn = this.add.rectangle(W/4 + 5, btnY + 48, btnW, 26, 0x0a0f1e);
            ui.buyAllBtn.setStrokeStyle(1, P.green, 0.3);
            ui.buyAllBtn.setInteractive();
            ui.buyAllBtn.on('pointerdown', () => doBuy(true));
            ui.buyAllLabel = this.add.text(W/4 + 5, btnY + 48, '全力買い', {
                fontSize: '11px', fill: '#6bff8e', fontFamily: 'monospace'
            }).setOrigin(0.5);

            ui.sellAllBtn = this.add.rectangle(3*W/4 - 5, btnY + 48, btnW, 26, 0x0a0f1e);
            ui.sellAllBtn.setStrokeStyle(1, P.red, 0.3);
            ui.sellAllBtn.setInteractive();
            ui.sellAllBtn.on('pointerdown', () => doSell(true));
            ui.sellAllLabel = this.add.text(3*W/4 - 5, btnY + 48, '全売り', {
                fontSize: '11px', fill: '#ff4757', fontFamily: 'monospace'
            }).setOrigin(0.5);

            // 累計利益
            ui.profitText = this.add.text(W/2, 620, '累計利益: ¥0', {
                fontSize: '16px', fill: '#888', fontFamily: 'monospace', fontStyle: 'bold'
            }).setOrigin(0.5);
            ui.tradeText = this.add.text(W/2, 642, '取引: 0回', {
                fontSize: '11px', fill: '#666', fontFamily: 'monospace'
            }).setOrigin(0.5);

            // チャート凡例
            ui.legendMA = this.add.text(25, 200, '― 移動平均', {
                fontSize: '10px', fill: '#9b6dff', fontFamily: 'monospace'
            }).setAlpha(0.6);
            ui.legendPrice = this.add.text(25, 213, '― 現在価格', {
                fontSize: '10px', fill: '#88ccff', fontFamily: 'monospace'
            }).setAlpha(0.6);

            setGameUIVisible(false);

            // === スタート画面 ===
            ui.startBg = this.add.rectangle(W/2, H/2, W, H, 0x0f1628);

            const picoC = this.add.container(W/2, 130);
            picoC.add(this.add.ellipse(0, 15, 50, 60, 0x88ccff));
            picoC.add(this.add.circle(0, -20, 25, 0xffddbb));
            picoC.add(this.add.circle(-25, -15, 12, 0x9b6dff));
            picoC.add(this.add.circle(25, -15, 12, 0x9b6dff));
            picoC.add(this.add.circle(-8, -22, 3, 0x333333));
            picoC.add(this.add.circle(8, -22, 3, 0x333333));
            picoC.add(this.add.text(0, -14, '◡', { fontSize: '10px', fill: '#cc8877' }).setOrigin(0.5));
            picoC.add(this.add.rectangle(-8, -22, 12, 6, 0x333333));
            picoC.add(this.add.rectangle(8, -22, 12, 6, 0x333333));
            picoC.add(this.add.rectangle(0, -22, 8, 2, 0x333333));
            ui.picoChar = picoC;
            this.tweens.add({ targets: picoC, y: 125, duration: 1500, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });

            ui.titleText = this.add.text(W/2, 215, '波乗りトレーダー', {
                fontSize: '30px', fill: '#fff', fontStyle: 'bold', stroke: '#0a0a1a', strokeThickness: 4
            }).setOrigin(0.5);
            ui.titleSub = this.add.text(W/2, 250, 'WAVE RIDER TRADER', {
                fontSize: '11px', fill: '#9b6dff', fontFamily: 'monospace'
            }).setOrigin(0.5);

            const miniChart = this.add.graphics();
            miniChart.lineStyle(2, P.accent, 0.4);
            miniChart.beginPath();
            for (let i = 0; i < 200; i++) {
                const x = 50 + i * 1.5;
                const y = 340 + Math.sin(i * 0.05) * 30 + Math.sin(i * 0.12) * 15;
                if (i === 0) miniChart.moveTo(x, y); else miniChart.lineTo(x, y);
            }
            miniChart.strokePath();
            ui.miniChart = miniChart;

            ui.titleDesc = this.add.text(W/2, 420,
                '安く買って、高く売ろう！\n\n📈 チャートの波を読んで売買\n📰 ニュース速報が値動きのヒント\n⚠ フェイクニュースに注意！\n💰 60秒で資産を最大化', {
                fontSize: '15px', fill: '#bdc3c7', align: 'center', lineSpacing: 5
            }).setOrigin(0.5);

            let bestStr = '';
            try { const b = localStorage.getItem('trader_best'); if (b) bestStr = `BEST: +¥${b}`; } catch(e) {}
            ui.titleBest = this.add.text(W/2, 520, bestStr, {
                fontSize: '16px', fill: '#ffe66b', fontFamily: 'monospace', fontStyle: 'bold'
            }).setOrigin(0.5);

            ui.titleStart = this.add.text(W/2, 565, '▶ TAP TO START', {
                fontSize: '22px', fill: '#88ccff', fontStyle: 'bold', fontFamily: 'monospace'
            }).setOrigin(0.5);
            this.tweens.add({ targets: ui.titleStart, alpha: 0.3, duration: 800, yoyo: true, repeat: -1 });

            this.add.text(W/2, H - 12, 'Powered by Phaser', {
                fontSize: '10px', fill: '#fff'
            }).setOrigin(0.5).setAlpha(0.2);

            this.input.on('pointerdown', (ptr) => {
                if (state === 'title') startGame(this);
            });
        }

        function setGameUIVisible(v) {
            [ui.topBg, ui.priceLabel, ui.priceChange, ui.moneyText, ui.holdText, ui.timeText, ui.plText,
             ui.newsBg, ui.newsText, ui.newsHint,
             ui.buyBtn, ui.buyLabel, ui.buyCost, ui.buyAllBtn, ui.buyAllLabel,
             ui.sellBtn, ui.sellLabel, ui.sellInfo, ui.sellAllBtn, ui.sellAllLabel,
             ui.profitText, ui.tradeText, ui.legendMA, ui.legendPrice].forEach(e => e && e.setVisible(v));
        }

        function startGame(scene) {
            state = 'playing';
            [ui.startBg, ui.picoChar, ui.titleText, ui.titleSub, ui.miniChart, ui.titleDesc, ui.titleBest, ui.titleStart].forEach(o => o.setVisible(false));
            scene.tweens.killAll();
            setGameUIVisible(true);

            money = 1000; holdings = 0; buyPrice = 0;
            totalProfit = 0; trades = 0; bestTrades = 0;
            timeLeft = 60; tick = 0;
            price = 100; basePrice = 100;
            priceHistory = []; maHistory = [];
            wavePhase = Math.random() * Math.PI * 2;
            subPhase = Math.random() * Math.PI * 2;
            newsQueue = []; activeNews = null; newsTimer = 0;
            nextNewsAt = Phaser.Math.Between(40, 80); // 最初のニュース（tick単位）

            for (let i = 0; i < CHART_POINTS; i++) {
                const p = 100 + Math.sin(i * WAVE_SPEED) * WAVE_AMP * 0.5;
                priceHistory.push(p);
            }
            calcMA();
            updateAllUI();

            countdownTimer = scene.time.addEvent({
                delay: 1000,
                callback: () => {
                    timeLeft--;
                    ui.timeText.setText(`${timeLeft}s`);
                    if (timeLeft <= 10) ui.timeText.setFill('#ff4757');
                    if (timeLeft <= 0) endGame(scene);
                },
                loop: true
            });
        }

        function calcMA() {
            // 移動平均（直近20ポイント）
            maHistory = [];
            for (let i = 0; i < priceHistory.length; i++) {
                const start = Math.max(0, i - 19);
                const slice = priceHistory.slice(start, i + 1);
                maHistory.push(slice.reduce((a, b) => a + b, 0) / slice.length);
            }
        }

        function scheduleNews() {
            // 次のニュースを予約
            nextNewsAt = tick + Phaser.Math.Between(60, 120);
        }

        function triggerNews() {
            const roll = Math.random();
            let news;

            if (roll < 0.35) {
                // 良いニュース
                const n = Phaser.Utils.Array.GetRandom(NEWS_GOOD);
                news = { text: n.text, effect: n.effect, isFake: false, countdown: 3 };
            } else if (roll < 0.70) {
                // 悪いニュース
                const n = Phaser.Utils.Array.GetRandom(NEWS_BAD);
                news = { text: n.text, effect: n.effect, isFake: false, countdown: 3 };
            } else {
                // フェイクニュース（実際には効果なし or 逆効果）
                const n = Phaser.Utils.Array.GetRandom(NEWS_FAKE);
                news = {
                    text: n.text,
                    effect: Phaser.Math.Between(-8, 8), // 少しだけ動く（騙し）
                    isFake: true,
                    countdown: 3
                };
            }

            activeNews = news;
            newsTimer = 180; // 3秒間表示（60fps × 3）
            sndNews();

            // ニュース予告を表示
            ui.newsText.setText(news.text);
            if (news.isFake) {
                ui.newsHint.setText('⚠ 未確認情報').setFill('#ff6b9d');
            } else {
                ui.newsHint.setText(news.effect > 0 ? '↑ 価格上昇の予兆' : '↓ 価格下落の予兆');
                ui.newsHint.setFill(news.effect > 0 ? '#6bff8e' : '#ff4757');
            }

            scheduleNews();
        }

        function applyNewsEffect() {
            if (!activeNews) return;
            // 段階的にベース価格に反映
            basePrice += activeNews.effect * 0.15;
            basePrice = Math.max(30, Math.min(250, basePrice));
        }

        function updatePrice() {
            tick++;

            // ニュースチェック
            if (tick >= nextNewsAt && !activeNews) {
                triggerNews();
            }

            // ニュースタイマー
            if (newsTimer > 0) {
                newsTimer--;
                if (newsTimer === 120) {
                    // 1秒後にカウントダウン表示
                    if (activeNews) activeNews.countdown = 2;
                }
                if (newsTimer === 60) {
                    if (activeNews) activeNews.countdown = 1;
                }
                if (newsTimer <= 0) {
                    // ニュース効果を適用
                    applyNewsEffect();
                    // フェイクなら「ガセでした」表示
                    if (activeNews && activeNews.isFake) {
                        ui.newsText.setText('❌ フェイクニュースでした！');
                        ui.newsHint.setText('').setFill('#888');
                        setTimeout(() => {
                            if (state === 'playing') {
                                ui.newsText.setText('');
                                ui.newsHint.setText('');
                            }
                        }, 1500);
                    } else {
                        ui.newsText.setText('');
                        ui.newsHint.setText('');
                    }
                    activeNews = null;
                }
            }

            // === 規則的な波動 ===
            wavePhase += WAVE_SPEED;
            subPhase += SUB_SPEED;

            // メイン波（読みやすい大きな波）+ サブ波（小さい変動）
            const mainWave = Math.sin(wavePhase) * WAVE_AMP;
            const subWave = Math.sin(subPhase) * SUB_AMP;
            const noise = Phaser.Math.FloatBetween(-1, 1); // ごく小さいノイズ

            price = basePrice + mainWave + subWave + noise;
            price = Math.max(20, Math.min(300, price));

            priceHistory.push(price);
            if (priceHistory.length > CHART_POINTS) priceHistory.shift();
            calcMA();
        }

        function drawChart() {
            chartGfx.clear();
            const cX = 20, cY = 200, cW = W - 40, cH = 240;
            const min = Math.min(...priceHistory) - 5;
            const max = Math.max(...priceHistory) + 5;
            const range = max - min || 1;

            const toScreen = (val, idx) => ({
                x: cX + (idx / (CHART_POINTS - 1)) * cW,
                y: cY + cH - ((val - min) / range) * cH
            });

            // 購入価格ライン
            if (holdings > 0) {
                const buyY = cY + cH - ((buyPrice - min) / range) * cH;
                if (buyY >= cY && buyY <= cY + cH) {
                    chartGfx.lineStyle(1, P.yellow, 0.4);
                    chartGfx.lineBetween(cX, buyY, cX + cW, buyY);
                }
            }

            // 移動平均ライン
            chartGfx.lineStyle(1.5, P.purple, 0.5);
            chartGfx.beginPath();
            maHistory.forEach((val, i) => {
                const p = toScreen(val, i);
                if (i === 0) chartGfx.moveTo(p.x, p.y); else chartGfx.lineTo(p.x, p.y);
            });
            chartGfx.strokePath();

            // 塗りつぶし
            const points = priceHistory.map((val, i) => toScreen(val, i));
            chartGfx.fillStyle(P.accent, 0.06);
            chartGfx.beginPath();
            chartGfx.moveTo(points[0].x, cY + cH);
            points.forEach(p => chartGfx.lineTo(p.x, p.y));
            chartGfx.lineTo(points[points.length-1].x, cY + cH);
            chartGfx.closePath();
            chartGfx.fillPath();

            // 価格ライン
            chartGfx.lineStyle(2.5, P.accent, 0.9);
            chartGfx.beginPath();
            points.forEach((p, i) => {
                if (i === 0) chartGfx.moveTo(p.x, p.y); else chartGfx.lineTo(p.x, p.y);
            });
            chartGfx.strokePath();

            // 最新ドット
            const last = points[points.length - 1];
            chartGfx.fillStyle(P.white, 1);
            chartGfx.fillCircle(last.x, last.y, 5);
            chartGfx.fillStyle(P.accent, 1);
            chartGfx.fillCircle(last.x, last.y, 3);

            // ガイドライン
            chartGfx.lineStyle(1, 0x333333, 0.3);
            for (let i = 0; i <= 4; i++) {
                const y = cY + (cH / 4) * i;
                chartGfx.lineBetween(cX, y, cX + cW, y);
            }
        }

        function doBuy(all = false) {
            if (state !== 'playing') return;
            const p = Math.floor(price);
            if (all) {
                const canBuy = Math.floor(money / p);
                if (canBuy <= 0) { snd(100, 'square', 0.1, 0.1); return; }
                const cost = canBuy * p;
                buyPrice = holdings > 0 ? ((buyPrice * holdings + cost) / (holdings + canBuy)) : p;
                holdings += canBuy;
                money -= cost;
            } else {
                if (money < p) { snd(100, 'square', 0.1, 0.1); return; }
                buyPrice = holdings > 0 ? ((buyPrice * holdings + p) / (holdings + 1)) : p;
                holdings += 1;
                money -= p;
            }
            trades++; sndBuy();
            showTradeEffect(true);
            updateAllUI();
        }

        function doSell(all = false) {
            if (state !== 'playing' || holdings <= 0) { snd(100, 'square', 0.1, 0.1); return; }
            const p = Math.floor(price);
            const sellCount = all ? holdings : 1;
            const revenue = sellCount * p;
            const profit = revenue - sellCount * buyPrice;
            totalProfit += profit;
            money += revenue;
            holdings -= sellCount;
            if (holdings <= 0) { holdings = 0; buyPrice = 0; }
            trades++;
            bestTrades = Math.max(bestTrades, profit);
            if (profit > 0) sndProfit(); else sndLoss();
            showTradeEffect(false, profit);
            updateAllUI();
        }

        function showTradeEffect(isBuy, profit = 0) {
            const x = isBuy ? W/4 + 5 : 3*W/4 - 5;
            const y = 505;
            if (isBuy) {
                const txt = sceneRef.add.text(x, y, '📈 BUY!', {
                    fontSize: '18px', fill: '#6bff8e', fontStyle: 'bold', stroke: '#000', strokeThickness: 2
                }).setOrigin(0.5);
                sceneRef.tweens.add({ targets: txt, y: y - 35, alpha: 0, duration: 500, onComplete: () => txt.destroy() });
            } else {
                const color = profit >= 0 ? '#6bff8e' : '#ff4757';
                const sign = profit >= 0 ? '+' : '';
                const txt = sceneRef.add.text(x, y, `📉 ${sign}¥${Math.floor(profit)}`, {
                    fontSize: '18px', fill: color, fontStyle: 'bold', stroke: '#000', strokeThickness: 2
                }).setOrigin(0.5);
                sceneRef.tweens.add({ targets: txt, y: y - 35, alpha: 0, duration: 600, onComplete: () => txt.destroy() });
            }
        }

        function updateAllUI() {
            const p = Math.floor(price);
            ui.priceLabel.setText(`¥${p}`);

            if (priceHistory.length >= 2) {
                const prev = priceHistory[priceHistory.length - 2];
                const change = ((price - prev) / prev * 100).toFixed(1);
                ui.priceChange.setText(`${change >= 0 ? '+' : ''}${change}%`);
                ui.priceChange.setFill(change >= 0 ? '#6bff8e' : '#ff4757');
                ui.priceLabel.setFill(change >= 0 ? '#88ccff' : '#ff8888');
            }

            ui.moneyText.setText(`💰 ¥${money.toLocaleString()}`);
            ui.holdText.setText(`📦 ${holdings}株`);
            ui.buyCost.setText(`¥${p}/株`);

            if (holdings > 0) {
                const pl = Math.floor((price - buyPrice) * holdings);
                ui.sellInfo.setText(`${pl >= 0 ? '+' : ''}¥${pl}`).setFill(pl >= 0 ? '#6bff8e' : '#ff4757');
                ui.plText.setText(`平均 ¥${Math.floor(buyPrice)} × ${holdings}株`).setFill('#888');
                ui.holdText.setFill('#ffe66b');
            } else {
                ui.sellInfo.setText('保有なし').setFill('#666');
                ui.plText.setText('');
                ui.holdText.setFill('#666');
            }

            const profitColor = totalProfit >= 0 ? '#6bff8e' : '#ff4757';
            ui.profitText.setText(`累計利益: ${totalProfit >= 0 ? '+' : ''}¥${Math.floor(totalProfit).toLocaleString()}`).setFill(profitColor);
            ui.tradeText.setText(`取引: ${trades}回`);

            const canBuy = money >= p;
            [ui.buyBtn, ui.buyLabel, ui.buyCost, ui.buyAllBtn, ui.buyAllLabel].forEach(e => e.setAlpha(canBuy ? 1 : 0.35));
            const canSell = holdings > 0;
            [ui.sellBtn, ui.sellLabel, ui.sellInfo, ui.sellAllBtn, ui.sellAllLabel].forEach(e => e.setAlpha(canSell ? 1 : 0.35));
        }

        function update() {
            if (state !== 'playing') return;
            updatePrice();
            drawChart();
            updateAllUI();
        }

        function endGame(scene) {
            state = 'over';
            countdownTimer.remove();

            if (holdings > 0) {
                const revenue = holdings * Math.floor(price);
                totalProfit += (revenue - holdings * buyPrice);
                money += revenue;
                holdings = 0;
            }

            setGameUIVisible(false);
            chartGfx.clear();

            const profit = Math.floor(totalProfit);
            const prevBest = parseInt(localStorage.getItem('trader_best') || '0');
            const isNewBest = profit > prevBest;
            if (isNewBest) try { localStorage.setItem('trader_best', String(profit)); } catch(e) {}

            let rank = 'D';
            if (profit >= 500) rank = 'S';
            else if (profit >= 300) rank = 'A';
            else if (profit >= 100) rank = 'B';
            else if (profit >= 0) rank = 'C';
            const rankColors = { D: '#ff6b9d', C: '#ffe66b', B: '#88ccff', A: '#6bff8e', S: '#9b6dff' };

            endObjs = [];
            endObjs.push(scene.add.rectangle(W/2, H/2, W, H, 0x000000, 0.8));
            const card = scene.add.rectangle(W/2, H/2 - 10, 350, 430, 0x0f1628, 0.95);
            card.setStrokeStyle(2, P.purple, 0.5);
            endObjs.push(card);

            endObjs.push(scene.add.text(W/2, 175, '📊 取引終了', { fontSize: '26px', fill: '#fff', fontStyle: 'bold' }).setOrigin(0.5));
            endObjs.push(scene.add.text(W/2, 215, '累計利益', { fontSize: '13px', fill: '#888', fontFamily: 'monospace' }).setOrigin(0.5));

            const sign = profit >= 0 ? '+' : '';
            endObjs.push(scene.add.text(W/2, 250, `${sign}¥${profit.toLocaleString()}`, {
                fontSize: '40px', fill: profit >= 0 ? '#6bff8e' : '#ff4757', fontStyle: 'bold', fontFamily: 'monospace'
            }).setOrigin(0.5));

            endObjs.push(scene.add.text(W/2, 295, 'RANK', { fontSize: '13px', fill: '#888', fontFamily: 'monospace' }).setOrigin(0.5));
            endObjs.push(scene.add.text(W/2, 330, rank, {
                fontSize: '48px', fill: rankColors[rank], fontStyle: 'bold', fontFamily: 'monospace'
            }).setOrigin(0.5));

            endObjs.push(scene.add.text(W/2, 378,
                `💰 最終資産: ¥${money.toLocaleString()}\n📊 取引回数: ${trades}回\n🏆 最大利益: ¥${Math.floor(bestTrades)}`, {
                fontSize: '13px', fill: '#bbb', fontFamily: 'monospace', align: 'center', lineSpacing: 5
            }).setOrigin(0.5));

            if (isNewBest) {
                const nb = scene.add.text(W/2, 425, '🎉 NEW BEST!', { fontSize: '16px', fill: '#ffe66b', fontStyle: 'bold' }).setOrigin(0.5);
                scene.tweens.add({ targets: nb, scale: 1.2, duration: 500, yoyo: true, repeat: -1 });
                endObjs.push(nb);
            }

            const btn = scene.add.rectangle(W/2, 475, 170, 48, P.purple);
            btn.setStrokeStyle(2, 0xffffff, 0.4);
            btn.setInteractive();
            btn.on('pointerdown', () => resetGame(scene));
            endObjs.push(btn);
            endObjs.push(scene.add.text(W/2, 475, '▶ RETRY', {
                fontSize: '18px', fill: '#fff', fontStyle: 'bold', fontFamily: 'monospace'
            }).setOrigin(0.5));
        }

        function resetGame(scene) {
            for (const o of endObjs) o.destroy();
            endObjs = [];
            scene.tweens.killAll();
            state = 'title';
            const best = localStorage.getItem('trader_best');
            ui.titleBest.setText(best ? `BEST: +¥${best}` : '');
            [ui.startBg, ui.picoChar, ui.miniChart, ui.titleText, ui.titleSub, ui.titleDesc, ui.titleBest, ui.titleStart].forEach(o => o.setVisible(true));
            scene.tweens.add({ targets: ui.titleStart, alpha: 0.3, duration: 800, yoyo: true, repeat: -1 });
            scene.tweens.add({ targets: ui.picoChar, y: 125, duration: 1500, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });
        }
    </script>
</body>
</html>
