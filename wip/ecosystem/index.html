<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>生態系バランサー - 今日のミニゲーム</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; }
        body {
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; background: #0a1a0a; overflow: hidden;
        }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <script>
        const W = 400, H = 700;
        const config = {
            type: Phaser.AUTO, width: W, height: H,
            parent: 'game-container',
            backgroundColor: '#1a2e1a',
            scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
            scene: { create, update }
        };
        const game = new Phaser.Game(config);

        // === 生態系パラメータ ===
        let grass = 50, bugs = 30, birds = 20;
        const MAX_POP = 100;
        const MIN_POP = 0;

        // バランスが崩壊する閾値
        const DANGER_LOW = 10;
        const DANGER_HIGH = 90;

        // 自然変動パラメータ（1秒ごと）
        const ECO = {
            grassGrowth: 3,        // 草の自然成長
            grassEaten: 0.08,      // 虫1匹あたりの草消費
            bugGrowth: 0.06,       // 草1本あたりの虫増加
            bugDeath: 0.1,         // 鳥1羽あたりの虫消費
            bugNaturalDeath: 0.5,  // 虫の自然死
            birdGrowth: 0.07,      // 虫1匹あたりの鳥増加
            birdNaturalDeath: 1.5, // 鳥の自然死
        };

        let state = 'title'; // title | playing | over
        let survivalTime = 0;
        let energy = 100;
        const MAX_ENERGY = 100;
        const ENERGY_REGEN = 8;   // 毎秒回復
        const TAP_COST = 15;      // タップ1回のコスト
        const TAP_AMOUNT = 8;     // タップで増える量
        let difficulty = 1;       // 時間で上昇
        let ecoTimer;
        let bestTime = 0;

        // 生物アイコン配列
        let grassIcons = [], bugIcons = [], birdIcons = [];

        // UI
        let ui = {};
        let endObjs = [];
        let sceneRef;

        // 音
        const actx = new (window.AudioContext || window.webkitAudioContext)();
        function snd(freq, type='sine', dur=0.1, vol=0.2) {
            const o = actx.createOscillator(), g = actx.createGain();
            o.connect(g); g.connect(actx.destination);
            o.frequency.value = freq; o.type = type;
            g.gain.setValueAtTime(vol, actx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + dur);
            o.start(); o.stop(actx.currentTime + dur);
        }
        function sndTap() { snd(520, 'sine', 0.06); setTimeout(() => snd(660, 'sine', 0.06), 40); }
        function sndFail() { snd(150, 'sawtooth', 0.3, 0.15); }
        function sndWarn() { snd(300, 'square', 0.08, 0.1); }
        function sndNoEnergy() { snd(100, 'square', 0.15, 0.1); }

        function create() {
            sceneRef = this;

            // ハイスコア読み込み
            try { bestTime = parseInt(localStorage.getItem('eco_best') || '0'); } catch(e) {}

            // === 背景 ===
            const bg = this.add.graphics();
            // 空（上部）
            bg.fillGradientStyle(0x1a3a5c, 0x1a3a5c, 0x1a2e1a, 0x1a2e1a, 1);
            bg.fillRect(0, 0, W, H);

            // 3つのゾーン背景
            // 鳥ゾーン（空）
            this.add.rectangle(W/2, 165, W - 20, 170, 0x1e3a5a, 0.3).setStrokeStyle(1, 0x3a7abf, 0.2);
            // 虫ゾーン（地表）
            this.add.rectangle(W/2, 345, W - 20, 170, 0x2a3e1a, 0.3).setStrokeStyle(1, 0x5a8a3a, 0.2);
            // 草ゾーン（地面）
            this.add.rectangle(W/2, 525, W - 20, 170, 0x1a3a1a, 0.3).setStrokeStyle(1, 0x3a7a3a, 0.2);

            // ゾーンラベル
            this.add.text(20, 85, '🐦 鳥', { fontSize: '16px', fill: '#7ab8e0', fontStyle: 'bold' });
            this.add.text(20, 265, '🐛 虫', { fontSize: '16px', fill: '#a0d060', fontStyle: 'bold' });
            this.add.text(20, 445, '🌿 草', { fontSize: '16px', fill: '#60c060', fontStyle: 'bold' });

            // === 個体数バー ===
            const barX = 70, barW = 250, barH = 16;

            // 鳥バー
            ui.birdBarBg = this.add.rectangle(barX + barW/2, 90, barW, barH, 0x111111);
            ui.birdBar = this.add.rectangle(barX, 90, barW * 0.2, barH, 0x4a9ae0).setOrigin(0, 0.5);
            ui.birdNum = this.add.text(barX + barW + 10, 90, '20', { fontSize: '14px', fill: '#7ab8e0', fontFamily: 'monospace', fontStyle: 'bold' }).setOrigin(0, 0.5);

            // 虫バー
            ui.bugBarBg = this.add.rectangle(barX + barW/2, 270, barW, barH, 0x111111);
            ui.bugBar = this.add.rectangle(barX, 270, barW * 0.3, barH, 0x80c040).setOrigin(0, 0.5);
            ui.bugNum = this.add.text(barX + barW + 10, 270, '30', { fontSize: '14px', fill: '#a0d060', fontFamily: 'monospace', fontStyle: 'bold' }).setOrigin(0, 0.5);

            // 草バー
            ui.grassBarBg = this.add.rectangle(barX + barW/2, 450, barW, barH, 0x111111);
            ui.grassBar = this.add.rectangle(barX, 450, barW * 0.5, barH, 0x40a040).setOrigin(0, 0.5);
            ui.grassNum = this.add.text(barX + barW + 10, 450, '50', { fontSize: '14px', fill: '#60c060', fontFamily: 'monospace', fontStyle: 'bold' }).setOrigin(0, 0.5);

            // === 食物連鎖の矢印（関係性表示） ===
            this.add.text(W - 40, 175, '🌿→🐛', { fontSize: '12px', fill: '#888' });
            this.add.text(W - 40, 355, '🐛→🐦', { fontSize: '12px', fill: '#888' });

            // === タップボタン（各ゾーン） ===
            const btnW = 80, btnH = 45;

            // 鳥を増やすボタン
            ui.birdBtn = this.add.rectangle(W/2, 130, btnW, btnH, 0x2a4a6a, 0.9);
            ui.birdBtn.setStrokeStyle(2, 0x4a9ae0, 0.6);
            ui.birdBtn.setInteractive();
            ui.birdBtn.on('pointerdown', () => tapAdd('birds'));
            ui.birdBtnText = this.add.text(W/2, 130, '+🐦', { fontSize: '22px' }).setOrigin(0.5);

            // 虫を増やすボタン
            ui.bugBtn = this.add.rectangle(W/2, 310, btnW, btnH, 0x2a4a2a, 0.9);
            ui.bugBtn.setStrokeStyle(2, 0x80c040, 0.6);
            ui.bugBtn.setInteractive();
            ui.bugBtn.on('pointerdown', () => tapAdd('bugs'));
            ui.bugBtnText = this.add.text(W/2, 310, '+🐛', { fontSize: '22px' }).setOrigin(0.5);

            // 草を増やすボタン
            ui.grassBtn = this.add.rectangle(W/2, 490, btnW, btnH, 0x1a3a1a, 0.9);
            ui.grassBtn.setStrokeStyle(2, 0x40a040, 0.6);
            ui.grassBtn.setInteractive();
            ui.grassBtn.on('pointerdown', () => tapAdd('grass'));
            ui.grassBtnText = this.add.text(W/2, 490, '+🌿', { fontSize: '22px' }).setOrigin(0.5);

            // === 上部HUD ===
            ui.topPanel = this.add.rectangle(W/2, 35, W - 10, 50, 0x0a0a0a, 0.8);
            ui.topPanel.setStrokeStyle(1, 0x3a7a3a, 0.3);

            ui.timeText = this.add.text(20, 20, '⏱ 0s', {
                fontSize: '20px', fill: '#ecf0f1', fontFamily: 'monospace', fontStyle: 'bold'
            });
            ui.energyText = this.add.text(W - 20, 20, '⚡100', {
                fontSize: '20px', fill: '#f1c40f', fontFamily: 'monospace', fontStyle: 'bold'
            }).setOrigin(1, 0);
            ui.energyBar = this.add.rectangle(W/2, 50, W - 40, 6, 0xf1c40f).setOrigin(0.5);
            ui.diffText = this.add.text(W/2, 20, '🌍 Lv1', {
                fontSize: '16px', fill: '#7f8c8d', fontFamily: 'monospace'
            }).setOrigin(0.5, 0);

            // === 警告テキスト ===
            ui.warnText = this.add.text(W/2, 625, '', {
                fontSize: '18px', fill: '#e74c3c', fontStyle: 'bold',
                stroke: '#000', strokeThickness: 2
            }).setOrigin(0.5).setAlpha(0);

            // === 生物アイコン散布 ===
            // 各ゾーンにランダムに絵文字を散布（視覚的フィードバック）
            for (let i = 0; i < 15; i++) {
                const icon = this.add.text(
                    Phaser.Math.Between(30, W-30),
                    Phaser.Math.Between(100, 230),
                    '🐦', { fontSize: '18px' }
                ).setOrigin(0.5).setAlpha(0.6);
                birdIcons.push(icon);
            }
            for (let i = 0; i < 20; i++) {
                const icon = this.add.text(
                    Phaser.Math.Between(30, W-30),
                    Phaser.Math.Between(280, 410),
                    '🐛', { fontSize: '14px' }
                ).setOrigin(0.5).setAlpha(0.6);
                bugIcons.push(icon);
            }
            for (let i = 0; i < 25; i++) {
                const icon = this.add.text(
                    Phaser.Math.Between(30, W-30),
                    Phaser.Math.Between(460, 590),
                    '🌿', { fontSize: '14px' }
                ).setOrigin(0.5).setAlpha(0.6);
                grassIcons.push(icon);
            }

            // ゲームUI非表示
            setGameUIVisible(false);

            // === スタート画面 ===
            ui.startBg = this.add.rectangle(W/2, H/2, W, H, 0x1a2e1a);
            ui.titleIcon = this.add.text(W/2, 160, '🌿🐛🐦', { fontSize: '60px' }).setOrigin(0.5);
            ui.titleText = this.add.text(W/2, 250, '生態系バランサー', {
                fontSize: '32px', fill: '#ecf0f1', fontStyle: 'bold',
                stroke: '#000', strokeThickness: 4
            }).setOrigin(0.5);
            ui.titleSub = this.add.text(W/2, 295, 'ECOSYSTEM BALANCER', {
                fontSize: '12px', fill: '#5a8a3a', fontFamily: 'monospace'
            }).setOrigin(0.5);
            ui.titleDesc = this.add.text(W/2, 380,
                '食物連鎖のバランスを守ろう\n\n🌿草 → 🐛虫 → 🐦鳥\n\n草が減ると虫が飢え\n虫が減ると鳥が飢える\nどれかが絶滅したらゲームオーバー', {
                fontSize: '16px', fill: '#bdc3c7', align: 'center', lineSpacing: 6
            }).setOrigin(0.5);

            const bestStr = bestTime > 0 ? `BEST: ${bestTime}s` : '';
            ui.titleBest = this.add.text(W/2, 490, bestStr, {
                fontSize: '16px', fill: '#f1c40f', fontFamily: 'monospace', fontStyle: 'bold'
            }).setOrigin(0.5);

            ui.titleStart = this.add.text(W/2, 550, '▶ TAP TO START', {
                fontSize: '22px', fill: '#5a8a3a', fontStyle: 'bold', fontFamily: 'monospace'
            }).setOrigin(0.5);
            this.tweens.add({ targets: ui.titleStart, alpha: 0.3, duration: 800, yoyo: true, repeat: -1 });

            this.add.text(W/2, H - 15, 'Powered by Phaser', {
                fontSize: '11px', fill: '#ffffff'
            }).setOrigin(0.5).setAlpha(0.3);

            // タップハンドラ
            this.input.on('pointerdown', (ptr) => {
                if (state === 'title') startGame(this);
            });
        }

        function setGameUIVisible(v) {
            const els = [
                ui.topPanel, ui.timeText, ui.energyText, ui.energyBar, ui.diffText,
                ui.birdBarBg, ui.birdBar, ui.birdNum,
                ui.bugBarBg, ui.bugBar, ui.bugNum,
                ui.grassBarBg, ui.grassBar, ui.grassNum,
                ui.birdBtn, ui.birdBtnText,
                ui.bugBtn, ui.bugBtnText,
                ui.grassBtn, ui.grassBtnText,
                ui.warnText,
            ];
            els.forEach(e => e && e.setVisible(v));
            birdIcons.forEach(i => i.setVisible(v));
            bugIcons.forEach(i => i.setVisible(v));
            grassIcons.forEach(i => i.setVisible(v));
        }

        function startGame(scene) {
            state = 'playing';
            [ui.startBg, ui.titleIcon, ui.titleText, ui.titleSub, ui.titleDesc, ui.titleBest, ui.titleStart].forEach(o => o.setVisible(false));
            scene.tweens.killAll();

            setGameUIVisible(true);

            grass = 50; bugs = 30; birds = 20;
            energy = 100; survivalTime = 0; difficulty = 1;

            updateBars();
            updateIcons();

            // 生態系シミュレーション（500msごと）
            ecoTimer = scene.time.addEvent({
                delay: 500,
                callback: () => ecoTick(scene),
                loop: true
            });
        }

        function ecoTick(scene) {
            survivalTime += 0.5;

            // 難易度上昇（30秒ごとにレベルアップ）
            difficulty = 1 + Math.floor(survivalTime / 30) * 0.3;
            ui.diffText.setText(`🌍 Lv${Math.floor(1 + survivalTime / 30)}`);

            // エネルギー回復
            energy = Math.min(MAX_ENERGY, energy + ENERGY_REGEN * 0.5);

            // === 生態系シミュレーション ===
            const dt = 0.5 * difficulty;

            // 草: 自然に増える、虫に食べられる
            const grassChange = (ECO.grassGrowth - ECO.grassEaten * bugs) * dt;
            grass += grassChange;

            // 虫: 草を食べて増える、鳥に食べられる、自然に減る
            const bugChange = (ECO.bugGrowth * grass - ECO.bugDeath * birds - ECO.bugNaturalDeath) * dt;
            bugs += bugChange;

            // 鳥: 虫を食べて増える、自然に減る
            const birdChange = (ECO.birdGrowth * bugs - ECO.birdNaturalDeath) * dt;
            birds += birdChange;

            // 範囲制限
            grass = Math.max(0, Math.min(MAX_POP, grass));
            bugs = Math.max(0, Math.min(MAX_POP, bugs));
            birds = Math.max(0, Math.min(MAX_POP, birds));

            // 警告チェック
            checkWarnings(scene);

            // ゲームオーバー判定
            if (grass <= 0 || bugs <= 0 || birds <= 0 ||
                grass >= MAX_POP || bugs >= MAX_POP || birds >= MAX_POP) {
                endGame(scene);
                return;
            }

            updateBars();
            updateIcons();
            ui.timeText.setText(`⏱ ${Math.floor(survivalTime)}s`);
            ui.energyText.setText(`⚡${Math.floor(energy)}`);
            ui.energyBar.setScale(energy / MAX_ENERGY, 1);
        }

        function checkWarnings(scene) {
            const warnings = [];
            if (grass <= DANGER_LOW) warnings.push('🌿草が枯れそう！');
            if (grass >= DANGER_HIGH) warnings.push('🌿草が増えすぎ！');
            if (bugs <= DANGER_LOW) warnings.push('🐛虫が減りすぎ！');
            if (bugs >= DANGER_HIGH) warnings.push('🐛虫が増えすぎ！');
            if (birds <= DANGER_LOW) warnings.push('🐦鳥が減りすぎ！');
            if (birds >= DANGER_HIGH) warnings.push('🐦鳥が増えすぎ！');

            if (warnings.length > 0) {
                ui.warnText.setText(warnings[0]);
                ui.warnText.setAlpha(1);
                sndWarn();
            } else {
                ui.warnText.setAlpha(0);
            }

            // バーの色変更（危険時）
            updateBarColor(ui.birdBar, birds, 0x4a9ae0);
            updateBarColor(ui.bugBar, bugs, 0x80c040);
            updateBarColor(ui.grassBar, grass, 0x40a040);
        }

        function updateBarColor(bar, val, normalColor) {
            if (val <= DANGER_LOW || val >= DANGER_HIGH) {
                bar.setFillStyle(0xe74c3c);
            } else if (val <= 20 || val >= 80) {
                bar.setFillStyle(0xf39c12);
            } else {
                bar.setFillStyle(normalColor);
            }
        }

        function tapAdd(type) {
            if (state !== 'playing') return;

            if (energy < TAP_COST) {
                sndNoEnergy();
                // エネルギー不足のフィードバック
                const txt = sceneRef.add.text(W/2, 50, 'エネルギー不足！', {
                    fontSize: '18px', fill: '#e74c3c', fontStyle: 'bold',
                    stroke: '#000', strokeThickness: 2
                }).setOrigin(0.5);
                sceneRef.tweens.add({ targets: txt, alpha: 0, y: 30, duration: 500, onComplete: () => txt.destroy() });
                return;
            }

            energy -= TAP_COST;
            sndTap();

            let y, emoji;
            if (type === 'birds') {
                birds = Math.min(MAX_POP, birds + TAP_AMOUNT);
                y = 130; emoji = '🐦';
            } else if (type === 'bugs') {
                bugs = Math.min(MAX_POP, bugs + TAP_AMOUNT);
                y = 310; emoji = '🐛';
            } else {
                grass = Math.min(MAX_POP, grass + TAP_AMOUNT);
                y = 490; emoji = '🌿';
            }

            // フィードバック
            const txt = sceneRef.add.text(W/2 + 60, y, `+${TAP_AMOUNT} ${emoji}`, {
                fontSize: '20px', fill: '#2ecc71', fontStyle: 'bold',
                stroke: '#000', strokeThickness: 2
            }).setOrigin(0.5);
            sceneRef.tweens.add({ targets: txt, alpha: 0, y: y - 30, duration: 400, onComplete: () => txt.destroy() });

            updateBars();
            updateIcons();
            ui.energyText.setText(`⚡${Math.floor(energy)}`);
            ui.energyBar.setScale(energy / MAX_ENERGY, 1);
        }

        function updateBars() {
            const barW = 250;
            ui.grassBar.setDisplaySize(barW * (grass / MAX_POP), 16);
            ui.bugBar.setDisplaySize(barW * (bugs / MAX_POP), 16);
            ui.birdBar.setDisplaySize(barW * (birds / MAX_POP), 16);
            ui.grassNum.setText(Math.floor(grass));
            ui.bugNum.setText(Math.floor(bugs));
            ui.birdNum.setText(Math.floor(birds));
        }

        function updateIcons() {
            // アイコンの表示/非表示で個体数を視覚化
            const gShow = Math.floor(grassIcons.length * grass / MAX_POP);
            const bShow = Math.floor(bugIcons.length * bugs / MAX_POP);
            const dShow = Math.floor(birdIcons.length * birds / MAX_POP);

            grassIcons.forEach((ic, i) => ic.setAlpha(i < gShow ? 0.5 : 0.05));
            bugIcons.forEach((ic, i) => ic.setAlpha(i < bShow ? 0.5 : 0.05));
            birdIcons.forEach((ic, i) => ic.setAlpha(i < dShow ? 0.5 : 0.05));
        }

        function update() {
            // メインupdateでは軽い視覚更新のみ
        }

        function endGame(scene) {
            state = 'over';
            ecoTimer.remove();

            setGameUIVisible(false);
            sndFail();

            // 崩壊原因
            let cause = '';
            if (grass <= 0) cause = '🌿 草が枯れた…';
            else if (grass >= MAX_POP) cause = '🌿 草が繁茂しすぎた…';
            else if (bugs <= 0) cause = '🐛 虫が絶滅した…';
            else if (bugs >= MAX_POP) cause = '🐛 虫が大発生した…';
            else if (birds <= 0) cause = '🐦 鳥が絶滅した…';
            else if (birds >= MAX_POP) cause = '🐦 鳥が増えすぎた…';

            const time = Math.floor(survivalTime);
            const isNewBest = time > bestTime;
            if (isNewBest) {
                bestTime = time;
                try { localStorage.setItem('eco_best', String(bestTime)); } catch(e) {}
            }

            // ランク
            let rank = 'D';
            if (time >= 120) rank = 'S';
            else if (time >= 90) rank = 'A';
            else if (time >= 60) rank = 'B';
            else if (time >= 30) rank = 'C';

            const rankColors = { D: '#e74c3c', C: '#f39c12', B: '#3498db', A: '#2ecc71', S: '#f1c40f' };

            endObjs = [];

            const overlay = scene.add.rectangle(W/2, H/2, W, H, 0x000000, 0.75);
            endObjs.push(overlay);

            const card = scene.add.rectangle(W/2, H/2 - 10, 350, 420, 0x1a2e1a, 0.95);
            card.setStrokeStyle(2, 0x5a8a3a, 0.6);
            endObjs.push(card);

            endObjs.push(scene.add.text(W/2, 185, '🌍 生態系崩壊', {
                fontSize: '28px', fill: '#ecf0f1', fontStyle: 'bold'
            }).setOrigin(0.5));

            endObjs.push(scene.add.text(W/2, 225, cause, {
                fontSize: '18px', fill: '#e74c3c', fontStyle: 'bold'
            }).setOrigin(0.5));

            endObjs.push(scene.add.text(W/2, 270, `生存時間`, {
                fontSize: '14px', fill: '#7f8c8d', fontFamily: 'monospace'
            }).setOrigin(0.5));

            endObjs.push(scene.add.text(W/2, 300, `${time}秒`, {
                fontSize: '44px', fill: '#ecf0f1', fontStyle: 'bold', fontFamily: 'monospace'
            }).setOrigin(0.5));

            endObjs.push(scene.add.text(W/2, 340, `RANK`, {
                fontSize: '14px', fill: '#7f8c8d', fontFamily: 'monospace'
            }).setOrigin(0.5));

            const rankText = scene.add.text(W/2, 375, rank, {
                fontSize: '52px', fill: rankColors[rank], fontStyle: 'bold', fontFamily: 'monospace'
            }).setOrigin(0.5);
            endObjs.push(rankText);

            if (isNewBest) {
                const newBest = scene.add.text(W/2, 410, '🎉 NEW BEST!', {
                    fontSize: '18px', fill: '#f1c40f', fontStyle: 'bold'
                }).setOrigin(0.5);
                scene.tweens.add({ targets: newBest, scale: 1.2, duration: 500, yoyo: true, repeat: -1 });
                endObjs.push(newBest);
            }

            endObjs.push(scene.add.text(W/2, 435, `BEST: ${bestTime}s`, {
                fontSize: '14px', fill: '#7f8c8d', fontFamily: 'monospace'
            }).setOrigin(0.5));

            const btn = scene.add.rectangle(W/2, 480, 180, 50, 0x2ecc71);
            btn.setStrokeStyle(2, 0xffffff, 0.5);
            btn.setInteractive();
            btn.on('pointerdown', () => resetGame(scene));
            endObjs.push(btn);

            endObjs.push(scene.add.text(W/2, 480, '▶ RETRY', {
                fontSize: '20px', fill: '#fff', fontStyle: 'bold', fontFamily: 'monospace'
            }).setOrigin(0.5));
        }

        function resetGame(scene) {
            for (const o of endObjs) o.destroy();
            endObjs = [];
            scene.tweens.killAll();

            state = 'title';
            ui.titleBest.setText(bestTime > 0 ? `BEST: ${bestTime}s` : '');
            [ui.startBg, ui.titleIcon, ui.titleText, ui.titleSub, ui.titleDesc, ui.titleBest, ui.titleStart].forEach(o => o.setVisible(true));
            scene.tweens.add({ targets: ui.titleStart, alpha: 0.3, duration: 800, yoyo: true, repeat: -1 });
        }
    </script>
</body>
</html>
