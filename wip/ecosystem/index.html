<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>生態系バランサー - 今日のミニゲーム</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; }
        body {
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; background: #1a1030; overflow: hidden;
        }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <script>
        const W = 400, H = 700;
        const config = {
            type: Phaser.AUTO, width: W, height: H,
            parent: 'game-container',
            backgroundColor: '#2a1f4e',
            scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
            scene: { create, update }
        };
        const game = new Phaser.Game(config);

        // === ピコカラーパレット ===
        const PAL = {
            bg1: 0x667eea,    // 紫青
            bg2: 0x764ba2,    // 紫
            accent: 0x88ccff, // 水色（ピコの体）
            purple: 0x9b6dff, // 紫（ツインテール）
            pink: 0xff6b9d,   // ピンク
            green: 0x6bff8e,  // 緑
            yellow: 0xffe66b, // 黄色
            white: 0xffffff,
            dark: 0x1a1030,
        };

        // === 生物定義 ===
        const CREATURES = {
            grass:  { emoji: '🌿', color: PAL.green,  name: '草', zone: { yMin: 480, yMax: 620 } },
            bug:    { emoji: '🐛', color: PAL.yellow,  name: '虫', zone: { yMin: 280, yMax: 420 } },
            bird:   { emoji: '🐦', color: PAL.accent,  name: '鳥', zone: { yMin: 80,  yMax: 220 } },
        };

        // ゲーム状態
        let state = 'title';
        let entities = []; // { type, x, y, vx, vy, sprite, hp, age }
        let survivalTime = 0;
        let difficulty = 1;
        let ecoTimer;
        let bestTime = 0;
        let dragTarget = null;
        let lastSpawnTime = 0;

        // 個体数
        let counts = { grass: 0, bug: 0, bird: 0 };

        // ゲームパラメータ
        const MAX_EACH = 20;         // 各種の上限
        const MIN_EACH = 1;          // 下限（0で崩壊）
        const SPAWN_INTERVAL = 2000; // 自動スポーン間隔(ms)
        const EAT_RANGE = 50;        // 捕食範囲

        let ui = {};
        let endObjs = [];
        let sceneRef;

        // 音
        const actx = new (window.AudioContext || window.webkitAudioContext)();
        function snd(freq, type='sine', dur=0.1, vol=0.2) {
            const o = actx.createOscillator(), g = actx.createGain();
            o.connect(g); g.connect(actx.destination);
            o.frequency.value = freq; o.type = type;
            g.gain.setValueAtTime(vol, actx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + dur);
            o.start(); o.stop(actx.currentTime + dur);
        }
        function sndGrab() { snd(440, 'sine', 0.05, 0.15); }
        function sndDrop() { snd(330, 'sine', 0.08, 0.15); }
        function sndEat() { snd(600, 'square', 0.06, 0.1); }
        function sndDeath() { snd(150, 'sawtooth', 0.2, 0.15); }
        function sndSpawn() { snd(800, 'sine', 0.05, 0.1); }
        function sndFail() { snd(120, 'sawtooth', 0.4, 0.2); }

        function create() {
            sceneRef = this;
            try { bestTime = parseInt(localStorage.getItem('eco2_best') || '0'); } catch(e) {}

            // === 背景 ===
            const bgGfx = this.add.graphics();
            // グラデーション（ピコカラー紫系）
            for (let y = 0; y < H; y += 2) {
                const t = y / H;
                const r = Math.floor(0x66 + (0x76 - 0x66) * t);
                const g = Math.floor(0x7e + (0x4b - 0x7e) * t);
                const b = Math.floor(0xea + (0xa2 - 0xea) * t);
                bgGfx.fillStyle((r << 16) | (g << 8) | b, 0.3);
                bgGfx.fillRect(0, y, W, 2);
            }

            // 星（背景装飾）
            for (let i = 0; i < 30; i++) {
                const sx = Phaser.Math.Between(5, W-5);
                const sy = Phaser.Math.Between(5, H-5);
                const sa = Phaser.Math.FloatBetween(0.1, 0.4);
                this.add.circle(sx, sy, Phaser.Math.Between(1, 2), 0xffffff, sa);
            }

            // === ゾーン表示 ===
            // 鳥ゾーン（空 - 上部）
            const skyZone = this.add.rectangle(W/2, 150, W - 30, 170, PAL.accent, 0.08);
            skyZone.setStrokeStyle(1, PAL.accent, 0.15);
            this.add.text(15, 75, '☁ 空', { fontSize: '13px', fill: '#88ccff', fontStyle: 'bold' }).setAlpha(0.5);

            // 虫ゾーン（森 - 中部）
            const forestZone = this.add.rectangle(W/2, 350, W - 30, 170, PAL.yellow, 0.06);
            forestZone.setStrokeStyle(1, PAL.yellow, 0.12);
            this.add.text(15, 275, '🌳 森', { fontSize: '13px', fill: '#ffe66b', fontStyle: 'bold' }).setAlpha(0.5);

            // 草ゾーン（地面 - 下部）
            const groundZone = this.add.rectangle(W/2, 550, W - 30, 170, PAL.green, 0.08);
            groundZone.setStrokeStyle(1, PAL.green, 0.15);
            this.add.text(15, 475, '🌱 大地', { fontSize: '13px', fill: '#6bff8e', fontStyle: 'bold' }).setAlpha(0.5);

            // 食物連鎖の矢印（ゾーン間）
            this.add.text(W/2, 237, '🌿 → 🐛  食べる', {
                fontSize: '11px', fill: '#aaa', fontFamily: 'monospace'
            }).setOrigin(0.5).setAlpha(0.4);
            this.add.text(W/2, 437, '🐛 → 🐦  食べる', {
                fontSize: '11px', fill: '#aaa', fontFamily: 'monospace'
            }).setOrigin(0.5).setAlpha(0.4);

            // === HUD ===
            ui.topBar = this.add.rectangle(W/2, 30, W, 60, 0x000000, 0.5);

            ui.timeText = this.add.text(15, 12, '⏱ 0s', {
                fontSize: '18px', fill: '#fff', fontFamily: 'monospace', fontStyle: 'bold'
            });
            ui.diffText = this.add.text(W/2, 12, '🌍 Lv1', {
                fontSize: '14px', fill: '#9b6dff', fontFamily: 'monospace'
            }).setOrigin(0.5, 0);

            // 個体数カウンター（右上）
            ui.birdCount = this.add.text(W - 15, 8, '🐦 0', {
                fontSize: '14px', fill: '#88ccff', fontFamily: 'monospace', fontStyle: 'bold'
            }).setOrigin(1, 0);
            ui.bugCount = this.add.text(W - 15, 26, '🐛 0', {
                fontSize: '14px', fill: '#ffe66b', fontFamily: 'monospace', fontStyle: 'bold'
            }).setOrigin(1, 0);
            ui.grassCount = this.add.text(W - 15, 44, '🌿 0', {
                fontSize: '14px', fill: '#6bff8e', fontFamily: 'monospace', fontStyle: 'bold'
            }).setOrigin(1, 0);

            // 危険バー（画面下部）
            ui.dangerBg = this.add.rectangle(W/2, 660, W - 40, 8, 0x333333);
            ui.dangerBar = this.add.rectangle(W/2, 660, W - 40, 8, PAL.green);
            ui.dangerLabel = this.add.text(W/2, 675, 'バランス: 安定', {
                fontSize: '12px', fill: '#6bff8e', fontFamily: 'monospace'
            }).setOrigin(0.5);

            // 警告
            ui.warnText = this.add.text(W/2, 640, '', {
                fontSize: '16px', fill: '#ff6b9d', fontStyle: 'bold',
                stroke: '#000', strokeThickness: 2
            }).setOrigin(0.5).setAlpha(0);

            // ピコちゃんガイド（左下）
            ui.picoGuide = this.add.text(15, 640, '', {
                fontSize: '11px', fill: '#88ccff', fontStyle: 'bold',
                stroke: '#000', strokeThickness: 1
            }).setAlpha(0);

            setGameUIVisible(false);

            // === スタート画面 ===
            ui.startBg = this.add.rectangle(W/2, H/2, W, H, 0x2a1f4e);

            // ピコちゃん（簡易描画）
            const picoContainer = this.add.container(W/2, 140);
            // 体（水色）
            const picoBody = this.add.ellipse(0, 15, 50, 60, 0x88ccff);
            picoContainer.add(picoBody);
            // 頭
            const picoHead = this.add.circle(0, -20, 25, 0xffddbb);
            picoContainer.add(picoHead);
            // ツインテール
            picoContainer.add(this.add.circle(-25, -15, 12, 0x9b6dff));
            picoContainer.add(this.add.circle(25, -15, 12, 0x9b6dff));
            // 目
            picoContainer.add(this.add.circle(-8, -22, 3, 0x333333));
            picoContainer.add(this.add.circle(8, -22, 3, 0x333333));
            // 口
            picoContainer.add(this.add.text(0, -14, '◡', { fontSize: '10px', fill: '#cc8877' }).setOrigin(0.5));
            ui.picoChar = picoContainer;

            // ふわふわアニメ
            this.tweens.add({ targets: picoContainer, y: 135, duration: 1500, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });

            ui.titleText = this.add.text(W/2, 220, '生態系バランサー', {
                fontSize: '30px', fill: '#fff', fontStyle: 'bold',
                stroke: '#1a1030', strokeThickness: 4
            }).setOrigin(0.5);
            ui.titleSub = this.add.text(W/2, 258, 'ECOSYSTEM BALANCER', {
                fontSize: '11px', fill: '#9b6dff', fontFamily: 'monospace'
            }).setOrigin(0.5);

            ui.titleDesc = this.add.text(W/2, 340,
                '🌿草 → 🐛虫 → 🐦鳥\nの食物連鎖を守ろう！\n\n生き物をドラッグで移動して\n捕食者から逃がしたり\nエサに近づけたり\n\nどれかが絶滅したらゲームオーバー', {
                fontSize: '15px', fill: '#ddd', align: 'center', lineSpacing: 6
            }).setOrigin(0.5);

            const bestStr = bestTime > 0 ? `BEST: ${bestTime}s` : '';
            ui.titleBest = this.add.text(W/2, 470, bestStr, {
                fontSize: '16px', fill: '#ffe66b', fontFamily: 'monospace', fontStyle: 'bold'
            }).setOrigin(0.5);

            ui.titleStart = this.add.text(W/2, 530, '▶ TAP TO START', {
                fontSize: '22px', fill: '#88ccff', fontStyle: 'bold', fontFamily: 'monospace'
            }).setOrigin(0.5);
            this.tweens.add({ targets: ui.titleStart, alpha: 0.3, duration: 800, yoyo: true, repeat: -1 });

            this.add.text(W/2, H - 12, 'Powered by Phaser', {
                fontSize: '10px', fill: '#fff'
            }).setOrigin(0.5).setAlpha(0.2);

            // === 入力 ===
            this.input.on('pointerdown', (ptr) => {
                if (state === 'title') { startGame(this); return; }
                if (state !== 'playing') return;

                // エンティティをドラッグ
                let closest = null, closestDist = 40;
                for (const e of entities) {
                    const d = Phaser.Math.Distance.Between(ptr.x, ptr.y, e.x, e.y);
                    if (d < closestDist) { closest = e; closestDist = d; }
                }
                if (closest) {
                    dragTarget = closest;
                    dragTarget.sprite.setScale(1.4);
                    sndGrab();
                }
            });

            this.input.on('pointermove', (ptr) => {
                if (dragTarget && state === 'playing') {
                    dragTarget.x = Phaser.Math.Clamp(ptr.x, 20, W - 20);
                    dragTarget.y = Phaser.Math.Clamp(ptr.y, 70, 630);
                    dragTarget.sprite.setPosition(dragTarget.x, dragTarget.y);
                }
            });

            this.input.on('pointerup', () => {
                if (dragTarget) {
                    dragTarget.sprite.setScale(1);
                    sndDrop();
                    dragTarget = null;
                }
            });
        }

        function setGameUIVisible(v) {
            [ui.topBar, ui.timeText, ui.diffText,
             ui.birdCount, ui.bugCount, ui.grassCount,
             ui.dangerBg, ui.dangerBar, ui.dangerLabel,
             ui.warnText, ui.picoGuide].forEach(e => e && e.setVisible(v));
        }

        function spawnEntity(scene, type, x, y) {
            const def = CREATURES[type];
            if (!x) x = Phaser.Math.Between(30, W - 30);
            if (!y) y = Phaser.Math.Between(def.zone.yMin, def.zone.yMax);

            const sprite = scene.add.text(x, y, def.emoji, {
                fontSize: type === 'grass' ? '22px' : '26px'
            }).setOrigin(0.5);

            // 出現アニメ
            sprite.setScale(0);
            scene.tweens.add({ targets: sprite, scale: 1, duration: 200, ease: 'Back.easeOut' });

            const e = {
                type, x, y, sprite,
                vx: Phaser.Math.FloatBetween(-0.3, 0.3),
                vy: Phaser.Math.FloatBetween(-0.2, 0.2),
                age: 0,
                hungry: 0,        // 空腹度
                maxHungry: type === 'bird' ? 300 : type === 'bug' ? 400 : 9999,
            };
            entities.push(e);
            counts[type]++;
            sndSpawn();
            return e;
        }

        function removeEntity(scene, e, animate = true) {
            const idx = entities.indexOf(e);
            if (idx === -1) return;
            entities.splice(idx, 1);
            counts[e.type]--;

            if (animate) {
                scene.tweens.add({
                    targets: e.sprite, scale: 0, alpha: 0, duration: 200,
                    onComplete: () => e.sprite.destroy()
                });
            } else {
                e.sprite.destroy();
            }
        }

        function startGame(scene) {
            state = 'playing';
            [ui.startBg, ui.picoChar, ui.titleText, ui.titleSub, ui.titleDesc, ui.titleBest, ui.titleStart].forEach(o => o.setVisible(false));
            scene.tweens.killAll();

            setGameUIVisible(true);

            // クリア
            for (const e of entities) e.sprite.destroy();
            entities = [];
            counts = { grass: 0, bug: 0, bird: 0 };
            survivalTime = 0; difficulty = 1;

            // 初期配置
            for (let i = 0; i < 10; i++) spawnEntity(scene, 'grass');
            for (let i = 0; i < 5; i++) spawnEntity(scene, 'bug');
            for (let i = 0; i < 3; i++) spawnEntity(scene, 'bird');

            updateCountUI();

            // メインループ
            ecoTimer = scene.time.addEvent({
                delay: 500,
                callback: () => ecoTick(scene),
                loop: true
            });
        }

        function ecoTick(scene) {
            survivalTime += 0.5;
            difficulty = 1 + survivalTime / 60;
            ui.diffText.setText(`🌍 Lv${Math.floor(1 + survivalTime / 30)}`);
            ui.timeText.setText(`⏱ ${Math.floor(survivalTime)}s`);

            // === 自動スポーン（草のみ自然増殖） ===
            if (counts.grass < MAX_EACH && Math.random() < 0.15 * difficulty) {
                spawnEntity(scene, 'grass');
            }

            // === 捕食ロジック ===
            // 虫が草を食べる
            for (const bug of entities.filter(e => e.type === 'bug')) {
                bug.hungry += difficulty;
                const nearGrass = entities.find(e =>
                    e.type === 'grass' && e !== dragTarget &&
                    Phaser.Math.Distance.Between(bug.x, bug.y, e.x, e.y) < EAT_RANGE
                );
                if (nearGrass) {
                    removeEntity(scene, nearGrass);
                    bug.hungry = 0;
                    sndEat();

                    // 食べたら繁殖チャンス
                    if (counts.bug < MAX_EACH && Math.random() < 0.3) {
                        spawnEntity(scene, 'bug', bug.x + Phaser.Math.Between(-30, 30), bug.y + Phaser.Math.Between(-20, 20));
                    }

                    // 食べたエフェクト
                    const fx = scene.add.text(bug.x, bug.y - 15, '😋', { fontSize: '16px' }).setOrigin(0.5);
                    scene.tweens.add({ targets: fx, alpha: 0, y: bug.y - 35, duration: 400, onComplete: () => fx.destroy() });
                }
            }

            // 鳥が虫を食べる
            for (const bird of entities.filter(e => e.type === 'bird')) {
                bird.hungry += difficulty;
                const nearBug = entities.find(e =>
                    e.type === 'bug' && e !== dragTarget &&
                    Phaser.Math.Distance.Between(bird.x, bird.y, e.x, e.y) < EAT_RANGE
                );
                if (nearBug) {
                    removeEntity(scene, nearBug);
                    bird.hungry = 0;
                    sndEat();

                    if (counts.bird < MAX_EACH && Math.random() < 0.25) {
                        spawnEntity(scene, 'bird', bird.x + Phaser.Math.Between(-30, 30), bird.y + Phaser.Math.Between(-20, 20));
                    }

                    const fx = scene.add.text(bird.x, bird.y - 15, '😋', { fontSize: '16px' }).setOrigin(0.5);
                    scene.tweens.add({ targets: fx, alpha: 0, y: bird.y - 35, duration: 400, onComplete: () => fx.destroy() });
                }
            }

            // === 飢餓死 ===
            for (const e of [...entities]) {
                if (e.type === 'grass') continue;
                if (e.hungry > e.maxHungry) {
                    const fx = scene.add.text(e.x, e.y, '💀', { fontSize: '20px' }).setOrigin(0.5);
                    scene.tweens.add({ targets: fx, alpha: 0, y: e.y - 30, duration: 500, onComplete: () => fx.destroy() });
                    removeEntity(scene, e);
                    sndDeath();
                }
            }

            // === ゲームオーバー判定 ===
            if (counts.grass <= 0 || counts.bug <= 0 || counts.bird <= 0) {
                endGame(scene);
                return;
            }

            updateCountUI();
            updateDangerBar();
            updateWarnings();
        }

        function updateCountUI() {
            ui.birdCount.setText(`🐦 ${counts.bird}`);
            ui.bugCount.setText(`🐛 ${counts.bug}`);
            ui.grassCount.setText(`🌿 ${counts.grass}`);
        }

        function updateDangerBar() {
            // バランス度 = 各種が2以上あればOK、少ないほど危険
            const minCount = Math.min(counts.grass, counts.bug, counts.bird);
            const balance = Math.min(1, minCount / 5);

            ui.dangerBar.setScale(balance, 1);

            if (balance > 0.6) {
                ui.dangerBar.setFillStyle(PAL.green);
                ui.dangerLabel.setText('バランス: 安定').setFill('#6bff8e');
            } else if (balance > 0.3) {
                ui.dangerBar.setFillStyle(PAL.yellow);
                ui.dangerLabel.setText('バランス: 不安定').setFill('#ffe66b');
            } else {
                ui.dangerBar.setFillStyle(PAL.pink);
                ui.dangerLabel.setText('バランス: 危険！').setFill('#ff6b9d');
            }
        }

        function updateWarnings() {
            const warns = [];
            if (counts.grass <= 2) warns.push('🌿草が枯れそう！');
            if (counts.bug <= 1) warns.push('🐛虫が絶滅寸前！');
            if (counts.bird <= 1) warns.push('🐦鳥が絶滅寸前！');
            if (counts.grass >= MAX_EACH - 2) warns.push('🌿草が繁茂しすぎ！');

            if (warns.length > 0) {
                ui.warnText.setText(warns[0]).setAlpha(1);
            } else {
                ui.warnText.setAlpha(0);
            }

            // ピコのヒント
            if (counts.bug <= 2 && counts.grass > 5) {
                ui.picoGuide.setText('ピコ「虫を草の近くに運んで！」').setAlpha(0.8);
            } else if (counts.bird <= 1 && counts.bug > 3) {
                ui.picoGuide.setText('ピコ「鳥を虫の近くに！」').setAlpha(0.8);
            } else if (counts.grass <= 3) {
                ui.picoGuide.setText('ピコ「虫を草から離して！」').setAlpha(0.8);
            } else {
                ui.picoGuide.setAlpha(0);
            }
        }

        function update() {
            if (state !== 'playing') return;

            // 生き物の自律移動（ゆらゆら）
            for (const e of entities) {
                if (e === dragTarget) continue;

                // ランダムウォーク
                e.vx += Phaser.Math.FloatBetween(-0.05, 0.05);
                e.vy += Phaser.Math.FloatBetween(-0.05, 0.05);
                e.vx *= 0.98; e.vy *= 0.98;

                // 虫は草に向かう傾向
                if (e.type === 'bug' && e.hungry > 100) {
                    const nearGrass = entities.find(g => g.type === 'grass' && g !== dragTarget);
                    if (nearGrass) {
                        const dx = nearGrass.x - e.x, dy = nearGrass.y - e.y;
                        const dist = Math.sqrt(dx*dx + dy*dy);
                        if (dist > 0) { e.vx += (dx/dist) * 0.1; e.vy += (dy/dist) * 0.1; }
                    }
                }

                // 鳥は虫に向かう傾向
                if (e.type === 'bird' && e.hungry > 80) {
                    const nearBug = entities.find(b => b.type === 'bug' && b !== dragTarget);
                    if (nearBug) {
                        const dx = nearBug.x - e.x, dy = nearBug.y - e.y;
                        const dist = Math.sqrt(dx*dx + dy*dy);
                        if (dist > 0) { e.vx += (dx/dist) * 0.12; e.vy += (dy/dist) * 0.12; }
                    }
                }

                // 速度制限
                const spd = Math.sqrt(e.vx*e.vx + e.vy*e.vy);
                const maxSpd = e.type === 'bird' ? 1.5 : e.type === 'bug' ? 1.0 : 0;
                if (spd > maxSpd) { e.vx *= maxSpd/spd; e.vy *= maxSpd/spd; }

                e.x += e.vx;
                e.y += e.vy;

                // 壁バウンド
                if (e.x < 20) { e.x = 20; e.vx *= -1; }
                if (e.x > W-20) { e.x = W-20; e.vx *= -1; }
                if (e.y < 70) { e.y = 70; e.vy *= -1; }
                if (e.y > 630) { e.y = 630; e.vy *= -1; }

                e.sprite.setPosition(e.x, e.y);

                // 空腹の視覚表示（赤くなる）
                if (e.type !== 'grass') {
                    const hungerRatio = e.hungry / e.maxHungry;
                    if (hungerRatio > 0.7) {
                        e.sprite.setAlpha(0.5 + Math.sin(Date.now() * 0.01) * 0.3);
                    } else {
                        e.sprite.setAlpha(1);
                    }
                }
            }
        }

        function endGame(scene) {
            state = 'over';
            ecoTimer.remove();
            sndFail();

            setGameUIVisible(false);

            let cause = '';
            if (counts.grass <= 0) cause = '🌿 草が枯れ果てた…';
            else if (counts.bug <= 0) cause = '🐛 虫が絶滅した…';
            else if (counts.bird <= 0) cause = '🐦 鳥が絶滅した…';

            const time = Math.floor(survivalTime);
            const isNewBest = time > bestTime;
            if (isNewBest) {
                bestTime = time;
                try { localStorage.setItem('eco2_best', String(bestTime)); } catch(e) {}
            }

            let rank = 'D';
            if (time >= 120) rank = 'S';
            else if (time >= 90) rank = 'A';
            else if (time >= 60) rank = 'B';
            else if (time >= 30) rank = 'C';

            const rankColors = { D: '#ff6b9d', C: '#ffe66b', B: '#88ccff', A: '#6bff8e', S: '#9b6dff' };

            // エンティティ消去
            for (const e of entities) e.sprite.destroy();
            entities = [];

            endObjs = [];
            endObjs.push(scene.add.rectangle(W/2, H/2, W, H, 0x000000, 0.75));

            const card = scene.add.rectangle(W/2, H/2, 340, 400, 0x2a1f4e, 0.95);
            card.setStrokeStyle(2, PAL.purple, 0.5);
            endObjs.push(card);

            endObjs.push(scene.add.text(W/2, 195, '🌍 生態系崩壊', {
                fontSize: '26px', fill: '#fff', fontStyle: 'bold'
            }).setOrigin(0.5));

            endObjs.push(scene.add.text(W/2, 230, cause, {
                fontSize: '16px', fill: '#ff6b9d'
            }).setOrigin(0.5));

            endObjs.push(scene.add.text(W/2, 275, 'SURVIVAL', {
                fontSize: '13px', fill: '#888', fontFamily: 'monospace'
            }).setOrigin(0.5));

            endObjs.push(scene.add.text(W/2, 305, `${time}秒`, {
                fontSize: '42px', fill: '#fff', fontStyle: 'bold', fontFamily: 'monospace'
            }).setOrigin(0.5));

            endObjs.push(scene.add.text(W/2, 345, `RANK`, {
                fontSize: '13px', fill: '#888', fontFamily: 'monospace'
            }).setOrigin(0.5));

            endObjs.push(scene.add.text(W/2, 380, rank, {
                fontSize: '48px', fill: rankColors[rank], fontStyle: 'bold', fontFamily: 'monospace'
            }).setOrigin(0.5));

            if (isNewBest) {
                const nb = scene.add.text(W/2, 415, '🎉 NEW BEST!', {
                    fontSize: '16px', fill: '#ffe66b', fontStyle: 'bold'
                }).setOrigin(0.5);
                scene.tweens.add({ targets: nb, scale: 1.2, duration: 500, yoyo: true, repeat: -1 });
                endObjs.push(nb);
            }

            endObjs.push(scene.add.text(W/2, 435, `BEST: ${bestTime}s`, {
                fontSize: '13px', fill: '#888', fontFamily: 'monospace'
            }).setOrigin(0.5));

            const btn = scene.add.rectangle(W/2, 480, 170, 48, PAL.purple);
            btn.setStrokeStyle(2, 0xffffff, 0.4);
            btn.setInteractive();
            btn.on('pointerdown', () => resetGame(scene));
            endObjs.push(btn);

            endObjs.push(scene.add.text(W/2, 480, '▶ RETRY', {
                fontSize: '18px', fill: '#fff', fontStyle: 'bold', fontFamily: 'monospace'
            }).setOrigin(0.5));
        }

        function resetGame(scene) {
            for (const o of endObjs) o.destroy();
            endObjs = [];
            scene.tweens.killAll();
            counts = { grass: 0, bug: 0, bird: 0 };

            state = 'title';
            ui.titleBest.setText(bestTime > 0 ? `BEST: ${bestTime}s` : '');
            [ui.startBg, ui.picoChar, ui.titleText, ui.titleSub, ui.titleDesc, ui.titleBest, ui.titleStart].forEach(o => o.setVisible(true));
            scene.tweens.add({ targets: ui.titleStart, alpha: 0.3, duration: 800, yoyo: true, repeat: -1 });
            scene.tweens.add({ targets: ui.picoChar, y: 135, duration: 1500, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });
        }
    </script>
</body>
</html>
