<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>FogWar — 夜戦</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#050a14;color:#c0c8d0;font-family:'Courier New',monospace;touch-action:manipulation}
#title-screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;background:#050a14}
#title-screen h1{font-size:clamp(48px,12vw,96px);color:#00ff88;text-shadow:0 0 30px #00ff8866,0 0 60px #00ff8833;letter-spacing:8px;margin-bottom:8px}
#title-screen .sub{font-size:clamp(14px,3vw,22px);color:#4a8;margin-bottom:40px;letter-spacing:4px}
#title-screen button{background:none;border:2px solid #00ff88;color:#00ff88;padding:16px 48px;font-size:20px;font-family:inherit;cursor:pointer;letter-spacing:4px;transition:all .3s}
#title-screen button:hover{background:#00ff8822;box-shadow:0 0 20px #00ff8844}
#game-container{display:none;width:100%;height:100%;flex-direction:column}
#top-bar{display:flex;justify-content:space-between;align-items:center;padding:4px 8px;background:#0a1020;border-bottom:1px solid #1a3a2a;font-size:12px;min-height:28px;flex-shrink:0}
#board-wrapper{position:relative;flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden}
#board{display:grid;grid-template-columns:repeat(16,1fr);position:relative;touch-action:none}
#board .cell{aspect-ratio:1;border:1px solid #0a1a2a;position:relative;display:flex;align-items:center;justify-content:center;font-size:10px;cursor:pointer;transition:background .15s}
#board .cell:hover{background:#0a2a3a44}
#board .cell.island{background:#1a2a1a;border-color:#2a3a2a}
#board .cell.island::after{content:'🏝️';font-size:clamp(8px,1.8vw,13px)}
#board .cell.ship-cell{z-index:2}
#board .cell.selected{box-shadow:inset 0 0 0 2px #ffaa00}
#board .cell.attack-target{background:#ff000044;cursor:crosshair}
#board .cell.torpedo-target{background:#ff660033;cursor:crosshair}
#board .cell.placement-valid{background:#00ff8822}
#radar-canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:3}
#bottom-panel{background:#0a1020;border-top:1px solid #1a3a2a;padding:6px 8px;flex-shrink:0}
#ship-info{font-size:11px;margin-bottom:4px;min-height:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#action-bar{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:4px}
#action-bar button{background:#0a1a2a;border:1px solid #1a4a3a;color:#8fc;padding:6px 10px;font-size:12px;font-family:inherit;cursor:pointer;border-radius:3px;white-space:nowrap}
#action-bar button:hover:not(:disabled){background:#1a3a2a}
#action-bar button:disabled{opacity:.3;cursor:default}
#action-bar button.active{background:#1a4a3a;border-color:#00ff88}
#log{font-size:10px;color:#6a8a7a;max-height:52px;overflow:hidden;line-height:1.3}
#log div{padding:1px 0}
#placement-panel{display:none;background:#0a1020;border-top:1px solid #1a3a2a;padding:8px;text-align:center}
#placement-panel .info{font-size:13px;margin-bottom:8px}
#placement-panel button{background:#0a1a2a;border:1px solid #1a4a3a;color:#8fc;padding:8px 16px;font-size:13px;font-family:inherit;cursor:pointer;border-radius:3px;margin:2px}
#placement-panel button:hover{background:#1a3a2a}
#placement-panel button.active{background:#1a4a3a;border-color:#00ff88}
#placement-dir-grid{display:inline-grid;grid-template-columns:repeat(3,40px);gap:3px;vertical-align:middle;margin:0 8px}
#placement-dir-grid button{padding:6px;font-size:16px;background:#0a1a2a;border:1px solid #1a4a3a;color:#8fc;cursor:pointer;border-radius:3px;line-height:1}
#placement-dir-grid button:hover{background:#1a3a2a}
#placement-dir-grid button.active{background:#1a4a3a;border-color:#00ff88;color:#00ff88}
#placement-dir-grid button.blank{visibility:hidden}
.ship-preview{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:clamp(10px,2.5vw,18px);z-index:4;pointer-events:none;opacity:.5}
.cell.placement-hover{background:#00ff8844;border-color:#00ff88}
.cell.placement-invalid{background:#ff444422;border-color:#ff4444}
.blip{position:absolute;width:60%;height:60%;border-radius:50%;background:#00ff88;box-shadow:0 0 6px #00ff88;z-index:5;pointer-events:none;top:20%;left:20%}
.blip.ghost{background:#00ff8844;box-shadow:0 0 4px #00ff8822}
.ship-marker{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:clamp(10px,2.5vw,18px);z-index:4;pointer-events:none}
.dmg-flash{animation:dmgFlash .4s ease-out}
@keyframes dmgFlash{0%{background:#ff4400aa}100%{background:transparent}}
.sink-anim{animation:sinkAnim 1.2s ease-in forwards;pointer-events:none}
@keyframes sinkAnim{
  0%{opacity:1;transform:translateY(0) scale(1);filter:brightness(1)}
  20%{opacity:1;transform:translateY(0) scale(1.1);filter:brightness(2) hue-rotate(-30deg)}
  50%{opacity:.7;transform:translateY(4px) scale(.9);filter:brightness(.8) hue-rotate(0deg)}
  100%{opacity:0;transform:translateY(12px) scale(.5);filter:brightness(.3) hue-rotate(180deg)}
}
.sink-explosion{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:clamp(14px,3vw,24px);z-index:10;pointer-events:none;animation:explode .8s ease-out forwards}
@keyframes explode{
  0%{opacity:1;transform:scale(.5)}
  30%{opacity:1;transform:scale(1.5)}
  100%{opacity:0;transform:scale(2.5)}
}
.sink-ripple{position:absolute;inset:-50%;border-radius:50%;border:2px solid #ff4400;z-index:9;pointer-events:none;animation:ripple 1s ease-out forwards}
@keyframes ripple{
  0%{opacity:.8;transform:scale(.3)}
  100%{opacity:0;transform:scale(2)}
}
.muzzle-flash{animation:muzzleFlash .5s ease-out forwards;z-index:11}
@keyframes muzzleFlash{
  0%{background:#ffaa0000;box-shadow:0 0 0 0 #ffaa00}
  15%{background:#ffcc44cc;box-shadow:0 0 20px 8px #ffaa00aa}
  40%{background:#ff880066;box-shadow:0 0 12px 4px #ff660066}
  100%{background:transparent;box-shadow:none}
}
.muzzle-flash-marker{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:clamp(14px,3vw,22px);z-index:12;pointer-events:none;animation:flashEmoji .5s ease-out forwards}
@keyframes flashEmoji{
  0%{opacity:0;transform:scale(.3)}
  20%{opacity:1;transform:scale(1.2)}
  60%{opacity:.8;transform:scale(1)}
  100%{opacity:0;transform:scale(.5)}
}
#tutorial-overlay{display:none;position:absolute;inset:0;background:#050a14ee;z-index:300;flex-direction:column;align-items:center;justify-content:center;padding:20px}
#tutorial-overlay .tut-box{max-width:420px;width:90%;text-align:center}
#tutorial-overlay h2{color:#00ff88;font-size:24px;margin-bottom:16px;letter-spacing:4px}
#tutorial-overlay .tut-page{font-size:14px;line-height:1.8;color:#c0d8d0;margin-bottom:20px;text-align:left;min-height:180px}
#tutorial-overlay .tut-page .emoji-icon{font-size:32px;display:block;text-align:center;margin:10px 0}
#tutorial-overlay .tut-page h3{color:#88ddaa;font-size:16px;margin:12px 0 6px;text-align:center}
#tutorial-overlay .tut-nav{display:flex;justify-content:center;gap:12px;align-items:center}
#tutorial-overlay .tut-nav button{background:none;border:1px solid #00ff88;color:#00ff88;padding:8px 24px;font-size:14px;font-family:inherit;cursor:pointer;border-radius:3px;letter-spacing:2px}
#tutorial-overlay .tut-nav button:hover{background:#00ff8822}
#tutorial-overlay .tut-dots{display:flex;gap:6px;justify-content:center;margin-bottom:12px}
#tutorial-overlay .tut-dots .dot{width:8px;height:8px;border-radius:50%;background:#1a4a3a;transition:background .2s}
#tutorial-overlay .tut-dots .dot.active{background:#00ff88}
#tutorial-overlay .tut-skip{margin-top:16px;color:#4a6a5a;font-size:11px;cursor:pointer}
#tutorial-overlay .tut-skip:hover{color:#8fc}
#game-over-overlay{display:none;position:absolute;inset:0;background:#050a14dd;z-index:200;flex-direction:column;align-items:center;justify-content:center}
#game-over-overlay h2{font-size:36px;margin-bottom:16px}
#game-over-overlay .win{color:#00ff88}
#game-over-overlay .lose{color:#ff4444}
#game-over-overlay button{background:none;border:2px solid #00ff88;color:#00ff88;padding:12px 36px;font-size:16px;font-family:inherit;cursor:pointer;margin-top:20px}
#radar-dir-panel{display:none!important}
#radar-dir-panel .title{color:#00ff88;margin-bottom:12px;font-size:14px}
#radar-dir-panel .dirs{display:grid;grid-template-columns:repeat(3,50px);gap:4px;justify-content:center}
#radar-dir-panel button{background:#0a1a2a;border:1px solid #1a4a3a;color:#8fc;padding:10px;font-size:14px;cursor:pointer;border-radius:3px}
#radar-dir-panel button:hover{background:#1a3a2a}
.torpedo-marker{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:14px;z-index:5;pointer-events:none;color:#ff8800;text-shadow:0 0 4px #ff6600}
</style>
</head>
<body>
<div id="title-screen">
<h1>FogWar</h1>
<div class="sub">夜戦 — 不完全情報海戦</div>
<button onclick="startGame()">出 撃</button>
</div>

<div id="game-container">
<div id="top-bar">
<span id="turn-info">Turn 1</span>
<span id="phase-info">配置フェーズ</span>
</div>
<div id="board-wrapper">
<div id="board"></div>
<canvas id="radar-canvas"></canvas>
</div>
<div id="placement-panel">
<div class="info" id="placement-info">戦艦を配置してください</div>
<div style="display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap">
<span>向き:</span>
<div id="placement-dir-grid">
<button onclick="setPlacementDir(7)">↖</button>
<button onclick="setPlacementDir(0)">↑</button>
<button onclick="setPlacementDir(1)">↗</button>
<button onclick="setPlacementDir(6)">←</button>
<button class="blank"></button>
<button onclick="setPlacementDir(2)">→</button>
<button onclick="setPlacementDir(5)">↙</button>
<button onclick="setPlacementDir(4)">↓</button>
<button onclick="setPlacementDir(3)">↘</button>
</div>
<button onclick="confirmPlacement()" id="confirm-place-btn" disabled>配置確定</button>
</div>
</div>
<div id="bottom-panel">
<div id="ship-info">艦を選択してください</div>
<div id="action-bar">
<button id="btn-turn-l" onclick="doAction('turnL')" disabled>↶回頭</button>
<button id="btn-turn-r" onclick="doAction('turnR')" disabled>回頭↷</button>
<button id="btn-move" onclick="doAction('move')" disabled>前進</button>
<button id="btn-fire" onclick="doAction('fire')" disabled>砲撃</button>
<button id="btn-torpedo" onclick="doAction('torpedo')" disabled>魚雷</button>
<button id="btn-radar" onclick="doAction('radar')" disabled style="display:none">📡</button>
<button id="btn-wait" onclick="doAction('wait')" disabled>待機</button>
<button id="btn-end" onclick="doAction('endTurn')">ターン終了</button>
</div>
<div id="log"></div>
</div>
</div>

<div id="tutorial-overlay">
<div class="tut-box">
<h2>📖 操作説明</h2>
<div class="tut-page" id="tut-page-content"></div>
<div class="tut-dots" id="tut-dots"></div>
<div class="tut-nav">
<button id="tut-prev" onclick="tutPrev()">◀ 前へ</button>
<button id="tut-next" onclick="tutNext()">次へ ▶</button>
</div>
<div class="tut-skip" onclick="closeTutorial()">スキップして開始 →</div>
</div>
</div>

<div id="game-over-overlay">
<h2 id="game-over-text"></h2>
<div id="game-over-detail"></div>
<button onclick="location.reload()">再出撃</button>
</div>

<div id="radar-dir-panel">
<div class="title">📡 レーダー方向選択</div>
<div class="dirs">
<button onclick="setRadarDir(7)">↖NW</button>
<button onclick="setRadarDir(0)">↑N</button>
<button onclick="setRadarDir(1)">↗NE</button>
<button onclick="setRadarDir(6)">←W</button>
<button onclick="closeRadarPanel()">✕</button>
<button onclick="setRadarDir(2)">→E</button>
<button onclick="setRadarDir(5)">↙SW</button>
<button onclick="setRadarDir(4)">↓S</button>
<button onclick="setRadarDir(3)">↘SE</button>
</div>
</div>

<script>
"use strict";
// ============================================================
// CONSTANTS
// ============================================================
const GRID=16;
const DIRS=['N','NE','E','SE','S','SW','W','NW'];
const DX=[0,1,1,1,0,-1,-1,-1];
const DY=[-1,-1,0,1,1,1,0,-1];
const DIR_ARROWS=['↑','↗','→','↘','↓','↙','←','↖'];

const SHIP_DEFS=[
  {type:'battleship',name:'戦艦',emoji:'⚓',size:3,maxHp:8,firepower:3,fireRange:4,radarRange:5,maxTorpedoes:0,maxTurnSteps:1,maxMove:1},
  {type:'cruiser',name:'巡洋艦',emoji:'🚢',size:2,maxHp:5,firepower:2,fireRange:3,radarRange:4,maxTorpedoes:3,maxTurnSteps:2,maxMove:2},
  {type:'destroyer1',name:'駆逐艦α',emoji:'🔱',size:1,maxHp:2,firepower:1,fireRange:2,radarRange:3,maxTorpedoes:5,maxTurnSteps:2,maxMove:3},
  {type:'destroyer2',name:'駆逐艦β',emoji:'🔱',size:1,maxHp:2,firepower:1,fireRange:2,radarRange:3,maxTorpedoes:5,maxTurnSteps:2,maxMove:3}
];

// ============================================================
// AUDIO
// ============================================================
let audioCtx;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()}
function playSound(type){
  try{initAudio()}catch(e){return}
  if(!audioCtx)return;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain(),t=audioCtx.currentTime;
  o.connect(g);g.connect(audioCtx.destination);
  switch(type){
    case'fire':o.type='sawtooth';o.frequency.setValueAtTime(200,t);o.frequency.exponentialRampToValueAtTime(60,t+.3);g.gain.setValueAtTime(.3,t);g.gain.exponentialRampToValueAtTime(.01,t+.4);o.start(t);o.stop(t+.4);break;
    case'torpedo':o.type='sine';o.frequency.setValueAtTime(800,t);o.frequency.exponentialRampToValueAtTime(200,t+.5);g.gain.setValueAtTime(.15,t);g.gain.exponentialRampToValueAtTime(.01,t+.5);o.start(t);o.stop(t+.5);break;
    case'hit':o.type='square';o.frequency.setValueAtTime(150,t);o.frequency.exponentialRampToValueAtTime(40,t+.3);g.gain.setValueAtTime(.25,t);g.gain.exponentialRampToValueAtTime(.01,t+.5);o.start(t);o.stop(t+.5);break;
    case'sink':o.type='sawtooth';o.frequency.setValueAtTime(300,t);o.frequency.exponentialRampToValueAtTime(20,t+1);g.gain.setValueAtTime(.3,t);g.gain.exponentialRampToValueAtTime(.01,t+1);o.start(t);o.stop(t+1);break;
    case'radar':o.type='sine';o.frequency.setValueAtTime(1200,t);o.frequency.exponentialRampToValueAtTime(600,t+.2);g.gain.setValueAtTime(.08,t);g.gain.exponentialRampToValueAtTime(.01,t+.3);o.start(t);o.stop(t+.3);break;
    case'click':o.type='sine';o.frequency.setValueAtTime(600,t);g.gain.setValueAtTime(.05,t);g.gain.exponentialRampToValueAtTime(.01,t+.05);o.start(t);o.stop(t+.05);break;
  }
}

// ============================================================
// TUTORIAL
// ============================================================
const TUTORIAL_PAGES=[
  {title:'FogWarへようこそ',icon:'⚓',text:'これは<b>不完全情報</b>の海戦ゲームです。\n\nあなたは4隻の艦隊を指揮し、\n霧の中に潜む敵艦隊を撃滅します。\n\nレーダーの範囲内しか見えません。\n敵も同じ条件で戦っています。'},
  {title:'艦種と特徴',icon:'🚢',text:'<b>⚓ 戦艦</b> — HP8・火力3・射程4。鈍足だが頑丈\n<b>🚢 巡洋艦</b> — HP5・火力2・魚雷3本。バランス型\n<b>🔱 駆逐艦×2</b> — HP2・火力1・魚雷5本。高速＆魚雷特化\n\n大型艦は複数マスを占め、\n旋回にスペースが必要です。'},
  {title:'配置フェーズ',icon:'📍',text:'ゲーム開始時、下4行に艦を配置します。\n\n<b>①</b> 方向ボタン（↑↗→…）で向きを選択\n<b>②</b> マスをタップして位置を決定\n<b>③</b> 「配置確定」で次の艦へ\n\nマウスホバーでプレビューが表示されます。'},
  {title:'ターンの流れ',icon:'🎯',text:'各艦は1ターンに以下を順番に実行できます：\n\n<b>1. 回頭</b>（↶↷）— 向きを変える\n<b>2. 前進</b> — 向いている方向に移動\n<b>3. 攻撃</b> — 砲撃 or 魚雷（どちらか1回）\n\n全艦の行動が終わったら「ターン終了」。\n未行動の艦は「待機」で飛ばせます。'},
  {title:'砲撃と魚雷',icon:'💥',text:'<b>🔥 砲撃</b>\nレーダーで探知した敵を直接攻撃。\n距離が遠いほど命中率が下がります。\n砲撃すると閃光で<b>位置がバレます</b>！\n\n<b>🐟 魚雷</b>\n前方180°に発射し、毎ターン直進。\n命中すれば<b>3ダメージ</b>の大打撃！\n数に限りがあるので大事に使いましょう。'},
  {title:'ダメージと損傷',icon:'⚠️',text:'HPが<b>半分以下</b>になると中破：\n　速度-1、射程-1、レーダー-1\n\nHPが<b>1/4以下</b>で大破：\n　速度-2、射程-2、火力-1\n\n損傷した艦は性能が大きく落ちます。\n退避するか、最後まで戦うかはあなた次第。'},
  {title:'島と視線遮断',icon:'🏝️',text:'マップ上の<b>🏝️ 島</b>は移動不可で、\nレーダーの<b>視線（LOS）を遮断</b>します。\n\n島の裏に隠れれば敵から見えません。\n逆に、島越しの敵は探知できません。\n\n地形を活かした戦術がカギです！'},
  {title:'さあ、出撃！',icon:'⚔️',text:'全ての準備は整いました。\n\n敵艦隊を探し出し、撃滅せよ！\n\n<b>💡 Tips:</b>\n・駆逐艦は偵察と魚雷攻撃に使おう\n・戦艦は島影から砲撃すると強い\n・砲撃の位置バレに注意！'}
];
let tutPage=0;

function showTutorial(){
  tutPage=0;
  document.getElementById('tutorial-overlay').style.display='flex';
  renderTutorial();
}

function renderTutorial(){
  const p=TUTORIAL_PAGES[tutPage];
  document.getElementById('tut-page-content').innerHTML=
    `<div class="emoji-icon">${p.icon}</div><h3>${p.title}</h3>`+
    p.text.replace(/\n/g,'<br>');
  // Dots
  const dots=document.getElementById('tut-dots');
  dots.innerHTML=TUTORIAL_PAGES.map((_,i)=>
    `<div class="dot${i===tutPage?' active':''}"></div>`
  ).join('');
  // Nav buttons
  document.getElementById('tut-prev').style.visibility=tutPage>0?'visible':'hidden';
  document.getElementById('tut-next').textContent=
    tutPage>=TUTORIAL_PAGES.length-1?'出撃！':'次へ ▶';
}

function tutNext(){
  if(tutPage>=TUTORIAL_PAGES.length-1){closeTutorial();return}
  tutPage++;renderTutorial();playSound('click');
}

function tutPrev(){
  if(tutPage>0){tutPage--;renderTutorial();playSound('click')}
}

function closeTutorial(){
  document.getElementById('tutorial-overlay').style.display='none';
  try{localStorage.setItem('fogwar-tutorial-seen','1')}catch(e){}
  startGameActual();
}

function needsTutorial(){
  try{return !localStorage.getItem('fogwar-tutorial-seen')}catch(e){return true}
}

// ============================================================
// GAME STATE
// ============================================================
let state='title';
let islands=new Set();
let playerShips=[], aiShips=[];
let playerTorpedoes=[], aiTorpedoes=[];
let turn=1;
let selectedIdx=-1;
let actionMode=null; // null|'fire'|'torpedo'
let detectedEnemies=new Map();
let ghostEnemies=new Map();
let aiDetected=new Map();
let aiGhosts=new Map();
let logs=[];
let placementIdx=0, placementDir=0, placementCells=[];
let aiProcessing=false;

// Per-ship per-turn action flags
// Each ship tracks: turned, moved, attacked (in that order)
// Turn flow per ship: can turn → can move → can attack/torpedo → done

function makeShip(def,r,c,dir,owner){
  return{
    type:def.type, name:def.name, emoji:def.emoji, size:def.size,
    hp:def.maxHp, maxHp:def.maxHp,
    firepower:def.firepower, fireRange:def.fireRange,
    radarRange:def.radarRange,
    torpedoCount:def.maxTorpedoes, maxTurnSteps:def.maxTurnSteps, maxMove:def.maxMove,
    r, c, dir, owner,
    radarDir: owner==='player'?0:4,
    alive:true,
    // per-turn flags
    turned:false, movesDone:0, attacked:false, done:false
  };
}

function resetShipTurn(sh){sh.turned=false;sh.movesDone=0;sh.attacked=false;sh.done=false}

// Damage-based performance degradation
function getEffStats(sh){
  const ratio=sh.hp/sh.maxHp;
  let movePen=0, rangePen=0, radarPen=0, fpPen=0;
  if(ratio<=0.25){movePen=2;rangePen=2;radarPen=2;fpPen=1}
  else if(ratio<=0.5){movePen=1;rangePen=1;radarPen=1;fpPen=0}
  return{
    maxMove:Math.max(1,sh.maxMove-movePen),
    fireRange:Math.max(1,sh.fireRange-rangePen),
    radarRange:Math.max(2,sh.radarRange-radarPen),
    firepower:Math.max(1,sh.firepower-fpPen),
    maxTurnSteps:ratio<=0.25?Math.max(1,sh.maxTurnSteps-1):sh.maxTurnSteps
  };
}

function shipCells(sh){
  if(!sh.alive)return[];
  const cells=[{r:sh.r,c:sh.c}];
  const bd=(sh.dir+4)%8;
  for(let i=1;i<sh.size;i++) cells.push({r:sh.r+DY[bd]*i,c:sh.c+DX[bd]*i});
  return cells;
}

function inBounds(r,c){return r>=0&&r<GRID&&c>=0&&c<GRID}
function ck(r,c){return r+','+c}
function isIsl(r,c){return islands.has(ck(r,c))}

function occupiedSet(ships,excludeIdx){
  const s=new Set();
  ships.forEach((sh,i)=>{if(sh.alive&&i!==excludeIdx)shipCells(sh).forEach(p=>s.add(ck(p.r,p.c)))});
  return s;
}

function allBlockedSet(myShips,myIdx){
  const s=occupiedSet(myShips,myIdx);
  const others=myShips===playerShips?aiShips:playerShips;
  others.forEach(sh=>{if(sh.alive)shipCells(sh).forEach(p=>s.add(ck(p.r,p.c)))});
  return s;
}

// ============================================================
// ISLAND GENERATION
// ============================================================
function generateIslands(){
  islands=new Set();
  const count=5+Math.floor(Math.random()*4);
  for(let i=0;i<count;i++){
    const cr=4+Math.floor(Math.random()*8);
    const cc=1+Math.floor(Math.random()*14);
    islands.add(ck(cr,cc));
    const clSz=1+Math.floor(Math.random()*3);
    let cells=[{r:cr,c:cc}];
    for(let j=0;j<clSz;j++){
      const b=cells[Math.floor(Math.random()*cells.length)];
      const dd=[[0,-1],[1,0],[0,1],[-1,0]][Math.floor(Math.random()*4)];
      const nr=b.r+dd[1],nc=b.c+dd[0];
      if(inBounds(nr,nc)&&nr>=4&&nr<=11&&!islands.has(ck(nr,nc))){
        islands.add(ck(nr,nc));cells.push({r:nr,c:nc});
      }
    }
  }
}

// BOARD BUILD
// ============================================================
function buildBoard(){
  const board=document.getElementById('board');
  board.innerHTML='';
  const wrapper=document.getElementById('board-wrapper');
  const sz=Math.min(wrapper.clientWidth,wrapper.clientHeight)-2;
  board.style.width=sz+'px';board.style.height=sz+'px';
  for(let r=0;r<GRID;r++){
    for(let c=0;c<GRID;c++){
      const cell=document.createElement('div');
      cell.className='cell'+(isIsl(r,c)?' island':'');
      cell.dataset.r=r;cell.dataset.c=c;
      cell.addEventListener('click',()=>onCellClick(r,c));
      cell.addEventListener('pointerenter',()=>onCellHover(r,c));
      cell.addEventListener('pointerleave',()=>onCellHoverOut());
      board.appendChild(cell);
    }
  }
  const canvas=document.getElementById('radar-canvas');
  canvas.width=sz;canvas.height=sz;
}

function getCell(r,c){
  return document.getElementById('board').children[r*GRID+c];
}

let placementHoverValid=false;

function updatePlacementUI(){

  document.getElementById('placement-info').textContent=`${d.emoji}${d.name}を配置（${d.size}マス）— 下4行にタップ`;

function setPlacementDir(dir){
  placementDir=dir;
  placementCells=[];
  playSound('click');
  updatePlacementUI();render();
}

function rotatePlacement(delta){
  placementDir=((placementDir+delta)%8+8)%8;
  placementCells=[];
  updatePlacementUI();render();
}

function calcPlacementPreview(r,c){
  if(state!=='placement')return{cells:[],valid:false};
  if(r<12)return{cells:[],valid:false};
  const d=SHIP_DEFS[placementIdx];
  const cells=[{r,c}];
  const bd=(placementDir+4)%8;
  for(let i=1;i<d.size;i++) cells.push({r:r+DY[bd]*i,c:c+DX[bd]*i});
  const occ=occupiedSet(playerShips,-1);
  let valid=true;
  for(const p of cells){
    if(!inBounds(p.r,p.c)||p.r<12||isIsl(p.r,p.c)||occ.has(ck(p.r,p.c))){valid=false;break}
  }
  return{cells,valid};
}

function tryPlace(r,c){
  if(state!=='placement')return;
  if(r<12)return;
  const d=SHIP_DEFS[placementIdx];
  const cells=[{r,c}];
  const bd=(placementDir+4)%8;
  for(let i=1;i<d.size;i++) cells.push({r:r+DY[bd]*i,c:c+DX[bd]*i});
  const occ=occupiedSet(playerShips,-1);
  for(const p of cells){
    if(!inBounds(p.r,p.c)||p.r<12||isIsl(p.r,p.c)||occ.has(ck(p.r,p.c)))return;
  }
  placementCells=cells;
  updatePlacementUI();
  playSound('click');
  render();
}

function confirmPlacement(){
  if(!placementCells.length)return;
  const d=SHIP_DEFS[placementIdx];
  playerShips.push(makeShip(d,placementCells[0].r,placementCells[0].c,placementDir,'player'));
  placementCells=[];
  placementIdx++;
  if(placementIdx>=SHIP_DEFS.length){
    placeAI();
    state='play';
    document.getElementById('placement-panel').style.display='none';
    document.getElementById('bottom-panel').style.display='block';
    playerShips.forEach(s=>resetShipTurn(s));
    aiShips.forEach(s=>resetShipTurn(s));
    doRadarScan();
    addLog('夜戦開始。全艦戦闘配置。');
    updateUI();render();
  } else {
    placementDir=0;
    updatePlacementUI();render();
  }
}

function placeAI(){
  aiShips=[];
  for(const d of SHIP_DEFS){
    for(let att=0;att<300;att++){
      const r=Math.floor(Math.random()*4);
      const c=Math.floor(Math.random()*GRID);
      const dir=4;
      const cells=[{r,c}];
      const bd=(dir+4)%8;
      for(let i=1;i<d.size;i++) cells.push({r:r+DY[bd]*i,c:c+DX[bd]*i});
      const occ=occupiedSet(aiShips,-1);
      let ok=true;
      for(const p of cells){if(!inBounds(p.r,p.c)||p.r>=4||isIsl(p.r,p.c)||occ.has(ck(p.r,p.c))){ok=false;break}}
      if(ok){aiShips.push(makeShip(d,r,c,dir,'ai'));break}
    }
  }
}

// ============================================================
// RADAR
// ============================================================
function doRadarScan(){
  detectedEnemies=new Map();
  playerShips.forEach(sh=>{
    if(!sh.alive)return;
    scanArc(sh,aiShips).forEach(k=>{detectedEnemies.set(k,turn);ghostEnemies.set(k,turn)});
  });
  aiDetected=new Map();
  aiShips.forEach(sh=>{
    if(!sh.alive)return;
    scanArc(sh,playerShips).forEach(k=>{aiDetected.set(k,turn);aiGhosts.set(k,turn)});
  });
  playSound('radar');
}

function scanArc(ship,targets){
  const found=new Set();
  targets.forEach(t=>{
    if(!t.alive)return;
    shipCells(t).forEach(p=>{
      const dr=p.r-ship.r, dc=p.c-ship.c;
      const dist=Math.sqrt(dr*dr+dc*dc);
      const eff=getEffStats(ship);
      if(dist>eff.radarRange||dist<0.1)return;
      // 360 degree scan — only check range and LOS
      if(hasLOS(ship.r,ship.c,p.r,p.c)){
        found.add(ck(p.r,p.c));
      }
    });
  });
  return found;
}

function hasLOS(r1,c1,r2,c2){
  // Supercover line: check all cells the line passes through
  const dr=Math.abs(r2-r1), dc=Math.abs(c2-c1);
  if(dr===0&&dc===0)return true;
  const sr=r1<r2?1:-1, sc=c1<c2?1:-1;
  // Use fine-grained stepping to catch all crossed cells
  const steps=Math.max(dr,dc)*3; // oversample for accuracy
  if(steps===0)return true;
  let prevR=r1, prevC=c1;
  for(let i=1;i<=steps;i++){
    const t=i/steps;
    const r=Math.round(r1+(r2-r1)*t);
    const c=Math.round(c1+(c2-c1)*t);
    if(r===r2&&c===c2)break; // don't check destination
    if(r===r1&&c===c1)continue; // skip origin
    if(isIsl(r,c))return false;
    // Also check the "corner" cells for diagonal steps to prevent peeking through diagonal gaps
    if(r!==prevR&&c!==prevC){
      if(isIsl(prevR,c)&&isIsl(r,prevC))return false;
    }
    prevR=r;prevC=c;
  }
  return true;
}

// ============================================================
// RENDER
// ============================================================
function render(){
  for(let r=0;r<GRID;r++){
    for(let c=0;c<GRID;c++){
      const cell=getCell(r,c);
      if(!cell)continue;
      cell.className='cell'+(isIsl(r,c)?' island':'');
      cell.querySelectorAll('.ship-marker,.blip,.torpedo-marker').forEach(e=>e.remove());
      cell.style.boxShadow='';
    }
  }

  if(state==='placement'){
    // Valid zone
    if(!placementCells.length){
      for(let r=12;r<16;r++)for(let c=0;c<16;c++)if(!isIsl(r,c))getCell(r,c).classList.add('placement-valid');
    }
    placementCells.forEach(p=>{if(inBounds(p.r,p.c))getCell(p.r,p.c).classList.add('placement-valid')});
    playerShips.forEach(sh=>drawShip(sh));
    renderRadar();
    return;
  }

  if(state!=='play'&&state!=='gameover')return;

  // Player ships
  playerShips.forEach((sh,i)=>{
    if(!sh.alive)return;
    drawShip(sh);
    if(i===selectedIdx)shipCells(sh).forEach(p=>{if(inBounds(p.r,p.c))getCell(p.r,p.c).classList.add('selected')});
  });

  // Blips (detected enemies)
  detectedEnemies.forEach((_,key)=>{
    const[r,c]=key.split(',').map(Number);
    if(!inBounds(r,c))return;
    const b=document.createElement('div');b.className='blip';
    getCell(r,c).appendChild(b);
  });

  // Ghosts
  ghostEnemies.forEach((_,key)=>{
    if(detectedEnemies.has(key))return;
    const[r,c]=key.split(',').map(Number);
    if(!inBounds(r,c))return;
    const b=document.createElement('div');b.className='blip ghost';
    getCell(r,c).appendChild(b);
  });

  // Player torpedoes
  playerTorpedoes.forEach(t=>{
    if(!inBounds(t.r,t.c))return;
    const m=document.createElement('div');m.className='torpedo-marker';m.textContent='•';
    getCell(t.r,t.c).appendChild(m);
  });

  // Action highlights
  if(actionMode==='fire'&&selectedIdx>=0){
    const sh=playerShips[selectedIdx];
    const effR=getEffStats(sh);
    detectedEnemies.forEach((_,key)=>{
      const[r,c]=key.split(',').map(Number);
      if(Math.sqrt((r-sh.r)**2+(c-sh.c)**2)<=effR.fireRange)
        getCell(r,c).classList.add('attack-target');
    });
  }
  if(actionMode==='torpedo'&&selectedIdx>=0){
    const sh=playerShips[selectedIdx];
    for(let d=-2;d<=2;d++){
      const dir=((sh.dir+d)%8+8)%8;
      for(let s=1;s<=4;s++){
        const r=sh.r+DY[dir]*s,c=sh.c+DX[dir]*s;
        if(inBounds(r,c)&&!isIsl(r,c))getCell(r,c).classList.add('torpedo-target');
        else break;
      }
    }
  }

  renderRadar();
}

function drawShip(sh){
  const cells=shipCells(sh);
  const isEnemy=sh.owner==='ai';
  cells.forEach((p,i)=>{
    if(!inBounds(p.r,p.c))return;
    const cell=getCell(p.r,p.c);
    cell.classList.add('ship-cell');
    const m=document.createElement('div');
    m.className='ship-marker';
    if(i===0){
      m.textContent=sh.emoji+DIR_ARROWS[sh.dir];
      m.style.color=isEnemy?'#ff6666':'#66ccff';
    } else {
      m.textContent='█';
      m.style.color=isEnemy?'#883333':'#335588';
      m.style.fontSize='clamp(8px,2vw,14px)';
    }
    cell.appendChild(m);
    // HP indicator
    if(i===0&&sh.hp<sh.maxHp){
      const pct=sh.hp/sh.maxHp;
      cell.style.boxShadow=`inset 0 -3px 0 ${pct>.5?'#4a4':'#f44'}`;
    }
  });
}

function renderRadar(){
  const canvas=document.getElementById('radar-canvas');
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const cs=canvas.width/GRID;

  playerShips.forEach(sh=>{
    if(!sh.alive)return;
    const cx=(sh.c+.5)*cs, cy=(sh.r+.5)*cs;
    const eff=getEffStats(sh);
    const range=eff.radarRange*cs;
    // 360-degree radar circle
    ctx.save();
    ctx.globalAlpha=.06;ctx.fillStyle='#00ff88';
    ctx.beginPath();ctx.arc(cx,cy,range,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=.25;ctx.strokeStyle='#00ff88';ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(cx,cy,range,0,Math.PI*2);ctx.stroke();
    // Rotating sweep line (cosmetic)
    ctx.globalAlpha=.3;ctx.lineWidth=2;
    const sweepDeg=((Date.now()/20)%360)*Math.PI/180;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(sweepDeg)*range,cy+Math.sin(sweepDeg)*range);ctx.stroke();
    ctx.restore();
  });
}

// UI
// ============================================================
function updateUI(){
  document.getElementById('turn-info').textContent=`Turn ${turn}`;
  document.getElementById('phase-info').textContent=state==='play'?(aiProcessing?'敵ターン…':'プレイヤーターン'):'';

  const sh=selectedIdx>=0?playerShips[selectedIdx]:null;
  if(sh&&sh.alive){
    const eff=getEffStats(sh);
    const tStr=sh.torpedoCount>0?` 魚雷:${sh.torpedoCount}`:'';
    const dmgStr=sh.hp<=sh.maxHp*0.5?(sh.hp<=sh.maxHp*0.25?' ⚠大破':' ⚠中破'):'';
    const status=sh.done?'✓完了':sh.attacked?'攻撃済':sh.movesDone?'移動済':'';
    document.getElementById('ship-info').textContent=
      `${sh.emoji}${sh.name} HP:${sh.hp}/${sh.maxHp} ${DIRS[sh.dir]}${tStr}${dmgStr} ${status}`;

    const canTurn=!sh.done&&!sh.turned&&!sh.movesDone&&!sh.attacked;
    const canMove=!sh.done&&!sh.attacked&&sh.movesDone<eff.maxMove;
    const canAttack=!sh.done&&!sh.attacked;
    const canRadar=!sh.done;

    document.getElementById('btn-turn-l').disabled=!canTurn||aiProcessing;
    document.getElementById('btn-turn-r').disabled=!canTurn||aiProcessing;
    document.getElementById('btn-move').disabled=!canMove||aiProcessing;
    document.getElementById('btn-fire').disabled=!canAttack||!hasVisibleTarget(sh)||aiProcessing;
    document.getElementById('btn-torpedo').disabled=!canAttack||sh.torpedoCount<=0||aiProcessing;
    document.getElementById('btn-radar').disabled=!canRadar||aiProcessing;
    document.getElementById('btn-wait').disabled=sh.done||aiProcessing;
  } else {
    document.getElementById('ship-info').textContent='艦を選択してください';
    ['btn-turn-l','btn-turn-r','btn-move','btn-fire','btn-torpedo','btn-radar','btn-wait'].forEach(id=>
      document.getElementById(id).disabled=true);
  }
  document.getElementById('btn-end').disabled=aiProcessing;
}

function playSinkAnimation(ship){
  const cells=shipCells(ship);
  // Even if ship is about to be marked dead, compute cells first
  cells.forEach((p,i)=>{
    if(!inBounds(p.r,p.c))return;
    const cell=getCell(p.r,p.c);
    // Add explosion emoji
    const expl=document.createElement('div');
    expl.className='sink-explosion';
    expl.textContent='💥';
    cell.appendChild(expl);
    // Add ripple
    const rip=document.createElement('div');
    rip.className='sink-ripple';
    cell.appendChild(rip);
    // Animate existing ship marker
    const markers=cell.querySelectorAll('.ship-marker');
    markers.forEach(m=>m.classList.add('sink-anim'));
  });
  // Enhanced sink sound: play the base sink + a low boom
  playSound('sink');
  setTimeout(()=>{
    try{
      initAudio();
      if(!audioCtx)return;
      const o=audioCtx.createOscillator(),g=audioCtx.createGain(),t=audioCtx.currentTime;
      o.connect(g);g.connect(audioCtx.destination);
      o.type='sawtooth';o.frequency.setValueAtTime(80,t);o.frequency.exponentialRampToValueAtTime(15,t+.8);
      g.gain.setValueAtTime(.2,t);g.gain.exponentialRampToValueAtTime(.01,t+.8);
      o.start(t);o.stop(t+.8);
    }catch(e){}
  },200);
}

function playMuzzleFlash(ship){
  const cells=shipCells(ship);
  if(cells.length===0)return;
  const headCell=cells[0];
  if(!inBounds(headCell.r,headCell.c))return;
  const cell=getCell(headCell.r,headCell.c);
  cell.classList.add('muzzle-flash');
  const em=document.createElement('div');em.className='muzzle-flash-marker';em.textContent='🔥';
  cell.appendChild(em);
  setTimeout(()=>{cell.classList.remove('muzzle-flash');em.remove()},500);
}

function calcHitChance(attacker,targetR,targetC){
  const dist=Math.sqrt((targetR-attacker.r)**2+(targetC-attacker.c)**2);
  // Base accuracy 95% at dist 1, decreasing ~12% per extra hex
  // Minimum 25%
  const chance=Math.max(0.25,0.95-0.12*(dist-1));
  return chance;
}

function hasVisibleTarget(sh){
  const eff=getEffStats(sh);
  for(const[key] of detectedEnemies){
    const[r,c]=key.split(',').map(Number);
    if(Math.sqrt((r-sh.r)**2+(c-sh.c)**2)<=eff.fireRange)return true;
  }
  return false;
}

function addLog(msg){
  logs.push(msg);
  if(logs.length>4)logs.shift();
  document.getElementById('log').innerHTML=logs.map(l=>`<div>${l}</div>`).join('');
}

// ============================================================
// CELL CLICK
// ============================================================
function onCellHover(r,c){
  if(state!=='placement'||placementCells.length>0)return;
  const preview=calcPlacementPreview(r,c);
  placementHover=preview.cells;
  placementHoverValid=preview.valid;
  renderPlacementPreview();
}
function onCellHoverOut(){
  if(placementHover.length===0)return;
  placementHover.forEach(p=>{
    if(inBounds(p.r,p.c)){
      const cell=getCell(p.r,p.c);
      cell.classList.remove('placement-hover','placement-invalid');
      cell.querySelectorAll('.ship-preview').forEach(e=>e.remove());
    }
  });
  placementHover=[];
}
function renderPlacementPreview(){
  placementHover.forEach((p,i)=>{
    if(!inBounds(p.r,p.c))return;
    const cell=getCell(p.r,p.c);
    cell.classList.add(placementHoverValid?'placement-hover':'placement-invalid');
    if(placementHoverValid&&i===0){
      const d=SHIP_DEFS[placementIdx];
      const m=document.createElement('div');
      m.className='ship-preview';
      m.textContent=d.emoji+DIR_ARROWS[placementDir];
      m.style.color='#66ccff';
      cell.appendChild(m);
    }
  });
}

function onCellClick(r,c){
  if(state==='placement'){tryPlace(r,c);return}
  if(state!=='play'||aiProcessing)return;

  if(actionMode==='fire'&&selectedIdx>=0){doFire(r,c);return}
  if(actionMode==='torpedo'&&selectedIdx>=0){doTorpedo(r,c);return}

  // Select ship
  for(let i=0;i<playerShips.length;i++){
    const sh=playerShips[i];
    if(!sh.alive)continue;
    if(shipCells(sh).some(p=>p.r===r&&p.c===c)){
      selectedIdx=i;actionMode=null;
      playSound('click');
      updateUI();render();return;
    }
  }
}

// ============================================================
// ACTIONS
// ============================================================
function doAction(action){
  if(state!=='play'||aiProcessing)return;
  if(action==='endTurn'){endPlayerTurn();return}

  const sh=selectedIdx>=0?playerShips[selectedIdx]:null;
  if(!sh||!sh.alive)return;

  switch(action){
    case'turnL':case'turnR':{
      if(sh.done||sh.turned||sh.movesDone||sh.attacked)return;
      const delta=action==='turnL'?-1:1;
      const oldDir=sh.dir;
      sh.dir=((sh.dir+delta)%8+8)%8;
      const cells=shipCells(sh);
      const occ=allBlockedSet(playerShips,selectedIdx);
      if(cells.some(p=>!inBounds(p.r,p.c)||isIsl(p.r,p.c)||occ.has(ck(p.r,p.c)))){
        sh.dir=oldDir;addLog('回頭不可：障害物');return;
      }
      sh.turned=true;
      addLog(`${sh.name} ${action==='turnL'?'左':'右'}回頭→${DIRS[sh.dir]}`);
      playSound('click');
      break;
    }
    case'move':{
      const effM=getEffStats(sh);
      if(sh.done||sh.attacked||sh.movesDone>=effM.maxMove)return;
      const nr=sh.r+DY[sh.dir],nc=sh.c+DX[sh.dir];
      const newCells=[{r:nr,c:nc}];
      const bd=(sh.dir+4)%8;
      for(let i=1;i<sh.size;i++)newCells.push({r:nr+DY[bd]*i,c:nc+DX[bd]*i});
      const occ=allBlockedSet(playerShips,selectedIdx);
      if(newCells.some(p=>!inBounds(p.r,p.c)||isIsl(p.r,p.c)||occ.has(ck(p.r,p.c)))){
        addLog('前進不可');return;
      }
      sh.r=nr;sh.c=nc;
      sh.movesDone++;
      sh.turned=true; // can't turn after moving
      addLog(`${sh.name} 前進（${sh.movesDone}/${effM.maxMove}）`);
      playSound('click');
      break;
    }
    case'fire':{
      if(sh.done||sh.attacked)return;
      actionMode='fire';
      addLog('砲撃目標を選択…');
      playSound('click');
      break;
    }
    case'torpedo':{
      if(sh.done||sh.attacked||sh.torpedoCount<=0)return;
      actionMode='torpedo';
      addLog('魚雷発射方向をタップ…');
      playSound('click');
      break;
    }
    case'radar':{
      if(sh.done)return;
      showRadarDirPanel();
      return;
    }
    case'wait':{
      sh.done=true;
      addLog(`${sh.name} 待機`);
      playSound('click');
      break;
    }
  }
  updateUI();render();
}

function doFire(r,c){
  const sh=playerShips[selectedIdx];
  actionMode=null;

  // Find AI ship at this cell that's detected
  let target=null;
  for(const as of aiShips){
    if(!as.alive)continue;
    const cells=shipCells(as);
    if(cells.some(p=>p.r===r&&p.c===c)){
      if(cells.some(p=>detectedEnemies.has(ck(p.r,p.c)))){target=as;break}
    }
  }
  const effF=getEffStats(sh);
  if(!target){addLog('目標なし');updateUI();render();return}
  if(Math.sqrt((target.r-sh.r)**2+(target.c-sh.c)**2)>effF.fireRange){addLog('射程外');updateUI();render();return}

  // Accuracy check
  const hitChance=calcHitChance(sh,target.r,target.c);
  const isHit=Math.random()<hitChance;

  sh.attacked=true;sh.done=true;
  playSound('fire');
  playMuzzleFlash(sh);

  // Reveal firer to AI (firing reveals position!)
  shipCells(sh).forEach(p=>{aiDetected.set(ck(p.r,p.c),turn);aiGhosts.set(ck(p.r,p.c),turn)});

  if(isHit){
    target.hp-=effF.firepower;
    addLog(`${sh.name}→${target.name}に砲撃命中！${effF.firepower}ダメージ（命中率${Math.round(hitChance*100)}%）`);
    setTimeout(()=>{
      if(inBounds(r,c)){getCell(r,c).classList.add('dmg-flash');setTimeout(()=>getCell(r,c).classList.remove('dmg-flash'),400)}
      playSound('hit');
      if(target.hp<=0){
        addLog(`💥 ${target.name}撃沈！`);
        playSinkAnimation(target);
        setTimeout(()=>{target.alive=false;checkGameOver();updateUI();render()},1200);
      } else {
        checkGameOver();updateUI();render();
      }
    },150);
  } else {
    addLog(`${sh.name}→${target.name}に砲撃…外れ！（命中率${Math.round(hitChance*100)}%）`);
    setTimeout(()=>{
      // Show splash near target
      if(inBounds(r,c)){
        const cell=getCell(r,c);
        const splash=document.createElement('div');splash.className='muzzle-flash-marker';splash.textContent='💨';
        cell.appendChild(splash);setTimeout(()=>splash.remove(),500);
      }
      updateUI();render();
    },150);
  }
}

function doTorpedo(r,c){
  const sh=playerShips[selectedIdx];
  actionMode=null;
  if(sh.torpedoCount<=0){updateUI();render();return}

  const dr=r-sh.r,dc=c-sh.c;
  if(dr===0&&dc===0){updateUI();render();return}

  // Find closest 8-dir
  let ang=Math.atan2(dc,-dr)*180/Math.PI;
  if(ang<0)ang+=360;
  let bestD=0,bestDiff=999;
  for(let d=0;d<8;d++){let diff=Math.abs(ang-d*45);if(diff>180)diff=360-diff;if(diff<bestDiff){bestDiff=diff;bestD=d}}

  // Forward 180° check
  let rel=bestD-sh.dir;while(rel>4)rel-=8;while(rel<-4)rel+=8;
  if(Math.abs(rel)>2){addLog('後方には発射不可');updateUI();render();return}

  sh.torpedoCount--;
  sh.attacked=true;sh.done=true;
  const tr=sh.r+DY[bestD],tc=sh.c+DX[bestD];
  playerTorpedoes.push({r:tr,c:tc,dir:bestD,dist:1});
  addLog(`${sh.name} 魚雷発射→${DIRS[bestD]}（残${sh.torpedoCount}）`);
  playSound('torpedo');
  updateUI();render();
}

// ============================================================
// RADAR DIR PANEL
// ============================================================
function showRadarDirPanel(){document.getElementById('radar-dir-panel').style.display='block'}
function closeRadarPanel(){document.getElementById('radar-dir-panel').style.display='none'}
function setRadarDir(dir){
  if(selectedIdx<0)return;
  const sh=playerShips[selectedIdx];
  sh.radarDir=dir;
  sh.done=true;
  closeRadarPanel();
  // Re-scan
  doRadarScan();
  addLog(`${sh.name} レーダー→${DIRS[dir]}`);
  updateUI();render();
}

// ============================================================
// END TURN
// ============================================================
function endPlayerTurn(){
  if(aiProcessing)return;
  actionMode=null;

  // Advance player torpedoes
  advanceTorpedoes(playerTorpedoes,aiShips);

  if(checkGameOver())return;

  aiProcessing=true;
  updateUI();render();

  setTimeout(()=>{
    const aiActions=doAITurn();
    // Animate AI actions sequentially
    animateAIActions(aiActions,()=>{
      advanceTorpedoes(aiTorpedoes,playerShips);
      if(checkGameOver()){aiProcessing=false;return}

      // New turn
      turn++;
      playerShips.forEach(sh=>{if(sh.alive)resetShipTurn(sh)});
      aiShips.forEach(sh=>{if(sh.alive)resetShipTurn(sh)});

      doRadarScan();
      selectedIdx=-1;actionMode=null;
      aiProcessing=false;
      addLog(`── Turn ${turn} ──`);
      updateUI();render();
    });
  },500);
}

function animateAIActions(actions,callback){
  if(!actions||actions.length===0){callback();return}
  let i=0;
  function next(){
    if(i>=actions.length){callback();return}
    const act=actions[i];
    addLog(act.msg);
    if(act.type==='fire'&&act.targetCell){
      // Muzzle flash on firer
      if(act.firer)playMuzzleFlash(act.firer);
      playSound('fire');
      setTimeout(()=>{
        if(act.missed){
          // Show splash near target
          const cell=getCell(act.targetCell.r,act.targetCell.c);
          if(cell){
            const splash=document.createElement('div');splash.className='muzzle-flash-marker';splash.textContent='💨';
            cell.appendChild(splash);setTimeout(()=>splash.remove(),500);
          }
          render();i++;setTimeout(next,400);
        } else {
          // Flash the target cell for hit
          const cell=getCell(act.targetCell.r,act.targetCell.c);
          if(cell){cell.classList.add('dmg-flash');setTimeout(()=>cell.classList.remove('dmg-flash'),400)}
          playSound('hit');
          if(act.sunkShip){
            playSinkAnimation(act.sunkShip);
            setTimeout(()=>{act.sunkShip.alive=false;render();i++;setTimeout(next,300)},1200);
          } else {
            render();i++;setTimeout(next,300);
          }
        }
      },200);
    } else if(act.type==='torpedo'){
      playSound('torpedo');
      render();i++;setTimeout(next,400);
    } else if(act.type==='move'){
      render();i++;setTimeout(next,200);
    } else {
      render();i++;setTimeout(next,150);
    }
  }
  next();
}

function advanceTorpedoes(torps,targets){
  const rm=[];
  torps.forEach((t,i)=>{
    t.r+=DY[t.dir];t.c+=DX[t.dir];t.dist++;
    if(!inBounds(t.r,t.c)||isIsl(t.r,t.c)||t.dist>8){rm.push(i);return}
    const key=ck(t.r,t.c);
    for(const sh of targets){
      if(!sh.alive)continue;
      if(shipCells(sh).some(p=>ck(p.r,p.c)===key)){
        sh.hp-=3;
        addLog(`💥 魚雷命中！${sh.name}に3ダメージ`);
        playSound('hit');
        if(sh.hp<=0){
          addLog(`${sh.name}撃沈！`);
          playSinkAnimation(sh);
          setTimeout(()=>{sh.alive=false;render()},1200);
        }
        rm.push(i);
        if(inBounds(t.r,t.c)){
          const cell=getCell(t.r,t.c);
          cell.classList.add('dmg-flash');
          setTimeout(()=>cell.classList.remove('dmg-flash'),400);
        }
        return;
      }
    }
  });
  rm.sort((a,b)=>b-a).forEach(i=>torps.splice(i,1));
}

// ============================================================
// AI TURN
// ============================================================
function doAITurn(){
  const actions=[];

  aiShips.forEach((sh,idx)=>{
    if(!sh.alive)return;
    const isDest=sh.size===1;
    const isBB=sh.size===3;

    // Find nearest known player target
    let nearDist=999, nearR=-1, nearC=-1;
    const all=new Map([...aiDetected,...aiGhosts]);
    all.forEach((_,key)=>{
      const[r,c]=key.split(',').map(Number);
      const d=Math.sqrt((r-sh.r)**2+(c-sh.c)**2);
      if(d<nearDist){nearDist=d;nearR=r;nearC=c}
    });

    let fired=false;

    const aiEff=getEffStats(sh);

    // Try fire at detected targets
    for(const[key] of aiDetected){
      const[r,c]=key.split(',').map(Number);
      if(Math.sqrt((r-sh.r)**2+(c-sh.c)**2)>aiEff.fireRange)continue;
      for(const ps of playerShips){
        if(!ps.alive)continue;
        if(shipCells(ps).some(p=>p.r===r&&p.c===c)){
          // Reveal firer (firing reveals position!)
          shipCells(sh).forEach(p=>{detectedEnemies.set(ck(p.r,p.c),turn);ghostEnemies.set(ck(p.r,p.c),turn)});
          // Accuracy check
          const aiHitChance=calcHitChance(sh,ps.r,ps.c);
          const aiIsHit=Math.random()<aiHitChance;
          if(aiIsHit){
            ps.hp-=aiEff.firepower;
            const sunk=ps.hp<=0;
            actions.push({type:'fire',msg:`敵${sh.name}が${ps.name}に砲撃命中！${aiEff.firepower}ダメージ${sunk?' → 撃沈！':''}`,targetCell:{r,c},sunkShip:sunk?ps:null,firer:sh});
          } else {
            actions.push({type:'fire',msg:`敵${sh.name}が${ps.name}に砲撃…外れ！`,targetCell:{r,c},sunkShip:null,firer:sh,missed:true});
          }
          fired=true;break;
        }
      }
      if(fired)break;
    }

    // Torpedo: predictive fire at ghost positions too (not just detected)
    if(!fired&&sh.torpedoCount>0&&nearDist<=6&&nearR>=0){
      // Destroyers fire freely; cruisers fire if close
      const shouldTorpedo=isDest||(sh.torpedoCount>0&&nearDist<=4);
      if(shouldTorpedo){
        let ang=Math.atan2(nearC-sh.c,-(nearR-sh.r))*180/Math.PI;
        if(ang<0)ang+=360;
        let bd=Math.round(ang/45)%8;
        let rel=bd-sh.dir;while(rel>4)rel-=8;while(rel<-4)rel+=8;
        if(Math.abs(rel)<=2){
          sh.torpedoCount--;
          aiTorpedoes.push({r:sh.r+DY[bd],c:sh.c+DX[bd],dir:bd,dist:1});
          actions.push({type:'torpedo',msg:`敵${sh.name} 魚雷発射→${DIRS[bd]}！`});
          fired=true;
        }
      }
    }

    // Move if didn't fire (or always move destroyers forward)
    let moved=false;
    if(!fired||isDest){
      // Determine desired direction
      let targetDir=sh.dir;
      if(nearR>=0){
        let ang=Math.atan2(nearC-sh.c,-(nearR-sh.r))*180/Math.PI;
        if(ang<0)ang+=360;
        const directDir=Math.round(ang/45)%8;

        // Destroyers try to flank: offset approach angle by ±2 (90°)
        if(isDest&&nearDist>3&&nearDist<=8){
          const flankOffset=(idx%2===0)?2:-2;
          targetDir=((directDir+flankOffset)%8+8)%8;
        }
        // Battleship/cruiser: try to stay near islands for cover
        else if(isBB&&nearDist<=6){
          // Check if there's an island-adjacent cell roughly toward the target
          let bestCoverDir=directDir;
          let bestScore=-1;
          for(let dd=-2;dd<=2;dd++){
            const cd=((directDir+dd)%8+8)%8;
            const tr=sh.r+DY[cd],tc=sh.c+DX[cd];
            if(!inBounds(tr,tc)||isIsl(tr,tc))continue;
            // Score: adjacent islands provide cover
            let score=0;
            for(let nd=0;nd<8;nd++){
              const ar=tr+DY[nd],ac=tc+DX[nd];
              if(inBounds(ar,ac)&&isIsl(ar,ac))score+=2;
            }
            // Prefer directions closer to target
            if(dd===0)score+=1;
            if(score>bestScore){bestScore=score;bestCoverDir=cd}
          }
          targetDir=bestCoverDir;
        } else {
          targetDir=directDir;
        }

        // Turn toward target direction
        if(sh.dir!==targetDir){
          let diff=targetDir-sh.dir;while(diff>4)diff-=8;while(diff<-4)diff+=8;
          const step=Math.sign(diff)*Math.min(Math.abs(diff),aiEff.maxTurnSteps);
          const nd=((sh.dir+step)%8+8)%8;
          const old=sh.dir;sh.dir=nd;
          const cells=shipCells(sh);
          const occ=allBlockedSet(aiShips,idx);
          if(cells.some(p=>!inBounds(p.r,p.c)||isIsl(p.r,p.c)||occ.has(ck(p.r,p.c))))sh.dir=old;
        }
      } else if(Math.random()<.3){
        const d=Math.random()<.5?1:-1;
        const nd=((sh.dir+d)%8+8)%8;
        const old=sh.dir;sh.dir=nd;
        const cells=shipCells(sh);
        const occ=allBlockedSet(aiShips,idx);
        if(cells.some(p=>!inBounds(p.r,p.c)||isIsl(p.r,p.c)||occ.has(ck(p.r,p.c))))sh.dir=old;
      }

      // Advance (BB keeps distance, cruiser moderate)
      const wantDist=isBB?4:sh.size===2?2:0;
      if(nearDist>wantDist||nearR<0||(isDest&&nearDist>2)){
        const moveSteps=Math.min(isDest?2:1,aiEff.maxMove);
        for(let ms=0;ms<moveSteps;ms++){
          const nr=sh.r+DY[sh.dir],nc=sh.c+DX[sh.dir];
          const nc2=[{r:nr,c:nc}];
          const bd=(sh.dir+4)%8;
          for(let i=1;i<sh.size;i++)nc2.push({r:nr+DY[bd]*i,c:nc+DX[bd]*i});
          const occ=allBlockedSet(aiShips,idx);
          if(!nc2.some(p=>!inBounds(p.r,p.c)||isIsl(p.r,p.c)||occ.has(ck(p.r,p.c)))){
            sh.r=nr;sh.c=nc;moved=true;
          } else break;
        }
      }
    }

    // Point radar toward known targets sometimes
    if(nearR>=0&&Math.random()<.6){
      let ang=Math.atan2(nearC-sh.c,-(nearR-sh.r))*180/Math.PI;
      if(ang<0)ang+=360;
      sh.radarDir=Math.round(ang/45)%8;
    }

    // Only log movement for detected enemies (so player sees something)
    if(moved&&detectedEnemies.size>0){
      const isVisible=shipCells(sh).some(p=>detectedEnemies.has(ck(p.r,p.c)));
      if(isVisible) actions.push({type:'move',msg:`敵${sh.name} 移動`});
    }
  });

  return actions;
}

// ============================================================
// GAME OVER
// ============================================================
function checkGameOver(){
  const pAlive=playerShips.some(s=>s.alive);
  const aAlive=aiShips.some(s=>s.alive);
  if(pAlive&&aAlive)return false;

  state='gameover';
  const ov=document.getElementById('game-over-overlay');
  ov.style.display='flex';
  const txt=document.getElementById('game-over-text');
  const det=document.getElementById('game-over-detail');
  if(!aAlive&&pAlive){txt.textContent='勝 利';txt.className='win';det.textContent='敵艦隊を殲滅した。'}
  else if(!pAlive&&aAlive){txt.textContent='敗 北';txt.className='lose';det.textContent='我が艦隊は壊滅した…'}
  else{txt.textContent='相 討 ち';txt.className='lose';det.textContent='両艦隊壊滅。'}
  return true;
}

// ============================================================
// RESIZE
// ============================================================
window.addEventListener('resize',()=>{if(state!=='title')buildBoard(); render()});
</script>
