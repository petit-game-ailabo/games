<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>品質管理 - 今日のミニゲーム</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(180deg, #2c5f7c 0%, #1a3a4d 100%);
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <script>
        const config = {
            type: Phaser.AUTO,
            width: 400,
            height: 700,
            parent: 'game-container',
            backgroundColor: '#4a7c9e',
            scale: {
                mode: Phaser.Scale.FIT,
                autoCenter: Phaser.Scale.CENTER_BOTH
            },
            scene: { create: create, update: update }
        };
        const game = new Phaser.Game(config);
        
        // ゲーム変数
        let gameStarted = false;
        let gameOver = false;
        let score = 0;
        let coins = 0;
        let timeLeft = 60;
        let products = [];
        let beltLines = [];
        let beltSpeed = 3;
        let spawnDelay = 1000;
        let spawnTimer;
        let countdownTimer;
        let currentPattern;
        
        // UI要素
        let startBg, startText, scoreText, coinsText, timeText, resultText;
        let speedBtn, speedText, speedCost, speedLevelText;
        let spawnBtn, spawnText, spawnCost, spawnLevelText;
        let autoBtn, autoText, autoCost, autoLevelText;
        
        // アップグレード
        let speedLevel = 0;
        let spawnLevel = 0;
        let autoLevel = 0;
        
        // 効果音
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(freq, type = 'sine', duration = 0.1) {
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.connect(gain);
            gain.connect(audioContext.destination);
            osc.frequency.value = freq;
            osc.type = type;
            gain.gain.setValueAtTime(0.3, audioContext.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
            osc.start();
            osc.stop(audioContext.currentTime + duration);
        }
        
        // 良品パターン
        const patterns = [
            { color: 0x4169e1, shape: 'circle' }
        ];
        
        // 不良品パターン
        const defectPatterns = [
            { color: 0xff0000, shape: 'circle' },
            { color: 0x00ff00, shape: 'circle' },
            { color: 0xffff00, shape: 'circle' },
            { color: 0x4169e1, shape: 'square' },
            { color: 0x4169e1, shape: 'triangle' }
        ];
        
        function create() {
            currentPattern = patterns[0];
            
            // ベルトコンベア
            this.add.rectangle(200, 400, 400, 150, 0x3a3a3a);
            for (let i = 0; i < 5; i++) {
                const line = this.add.rectangle(i * 100 + 50, 390, 80, 8, 0xffcc00);
                beltLines.push(line);
                const line2 = this.add.rectangle(i * 100 + 50, 410, 80, 8, 0xffcc00);
                beltLines.push(line2);
            }
            
            // スコア表示（上部）
            scoreText = this.add.text(20, 20, 'スコア: 0', {
                fontSize: '24px',
                fill: '#ffffff',
                fontStyle: 'bold',
                stroke: '#000',
                strokeThickness: 2
            });
            
            timeText = this.add.text(20, 55, '60秒', {
                fontSize: '24px',
                fill: '#ffffff',
                fontStyle: 'bold',
                stroke: '#000',
                strokeThickness: 2
            });
            
            // 良品パターン表示
            const exampleBg = this.add.rectangle(200, 180, 250, 100, 0xffffff, 0.2);
            exampleBg.setStrokeStyle(3, 0xffffff);
            
            const patternText = this.add.text(200, 155, '✅ 良品（スルー）', {
                fontSize: '22px',
                fill: '#ffffff',
                fontStyle: 'bold',
                stroke: '#000',
                strokeThickness: 2
            }).setOrigin(0.5);
            
            const goodExample = this.add.circle(200, 195, 25, currentPattern.color);
            goodExample.setStrokeStyle(3, 0xffffff);
            
            // 説明
            const instructionBg = this.add.rectangle(200, 280, 350, 60, 0xff6b35, 0.9);
            instructionBg.setStrokeStyle(3, 0xffffff);
            
            const instruction = this.add.text(200, 280, '❌ 不良品だけタップ！', {
                fontSize: '22px',
                fill: '#ffffff',
                fontStyle: 'bold',
                align: 'center'
            }).setOrigin(0.5);
            
            // コイン表示（下部中央）
            coinsText = this.add.text(200, 530, 'コイン: 0', {
                fontSize: '28px',
                fill: '#FFD700',
                fontStyle: 'bold',
                stroke: '#000',
                strokeThickness: 3
            }).setOrigin(0.5);
            
            // アップグレードボタン（画面下部）
            const btnY = 610;
            const btnW = 120;
            const btnH = 70;
            
            // スピードアップ
            speedBtn = this.add.rectangle(65, btnY, btnW, btnH, 0x2a5298);
            speedBtn.setStrokeStyle(3, 0xffffff);
            speedBtn.setInteractive();
            speedBtn.on('pointerdown', () => buyUpgrade(this, 'speed'));
            
            speedText = this.add.text(65, btnY - 15, '⚡', {
                fontSize: '32px'
            }).setOrigin(0.5);
            
            speedCost = this.add.text(65, btnY + 15, '50c', {
                fontSize: '18px',
                fill: '#FFD700',
                fontStyle: 'bold'
            }).setOrigin(0.5);
            
            speedLevelText = this.add.text(65, btnY - 30, 'Lv0 (速度3)', {
                fontSize: '12px',
                fill: '#ffffff',
                fontStyle: 'bold',
                stroke: '#000',
                strokeThickness: 1
            }).setOrigin(0.5);
            
            // 生産速度アップ
            spawnBtn = this.add.rectangle(200, btnY, btnW, btnH, 0x2a5298);
            spawnBtn.setStrokeStyle(3, 0xffffff);
            spawnBtn.setInteractive();
            spawnBtn.on('pointerdown', () => buyUpgrade(this, 'spawn'));
            
            spawnText = this.add.text(200, btnY - 15, '⏩', {
                fontSize: '32px'
            }).setOrigin(0.5);
            
            spawnCost = this.add.text(200, btnY + 15, '30c', {
                fontSize: '18px',
                fill: '#FFD700',
                fontStyle: 'bold'
            }).setOrigin(0.5);
            
            spawnLevelText = this.add.text(200, btnY - 30, 'Lv0 (1.0s)', {
                fontSize: '12px',
                fill: '#ffffff',
                fontStyle: 'bold',
                stroke: '#000',
                strokeThickness: 1
            }).setOrigin(0.5);
            
            // 自動化ロボット
            autoBtn = this.add.rectangle(335, btnY, btnW, btnH, 0x2a5298);
            autoBtn.setStrokeStyle(3, 0xffffff);
            autoBtn.setInteractive();
            autoBtn.on('pointerdown', () => buyUpgrade(this, 'auto'));
            
            autoText = this.add.text(335, btnY - 15, '🤖', {
                fontSize: '32px'
            }).setOrigin(0.5);
            
            autoCost = this.add.text(335, btnY + 15, '100c', {
                fontSize: '18px',
                fill: '#FFD700',
                fontStyle: 'bold'
            }).setOrigin(0.5);
            
            autoLevelText = this.add.text(335, btnY - 30, 'Lv0 (0%)', {
                fontSize: '12px',
                fill: '#00ff00',
                fontStyle: 'bold',
                stroke: '#000',
                strokeThickness: 1
            }).setOrigin(0.5);
            
            // ボタンを非表示
            speedBtn.setVisible(false);
            speedText.setVisible(false);
            speedCost.setVisible(false);
            speedLevelText.setVisible(false);
            spawnBtn.setVisible(false);
            spawnText.setVisible(false);
            spawnCost.setVisible(false);
            spawnLevelText.setVisible(false);
            autoBtn.setVisible(false);
            autoText.setVisible(false);
            autoCost.setVisible(false);
            autoLevelText.setVisible(false);
            
            // スタート画面（最後に描画）
            startBg = this.add.rectangle(200, 350, 400, 700, 0x4a7c9e);
            
            startText = this.add.text(200, 400, '🏭 品質管理ゲーム 🏭\n\n不良品を排除してコイン獲得\nコインでアップグレード購入\n\nタップしてスタート', {
                fontSize: '26px',
                fill: '#ffffff',
                fontStyle: 'bold',
                align: 'center',
                lineSpacing: 10,
                stroke: '#000',
                strokeThickness: 3
            }).setOrigin(0.5);
            
            // タップでスタート
            this.input.on('pointerdown', (pointer) => {
                if (!gameStarted && !gameOver) {
                    startGame(this);
                } else if (!gameOver) {
                    handleTap(this, pointer);
                }
                // gameOver時のリスタートはボタンから行う
            });
            
            // Powered by Phaser
            this.add.text(200, 680, 'Powered by Phaser', {
                fontSize: '14px',
                fill: '#ffffff',
                alpha: 0.5
            }).setOrigin(0.5);
        }
        
        function startGame(scene) {
            gameStarted = true;
            startText.setVisible(false);
            startBg.setVisible(false);
            
            speedBtn.setVisible(true);
            speedText.setVisible(true);
            speedCost.setVisible(true);
            speedLevelText.setVisible(true);
            spawnBtn.setVisible(true);
            spawnText.setVisible(true);
            spawnCost.setVisible(true);
            spawnLevelText.setVisible(true);
            autoBtn.setVisible(true);
            autoText.setVisible(true);
            autoCost.setVisible(true);
            autoLevelText.setVisible(true);
            
            // 残りの製品とエフェクトをクリア
            for (const product of products) {
                product.destroy();
            }
            scene.tweens.killAll();
            
            score = 0;
            coins = 0;
            timeLeft = 60;
            products = [];
            beltSpeed = 3;
            spawnDelay = 1000;
            speedLevel = 0;
            spawnLevel = 0;
            autoLevel = 0;
            
            // レベル表示リセット
            speedLevelText.setText('Lv0 (速度3)');
            spawnLevelText.setText('Lv0 (1.0s)');
            autoLevelText.setText('Lv0 (0%)');
            
            updateUI();
            updateButtonStates();
            
            // 製品生成
            spawnTimer = scene.time.addEvent({
                delay: spawnDelay,
                callback: () => spawnProduct(scene),
                loop: true
            });
            
            // カウントダウン
            countdownTimer = scene.time.addEvent({
                delay: 1000,
                callback: () => {
                    timeLeft--;
                    updateUI();
                    if (timeLeft <= 0) {
                        endGame(scene);
                    }
                },
                loop: true
            });
        }
        
        function spawnProduct(scene) {
            // 画面上の製品数を制限（パフォーマンス対策）
            if (products.length >= 15) return;
            
            const isDefect = Math.random() < 0.4;
            let color, shape;
            
            if (isDefect) {
                const pattern = Phaser.Utils.Array.GetRandom(defectPatterns);
                color = pattern.color;
                shape = pattern.shape;
            } else {
                color = currentPattern.color;
                shape = currentPattern.shape;
            }
            
            let product;
            if (shape === 'circle') {
                product = scene.add.circle(450, 400, 25, color);
                product.setStrokeStyle(2, 0xffffff);
            } else if (shape === 'square') {
                product = scene.add.rectangle(450, 400, 50, 50, color);
                product.setStrokeStyle(2, 0xffffff);
            } else {
                product = scene.add.triangle(450, 400, 0, 25, -25, -25, 25, -25, color);
                product.setStrokeStyle(2, 0xffffff);
            }
            
            product.isDefect = isDefect;
            product.tapped = false;
            product.checked = false; // ロボットがチェック済みか
            product.markedForDeletion = false; // 削除予定か
            product.deletionTimer = 0;
            
            products.push(product);
        }
        
        function handleTap(scene, pointer) {
            // アップグレードボタンのクリックを無視
            if (pointer.y > 570) return;
            
            for (let i = products.length - 1; i >= 0; i--) {
                const product = products[i];
                if (product.markedForDeletion) continue; // 削除予定の製品は無視
                
                const distance = Phaser.Math.Distance.Between(pointer.x, pointer.y, product.x, product.y);
                
                if (distance < 40) {
                    product.tapped = true;
                    
                    if (product.isDefect) {
                        // 不良品を正しくタップ
                        score += 5;
                        coins += 5;
                        playSound(800);
                        
                        const mark = scene.add.text(product.x, product.y, '○', {
                            fontSize: '64px',
                            fill: '#00ff00',
                            fontStyle: 'bold',
                            stroke: '#000',
                            strokeThickness: 4
                        }).setOrigin(0.5);
                        
                        scene.tweens.add({
                            targets: mark,
                            alpha: 0,
                            duration: 300,
                            onComplete: () => mark.destroy()
                        });
                    } else {
                        // 良品をタップ（ミス）
                        score = Math.max(0, score - 5);
                        coins = Math.max(0, coins - 5);
                        playSound(200);
                        
                        const mark = scene.add.text(product.x, product.y, '×', {
                            fontSize: '64px',
                            fill: '#ff0000',
                            fontStyle: 'bold',
                            stroke: '#000',
                            strokeThickness: 4
                        }).setOrigin(0.5);
                        
                        scene.tweens.add({
                            targets: mark,
                            alpha: 0,
                            duration: 300,
                            onComplete: () => mark.destroy()
                        });
                    }
                    
                    product.destroy();
                    products.splice(i, 1);
                    updateUI();
                    updateButtonStates();
                    break;
                }
            }
        }
        
        function update() {
            if (!gameStarted || gameOver) return;
            
            // デバッグ情報（1秒に1回）
            if (Math.random() < 0.016) {  // 60fpsで約1秒に1回
                console.log(`製品数: ${products.length}, 削除予定: ${products.filter(p => p.markedForDeletion).length}`);
            }
            
            // ベルト移動
            for (const line of beltLines) {
                line.x -= beltSpeed;
                if (line.x < -50) {
                    line.x += 500;
                }
            }
            
            // 製品移動
            let needsUpdate = false;
            
            for (let i = products.length - 1; i >= 0; i--) {
                const product = products[i];
                product.x -= beltSpeed;
                
                // ロボットの自動排除（x < 350でチェック、1回だけ）
                if (!product.checked && product.isDefect && autoLevel > 0 && product.x < 350) {
                    product.checked = true;
                    const autoChance = Math.min(autoLevel * 0.4, 0.95);
                    
                    if (Math.random() < autoChance) {
                        // 緑色にして削除対象としてマーク
                        product.setTint(0x00ff00);
                        product.markedForDeletion = true;
                        product.deletionTimer = 30; // 0.5秒（60fps想定）
                        score += 5;
                        coins += 5;
                        playSound(1000, 'square', 0.1);
                        needsUpdate = true;
                    }
                }
                
                // 削除対象の製品をカウントダウン
                if (product.markedForDeletion) {
                    product.deletionTimer--;
                    if (product.deletionTimer <= 0) {
                        product.destroy();
                        products.splice(i, 1);
                        continue;
                    }
                }
                
                if (product.x < -50) {
                    if (product.isDefect && !product.tapped) {
                        // 不良品を見逃した（ペナルティ）
                        score = Math.max(0, score - 5);
                        coins = Math.max(0, coins - 5);
                        playSound(200);
                    } else if (!product.isDefect && !product.tapped) {
                        // 良品を正しくスルー
                        score += 10;
                        coins += 10;
                    }
                    product.destroy();
                    products.splice(i, 1);
                    needsUpdate = true;
                }
            }
            
            // 1フレームに1回だけ更新
            if (needsUpdate) {
                updateUI();
                updateButtonStates();
            }
        }
        
        function updateUI() {
            coinsText.setText(`コイン: ${coins}`);
            scoreText.setText(`スコア: ${score}`);
            timeText.setText(`${timeLeft}秒`);
        }
        
        function updateButtonStates() {
            // スピードアップボタン
            if (coins >= 50) {
                speedBtn.setFillStyle(0x2a5298);
                speedBtn.setAlpha(1);
                speedText.setAlpha(1);
                speedCost.setAlpha(1);
            } else {
                speedBtn.setFillStyle(0x1a3a4d);
                speedBtn.setAlpha(0.5);
                speedText.setAlpha(0.5);
                speedCost.setAlpha(0.5);
            }
            
            // 生産速度アップボタン
            if (coins >= 30) {
                spawnBtn.setFillStyle(0x2a5298);
                spawnBtn.setAlpha(1);
                spawnText.setAlpha(1);
                spawnCost.setAlpha(1);
            } else {
                spawnBtn.setFillStyle(0x1a3a4d);
                spawnBtn.setAlpha(0.5);
                spawnText.setAlpha(0.5);
                spawnCost.setAlpha(0.5);
            }
            
            // 自動化ロボットボタン
            if (coins >= 100) {
                autoBtn.setFillStyle(0x2a5298);
                autoBtn.setAlpha(1);
                autoText.setAlpha(1);
                autoCost.setAlpha(1);
            } else {
                autoBtn.setFillStyle(0x1a3a4d);
                autoBtn.setAlpha(0.5);
                autoText.setAlpha(0.5);
                autoCost.setAlpha(0.5);
            }
        }
        
        function buyUpgrade(scene, type) {
            if (!gameStarted || gameOver) return;
            
            let cost, success = false;
            
            if (type === 'speed') {
                cost = 50;
                if (coins >= cost) {
                    coins -= cost;
                    speedLevel++;
                    beltSpeed += 2;
                    speedLevelText.setText(`Lv${speedLevel} (速度${beltSpeed})`);
                    success = true;
                }
            } else if (type === 'spawn') {
                cost = 30;
                if (coins >= cost && spawnDelay > 100) {
                    coins -= cost;
                    spawnLevel++;
                    spawnDelay -= 100;
                    spawnTimer.delay = spawnDelay;
                    spawnLevelText.setText(`Lv${spawnLevel} (${(spawnDelay / 1000).toFixed(1)}s)`);
                    success = true;
                }
            } else if (type === 'auto') {
                cost = 100;
                if (coins >= cost && autoLevel < 5) {
                    coins -= cost;
                    autoLevel++;
                    success = true;
                    
                    // ロボット購入エフェクト
                    const robotBig = scene.add.text(200, 400, '🤖', {
                        fontSize: '128px'
                    }).setOrigin(0.5);
                    
                    const levelText = scene.add.text(200, 500, `レベル ${autoLevel}!\n自動排除率 ${autoLevel * 40}%`, {
                        fontSize: '32px',
                        fill: '#00ff00',
                        fontStyle: 'bold',
                        stroke: '#000',
                        strokeThickness: 3,
                        align: 'center'
                    }).setOrigin(0.5);
                    
                    scene.tweens.add({
                        targets: [robotBig, levelText],
                        alpha: 0,
                        scale: 1.5,
                        duration: 1000,
                        onComplete: () => {
                            robotBig.destroy();
                            levelText.destroy();
                        }
                    });
                    
                    // ボタン上のレベル表示更新
                    autoLevelText.setText(`Lv${autoLevel} (${autoLevel * 40}%)`);
                }
            }
            
            if (success) {
                playSound(1200, 'square', 0.2);
                updateUI();
                updateButtonStates();
            } else {
                playSound(150, 'sawtooth', 0.3);
            }
        }
        
        function endGame(scene) {
            gameOver = true;
            spawnTimer.remove();
            countdownTimer.remove();
            
            // すべてのtweenを停止（パフォーマンス対策）
            scene.tweens.killAll();
            
            speedBtn.setVisible(false);
            speedText.setVisible(false);
            speedCost.setVisible(false);
            speedLevelText.setVisible(false);
            spawnBtn.setVisible(false);
            spawnText.setVisible(false);
            spawnCost.setVisible(false);
            spawnLevelText.setVisible(false);
            autoBtn.setVisible(false);
            autoText.setVisible(false);
            autoCost.setVisible(false);
            autoLevelText.setVisible(false);
            
            // 全ての製品を削除
            for (const product of products) {
                product.destroy();
            }
            products = [];
            
            // 画面上の全てのテキスト（○×マーク）を削除
            const allObjects = scene.children.list.slice(); // コピーを作成
            for (const obj of allObjects) {
                if (obj.type === 'Text' && (obj.text === '○' || obj.text === '×')) {
                    obj.destroy();
                }
            }
            
            const finalBg = scene.add.rectangle(200, 350, 380, 350, 0x000000, 0.8);
            resultText = scene.add.text(200, 260, `ゲームオーバー！\n\nスコア: ${score}\nコイン: ${coins}`, {
                fontSize: '32px',
                fill: '#ffffff',
                fontStyle: 'bold',
                align: 'center',
                lineSpacing: 10
            }).setOrigin(0.5);
            
            // 再プレイボタン
            const restartBtn = scene.add.rectangle(200, 420, 200, 60, 0x00aa00);
            restartBtn.setStrokeStyle(3, 0xffffff);
            restartBtn.setInteractive();
            restartBtn.on('pointerdown', () => resetGame(scene));
            
            const restartText = scene.add.text(200, 420, '再プレイ', {
                fontSize: '28px',
                fill: '#ffffff',
                fontStyle: 'bold'
            }).setOrigin(0.5);
        }
        
        function resetGame(scene) {
            // すべてのtweenを停止
            scene.tweens.killAll();
            
            if (resultText) {
                resultText.destroy();
                resultText = null;
            }
            
            // 前回のfinalBg、再プレイボタンも削除
            const objects = scene.children.list;
            for (let i = objects.length - 1; i >= 0; i--) {
                const obj = objects[i];
                if (obj.type === 'Rectangle' && obj.fillColor === 0x000000 && obj.fillAlpha === 0.8) {
                    obj.destroy();
                } else if (obj.type === 'Rectangle' && obj.fillColor === 0x00aa00) {
                    obj.destroy();
                } else if (obj.type === 'Text' && obj.text === '再プレイ') {
                    obj.destroy();
                }
            }
            
            gameOver = false;
            gameStarted = false;
            startText.setVisible(true);
            startBg.setVisible(true);
        }
    </script>
</body>
</html>
