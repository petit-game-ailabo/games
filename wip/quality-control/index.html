<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>品質管理 - 今日のミニゲーム</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(180deg, #2c5f7c 0%, #1a3a4d 100%);
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <script>
        const config = {
            type: Phaser.AUTO,
            width: 400,
            height: 700,
            parent: 'game-container',
            backgroundColor: '#4a7c9e',
            scale: {
                mode: Phaser.Scale.FIT,
                autoCenter: Phaser.Scale.CENTER_BOTH
            },
            scene: { create: create, update: update }
        };
        const game = new Phaser.Game(config);
        
        // ゲーム変数
        let gameStarted = false;
        let gameOver = false;
        let score = 0;
        let coins = 0;
        let lives = 3;
        let timeLeft = 60;
        let products = [];
        let beltLines = [];
        let beltSpeed = 3;
        let spawnTimer;
        let countdownTimer;
        let currentPattern;
        
        // UI要素
        let startBg, startText, patternText, scoreText, coinsText, livesText, timeText, resultText, shopBtn;
        
        // アップグレード
        let autoRejectLevel = 0; // 自動排除レベル
        let speedBoostLevel = 0; // スピードブーストレベル
        let shopOpen = false;
        let shopBg, shopTitle, shopClose, upgradeButtons = [];
        
        // 効果音
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(freq, type = 'sine', duration = 0.1) {
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.connect(gain);
            gain.connect(audioContext.destination);
            osc.frequency.value = freq;
            osc.type = type;
            gain.gain.setValueAtTime(0.3, audioContext.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
            osc.start();
            osc.stop(audioContext.currentTime + duration);
        }
        
        // 良品パターン
        const patterns = [
            { color: 0x4169e1, shape: 'circle' }
        ];
        
        // 不良品パターン
        const defectPatterns = [
            { color: 0xff0000, shape: 'circle' },
            { color: 0x00ff00, shape: 'circle' },
            { color: 0xffff00, shape: 'circle' },
            { color: 0x4169e1, shape: 'square' },
            { color: 0x4169e1, shape: 'triangle' }
        ];
        
        function create() {
            currentPattern = patterns[0];
            
            // ベルトコンベア
            this.add.rectangle(200, 500, 400, 150, 0x3a3a3a);
            for (let i = 0; i < 5; i++) {
                const line = this.add.rectangle(i * 100 + 50, 490, 80, 8, 0xffcc00);
                beltLines.push(line);
                const line2 = this.add.rectangle(i * 100 + 50, 510, 80, 8, 0xffcc00);
                beltLines.push(line2);
            }
            
            // スコア表示
            coinsText = this.add.text(20, 20, 'コイン: 0', {
                fontSize: '32px',
                fill: '#FFD700',
                fontStyle: 'bold',
                stroke: '#000',
                strokeThickness: 4
            });
            
            scoreText = this.add.text(20, 60, 'スコア: 0', {
                fontSize: '28px',
                fill: '#ffffff',
                fontStyle: 'bold',
                stroke: '#000',
                strokeThickness: 3
            });
            
            livesText = this.add.text(20, 100, 'ライフ: ❤️❤️❤️', {
                fontSize: '28px',
                fill: '#ff0000',
                fontStyle: 'bold',
                stroke: '#000',
                strokeThickness: 3
            });
            
            timeText = this.add.text(20, 140, '60秒', {
                fontSize: '28px',
                fill: '#ffffff',
                fontStyle: 'bold',
                stroke: '#000',
                strokeThickness: 3
            });
            
            // ショップボタン
            shopBtn = this.add.rectangle(350, 40, 80, 50, 0x00aa00);
            shopBtn.setStrokeStyle(3, 0xffffff);
            shopBtn.setInteractive();
            shopBtn.on('pointerdown', () => openShop(this));
            const shopText = this.add.text(350, 40, '🏪', {
                fontSize: '32px'
            }).setOrigin(0.5);
            shopBtn.setVisible(false);
            shopText.setVisible(false);
            shopBtn.shopText = shopText;
            
            // 良品パターン表示
            const exampleBg = this.add.rectangle(200, 230, 250, 100, 0xffffff, 0.2);
            exampleBg.setStrokeStyle(3, 0xffffff);
            
            patternText = this.add.text(200, 200, '✅ 良品（スルー）', {
                fontSize: '24px',
                fill: '#ffffff',
                fontStyle: 'bold',
                stroke: '#000',
                strokeThickness: 2
            }).setOrigin(0.5);
            
            const goodExample = this.add.circle(200, 250, 30, currentPattern.color);
            goodExample.setStrokeStyle(3, 0xffffff);
            
            // 説明
            const instructionBg = this.add.rectangle(200, 350, 350, 70, 0xff6b35, 0.9);
            instructionBg.setStrokeStyle(3, 0xffffff);
            
            const instruction = this.add.text(200, 350, '❌ 不良品だけタップして排除！', {
                fontSize: '24px',
                fill: '#ffffff',
                fontStyle: 'bold',
                align: 'center'
            }).setOrigin(0.5);
            
            // スタート画面の背景
            startBg = this.add.rectangle(200, 350, 400, 700, 0x4a7c9e);
            startBg.setDepth(-1);
            
            // スタート画面
            startText = this.add.text(200, 480, '🏭 品質管理ゲーム 🏭\n\n不良品を見つけて排除！\nコインでアップグレード購入\n\nタップしてスタート', {
                fontSize: '28px',
                fill: '#ffffff',
                fontStyle: 'bold',
                align: 'center',
                lineSpacing: 12,
                stroke: '#000',
                strokeThickness: 3
            }).setOrigin(0.5);
            
            // タップでスタート
            this.input.on('pointerdown', (pointer) => {
                if (!gameStarted && !gameOver) {
                    startGame(this);
                } else if (gameOver) {
                    resetGame(this);
                } else if (!shopOpen) {
                    handleTap(this, pointer);
                }
            });
            
            // Powered by Phaser
            this.add.text(200, 680, 'Powered by Phaser', {
                fontSize: '14px',
                fill: '#ffffff',
                alpha: 0.5
            }).setOrigin(0.5);
        }
        
        function startGame(scene) {
            gameStarted = true;
            startText.setVisible(false);
            startBg.setVisible(false);
            shopBtn.setVisible(true);
            shopBtn.shopText.setVisible(true);
            score = 0;
            lives = 3;
            timeLeft = 60;
            products = [];
            updateUI();
            
            // 製品生成
            spawnTimer = scene.time.addEvent({
                delay: 1000,
                callback: () => spawnProduct(scene),
                loop: true
            });
            
            // カウントダウン
            countdownTimer = scene.time.addEvent({
                delay: 1000,
                callback: () => {
                    timeLeft--;
                    updateUI();
                    if (timeLeft <= 0) {
                        endGame(scene);
                    }
                    // 難易度上昇
                    if (timeLeft % 10 === 0) {
                        beltSpeed += 0.5;
                    }
                },
                loop: true
            });
        }
        
        function spawnProduct(scene) {
            const isDefect = Math.random() < 0.4;
            let color, shape;
            
            if (isDefect) {
                const pattern = Phaser.Utils.Array.GetRandom(defectPatterns);
                color = pattern.color;
                shape = pattern.shape;
            } else {
                color = currentPattern.color;
                shape = currentPattern.shape;
            }
            
            let product;
            if (shape === 'circle') {
                product = scene.add.circle(450, 500, 25, color);
                product.setStrokeStyle(2, 0xffffff);
            } else if (shape === 'square') {
                product = scene.add.rectangle(450, 500, 50, 50, color);
                product.setStrokeStyle(2, 0xffffff);
            } else {
                product = scene.add.triangle(450, 500, 0, 25, -25, -25, 25, -25, color);
                product.setStrokeStyle(2, 0xffffff);
            }
            
            product.isDefect = isDefect;
            product.tapped = false;
            product.autoRejected = false;
            
            // 自動排除機の効果
            if (isDefect && autoRejectLevel > 0) {
                const autoChance = autoRejectLevel * 0.2; // 20%/レベル
                if (Math.random() < autoChance) {
                    product.autoRejected = true;
                    const robotText = scene.add.text(product.x, product.y, '🤖', {
                        fontSize: '32px'
                    }).setOrigin(0.5);
                    scene.tweens.add({
                        targets: robotText,
                        y: product.y - 50,
                        alpha: 0,
                        duration: 500,
                        onComplete: () => robotText.destroy()
                    });
                }
            }
            
            products.push(product);
        }
        
        function handleTap(scene, pointer) {
            for (let i = products.length - 1; i >= 0; i--) {
                const product = products[i];
                if (product.autoRejected) continue;
                
                const distance = Phaser.Math.Distance.Between(pointer.x, pointer.y, product.x, product.y);
                
                if (distance < 40) {
                    product.tapped = true;
                    
                    if (product.isDefect) {
                        // 不良品を正しくタップ
                        score += 10;
                        coins += 10;
                        playSound(800);
                        
                        const mark = scene.add.text(product.x, product.y, '○', {
                            fontSize: '64px',
                            fill: '#00ff00',
                            fontStyle: 'bold',
                            stroke: '#000',
                            strokeThickness: 4
                        }).setOrigin(0.5);
                        
                        scene.tweens.add({
                            targets: mark,
                            alpha: 0,
                            duration: 300,
                            onComplete: () => mark.destroy()
                        });
                    } else {
                        // 良品をタップ（ミス）
                        lives--;
                        playSound(200);
                        
                        const mark = scene.add.text(product.x, product.y, '×', {
                            fontSize: '64px',
                            fill: '#ff0000',
                            fontStyle: 'bold',
                            stroke: '#000',
                            strokeThickness: 4
                        }).setOrigin(0.5);
                        
                        scene.tweens.add({
                            targets: mark,
                            alpha: 0,
                            duration: 300,
                            onComplete: () => mark.destroy()
                        });
                        
                        if (lives <= 0) {
                            endGame(scene);
                        }
                    }
                    
                    product.destroy();
                    products.splice(i, 1);
                    updateUI();
                    break;
                }
            }
        }
        
        function update() {
            if (!gameStarted || gameOver) return;
            
            // ベルト移動
            for (const line of beltLines) {
                line.x -= beltSpeed;
                if (line.x < -50) {
                    line.x += 500;
                }
            }
            
            // 製品移動
            for (let i = products.length - 1; i >= 0; i--) {
                const product = products[i];
                product.x -= beltSpeed + (speedBoostLevel * 0.5);
                
                if (product.x < -50) {
                    if (product.isDefect && !product.tapped && !product.autoRejected) {
                        // 不良品を見逃した
                        lives--;
                        playSound(200);
                        if (lives <= 0) {
                            endGame(this.scene.scenes[0]);
                        }
                    } else if (!product.isDefect && !product.tapped) {
                        // 良品を正しくスルー
                        score += 5;
                        coins += 5;
                    } else if (product.autoRejected) {
                        // 自動排除成功
                        score += 10;
                        coins += 10;
                    }
                    product.destroy();
                    products.splice(i, 1);
                    updateUI();
                }
            }
        }
        
        function updateUI() {
            coinsText.setText(`コイン: ${coins}`);
            scoreText.setText(`スコア: ${score}`);
            livesText.setText('ライフ: ' + '❤️'.repeat(lives));
            timeText.setText(`${timeLeft}秒`);
        }
        
        function endGame(scene) {
            gameOver = true;
            spawnTimer.remove();
            countdownTimer.remove();
            shopBtn.setVisible(false);
            shopBtn.shopText.setVisible(false);
            
            for (const product of products) {
                product.destroy();
            }
            products = [];
            
            const finalBg = scene.add.rectangle(200, 350, 380, 300, 0x000000, 0.8);
            resultText = scene.add.text(200, 280, `ゲームオーバー！\n\nスコア: ${score}\nコイン: ${coins}\n\nタップして再プレイ`, {
                fontSize: '32px',
                fill: '#ffffff',
                fontStyle: 'bold',
                align: 'center',
                lineSpacing: 10
            }).setOrigin(0.5);
        }
        
        function resetGame(scene) {
            if (resultText) {
                resultText.destroy();
            }
            
            gameOver = false;
            startText.setVisible(true);
            startBg.setVisible(true);
        }
        
        function openShop(scene) {
            if (gameStarted && !gameOver) {
                shopOpen = true;
                
                // 背景暗転
                shopBg = scene.add.rectangle(200, 350, 400, 700, 0x000000, 0.85);
                shopBg.setInteractive();
                
                // ショップタイトル
                shopTitle = scene.add.text(200, 80, '🏪 アップグレードショップ', {
                    fontSize: '28px',
                    fill: '#FFD700',
                    fontStyle: 'bold',
                    stroke: '#000',
                    strokeThickness: 3
                }).setOrigin(0.5);
                
                // コイン表示
                const coinDisplay = scene.add.text(200, 130, `所持コイン: ${coins}`, {
                    fontSize: '24px',
                    fill: '#ffffff',
                    fontStyle: 'bold'
                }).setOrigin(0.5);
                
                // アップグレード1: 自動排除機
                const upgrade1Bg = scene.add.rectangle(200, 220, 360, 100, 0x2a5298);
                upgrade1Bg.setStrokeStyle(3, 0xffffff);
                upgrade1Bg.setInteractive();
                
                const upgrade1Text = scene.add.text(200, 200, `🤖 自動排除機 Lv${autoRejectLevel}`, {
                    fontSize: '24px',
                    fill: '#ffffff',
                    fontStyle: 'bold'
                }).setOrigin(0.5);
                
                const upgrade1Desc = scene.add.text(200, 230, `不良品を自動排除 (${autoRejectLevel * 20}%)\nコスト: 100コイン`, {
                    fontSize: '18px',
                    fill: '#cccccc',
                    align: 'center'
                }).setOrigin(0.5);
                
                upgrade1Bg.on('pointerdown', () => buyUpgrade(scene, 'auto', 100));
                
                // アップグレード2: スピードブースト
                const upgrade2Bg = scene.add.rectangle(200, 350, 360, 100, 0x2a5298);
                upgrade2Bg.setStrokeStyle(3, 0xffffff);
                upgrade2Bg.setInteractive();
                
                const upgrade2Text = scene.add.text(200, 330, `⚡ スピードブースト Lv${speedBoostLevel}`, {
                    fontSize: '24px',
                    fill: '#ffffff',
                    fontStyle: 'bold'
                }).setOrigin(0.5);
                
                const upgrade2Desc = scene.add.text(200, 360, `ベルト速度+0.5\nコスト: 50コイン`, {
                    fontSize: '18px',
                    fill: '#cccccc',
                    align: 'center'
                }).setOrigin(0.5);
                
                upgrade2Bg.on('pointerdown', () => buyUpgrade(scene, 'speed', 50));
                
                // 閉じるボタン
                shopClose = scene.add.rectangle(200, 500, 200, 60, 0xff0000);
                shopClose.setStrokeStyle(3, 0xffffff);
                shopClose.setInteractive();
                
                const closeText = scene.add.text(200, 500, '✖ 閉じる', {
                    fontSize: '24px',
                    fill: '#ffffff',
                    fontStyle: 'bold'
                }).setOrigin(0.5);
                
                shopClose.on('pointerdown', () => closeShop(scene));
                
                upgradeButtons = [shopBg, shopTitle, coinDisplay, upgrade1Bg, upgrade1Text, upgrade1Desc, upgrade2Bg, upgrade2Text, upgrade2Desc, shopClose, closeText];
            }
        }
        
        function buyUpgrade(scene, type, cost) {
            if (coins >= cost) {
                coins -= cost;
                playSound(1200, 'square', 0.2);
                
                if (type === 'auto') {
                    autoRejectLevel++;
                } else if (type === 'speed') {
                    speedBoostLevel++;
                }
                
                updateUI();
                closeShop(scene);
            } else {
                playSound(150, 'sawtooth', 0.3);
            }
        }
        
        function closeShop(scene) {
            shopOpen = false;
            for (const obj of upgradeButtons) {
                obj.destroy();
            }
            upgradeButtons = [];
        }
    </script>
</body>
</html>
