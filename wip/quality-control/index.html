<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>品質管理 - 今日のミニゲーム</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(180deg, #2c5f7c 0%, #1a3a4d 100%);
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <script>
        const config = {
            type: Phaser.AUTO,
            width: 400,
            height: 700,
            parent: 'game-container',
            backgroundColor: '#4a7c9e',
            scale: {
                mode: Phaser.Scale.FIT,
                autoCenter: Phaser.Scale.CENTER_BOTH
            },
            scene: { create: create, update: update }
        };
        const game = new Phaser.Game(config);
        
        // ゲーム変数
        let gameStarted = false;
        let gameOver = false;
        let score = 0;
        let coins = 0;
        let timeLeft = 60;
        let products = [];
        let beltSegments = []; // ベルトのセグメント
        let beltRollers = []; // ローラー
        let beltSpeed = 3;
        let spawnDelay = 1000;
        let spawnTimer;
        let countdownTimer;
        let currentPattern;
        let frameCount = 0;
        
        // 不良品率（品質改善で下がる）
        let defectRate = 0.6; // 初期60%
        
        // UI要素
        let startBg, startText, scoreText, coinsText, timeText, resultText;
        let defectRateText; // 不良品率表示
        let speedBtn, speedText, speedCost, speedLevelText;
        let spawnBtn, spawnText, spawnCost, spawnLevelText;
        let qualityBtn, qualityText, qualityCost, qualityLevelText;
        
        // アップグレード
        let speedLevel = 0;
        let spawnLevel = 0;
        let qualityLevel = 0;
        
        // 品質改善コスト表
        const qualityCosts = [50, 80, 120, 200, 300];
        const qualityRates = [0.6, 0.50, 0.40, 0.30, 0.20, 0.12];
        
        // 効果音
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(freq, type = 'sine', duration = 0.1) {
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.connect(gain);
            gain.connect(audioContext.destination);
            osc.frequency.value = freq;
            osc.type = type;
            gain.gain.setValueAtTime(0.3, audioContext.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
            osc.start();
            osc.stop(audioContext.currentTime + duration);
        }
        
        // 良品パターン
        const patterns = [
            { color: 0x4169e1, shape: 'circle' }
        ];
        
        // 不良品パターン
        const defectPatterns = [
            { color: 0xff0000, shape: 'circle' },
            { color: 0x00ff00, shape: 'circle' },
            { color: 0xffff00, shape: 'circle' },
            { color: 0x4169e1, shape: 'square' },
            { color: 0x4169e1, shape: 'triangle' }
        ];
        
        function create() {
            currentPattern = patterns[0];
            
            // === ベルトコンベア（改善版） ===
            
            // ベルト本体の影（立体感）
            this.add.rectangle(200, 408, 400, 80, 0x1a1a1a);
            
            // ベルト本体（メタリックグレー）
            this.add.rectangle(200, 400, 400, 80, 0x555555);
            
            // ベルト上面のハイライト
            this.add.rectangle(200, 365, 400, 6, 0x888888);
            
            // ベルト下面の影
            this.add.rectangle(200, 435, 400, 6, 0x333333);
            
            // ベルトのセグメント（横線、動くやつ）
            for (let i = 0; i < 12; i++) {
                const seg = this.add.rectangle(i * 38, 400, 3, 70, 0x444444);
                beltSegments.push(seg);
            }
            
            // ローラー（左右の丸い端）
            // 左ローラー
            this.add.circle(10, 400, 38, 0x666666);
            this.add.circle(10, 400, 30, 0x777777);
            this.add.circle(10, 400, 8, 0x999999);
            // 右ローラー
            this.add.circle(390, 400, 38, 0x666666);
            this.add.circle(390, 400, 30, 0x777777);
            this.add.circle(390, 400, 8, 0x999999);
            
            // ベルトの金属フレーム（上下の枠線）
            this.add.rectangle(200, 358, 400, 4, 0xaaaaaa);
            this.add.rectangle(200, 442, 400, 4, 0xaaaaaa);
            
            // 支柱（左右）
            this.add.rectangle(15, 470, 14, 50, 0x777777);
            this.add.rectangle(385, 470, 14, 50, 0x777777);
            // 支柱の足
            this.add.rectangle(15, 498, 24, 8, 0x666666);
            this.add.rectangle(385, 498, 24, 8, 0x666666);
            
            // スコア表示（上部）
            scoreText = this.add.text(20, 20, 'スコア: 0', {
                fontSize: '24px',
                fill: '#ffffff',
                fontStyle: 'bold',
                stroke: '#000',
                strokeThickness: 2
            });
            
            timeText = this.add.text(20, 55, '60秒', {
                fontSize: '24px',
                fill: '#ffffff',
                fontStyle: 'bold',
                stroke: '#000',
                strokeThickness: 2
            });
            
            // 不良品率表示（右上）
            defectRateText = this.add.text(380, 20, '不良率: 60%', {
                fontSize: '18px',
                fill: '#ff6b6b',
                fontStyle: 'bold',
                stroke: '#000',
                strokeThickness: 2,
                align: 'right'
            }).setOrigin(1, 0);
            defectRateText.setVisible(false);
            
            // 良品パターン表示
            const exampleBg = this.add.rectangle(200, 180, 250, 100, 0xffffff, 0.2);
            exampleBg.setStrokeStyle(3, 0xffffff);
            
            const patternText = this.add.text(200, 155, '✅ 良品（スルー）', {
                fontSize: '22px',
                fill: '#ffffff',
                fontStyle: 'bold',
                stroke: '#000',
                strokeThickness: 2
            }).setOrigin(0.5);
            
            const goodExample = this.add.circle(200, 195, 25, currentPattern.color);
            goodExample.setStrokeStyle(3, 0xffffff);
            
            // 説明
            const instructionBg = this.add.rectangle(200, 280, 350, 60, 0xff6b35, 0.9);
            instructionBg.setStrokeStyle(3, 0xffffff);
            
            const instruction = this.add.text(200, 280, '❌ 不良品だけタップ！', {
                fontSize: '22px',
                fill: '#ffffff',
                fontStyle: 'bold',
                align: 'center'
            }).setOrigin(0.5);
            
            // コイン表示（下部中央）
            coinsText = this.add.text(200, 530, 'コイン: 0', {
                fontSize: '28px',
                fill: '#FFD700',
                fontStyle: 'bold',
                stroke: '#000',
                strokeThickness: 3
            }).setOrigin(0.5);
            
            // アップグレードボタン（画面下部）
            const btnY = 610;
            const btnW = 120;
            const btnH = 70;
            
            // ⚡ スピードアップ
            speedBtn = this.add.rectangle(65, btnY, btnW, btnH, 0x2a5298);
            speedBtn.setStrokeStyle(3, 0xffffff);
            speedBtn.setInteractive();
            speedBtn.on('pointerdown', () => buyUpgrade(this, 'speed'));
            
            speedText = this.add.text(65, btnY - 15, '⚡', {
                fontSize: '32px'
            }).setOrigin(0.5);
            
            speedCost = this.add.text(65, btnY + 15, '50c', {
                fontSize: '18px',
                fill: '#FFD700',
                fontStyle: 'bold'
            }).setOrigin(0.5);
            
            speedLevelText = this.add.text(65, btnY - 30, 'Lv0', {
                fontSize: '12px',
                fill: '#ffffff',
                fontStyle: 'bold',
                stroke: '#000',
                strokeThickness: 1
            }).setOrigin(0.5);
            
            // ⏩ 生産速度アップ
            spawnBtn = this.add.rectangle(200, btnY, btnW, btnH, 0x2a5298);
            spawnBtn.setStrokeStyle(3, 0xffffff);
            spawnBtn.setInteractive();
            spawnBtn.on('pointerdown', () => buyUpgrade(this, 'spawn'));
            
            spawnText = this.add.text(200, btnY - 15, '⏩', {
                fontSize: '32px'
            }).setOrigin(0.5);
            
            spawnCost = this.add.text(200, btnY + 15, '30c', {
                fontSize: '18px',
                fill: '#FFD700',
                fontStyle: 'bold'
            }).setOrigin(0.5);
            
            spawnLevelText = this.add.text(200, btnY - 30, 'Lv0', {
                fontSize: '12px',
                fill: '#ffffff',
                fontStyle: 'bold',
                stroke: '#000',
                strokeThickness: 1
            }).setOrigin(0.5);
            
            // 🔧 品質改善
            qualityBtn = this.add.rectangle(335, btnY, btnW, btnH, 0x2a5298);
            qualityBtn.setStrokeStyle(3, 0xffffff);
            qualityBtn.setInteractive();
            qualityBtn.on('pointerdown', () => buyUpgrade(this, 'quality'));
            
            qualityText = this.add.text(335, btnY - 15, '🔧', {
                fontSize: '32px'
            }).setOrigin(0.5);
            
            qualityCost = this.add.text(335, btnY + 15, '50c', {
                fontSize: '18px',
                fill: '#FFD700',
                fontStyle: 'bold'
            }).setOrigin(0.5);
            
            qualityLevelText = this.add.text(335, btnY - 30, 'Lv0 (60%)', {
                fontSize: '12px',
                fill: '#ff6b6b',
                fontStyle: 'bold',
                stroke: '#000',
                strokeThickness: 1
            }).setOrigin(0.5);
            
            // ボタンを非表示
            setButtonsVisible(false);
            
            // スタート画面（最後に描画）
            startBg = this.add.rectangle(200, 350, 400, 700, 0x4a7c9e);
            
            startText = this.add.text(200, 400, '🏭 品質管理ゲーム 🏭\n\n不良品を排除してコイン獲得\nコインで工場をアップグレード\n\nタップしてスタート', {
                fontSize: '26px',
                fill: '#ffffff',
                fontStyle: 'bold',
                align: 'center',
                lineSpacing: 10,
                stroke: '#000',
                strokeThickness: 3
            }).setOrigin(0.5);
            
            // タップでスタート
            this.input.on('pointerdown', (pointer) => {
                if (!gameStarted && !gameOver) {
                    startGame(this);
                } else if (!gameOver) {
                    handleTap(this, pointer);
                }
            });
            
            // Powered by Phaser
            this.add.text(200, 680, 'Powered by Phaser', {
                fontSize: '14px',
                fill: '#ffffff',
                alpha: 0.5
            }).setOrigin(0.5);
        }
        
        function setButtonsVisible(visible) {
            speedBtn.setVisible(visible);
            speedText.setVisible(visible);
            speedCost.setVisible(visible);
            speedLevelText.setVisible(visible);
            spawnBtn.setVisible(visible);
            spawnText.setVisible(visible);
            spawnCost.setVisible(visible);
            spawnLevelText.setVisible(visible);
            qualityBtn.setVisible(visible);
            qualityText.setVisible(visible);
            qualityCost.setVisible(visible);
            qualityLevelText.setVisible(visible);
        }
        
        function startGame(scene) {
            gameStarted = true;
            startText.setVisible(false);
            startBg.setVisible(false);
            
            setButtonsVisible(true);
            defectRateText.setVisible(true);
            
            // 残りの製品とエフェクトをクリア
            for (const product of products) {
                product.destroy();
            }
            scene.tweens.killAll();
            
            score = 0;
            coins = 0;
            timeLeft = 60;
            products = [];
            beltSpeed = 3;
            spawnDelay = 1000;
            speedLevel = 0;
            spawnLevel = 0;
            qualityLevel = 0;
            defectRate = 0.6;
            frameCount = 0;
            
            // レベル表示リセット
            speedLevelText.setText('Lv0');
            spawnLevelText.setText('Lv0');
            qualityLevelText.setText('Lv0 (60%)');
            qualityCost.setText(`${qualityCosts[0]}c`);
            defectRateText.setText('不良率: 60%');
            defectRateText.setFill('#ff6b6b');
            
            updateUI();
            updateButtonStates();
            
            // 製品生成
            spawnTimer = scene.time.addEvent({
                delay: spawnDelay,
                callback: () => spawnProduct(scene),
                loop: true
            });
            
            // カウントダウン
            countdownTimer = scene.time.addEvent({
                delay: 1000,
                callback: () => {
                    timeLeft--;
                    updateUI();
                    if (timeLeft <= 0) {
                        endGame(scene);
                    }
                },
                loop: true
            });
        }
        
        function spawnProduct(scene) {
            if (products.length >= 15) return;
            
            const isDefect = Math.random() < defectRate;
            let color, shape;
            
            if (isDefect) {
                const pattern = Phaser.Utils.Array.GetRandom(defectPatterns);
                color = pattern.color;
                shape = pattern.shape;
            } else {
                color = currentPattern.color;
                shape = currentPattern.shape;
            }
            
            let product;
            if (shape === 'circle') {
                product = scene.add.circle(450, 400, 25, color);
                product.setStrokeStyle(2, 0xffffff);
            } else if (shape === 'square') {
                product = scene.add.rectangle(450, 400, 50, 50, color);
                product.setStrokeStyle(2, 0xffffff);
            } else {
                product = scene.add.triangle(450, 400, 0, 25, -25, -25, 25, -25, color);
                product.setStrokeStyle(2, 0xffffff);
            }
            
            product.isDefect = isDefect;
            product.tapped = false;
            
            products.push(product);
        }
        
        function handleTap(scene, pointer) {
            if (pointer.y > 570) return;
            
            for (let i = products.length - 1; i >= 0; i--) {
                const product = products[i];
                const distance = Phaser.Math.Distance.Between(pointer.x, pointer.y, product.x, product.y);
                
                if (distance < 40) {
                    product.tapped = true;
                    
                    if (product.isDefect) {
                        score += 5;
                        coins += 5;
                        playSound(800);
                        
                        const mark = scene.add.text(product.x, product.y, '○', {
                            fontSize: '64px',
                            fill: '#00ff00',
                            fontStyle: 'bold',
                            stroke: '#000',
                            strokeThickness: 4
                        }).setOrigin(0.5);
                        
                        scene.tweens.add({
                            targets: mark,
                            alpha: 0,
                            y: product.y - 40,
                            duration: 400,
                            onComplete: () => mark.destroy()
                        });
                    } else {
                        score = Math.max(0, score - 5);
                        coins = Math.max(0, coins - 5);
                        playSound(200);
                        
                        const mark = scene.add.text(product.x, product.y, '×', {
                            fontSize: '64px',
                            fill: '#ff0000',
                            fontStyle: 'bold',
                            stroke: '#000',
                            strokeThickness: 4
                        }).setOrigin(0.5);
                        
                        scene.tweens.add({
                            targets: mark,
                            alpha: 0,
                            y: product.y - 40,
                            duration: 400,
                            onComplete: () => mark.destroy()
                        });
                    }
                    
                    product.destroy();
                    products.splice(i, 1);
                    updateUI();
                    updateButtonStates();
                    break;
                }
            }
        }
        
        function update() {
            if (!gameStarted || gameOver) return;
            
            frameCount++;
            
            // ベルトセグメント移動（アニメーション）
            for (const seg of beltSegments) {
                seg.x -= beltSpeed;
                if (seg.x < -20) {
                    seg.x += 12 * 38;
                }
            }
            
            let needsUpdate = false;
            
            // 製品移動
            for (let i = products.length - 1; i >= 0; i--) {
                const product = products[i];
                product.x -= beltSpeed;
                
                // 画面外に出た製品の処理
                if (product.x < -50) {
                    if (product.isDefect && !product.tapped) {
                        // 不良品を見逃した
                        score = Math.max(0, score - 5);
                        coins = Math.max(0, coins - 5);
                        playSound(200);
                    } else if (!product.isDefect && !product.tapped) {
                        // 良品が通過（正解）
                        score += 10;
                        coins += 10;
                    }
                    product.destroy();
                    products.splice(i, 1);
                    needsUpdate = true;
                }
            }
            
            if (needsUpdate) {
                updateUI();
                updateButtonStates();
            }
        }
        
        function updateUI() {
            coinsText.setText(`コイン: ${coins}`);
            scoreText.setText(`スコア: ${score}`);
            timeText.setText(`${timeLeft}秒`);
        }
        
        function getQualityCost() {
            if (qualityLevel >= qualityCosts.length) return Infinity;
            return qualityCosts[qualityLevel];
        }
        
        function updateButtonStates() {
            // スピードアップ
            const canSpeed = coins >= 50;
            speedBtn.setFillStyle(canSpeed ? 0x2a5298 : 0x1a3a4d);
            speedBtn.setAlpha(canSpeed ? 1 : 0.5);
            speedText.setAlpha(canSpeed ? 1 : 0.5);
            speedCost.setAlpha(canSpeed ? 1 : 0.5);
            
            // 生産速度アップ
            const canSpawn = coins >= 30 && spawnDelay > 100;
            spawnBtn.setFillStyle(canSpawn ? 0x2a5298 : 0x1a3a4d);
            spawnBtn.setAlpha(canSpawn ? 1 : 0.5);
            spawnText.setAlpha(canSpawn ? 1 : 0.5);
            spawnCost.setAlpha(canSpawn ? 1 : 0.5);
            
            // 品質改善
            const qCost = getQualityCost();
            const canQuality = coins >= qCost && qualityLevel < qualityCosts.length;
            qualityBtn.setFillStyle(canQuality ? 0x2a5298 : 0x1a3a4d);
            qualityBtn.setAlpha(canQuality ? 1 : 0.5);
            qualityText.setAlpha(canQuality ? 1 : 0.5);
            qualityCost.setAlpha(canQuality ? 1 : 0.5);
            
            if (qualityLevel >= qualityCosts.length) {
                qualityCost.setText('MAX');
            }
        }
        
        function buyUpgrade(scene, type) {
            if (!gameStarted || gameOver) return;
            
            let success = false;
            
            if (type === 'speed') {
                if (coins >= 50) {
                    coins -= 50;
                    speedLevel++;
                    beltSpeed += 2;
                    speedLevelText.setText(`Lv${speedLevel}`);
                    success = true;
                }
            } else if (type === 'spawn') {
                if (coins >= 30 && spawnDelay > 100) {
                    coins -= 30;
                    spawnLevel++;
                    spawnDelay -= 100;
                    spawnTimer.delay = spawnDelay;
                    spawnLevelText.setText(`Lv${spawnLevel}`);
                    success = true;
                }
            } else if (type === 'quality') {
                const cost = getQualityCost();
                if (coins >= cost && qualityLevel < qualityCosts.length) {
                    coins -= cost;
                    qualityLevel++;
                    defectRate = qualityRates[qualityLevel];
                    
                    const pct = Math.round(defectRate * 100);
                    qualityLevelText.setText(`Lv${qualityLevel} (${pct}%)`);
                    
                    // 不良率表示を更新（色も変える）
                    defectRateText.setText(`不良率: ${pct}%`);
                    if (pct <= 20) {
                        defectRateText.setFill('#00ff00');
                        qualityLevelText.setFill('#00ff00');
                    } else if (pct <= 40) {
                        defectRateText.setFill('#ffcc00');
                        qualityLevelText.setFill('#ffcc00');
                    }
                    
                    // 次のコスト表示
                    if (qualityLevel < qualityCosts.length) {
                        qualityCost.setText(`${qualityCosts[qualityLevel]}c`);
                    } else {
                        qualityCost.setText('MAX');
                    }
                    
                    // 品質改善エフェクト
                    const effectText = scene.add.text(200, 350, `🔧 品質改善！\n不良率 ${pct}%`, {
                        fontSize: '32px',
                        fill: '#00ff00',
                        fontStyle: 'bold',
                        stroke: '#000',
                        strokeThickness: 3,
                        align: 'center'
                    }).setOrigin(0.5);
                    
                    scene.tweens.add({
                        targets: effectText,
                        alpha: 0,
                        y: 300,
                        scale: 1.3,
                        duration: 800,
                        onComplete: () => effectText.destroy()
                    });
                    
                    success = true;
                }
            }
            
            if (success) {
                playSound(1200, 'square', 0.2);
                updateUI();
                updateButtonStates();
            } else {
                playSound(150, 'sawtooth', 0.3);
            }
        }
        
        function endGame(scene) {
            gameOver = true;
            spawnTimer.remove();
            countdownTimer.remove();
            scene.tweens.killAll();
            
            setButtonsVisible(false);
            defectRateText.setVisible(false);
            
            for (const product of products) {
                product.destroy();
            }
            products = [];
            
            // ○×マーク削除
            const allObjects = scene.children.list.slice();
            for (const obj of allObjects) {
                if (obj.type === 'Text' && (obj.text === '○' || obj.text === '×')) {
                    obj.destroy();
                }
            }
            
            const finalBg = scene.add.rectangle(200, 350, 380, 400, 0x000000, 0.85);
            finalBg.setStrokeStyle(3, 0xffffff);
            
            const finalPct = Math.round(defectRate * 100);
            resultText = scene.add.text(200, 240, `🏭 ゲームオーバー！`, {
                fontSize: '28px',
                fill: '#ffffff',
                fontStyle: 'bold',
                align: 'center'
            }).setOrigin(0.5);
            
            const statsText = scene.add.text(200, 330, `スコア: ${score}\nコイン: ${coins}\n\n最終不良率: ${finalPct}%\n速度Lv: ${speedLevel}　生産Lv: ${spawnLevel}\n品質Lv: ${qualityLevel}`, {
                fontSize: '22px',
                fill: '#ffffff',
                fontStyle: 'bold',
                align: 'center',
                lineSpacing: 8
            }).setOrigin(0.5);
            
            // 再プレイボタン
            const restartBtn = scene.add.rectangle(200, 460, 200, 60, 0x00aa00);
            restartBtn.setStrokeStyle(3, 0xffffff);
            restartBtn.setInteractive();
            restartBtn.on('pointerdown', () => resetGame(scene));
            
            const restartText = scene.add.text(200, 460, '再プレイ', {
                fontSize: '28px',
                fill: '#ffffff',
                fontStyle: 'bold'
            }).setOrigin(0.5);
        }
        
        function resetGame(scene) {
            scene.tweens.killAll();
            
            if (resultText) {
                resultText.destroy();
                resultText = null;
            }
            
            // 結果画面のオブジェクト削除
            const objects = scene.children.list;
            for (let i = objects.length - 1; i >= 0; i--) {
                const obj = objects[i];
                if (obj.type === 'Rectangle' && obj.fillColor === 0x000000 && obj.fillAlpha === 0.85) {
                    obj.destroy();
                } else if (obj.type === 'Rectangle' && obj.fillColor === 0x00aa00) {
                    obj.destroy();
                } else if (obj.type === 'Text' && (obj.text === '再プレイ' || obj.text.includes('スコア:') || obj.text.includes('ゲームオーバー'))) {
                    obj.destroy();
                }
            }
            
            gameOver = false;
            gameStarted = false;
            startText.setVisible(true);
            startBg.setVisible(true);
        }
    </script>
</body>
</html>
