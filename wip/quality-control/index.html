<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>品質管理 - 今日のミニゲーム</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(180deg, #2c5f7c 0%, #1a3a4d 100%);
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <script>
        const config = {
            type: Phaser.AUTO,
            width: 400,
            height: 700,
            parent: 'game-container',
            backgroundColor: '#4a7c9e',
            scale: {
                mode: Phaser.Scale.FIT,
                autoCenter: Phaser.Scale.CENTER_BOTH
            },
            scene: { create: create, update: update }
        };
        const game = new Phaser.Game(config);
        
        // ゲーム変数
        let gameStarted = false;
        let gameOver = false;
        let score = 0;
        let coins = 0;
        let timeLeft = 60;
        let products = [];
        let beltSegments = [];
        let beltSpeed = 3;
        let spawnDelay = 1000;
        let spawnTimer;
        let countdownTimer;
        let currentPattern;
        
        // 不良品率（品質改善で下がる）
        let defectRate = 0.8;
        
        // UI要素
        let startBg, startText, scoreText, coinsText, timeText;
        let defectRateText;
        let speedBtn, speedText, speedCost, speedLevelText;
        let spawnBtn, spawnText, spawnCost, spawnLevelText;
        let qualityBtn, qualityText, qualityCost, qualityLevelText;
        
        // 結果画面オブジェクト（リスタート時にまとめて削除）
        let endGameObjects = [];
        
        // アップグレード
        let speedLevel = 0;
        let spawnLevel = 0;
        let qualityLevel = 0;
        
        // 品質改善: 初期80%、Lvごとに-10%
        const qualityCosts = [30, 50, 80, 100, 120, 150];
        const qualityRates = [0.80, 0.70, 0.60, 0.50, 0.40, 0.30, 0.20];
        
        // コイン報酬（緩やかに）
        const COIN_DEFECT_TAP = 3;    // 不良品タップ
        const COIN_GOOD_PASS = 5;     // 良品通過
        const COIN_DEFECT_MISS = -3;  // 不良品見逃し
        const COIN_GOOD_TAP = -3;     // 良品誤タップ
        const SCORE_DEFECT_TAP = 5;
        const SCORE_GOOD_PASS = 10;
        const SCORE_DEFECT_MISS = -5;
        const SCORE_GOOD_TAP = -5;
        
        // 効果音
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(freq, type = 'sine', duration = 0.1) {
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.connect(gain);
            gain.connect(audioContext.destination);
            osc.frequency.value = freq;
            osc.type = type;
            gain.gain.setValueAtTime(0.3, audioContext.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
            osc.start();
            osc.stop(audioContext.currentTime + duration);
        }
        
        // 良品パターン
        const patterns = [
            { color: 0x4169e1, shape: 'circle' }
        ];
        
        // 不良品パターン
        const defectPatterns = [
            { color: 0xff0000, shape: 'circle' },
            { color: 0x00ff00, shape: 'circle' },
            { color: 0xffff00, shape: 'circle' },
            { color: 0x4169e1, shape: 'square' },
            { color: 0x4169e1, shape: 'triangle' }
        ];
        
        // 左端到達時のフィードバック表示
        function showEdgeFeedback(scene, x, y, isCorrect, coinChange) {
            const mark = isCorrect ? '○' : '×';
            const color = isCorrect ? '#00ff00' : '#ff4444';
            const coinStr = coinChange >= 0 ? `+${coinChange}c` : `${coinChange}c`;
            
            const feedback = scene.add.text(40, y, `${mark} ${coinStr}`, {
                fontSize: '28px',
                fill: color,
                fontStyle: 'bold',
                stroke: '#000',
                strokeThickness: 3
            }).setOrigin(0.5);
            
            scene.tweens.add({
                targets: feedback,
                alpha: 0,
                y: y - 50,
                duration: 600,
                onComplete: () => feedback.destroy()
            });
        }
        
        function create() {
            currentPattern = patterns[0];
            
            // === ベルトコンベア ===
            // 影
            this.add.rectangle(200, 408, 400, 80, 0x1a1a1a);
            // 本体
            this.add.rectangle(200, 400, 400, 80, 0x555555);
            // ハイライト
            this.add.rectangle(200, 365, 400, 6, 0x888888);
            // 下影
            this.add.rectangle(200, 435, 400, 6, 0x333333);
            
            // セグメント
            for (let i = 0; i < 12; i++) {
                const seg = this.add.rectangle(i * 38, 400, 3, 70, 0x444444);
                beltSegments.push(seg);
            }
            
            // ローラー
            this.add.circle(10, 400, 38, 0x666666);
            this.add.circle(10, 400, 30, 0x777777);
            this.add.circle(10, 400, 8, 0x999999);
            this.add.circle(390, 400, 38, 0x666666);
            this.add.circle(390, 400, 30, 0x777777);
            this.add.circle(390, 400, 8, 0x999999);
            
            // フレーム
            this.add.rectangle(200, 358, 400, 4, 0xaaaaaa);
            this.add.rectangle(200, 442, 400, 4, 0xaaaaaa);
            
            // 支柱
            this.add.rectangle(15, 470, 14, 50, 0x777777);
            this.add.rectangle(385, 470, 14, 50, 0x777777);
            this.add.rectangle(15, 498, 24, 8, 0x666666);
            this.add.rectangle(385, 498, 24, 8, 0x666666);
            
            // スコア表示
            scoreText = this.add.text(20, 20, 'スコア: 0', {
                fontSize: '24px',
                fill: '#ffffff',
                fontStyle: 'bold',
                stroke: '#000',
                strokeThickness: 2
            });
            
            timeText = this.add.text(20, 55, '60秒', {
                fontSize: '24px',
                fill: '#ffffff',
                fontStyle: 'bold',
                stroke: '#000',
                strokeThickness: 2
            });
            
            // 不良品率表示
            defectRateText = this.add.text(380, 20, '不良率: 80%', {
                fontSize: '18px',
                fill: '#ff6b6b',
                fontStyle: 'bold',
                stroke: '#000',
                strokeThickness: 2,
                align: 'right'
            }).setOrigin(1, 0);
            defectRateText.setVisible(false);
            
            // 良品パターン表示
            const exampleBg = this.add.rectangle(200, 180, 250, 100, 0xffffff, 0.2);
            exampleBg.setStrokeStyle(3, 0xffffff);
            
            this.add.text(200, 155, '✅ 良品（スルー）', {
                fontSize: '22px',
                fill: '#ffffff',
                fontStyle: 'bold',
                stroke: '#000',
                strokeThickness: 2
            }).setOrigin(0.5);
            
            this.add.circle(200, 195, 25, currentPattern.color).setStrokeStyle(3, 0xffffff);
            
            // 説明
            const instructionBg = this.add.rectangle(200, 280, 350, 60, 0xff6b35, 0.9);
            instructionBg.setStrokeStyle(3, 0xffffff);
            
            this.add.text(200, 280, '❌ 不良品だけタップ！', {
                fontSize: '22px',
                fill: '#ffffff',
                fontStyle: 'bold',
                align: 'center'
            }).setOrigin(0.5);
            
            // コイン表示
            coinsText = this.add.text(200, 530, 'コイン: 0', {
                fontSize: '28px',
                fill: '#FFD700',
                fontStyle: 'bold',
                stroke: '#000',
                strokeThickness: 3
            }).setOrigin(0.5);
            
            // === アップグレードボタン ===
            const btnY = 610;
            const btnW = 120;
            const btnH = 70;
            
            // ⚡ スピードアップ
            speedBtn = this.add.rectangle(65, btnY, btnW, btnH, 0x2a5298);
            speedBtn.setStrokeStyle(3, 0xffffff);
            speedBtn.setInteractive();
            speedBtn.on('pointerdown', () => buyUpgrade(this, 'speed'));
            speedText = this.add.text(65, btnY - 15, '⚡', { fontSize: '32px' }).setOrigin(0.5);
            speedCost = this.add.text(65, btnY + 15, '50c', { fontSize: '18px', fill: '#FFD700', fontStyle: 'bold' }).setOrigin(0.5);
            speedLevelText = this.add.text(65, btnY - 30, 'Lv0', { fontSize: '12px', fill: '#ffffff', fontStyle: 'bold', stroke: '#000', strokeThickness: 1 }).setOrigin(0.5);
            
            // ⏩ 生産速度アップ
            spawnBtn = this.add.rectangle(200, btnY, btnW, btnH, 0x2a5298);
            spawnBtn.setStrokeStyle(3, 0xffffff);
            spawnBtn.setInteractive();
            spawnBtn.on('pointerdown', () => buyUpgrade(this, 'spawn'));
            spawnText = this.add.text(200, btnY - 15, '⏩', { fontSize: '32px' }).setOrigin(0.5);
            spawnCost = this.add.text(200, btnY + 15, '30c', { fontSize: '18px', fill: '#FFD700', fontStyle: 'bold' }).setOrigin(0.5);
            spawnLevelText = this.add.text(200, btnY - 30, 'Lv0', { fontSize: '12px', fill: '#ffffff', fontStyle: 'bold', stroke: '#000', strokeThickness: 1 }).setOrigin(0.5);
            
            // 🔧 品質改善
            qualityBtn = this.add.rectangle(335, btnY, btnW, btnH, 0x2a5298);
            qualityBtn.setStrokeStyle(3, 0xffffff);
            qualityBtn.setInteractive();
            qualityBtn.on('pointerdown', () => buyUpgrade(this, 'quality'));
            qualityText = this.add.text(335, btnY - 15, '🔧', { fontSize: '32px' }).setOrigin(0.5);
            qualityCost = this.add.text(335, btnY + 15, '30c', { fontSize: '18px', fill: '#FFD700', fontStyle: 'bold' }).setOrigin(0.5);
            qualityLevelText = this.add.text(335, btnY - 30, 'Lv0 (80%)', { fontSize: '12px', fill: '#ff6b6b', fontStyle: 'bold', stroke: '#000', strokeThickness: 1 }).setOrigin(0.5);
            
            // ボタン非表示
            setButtonsVisible(false);
            
            // スタート画面（最前面）
            startBg = this.add.rectangle(200, 350, 400, 700, 0x4a7c9e);
            startText = this.add.text(200, 400, '🏭 品質管理ゲーム 🏭\n\n不良品を排除してコイン獲得\nコインで工場をアップグレード\n\nタップしてスタート', {
                fontSize: '26px',
                fill: '#ffffff',
                fontStyle: 'bold',
                align: 'center',
                lineSpacing: 10,
                stroke: '#000',
                strokeThickness: 3
            }).setOrigin(0.5);
            
            // タップハンドラ
            this.input.on('pointerdown', (pointer) => {
                if (!gameStarted && !gameOver) {
                    startGame(this);
                } else if (!gameOver) {
                    handleTap(this, pointer);
                }
            });
            
            this.add.text(200, 680, 'Powered by Phaser', { fontSize: '14px', fill: '#ffffff', alpha: 0.5 }).setOrigin(0.5);
        }
        
        function setButtonsVisible(visible) {
            const els = [speedBtn, speedText, speedCost, speedLevelText,
                         spawnBtn, spawnText, spawnCost, spawnLevelText,
                         qualityBtn, qualityText, qualityCost, qualityLevelText];
            els.forEach(el => el.setVisible(visible));
        }
        
        function startGame(scene) {
            gameStarted = true;
            startText.setVisible(false);
            startBg.setVisible(false);
            
            setButtonsVisible(true);
            defectRateText.setVisible(true);
            
            // 残りの製品をクリア
            for (const p of products) p.destroy();
            products = [];
            scene.tweens.killAll();
            
            score = 0;
            coins = 0;
            timeLeft = 60;
            beltSpeed = 3;
            spawnDelay = 1000;
            speedLevel = 0;
            spawnLevel = 0;
            qualityLevel = 0;
            defectRate = 0.8;
            
            speedLevelText.setText('Lv0');
            spawnLevelText.setText('Lv0');
            qualityLevelText.setText('Lv0 (80%)');
            qualityLevelText.setFill('#ff6b6b');
            qualityCost.setText(`${qualityCosts[0]}c`);
            defectRateText.setText('不良率: 80%');
            defectRateText.setFill('#ff6b6b');
            
            updateUI();
            updateButtonStates();
            
            spawnTimer = scene.time.addEvent({
                delay: spawnDelay,
                callback: () => spawnProduct(scene),
                loop: true
            });
            
            countdownTimer = scene.time.addEvent({
                delay: 1000,
                callback: () => {
                    timeLeft--;
                    updateUI();
                    if (timeLeft <= 0) endGame(scene);
                },
                loop: true
            });
        }
        
        function spawnProduct(scene) {
            if (products.length >= 15) return;
            
            const isDefect = Math.random() < defectRate;
            let color, shape;
            
            if (isDefect) {
                const pattern = Phaser.Utils.Array.GetRandom(defectPatterns);
                color = pattern.color;
                shape = pattern.shape;
            } else {
                color = currentPattern.color;
                shape = currentPattern.shape;
            }
            
            let product;
            if (shape === 'circle') {
                product = scene.add.circle(450, 400, 25, color);
                product.setStrokeStyle(2, 0xffffff);
            } else if (shape === 'square') {
                product = scene.add.rectangle(450, 400, 50, 50, color);
                product.setStrokeStyle(2, 0xffffff);
            } else {
                product = scene.add.triangle(450, 400, 0, 25, -25, -25, 25, -25, color);
                product.setStrokeStyle(2, 0xffffff);
            }
            
            product.isDefect = isDefect;
            product.tapped = false;
            products.push(product);
        }
        
        function handleTap(scene, pointer) {
            if (pointer.y > 570) return;
            
            for (let i = products.length - 1; i >= 0; i--) {
                const product = products[i];
                const dist = Phaser.Math.Distance.Between(pointer.x, pointer.y, product.x, product.y);
                
                if (dist < 40) {
                    product.tapped = true;
                    
                    if (product.isDefect) {
                        score += SCORE_DEFECT_TAP;
                        coins += COIN_DEFECT_TAP;
                        playSound(800);
                        
                        const mark = scene.add.text(product.x, product.y, '○', {
                            fontSize: '64px', fill: '#00ff00', fontStyle: 'bold',
                            stroke: '#000', strokeThickness: 4
                        }).setOrigin(0.5);
                        scene.tweens.add({ targets: mark, alpha: 0, y: product.y - 40, duration: 400, onComplete: () => mark.destroy() });
                    } else {
                        score = Math.max(0, score + SCORE_GOOD_TAP);
                        coins = Math.max(0, coins + COIN_GOOD_TAP);
                        playSound(200);
                        
                        const mark = scene.add.text(product.x, product.y, '×', {
                            fontSize: '64px', fill: '#ff0000', fontStyle: 'bold',
                            stroke: '#000', strokeThickness: 4
                        }).setOrigin(0.5);
                        scene.tweens.add({ targets: mark, alpha: 0, y: product.y - 40, duration: 400, onComplete: () => mark.destroy() });
                    }
                    
                    product.destroy();
                    products.splice(i, 1);
                    updateUI();
                    updateButtonStates();
                    break;
                }
            }
        }
        
        function update() {
            if (!gameStarted || gameOver) return;
            
            // ベルトアニメーション
            for (const seg of beltSegments) {
                seg.x -= beltSpeed;
                if (seg.x < -20) seg.x += 12 * 38;
            }
            
            let needsUpdate = false;
            const scene = game.scene.scenes[0];
            
            for (let i = products.length - 1; i >= 0; i--) {
                const product = products[i];
                product.x -= beltSpeed;
                
                // 左端到達
                if (product.x < -50) {
                    if (product.isDefect && !product.tapped) {
                        // 不良品見逃し
                        score = Math.max(0, score + SCORE_DEFECT_MISS);
                        coins = Math.max(0, coins + COIN_DEFECT_MISS);
                        playSound(200);
                        showEdgeFeedback(scene, 40, product.y, false, COIN_DEFECT_MISS);
                    } else if (!product.isDefect && !product.tapped) {
                        // 良品通過（正解）
                        score += SCORE_GOOD_PASS;
                        coins += COIN_GOOD_PASS;
                        playSound(600, 'sine', 0.05);
                        showEdgeFeedback(scene, 40, product.y, true, COIN_GOOD_PASS);
                    }
                    product.destroy();
                    products.splice(i, 1);
                    needsUpdate = true;
                }
            }
            
            if (needsUpdate) {
                updateUI();
                updateButtonStates();
            }
        }
        
        function updateUI() {
            coinsText.setText(`コイン: ${coins}`);
            scoreText.setText(`スコア: ${score}`);
            timeText.setText(`${timeLeft}秒`);
        }
        
        function getQualityCost() {
            if (qualityLevel >= qualityCosts.length) return Infinity;
            return qualityCosts[qualityLevel];
        }
        
        function updateButtonStates() {
            // スピードアップ
            const canSpeed = coins >= 50;
            speedBtn.setFillStyle(canSpeed ? 0x2a5298 : 0x1a3a4d);
            [speedBtn, speedText, speedCost].forEach(el => el.setAlpha(canSpeed ? 1 : 0.5));
            
            // 生産速度アップ
            const canSpawn = coins >= 30 && spawnDelay > 100;
            spawnBtn.setFillStyle(canSpawn ? 0x2a5298 : 0x1a3a4d);
            [spawnBtn, spawnText, spawnCost].forEach(el => el.setAlpha(canSpawn ? 1 : 0.5));
            
            // 品質改善
            const qCost = getQualityCost();
            const canQuality = coins >= qCost && qualityLevel < qualityCosts.length;
            qualityBtn.setFillStyle(canQuality ? 0x2a5298 : 0x1a3a4d);
            [qualityBtn, qualityText, qualityCost].forEach(el => el.setAlpha(canQuality ? 1 : 0.5));
            if (qualityLevel >= qualityCosts.length) qualityCost.setText('MAX');
        }
        
        function buyUpgrade(scene, type) {
            if (!gameStarted || gameOver) return;
            
            let success = false;
            
            if (type === 'speed') {
                if (coins >= 50) {
                    coins -= 50;
                    speedLevel++;
                    beltSpeed += 2;
                    speedLevelText.setText(`Lv${speedLevel}`);
                    success = true;
                }
            } else if (type === 'spawn') {
                if (coins >= 30 && spawnDelay > 100) {
                    coins -= 30;
                    spawnLevel++;
                    spawnDelay -= 100;
                    spawnTimer.delay = spawnDelay;
                    spawnLevelText.setText(`Lv${spawnLevel}`);
                    success = true;
                }
            } else if (type === 'quality') {
                const cost = getQualityCost();
                if (coins >= cost && qualityLevel < qualityCosts.length) {
                    coins -= cost;
                    qualityLevel++;
                    defectRate = qualityRates[qualityLevel];
                    
                    const pct = Math.round(defectRate * 100);
                    qualityLevelText.setText(`Lv${qualityLevel} (${pct}%)`);
                    defectRateText.setText(`不良率: ${pct}%`);
                    
                    // 色変化
                    if (pct <= 30) {
                        defectRateText.setFill('#00ff00');
                        qualityLevelText.setFill('#00ff00');
                    } else if (pct <= 50) {
                        defectRateText.setFill('#ffcc00');
                        qualityLevelText.setFill('#ffcc00');
                    }
                    
                    // 次のコスト
                    if (qualityLevel < qualityCosts.length) {
                        qualityCost.setText(`${qualityCosts[qualityLevel]}c`);
                    } else {
                        qualityCost.setText('MAX');
                    }
                    
                    // エフェクト
                    const effectText = scene.add.text(200, 350, `🔧 品質改善！\n不良率 ${pct}%`, {
                        fontSize: '32px', fill: '#00ff00', fontStyle: 'bold',
                        stroke: '#000', strokeThickness: 3, align: 'center'
                    }).setOrigin(0.5);
                    scene.tweens.add({
                        targets: effectText, alpha: 0, y: 300, scale: 1.3,
                        duration: 800, onComplete: () => effectText.destroy()
                    });
                    
                    success = true;
                }
            }
            
            if (success) {
                playSound(1200, 'square', 0.2);
                updateUI();
                updateButtonStates();
            } else {
                playSound(150, 'sawtooth', 0.3);
            }
        }
        
        function endGame(scene) {
            gameOver = true;
            spawnTimer.remove();
            countdownTimer.remove();
            scene.tweens.killAll();
            
            setButtonsVisible(false);
            defectRateText.setVisible(false);
            
            for (const p of products) p.destroy();
            products = [];
            
            // 結果画面（endGameObjectsで管理）
            endGameObjects = [];
            
            const finalBg = scene.add.rectangle(200, 350, 380, 400, 0x000000, 0.85);
            finalBg.setStrokeStyle(3, 0xffffff);
            endGameObjects.push(finalBg);
            
            const finalPct = Math.round(defectRate * 100);
            
            const titleText = scene.add.text(200, 240, '🏭 ゲームオーバー！', {
                fontSize: '28px', fill: '#ffffff', fontStyle: 'bold', align: 'center'
            }).setOrigin(0.5);
            endGameObjects.push(titleText);
            
            const statsText = scene.add.text(200, 330,
                `スコア: ${score}\nコイン: ${coins}\n\n最終不良率: ${finalPct}%\n速度Lv: ${speedLevel}　生産Lv: ${spawnLevel}\n品質Lv: ${qualityLevel}`, {
                fontSize: '22px', fill: '#ffffff', fontStyle: 'bold',
                align: 'center', lineSpacing: 8
            }).setOrigin(0.5);
            endGameObjects.push(statsText);
            
            const restartBtn = scene.add.rectangle(200, 460, 200, 60, 0x00aa00);
            restartBtn.setStrokeStyle(3, 0xffffff);
            restartBtn.setInteractive();
            restartBtn.on('pointerdown', () => resetGame(scene));
            endGameObjects.push(restartBtn);
            
            const restartLabel = scene.add.text(200, 460, '再プレイ', {
                fontSize: '28px', fill: '#ffffff', fontStyle: 'bold'
            }).setOrigin(0.5);
            endGameObjects.push(restartLabel);
        }
        
        function resetGame(scene) {
            scene.tweens.killAll();
            
            // 結果画面のオブジェクトをまとめて削除
            for (const obj of endGameObjects) {
                obj.destroy();
            }
            endGameObjects = [];
            
            gameOver = false;
            gameStarted = false;
            startText.setVisible(true);
            startBg.setVisible(true);
        }
    </script>
</body>
</html>
