<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ピコ スプライトテスト</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #333;
        }
        canvas {
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
    </style>
</head>
<body>
    <script>
        const config = {
            type: Phaser.AUTO,
            width: 400,
            height: 400,
            backgroundColor: '#a8e6ff',
            scale: {
                mode: Phaser.Scale.FIT,
                autoCenter: Phaser.Scale.CENTER_BOTH
            },
            scene: {
                create: create
            }
        };

        const game = new Phaser.Game(config);

        function createPico48(scene, x, y) {
            const container = scene.add.container(x, y);
            const ps = 2; // pixel size
            
            // 色定義（参考画像に合わせる）
            const c = {
                hair: 0xb3d9ff,      // 水色の髪（明るめ）
                hairDark: 0x99ccff,  // 髪の影
                skin: 0xffd4b8,      // 肌
                pink: 0xffb3e6,      // ピンクの服
                pinkDark: 0xff99d9,  // 服の影
            };
            
            // 64x64 ドット（-32～+32）、2頭身
            const dots = [];
            
            // === 頭部（上半分） ===
            
            // 髪の上部（丸い形）
            for (let y = -28; y <= -24; y++) {
                const w = 8 - Math.abs(y + 26) * 2;
                for (let x = -w; x <= w; x++) {
                    dots.push([x, y, 'hair']);
                }
            }
            
            // 髪のメイン部分
            for (let y = -23; y <= -8; y++) {
                for (let x = -12; x <= 12; x++) {
                    if (y >= -12 && Math.abs(x) <= 6) continue; // 顔部分
                    dots.push([x, y, Math.abs(x) > 10 ? 'hairDark' : 'hair']);
                }
            }
            
            // サイドの丸い膨らみ（左）
            for (let y = -16; y <= -8; y++) {
                for (let x = -18; x <= -13; x++) {
                    if (Math.abs(y + 12) > 4 && Math.abs(x + 15) > 3) continue;
                    dots.push([x, y, x < -16 ? 'hairDark' : 'hair']);
                }
            }
            
            // サイドの丸い膨らみ（右）
            for (let y = -16; y <= -8; y++) {
                for (let x = 13; x <= 18; x++) {
                    if (Math.abs(y + 12) > 4 && Math.abs(x - 15) > 3) continue;
                    dots.push([x, y, x > 16 ? 'hairDark' : 'hair']);
                }
            }
            
            // 後ろの髪
            for (let y = -7; y <= 0; y++) {
                for (let x = -10; x <= 10; x++) {
                    if (Math.abs(x) <= 6) continue; // 首部分
                    dots.push([x, y, 'hairDark']);
                }
            }
            
            // 首（細い）
            for (let y = -4; y <= 0; y++) {
                for (let x = -3; x <= 3; x++) {
                    dots.push([x, y, 'skin']);
                }
            }
            
            // === 体部（下半分、2頭身なので同じサイズ） ===
            
            // 肩〜上半身
            for (let y = 1; y <= 8; y++) {
                const w = 8 + Math.min(y, 4);
                for (let x = -w; x <= w; x++) {
                    dots.push([x, y, Math.abs(x) > w - 2 ? 'pinkDark' : 'pink']);
                }
            }
            
            // 腰〜スカート
            for (let y = 9; y <= 18; y++) {
                const w = 12 + (y - 9) * 0.5;
                for (let x = -w; x <= w; x++) {
                    dots.push([x, y, Math.abs(x) > w - 1 ? 'pinkDark' : 'pink']);
                }
            }
            
            // 足（短い）
            for (let y = 19; y <= 28; y++) {
                // 左足
                for (let x = -8; x <= -3; x++) {
                    dots.push([x, y, 'skin']);
                }
                // 右足
                for (let x = 3; x <= 8; x++) {
                    dots.push([x, y, 'skin']);
                }
            }
            
            // ドットを描画
            dots.forEach(([dx, dy, color]) => {
                const rect = scene.add.rectangle(
                    dx * ps, 
                    dy * ps, 
                    ps, 
                    ps, 
                    c[color]
                );
                rect.setStrokeStyle(0.3, 0x000000, 0.1);
                container.add(rect);
            });
            
            return container;
        }

        function create() {
            // 中央にピコを表示
            const pico = createPico48(this, 200, 200);
            
            // 説明テキスト
            this.add.text(200, 50, 'ピコ（64x64 ドット絵 v2）', {
                fontSize: '24px',
                fill: '#ffffff',
                fontStyle: 'bold',
                stroke: '#000000',
                strokeThickness: 3
            }).setOrigin(0.5);
            
            this.add.text(200, 350, '確認して改善点を教えてね', {
                fontSize: '18px',
                fill: '#ffffff'
            }).setOrigin(0.5);
        }
    </script>
</body>
</html>
