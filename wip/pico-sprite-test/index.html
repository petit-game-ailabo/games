<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ピコ スプライトテスト</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #333;
        }
        canvas {
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
    </style>
</head>
<body>
    <script>
        const config = {
            type: Phaser.AUTO,
            width: 400,
            height: 400,
            backgroundColor: '#a8e6ff',
            scale: {
                mode: Phaser.Scale.FIT,
                autoCenter: Phaser.Scale.CENTER_BOTH
            },
            scene: {
                create: create
            }
        };

        const game = new Phaser.Game(config);

        function createPico96(scene, x, y) {
            const container = scene.add.container(x, y);
            const ps = 1.5; // pixel size
            
            // 色定義（参考画像に近い色）
            const c = {
                hair: 0xadd8ff,      // 水色の髪
                hairShade: 0x8fc7ff, // 髪の影
                hairDark: 0x70b0ff,  // 髪の濃い影
                skin: 0xffd4a3,      // 肌
                pink: 0xffb3d9,      // ピンクの服
                pinkShade: 0xff99cc, // 服の影
                white: 0xffffff,     // ハイライト
            };
            
            // 96x96 ドット（-48～+48）、2頭身、後ろ姿
            const pixels = {};
            
            function dot(x, y, color) {
                pixels[`${x},${y}`] = color;
            }
            
            // === 頭部（上半分 -48～0） ===
            
            // 髪の上部（丸い形）
            for (let y = -42; y <= -36; y++) {
                const w = Math.min(14, 8 + (42 + y) * 1.5);
                for (let x = -w; x <= w; x++) {
                    if (y === -42 && Math.abs(x) > 10) continue;
                    if (y === -41 && Math.abs(x) > 12) continue;
                    dot(x, y, y < -40 ? 'hairDark' : 'hair');
                }
            }
            
            // 髪のメイン部分（後頭部）
            for (let y = -35; y <= -12; y++) {
                for (let x = -16; x <= 16; x++) {
                    if (y >= -18 && Math.abs(x) <= 10) continue; // 顔部分は空ける
                    const color = Math.abs(x) > 14 ? 'hairDark' : (Math.abs(x) > 12 ? 'hairShade' : 'hair');
                    dot(x, y, color);
                }
            }
            
            // サイドの丸い膨らみ（ボブ風、左側）
            for (let y = -24; y <= -8; y++) {
                for (let x = -26; x <= -17; x++) {
                    const cy = -16; // 円の中心Y
                    const cx = -21; // 円の中心X
                    const dist = Math.sqrt((x - cx) ** 2 + (y - cy) ** 2);
                    if (dist <= 10) {
                        const color = x < -24 ? 'hairDark' : (x < -22 ? 'hairShade' : 'hair');
                        dot(x, y, color);
                    }
                }
            }
            
            // サイドの丸い膨らみ（ボブ風、右側）
            for (let y = -24; y <= -8; y++) {
                for (let x = 17; x <= 26; x++) {
                    const cy = -16;
                    const cx = 21;
                    const dist = Math.sqrt((x - cx) ** 2 + (y - cy) ** 2);
                    if (dist <= 10) {
                        const color = x > 24 ? 'hairDark' : (x > 22 ? 'hairShade' : 'hair');
                        dot(x, y, color);
                    }
                }
            }
            
            // 後ろ髪（ロング、首まで）
            for (let y = -11; y <= 2; y++) {
                for (let x = -14; x <= 14; x++) {
                    if (Math.abs(x) <= 8 && y >= -4) continue; // 首部分
                    const color = Math.abs(x) > 12 ? 'hairDark' : 'hairShade';
                    dot(x, y, color);
                }
            }
            
            // 首（細い）
            for (let y = -4; y <= 2; y++) {
                for (let x = -5; x <= 5; x++) {
                    dot(x, y, 'skin');
                }
            }
            
            // === 体部（下半分 0～48）、2頭身 ===
            
            // 肩
            for (let y = 3; y <= 8; y++) {
                const w = 12 + y - 3;
                for (let x = -w; x <= w; x++) {
                    if (Math.abs(x) <= 6) continue; // 首の下
                    const color = Math.abs(x) > w - 2 ? 'pinkShade' : 'pink';
                    dot(x, y, color);
                }
            }
            
            // 上半身
            for (let y = 9; y <= 18; y++) {
                const w = 18;
                for (let x = -w; x <= w; x++) {
                    const color = Math.abs(x) > w - 3 ? 'pinkShade' : 'pink';
                    dot(x, y, color);
                }
            }
            
            // ウエスト〜スカート
            for (let y = 19; y <= 32; y++) {
                const w = Math.min(24, 18 + (y - 19) * 0.5);
                for (let x = -w; x <= w; x++) {
                    const color = Math.abs(x) > w - 2 ? 'pinkShade' : 'pink';
                    dot(x, y, color);
                }
            }
            
            // 足（短い、2頭身なので）
            for (let y = 33; y <= 46; y++) {
                // 左足
                for (let x = -12; x <= -5; x++) {
                    dot(x, y, 'skin');
                }
                // 右足
                for (let x = 5; x <= 12; x++) {
                    dot(x, y, 'skin');
                }
            }
            
            // ドットを描画
            Object.entries(pixels).forEach(([pos, color]) => {
                const [x, y] = pos.split(',').map(Number);
                const rect = scene.add.rectangle(
                    x * ps, 
                    y * ps, 
                    ps, 
                    ps, 
                    c[color]
                );
                rect.setStrokeStyle(0.2, 0x000000, 0.05);
                container.add(rect);
            });
            
            return container;
        }

        function create() {
            // 中央にピコを表示
            const pico = createPico96(this, 200, 200);
            
            // 説明テキスト
            this.add.text(200, 50, 'ピコ（96x96 ドット絵 v3）', {
                fontSize: '24px',
                fill: '#ffffff',
                fontStyle: 'bold',
                stroke: '#000000',
                strokeThickness: 3
            }).setOrigin(0.5);
            
            this.add.text(200, 350, '確認して改善点を教えてね', {
                fontSize: '18px',
                fill: '#ffffff'
            }).setOrigin(0.5);
        }
    </script>
</body>
</html>
