<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ピコ スプライトテスト</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #333;
        }
        canvas {
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
    </style>
</head>
<body>
    <script>
        const config = {
            type: Phaser.AUTO,
            width: 400,
            height: 400,
            backgroundColor: '#a8e6ff',
            scale: {
                mode: Phaser.Scale.FIT,
                autoCenter: Phaser.Scale.CENTER_BOTH
            },
            scene: {
                create: create
            }
        };

        const game = new Phaser.Game(config);

        function createPico48(scene, x, y) {
            const container = scene.add.container(x, y);
            const ps = 2; // pixel size (1ドット = 2px)
            
            // 色定義
            const c = {
                hair: 0x66b3ff,      // 青い髪
                hairDark: 0x4d94e6,  // 髪の影
                skin: 0xffcc99,      // 肌
                white: 0xffffff,     // 白い服
                whiteShade: 0xe6e6e6,// 服の影
                pink: 0xffb3d9,      // リボン・装飾
            };
            
            // 48x48 ドット配置（中心を0,0として -24～+24）
            const dots = [];
            
            // ツインテール（左）
            for (let y = -18; y <= -12; y++) {
                for (let x = -22; x <= -16; x++) {
                    if (y === -18 && (x < -20 || x > -18)) continue;
                    dots.push([x, y, y === -12 ? 'hairDark' : 'hair']);
                }
            }
            
            // ツインテール（右）
            for (let y = -18; y <= -12; y++) {
                for (let x = 16; x <= 22; x++) {
                    if (y === -18 && (x < 18 || x > 20)) continue;
                    dots.push([x, y, y === -12 ? 'hairDark' : 'hair']);
                }
            }
            
            // 頭部の髪
            for (let y = -20; y <= -10; y++) {
                for (let x = -14; x <= 14; x++) {
                    if (y === -20 && Math.abs(x) > 12) continue;
                    if (y === -19 && Math.abs(x) > 13) continue;
                    if (y >= -12 && y <= -10 && Math.abs(x) <= 8) continue; // 顔部分を空ける
                    dots.push([x, y, y <= -18 ? 'hair' : (Math.abs(x) > 10 ? 'hairDark' : 'hair')]);
                }
            }
            
            // 顔・首（肌色）
            for (let y = -12; y <= -6; y++) {
                for (let x = -8; x <= 8; x++) {
                    if (y === -12 && Math.abs(x) > 6) continue;
                    if (y === -6 && Math.abs(x) > 4) continue;
                    dots.push([x, y, 'skin']);
                }
            }
            
            // 首
            for (let y = -5; y <= -3; y++) {
                for (let x = -3; x <= 3; x++) {
                    dots.push([x, y, 'skin']);
                }
            }
            
            // 体（白い服）
            // 肩
            for (let y = -2; y <= 0; y++) {
                for (let x = -10; x <= 10; x++) {
                    if (Math.abs(x) < 4) continue; // 首周り
                    dots.push([x, y, Math.abs(x) > 8 ? 'whiteShade' : 'white']);
                }
            }
            
            // 胴体
            for (let y = 1; y <= 10; y++) {
                const width = Math.min(12, 8 + y);
                for (let x = -width; x <= width; x++) {
                    if (y >= 6 && y <= 8 && Math.abs(x) <= width - 2) {
                        dots.push([x, y, 'pink']); // ウエストのリボン
                    } else {
                        dots.push([x, y, Math.abs(x) > width - 2 ? 'whiteShade' : 'white']);
                    }
                }
            }
            
            // スカート
            for (let y = 11; y <= 16; y++) {
                const width = 10 + (y - 11);
                for (let x = -width; x <= width; x++) {
                    dots.push([x, y, Math.abs(x) > width - 1 ? 'whiteShade' : 'white']);
                }
            }
            
            // 足
            // 左足
            for (let y = 17; y <= 24; y++) {
                for (let x = -8; x <= -3; x++) {
                    dots.push([x, y, 'skin']);
                }
            }
            // 右足
            for (let y = 17; y <= 24; y++) {
                for (let x = 3; x <= 8; x++) {
                    dots.push([x, y, 'skin']);
                }
            }
            
            // ドットを描画
            dots.forEach(([dx, dy, color]) => {
                const rect = scene.add.rectangle(
                    dx * ps, 
                    dy * ps, 
                    ps, 
                    ps, 
                    c[color]
                );
                rect.setStrokeStyle(0.3, 0x000000, 0.1);
                container.add(rect);
            });
            
            return container;
        }

        function create() {
            // 中央にピコを表示
            const pico = createPico48(this, 200, 200);
            
            // 説明テキスト
            this.add.text(200, 50, 'ピコ（48x48 ドット絵）', {
                fontSize: '24px',
                fill: '#ffffff',
                fontStyle: 'bold',
                stroke: '#000000',
                strokeThickness: 3
            }).setOrigin(0.5);
            
            this.add.text(200, 350, '確認して改善点を教えてね', {
                fontSize: '18px',
                fill: '#ffffff'
            }).setOrigin(0.5);
        }
    </script>
</body>
</html>
