<style>

canvas{display:block}
#ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}

#topbar .stage-name{font-weight:700;color:#FFD54F;font-size:14px}
#topbar .info{display:flex;gap:10px;align-items:center;font-size:12px}
#topbar .info span{white-space:nowrap}
.time-warn{color:#EF5350!important;animation:blink 0.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}

#title-screen{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#1a1a1a;z-index:100;overflow:hidden}
#title-screen .city-bg{position:absolute;bottom:0;left:0;width:100%;height:60%;pointer-events:none}
#title-screen h1{font-size:42px;margin-bottom:4px;letter-spacing:-1px;color:#FFD54F;text-shadow:0 0 30px rgba(255,213,79,0.4);z-index:1}

#title-screen .subtitle{color:#aaa;font-size:15px;margin-bottom:28px;z-index:1}
#title-screen button{display:block;width:220px;padding:14px;border:2px solid #555;border-radius:12px;background:rgba(40,40,40,0.9);font-size:15px;cursor:pointer;transition:all 0.15s;color:#fff;z-index:1}
#title-screen button:hover,#title-screen button:active{border-color:#FFD54F;background:rgba(60,50,20,0.9);color:#FFD54F}

#stage-select{position:absolute;top:0;left:0;width:100%;height:100%;display:none;flex-direction:column;align-items:center;justify-content:center;background:#1a1a1a;z-index:99}
#stage-select h2{font-size:24px;margin-bottom:20px;color:#FFD54F}
#stage-select .nav{display:flex;align-items:center;gap:16px;margin-bottom:20px}
#stage-select .nav button{width:44px;height:44px;border:2px solid #555;border-radius:50%;background:#222;font-size:20px;cursor:pointer;color:#fff}
#stage-select .nav button:active{background:#333;border-color:#FFD54F}
#stage-select .stage-info{text-align:center;width:280px}
#stage-select .stage-info h3{font-size:18px;margin-bottom:8px;color:#fff}
#stage-select .stage-info p{font-size:13px;color:#aaa;line-height:1.7}
#stage-select .start-btn{margin-top:16px;padding:12px 40px;border:2px solid #FFD54F;border-radius:10px;background:rgba(60,50,10,0.9);font-size:15px;cursor:pointer;color:#FFD54F}
#stage-select .start-btn:active{background:#FFD54F;color:#1a1a1a}
#stage-select .back-btn{margin-top:12px;padding:8px 24px;border:1px solid #555;border-radius:8px;background:#222;font-size:13px;cursor:pointer;color:#888}

#overlay .box button{padding:10px 28px;border:2px solid #FFD54F;border-radius:10px;background:rgba(60,50,10,0.9);font-size:14px;cursor:pointer;margin:4px;color:#FFD54F}
#overlay .box button:active{background:#FFD54F;color:#1a1a1a}
#overlay .box button.secondary{border-color:#555;color:#888;background:#222}

<script>
(function(){
"use strict";
const $ = id => document.getElementById(id);
const canvas = $('c');
const ctx = canvas.getContext('2d');

// ---- Audio ----
let audioCtx = null;
function initAudio(){ if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }
function playTone(freq, dur, type, vol){
  if(!audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type||'sine';
  o.frequency.value = freq;
  g.gain.value = vol||0.15;
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime+dur);
}
function sfxConnect(){ playTone(880,0.12,'sine',0.12); setTimeout(()=>playTone(1100,0.15,'sine',0.1),80); }
function sfxPowerOn(){
  playTone(440,0.1,'sine',0.15);
  setTimeout(()=>playTone(660,0.1,'sine',0.15),100);
  setTimeout(()=>playTone(880,0.15,'sine',0.2),200);
}
function sfxPlantStart(){
  playTone(100,0.3,'sawtooth',0.1);
  setTimeout(()=>playTone(200,0.3,'sawtooth',0.12),200);
  setTimeout(()=>playTone(400,0.4,'sine',0.15),400);
}
function sfxAlarm(){
  playTone(800,0.15,'square',0.12);
  setTimeout(()=>playTone(600,0.15,'square',0.12),150);
}
function sfxBeep(){
  playTone(1000,0.08,'sine',0.06);
}
function sfxClear(){
  playTone(523,0.15,'sine',0.12);
  setTimeout(()=>playTone(659,0.15,'sine',0.12),120);
  setTimeout(()=>playTone(784,0.15,'sine',0.12),240);
  setTimeout(()=>playTone(1047,0.3,'sine',0.15),360);
}
function sfxQuake(){
  for(let i=0;i<6;i++){
    setTimeout(()=>playTone(60+Math.random()*80,0.15,'sawtooth',0.15-i*0.02),i*80);
  }
}
function sfxSnap(){
  playTone(200,0.2,'sawtooth',0.15);
  setTimeout(()=>playTone(100,0.3,'sawtooth',0.1),100);
}
function sfxFullRestore(){
  for(let i=0;i<5;i++){
    setTimeout(()=>playTone(440+i*110,0.2,'sine',0.1),i*100);
  }
  setTimeout(()=>playTone(1320,0.5,'sine',0.2),500);
}

// ---- Constants ----
const GRID = 40;
const TOPBAR_H = 48;

// Facility types
const FTYPES = {
  plant:   {label:'発電所', icon:'🏭', baseColor:'#FF6D00', litColor:'#FFB300', scores:0, priority:99},
  hospital:{label:'病院',   icon:'🏥', baseColor:'#E53935', litColor:'#EF5350', scores:500, priority:1},
  signal:  {label:'信号',   icon:'🚦', baseColor:'#F9A825', litColor:'#FFD600', scores:300, priority:2},
  house:   {label:'住宅',   icon:'🏠', baseColor:'#388E3C', litColor:'#66BB6A', scores:100, priority:3},
  factory: {label:'工場',   icon:'🏭', baseColor:'#1565C0', litColor:'#42A5F5', scores:200, priority:4}
};

// ---- Game State ----
let state = 'title';
let currentStageIdx = 0;
let facilities = [];
let lines = [];     // {from, to, id}
let mapW = 600, mapH = 400;
let camX = 0, camY = 0;
let timeLeft = 90;
let material = 500; // distance units remaining
let score = 0;
let gameOver = false;
let gameClear = false;
let dragLine = null; // {fromId, wx, wy}
let flowParticles = [];
let lightUpEffects = []; // {x, y, radius, alpha, maxRadius}
let quakeEffects = []; // {t, duration}
let quakeShakeX = 0, quakeShakeY = 0;
let hospitalBeepTimer = 0;
let lineIdCounter = 0;

// Plant activation
// Each plant: activated (bool), activating (bool), activateProgress (0-3s)

// ---- Stages ----
const STAGES = [
  {
    name:'ステージ1「病院を救え」',
    desc:'病院の非常電源が切れそうだ！急げ！',
    mapW:600, mapH:400,
    material:500, time:90,
    facilities:[
      {type:'plant', gx:2, gy:5},
      {type:'hospital', gx:12, gy:3},
      {type:'house', gx:9, gy:7},
      {type:'house', gx:6, gy:2}
    ],
    quakes:[]
  },
  {
    name:'ステージ2「交差点の混乱」',
    desc:'信号が全滅…事故が起きる前に復旧しろ！',
    mapW:800, mapH:500,
    material:800, time:90,
    facilities:[
      {type:'plant', gx:2, gy:6},
      {type:'hospital', gx:17, gy:3},
      {type:'signal', gx:8, gy:3},
      {type:'signal', gx:12, gy:7},
      {type:'signal', gx:8, gy:10},
      {type:'house', gx:15, gy:9},
      {type:'house', gx:18, gy:7},
      {type:'house', gx:5, gy:10}
    ],
    quakes:[]
  },
  {
    name:'ステージ3「二つの発電所」',
    desc:'2つの発電所、どちらから起動する？',
    mapW:800, mapH:600,
    material:1000, time:120,
    facilities:[
      {type:'plant', gx:2, gy:4},
      {type:'plant', gx:2, gy:12},
      {type:'hospital', gx:6, gy:3},
      {type:'signal', gx:10, gy:6},
      {type:'signal', gx:10, gy:10},
      {type:'house', gx:14, gy:2},
      {type:'house', gx:14, gy:5},
      {type:'house', gx:14, gy:8},
      {type:'house', gx:14, gy:11},
      {type:'house', gx:14, gy:14},
      {type:'factory', gx:18, gy:4},
      {type:'factory', gx:18, gy:12}
    ],
    quakes:[]
  },
  {
    name:'ステージ4「余震」',
    desc:'余震注意！送電線が切れるかもしれない',
    mapW:1000, mapH:700,
    material:1200, time:120,
    facilities:[
      {type:'plant', gx:2, gy:5},
      {type:'plant', gx:2, gy:13},
      {type:'hospital', gx:8, gy:3},
      {type:'hospital', gx:18, gy:13},
      {type:'signal', gx:10, gy:8},
      {type:'signal', gx:14, gy:5},
      {type:'signal', gx:14, gy:12},
      {type:'house', gx:18, gy:2},
      {type:'house', gx:20, gy:5},
      {type:'house', gx:22, gy:8},
      {type:'house', gx:20, gy:11},
      {type:'house', gx:18, gy:15},
      {type:'house', gx:22, gy:14},
      {type:'factory', gx:6, gy:10},
      {type:'factory', gx:12, gy:15},

    ],
    quakes:[{at:30, count:1},{at:60, count:2}]
  },
  {
    name:'ステージ5「全市停電」',
    desc:'市全体が停電。全力で復旧せよ！',
    mapW:1200, mapH:800,
    material:2000, time:180,
    facilities:[
      {type:'plant', gx:2, gy:5},
      {type:'plant', gx:2, gy:15},
      {type:'plant', gx:15, gy:10},
      {type:'hospital', gx:8, gy:3},
      {type:'hospital', gx:20, gy:8},
      {type:'hospital', gx:12, gy:17},
      {type:'signal', gx:7, gy:7},
      {type:'signal', gx:12, gy:5},
      {type:'signal', gx:18, gy:4},
      {type:'signal', gx:22, gy:12},
      {type:'signal', gx:10, gy:13},
      {type:'house', gx:10, gy:2},
      {type:'house', gx:14, gy:2},
      {type:'house', gx:22, gy:3},
      {type:'house', gx:25, gy:6},
      {type:'house', gx:25, gy:10},
      {type:'house', gx:25, gy:14},
      {type:'house', gx:20, gy:16},
      {type:'house', gx:16, gy:18},
      {type:'house', gx:8, gy:18},
      {type:'house', gx:4, gy:18},
      {type:'factory', gx:6, gy:12},
      {type:'factory', gx:16, gy:7},
      {type:'factory', gx:22, gy:17},
      {type:'factory', gx:28, gy:8},
      {type:'factory', gx:28, gy:14}
    ],
    quakes:[]
  }
];

// ---- Resize ----
function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// ---- Utility ----
function facilityAt(gx,gy){
  return facilities.find(f=> Math.abs(f.gx-gx)<=1 && Math.abs(f.gy-gy)<=1);
}
function screenToWorld(sx,sy){
  return {wx: sx+camX, wy: sy+camY-TOPBAR_H};
}
function worldToGrid(wx,wy){
  return {gx: Math.round(wx/GRID), gy: Math.round(wy/GRID)};
}
function gridDist(a,b){
  // Manhattan distance in pixels
  return (Math.abs(a.gx-b.gx)+Math.abs(a.gy-b.gy))*GRID;
}
function lineDist(line){
  let fa = facilities.find(x=>x.id===line.from);
  let fb = facilities.find(x=>x.id===line.to);
  if(!fa||!fb) return 0;
  return gridDist(fa,fb);
}

// ---- Setup ----
function loadStage(idx){
  const s = STAGES[idx];
  facilities = [];
  lines = [];
  flowParticles = [];
  lightUpEffects = [];
  quakeEffects = [];
  quakeShakeX = 0; quakeShakeY = 0;
  mapW = s.mapW; mapH = s.mapH;
  material = s.material;
  timeLeft = s.time;
  score = 0;
  gameOver = false;
  gameClear = false;
  dragLine = null;
  lineIdCounter = 0;
  hospitalBeepTimer = 0;

  s.facilities.forEach((fd,i)=>{
    const ft = FTYPES[fd.type];
    facilities.push({
      id:i, type:fd.type, gx:fd.gx, gy:fd.gy,
      label:ft.label, icon:ft.icon,
      baseColor:ft.baseColor, litColor:ft.litColor,
      scores:ft.scores, priority:ft.priority,
      powered:false,
      // plant specific
      activated: false,
      activating: false,
      activateProgress: 0,
      // visual
      lightAlpha: 0, // 0=dark, 1=lit
      glowPulse: 0
    });
  });

  camX = Math.max(0,(mapW - canvas.width)/2);
  camY = Math.max(0,(mapH - canvas.height + TOPBAR_H)/2);
}

// ---- Power Check ----
function recalcPower(){
  // BFS from each activated plant
  let adj = {};
  facilities.forEach(f=>{ adj[f.id]=[]; });
  lines.forEach(l=>{
    adj[l.from].push(l.to);
    adj[l.to].push(l.from);
  });

  // Reset powered state for non-plants
  facilities.forEach(f=>{
    if(f.type!=='plant') f.powered = false;
  });

  facilities.filter(f=>f.type==='plant' && f.activated).forEach(plant=>{
    let visited = new Set([plant.id]);
    let queue = [plant.id];
    while(queue.length){
      let cur = queue.shift();
      let cf = facilities.find(x=>x.id===cur);
      if(cf && cf.type!=='plant' && !cf.powered){
        cf.powered = true;
        // Trigger light-up effect
        if(cf.lightAlpha < 0.1){
          lightUpEffects.push({
            x: cf.gx*GRID, y: cf.gy*GRID,
            radius:0, alpha:1, maxRadius:60
          });
          sfxPowerOn();
          score += cf.scores;
        }
      }
      (adj[cur]||[]).forEach(nb=>{
        if(!visited.has(nb)){
          visited.add(nb);
          queue.push(nb);
        }
      });
    }
  });
}

// ---- Quake Logic ----
function triggerQuake(count){
  sfxQuake();
  quakeEffects.push({t:0, duration:1.0});
  // Cut random lines
  let cut = 0;
  let shuffled = [...lines].sort(()=>Math.random()-0.5);
  for(let i=0; i<shuffled.length && cut<count; i++){
    let line = shuffled[i];
    // Remove this line
    lines = lines.filter(l=>l.id !== line.id);
    // Refund nothing - material is lost
    sfxSnap();
    cut++;
  }
  // Recalculate power
  recalcPower();
}

// ---- Check Stage Complete ----
function checkComplete(){
  if(gameOver || gameClear) return;
  let allNonPlant = facilities.filter(f=>f.type!=='plant');
  if(allNonPlant.length === 0) return;
  if(allNonPlant.every(f=>f.powered)){
    gameClear = true;
    sfxFullRestore();
    // Calculate score
    let timeBonus = Math.floor(timeLeft) * 10;
    let perfectBonus = 1000;
    let materialUsed = STAGES[currentStageIdx].material - material;
    let materialBonus = Math.floor(material) * 50;
    let totalAdd = timeBonus + perfectBonus + materialBonus;
    score += totalAdd;

    // Full city light-up
    lightUpEffects.push({
      x: mapW/2, y: mapH/2,
      radius:0, alpha:0.8, maxRadius: Math.max(mapW,mapH)
    });

    setTimeout(()=>{
      let detail = `施設復旧: ${score - totalAdd}点\n残り時間ボーナス: +${timeBonus}点\nパーフェクトボーナス: +${perfectBonus}点\n資材効率ボーナス: +${materialBonus}点\n──────────\n合計: ${score}点`;
      showOverlay('🎉 復旧完了！','街に明かりが戻った！',detail,
        currentStageIdx<STAGES.length-1?'次のステージ':'タイトルへ',
        ()=>{
          if(currentStageIdx<STAGES.length-1){currentStageIdx++;loadStage(currentStageIdx);goPlaying();}
          else goTitle();
          hideOverlay();
        },
        'タイトルへ',()=>{goTitle();hideOverlay();}
      );
    }, 800);
  }
}

function checkTimeUp(){
  if(gameOver || gameClear) return;
  if(timeLeft <= 0){
    timeLeft = 0;
    gameOver = true;
    sfxAlarm();
    let restored = facilities.filter(f=>f.type!=='plant'&&f.powered).length;
    let total = facilities.filter(f=>f.type!=='plant').length;
    // time bonus 0
    showOverlay('⏱ 時間切れ！',`復旧: ${restored}/${total}施設\nスコア: ${score}点`,null,
      'リトライ',()=>{loadStage(currentStageIdx);goPlaying();hideOverlay();},
      'タイトルへ',()=>{goTitle();hideOverlay();}
    );
  }
}

// ---- Drawing ----
function drawCitySilhouette(ctx, w, h){
  // Dark city background for title
  ctx.fillStyle = '#222';
  ctx.fillRect(0, h*0.5, w, h*0.5);
  // Buildings
  let bx = 0;
  let seed = 42;
  function rand(){ seed=(seed*16807)%2147483647; return (seed-1)/2147483646; }
  while(bx < w){
    let bw = 20 + rand()*40;
    let bh = 40 + rand()*120;
    ctx.fillStyle = `rgba(30,30,30,${0.6+rand()*0.4})`;
    ctx.fillRect(bx, h-bh, bw, bh);
    // Random dim windows
    for(let wy=h-bh+8;wy<h-8;wy+=14){
      for(let wx=bx+4;wx<bx+bw-4;wx+=10){
        if(rand()>0.85){
          ctx.fillStyle = `rgba(255,200,50,${0.05+rand()*0.1})`;
          ctx.fillRect(wx,wy,5,6);
        }
      }
    }
    bx += bw + 2 + rand()*8;
  }
}

function draw(time){
  const W=canvas.width, H=canvas.height;
  ctx.clearRect(0,0,W,H);

  if(state==='title'){
    // Dark background
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(0,0,W,H);
    drawCitySilhouette(ctx, W, H);
    return;
  }
  if(state==='stageselect') return;

  // ---- Playing state ----
  // Background - dark city
  ctx.fillStyle = '#2A2A2A';
  ctx.fillRect(0,0,W,H);

  ctx.save();
  ctx.translate(-camX + quakeShakeX, -camY + TOPBAR_H + quakeShakeY);

  // Subtle grid
  ctx.fillStyle = 'rgba(255,255,255,0.03)';
  let startGX = Math.floor(camX/GRID)*GRID;
  let startGY = Math.floor((camY-TOPBAR_H)/GRID)*GRID;
  for(let x=startGX; x<=camX+W; x+=GRID){
    for(let y=startGY; y<=camY+H; y+=GRID){
      ctx.beginPath();
      ctx.arc(x,y,1,0,Math.PI*2);
      ctx.fill();
    }
  }

  // Draw road hints (faint lines between grid points)
  ctx.strokeStyle = 'rgba(255,255,255,0.02)';
  ctx.lineWidth = 1;
  // Horizontal roads
  for(let y=0;y<=mapH;y+=GRID*3){
    ctx.beginPath();
    ctx.moveTo(0,y);
    ctx.lineTo(mapW,y);
    ctx.stroke();
  }
  // Vertical roads
  for(let x=0;x<=mapW;x+=GRID*3){
    ctx.beginPath();
    ctx.moveTo(x,0);
    ctx.lineTo(x,mapH);
    ctx.stroke();
  }

  // ---- Draw power lines ----
  lines.forEach(l=>{
    let fa = facilities.find(x=>x.id===l.from);
    let fb = facilities.find(x=>x.id===l.to);
    if(!fa||!fb) return;
    let x1=fa.gx*GRID, y1=fa.gy*GRID;
    let x2=fb.gx*GRID, y2=fb.gy*GRID;
    let mx=x2, my=y1;

    // Check if this line is energized
    let energized = (fa.type==='plant'&&fa.activated) || (fb.type==='plant'&&fb.activated) ||
                    (fa.powered) || (fb.powered);

    if(energized){
      // Glow
      ctx.strokeStyle = 'rgba(255,180,0,0.15)';
      ctx.lineWidth = 10;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.beginPath();
      ctx.moveTo(x1,y1); ctx.lineTo(mx,my); ctx.lineTo(x2,y2);
      ctx.stroke();

      // Main line
      ctx.strokeStyle = '#FFB300';
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(x1,y1); ctx.lineTo(mx,my); ctx.lineTo(x2,y2);
      ctx.stroke();
    } else {
      ctx.strokeStyle = 'rgba(255,255,255,0.12)';
      ctx.lineWidth = 3;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.beginPath();
      ctx.moveTo(x1,y1); ctx.lineTo(mx,my); ctx.lineTo(x2,y2);
      ctx.stroke();
    }
  });

  // ---- Draw drag line ----
  if(dragLine){
    let fa = facilities.find(x=>x.id===dragLine.fromId);
    if(fa){
      let x1=fa.gx*GRID, y1=fa.gy*GRID;
      let x2=dragLine.wx, y2=dragLine.wy;
      let mx=x2, my=y1;

      // Calculate distance for preview
      let previewDist = Math.abs(x2-x1)+Math.abs(y2-y1);
      let canAfford = previewDist <= material;

      ctx.strokeStyle = canAfford ? 'rgba(255,213,79,0.5)' : 'rgba(239,83,80,0.5)';
      ctx.lineWidth = 4;
      ctx.lineCap = 'round';
      ctx.setLineDash([8,6]);
      ctx.beginPath();
      ctx.moveTo(x1,y1); ctx.lineTo(mx,my); ctx.lineTo(x2,y2);
      ctx.stroke();
      ctx.setLineDash([]);

      // Distance label
      ctx.font = '11px system-ui';
      ctx.fillStyle = canAfford ? '#FFD54F' : '#EF5350';
      ctx.textAlign = 'center';
      ctx.fillText(Math.round(previewDist)+'m', (x1+x2)/2, Math.min(y1,y2)-10);
    }
  }

  // ---- Flow particles ----
  flowParticles.forEach(p=>{
    let x1=p.x1, y1=p.y1, x2=p.x2, y2=p.y2;
    let mx=x2, my=y1;
    let hLen = Math.abs(x2-x1);
    let vLen = Math.abs(y2-y1);
    let totalLen = hLen+vLen;
    if(totalLen<1) return;
    let pos = p.t * totalLen;
    let px, py;
    if(pos <= hLen){
      let r = hLen>0 ? pos/hLen : 0;
      px = x1 + (mx-x1)*r;
      py = y1;
    } else {
      px = mx;
      let r = vLen>0 ? (pos-hLen)/vLen : 0;
      py = my + (y2-my)*r;
    }
    ctx.fillStyle = '#FFD600';
    ctx.shadowColor = '#FFD600';
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(px,py,2.5,0,Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
  });

  // ---- Draw facilities ----
  facilities.forEach(f=>{
    let x=f.gx*GRID, y=f.gy*GRID;
    let lit = (f.type==='plant') ? f.activated : f.powered;
    let alpha = lit ? 1.0 : 0.3;
    let t = time/1000;

    // Glow for lit facilities
    if(lit && f.lightAlpha > 0.5){
      let glowR = 30 + Math.sin(t*2+f.id)*5;
      let grad = ctx.createRadialGradient(x,y,0, x,y,glowR);
      grad.addColorStop(0, f.litColor+'40');
      grad.addColorStop(1, f.litColor+'00');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(x,y,glowR,0,Math.PI*2);
      ctx.fill();
    }

    // Blinking for unpowered hospitals/signals
    if(!lit && f.type==='hospital'){
      let blink = Math.sin(t*Math.PI*4) > 0;
      if(blink){
        let grad = ctx.createRadialGradient(x,y,0, x,y,25);
        grad.addColorStop(0, 'rgba(229,57,53,0.3)');
        grad.addColorStop(1, 'rgba(229,57,53,0)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(x,y,25,0,Math.PI*2);
        ctx.fill();
      }
    }
    if(!lit && f.type==='signal'){
      let blink = Math.sin(t*Math.PI*3) > 0;
      if(blink){
        let grad = ctx.createRadialGradient(x,y,0, x,y,20);
        grad.addColorStop(0, 'rgba(249,168,37,0.25)');
        grad.addColorStop(1, 'rgba(249,168,37,0)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(x,y,20,0,Math.PI*2);
        ctx.fill();
      }
    }

    ctx.globalAlpha = alpha;

    if(f.type === 'plant'){
      // Square shape for plants
      let size = 22;
      ctx.fillStyle = lit ? f.litColor+'50' : f.baseColor+'20';
      ctx.strokeStyle = lit ? f.litColor : f.baseColor+'60';
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.roundRect(x-size, y-size, size*2, size*2, 6);
      ctx.fill(); ctx.stroke();

      // Activation progress ring
      if(f.activating){
        let prog = f.activateProgress / 3.0;
        ctx.strokeStyle = '#FFD54F';
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.arc(x, y, size+4, -Math.PI/2, -Math.PI/2 + Math.PI*2*prog);
        ctx.stroke();
      }

      // Icon
      ctx.globalAlpha = lit ? 1 : 0.4;
      ctx.font = '20px system-ui';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = '#fff';
      ctx.fillText(lit ? '⚡' : '🔥', x, y);

      if(lit){
        // Label
        ctx.font = 'bold 10px system-ui';
        ctx.fillStyle = '#FFD54F';
        ctx.fillText('稼働中', x, y+size+12);
      } else if(!f.activating){
        ctx.font = '10px system-ui';
        ctx.fillStyle = '#888';
        ctx.fillText('タップで起動', x, y+size+12);
      }
    } else {
      // Circle shape for demand facilities
      let r = 18;
      ctx.fillStyle = lit ? f.litColor+'40' : f.baseColor+'15';
      ctx.strokeStyle = lit ? f.litColor : f.baseColor+'40';
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.arc(x,y,r,0,Math.PI*2);
      ctx.fill(); ctx.stroke();

      // Windows for lit houses
      if(lit && f.type==='house'){
        ctx.fillStyle = '#FFD600';
        ctx.globalAlpha = 0.7 + Math.sin(t*1.5+f.id)*0.15;
        ctx.fillRect(x-6, y-4, 4, 4);
        ctx.fillRect(x+2, y-4, 4, 4);
        ctx.fillRect(x-2, y+2, 4, 4);
      }

      // Icon
      ctx.globalAlpha = lit ? 1 : 0.35;
      ctx.font = '16px system-ui';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = '#fff';
      ctx.fillText(f.icon, x, y);

      // Label
      ctx.globalAlpha = 0.6;
      ctx.font = '9px system-ui';
      ctx.fillStyle = lit ? f.litColor : '#666';
      ctx.fillText(f.label, x, y+r+10);
    }
    ctx.globalAlpha = 1;
  });

  // ---- Light-up effects ----
  lightUpEffects.forEach(e=>{
    if(e.alpha > 0.01){
      let grad = ctx.createRadialGradient(e.x,e.y,0, e.x,e.y,e.radius);
      grad.addColorStop(0, `rgba(255,213,79,${e.alpha*0.3})`);
      grad.addColorStop(0.7, `rgba(255,213,79,${e.alpha*0.1})`);
      grad.addColorStop(1, `rgba(255,213,79,0)`);
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(e.x,e.y,e.radius,0,Math.PI*2);
      ctx.fill();
    }
  });

  ctx.restore();

  // ---- Top bar update ----
  let tw = timeLeft <= 10;
  $('timeInfo').textContent = '⏱ ' + Math.ceil(Math.max(0,timeLeft));
  $('timeInfo').className = tw ? 'time-warn' : '';
  $('materialInfo').textContent = '🔌 ' + Math.round(material) + 'm';
  $('scoreInfo').textContent = '💰 ' + score;
}

// ---- Game Loop ----
let lastTime = 0;
let quakeTimers = [];
function gameLoop(ts){
  let dt = Math.min((ts-lastTime)/1000, 0.05);
  lastTime = ts;

  if(state==='playing' && !gameOver && !gameClear){
    // Timer
    timeLeft -= dt;
    checkTimeUp();

    // Plant activation
    facilities.filter(f=>f.type==='plant'&&f.activating).forEach(f=>{
      f.activateProgress += dt;
      if(f.activateProgress >= 3.0){
        f.activating = false;
        f.activated = true;
        f.lightAlpha = 1;
        sfxPlantStart();
        lightUpEffects.push({
          x:f.gx*GRID, y:f.gy*GRID,
          radius:0, alpha:1, maxRadius:80
        });
        recalcPower();
        checkComplete();
      }
    });

    // Light alpha transitions
    facilities.forEach(f=>{
      let target = (f.type==='plant' ? f.activated : f.powered) ? 1 : 0;
      f.lightAlpha += (target - f.lightAlpha) * dt * 5;
    });

    // Update flow particles
    flowParticles = flowParticles.filter(p=>p.t<1);
    lines.forEach(l=>{
      let fa = facilities.find(x=>x.id===l.from);
      let fb = facilities.find(x=>x.id===l.to);
      if(!fa||!fb) return;
      let energized = (fa.type==='plant'&&fa.activated)||(fb.type==='plant'&&fb.activated)||fa.powered||fb.powered;
      if(!energized) return;
      if(Math.random()<dt*3){
        let x1=fa.gx*GRID, y1=fa.gy*GRID;
        let x2=fb.gx*GRID, y2=fb.gy*GRID;
        // Direction: from plant/powered toward unpowered
        let swap = (fb.type==='plant'&&fb.activated) || (fb.powered&&!fa.powered);
        if(swap){ [x1,x2]=[x2,x1]; [y1,y2]=[y2,y1]; }
        flowParticles.push({x1,y1,x2,y2, t:0});
      }
    });
    flowParticles.forEach(p=>{ p.t += dt*1.5; });

    // Update light-up effects
    lightUpEffects.forEach(e=>{
      e.radius += dt * 120;
      if(e.radius > e.maxRadius * 0.5) e.alpha -= dt * 2;
    });
    lightUpEffects = lightUpEffects.filter(e=>e.alpha>0.01);

    // Quake effects
    quakeEffects.forEach(e=>{ e.t += dt; });
    quakeEffects = quakeEffects.filter(e=>e.t < e.duration);
    if(quakeEffects.length > 0){
      quakeShakeX = (Math.random()-0.5)*10;
      quakeShakeY = (Math.random()-0.5)*10;
    } else {
      quakeShakeX *= 0.9;
      quakeShakeY *= 0.9;
    }

    // Quake triggers
    let elapsed = STAGES[currentStageIdx].time - timeLeft;
    let stageQuakes = STAGES[currentStageIdx].quakes;
    stageQuakes.forEach((q,i)=>{
      if(!quakeTimers[i] && elapsed >= q.at){
        quakeTimers[i] = true;
        triggerQuake(q.count);
      }
    });

    // Hospital beep
    hospitalBeepTimer += dt;
    if(hospitalBeepTimer > 1.5){
      hospitalBeepTimer = 0;
      let unpoweredHospital = facilities.find(f=>f.type==='hospital'&&!f.powered);
      if(unpoweredHospital) sfxBeep();
    }
  }

  draw(ts);
  requestAnimationFrame(gameLoop);
}

// ---- Overlay ----
function showOverlay(title,text,scoreDetail,btn1Text,btn1Fn,btn2Text,btn2Fn){
  $('overlay').style.display='flex';
  $('ovTitle').textContent=title;
  $('ovText').textContent=text;
  if(scoreDetail){
    $('ovScore').style.display='block';
    $('ovScore').textContent=scoreDetail;
  } else {
    $('ovScore').style.display='none';
  }
  $('ovBtn1').textContent=btn1Text;
  $('ovBtn1').onclick=btn1Fn;
  if(btn2Text){
    $('ovBtn2').style.display='inline-block';
    $('ovBtn2').textContent=btn2Text;
    $('ovBtn2').onclick=btn2Fn;
  } else {
    $('ovBtn2').style.display='none';
  }
}
function hideOverlay(){ $('overlay').style.display='none'; }

// ---- Navigation ----
function goTitle(){
  state='title';
  $('title-screen').style.display='flex';
  $('stage-select').style.display='none';
  $('topbar').style.display='none';
  hideOverlay();
}
function goStageSelect(){
  state='stageselect';
  $('title-screen').style.display='none';
  $('stage-select').style.display='flex';
  updateStageSelect();
}
function updateStageSelect(){
  let s = STAGES[currentStageIdx];
  $('ssTitle').textContent = s.name;
  $('ssDesc').textContent = s.desc + '\n\n⏱ '+s.time+'秒  🔌 '+s.material+'m';
}
function goPlaying(){
  state='playing';
  $('title-screen').style.display='none';
  $('stage-select').style.display='none';
  $('topbar').style.display='flex';
  $('stageName').textContent = STAGES[currentStageIdx].name;
  quakeTimers = [];
  hideOverlay();

  // Show stage intro overlay
  let s = STAGES[currentStageIdx];
  showOverlay('⚡ '+s.name, s.desc, null, 'スタート', ()=>{
    hideOverlay();
    // Pause until start (timeLeft paused in overlay)
  });
  // Actually pause timer until overlay dismissed
  gameOver = true; // hack: pause timer
  let origFn = $('ovBtn1').onclick;
  $('ovBtn1').onclick = ()=>{ gameOver=false; origFn(); };
}

// ---- Input ----
let pointerDown = false;
let pointerStartX=0, pointerStartY=0;
let isPan = false;
let panStartCamX=0, panStartCamY=0;
let pointerMoved = false;

function getPos(e){
  let t = e.touches ? e.touches[0] : e;
  return {x:t.clientX, y:t.clientY};
}

function onPointerDown(e){
  if(state!=='playing') return;
  initAudio();
  let pos = getPos(e);
  pointerDown = true;
  pointerStartX = pos.x;
  pointerStartY = pos.y;
  isPan = false;
  pointerMoved = false;
  panStartCamX = camX;
  panStartCamY = camY;

  let {wx,wy} = screenToWorld(pos.x,pos.y);
  let {gx,gy} = worldToGrid(wx,wy);
  let f = facilityAt(gx,gy);

  if(f && !gameOver && !gameClear){
    // Start plant activation on tap
    if(f.type==='plant' && !f.activated && !f.activating){
      f.activating = true;
      f.activateProgress = 0;
      return;
    }
    // Start dragging line from activated plant or powered facility
    if((f.type==='plant' && f.activated) || f.powered){
      dragLine = {fromId:f.id, wx:wx, wy:wy};
      return;
    }
  }
}

function onPointerMove(e){
  if(!pointerDown||state!=='playing') return;
  let pos = getPos(e);
  let dx = pos.x - pointerStartX;
  let dy = pos.y - pointerStartY;

  if(dragLine){
    let {wx,wy} = screenToWorld(pos.x,pos.y);
    dragLine.wx = wx;
    dragLine.wy = wy;
    pointerMoved = true;
    return;
  }

  if(Math.abs(dx)>8||Math.abs(dy)>8){
    isPan = true;
    pointerMoved = true;
  }
  if(isPan){
    camX = panStartCamX - dx;
    camY = panStartCamY - dy;
    camX = Math.max(0, Math.min(camX, Math.max(0, mapW-canvas.width)));
    camY = Math.max(0, Math.min(camY, Math.max(0, mapH-canvas.height+TOPBAR_H)));
  }
}

function onPointerUp(e){
  if(state!=='playing'){pointerDown=false;return;}

  if(dragLine){
    let pos = e.changedTouches ? e.changedTouches[0] : e;
    let {wx,wy} = screenToWorld(pos.clientX,pos.clientY);
    let {gx,gy} = worldToGrid(wx,wy);
    let target = facilityAt(gx,gy);
    if(target && target.id!==dragLine.fromId){
      // Check no duplicate
      let dup = lines.some(l=>(l.from===dragLine.fromId&&l.to===target.id)||(l.from===target.id&&l.to===dragLine.fromId));
      if(!dup){
        let fromF = facilities.find(x=>x.id===dragLine.fromId);
        let cost = gridDist(fromF, target);
        if(cost <= material){
          material -= cost;
          lines.push({from:dragLine.fromId, to:target.id, id:lineIdCounter++});
          sfxConnect();
          recalcPower();
          checkComplete();
        } else {
          sfxAlarm();
        }
      }
    }
    dragLine = null;
  }
  pointerDown = false;
}

// Event listeners
canvas.addEventListener('mousedown', onPointerDown);
canvas.addEventListener('mousemove', onPointerMove);
canvas.addEventListener('mouseup', onPointerUp);
canvas.addEventListener('touchstart', e=>{e.preventDefault();onPointerDown(e);},{passive:false});
canvas.addEventListener('touchmove', e=>{e.preventDefault();onPointerMove(e);},{passive:false});
canvas.addEventListener('touchend', e=>{e.preventDefault();onPointerUp(e);},{passive:false});

// Prevent context menu
canvas.addEventListener('contextmenu', e=>e.preventDefault());

// Buttons
$('btnStart').onclick = ()=>{ initAudio(); goStageSelect(); };
$('btnPrevStage').onclick = ()=>{ currentStageIdx = (currentStageIdx-1+STAGES.length)%STAGES.length; updateStageSelect(); };
$('btnNextStage').onclick = ()=>{ currentStageIdx = (currentStageIdx+1)%STAGES.length; updateStageSelect(); };
$('btnStartStage').onclick = ()=>{
  initAudio();
  loadStage(currentStageIdx);
  goPlaying();
};
$('btnBackFromStage').onclick = ()=> goTitle();

// Start
goTitle();
requestAnimationFrame(gameLoop);
})();
</script>
