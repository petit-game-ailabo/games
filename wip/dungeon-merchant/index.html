<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ダンジョン商人</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1510;color:#e8dcc8;font-family:'Helvetica Neue',Arial,sans-serif;display:flex;justify-content:center;min-height:100vh}
#game{width:460px;max-width:100vw;padding:8px;user-select:none}

.top-bar{display:flex;justify-content:space-between;align-items:center;background:#2a2318;border-radius:8px;padding:8px 10px;margin-bottom:6px;font-size:11px}
.gold{font-size:15px;color:#ffd700;font-weight:bold}

.tabs{display:flex;gap:2px;margin-bottom:6px}
.tab{flex:1;padding:8px 2px;text-align:center;background:#2a2318;border:1px solid #3a3020;border-radius:6px 6px 0 0;cursor:pointer;font-size:10px;color:#8a7a60;transition:all 0.15s}
.tab.active{background:#3a3020;color:#f0d890;font-weight:bold}
.tc{display:none}.tc.active{display:block}

.panel{background:#2a2318;border:1px solid #3a3020;border-radius:8px;padding:10px;margin-bottom:6px}
.panel-title{font-size:12px;color:#c0a870;font-weight:bold;margin-bottom:8px;border-bottom:1px solid #3a3020;padding-bottom:4px}

.btn{padding:8px 14px;border-radius:6px;border:none;font-size:11px;font-weight:bold;cursor:pointer;transition:all 0.15s}
.btn:hover:not(:disabled){filter:brightness(1.2)}.btn:active:not(:disabled){transform:scale(0.95)}
.btn:disabled{opacity:0.3;cursor:default}
.btn-primary{background:#8b6914;color:#fff}
.btn-green{background:#2e7d32;color:#fff}
.btn-red{background:#c62828;color:#fff}
.btn-orange{background:#e65100;color:#fff}
.btn-sm{padding:5px 10px;font-size:10px}
.btn-full{width:100%;padding:10px;font-size:13px}

.quest-step{margin-bottom:8px}
.quest-step-label{font-size:11px;color:#c0a870;margin-bottom:4px;font-weight:bold}
.option-grid{display:flex;flex-wrap:wrap;gap:4px}
.option-btn{padding:6px 10px;border-radius:6px;border:2px solid #3a3020;background:#1a1510;color:#e8dcc8;font-size:10px;cursor:pointer;transition:all 0.15s}
.option-btn:hover{border-color:#8a7a60}
.option-btn.selected{border-color:#ffd700;background:#3a3020;color:#ffd700}

.price-row{display:flex;align-items:center;gap:8px;margin-top:6px}
.price-input{background:#1a1510;border:1px solid #3a3020;border-radius:4px;color:#ffd700;font-size:14px;width:70px;padding:4px 8px;text-align:center;font-weight:bold}
.price-indicator{font-size:11px;font-weight:bold;margin-top:2px}
.pi-fast{color:#4caf50}.pi-normal{color:#ffd700}.pi-slow{color:#ff9800}.pi-unlikely{color:#f44336}

.quest-list{display:flex;flex-direction:column;gap:4px}
.quest-card{background:#1a1510;border:1px solid #3a3020;border-radius:6px;padding:8px}
.quest-top{display:flex;justify-content:space-between;align-items:center}
.quest-name{font-size:12px;font-weight:bold}
.quest-status{font-size:9px;padding:2px 6px;border-radius:4px}
.qs-posted{background:#1a3a5a;color:#64b5f6}
.qs-active{background:#1a4a1a;color:#81c784}
.qs-done{background:#3a3020;color:#ffd700}
.quest-detail{font-size:10px;color:#8a7a60;margin-top:3px}
.quest-reward{font-size:10px;color:#ffd700;margin-top:2px}

.facility-card{background:#1a1510;border:1px solid #3a3020;border-radius:8px;padding:10px;margin-bottom:6px}
.facility-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.facility-name{font-size:13px;font-weight:bold}
.facility-level{font-size:10px;color:#ffd700;padding:2px 6px;background:#3a3020;border-radius:4px}
.facility-stat{font-size:10px;color:#8a7a60;margin:2px 0}
.facility-income{font-size:11px;color:#4caf50;font-weight:bold}

.mat-grid{display:flex;flex-wrap:wrap;gap:4px}
.mat-item{background:#1a1510;border:1px solid #3a3020;border-radius:5px;padding:3px 7px;font-size:10px;display:inline-flex;align-items:center;gap:3px}
.mat-qty{color:#ffd700;font-weight:bold}

/* Farm */
.farm-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:8px}
.farm-plot{background:#1a1510;border:2px solid #3a3020;border-radius:8px;padding:10px;text-align:center;cursor:pointer;transition:all 0.15s;min-height:90px}
.farm-plot:hover{border-color:#6a8a40}
.farm-plot.empty{border-style:dashed}
.farm-plot.growing{border-color:#4caf50}
.farm-plot.ready{border-color:#ffd700;box-shadow:0 0 8px rgba(255,215,0,0.3)}
.farm-emoji{font-size:28px}
.farm-label{font-size:9px;color:#8a7a60;margin-top:3px}
.farm-progress{background:#333;border-radius:3px;height:6px;margin-top:4px;overflow:hidden}
.farm-progress-fill{height:100%;background:#4caf50;border-radius:3px;transition:width 0.3s}
.seed-grid{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.seed-btn{padding:5px 8px;border-radius:5px;border:1px solid #3a3020;background:#1a1510;color:#e8dcc8;font-size:9px;cursor:pointer;transition:all 0.15s}
.seed-btn:hover{border-color:#6a8a40}
.seed-btn:disabled{opacity:0.3;cursor:default}

.town-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:8px}
.town-stat{background:#1a1510;border:1px solid #3a3020;border-radius:6px;padding:6px;text-align:center}
.ts-val{font-size:16px;font-weight:bold;color:#ffd700}
.ts-label{font-size:8px;color:#8a7a60}

/* Cooking minigame */
.cook-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.92);display:flex;justify-content:center;align-items:center;z-index:90;flex-direction:column;padding:16px}
.cook-panel{background:#2a2318;border:2px solid #8b6914;border-radius:12px;padding:16px;width:400px;max-width:90vw;text-align:center}
.cook-title{font-size:16px;font-weight:bold;color:#ffd700;margin-bottom:10px}
.cook-meter{background:#333;border-radius:8px;height:30px;position:relative;overflow:hidden;margin:10px 0}
.cook-meter-fill{height:100%;border-radius:8px;transition:width 0.1s}
.cook-meter-zone{position:absolute;height:100%;background:rgba(76,175,80,0.3);border-left:2px solid #4caf50;border-right:2px solid #4caf50}
.cook-needle{position:absolute;top:0;width:3px;height:100%;background:#ff4444;transition:left 0.05s}
.cook-result{font-size:14px;font-weight:bold;margin:8px 0}
.cook-ingredients{display:flex;gap:4px;justify-content:center;flex-wrap:wrap;margin:8px 0}
.cook-ing{background:#1a1510;border:1px solid #3a3020;border-radius:4px;padding:3px 8px;font-size:10px}

.log{background:#1a1510;border:1px solid #3a3020;border-radius:6px;padding:6px;height:65px;overflow-y:auto;font-size:9px;line-height:1.4;color:#8a7a60;margin-top:6px}
.log .g{color:#ffd700}.log .q{color:#64b5f6}.log .a{color:#81c784}.log .f{color:#ce93d8}.log .w{color:#ff9800}.log .c{color:#ff8a65}

.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.92);display:flex;justify-content:center;align-items:center;z-index:100;flex-direction:column;padding:20px}
.overlay h2{font-size:22px;margin-bottom:10px;color:#ffd700}
.overlay p{font-size:12px;color:#8a7a60;margin-bottom:14px;text-align:center;line-height:1.8}
.overlay button{padding:12px 32px;border-radius:10px;border:none;background:#8b6914;color:#fff;font-size:15px;font-weight:bold;cursor:pointer;margin:4px}
.overlay button.secondary{background:#3a3020;color:#c0a870}
.hidden{display:none!important}
</style>
</head>
<body>

<div id="game">
  <div class="top-bar">
    <span class="gold">💰 <span id="gold">100</span>G</span>
    <span style="color:#c0a870">📅 Day <span id="dayNum">1</span></span>
    <span style="font-size:10px">👥 <span id="advInTown">0</span>人滞在</span>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('guild')">⚔️ ギルド</div>
    <div class="tab" onclick="switchTab('farm')">🌾 畑</div>
    <div class="tab" onclick="switchTab('facility')">🏨 施設</div>
    <div class="tab" onclick="switchTab('storage')">📦 倉庫</div>
    <div class="tab" onclick="switchTab('town')">🏘️ 町</div>
  </div>

  <div class="tc active" id="tab-guild">
    <div class="panel" id="questCreator">
      <div class="panel-title">📝 クエスト作成</div>
      <div class="quest-step"><div class="quest-step-label">① 種類</div><div class="option-grid" id="questTypeGrid"></div></div>
      <div class="quest-step" id="step2" style="display:none"><div class="quest-step-label">② 目標</div><div class="option-grid" id="questTargetGrid"></div></div>
      <div class="quest-step" id="step3" style="display:none">
        <div class="quest-step-label">③ 報酬額（掲載時に支払い）</div>
        <div class="price-row">
          <span>相場: <span id="marketPrice">0</span>G</span>
          <input type="number" class="price-input" id="priceInput" min="1" oninput="updatePriceIndicator()">
          <span>G</span>
        </div>
        <div class="price-indicator" id="priceIndicator"></div>
        <div style="margin-top:8px"><button class="btn btn-primary" onclick="postQuest()">📋 掲載する</button></div>
      </div>
    </div>
    <div class="panel"><div class="panel-title">📋 掲載中のクエスト</div><div class="quest-list" id="questBoard"></div></div>
  </div>

  <div class="tc" id="tab-farm">
    <div class="panel">
      <div class="panel-title">🌾 畑（タップで植える・収穫）</div>
      <div class="farm-grid" id="farmGrid"></div>
    </div>
    <div class="panel">
      <div class="panel-title">🌱 種を買う</div>
      <div class="seed-grid" id="seedShop"></div>
    </div>
  </div>

  <div class="tc" id="tab-facility">
    <div id="facilityList"></div>
    <div class="panel" id="buildPanel"><div class="panel-title">🏗️ 建設</div><div id="buildList"></div></div>
  </div>

  <div class="tc" id="tab-storage">
    <div class="panel"><div class="panel-title">📦 素材倉庫</div><div class="mat-grid" id="matGrid"></div></div>
  </div>

  <div class="tc" id="tab-town">
    <div class="town-grid" id="townGrid"></div>
    <div class="panel"><div class="panel-title">📊 経営レポート</div><div id="report"></div></div>
  </div>

  <button class="btn btn-primary btn-full" onclick="nextDay()" style="margin-top:6px">🌅 次の日へ</button>
  <div class="log" id="log"></div>
</div>

<!-- Start/Continue Screen -->
<div class="overlay" id="startScreen">
  <h2>🏘️ ダンジョン商人</h2>
  <p>辺境の町の管理者となり、<br>冒険者ギルドと施設を運営せよ。<br><br>
  <span style="font-size:11px;color:#ffab40">
  ⚔️ クエスト掲載時に報酬を前払い<br>
  🏨 施設で冒険者からお金を稼ぐ<br>
  🍳 食堂で調理ミニゲーム → 収入UP<br>
  📦 素材を集めて町を発展させる</span></p>
  <div id="startButtons">
    <button onclick="newGame()">はじめから</button>
  </div>
</div>

<!-- Cooking Overlay -->
<div class="cook-overlay hidden" id="cookOverlay">
  <div class="cook-panel">
    <div class="cook-title" id="cookTitle">🍳 調理中...</div>
    <div class="cook-ingredients" id="cookIngredients"></div>
    <div class="cook-meter" id="cookMeter">
      <div class="cook-meter-zone" id="cookZone"></div>
      <div class="cook-needle" id="cookNeedle" style="left:0%"></div>
    </div>
    <div style="font-size:10px;color:#8a7a60;margin:4px 0">タップでストップ！緑ゾーンで高品質</div>
    <div class="cook-result" id="cookResult"></div>
    <button class="btn btn-orange" id="cookBtn" onclick="cookAction()">🍳 ストップ！</button>
  </div>
</div>

<div class="overlay hidden" id="resultScreen">
  <h2 id="resultTitle"></h2>
  <p id="resultText"></p>
  <button onclick="newGame()">もう一度</button>
</div>

<script>
// === Data ===
const QUEST_TYPES=[
  {id:'mine',name:'鉱石採掘',emoji:'⛏️',baseCost:20,baseDays:3},
  {id:'herb',name:'薬草採取',emoji:'🌿',baseCost:15,baseDays:2},
  {id:'hunt',name:'モンスター討伐',emoji:'⚔️',baseCost:35,baseDays:4},
  {id:'explore',name:'遺跡探索',emoji:'🏛️',baseCost:50,baseDays:5},
  {id:'lumber',name:'伐採',emoji:'🪓',baseCost:12,baseDays:2},
  {id:'fish',name:'漁',emoji:'🎣',baseCost:10,baseDays:1},
];
const QUEST_TARGETS={
  mine:[
    {id:'iron',name:'鉄鉱石',emoji:'⛏️',mat:'iron',qty:[2,4],costMult:1.0},
    {id:'copper',name:'銅鉱石',emoji:'🟤',mat:'copper',qty:[3,5],costMult:0.8},
    {id:'silver',name:'銀鉱石',emoji:'⬜',mat:'silver',qty:[1,2],costMult:1.8},
    {id:'gold_ore',name:'金鉱石',emoji:'🟡',mat:'gold_ore',qty:[1,1],costMult:3.0},
    {id:'crystal',name:'魔石',emoji:'💎',mat:'crystal',qty:[1,2],costMult:2.5},
  ],
  herb:[
    {id:'herb_common',name:'薬草',emoji:'🌿',mat:'herb',qty:[3,6],costMult:1.0},
    {id:'mushroom',name:'キノコ',emoji:'🍄',mat:'mushroom',qty:[2,4],costMult:0.9},
    {id:'flower',name:'魔法花',emoji:'🌺',mat:'magic_flower',qty:[1,2],costMult:2.0},
    {id:'root',name:'霊草の根',emoji:'🌱',mat:'spirit_root',qty:[1,2],costMult:2.2},
  ],
  hunt:[
    {id:'wolf',name:'灰狼',emoji:'🐺',mat:'wolf_pelt',qty:[2,3],costMult:1.0},
    {id:'bear',name:'大熊',emoji:'🐻',mat:'bear_claw',qty:[1,2],costMult:1.5},
    {id:'wyvern',name:'ワイバーン',emoji:'🦅',mat:'wyvern_scale',qty:[1,1],costMult:3.0},
    {id:'dragon',name:'ドラゴン',emoji:'🐉',mat:'dragon_fang',qty:[1,1],costMult:5.0},
  ],
  explore:[
    {id:'ruin_a',name:'古代遺跡',emoji:'🏛️',mat:'ancient_relic',qty:[1,2],costMult:1.0},
    {id:'ruin_b',name:'魔導書庫',emoji:'📚',mat:'spell_tome',qty:[1,1],costMult:1.5},
    {id:'ruin_c',name:'宝物庫',emoji:'👑',mat:'treasure',qty:[1,1],costMult:2.5},
  ],
  lumber:[
    {id:'wood',name:'木材',emoji:'🪵',mat:'wood',qty:[4,8],costMult:1.0},
    {id:'hardwood',name:'硬木',emoji:'🌳',mat:'hardwood',qty:[2,4],costMult:1.5},
    {id:'spirit_wood',name:'霊木',emoji:'✨',mat:'spirit_wood',qty:[1,2],costMult:2.5},
  ],
  fish:[
    {id:'fish_common',name:'川魚',emoji:'🐟',mat:'fish',qty:[3,6],costMult:1.0},
    {id:'fish_rare',name:'黄金魚',emoji:'🐠',mat:'golden_fish',qty:[1,2],costMult:2.0},
  ],
};
const MAT_NAMES={
  iron:'鉄鉱石',copper:'銅鉱石',silver:'銀鉱石',gold_ore:'金鉱石',crystal:'魔石',
  herb:'薬草',mushroom:'キノコ',magic_flower:'魔法花',spirit_root:'霊草の根',
  wolf_pelt:'狼の毛皮',bear_claw:'熊の爪',wyvern_scale:'飛竜の鱗',dragon_fang:'竜の牙',
  ancient_relic:'古代遺物',spell_tome:'魔導書',treasure:'秘宝',
  wood:'木材',hardwood:'硬木',spirit_wood:'霊木',
  fish:'川魚',golden_fish:'黄金魚',
  carrot:'ニンジン',potato:'ジャガイモ',wheat:'小麦',tomato:'トマト',
  cabbage:'キャベツ',pumpkin:'カボチャ',magic_herb_crop:'魔法薬草',
};

// === Farm Data ===
const SEEDS=[
  {id:'carrot',name:'ニンジン',emoji:'🥕',mat:'carrot',growDays:2,yield:[2,4],cost:5},
  {id:'potato',name:'ジャガイモ',emoji:'🥔',mat:'potato',growDays:3,yield:[3,5],cost:5},
  {id:'wheat',name:'小麦',emoji:'🌾',mat:'wheat',growDays:3,yield:[3,6],cost:4},
  {id:'tomato',name:'トマト',emoji:'🍅',mat:'tomato',growDays:2,yield:[2,3],cost:6},
  {id:'cabbage',name:'キャベツ',emoji:'🥬',mat:'cabbage',growDays:4,yield:[2,4],cost:7},
  {id:'pumpkin',name:'カボチャ',emoji:'🎃',mat:'pumpkin',growDays:5,yield:[1,3],cost:10},
  {id:'magic_herb',name:'魔法薬草',emoji:'🌿',mat:'magic_herb_crop',growDays:6,yield:[1,2],cost:20},
];
const MAX_PLOTS=9; // 3x3 grid

const COOK_RECIPES=[
  {name:'焼き魚定食',emoji:'🐟',mats:{fish:2},income:12,diff:'easy'},
  {name:'キノコスープ',emoji:'🍄',mats:{mushroom:2,herb:1},income:15,diff:'easy'},
  {name:'黄金魚のソテー',emoji:'🐠',mats:{golden_fish:1,herb:1},income:30,diff:'medium'},
  {name:'熊鍋',emoji:'🐻',mats:{bear_claw:1,mushroom:2},income:25,diff:'medium'},
  {name:'竜肉ステーキ',emoji:'🐉',mats:{dragon_fang:1,spirit_root:1},income:60,diff:'hard'},
  {name:'魔法花のサラダ',emoji:'🌺',mats:{magic_flower:1,herb:2},income:20,diff:'easy'},
  {name:'野菜シチュー',emoji:'🥕',mats:{carrot:2,potato:2},income:18,diff:'easy'},
  {name:'パンプキンスープ',emoji:'🎃',mats:{pumpkin:1,wheat:2},income:22,diff:'medium'},
  {name:'トマトパスタ',emoji:'🍅',mats:{tomato:2,wheat:2},income:20,diff:'easy'},
  {name:'キャベツロール',emoji:'🥬',mats:{cabbage:2,wolf_pelt:1},income:28,diff:'medium'},
  {name:'魔法薬草茶',emoji:'🍵',mats:{magic_herb_crop:1},income:35,diff:'hard'},
];

const FACILITIES=[
  {id:'inn',name:'宿屋',emoji:'🏨',desc:'冒険者が宿泊。1人あたり収入を得る',
    levels:[
      {cost:50,mats:{wood:5},capacity:3,income:8,name:'簡素な宿'},
      {cost:150,mats:{wood:10,iron:5},capacity:6,income:12,name:'快適な宿'},
      {cost:400,mats:{hardwood:8,iron:10,crystal:3},capacity:10,income:20,name:'高級旅館'},
    ]},
  {id:'tavern',name:'食堂',emoji:'🍺',desc:'食事提供＋調理ミニゲーム',
    levels:[
      {cost:80,mats:{wood:8},capacity:5,income:5,stayBonus:1,name:'簡素な食堂'},
      {cost:200,mats:{wood:10,iron:5,fish:5},capacity:10,income:10,stayBonus:2,name:'酒場'},
      {cost:500,mats:{hardwood:10,iron:8,golden_fish:2},capacity:20,income:18,stayBonus:3,name:'高級レストラン'},
    ]},
  {id:'stable',name:'厩舎',emoji:'🐴',desc:'クエスト日数短縮',
    levels:[
      {cost:60,mats:{wood:10,iron:3},questSpeedup:1,name:'小さな厩舎'},
      {cost:180,mats:{hardwood:8,iron:8},questSpeedup:2,name:'大きな厩舎'},
    ]},
];

// === State ===
let gold=0,day=0,reputation=0;
let materials={};
let quests=[];
let facilities={};
let adventurersInTown=0,totalAdventurers=0;
let dailyIncome=0,dailyExpense=0;
let questIdCounter=0;
let selType=null,selTarget=null;
let cookTimer=null,cookPos=0,cookDir=1,cookRecipe=null,cookPhase='';
let cookedToday=false;
let farmPlots=[]; // {seedId, plantedDay, growDays} or null
let unlockedPlots=3; // start with 3 plots

const SAVE_KEY='dungeon_merchant_save';

// === Save/Load ===
function saveGame(){
  const state={gold,day,reputation,materials,quests:quests.map(q=>({...q,targetData:undefined})),
    facilities,adventurersInTown,totalAdventurers,questIdCounter,cookedToday,
    farmPlots,unlockedPlots};
  // Re-attach targetData references on load
  state.questsMeta=quests.map(q=>({type:q.type,target:q.target}));
  try{localStorage.setItem(SAVE_KEY,JSON.stringify(state));}catch(e){}
}

function loadGame(){
  try{
    const raw=localStorage.getItem(SAVE_KEY);
    if(!raw) return false;
    const s=JSON.parse(raw);
    gold=s.gold; day=s.day; reputation=s.reputation; materials=s.materials;
    facilities=s.facilities; adventurersInTown=s.adventurersInTown;
    totalAdventurers=s.totalAdventurers; questIdCounter=s.questIdCounter;
    cookedToday=s.cookedToday||false;
    farmPlots=s.farmPlots||[];
    unlockedPlots=s.unlockedPlots||3;
    while(farmPlots.length<MAX_PLOTS) farmPlots.push(null);
    // Rebuild quests with targetData
    quests=s.quests.map((q,i)=>{
      const meta=s.questsMeta[i];
      const targets=QUEST_TARGETS[meta.type]||[];
      q.targetData=targets.find(t=>t.id===meta.target)||null;
      return q;
    });
    dailyIncome=0; dailyExpense=0;
    selType=null; selTarget=null;
    return true;
  }catch(e){return false;}
}

function hasSave(){
  try{return !!localStorage.getItem(SAVE_KEY);}catch(e){return false;}
}

// === Init ===
window.addEventListener('load',()=>{
  if(hasSave()){
    el('startButtons').innerHTML=`
      <button onclick="continueGame()">続きから</button>
      <button class="secondary" onclick="newGame()">はじめから</button>`;
  }
});

function continueGame(){
  if(loadGame()){
    hide('startScreen');
    renderQuestCreator();
    updateAll();
    logMsg(`<span class="q">📂 セーブデータを読み込みました（Day ${day}）</span>`);
  }
}

function newGame(){
  try{localStorage.removeItem(SAVE_KEY);}catch(e){}
  hide('startScreen');hide('resultScreen');
  el('log').innerHTML='';
  gold=100;day=0;reputation=0;
  materials={wood:3,iron:2,herb:2,fish:2};
  quests=[];facilities={};
  adventurersInTown=2;totalAdventurers=5;
  dailyIncome=0;dailyExpense=0;questIdCounter=0;
  selType=null;selTarget=null;cookedToday=false;
  FACILITIES.forEach(f=>facilities[f.id]=0);
  farmPlots=[];unlockedPlots=3;
  for(let i=0;i<MAX_PLOTS;i++) farmPlots.push(null);
  renderQuestCreator();
  nextDay();
}

// === Day Cycle ===
function nextDay(){
  day++;dailyIncome=0;dailyExpense=0;cookedToday=false;selectedPlot=null;
  el('dayNum').textContent=day;
  processQuests();
  processFacilities();
  processAdventurers();
  processFarm();
  updateAll();
  logMsg(`<span class="q">🌅 ${day}日目 — 💰${gold}G 👥${adventurersInTown}人滞在</span>`);
  saveGame();
}

function processQuests(){
  quests.forEach(q=>{
    if(q.status==='posted'){
      const ratio=q.reward/q.marketPrice;
      let chance=0;
      if(ratio>=1.5) chance=0.95;
      else if(ratio>=1.2) chance=0.7;
      else if(ratio>=1.0) chance=0.4;
      else if(ratio>=0.8) chance=0.15;
      else if(ratio>=0.5) chance=0.05;
      else chance=0.01;
      chance=Math.min(0.98,chance+adventurersInTown*0.02);

      if(Math.random()<chance&&adventurersInTown>0){
        q.status='active';
        q.advName=randomName();
        const speedup=getQuestSpeedup();
        q.activeDaysLeft=Math.max(1,q.baseDays-speedup);
        adventurersInTown=Math.max(0,adventurersInTown-1);
        dailyExpense+=q.reward;
        logMsg(`<span class="a">⚔️ ${q.advName}が「${q.questName}」を受注！</span>`);
      }
    } else if(q.status==='active'){
      q.activeDaysLeft--;
      if(q.activeDaysLeft<=0){
        q.status='done';
        const target=q.targetData;
        if(target){
          const qty=rng(target.qty[0],target.qty[1]);
          addMat(target.mat,qty);
          logMsg(`<span class="a">✅ ${q.advName}が帰還！${MAT_NAMES[target.mat]||target.mat}×${qty}を納品</span>`);
        }
        adventurersInTown++;
      }
    }
  });
  const done=quests.filter(q=>q.status==='done');
  if(done.length>5) quests=quests.filter(q=>q.status!=='done').concat(done.slice(-5));
}

function processFacilities(){
  const innLv=facilities.inn;
  if(innLv>0){
    const d=FACILITIES.find(f=>f.id==='inn').levels[innLv-1];
    const guests=Math.min(adventurersInTown,d.capacity);
    const inc=guests*d.income;
    if(inc>0){gold+=inc;dailyIncome+=inc;logMsg(`<span class="f">🏨 宿泊収入: ${inc}G (${guests}人)</span>`);}
  }
  const tavLv=facilities.tavern;
  if(tavLv>0){
    const d=FACILITIES.find(f=>f.id==='tavern').levels[tavLv-1];
    const diners=Math.min(adventurersInTown,d.capacity);
    const inc=diners*d.income;
    if(inc>0){gold+=inc;dailyIncome+=inc;logMsg(`<span class="f">🍺 食事収入: ${inc}G (${diners}人)</span>`);}
  }
}

function processAdventurers(){
  const base=1+Math.floor(reputation/50);
  const arrivals=Math.min(base,totalAdventurers-adventurersInTown);
  if(arrivals>0){adventurersInTown+=arrivals;logMsg(`<span class="a">👥 冒険者${arrivals}人が到着</span>`);}
  const lc=facilities.tavern>0?0.1:0.3;
  let left=0;
  for(let i=0;i<adventurersInTown;i++) if(Math.random()<lc) left++;
  left=Math.min(left,adventurersInTown-1);
  if(left>0) adventurersInTown-=left;
  if(day%5===0&&reputation>20) totalAdventurers++;
  el('advInTown').textContent=adventurersInTown;
}

function getQuestSpeedup(){
  const lv=facilities.stable;
  return lv>0?FACILITIES.find(f=>f.id==='stable').levels[lv-1].questSpeedup:0;
}

// === Quest Creator ===
function renderQuestCreator(){
  const g=el('questTypeGrid');g.innerHTML='';
  QUEST_TYPES.forEach(t=>{g.innerHTML+=`<div class="option-btn${selType===t.id?' selected':''}" onclick="selectType('${t.id}')">${t.emoji} ${t.name}</div>`;});
  if(!selType){el('step2').style.display='none';el('step3').style.display='none';return;}
  el('step2').style.display='';
  const tg=el('questTargetGrid');tg.innerHTML='';
  (QUEST_TARGETS[selType]||[]).forEach(t=>{tg.innerHTML+=`<div class="option-btn${selTarget===t.id?' selected':''}" onclick="selectTarget('${t.id}')">${t.emoji} ${t.name}<br><span style="font-size:8px;color:#8a7a60">${MAT_NAMES[t.mat]} ×${t.qty[0]}~${t.qty[1]}</span></div>`;});
  if(!selTarget){el('step3').style.display='none';return;}
  el('step3').style.display='';
  const typeData=QUEST_TYPES.find(t=>t.id===selType);
  const targetData=(QUEST_TARGETS[selType]||[]).find(t=>t.id===selTarget);
  if(!typeData||!targetData) return;
  const market=Math.floor(typeData.baseCost*targetData.costMult);
  el('marketPrice').textContent=market;
  if(!el('priceInput').value) el('priceInput').value=market;
  updatePriceIndicator();
}
function selectType(id){selType=id;selTarget=null;el('priceInput').value='';renderQuestCreator();}
function selectTarget(id){selTarget=id;el('priceInput').value='';renderQuestCreator();}

function updatePriceIndicator(){
  const market=parseInt(el('marketPrice').textContent)||1;
  const price=parseInt(el('priceInput').value)||0;
  const ratio=price/market;
  const ind=el('priceIndicator');
  let text='',cls='';
  if(ratio>=1.5){text='⚡ 即日受注（高確率）';cls='pi-fast';}
  else if(ratio>=1.2){text='🟢 1~2日で受注';cls='pi-fast';}
  else if(ratio>=1.0){text='🟡 数日以内に受注';cls='pi-normal';}
  else if(ratio>=0.8){text='🟠 受注まで時間がかかる';cls='pi-slow';}
  else if(ratio>=0.5){text='🔴 1週間以上かも';cls='pi-unlikely';}
  else{text='❌ ほぼ受注されない';cls='pi-unlikely';}
  ind.innerHTML=`<span class="${cls}">${text}</span> <span style="font-size:9px;color:#666">(×${ratio.toFixed(2)})</span>`;
}

function postQuest(){
  if(!selType||!selTarget) return;
  const price=parseInt(el('priceInput').value)||0;
  if(price<=0||gold<price) return;
  const typeData=QUEST_TYPES.find(t=>t.id===selType);
  const targetData=(QUEST_TARGETS[selType]||[]).find(t=>t.id===selTarget);
  const market=Math.floor(typeData.baseCost*targetData.costMult);

  // Pay upfront on posting
  gold-=price;

  quests.push({
    id:questIdCounter++,type:selType,target:selTarget,targetData,
    questName:`${typeData.emoji}${typeData.name}: ${targetData.name}`,
    reward:price,marketPrice:market,baseDays:typeData.baseDays,
    postedDay:day,status:'posted',activeDaysLeft:0,advName:'',
  });
  reputation+=1;
  logMsg(`<span class="q">📋 クエスト掲載「${typeData.name}: ${targetData.name}」報酬${price}G（前払い）</span>`);
  selType=null;selTarget=null;el('priceInput').value='';
  renderQuestCreator();updateAll();saveGame();
}

function cancelQuest(id){
  const q=quests.find(x=>x.id===id);
  if(q&&q.status==='posted'){
    gold+=q.reward; // Refund
    logMsg(`<span class="w">↩ クエスト取り下げ。${q.reward}G返金</span>`);
  }
  quests=quests.filter(x=>x.id!==id);
  updateAll();saveGame();
}

// === Facilities ===
function buildFacility(id){
  const f=FACILITIES.find(x=>x.id===id);
  const nextLv=facilities[id];
  if(nextLv>=f.levels.length) return;
  const data=f.levels[nextLv];
  if(gold<data.cost) return;
  for(const[mat,qty] of Object.entries(data.mats)) if((materials[mat]||0)<qty) return;
  gold-=data.cost;
  for(const[mat,qty] of Object.entries(data.mats)) materials[mat]-=qty;
  facilities[id]=nextLv+1;
  reputation+=10*(nextLv+1);
  logMsg(`<span class="f">🏗️ ${data.name}を建設！</span>`);
  updateAll();saveGame();
}

function processFarm(){
  // Crops grow each day (just track by comparing day - plantedDay)
}

function plantSeed(plotIdx, seedId){
  if(plotIdx>=unlockedPlots||farmPlots[plotIdx]!==null) return;
  const seed=SEEDS.find(s=>s.id===seedId);
  if(!seed||gold<seed.cost) return;
  gold-=seed.cost;
  farmPlots[plotIdx]={seedId:seed.id,plantedDay:day,growDays:seed.growDays};
  logMsg(`<span class="a">🌱 ${seed.name}を植えた（${seed.growDays}日で収穫）</span>`);
  updateAll();saveGame();
}

function harvestPlot(plotIdx){
  const plot=farmPlots[plotIdx];
  if(!plot) return;
  const seed=SEEDS.find(s=>s.id===plot.seedId);
  if(!seed) return;
  const elapsed=day-plot.plantedDay;
  if(elapsed<plot.growDays) return;
  const qty=rng(seed.yield[0],seed.yield[1]);
  addMat(seed.mat,qty);
  farmPlots[plotIdx]=null;
  logMsg(`<span class="a">🌾 ${seed.name}×${qty}を収穫！</span>`);
  reputation+=1;
  updateAll();saveGame();
}

function farmPlotClick(idx){
  if(idx>=unlockedPlots){
    // Buy new plot
    const cost=30+unlockedPlots*20;
    if(gold>=cost){
      gold-=cost;
      unlockedPlots++;
      logMsg(`<span class="f">🏗️ 畑を拡張！(${unlockedPlots}区画)</span>`);
      updateAll();saveGame();
    }
    return;
  }
  const plot=farmPlots[idx];
  if(!plot) return; // empty - handled by seed buttons
  const seed=SEEDS.find(s=>s.id===plot.seedId);
  const elapsed=day-plot.plantedDay;
  if(elapsed>=plot.growDays) harvestPlot(idx);
}

let selectedPlot=null;
function selectPlot(idx){
  if(idx>=unlockedPlots||farmPlots[idx]!==null) return;
  selectedPlot=idx;
  renderFarm();
}

function renderFarm(){
  const grid=el('farmGrid');grid.innerHTML='';
  for(let i=0;i<MAX_PLOTS;i++){
    if(i>=unlockedPlots){
      const cost=30+i*20;
      grid.innerHTML+=`<div class="farm-plot empty" onclick="farmPlotClick(${i})">
        <div class="farm-emoji">🔒</div>
        <div class="farm-label">拡張 ${cost}G</div>
      </div>`;
      continue;
    }
    const plot=farmPlots[i];
    if(!plot){
      const isSel=selectedPlot===i;
      grid.innerHTML+=`<div class="farm-plot empty${isSel?' ready':''}" onclick="selectPlot(${i})">
        <div class="farm-emoji">🟫</div>
        <div class="farm-label">${isSel?'↓ 種を選んで':'空き地'}</div>
      </div>`;
    } else {
      const seed=SEEDS.find(s=>s.id===plot.seedId);
      const elapsed=day-plot.plantedDay;
      const ready=elapsed>=plot.growDays;
      const pct=Math.min(100,(elapsed/plot.growDays)*100);
      grid.innerHTML+=`<div class="farm-plot ${ready?'ready':'growing'}" onclick="farmPlotClick(${i})">
        <div class="farm-emoji">${ready?seed.emoji:'🌱'}</div>
        <div class="farm-label">${seed.name}${ready?' 収穫！':` あと${plot.growDays-elapsed}日`}</div>
        ${!ready?`<div class="farm-progress"><div class="farm-progress-fill" style="width:${pct}%"></div></div>`:''}
      </div>`;
    }
  }

  // Seed shop
  const shop=el('seedShop');shop.innerHTML='';
  if(selectedPlot!==null&&selectedPlot<unlockedPlots&&farmPlots[selectedPlot]===null){
    SEEDS.forEach(s=>{
      const can=gold>=s.cost;
      shop.innerHTML+=`<div class="seed-btn${can?'':' disabled'}" onclick="${can?`plantSeed(${selectedPlot},'${s.id}')`:''}" ${can?'':'disabled'}>
        ${s.emoji} ${s.name} (${s.cost}G / ${s.growDays}日)
      </div>`;
    });
  } else {
    shop.innerHTML='<span style="font-size:10px;color:#555">空き地をタップして種を植えよう</span>';
  }
}

// === Cooking Minigame ===
function canCook(){
  if(facilities.tavern<=0||cookedToday) return[];
  return COOK_RECIPES.filter(r=>Object.entries(r.mats).every(([m,q])=>(materials[m]||0)>=q));
}

function startCook(idx){
  const available=canCook();
  if(idx>=available.length) return;
  cookRecipe=available[idx];
  cookPos=0;cookDir=1;cookPhase='moving';

  // Consume ingredients
  for(const[m,q] of Object.entries(cookRecipe.mats)) materials[m]-=q;

  el('cookTitle').textContent=`🍳 ${cookRecipe.emoji} ${cookRecipe.name}を調理中...`;
  el('cookIngredients').innerHTML=Object.entries(cookRecipe.mats).map(([m,q])=>`<div class="cook-ing">${MAT_NAMES[m]||m}×${q}</div>`).join('');
  el('cookResult').textContent='';
  el('cookBtn').textContent='🍳 ストップ！';
  el('cookBtn').disabled=false;
  el('cookOverlay').classList.remove('hidden');

  // Set green zone based on difficulty
  const zone=cookRecipe.diff==='easy'?{start:30,end:70}:cookRecipe.diff==='medium'?{start:35,end:60}:{start:40,end:55};
  const zoneEl=el('cookZone');
  zoneEl.style.left=zone.start+'%';
  zoneEl.style.width=(zone.end-zone.start)+'%';
  cookRecipe._zone=zone;

  // Animate needle
  const speed=cookRecipe.diff==='easy'?1.5:cookRecipe.diff==='medium'?2.5:3.5;
  if(cookTimer) clearInterval(cookTimer);
  cookTimer=setInterval(()=>{
    if(cookPhase!=='moving') return;
    cookPos+=cookDir*speed;
    if(cookPos>=100){cookPos=100;cookDir=-1;}
    if(cookPos<=0){cookPos=0;cookDir=1;}
    el('cookNeedle').style.left=cookPos+'%';
  },30);
}

function cookAction(){
  if(cookPhase==='moving'){
    cookPhase='stopped';
    clearInterval(cookTimer);
    const zone=cookRecipe._zone;
    const inZone=cookPos>=zone.start&&cookPos<=zone.end;
    const center=Math.abs(cookPos-((zone.start+zone.end)/2));
    const maxDist=(zone.end-zone.start)/2;

    let quality,multiplier,label;
    if(!inZone){
      quality='失敗';multiplier=0.3;label='😓 焦がしてしまった...';
    } else if(center<maxDist*0.3){
      quality='極上';multiplier=2.0;label='✨ 極上の仕上がり！';
    } else if(center<maxDist*0.7){
      quality='上出来';multiplier=1.5;label='😊 上出来！';
    } else {
      quality='普通';multiplier=1.0;label='👍 まあまあの出来';
    }

    const income=Math.floor(cookRecipe.income*multiplier);
    gold+=income;
    dailyIncome+=income;
    cookedToday=true;

    el('cookResult').innerHTML=`${label}<br><span style="color:#ffd700;font-size:16px">+${income}G</span>`;
    el('cookBtn').textContent='閉じる';
    logMsg(`<span class="c">🍳 ${cookRecipe.name}(${quality}) → +${income}G</span>`);
    reputation+=multiplier>=1.5?3:1;
  } else {
    el('cookOverlay').classList.add('hidden');
    cookPhase='';
    updateAll();saveGame();
  }
}

function updateAll(){
  el('gold').textContent=gold;
  el('advInTown').textContent=adventurersInTown;
  renderQuestBoard();renderFarm();renderFacilities();renderStorage();renderTown();
}

function renderQuestBoard(){
  const board=el('questBoard');board.innerHTML='';
  const active=quests.filter(q=>q.status!=='done');
  const done=quests.filter(q=>q.status==='done').slice(-3);
  if(!active.length&&!done.length){board.innerHTML='<div style="font-size:10px;color:#555;padding:8px">クエストなし</div>';return;}
  [...active,...done].forEach(q=>{
    const cls=q.status==='posted'?'qs-posted':q.status==='active'?'qs-active':'qs-done';
    const txt=q.status==='posted'?'掲載中':q.status==='active'?`${q.advName} 遂行中(あと${q.activeDaysLeft}日)`:'完了';
    board.innerHTML+=`<div class="quest-card">
      <div class="quest-top"><span class="quest-name">${q.questName}</span><span class="quest-status ${cls}">${txt}</span></div>
      <div class="quest-reward">報酬: ${q.reward}G (相場${q.marketPrice}G)${q.status==='posted'?' 💰前払い済':''}</div>
      ${q.status==='posted'?`<div class="quest-detail">掲載${day-q.postedDay}日目</div><button class="btn btn-red btn-sm" onclick="cancelQuest(${q.id})" style="margin-top:4px">取り下げ（返金）</button>`:''}
    </div>`;
  });
}

function renderFacilities(){

    if(lv===0) return;
    const d=f.levels[lv-1];

          extra+=`<div style="margin:3px 0"><button class="btn btn-orange btn-sm" onclick="startCook(${i})">${r.emoji} ${r.name}</button> <span style="font-size:9px;color:#8a7a60">${matsStr} → ~${r.income}G</span></div>`;
        });
      } else if(cookedToday){
        extra='<div style="font-size:10px;color:#555;margin-top:4px">🍳 今日は調理済み</div>';
      }
    }
    list.innerHTML+=`<div class="facility-card">

      <div class="facility-stat">${f.desc}</div>
      ${d.income?`<div class="facility-income">💰 1人あたり${d.income}G/日</div>`:''}
      ${d.questSpeedup?`<div class="facility-stat" style="color:#64b5f6">⚡ クエスト${d.questSpeedup}日短縮</div>`:''}
      ${extra}
    </div>`;
  });
  const bList=el('buildList');bList.innerHTML='';
  FACILITIES.forEach(f=>{
    const lv=facilities[f.id];

    const next=f.levels[lv];

    const can=gold>=next.cost&&Object.entries(next.mats).every(([m,q])=>(materials[m]||0)>=q);

      <div class="facility-top"><span class="facility-name">${f.emoji} ${next.name}${lv>0?' (升級)':''}</span><span style="font-size:10px;color:#ffd700">${next.cost}G</span></div>
      <div class="facility-stat">${f.desc}</div><div class="facility-stat">素材: ${matsStr}</div>
      <button class="btn btn-green btn-sm" onclick="buildFacility('${f.id}')" ${can?'':'disabled'}>建設</button>
    </div>`;
  });
}

  el('tab-'+name).classList.add('active');
}

const NAMES=['アルト','ベル','カイン','ダリア','エリカ','フィン','ギル','ハナ','イリス','ジーク','カイト','リン','ミラ','ノエル'];
function randomName(){return NAMES[rng(0,NAMES.length-1)]}
function addMat(id,qty){materials[id]=(materials[id]||0)+qty}
function rng(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function el(id){return document.getElementById(id)}
function hide(id){el(id).classList.add('hidden')}
function logMsg(m){const a=el('log');a.innerHTML+=m+'<br>';a.scrollTop=a.scrollHeight}
</script>
