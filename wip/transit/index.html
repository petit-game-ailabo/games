#stage-select{position:fixed;inset:0;background:#f0ece0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:99;overflow-y:auto;padding:20px}

.stage-card{background:#fff;border-radius:12px;padding:16px 24px;margin:6px;width:min(320px,85vw);box-shadow:0 2px 10px rgba(0,0,0,.1);cursor:pointer;transition:transform .15s,box-shadow .15s;text-align:left}

<body>

<script>
'use strict';
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);

// ── Sound Effects (Web Audio) ──
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playTone(freq, dur, type, vol) {
  try {
    let ac = getAudioCtx();
    let osc = ac.createOscillator();
    let gain = ac.createGain();
    osc.type = type || 'sine';
    osc.frequency.value = freq;
    gain.gain.value = vol || 0.15;
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
    osc.connect(gain);
    gain.connect(ac.destination);
    osc.start();
    osc.stop(ac.currentTime + dur);
  } catch(e) {}
}
function sfxRouteCreated() { playTone(523, 0.15, 'sine', 0.12); setTimeout(() => playTone(659, 0.15, 'sine', 0.12), 100); setTimeout(() => playTone(784, 0.2, 'sine', 0.12), 200); }
function sfxPassengerArrived() { playTone(880, 0.08, 'sine', 0.06); }
function sfxGameOver() { playTone(220, 0.3, 'sawtooth', 0.1); setTimeout(() => playTone(180, 0.3, 'sawtooth', 0.1), 200); setTimeout(() => playTone(140, 0.5, 'sawtooth', 0.1), 400); }

// ── Constants ──
const BG = '#f0ece0';
const ROUTE_COLORS = ['#d63031','#2d6cdf','#27ae60','#e67e22','#8e44ad','#e84393','#16a085','#c0392b'];
const FACILITY_TYPES = {

const VEHICLE_TYPES = {

  ferry: {cap:30, pxSpeed:80,  dailyCost:12, icon:'⛴️', unlockPop:0,   buildCost:20, water:true, dwell:2.0, needsTerminal:'port', desc:'港⚓が必要 / 川を渡れる'},
  plane: {cap:50, pxSpeed:0,   dailyCost:45, icon:'✈️', unlockPop:200, buildCost:100, planeScaling:true, dwell:3.0, needsTerminal:'airport', desc:'空港✈️が必要 / 長距離最強・最高コスト'}
};
const MAX_PEOPLE = 300;
const OVERCROWD_LIMIT = 20;
const FACILITY_RADIUS = 18;
const DRAG_FACILITY_RADIUS = 30;
const ROUTE_HIT_DIST = 12;

// ── Stages ──
const STAGES = [

    goal: 30,
    money: 800,
    unlocks: ['bus','tram'],
    maxRoutes: 2,
    facilities: [
      {type:'residential', x:80, y:120},
      {type:'residential', x:80, y:420},
      {type:'tramStop', x:340, y:270},
      {type:'office', x:350, y:80},

    ],

let canvas, ctx, W, H;
let gameState = 'title'; // title, stageselect, playing, over, stageclear
let gameMode = 'free'; // free, stage
let currentStage = 0;
let speed = 1;
let money = 500, score = 0, totalPop = 0;
let facilities = [], routes = [], vehicles = [], people = [];
let rivers = [];
let simTime = 0, lastFrame = 0;
let gameMinutes = 480; // Start at 08:00 (480 minutes from midnight)
let gameDay = 1;

let selectedVehicle = 'bus';
let editingRoute = -1;
let hudH = 40, toolH = 55;
let camX = 0, camY = 0, camZoom = 1;
let pinchDist = 0;
let facilitySpawnTimer = 0;
let notifTimer = 0;
let mapW, mapH;
// Track unlocks for current game
let currentUnlocks = [];
// Daily report tracking
let dayIncome = 0, dayExpense = 0, dayDelivered = 0;
let showingReport = false;
let _lowMoneyHinted = false;

// Drag state
let isDragging = false;
let dragType = 'none'; // none, facility (new route), route-line (add stop), pan
let dragStartFacility = null;
let dragRouteIdx = -1;
let dragRouteSegIdx = -1;

let dragStartScreenX = 0, dragStartScreenY = 0;
let panStartCamX = 0, panStartCamY = 0;
let dragMoved = false;

// ── Helper: Calculate route length in pixels ──
function calcRouteLength(r) {
  let len = 0;
  for (let i = 0; i < r.stops.length - 1; i++) {
    let a = facilities[r.stops[i]], b = facilities[r.stops[i+1]];
    if (a && b) len += Math.hypot(b.x - a.x, b.y - a.y);
  }
  return len;
}

// ── Helper: Get effective pixel speed for a vehicle type on a route ──
function getEffectivePxSpeed(vehicleType, routeLen) {
  let vt = VEHICLE_TYPES[vehicleType];
  if (vt.planeScaling) {
    return 180 + routeLen * 0.9;
  }
  return vt.pxSpeed;
}

// ── Helper: Calculate required vehicles for a route ──
function calcRequiredVehicles(r) {
  let len = calcRouteLength(r);
  let pxSpeed = getEffectivePxSpeed(r.vehicleType, len);
  // oneWayMinutes: calibrated so bus (80px/s) on 300px route ≈ 60 min
  // 300 / 80 = 3.75 real seconds. We want that to be 60 game-minutes.
  // So scale = 60 / 3.75 = 16. oneWayMinutes = (len / pxSpeed) * 16
  let oneWayMinutes = (len / Math.max(pxSpeed, 1)) * 16;
  let roundTripMinutes = oneWayMinutes * 2;
  let needed = Math.max(1, Math.ceil(roundTripMinutes / r.interval));
  return {needed, oneWayMinutes, roundTripMinutes};
}

// ── Helper: Calculate daily cost for a route ──
function calcRouteDailyCost(r) {
  let {needed} = calcRequiredVehicles(r);
  let vt = VEHICLE_TYPES[r.vehicleType];
  return needed * vt.dailyCost;
}

// ── Map (free mode) ──
function spawnFacility(type, initial) {
  for (let tries = 0; tries < 50; tries++) {
    let x = 60 + Math.random() * (mapW - 120);
    let y = 60 + Math.random() * (mapH - 120);
    let ok = true;
    for (let f of facilities) {
      if (Math.hypot(f.x - x, f.y - y) < 70) { ok = false; break; }
    }
    if (ok && isInRiver(x, y)) ok = false;
    if (ok) {
      facilities.push({
        type, x, y, waiting: [], id: facilities.length,
        flashTimer: 0, spawnTimer: 0
      });
      return;
    }
  }
}

function isInRiver(x, y) {
  for (let r of rivers) {
    for (let i = 0; i < r.points.length - 1; i++) {
      let a = r.points[i], b = r.points[i+1];
      let d = distPointSeg(x, y, a.x, a.y, b.x, b.y);
      if (d < r.width / 2 + 5) return true;
    }
  }
  return false;
}

function routeCrossesRiver(f1, f2) {
  for (let r of rivers) {
    for (let i = 0; i < r.points.length - 1; i++) {
      let a = r.points[i], b = r.points[i+1];
      if (segmentsIntersect(f1.x, f1.y, f2.x, f2.y, a.x, a.y, b.x, b.y)) return true;
    }
  }
  return false;
}

function distPointSeg(px, py, ax, ay, bx, by) {
  let dx = bx - ax, dy = by - ay;
  let len2 = dx*dx+dy*dy;
  if (len2 === 0) return Math.hypot(px-ax, py-ay);
  let t = Math.max(0, Math.min(1, ((px-ax)*dx+(py-ay)*dy)/len2));
  return Math.hypot(px - (ax+t*dx), py - (ay+t*dy));
}

function segmentsIntersect(x1,y1,x2,y2,x3,y3,x4,y4) {
  let d = (x2-x1)*(y4-y3)-(y2-y1)*(x4-x3);
  if (Math.abs(d) < 0.001) return false;
  let t = ((x3-x1)*(y4-y3)-(y3-y1)*(x4-x3))/d;
  let u = ((x3-x1)*(y2-y1)-(y3-y1)*(x2-x1))/d;
  return t > 0 && t < 1 && u > 0 && u < 1;
}

  if (editingRoute < 0 || !routes[editingRoute]) return;
  let r = routes[editingRoute];
  let {needed} = calcRequiredVehicles(r);
  let dailyCost = calcRouteDailyCost(r);

function deleteRoute() {
  if (editingRoute >= 0) {
    if (!confirm(`路線${editingRoute + 1}を削除しますか？`)) return;
    let ri = editingRoute;
    // Release passengers
    vehicles.filter(v => v.routeIdx === ri).forEach(v => {
      v.passengers.forEach(p => {
        p.state = 'waiting';
        p.vehicleId = -1;
        let f = facilities[p.facilityId];
        if (f && !f.waiting.includes(p)) f.waiting.push(p);
      });
    });
    vehicles = vehicles.filter(v => v.routeIdx !== ri);
    routes.splice(ri, 1);
    vehicles.forEach(v => { if (v.routeIdx > ri) v.routeIdx--; });
    closeEditPanel();
  }
}

function syncVehicles(ri) {
  let r = routes[ri];
  if (!r) return;
  let {needed} = calcRequiredVehicles(r);
  let existing = vehicles.filter(v => v.routeIdx === ri);
  while (existing.length < needed) {
    let v = createVehicle(ri, existing.length / Math.max(needed, 1));
    vehicles.push(v);
    existing.push(v);
  }
  while (existing.length > needed) {
    let rem = existing.pop();
    rem.passengers.forEach(p => {
      p.state = 'waiting';
      p.vehicleId = -1;
      let f = facilities[p.facilityId];
      if (f && !f.waiting.includes(p)) f.waiting.push(p);
    });
    vehicles = vehicles.filter(v => v !== rem);
  }
}

function createVehicle(ri, offsetFrac) {
  let r = routes[ri];
  let vt = VEHICLE_TYPES[r.vehicleType];
  return {
    routeIdx: ri,
    pos: offsetFrac,
    dir: 1,
    cap: vt.cap,
    passengers: [],
    type: r.vehicleType,
    atStation: -1,
    dwellTimer: 0,
    nextDepartMinute: 0,
    departed: true
  };
}

// ── Pointer/Touch ──
function screenToWorld(sx, sy) {
  return {
    x: (sx - W/2) / camZoom + camX,
    y: (sy - H/2) / camZoom + camY
  };
}

function worldToScreen(wx, wy) {
  return {
    x: (wx - camX) * camZoom + W/2,
    y: (wy - camY) * camZoom + H/2
  };
}

function findFacilityAt(wx, wy, radius) {
  radius = radius || DRAG_FACILITY_RADIUS;
  let best = null, bestD = radius;
  for (let f of facilities) {
    let d = Math.hypot(f.x - wx, f.y - wy);
    if (d < bestD) { bestD = d; best = f; }
  }
  return best;
}

// Check if destFacility is reachable from originFacility via any combination of routes
function isReachable(originFacility, destFacility) {
  if (originFacility === destFacility) return true;
  let adj = {};
  routes.forEach(r => {
    if (!r || r.stops.length < 2) return;
    for (let i = 0; i < r.stops.length; i++) {
      let sid = r.stops[i];
      if (!adj[sid]) adj[sid] = new Set();
      for (let j = 0; j < r.stops.length; j++) {
        if (i !== j) adj[sid].add(r.stops[j]);
      }
    }
  });
  let visited = new Set([originFacility]);
  let queue = [originFacility];
  while (queue.length > 0) {
    let cur = queue.shift();
    if (cur === destFacility) return true;
    if (adj[cur]) {
      adj[cur].forEach(nb => {
        if (!visited.has(nb)) { visited.add(nb); queue.push(nb); }
      });
    }
  }
  return false;
}

function findTransferStop(currentFacility, destFacility, currentRouteIdx) {
  // Build adjacency graph from all routes
  let adj = {};
  routes.forEach((r, ri) => {
    if (!r || r.stops.length < 2) return;
    for (let i = 0; i < r.stops.length; i++) {
      let sid = r.stops[i];
      if (!adj[sid]) adj[sid] = new Set();
      for (let j = 0; j < r.stops.length; j++) {
        if (i !== j) adj[sid].add(r.stops[j]);
      }
    }
  });
  // BFS from destination backward to compute distances
  let dist = {};
  dist[destFacility] = 0;
  let queue = [destFacility];
  while (queue.length > 0) {
    let cur = queue.shift();
    if (adj[cur]) {
      adj[cur].forEach(nb => {
        if (dist[nb] === undefined) {
          dist[nb] = dist[cur] + 1;
          queue.push(nb);
        }
      });
    }
  }
  // Find the stop on current route closest to destination (by graph hops)
  let cr = routes[currentRouteIdx];
  if (!cr) return -1;
  let bestStop = -1;
  let bestDist = Infinity;
  for (let si = 0; si < cr.stops.length; si++) {
    let stopId = cr.stops[si];
    if (stopId === currentFacility) continue;
    if (dist[stopId] !== undefined && dist[stopId] < bestDist) {
      bestDist = dist[stopId];
      bestStop = stopId;
    }
  }
  return bestStop;
}

function findRouteAt(wx, wy) {
  for (let ri = 0; ri < routes.length; ri++) {
    let r = routes[ri];
    for (let i = 0; i < r.stops.length - 1; i++) {
      let a = facilities[r.stops[i]], b = facilities[r.stops[i+1]];
      if (a && b) {
        let d = distPointSeg(wx, wy, a.x, a.y, b.x, b.y);
        if (d < ROUTE_HIT_DIST + 3) return ri;
      }
    }
  }
  return -1;
}

function findRouteSegAt(wx, wy) {
  let bestRi = -1, bestSeg = -1, bestD = ROUTE_HIT_DIST + 5;
  for (let ri = 0; ri < routes.length; ri++) {
    let r = routes[ri];
    for (let i = 0; i < r.stops.length - 1; i++) {
      let a = facilities[r.stops[i]], b = facilities[r.stops[i+1]];
      if (a && b) {
        let d = distPointSeg(wx, wy, a.x, a.y, b.x, b.y);
        if (d < bestD) {
          bestD = d;
          bestRi = ri;
          bestSeg = i;
        }
      }
    }
  }
  return {ri: bestRi, seg: bestSeg, dist: bestD};
}

function onPointerDown(e) {
  if (gameState !== 'playing') return;
  let wp = screenToWorld(e.clientX, e.clientY);
  dragStartScreenX = e.clientX;
  dragStartScreenY = e.clientY;
  dragMoved = false;

  // Check if pointer is on a facility
  let fac = findFacilityAt(wp.x, wp.y, DRAG_FACILITY_RADIUS);
  if (fac) {
    isDragging = true;
    dragType = 'facility';
    dragStartFacility = fac;
    dragCurX = wp.x;
    dragCurY = wp.y;
    return;
  }

  // Check if pointer is on a route line (to add a stop or open edit)
  let seg = findRouteSegAt(wp.x, wp.y);
  if (seg.ri >= 0 && seg.dist <= ROUTE_HIT_DIST) {
    isDragging = true;
    dragType = 'route-line';
    dragRouteIdx = seg.ri;
    dragRouteSegIdx = seg.seg;
    dragCurX = wp.x;
    dragCurY = wp.y;
    return;
  }

  // Otherwise pan
  isDragging = true;
  dragType = 'pan';
  panStartCamX = camX;
  panStartCamY = camY;
}

function onPointerMove(e) {
  if (!isDragging) return;
  let wp = screenToWorld(e.clientX, e.clientY);
  let dx = e.clientX - dragStartScreenX;
  let dy = e.clientY - dragStartScreenY;
  if (Math.abs(dx) > 5 || Math.abs(dy) > 5) dragMoved = true;

  if (dragType === 'pan') {
    camX = panStartCamX - dx / camZoom;
    camY = panStartCamY - dy / camZoom;
    clampCam();
  } else if (dragType === 'facility' || dragType === 'route-line') {
    dragCurX = wp.x;
    dragCurY = wp.y;
  }
}

function onPointerUp(e) {
  if (!isDragging) { isDragging = false; return; }
  let wp = screenToWorld(e.clientX, e.clientY);

  // Route-line tap (no drag) → open edit panel
  if (dragType === 'route-line' && !dragMoved) {
    openEditPanel(dragRouteIdx);
  }

  // Route-line drag → add stop
  if (dragType === 'route-line' && dragMoved) {
    let target = findFacilityAt(wp.x, wp.y, DRAG_FACILITY_RADIUS);
    if (target) {
      addStopToRoute(dragRouteIdx, dragRouteSegIdx, target);
    }
  }

  // Facility tap (no drag) → show info
  if (dragType === 'facility' && !dragMoved && dragStartFacility) {
    showFacilityInfo(dragStartFacility);
  }

  if (dragType === 'facility' && dragMoved) {
    let target = findFacilityAt(wp.x, wp.y, DRAG_FACILITY_RADIUS);
    if (target && target !== dragStartFacility) {
      createRouteFromDrag(dragStartFacility, target);
    }
  }

  isDragging = false;
  dragType = 'none';
  dragStartFacility = null;
  dragRouteIdx = -1;
  dragRouteSegIdx = -1;
}

// Check if a set of stop facility IDs satisfies the terminal requirement for a vehicle type
function hasRequiredTerminal(vehicleType, stopIds) {
  let vt = VEHICLE_TYPES[vehicleType];
  if (!vt.needsTerminal) return true; // bus: no terminal needed
  let needed = vt.needsTerminal; // e.g. 'tramStop', 'station', 'port', 'airport'
  for (let sid of stopIds) {
    let f = facilities[sid];
    if (f && f.type === needed) return true;
  }
  return false;
}

function getTerminalName(vehicleType) {
  let map = {tram:'路面電車停留所🚏',train:'駅🚉',ferry:'港⚓',plane:'空港✈️'};
  return map[vehicleType] || '';
}

function createRouteFromDrag(fromFac, toFac) {
  let maxR = 6;
  if (gameMode === 'stage') {
    let stage = STAGES[currentStage];
    if (stage.maxRoutes != null) maxR = stage.maxRoutes;
  }
  if (routes.length >= maxR) { showNotif('路線数上限です！'); return; }
  let crosses = routeCrossesRiver(fromFac, toFac);
  if (crosses && selectedVehicle !== 'ferry') {
    showNotif('川を渡るには⛴️船が必要です');
    return;
  }
  // Terminal check
  let stopIds = [fromFac.id, toFac.id];
  if (!hasRequiredTerminal(selectedVehicle, stopIds)) {
    let name = getTerminalName(selectedVehicle);
    showNotif(`${name}が路線に必要です！`);
    return;
  }
  let vt = VEHICLE_TYPES[selectedVehicle];
  let cost = vt.buildCost;
  if (money < cost) { showNotif('資金不足！'); return; }
  money -= cost;
  let newRoute = {
    stops: [fromFac.id, toFac.id],
    color: ROUTE_COLORS[routes.length % 6],
    interval: 60, // default 60 min
    vehicleType: selectedVehicle,
    crossesWater: crosses
  };
  routes.push(newRoute);
  syncVehicles(routes.length - 1);
  sfxRouteCreated();
  showNotif(`路線${routes.length}を開通！ (-¥${cost})`);
}

function addStopToRoute(ri, segIdx, newFac) {
  let r = routes[ri];
  if (!r) return;
  if (r.stops.includes(newFac.id)) { showNotif('既にこの路線の停車駅です'); return; }
  let beforeFac = facilities[r.stops[segIdx]];
  let afterFac = facilities[r.stops[segIdx + 1]];
  let crossesBefore = routeCrossesRiver(beforeFac, newFac);
  let crossesAfter = routeCrossesRiver(newFac, afterFac);
  if ((crossesBefore || crossesAfter) && r.vehicleType !== 'ferry') {
    showNotif('川を渡るには⛴️船が必要です');
    return;
  }
  let vt = VEHICLE_TYPES[r.vehicleType];
  let cost = Math.floor(vt.buildCost / 2);
  if (money < cost) { showNotif('資金不足！'); return; }
  money -= cost;
  r.stops.splice(segIdx + 1, 0, newFac.id);
  // Recompute crossesWater flag
  r.crossesWater = false;
  for (let i = 0; i < r.stops.length - 1; i++) {
    if (routeCrossesRiver(facilities[r.stops[i]], facilities[r.stops[i+1]])) {
      r.crossesWater = true; break;
    }
  }
  syncVehicles(ri);
  showNotif(`停車駅を追加！ (-¥${cost})`);
}

function onWheel(e) {
  e.preventDefault();
  let z = camZoom * (e.deltaY < 0 ? 1.1 : 0.9);
  camZoom = Math.max(0.4, Math.min(2.5, z));
}

let lastTouchDist = 0;
function onTouchStart(e) {
  if (e.touches.length === 2) {
    e.preventDefault();
    lastTouchDist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
  }
}
function onTouchMove(e) {
  if (e.touches.length === 2) {
    e.preventDefault();
    let d = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    if (lastTouchDist > 0) {
      camZoom *= d / lastTouchDist;
      camZoom = Math.max(0.4, Math.min(2.5, camZoom));
    }
    lastTouchDist = d;
  }
}
function onTouchEnd(e) {
  lastTouchDist = 0;
}

function fitCameraToFacilities() {
  if (facilities.length === 0) return;
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  facilities.forEach(f => {
    minX = Math.min(minX, f.x);
    maxX = Math.max(maxX, f.x);
    minY = Math.min(minY, f.y);
    maxY = Math.max(maxY, f.y);
  });
  let pad = 80;
  let bw = (maxX - minX) + pad * 2;
  let bh = (maxY - minY) + pad * 2;
  camX = (minX + maxX) / 2;
  camY = (minY + maxY) / 2;
  let zoomX = W / bw;
  let zoomY = (H - hudH - toolH) / bh;
  camZoom = Math.max(0.4, Math.min(2.0, Math.min(zoomX, zoomY)));
}

function clampCam() {
  let hw = W / 2 / camZoom;
  let hh = H / 2 / camZoom;
  camX = Math.max(hw - 50, Math.min(mapW - hw + 50, camX));
  camY = Math.max(hh - 50, Math.min(mapH - hh + 50, camY));
}

// ── Game Time ──
function formatGameTime() {
  let totalMin = Math.floor(gameMinutes) % 1440;
  let h = Math.floor(totalMin / 60);
  let m = totalMin % 60;
  return `Day ${gameDay} ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

// ── Simulation ──
function update(dt) {
  if (speed === 0 || gameState !== 'playing') return;
  let sDt = dt * speed;
  simTime += sDt;

  // Update game time: speed multiplier maps to game-minutes per real-second
  // x1: 1 sec = 1 min, x2: 1 sec = 2 min, x4: 1 sec = 4 min, x10: 1 sec = 10 min
  let gameMinDelta = dt * speed; // speed is already the multiplier (1,2,4,10)
  gameMinutes += gameMinDelta;

  // Day rollover
  while (gameMinutes >= (gameDay) * 1440 + 480) {
    // Check if we crossed a day boundary (midnight = gameDay * 1440 from start)
    // Actually simpler: track absolute minutes
  }
  let absoluteDay = Math.floor(gameMinutes / 1440) + 1;
  if (absoluteDay > gameDay) {
    gameDay = absoluteDay;
  }

  // Daily cost: charge once per day (every 1440 game-minutes)
  let daysSinceLastCost = Math.floor((gameMinutes - lastDayCostMinute) / 1440);
  if (daysSinceLastCost >= 1) {
    lastDayCostMinute += daysSinceLastCost * 1440;
    let totalCost = 0;
    routes.forEach(r => {
      totalCost += calcRouteDailyCost(r);
    });
    totalCost *= daysSinceLastCost;
    if (totalCost > 0) {
      money -= totalCost;
      dayExpense += totalCost;
      // Show daily report before resetting
      showDailyReport(gameDay - 1, dayIncome, dayExpense, dayDelivered);
      dayIncome = 0; dayExpense = 0; dayDelivered = 0;
    }
  }

  // Spawn facilities over time (free mode only)
  if (gameMode === 'free') {
    facilitySpawnTimer += sDt;
    if (facilitySpawnTimer > 30) {
      facilitySpawnTimer = 0;
      let types = [...DEST_TYPES, 'residential'];
      // Terminal facilities based on population thresholds
      if (totalPop >= 30) types.push('tramStop');
      if (totalPop >= 80) types.push('station');
      if (totalPop >= 20) types.push('port');
      if (totalPop >= 150) types.push('airport');
      let t = types[Math.floor(Math.random() * types.length)];
      spawnFacility(t, false);
    }
  }

  // Spawn people at residential
  let residentials = facilities.filter(f => f.type === 'residential');
  let destinations = facilities.filter(f => f.type !== 'residential' && !FACILITY_TYPES[f.type].terminal);
  residentials.forEach(f => {
    f.spawnTimer += sDt;
    let interval;
    if (gameMode === 'stage') {
      // Stage-specific spawn intervals: stage 1 slow, stage 5 fast
      const stageIntervals = [14, 11, 9, 7, 5];
      interval = stageIntervals[currentStage] || 8;
    } else {
      interval = Math.max(4, 12 - simTime / 120);
    }
    if (f.spawnTimer >= interval && destinations.length > 0 && people.length < MAX_PEOPLE) {
      f.spawnTimer = 0;
      let dest = destinations[Math.floor(Math.random() * destinations.length)];
      let person = {
        id: Math.random(),
        origin: f.id,
        dest: dest.id,
        destType: dest.type,
        state: 'waiting',
        facilityId: f.id,
        vehicleId: -1,
        x: f.x, y: f.y,
        transfers: 0
      };
      f.waiting.push(person);
      people.push(person);
      totalPop++;
    }
  });

  // Move vehicles
  vehicles.forEach(v => {
    let r = routes[v.routeIdx];
    if (!r || r.stops.length < 2) return;
    let vt = VEHICLE_TYPES[v.type];
    let totalSegs = r.stops.length - 1;

    if (v.dwellTimer > 0) {
      v.dwellTimer -= sDt;
      if (v.dwellTimer <= 0) v.dwellTimer = 0;
      return;
    }

    let routeLen = calcRouteLength(r);
    let pxSpeed = getEffectivePxSpeed(v.type, routeLen);
    // Convert px/real-second to px/game-minute: divide by 16 (scale factor)
    // gameMinDelta = dt * speed (game minutes elapsed this frame)
    let pxPerGameMin = pxSpeed / 16;
    let posIncrement = (routeLen > 0) ? (pxPerGameMin * gameMinDelta) / routeLen : 0;
    v.pos += v.dir * posIncrement;

    let atEnd = v.pos >= 1;
    let atStart = v.pos <= 0;

    let vtDwell = vt.dwell || 0.3;
    if (atEnd) { v.pos = 1; v.dir = -1; v.dwellTimer = vtDwell; v.atStation = -1; v.justTurned = true; }
    if (atStart) { v.pos = 0; v.dir = 1; v.dwellTimer = vtDwell; v.atStation = -1; v.justTurned = true; }

    // Check if near a stop — use generous threshold and also check if we crossed over a stop
    let nearStop = -1;
    let threshold = Math.max(0.04, posIncrement * 2.5);
    let prevPos = v.pos - v.dir * posIncrement;
    for (let i = 0; i <= totalSegs; i++) {
      let t = i / totalSegs;
      // Within threshold OR crossed over this stop
      let crossed = (v.dir > 0) ? (prevPos < t && v.pos >= t - threshold) : (prevPos > t && v.pos <= t + threshold);
      if (Math.abs(v.pos - t) < threshold || crossed) { nearStop = i; break; }
    }

    if (nearStop >= 0 && (nearStop !== v.atStation || v.justTurned)) {
      v.atStation = nearStop;
      v.justTurned = false;
      let fid = r.stops[nearStop];
      let f = facilities[fid];
      if (!f) return;

      // Unload
      let toUnload = [];
      v.passengers.forEach(p => {
        let exitHere = (p.dest === fid) || (p._exitStop === fid);
        if (exitHere) toUnload.push(p);
      });
      // Debug: log if passengers NOT unloading when they should
      if (toUnload.length === 0 && v.passengers.length > 0) {
        if (!window._lastUnloadDbg || Date.now() - window._lastUnloadDbg > 3000) {
          window._lastUnloadDbg = Date.now();
          v.passengers.slice(0,3).forEach(p => {
            console.log(`[DBG] Passenger on route ${v.routeIdx} (${v.type}): dest=${p.dest}, _exitStop=${p._exitStop}, currentStop fid=${fid}, fid===_exitStop: ${fid===p._exitStop}, typeof fid=${typeof fid}, typeof _exitStop=${typeof p._exitStop}`);
          });
        }
      }
      toUnload.forEach(p => {
        v.passengers = v.passengers.filter(pp => pp !== p);
        if (p.dest === fid) {
          // Arrived at final destination
          p.state = 'arrived';
          p.x = f.x; p.y = f.y;
          score++;
          // Distance-based fare
          let routeLen = calcRouteLength(r);
          let fare = Math.max(5, Math.round(routeLen / 50));
          // Transfer bonus
          fare += (p.transfers || 0) * 2;
          money += fare;
          dayIncome += fare;
          dayDelivered++;
          sfxPassengerArrived();
          people = people.filter(pp => pp !== p);
        } else {
          // Transfer — mark which route they just rode so they don't re-board it
          p.state = 'waiting';
          p._exitStop = undefined;
          p._lastRouteIdx = v.routeIdx;
          p.facilityId = fid;
          p.transfers = (p.transfers || 0) + 1;
          p.x = f.x; p.y = f.y;
          if (!f.waiting.includes(p)) f.waiting.push(p);
        }
      });

      // Load — skip passengers who just transferred OFF this same route
      if (v.passengers.length < vt.cap) {
        let toLoad = [];
        let skippedNoRoute = 0;
        f.waiting.forEach(p => {
          if (v.passengers.length + toLoad.length >= vt.cap) return;
          // Don't re-board the same route you just transferred from
          if (p._lastRouteIdx === v.routeIdx) return;
          if (r.stops.includes(p.dest)) {
            p._exitStop = p.dest;
            p._lastRouteIdx = undefined;
            toLoad.push(p);
          } else {
            let transferStop = findTransferStop(fid, p.dest, v.routeIdx);
            if (transferStop >= 0) {
              p._exitStop = transferStop;
              p._lastRouteIdx = undefined;
              toLoad.push(p);
            } else {
              skippedNoRoute++;
            }
          }
        });
        if (skippedNoRoute > 0 && !window._lastTransferWarn || Date.now() - window._lastTransferWarn > 5000) {
          console.warn(`[Transit] ${skippedNoRoute} passengers at facility ${fid} (${f.type}) cannot find route to destination. Route ${v.routeIdx} stops:`, r.stops.slice());
          // Log one passenger's details
          let stuck = f.waiting.find(p => !r.stops.includes(p.dest) && findTransferStop(fid, p.dest, v.routeIdx) < 0);
          if (stuck) console.warn(`  Stuck passenger: origin=${stuck.origin}, dest=${stuck.dest}, destType=${stuck.destType}, at facility=${fid}`);
          window._lastTransferWarn = Date.now();
        }
        toLoad.forEach(p => {
          f.waiting = f.waiting.filter(pp => pp !== p);
          p.state = 'riding';
          p.vehicleId = v.routeIdx;
          v.passengers.push(p);
        });
      }

      if (toUnload.length > 0 || v.passengers.length > 0) {
        v.dwellTimer = vt.dwell || 0.3;
      }
    }
  });

  // Update vehicle positions for rendering
  vehicles.forEach(v => {
    let r = routes[v.routeIdx];
    if (!r || r.stops.length < 2) return;
    let totalSegs = r.stops.length - 1;
    let seg = Math.floor(v.pos * totalSegs);
    seg = Math.max(0, Math.min(totalSegs - 1, seg));
    let t = (v.pos * totalSegs) - seg;
    let a = facilities[r.stops[seg]];
    let b = facilities[r.stops[seg + 1]];
    if (a && b) {
      v.wx = a.x + (b.x - a.x) * t;
      v.wy = a.y + (b.y - a.y) * t;
    }
  });

  // Remove unreachable passengers every ~3 seconds (avoid doing BFS every frame)
  if (!window._unreachableTimer) window._unreachableTimer = 0;
  window._unreachableTimer += sDt;
  if (window._unreachableTimer > 3) {
    window._unreachableTimer = 0;
    for (let f of facilities) {
      let before = f.waiting.length;
      f.waiting = f.waiting.filter(p => {
        if (p.state !== 'waiting') return true;
        if (isReachable(f.id, p.dest)) return true;
        // Remove unreachable passenger
        people = people.filter(pp => pp !== p);
        return false;
      });
    }
  }

  // Check overcrowding + hints
  for (let f of facilities) {
    if (f.waiting.length >= OVERCROWD_LIMIT) {
      f.flashTimer += sDt;
      // Show hint when first reaching overcrowd limit
      if (f.flashTimer > 0 && f.flashTimer < sDt * 2) {
        let typeNames = {residential:'住宅地',office:'オフィス',factory:'工場',commercial:'商業施設',hospital:'病院',tramStop:'停留所',station:'駅',port:'港',airport:'空港'};
        showNotif(`⚠️ ${typeNames[f.type]||f.type}が混雑しています！路線を追加しよう`);
      }
      // No game over from overcrowding — just flash warning
    } else {
      f.flashTimer = 0;
    }
  }

  // Low money hint
  if (money >= 0 && money < 30 && routes.length > 0 && !_lowMoneyHinted) {
    _lowMoneyHinted = true;
    showNotif('💰 資金注意！不要な路線を削除して節約しよう');
  }
  if (money > 60) _lowMoneyHinted = false;

  // Check bankruptcy
  if (money < -50) {
    gameOver('資金が尽きました！');
    return;
  }

  // Cap people: remove oldest waiting people if over limit
  if (people.length > MAX_PEOPLE) {
    let waiting = people.filter(p => p.state === 'waiting');
    while (people.length > MAX_PEOPLE && waiting.length > 0) {
      let oldest = waiting.shift();
      let f = facilities[oldest.facilityId];
      if (f) f.waiting = f.waiting.filter(p => p !== oldest);
      people = people.filter(p => p !== oldest);
    }
  }

  // Stage clear check
  if (gameMode === 'stage') {
    let stage = STAGES[currentStage];
    if (score >= stage.goal) {
      stageClear();
      return;
    }
  }

  // Unlock vehicles (free mode only)
  if (gameMode === 'free') updateUnlocks();
}

function updateUnlocks() {
  $$('#vehicle-select button').forEach(b => {
    let vt = VEHICLE_TYPES[b.dataset.v];
    let unlocked = totalPop >= vt.unlockPop;
    b.disabled = !unlocked;
    if (unlocked && !currentUnlocks.includes(b.dataset.v)) {
      currentUnlocks.push(b.dataset.v);
    }
  });
}

function gameOver(reason) {
  gameState = 'over';
  sfxGameOver();
  $('#go-title').textContent = 'GAME OVER';
  $('#go-reason').textContent = reason;
  $('#go-score').textContent = score;
  if (gameMode === 'stage') {
    let stage = STAGES[currentStage];
    let pct = Math.min(100, Math.round(score / stage.goal * 100));
    $('#go-achievement').textContent = `達成率: ${pct}% (目標: ${stage.goal}人)`;
  } else {
    $('#go-achievement').textContent = `Day ${gameDay} まで運営 ｜ 路線: ${routes.length}本`;
  }
  $('#game-over').style.display = 'flex';
}

function stageClear() {
  gameState = 'stageclear';
  let stage = STAGES[currentStage];
  $('#sc-msg').textContent = `${stage.name}をクリア！`;
  $('#sc-score').textContent = score;
  // Star rating
  let stars = 1;
  let ratio = score / stage.goal;
  if (ratio >= 2.0) stars = 3;
  else if (ratio >= 1.5) stars = 2;
  let starText = '⭐'.repeat(stars) + '☆'.repeat(3 - stars);
  let ratingMsg = stars === 3 ? '完璧！' : stars === 2 ? 'すばらしい！' : 'クリア！';
  $('#sc-stars').textContent = starText;
  $('#sc-msg').textContent = `${stage.name} — ${ratingMsg}`;
  if (currentStage >= STAGES.length - 1) {
    $('#next-stage-btn').textContent = '🎉 全ステージクリア！';
  } else {
    $('#next-stage-btn').textContent = '次のステージへ →';
  }
  $('#stage-clear').style.display = 'flex';
}

// ── Drawing ──
function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = BG;
  ctx.fillRect(0, 0, W, H);

  if (gameState === 'title' || gameState === 'stageselect') return;

  ctx.save();
  ctx.translate(W/2, H/2);
  ctx.scale(camZoom, camZoom);
  ctx.translate(-camX, -camY);

  // Map border
  ctx.strokeStyle = '#d5d0c0';
  ctx.lineWidth = 2;
  ctx.strokeRect(0, 0, mapW, mapH);

  // Rivers
  rivers.forEach(r => {
    ctx.beginPath();
    ctx.moveTo(r.points[0].x, r.points[0].y);
    for (let i = 1; i < r.points.length; i++) {
      let p = r.points[i], pp = r.points[i-1];
      let mx = (pp.x + p.x) / 2, my = (pp.y + p.y) / 2;
      ctx.quadraticCurveTo(pp.x, pp.y, mx, my);
    }
    ctx.strokeStyle = '#a8d4e6';
    ctx.lineWidth = r.width;
    ctx.lineCap = 'round';
    ctx.stroke();
    ctx.strokeStyle = '#8bc4d8';
    ctx.lineWidth = r.width * 0.6;
    ctx.stroke();
  });

  // Routes
  routes.forEach((r, ri) => {
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    // Dark outline for contrast
    ctx.strokeStyle = 'rgba(0,0,0,.25)';
    ctx.lineWidth = 10;
    ctx.beginPath();
    for (let i = 0; i < r.stops.length; i++) {
      let f = facilities[r.stops[i]];
      if (!f) continue;
      if (i === 0) ctx.moveTo(f.x, f.y);
      else ctx.lineTo(f.x, f.y);
    }
    ctx.stroke();

    // Main color line
    ctx.strokeStyle = r.color;
    ctx.lineWidth = 7;
    ctx.beginPath();
    for (let i = 0; i < r.stops.length; i++) {
      let f = facilities[r.stops[i]];
      if (!f) continue;
      if (i === 0) ctx.moveTo(f.x, f.y);
      else ctx.lineTo(f.x, f.y);
    }
    ctx.stroke();

    // Highlight if editing this route
    if (ri === editingRoute) {
      ctx.strokeStyle = 'rgba(255,255,255,.5)';
      ctx.lineWidth = 13;
      ctx.beginPath();
      for (let i = 0; i < r.stops.length; i++) {
        let f = facilities[r.stops[i]];
        if (!f) continue;
        if (i === 0) ctx.moveTo(f.x, f.y);
        else ctx.lineTo(f.x, f.y);
      }
      ctx.stroke();
    }

    // Stop markers
    r.stops.forEach(sid => {
      let f = facilities[sid];
      if (!f) return;
      ctx.beginPath();
      ctx.arc(f.x, f.y, 6, 0, Math.PI * 2);
      ctx.fillStyle = r.color;
      ctx.fill();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.stroke();
    });
  });

  // Drag preview line
  if (isDragging && (dragType === 'facility' || dragType === 'route-line') && dragMoved) {
    let startX, startY;
    if (dragType === 'facility' && dragStartFacility) {
      startX = dragStartFacility.x;
      startY = dragStartFacility.y;
    } else if (dragType === 'route-line') {
      let r = routes[dragRouteIdx];
      if (r) {
        let a = facilities[r.stops[dragRouteSegIdx]];
        let b = facilities[r.stops[dragRouteSegIdx + 1]];
        if (a && b) {
          startX = (a.x + b.x) / 2;
          startY = (a.y + b.y) / 2;
        }
      }
    }
    if (startX !== undefined) {
      ctx.strokeStyle = dragType === 'route-line' ? routes[dragRouteIdx].color : ROUTE_COLORS[routes.length % 6];
      ctx.lineWidth = 4;
      ctx.setLineDash([8, 4]);
      ctx.beginPath();
      ctx.moveTo(startX, startY);
      ctx.lineTo(dragCurX, dragCurY);
      ctx.stroke();
      ctx.setLineDash([]);

      let target = findFacilityAt(dragCurX, dragCurY, DRAG_FACILITY_RADIUS);
      if (target && (dragType !== 'facility' || target !== dragStartFacility)) {
        ctx.beginPath();
        ctx.arc(target.x, target.y, FACILITY_RADIUS + 6, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(74,144,217,.6)';
        ctx.lineWidth = 3;
        ctx.setLineDash([]);
        ctx.stroke();
      }
    }
  }

  // Facilities
  facilities.forEach(f => {
    let ft = FACILITY_TYPES[f.type];
    let flashing = f.waiting.length >= OVERCROWD_LIMIT && Math.sin(simTime * 8) > 0;

    ctx.save();
    ctx.translate(f.x, f.y);

    ctx.shadowColor = 'rgba(0,0,0,.12)';
    ctx.shadowBlur = 6;
    ctx.shadowOffsetY = 2;

    if (flashing) {
      ctx.shadowColor = 'rgba(232,93,93,.5)';
      ctx.shadowBlur = 12;
    }

    drawShape(ft.shape, 0, 0, FACILITY_RADIUS, flashing ? '#ffe0e0' : ft.color, ft.stroke);

    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;
    ctx.shadowOffsetY = 0;

    let wc = f.waiting.length;
    if (wc > 0) {
      ctx.fillStyle = wc >= OVERCROWD_LIMIT ? '#e85d5d' : '#3a3a3a';
      ctx.font = 'bold 11px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(wc, 0, -FACILITY_RADIUS - 6);
    }

    let maxDots = Math.min(wc, 8);
    for (let i = 0; i < maxDots; i++) {
      let p = f.waiting[i];
      let angle = (i / maxDots) * Math.PI * 2;
      let dx = Math.cos(angle) * (FACILITY_RADIUS + 8);
      let dy = Math.sin(angle) * (FACILITY_RADIUS + 8);
      ctx.beginPath();
      ctx.arc(dx, dy, 3, 0, Math.PI * 2);
      let destF = FACILITY_TYPES[p.destType];
      ctx.fillStyle = destF ? destF.color === '#ffffff' ? '#aaa' : destF.stroke : '#888';
      ctx.fill();
    }

    ctx.restore();
  });

  // Vehicles
  vehicles.forEach(v => {
    if (v.wx == null) return;
    let r = routes[v.routeIdx];
    if (!r) return;
    let vt = VEHICLE_TYPES[v.type];

    ctx.save();
    ctx.translate(v.wx, v.wy);

    // Scale vehicle size based on passenger count
    let loadRatio = v.passengers.length / Math.max(vt.cap, 1);
    let baseR = 10;
    let vRadius = baseR + loadRatio * 5; // 10~15px radius

    ctx.beginPath();
    ctx.arc(0, 0, vRadius, 0, Math.PI * 2);
    ctx.fillStyle = r.color;
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Load indicator ring when near capacity
    if (loadRatio > 0.7) {
      ctx.beginPath();
      ctx.arc(0, 0, vRadius + 3, -Math.PI/2, -Math.PI/2 + Math.PI*2*loadRatio);
      ctx.strokeStyle = loadRatio > 0.9 ? '#e85d5d' : '#e8a83d';
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    let iconSize = 10 + loadRatio * 3;
    ctx.font = `${iconSize}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#fff';
    ctx.fillText(vt.icon, 0, 0);

    if (v.passengers.length > 0) {
      ctx.font = 'bold 9px sans-serif';
      ctx.fillStyle = '#fff';
      ctx.fillText(v.passengers.length, 0, vRadius + 10);
    }

    ctx.restore();
  });

  ctx.restore();

  // Minimap
  if (facilities.length > 2) {
    let mmW = 100, mmH = 70;
    let mmX = W - mmW - 8, mmY = H - toolH - mmH - 8;
    ctx.save();
    ctx.globalAlpha = 0.75;
    ctx.fillStyle = '#fff';
    ctx.strokeStyle = '#bbb';
    ctx.lineWidth = 1;
    ctx.fillRect(mmX, mmY, mmW, mmH);
    ctx.strokeRect(mmX, mmY, mmW, mmH);
    let scX = mmW / mapW, scY = mmH / mapH;
    // Draw rivers on minimap
    rivers.forEach(r => {
      ctx.beginPath();
      r.points.forEach((p, i) => {
        let mx = mmX + p.x * scX, my = mmY + p.y * scY;
        if (i === 0) ctx.moveTo(mx, my); else ctx.lineTo(mx, my);
      });
      ctx.strokeStyle = '#a8d4e6';
      ctx.lineWidth = 2;
      ctx.stroke();
    });
    // Routes on minimap
    routes.forEach(r => {
      ctx.beginPath();
      r.stops.forEach((sid, i) => {
        let f = facilities[sid];
        if (!f) return;
        let mx = mmX + f.x * scX, my = mmY + f.y * scY;
        if (i === 0) ctx.moveTo(mx, my); else ctx.lineTo(mx, my);
      });
      ctx.strokeStyle = r.color;
      ctx.lineWidth = 1.5;
      ctx.stroke();
    });
    // Facilities on minimap
    facilities.forEach(f => {
      let mx = mmX + f.x * scX, my = mmY + f.y * scY;
      let ft = FACILITY_TYPES[f.type];
      ctx.beginPath();
      ctx.arc(mx, my, 2, 0, Math.PI * 2);
      ctx.fillStyle = ft.color === '#ffffff' ? '#aaa' : ft.stroke;
      ctx.fill();
    });
    // Viewport rectangle
    let vl = camX - W / 2 / camZoom, vt2 = camY - H / 2 / camZoom;
    let vw = W / camZoom, vh = H / camZoom;
    ctx.strokeStyle = '#e85d5d';
    ctx.lineWidth = 1;
    ctx.strokeRect(mmX + vl * scX, mmY + vt2 * scY, vw * scX, vh * scY);
    ctx.restore();
  }

  // Update HUD
  $('#h-time').textContent = formatGameTime();
  $('#h-pop').textContent = totalPop;
  $('#h-money').textContent = Math.floor(money);
  $('#h-score').textContent = score;

  // Update edit panel if open
  if (editingRoute >= 0 && routes[editingRoute]) {
    updateEditPanel();
  }
}

function drawShape(shape, x, y, r, fill, stroke) {
  ctx.fillStyle = fill;
  ctx.strokeStyle = stroke;
  ctx.lineWidth = 2.5;

  switch (shape) {
    case 'circle':
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      break;
    case 'square': {
      ctx.beginPath();
      let s = r * 0.8;
      ctx.rect(x - s, y - s, s * 2, s * 2);
      ctx.fill();
      ctx.stroke();
      break;
    }
    case 'triangle':
      ctx.beginPath();
      ctx.moveTo(x, y - r);
      ctx.lineTo(x + r * 0.9, y + r * 0.7);
      ctx.lineTo(x - r * 0.9, y + r * 0.7);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      break;
    case 'diamond':
      ctx.beginPath();
      ctx.moveTo(x, y - r);
      ctx.lineTo(x + r * 0.7, y);
      ctx.lineTo(x, y + r);
      ctx.lineTo(x - r * 0.7, y);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      break;
    case 'cross': {
      ctx.beginPath();
      let cw = r * 0.35;
      ctx.moveTo(x - cw, y - r * 0.8);
      ctx.lineTo(x + cw, y - r * 0.8);
      ctx.lineTo(x + cw, y - cw);
      ctx.lineTo(x + r * 0.8, y - cw);
      ctx.lineTo(x + r * 0.8, y + cw);
      ctx.lineTo(x + cw, y + cw);
      ctx.lineTo(x + cw, y + r * 0.8);
      ctx.lineTo(x - cw, y + r * 0.8);
      ctx.lineTo(x - cw, y + cw);
      ctx.lineTo(x - r * 0.8, y + cw);
      ctx.lineTo(x - r * 0.8, y - cw);
      ctx.lineTo(x - cw, y - cw);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      break;
    }
  }
}

// ── Game Loop ──
function loop(ts) {
  let dt = Math.min((ts - lastFrame) / 1000, 0.1);
  lastFrame = ts;

  if (gameState === 'playing') {
    update(dt);
  }
  if (!document.hidden) draw();
  requestAnimationFrame(loop);
}

camX = 450;
camY = 350;

window.addEventListener('load', init);
</script>
<div id="dbg-log" style="position:fixed;bottom:60px;left:0;right:0;max-height:120px;overflow-y:auto;background:rgba(0,0,0,.85);color:#0f0;font-size:10px;font-family:monospace;padding:4px 6px;z-index:999;display:none;pointer-events:auto" onclick="this.style.display='none'"></div>
<script>
(function(){
  var el=document.getElementById('dbg-log');
  var orig=console.warn;
  var origLog=console.log;
  function addLine(txt){
    el.style.display='block';
    var d=document.createElement('div');
    d.textContent=txt;
    el.appendChild(d);
    if(el.children.length>30)el.removeChild(el.firstChild);
    el.scrollTop=el.scrollHeight;
  }
  console.warn=function(){orig.apply(console,arguments);var t=[].map.call(arguments,String).join(' ');if(t.includes('[Transit]'))addLine(t)};
  console.log=function(){origLog.apply(console,arguments);var t=[].map.call(arguments,String).join(' ');if(t.includes('[DBG]'))addLine(t)};
})();
</script>
