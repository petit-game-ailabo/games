<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>忍者ディフェンス</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      background: #111;
      color: #fff;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      touch-action: none;
    }
    canvas {
      border: 2px solid #333;
      display: block;
      max-width: 100vw;
      max-height: 70vh;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    #ui {
      position: fixed;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.7);
      padding: 10px;
      border-radius: 5px;
      font-size: 14px;
      z-index: 10;
    }
    #palette {
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      background: rgba(0,0,0,0.8);
      padding: 10px;
      border-radius: 10px;
      z-index: 10;
    }
    .btn {
      background: #444;
      color: #fff;
      border: 2px solid #666;
      padding: 10px 15px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
      min-width: 80px;
      text-align: center;
      user-select: none;
    }
    .btn:hover { background: #555; }
    .btn.selected { background: #08f; border-color: #0af; }
    .btn.disabled { opacity: 0.5; cursor: not-allowed; }
    #modal {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    #modal h1 { font-size: 48px; margin-bottom: 20px; }
    #modal p { font-size: 20px; margin: 10px 0; }
    #modal button { 
      margin-top: 20px; 
      padding: 15px 30px; 
      font-size: 18px;
      background: #08f;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    #modal button:hover { background: #0af; }
  </style>
</head>
<body>
  <canvas id="canvas" width="672" height="672"></canvas>
  
  <div id="ui">
    <div>Wave: <span id="wave">0</span>/6</div>
    <div>ライフ: <span id="life">5</span></div>
    <div>コスト: <span id="cost">0</span></div>
    <div>捕獲: <span id="caught">0</span></div>
    <div id="tutorialText" style="margin-top: 10px; font-size: 12px; color: #ff0; max-width: 200px; display: none;"></div>
  </div>

  <div id="palette">
    <button class="btn" id="btnCamera">📷 カメラ(2)</button>
    <button class="btn" id="btnGuard">🚶 ガード(5)</button>
    <button class="btn" id="btnLight">💡 ライト(3)</button>

    <button class="btn" id="btnWall">🧱 壁(3)</button>

    // アセット読み込み

    // ユニット定義
    const unitTypes = {
      camera: { cost: 2, name: 'カメラ', range: 5, angle: 60, rotSpeed: 30, onWall: true },
      guard: { cost: 5, name: 'ガード', range: 4, patrol: 2, onWall: false },

      trap: { cost: 4, name: '罠', onWall: false, isTrap: true }, // 床専用、使い捨て
      wall: { cost: 3, name: '壁', onWall: false, isWallBuild: true } // 床→壁変換
    };

    // Wave初期化
    function initWave(waveNum) {
      const config = waveConfigs[waveNum];
      MAP_SIZE = config.size;
      treasurePos = config.treasure;
      
      // マップコピー
      map = config.map.map(row => [...row]);
      
      // キャンバスサイズ変更
      canvas.width = MAP_SIZE * TILE_SIZE;
      canvas.height = MAP_SIZE * TILE_SIZE;
      
      // コスト設定
      if (waveNum === 0 || config.startCost !== undefined) {
        cost = config.startCost;
      } else if (config.addCost !== undefined) {
        cost += config.addCost;
      }
      
      // ユニットリセット（マップが変わるため）
      units = [];
      
      // プリセットユニット配置（チュートリアル用）
      if (config.preplacedUnits) {
        for (const preset of config.preplacedUnits) {
          const ut = unitTypes[preset.type];
          units.push({
            type: preset.type,
            x: preset.x + 0.5,
            y: preset.y + 0.5,
            tx: preset.x,
            ty: preset.y,
            angle: 0,
            range: ut.range,
            patrolDir: 1,
            patrolAxis: 'x',
            patrolStart: preset.x
          });
        }
      }
      
      // チュートリアルテキスト表示
      const tutorialEl = document.getElementById('tutorialText');
      if (config.tutorialText) {
        tutorialEl.innerHTML = config.tutorialText;

      } else {

      updateUI();

    // レイキャスト（壁判定付き視界コーン）
    function castVisionCone(x, y, angle, range, fov = 60) {
      const points = [{x, y}];
      const rayCount = 30;
      const startAngle = angle - fov / 2;
      for (let i = 0; i <= rayCount; i++) {
        const a = (startAngle + (fov / rayCount) * i) * Math.PI / 180;
        let rx = x, ry = y;
        for (let d = 0; d <= range; d += 0.2) {
          rx = x + Math.cos(a) * d;
          ry = y + Math.sin(a) * d;
          const tx = Math.floor(rx);
          const ty = Math.floor(ry);
          if (tx < 0 || ty < 0 || tx >= MAP_SIZE || ty >= MAP_SIZE || map[ty][tx] === WALL) {
            break;
          }
        }
        points.push({x: rx, y: ry});
      }
      return points;
    }

    // 忍者が視界内にいるか判定
    // BFS経路探索（視界を避けつつ最短経路を見つける）
    function findPathBFS(sx, sy, gx, gy, routePreference = 0) {
      const dirs = [{x:0,y:-1},{x:0,y:1},{x:-1,y:0},{x:1,y:0}];
      // ダイクストラ的に：視界内のタイルはコスト高、それ以外はコスト1
      const cost = Array(MAP_SIZE).fill(0).map(() => Array(MAP_SIZE).fill(Infinity));
      const prev = Array(MAP_SIZE).fill(0).map(() => Array(MAP_SIZE).fill(null));
      cost[sy][sx] = 0;
      
      // 優先度つきキュー（簡易：配列ソート）
      const queue = [{x:sx, y:sy, c:0}];
      
      while (queue.length > 0) {
        queue.sort((a,b) => a.c - b.c);
        const cur = queue.shift();
        if (cur.x === gx && cur.y === gy) break;
        if (cur.c > cost[cur.y][cur.x]) continue;
        
        for (const d of dirs) {
          const nx = cur.x + d.x;
          const ny = cur.y + d.y;
          if (nx < 0 || ny < 0 || nx >= MAP_SIZE || ny >= MAP_SIZE) continue;
          if (map[ny][nx] !== FLOOR && map[ny][nx] !== TREASURE) continue;
          
          // 視界内なら高コスト、そうでなければ1
          let tileCost = 1;
          const testPos = {x: nx+0.5, y: ny+0.5};
          
          // 視界チェック
          for (const u of units) {
            if (isNinjaInVision(u, testPos)) { tileCost = 50; break; }
          }
          
          // 罠チェック（視界ほどじゃないがリスクあり）
          for (const u of units) {
            if (u.isTrap && !u.triggered && u.tx === nx && u.ty === ny) {
              tileCost += 30;
              break;
            }
          }
          
          // ルート分散：他の忍者の経路と重複を避ける（軽いペナルティ）
          const otherNinjasOnTile = ninjas.filter(n => 
            n.state === 'move' && Math.floor(n.x) === nx && Math.floor(n.y) === ny
          ).length;
          tileCost += otherNinjasOnTile * 2;
          
          // ルート選好によるバイアス（縦優先・横優先・バランス）
          if (routePreference === 0 && d.y !== 0) tileCost += 0.5; // 縦優先
          if (routePreference === 1 && d.x !== 0) tileCost += 0.5; // 横優先
          // routePreference === 2 はバイアスなし
          
          const nc = cur.c + tileCost;
          if (nc < cost[ny][nx]) {
            cost[ny][nx] = nc;
            prev[ny][nx] = {x: cur.x, y: cur.y};
            queue.push({x:nx, y:ny, c:nc});
          }
        }
      }
      
      // 経路復元
      if (cost[gy][gx] === Infinity) return null; // 到達不能
      
      const path = [];
      let cx = gx, cy = gy;
      while (cx !== sx || cy !== sy) {
        path.unshift({x:cx, y:cy});
        const p = prev[cy][cx];
        if (!p) return null;
        cx = p.x;
        cy = p.y;
      }
      return path;
    }
    
    // 全経路が塞がっているかチェック（降参判定）
    function isAllPathsBlocked(sx, sy) {
      // BFSで壁と視界を無視せず、ゴールに到達できるか
      const dirs = [{x:0,y:-1},{x:0,y:1},{x:-1,y:0},{x:1,y:0}];
      const visited = Array(MAP_SIZE).fill(0).map(() => Array(MAP_SIZE).fill(false));
      const queue = [{x:sx, y:sy}];
      visited[sy][sx] = true;
      while (queue.length > 0) {
        const cur = queue.shift();
        if (cur.x === treasurePos.x && cur.y === treasurePos.y) return false; // 到達可能
        for (const d of dirs) {
          const nx = cur.x + d.x;
          const ny = cur.y + d.y;
          if (nx < 0 || ny < 0 || nx >= MAP_SIZE || ny >= MAP_SIZE) continue;
          if (visited[ny][nx]) continue;
          if (map[ny][nx] !== FLOOR && map[ny][nx] !== TREASURE) continue;
          // 視界内は通れないとして判定
          const testPos = {x: nx+0.5, y: ny+0.5};
          let blocked = false;
          for (const u of units) {
            if (isNinjaInVision(u, testPos)) { blocked = true; break; }
          }
          if (blocked) continue;
          visited[ny][nx] = true;
          queue.push({x:nx, y:ny});
        }
      }
      return true; // 到達不能 → 降参
    }

    function isNinjaInVision(unit, ninja) {
      const dx = ninja.x - unit.x;
      const dy = ninja.y - unit.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist > unit.range) return false;

      // レイキャストで壁チェック
      const steps = Math.ceil(dist * 5);
      for (let i = 0; i <= steps; i++) {
        const t = i / steps;
        const cx = unit.x + dx * t;
        const cy = unit.y + dy * t;
        const tx = Math.floor(cx);
        const ty = Math.floor(cy);
        if (map[ty] && map[ty][tx] === WALL) return false;
      }

      // 角度チェック（カメラのみ）
      if (unit.type === 'camera') {
        const angle = Math.atan2(dy, dx) * 180 / Math.PI;
        let diff = angle - unit.angle;
        while (diff > 180) diff -= 360;
        while (diff < -180) diff += 360;
        if (Math.abs(diff) > 60) return false;
      }

      return true;
    }

    // 配置
    function placeUnit(type, tx, ty) {
      const ut = unitTypes[type];
      if (cost < ut.cost) return false;
      
      // 壁建設の場合
      if (ut.isWallBuild) {
        if (map[ty][tx] !== FLOOR) return false;
        map[ty][tx] = WALL; // 床→壁に変換
        cost -= ut.cost;
        sounds.coin.play();
        updateUI();
        return true;
      }
      
      if (ut.onWall && map[ty][tx] !== WALL) return false;
      if (!ut.onWall && map[ty][tx] !== FLOOR) return false;

      const unit = {
        type,
        x: tx + 0.5,
        y: ty + 0.5,
        tx, ty,
        angle: 0,
        range: ut.range || 0,
        patrolDir: Math.random() > 0.5 ? 1 : -1,
        patrolAxis: Math.random() > 0.5 ? 'x' : 'y',
        patrolStart: (Math.random() > 0.5 ? tx : ty),
        isTrap: ut.isTrap || false,
        triggered: false
      };

      units.push(unit);
      cost -= ut.cost;
      sounds.coin.play();
      updateUI();
      return true;
    }

    // 撤去
    function removeUnit(tx, ty) {
      // ユニットの撤去
      const idx = units.findIndex(u => u.tx === tx && u.ty === ty);
      if (idx >= 0) {
        const u = units[idx];
        cost += unitTypes[u.type].cost;
        units.splice(idx, 1);
        updateUI();
        return;
      }
      
      // 壁→床変換（建てた壁の撤去）
      if (map[ty] && map[ty][tx] === WALL) {
        // 初期マップと比較して、後から建てた壁かチェック
        // 簡易実装：常に撤去可能とする（初期壁も含む）
        map[ty][tx] = FLOOR;
        cost += 3; // 壁建設コスト返却
        updateUI();
      }
    }

    // 忍者生成
    function spawnNinjas(wave) {
      ninjas = [];
      const config = waveConfigs[wave];
      const count = config.ninjaCount;
      const aiLevel = 'smart'; // 常に賢いAI
      const spawnPattern = config.spawnPattern || 'random';
      
      // 使用済みルート記録（ルート分散のため）
      const usedRoutes = [];
      
      if (spawnPattern === 'surround') {
        // 四方からバランスよく配置
        const positions = [
          // 上辺
          {x: 1, y: 1}, {x: 3, y: 1}, {x: 5, y: 1},
          // 下辺
          {x: MAP_SIZE-2, y: 8}, {x: MAP_SIZE-2, y: 10},
          // 左辺
          {x: 1, y: 5}, {x: 1, y: 9},
          // 右辺
          {x: MAP_SIZE-2, y: 3}, {x: MAP_SIZE-2, y: 6}, {x: MAP_SIZE-2, y: 12}
        ];
        
        for (let i = 0; i < Math.min(count, positions.length); i++) {
          let {x: sx, y: sy} = positions[i];
          
          // 床タイルを見つける
          let attempts = 0;
          while (map[sy] && map[sy][sx] !== FLOOR && attempts < 50) {
            sx = Math.max(1, Math.min(MAP_SIZE - 2, sx + (Math.random() > 0.5 ? 1 : -1)));
            sy = Math.max(1, Math.min(MAP_SIZE - 2, sy + (Math.random() > 0.5 ? 1 : -1)));
            attempts++;
          }
          
          ninjas.push({
            x: sx + 0.5,
            y: sy + 0.5,
            tx: sx,
            ty: sy,
            dir: 0,
            frame: 0,
            frameTime: 0,
            moveTime: 0,
            moveDuration: 0.5,
            ai: aiLevel,
            state: 'move',
            path: [],
            age: 0,
            routePreference: i % 3 // ルート分散用（3パターン）
          });
        }
      } else {
        // ランダム配置（通常）
        for (let i = 0; i < count; i++) {
          let sx, sy;
          const side = Math.floor(Math.random() * 3); // 上・左・右
          if (side === 0) { // 上
            sx = 1 + Math.floor(Math.random() * (MAP_SIZE - 2));
            sy = 1;
          } else if (side === 1) { // 左
            sx = 1;
            sy = 1 + Math.floor(Math.random() * (MAP_SIZE - 2));
          } else { // 右
            sx = MAP_SIZE - 2;
            sy = 1 + Math.floor(Math.random() * (MAP_SIZE - 2));
          }
          
          // 床タイルを見つけるまでリトライ
          let attempts = 0;
          while (map[sy] && map[sy][sx] !== FLOOR && attempts < 100) {
            sx = 1 + Math.floor(Math.random() * (MAP_SIZE - 2));
            sy = 1 + Math.floor(Math.random() * (MAP_SIZE - 2));
            attempts++;
          }

          ninjas.push({
            x: sx + 0.5,
            y: sy + 0.5,
            tx: sx,
            ty: sy,
            dir: 0,
            frame: 0,
            frameTime: 0,
            moveTime: 0,
            moveDuration: 0.5,
            ai: aiLevel,
            state: 'move',
            path: [],
            age: 0,
            routePreference: i % 3 // ルート分散用（3パターン）
          });
        }
      }
    }

    // 忍者AI
    function updateNinjaAI(ninja, dt) {
      if (ninja.state === 'dead' || ninja.state === 'reached' || ninja.state === 'surrender') return;

      // タイムアウトチェック（30秒）
      ninja.age = (ninja.age || 0) + dt;
      if (ninja.age > 30) {
        ninja.state = 'dead';
        return;
      }

      ninja.moveTime += dt;
      if (ninja.moveTime >= ninja.moveDuration) {
        ninja.moveTime = 0;

        // 目標到達チェック
        if (ninja.tx === treasurePos.x && ninja.ty === treasurePos.y) {
          ninja.state = 'reached';
          life--;
          updateUI();
          sounds.gameover.play();
          if (life <= 0) {
            gameState = 'gameover';
          }
          return;
        }

        // 次の移動先を決定
        let nextX = ninja.tx;
        let nextY = ninja.ty;

        if (ninja.ai === 'random') {
          // ランダム歩き（宝方向に少し偏る）
          const dirs = [];
          if (map[ninja.ty-1] && map[ninja.ty-1][ninja.tx] === FLOOR) dirs.push({x:0, y:-1, d:3});
          if (map[ninja.ty+1] && map[ninja.ty+1][ninja.tx] === FLOOR) dirs.push({x:0, y:1, d:0});
          if (map[ninja.ty][ninja.tx-1] === FLOOR) dirs.push({x:-1, y:0, d:1});
          if (map[ninja.ty][ninja.tx+1] === FLOOR) dirs.push({x:1, y:0, d:2});

          // 宝の方向を優先
          const dx = treasurePos.x - ninja.tx;
          const dy = treasurePos.y - ninja.ty;
          const preferred = dirs.filter(d => 
            (dx > 0 && d.x > 0) || (dx < 0 && d.x < 0) ||
            (dy > 0 && d.y > 0) || (dy < 0 && d.y < 0)
          );
          const choice = (Math.random() < 0.7 && preferred.length) ? preferred : dirs;
          if (choice.length) {
            const move = choice[Math.floor(Math.random() * choice.length)];
            nextX += move.x;
            nextY += move.y;
            ninja.dir = move.d;
          }
        } else if (ninja.ai === 'avoid') {
          // 視界を避けつつ宝へ
          const dirs = [
            {x:0, y:-1, d:3}, {x:0, y:1, d:0}, {x:-1, y:0, d:1}, {x:1, y:0, d:2}
          ];
          let best = null;
          let bestScore = -Infinity;

          for (const move of dirs) {
            const nx = ninja.tx + move.x;
            const ny = ninja.ty + move.y;
            if (nx < 0 || ny < 0 || nx >= MAP_SIZE || ny >= MAP_SIZE) continue;
            if (map[ny][nx] !== FLOOR && map[ny][nx] !== TREASURE) continue;

            // スコア = 宝への距離 - 視界リスク
            const dist = Math.abs(nx - treasurePos.x) + Math.abs(ny - treasurePos.y);
            let risk = 0;
            for (const u of units) {
              const testNinja = {x: nx+0.5, y: ny+0.5};
              if (isNinjaInVision(u, testNinja)) risk += 10;
            }
            const score = -dist - risk;
            if (score > bestScore) {
              bestScore = score;
              best = {nx, ny, d: move.d};
            }
          }
          if (best) {
            nextX = best.nx;
            nextY = best.ny;
            ninja.dir = best.d;
          }
        } else if (ninja.ai === 'smart') {
          // BFS経路探索（視界コストつき重み付き探索）
          // 経路を毎回計算（視界は動くため）
          const path = findPathBFS(ninja.tx, ninja.ty, treasurePos.x, treasurePos.y, ninja.routePreference);
          if (path && path.length > 0) {
            const next = path[0];
            nextX = next.x;
            nextY = next.y;
            // 方向設定
            const ddx = nextX - ninja.tx;
            const ddy = nextY - ninja.ty;
            if (ddy < 0) ninja.dir = 3;
            else if (ddy > 0) ninja.dir = 0;
            else if (ddx < 0) ninja.dir = 1;
            else if (ddx > 0) ninja.dir = 2;
          } else {
            // 経路なし → 降参（その場で消える）
            ninja.state = 'surrender';
          }
        }

        // 移動
        ninja.tx = nextX;
        ninja.ty = nextY;
        ninja.x = nextX + 0.5;
        ninja.y = nextY + 0.5;

        // 罠チェック（踏んだら即捕獲）
        for (const u of units) {
          if (u.isTrap && !u.triggered && u.tx === ninja.tx && u.ty === ninja.ty) {
            u.triggered = true; // 罠作動
            ninja.state = 'dead';
            caughtCount++;
            updateUI();
            sounds.get.play();
            break;
          }
        }

        // 足音
        if (Math.random() < 0.3) {
          sounds.step.currentTime = 0;
          sounds.step.play();
        }
      }

      // アニメーション
      ninja.frameTime += dt;
      if (ninja.frameTime >= 0.15) {
        ninja.frameTime = 0;
        ninja.frame = (ninja.frame + 1) % 4;
      }
    }

    // ユニット更新
    function updateUnit(unit, dt) {
      if (unit.type === 'camera') {
        // 首振り
        unit.angle += 30 * dt * (unit.patrolDir || 1);
        if (unit.angle > 60) { unit.angle = 60; unit.patrolDir = -1; }
        if (unit.angle < -60) { unit.angle = -60; unit.patrolDir = 1; }
      } else if (unit.type === 'guard') {
        // 巡回
        const axis = unit.patrolAxis;
        const start = unit.patrolStart;
        const speed = 1.5 * dt;
        if (axis === 'x') {
          unit.x += speed * unit.patrolDir;
          if (unit.x > start + 2) { unit.x = start + 2; unit.patrolDir = -1; }
          if (unit.x < start - 2) { unit.x = start - 2; unit.patrolDir = 1; }
        } else {
          unit.y += speed * unit.patrolDir;
          if (unit.y > start + 2) { unit.y = start + 2; unit.patrolDir = -1; }
          if (unit.y < start - 2) { unit.y = start - 2; unit.patrolDir = 1; }
        }
      } else if (unit.type === 'light') {
        // 360度回転
        unit.angle = (unit.angle || 0) + 20 * dt;
        if (unit.angle >= 360) unit.angle -= 360;
      }

      // 忍者捕獲チェック
      for (const ninja of ninjas) {
        if (ninja.state === 'move' && isNinjaInVision(unit, ninja)) {
          ninja.state = 'dead';
          caughtCount++;
          updateUI();
          sounds.get.play();
        }
      }
    }

    // 描画
    function draw() {
      ctx.fillStyle = '#222';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // マップ描画
      for (let y = 0; y < MAP_SIZE; y++) {
        for (let x = 0; x < MAP_SIZE; x++) {
          const sx = x * TILE_SIZE;
          const sy = y * TILE_SIZE;
          if (map[y][x] === WALL) {
            ctx.fillStyle = '#666';
          } else if (map[y][x] === TREASURE) {
            ctx.fillStyle = '#ff0';
          } else {
            ctx.fillStyle = '#332200';
          }
          ctx.fillRect(sx, sy, TILE_SIZE, TILE_SIZE);
          ctx.strokeStyle = '#444';
          ctx.strokeRect(sx, sy, TILE_SIZE, TILE_SIZE);
        }
      }

      // 視界コーン描画
      if (gameState === 'setup' || gameState === 'wave') {
        ctx.globalAlpha = 0.3;
        for (const unit of units) {
          let fov = 60;
          if (unit.type === 'light') fov = 360;
          const cone = castVisionCone(unit.x, unit.y, unit.angle || 0, unit.range, fov);
          ctx.fillStyle = unit.type === 'light' ? '#ff0' : '#f00';
          ctx.beginPath();
          cone.forEach((p, i) => {
            const sx = p.x * TILE_SIZE;
            const sy = p.y * TILE_SIZE;
            if (i === 0) ctx.moveTo(sx, sy);
            else ctx.lineTo(sx, sy);
          });
          ctx.closePath();
          ctx.fill();
        }
        ctx.globalAlpha = 1;
      }

      // ユニット描画
      for (const unit of units) {
        const sx = unit.x * TILE_SIZE;
        const sy = unit.y * TILE_SIZE;
        if (unit.type === 'camera') {
          ctx.fillStyle = '#888';
          ctx.fillRect(sx - 8, sy - 8, 16, 16);
          ctx.fillStyle = '#f00';
          ctx.beginPath();
          ctx.arc(sx, sy, 6, 0, Math.PI * 2);
          ctx.fill();
        } else if (unit.type === 'guard') {
          ctx.fillStyle = '#f00';
          ctx.beginPath();
          ctx.arc(sx, sy, 12, 0, Math.PI * 2);
          ctx.fill();
        } else if (unit.type === 'light') {
          ctx.fillStyle = '#ff0';
          ctx.beginPath();
          ctx.arc(sx, sy, 12, 0, Math.PI * 2);
          ctx.fill();
        } else if (unit.type === 'trap') {
          // 罠の描画
          if (unit.triggered) {
            // 作動済み：×印
            ctx.strokeStyle = '#666';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(sx - 16, sy - 16);
            ctx.lineTo(sx + 16, sy + 16);
            ctx.moveTo(sx + 16, sy - 16);
            ctx.lineTo(sx - 16, sy + 16);
            ctx.stroke();
          } else {
            // 未作動：床と同化（薄い茶色の円）
            ctx.fillStyle = 'rgba(100, 50, 0, 0.5)';
            ctx.beginPath();
            ctx.arc(sx, sy, 18, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#640';
            ctx.lineWidth = 2;
            ctx.stroke();
          }
        }
      }

      // 忍者描画
      for (const ninja of ninjas) {
        const sx = ninja.x * TILE_SIZE;
        const sy = ninja.y * TILE_SIZE;
        if (ninja.state === 'dead') {
          ctx.drawImage(imgDead, 0, 0, 16, 16, sx - 24, sy - 24, 48, 48);
        } else if (ninja.state === 'surrender') {
          // 降参：白旗表示
          ctx.fillStyle = '#fff';
          ctx.font = '24px monospace';
          ctx.textAlign = 'center';
          ctx.fillText('🏳️', sx, sy - 10);
          ctx.drawImage(imgDead, 0, 0, 16, 16, sx - 24, sy - 24, 48, 48);
        } else {
          const row = ninja.dir;
          const frame = ninja.frame;
          ctx.drawImage(imgWalk, frame * 16, row * 16, 16, 16, sx - 24, sy - 24, 48, 48);
        }
      }
    }

    // ゲームループ
    let lastTime = 0;
    function gameLoop(time) {
      const dt = Math.min((time - lastTime) / 1000, 0.1);
      lastTime = time;

      if (gameState === 'wave') {
        // ユニット更新
        for (const unit of units) {
          updateUnit(unit, dt);
        }

        // 忍者更新
        for (const ninja of ninjas) {
          updateNinjaAI(ninja, dt);
        }

        // Wave終了チェック
        const aliveNinjas = ninjas.filter(n => n.state === 'move');
        if (aliveNinjas.length === 0 && ninjas.length > 0) {
          // Wave クリア
          currentWave++;
          if (currentWave > 6) {
            gameState = 'clear';
            showModal(`🎉 ゲームクリア！<br>総捕獲数: ${caughtCount}`);
            sounds.clear.play();
          } else {
            gameState = 'setup';
            initWave(currentWave);
            sounds.clear.play();
          }
        }
      }

      draw();
      requestAnimationFrame(gameLoop);
    }

    // モーダル表示
    function showModal(html) {
      const modal = document.getElementById('modal');
      modal.querySelector('h1').innerHTML = html;
      modal.style.display = 'flex';
    }

    function hideModal() {
      document.getElementById('modal').style.display = 'none';
    }

    // イベント
    document.getElementById('btnPlay').addEventListener('click', () => {
      hideModal();
      gameState = 'setup';
      currentWave = 0; // チュートリアルから
      initWave(0);
    });

    document.getElementById('btnCamera').addEventListener('click', () => {
      if (gameState === 'setup') {
        selectedTool = 'camera';
        updateSelection();
      }
    });

    document.getElementById('btnGuard').addEventListener('click', () => {
      if (gameState === 'setup') {
        selectedTool = 'guard';
        updateSelection();
      }
    });

    document.getElementById('btnLight').addEventListener('click', () => {
      if (gameState === 'setup') {
        selectedTool = 'light';
        updateSelection();
      }
    });

    document.getElementById('btnTrap').addEventListener('click', () => {
      if (gameState === 'setup') {
        selectedTool = 'trap';
        updateSelection();
      }
    });

    document.getElementById('btnWall').addEventListener('click', () => {
      if (gameState === 'setup') {
        selectedTool = 'wall';
        updateSelection();
      }
    });

    document.getElementById('btnRemove').addEventListener('click', () => {
      if (gameState === 'setup') {
        selectedTool = 'remove';
        updateSelection();
      }
    });

    document.getElementById('btnStart').addEventListener('click', () => {
      if (gameState === 'setup') {
        spawnNinjas(currentWave);
        gameState = 'wave';
        selectedTool = null;
        updateSelection();
      }
    });

    function updateSelection() {
      document.querySelectorAll('.btn').forEach(b => b.classList.remove('selected'));
      if (selectedTool === 'camera') document.getElementById('btnCamera').classList.add('selected');
      if (selectedTool === 'guard') document.getElementById('btnGuard').classList.add('selected');
      if (selectedTool === 'light') document.getElementById('btnLight').classList.add('selected');
      if (selectedTool === 'trap') document.getElementById('btnTrap').classList.add('selected');
      if (selectedTool === 'wall') document.getElementById('btnWall').classList.add('selected');
      if (selectedTool === 'remove') document.getElementById('btnRemove').classList.add('selected');
    }

    // マップクリック
    let touchStartTime = 0;
    let touchTimeout = null;

    canvas.addEventListener('mousedown', handlePointerDown);
    canvas.addEventListener('touchstart', handlePointerDown);
    canvas.addEventListener('contextmenu', e => e.preventDefault());

    function handlePointerDown(e) {
      e.preventDefault();
      if (gameState !== 'setup') return;

      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      let clientX, clientY;

      if (e.type === 'touchstart') {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
        touchStartTime = Date.now();
        
        // 長押し検出
        touchTimeout = setTimeout(() => {
          const tx = Math.floor((clientX - rect.left) * scaleX / TILE_SIZE);
          const ty = Math.floor((clientY - rect.top) * scaleY / TILE_SIZE);
          removeUnit(tx, ty);
        }, 500);
      } else {
        clientX = e.clientX;
        clientY = e.clientY;
      }

      const tx = Math.floor((clientX - rect.left) * scaleX / TILE_SIZE);
      const ty = Math.floor((clientY - rect.top) * scaleY / TILE_SIZE);

      if (e.button === 2 || e.type === 'contextmenu') {
        removeUnit(tx, ty);
      } else if (selectedTool === 'remove') {
        removeUnit(tx, ty);
      } else if (selectedTool) {
        placeUnit(selectedTool, tx, ty);
      }
    }

    canvas.addEventListener('touchend', () => {
      clearTimeout(touchTimeout);
    });

    canvas.addEventListener('touchmove', () => {
      clearTimeout(touchTimeout);
    });

    // 開始
    requestAnimationFrame(gameLoop);
  </script>
