<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>屋根ラン - 今日のミニゲーム</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-touch-callout:none; -webkit-user-select:none; user-select:none; }
        body { margin:0; padding:0; display:flex; justify-content:center; align-items:center; min-height:100vh; background:#1a1a2e; overflow:hidden; touch-action:none; }
        canvas { display:block; }
    </style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let W, H;
function resize() { W = window.innerWidth; H = window.innerHeight; canvas.width = W; canvas.height = H; }
resize();
window.addEventListener('resize', resize);

// ============================================
// AUDIO — SFX + Procedural BGM
// ============================================
let audioCtx = null;
let bgmPlaying = false;
let bgmGain = null;
let bgmInterval = null;

function ensureAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        bgmGain = audioCtx.createGain();
        bgmGain.gain.value = 0.07;
        bgmGain.connect(audioCtx.destination);
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
}

function snd(f,t,d,v) {
    if (!audioCtx) return;
    try {
        const o=audioCtx.createOscillator(),g=audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.frequency.value=f; o.type=t||'sine';
        g.gain.setValueAtTime(v||0.1,audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+(d||0.1));
        o.start(); o.stop(audioCtx.currentTime+(d||0.1));
    } catch(e){}
}

// BGM: lofi-ish drum & bass loop
function startBGM() {
    if (bgmPlaying || !audioCtx) return;
    bgmPlaying = true;
    let beat = 0;
    const bpm = 140;
    const interval = (60 / bpm / 2) * 1000; // 8th notes

    // Drum pattern (kick, hi-hat, snare)
    function playBeat() {
        if (!bgmPlaying) return;
        const t = audioCtx.currentTime;
        const bar = beat % 16;

        // Kick: 0, 4, 8, 10
        if (bar === 0 || bar === 4 || bar === 8 || bar === 10) {
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.connect(g); g.connect(bgmGain);
            o.frequency.setValueAtTime(150, t);
            o.frequency.exponentialRampToValueAtTime(30, t + 0.12);
            o.type = 'sine';
            g.gain.setValueAtTime(0.4, t);
            g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
            o.start(t); o.stop(t + 0.15);
        }

        // Hi-hat: every beat
        {
            const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.03, audioCtx.sampleRate);
            const data = buf.getChannelData(0);
            for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * 0.3;
            const src = audioCtx.createBufferSource();
            const g = audioCtx.createGain();
            src.buffer = buf;
            src.connect(g); g.connect(bgmGain);
            const vol = (bar % 2 === 0) ? 0.15 : 0.08;
            g.gain.setValueAtTime(vol, t);
            g.gain.exponentialRampToValueAtTime(0.001, t + 0.03);
            src.start(t);
        }

        // Snare: 4, 12
        if (bar === 4 || bar === 12) {
            const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.08, audioCtx.sampleRate);
            const data = buf.getChannelData(0);
            for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * 0.4 * (1 - i/data.length);
            const src = audioCtx.createBufferSource();
            const g = audioCtx.createGain();
            src.buffer = buf;
            src.connect(g); g.connect(bgmGain);
            g.gain.setValueAtTime(0.25, t);
            g.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
            src.start(t);
        }

        // Bass line (changes with distance for progression)
        if (bar === 0 || bar === 6 || bar === 10) {
            const bassNotes = [55, 65, 73, 82]; // A1, C2, D2, E2
            const layer = Math.min(Math.floor(distance / 100), 3);
            const note = bassNotes[layer % bassNotes.length];
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.connect(g); g.connect(bgmGain);
            o.frequency.value = note;
            o.type = 'square';
            g.gain.setValueAtTime(0.12, t);
            g.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
            o.start(t); o.stop(t + 0.2);
        }

        // Melody layer (appears after 200m)
        if (distance > 200 && (bar === 0 || bar === 3 || bar === 7 || bar === 11)) {
            const melodyNotes = [440, 523, 587, 659, 523, 440, 392, 349];
            const noteIdx = (beat / 2) % melodyNotes.length;
            const note = melodyNotes[Math.floor(noteIdx)];
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.connect(g); g.connect(bgmGain);
            o.frequency.value = note;
            o.type = 'sine';
            g.gain.setValueAtTime(0.06, t);
            g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
            o.start(t); o.stop(t + 0.15);
        }

        beat++;
    }

    bgmInterval = setInterval(playBeat, interval);
}

function stopBGM() {
    bgmPlaying = false;
    if (bgmInterval) { clearInterval(bgmInterval); bgmInterval = null; }
}

function sfxJump() { snd(320,'sine',0.06,0.12); snd(480,'sine',0.05,0.08); }
function sfxLand() { snd(120,'square',0.04,0.1); snd(80,'square',0.03,0.06); }
function sfxDie() { snd(200,'sawtooth',0.3,0.1); snd(80,'sawtooth',0.5,0.06); stopBGM(); }
function sfxRecord() { snd(523,'sine',0.1,0.08); snd(659,'sine',0.12,0.07); snd(784,'sine',0.15,0.06); }
function sfxNearLand() { snd(600,'sine',0.06,0.08); snd(800,'sine',0.08,0.06); }

// ============================================
// STATE
// ============================================
const ST = { TITLE: 0, PLAY: 1, DEAD: 2 };
let state = ST.TITLE;

let player = {};
let buildings = [];
let particles = [];
let speedLines = [];
let distance = 0;
let bestDistance = 0;
let scrollX = 0;
let gameSpeed = 3;
let deadTimer = 0;
let screenShake = 0;
let slowMo = 0; // slow motion timer
let slowMoScale = 1;
let landSquash = 0; // landing squash animation

try { bestDistance = parseFloat(localStorage.getItem('roofrun_best2')) || 0; } catch(e){}
function saveBest() { try { localStorage.setItem('roofrun_best2', bestDistance.toString()); } catch(e){} }

// ============================================
// CONSTANTS
// ============================================
const GRAVITY = 1800;
const JUMP_POWER = -620;
const HIGH_JUMP = -780;
const MAX_HOLD = 0.18;
const RUN_ANIM_SPEED = 14;

// ============================================
// BUILDINGS
// ============================================
function initBuildings() {
    buildings = [];
    buildings.push({ x: 0, w: W * 0.5, h: H * 0.3, color: randomBldColor(), windows: makeWindows(W*0.5, H*0.3) });
    let x = W * 0.5;
    for (let i = 0; i < 8; i++) x += spawnBuilding(x);
}

function randomBldColor() {
    const c = ['#2d3436','#2c3e50','#34495e','#1e272e','#2f3542','#3d3d3d','#1a1a2e','#2b2b3d'];
    return c[Math.floor(Math.random()*c.length)];
}

function makeWindows(bw, bh) {
    // Pre-generate window lit/unlit pattern (avoid flickering)
    const wins = [];
    const winSize = 8, winGap = 16;
    for (let wy = 15; wy < bh - 10; wy += winGap) {
        for (let wx = 10; wx < bw - 10; wx += winGap) {
            wins.push({ rx: wx, ry: wy, lit: Math.random() > 0.35 });
        }
    }
    return wins;
}

function spawnBuilding(x) {
    const gap = 35 + Math.random() * 55 + Math.min(distance * 0.04, 70);
    const w = Math.max(55, 85 + Math.random() * 120 - Math.min(distance * 0.06, 45));
    const baseH = H * 0.3;
    const h = baseH - 30 + Math.random() * 60;
    buildings.push({ x: x + gap, w, h, color: randomBldColor(), windows: makeWindows(w, h) });
    return gap + w;
}

// ============================================
// PLAYER
// ============================================
function resetPlayer() {
    player = {
        x: W * 0.25, y: 0, vy: 0,
        onGround: true, jumping: false, alive: true,
        runFrame: 0, holding: false,
        // Animation states
        bodyTilt: 0,    // forward lean
        headBob: 0,     // head bounce
        squash: 1,      // vertical squash/stretch
        stretch: 1,
        landBounce: 0,  // landing recovery
        airPose: 0,     // 0=neutral, <0=rising, >0=falling
    };
    const b = buildings[0];
    player.y = H - b.h;
    landSquash = 0;
}

// ============================================
// INPUT
// ============================================
let pressStart = 0;

canvas.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    ensureAudio();
    if (state === ST.TITLE) {
        state = ST.PLAY;
        distance = 0; scrollX = 0; gameSpeed = 3;
        particles = []; speedLines = [];
        initBuildings(); resetPlayer();
        startBGM();
        return;
    }
    if (state === ST.DEAD) {
        if (deadTimer > 0.8) {
            state = ST.PLAY;
            distance = 0; scrollX = 0; gameSpeed = 3;
            particles = []; speedLines = [];
            initBuildings(); resetPlayer();
            startBGM();
        }
        return;
    }
    if (state === ST.PLAY && player.onGround && player.alive) {
        pressStart = performance.now() / 1000;
        player.holding = true;
    }
});

canvas.addEventListener('pointerup', (e) => {
    e.preventDefault();
    if (state === ST.PLAY && player.holding && player.onGround && player.alive) {
        const hold = Math.min((performance.now() / 1000 - pressStart) / MAX_HOLD, 1);
        player.vy = JUMP_POWER + (HIGH_JUMP - JUMP_POWER) * hold;
        player.onGround = false;
        player.jumping = true;
        player.holding = false;
        player.squash = 1.3; // stretch on jump
        player.stretch = 0.7;
        sfxJump();
        
        const px = player.x + scrollX;
        for (let i = 0; i < 6; i++) {
            particles.push({
                x: px, y: player.y,
                vx: (Math.random()-0.5)*100 - 30, vy: -Math.random()*120,
                life: 0.35, ml: 0.35, r: 2+Math.random()*2, color: 'rgba(255,255,255,0.6)'
            });
        }
    }
    player.holding = false;
});

// ============================================
// UPDATE
// ============================================
let lt = 0;

function update(ts) {
    let dt = Math.min((ts - lt) / 1000, 0.05);
    lt = ts;
    
    // Slow motion
    if (slowMo > 0) {
        slowMo -= dt;
        slowMoScale = 0.3;
        dt *= slowMoScale;
    } else {
        slowMoScale = 1;
    }
    
    if (state === ST.PLAY && player.alive) {
        gameSpeed = 3 + distance * 0.0025;
        const speed = Math.min(gameSpeed, 6);
        
        scrollX += speed;
        distance += speed * 0.05;
        
        // Speed lines (more at higher speed)
        if (speed > 4 && Math.random() < (speed - 4) * 0.15) {
            speedLines.push({
                x: W + 10,
                y: Math.random() * H * 0.7,
                len: 30 + Math.random() * 50,
                speed: speed * 15 + Math.random() * 30,
                life: 0.4, ml: 0.4
            });
        }
        
        // Physics
        if (!player.onGround) {
            player.vy += GRAVITY * dt;
            player.y += player.vy * dt;
            player.airPose = player.vy; // track for pose
        }
        
        // Run animation
        if (player.onGround) {
            player.runFrame += RUN_ANIM_SPEED * speed / 3 * dt; // sync to speed
            player.bodyTilt = 0.15 + speed * 0.02; // lean forward more at speed
            player.headBob = Math.sin(player.runFrame * 2) * 1.5;
            player.airPose = 0;
            
            // Recover from landing
            if (player.landBounce > 0) {
                player.landBounce -= dt * 8;
                player.squash = 1 + player.landBounce * 0.15;
                player.stretch = 1 - player.landBounce * 0.1;
            } else {
                player.squash = 1;
                player.stretch = 1;
            }
        } else {
            // Air animation
            if (player.vy < 0) {
                // Rising: stretch tall
                player.squash = 1.15;
                player.stretch = 0.85;
                player.bodyTilt = -0.1;
            } else {
                // Falling: curl up
                player.squash = 0.85;
                player.stretch = 1.1;
                player.bodyTilt = 0.05;
            }
            player.headBob = 0;
        }
        
        // Charge crouch
        if (player.holding) {
            const charge = Math.min((performance.now()/1000 - pressStart) / MAX_HOLD, 1);
            player.squash = 0.7 + (1 - charge) * 0.3;
            player.stretch = 1.2 - (1 - charge) * 0.2;
        }
        
        // Building collision
        player.onGround = false;
        const px = player.x + scrollX;
        
        for (const b of buildings) {
            const bTop = H - b.h;
            if (px >= b.x + 5 && px <= b.x + b.w - 5) {
                if (player.y >= bTop - 3 && player.y <= bTop + 18 && player.vy >= 0) {
                    // Check if near edge (for near-miss)
                    const edgeDist = Math.min(px - b.x, b.x + b.w - px);
                    const wasJumping = player.jumping;
                    
                    player.y = bTop;
                    player.vy = 0;
                    player.onGround = true;
                    
                    if (wasJumping) {
                        player.jumping = false;
                        player.landBounce = 1;
                        player.squash = 0.7;
                        player.stretch = 1.2;
                        screenShake = 0.08;
                        sfxLand();
                        
                        // Land dust
                        for (let i = 0; i < 6; i++) {
                            particles.push({
                                x: px + (Math.random()-0.5)*10, y: player.y,
                                vx: (Math.random()-0.5)*80, vy: -Math.random()*50 - 10,
                                life: 0.3, ml: 0.3, r: 2+Math.random()*2,
                                color: 'rgba(200,200,200,0.5)'
                            });
                        }
                        
                        // Near edge landing = slow-mo + bonus effect
                        if (edgeDist < 20) {
                            slowMo = 0.25;
                            screenShake = 0.15;
                            sfxNearLand();
                            showFloatText(px, player.y - 50, 'CLOSE!', '#ff44ff');
                            // Spark particles
                            for (let i = 0; i < 8; i++) {
                                particles.push({
                                    x: px, y: player.y,
                                    vx: (Math.random()-0.5)*150, vy: -Math.random()*100 - 30,
                                    life: 0.4, ml: 0.4, r: 1.5+Math.random()*2,
                                    color: '#ff44ff'
                                });
                            }
                        }
                    }
                }
            }
        }
        
        // Fall death
        if (player.y > H + 50) die();
        
        // Spawn / remove buildings
        let lastB = buildings[buildings.length - 1];
        while (lastB.x + lastB.w < scrollX + W + 200) {
            spawnBuilding(lastB.x + lastB.w);
            lastB = buildings[buildings.length - 1];
        }
        buildings = buildings.filter(b => b.x + b.w > scrollX - 100);
    }
    
    if (state === ST.DEAD) deadTimer += dt;
    if (screenShake > 0) screenShake = Math.max(0, screenShake - dt * 2);
    
    // Particles
    for (const p of particles) {
        p.x += (p.vx||0)*dt; p.y += (p.vy||0)*dt;
        if (p.vy !== undefined) p.vy += 400*dt;
        p.life -= dt;
    }
    particles = particles.filter(p => p.life > 0);
    
    // Speed lines
    for (const s of speedLines) {
        s.x -= s.speed * dt;
        s.life -= dt;
    }
    speedLines = speedLines.filter(s => s.life > 0 && s.x + s.len > 0);
    
    // Float texts
    for (const f of floatTexts) { f.y -= 35*dt; f.life -= dt; }
    floatTexts = floatTexts.filter(f => f.life > 0);
    
    draw();
    requestAnimationFrame(update);
}

let floatTexts = [];
function showFloatText(x, y, text, color) {
    floatTexts.push({ x, y, text, color, life: 1, ml: 1 });
}

function die() {
    player.alive = false;
    state = ST.DEAD;
    deadTimer = 0;
    screenShake = 0.3;
    sfxDie();
    if (distance > bestDistance) { bestDistance = distance; saveBest(); sfxRecord(); }
    const px = player.x + scrollX;
    for (let i = 0; i < 15; i++) {
        particles.push({
            x: px, y: player.y,
            vx: (Math.random()-0.5)*250, vy: -80-Math.random()*250,
            life: 0.7+Math.random()*0.3, ml: 0.7, r: 2+Math.random()*4, color: '#fff'
        });
    }
}

// ============================================
// DRAW
// ============================================
function draw() {
    // Sky
    const sky = ctx.createLinearGradient(0, 0, 0, H);
    sky.addColorStop(0, '#0f0c29');
    sky.addColorStop(0.5, '#302b63');
    sky.addColorStop(1, '#24243e');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, H);
    
    // Stars (fixed)
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    for (let i = 0; i < 40; i++) {
        const sx = (i * 137 + 50) % W;
        const sy = (i * 97 + 30) % (H * 0.45);
        const twinkle = 0.3 + Math.sin(lt / 1000 + i) * 0.2;
        ctx.globalAlpha = twinkle;
        ctx.fillRect(sx, sy, 1.5, 1.5);
    }
    ctx.globalAlpha = 1;
    
    // Moon with glow
    ctx.fillStyle = 'rgba(255,255,200,0.06)';
    ctx.beginPath(); ctx.arc(W*0.8, H*0.12, 60, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,200,0.12)';
    ctx.beginPath(); ctx.arc(W*0.8, H*0.12, 35, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,230,0.2)';
    ctx.beginPath(); ctx.arc(W*0.8, H*0.12, 22, 0, Math.PI*2); ctx.fill();
    
    if (state === ST.TITLE) { drawTitle(); return; }
    
    // Screen shake
    ctx.save();
    if (screenShake > 0) {
        ctx.translate((Math.random()-0.5)*screenShake*15, (Math.random()-0.5)*screenShake*10);
    }
    
    // Slow-mo tint
    if (slowMo > 0) {
        ctx.fillStyle = 'rgba(100, 0, 150, 0.06)';
        ctx.fillRect(0, 0, W, H);
    }
    
    ctx.save();
    ctx.translate(-scrollX, 0);
    
    // Far buildings (parallax layer 1)
    ctx.fillStyle = '#0d1b2a';
    for (let i = 0; i < 20; i++) {
        const bx = ((i * 100) % (W*3)) + scrollX * 0.15;
        const bh = 40 + (i*37)%60;
        ctx.fillRect(bx, H - bh, 50 + (i*17)%30, bh);
    }
    // Parallax layer 2
    ctx.fillStyle = '#16213e';
    for (let i = 0; i < 15; i++) {
        const bx = ((i * 130) % (W*2.5)) + scrollX * 0.4;
        const bh = 50 + (i*43)%80;
        ctx.fillRect(bx, H - bh - 10, 55 + (i*23)%35, bh + 10);
    }
    
    // Buildings
    for (const b of buildings) {
        const bTop = H - b.h;
        
        // Shadow
        ctx.fillStyle = 'rgba(0,0,0,0.2)';
        ctx.fillRect(b.x + 5, bTop + 5, b.w, b.h);
        
        // Body
        ctx.fillStyle = b.color;
        ctx.fillRect(b.x, bTop, b.w, b.h);
        
        // Roof highlight
        ctx.fillStyle = 'rgba(255,255,255,0.1)';
        ctx.fillRect(b.x, bTop, b.w, 3);
        
        // Side edge
        ctx.fillStyle = 'rgba(255,255,255,0.04)';
        ctx.fillRect(b.x, bTop, 2, b.h);
        
        // Windows (pre-generated)
        for (const win of b.windows) {
            if (win.lit) {
                const warmth = 0.15 + Math.sin(lt/2000 + win.rx) * 0.03;
                ctx.fillStyle = `rgba(255,200,50,${warmth})`;
            } else {
                ctx.fillStyle = 'rgba(50,50,80,0.15)';
            }
            ctx.fillRect(b.x + win.rx, bTop + win.ry, 8, 8);
        }
    }
    
    // Particles (world space)
    for (const p of particles) {
        ctx.globalAlpha = Math.max(0, p.life / p.ml);
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * (p.life / p.ml), 0, Math.PI*2);
        ctx.fill();
    }
    ctx.globalAlpha = 1;
    
    // Float texts (world space)
    for (const f of floatTexts) {
        ctx.globalAlpha = Math.min(1, f.life / f.ml * 2);
        ctx.fillStyle = f.color;
        ctx.font = 'bold 16px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(f.text, f.x, f.y);
    }
    ctx.globalAlpha = 1;
    
    // Player
    if (player.alive) drawStickman(player.x + scrollX, player.y);
    
    ctx.restore(); // end world transform
    
    // Speed lines (screen space)
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 1;
    for (const s of speedLines) {
        ctx.globalAlpha = s.life / s.ml;
        ctx.beginPath();
        ctx.moveTo(s.x, s.y);
        ctx.lineTo(s.x + s.len, s.y);
        ctx.stroke();
    }
    ctx.globalAlpha = 1;
    
    // Charge bar (screen space)
    if (player.holding && player.alive) {
        const charge = Math.min((performance.now()/1000 - pressStart) / MAX_HOLD, 1);
        const barW = 50, barH = 5;
        const bx = player.x - barW/2;
        const by = player.y - 55;
        ctx.fillStyle = 'rgba(0,0,0,0.4)';
        ctx.fillRect(bx - 1, by - 1, barW + 2, barH + 2);
        const g = ctx.createLinearGradient(bx, 0, bx + barW, 0);
        g.addColorStop(0, '#44ff44');
        g.addColorStop(0.7, '#ffff00');
        g.addColorStop(1, '#ff4444');
        ctx.fillStyle = g;
        ctx.fillRect(bx, by, barW * charge, barH);
    }
    
    // HUD
    drawHUD();
    
    ctx.restore(); // end shake
    
    if (state === ST.DEAD) drawDeadScreen();
}

// ============================================
// STICKMAN — Rich animation
// ============================================
function drawStickman(wx, wy) {
    const headR = 7;
    const bodyLen = 18;
    const legLen = 16;
    const armLen = 13;
    
    ctx.save();
    ctx.translate(wx, wy);
    
    // Apply squash/stretch
    ctx.scale(player.stretch, player.squash);
    
    // Body tilt
    ctx.rotate(player.bodyTilt);
    
    const headY = -bodyLen - legLen - headR + player.headBob;
    const bodyTopY = -bodyLen - legLen;
    const hipY = -legLen;
    const shoulderY = bodyTopY + headR + 3;
    
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    
    // === LEGS ===
    const frame = player.runFrame;
    let lLeg, rLeg, lKnee, rKnee;
    
    if (player.onGround && !player.holding) {
        // Running: multi-joint legs
        const legPhase = Math.sin(frame);
        const legPhase2 = Math.cos(frame);
        
        // Left leg: thigh angle, calf angle
        const lThighAng = legPhase * 0.7;
        const lCalfAng = Math.max(0, -legPhase2) * 0.8 + 0.2;
        lKnee = { x: Math.sin(lThighAng) * legLen * 0.5, y: hipY + Math.cos(lThighAng) * legLen * 0.5 };
        lLeg = { x: lKnee.x + Math.sin(lThighAng + lCalfAng) * legLen * 0.5, y: lKnee.y + Math.cos(lThighAng + lCalfAng) * legLen * 0.5 };
        
        // Right leg (opposite phase)
        const rThighAng = -legPhase * 0.7;
        const rCalfAng = Math.max(0, legPhase2) * 0.8 + 0.2;
        rKnee = { x: Math.sin(rThighAng) * legLen * 0.5, y: hipY + Math.cos(rThighAng) * legLen * 0.5 };
        rLeg = { x: rKnee.x + Math.sin(rThighAng + rCalfAng) * legLen * 0.5, y: rKnee.y + Math.cos(rThighAng + rCalfAng) * legLen * 0.5 };
    } else if (player.holding) {
        // Crouch pose
        lKnee = { x: -6, y: hipY + 6 };
        lLeg = { x: -8, y: hipY + legLen * 0.7 };
        rKnee = { x: 6, y: hipY + 6 };
        rLeg = { x: 8, y: hipY + legLen * 0.7 };
    } else if (player.vy < -50) {
        // Rising: legs tucked back
        lKnee = { x: -4, y: hipY + 8 };
        lLeg = { x: -8, y: hipY + 4 };
        rKnee = { x: 2, y: hipY + 10 };
        rLeg = { x: -2, y: hipY + 6 };
    } else {
        // Falling: legs spread for landing
        lKnee = { x: -5, y: hipY + 10 };
        lLeg = { x: -8, y: hipY + legLen };
        rKnee = { x: 5, y: hipY + 10 };
        rLeg = { x: 8, y: hipY + legLen };
    }
    
    // Draw legs
    ctx.beginPath(); ctx.moveTo(0, hipY); ctx.lineTo(lKnee.x, lKnee.y); ctx.lineTo(lLeg.x, lLeg.y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, hipY); ctx.lineTo(rKnee.x, rKnee.y); ctx.lineTo(rLeg.x, rLeg.y); ctx.stroke();
    
    // === BODY ===
    ctx.beginPath();
    ctx.moveTo(0, bodyTopY + headR);
    ctx.lineTo(0, hipY);
    ctx.stroke();
    
    // === ARMS ===
    let lArm, rArm, lElbow, rElbow;
    
    if (player.onGround && !player.holding) {
        // Running arms (opposite to legs)
        const armPhase = Math.sin(frame + Math.PI);
        lElbow = { x: Math.sin(armPhase * 0.5) * 6 + 4, y: shoulderY + 7 };
        lArm = { x: Math.sin(armPhase * 0.7) * 8 + 2, y: shoulderY + 13 };
        rElbow = { x: Math.sin(-armPhase * 0.5) * 6 + 4, y: shoulderY + 7 };
        rArm = { x: Math.sin(-armPhase * 0.7) * 8 + 2, y: shoulderY + 13 };
    } else if (player.holding) {
        // Crouch: arms back
        lElbow = { x: -8, y: shoulderY + 4 };
        lArm = { x: -12, y: shoulderY };
        rElbow = { x: -6, y: shoulderY + 6 };
        rArm = { x: -10, y: shoulderY + 2 };
    } else if (player.vy < -50) {
        // Rising: arms up and back
        lElbow = { x: -6, y: shoulderY - 4 };
        lArm = { x: -10, y: shoulderY - 8 };
        rElbow = { x: 6, y: shoulderY - 2 };
        rArm = { x: 10, y: shoulderY - 6 };
    } else {
        // Falling: arms wide
        lElbow = { x: -8, y: shoulderY + 2 };
        lArm = { x: -12, y: shoulderY + 6 };
        rElbow = { x: 8, y: shoulderY + 2 };
        rArm = { x: 12, y: shoulderY + 6 };
    }
    
    ctx.beginPath(); ctx.moveTo(0, shoulderY); ctx.lineTo(lElbow.x, lElbow.y); ctx.lineTo(lArm.x, lArm.y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, shoulderY); ctx.lineTo(rElbow.x, rElbow.y); ctx.lineTo(rArm.x, rArm.y); ctx.stroke();
    
    // === HEAD ===
    ctx.beginPath();
    ctx.arc(0, headY, headR, 0, Math.PI * 2);
    ctx.stroke();
    
    // === MOTION TRAIL (when fast or jumping) ===
    if (gameSpeed > 4 || player.vy < -200) {
        ctx.strokeStyle = 'rgba(255,255,255,0.1)';
        ctx.lineWidth = 1;
        for (let i = 1; i <= 3; i++) {
            ctx.globalAlpha = 0.1 / i;
            ctx.beginPath();
            ctx.arc(-i * 6, headY, headR, 0, Math.PI * 2);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(-i * 6, bodyTopY + headR);
            ctx.lineTo(-i * 6, hipY);
            ctx.stroke();
        }
        ctx.globalAlpha = 1;
    }
    
    ctx.restore();
}

function drawHUD() {
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 22px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(Math.floor(distance) + 'm', 15, 30);
    
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.font = '13px sans-serif';
    ctx.fillText('BEST: ' + Math.floor(bestDistance) + 'm', 15, 50);
}

// ============================================
// TITLE
// ============================================
function drawTitle() {
    ctx.textAlign = 'center';
    
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 34px sans-serif';
    ctx.fillText('🏃 屋根ラン', W/2, H*0.22);
    
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = '15px sans-serif';
    ctx.fillText('ビルからビルへ飛び移れ！', W/2, H*0.29);
    
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.font = '13px sans-serif';
    ctx.fillText('タップ → ジャンプ', W/2, H*0.37);
    ctx.fillText('長押し → 高くジャンプ', W/2, H*0.41);
    ctx.fillText('ギリギリ着地でスローモーション！', W/2, H*0.45);
    
    if (bestDistance > 0) {
        ctx.fillStyle = '#ffd700';
        ctx.font = '16px sans-serif';
        ctx.fillText('🏆 ベスト: ' + Math.floor(bestDistance) + 'm', W/2, H*0.53);
    }
    
    // Demo scene: stickman running on buildings
    const demoBaseY = H * 0.72;
    
    // Buildings
    ctx.fillStyle = '#2d3436';
    ctx.fillRect(W*0.1, demoBaseY, W*0.3, H*0.15);
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.fillRect(W*0.1, demoBaseY, W*0.3, 3);
    
    ctx.fillStyle = '#34495e';
    ctx.fillRect(W*0.55, demoBaseY + 10, W*0.35, H*0.15);
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.fillRect(W*0.55, demoBaseY + 10, W*0.35, 3);
    
    // Animated stickman
    const demoTime = Date.now() / 1000;
    const jumpCycle = demoTime % 2;
    let demoX, demoY;
    
    if (jumpCycle < 0.8) {
        // Running on first building
        demoX = W*0.15 + jumpCycle * W * 0.2;
        demoY = demoBaseY;
    } else if (jumpCycle < 1.3) {
        // Jumping
        const t = (jumpCycle - 0.8) / 0.5;
        demoX = W*0.35 + t * W * 0.25;
        demoY = demoBaseY - Math.sin(t * Math.PI) * 60 + (t > 0.5 ? 10 : 0);
    } else {
        // Landing on second building
        demoX = W*0.6 + (jumpCycle - 1.3) * W * 0.15;
        demoY = demoBaseY + 10;
    }
    
    // Simple demo stickman
    ctx.save();
    ctx.translate(demoX, demoY);
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    const dh = 7, db = 16, dl = 14;
    const runAnim = Math.sin(demoTime * 10) * 0.5;
    ctx.beginPath(); ctx.arc(0, -db-dl-dh, dh, 0, Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, -db-dl+dh-2); ctx.lineTo(0, -dl); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, -dl); ctx.lineTo(Math.sin(runAnim)*dl*0.5, -dl + Math.cos(runAnim)*dl*0.5 + dl*0.5); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, -dl); ctx.lineTo(Math.sin(-runAnim)*dl*0.5, -dl + Math.cos(-runAnim)*dl*0.5 + dl*0.5); ctx.stroke();
    ctx.restore();
    
    // Start prompt
    const pulse = 0.6 + Math.sin(Date.now()/400) * 0.4;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#64dfdf';
    ctx.font = 'bold 22px sans-serif';
    ctx.fillText('▶ タップでスタート', W/2, H*0.88);
    ctx.globalAlpha = 1;
}

// ============================================
// DEAD SCREEN
// ============================================
function drawDeadScreen() {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, W, H);
    
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ff4444';
    ctx.font = 'bold 30px sans-serif';
    ctx.fillText('💀 落下！', W/2, H*0.3);
    
    ctx.fillStyle = '#fff';
    ctx.font = '20px sans-serif';
    ctx.fillText('距離: ' + Math.floor(distance) + 'm', W/2, H*0.42);
    
    if (distance >= bestDistance && distance > 0) {
        ctx.fillStyle = '#ffd700';
        ctx.font = 'bold 18px sans-serif';
        ctx.fillText('🏆 NEW RECORD!', W/2, H*0.50);
    }
    
    if (deadTimer > 0.8) {
        const pulse = 0.6 + Math.sin(Date.now()/400) * 0.4;
        ctx.globalAlpha = pulse;
        ctx.fillStyle = '#64dfdf';
        ctx.font = 'bold 22px sans-serif';
        ctx.fillText('▶ タップでリトライ', W/2, H*0.65);
        ctx.globalAlpha = 1;
    }
}

// === Start ===
requestAnimationFrame(update);
</script>
