<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>屋根ラン - 今日のミニゲーム</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-touch-callout:none; -webkit-user-select:none; user-select:none; }
        body { margin:0; padding:0; display:flex; justify-content:center; align-items:center; min-height:100vh; background:#1a1a2e; overflow:hidden; touch-action:none; }

<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let W, H;
function resize() { W = window.innerWidth; H = window.innerHeight; canvas.width = W; canvas.height = H; }
resize();
window.addEventListener('resize', resize);

// ============================================
// AUDIO — SFX + Procedural BGM
// ============================================
let audioCtx = null;
let bgmPlaying = false;
let bgmGain = null;
let bgmInterval = null;

function ensureAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        bgmGain = audioCtx.createGain();
        bgmGain.gain.value = 0.8;
        bgmGain.connect(audioCtx.destination);
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
}

function snd(f,t,d,v) {
    if (!audioCtx) return;
    try {
        const o=audioCtx.createOscillator(),g=audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.frequency.value=f; o.type=t||'sine';
        g.gain.setValueAtTime(v||0.5,audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+(d||0.1));
        o.start(); o.stop(audioCtx.currentTime+(d||0.1));
    } catch(e){}
}

// BGM: lofi-ish drum & bass loop
function startBGM() {
    if (bgmPlaying || !audioCtx) return;
    bgmPlaying = true;
    let beat = 0;
    const bpm = 140;
    const interval = (60 / bpm / 2) * 1000; // 8th notes

    // Drum pattern (kick, hi-hat, snare)
    function playBeat() {
        if (!bgmPlaying) return;
        const t = audioCtx.currentTime;
        const bar = beat % 16;

        // Kick: 0, 4, 8, 10
        if (bar === 0 || bar === 4 || bar === 8 || bar === 10) {
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.connect(g); g.connect(bgmGain);
            o.frequency.setValueAtTime(150, t);
            o.frequency.exponentialRampToValueAtTime(30, t + 0.12);
            o.type = 'sine';
            g.gain.setValueAtTime(0.7, t);
            g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
            o.start(t); o.stop(t + 0.15);
        }

        // Hi-hat: every beat
        {
            const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.03, audioCtx.sampleRate);
            const data = buf.getChannelData(0);
            for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * 0.3;
            const src = audioCtx.createBufferSource();
            const g = audioCtx.createGain();
            src.buffer = buf;
            src.connect(g); g.connect(bgmGain);
            const vol = (bar % 2 === 0) ? 0.35 : 0.18;
            g.gain.setValueAtTime(vol, t);
            g.gain.exponentialRampToValueAtTime(0.001, t + 0.03);
            src.start(t);
        }

        // Snare: 4, 12
        if (bar === 4 || bar === 12) {
            const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.08, audioCtx.sampleRate);
            const data = buf.getChannelData(0);
            for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * 0.4 * (1 - i/data.length);
            const src = audioCtx.createBufferSource();
            const g = audioCtx.createGain();
            src.buffer = buf;
            src.connect(g); g.connect(bgmGain);
            g.gain.setValueAtTime(0.5, t);
            g.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
            src.start(t);
        }

        // Bass line (changes with distance for progression)
        if (bar === 0 || bar === 6 || bar === 10) {
            const bassNotes = [55, 65, 73, 82]; // A1, C2, D2, E2
            const layer = Math.min(Math.floor(distance / 100), 3);
            const note = bassNotes[layer % bassNotes.length];
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.connect(g); g.connect(bgmGain);
            o.frequency.value = note;
            o.type = 'square';
            g.gain.setValueAtTime(0.3, t);
            g.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
            o.start(t); o.stop(t + 0.2);
        }

        // Melody layer (appears after 200m)
        if (distance > 200 && (bar === 0 || bar === 3 || bar === 7 || bar === 11)) {
            const melodyNotes = [440, 523, 587, 659, 523, 440, 392, 349];
            const noteIdx = (beat / 2) % melodyNotes.length;
            const note = melodyNotes[Math.floor(noteIdx)];
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.connect(g); g.connect(bgmGain);
            o.frequency.value = note;
            o.type = 'sine';
            g.gain.setValueAtTime(0.15, t);
            g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
            o.start(t); o.stop(t + 0.15);
        }

        beat++;
    }

    bgmInterval = setInterval(playBeat, interval);
}

function stopBGM() {
    bgmPlaying = false;
    if (bgmInterval) { clearInterval(bgmInterval); bgmInterval = null; }
}

function sfxJump() { snd(320,'sine',0.12,0.7); snd(480,'sine',0.08,0.5); }
function sfxLand() { snd(120,'square',0.07,0.6); snd(80,'square',0.06,0.4); }
function sfxDie() { snd(200,'sawtooth',0.4,0.6); snd(80,'sawtooth',0.5,0.4); stopBGM(); }
function sfxRecord() { snd(523,'sine',0.14,0.5); snd(659,'sine',0.16,0.45); snd(784,'sine',0.2,0.4); }
function sfxNearLand() { snd(600,'sine',0.12,0.5); snd(800,'sine',0.14,0.45); }

// ============================================
// STATE
// ============================================
const ST = { TITLE: 0, PLAY: 1, DEAD: 2 };
let state = ST.TITLE;

let player = {};
let buildings = [];
let particles = [];
let speedLines = [];
let distance = 0;
let bestDistance = 0;
let scrollX = 0;
let gameSpeed = 3;
let deadTimer = 0;
let screenShake = 0;
let slowMo = 0; // slow motion timer
let slowMoScale = 1;
let landSquash = 0; // landing squash animation

try { bestDistance = parseFloat(localStorage.getItem('roofrun_best2')) || 0; } catch(e){}
function saveBest() { try { localStorage.setItem('roofrun_best2', bestDistance.toString()); } catch(e){} }

// ============================================
// CONSTANTS
// ============================================
const GRAVITY = 1800;
const JUMP_POWER = -500;
const HIGH_JUMP = -900;
const MAX_HOLD = 0.35;
const RUN_ANIM_SPEED = 14;

// ============================================
// BUILDINGS
// ============================================
function initBuildings() {
    buildings = [];
    patternQueue = [];
    buildings.push({ x: 0, w: W * 0.5, h: H * 0.3, color: randomBldColor(), windows: makeWindows(W*0.5, H*0.3) });
    let x = W * 0.5;
    // Start with an easy intro pattern
    x += spawnPattern(x, 'intro');
    // Fill screen
    while (x < scrollX + W + 400) x += spawnNextPattern(x);
}

function randomBldColor() {
    const c = ['#2d3436','#2c3e50','#34495e','#1e272e','#2f3542','#3d3d3d','#1a1a2e','#2b2b3d'];
    return c[Math.floor(Math.random()*c.length)];
}

function makeWindows(bw, bh) {
    const wins = [];
    const winGap = 16;
    for (let wy = 15; wy < bh - 10; wy += winGap) {
        for (let wx = 10; wx < bw - 10; wx += winGap) {
            wins.push({ rx: wx, ry: wy, lit: Math.random() > 0.35 });
        }
    }
    return wins;
}

// === PATTERN-BASED BUILDING GENERATION ===
// Each pattern is an array of { w, h, gap } objects
// h is relative to baseH (H*0.3), gap is distance before this building (0 = connected/step)
// Patterns designed for specific gameplay moments

let patternQueue = [];
let lastPatternIdx = -1;

function bld(x, w, h, gap, step) {
    const absH = H * 0.3 + h;
    buildings.push({
        x: x + gap, w, h: absH,
        color: randomBldColor(),
        windows: makeWindows(w, absH),
        step: !!step
    });
    return gap + w;
}

// Pattern definitions
// w=width, h=height offset from base, g=gap before, s=step(connected)
const PATTERNS = {
    // === BASIC: タップジャンプで越えられる ===
    
    // 1. 等間隔リズム: 広めのビルを気持ちよくポンポン飛ぶ
    easyRhythm: [
        {w:130,h:0,g:40}, {w:130,h:0,g:40}, {w:130,h:0,g:40}, {w:130,h:0,g:40}
    ],
    // 2. 段差降り: だんだん低くなる（ジャンプ不要→最後に軽いジャンプ）
    stepsDown: [
        {w:100,h:30,g:0,s:1}, {w:90,h:10,g:0,s:1}, {w:80,h:-10,g:0,s:1}, {w:120,h:-30,g:40}
    ],
    // 3. 段差登り: だんだん高くなる（自動登り）
    stepsUp: [
        {w:90,h:-20,g:0,s:1}, {w:90,h:0,g:0,s:1}, {w:90,h:20,g:0,s:1}, {w:100,h:40,g:0,s:1}
    ],
    // 4. ワイドビル: 広い屋上で一息（助走区間にもなる）
    wideRest: [
        {w:220,h:0,g:35}, {w:120,h:10,g:45}
    ],
    // 5. 段差リズム: 連結ビルで段差を駆け上がり→軽ジャンプ
    stepRhythm: [
        {w:80,h:-10,g:0,s:1}, {w:80,h:10,g:0,s:1}, {w:80,h:30,g:0,s:1}, {w:130,h:0,g:40}
    ],
    // 6. ジグザグ高低差（広めのビル）
    zigzag: [
        {w:110,h:30,g:40}, {w:110,h:-20,g:40}, {w:110,h:25,g:40}, {w:110,h:-15,g:40}
    ],
    
    // === MEDIUM: 少し溜めが必要 ===
    
    // 7. 中ジャンプ: 助走→中くらいの隙間
    mediumGap: [
        {w:160,h:0,g:35}, {w:120,h:0,g:70}
    ],
    // 8. 高台へ: 助走→高い位置のビルへ溜めジャンプ
    climbUp: [
        {w:170,h:-10,g:35}, {w:120,h:60,g:60}
    ],
    // 9. 段差→ジャンプ: 段差で登ってから飛ぶ
    stepThenJump: [
        {w:80,h:0,g:0,s:1}, {w:80,h:30,g:0,s:1}, {w:140,h:30,g:0,s:1}, {w:110,h:0,g:60}
    ],
    // 10. 二段階: ジャンプ→走る→ジャンプ
    doubleHop: [
        {w:110,h:0,g:50}, {w:110,h:20,g:50}, {w:120,h:-10,g:45}
    ],
    // 11. 下り坂ジャンプ: 高い→低いへ飛ぶ（飛距離長い）
    downhillLeap: [
        {w:120,h:50,g:35}, {w:120,h:-30,g:75}
    ],
    
    // === HARD: フルチャージ必須 ===
    
    // 12. 大ジャンプ: 長い助走→大きな隙間（フルチャージ）
    bigLeap: [
        {w:220,h:0,g:35}, {w:120,h:0,g:105}
    ],
    // 13. 高台大ジャンプ: 助走→高い位置の遠いビル
    highBigLeap: [
        {w:200,h:-10,g:35}, {w:110,h:50,g:95}
    ],
    // 14. 超高台: 助走→すごく高いビルへ
    skyReach: [
        {w:220,h:-20,g:30}, {w:110,h:80,g:70}
    ],
    // 15. 助走→大ジャンプ→着地がやや狭い（プレッシャー）
    precisionLanding: [
        {w:200,h:0,g:35}, {w:70,h:0,g:100}
    ],
    // 16. 段差登り→フルチャージ大ジャンプ
    stairsToBigLeap: [
        {w:80,h:-10,g:0,s:1}, {w:80,h:10,g:0,s:1}, {w:80,h:30,g:0,s:1}, {w:170,h:30,g:0,s:1}, {w:110,h:-10,g:100}
    ],
    
    // === EXPERT: 組み合わせ ===
    
    // 17. リズム→大ジャンプ（テンポ変化）
    rhythmToBig: [
        {w:110,h:0,g:40}, {w:110,h:0,g:40}, {w:110,h:0,g:40}, {w:200,h:0,g:35}, {w:110,h:10,g:100}
    ],
    // 18. 高低差連続: 高い→低い→高い（溜め使い分け）
    rollercoaster: [
        {w:110,h:50,g:50}, {w:120,h:-30,g:55}, {w:110,h:40,g:50}, {w:120,h:-20,g:50}
    ],
    // 19. 助走なし連続ジャンプ: やや狭い着地→すぐ次
    chainJumps: [
        {w:80,h:0,g:55}, {w:75,h:10,g:55}, {w:80,h:-10,g:55}
    ],
    // 20. 段差台地→大ジャンプ→段差降り
    plateauLeap: [
        {w:70,h:0,g:0,s:1}, {w:70,h:20,g:0,s:1}, {w:160,h:20,g:0,s:1}, {w:110,h:-10,g:95},
        {w:80,h:-10,g:0,s:1}, {w:80,h:-30,g:0,s:1}
    ],
    
    // === INTRO (special) ===
    intro: [
        {w:120,h:0,g:35}, {w:100,h:0,g:40}, {w:110,h:10,g:45}, {w:90,h:0,g:40}
    ],
};

// Difficulty pools
const EASY_PATTERNS = ['easyRhythm','stepsDown','stepsUp','wideRest','stepRhythm','zigzag'];
const MED_PATTERNS = ['mediumGap','climbUp','stepThenJump','doubleHop','downhillLeap'];
const HARD_PATTERNS = ['bigLeap','highBigLeap','skyReach','precisionLanding','stairsToBigLeap'];
const EXPERT_PATTERNS = ['rhythmToBig','rollercoaster','chainJumps','plateauLeap'];

function pickPattern() {
    // Difficulty ramp based on distance
    let pool;
    const r = Math.random();
    if (distance < 80) {
        pool = EASY_PATTERNS;
    } else if (distance < 200) {
        pool = r < 0.6 ? EASY_PATTERNS : MED_PATTERNS;
    } else if (distance < 400) {
        pool = r < 0.3 ? EASY_PATTERNS : r < 0.7 ? MED_PATTERNS : HARD_PATTERNS;
    } else if (distance < 700) {
        pool = r < 0.15 ? EASY_PATTERNS : r < 0.45 ? MED_PATTERNS : r < 0.8 ? HARD_PATTERNS : EXPERT_PATTERNS;
    } else {
        pool = r < 0.1 ? EASY_PATTERNS : r < 0.3 ? MED_PATTERNS : r < 0.65 ? HARD_PATTERNS : EXPERT_PATTERNS;
    }
    // Avoid repeating same pattern
    let name;
    let tries = 0;
    do {
        name = pool[Math.floor(Math.random() * pool.length)];
        tries++;
    } while (name === lastPatternIdx && tries < 5);
    lastPatternIdx = name;
    return name;
}

function spawnPattern(x, name) {
    const pattern = PATTERNS[name];
    if (!pattern) return 0;
    let offset = 0;
    for (const b of pattern) {
        offset += bld(x + offset, b.w, b.h, b.g, b.s);
    }
    return offset;
}

function spawnNextPattern(x) {
    const name = pickPattern();
    return spawnPattern(x, name);
}

// ============================================
// PLAYER
// ============================================
function resetPlayer() {
    player = {
        x: W * 0.25, y: 0, vy: 0,
        onGround: true, jumping: false, alive: true,
        runFrame: 0, holding: false,
        // Animation states
        bodyTilt: 0,    // forward lean
        headBob: 0,     // head bounce
        squash: 1,      // vertical squash/stretch
        stretch: 1,
        landBounce: 0,  // landing recovery
        airPose: 0,     // 0=neutral, <0=rising, >0=falling
    };
    const b = buildings[0];
    player.y = H - b.h;
    landSquash = 0;
}

// ============================================
// INPUT
// ============================================
let pressStart = 0;
let jumpBuffer = 0; // 空中でタップした時のバッファ（秒）
const JUMP_BUFFER_TIME = 0.2; // 着地前0.2秒以内のタップを受け付ける
let pointerDown = false;

function doJump(holdTime) {
    const hold = Math.min(holdTime / MAX_HOLD, 1);
    player.vy = JUMP_POWER + (HIGH_JUMP - JUMP_POWER) * hold;
    player.onGround = false;
    player.jumping = true;
    player.holding = false;
    player.squash = 1.3;
    player.stretch = 0.7;
    sfxJump();
    jumpBuffer = 0;
    
    const px = player.x + scrollX;
    for (let i = 0; i < 6; i++) {
        particles.push({
            x: px, y: player.y,
            vx: (Math.random()-0.5)*100 - 30, vy: -Math.random()*120,
            life: 0.35, ml: 0.35, r: 2+Math.random()*2, color: 'rgba(255,255,255,0.6)'
        });
    }
}

canvas.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    ensureAudio();
    pointerDown = true;
    if (state === ST.TITLE) {
        state = ST.PLAY;
        distance = 0; scrollX = 0; gameSpeed = 3;
        particles = []; speedLines = [];
        initBuildings(); resetPlayer();
        startBGM();
        return;
    }
    if (state === ST.DEAD) {
        if (deadTimer > 0.8) {
            state = ST.PLAY;
            distance = 0; scrollX = 0; gameSpeed = 3;
            particles = []; speedLines = [];
            initBuildings(); resetPlayer();
            startBGM();
        }
        return;
    }
    if (state === ST.PLAY && player.alive) {
        pressStart = performance.now() / 1000;
        if (player.onGround) {
            player.holding = true;
        } else {
            // 空中タップ → バッファに溜める
            jumpBuffer = JUMP_BUFFER_TIME;
        }
    }
});

canvas.addEventListener('pointerup', (e) => {
    e.preventDefault();
    pointerDown = false;
    if (state === ST.PLAY && player.holding && player.onGround && player.alive) {
        doJump(performance.now() / 1000 - pressStart);
    }
    player.holding = false;
});

// ============================================
// UPDATE
// ============================================
let lt = 0;

function update(ts) {
    let dt = Math.min((ts - lt) / 1000, 0.05);
    lt = ts;
    
    // Slow motion
    if (slowMo > 0) {
        slowMo -= dt;
        slowMoScale = 0.3;
        dt *= slowMoScale;
    } else {
        slowMoScale = 1;
    }
    
    if (jumpBuffer > 0) jumpBuffer -= dt;
    
    if (state === ST.PLAY && player.alive) {
        gameSpeed = 3 + distance * 0.0025;
        const speed = Math.min(gameSpeed, 6);
        
        scrollX += speed;
        distance += speed * 0.05;
        
        // Speed lines (more at higher speed)
        if (speed > 4 && Math.random() < (speed - 4) * 0.15) {
            speedLines.push({
                x: W + 10,
                y: Math.random() * H * 0.7,
                len: 30 + Math.random() * 50,
                speed: speed * 15 + Math.random() * 30,
                life: 0.4, ml: 0.4
            });
        }
        
        // Physics
        if (!player.onGround) {
            player.vy += GRAVITY * dt;
            player.y += player.vy * dt;
            player.airPose = player.vy; // track for pose
        }
        
        // Run animation
        if (player.onGround) {
            player.runFrame += RUN_ANIM_SPEED * speed / 3 * dt; // sync to speed
            player.bodyTilt = 0.15 + speed * 0.02; // lean forward more at speed
            player.headBob = Math.sin(player.runFrame * 2) * 1.5;
            player.airPose = 0;
            
            // Recover from landing
            if (player.landBounce > 0) {
                player.landBounce -= dt * 8;
                player.squash = 1 + player.landBounce * 0.15;
                player.stretch = 1 - player.landBounce * 0.1;
            } else {
                player.squash = 1;
                player.stretch = 1;
            }
        } else {
            // Air animation
            if (player.vy < 0) {
                // Rising: stretch tall
                player.squash = 1.15;
                player.stretch = 0.85;
                player.bodyTilt = -0.1;
            } else {
                // Falling: curl up
                player.squash = 0.85;
                player.stretch = 1.1;
                player.bodyTilt = 0.05;
            }
            player.headBob = 0;
        }
        
        // Charge crouch
        if (player.holding) {
            const charge = Math.min((performance.now()/1000 - pressStart) / MAX_HOLD, 1);
            player.squash = 0.7 + (1 - charge) * 0.3;
            player.stretch = 1.2 - (1 - charge) * 0.2;
        }
        
        // Building collision
        player.onGround = false;
        const px = player.x + scrollX;
        
        for (const b of buildings) {
            const bTop = H - b.h;
            if (px >= b.x + 3 && px <= b.x + b.w - 3) {
                // 段差：足がビル上端より下にあり、差が50px以内なら自動で乗る
                const heightDiff = player.y - bTop;
                const canStep = heightDiff > 0 && heightDiff < 50 && player.vy >= -50;
                // 通常着地 or 段差登り
                if ((player.y >= bTop - 3 && player.y <= bTop + 18 && player.vy >= 0) || canStep) {
                    // Check if near edge (for near-miss)
                    const edgeDist = Math.min(px - b.x, b.x + b.w - px);
                    const wasJumping = player.jumping;
                    
                    player.y = bTop;
                    player.vy = 0;
                    player.onGround = true;
                    
                    if (wasJumping) {
                        player.jumping = false;
                        
                        // ジャンプバッファ：空中でタップしてたら即ジャンプ
                        if (jumpBuffer > 0) {
                            doJump(0.05); // 短いチャージで即発動
                            break;
                        }
                        
                        player.landBounce = 1;
                        player.squash = 0.7;
                        player.stretch = 1.2;
                        screenShake = 0.08;
                        sfxLand();
                        
                        // Land dust
                        for (let i = 0; i < 6; i++) {
                            particles.push({
                                x: px + (Math.random()-0.5)*10, y: player.y,
                                vx: (Math.random()-0.5)*80, vy: -Math.random()*50 - 10,
                                life: 0.3, ml: 0.3, r: 2+Math.random()*2,
                                color: 'rgba(200,200,200,0.5)'
                            });
                        }
                        
                        // Near edge landing = slow-mo + bonus effect
                        if (edgeDist < 20) {
                            slowMo = 0.25;
                            screenShake = 0.15;
                            sfxNearLand();
                            showFloatText(px, player.y - 50, 'CLOSE!', '#ff44ff');
                            // Spark particles
                            for (let i = 0; i < 8; i++) {
                                particles.push({
                                    x: px, y: player.y,
                                    vx: (Math.random()-0.5)*150, vy: -Math.random()*100 - 30,
                                    life: 0.4, ml: 0.4, r: 1.5+Math.random()*2,
                                    color: '#ff44ff'
                                });
                            }
                        }
                    }
                }
            }
        }
        
        // Fall death
        if (player.y > H + 50) die();
        
        // Spawn / remove buildings (pattern-based)
        let lastB = buildings[buildings.length - 1];
        while (lastB.x + lastB.w < scrollX + W + 300) {
            spawnNextPattern(lastB.x + lastB.w);
            lastB = buildings[buildings.length - 1];
        }
        buildings = buildings.filter(b => b.x + b.w > scrollX - 100);
    }
    
    if (state === ST.DEAD) deadTimer += dt;
    if (screenShake > 0) screenShake = Math.max(0, screenShake - dt * 2);
    
    // Particles
    for (const p of particles) {
        p.x += (p.vx||0)*dt; p.y += (p.vy||0)*dt;
        if (p.vy !== undefined) p.vy += 400*dt;
        p.life -= dt;
    }
    particles = particles.filter(p => p.life > 0);
    
    // Speed lines
    for (const s of speedLines) {
        s.x -= s.speed * dt;
        s.life -= dt;
    }
    speedLines = speedLines.filter(s => s.life > 0 && s.x + s.len > 0);
    
    // Float texts
    for (const f of floatTexts) { f.y -= 35*dt; f.life -= dt; }
    floatTexts = floatTexts.filter(f => f.life > 0);
    
    draw();
    requestAnimationFrame(update);
}

let floatTexts = [];
function showFloatText(x, y, text, color) {
    floatTexts.push({ x, y, text, color, life: 1, ml: 1 });
}

function die() {
    player.alive = false;
    state = ST.DEAD;
    deadTimer = 0;
    screenShake = 0.3;
    sfxDie();
    if (distance > bestDistance) { bestDistance = distance; saveBest(); sfxRecord(); }
    const px = player.x + scrollX;
    for (let i = 0; i < 15; i++) {
        particles.push({
            x: px, y: player.y,
            vx: (Math.random()-0.5)*250, vy: -80-Math.random()*250,
            life: 0.7+Math.random()*0.3, ml: 0.7, r: 2+Math.random()*4, color: '#fff'
        });
    }
}

function getStageIdx() {
    let idx = 0;
    for (let i = 0; i < STAGES.length; i++) { if (distance >= STAGES[i].from) idx = i; }
    return idx;
}

function lerpColor(c1, c2, t) {
    // c1, c2 are hex strings like '#0f0c29'
    const r1 = parseInt(c1.slice(1,3),16), g1 = parseInt(c1.slice(3,5),16), b1 = parseInt(c1.slice(5,7),16);
    const r2 = parseInt(c2.slice(1,3),16), g2 = parseInt(c2.slice(3,5),16), b2 = parseInt(c2.slice(5,7),16);
    const r = Math.round(r1 + (r2-r1)*t), g = Math.round(g1 + (g2-g1)*t), b = Math.round(b1 + (b2-b1)*t);
    return `rgb(${r},${g},${b})`;
}

function getThemeBlend() {
    const idx = getStageIdx();
    const curr = STAGE_THEMES[idx];
    const next = STAGE_THEMES[Math.min(idx+1, STAGE_THEMES.length-1)];
    if (idx >= STAGES.length - 1) return curr;
    const from = STAGES[idx].from;
    const to = STAGES[Math.min(idx+1, STAGES.length-1)].from;
    const t = Math.max(0, Math.min(1, (distance - from) / (to - from)));
    // Blend sky
    const blended = { sky: [], glow: curr.glow, glowH: curr.glowH, bldColors: curr.bldColors, winColor: curr.winColor };
    for (let i = 0; i < curr.sky.length; i++) {
        blended.sky.push(lerpColor(curr.sky[i], next.sky[i], t));
    }
    // Blend win color
    blended.winColor = curr.winColor.map((v,i) => Math.round(v + (next.winColor[i]-v)*t));
    if (t > 0.5) {
        blended.glow = next.glow;
        blended.glowH = next.glowH;
        blended.bldColors = next.bldColors;
    }
    return blended;
}

function draw() {
    const theme = (state === ST.TITLE) ? STAGE_THEMES[0] : getThemeBlend();
    
    // Sky gradient (stage-specific with smooth transition)
    const sky = ctx.createLinearGradient(0, 0, 0, H);
    sky.addColorStop(0, theme.sky[0]);
    sky.addColorStop(0.35, theme.sky[1]);
    sky.addColorStop(0.65, theme.sky[2]);
    sky.addColorStop(1, theme.sky[3]);
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, H);
    
    // Stars
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    for (let i = 0; i < 50; i++) {
        const sx = (i * 137 + 50) % W;
        const sy = (i * 97 + 30) % (H * 0.4);
        const twinkle = 0.3 + Math.sin(lt / 1000 + i * 1.7) * 0.25;
        const sz = (i % 3 === 0) ? 2 : 1;
        ctx.globalAlpha = twinkle;
        ctx.fillRect(sx, sy, sz, sz);
    }
    ctx.globalAlpha = 1;
    
    // Moon with glow
    const moonX = W * 0.8, moonY = H * 0.1;
    ctx.fillStyle = 'rgba(255,255,200,0.04)';
    ctx.beginPath(); ctx.arc(moonX, moonY, 70, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,200,0.08)';
    ctx.beginPath(); ctx.arc(moonX, moonY, 40, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,230,0.2)';
    ctx.beginPath(); ctx.arc(moonX, moonY, 22, 0, Math.PI*2); ctx.fill();
    // Moon crater hints
    ctx.fillStyle = 'rgba(200,200,180,0.06)';
    ctx.beginPath(); ctx.arc(moonX - 6, moonY - 4, 5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(moonX + 8, moonY + 3, 3, 0, Math.PI*2); ctx.fill();
    
    if (state === ST.TITLE) { drawTitle(); return; }
    
    // Screen shake
    ctx.save();
    if (screenShake > 0) {
        ctx.translate((Math.random()-0.5)*screenShake*15, (Math.random()-0.5)*screenShake*10);
    }
    
    // Slow-mo tint
    if (slowMo > 0) {
        ctx.fillStyle = 'rgba(100, 0, 150, 0.06)';
        ctx.fillRect(0, 0, W, H);
    }
    
    // === HORIZON CITY GLOW (light pollution — connects sky to buildings) ===
    const horizonY = H * 0.6;
    const glowGrad = ctx.createLinearGradient(0, horizonY - H * theme.glowH, 0, horizonY + 30);
    glowGrad.addColorStop(0, 'rgba(0,0,0,0)');
    glowGrad.addColorStop(0.5, theme.glow);
    glowGrad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = glowGrad;
    ctx.fillRect(0, horizonY - H * theme.glowH, W, H * theme.glowH + 30);
    
    // === LANDMARKS (behind buildings, slow parallax) ===
    drawLandmarks();
    
    // === FAR CITYSCAPE SILHOUETTE (parallax 0.1x) — connects landmarks to foreground ===
    drawCityscapeSilhouette(theme);
    
    ctx.save();
    ctx.translate(-scrollX, 0);
    
    // === MID BUILDINGS (parallax ~0.4x) — medium detail ===
    {
        const cols = theme.bldColors;
        for (let i = 0; i < 18; i++) {
            const bx = ((i * 120 + 30) % (W*2.5)) + scrollX * 0.4;
            const bh = 60 + (i*43)%90;
            const bw = 40 + (i*23)%35;
            ctx.fillStyle = cols[i % cols.length];
            ctx.fillRect(bx, H - bh, bw, bh);
            // Window dots
            const wc = theme.winColor;
            for (let wy = 8; wy < bh - 8; wy += 10) {
                for (let wx = 5; wx < bw - 5; wx += 10) {
                    const lit = Math.sin(i*17+wx*3+wy*7) > 0;
                    ctx.fillStyle = lit 
                        ? `rgba(${wc[0]},${wc[1]},${wc[2]},0.08)` 
                        : 'rgba(30,30,50,0.05)';
                    ctx.fillRect(bx + wx, H - bh + wy, 4, 4);
                }
            }
        }
    }
    
    // === FOREGROUND BUILDINGS (game layer) ===
    for (const b of buildings) {
        const bTop = H - b.h;
        
        // Shadow
        ctx.fillStyle = 'rgba(0,0,0,0.25)';
        ctx.fillRect(b.x + 4, bTop + 4, b.w, b.h);
        
        // Body — use stage-aware color
        ctx.fillStyle = b.color;
        ctx.fillRect(b.x, bTop, b.w, b.h);
        
        // Roof edge highlight
        ctx.fillStyle = 'rgba(255,255,255,0.12)';
        ctx.fillRect(b.x, bTop, b.w, 3);
        // Roof surface subtle gradient
        const roofGrad = ctx.createLinearGradient(0, bTop, 0, bTop + 10);
        roofGrad.addColorStop(0, 'rgba(255,255,255,0.06)');
        roofGrad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = roofGrad;
        ctx.fillRect(b.x, bTop, b.w, 10);
        
        // Left edge highlight
        ctx.fillStyle = 'rgba(255,255,255,0.05)';
        ctx.fillRect(b.x, bTop, 2, b.h);
        // Right edge shadow
        ctx.fillStyle = 'rgba(0,0,0,0.08)';
        ctx.fillRect(b.x + b.w - 2, bTop, 2, b.h);
        
        // Windows
        const wc = theme.winColor;
        for (const win of b.windows) {
            if (win.lit) {
                const warmth = 0.18 + Math.sin(lt/2000 + win.rx) * 0.04;
                ctx.fillStyle = `rgba(${wc[0]},${wc[1]},${wc[2]},${warmth})`;
                // Window glow
                ctx.fillStyle = `rgba(${wc[0]},${wc[1]},${wc[2]},${warmth * 0.3})`;
                ctx.fillRect(b.x + win.rx - 1, bTop + win.ry - 1, 10, 10);
                ctx.fillStyle = `rgba(${wc[0]},${wc[1]},${wc[2]},${warmth})`;
            } else {
                ctx.fillStyle = 'rgba(40,40,60,0.12)';
            }
            ctx.fillRect(b.x + win.rx, bTop + win.ry, 8, 8);
        }
        
        // Bottom of building fades into ground
        const groundFade = ctx.createLinearGradient(0, H - 15, 0, H);
        groundFade.addColorStop(0, 'rgba(0,0,0,0)');
        groundFade.addColorStop(1, 'rgba(0,0,0,0.15)');
        ctx.fillStyle = groundFade;
        ctx.fillRect(b.x, H - 15, b.w, 15);
    }
    
    // Particles (world space)
    for (const p of particles) {
        ctx.globalAlpha = Math.max(0, p.life / p.ml);
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * (p.life / p.ml), 0, Math.PI*2);
        ctx.fill();
    }
    ctx.globalAlpha = 1;
    
    // Float texts (world space)
    for (const f of floatTexts) {
        ctx.globalAlpha = Math.min(1, f.life / f.ml * 2);
        ctx.fillStyle = f.color;
        ctx.font = 'bold 16px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(f.text, f.x, f.y);
    }
    ctx.globalAlpha = 1;
    
    // Player
    if (player.alive) drawStickman(player.x + scrollX, player.y);
    
    ctx.restore(); // end world transform
    
    // Speed lines (screen space)
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 1;
    for (const s of speedLines) {
        ctx.globalAlpha = s.life / s.ml;
        ctx.beginPath();
        ctx.moveTo(s.x, s.y);
        ctx.lineTo(s.x + s.len, s.y);
        ctx.stroke();
    }
    ctx.globalAlpha = 1;
    
    // Charge bar (screen space)
    if (player.holding && player.alive) {
        const charge = Math.min((performance.now()/1000 - pressStart) / MAX_HOLD, 1);
        const barW = 50, barH = 5;
        const bx = player.x - barW/2;
        const by = player.y - 55;
        ctx.fillStyle = 'rgba(0,0,0,0.4)';
        ctx.fillRect(bx - 1, by - 1, barW + 2, barH + 2);
        const g = ctx.createLinearGradient(bx, 0, bx + barW, 0);
        g.addColorStop(0, '#44ff44');
        g.addColorStop(0.7, '#ffff00');
        g.addColorStop(1, '#ff4444');
        ctx.fillStyle = g;
        ctx.fillRect(bx, by, barW * charge, barH);
    }
    
    // HUD
    drawHUD();
    
    ctx.restore(); // end shake
    
    if (state === ST.DEAD) drawDeadScreen();
}

// ============================================
// CITYSCAPE SILHOUETTE — connects landmarks to foreground
// ============================================
function drawCityscapeSilhouette(theme) {
    // Far layer (0.08x parallax) — very dark, just shapes
    const farOff = scrollX * 0.08;
    ctx.fillStyle = 'rgba(10,10,20,0.4)';
    for (let i = 0; i < 30; i++) {
        const bx = ((i * 80 + 20) % (W * 4)) - farOff % (W * 4);
        if (bx < -100 || bx > W + 100) continue;
        const bh = 30 + (i * 47) % 80;
        const bw = 25 + (i * 31) % 40;
        ctx.fillRect(bx, H * 0.65 - bh, bw, bh + H * 0.35);
    }
    
    // Mid layer (0.15x parallax) — slightly brighter
    const midOff = scrollX * 0.15;
    ctx.fillStyle = 'rgba(15,15,30,0.45)';
    for (let i = 0; i < 25; i++) {
        const bx = ((i * 95 + 50) % (W * 3)) - midOff % (W * 3);
        if (bx < -100 || bx > W + 100) continue;
        const bh = 40 + (i * 53) % 100;
        const bw = 30 + (i * 29) % 45;
        ctx.fillRect(bx, H * 0.62 - bh, bw, bh + H * 0.38);
        // Tiny window dots
        const wc = theme.winColor;
        for (let wy = 10; wy < bh; wy += 12) {
            for (let wx = 4; wx < bw - 4; wx += 8) {
                if (Math.sin(i*13+wx*5+wy*3) > 0.3) {
                    ctx.fillStyle = `rgba(${wc[0]},${wc[1]},${wc[2]},0.04)`;
                    ctx.fillRect(bx + wx, H * 0.62 - bh + wy, 3, 3);
                }
            }
        }
        ctx.fillStyle = 'rgba(15,15,30,0.45)';
    }
}

// LANDMARKS — World Tour Background (detailed)
// ============================================
const STAGES = [
    { name: '🗼 東京', from: 0 },
    { name: '🗽 ニューヨーク', from: 200 },
    { name: '🗼 パリ', from: 400 },
    { name: '🏛️ ローマ', from: 600 },
    { name: '🕌 ドバイ', from: 800 },
    { name: '🎆 上海', from: 1000 },
    { name: '🌉 サンフランシスコ', from: 1200 },
    { name: '🏔️ リオ', from: 1500 },
];

function getStage() {
    let s = STAGES[0];
    for (const st of STAGES) { if (distance >= st.from) s = st; }
    return s;
}

function stageAlpha(d, from, range) {
    const fadeIn = 50, fadeOut = 50;
    if (d < from - fadeIn) return 0;
    if (d < from) return (d - (from - fadeIn)) / fadeIn;
    if (d < from + range) return 1;
    if (d < from + range + fadeOut) return 1 - (d - (from + range)) / fadeOut;
    return 0;
}

function drawLandmarks() {
    const d = distance;
    const t = lt / 1000;
    // Very slow continuous parallax (no modulo — no jitter)
    // Landmarks are far away, so they move barely at all
    const lx = scrollX * 0.012; // positive = moves left as player goes right
    ctx.save();
    
    // Real-world scale: 1m real = this many px
    // Burj Khalifa (828m) fills ~55% of screen height
    const M = H * 0.00066;

    // === TOKYO (0-200m): Tokyo Tower + Skytree ===
    { const a = stageAlpha(d, 0, 220);
    if (a > 0) {
        ctx.globalAlpha = a * 0.55;

        // ── Tokyo Skytree (634m real) ──
        const sx = W * 0.2 - lx;
        const sB = H * 0.62;
        const sH = 634 * M;
        
        // Tripod base → cylindrical top. Width narrows from base to top
        ctx.fillStyle = '#4a6a8a';
        ctx.beginPath();
        ctx.moveTo(sx - 14, sB);        // base left
        ctx.lineTo(sx - 6, sB - sH * 0.55); // narrow at 350m deck
        ctx.lineTo(sx - 3, sB - sH * 0.85);
        ctx.lineTo(sx - 1.5, sB - sH);  // top
        ctx.lineTo(sx + 1.5, sB - sH);
        ctx.lineTo(sx + 3, sB - sH * 0.85);
        ctx.lineTo(sx + 6, sB - sH * 0.55);
        ctx.lineTo(sx + 14, sB);
        ctx.closePath();
        ctx.fill();
        
        // Lattice structure lines
        ctx.strokeStyle = 'rgba(120,180,220,0.3)';
        ctx.lineWidth = 0.6;
        for (let i = 0; i < 15; i++) {
            const y = sB - i * (sH / 15);
            const w = 14 * (1 - (i/15) * 0.85);
            ctx.beginPath(); ctx.moveTo(sx - w, y); ctx.lineTo(sx + w, y); ctx.stroke();
        }
        // X-cross braces
        ctx.strokeStyle = 'rgba(120,180,220,0.2)';
        for (let i = 0; i < 12; i++) {
            const y1 = sB - i * (sH / 14);
            const y2 = sB - (i + 1) * (sH / 14);
            const w1 = 14 * (1 - (i/14) * 0.85);
            const w2 = 14 * (1 - ((i+1)/14) * 0.85);
            ctx.beginPath(); ctx.moveTo(sx - w1, y1); ctx.lineTo(sx + w2, y2); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(sx + w1, y1); ctx.lineTo(sx - w2, y2); ctx.stroke();
        }
        
        // Tembo Deck (350m = 55% height)
        const deckY = sB - sH * 0.55;
        ctx.fillStyle = '#6a9aba';
        ctx.fillRect(sx - 10, deckY - 4, 20, 8);
        ctx.fillStyle = 'rgba(150,220,255,0.15)';
        ctx.fillRect(sx - 9, deckY - 3, 18, 6);
        
        // Tembo Gallery (450m = 71%)
        const galY = sB - sH * 0.71;
        ctx.fillStyle = '#5a8aaa';
        ctx.fillRect(sx - 6, galY - 3, 12, 6);
        
        // Antenna
        ctx.strokeStyle = '#8abace';
        ctx.lineWidth = 1.2;
        ctx.beginPath(); ctx.moveTo(sx, sB - sH); ctx.lineTo(sx, sB - sH - 25); ctx.stroke();
        // Blinking aviation lights
        ctx.fillStyle = `rgba(255,60,60,${0.5+Math.sin(t*3)*0.5})`;
        ctx.beginPath(); ctx.arc(sx, sB - sH - 25, 2.5, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = `rgba(255,60,60,${0.5+Math.sin(t*3+1)*0.5})`;
        ctx.beginPath(); ctx.arc(sx, sB - sH - 12, 1.8, 0, Math.PI*2); ctx.fill();
        
        // LED illumination on body
        for (let i = 0; i < 20; i++) {
            const ly = sB - 10 - Math.abs(Math.sin(t*0.3 + i*0.7)) * sH * 0.85;
            const lw = 14 * (1 - ((sB - ly) / sH) * 0.85);
            const side = (i % 2 === 0) ? -1 : 1;
            ctx.fillStyle = `rgba(120,200,255,${0.15 + Math.sin(t*2+i*1.3)*0.1})`;
            ctx.fillRect(sx + side * lw * 0.5, ly, 1.5, 1.5);
        }

        // ── Tokyo Tower (333m, red-white lattice) ──
        const tx = W * 0.78 - lx;

        ctx.beginPath(); ctx.arc(sx, us, 14, 0, Math.PI*2); ctx.fill();
        
        // Top column to tiny sphere
        ctx.strokeStyle = '#c06a8a';
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(sx, us - 10); ctx.lineTo(sx, sB - sH * 0.82); ctx.stroke();
        
        // Tiny top sphere
        const ts = sB - sH * 0.82;
        ctx.fillStyle = 'rgba(200,80,120,0.2)';
        ctx.beginPath(); ctx.arc(sx, ts, 5, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = '#d08aaa';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.arc(sx, ts, 5, 0, Math.PI*2); ctx.stroke();
        
        // Antenna spire
        ctx.strokeStyle = '#d0a0b0';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(sx, ts - 5); ctx.lineTo(sx, sB - sH - 5); ctx.stroke();
        ctx.fillStyle = `rgba(255,80,150,${0.5+Math.sin(t*2.5)*0.5})`;
        ctx.beginPath(); ctx.arc(sx, sB - sH - 5, 2, 0, Math.PI*2); ctx.fill();
        
        // Shanghai skyline behind (Shanghai Tower 632m, SWFC 492m)
        const stx = W * 0.72 - lx;
        ctx.fillStyle = 'rgba(60,80,120,0.2)';
        // Shanghai Tower (632m, twisted)
        const stH = 632 * M;
        ctx.beginPath();
        ctx.moveTo(stx - 6, sB); ctx.lineTo(stx - 3, sB - stH);
        ctx.lineTo(stx + 3, sB - stH); ctx.lineTo(stx + 6, sB);
        ctx.closePath(); ctx.fill();
        // SWFC (492m, bottle opener)
        const swH = 492 * M;
        ctx.fillStyle = 'rgba(50,70,110,0.2)';
        ctx.fillRect(stx + 20, sB - swH, 10, swH);
        // Trapezoid opening at top
        ctx.fillStyle = 'rgba(10,15,30,0.3)';
        ctx.beginPath();
        ctx.moveTo(stx + 22, sB - swH + 5); ctx.lineTo(stx + 24, sB - swH + 15);
        ctx.lineTo(stx + 28, sB - swH + 15); ctx.lineTo(stx + 26, sB - swH + 5);
        ctx.closePath(); ctx.fill();
    }}

    // === SAN FRANCISCO (1200-1500m): Golden Gate Bridge ===
    { const a = stageAlpha(d, 1200, 320);
    if (a > 0) {
        ctx.globalAlpha = a * 0.5;
        
        // Golden Gate: towers 227m, main span 1280m
        const gx = W * 0.5 - lx;
        const gB = H * 0.62;
        const gW = Math.min(1280 * M * 0.5, W * 0.4); // half-span, capped
        const tH = 227 * M; // tower height
        
        // Fog at water level
        ctx.fillStyle = 'rgba(180,190,200,0.06)';
        ctx.fillRect(gx - gW - 20, gB + 5, gW * 2 + 40, 15);
        
        // Two main towers (art deco style)
        for (const side of [-1, 1]) {
            const tx = gx + side * gW * 0.55;
            // Tower legs (two parallel)
            ctx.fillStyle = '#a03020';
            ctx.fillRect(tx - 4, gB - tH, 3.5, tH);
            ctx.fillRect(tx + 0.5, gB - tH, 3.5, tH);
            // Cross braces between legs
            ctx.fillStyle = '#c04030';
            for (let i = 0; i < 5; i++) {
                const by = gB - tH + i * (tH / 5) + 5;
                ctx.fillRect(tx - 4, by, 8, 2.5);
            }
            // Tower top cap
            ctx.fillStyle = '#b03828';
            ctx.fillRect(tx - 5, gB - tH - 3, 10, 5);
        }
        
        // Main cables (catenary curve)
        ctx.strokeStyle = '#c04030';
        ctx.lineWidth = 2;
        const ltx = gx - gW * 0.55;
        const rtx = gx + gW * 0.55;
        // Left span
        ctx.beginPath();
        ctx.moveTo(gx - gW, gB - tH * 0.5);
        ctx.quadraticCurveTo(ltx, gB - tH, gx, gB - tH * 0.6);
        ctx.stroke();
        // Center span
        ctx.beginPath();
        ctx.moveTo(gx, gB - tH * 0.6);
        ctx.quadraticCurveTo(gx, gB - tH * 0.6, rtx, gB - tH);
        ctx.stroke();
        // Right span
        ctx.beginPath();
        ctx.moveTo(rtx, gB - tH);
        ctx.quadraticCurveTo(gx + gW, gB - tH * 0.7, gx + gW + 10, gB - tH * 0.5);
        ctx.stroke();
        
        // Road deck
        ctx.fillStyle = '#8a2a1a';
        ctx.fillRect(gx - gW, gB - 8, gW * 2, 6);
        // Road surface
        ctx.fillStyle = 'rgba(80,80,80,0.3)';
        ctx.fillRect(gx - gW, gB - 7, gW * 2, 4);
        
        // Vertical suspender cables
        ctx.strokeStyle = 'rgba(180,60,40,0.3)';
        ctx.lineWidth = 0.5;
        for (let i = -8; i <= 8; i++) {
            const cx2 = gx + i * (gW / 8);
            // cable Y follows catenary curve
            const norm = Math.abs(i) / 8;
            const cableTopY = gB - tH * (0.6 + norm * 0.35);
            ctx.beginPath(); ctx.moveTo(cx2, cableTopY); ctx.lineTo(cx2, gB - 8); ctx.stroke();
        }
        
        // Headlights on bridge (car movement)
        const carPos = ((t * 30) % (gW * 2)) - gW;
        ctx.fillStyle = 'rgba(255,255,200,0.15)';
        ctx.beginPath(); ctx.arc(gx + carPos, gB - 5, 1.5, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = 'rgba(255,50,50,0.12)';
        ctx.beginPath(); ctx.arc(gx - carPos * 0.7, gB - 5, 1.2, 0, Math.PI*2); ctx.fill();
    }}

    // === RIO (1500m+): Christ the Redeemer on Corcovado ===
    { const a = stageAlpha(d, 1500, 9999);
    if (a > 0) {
        ctx.globalAlpha = a * 0.55;
        
        // Christ the Redeemer: 38m statue on Corcovado (710m mountain)
        const rx = W * 0.5 - lx;
        const rB = H * 0.62;
        
        // Corcovado mountain (710m)
        const mtH = 710 * M;
        ctx.fillStyle = 'rgba(30,80,50,0.2)';
        ctx.beginPath();
        ctx.moveTo(rx - mtH * 0.5, rB);
        ctx.quadraticCurveTo(rx - mtH * 0.15, rB - mtH + 20, rx, rB - mtH);
        ctx.quadraticCurveTo(rx + mtH * 0.15, rB - mtH + 20, rx + mtH * 0.5, rB);
        ctx.closePath(); ctx.fill();
        // Mountain ridges
        ctx.strokeStyle = 'rgba(40,100,60,0.1)';
        ctx.lineWidth = 0.5;
        for (let i = -3; i <= 3; i++) {
            ctx.beginPath();
            ctx.moveTo(rx + i * mtH * 0.08, rB);
            ctx.quadraticCurveTo(rx + i * mtH * 0.03, rB - mtH * 0.5, rx, rB - mtH + 5);
            ctx.stroke();
        }
        
        // Christ statue (38m on top of mountain)
        const csH = 38 * M;
        // Pedestal
        ctx.fillStyle = 'rgba(180,180,170,0.3)';
        ctx.fillRect(rx - csH * 0.2, rB - mtH - csH * 0.3, csH * 0.4, csH * 0.3);
        
        const stY = rB - mtH - csH * 0.5; // chest level
        ctx.strokeStyle = '#ddd';
        ctx.lineWidth = 3;
        
        // Body/robe (scaled to csH)
        const cs = csH / 38; // px per meter of statue
        ctx.fillStyle = 'rgba(220,220,210,0.3)';
        ctx.beginPath();
        ctx.moveTo(rx - 5*cs, rB - mtH);
        ctx.lineTo(rx - 4*cs, stY);
        ctx.lineTo(rx - 3*cs, stY - 12*cs);
        ctx.lineTo(rx, stY - 18*cs);
        ctx.lineTo(rx + 3*cs, stY - 12*cs);
        ctx.lineTo(rx + 4*cs, stY);
        ctx.lineTo(rx + 5*cs, rB - mtH);
        ctx.closePath(); ctx.fill();
        
        // Arms (wide open — 28m span)
        ctx.strokeStyle = 'rgba(220,220,210,0.5)';
        ctx.lineWidth = Math.max(1.5, 2.5*cs);
        ctx.beginPath();
        ctx.moveTo(rx - 3*cs, stY - 8*cs);
        ctx.lineTo(rx - 14*cs, stY - 5*cs);
        ctx.lineTo(rx - 28*cs, stY - 2*cs);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(rx + 3*cs, stY - 8*cs);
        ctx.lineTo(rx + 14*cs, stY - 5*cs);
        ctx.lineTo(rx + 28*cs, stY - 2*cs);
        ctx.stroke();
        
        // Robe draping
        ctx.strokeStyle = 'rgba(200,200,190,0.2)';
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(rx - 26*cs, stY - 2*cs);
        ctx.quadraticCurveTo(rx - 12*cs, stY + 8*cs, rx - 5*cs, rB - mtH);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(rx + 26*cs, stY - 2*cs);
        ctx.quadraticCurveTo(rx + 12*cs, stY + 8*cs, rx + 5*cs, rB - mtH);
        ctx.stroke();
        
        // Head
        ctx.fillStyle = 'rgba(220,220,210,0.4)';
        ctx.beginPath(); ctx.arc(rx, stY - 14*cs, 4*cs, 0, Math.PI*2); ctx.fill();
        
        // Halo glow
        ctx.fillStyle = `rgba(255,255,220,${0.04+Math.sin(t*0.8)*0.02})`;
        ctx.beginPath(); ctx.arc(rx, stY - 10*cs, 35*cs, 0, Math.PI*2); ctx.fill();
        
        // Sugarloaf Mountain (396m)
        const sgH = 396 * M;
        ctx.fillStyle = 'rgba(25,60,40,0.12)';
        ctx.beginPath();
        ctx.moveTo(rx + sgH * 0.4, rB);
        ctx.quadraticCurveTo(rx + sgH * 0.55, rB - sgH + 10, rx + sgH * 0.6, rB - sgH);
        ctx.quadraticCurveTo(rx + sgH * 0.65, rB - sgH + 10, rx + sgH * 0.8, rB);
        ctx.closePath(); ctx.fill();
    }}

    ctx.globalAlpha = 1;
    ctx.restore();
}

// ============================================
// STICKMAN — Rich animation
// ============================================
function drawStickman(wx, wy) {
    // === Natural Running Animation ===
    // Based on real run cycle: Contact → Down → Passing → Up
    // Key: arms swing OPPOSITE to legs, body bobs up at push-off, down at contact
    
    const headR = 7;
    const thighLen = 9;  // upper leg
    const shinLen = 9;   // lower leg
    const upperArm = 7;
    const foreArm = 7;
    const torsoLen = 17;
    
    ctx.save();
    ctx.translate(wx, wy);
    ctx.scale(player.stretch, player.squash);
    
    // Forward lean
    const lean = player.onGround && !player.holding ? 0.12 : player.bodyTilt;
    ctx.rotate(lean);
    
    const hipY = -shinLen - 2; // hip joint
    const shoulderY = hipY - torsoLen;
    const headY = shoulderY - headR - 1 + (player.onGround ? player.headBob : 0);
    
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    
    // Run cycle phase (0 to 2*PI)
    const phase = player.runFrame;
    // Smooth interpolation helper
    function lerp(a, b, t) { return a + (b - a) * t; }
    
    // === RUNNING LEGS (keyframe-based) ===
    // The cycle has 4 key poses per leg, offset by PI for left/right
    function getLegPose(ph) {
        // ph: 0-2PI cycle
        // Returns { thighAngle, kneeAngle } in radians
        // Contact: leg reaches forward (thigh forward, knee slightly bent)
        // Down: absorb impact (thigh vertical, knee bent more)
        // Passing: leg swings back/under (thigh back, knee bent high behind)
        // Up: push off (thigh back far, knee extending)
        
        const p = ((ph % (Math.PI*2)) + Math.PI*2) % (Math.PI*2);
        const norm = p / (Math.PI * 2); // 0 to 1
        
        let thigh, knee;
        if (norm < 0.25) {
            // Contact → Down (front leg absorbs)
            const t = norm / 0.25;
            thigh = lerp(0.6, 0.15, t);   // forward → vertical
            knee = lerp(-0.3, -0.8, t);    // slight bend → deep bend
        } else if (norm < 0.5) {
            // Down → Passing (leg swings back)
            const t = (norm - 0.25) / 0.25;
            thigh = lerp(0.15, -0.5, t);   // vertical → behind
            knee = lerp(-0.8, -1.2, t);    // deep bend → fold up behind
        } else if (norm < 0.75) {
            // Passing → Up (leg swings forward, knee lifts)
            const t = (norm - 0.5) / 0.25;
            thigh = lerp(-0.5, 0.3, t);    // behind → coming forward
            knee = lerp(-1.2, -0.6, t);    // folded → opening
        } else {
            // Up → Contact (leg extends forward)
            const t = (norm - 0.75) / 0.25;
            thigh = lerp(0.3, 0.6, t);     // forward → full reach
            knee = lerp(-0.6, -0.3, t);    // opening → almost straight
        }
        return { thigh, knee };
    }
    
    function drawLeg(ph) {
        const pose = getLegPose(ph);
        const kneeX = Math.sin(pose.thigh) * thighLen;
        const kneeY = hipY + Math.cos(pose.thigh) * thighLen;
        const footX = kneeX + Math.sin(pose.thigh + pose.knee) * shinLen;
        const footY = kneeY + Math.cos(pose.thigh + pose.knee) * shinLen;
        
        ctx.beginPath();
        ctx.moveTo(0, hipY);
        ctx.lineTo(kneeX, kneeY);
        ctx.lineTo(footX, footY);
        ctx.stroke();
    }
    
    // Arms swing opposite to legs
    function drawArm(ph) {
        // Opposite phase: when leg goes forward, arm goes back
        const armPh = ph + Math.PI;
        const swing = Math.sin(armPh) * 0.5;
        const elbowX = Math.sin(swing) * upperArm + 2;
        const elbowY = shoulderY + Math.cos(swing) * upperArm;
        
        // Forearm bends based on position
        const foldAngle = 0.8 + Math.sin(armPh) * 0.3;
        const handX = elbowX + Math.sin(swing + foldAngle) * foreArm;
        const handY = elbowY + Math.cos(swing + foldAngle) * foreArm;
        
        ctx.beginPath();
        ctx.moveTo(0, shoulderY);
        ctx.lineTo(elbowX, elbowY);
        ctx.lineTo(handX, handY);
        ctx.stroke();
    }
    
    if (player.onGround && !player.holding) {
        // === RUNNING ===
        // Body bob: slightly up during push-off phase
        const bob = Math.sin(phase * 2) * 1.5;
        ctx.translate(0, -bob);
        
        drawLeg(phase);           // Left leg
        drawLeg(phase + Math.PI); // Right leg (opposite)
        
        // Torso
        ctx.beginPath(); ctx.moveTo(0, shoulderY); ctx.lineTo(0, hipY); ctx.stroke();
        
        drawArm(phase);           // Left arm (opposite to left leg)
        drawArm(phase + Math.PI); // Right arm
        
    } else if (player.holding) {
        // === CROUCH / CHARGE ===
        // Legs bent, low stance
        ctx.beginPath(); ctx.moveTo(0, hipY); ctx.lineTo(-7, hipY+6); ctx.lineTo(-9, hipY+shinLen+thighLen-4); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, hipY); ctx.lineTo(5, hipY+6); ctx.lineTo(7, hipY+shinLen+thighLen-4); ctx.stroke();
        // Torso
        ctx.beginPath(); ctx.moveTo(0, shoulderY+3); ctx.lineTo(0, hipY); ctx.stroke();
        // Arms pulled back
        ctx.beginPath(); ctx.moveTo(0, shoulderY+3); ctx.lineTo(-8, shoulderY+1); ctx.lineTo(-12, shoulderY-3); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, shoulderY+3); ctx.lineTo(-6, shoulderY+4); ctx.lineTo(-10, shoulderY); ctx.stroke();
        
    } else if (player.vy < -100) {
        // === RISING (jump) ===
        // Body stretched, one knee up, arms back
        ctx.beginPath(); ctx.moveTo(0, hipY); ctx.lineTo(3, hipY+5); ctx.lineTo(-2, hipY+3); ctx.stroke(); // tucked leg
        ctx.beginPath(); ctx.moveTo(0, hipY); ctx.lineTo(-3, hipY+thighLen+2); ctx.lineTo(-5, hipY+thighLen+shinLen-2); ctx.stroke(); // trailing leg
        // Torso
        ctx.beginPath(); ctx.moveTo(0, shoulderY-2); ctx.lineTo(0, hipY); ctx.stroke();
        // Arms up/back
        ctx.beginPath(); ctx.moveTo(0, shoulderY-2); ctx.lineTo(-7, shoulderY-8); ctx.lineTo(-11, shoulderY-4); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, shoulderY-2); ctx.lineTo(5, shoulderY-6); ctx.lineTo(9, shoulderY-2); ctx.stroke();
        
    } else {
        // === FALLING ===
        // Legs spread forward for landing, arms out for balance
        ctx.beginPath(); ctx.moveTo(0, hipY); ctx.lineTo(-5, hipY+8); ctx.lineTo(-8, hipY+thighLen+shinLen); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, hipY); ctx.lineTo(5, hipY+8); ctx.lineTo(8, hipY+thighLen+shinLen); ctx.stroke();
        // Torso
        ctx.beginPath(); ctx.moveTo(0, shoulderY); ctx.lineTo(0, hipY); ctx.stroke();
        // Arms wide
        ctx.beginPath(); ctx.moveTo(0, shoulderY); ctx.lineTo(-10, shoulderY+3); ctx.lineTo(-13, shoulderY+8); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, shoulderY); ctx.lineTo(10, shoulderY+3); ctx.lineTo(13, shoulderY+8); ctx.stroke();
    }
    
    // === HEAD ===
    ctx.beginPath();
    ctx.arc(0, headY, headR, 0, Math.PI * 2);
    ctx.stroke();
    
    // === MOTION TRAIL ===
    if (gameSpeed > 4.5 || player.vy < -200) {
        ctx.strokeStyle = 'rgba(255,255,255,0.08)';
        ctx.lineWidth = 1;
        for (let i = 1; i <= 2; i++) {
            ctx.globalAlpha = 0.06 / i;
            ctx.beginPath(); ctx.arc(-i*7, headY, headR, 0, Math.PI*2); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(-i*7, shoulderY); ctx.lineTo(-i*7, hipY); ctx.stroke();
        }
        ctx.globalAlpha = 1;
    }
    
    ctx.restore();
}

function drawHUD() {
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 22px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(Math.floor(distance) + 'm', 15, 30);
    
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.font = '13px sans-serif';
    ctx.fillText('BEST: ' + Math.floor(bestDistance) + 'm', 15, 50);
    
    // Stage name (top right)
    const stage = getStage();
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.font = '14px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(stage.name, W - 15, 30);
    ctx.textAlign = 'left';
}

// ============================================
// TITLE
// ============================================
function drawTitle() {
    ctx.textAlign = 'center';
    
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 34px sans-serif';
    ctx.fillText('🏃 屋根ラン', W/2, H*0.22);
    
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = '15px sans-serif';
    ctx.fillText('ビルからビルへ飛び移れ！', W/2, H*0.29);
    
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.font = '13px sans-serif';
    ctx.fillText('タップ → ジャンプ', W/2, H*0.37);
    ctx.fillText('長押し → 高くジャンプ', W/2, H*0.41);
    ctx.fillText('ギリギリ着地でスローモーション！', W/2, H*0.45);
    
    if (bestDistance > 0) {
        ctx.fillStyle = '#ffd700';
        ctx.font = '16px sans-serif';
        ctx.fillText('🏆 ベスト: ' + Math.floor(bestDistance) + 'm', W/2, H*0.53);
    }
    
    // Demo scene: stickman running on buildings
    const demoBaseY = H * 0.72;
    
    // Buildings
    ctx.fillStyle = '#2d3436';
    ctx.fillRect(W*0.1, demoBaseY, W*0.3, H*0.15);
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.fillRect(W*0.1, demoBaseY, W*0.3, 3);
    
    ctx.fillStyle = '#34495e';
    ctx.fillRect(W*0.55, demoBaseY + 10, W*0.35, H*0.15);
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.fillRect(W*0.55, demoBaseY + 10, W*0.35, 3);
    
    // Animated stickman
    const demoTime = Date.now() / 1000;
    const jumpCycle = demoTime % 2;
    let demoX, demoY;
    
    if (jumpCycle < 0.8) {
        // Running on first building
        demoX = W*0.15 + jumpCycle * W * 0.2;
        demoY = demoBaseY;
    } else if (jumpCycle < 1.3) {
        // Jumping
        const t = (jumpCycle - 0.8) / 0.5;
        demoX = W*0.35 + t * W * 0.25;
        demoY = demoBaseY - Math.sin(t * Math.PI) * 60 + (t > 0.5 ? 10 : 0);
    } else {
        // Landing on second building
        demoX = W*0.6 + (jumpCycle - 1.3) * W * 0.15;
        demoY = demoBaseY + 10;
    }
    
    // Simple demo stickman
    ctx.save();
    ctx.translate(demoX, demoY);
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    const dh = 7, db = 16, dl = 14;
    const runAnim = Math.sin(demoTime * 10) * 0.5;
    ctx.beginPath(); ctx.arc(0, -db-dl-dh, dh, 0, Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, -db-dl+dh-2); ctx.lineTo(0, -dl); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, -dl); ctx.lineTo(Math.sin(runAnim)*dl*0.5, -dl + Math.cos(runAnim)*dl*0.5 + dl*0.5); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, -dl); ctx.lineTo(Math.sin(-runAnim)*dl*0.5, -dl + Math.cos(-runAnim)*dl*0.5 + dl*0.5); ctx.stroke();
    ctx.restore();
    
    // Start prompt
    const pulse = 0.6 + Math.sin(Date.now()/400) * 0.4;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#64dfdf';
    ctx.font = 'bold 22px sans-serif';
    ctx.fillText('▶ タップでスタート', W/2, H*0.88);
    ctx.globalAlpha = 1;
}

// ============================================
// DEAD SCREEN
// ============================================
function drawDeadScreen() {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, W, H);
    
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ff4444';
    ctx.font = 'bold 30px sans-serif';
    ctx.fillText('💀 落下！', W/2, H*0.3);
    
    ctx.fillStyle = '#fff';
    ctx.font = '20px sans-serif';
    ctx.fillText('距離: ' + Math.floor(distance) + 'm', W/2, H*0.42);
    
    if (distance >= bestDistance && distance > 0) {
        ctx.fillStyle = '#ffd700';
        ctx.font = 'bold 18px sans-serif';
        ctx.fillText('🏆 NEW RECORD!', W/2, H*0.50);
    }
    
    if (deadTimer > 0.8) {
        const pulse = 0.6 + Math.sin(Date.now()/400) * 0.4;
        ctx.globalAlpha = pulse;
        ctx.fillStyle = '#64dfdf';
        ctx.font = 'bold 22px sans-serif';
        ctx.fillText('▶ タップでリトライ', W/2, H*0.65);
        ctx.globalAlpha = 1;
    }
}

// === Start ===
requestAnimationFrame(update);
</script>
