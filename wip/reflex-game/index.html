<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>反射神経ランナー - 今日のミニゲーム</title>
    <meta name="description" content="安全な方を選んで走れ！30秒チャレンジ！">
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        
        #game-container {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        canvas {
            display: block;
            margin: 0 auto;
        }
        
        .credits {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.7);
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <div class="credits">Powered by Phaser</div>
    
    <script>
        // 効果音
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        
        function playCorrectSound() {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            oscillator.frequency.value = 800;
            oscillator.type = 'square';
            gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.08);
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.08);
        }
        
        function playWrongSound() {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            oscillator.frequency.value = 200;
            oscillator.type = 'sawtooth';
            gainNode.gain.setValueAtTime(0.15, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.2);
        }

        const config = {
            type: Phaser.AUTO,
            width: 400,
            height: 700,
            parent: 'game-container',
            backgroundColor: '#87CEEB',
            scale: {
                mode: Phaser.Scale.FIT,
                autoCenter: Phaser.Scale.CENTER_BOTH
            },
            scene: {
                create: create,
                update: update
            }
        };

        const game = new Phaser.Game(config);
        
        let distance = 0;
        let timeLeft = 30;
        let gameStarted = false;
        let gameOver = false;
        let currentAnswer = null;
        let canAnswer = false;
        let leftText;
        let rightText;
        let distanceText;
        let timeText;
        let startText;
        let resultText;
        let runner;
        let roadLines = [];
        let roadSpeed = 0;
        
        // パターン定義（左が危険/右が安全 or その逆）
        const patterns = [
            { left: '🪨', right: '🛣️', safe: 'right', name: '岩 vs 道' },
            { left: '💎', right: '💣', safe: 'left', name: '宝石 vs 爆弾' },
            { left: '🔥', right: '💧', safe: 'right', name: '炎 vs 水' },
            { left: '🌸', right: '🌵', safe: 'left', name: '花 vs トゲ' },
            { left: '⭐', right: '☠️', safe: 'left', name: '星 vs ドクロ' },
            { left: '🍎', right: '🧨', safe: 'left', name: 'リンゴ vs 爆竹' },
        ];

        function create() {
            // 道路
            for (let i = 0; i < 8; i++) {
                const line = this.add.rectangle(200, i * 100 + 50, 10, 60, 0xffffff);
                roadLines.push(line);
            }
            
            // ランナー（シンプルなキャラ）
            runner = this.add.container(80, 500);
            const body = this.add.circle(0, 0, 20, 0xFFD700);
            const head = this.add.circle(0, -25, 15, 0xffd4a3);
            runner.add([body, head]);
            
            // 左右の選択肢表示
            leftText = this.add.text(100, 280, '', {
                fontSize: '100px',
                fill: '#fff',
                fontStyle: 'bold',
                stroke: '#000',
                strokeThickness: 4
            }).setOrigin(0.5);
            
            rightText = this.add.text(300, 280, '', {
                fontSize: '100px',
                fill: '#fff',
                fontStyle: 'bold',
                stroke: '#000',
                strokeThickness: 4
            }).setOrigin(0.5);
            
            // 説明テキスト
            const instructionText = this.add.text(200, 180, '安全な方を選んで！', {
                fontSize: '32px',
                fill: '#FFD700',
                fontStyle: 'bold',
                stroke: '#000',
                strokeThickness: 3
            }).setOrigin(0.5);
            
            // 距離表示
            distanceText = this.add.text(20, 20, '0m', {
                fontSize: '42px',
                fill: '#FFD700',
                fontStyle: 'bold',
                stroke: '#000',
                strokeThickness: 4
            });
            
            // 残り時間表示
            timeText = this.add.text(20, 80, '30.0秒', {
                fontSize: '36px',
                fill: '#fff',
                fontStyle: 'bold',
                stroke: '#000',
                strokeThickness: 3
            });
            
            // スタート画面
            startText = this.add.text(200, 350, '⚡ 反射神経ランナー ⚡\n\n安全な方を素早く選んで！\n30秒でどこまで走れる？\n\n例: 🪨 vs 🛣️ → 道を選ぶ\n\n📱 スマホ: 左右タップ\n⌨️ PC: ←→キー\n\nタップしてスタート', {
                fontSize: '26px',
                fill: '#fff',
                fontStyle: 'bold',
                align: 'center',
                stroke: '#000',
                strokeThickness: 4,
                lineSpacing: 10
            }).setOrigin(0.5);
            
            // 左右タップエリア（スマホ用）
            const leftArea = this.add.rectangle(100, 350, 200, 700, 0x000000, 0);
            leftArea.setInteractive();
            leftArea.on('pointerdown', () => handleInput(this, 'left'));
            
            const rightArea = this.add.rectangle(300, 350, 200, 700, 0x000000, 0);
            rightArea.setInteractive();
            rightArea.on('pointerdown', () => handleInput(this, 'right'));
            
            // キーボード入力
            this.input.keyboard.on('keydown-LEFT', () => handleInput(this, 'left'));
            this.input.keyboard.on('keydown-RIGHT', () => handleInput(this, 'right'));
        }

        function handleInput(scene, direction) {
            if (!gameStarted && !gameOver) {
                startGame(scene);
            } else if (gameStarted && !gameOver && canAnswer) {
                checkAnswer(scene, direction);
            } else if (gameOver) {
                resetGame(scene);
            }
        }

        function startGame(scene) {
            gameStarted = true;
            startText.setVisible(false);
            distance = 0;
            timeLeft = 30;
            roadSpeed = 3;
            canAnswer = false;
            distanceText.setText('0m');
            timeText.setText('30.0秒');
            
            // タイマー
            scene.time.addEvent({
                delay: 100,
                callback: () => updateTimer(scene),
                loop: true
            });
            
            // 最初の問題
            showNextQuestion(scene);
        }

        function showNextQuestion(scene) {
            if (!gameStarted || gameOver) return;
            
            // ランダムなパターンを選択
            const pattern = Phaser.Utils.Array.GetRandom(patterns);
            currentAnswer = pattern.safe;
            
            // 表示
            leftText.setText(pattern.left);
            rightText.setText(pattern.right);
            leftText.setAlpha(1);
            rightText.setAlpha(1);
            
            // 入力を受け付ける
            canAnswer = true;
        }

        function checkAnswer(scene, answer) {
            // 入力を一時停止
            canAnswer = false;
            
            if (answer === currentAnswer) {
                // 正解
                playCorrectSound();
                distance += 10;
                distanceText.setText(distance + 'm');
                
                // 道路スピードアップ
                roadSpeed += 0.2;
                
                // 正解エフェクト
                const correctText = answer === 'left' ? leftText : rightText;
                scene.tweens.add({
                    targets: correctText,
                    scaleX: 1.3,
                    scaleY: 1.3,
                    alpha: 0,
                    duration: 150,
                    onComplete: () => {
                        correctText.setScale(1);
                        leftText.setText('');
                        rightText.setText('');
                        scene.time.delayedCall(200, () => showNextQuestion(scene));
                    }
                });
                
                // 不正解の方をフェードアウト
                const wrongText = answer === 'left' ? rightText : leftText;
                scene.tweens.add({
                    targets: wrongText,
                    alpha: 0,
                    duration: 150
                });
            } else {
                // 不正解
                playWrongSound();
                
                // ペナルティ表示
                const wrongText = answer === 'left' ? leftText : rightText;
                scene.tweens.add({
                    targets: wrongText,
                    tint: 0xff0000,
                    duration: 200,
                    yoyo: true,
                    onComplete: () => {
                        wrongText.clearTint();
                        // 入力を再開
                        canAnswer = true;
                    }
                });
            }
        }

        function updateTimer(scene) {
            if (!gameStarted || gameOver) return;
            
            timeLeft -= 0.1;
            if (timeLeft <= 0) {
                timeLeft = 0;
                endGame(scene);
            }
            timeText.setText(timeLeft.toFixed(1) + '秒');
            
            // 残り時間が少なくなったら警告色
            if (timeLeft <= 5) {
                timeText.setStyle({ fill: '#ff0000' });
            }
        }

        function endGame(scene) {
            gameOver = true;
            gameStarted = false;
            canAnswer = false;
            
            leftText.setText('');
            rightText.setText('');
            roadSpeed = 0;
            
            let message, rank;
            if (distance >= 300) {
                rank = 'S';
                message = '神反射！';
            } else if (distance >= 200) {
                rank = 'A';
                message = 'すごい！';
            } else if (distance >= 100) {
                rank = 'B';
                message = 'いい感じ！';
            } else {
                rank = 'C';
                message = '次はもっといけるよ！';
            }
            
            resultText = scene.add.text(200, 350, `タイムアップ！\n\nランク: ${rank}\n記録: ${distance}m\n\n${message}\n\nタップで再プレイ`, {
                fontSize: '36px',
                fill: '#fff',
                fontStyle: 'bold',
                align: 'center',
                stroke: '#000',
                strokeThickness: 4,
                lineSpacing: 10
            }).setOrigin(0.5);
        }

        function resetGame(scene) {
            if (resultText) {
                resultText.destroy();
            }
            
            gameOver = false;
            canAnswer = false;
            leftText.setText('');
            rightText.setText('');
            timeText.setStyle({ fill: '#fff' });
            startText.setVisible(true);
        }

        function update() {
            if (!gameStarted || gameOver) return;
            
            // 道路をスクロール
            roadLines.forEach(line => {
                line.y += roadSpeed;
                if (line.y > 750) {
                    line.y = -50;
                }
            });
            
            // ランナーを少し上下に動かす（走ってる感じ）
            if (roadSpeed > 0) {
                runner.y = 500 + Math.sin(Date.now() / 100) * 5;
            }
        }
    </script>
</body>
</html>
