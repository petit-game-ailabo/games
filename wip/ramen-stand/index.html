<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ラーメン屋台物語</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #2c2416;
  color: #333;
  max-width: 460px;
  margin: 0 auto;
  overflow-x: hidden;
  user-select: none;
}

#app {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Title Screen */
#titleScreen {
  background: linear-gradient(135deg, #d35400 0%, #e67e22 100%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

#titleScreen h1 {
  font-size: 32px;
  color: white;
  margin-bottom: 40px;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
}

#titleScreen button {
  background: white;
  color: #d35400;
  border: none;
  padding: 15px 40px;
  font-size: 18px;
  border-radius: 8px;
  margin: 10px;
  cursor: pointer;
  box-shadow: 0 4px 6px rgba(0,0,0,0.2);
  font-weight: bold;
}

#titleScreen button:active {
  transform: translateY(2px);
}

/* Game Screen */
#gameScreen {
  display: none;
  flex: 1;
}

/* Header */
#header {
  background: #d35400;
  color: white;
  padding: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 14px;
}

#header .stats {
  display: flex;
  gap: 15px;
}

#header .stat {
  display: flex;
  align-items: center;
  gap: 4px;
}

/* Tabs */
#tabs {
  background: #f5f0e8;
  display: flex;
  border-bottom: 2px solid #d35400;
}

.tab {
  flex: 1;
  padding: 12px;
  background: transparent;
  border: none;
  font-size: 14px;
  cursor: pointer;
  color: #666;
  border-bottom: 3px solid transparent;
}

.tab.active {
  color: #d35400;
  border-bottom-color: #d35400;
  font-weight: bold;
}

/* Content */
#content {
  flex: 1;
  background: #f5f0e8;
  overflow-y: auto;
  padding: 15px;
}

/* Grid */
#gridContainer {
  background: #f5f0e8;
  border: 2px solid #d35400;
  padding: 10px;
  border-radius: 8px;
  position: relative;
}

#grid {
  display: grid;
  gap: 2px;
  background: #ccc;
  border: 1px solid #999;
  margin-bottom: 10px;
}

.cell {
  aspect-ratio: 1;
  background: #fff;
  position: relative;
  border: 1px solid #ddd;
  cursor: pointer;
}

.cell.street {
  background: #666;
  cursor: default;
}

.cell.furniture {
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  background: #ffeaa7;
  border: 2px solid #d35400;
}

.customer {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  position: absolute;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  transition: all 0.3s ease;
  z-index: 10;
}

.customer.walking { background: #74b9ff; }
.customer.entering { background: #ffeaa7; }
.customer.seated { background: #55efc4; }
.customer.eating { background: #fd79a8; }
.customer.leaving { background: #b2bec3; }

.notification {
  position: absolute;
  background: rgba(0,0,0,0.8);
  color: white;
  padding: 4px 8px;
  border-radius: 4px;
  font-size: 12px;
  z-index: 20;
  pointer-events: none;
  animation: fadeOut 2s forwards;
}

@keyframes fadeOut {
  0% { opacity: 1; transform: translateY(0); }
  100% { opacity: 0; transform: translateY(-20px); }
}

/* Equipment List */
#equipmentList {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin-top: 15px;
}

.equipment-item {
  background: white;
  border: 2px solid #d35400;
  border-radius: 8px;
  padding: 10px;
  cursor: pointer;
  text-align: center;
  transition: all 0.2s;
}

.equipment-item:active {
  transform: scale(0.95);
}

.equipment-item.selected {
  background: #ffeaa7;
  border-color: #e67e22;
}

.equipment-item.disabled {
  opacity: 0.5;
  cursor: not-allowed;
  background: #f0f0f0;
}

.equipment-item .icon {
  font-size: 32px;
  margin-bottom: 5px;
}

.equipment-item .name {
  font-weight: bold;
  font-size: 14px;
  margin-bottom: 3px;
}

.equipment-item .cost {
  color: #d35400;
  font-size: 12px;
}

/* Business Controls */
#businessControls {
  background: white;
  border: 2px solid #d35400;
  border-radius: 8px;
  padding: 15px;
  margin-bottom: 15px;
}

#businessControls h3 {
  margin-bottom: 10px;
  color: #d35400;
}

#businessControls .timer {
  font-size: 32px;
  font-weight: bold;
  text-align: center;
  margin: 15px 0;
  color: #d35400;
}

#businessControls .controls {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

#businessControls button {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 6px;
  font-size: 14px;
  font-weight: bold;
  cursor: pointer;
}

.btn-primary {
  background: #d35400;
  color: white;
}

.btn-secondary {
  background: #bdc3c7;
  color: #333;
}

.btn-primary:active, .btn-secondary:active {
  opacity: 0.8;
}

.speed-controls {
  display: flex;
  gap: 5px;
  margin-top: 10px;
}

.speed-btn {
  flex: 1;
  padding: 8px;
  border: 2px solid #d35400;
  background: white;
  color: #d35400;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
}

.speed-btn.active {
  background: #d35400;
  color: white;
}

/* Menu Builder */
#menuBuilder {
  background: white;
  border: 2px solid #d35400;
  border-radius: 8px;
  padding: 15px;
}

.menu-section {
  margin-bottom: 20px;
}

.menu-section h4 {
  color: #d35400;
  margin-bottom: 10px;
  font-size: 16px;
}

.ingredient-list {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
}

.ingredient-item {
  background: #f5f0e8;
  border: 2px solid #ddd;
  border-radius: 6px;
  padding: 8px;
  cursor: pointer;
  font-size: 13px;
  text-align: center;
  transition: all 0.2s;
}

.ingredient-item:active {
  transform: scale(0.95);
}

.ingredient-item.selected {
  background: #ffeaa7;
  border-color: #d35400;
}

.ingredient-item.locked {
  opacity: 0.5;
  cursor: not-allowed;
}

.ingredient-item .price {
  color: #d35400;
  font-size: 11px;
  margin-top: 3px;
}

.recipe-preview {
  background: #ffeaa7;
  border: 2px solid #d35400;
  border-radius: 8px;
  padding: 15px;
  margin-top: 15px;
}

.recipe-preview h4 {
  margin-bottom: 10px;
  color: #d35400;
}

.recipe-preview .selected-ingredients {
  font-size: 14px;
  line-height: 1.6;
  margin-bottom: 10px;
}

.recipe-preview input {
  width: 100%;
  padding: 8px;
  border: 2px solid #d35400;
  border-radius: 6px;
  font-size: 14px;
  margin-bottom: 10px;
}

.recipe-preview button {
  width: 100%;
  padding: 10px;
  background: #d35400;
  color: white;
  border: none;
  border-radius: 6px;
  font-weight: bold;
  cursor: pointer;
}

/* Info Tab */
.info-section {
  background: white;
  border: 2px solid #d35400;
  border-radius: 8px;
  padding: 15px;
  margin-bottom: 15px;
}

.info-section h3 {
  color: #d35400;
  margin-bottom: 10px;
  font-size: 18px;
}

.info-section .stat-row {
  display: flex;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid #eee;
}

.combo-item {
  background: #ffeaa7;
  border-left: 4px solid #d35400;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 4px;
}

.combo-item .combo-name {
  font-weight: bold;
  color: #d35400;
  margin-bottom: 5px;
}

.combo-item .combo-condition {
  font-size: 13px;
  color: #666;
  margin-bottom: 3px;
}

.combo-item .combo-effect {
  font-size: 13px;
  color: #27ae60;
  font-weight: bold;
}

/* Summary Modal */
#summaryModal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0,0,0,0.8);
  z-index: 100;
  padding: 20px;
  overflow-y: auto;
}

.modal-content {
  background: white;
  border-radius: 12px;
  padding: 20px;
  max-width: 400px;
  margin: 50px auto;
}

.modal-content h2 {
  color: #d35400;
  margin-bottom: 20px;
  text-align: center;
}

.modal-content .summary-stats {
  margin: 20px 0;
}

.modal-content .summary-stat {
  display: flex;
  justify-content: space-between;
  padding: 10px;
  background: #f5f0e8;
  margin-bottom: 8px;
  border-radius: 6px;
}

.modal-content button {
  width: 100%;
  padding: 15px;
  background: #d35400;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  margin-top: 15px;
}

.hidden {
  display: none !important;
}
</style>
</head>
<body>
<div id="app">
  <!-- Title Screen -->
  <div id="titleScreen">
    <h1>🍜 ラーメン屋台物語</h1>
    <button id="btnNewGame">はじめから</button>
    <button id="btnContinue" class="hidden">つづきから</button>
  </div>

  <!-- Game Screen -->
  <div id="gameScreen">
    <div id="header">
      <div class="stats">
        <div class="stat">💰 <span id="money">5000</span>円</div>
        <div class="stat">📅 <span id="day">1</span>日目</div>
      </div>
    </div>

    <div id="tabs">
      <button class="tab active" data-tab="business">営業</button>
      <button class="tab" data-tab="layout">配置</button>
      <button class="tab" data-tab="menu">メニュー</button>
      <button class="tab" data-tab="info">情報</button>
    </div>

    <div id="content">
      <!-- Business Tab -->
      <div id="businessTab" class="tab-content">
        <div id="businessControls">
          <h3>営業時間</h3>
          <div class="timer" id="businessTimer">00:00</div>
          <div class="controls">
            <button class="btn-primary" id="btnStartBusiness">営業開始</button>
            <button class="btn-secondary hidden" id="btnEndBusiness">営業終了</button>
          </div>
          <div class="speed-controls hidden" id="speedControls">
            <button class="speed-btn active" data-speed="1">1x</button>
            <button class="speed-btn" data-speed="2">2x</button>
            <button class="speed-btn" data-speed="3">3x</button>
          </div>
        </div>
        <div id="gridContainer">
          <div id="grid"></div>
        </div>
      </div>

      <!-- Layout Tab -->
      <div id="layoutTab" class="tab-content hidden">
        <div id="gridContainer2">
          <div id="layoutGrid"></div>
        </div>
        <div id="equipmentList"></div>
      </div>

      <!-- Menu Tab -->
      <div id="menuTab" class="tab-content hidden">
        <div id="menuBuilder">
          <div class="menu-section">
            <h4>スープベース</h4>
            <div id="soupBaseList" class="ingredient-list"></div>
          </div>
          <div class="menu-section">
            <h4>タレ</h4>
            <div id="tareList" class="ingredient-list"></div>
          </div>
          <div class="menu-section">
            <h4>麺</h4>
            <div id="noodleList" class="ingredient-list"></div>
          </div>
          <div class="menu-section">
            <h4>トッピング</h4>
            <div id="toppingList" class="ingredient-list"></div>
          </div>
          <div class="recipe-preview">
            <h4>現在のレシピ</h4>
            <div id="recipePreview" class="selected-ingredients"></div>
            <input type="number" id="recipePrice" placeholder="価格（円）" value="800">
            <button id="btnSaveRecipe">このレシピを保存</button>
          </div>
        </div>
      </div>

      <!-- Info Tab -->
      <div id="infoTab" class="tab-content hidden">
        <div class="info-section">
          <h3>📊 統計</h3>
          <div class="stat-row">
            <span>累計売上</span>
            <span id="totalRevenue">0円</span>
          </div>
          <div class="stat-row">
            <span>累計来客</span>
            <span id="totalCustomers">0人</span>
          </div>
          <div class="stat-row">
            <span>平均満足度</span>
            <span id="avgSatisfaction">-</span>
          </div>
        </div>
        <div class="info-section">
          <h3>✨ 発見したコンボ</h3>
          <div id="comboList"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Summary Modal -->
  <div id="summaryModal">
    <div class="modal-content">
      <h2>営業結果</h2>
      <div class="summary-stats">
        <div class="summary-stat">
          <span>売上</span>
          <span id="summaryRevenue">0円</span>
        </div>
        <div class="summary-stat">
          <span>来客数</span>
          <span id="summaryCustomers">0人</span>
        </div>
        <div class="summary-stat">
          <span>平均満足度</span>
          <span id="summarySatisfaction">0%</span>
        </div>
      </div>
      <button id="btnCloseSummary">次の日へ</button>
    </div>
  </div>
</div>

<script>
// ===== GAME STATE =====
const game = {
  money: 5000,
  day: 1,
  gridSize: {w: 6, h: 5},
  furniture: [],
  ingredients: {
    soupBase: ['鶏ガラ', '野菜'],
    tare: ['醤油'],
    noodles: ['極細ストレート', '中細ストレート'],
    toppings: ['ネギ', '海苔', 'メンマ']
  },
  currentRecipe: {
    soupBase: '鶏ガラ',
    tare: '醤油',
    noodle: '極細ストレート',
    toppings: ['ネギ'],
    price: 800
  },
  stats: {
    totalRevenue: 0,
    totalCustomers: 0,
    totalSatisfaction: 0
  },
  combos: [],
  business: {
    active: false,
    time: 0,
    duration: 60,
    speed: 1,
    customers: [],
    todayRevenue: 0,
    todayCustomers: 0,
    todaySatisfaction: []
  }
};

// ===== EQUIPMENT DATA =====
const equipmentData = {
  'カウンター席': {icon: '🪑', cost: 200, type: 'seat', size: 1},
  'テーブル席': {icon: '🍽️', cost: 500, type: 'seat', size: 1},
  '座敷席': {icon: '🛋️', cost: 800, type: 'seat', size: 2},
  '寸胴小': {icon: '🍲', cost: 500, type: 'kitchen', size: 1},
  '寸胴大': {icon: '🍲', cost: 2000, type: 'kitchen', size: 1},
  '製麺機': {icon: '🎰', cost: 3000, type: 'kitchen', size: 1},
  '冷蔵庫': {icon: '🧊', cost: 1000, type: 'kitchen', size: 1},
  '調理台': {icon: '🔪', cost: 300, type: 'kitchen', size: 1},
  '看板小': {icon: '🪧', cost: 300, type: 'outside', size: 1},
  '看板大': {icon: '🏮', cost: 1500, type: 'outside', size: 1},
  'のぼり': {icon: '🎏', cost: 200, type: 'outside', size: 1},
  '観葉植物': {icon: '🪴', cost: 200, type: 'interior', size: 1},
  'テレビ': {icon: '📺', cost: 500, type: 'interior', size: 1}
};

// ===== INGREDIENT DATA =====
const ingredientData = {
  soupBase: [
    {name: '鶏ガラ', cost: 0, owned: true},
    {name: '野菜', cost: 0, owned: true},
    {name: '豚骨', cost: 500, owned: false},
    {name: '煮干し', cost: 800, owned: false},
    {name: '昆布', cost: 300, owned: false},
    {name: '鰹節', cost: 1500, owned: false},
    {name: '貝類', cost: 3000, owned: false}
  ],
  tare: [
    {name: '醤油', cost: 0, owned: true},
    {name: '味噌', cost: 500, owned: false},
    {name: '塩', cost: 300, owned: false}
  ],
  noodles: [
    {name: '極細ストレート', cost: 0, owned: true},
    {name: '中細ストレート', cost: 0, owned: true},
    {name: '太麺ちぢれ', cost: 800, owned: false},
    {name: '極太麺', cost: 1200, owned: false},
    {name: '全粒粉麺', cost: 2000, owned: false}
  ],
  toppings: [
    {name: 'ネギ', cost: 0, owned: true},
    {name: '海苔', cost: 0, owned: true},
    {name: 'メンマ', cost: 0, owned: true},
    {name: 'チャーシュー', cost: 500, owned: false},
    {name: '味玉', cost: 400, owned: false},
    {name: 'もやし', cost: 200, owned: false},
    {name: 'コーン', cost: 300, owned: false},
    {name: 'バター', cost: 600, owned: false}
  ]
};

// ===== COMBO DATA =====
const comboData = [
  {name: 'こだわり工房', items: ['寸胴', '製麺機'], effect: '品質+15%'},
  {name: 'ライブ感', items: ['カウンター席', '寸胴'], effect: '満足度+10%'},
  {name: '癒し空間', items: ['テーブル席', '観葉植物'], effect: 'チップ+20%'},
  {name: 'くつろぎ処', items: ['座敷席', 'テレビ'], effect: '追加注文率UP'},
  {name: '目立つ店', items: ['看板', 'のぼり'], effect: '集客+25%'},
  {name: '鮮度抜群', items: ['冷蔵庫', '調理台'], effect: '品質+10%'}
];

// ===== UI REFERENCES =====
let selectedEquipment = null;

// ===== INITIALIZATION =====
function init() {
  document.getElementById('btnNewGame').addEventListener('click', startNewGame);
  document.getElementById('btnContinue').addEventListener('click', loadGame);
  
  // Tab switching
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => switchTab(tab.dataset.tab));
  });
  
  // Business controls
  document.getElementById('btnStartBusiness').addEventListener('click', startBusiness);
  document.getElementById('btnEndBusiness').addEventListener('click', endBusiness);
  document.querySelectorAll('.speed-btn').forEach(btn => {
    btn.addEventListener('click', () => setSpeed(parseInt(btn.dataset.speed)));
  });
  
  // Recipe builder
  document.getElementById('btnSaveRecipe').addEventListener('click', saveRecipe);
  
  // Summary modal
  document.getElementById('btnCloseSummary').addEventListener('click', closeSummary);
  
  // Check for save
  if (localStorage.getItem('ramenSave')) {
    document.getElementById('btnContinue').classList.remove('hidden');
  }
}

function startNewGame() {
  document.getElementById('titleScreen').style.display = 'none';
  document.getElementById('gameScreen').style.display = 'flex';
  
  renderGrid();
  renderLayoutGrid();
  renderEquipmentList();
  renderIngredients();
  updateUI();
}

function loadGame() {
  // TODO: Implement save/load
  startNewGame();
}

function switchTab(tabName) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab[data-tab="${tabName}"]`).classList.add('active');
  
  document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
  document.getElementById(tabName + 'Tab').classList.remove('hidden');
  
  if (tabName === 'layout') {
    setTimeout(() => renderLayoutGrid(), 0);
  } else if (tabName === 'info') {
    renderInfoTab();
  }
}

function updateUI() {
  document.getElementById('money').textContent = game.money;
  document.getElementById('day').textContent = game.day;
  document.getElementById('totalRevenue').textContent = game.stats.totalRevenue + '円';
  document.getElementById('totalCustomers').textContent = game.stats.totalCustomers + '人';
  
  const avgSat = game.stats.totalCustomers > 0 
    ? Math.round(game.stats.totalSatisfaction / game.stats.totalCustomers) 
    : 0;
  document.getElementById('avgSatisfaction').textContent = avgSat + '%';
}

// ===== GRID RENDERING =====
function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  grid.style.gridTemplateColumns = `repeat(${game.gridSize.w}, 1fr)`;
  
  for (let y = 0; y < game.gridSize.h; y++) {
    for (let x = 0; x < game.gridSize.w; x++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.x = x;
      cell.dataset.y = y;
      
      if (y === game.gridSize.h - 1) {
        cell.classList.add('street');
      }
      
      // Check if furniture exists here
      const furniture = game.furniture.find(f => f.x === x && f.y === y);
      if (furniture) {
        cell.classList.add('furniture');
        cell.textContent = equipmentData[furniture.name].icon;
      }
      
      grid.appendChild(cell);
    }
  }
}

function renderLayoutGrid() {
  const grid = document.getElementById('layoutGrid');
  grid.innerHTML = '';
  grid.style.display = 'grid';
  grid.style.gridTemplateColumns = `repeat(${game.gridSize.w}, 1fr)`;
  grid.style.gap = '2px';
  grid.style.background = '#ccc';
  grid.style.border = '1px solid #999';
  grid.style.marginBottom = '10px';
  
  for (let y = 0; y < game.gridSize.h; y++) {
    for (let x = 0; x < game.gridSize.w; x++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.x = x;
      cell.dataset.y = y;
      
      if (y === game.gridSize.h - 1) {
        cell.classList.add('street');
      } else {
        cell.addEventListener('click', () => placeEquipment(x, y));
      }
      
      // Check if furniture exists here
      const furniture = game.furniture.find(f => f.x === x && f.y === y);
      if (furniture) {
        cell.classList.add('furniture');
        cell.textContent = equipmentData[furniture.name].icon;
        cell.addEventListener('click', (e) => {
          e.stopPropagation();
          removeFurniture(x, y);
        });
      }
      
      grid.appendChild(cell);
    }
  }
}

function renderEquipmentList() {
  const list = document.getElementById('equipmentList');
  list.innerHTML = '';
  
  Object.keys(equipmentData).forEach(name => {
    const item = equipmentData[name];
    const div = document.createElement('div');
    div.className = 'equipment-item';
    
    if (item.cost > game.money) {
      div.classList.add('disabled');
    }
    
    if (selectedEquipment === name) {
      div.classList.add('selected');
    }
    
    div.innerHTML = `
      <div class="icon">${item.icon}</div>
      <div class="name">${name}</div>
      <div class="cost">${item.cost}円</div>
    `;
    
    div.addEventListener('click', () => {
      if (item.cost <= game.money) {
        selectedEquipment = selectedEquipment === name ? null : name;
        renderEquipmentList();
      }
    });
    
    list.appendChild(div);
  });
}

function placeEquipment(x, y) {
  if (!selectedEquipment) return;
  if (y === game.gridSize.h - 1) return; // Can't place on street
  
  // Check if cell is occupied
  if (game.furniture.find(f => f.x === x && f.y === y)) return;
  
  const item = equipmentData[selectedEquipment];
  if (item.cost > game.money) return;
  
  // Place furniture
  game.money -= item.cost;
  game.furniture.push({name: selectedEquipment, x, y});
  
  // Check for combos
  checkCombos();
  
  selectedEquipment = null;
  updateUI();
  renderLayoutGrid();
  renderEquipmentList();
}

function removeFurniture(x, y) {
  const index = game.furniture.findIndex(f => f.x === x && f.y === y);
  if (index !== -1) {
    const furniture = game.furniture[index];
    const refund = Math.floor(equipmentData[furniture.name].cost * 0.5);
    game.money += refund;
    game.furniture.splice(index, 1);
    
    updateUI();
    renderLayoutGrid();
    renderEquipmentList();
  }
}

function checkCombos() {
  comboData.forEach(combo => {
    // Check if combo already discovered
    if (game.combos.find(c => c.name === combo.name)) return;
    
    // Check adjacency
    for (let f1 of game.furniture) {
      for (let f2 of game.furniture) {
        if (f1 === f2) continue;
        
        // Check if names match combo items
        const matches = combo.items.every(item => {
          return f1.name.includes(item) || f2.name.includes(item);
        });
        
        if (!matches) continue;
        
        // Check adjacency
        const dx = Math.abs(f1.x - f2.x);
        const dy = Math.abs(f1.y - f2.y);
        
        if ((dx === 1 && dy === 0) || (dx === 0 && dy === 1)) {
          // Combo found!
          game.combos.push({
            name: combo.name,
            condition: combo.items.join('+') + 'が隣接',
            effect: combo.effect
          });
          
          showNotification(`✨ コンボ発見！${combo.name}\n${combo.items.join('+')}が隣接\n${combo.effect}`);
          return;
        }
      }
    }
  });
}

// ===== INGREDIENTS =====
function renderIngredients() {
  renderIngredientCategory('soupBase', 'soupBaseList');
  renderIngredientCategory('tare', 'tareList');
  renderIngredientCategory('noodles', 'noodleList');
  renderIngredientCategory('toppings', 'toppingList');
  updateRecipePreview();
}

function renderIngredientCategory(category, listId) {
  const list = document.getElementById(listId);
  list.innerHTML = '';
  
  ingredientData[category].forEach(item => {
    const div = document.createElement('div');
    div.className = 'ingredient-item';
    
    if (!item.owned) {
      div.classList.add('locked');
    }
    
    const isSelected = (category === 'toppings') 
      ? game.currentRecipe.toppings.includes(item.name)
      : game.currentRecipe[category === 'noodles' ? 'noodle' : category] === item.name;
    
    if (isSelected) {
      div.classList.add('selected');
    }
    
    div.innerHTML = `
      <div>${item.name}</div>
      ${item.cost > 0 ? `<div class="price">${item.owned ? '所持' : item.cost + '円'}</div>` : ''}
    `;
    
    div.addEventListener('click', () => {
      if (!item.owned && item.cost > 0) {
        // Buy ingredient
        if (game.money >= item.cost) {
          game.money -= item.cost;
          item.owned = true;
          updateUI();
          renderIngredientCategory(category, listId);
        }
      } else if (item.owned) {
        // Select ingredient
        if (category === 'toppings') {
          const idx = game.currentRecipe.toppings.indexOf(item.name);
          if (idx >= 0) {
            game.currentRecipe.toppings.splice(idx, 1);
          } else {
            game.currentRecipe.toppings.push(item.name);
          }
        } else {
          const key = category === 'noodles' ? 'noodle' : category;
          game.currentRecipe[key] = item.name;
        }
        renderIngredientCategory(category, listId);
        updateRecipePreview();
      }
    });
    
    list.appendChild(div);
  });
}

function updateRecipePreview() {
  const preview = document.getElementById('recipePreview');
  preview.innerHTML = `
    <strong>スープ:</strong> ${game.currentRecipe.soupBase}<br>
    <strong>タレ:</strong> ${game.currentRecipe.tare}<br>
    <strong>麺:</strong> ${game.currentRecipe.noodle}<br>
    <strong>トッピング:</strong> ${game.currentRecipe.toppings.join(', ') || 'なし'}
  `;
}

function saveRecipe() {
  const price = parseInt(document.getElementById('recipePrice').value);
  if (isNaN(price) || price < 100) {
    alert('価格を100円以上に設定してください');
    return;
  }
  
  game.currentRecipe.price = price;
  showNotification('レシピを保存しました！');
}

// ===== BUSINESS OPERATIONS =====
function startBusiness() {
  // Check if at least one seat exists
  const hasSeats = game.furniture.some(f => 
    f.name.includes('席') || f.name.includes('seat')
  );
  
  if (!hasSeats) {
    alert('席を配置してください！');
    return;
  }
  
  game.business.active = true;
  game.business.time = 0;
  game.business.todayRevenue = 0;
  game.business.todayCustomers = 0;
  game.business.todaySatisfaction = [];
  game.business.customers = [];
  
  document.getElementById('btnStartBusiness').classList.add('hidden');
  document.getElementById('btnEndBusiness').classList.remove('hidden');
  document.getElementById('speedControls').classList.remove('hidden');
  
  gameLoop();
}

function endBusiness() {
  game.business.active = false;
  
  document.getElementById('btnStartBusiness').classList.remove('hidden');
  document.getElementById('btnEndBusiness').classList.add('hidden');
  document.getElementById('speedControls').classList.add('hidden');
  
  showSummary();
}

function setSpeed(speed) {
  game.business.speed = speed;
  document.querySelectorAll('.speed-btn').forEach(btn => {
    btn.classList.toggle('active', parseInt(btn.dataset.speed) === speed);
  });
}

let lastTime = 0;
function gameLoop() {
  if (!game.business.active) return;
  
  const now = Date.now();
  const delta = lastTime === 0 ? 0 : (now - lastTime) / 1000;
  lastTime = now;
  
  if (delta > 0 && delta < 1) {
    game.business.time += delta * game.business.speed;
  }
  
  // Update timer display every frame
  const remaining = Math.max(0, game.business.duration - game.business.time);
  const minutes = Math.floor(remaining / 60);
  const seconds = Math.floor(remaining % 60);
  document.getElementById('businessTimer').textContent = 
    `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
  
  // Spawn customers
  if (delta > 0 && Math.random() < 0.02 * game.business.speed) {
    spawnCustomer();
  }
  
  // Update customers
  if (delta > 0) {
    updateCustomers(delta * game.business.speed);
  }
  
  // Check if day is over
  if (game.business.time >= game.business.duration) {
    endBusiness();
    return;
  }
  
  requestAnimationFrame(gameLoop);
}

function spawnCustomer() {
  const customer = {
    id: Date.now() + Math.random(),
    x: Math.random() * game.gridSize.w,
    y: game.gridSize.h - 1,
    state: 'walking',
    targetX: null,
    targetY: null,
    timer: 0,
    satisfaction: 0
  };
  
  game.business.customers.push(customer);
  renderCustomers();
}

function updateCustomers(delta) {
  game.business.customers.forEach(customer => {
    customer.timer += delta;
    
    if (customer.state === 'walking') {
      // Walk along street
      customer.x += delta * 0.5;
      
      // Chance to notice shop
      if (customer.x > game.gridSize.w * 0.3 && Math.random() < 0.1) {
        customer.state = 'entering';
        findSeat(customer);
      }
      
      // Leave if reached end
      if (customer.x > game.gridSize.w) {
        customer.state = 'gone';
      }
    } else if (customer.state === 'entering') {
      // Move to seat
      if (customer.targetX !== null) {
        const dx = customer.targetX - customer.x;
        const dy = customer.targetY - customer.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        
        if (dist < 0.1) {
          customer.state = 'seated';
          customer.timer = 0;
        } else {
          customer.x += (dx / dist) * delta * 2;
          customer.y += (dy / dist) * delta * 2;
        }
      } else {
        customer.state = 'leaving';
      }
    } else if (customer.state === 'seated') {
      if (customer.timer > 2) {
        customer.state = 'eating';
        customer.timer = 0;
      }
    } else if (customer.state === 'eating') {
      if (customer.timer > 3) {
        customer.state = 'leaving';
        customer.timer = 0;
        
        // Calculate satisfaction and revenue
        customer.satisfaction = 60 + Math.random() * 40;
        const revenue = game.currentRecipe.price;
        
        game.business.todayRevenue += revenue;
        game.business.todayCustomers++;
        game.business.todaySatisfaction.push(customer.satisfaction);
      }
    } else if (customer.state === 'leaving') {
      customer.y += delta * 2;
      if (customer.y > game.gridSize.h) {
        customer.state = 'gone';
      }
    }
  });
  
  // Remove gone customers
  game.business.customers = game.business.customers.filter(c => c.state !== 'gone');
  
  renderCustomers();
}

function findSeat(customer) {
  const seats = game.furniture.filter(f => f.name.includes('席'));
  
  // Find empty seat
  for (let seat of seats) {
    const occupied = game.business.customers.some(c => 
      c.state === 'seated' || c.state === 'eating' &&
      Math.abs(c.targetX - seat.x) < 0.5 && Math.abs(c.targetY - seat.y) < 0.5
    );
    
    if (!occupied) {
      customer.targetX = seat.x + 0.5;
      customer.targetY = seat.y + 0.5;
      return;
    }
  }
  
  // No seat available
  customer.targetX = null;
}

function renderCustomers() {
  const grid = document.getElementById('grid');
  
  // Remove old customer elements
  grid.querySelectorAll('.customer').forEach(el => el.remove());
  
  // Add customer elements
  game.business.customers.forEach(customer => {
    const el = document.createElement('div');
    el.className = 'customer ' + customer.state;
    el.textContent = '😊';
    
    const cellWidth = grid.offsetWidth / game.gridSize.w;
    const cellHeight = grid.offsetHeight / game.gridSize.h;
    
    el.style.left = (customer.x * cellWidth) + 'px';
    el.style.top = (customer.y * cellHeight) + 'px';
    
    grid.appendChild(el);
  });
}

function showSummary() {
  game.stats.totalRevenue += game.business.todayRevenue;
  game.stats.totalCustomers += game.business.todayCustomers;
  
  const avgSat = game.business.todaySatisfaction.length > 0
    ? game.business.todaySatisfaction.reduce((a,b) => a+b, 0) / game.business.todaySatisfaction.length
    : 0;
  
  game.stats.totalSatisfaction += avgSat * game.business.todayCustomers;
  
  document.getElementById('summaryRevenue').textContent = game.business.todayRevenue + '円';
  document.getElementById('summaryCustomers').textContent = game.business.todayCustomers + '人';
  document.getElementById('summarySatisfaction').textContent = Math.round(avgSat) + '%';
  
  document.getElementById('summaryModal').style.display = 'block';
  
  game.money += game.business.todayRevenue;
  updateUI();
}

function closeSummary() {
  document.getElementById('summaryModal').style.display = 'none';
  game.day++;
  updateUI();
}

// ===== INFO TAB =====
function renderInfoTab() {
  const comboList = document.getElementById('comboList');
  comboList.innerHTML = '';
  
  if (game.combos.length === 0) {
    comboList.innerHTML = '<p style="color: #999;">まだ発見していません</p>';
    return;
  }
  
  game.combos.forEach(combo => {
    const div = document.createElement('div');
    div.className = 'combo-item';
    div.innerHTML = `
      <div class="combo-name">✨ ${combo.name}</div>
      <div class="combo-condition">条件: ${combo.condition}</div>
      <div class="combo-effect">効果: ${combo.effect}</div>
    `;
    comboList.appendChild(div);
  });
}

// ===== NOTIFICATIONS =====
function showNotification(text) {
  const notification = document.createElement('div');
  notification.className = 'notification';
  notification.textContent = text;
  notification.style.left = '50%';
  notification.style.top = '50%';
  notification.style.transform = 'translate(-50%, -50%)';
  
  document.getElementById('grid').appendChild(notification);
  
  setTimeout(() => notification.remove(), 2000);
}

// ===== START =====
init();
</script>
