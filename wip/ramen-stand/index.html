  toggleRecipe(recipe) {
    if (this.activeRecipes.includes(recipe)) {
      this.activeRecipes = this.activeRecipes.filter(r => r !== recipe);
    } else if (this.activeRecipes.length < 3) {
      this.activeRecipes.push(recipe);
    } else {
      this.showNotification('最大3つまでです！');
    }
    this.renderTabContent();
  }

  toggleRecipeActive(recipeId) {
    const recipe = this.recipes.find(r => r.id === recipeId);
    if (!recipe) return;
    if (recipe.active) {
      recipe.active = false;
    } else {
      const activeCount = this.recipes.filter(r => r.active).length;
      if (activeCount >= 3) {
        this.showNotification('提供は最大3つまで！');
        return;
      }
      // Check if recipe can be served
      const check = this.canServeRecipe(recipe);
      if (!check.ok) {
        this.showNotification(check.reason);
        return;
      }
      recipe.active = true;
    }
    // Sync activeRecipes list for backward compat
    this.activeRecipes = this.recipes.filter(r => r.active).map(r => r.name);
    this.saveGame();
    this.renderTabContent();
  }

  confirmDeleteRecipe(recipeId) {
    const recipe = this.recipes.find(r => r.id === recipeId);
    if (!recipe) return;
    if (this.recipes.length <= 1) {
      this.showNotification('最後のレシピは削除できません！');
      return;
    }
    this.deleteRecipe(recipeId);
    // Sync activeRecipes
    this.activeRecipes = this.recipes.filter(r => r.active).map(r => r.name);
    this.saveGame();
    this.showNotification('レシピを削除しました');
    this.renderTabContent();
  }

  unlockResearch(id) {
    const research = RESEARCH_TREE.find(r => r.id === id);
    if (!research) return;
    
    // Tier制限チェック
    if (!isTierAvailable(research.tier, this.unlockedResearch)) {
      this.showNotification('前のTierを先に研究してください！');
      return;
    }
    
    if (this.money < research.cost) {
      this.showNotification('お金が足りません！');
      return;
    }
    
    this.money -= research.cost;
    this.unlockedResearch.push(id);
    
    if (research.type === 'soup') {
      this.availableRecipes.push(research.name + 'ラーメン');
      // 新スープ解放時にデフォルトレシピを自動作成
      const soupKey = Object.keys(SOUP_BASES).find(k => SOUP_BASES[k].unlock === research.id);
      if (soupKey) {
        this.createRecipe(research.name + 'ラーメン', soupKey, 'medium', ['negi'], 'balanced');
      }
    }
    
    this.showNotification('✨ ' + research.name + ' を習得！');
    this.updateUI();
    this.renderTabContent();
  }

  setSpeed(multiplier) {
    this.speedMultiplier = multiplier;
    this.renderTabContent();
  }

  // ========== ラーメン構成モーダル ==========

  openRecipeModal(editRecipeId) {
    const modal = document.getElementById('recipe-modal');
    const title = document.getElementById('recipe-modal-title');
    const body = document.getElementById('recipe-modal-body');

    // Determine editing state
    let recipe = null;
    if (editRecipeId) {
      recipe = this.recipes.find(r => r.id === editRecipeId);
    }
    const isEdit = !!recipe;
    title.textContent = isEdit ? '🍜 レシピを編集' : '🍜 新しいラーメンを作る';

    // Current values
    const curName = recipe ? recipe.name : '';
    const curSoup = recipe ? recipe.soup : 'shoyu';
    const curNoodle = recipe ? recipe.noodle : 'medium';
    const curToppings = recipe ? recipe.toppings.slice() : [];
    const curStrategy = recipe ? recipe.priceStrategy : 'balanced';

    // Store editing state
    this._recipeModalState = {
      editId: editRecipeId || null,
      name: curName,
      soup: curSoup,
      noodle: curNoodle,
      toppings: curToppings,
      strategy: curStrategy
    };

    this._renderRecipeModalBody();
    modal.classList.add('active');
  }

  closeRecipeModal() {
    document.getElementById('recipe-modal').classList.remove('active');
    this._recipeModalState = null;
  }

  _renderRecipeModalBody() {
    const body = document.getElementById('recipe-modal-body');
    const s = this._recipeModalState;
    if (!s) return;

    const rawParams = calculateRecipeParams(s.soup, s.noodle, s.toppings);
    // 製麺機ボーナス
    const hasNoodleMachine = this.furniture.some(f => f.type === 'noodleMachine');
    const params = { ...rawParams };
    if (hasNoodleMachine) {
      const noodleCost = NOODLE_TYPES[s.noodle]?.cost || 0;
      params.cost -= Math.floor(noodleCost / 2);
    }
    const price = calculatePrice(params.cost, s.strategy);
    const profit = price - params.cost;

    // Soup options (only unlocked)
    const soupOptions = Object.entries(SOUP_BASES)
      .filter(([k, v]) => !v.unlock || this.unlockedResearch.includes(v.unlock))
      .map(([k, v]) => `<option value="${k}" ${s.soup === k ? 'selected' : ''}>${v.name} (${v.cost}円)</option>`)
      .join('');

    // Noodle options
    const noodleOptions = Object.entries(NOODLE_TYPES)
      .map(([k, v]) => `<option value="${k}" ${s.noodle === k ? 'selected' : ''}>${v.name} (${v.cost}円)</option>`)
      .join('');

    // Topping chips
    const toppingChips = Object.entries(TOPPINGS).map(([k, t]) => {
      const unlocked = !t.unlock || this.unlockedResearch.includes(t.unlock);
      const equipOk = !t.requires || this.furniture.some(f => f.type === t.requires);
      const available = unlocked;
      const selected = s.toppings.includes(k);
      let cls = 'topping-chip';
      if (selected) cls += ' selected';
      if (!available) cls += ' locked';
      let warn = '';
      if (!unlocked) warn = '(未研究)';
      else if (!equipOk) warn = `(${FURNITURE_TYPES[t.requires]?.name || '設備'}不足)`;
      return `<div class="${cls}" onclick="game._toggleTopping('${k}', ${available})" title="${t.name}">
        ${t.name} ${warn}<br><span class="topping-cost">${t.cost}円</span>
      </div>`;
    }).join('');

    // Price strategies
    const strategies = [
      { key: 'cheap', label: '安さで勝負', ratio: '95%' },
      { key: 'balanced', label: 'ちょうどいい', ratio: '80%' },
      { key: 'premium', label: 'ちょっとお高め', ratio: '70%' }
    ];
    const strategyHtml = strategies.map(st => {
      const p = calculatePrice(params.cost, st.key);
      const pr = p - params.cost;
      return `<div class="price-option ${s.strategy === st.key ? 'selected' : ''}" onclick="game._setStrategy('${st.key}')">
        <strong>${st.label}</strong> ${p}円 (原価率${st.ratio}) → 利益${pr}円/杯
      </div>`;
    }).join('');

    body.innerHTML = `
      <div class="recipe-field">
        <label>レシピ名</label>
        <input type="text" id="recipe-name-input" value="${this._escapeHtml(s.name)}" placeholder="例: こだわり醤油ラーメン" oninput="game._recipeModalState.name=this.value">
      </div>
      <div class="recipe-field">
        <label>スープ</label>
        <select onchange="game._setSoup(this.value)">${soupOptions}</select>
      </div>
      <div class="recipe-field">
        <label>麺</label>
        <select onchange="game._setNoodle(this.value)">${noodleOptions}</select>
      </div>
      <div class="recipe-field">
        <label>トッピング</label>
        <div class="topping-grid">${toppingChips}</div>
      </div>

      <div style="margin: 10px 0; padding: 8px; background: white; border: 2px solid #ccc; border-radius: 6px;">
        <div style="font-weight:bold; font-size:13px; margin-bottom:6px; color:#654321;">パラメータ</div>
        <div class="param-bar-container">
          <div class="param-bar-label"><span>キレ</span><span>${params.kire}/10</span></div>
          <div class="param-bar-track"><div class="param-bar-fill kire" style="width:${params.kire * 10}%"></div></div>
        </div>
        <div class="param-bar-container">
          <div class="param-bar-label"><span>コク</span><span>${params.koku}/10</span></div>
          <div class="param-bar-track"><div class="param-bar-fill koku" style="width:${params.koku * 10}%"></div></div>
        </div>
        <div class="param-bar-container">
          <div class="param-bar-label"><span>香り</span><span>${params.aroma}/10</span></div>
          <div class="param-bar-track"><div class="param-bar-fill aroma" style="width:${params.aroma * 10}%"></div></div>
        </div>
      </div>

      <div class="recipe-cost-section">
        <div style="font-weight:bold; margin-bottom:4px; color:#654321;">原価: ${params.cost}円</div>
        <div style="font-size:11px; color:#888;">スープ${SOUP_BASES[s.soup].cost} + 麺${NOODLE_TYPES[s.noodle].cost}${hasNoodleMachine ? `(-${Math.floor(NOODLE_TYPES[s.noodle].cost/2)}製麺機)` : ''} + 具${rawParams.cost - SOUP_BASES[s.soup].cost - NOODLE_TYPES[s.noodle].cost}円</div>
      </div>

      <div class="recipe-field">
        <label>価格設定</label>
        <div class="price-strategy-options">${strategyHtml}</div>
      </div>

      <div style="background: #e8f5e9; padding: 8px; border-radius: 6px; text-align: center; font-weight: bold;">
        売価: ${price}円 / 利益: ${profit}円/杯
      </div>

      <div class="recipe-modal-buttons">
        <button onclick="game.closeRecipeModal()" style="background:#ccc;">キャンセル</button>
        <button onclick="game._saveRecipeFromModal()">保存</button>
      </div>
    `;
  }

  _escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  _setSoup(key) {
    if (this._recipeModalState) {
      this._recipeModalState.soup = key;
      this._renderRecipeModalBody();
    }
  }

  _setNoodle(key) {
    if (this._recipeModalState) {
      this._recipeModalState.noodle = key;
      this._renderRecipeModalBody();
    }
  }

  _toggleTopping(key, available) {
    if (!available || !this._recipeModalState) return;
    const s = this._recipeModalState;
    const idx = s.toppings.indexOf(key);
    if (idx >= 0) {
      s.toppings.splice(idx, 1);
    } else {
      s.toppings.push(key);
    }
    this._renderRecipeModalBody();
  }

  _setStrategy(key) {
    if (this._recipeModalState) {
      this._recipeModalState.strategy = key;
      this._renderRecipeModalBody();
    }
  }

  _saveRecipeFromModal() {
    const s = this._recipeModalState;
    if (!s) return;
    const name = s.name.trim() || (SOUP_BASES[s.soup].name + 'ラーメン');

    if (s.editId) {
      this.updateRecipe(s.editId, {
        name: name,
        soup: s.soup,
        noodle: s.noodle,
        toppings: s.toppings,
        priceStrategy: s.strategy
      });
      this.showNotification('レシピを更新しました！');
    } else {
      this.createRecipe(name, s.soup, s.noodle, s.toppings, s.strategy);
      this.showNotification('新レシピを作成しました！');
    }

    this.closeRecipeModal();
    this.renderTabContent();
    this.saveGame();
  }

  updateUI() {
    document.getElementById('day').textContent = this.day;
    document.getElementById('money').textContent = this.money;
    document.getElementById('reputation').textContent = this.reputation;
  }

  saveGame() {
    const save = {
      day: this.day,
      money: this.money,
      reputation: this.reputation,
      researchPoints: this.researchPoints,
      furniture: this.furniture,
      staff: this.staff.map(s => ({
        id: s.id,
        type: s.type,
        homeX: s.homeX,
        homeY: s.homeY
      })),
      unlockedResearch: this.unlockedResearch,
      activeRecipes: this.activeRecipes,
      availableRecipes: this.availableRecipes,
      discoveredCombos: this.discoveredCombos,
      stats: this.stats,
      nextStaffId: this.nextStaffId,
      storeLevel: this.storeLevel,
      recipes: this.recipes,
      nextRecipeId: this.nextRecipeId
    };
    localStorage.setItem('ramenStandSave', JSON.stringify(save));
  }

  loadGame() {
    const saved = localStorage.getItem('ramenStandSave');
    if (!saved) return;
    
    const save = JSON.parse(saved);
    this.day = save.day;
    this.money = save.money;
    this.reputation = save.reputation;
    this.researchPoints = save.researchPoints;
    this.furniture = save.furniture;
    this.unlockedResearch = save.unlockedResearch;
    this.activeRecipes = save.activeRecipes;
    this.availableRecipes = save.availableRecipes;
    this.discoveredCombos = save.discoveredCombos;
    this.stats = save.stats;
    this.nextStaffId = save.nextStaffId || 0;
    this.storeLevel = save.storeLevel || 1;
    
    // レシピ復元（旧セーブ互換のマイグレーション付き）
    this.migrateRecipes(save);
    
    // Regenerate walls from store level
    this.walls = this.generateWalls(this.storeLevel);
    
    // Restore staff
    this.staff = [];
    if (save.staff && Array.isArray(save.staff)) {
      save.staff.forEach(sd => {
        const staffObj = {
          id: sd.id,
          type: sd.type,
          homeX: sd.homeX,
          homeY: sd.homeY,
          x: sd.homeX * TILE_SIZE + TILE_SIZE / 2 - 16,
          y: sd.homeY * TILE_SIZE + TILE_SIZE / 2 - 16,
          state: 'IDLE',
          path: [],
          pathIndex: 0,
          currentOrder: null,
          workTimer: 0,
          cookingStep: 0,
          element: null,
          carryingDish: false,
          workBubble: null
        };
        this.staff.push(staffObj);
      });
    }
    
    document.getElementById('title-screen').style.display = 'none';
    this.createGrid();
    this.renderWalls();
    this.renderFurniture();
    this.renderStaff();
    this.updateUI();
    this.renderTabContent();
  }

  startNew() {
    localStorage.removeItem('ramenStandSave');
    
    // デフォルトレシピ作成
    this.recipes = [this.createDefaultRecipe()];
    
    // Set initial store level and walls
    this.storeLevel = 1;
    this.walls = this.generateWalls(1);
    
    // Place initial furniture
    INITIAL_FURNITURE.forEach((f, idx) => {
      this.furniture.push({
        type: f.type,
        x: f.x,
        y: f.y,
        id: 'f' + idx
      });
    });
    
    // Add initial staff - 1 cook in the middle of the store
    this.staff.push({
      id: 's0',
      type: 'cook',
      homeX: 5,
      homeY: 4,
      x: 5 * TILE_SIZE + TILE_SIZE / 2 - 16,
      y: 4 * TILE_SIZE + TILE_SIZE / 2 - 16,
      state: 'IDLE',
      path: [],
      pathIndex: 0,
      currentOrder: null,
      workTimer: 0,
      cookingStep: 0,
      element: null,
      carryingDish: false,
      workBubble: null
    });
    this.nextStaffId = 1;
    
    document.getElementById('title-screen').style.display = 'none';
    this.createGrid();
    this.renderWalls();
    this.renderFurniture();
    this.renderStaff();
    this.checkCombos();
    this.updateUI();
    this.renderTabContent();
  }
}

// Fix onStaffArrived to handle all state transitions
const origOnStaffArrived = Game.prototype.onStaffArrived;
Game.prototype.onStaffArrived = function(staff) {
  // Server going to pickup food from handoff counter
  if (staff._goingToPickupFood && staff.state === 'MOVING') {
    staff._goingToPickupFood = false;
    staff.state = 'PICKING_UP_FOOD';
    staff.workTimer = 0;
    this.showWorkBubble(staff, '🍜');
    return;
  }

  // Server arrived at dirty dish location
  if (staff.type === 'server' && staff.state === 'MOVING' && !staff._afterSinkArrival) {
    staff.state = 'COLLECTING';
    staff.workTimer = 0;
    this.showWorkBubble(staff, '🧹');
    return;
  }
  
  // Cook collecting dirty dish (new behavior)
  if (staff.type === 'cook' && staff._cookCollectingDish && staff.state === 'MOVING') {
    staff._cookCollectingDish = false;
    staff.state = 'COLLECTING';
    staff.workTimer = 0;
    this.showWorkBubble(staff, '🧹');
    return;
  }
  
  // Cook/Server arrived at sink for cleaning
  if (staff._afterSinkArrival) {
    staff._afterSinkArrival = false;
    staff.state = 'CLEANING';
    staff.workTimer = 0;
    this.showWorkBubble(staff, '🚰');
    return;
  }
  
  // Cook arrived at handoff counter
  if (staff.state === 'DELIVERING_TO_HANDOFF') {
    staff.state = 'PLACING_FOOD';
    staff.workTimer = 0;
    this.showWorkBubble(staff, '🍜');
    return;
  }
  
  // Server delivered food to customer
  if (staff.state === 'DELIVERING_FOOD') {
    if (staff.currentOrder) {
      staff.currentOrder.mealsDelivered = (staff.currentOrder.mealsDelivered || 0) + 1;
      staff.currentOrder = null;
    }
    this.staffGoHome(staff);
    return;
  }
  
  if (staff.state === 'MOVING') {
    if (staff.type === 'cook') {
      staff.state = 'WORKING';
      staff.workTimer = 0;
      const recipe = staff.currentRecipe;
      if (recipe && staff.cookingStep < recipe.length) {
        const equipType = recipe[staff.cookingStep];
        const ft = FURNITURE_TYPES[equipType];
        if (ft) this.showWorkBubble(staff, ft.icon);
      }
    }
  } else if (staff.state === 'DELIVERING') {
    if (staff.currentOrder) {
      staff.currentOrder.mealsDelivered = (staff.currentOrder.mealsDelivered || 0) + 1;
      staff.currentOrder = null;
    }
    this.staffGoHome(staff);
  } else if (staff.state === 'RETURNING') {
    staff.state = 'IDLE';
    const homePixel = this.gridToPixel(staff.homeX, staff.homeY);
    staff.x = homePixel.x;
    staff.y = homePixel.y;
    if (staff.element) {
      staff.element.style.left = staff.x + 'px';
      staff.element.style.top = staff.y + 'px';
    }
  }
};

// Fix serverGoToSink to work for both servers and cooks
const origServerGoToSink = Game.prototype.serverGoToSink;
Game.prototype.serverGoToSink = function(staff) {
  const sink = this.furniture.find(f => f.type === 'dishwashingSink');
  if (!sink) {
    staff.carryingDish = false;
    this.staffGoHome(staff);
    return;
  }
  
  const curGrid = this.pixelToGrid(staff.x, staff.y);
  const path = this.findPath(curGrid.x, curGrid.y, sink.x, sink.y, true);
  staff.path = path;
  staff.pathIndex = 0;
  staff.state = 'MOVING';
  staff._afterSinkArrival = true;
};

const game = new Game();
game.init();
</script>
