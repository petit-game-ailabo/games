    this.selectedStaff = null;
    this.removalMode = false;
    this.dailyStats = { revenue: 0, customers: 0, satisfied: 0 };
  }

  // ========== レシピ管理 ==========

  // デフォルトの醤油ラーメンレシピを作成
  createDefaultRecipe() {
    return {
      id: 'recipe_' + this.nextRecipeId++,
      name: '醤油ラーメン',
      soup: 'shoyu',
      noodle: 'medium',
      toppings: ['negi'],
      price: 250,
      priceStrategy: 'balanced',
      active: true
    };
  }

  // レシピを新規作成
  createRecipe(name, soupKey, noodleKey, toppingKeys, priceStrategy) {
    const params = calculateRecipeParams(soupKey, noodleKey, toppingKeys);
    const price = calculatePrice(params.cost, priceStrategy || 'balanced');
    const recipe = {
      id: 'recipe_' + this.nextRecipeId++,
      name: name,
      soup: soupKey,
      noodle: noodleKey,
      toppings: toppingKeys.slice(),
      price: price,
      priceStrategy: priceStrategy || 'balanced',
      active: true
    };
    this.recipes.push(recipe);
    return recipe;
  }

  // レシピを更新（パラメータ再計算含む）
  updateRecipe(recipeId, updates) {
    const recipe = this.recipes.find(r => r.id === recipeId);
    if (!recipe) return null;
    if (updates.name !== undefined) recipe.name = updates.name;
    if (updates.soup !== undefined) recipe.soup = updates.soup;
    if (updates.noodle !== undefined) recipe.noodle = updates.noodle;
    if (updates.toppings !== undefined) recipe.toppings = updates.toppings.slice();
    if (updates.priceStrategy !== undefined) recipe.priceStrategy = updates.priceStrategy;
    if (updates.active !== undefined) recipe.active = updates.active;
    // 価格再計算
    const params = this.getRecipeParams(recipe);
    recipe.price = calculatePrice(params.cost, recipe.priceStrategy);
    return recipe;
  }

  // レシピを削除
  deleteRecipe(recipeId) {
    this.recipes = this.recipes.filter(r => r.id !== recipeId);
  }

  // レシピのパラメータを取得（計算済み + 設備ボーナス反映）
  getRecipeParams(recipe) {
    const params = calculateRecipeParams(recipe.soup, recipe.noodle, recipe.toppings);
    // 製麺機があれば麺コスト半額
    if (this.furniture.some(f => f.type === 'noodleMachine')) {
      const noodleCost = NOODLE_TYPES[recipe.noodle]?.cost || 0;
      params.cost -= Math.floor(noodleCost / 2);
    }
    return params;
  }

  // 有効なレシピ一覧を取得
  getActiveRecipes() {
    return this.recipes.filter(r => r.active);
  }

  // 設備容量を取得
  getEquipmentCapacity() {
    const soupPotCount = this.furniture.filter(f => f.type === 'soupPot').length;
    const hasCharsiuOven = this.furniture.some(f => f.type === 'charsiuOven');
    const hasNoodleMachine = this.furniture.some(f => f.type === 'noodleMachine');
    const hasNoodleBoiler = this.furniture.some(f => f.type === 'noodleBoiler');
    return { soupPotCount, hasCharsiuOven, hasNoodleMachine, hasNoodleBoiler };
  }

  // 提供中レシピが使うスープ種類数を取得（除外recipeId指定可）
  getActiveSoupTypes(excludeId) {
    const soups = new Set();
    this.recipes.filter(r => r.active && r.id !== excludeId).forEach(r => soups.add(r.soup));
    return soups;
  }

  // 提供可能なレシピかチェック（設備の存在確認）
  canServeRecipe(recipe) {
    // ゆで麺機チェック
    if (!this.furniture.some(f => f.type === 'noodleBoiler')) {
      return { ok: false, reason: 'ゆで麺機がありません' };
    }
    // スープ鍋の存在チェック
    const soupPotCount = this.furniture.filter(f => f.type === 'soupPot').length;
    if (soupPotCount === 0) {
      return { ok: false, reason: 'スープ鍋がありません' };
    }
    // スープ鍋の容量チェック（1鍋=1種類のスープ）
    const activeSoups = this.getActiveSoupTypes(recipe.id);
    activeSoups.add(recipe.soup);
    if (activeSoups.size > soupPotCount) {
      return { ok: false, reason: `スープ鍋が足りません（${activeSoups.size}種のスープに鍋${soupPotCount}個）` };
    }
    // トッピングのrequiresチェック
    for (const tk of recipe.toppings) {
      const topping = TOPPINGS[tk];
      if (topping && topping.requires) {
        if (!this.furniture.some(f => f.type === topping.requires)) {
          return { ok: false, reason: `${topping.name}には${FURNITURE_TYPES[topping.requires].name}が必要です` };
        }
      }
    }
    // スープの解放チェック
    const soupBase = SOUP_BASES[recipe.soup];
    if (soupBase && soupBase.unlock && !this.unlockedResearch.includes(soupBase.unlock)) {
      return { ok: false, reason: `${soupBase.name}スープは未研究です` };
    }
    // トッピングの解放チェック
    for (const tk of recipe.toppings) {
      const topping = TOPPINGS[tk];
      if (topping && topping.unlock && !this.unlockedResearch.includes(topping.unlock)) {
        return { ok: false, reason: `${topping.name}は未研究です` };
      }
    }
    return { ok: true };
  }

  // セーブデータからレシピを復元（旧セーブ互換）
  migrateRecipes(save) {
    if (save.recipes && save.recipes.length > 0) {
      this.recipes = save.recipes;
      this.nextRecipeId = save.nextRecipeId || (this.recipes.length + 1);
    } else {
      // 旧セーブデータ: デフォルトレシピを自動生成
      this.recipes = [this.createDefaultRecipe()];
      // 旧availableRecipesからも追加
      if (save.availableRecipes) {
        const soupNameToKey = {};
        for (const [key, val] of Object.entries(SOUP_BASES)) {
          soupNameToKey[val.name + 'スープラーメン'] = key;
        }
        for (const recipeName of save.availableRecipes) {
          if (recipeName === '醤油ラーメン') continue; // 既にデフォルトで追加済み
          const soupKey = soupNameToKey[recipeName];
          if (soupKey) {
            this.createRecipe(recipeName, soupKey, 'medium', ['negi'], 'balanced');
          }
        }
      }
      // 旧activeRecipes の状態を反映
      if (save.activeRecipes) {
        this.recipes.forEach(r => {
          r.active = save.activeRecipes.includes(r.name);
        });
      }
    }
  }

  // Generate walls for a given store level
  generateWalls(level) {
    const walls = [];
    if (level === 1) {
      // Top wall: (2,2) to (9,2)
      for (let x = 2; x <= 9; x++) walls.push({x, y: 2});
      // Bottom wall: (2,6) to (4,6) and (7,6) to (9,6), entrance at (5,6) and (6,6)
      for (let x = 2; x <= 4; x++) walls.push({x, y: 6});
      for (let x = 7; x <= 9; x++) walls.push({x, y: 6});
      // Left wall: (2,3) to (2,5)
      for (let y = 3; y <= 5; y++) walls.push({x: 2, y});
      // Right wall: (9,3) to (9,5)
      for (let y = 3; y <= 5; y++) walls.push({x: 9, y});
    } else if (level === 2) {
      // Top wall: (1,1) to (10,1)
      for (let x = 1; x <= 10; x++) walls.push({x, y: 1});
      // Bottom wall: (1,7) to (4,7) and (7,7) to (10,7)
      for (let x = 1; x <= 4; x++) walls.push({x, y: 7});
      for (let x = 7; x <= 10; x++) walls.push({x, y: 7});
      // Left wall: (1,2) to (1,6)
      for (let y = 2; y <= 6; y++) walls.push({x: 1, y});
      // Right wall: (10,2) to (10,6)
      for (let y = 2; y <= 6; y++) walls.push({x: 10, y});
    } else if (level === 3) {
      // Top wall: (0,0) to (11,0)
      for (let x = 0; x <= 11; x++) walls.push({x, y: 0});
      // Bottom wall: (0,8) to (4,8) and (7,8) to (11,8)
      for (let x = 0; x <= 4; x++) walls.push({x, y: 8});
      for (let x = 7; x <= 11; x++) walls.push({x, y: 8});
      // Left wall: (0,1) to (0,7)
      for (let y = 1; y <= 7; y++) walls.push({x: 0, y});
      // Right wall: (11,1) to (11,7)
      for (let y = 1; y <= 7; y++) walls.push({x: 11, y});
    }
    return walls;
  }

  // Check if a tile is inside the store (not a wall, not outside)
  isInsideStore(x, y) {
    const level = this.storeLevel;
    let minCol, maxCol, minRow, maxRow;
    if (level === 1) { minCol=3; maxCol=8; minRow=3; maxRow=5; }
    else if (level === 2) { minCol=2; maxCol=9; minRow=2; maxRow=6; }
    else if (level === 3) { minCol=1; maxCol=10; minRow=1; maxRow=7; }
    else { return false; }
    return x >= minCol && x <= maxCol && y >= minRow && y <= maxRow;
  }

  // Check if a tile is a wall
  isWall(x, y) {
    return this.walls.some(w => w.x === x && w.y === y);
  }

  // Get entrance Y for current store level
  getEntranceY() {
    if (this.storeLevel === 1) return 6;
    if (this.storeLevel === 2) return 7;
    if (this.storeLevel === 3) return 8;
    return 6;
  }

  // Get entrance X positions (center)
  getEntranceXCenter() {
    return 5.5; // always center at columns 5-6
  }

  init() {
    this.createGrid();
    this.renderTabs();
    this.updateUI();
    this.startGameLoop();
    
    // Check for saved game
    const saved = localStorage.getItem('ramenStandSave');
    document.getElementById('continue-btn').disabled = !saved;
  }

  createGrid() {
    const overlay = document.getElementById('grid-overlay');
    overlay.innerHTML = '';
    
    for (let y = 0; y < GRID_HEIGHT - 1; y++) {
      for (let x = 0; x < GRID_WIDTH; x++) {
        const cell = document.createElement('div');
        cell.className = 'grid-cell';
        const inside = this.isInsideStore(x, y);
        if (!inside) {
          cell.classList.add('outside');
        }
        cell.style.left = x * TILE_SIZE + 'px';
        cell.style.top = y * TILE_SIZE + 'px';
        cell.style.width = TILE_SIZE + 'px';
        cell.style.height = TILE_SIZE + 'px';
        cell.dataset.x = x;
        cell.dataset.y = y;
        
        cell.addEventListener('click', (e) => this.handleGridClick(x, y));
        overlay.appendChild(cell);
      }
    }
  }

  renderWalls() {
    const interior = document.getElementById('shop-interior');
    // Remove existing wall elements
    interior.querySelectorAll('.wall').forEach(el => el.remove());
    
    this.walls.forEach(w => {
      const el = document.createElement('div');
      el.className = 'wall';
      el.style.left = w.x * TILE_SIZE + 'px';
      el.style.top = w.y * TILE_SIZE + 'px';
      el.style.width = TILE_SIZE + 'px';
      el.style.height = TILE_SIZE + 'px';
      interior.appendChild(el);
    });
  }

  handleGridClick(x, y) {
    // 営業中は配置・撤去を禁止
    if (this.dayActive) {
      this.showNotification('営業中は配置変更できません！');
      return;
    }

    // Removal mode
    if (this.removalMode) {
      // Check staff first
      const staffHere = this.getStaffAt(x, y);
      if (staffHere) {
        const staffType = STAFF_TYPES[staffHere.type];
        const refund = Math.floor(staffType.cost * 0.5);
        this.money += refund;
        if (staffHere.element && staffHere.element.parentNode) {
          staffHere.element.remove();
        }
        this.staff = this.staff.filter(s => s.id !== staffHere.id);
        this.updateUI();
        this.showNotification(`${staffType.name}を撤去！\n${refund}円返金`);
        return;
      }
      
      const furniture = this.getFurnitureAt(x, y);
      if (furniture) {
        const furnitureType = FURNITURE_TYPES[furniture.type];
        const refund = Math.floor(furnitureType.cost * 0.5);
        this.money += refund;
        this.furniture = this.furniture.filter(f => f.id !== furniture.id);
        this.renderFurniture();
        this.updateUI();
        this.showNotification(`${furnitureType.name}を撤去！\n${refund}円返金`);
        return;
      } else {
        this.showNotification('ここには何もありません');
        return;
      }
    }
    
    // Check if inside store
    if (!this.isInsideStore(x, y)) {
      this.showNotification('店内にしか置けません！');
      return;
    }
    
    // Check if it's a wall
    if (this.isWall(x, y)) {
      this.showNotification('壁には置けません！');
      return;
    }
    
    // Staff placement mode
    if (this.selectedStaff) {
      const staffType = STAFF_TYPES[this.selectedStaff];
      
      if (this.money < staffType.cost) {
        this.showNotification('お金が足りません！');
        return;
      }
      
      // Check if occupied by furniture
      if (this.getFurnitureAt(x, y)) {
        this.showNotification('ここには置けません！');
        return;
      }
      
      // Check if occupied by another staff
      if (this.getStaffAt(x, y)) {
        this.showNotification('ここには置けません！');
        return;
      }
      
      this.money -= staffType.cost;
      const staffObj = {
        id: 's' + this.nextStaffId++,
        type: this.selectedStaff,
        homeX: x,
        homeY: y,
        x: x * TILE_SIZE + TILE_SIZE / 2 - 16,
        y: y * TILE_SIZE + TILE_SIZE / 2 - 16,
        state: 'IDLE',
        path: [],
        pathIndex: 0,
        currentOrder: null,
        workTimer: 0,
        cookingStep: 0,
        element: null,
        carryingDish: false,
        workBubble: null
      };
      
      this.staff.push(staffObj);
      this.createStaffElement(staffObj);
      this.updateUI();
      this.renderTabContent();
      return;
    }
    
    // Furniture placement mode
    if (!this.selectedFurniture) return;
    
    const furnitureType = FURNITURE_TYPES[this.selectedFurniture];
    
    // Check if can afford
    if (this.money < furnitureType.cost) {
      this.showNotification('お金が足りません！');
      return;
    }
    
    // Check if space is available for multi-tile furniture
    for (let dy = 0; dy < furnitureType.height; dy++) {
      for (let dx = 0; dx < furnitureType.width; dx++) {
        const checkX = x + dx;
        const checkY = y + dy;
        
        // Check if inside store
        if (!this.isInsideStore(checkX, checkY)) {
          this.showNotification('店内にしか置けません！');
          return;
        }
        
        // Check wall
        if (this.isWall(checkX, checkY)) {
          this.showNotification('壁には置けません！');
          return;
        }
        
        // Check if occupied by furniture
        if (this.getFurnitureAt(checkX, checkY)) {
          this.showNotification('ここには置けません！');
          return;
        }
        
        // Check if occupied by staff
        if (this.getStaffAt(checkX, checkY)) {
          this.showNotification('ここには置けません！');
          return;
        }
      }
    }
    
    // Place furniture
    this.money -= furnitureType.cost;
    this.furniture.push({
      type: this.selectedFurniture,
      x: x,
      y: y,
      id: 'f' + Date.now()
    });
    
    this.renderFurniture();
    this.checkCombos();
    this.updateUI();
    this.renderTabContent();
  }

  getStaffAt(x, y) {
    return this.staff.find(s => s.homeX === x && s.homeY === y);
  }

  getFurnitureAt(x, y) {
    return this.furniture.find(f => {
      const type = FURNITURE_TYPES[f.type];
      return x >= f.x && x < f.x + type.width && y >= f.y && y < f.y + type.height;
    });
  }

  createStaffElement(staffObj) {
    const el = document.createElement('div');
    el.className = 'staff';
    el.style.left = staffObj.x + 'px';
    el.style.top = staffObj.y + 'px';
    el.textContent = STAFF_TYPES[staffObj.type].icon;
    staffObj.element = el;
    document.getElementById('shop-interior').appendChild(el);
  }

  renderFurniture() {
    const interior = document.getElementById('shop-interior');
    const existing = interior.querySelectorAll('.furniture');
    existing.forEach(el => el.remove());
    
    this.furniture.forEach(f => {
      const type = FURNITURE_TYPES[f.type];
      const el = document.createElement('div');
      el.className = 'furniture ' + f.type;
      el.style.left = f.x * TILE_SIZE + 'px';
      el.style.top = f.y * TILE_SIZE + 'px';
      el.style.width = type.width * TILE_SIZE + 'px';
      el.style.height = type.height * TILE_SIZE + 'px';
      el.textContent = type.icon;
      el.dataset.id = f.id;
      
      interior.appendChild(el);
    });
  }

  renderStaff() {
    const interior = document.getElementById('shop-interior');
    // Remove existing staff elements
    interior.querySelectorAll('.staff').forEach(el => el.remove());
    
    this.staff.forEach(s => {
      this.createStaffElement(s);
    });
  }

  checkCombos() {
    COMBOS.forEach(combo => {
      if (this.discoveredCombos.includes(combo.name)) return;
      
      // Check adjacency
      let found = false;
      this.furniture.forEach(f1 => {
        this.furniture.forEach(f2 => {
          if (f1.id === f2.id) return;
          if (combo.items.includes(f1.type) && combo.items.includes(f2.type)) {
            const dx = Math.abs(f1.x - f2.x);
            const dy = Math.abs(f1.y - f2.y);
            if ((dx === 1 && dy === 0) || (dx === 0 && dy === 1)) {
              found = true;
            }
          }
        });
      });
      
      if (found) {
        this.discoveredCombos.push(combo.name);
        const itemNames = combo.items.map(i => FURNITURE_TYPES[i] ? FURNITURE_TYPES[i].name : i).join('+');
        this.showNotification('✨ コンボ発見！ ' + combo.name + '\n条件: ' + itemNames + 'が隣接\n効果: 品質+' + Math.round(combo.bonus*100) + '%');
      }
    });
  }

  startDay() {
    this.dayActive = true;
    this.dayTime = 0;
    this.customers = [];
    this.orderQueue = [];
    this.dirtyDishes = [];
    this.handoffQueue = [];
    this.waitingQueue = [];
    this.waitingQueueCheckTimer = 0;
    this.pedestrianTimer = 0;
    this.dailyStats = { revenue: 0, customers: 0, satisfied: 0 };
    
    // Remove any handoff food icons
    document.querySelectorAll('.handoff-food-icon').forEach(el => el.remove());
    
    // Reset staff states
    this.staff.forEach(s => {
      s.state = 'IDLE';
      s.path = [];
      s.pathIndex = 0;
      s.currentOrder = null;
      s.workTimer = 0;
      s.cookingStep = 0;
      s.carryingDish = false;
      s.x = s.homeX * TILE_SIZE + TILE_SIZE / 2 - 16;
      s.y = s.homeY * TILE_SIZE + TILE_SIZE / 2 - 16;
      if (s.element) {
        s.element.style.left = s.x + 'px';
        s.element.style.top = s.y + 'px';
      }
      if (s.workBubble && s.workBubble.parentNode) {
        s.workBubble.remove();
        s.workBubble = null;
      }
    });
    
    this.renderTabContent();
  }

  endDay() {
    this.dayActive = false;
    
    // Clean up customer elements from DOM
    this.customers.forEach(c => {
      if (c.element && c.element.parentNode) {
        c.element.remove();
      }
    });
    
    // Clean up dirty dishes
    this.dirtyDishes.forEach(d => {
      if (d.element && d.element.parentNode) {
        d.element.remove();
      }
    });
    this.dirtyDishes = [];
    
    // Clean up handoff queue and icons
    this.handoffQueue = [];
    this.waitingQueue = [];
    document.querySelectorAll('.handoff-food-icon').forEach(el => el.remove());
    
    // Clean up staff work bubbles
    this.staff.forEach(s => {
      if (s.workBubble && s.workBubble.parentNode) {
        s.workBubble.remove();
        s.workBubble = null;
      }
    });
    
    this.showDaySummary();
    this.saveGame();
  }

  showDaySummary() {
    const todayRevenue = this.dailyStats.revenue;
    const todayCustomers = this.dailyStats.customers;
    const todaySatisfied = this.dailyStats.satisfied;
    
    this.stats.totalCustomers += todayCustomers;
    this.stats.totalRevenue += todayRevenue;
    this.stats.satisfiedCustomers += todaySatisfied;
    
    // メニュー別売上集計
    const recipeSales = {};
    this.customers.forEach(c => {
      if (c.paid > 0 && c.orderedRecipe) {
        const name = c.orderedRecipe.name;
        if (!recipeSales[name]) recipeSales[name] = { count: 0, revenue: 0 };
        recipeSales[name].count += (c.groupSize || 1);
        recipeSales[name].revenue += c.paid;
      }
    });
    const recipeSalesHtml = Object.keys(recipeSales).length > 0
      ? Object.entries(recipeSales).map(([name, data]) => 
          `<div style="font-size:12px;">🍜 ${name}: ${data.count}杯 / ${data.revenue}円</div>`
        ).join('')
      : '';
    
    // 原価合計の計算
    let totalCost = 0;
    this.customers.forEach(c => {
      if (c.paid > 0 && c.orderedRecipe) {
        const params = this.getRecipeParams(c.orderedRecipe);
        totalCost += params.cost * (c.groupSize || 1);
      }
    });
    const profit = todayRevenue - totalCost;
    
    const content = document.getElementById('summary-content');
    content.innerHTML = `
      <div class="info-section">
        <div>来客数: ${todayCustomers}人</div>
        <div>売上: ${todayRevenue}円</div>
        ${totalCost > 0 ? `<div>原価: ${totalCost}円</div><div style="font-weight:bold;color:${profit >= 0 ? '#4caf50' : '#d32f2f'};">利益: ${profit}円</div>` : ''}
        <div>満足度: ${todaySatisfied}/${todayCustomers}人</div>
        <div>評判変動: +${todayCustomers}</div>
        ${recipeSalesHtml ? `<div style="margin-top:8px;border-top:1px solid #ddd;padding-top:8px;"><strong>メニュー別</strong>${recipeSalesHtml}</div>` : ''}
      </div>
    `;
    
    this.reputation += todayCustomers;
    
    const modal = document.getElementById('day-summary-modal');
    modal.classList.add('active');
  }

  nextDay() {
    this.day++;
    
    // Clear customers array
    this.customers = [];
    this.orderQueue = [];
    this.dirtyDishes = [];
    this.handoffQueue = [];
    this.waitingQueue = [];
    
    // Remove any remaining customer elements
    const customerEls = document.querySelectorAll('.customer');
    customerEls.forEach(el => el.remove());
    
    // Remove dirty dish elements and handoff icons
    document.querySelectorAll('.dirty-dish').forEach(el => el.remove());
    document.querySelectorAll('.handoff-food-icon').forEach(el => el.remove());
    
    const modal = document.getElementById('day-summary-modal');
    modal.classList.remove('active');
    this.updateUI();
    this.renderTabContent();
  }

  startGameLoop() {
    const loop = (timestamp) => {
      if (!this.lastTimestamp) this.lastTimestamp = timestamp;
      const deltaTime = (timestamp - this.lastTimestamp) / 1000;
      this.lastTimestamp = timestamp;
      
      if (this.dayActive) {
        this.update(deltaTime);
      }
      
      requestAnimationFrame(loop);
    };
    requestAnimationFrame(loop);
  }

  update(deltaTime) {
    const scaledDelta = deltaTime * this.speedMultiplier;
    this.dayTime += scaledDelta;
    
    // Update timer display every frame
    const timerEl = document.getElementById('day-timer');
    if (timerEl) {
      const remaining = Math.max(0, Math.ceil(60 - this.dayTime));
      timerEl.textContent = remaining + '秒';
    }
    
    // Day ends after 60 seconds at 1x
    if (this.dayTime >= 60) {
      this.endDay();
      return;
    }
    
    // Spawn pedestrians
    this.pedestrianTimer += scaledDelta;
    const spawnRate = this.getSpawnRate();
    if (this.pedestrianTimer >= spawnRate) {
      this.pedestrianTimer = 0;
      this.spawnPedestrian();
    }
    
    // Update customers
    this.customers.forEach(c => this.updateCustomer(c, scaledDelta));
    
    // Update staff
    this.staff.forEach(s => this.updateStaff(s, scaledDelta));
    
    // Auto-clean dirty dishes if no staff at all (backward compat)
    const hasAnyStaff = this.staff.length > 0;
    if (!hasAnyStaff) {
      this.dirtyDishes.forEach(d => {
        d.timer += scaledDelta;
        if (d.timer >= 3) {
          if (d.element && d.element.parentNode) d.element.remove();
          d.done = true;
        }
      });
      this.dirtyDishes = this.dirtyDishes.filter(d => !d.done);
    }
    
    // Check waiting queue periodically (every 0.5s)
    this.waitingQueueCheckTimer += scaledDelta;
    if (this.waitingQueueCheckTimer >= 0.5) {
      this.waitingQueueCheckTimer = 0;
      this.checkWaitingQueue();
    }
    
    // Remove exited customers
    this.customers = this.customers.filter(c => c.state !== 'EXITED' || c.element);
  }

  checkWaitingQueue() {
    if (this.waitingQueue.length === 0) return;
    const front = this.waitingQueue[0];
    const seat = front.groupSize > 1 ? this.findGroupSeat(front.groupSize) : this.findEmptySeat();
    if (seat) {
      this.waitingQueue.shift();
      front.seat = seat;
      front.state = 'FINDING_SEAT';
      front.targetX = seat.x * TILE_SIZE + TILE_SIZE / 2 - 6;
      front.targetY = seat.y * TILE_SIZE + TILE_SIZE / 2 - 6;
      this.calculateCustomerPath(front);
      this.repositionWaitingQueue();
    }
  }

  repositionWaitingQueue() {
    const entranceX = this.getEntranceXCenter() * TILE_SIZE;
    const entranceY = this.getEntranceY();
    this.waitingQueue.forEach((c, idx) => {
      c.targetX = entranceX;
      c.targetY = entranceY * TILE_SIZE + TILE_SIZE * (idx + 1);
      // Calculate path to avoid walking through walls
      this.calculateCustomerPath(c);
    });
  }

  // Customer grid-based pathfinding
  calculateCustomerPath(customer) {
    // Convert current pixel position to grid
    const curGX = Math.round(customer.x / TILE_SIZE);
    const curGY = Math.round(customer.y / TILE_SIZE);
    const tarGX = Math.round(customer.targetX / TILE_SIZE);
    const tarGY = Math.round(customer.targetY / TILE_SIZE);
    
    if (curGX === tarGX && curGY === tarGY) {
      customer.path = null;
      return;
    }
    
    // Build grid for customer pathfinding (customers can walk through entrance)
    const grid = this.buildOccupancyGrid();
    // Also allow the entrance row tiles and street row
    const entranceY = this.getEntranceY();
    // Entrance gap is at columns 5 and 6
    if (entranceY >= 0 && entranceY < GRID_HEIGHT - 1) {
      grid[entranceY][5] = false;
      grid[entranceY][6] = false;
    }
    
    // BFS
    const path = this._bfs(grid, curGX, curGY, tarGX, tarGY);
    if (path && path.length > 0) {
      customer.path = path;
      customer.pathIndex = 0;
    } else {
      customer.path = null; // fallback to direct movement
    }
  }

  moveCustomerAlongPath(customer, deltaTime) {
    if (!customer.path || customer.pathIndex >= customer.path.length) {
      customer.path = null;
      return;
    }
    
    const target = customer.path[customer.pathIndex];
    const targetPX = target.x * TILE_SIZE + TILE_SIZE / 2 - 6;
    const targetPY = target.y * TILE_SIZE + TILE_SIZE / 2 - 6;
    const dx = targetPX - customer.x;
    const dy = targetPY - customer.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    
    if (dist < 3) {
      customer.x = targetPX;
      customer.y = targetPY;
      customer.pathIndex++;
      if (customer.pathIndex >= customer.path.length) {
        customer.path = null;
      }
    } else {
      const move = customer.speed * deltaTime;
      customer.x += (dx / dist) * Math.min(move, dist);
      customer.y += (dy / dist) * Math.min(move, dist);
    }
    
    customer.element.style.left = customer.x + 'px';
    customer.element.style.top = customer.y + 'px';
  }

  // ========== BFS Pathfinding ==========
  buildOccupancyGrid() {
    // Grid rows 0..9 (playable area), cols 0..11
    const grid = [];
    for (let y = 0; y < GRID_HEIGHT - 1; y++) {
      grid[y] = [];
      for (let x = 0; x < GRID_WIDTH; x++) {
        grid[y][x] = false; // false = passable
      }
    }
    // Mark wall tiles as impassable
    this.walls.forEach(w => {
      if (w.y >= 0 && w.y < GRID_HEIGHT - 1 && w.x >= 0 && w.x < GRID_WIDTH) {
        grid[w.y][w.x] = true;
      }
    });
    // Mark furniture tiles as impassable
    this.furniture.forEach(f => {
      const ft = FURNITURE_TYPES[f.type];
      for (let dy = 0; dy < ft.height; dy++) {
        for (let dx = 0; dx < ft.width; dx++) {
          const gy = f.y + dy;
          const gx = f.x + dx;
          if (gy >= 0 && gy < GRID_HEIGHT - 1 && gx >= 0 && gx < GRID_WIDTH) {
            grid[gy][gx] = true; // blocked
          }
        }
      }
    });
    return grid;
  }

  findPath(startX, startY, endX, endY, allowEndBlocked) {
    const grid = this.buildOccupancyGrid();
    
    // If end tile is blocked and we allow it (for reaching equipment), find adjacent
    const targetIsBlocked = endY >= 0 && endY < GRID_HEIGHT - 1 && endX >= 0 && endX < GRID_WIDTH && grid[endY][endX];
    
    if (targetIsBlocked && allowEndBlocked) {
      // Find path to an adjacent passable tile
      const adjacentTiles = [
        {x: endX - 1, y: endY}, {x: endX + 1, y: endY},
        {x: endX, y: endY - 1}, {x: endX, y: endY + 1}
      ].filter(t => t.x >= 0 && t.x < GRID_WIDTH && t.y >= 0 && t.y < GRID_HEIGHT - 1 && !grid[t.y][t.x]);
      
      // Try each adjacent tile, return shortest path
      let bestPath = null;
      for (const adj of adjacentTiles) {
        const path = this._bfs(grid, startX, startY, adj.x, adj.y);
        if (path && (!bestPath || path.length < bestPath.length)) {
          bestPath = path;
        }
      }
      return bestPath || [{x: endX, y: endY}]; // fallback: teleport
    }
    
    // Normal BFS
    if (startX === endX && startY === endY) return [];
    
    // Allow start tile even if blocked (staff is standing on it)
    const path = this._bfs(grid, startX, startY, endX, endY);
    return path || [{x: endX, y: endY}]; // fallback: teleport
  }

  _bfs(grid, sx, sy, ex, ey) {
    if (sx === ex && sy === ey) return [];
    
    const rows = GRID_HEIGHT - 1;
    const cols = GRID_WIDTH;
    const visited = Array.from({length: rows}, () => Array(cols).fill(false));
    const parent = Array.from({length: rows}, () => Array(cols).fill(null));
    
    // Allow walking on start tile
    visited[sy][sx] = true;
    const queue = [{x: sx, y: sy}];
    const dirs = [{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}];
    
    while (queue.length > 0) {
      const cur = queue.shift();
      if (cur.x === ex && cur.y === ey) {
        // Reconstruct path
        const path = [];
        let c = {x: ex, y: ey};
        while (c.x !== sx || c.y !== sy) {
          path.unshift({x: c.x, y: c.y});
          c = parent[c.y][c.x];
        }
        return path;
      }
      for (const d of dirs) {
        const nx = cur.x + d.x;
        const ny = cur.y + d.y;
        if (nx >= 0 && nx < cols && ny >= 0 && ny < rows && !visited[ny][nx] && !grid[ny][nx]) {
          visited[ny][nx] = true;
          parent[ny][nx] = {x: cur.x, y: cur.y};
          queue.push({x: nx, y: ny});
        }
      }
    }
    return null; // no path
  }

  gridToPixel(gx, gy) {
    return {
      x: gx * TILE_SIZE + TILE_SIZE / 2 - 16,
      y: gy * TILE_SIZE + TILE_SIZE / 2 - 16
    };
  }

  pixelToGrid(px, py) {
    return {
      x: Math.round((px + 16 - TILE_SIZE / 2) / TILE_SIZE),
      y: Math.round((py + 16 - TILE_SIZE / 2) / TILE_SIZE)
    };
  }

  // ========== Staff Update ==========
  updateStaff(staff, deltaTime) {
    if (!staff.element) return;

    switch (staff.state) {
      case 'IDLE':
        if (staff.type === 'cook') {
          this.cookIdleCheck(staff);
        } else if (staff.type === 'server') {
          this.serverIdleCheck(staff);
        }
        break;

      case 'MOVING':
        this.moveStaffAlongPath(staff, deltaTime);
        break;

      case 'WORKING':
        staff.workTimer += deltaTime;
        if (staff.workTimer >= 0.8) {
          staff.workTimer = 0;
          this.removeWorkBubble(staff);
          if (staff.type === 'cook') {
            this.cookNextStep(staff);
          }
        }
        break;

      case 'DELIVERING':
        // Moving to customer to deliver
        this.moveStaffAlongPath(staff, deltaTime);
        break;

      case 'COLLECTING':
        staff.workTimer += deltaTime;
        if (staff.workTimer >= 0.5) {
          staff.workTimer = 0;
          this.removeWorkBubble(staff);
          // Pick up the dish
          staff.carryingDish = true;
          if (staff.targetDish) {
            if (staff.targetDish.element && staff.targetDish.element.parentNode) {
              staff.targetDish.element.remove();
            }
            staff.targetDish.done = true;
            this.dirtyDishes = this.dirtyDishes.filter(d => !d.done);
          }
          // Go to dishwashing sink
          this.serverGoToSink(staff);
        }
        break;

      case 'CLEANING':
        staff.workTimer += deltaTime;
        if (staff.workTimer >= 0.5) {
          staff.workTimer = 0;
          staff.carryingDish = false;
          this.removeWorkBubble(staff);
          // Return home
          this.staffGoHome(staff);
        }
        break;

      case 'RETURNING':
        this.moveStaffAlongPath(staff, deltaTime);
        break;

      case 'DELIVERING_TO_HANDOFF':
        this.moveStaffAlongPath(staff, deltaTime);
        break;

      case 'PLACING_FOOD':
        staff.workTimer += deltaTime;
        if (staff.workTimer >= 0.5) {
          staff.workTimer = 0;
          this.removeWorkBubble(staff);
          // Place food on handoff queue
          if (staff.currentOrder) {
            this.handoffQueue.push({ customer: staff.currentOrder, placedTime: Date.now() });
            // Show food icon on the handoff counter
            this.showHandoffFoodIcon();
            staff.currentOrder = null;
          }
          // Return home
          this.staffGoHome(staff);
        }
        break;

      case 'PICKING_UP_FOOD':
        staff.workTimer += deltaTime;
        if (staff.workTimer >= 0.3) {
          staff.workTimer = 0;
          this.removeWorkBubble(staff);
          // Remove food icon from handoff counter
          this.removeHandoffFoodIcon();
          // Now deliver to customer
          if (staff.currentOrder && staff.currentOrder.seat) {
            this.serverDeliverFoodToCustomer(staff);
          } else {
            staff.currentOrder = null;
            this.staffGoHome(staff);
          }
        }
        break;

      case 'DELIVERING_FOOD':
        this.moveStaffAlongPath(staff, deltaTime);
        break;
    }
  }

  moveStaffAlongPath(staff, deltaTime) {
    if (staff.path.length === 0 || staff.pathIndex >= staff.path.length) {
      // Arrived
      this.onStaffArrived(staff);
      return;
    }

    const target = staff.path[staff.pathIndex];
    const targetPixel = this.gridToPixel(target.x, target.y);
    const dx = targetPixel.x - staff.x;
    const dy = targetPixel.y - staff.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const speed = 250; // px/sec

    if (dist < 2) {
      staff.x = targetPixel.x;
      staff.y = targetPixel.y;
      staff.pathIndex++;
      if (staff.pathIndex >= staff.path.length) {
        this.onStaffArrived(staff);
      }
    } else {
      const move = speed * deltaTime;
      staff.x += (dx / dist) * Math.min(move, dist);
      staff.y += (dy / dist) * Math.min(move, dist);
    }

    staff.element.style.left = staff.x + 'px';
    staff.element.style.top = staff.y + 'px';
  }

  onStaffArrived(staff) {
    if (staff.state === 'MOVING') {
      // Cook arrived at equipment station
      if (staff.type === 'cook') {
        staff.state = 'WORKING';
        staff.workTimer = 0;
        // Show work bubble
        const recipe = staff.currentRecipe;
        if (recipe && staff.cookingStep < recipe.length) {
          const equipType = recipe[staff.cookingStep];
          const ft = FURNITURE_TYPES[equipType];
          if (ft) this.showWorkBubble(staff, ft.icon);
        }
      }
    } else if (staff.state === 'DELIVERING') {
      // Cook delivered food to customer
      if (staff.currentOrder) {
        staff.currentOrder.mealsDelivered = (staff.currentOrder.mealsDelivered || 0) + 1;
        staff.currentOrder = null;
      }
      // Return home
      this.staffGoHome(staff);
    } else if (staff.state === 'RETURNING') {
      // Arrived home
      staff.state = 'IDLE';
      const homePixel = this.gridToPixel(staff.homeX, staff.homeY);
      staff.x = homePixel.x;
      staff.y = homePixel.y;
      staff.element.style.left = staff.x + 'px';
      staff.element.style.top = staff.y + 'px';
    } else if (staff.type === 'server' && staff.state === 'MOVING') {
      // Server arrived at dirty dish
      staff.state = 'COLLECTING';
      staff.workTimer = 0;
      this.showWorkBubble(staff, '🧹');
    }
  }

  showWorkBubble(staff, emoji) {
    this.removeWorkBubble(staff);
    const bubble = document.createElement('div');
    bubble.className = 'staff-work-bubble';
    bubble.textContent = emoji;
    staff.element.appendChild(bubble);
    staff.workBubble = bubble;
  }

  removeWorkBubble(staff) {
    if (staff.workBubble && staff.workBubble.parentNode) {
      staff.workBubble.remove();
    }
    staff.workBubble = null;
  }

  showHandoffFoodIcon() {
    const handoffCounter = this.furniture.find(f => f.type === 'handoffCounter');
    if (!handoffCounter) return;
    // Only show one icon at a time (for visual simplicity)
    if (!document.querySelector('.handoff-food-icon')) {
      const el = document.createElement('div');
      el.className = 'handoff-food-icon';
      el.style.left = (handoffCounter.x * TILE_SIZE + TILE_SIZE / 2 - 10) + 'px';
      el.style.top = (handoffCounter.y * TILE_SIZE + TILE_SIZE / 2 - 18) + 'px';
      el.textContent = '🍜';
      document.getElementById('shop-interior').appendChild(el);
    }
  }

  removeHandoffFoodIcon() {
    // Remove one icon; if queue still has items, keep showing
    if (this.handoffQueue.length === 0) {
      const icon = document.querySelector('.handoff-food-icon');
      if (icon) icon.remove();
    }
  }

  serverDeliverFoodToCustomer(staff) {
    const customer = staff.currentOrder;
    if (!customer || !customer.seat) {
      staff.currentOrder = null;
      this.staffGoHome(staff);
      return;
    }
    
    const seatX = customer.seat.x;
    const seatY = customer.seat.y;
    const curGrid = this.pixelToGrid(staff.x, staff.y);
    
    const grid = this.buildOccupancyGrid();
    const adjacentTiles = [
      {x: seatX - 1, y: seatY}, {x: seatX + 1, y: seatY},
      {x: seatX, y: seatY - 1}, {x: seatX, y: seatY + 1}
    ].filter(t => t.x >= 0 && t.x < GRID_WIDTH && t.y >= 0 && t.y < GRID_HEIGHT - 1 && !grid[t.y][t.x]);
    
    let bestPath = null;
    for (const adj of adjacentTiles) {
      const path = this._bfs(grid, curGrid.x, curGrid.y, adj.x, adj.y);
      if (path && (!bestPath || path.length < bestPath.length)) {
        bestPath = path;
      }
    }
    
    if (!bestPath) {
      // Can't reach, just deliver directly
      customer.mealsDelivered = (customer.mealsDelivered || 0) + 1;
      staff.currentOrder = null;
      this.staffGoHome(staff);
      return;
    }
    
    staff.path = bestPath;
    staff.pathIndex = 0;
    staff.state = 'DELIVERING_FOOD';
  }

  staffGoHome(staff) {
    const curGrid = this.pixelToGrid(staff.x, staff.y);
    const path = this.findPath(curGrid.x, curGrid.y, staff.homeX, staff.homeY, false);
    staff.path = path;
    staff.pathIndex = 0;
    staff.state = 'RETURNING';
  }

  // ========== Cook Logic ==========
  cookIdleCheck(staff) {
    // Priority 1: Cook food orders
    if (this.orderQueue.length > 0) {
      this.cookTakeOrder(staff);
      return;
    }
    
    // Priority 2: If no orders and no idle server, help with dirty dishes
    const unclaimed = this.dirtyDishes.filter(d => !d.claimed && !d.done);
    if (unclaimed.length > 0) {
      const hasIdleServer = this.staff.some(s => s.type === 'server' && s.state === 'IDLE');
      if (!hasIdleServer) {
        const dish = unclaimed[0];
        dish.claimed = true;
        staff.targetDish = dish;
        
        const curGrid = this.pixelToGrid(staff.x, staff.y);
        const path = this.findPath(curGrid.x, curGrid.y, dish.gridX, dish.gridY, true);
        staff.path = path;
        staff.pathIndex = 0;
        staff.state = 'MOVING';
        staff._cookCollectingDish = true;
        return;
      }
    }
  }

  cookTakeOrder(staff) {
    // Take first order
    const order = this.orderQueue.shift();
    staff.currentOrder = order;
    staff.cookingStep = 0;
    
    // Determine recipe
    const recipeName = this.activeRecipes.length > 0 ? this.activeRecipes[Math.floor(Math.random() * this.activeRecipes.length)] : '醤油ラーメン';
    const steps = COOKING_RECIPES[recipeName] || COOKING_RECIPES['醤油ラーメン'];
    
    // Filter steps to only equipment that exists on the grid
    staff.currentRecipe = [];
    staff.skippedSteps = 0;
    for (const equipType of steps) {
      const equip = this.furniture.find(f => f.type === equipType);
      if (equip) {
        staff.currentRecipe.push(equipType);
      } else {
        staff.skippedSteps++;
      }
    }
    
    // Start cooking sequence
    this.cookGoToNextEquipment(staff);
  }

  cookGoToNextEquipment(staff) {
    if (staff.cookingStep >= staff.currentRecipe.length) {
      // Done cooking, deliver to customer
      this.cookDeliverFood(staff);
      return;
    }
    
    const equipType = staff.currentRecipe[staff.cookingStep];
    const equip = this.furniture.find(f => f.type === equipType);
    
    if (!equip) {
      // Skip
      staff.cookingStep++;
      this.cookGoToNextEquipment(staff);
      return;
    }
    
    // Find adjacent tile to equipment (cook works next to equipment, not on it)
    const curGrid = this.pixelToGrid(staff.x, staff.y);
    const grid = this.buildOccupancyGrid();
    const adjacentTiles = [
      {x: equip.x - 1, y: equip.y}, {x: equip.x + 1, y: equip.y},
      {x: equip.x, y: equip.y - 1}, {x: equip.x, y: equip.y + 1}
    ].filter(t => t.x >= 0 && t.x < GRID_WIDTH && t.y >= 0 && t.y < GRID_HEIGHT - 1 && !grid[t.y][t.x]);
    
    let bestPath = null;
    for (const adj of adjacentTiles) {
      const path = this._bfs(grid, curGrid.x, curGrid.y, adj.x, adj.y);
      if (path && (!bestPath || path.length < bestPath.length)) {
        bestPath = path;
      }
    }
    
    if (!bestPath) {
      // Fallback: use findPath with allowEndBlocked
      bestPath = this.findPath(curGrid.x, curGrid.y, equip.x, equip.y, true);
    }
    
    staff.path = bestPath;
    staff.pathIndex = 0;
    staff.state = 'MOVING';
  }

  cookNextStep(staff) {
    staff.cookingStep++;
    this.cookGoToNextEquipment(staff);
  }

  cookDeliverFood(staff) {
    const customer = staff.currentOrder;
    // 調理でスキップしたステップ数を客に記録（品質計算に反映）
    if (customer) {
      customer.cookingSkippedSteps = staff.skippedSteps || 0;
    }
    if (!customer || !customer.seat) {
      // Customer left, return home
      staff.currentOrder = null;
      this.staffGoHome(staff);
      return;
    }
    
    // Check if handoff counter exists AND a server exists
    const handoffCounter = this.furniture.find(f => f.type === 'handoffCounter');
    const hasServer = this.staff.some(s => s.type === 'server');
    
    if (handoffCounter && hasServer) {
      // Cook delivers to handoff counter instead of directly to customer
      const curGrid = this.pixelToGrid(staff.x, staff.y);
      const path = this.findPath(curGrid.x, curGrid.y, handoffCounter.x, handoffCounter.y, true);
      staff.path = path;
      staff.pathIndex = 0;
      staff.state = 'DELIVERING_TO_HANDOFF';
      return;
    }
    
    // No handoff counter or no server: deliver directly to customer (backward compatible)
    // Find adjacent tile to customer's seat
    const seatX = customer.seat.x;
    const seatY = customer.seat.y;
    const curGrid = this.pixelToGrid(staff.x, staff.y);
    
    // Try to path to an adjacent tile of the seat
    const grid = this.buildOccupancyGrid();
    const adjacentTiles = [
      {x: seatX - 1, y: seatY}, {x: seatX + 1, y: seatY},
      {x: seatX, y: seatY - 1}, {x: seatX, y: seatY + 1}
    ].filter(t => t.x >= 0 && t.x < GRID_WIDTH && t.y >= 0 && t.y < GRID_HEIGHT - 1 && !grid[t.y][t.x]);
    
    let bestPath = null;
    for (const adj of adjacentTiles) {
      const path = this._bfs(grid, curGrid.x, curGrid.y, adj.x, adj.y);
      if (path && (!bestPath || path.length < bestPath.length)) {
        bestPath = path;
      }
    }
    
    if (!bestPath) {
      // Can't reach customer, just deliver directly
      customer.mealsDelivered = (customer.mealsDelivered || 0) + 1;
      staff.currentOrder = null;
      this.staffGoHome(staff);
      return;
    }
    
    staff.path = bestPath;
    staff.pathIndex = 0;
    staff.state = 'DELIVERING';
  }

  // ========== Server Logic ==========
  serverIdleCheck(staff) {
    // Priority 1: Pick up food from handoff counter
    if (this.handoffQueue.length > 0) {
      const handoffCounter = this.furniture.find(f => f.type === 'handoffCounter');
      if (handoffCounter) {
        const item = this.handoffQueue.shift();
        staff.currentOrder = item.customer;
        
        const curGrid = this.pixelToGrid(staff.x, staff.y);
        const path = this.findPath(curGrid.x, curGrid.y, handoffCounter.x, handoffCounter.y, true);
        staff.path = path;
        staff.pathIndex = 0;
        staff.state = 'MOVING';
        staff._goingToPickupFood = true;
        return;
      }
    }
    
    // Priority 2: Collect dirty dishes
    if (this.dirtyDishes.length === 0) return;
    
    // Find nearest unclaimed dirty dish
    const unclaimed = this.dirtyDishes.filter(d => !d.claimed && !d.done);
    if (unclaimed.length === 0) return;
    
    const dish = unclaimed[0];
    dish.claimed = true;
    staff.targetDish = dish;
    
    const curGrid = this.pixelToGrid(staff.x, staff.y);
    const path = this.findPath(curGrid.x, curGrid.y, dish.gridX, dish.gridY, true);
    staff.path = path;
    staff.pathIndex = 0;
    staff.state = 'MOVING';
  }

  serverGoToSink(staff) {
    const sink = this.furniture.find(f => f.type === 'dishwashingSink');
    if (!sink) {
      // No sink, just go home
      staff.carryingDish = false;
      this.staffGoHome(staff);
      return;
    }
    
    const curGrid = this.pixelToGrid(staff.x, staff.y);
    const path = this.findPath(curGrid.x, curGrid.y, sink.x, sink.y, true);
    staff.path = path;
    staff.pathIndex = 0;
    staff.state = 'MOVING';
    
    // Override onArrived for cleaning
    staff._afterSinkArrival = true;
  }

  getSpawnRate() {
    // More frequent during lunch rush (middle of day)
    const dayProgress = this.dayTime / 60;
    let baseRate = 3;
    
    if (dayProgress > 0.4 && dayProgress < 0.6) {
      baseRate = 1.5; // Lunch rush
    }
    
    // Sign bonus
    if (this.furniture.some(f => f.type === 'sign')) {
      baseRate *= 0.8;
    }
    
    return baseRate;
  }

  spawnPedestrian() {
    // 基本集客率 + 評判ボーナス + 価格影響
    let attractRate = 0.1 + (this.reputation / 1000);
    // 提供中レシピの平均売価で集客率を調整
    const activeList = this.getActiveRecipes();
    if (activeList.length > 0) {
      const avgPrice = activeList.reduce((sum, r) => sum + r.price, 0) / activeList.length;
      // 250円を基準: 安いほど集客UP、高いほどDOWN
      const priceFactor = 1 + (250 - avgPrice) / 1000; // 例: 150円→+0.1, 350円→-0.1
      attractRate *= Math.max(0.3, Math.min(1.5, priceFactor));
    }
    const streetY = TILE_SIZE * STREET_ROW + TILE_SIZE / 2;
    
    const customer = {
      id: 'c' + this.nextCustomerId++,
      state: 'WALKING_STREET',
      x: -20,
      y: streetY,
      targetX: 500,
      targetY: streetY,
      speed: 80 + Math.random() * 30,
      type: this.getCustomerType(),
      moveTimer: 0,
      eatTimer: 0,
      attracted: Math.random() < attractRate,
      element: null,
      seat: null,
      satisfied: false,
      paid: 0,
      foodDelivered: false,
      waitingFoodTimer: 0,
      dirtyDish: false,
      groupSize: 1,
      mealsOrdered: 1,
      mealsDelivered: 0
    };
    
    // Set group size for family/friends
    if (customer.type === 'family') {
      customer.groupSize = 2 + Math.floor(Math.random() * 3); // 2-4
      customer.mealsOrdered = customer.groupSize;
    } else if (customer.type === 'friends') {
      customer.groupSize = 2 + Math.floor(Math.random() * 2); // 2-3
      customer.mealsOrdered = customer.groupSize;
    }
    
    this.customers.push(customer);
    this.createCustomerElement(customer);
  }

  getCustomerType() {
    const types = ['regular', 'student', 'businessman', 'foodie', 'family', 'friends'];
    const weights = [40, 15, 15, 10, 12, 8];
    const total = weights.reduce((a, b) => a + b, 0);
    let random = Math.random() * total;
    
    for (let i = 0; i < types.length; i++) {
      random -= weights[i];
      if (random <= 0) return types[i];
    }
    return types[0];
  }

  createCustomerElement(customer) {
    const el = document.createElement('div');
    el.className = 'customer';
    el.style.left = customer.x + 'px';
    el.style.top = customer.y + 'px';
    
    const body = document.createElement('div');
    body.className = 'customer-body';
    const colors = {
      regular: '#6b9bd1',
      student: '#4caf50',
      businessman: '#1565c0',
      foodie: '#d32f2f',
      family: '#e91e63',
      friends: '#ff9800'
    };
    body.style.background = colors[customer.type];
    
    const face = document.createElement('div');
    face.className = 'customer-face';
    const faceEmojis = {
      regular: '😀', student: '😀', businessman: '😀', foodie: '😀',
      family: '\u{1F468}\u200D\u{1F469}\u200D\u{1F467}', friends: '\u{1F46B}'
    };
    face.textContent = faceEmojis[customer.type] || '😀';
    
    el.appendChild(body);
    el.appendChild(face);
    
    // クリック/タップで感想を表示
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      this.showCustomerFeedback(customer);
    });
    
    customer.element = el;
    customer.faceElement = face;
    
    document.getElementById('shop-view').appendChild(el);
  }

  updateCustomer(customer, deltaTime) {
    if (!customer.element) return;
    
    customer.moveTimer += deltaTime;
    
    switch (customer.state) {
      case 'WALKING_STREET':
        this.moveToTarget(customer, deltaTime);
        
        // Check if attracted — entrance is at center of grid
        const entrancePixelX = this.getEntranceXCenter() * TILE_SIZE;
        if (customer.attracted && customer.x > entrancePixelX - 40 && customer.x < entrancePixelX + 40 && !customer.noticeShown) {
          customer.noticeShown = true;
          this.showBubble(customer, '!');
          // Target: entrance gap position
          const entranceY = this.getEntranceY();
          setTimeout(() => {
            customer.state = 'ENTERING';
            customer.targetX = entrancePixelX;
            customer.targetY = entranceY * TILE_SIZE + TILE_SIZE / 2;
          }, 500);
        }
        
        // Exit if not attracted
        if (customer.x >= 500) {
          this.removeCustomer(customer);
        }
        break;
        
      case 'ENTERING':
        // Auto bubble on entering (30% chance, once)
        if (!customer.enterBubbleShown) {
          customer.enterBubbleShown = true;
          if (Math.random() < 0.3) {
            const enterMsgs = ['いい匂い！', 'ラーメン食べたい！', 'ここが評判の店か', 'お腹すいた〜'];
            this.showBubble(customer, enterMsgs[Math.floor(Math.random() * enterMsgs.length)]);
          }
        }
        if (customer.path && customer.path.length > 0) {
          this.moveCustomerAlongPath(customer, deltaTime);
        } else {
          this.moveToTarget(customer, deltaTime);
        }
        if (this.isAtTarget(customer)) {
          let seat = null;
          if (customer.groupSize > 1) {
            seat = this.findGroupSeat(customer.groupSize);
          } else {
            seat = this.findEmptySeat();
          }
          if (seat) {
            customer.seat = seat;
            customer.state = 'FINDING_SEAT';
            customer.targetX = seat.x * TILE_SIZE + TILE_SIZE / 2 - 6;
            customer.targetY = seat.y * TILE_SIZE + TILE_SIZE / 2 - 6;
            // Calculate path for customer to seat
            this.calculateCustomerPath(customer);
          } else {
            // No seat available — join waiting queue
            if (this.waitingQueue.length < 5) {
              customer.state = 'WAITING_IN_LINE';
              customer.waitTimer = 0;
              this.waitingQueue.push(customer);
              this.repositionWaitingQueue();
              this.showBubble(customer, '待ってます…');
            } else {
              this.showBubble(customer, '混みすぎ…');
              customer.state = 'LEAVING';
              const entranceY = this.getEntranceY();
              customer.targetX = this.getEntranceXCenter() * TILE_SIZE;
              customer.targetY = entranceY * TILE_SIZE + TILE_SIZE / 2;
              customer.path = null;
              this.reputation = Math.max(0, this.reputation - 1);
            }
          }
        }
        break;
        
      case 'WAITING_IN_LINE':
        if (customer.path && customer.path.length > 0) {
          this.moveCustomerAlongPath(customer, deltaTime);
        } else {
          this.moveToTarget(customer, deltaTime);
        }
        customer.waitTimer += deltaTime;
        if (customer.waitTimer >= 15) {
          this.showBubble(customer, '待てない…');
          this.waitingQueue = this.waitingQueue.filter(c => c !== customer);
          this.repositionWaitingQueue();
          customer.state = 'LEAVING';
          const streetY3 = TILE_SIZE * STREET_ROW + TILE_SIZE / 2;
          customer.targetX = -20;
          customer.targetY = streetY3;
          customer.path = null;
          this.reputation = Math.max(0, this.reputation - 1);
        }
        break;
        
      case 'FINDING_SEAT':
        if (customer.path && customer.path.length > 0) {
          this.moveCustomerAlongPath(customer, deltaTime);
        } else {
          this.moveToTarget(customer, deltaTime);
        }
        if (this.isAtTarget(customer)) {
          customer.state = 'SITTING';
          customer.eatTimer = 0;
          customer.faceElement.textContent = '😊';
        }
        break;
        
      case 'SITTING':
        customer.eatTimer += deltaTime;
        if (customer.eatTimer > 1 && !customer.orderPlaced) {
          customer.orderPlaced = true;
          // レシピベースの価格計算: 提供中レシピからランダムに割り当て
          const activeRecipeList = this.getActiveRecipes();
          if (activeRecipeList.length > 0) {
            customer.orderedRecipe = activeRecipeList[Math.floor(Math.random() * activeRecipeList.length)];
          }
          const orderRecipeName = customer.orderedRecipe ? customer.orderedRecipe.name : '🍜';
          const orderLabel = customer.groupSize > 1 ? `${orderRecipeName}×${customer.groupSize}` : orderRecipeName;
          this.showBubble(customer, orderLabel);
          
          // Check if there are cooks
          const hasCook = this.staff.some(s => s.type === 'cook');
          if (hasCook) {
            // Add groupSize orders to queue
            for (let i = 0; i < (customer.mealsOrdered || 1); i++) {
              this.orderQueue.push(customer);
            }
            customer.state = 'WAITING_FOOD';
            customer.waitingFoodTimer = 0;
          } else {
            // No cook: auto-serve after delay (backward compatible)
          }
        }
        if (!this.staff.some(s => s.type === 'cook')) {
          // Backward compatible: no cook, auto food at 4 sec
          if (customer.eatTimer >= 4 && !customer.bowlShown) {
            customer.bowlShown = true;
            this.showBubble(customer, '🍜');
            customer.mealsDelivered = customer.mealsOrdered || 1;
            customer.state = 'EATING';
            customer.eatTimer = 0;
          }
        }
        break;
      
      case 'WAITING_FOOD':
        customer.waitingFoodTimer += deltaTime;
        // Show waiting animation periodically
        if (!customer.waitBubbleShown && customer.waitingFoodTimer > 1) {
          customer.waitBubbleShown = true;
          customer.faceElement.textContent = '😊';
        }
        
        // Check if all meals have been delivered
        if ((customer.mealsDelivered || 0) >= (customer.mealsOrdered || 1)) {
          customer.foodDelivered = true;
          this.showBubble(customer, '🍜');
          customer.state = 'EATING';
          customer.eatTimer = 0;
        }
        
        // Timeout: if waiting too long (20s), get frustrated and leave
        if (customer.waitingFoodTimer >= 20 && !customer.foodDelivered) {
          customer.faceElement.textContent = '😠';
          this.showBubble(customer, '遅い！');
          customer.state = 'LEAVING';
          if (customer.seat) {
            customer.seat.occupied = false;
            customer.seat = null;
          }
          const entranceY = this.getEntranceY();
          customer.targetX = this.getEntranceXCenter() * TILE_SIZE;
          customer.targetY = entranceY * TILE_SIZE + TILE_SIZE / 2;
          this.calculateCustomerPath(customer);
          this.reputation = Math.max(0, this.reputation - 2);
        }
        break;
        
      case 'EATING':
        customer.eatTimer += deltaTime;
        // Auto-show eating bubble (40% chance, once, partway through)
        if (!customer.eatBubbleShown && customer.eatTimer >= 0.5) {
          customer.eatBubbleShown = true;
          if (Math.random() < 0.4) {
            const quality = this.calculateQuality(customer);
            let eatMsgs;
            if (quality >= 0.7) {
              eatMsgs = ['うまい！', '最高！', 'スープが絶品！', '麺がいい！', 'これはハマる！'];
            } else if (quality >= 0.4) {
              eatMsgs = ['ふむふむ', '悪くない', 'まあまあかな'];
            } else {
              eatMsgs = ['うーん…', '普通かな', 'もう少し…'];
            }
            this.showBubble(customer, eatMsgs[Math.floor(Math.random() * eatMsgs.length)]);
          }
        }
        if (customer.eatTimer >= 1.2) {
          const quality = this.calculateQuality(customer);
          
          // 満足度を4段階に分類
          let face = '😐';
          let tipMultiplier = 1.0;
          customer.satisfied = false;
          
          if (quality >= 0.8) {
            face = '😋'; // 大満足
            tipMultiplier = 1.3;
            customer.satisfied = true;
          } else if (quality >= 0.6) {
            face = '😊'; // 満足
            tipMultiplier = 1.1;
            customer.satisfied = true;
          } else if (quality >= 0.4) {
            face = '😐'; // 普通
            tipMultiplier = 0.95;
          } else {
            face = '😞'; // 不満
            tipMultiplier = 0.8;
          }
          
          customer.faceElement.textContent = face;
          
          // レシピベースの売価を使用（レシピ未割り当ての場合はフォールバック250円）
          const recipePrice = customer.orderedRecipe ? customer.orderedRecipe.price : 250;
          customer.paid = Math.floor(recipePrice * tipMultiplier * (customer.groupSize || 1));
          this.money += customer.paid;
          
          // Update daily stats
          this.dailyStats.revenue += customer.paid;
          this.dailyStats.customers += (customer.groupSize || 1);
          if (customer.satisfied) this.dailyStats.satisfied += (customer.groupSize || 1);
          
          if (customer.satisfied) {
            this.reputation = Math.min(100, this.reputation + 1);
          } else if (quality < 0.4) {
            this.reputation = Math.max(0, this.reputation - 1);
          }
          
          // Leave dirty dish if any staff exists (servers or cooks can clean)
          const hasStaff = this.staff.length > 0;
          if (hasStaff && customer.seat) {
            this.spawnDirtyDish(customer.seat.x, customer.seat.y);
          }
          
          customer.state = 'LEAVING';
          if (customer.seat) {
            customer.seat.occupied = false;
            customer.seat = null;
          }
          const entranceY2 = this.getEntranceY();
          customer.targetX = this.getEntranceXCenter() * TILE_SIZE;
          customer.targetY = entranceY2 * TILE_SIZE + TILE_SIZE / 2;
          // Calculate path for leaving
          this.calculateCustomerPath(customer);
        }
        break;
        
      case 'LEAVING':
        // Auto-show goodbye bubble (once)
        if (!customer.leaveBubbleShown) {
          customer.leaveBubbleShown = true;
          if (customer.paid > 0) {
            const leaveMsgs = customer.satisfied 
              ? ['ごちそうさま！😋', 'また来ます！', '美味しかった！', 'ごちそうさまでした！']
              : ['ごちそうさま', 'まあまあだった', 'ごちそうさまでした'];
            this.showBubble(customer, leaveMsgs[Math.floor(Math.random() * leaveMsgs.length)]);
          }
        }
        if (customer.path && customer.path.length > 0) {
          this.moveCustomerAlongPath(customer, deltaTime);
        } else {
          this.moveToTarget(customer, deltaTime);
        }
        if (this.isAtTarget(customer)) {
          customer.state = 'EXITING';
          const streetY = TILE_SIZE * STREET_ROW + TILE_SIZE / 2;
          customer.targetX = -20;
          customer.targetY = streetY;
          customer.path = null;
        }
        break;
        
      case 'EXITING':
        this.moveToTarget(customer, deltaTime);
        if (customer.x <= -20) {
          this.removeCustomer(customer);
        }
        break;
    }
  }

  spawnDirtyDish(gridX, gridY) {
    const el = document.createElement('div');
    el.className = 'dirty-dish';
    el.style.left = (gridX * TILE_SIZE + TILE_SIZE / 2 - 10) + 'px';
    el.style.top = (gridY * TILE_SIZE + TILE_SIZE / 2 - 10) + 'px';
    el.textContent = '🍜💨';
    document.getElementById('shop-interior').appendChild(el);
    
    this.dirtyDishes.push({
      gridX: gridX,
      gridY: gridY,
      element: el,
      timer: 0,
      claimed: false,
      done: false
    });
  }

  moveToTarget(customer, deltaTime) {
    const dx = customer.targetX - customer.x;
    const dy = customer.targetY - customer.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    
    if (dist > 1) {
      const move = customer.speed * deltaTime;
      customer.x += (dx / dist) * move;
      customer.y += (dy / dist) * move;
      
      customer.element.style.left = customer.x + 'px';
      customer.element.style.top = customer.y + 'px';
    }
  }

  isAtTarget(customer) {
    const dx = customer.targetX - customer.x;
    const dy = customer.targetY - customer.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    return dist < 5;
  }

  findGroupSeat(groupSize) {
    // For table/tatami: if anyone is sitting there, the whole furniture is occupied (相席NG)
    const occupiedFurniture = new Set();
    this.customers.forEach(c => {
      if (c.seat && c.seat.furniture) {
        const ft = c.seat.furniture.type;
        if (ft === 'table' || ft === 'tatami') {
          occupiedFurniture.add(c.seat.furniture);
        }
      }
    });
    
    // Find table or tatami furniture that has enough capacity and is completely empty
    const groupFurniture = this.furniture.filter(f => {
      const type = FURNITURE_TYPES[f.type];
      if (type.seats < groupSize) return false;
      if (f.type !== 'table' && f.type !== 'tatami') return false;
      return !occupiedFurniture.has(f);
    });
    
    if (groupFurniture.length === 0) return null;
    
    const chosen = groupFurniture[0];
    const type = FURNITURE_TYPES[chosen.type];
    return {
      x: chosen.x + Math.floor(type.width / 2),
      y: chosen.y + Math.floor(type.height / 2),
      occupied: false,
      furniture: chosen,
      isGroupSeat: true
    };
  }

  // Generate unique seat positions for multi-tile furniture
  getSeatPositions(f) {
    const type = FURNITURE_TYPES[f.type];
    const positions = [];
    if (type.width === 1 && type.height === 1) {
      // Counter: single tile
      positions.push({ x: f.x, y: f.y });
    } else {
      // Table (2×2) / Tatami (2×3): one seat per tile
      for (let dy = 0; dy < type.height; dy++) {
        for (let dx = 0; dx < type.width; dx++) {
          if (positions.length < type.seats) {
            positions.push({ x: f.x + dx, y: f.y + dy });
          }
        }
      }
    }
    return positions;
  }

  findEmptySeat() {
    let seats = [];
    this.furniture.forEach(f => {
      const type = FURNITURE_TYPES[f.type];
      if (type.seats > 0) {
        const positions = this.getSeatPositions(f);
        positions.forEach(pos => {
          seats.push({ 
            x: pos.x, 
            y: pos.y, 
            occupied: false, 
            furniture: f 
          });
        });
      }
    });
    
    // Mark occupied seats by matching exact coordinates + furniture
    this.customers.forEach(c => {
      if (c.seat) {
        const match = seats.find(s => s.x === c.seat.x && s.y === c.seat.y && s.furniture === c.seat.furniture);
        if (match) match.occupied = true;
      }
    });
    
    // For table/tatami occupied by a GROUP, mark entire furniture as occupied
    const groupOccupiedFurniture = new Set();
    this.customers.forEach(c => {
      if (c.seat && c.seat.furniture && c.seat.isGroupSeat) {
        groupOccupiedFurniture.add(c.seat.furniture);
      }
    });
    seats = seats.filter(s => {
      if (s.furniture && groupOccupiedFurniture.has(s.furniture)) {
        return false;
      }
      return true;
    });
    
    const empty = seats.filter(s => !s.occupied);
    
    // Sort seats to prefer counter > table > tatami for solo customers
    const seatPriority = { counter: 0, table: 1, tatami: 2 };
    empty.sort((a, b) => {
      const pa = seatPriority[a.furniture.type] || 99;
      const pb = seatPriority[b.furniture.type] || 99;
      return pa - pb;
    });
    
    return empty.length > 0 ? empty[0] : null;
  }

  calculateQuality(customer) {
    let quality = 0.3; // レシピなしの場合のベース品質

    // レシピパラメータベースの品質計算（メイン要素）
    if (customer && customer.orderedRecipe) {
      const params = this.getRecipeParams(customer.orderedRecipe);
      const totalParams = params.kire + params.koku + params.aroma;
      // 20点満点で正規化（キレ+コク+香り合計、各最大10）
      quality = Math.min(1, totalParams / 20);
    }

    // 設備ボーナス（パラメータ補助として小さめに）
    if (this.furniture.some(f => f.type === 'noodleMachine')) quality += 0.05;
    if (this.furniture.some(f => f.type === 'plant')) quality += 0.03;

    // Combo bonuses
    this.discoveredCombos.forEach(combo => {
      const comboData = COMBOS.find(c => c.name === combo);
      if (comboData) quality += comboData.bonus;
    });

    // 調理でスキップされたステップのペナルティ（設備不足による品質低下）
    if (customer && customer.cookingSkippedSteps > 0) {
      quality -= customer.cookingSkippedSteps * 0.08;
    }

    return Math.max(0, Math.min(1, quality));
  }

  showBubble(customer, text) {
    const bubble = document.createElement('div');
    bubble.className = 'customer-bubble';
    bubble.textContent = text;
    customer.element.appendChild(bubble);
    
    setTimeout(() => {
      if (bubble.parentNode) bubble.remove();
    }, 1500);
  }

  showCustomerFeedback(customer) {
    if (!customer || !customer.element) return;
    
    let feedback = '';
    
    if (customer.state === 'WALKING_STREET' || customer.state === 'ENTERING') {
      const messages = ['いい匂いがする！', 'ラーメン食べたい！', 'ここが評判の店か'];
      feedback = messages[Math.floor(Math.random() * messages.length)];
    } else if (customer.state === 'WAITING_FOOD') {
      const messages = ['まだかな…', 'いい匂いがしてきた！', '楽しみ♪'];
      feedback = messages[Math.floor(Math.random() * messages.length)];
    } else if (customer.state === 'SITTING' || customer.state === 'EATING') {
      const quality = this.calculateQuality(customer);
      
      if (quality >= 0.8) {
        const positiveFeedback = [
          'スープのコクが最高！',
          '麺がモチモチで美味しい！',
          'こだわりを感じる一杯！',
          '贅沢な味わい…！',
          'また来よう！'
        ];
        feedback = positiveFeedback[Math.floor(Math.random() * positiveFeedback.length)];
      } else if (quality >= 0.5) {
        const neutralFeedback = [
          'まあまあかな',
          '普通に美味しい',
          '悪くないね',
          'もう少し何か欲しい'
        ];
        feedback = neutralFeedback[Math.floor(Math.random() * neutralFeedback.length)];
      } else {
        const negativeFeedback = [
          'うーん…普通かな',
          '期待しすぎたかも',
          'もっと美味しい店あるな',
          'ちょっと物足りない'
        ];
        feedback = negativeFeedback[Math.floor(Math.random() * negativeFeedback.length)];
      }
      
      if (this.furniture.some(f => f.type === 'noodleMachine')) {
        if (Math.random() < 0.3) feedback += '\n（麺がいい感じ！）';
      }
      if (this.furniture.some(f => f.type === 'plant')) {
        if (Math.random() < 0.2) feedback += '\n（雰囲気いいね）';
      }
    } else if (customer.state === 'LEAVING' || customer.state === 'EXITING') {
      if (customer.satisfied) {
        feedback = 'ごちそうさま！😋';
      } else {
        feedback = 'ごちそうさま';
      }
    } else {
      feedback = '...';
    }
    
    this.showBubble(customer, feedback);
  }

  removeCustomer(customer) {
    if (customer.element && customer.element.parentNode) {
      customer.element.remove();
    }
    customer.element = null;
    customer.state = 'EXITED';
  }

  showNotification(text) {
    const notif = document.getElementById('notification');
    notif.textContent = text;
    notif.classList.add('active');
    
    setTimeout(() => {

    }, 2000);

  // Store expansion
  expandStore() {
    const nextLevel = this.storeLevel + 1;
    if (nextLevel > 3) {
      this.showNotification('最大レベルです！');
      return;
    }
    const cost = STORE_LEVELS[nextLevel].cost;
    if (this.money < cost) {
      this.showNotification('お金が足りません！');
      return;
    }
    this.money -= cost;
    this.storeLevel = nextLevel;
    this.walls = this.generateWalls(nextLevel);
    this.renderWalls();
    this.createGrid(); // Rebuild grid overlay
    this.updateUI();
    this.renderTabContent();
    this.showNotification('✨ 店舗を拡張しました！ Lv' + nextLevel);
  }

  renderTabs() {
    const tabs = document.querySelectorAll('.tab');
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        this.currentTab = tab.dataset.tab;
        this.renderTabContent();
      });
    });
    
    this.renderTabContent();
  }
