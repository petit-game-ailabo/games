<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ラーメン屋台物語</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #2c2416;
  color: #333;
  max-width: 460px;
  margin: 0 auto;
  overflow-x: hidden;
  user-select: none;
}

#app {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Header */
#header {
  background: #d35400;
  color: white;
  padding: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 14px;
}

#header .stats {
  display: flex;
  gap: 15px;
}

#header .stat {
  display: flex;
  align-items: center;
  gap: 4px;
}

/* Tabs */
#tabs {
  background: #f5f0e8;
  display: flex;
  border-bottom: 2px solid #d35400;
}

.tab {
  flex: 1;
  padding: 12px;
  text-align: center;
  background: #e8dcc4;
  border: none;
  cursor: pointer;
  font-size: 14px;
  font-weight: bold;
  color: #8b4513;
}

.tab.active {
  background: #fff8e8;
  color: #d35400;
  border-bottom: 3px solid #d35400;
}

/* Tab Content */
.tab-content {
  display: none;
  flex: 1;
  background: #fff8e8;
  overflow-y: auto;
  padding: 15px;
}

.tab-content.active {
  display: block;
}

/* Status Tab */
#statusTab {
  padding: 20px;
}

.info-row {
  display: flex;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid #e8dcc4;
}

.info-label {
  font-weight: bold;
  color: #8b4513;
}

.info-value {
  color: #333;
}

/* Layout Tab (Grid) */
#layoutGrid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 2px;
  background: #8b4513;
  border: 3px solid #8b4513;
  margin-bottom: 15px;
}

.grid-cell {
  aspect-ratio: 1;
  background: #fff8e8;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  position: relative;
  cursor: pointer;
}

.grid-cell.road {
  background: #a0a0a0;
  cursor: default;
}

.grid-cell.occupied {
  background: #f0e6d0;
}

.grid-cell .item-emoji {
  font-size: 28px;
}

/* Purchase Panel */
#purchasePanel {
  background: white;
  border-radius: 8px;
  padding: 15px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.purchase-section {
  margin-bottom: 20px;
}

.purchase-section h3 {
  color: #d35400;
  margin-bottom: 10px;
  font-size: 16px;
}

.purchase-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px;
  margin-bottom: 8px;
  background: #f9f9f9;
  border-radius: 6px;
  border: 1px solid #e0e0e0;
}

.purchase-item.disabled {
  opacity: 0.5;
}

.purchase-item-info {
  display: flex;
  align-items: center;
  gap: 8px;
}

.purchase-item-emoji {
  font-size: 24px;
}

.purchase-item-details {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.purchase-item-name {
  font-weight: bold;
  color: #333;
}

.purchase-item-effect {
  font-size: 12px;
  color: #666;
}

.purchase-item-price {
  background: #d35400;
  color: white;
  padding: 6px 12px;
  border-radius: 4px;
  font-weight: bold;
  cursor: pointer;
}

.purchase-item.disabled .purchase-item-price {
  background: #ccc;
  cursor: not-allowed;
}

/* Business Tab */
#businessStatus {
  text-align: center;
  padding: 20px;
}

#businessTimer {
  font-size: 48px;
  font-weight: bold;
  color: #d35400;
  margin: 20px 0;
}

#speedControl {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-bottom: 20px;
}

.speed-btn {
  padding: 10px 20px;
  border: 2px solid #d35400;
  background: white;
  color: #d35400;
  font-weight: bold;
  border-radius: 6px;
  cursor: pointer;
}

.speed-btn.active {
  background: #d35400;
  color: white;
}

#startBusinessBtn, #closeBusinessBtn {
  background: #27ae60;
  color: white;
  border: none;
  padding: 15px 30px;
  font-size: 18px;
  font-weight: bold;
  border-radius: 8px;
  cursor: pointer;
  margin: 10px;
}

#closeBusinessBtn {
  background: #c0392b;
}

/* Customer */
.customer {
  position: absolute;
  font-size: 24px;
  transition: all 0.5s linear;
  z-index: 10;
}

/* Daily Report Modal */
#dailyReportModal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  z-index: 1000;
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: white;
  padding: 30px;
  border-radius: 12px;
  max-width: 90%;
  max-height: 80%;
  overflow-y: auto;
}

.modal-content h2 {
  color: #d35400;
  margin-bottom: 20px;
  text-align: center;
}

.report-row {
  display: flex;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid #eee;
}

#continueBtn {
  background: #27ae60;
  color: white;
  border: none;
  padding: 15px 30px;
  font-size: 18px;
  font-weight: bold;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 20px;
  width: 100%;
}
</style>
</head>
<body>
<div id="app">
  <!-- Header -->
  <div id="header">
    <div class="stats">
      <div class="stat">💰 <span id="moneyDisplay">10000</span>円</div>
      <div class="stat">📅 <span id="dayDisplay">1</span>日目</div>
    </div>
    <div class="stat" id="timeDisplay">準備中</div>
  </div>

  <!-- Tabs -->
  <div id="tabs">
    <button class="tab active" data-tab="status">店舗情報</button>
    <button class="tab" data-tab="layout">配置</button>
    <button class="tab" data-tab="business">営業</button>
  </div>

  <!-- Tab Contents -->
  <div id="statusTab" class="tab-content active">
    <h2 style="color: #d35400; margin-bottom: 20px;">店舗情報</h2>
    <div class="info-row">
      <span class="info-label">グリッドサイズ</span>
      <span class="info-value">6×5 (配置可能: 6×4)</span>
    </div>
    <div class="info-row">
      <span class="info-label">席数</span>
      <span class="info-value" id="seatCount">0</span>
    </div>
    <div class="info-row">
      <span class="info-label">調理設備</span>
      <span class="info-value" id="cookingEquipment">寸胴(小)</span>
    </div>
    <div class="info-row">
      <span class="info-label">累計売上</span>
      <span class="info-value" id="totalRevenue">0円</span>
    </div>
    <div class="info-row">
      <span class="info-label">累計来客</span>
      <span class="info-value" id="totalCustomers">0人</span>
    </div>
  </div>

  <div id="layoutTab" class="tab-content">
    <h3 style="color: #d35400; margin-bottom: 10px;">レイアウト</h3>
    <div id="layoutGrid"></div>
    
    <div id="purchasePanel">
      <div class="purchase-section">
        <h3>🪑 席</h3>
        <div class="purchase-item" data-item="counter">
          <div class="purchase-item-info">
            <span class="purchase-item-emoji">🪑</span>
            <div class="purchase-item-details">
              <span class="purchase-item-name">カウンター席</span>
              <span class="purchase-item-effect">1席、回転早い</span>
            </div>
          </div>
          <div class="purchase-item-price">200円</div>
        </div>
        <div class="purchase-item disabled" data-item="table">
          <div class="purchase-item-info">
            <span class="purchase-item-emoji">🍽️</span>
            <div class="purchase-item-details">
              <span class="purchase-item-name">テーブル席</span>
              <span class="purchase-item-effect">2席、チップ多い</span>
            </div>
          </div>
          <div class="purchase-item-price">500円</div>
        </div>
        <div class="purchase-item disabled" data-item="tatami">
          <div class="purchase-item-info">
            <span class="purchase-item-emoji">🏯</span>
            <div class="purchase-item-details">
              <span class="purchase-item-name">座敷席</span>
              <span class="purchase-item-effect">4席(2×2)、家族向き</span>
            </div>
          </div>
          <div class="purchase-item-price">800円</div>
        </div>
      </div>

      <div class="purchase-section">
        <h3>🍜 厨房設備</h3>
        <div class="purchase-item disabled" data-item="pot-large">
          <div class="purchase-item-info">
            <span class="purchase-item-emoji">🍲</span>
            <div class="purchase-item-details">
              <span class="purchase-item-name">寸胴(大)</span>
              <span class="purchase-item-effect">スープ生産2倍</span>
            </div>
          </div>
          <div class="purchase-item-price">2000円</div>
        </div>
        <div class="purchase-item disabled" data-item="noodle-machine">
          <div class="purchase-item-info">
            <span class="purchase-item-emoji">🌾</span>
            <div class="purchase-item-details">
              <span class="purchase-item-name">製麺機</span>
              <span class="purchase-item-effect">品質UP</span>
            </div>
          </div>
          <div class="purchase-item-price">3000円</div>
        </div>
      </div>
    </div>
  </div>

  <div id="businessTab" class="tab-content">
    <div id="businessStatus">
      <div id="businessTimer">--:--</div>
      <div id="speedControl">
        <button class="speed-btn active" data-speed="1">×1</button>
        <button class="speed-btn" data-speed="2">×2</button>
        <button class="speed-btn" data-speed="3">×3</button>
      </div>
      <button id="startBusinessBtn">営業開始</button>
      <button id="closeBusinessBtn" style="display:none;">早期終了</button>
    </div>
    <div id="customerContainer" style="position: relative; height: 200px; margin-top: 20px; border: 2px solid #d35400; background: #fff8e8; overflow: hidden;"></div>
  </div>
</div>

<!-- Daily Report Modal -->
<div id="dailyReportModal">
  <div class="modal-content">
    <h2>📊 本日の営業報告</h2>
    <div id="reportContent"></div>
    <button id="continueBtn">明日へ</button>
  </div>
</div>

<script>
// ===== Game State =====
const state = {
  money: 10000,
  day: 1,
  gridWidth: 6,
  gridHeight: 5,
  grid: [], // [row][col] = {type, emoji} or null
  items: {
    counter: { emoji: '🪑', price: 200, type: 'seat', capacity: 1 },
    table: { emoji: '🍽️', price: 500, type: 'seat', capacity: 2 },
    tatami: { emoji: '🏯', price: 800, type: 'seat', capacity: 4 },
    'pot-large': { emoji: '🍲', price: 2000, type: 'cooking' },
    'noodle-machine': { emoji: '🌾', price: 3000, type: 'cooking' }
  },
  business: {
    isOpen: false,
    startTime: 0,
    speed: 1,
    customers: [],
    todayRevenue: 0,
    todayCustomers: 0
  },
  stats: {
    totalRevenue: 0,
    totalCustomers: 0
  }
};

// Initialize grid (6×5, last row = road)
for (let r = 0; r < state.gridHeight; r++) {
  const row = [];
  for (let c = 0; c < state.gridWidth; c++) {
    if (r === state.gridHeight - 1) {
      row.push({ type: 'road', emoji: '🛣️' }); // Road (non-placeable)
    } else {
      row.push(null); // Empty
    }
  }
  state.grid.push(row);
}

// Place initial equipment: pot-small at (1,2), counter at (2,2)
state.grid[1][2] = { type: 'cooking', emoji: '🍜', item: 'pot-small' };
state.grid[2][2] = { type: 'seat', emoji: '🪑', item: 'counter', capacity: 1 };

// ===== UI Update Functions =====
function updateHeader() {
  document.getElementById('moneyDisplay').textContent = state.money;
  document.getElementById('dayDisplay').textContent = state.day;
  
  const seats = state.grid.flat().filter(cell => cell && cell.type === 'seat')
    .reduce((sum, cell) => sum + (cell.capacity || 1), 0);
  document.getElementById('seatCount').textContent = seats;
  document.getElementById('totalRevenue').textContent = state.stats.totalRevenue + '円';
  document.getElementById('totalCustomers').textContent = state.stats.totalCustomers + '人';
}

function renderGrid() {
  const gridEl = document.getElementById('layoutGrid');
  gridEl.innerHTML = '';
  
  for (let r = 0; r < state.gridHeight; r++) {
    for (let c = 0; c < state.gridWidth; c++) {
      const cell = document.createElement('div');
      cell.className = 'grid-cell';
      cell.dataset.row = r;
      cell.dataset.col = c;
      
      const cellData = state.grid[r][c];
      if (cellData) {
        if (cellData.type === 'road') {
          cell.classList.add('road');
        } else {
          cell.classList.add('occupied');
        }
        const emoji = document.createElement('span');
        emoji.className = 'item-emoji';
        emoji.textContent = cellData.emoji;
        cell.appendChild(emoji);
      }
      
      gridEl.appendChild(cell);
    }
  }
}

function updatePurchasePanel() {
  document.querySelectorAll('.purchase-item').forEach(item => {
    const itemKey = item.dataset.item;
    const itemData = state.items[itemKey];
    if (!itemData) return;
    
    if (state.money >= itemData.price) {
      item.classList.remove('disabled');
    } else {
      item.classList.add('disabled');
    }
  });
}

function updateBusinessTime() {
  if (!state.business.isOpen) {
    document.getElementById('businessTimer').textContent = '--:--';
    document.getElementById('timeDisplay').textContent = '準備中';
    return;
  }
  
  const elapsed = (performance.now() - state.business.startTime) * state.business.speed;
  const dayDuration = 60000; // 60 seconds = 1 day at 1x
  const progress = Math.min(elapsed / dayDuration, 1);
  
  // Time display (11:00 to 23:00)
  const startHour = 11;
  const endHour = 23;
  const currentHour = startHour + (endHour - startHour) * progress;
  const hour = Math.floor(currentHour);
  const minute = Math.floor((currentHour - hour) * 60);
  
  const timeStr = `${hour.toString().padStart(2, '0')}:${minute.toString().padStart(2, '0')}`;
  document.getElementById('businessTimer').textContent = timeStr;
  document.getElementById('timeDisplay').textContent = `営業中 ${timeStr}`;
  
  if (progress >= 1) {
    closeBusiness();
  }
}

// ===== Business Logic =====
function startBusiness() {
  const seats = state.grid.flat().filter(cell => cell && cell.type === 'seat');
  if (seats.length === 0) {
    alert('席がありません！まず席を配置してください。');
    return;
  }
  
  state.business.isOpen = true;
  state.business.startTime = performance.now();
  state.business.todayRevenue = 0;
  state.business.todayCustomers = 0;
  state.business.customers = [];
  
  document.getElementById('startBusinessBtn').style.display = 'none';
  document.getElementById('closeBusinessBtn').style.display = 'inline-block';
  
  spawnCustomers();
  animationLoop();
}

function closeBusiness() {
  state.business.isOpen = false;
  state.business.customers = [];
  
  document.getElementById('startBusinessBtn').style.display = 'inline-block';
  document.getElementById('closeBusinessBtn').style.display = 'none';
  
  showDailyReport();
}

function spawnCustomers() {
  if (!state.business.isOpen) return;
  
  // Spawn 1 customer every 3-8 seconds
  const delay = 3000 + Math.random() * 5000;
  setTimeout(() => {
    createCustomer();
    spawnCustomers();
  }, delay / state.business.speed);
}

function createCustomer() {
  const customer = {
    id: Date.now() + Math.random(),
    emoji: ['👨', '👩', '🧑', '👴', '👵'][Math.floor(Math.random() * 5)],
    x: -50,
    y: 100,
    state: 'walking', // walking, eating, leaving
    satisfaction: 0.7 + Math.random() * 0.3
  };
  
  state.business.customers.push(customer);
  renderCustomer(customer);
  
  // Walk in
  setTimeout(() => {
    customer.x = 100;
    updateCustomerPosition(customer);
    
    // Eat
    setTimeout(() => {
      customer.state = 'eating';
      const revenue = Math.floor(800 + Math.random() * 400);
      state.business.todayRevenue += revenue;
      state.business.todayCustomers++;
      
      // Leave
      setTimeout(() => {
        customer.state = 'leaving';
        customer.x = 450;
        updateCustomerPosition(customer);
        
        setTimeout(() => {
          removeCustomer(customer);
        }, 500 / state.business.speed);
      }, (3000 + Math.random() * 2000) / state.business.speed);
    }, 500 / state.business.speed);
  }, 1000 / state.business.speed);
}

function renderCustomer(customer) {
  const el = document.createElement('div');
  el.className = 'customer';
  el.textContent = customer.emoji;
  el.dataset.customerId = customer.id;
  el.style.left = customer.x + 'px';
  el.style.top = customer.y + 'px';
  document.getElementById('customerContainer').appendChild(el);
}

function updateCustomerPosition(customer) {
  const el = document.querySelector(`[data-customer-id="${customer.id}"]`);
  if (el) {
    el.style.left = customer.x + 'px';
    el.style.transitionDuration = (500 / state.business.speed) + 'ms';
  }
}

function removeCustomer(customer) {
  const el = document.querySelector(`[data-customer-id="${customer.id}"]`);
  if (el) el.remove();
  
  const index = state.business.customers.findIndex(c => c.id === customer.id);
  if (index >= 0) state.business.customers.splice(index, 1);
}

function animationLoop() {
  if (!state.business.isOpen) return;
  
  updateBusinessTime();
  requestAnimationFrame(animationLoop);
}

function showDailyReport() {
  state.money += state.business.todayRevenue;
  state.stats.totalRevenue += state.business.todayRevenue;
  state.stats.totalCustomers += state.business.todayCustomers;
  
  const modal = document.getElementById('dailyReportModal');
  const content = document.getElementById('reportContent');
  
  content.innerHTML = `
    <div class="report-row">
      <span>来客数</span>
      <span>${state.business.todayCustomers}人</span>
    </div>
    <div class="report-row">
      <span>売上</span>
      <span>+${state.business.todayRevenue}円</span>
    </div>
    <div class="report-row">
      <span>所持金</span>
      <span>${state.money}円</span>
    </div>
  `;
  
  modal.style.display = 'flex';
  
  updateHeader();
}

// ===== Event Handlers =====
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    
    tab.classList.add('active');
    const tabName = tab.dataset.tab;
    document.getElementById(tabName + 'Tab').classList.add('active');
  });
});

document.querySelectorAll('.purchase-item').forEach(item => {
  item.addEventListener('click', () => {
    if (item.classList.contains('disabled')) {
      alert('お金が足りません！');
      return;
    }
    
    const itemKey = item.dataset.item;
    const itemData = state.items[itemKey];
    
    // Find empty cell
    let placed = false;
    for (let r = 0; r < state.gridHeight - 1 && !placed; r++) {
      for (let c = 0; c < state.gridWidth && !placed; c++) {
        if (state.grid[r][c] === null) {
          state.grid[r][c] = {
            type: itemData.type,
            emoji: itemData.emoji,
            item: itemKey,
            capacity: itemData.capacity
          };
          state.money -= itemData.price;
          placed = true;
        }
      }
    }
    
    if (placed) {
      renderGrid();
      updateHeader();
      updatePurchasePanel();
    } else {
      alert('配置スペースがありません！');
    }
  });
});

document.querySelectorAll('.speed-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.business.speed = parseInt(btn.dataset.speed);
  });
});

document.getElementById('startBusinessBtn').addEventListener('click', startBusiness);
document.getElementById('closeBusinessBtn').addEventListener('click', closeBusiness);

document.getElementById('continueBtn').addEventListener('click', () => {
  document.getElementById('dailyReportModal').style.display = 'none';
  state.day++;
  updateHeader();
});

// ===== Initialize =====
updateHeader();
renderGrid();
updatePurchasePanel();
</script>
</body>
</html>
