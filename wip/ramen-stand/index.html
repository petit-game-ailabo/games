          <div class="info-section">
            <div class="info-title">店員</div>
            ${staffInfo}
          </div>
          
          <div class="info-section">
            <div class="info-title">📢 最近のイベント</div>
            ${this.eventLog.length > 0 ? 
              this.eventLog.map(e => `<div style="font-size:12px;">${e.icon} Day${e.day}: ${e.name}</div>`).join('') :
              '<div style="color: #999;">まだイベントは発生していません</div>'
            }
          </div>
          
          <div class="info-section">
            <div class="info-title">発見したコンボ</div>
            ${this.discoveredCombos.length > 0 ? 
              this.discoveredCombos.map(c => {
                const comboData = COMBOS.find(cb => cb.name === c);
                const itemNames = comboData ? comboData.items.map(i => FURNITURE_TYPES[i] ? FURNITURE_TYPES[i].name : i).join('+') : '';
                const bonus = comboData ? Math.round(comboData.bonus*100) + '%' : '';
                return `<div>✨ ${c} <span style="font-size:10px;color:#666">(${itemNames} → +${bonus})</span></div>`;
              }).join('') : 
              '<div style="color: #999;">まだ発見していません</div>'
            }
          </div>
        `;
        break;
    }
  }

  setSubTab(tab) {
    this.currentSubTab = tab;
    this.selectedFurniture = null;
    this.selectedStaff = null;
    this.renderTabContent();
  }

  selectFurniture(type) {
    this.selectedFurniture = type;
    this.selectedStaff = null;
    this.removalMode = false;
    this.renderTabContent();
  }

  selectStaffType(type) {
    this.selectedStaff = type;
    this.selectedFurniture = null;
    this.removalMode = false;
    this.renderTabContent();
  }

  toggleRemovalMode() {
    this.removalMode = !this.removalMode;
    this.selectedFurniture = null;
    this.selectedStaff = null;
    this.renderTabContent();
  }

  toggleRecipe(recipe) {
    if (this.activeRecipes.includes(recipe)) {
      this.activeRecipes = this.activeRecipes.filter(r => r !== recipe);
    } else if (this.activeRecipes.length < 3) {
      this.activeRecipes.push(recipe);
    } else {
      this.showNotification('最大3つまでです！');
    }
    this.renderTabContent();
  }

  toggleRecipeActive(recipeId) {
    const recipe = this.recipes.find(r => r.id === recipeId);
    if (!recipe) return;
    if (recipe.active) {
      recipe.active = false;
    } else {
      const activeCount = this.recipes.filter(r => r.active).length;
      if (activeCount >= 3) {
        this.showNotification('提供は最大3つまで！');
        return;
      }
      // Check if recipe can be served
      const check = this.canServeRecipe(recipe);
      if (!check.ok) {
        this.showNotification(check.reason);
        return;
      }
      recipe.active = true;
    }
    // Sync activeRecipes list for backward compat
    this.activeRecipes = this.recipes.filter(r => r.active).map(r => r.name);
    this.saveGame();
    this.renderTabContent();
  }

  toggleSideMenu(key) {
    this.sideMenuActive[key] = !this.sideMenuActive[key];
    this.saveGame();
    this.renderTabContent();
  }

  confirmDeleteRecipe(recipeId) {
    const recipe = this.recipes.find(r => r.id === recipeId);
    if (!recipe) return;
    if (this.recipes.length <= 1) {
      this.showNotification('最後のレシピは削除できません！');
      return;
    }
    this.deleteRecipe(recipeId);
    // Sync activeRecipes
    this.activeRecipes = this.recipes.filter(r => r.active).map(r => r.name);
    this.saveGame();
    this.showNotification('レシピを削除しました');
    this.renderTabContent();
  }

  unlockResearch(id) {
    const research = RESEARCH_TREE.find(r => r.id === id);
    if (!research) return;
    
    // Tier制限チェック
    if (!isTierAvailable(research.tier, this.unlockedResearch)) {
      this.showNotification('前のTierを先に研究してください！');
      return;
    }
    
    if (this.money < research.cost) {
      this.showNotification('お金が足りません！');
      return;
    }
    
    this.money -= research.cost;
    this.unlockedResearch.push(id);
    
    if (research.type === 'soup') {
      this.availableRecipes.push(research.name + 'ラーメン');
      // 新スープ解放時にデフォルトレシピを自動作成
      const soupKey = Object.keys(SOUP_BASES).find(k => SOUP_BASES[k].unlock === research.id);
      if (soupKey) {
        this.createRecipe(research.name + 'ラーメン', soupKey, 'medium', ['negi'], 'balanced');
      }
    }
    
    this.showNotification('✨ ' + research.name + ' を習得！');
    this.updateUI();
    this.renderTabContent();
  }

  toggleMute() {
    const muted = soundMgr.toggleMute();
    const btn = document.getElementById('mute-btn');
    if (btn) btn.textContent = muted ? '🔇' : '🔊';
  }

  setSpeed(multiplier) {
    this.speedMultiplier = multiplier;
    this.renderTabContent();
  }

  // ========== ラーメン構成モーダル ==========

  openRecipeModal(editRecipeId) {
    const modal = document.getElementById('recipe-modal');
    const title = document.getElementById('recipe-modal-title');
    const body = document.getElementById('recipe-modal-body');

    // Determine editing state
    let recipe = null;
    if (editRecipeId) {
      recipe = this.recipes.find(r => r.id === editRecipeId);
    }
    const isEdit = !!recipe;
    title.textContent = isEdit ? '🍜 レシピを編集' : '🍜 新しいラーメンを作る';

    // Current values
    const curName = recipe ? recipe.name : '';
    const curSoup = recipe ? recipe.soup : 'shoyu';
    const curNoodle = recipe ? recipe.noodle : 'medium';
    const curToppings = recipe ? recipe.toppings.slice() : [];
    const curStrategy = recipe ? recipe.priceStrategy : 'balanced';

    // Store editing state
    this._recipeModalState = {
      editId: editRecipeId || null,
      name: curName,
      soup: curSoup,
      noodle: curNoodle,
      toppings: curToppings,
      strategy: curStrategy
    };

    this._renderRecipeModalBody();
    modal.classList.add('active');
  }

  closeRecipeModal() {
    document.getElementById('recipe-modal').classList.remove('active');
    this._recipeModalState = null;
  }

  _renderRecipeModalBody() {
    const body = document.getElementById('recipe-modal-body');
    const s = this._recipeModalState;
    if (!s) return;

    const rawParams = calculateRecipeParams(s.soup, s.noodle, s.toppings);
    // 製麺機ボーナス
    const hasNoodleMachine = this.furniture.some(f => f.type === 'noodleMachine');
    const params = { ...rawParams };
    if (hasNoodleMachine) {
      const noodleCost = NOODLE_TYPES[s.noodle]?.cost || 0;
      params.cost -= Math.floor(noodleCost / 2);
    }
    const price = calculatePrice(params.cost, s.strategy);
    const profit = price - params.cost;

    // Soup options (only unlocked)
    const soupOptions = Object.entries(SOUP_BASES)
      .filter(([k, v]) => !v.unlock || this.unlockedResearch.includes(v.unlock))
      .map(([k, v]) => `<option value="${k}" ${s.soup === k ? 'selected' : ''}>${v.name} (${v.cost}円)</option>`)
      .join('');

    // Noodle options
    const noodleOptions = Object.entries(NOODLE_TYPES)
      .map(([k, v]) => `<option value="${k}" ${s.noodle === k ? 'selected' : ''}>${v.name} (${v.cost}円)</option>`)
      .join('');

    // Topping chips
    const toppingChips = Object.entries(TOPPINGS).map(([k, t]) => {
      const unlocked = !t.unlock || this.unlockedResearch.includes(t.unlock);
      const equipOk = !t.requires || this.furniture.some(f => f.type === t.requires);
      const available = unlocked;
      const selected = s.toppings.includes(k);
      let cls = 'topping-chip';
      if (selected) cls += ' selected';
      if (!available) cls += ' locked';
      let warn = '';
      if (!unlocked) warn = '(未研究)';
      else if (!equipOk) warn = `(${FURNITURE_TYPES[t.requires]?.name || '設備'}不足)`;
      return `<div class="${cls}" onclick="game._toggleTopping('${k}', ${available})" title="${t.name}">
        ${t.name} ${warn}<br><span class="topping-cost">${t.cost}円</span>
      </div>`;
    }).join('');

    // Price strategies
    const strategies = [
      { key: 'cheap', label: '安さで勝負', ratio: '35%' },
      { key: 'balanced', label: 'ちょうどいい', ratio: '30%' },
      { key: 'premium', label: 'ちょっとお高め', ratio: '25%' }
    ];
    const strategyHtml = strategies.map(st => {
      const p = calculatePrice(params.cost, st.key);
      const pr = p - params.cost;
      return `<div class="price-option ${s.strategy === st.key ? 'selected' : ''}" onclick="game._setStrategy('${st.key}')">
        <strong>${st.label}</strong> ${p}円 (原価率${st.ratio}) → 利益${pr}円/杯
      </div>`;
    }).join('');

    body.innerHTML = `
      <div class="recipe-field">
        <label>レシピ名</label>
        <input type="text" id="recipe-name-input" value="${this._escapeHtml(s.name)}" placeholder="例: こだわり醤油ラーメン" oninput="game._recipeModalState.name=this.value">
      </div>
      <div class="recipe-field">
        <label>スープ</label>
        <select onchange="game._setSoup(this.value)">${soupOptions}</select>
      </div>
      <div class="recipe-field">
        <label>麺</label>
        <select onchange="game._setNoodle(this.value)">${noodleOptions}</select>
      </div>
      <div class="recipe-field">
        <label>トッピング</label>
        <div class="topping-grid">${toppingChips}</div>
      </div>

      <div style="margin: 10px 0; padding: 8px; background: white; border: 2px solid #ccc; border-radius: 6px;">
        <div style="font-weight:bold; font-size:13px; margin-bottom:6px; color:#654321;">パラメータ</div>
        <div class="param-bar-container">
          <div class="param-bar-label"><span>キレ</span><span>${params.kire}/10</span></div>
          <div class="param-bar-track"><div class="param-bar-fill kire" style="width:${params.kire * 10}%"></div></div>
        </div>
        <div class="param-bar-container">
          <div class="param-bar-label"><span>コク</span><span>${params.koku}/10</span></div>
          <div class="param-bar-track"><div class="param-bar-fill koku" style="width:${params.koku * 10}%"></div></div>
        </div>
        <div class="param-bar-container">
          <div class="param-bar-label"><span>香り</span><span>${params.aroma}/10</span></div>
          <div class="param-bar-track"><div class="param-bar-fill aroma" style="width:${params.aroma * 10}%"></div></div>
        </div>
      </div>

      <div class="recipe-cost-section">
        <div style="font-weight:bold; margin-bottom:4px; color:#654321;">原価: ${params.cost}円</div>
        <div style="font-size:11px; color:#888;">スープ${SOUP_BASES[s.soup].cost} + 麺${NOODLE_TYPES[s.noodle].cost}${hasNoodleMachine ? `(-${Math.floor(NOODLE_TYPES[s.noodle].cost/2)}製麺機)` : ''} + 具${rawParams.cost - SOUP_BASES[s.soup].cost - NOODLE_TYPES[s.noodle].cost}円</div>
      </div>

      <div class="recipe-field">
        <label>価格設定</label>
        <div class="price-strategy-options">${strategyHtml}</div>
      </div>

      <div style="background: #e8f5e9; padding: 8px; border-radius: 6px; text-align: center; font-weight: bold;">
        売価: ${price}円 / 利益: ${profit}円/杯
      </div>

      <div class="recipe-modal-buttons">
        <button onclick="game.closeRecipeModal()" style="background:#ccc;">キャンセル</button>
        <button onclick="game._saveRecipeFromModal()">保存</button>
      </div>
    `;
  }

  _escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  _setSoup(key) {
    if (this._recipeModalState) {
      this._recipeModalState.soup = key;
      this._renderRecipeModalBody();
    }
  }

  _setNoodle(key) {
    if (this._recipeModalState) {
      this._recipeModalState.noodle = key;
      this._renderRecipeModalBody();
    }
  }

  _toggleTopping(key, available) {
    if (!available || !this._recipeModalState) return;
    const s = this._recipeModalState;
    const idx = s.toppings.indexOf(key);
    if (idx >= 0) {
      s.toppings.splice(idx, 1);
    } else {
      s.toppings.push(key);
    }
    this._renderRecipeModalBody();
  }

  _setStrategy(key) {
    if (this._recipeModalState) {
      this._recipeModalState.strategy = key;
      this._renderRecipeModalBody();
    }
  }

  _saveRecipeFromModal() {
    const s = this._recipeModalState;
    if (!s) return;
    const name = s.name.trim() || (SOUP_BASES[s.soup].name + 'ラーメン');

    if (s.editId) {
      this.updateRecipe(s.editId, {
        name: name,
        soup: s.soup,
        noodle: s.noodle,
        toppings: s.toppings,
        priceStrategy: s.strategy
      });
      this.showNotification('レシピを更新しました！');
    } else {
      this.createRecipe(name, s.soup, s.noodle, s.toppings, s.strategy);
      this.showNotification('新レシピを作成しました！');
    }

    this.closeRecipeModal();
    this.renderTabContent();
    this.saveGame();
  }

  // ========== 実績システム ==========
  checkAchievements() {
    for (const a of ACHIEVEMENTS) {
      if (this.achievements.includes(a.id)) continue;
      if (a.check(this)) {
        this.achievements.push(a.id);
        this._achieveQueue.push(a);
        this._showNextAchievement();
      }
    }
  }

  _showNextAchievement() {
    if (this._achieveShowing || this._achieveQueue.length === 0) return;
    this._achieveShowing = true;
    const a = this._achieveQueue.shift();
    soundMgr.playAchievement();

    const el = document.createElement('div');
    el.className = 'achievement-popup';
    el.innerHTML = `
      <div class="achieve-icon">${a.icon}</div>
      <div class="achieve-name">🏅 ${a.name}</div>
      <div class="achieve-desc">${a.desc}</div>
    `;
    document.body.appendChild(el);

    setTimeout(() => {
      if (el.parentNode) el.remove();
      this._achieveShowing = false;
      this._showNextAchievement();
    }, 2500);
  }

  updateUI() {
    document.getElementById('day').textContent = this.day;
    document.getElementById('money').textContent = this.money;
    document.getElementById('reputation').textContent = this.reputation;
    const weatherEl = document.getElementById('weather-label');
    if (weatherEl) weatherEl.textContent = this.getWeatherLabel();
    this.checkAchievements();
  }

  showWeeklyRanking() {
    const playerRevenue = this.weeklyStats.revenue;
    const playerName = 'あなたの店';
    
    // Generate 3 rival shops with revenues based on player's performance
    const rivals = [
      { name: '麺屋 一番星', revenue: Math.floor(playerRevenue * (0.6 + Math.random() * 0.8)) },
      { name: 'らーめん道場', revenue: Math.floor(playerRevenue * (0.5 + Math.random() * 0.9)) },
      { name: '中華そば 風来坊', revenue: Math.floor(playerRevenue * (0.4 + Math.random() * 1.0)) },
    ];
    
    const allShops = [
      { name: playerName, revenue: playerRevenue, isPlayer: true },
      ...rivals.map(r => ({ ...r, isPlayer: false }))
    ];
    allShops.sort((a, b) => b.revenue - a.revenue);
    
    const rankEmojis = ['🥇', '🥈', '🥉', '4️⃣'];
    let rankHtml = allShops.map((shop, i) => {
      const highlight = shop.isPlayer ? 'background:#fff9e6;border:2px solid #d4af37;font-weight:bold;' : 'border:1px solid #ddd;';
      return `<div style="padding:8px;margin:4px 0;border-radius:6px;${highlight}display:flex;justify-content:space-between;align-items:center;">
        <span>${rankEmojis[i]} ${shop.name}</span>
        <span>${shop.revenue.toLocaleString()}円</span>
      </div>`;
    }).join('');
    
    // Lost customer analysis
    let analysisHtml = '';
    const lostTotal = this.weeklyStats.lostCustomers;
    if (lostTotal > 0) {
      const reasons = Object.entries(this.weeklyStats.lostReasons)
        .sort((a, b) => b[1] - a[1])
        .map(([reason, count]) => `<div style="font-size:12px;">・${reason}: ${count}人</div>`)
        .join('');
      
      analysisHtml = `
        <div style="margin-top:12px;padding:8px;background:#fff0f0;border-radius:6px;border:1px solid #ffcdd2;">
          <div style="font-weight:bold;color:#d32f2f;">⚠️ 逃した客: ${lostTotal}人</div>
          ${reasons}
        </div>
      `;
    }
    
    // Advice based on lostReasons and reputationAxes
    let adviceHtml = '<div style="margin-top:12px;padding:8px;background:#e8f5e9;border-radius:6px;border:1px solid #c8e6c9;">';
    adviceHtml += '<div style="font-weight:bold;color:#2e7d32;">💡 アドバイス</div>';
    
    const advices = [];
    if ((this.weeklyStats.lostReasons['席不足'] || 0) > 3) {
      advices.push('席が足りません！テーブル席や座敷席を追加しましょう。');
    }
    if ((this.weeklyStats.lostReasons['待ち時間'] || 0) > 2) {
      advices.push('待ち時間が長すぎます。料理人を増やすか、受け渡し台を設置しましょう。');
    }
    if (this.reputationAxes.taste < 20) {
      advices.push('味の評判が低いです。レシピを改良してキレ・コク・香りを上げましょう。');
    }
    if (this.reputationAxes.service < 20) {
      advices.push('接客の評判が低いです。接客係を雇いましょう。');
    }
    if (this.reputationAxes.atmosphere < 15) {
      advices.push('雰囲気の評判が低いです。観葉植物を置いてみましょう。');
    }
    if (this.reputationAxes.value < 20) {
      advices.push('コスパの評判が低いです。価格設定を見直しましょう。');
    }
    if (advices.length === 0) {
      advices.push('順調です！この調子で営業を続けましょう！');
    }
    
    adviceHtml += advices.map(a => `<div style="font-size:12px;margin-top:4px;">・${a}</div>`).join('');
    adviceHtml += '</div>';
    
    // Weekly summary
    const summaryHtml = `
      <div style="margin-bottom:12px;padding:8px;background:white;border-radius:6px;border:1px solid #ddd;">
        <div style="font-size:13px;font-weight:bold;color:#654321;">📅 週間まとめ (Day ${this.day - 7}〜${this.day - 1})</div>
        <div style="font-size:12px;margin-top:4px;">売上合計: ${playerRevenue.toLocaleString()}円</div>
        <div style="font-size:12px;">来客合計: ${this.weeklyStats.customers}人</div>
      </div>
    `;
    
    document.getElementById('ranking-content').innerHTML = summaryHtml + rankHtml + analysisHtml + adviceHtml;
    document.getElementById('ranking-modal').classList.add('active');
    
    // Reset weekly stats
    this.weeklyStats = { revenue: 0, customers: 0, lostCustomers: 0, lostReasons: {} };
  }

  closeRanking() {
    document.getElementById('ranking-modal').classList.remove('active');
  }

  saveGame() {
    const save = {
      day: this.day,
      money: this.money,
      reputation: this.reputation,
      researchPoints: this.researchPoints,
      furniture: this.furniture,
      staff: this.staff.map(s => ({
        id: s.id,
        type: s.type,
        homeX: s.homeX,
        homeY: s.homeY,
        exp: s.exp || 0,
        level: s.level || 1
      })),
      unlockedResearch: this.unlockedResearch,
      activeRecipes: this.activeRecipes,
      availableRecipes: this.availableRecipes,
      discoveredCombos: this.discoveredCombos,
      stats: this.stats,
      nextStaffId: this.nextStaffId,
      nextGroupId: this.nextGroupId,
      storeLevel: this.storeLevel,
      gridWidth: this.gridWidth,
      gridHeight: this.gridHeight,
      recipes: this.recipes,
      nextRecipeId: this.nextRecipeId,
      achievements: this.achievements,
      activeEvents: this.activeEvents,
      eventLog: this.eventLog,
      dayHistory: this.dayHistory,
      ingredients: this.ingredients,
      reputationAxes: this.reputationAxes,
      sideMenuActive: this.sideMenuActive,
      season: this.season,
      weather: this.weather,
      weeklyStats: this.weeklyStats
    };
    localStorage.setItem('ramenStandSave', JSON.stringify(save));
  }

  loadGame() {
    const saved = localStorage.getItem('ramenStandSave');
    if (!saved) return;
    
    const save = JSON.parse(saved);
    this.day = save.day;
    this.money = save.money;
    this.reputation = save.reputation;
    this.researchPoints = save.researchPoints;
    this.furniture = save.furniture;
    this.unlockedResearch = save.unlockedResearch;
    this.activeRecipes = save.activeRecipes;
    this.availableRecipes = save.availableRecipes;
    this.discoveredCombos = save.discoveredCombos;
    this.stats = save.stats;
    this.nextStaffId = save.nextStaffId || 0;
    this.nextGroupId = save.nextGroupId || 0;
    this.storeLevel = save.storeLevel || 1;
    this.gridWidth = save.gridWidth || GRID_WIDTH;
    this.gridHeight = save.gridHeight || GRID_HEIGHT;
    this.updateGridSize(this.storeLevel);
    
    // レシピ復元（旧セーブ互換のマイグレーション付き）
    this.migrateRecipes(save);
    
    // レシピ価格を現在のコスト定義で再計算
    this.recipes.forEach(r => {
      const params = this.getRecipeParams(r);
      r.price = calculatePrice(params.cost, r.priceStrategy);
    });
    
    // 実績復元
    this.achievements = save.achievements || [];
    
    // イベント復元
    this.activeEvents = save.activeEvents || [];
    this.eventLog = save.eventLog || [];
    
    // 日次履歴復元
    this.dayHistory = save.dayHistory || [];
    
    // 新機能プロパティ復元
    this.ingredients = save.ingredients || {};
    this.reputationAxes = save.reputationAxes || { taste: 0, service: 0, atmosphere: 0, value: 0 };
    this.sideMenuActive = save.sideMenuActive || {};
    this.season = save.season || 'spring';
    this.weather = save.weather || 'sunny';
    this.weeklyStats = save.weeklyStats || { revenue: 0, customers: 0, lostCustomers: 0, lostReasons: {} };
    
    // Regenerate walls from store level
    this.walls = this.generateWalls(this.storeLevel);
    
    // Restore staff
    this.staff = [];
    if (save.staff && Array.isArray(save.staff)) {
      save.staff.forEach(sd => {
        const staffObj = {
          id: sd.id,
          type: sd.type,
          homeX: sd.homeX,
          homeY: sd.homeY,
          x: sd.homeX * TILE_SIZE + TILE_SIZE / 2 - 16,
          y: sd.homeY * TILE_SIZE + TILE_SIZE / 2 - 16,
          state: 'IDLE',
          path: [],
          pathIndex: 0,
          currentOrder: null,
          workTimer: 0,
          cookingStep: 0,
          element: null,
          carryingDish: false,
          workBubble: null,
          exp: sd.exp || 0,
          level: sd.level || 1
        };
        this.staff.push(staffObj);
      });
    }
    
    document.getElementById('title-screen').style.display = 'none';
    this.createGrid();
    this.renderWalls();
    this.renderFurniture();
    this.renderStaff();
    this.updateUI();
    this.renderTabContent();
    this.autoFitView();
  }

  startNew() {
    localStorage.removeItem('ramenStandSave');
    
    // デフォルトレシピ作成
    this.recipes = [this.createDefaultRecipe()];
    
    // Set initial store level and walls
    this.storeLevel = 1;
    this.updateGridSize(1);
    this.walls = this.generateWalls(1);
    
    // Place initial furniture
    INITIAL_FURNITURE.forEach((f, idx) => {
      this.furniture.push({

      x: 5 * TILE_SIZE + TILE_SIZE / 2 - 16,

      path: [],

      workTimer: 0,
      cookingStep: 0,
      element: null,

    this.nextStaffId = 1;
    
    document.getElementById('title-screen').style.display = 'none';
    this.createGrid();

    this.autoFitView();
    // チュートリアルを表示（新規ゲーム開始時のみ）
    this.showTutorial();
  }
}

// Fix onStaffArrived to handle all state transitions
const origOnStaffArrived = Game.prototype.onStaffArrived;
Game.prototype.onStaffArrived = function(staff) {
  // Server going to pickup food from handoff counter
  if (staff._goingToPickupFood && staff.state === 'MOVING') {
    staff._goingToPickupFood = false;
    staff.state = 'PICKING_UP_FOOD';
    staff.workTimer = 0;
    this.showWorkBubble(staff, '🍜');
    return;
  }

  // Server arrived at dirty dish location
  if (staff.type === 'server' && staff.state === 'MOVING' && !staff._afterSinkArrival) {
    staff.state = 'COLLECTING';
    staff.workTimer = 0;
    this.showWorkBubble(staff, '🧹');
    return;
  }
  
  // Cook collecting dirty dish (new behavior)
  if (staff.type === 'cook' && staff._cookCollectingDish && staff.state === 'MOVING') {
    staff._cookCollectingDish = false;
    staff.state = 'COLLECTING';
    staff.workTimer = 0;
    this.showWorkBubble(staff, '🧹');
    return;
  }
  
  // Cook/Server arrived at sink for cleaning
  if (staff._afterSinkArrival) {
    staff._afterSinkArrival = false;
    staff.state = 'CLEANING';
    staff.workTimer = 0;
    this.showWorkBubble(staff, '🚰');
    return;
  }
  
  // Cook arrived at handoff counter
  if (staff.state === 'DELIVERING_TO_HANDOFF') {
    staff.state = 'PLACING_FOOD';
    staff.workTimer = 0;
    this.showWorkBubble(staff, '🍜');
    return;
  }
  
  // Server delivered food to customer
  if (staff.state === 'DELIVERING_FOOD') {
    if (staff.currentOrder) {
      staff.currentOrder.mealsDelivered = (staff.currentOrder.mealsDelivered || 0) + 1;
      staff.currentOrder = null;
    }
    this.staffGoHome(staff);
    return;
  }
  
  if (staff.state === 'MOVING') {
    if (staff.type === 'cook') {
      staff.state = 'WORKING';
      staff.workTimer = 0;
      const recipe = staff.currentRecipe;
      if (recipe && staff.cookingStep < recipe.length) {
        const equipType = recipe[staff.cookingStep];
        const ft = FURNITURE_TYPES[equipType];
        if (ft) this.showWorkBubble(staff, ft.icon);
      }
    }
  } else if (staff.state === 'DELIVERING') {
    if (staff.currentOrder) {
      staff.currentOrder.mealsDelivered = (staff.currentOrder.mealsDelivered || 0) + 1;
      staff.currentOrder = null;
    }
    this.staffGoHome(staff);
  } else if (staff.state === 'RETURNING') {
    staff.state = 'IDLE';
    const homePixel = this.gridToPixel(staff.homeX, staff.homeY);
    staff.x = homePixel.x;
    staff.y = homePixel.y;
    if (staff.element) {
      staff.element.style.left = staff.x + 'px';
      staff.element.style.top = staff.y + 'px';
    }
  }
};

// Fix serverGoToSink to work for both servers and cooks
const origServerGoToSink = Game.prototype.serverGoToSink;
Game.prototype.serverGoToSink = function(staff) {
  const sink = this.furniture.find(f => f.type === 'dishwashingSink');
  if (!sink) {
    staff.carryingDish = false;
    this.staffGoHome(staff);
    return;
  }
  
  const curGrid = this.pixelToGrid(staff.x, staff.y);
  const path = this.findPath(curGrid.x, curGrid.y, sink.x, sink.y, true);
  staff.path = path;
  staff.pathIndex = 0;
  staff.state = 'MOVING';
  staff._afterSinkArrival = true;
};

// ========== 日次グラフ・統計システム ==========

Game.prototype.renderAnalyticsCards = function() {
  const h = this.dayHistory;
  if (h.length === 0) return '';
  
  const totalRevenue = h.reduce((s, d) => s + d.revenue, 0);
  const totalProfit = h.reduce((s, d) => s + d.profit, 0);
  const totalCustomers = h.reduce((s, d) => s + d.customers, 0);
  const totalSatisfied = h.reduce((s, d) => s + d.satisfied, 0);
  const avgRevenue = Math.round(totalRevenue / h.length);
  const avgCustomers = Math.round(totalCustomers / h.length * 10) / 10;
  const bestDay = h.reduce((best, d) => d.revenue > best.revenue ? d : best, h[0]);
  const satisfactionRate = totalCustomers > 0 ? Math.round(totalSatisfied / totalCustomers * 100) : 0;
  
  return `<div class="analytics-grid">
    <div class="analytics-card">
      <div class="analytics-card-value">${avgRevenue}円</div>
      <div class="analytics-card-label">平均売上/日</div>
    </div>
    <div class="analytics-card">
      <div class="analytics-card-value">${avgCustomers}人</div>
      <div class="analytics-card-label">平均来客/日</div>
    </div>
    <div class="analytics-card">
      <div class="analytics-card-value">Day ${bestDay.day}</div>
      <div class="analytics-card-label">最高売上日 (${bestDay.revenue}円)</div>
    </div>
    <div class="analytics-card">
      <div class="analytics-card-value">${satisfactionRate}%</div>
      <div class="analytics-card-label">満足度</div>
    </div>
  </div>`;
};

Game.prototype.drawHistoryChart = function() {
  const canvas = document.getElementById('history-chart');
  if (!canvas || this.dayHistory.length < 2) return;
  
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  
  const W = rect.width;
  const H = rect.height;
  const pad = { top: 10, right: 10, bottom: 24, left: 44 };
  const plotW = W - pad.left - pad.right;
  const plotH = H - pad.top - pad.bottom;
  
  const data = this.dayHistory;
  const n = data.length;
  
  // Compute scales
  const maxRevenue = Math.max(...data.map(d => d.revenue), 1);
  const minProfit = Math.min(...data.map(d => d.netProfit !== undefined ? d.netProfit : d.profit), 0);
  const maxProfit = Math.max(...data.map(d => d.netProfit !== undefined ? d.netProfit : d.profit), 1);
  const maxY = Math.max(maxRevenue, maxProfit);
  const minY = Math.min(0, minProfit);
  const rangeY = maxY - minY || 1;
  
  const maxCustomers = Math.max(...data.map(d => d.customers), 1);
  
  const xStep = plotW / (n - 1);
  
  function toX(i) { return pad.left + i * xStep; }
  function toY(v) { return pad.top + plotH - ((v - minY) / rangeY) * plotH; }
  function toCY(v) { return pad.top + plotH - (v / maxCustomers) * plotH; }
  
  // Clear
  ctx.clearRect(0, 0, W, H);
  
  // Grid lines
  ctx.strokeStyle = '#e0e0e0';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + (plotH / 4) * i;
    ctx.beginPath();
    ctx.moveTo(pad.left, y);
    ctx.lineTo(W - pad.right, y);
    ctx.stroke();
  }
  
  // Zero line if needed
  if (minY < 0) {
    const zeroY = toY(0);
    ctx.strokeStyle = '#bbb';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(pad.left, zeroY);
    ctx.lineTo(W - pad.right, zeroY);
    ctx.stroke();
    ctx.setLineDash([]);
  }
  
  // Y-axis labels
  ctx.fillStyle = '#888';
  ctx.font = '10px Arial';
  ctx.textAlign = 'right';
  for (let i = 0; i <= 4; i++) {
    const val = minY + (rangeY / 4) * (4 - i);
    const y = pad.top + (plotH / 4) * i;
    ctx.fillText(val >= 1000 ? Math.round(val / 1000) + 'k' : Math.round(val), pad.left - 4, y + 3);
  }
  
  // X-axis labels
  ctx.textAlign = 'center';
  const labelStep = Math.max(1, Math.floor(n / 6));
  for (let i = 0; i < n; i += labelStep) {
    ctx.fillText('D' + data[i].day, toX(i), H - 4);
  }
  // Always show last day
  if ((n - 1) % labelStep !== 0) {
    ctx.fillText('D' + data[n - 1].day, toX(n - 1), H - 4);
  }
  
  // Draw line helper
  function drawLine(points, color, width) {
    ctx.strokeStyle = color;
    ctx.lineWidth = width;
    ctx.lineJoin = 'round';
    ctx.beginPath();
    points.forEach((p, i) => i === 0 ? ctx.moveTo(p[0], p[1]) : ctx.lineTo(p[0], p[1]));
    ctx.stroke();
  }
  
  // Draw fill area under revenue
  const revPoints = data.map((d, i) => [toX(i), toY(d.revenue)]);
  ctx.fillStyle = 'rgba(76, 175, 80, 0.1)';
  ctx.beginPath();
  ctx.moveTo(revPoints[0][0], toY(0));
  revPoints.forEach(p => ctx.lineTo(p[0], p[1]));
  ctx.lineTo(revPoints[n - 1][0], toY(0));
  ctx.closePath();
  ctx.fill();
  
  // Revenue line
  drawLine(revPoints, '#4caf50', 2);
  
  // Net Profit line (use netProfit if available, fallback to profit)
  const profPoints = data.map((d, i) => [toX(i), toY(d.netProfit !== undefined ? d.netProfit : d.profit)]);
  drawLine(profPoints, '#2196f3', 2);
  
  // Customer line (right axis)
  const custPoints = data.map((d, i) => [toX(i), toCY(d.customers)]);
  ctx.setLineDash([4, 3]);
  drawLine(custPoints, '#ff9800', 1.5);
  ctx.setLineDash([]);
  
  // Dots
  revPoints.forEach(p => { ctx.fillStyle = '#4caf50'; ctx.beginPath(); ctx.arc(p[0], p[1], 3, 0, Math.PI * 2); ctx.fill(); });
  profPoints.forEach(p => { ctx.fillStyle = '#2196f3'; ctx.beginPath(); ctx.arc(p[0], p[1], 3, 0, Math.PI * 2); ctx.fill(); });
  custPoints.forEach(p => { ctx.fillStyle = '#ff9800'; ctx.beginPath(); ctx.arc(p[0], p[1], 2.5, 0, Math.PI * 2); ctx.fill(); });
};

Game.prototype.tutorialStep = 0;
Game.prototype.tutorialShown = false;

Game.prototype.showTutorial = function() {
  this.tutorialStep = 0;
  this.tutorialShown = true;
  this._renderTutorialStep();
  document.getElementById('tutorial-overlay').classList.add('active');
};

Game.prototype.closeTutorial = function() {
  document.getElementById('tutorial-overlay').classList.remove('active');
};

Game.prototype._renderTutorialStep = function() {
  const step = TUTORIAL_STEPS[this.tutorialStep];
  const total = TUTORIAL_STEPS.length;
  
  document.getElementById('tutorial-icon').textContent = step.icon;
  document.getElementById('tutorial-title').textContent = step.title;
  document.getElementById('tutorial-desc').textContent = step.desc;
  
  // Dots
  const dotsHtml = TUTORIAL_STEPS.map((_, i) => {
    let cls = 'tutorial-dot';
    if (i < this.tutorialStep) cls += ' done';
    if (i === this.tutorialStep) cls += ' active';
    return `<div class="${cls}"></div>`;
  }).join('');
  document.getElementById('tutorial-dots').innerHTML = dotsHtml;
  
  // Buttons
  const isFirst = this.tutorialStep === 0;
  const isLast = this.tutorialStep === total - 1;
  let btnsHtml = '';
  if (!isLast) {
    btnsHtml += `<button class="tutorial-skip-btn" onclick="game.closeTutorial()">スキップ</button>`;
  }
  if (!isFirst) {
    btnsHtml += `<button onclick="game.tutorialPrev()" style="background:#ccc;">← 戻る</button>`;
  }
  if (isLast) {
    btnsHtml += `<button onclick="game.closeTutorial()">はじめる！</button>`;
  } else {
    btnsHtml += `<button onclick="game.tutorialNext()">次へ →</button>`;
  }
  document.getElementById('tutorial-buttons').innerHTML = btnsHtml;
};

Game.prototype.tutorialNext = function() {
  if (this.tutorialStep < TUTORIAL_STEPS.length - 1) {
    this.tutorialStep++;
    this._renderTutorialStep();
  }
};

Game.prototype.tutorialPrev = function() {
  if (this.tutorialStep > 0) {
    this.tutorialStep--;
    this._renderTutorialStep();
  }
};

const game = new Game();
game.init();
