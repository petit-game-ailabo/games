    const bubble = document.createElement('div');
    bubble.className = 'staff-work-bubble';
    bubble.textContent = emoji;
    staff.element.appendChild(bubble);
    staff.workBubble = bubble;
  }

  removeWorkBubble(staff) {
    if (staff.workBubble && staff.workBubble.parentNode) {
      staff.workBubble.remove();
    }
    staff.workBubble = null;
  }

  showHandoffFoodIcon() {
    const handoffCounter = this.furniture.find(f => f.type === 'handoffCounter');
    if (!handoffCounter) return;
    // Only show one icon at a time (for visual simplicity)
    if (!document.querySelector('.handoff-food-icon')) {
      const el = document.createElement('div');
      el.className = 'handoff-food-icon';
      el.style.left = (handoffCounter.x * TILE_SIZE + TILE_SIZE / 2 - 10) + 'px';
      el.style.top = (handoffCounter.y * TILE_SIZE + TILE_SIZE / 2 - 18) + 'px';
      el.textContent = '🍜';
      document.getElementById('shop-interior').appendChild(el);
    }
  }

  removeHandoffFoodIcon() {
    // Remove one icon; if queue still has items, keep showing
    if (this.handoffQueue.length === 0) {
      const icon = document.querySelector('.handoff-food-icon');
      if (icon) icon.remove();
    }
  }

  serverDeliverFoodToCustomer(staff) {
    const customer = staff.currentOrder;
    if (!customer || !customer.seat) {
      staff.currentOrder = null;
      this.staffGoHome(staff);
      return;
    }
    
    const seatX = customer.seat.x;
    const seatY = customer.seat.y;
    const curGrid = this.pixelToGrid(staff.x, staff.y);
    
    const grid = this.buildOccupancyGrid();
    const adjacentTiles = [
      {x: seatX - 1, y: seatY}, {x: seatX + 1, y: seatY},
      {x: seatX, y: seatY - 1}, {x: seatX, y: seatY + 1}
    ].filter(t => t.x >= 0 && t.x < this.gridWidth && t.y >= 0 && t.y < this.gridHeight && !grid[t.y][t.x]);
    
    let bestPath = null;
    for (const adj of adjacentTiles) {
      const path = this._bfs(grid, curGrid.x, curGrid.y, adj.x, adj.y);
      if (path && (!bestPath || path.length < bestPath.length)) {
        bestPath = path;
      }
    }
    
    if (!bestPath) {
      // Can't reach, just deliver directly
      customer.mealsDelivered = (customer.mealsDelivered || 0) + 1;
      staff.currentOrder = null;
      this.staffGoHome(staff);
      return;
    }
    
    staff.path = bestPath;
    staff.pathIndex = 0;
    staff.state = 'DELIVERING_FOOD';
  }

  staffGoHome(staff) {
    const curGrid = this.pixelToGrid(staff.x, staff.y);
    const path = this.findPath(curGrid.x, curGrid.y, staff.homeX, staff.homeY, false);
    staff.path = path;
    staff.pathIndex = 0;
    staff.state = 'RETURNING';
  }

  // ========== Cook Logic ==========
  cookIdleCheck(staff) {
    // Priority 1: Cook food orders
    if (this.orderQueue.length > 0) {
      this.cookTakeOrder(staff);
      return;
    }
    
    // Priority 2: If no orders and no idle server, help with dirty dishes
    const unclaimed = this.dirtyDishes.filter(d => !d.claimed && !d.done);
    if (unclaimed.length > 0) {
      const hasIdleServer = this.staff.some(s => s.type === 'server' && s.state === 'IDLE');
      if (!hasIdleServer) {
        const dish = unclaimed[0];
        dish.claimed = true;
        staff.targetDish = dish;
        
        const curGrid = this.pixelToGrid(staff.x, staff.y);
        const path = this.findPath(curGrid.x, curGrid.y, dish.gridX, dish.gridY, true);
        staff.path = path;
        staff.pathIndex = 0;
        staff.state = 'MOVING';
        staff._cookCollectingDish = true;
        return;
      }
    }
  }

  cookTakeOrder(staff) {
    // Take first order
    const order = this.orderQueue.shift();
    staff.currentOrder = order;
    staff.cookingStep = 0;
    
    // 動的調理ステップ生成: 客が注文したレシピから自動決定
    const orderedRecipe = order ? order.orderedRecipe : null;
    const steps = generateCookingSteps(orderedRecipe);
    
    // Filter steps to only equipment that exists on the grid
    staff.currentRecipe = [];
    staff.skippedSteps = 0;
    for (const equipType of steps) {
      const equip = this.furniture.find(f => f.type === equipType);
      if (equip) {
        staff.currentRecipe.push(equipType);
      } else {
        // noodleMachineはオプション設備なのでスキップしてもペナルティなし
        if (equipType !== 'noodleMachine') {
          staff.skippedSteps++;
        }
      }
    }
    
    // Start cooking sequence
    this.cookGoToNextEquipment(staff);
  }

  cookGoToNextEquipment(staff) {
    if (staff.cookingStep >= staff.currentRecipe.length) {
      // Done cooking, deliver to customer
      this.cookDeliverFood(staff);
      return;
    }
    
    const equipType = staff.currentRecipe[staff.cookingStep];
    const equip = this.furniture.find(f => f.type === equipType);
    
    if (!equip) {
      // Skip
      staff.cookingStep++;
      this.cookGoToNextEquipment(staff);
      return;
    }
    
    // Find adjacent tile to equipment (cook works next to equipment, not on it)
    const curGrid = this.pixelToGrid(staff.x, staff.y);
    const grid = this.buildOccupancyGrid();
    const adjacentTiles = [
      {x: equip.x - 1, y: equip.y}, {x: equip.x + 1, y: equip.y},
      {x: equip.x, y: equip.y - 1}, {x: equip.x, y: equip.y + 1}
    ].filter(t => t.x >= 0 && t.x < this.gridWidth && t.y >= 0 && t.y < this.gridHeight && !grid[t.y][t.x]);
    
    let bestPath = null;
    for (const adj of adjacentTiles) {
      const path = this._bfs(grid, curGrid.x, curGrid.y, adj.x, adj.y);
      if (path && (!bestPath || path.length < bestPath.length)) {
        bestPath = path;
      }
    }
    
    if (!bestPath) {
      // Fallback: use findPath with allowEndBlocked
      bestPath = this.findPath(curGrid.x, curGrid.y, equip.x, equip.y, true);
    }
    
    staff.path = bestPath;
    staff.pathIndex = 0;
    staff.state = 'MOVING';
  }

  cookNextStep(staff) {
    staff.cookingStep++;
    this.cookGoToNextEquipment(staff);
  }

  cookDeliverFood(staff) {
    soundMgr.playCookDone();
    const customer = staff.currentOrder;
    // 調理でスキップしたステップ数を客に記録（品質計算に反映）
    if (customer) {
      customer.cookingSkippedSteps = staff.skippedSteps || 0;
    }
    if (!customer || !customer.seat) {
      // Customer left, return home
      staff.currentOrder = null;
      this.staffGoHome(staff);
      return;
    }
    
    // Check if handoff counter exists AND a server exists
    const handoffCounter = this.furniture.find(f => f.type === 'handoffCounter');
    const hasServer = this.staff.some(s => s.type === 'server');
    
    if (handoffCounter && hasServer) {
      // Cook delivers to handoff counter instead of directly to customer
      const curGrid = this.pixelToGrid(staff.x, staff.y);
      const path = this.findPath(curGrid.x, curGrid.y, handoffCounter.x, handoffCounter.y, true);
      staff.path = path;
      staff.pathIndex = 0;
      staff.state = 'DELIVERING_TO_HANDOFF';
      return;
    }
    
    // No handoff counter or no server: deliver directly to customer (backward compatible)
    // Find adjacent tile to customer's seat
    const seatX = customer.seat.x;
    const seatY = customer.seat.y;
    const curGrid = this.pixelToGrid(staff.x, staff.y);
    
    // Try to path to an adjacent tile of the seat
    const grid = this.buildOccupancyGrid();
    const adjacentTiles = [
      {x: seatX - 1, y: seatY}, {x: seatX + 1, y: seatY},
      {x: seatX, y: seatY - 1}, {x: seatX, y: seatY + 1}
    ].filter(t => t.x >= 0 && t.x < this.gridWidth && t.y >= 0 && t.y < this.gridHeight && !grid[t.y][t.x]);
    
    let bestPath = null;
    for (const adj of adjacentTiles) {
      const path = this._bfs(grid, curGrid.x, curGrid.y, adj.x, adj.y);
      if (path && (!bestPath || path.length < bestPath.length)) {
        bestPath = path;
      }
    }
    
    if (!bestPath) {
      // Can't reach customer, just deliver directly
      customer.mealsDelivered = (customer.mealsDelivered || 0) + 1;
      staff.currentOrder = null;
      this.staffGoHome(staff);
      return;
    }
    
    staff.path = bestPath;
    staff.pathIndex = 0;
    staff.state = 'DELIVERING';
  }

  // ========== Server Logic ==========
  serverIdleCheck(staff) {
    // Priority 1: Pick up food from handoff counter
    if (this.handoffQueue.length > 0) {
      const handoffCounter = this.furniture.find(f => f.type === 'handoffCounter');
      if (handoffCounter) {
        const item = this.handoffQueue.shift();
        staff.currentOrder = item.customer;
        
        const curGrid = this.pixelToGrid(staff.x, staff.y);
        const path = this.findPath(curGrid.x, curGrid.y, handoffCounter.x, handoffCounter.y, true);
        staff.path = path;
        staff.pathIndex = 0;
        staff.state = 'MOVING';
        staff._goingToPickupFood = true;
        return;
      }
    }
    
    // Priority 2: Collect dirty dishes
    if (this.dirtyDishes.length === 0) return;
    
    // Find nearest unclaimed dirty dish
    const unclaimed = this.dirtyDishes.filter(d => !d.claimed && !d.done);
    if (unclaimed.length === 0) return;
    
    const dish = unclaimed[0];
    dish.claimed = true;
    staff.targetDish = dish;
    
    const curGrid = this.pixelToGrid(staff.x, staff.y);
    const path = this.findPath(curGrid.x, curGrid.y, dish.gridX, dish.gridY, true);
    staff.path = path;
    staff.pathIndex = 0;
    staff.state = 'MOVING';
  }

  serverGoToSink(staff) {
    const sink = this.furniture.find(f => f.type === 'dishwashingSink');
    if (!sink) {
      // No sink, just go home
      staff.carryingDish = false;
      this.staffGoHome(staff);
      return;
    }
    
    const curGrid = this.pixelToGrid(staff.x, staff.y);
    const path = this.findPath(curGrid.x, curGrid.y, sink.x, sink.y, true);
    staff.path = path;
    staff.pathIndex = 0;
    staff.state = 'MOVING';
    
    // Override onArrived for cleaning
    staff._afterSinkArrival = true;
  }

  getSpawnRate() {
    // Time-period based spawn rate
    const period = this.getTimePeriod();
    let baseRate;
    switch (period) {
      case 'morning': baseRate = 2.5; break;   // 朝: まばら
      case 'lunch':   baseRate = 1.0; break;   // 昼: ランチラッシュ
      case 'evening': baseRate = 1.8; break;   // 夜: やや落ち着く
      default: baseRate = 2.0;
    }
    
    // Sign bonus
    if (this.furniture.some(f => f.type === 'sign')) {
      baseRate *= 0.8;
    }
    
    // Event effects on customer spawn rate
    const customerBoost = this.getEventMultiplier('customerBoost');
    const customerReduction = this.getEventMultiplier('customerReduction');
    // Lower rate = more customers, so divide by boost and multiply by reduction inverse
    baseRate = baseRate / customerBoost;
    if (customerReduction < 1) {
      baseRate = baseRate / customerReduction; // reduction value like 0.7 means fewer customers
    }
    
    // Weather effect on spawn rate
    const weatherMult = this.getWeatherCustomerMultiplier();
    if (weatherMult < 1) {
      baseRate = baseRate / weatherMult;
    }
    
    return baseRate;
  }

  spawnPedestrian() {
    // 基本集客率 + 評判ボーナス + 価格影響
    let attractRate = 0.2 + (this.reputation / 500);
    // 提供中レシピの平均売価で集客率を調整
    const activeList = this.getActiveRecipes();
    if (activeList.length > 0) {
      const avgPrice = activeList.reduce((sum, r) => sum + r.price, 0) / activeList.length;
      // 350円を基準: 安いほど集客UP、高いほどDOWN
      const priceFactor = 1 + (350 - avgPrice) / 1000;
      attractRate *= Math.max(0.3, Math.min(1.5, priceFactor));
    }
    const streetY = TILE_SIZE * this.streetRow + TILE_SIZE / 2;
    const type = this.getCustomerType();
    const attracted = Math.random() < attractRate;
    const speed = 80 + Math.random() * 30;
    
    // Family/friends: spawn individual customers as a group
    if (type === 'family' || type === 'friends') {
      const groupSize = type === 'family' ? 2 + Math.floor(Math.random() * 5) : 2 + Math.floor(Math.random() * 3);
      const groupId = 'g' + this.nextGroupId++;
      const groupMembers = [];
      
      for (let i = 0; i < groupSize; i++) {
        const customer = {
          id: 'c' + this.nextCustomerId++,
          state: 'WALKING_STREET',
          x: -20 - (i * 15),
          y: streetY + (i % 2 === 0 ? 0 : (i % 4 === 1 ? -5 : 5)),
          targetX: this.gridWidth * TILE_SIZE + 40,
          targetY: streetY,
          speed: speed,
          type: type,
          moveTimer: 0,
          eatTimer: 0,
          attracted: attracted,
          element: null,
          seat: null,
          satisfied: false,
          paid: 0,
          foodDelivered: false,
          waitingFoodTimer: 0,
          dirtyDish: false,
          groupId: groupId,
          groupIndex: i,
          groupSize: groupSize,
          groupMembers: groupMembers,
          seatPenalty: false,
          mealsOrdered: 1,
          mealsDelivered: 0
        };
        groupMembers.push(customer);
        this.customers.push(customer);
        this.createCustomerElement(customer);
      }
    } else {
      // Solo customer
      const customer = {
        id: 'c' + this.nextCustomerId++,
        state: 'WALKING_STREET',
        x: -20,
        y: streetY,
        targetX: this.gridWidth * TILE_SIZE + 40,
        targetY: streetY,
        speed: speed,
        type: type,
        moveTimer: 0,
        eatTimer: 0,
        attracted: attracted,
        element: null,
        seat: null,
        satisfied: false,
        paid: 0,
        foodDelivered: false,
        waitingFoodTimer: 0,
        dirtyDish: false,
        groupSize: 1,
        mealsOrdered: 1,
        mealsDelivered: 0
      };
      
      this.customers.push(customer);
      this.createCustomerElement(customer);
    }
  }

  getCustomerType() {
    const types = ['regular', 'student', 'businessman', 'foodie', 'family', 'friends'];
    // 時間帯ごとの客層ウェイト
    let weights;
    switch (this.getTimePeriod()) {
      case 'morning':
        // 朝: サラリーマン多め、学生少なめ
        weights = [30, 8, 30, 5, 15, 12];
        break;
      case 'lunch':
        // 昼: 学生・ファミリー・友達グループ増加
        weights = [25, 25, 15, 8, 18, 9];
        break;
      case 'evening':
        // 夜: 食通・友達多め、ファミリー減少
        weights = [25, 10, 15, 25, 8, 17];
        break;
      default:
        weights = [40, 15, 15, 10, 12, 8];
    }
    const total = weights.reduce((a, b) => a + b, 0);
    let random = Math.random() * total;
    
    for (let i = 0; i < types.length; i++) {
      random -= weights[i];
      if (random <= 0) return types[i];
    }
    return types[0];
  }

  createCustomerElement(customer) {
    const el = document.createElement('div');
    el.className = 'customer';
    el.style.left = customer.x + 'px';
    el.style.top = customer.y + 'px';
    
    const body = document.createElement('div');
    body.className = 'customer-body';
    const colors = {
      regular: '#6b9bd1',
      student: '#4caf50',
      businessman: '#1565c0',
      foodie: '#d32f2f',
      family: '#e91e63',
      friends: '#ff9800'
    };
    body.style.background = colors[customer.type];
    
    const face = document.createElement('div');
    face.className = 'customer-face';
    const faceEmojis = {
      regular: '😀', student: '😀', businessman: '😀', foodie: '😀',
      family: '😀', friends: '😀'
    };
    face.textContent = faceEmojis[customer.type] || '😀';
    
    el.appendChild(body);
    el.appendChild(face);
    
    // クリック/タップで感想を表示
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      this.showCustomerFeedback(customer);
    });
    
    customer.element = el;
    customer.faceElement = face;
    
    document.getElementById('shop-world').appendChild(el);
  }

  updateCustomer(customer, deltaTime) {
    if (!customer.element) return;
    
    customer.moveTimer += deltaTime;
    
    switch (customer.state) {
      case 'WALKING_STREET':
        // Group followers: follow leader with offset
        if (customer.groupId && customer.groupIndex > 0) {
          const leader = customer.groupMembers[0];
          if (leader && leader.state === 'WALKING_STREET') {
            customer.targetX = leader.targetX;
            customer.targetY = leader.targetY;
            // Follow leader position with offset
            const offsetX = customer.groupIndex * 15;
            const offsetY = customer.groupIndex % 2 === 0 ? 0 : (customer.groupIndex % 4 === 1 ? -5 : 5);
            const leaderDx = leader.x - offsetX;
            if (customer.x < leaderDx - 2) {
              customer.x += customer.speed * deltaTime;
            }
            customer.element.style.left = customer.x + 'px';
            customer.element.style.top = customer.y + 'px';
          } else if (leader && leader.state === 'ENTERING') {
            // Leader entered, followers follow
            const entrancePixelX2 = this.getEntranceXCenter() * TILE_SIZE;
            const entranceY2 = this.getEntranceY();
            customer.state = 'ENTERING';
            customer.targetX = entrancePixelX2 + (customer.groupIndex % 2 === 0 ? -5 : 5);
            customer.targetY = entranceY2 * TILE_SIZE + TILE_SIZE / 2;
          } else if (leader && (leader.state === 'EXITING' || leader.state === 'EXITED')) {
            this.removeCustomer(customer);
          }
          // Exit if walked off screen
          if (customer.x >= this.gridWidth * TILE_SIZE + 20) {
            this.removeCustomer(customer);
          }
          break;
        }
        
        this.moveToTarget(customer, deltaTime);
        
        // Auto bubble for street walkers (once only, ~10% over walking duration)
        if (!customer.streetBubbleShown && Math.random() < 0.008) {
          customer.streetBubbleShown = true;
          const msgs = ['いい匂い…', 'ラーメン食べたいな', 'お腹すいた…', 'ここ評判いいのかな'];
          this.showBubble(customer, msgs[Math.floor(Math.random() * msgs.length)]);
        }
        
        // Check if attracted — entrance is at center of grid
        const entrancePixelX = this.getEntranceXCenter() * TILE_SIZE;
        if (customer.attracted && customer.x > entrancePixelX - 40 && customer.x < entrancePixelX + 40 && !customer.noticeShown) {
          customer.noticeShown = true;
          this.showBubble(customer, '!');
          // Target: entrance gap position
          const entranceY = this.getEntranceY();
          setTimeout(() => {
            customer.state = 'ENTERING';
            customer.targetX = entrancePixelX;
            customer.targetY = entranceY * TILE_SIZE + TILE_SIZE / 2;
            // Also transition group members
            if (customer.groupMembers) {
              customer.groupMembers.forEach((m, idx) => {
                if (idx === 0) return; // leader already set
                // Followers will pick up state change in their WALKING_STREET handler
              });
            }
          }, 500);
        }
        
        // Exit if not attracted
        if (customer.x >= this.gridWidth * TILE_SIZE + 20) {
          this.removeCustomer(customer);
          // Also remove group members walking off screen
          if (customer.groupMembers) {
            customer.groupMembers.forEach(m => {
              if (m !== customer && m.state === 'WALKING_STREET') {
                this.removeCustomer(m);
              }
            });
          }
        }
        break;
        
      case 'ENTERING':
        // Group followers wait for leader to find seats
        if (customer.groupId && customer.groupIndex > 0) {
          // Follow leader movement
          if (customer.path && customer.path.length > 0) {
            this.moveCustomerAlongPath(customer, deltaTime);
          } else {
            this.moveToTarget(customer, deltaTime);
          }
          break;
        }
        
        // Auto bubble on entering (30% chance, once)
        if (!customer.enterBubbleShown) {
          customer.enterBubbleShown = true;
          if (Math.random() < 0.3) {
            const enterMsgs = ['いい匂い！', 'ラーメン食べたい！', 'ここが評判の店か', 'お腹すいた〜'];
            this.showBubble(customer, enterMsgs[Math.floor(Math.random() * enterMsgs.length)]);
          }
        }
        if (customer.path && customer.path.length > 0) {
          this.moveCustomerAlongPath(customer, deltaTime);
        } else {
          this.moveToTarget(customer, deltaTime);
        }
        if (this.isAtTarget(customer)) {
          // Group leader finds seats for the whole group
          if (customer.groupMembers && customer.groupMembers.length > 1) {
            const gSize = customer.groupMembers.length;
            // Try group seat (table/tatami) first
            const groupSeat = this.findGroupSeat(gSize);
            if (groupSeat) {
              const ft = FURNITURE_TYPES[groupSeat.furniture.type];
              customer.groupMembers.forEach((m, idx) => {
                m.seat = { x: groupSeat.furniture.x + (idx % ft.width), y: groupSeat.furniture.y + Math.floor(idx / ft.width), occupied: true, furniture: groupSeat.furniture, isGroupSeat: true };
                m.targetX = (groupSeat.furniture.x + (idx % ft.width)) * TILE_SIZE + TILE_SIZE / 2 - 6;
                m.targetY = (groupSeat.furniture.y + Math.floor(idx / ft.width)) * TILE_SIZE + TILE_SIZE / 2 - 6;
                m.state = 'FINDING_SEAT';
                this.calculateCustomerPath(m);
              });
            } else {
              // Try individual counter seats for each member
              const seats = [];
              const assignedSeats = [];
              for (let i = 0; i < gSize; i++) {
                const seat = this.findEmptySeat(assignedSeats);
                if (seat) {
                  seat.occupied = true;
                  assignedSeats.push(seat);
                  seats.push(seat);
                }
              }
              if (seats.length === gSize) {
                // Everyone gets a seat but with penalty
                customer.groupMembers.forEach((m, idx) => {
                  m.seat = seats[idx];
                  m.seatPenalty = true;
                  m.targetX = seats[idx].x * TILE_SIZE + TILE_SIZE / 2 - 6;
                  m.targetY = seats[idx].y * TILE_SIZE + TILE_SIZE / 2 - 6;
                  m.state = 'FINDING_SEAT';
                  this.calculateCustomerPath(m);
                });
                // Show complaint on random member
                const complainer = customer.groupMembers[Math.floor(Math.random() * gSize)];
                setTimeout(() => this.showBubble(complainer, 'テーブル席が良かったな…'), 2000);
              } else {
                // Not enough seats, release grabbed seats
                seats.forEach(s => { s.occupied = false; });
                // Join waiting queue or leave
                if (this.waitingQueue.length < 5) {
                  customer.groupMembers.forEach(m => {
                    m.state = 'WAITING_IN_LINE';
                    m.waitTimer = 0;
                  });
                  this.waitingQueue.push(customer); // Only leader in queue
                  this.repositionWaitingQueue();
                  this.showBubble(customer, '待ってます…');
                } else {
                  this.showBubble(customer, '混みすぎ…');
                  this.weeklyStats.lostCustomers += customer.groupMembers.length;
                  this.weeklyStats.lostReasons['席不足'] = (this.weeklyStats.lostReasons['席不足'] || 0) + customer.groupMembers.length;
                  customer.groupMembers.forEach(m => {
                    m.state = 'LEAVING';
                    const ey = this.getEntranceY();
                    m.targetX = this.getEntranceXCenter() * TILE_SIZE;
                    m.targetY = ey * TILE_SIZE + TILE_SIZE / 2;
                    m.path = null;
                  });
                  this.reputation = Math.max(0, this.reputation - 1);
                }
              }
            }
          } else {
            // Solo customer
            let seat = this.findEmptySeat();
            if (seat) {
              customer.seat = seat;
              customer.state = 'FINDING_SEAT';
              customer.targetX = seat.x * TILE_SIZE + TILE_SIZE / 2 - 6;
              customer.targetY = seat.y * TILE_SIZE + TILE_SIZE / 2 - 6;
              this.calculateCustomerPath(customer);
            } else {
              // No seat available — join waiting queue
              if (this.waitingQueue.length < 5) {
                customer.state = 'WAITING_IN_LINE';
                customer.waitTimer = 0;
                this.waitingQueue.push(customer);
                this.repositionWaitingQueue();
                this.showBubble(customer, '待ってます…');
              } else {
                this.showBubble(customer, '混みすぎ…');
                this.weeklyStats.lostCustomers += 1;
                this.weeklyStats.lostReasons['席不足'] = (this.weeklyStats.lostReasons['席不足'] || 0) + 1;
                customer.state = 'LEAVING';
                const entranceY = this.getEntranceY();
                customer.targetX = this.getEntranceXCenter() * TILE_SIZE;
                customer.targetY = entranceY * TILE_SIZE + TILE_SIZE / 2;
                customer.path = null;
                this.reputation = Math.max(0, this.reputation - 1);
              }
            }
          }
        }
        break;
        
      case 'WAITING_IN_LINE':
        // Group followers just wait near leader
        if (customer.groupId && customer.groupIndex > 0) {
          const leader2 = customer.groupMembers[0];
          if (leader2 && leader2.state !== 'WAITING_IN_LINE') {
            // Leader moved on, follow
            customer.state = leader2.state;
            customer.targetX = leader2.targetX + (customer.groupIndex % 2 === 0 ? -5 : 5);
            customer.targetY = leader2.targetY;
          }
          if (customer.path && customer.path.length > 0) {
            this.moveCustomerAlongPath(customer, deltaTime);
          } else {
            this.moveToTarget(customer, deltaTime);
          }
          break;
        }
        if (customer.path && customer.path.length > 0) {
          this.moveCustomerAlongPath(customer, deltaTime);
        } else {
          this.moveToTarget(customer, deltaTime);
        }
        customer.waitTimer += deltaTime;
        if (customer.waitTimer >= 15) {
          this.showBubble(customer, '待てない…');
          const leaveCount = (customer.groupMembers || [customer]).length;
          this.weeklyStats.lostCustomers += leaveCount;
          this.weeklyStats.lostReasons['待ち時間'] = (this.weeklyStats.lostReasons['待ち時間'] || 0) + leaveCount;
          this.waitingQueue = this.waitingQueue.filter(c => c !== customer);
          this.repositionWaitingQueue();
          // Leave with all group members
          const leaveGroup = customer.groupMembers || [customer];
          leaveGroup.forEach(m => {
            m.state = 'LEAVING';
            const streetY3 = TILE_SIZE * this.streetRow + TILE_SIZE / 2;
            m.targetX = -20;
            m.targetY = streetY3;
            m.path = null;
          });
          this.reputation = Math.max(0, this.reputation - 1);
        }
        break;
        
      case 'FINDING_SEAT':
        if (customer.path && customer.path.length > 0) {
          this.moveCustomerAlongPath(customer, deltaTime);
        } else {
          this.moveToTarget(customer, deltaTime);
        }
        if (this.isAtTarget(customer)) {
          customer.state = 'SITTING';
          customer.eatTimer = 0;
          customer.faceElement.textContent = '😊';
        }
        break;
        
      case 'SITTING':
        customer.eatTimer += deltaTime;
        if (customer.eatTimer > 1 && !customer.orderPlaced) {
          customer.orderPlaced = true;
          // レシピベースの価格計算: 提供中レシピからランダムに割り当て
          const activeRecipeList = this.getActiveRecipes();
          if (activeRecipeList.length > 0) {
            customer.orderedRecipe = activeRecipeList[Math.floor(Math.random() * activeRecipeList.length)];
          }
          // 30% chance to also order a side menu
          const availableSides = this.getAvailableSides();
          if (availableSides.length > 0 && Math.random() < 0.3) {
            const side = availableSides[Math.floor(Math.random() * availableSides.length)];
            if (this.consumeSideIngredient(side.key)) {
              customer.orderedSide = side;
            }
          }
          const orderRecipeName = customer.orderedRecipe ? customer.orderedRecipe.name : '🍜';
          const sideLabel = customer.orderedSide ? ` + ${customer.orderedSide.icon}` : '';
          this.showBubble(customer, orderRecipeName + sideLabel);
          // Only play sound for leader or solo
          if (!customer.groupId || customer.groupIndex === 0) {
            soundMgr.playOrder();
          }
          
          // Check if there are cooks
          const hasCook = this.staff.some(s => s.type === 'cook');
          if (hasCook) {
            // Each individual orders 1 meal
            this.orderQueue.push(customer);
            customer.state = 'WAITING_FOOD';
            customer.waitingFoodTimer = 0;
          } else {
            // No cook: auto-serve after delay (backward compatible)
          }
        }
        if (!this.staff.some(s => s.type === 'cook')) {
          // Backward compatible: no cook, auto food at 4 sec
          if (customer.eatTimer >= 4 && !customer.bowlShown) {
            customer.bowlShown = true;
            this.showBubble(customer, '🍜');
            customer.mealsDelivered = 1;
            customer.state = 'EATING';
            customer.eatTimer = 0;
          }
        }
        break;
      
      case 'WAITING_FOOD':
        customer.waitingFoodTimer += deltaTime;
        // Show waiting animation periodically
        if (!customer.waitBubbleShown && customer.waitingFoodTimer > 1) {
          customer.waitBubbleShown = true;
          customer.faceElement.textContent = '😊';
        }
        
        // Check if meal has been delivered (each person gets 1)
        if ((customer.mealsDelivered || 0) >= 1) {
          customer.foodDelivered = true;
          this.showBubble(customer, '🍜');
          customer.state = 'EATING';
          customer.eatTimer = 0;
        }
        
        // Timeout: if waiting too long (20s), get frustrated and leave
        if (customer.waitingFoodTimer >= 20 && !customer.foodDelivered) {
          customer.faceElement.textContent = '😠';
          this.showBubble(customer, '遅い！');
          customer.state = 'LEAVING';
          if (customer.seat) {
            customer.seat.occupied = false;
            customer.seat = null;
          }
          const entranceY = this.getEntranceY();
          customer.targetX = this.getEntranceXCenter() * TILE_SIZE;
          customer.targetY = entranceY * TILE_SIZE + TILE_SIZE / 2;
          this.calculateCustomerPath(customer);
          this.reputation = Math.max(0, this.reputation - 2);
          // Also make group members leave
          if (customer.groupMembers) {
            customer.groupMembers.forEach(m => {
              if (m !== customer && m.state === 'WAITING_FOOD') {
                m.faceElement.textContent = '😠';
                m.state = 'LEAVING';
                if (m.seat) { m.seat.occupied = false; m.seat = null; }
                m.targetX = this.getEntranceXCenter() * TILE_SIZE;
                m.targetY = this.getEntranceY() * TILE_SIZE + TILE_SIZE / 2;
                this.calculateCustomerPath(m);
              }
            });
          }
        }
        break;
        
      case 'EATING':
        customer.eatTimer += deltaTime;
        // Auto-show eating bubble (40% chance, once, partway through)
        if (!customer.eatBubbleShown && customer.eatTimer >= 0.5) {
          customer.eatBubbleShown = true;
          if (Math.random() < 0.4) {
            const quality = this.calculateQuality(customer);
            let eatMsgs;
            if (quality >= 0.7) {
              eatMsgs = ['うまい！', '最高！', 'スープが絶品！', '麺がいい！', 'これはハマる！'];
            } else if (quality >= 0.4) {
              eatMsgs = ['ふむふむ', '悪くない', 'まあまあかな'];
            } else {
              eatMsgs = ['うーん…', '普通かな', 'もう少し…'];
            }
            this.showBubble(customer, eatMsgs[Math.floor(Math.random() * eatMsgs.length)]);
          }
        }
        if (customer.eatTimer >= 1.2) {
          const quality = this.calculateQuality(customer);
          
          // 満足度を4段階に分類
          let face = '😐';
          let tipMultiplier = 1.0;
          customer.satisfied = false;
          
          if (quality >= 0.8) {
            face = '😋'; // 大満足
            tipMultiplier = 1.3;
            customer.satisfied = true;
          } else if (quality >= 0.6) {
            face = '😊'; // 満足
            tipMultiplier = 1.1;
            customer.satisfied = true;
          } else if (quality >= 0.4) {
            face = '😐'; // 普通
            tipMultiplier = 0.95;
          } else {
            face = '😞'; // 不満
            tipMultiplier = 0.8;
          }
          
          customer.faceElement.textContent = face;
          
          // レシピベースの売価を使用（レシピ未割り当ての場合はフォールバック350円）
          let recipePrice = customer.orderedRecipe ? customer.orderedRecipe.price : 350;
          // サイドメニュー代を追加
          if (customer.orderedSide) {
            recipePrice += customer.orderedSide.price;
          }
          // Each person pays individually, seatPenalty reduces by 15%
          const seatPenaltyMultiplier = customer.seatPenalty ? 0.85 : 1;
          customer.paid = Math.floor(recipePrice * tipMultiplier * seatPenaltyMultiplier);
          this.money += customer.paid;
          soundMgr.playPayment();
          
          // Update daily stats - each person counts as 1 customer
          this.dailyStats.revenue += customer.paid;
          this.dailyStats.customers += 1;
          if (customer.satisfied) this.dailyStats.satisfied += 1;
          
          // Track recipe sales in dailyStats (not from customers array which gets cleaned)
          if (customer.orderedRecipe) {
            const rName = customer.orderedRecipe.name;
            if (!this.dailyStats.recipeSales[rName]) this.dailyStats.recipeSales[rName] = { count: 0, revenue: 0 };
            this.dailyStats.recipeSales[rName].count += 1;
            this.dailyStats.recipeSales[rName].revenue += customer.paid;
            const rParams = this.getRecipeParams(customer.orderedRecipe);
            this.dailyStats.totalCost += rParams.cost;
          }
          
          // 4軸評判更新
          this.updateReputation(customer, customer.orderedRecipe);
          
          // Leave dirty dish if any staff exists (servers or cooks can clean)
          const hasStaff = this.staff.length > 0;
          if (hasStaff && customer.seat) {
            this.spawnDirtyDish(customer.seat.x, customer.seat.y);
          }
          
          customer.state = 'LEAVING';
          if (customer.seat) {
            customer.seat.occupied = false;
            customer.seat = null;
          }
          const entranceY2 = this.getEntranceY();
          customer.targetX = this.getEntranceXCenter() * TILE_SIZE + (customer.groupIndex ? customer.groupIndex * 5 : 0);
          customer.targetY = entranceY2 * TILE_SIZE + TILE_SIZE / 2;
          // Calculate path for leaving
          this.calculateCustomerPath(customer);
        }
        break;
        
      case 'LEAVING':
        // Auto-show goodbye bubble (once)
        if (!customer.leaveBubbleShown) {
          customer.leaveBubbleShown = true;
          if (customer.paid > 0) {
            const leaveMsgs = customer.satisfied 
              ? ['ごちそうさま！😋', 'また来ます！', '美味しかった！', 'ごちそうさまでした！']
              : ['ごちそうさま', 'まあまあだった', 'ごちそうさまでした'];
            this.showBubble(customer, leaveMsgs[Math.floor(Math.random() * leaveMsgs.length)]);
          }
        }
        if (customer.path && customer.path.length > 0) {
          this.moveCustomerAlongPath(customer, deltaTime);
        } else {
          this.moveToTarget(customer, deltaTime);
        }
        if (this.isAtTarget(customer)) {
          customer.state = 'EXITING';
          const streetY = TILE_SIZE * this.streetRow + TILE_SIZE / 2;
          customer.targetX = -20;
          customer.targetY = streetY;
          customer.path = null;
        }
        break;
        
      case 'EXITING':
        this.moveToTarget(customer, deltaTime);
        if (customer.x <= -20) {
          this.removeCustomer(customer);
        }
        break;
    }
  }

  spawnDirtyDish(gridX, gridY) {
    const el = document.createElement('div');
    el.className = 'dirty-dish';
    el.style.left = (gridX * TILE_SIZE + TILE_SIZE / 2 - 10) + 'px';
    el.style.top = (gridY * TILE_SIZE + TILE_SIZE / 2 - 10) + 'px';
    el.textContent = '🍜💨';
    document.getElementById('shop-interior').appendChild(el);
    
    this.dirtyDishes.push({
      gridX: gridX,
      gridY: gridY,
      element: el,
      timer: 0,
      claimed: false,
      done: false
    });
  }

  moveToTarget(customer, deltaTime) {
    const dx = customer.targetX - customer.x;
    const dy = customer.targetY - customer.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    
    if (dist > 1) {
      const move = customer.speed * deltaTime;
      customer.x += (dx / dist) * move;
      customer.y += (dy / dist) * move;
      
      customer.element.style.left = customer.x + 'px';
      customer.element.style.top = customer.y + 'px';
    }
  }

  isAtTarget(customer) {
    const dx = customer.targetX - customer.x;
    const dy = customer.targetY - customer.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    return dist < 5;
  }

  findGroupSeat(groupSize) {
    // Build set of unavailable furniture (any customer sitting OR dirty dish present)
    const unavailableFurniture = new Set();
    this.customers.forEach(c => {
      if (c.seat && c.seat.furniture) {
        unavailableFurniture.add(c.seat.furniture);
      }
    });
    this.dirtyDishes.forEach(d => {
      if (!d.done) {
        const furn = this.getFurnitureAt(d.gridX, d.gridY);
        if (furn) unavailableFurniture.add(furn);
      }
    });
    
    // Find table or tatami furniture that has enough capacity and is completely empty
    const groupFurniture = this.furniture.filter(f => {
      const type = FURNITURE_TYPES[f.type];
      if (type.seats < groupSize) return false;
      if (f.type !== 'table' && f.type !== 'tatami') return false;
      return !unavailableFurniture.has(f);
    });
    
    if (groupFurniture.length === 0) return null;
    
    const chosen = groupFurniture[0];
    const type = FURNITURE_TYPES[chosen.type];
    return {
      x: chosen.x + Math.floor(type.width / 2),
      y: chosen.y + Math.floor(type.height / 2),
      occupied: false,
      furniture: chosen,
      isGroupSeat: true
    };
  }

  // Generate unique seat positions for multi-tile furniture
  getSeatPositions(f) {
    const type = FURNITURE_TYPES[f.type];
    const positions = [];
    if (type.width === 1 && type.height === 1) {
      // Counter: single tile
      positions.push({ x: f.x, y: f.y });
    } else {
      // Table (2×2) / Tatami (2×3): one seat per tile
      for (let dy = 0; dy < type.height; dy++) {
        for (let dx = 0; dx < type.width; dx++) {
          if (positions.length < type.seats) {
            positions.push({ x: f.x + dx, y: f.y + dy });
          }
        }
      }
    }
    return positions;
  }

  findEmptySeat(excludeSeats = []) {
    let seats = [];
    this.furniture.forEach(f => {
      const type = FURNITURE_TYPES[f.type];
      if (type.seats > 0) {
        const positions = this.getSeatPositions(f);
        positions.forEach(pos => {
          seats.push({ 
            x: pos.x, 
            y: pos.y, 
            occupied: false, 
            furniture: f 
          });
        });
      }
    });
    
    // Build set of fully unavailable furniture (any customer sitting OR dirty dish present)
    const unavailableFurniture = new Set();
    // Mark furniture with any customer sitting
    this.customers.forEach(c => {
      if (c.seat && c.seat.furniture) {
        unavailableFurniture.add(c.seat.furniture);
      }
    });
    // Mark furniture with dirty dishes on any of its tiles
    this.dirtyDishes.forEach(d => {
      if (!d.done) {
        const furn = this.getFurnitureAt(d.gridX, d.gridY);
        if (furn) unavailableFurniture.add(furn);
      }
    });
    // Filter out ALL seats belonging to unavailable furniture
    seats = seats.filter(s => {
      if (s.furniture && unavailableFurniture.has(s.furniture)) return false;
      return true;
    });
    
    // Filter out seats in excludeSeats (for group assignment rounds)
    seats = seats.filter(s => {
      if (excludeSeats.some(es => es.x === s.x && es.y === s.y)) return false;
      return true;
    });
    
    const empty = seats.filter(s => !s.occupied);
    
    // Sort seats to prefer counter > table > tatami for solo customers
    const seatPriority = { counter: 0, table: 1, tatami: 2 };
    empty.sort((a, b) => {
      const pa = seatPriority[a.furniture.type] || 99;
      const pb = seatPriority[b.furniture.type] || 99;
      return pa - pb;
    });
    
    return empty.length > 0 ? empty[0] : null;
  }

  calculateQuality(customer) {
    let quality = 0.3; // レシピなしの場合のベース品質

    // レシピパラメータベースの品質計算（メイン要素）
    if (customer && customer.orderedRecipe) {
      const params = this.getRecipeParams(customer.orderedRecipe);
      const totalParams = params.kire + params.koku + params.aroma;
      // 20点満点で正規化（キレ+コク+香り合計、各最大10）
      quality = Math.min(1, totalParams / 20);
    }

    // 設備ボーナス（パラメータ補助として小さめに）
    if (this.furniture.some(f => f.type === 'noodleMachine')) quality += 0.05;
    if (this.furniture.some(f => f.type === 'plant')) quality += 0.03;

    // Combo bonuses
    this.discoveredCombos.forEach(combo => {
      const comboData = COMBOS.find(c => c.name === combo);
      if (comboData) quality += comboData.bonus;
    });

    // 調理でスキップされたステップのペナルティ（設備不足による品質低下）
    if (customer && customer.cookingSkippedSteps > 0) {
      quality -= customer.cookingSkippedSteps * 0.08;
    }
    
    // グループ客がカウンター席に座った場合のペナルティ
    if (customer && customer.seatPenalty) {
      quality *= 0.85;
    }

    return Math.max(0, Math.min(1, quality));
  }

  showBubble(customer, text, duration = 3000) {
    const bubble = document.createElement('div');
    bubble.className = 'customer-bubble';
    bubble.textContent = text;
    customer.element.appendChild(bubble);
    
    setTimeout(() => {
      if (bubble.parentNode) bubble.remove();
    }, duration);
  }

  showCustomerFeedback(customer) {
    if (!customer || !customer.element) return;
    
    let feedback = '';
    
    if (customer.state === 'WALKING_STREET' || customer.state === 'ENTERING') {
      const messages = ['いい匂いがする！', 'ラーメン食べたい！', 'ここが評判の店か'];
      feedback = messages[Math.floor(Math.random() * messages.length)];
    } else if (customer.state === 'WAITING_FOOD') {
      const messages = ['まだかな…', 'いい匂いがしてきた！', '楽しみ♪'];
      feedback = messages[Math.floor(Math.random() * messages.length)];
    } else if (customer.state === 'SITTING' || customer.state === 'EATING') {
      const quality = this.calculateQuality(customer);
      
      if (quality >= 0.8) {
        const positiveFeedback = [
          'スープのコクが最高！',
          '麺がモチモチで美味しい！',
          'こだわりを感じる一杯！',
          '贅沢な味わい…！',
          'また来よう！'
        ];
        feedback = positiveFeedback[Math.floor(Math.random() * positiveFeedback.length)];
      } else if (quality >= 0.5) {
        const neutralFeedback = [
          'まあまあかな',
          '普通に美味しい',
          '悪くないね',
          'もう少し何か欲しい'
        ];
        feedback = neutralFeedback[Math.floor(Math.random() * neutralFeedback.length)];
      } else {
        const negativeFeedback = [
          'うーん…普通かな',
          '期待しすぎたかも',
          'もっと美味しい店あるな',
          'ちょっと物足りない'
        ];
        feedback = negativeFeedback[Math.floor(Math.random() * negativeFeedback.length)];
      }
      
      if (this.furniture.some(f => f.type === 'noodleMachine')) {
        if (Math.random() < 0.3) feedback += '\n（麺がいい感じ！）';
      }
      if (this.furniture.some(f => f.type === 'plant')) {
        if (Math.random() < 0.2) feedback += '\n（雰囲気いいね）';
      }
    } else if (customer.state === 'LEAVING' || customer.state === 'EXITING') {
      if (customer.satisfied) {
        feedback = 'ごちそうさま！😋';
      } else {
        feedback = 'ごちそうさま';
      }
    } else {
      feedback = '...';
    }
    
    this.showBubble(customer, feedback);
  }

  removeCustomer(customer) {
    if (customer.element && customer.element.parentNode) {
      customer.element.remove();
    }
    customer.element = null;
    customer.state = 'EXITED';
  }

  showNotification(text) {
    const notif = document.getElementById('notification');
    notif.textContent = text;
    notif.classList.add('active');
    
    setTimeout(() => {
      notif.classList.remove('active');
    }, 2000);
  }

  // Store expansion
  expandStore() {
    const nextLevel = this.storeLevel + 1;
    if (nextLevel > 6) {
      this.showNotification('最大レベルです！');
      return;
    }
    const cost = STORE_LEVELS[nextLevel].cost;
    if (this.money < cost) {
      this.showNotification('お金が足りません！');
      return;
    }
    this.money -= cost;
    this.storeLevel = nextLevel;
    this.updateGridSize(nextLevel);
    this.walls = this.generateWalls(nextLevel);
    this.renderWalls();
    this.createGrid(); // Rebuild grid overlay
    this.updateUI();
    this.renderTabContent();
    this.autoFitView();
    this.showNotification('✨ 店舗を拡張しました！ Lv' + nextLevel);
  }

  renderTabs() {
    const tabs = document.querySelectorAll('.tab');
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        this.currentTab = tab.dataset.tab;
        this.renderTabContent();
      });
    });
    
    this.updateTabIndicators();
    this.renderTabContent();
  }

  updateTabIndicators() {
    const menuCheck = this.checkMenuAvailability();
    const tabs = document.querySelectorAll('.tab');
    tabs.forEach(tab => {
      if (tab.dataset.tab === 'menu') {
        const baseText = 'メニュー';
        tab.textContent = !menuCheck.ok ? '❗' + baseText : baseText;
      }
    });
  }

  renderTabContent() {
    this.updateTabIndicators();
    const content = document.getElementById('tab-content');
    const overlay = document.getElementById('grid-overlay');
    // Only add 'active' (enables pointer events) when in layout tab
    if (this.currentTab === 'layout') {
      overlay.classList.add('active');
    } else {
      overlay.classList.remove('active');
    }
    
    switch (this.currentTab) {
      case 'operations':
        content.innerHTML = `
          <div>
            <div style="margin-bottom: 12px;">
              <strong>営業時間:</strong> <span id="day-timer">${this.dayActive ? Math.ceil(60 - this.dayTime) + '秒 ' + this.getTimePeriodLabel() : '休業中'}</span>
            </div>
            ${this.dayActive ? `
              <div style="margin-bottom: 8px; font-size: 12px; color: #666; background: white; padding: 6px 10px; border-radius: 6px; border: 1px solid #ddd;">
                <strong>時間帯の特徴:</strong><br>
                🌅 朝 (0-20秒): サラリーマン多め・客足少なめ<br>
                ☀️ 昼 (20-40秒): ランチラッシュ！学生・家族増加<br>
                🌙 夜 (40-60秒): 食通が増える・客足やや減少
              </div>
            ` : ''}
            ${this.activeEvents.length > 0 ? `
              <div style="margin-bottom:8px;background:white;padding:6px 10px;border-radius:6px;border:1px solid #ddd;font-size:12px;">
                <strong>📢 発生中のイベント:</strong><br>
                ${this.activeEvents.map(e => `${e.icon} ${e.name} (残り${e.remainingDays}日)`).join('<br>')}
              </div>
            ` : ''}
            ${!this.dayActive ? `
              <div style="margin-bottom:8px;background:white;padding:6px 10px;border-radius:6px;border:1px solid #ddd;font-size:12px;">
                <strong>🌤️ 天気:</strong> ${this.getWeatherLabel()}
                ${this.weather !== 'sunny' ? `<span style="color:#d32f2f;"> (客足${this.weather === 'rainy' ? '-20%' : '-30%'})</span>` : ''}
              </div>

              <div style="margin-bottom:8px;background:white;padding:6px 10px;border-radius:6px;border:1px solid #ddd;font-size:12px;">
                <strong>💸 本日の固定費:</strong> ${(() => { const rc = this.calculateRunningCosts(); return `${rc.total}円 (家賃${rc.rent} + 人件費${rc.staffCost} + 光熱費${rc.utilityCost})`; })()}
              </div>
              ${(() => {
                const menuCheck = this.checkMenuAvailability();
                const canStart = menuCheck.ok;
                return `<button onclick="game.startDay()" ${canStart ? '' : 'disabled'}>営業開始</button>
                ${!canStart ? '<div style="color:#d32f2f;margin-top:8px;font-size:13px;">❗ ' + menuCheck.reason + '<br><span style="font-size:11px;color:#666;">スープ鍋を配置タブから追加購入するか、提供メニューを減らしてください</span></div>' : ''}`;
              })()}
            ` : `
              <button onclick="game.endDay()" style="background:#d32f2f;color:white;border-color:#b71c1c;">🔴 営業終了</button>
              <div style="margin-top: 12px;">
                <strong>速度:</strong>
                <button onclick="game.setSpeed(1)" ${this.speedMultiplier === 1 ? 'disabled' : ''}>1x</button>
                <button onclick="game.setSpeed(2)" ${this.speedMultiplier === 2 ? 'disabled' : ''}>2x</button>
                <button onclick="game.setSpeed(3)" ${this.speedMultiplier === 3 ? 'disabled' : ''}>3x</button>
              </div>
            `}
          </div>
        `;
        break;
        
      case 'layout':
        if (this.dayActive) {
          content.innerHTML = `
            <div class="info-section">
              <div style="color: #d32f2f; font-weight: bold; text-align: center; padding: 20px;">
                🔒 営業中は配置変更できません<br>
                <span style="font-size: 12px; color: #666;">営業終了後に配置を変更してください</span>
              </div>
            </div>
          `;
          break;
        }
        
        const categories = {
          seats: '座席',
          kitchen: '厨房',
          other: 'その他',
          staff: '店員',
          store: '店舗'
        };
        
        const subTabsHtml = Object.keys(categories).map(cat => 
          `<div class="sub-tab ${this.currentSubTab === cat ? 'active' : ''}" onclick="game.setSubTab('${cat}')">${categories[cat]}</div>`
        ).join('');
        
        let itemsHtml = '';
        
        if (this.currentSubTab === 'store') {
          // Store expansion UI
          const levelInfo = STORE_LEVELS[this.storeLevel];
          let expansionBtn = '';
          if (this.storeLevel < 6) {
            const nextLevel = this.storeLevel + 1;
            const nextInfo = STORE_LEVELS[nextLevel];
            const canAfford = this.money >= nextInfo.cost;
            expansionBtn = `<button onclick="game.expandStore()" ${!canAfford ? 'disabled' : ''}>拡張 Lv${nextLevel} (${nextInfo.label}) — ${nextInfo.cost}円</button>`;
          } else {
            expansionBtn = '<div style="color: #4caf50; font-weight: bold;">✓ 最大レベル</div>';
          }
          itemsHtml = `
            <div class="info-section">
              <div class="info-title">店舗レベル: ${this.storeLevel}</div>
              <div>現在のサイズ: ${levelInfo.label}</div>
              <div style="margin-top: 8px;">${expansionBtn}</div>
            </div>
          `;
        } else if (this.currentSubTab === 'staff') {
          // Staff items
          itemsHtml = Object.keys(STAFF_TYPES).map(key => {
            const s = STAFF_TYPES[key];
            return `
              <div class="furniture-item ${this.selectedStaff === key ? 'selected' : ''}"
                   onclick="game.selectStaffType('${key}')">
                <div style="font-size: 24px;">${s.icon}</div>
                <div>${s.name}</div>
                <div style="font-size: 11px; color: #666;">${s.cost}円</div>
              </div>
            `;
          }).join('');
        } else {
          itemsHtml = Object.keys(FURNITURE_TYPES)
            .filter(key => FURNITURE_TYPES[key].category === this.currentSubTab)
            .map(key => {
              const f = FURNITURE_TYPES[key];
              const count = this.furniture.filter(placed => placed.type === key).length;
              return `
                <div class="furniture-item ${this.selectedFurniture === key ? 'selected' : ''}"
                     onclick="game.selectFurniture('${key}')">
                  <div style="font-size: 24px;">${f.icon}</div>
                  <div>${f.name}</div>
                  <div style="font-size: 11px; color: #666;">${f.cost}円</div>
                  ${count > 0 ? `<div style="font-size: 10px; color: #888;">設置数: ${count}</div>` : ''}
                </div>
              `;
            }).join('');
        }
        
        content.innerHTML = `
          <div class="info-section">
            <button class="toggle-btn ${this.removalMode ? 'active' : ''}" onclick="game.toggleRemovalMode()">
              ${this.removalMode ? '✓ 撤去モード' : '撤去モード'}
            </button>
            <div style="font-size: 11px; color: #666; margin-top: 4px;">
              ${this.removalMode ? 'タップして家具/店員を撤去（50%返金）' : this.currentSubTab === 'staff' ? '店員を選んで配置' : this.currentSubTab === 'store' ? '店舗の拡張' : '家具を選んで配置'}

          </div>
          <div class="sub-tabs">${subTabsHtml}</div>
          ${this.currentSubTab === 'store' ? itemsHtml : `<div class="furniture-list">${itemsHtml}</div>`}
        `;
        break;
        
      case 'menu':
        const recipeCards = this.recipes.map(r => {
          const p = this.getRecipeParams(r);
          const serveCheck = this.canServeRecipe(r);
          const toppingNames = r.toppings.map(tk => TOPPINGS[tk]?.name || tk).join(', ') || 'なし';
          return `
            <div class="recipe-card ${r.active ? 'active' : ''}">

                <div class="recipe-card-name">🍜 ${this._escapeHtml(r.name)} ${r.active ? '<span style="color:#4caf50;font-size:11px;">提供中</span>' : ''}</div>
                <div class="recipe-card-actions">
                  <button onclick="game.toggleRecipeActive('${r.id}')">${r.active ? 'OFF' : 'ON'}</button>
                  <button onclick="game.openRecipeModal('${r.id}')">編集</button>

                </div>
              </div>
              <div class="recipe-card-details">
                ${SOUP_BASES[r.soup]?.name || '?'}スープ / ${NOODLE_TYPES[r.noodle]?.name || '?'} / ${toppingNames}

              <div class="recipe-card-params">
                <span style="color:#1565c0;">キレ${p.kire}</span>
                <span style="color:#d32f2f;">コク${p.koku}</span>
                <span style="color:#2e7d32;">香り${p.aroma}</span>
                <span>原価${p.cost}円</span>

        }).join('');
        
        const menuAvailCheck = this.checkMenuAvailability();
        const menuWarningHtml = !menuAvailCheck.ok ? `
          <div style="background:#ffe0e0;border:2px solid #d32f2f;border-radius:6px;padding:8px;margin-bottom:8px;">
            <div style="color:#d32f2f;font-weight:bold;">❗ ${menuAvailCheck.reason}</div>
            <div style="font-size:11px;color:#666;margin-top:4px;">スープ鍋を配置タブから追加購入するか、提供メニューを減らしてください</div>

        ` : '';
        const activeCount = this.recipes.filter(r => r.active).length;
        const equip = this.getEquipmentCapacity();
        const activeSoupCount = this.getActiveSoupTypes().size;
        const equipStatusHtml = `
          <div style="font-size:11px; color:#666; margin-top:6px; border-top:1px solid #ddd; padding-top:6px;">
            🍲 スープ鍋: ${activeSoupCount}/${equip.soupPotCount}種 使用中

            ${equip.hasNoodleMachine ? ' | 🔧 製麺機 (麺コスト半額)' : ''}
            ${equip.hasCharsiuOven ? ' | 🥩 チャーシュー窯 OK' : ''}
          </div>
        `;
        // サイドメニューセクション
        const sideMenuHtml = Object.entries(SIDE_MENUS).map(([key, side]) => {
          const unlocked = this.unlockedResearch.includes(side.unlock);
          const hasEquip = this.furniture.some(f => f.type === side.requires);
          const active = this.sideMenuActive[key] || false;
          if (!unlocked) return `<div style="font-size:12px;color:#999;">${side.icon} ${side.name} — 🔒 未研究</div>`;
          if (!hasEquip) return `<div style="font-size:12px;color:#999;">${side.icon} ${side.name} — ⚠️ ${side.requires}が必要</div>`;
          return `<div style="font-size:12px;display:flex;justify-content:space-between;align-items:center;">
            <span>${side.icon} ${side.name} (原価${side.cost}円 / 売価${side.price}円)</span>
            <button onclick="game.toggleSideMenu('${key}')" style="font-size:11px;">${active ? '提供中 ✓' : 'OFF'}</button>
          </div>`;
        }).join('');
        
        content.innerHTML = `
          ${menuWarningHtml}
          <div class="info-section">
            <div>レシピを管理（提供ON: ${activeCount}/3）</div>
            ${equipStatusHtml}
            <button onclick="game.openRecipeModal()" style="margin-top:8px;width:100%;">＋ 新しいラーメンを作る</button>
          </div>
          ${recipeCards}
          <div class="info-section" style="margin-top:12px;">
            <div class="info-title">🥟 サイドメニュー</div>
            ${sideMenuHtml}
            <div style="font-size:10px;color:#888;margin-top:4px;">※ 客が30%の確率でサイドメニューも注文します</div>
          </div>
        `;
        break;
        
      case 'research':
        // Group by tier for display
        const maxTier = Math.max(...RESEARCH_TREE.map(r => r.tier));
        let researchHtml = '';
        for (let tier = 1; tier <= maxTier; tier++) {
          const tierItems = RESEARCH_TREE.filter(r => r.tier === tier);
          const tierAvailable = isTierAvailable(tier, this.unlockedResearch);
          const tierLabel = `Tier ${tier}`;
          researchHtml += `<div style="font-weight:bold; font-size:13px; color:#654321; margin:8px 0 4px; border-bottom:1px solid #ddd; padding-bottom:4px;">${tierLabel}${!tierAvailable ? ' 🔒' : ''}</div>`;
          researchHtml += tierItems.map(r => {
            const unlocked = this.unlockedResearch.includes(r.id);
            const canAfford = this.money >= r.cost;
            const typeIcon = r.type === 'soup' ? '🍲' : '🥬';
            const typeLabel = r.type === 'soup' ? 'スープ' : 'トッピング';
            return `
              <div class="research-item ${unlocked ? 'unlocked' : ''}">
                <div>
                  <div><strong>${typeIcon} ${r.name}</strong> <span style="font-size:10px;color:#888;">${typeLabel}</span></div>
                  <div style="font-size: 11px; color: #666;">${r.cost}円</div>
                </div>
                ${unlocked ? `
                  <div style="color: #4caf50;">✓ 習得済み</div>
                ` : !tierAvailable ? `
                  <div style="color: #999; font-size: 12px;">前のTierを研究してください</div>
                ` : `
                  <button onclick="game.unlockResearch('${r.id}')" ${!canAfford ? 'disabled' : ''}>
                    開発する (${r.cost}円)
                  </button>
                `}
              </div>
            `;
          }).join('');
        }
        
        content.innerHTML = `
          <div class="info-section">
            <div>お金を使って新メニュー素材を開発</div>
            <div style="font-size:11px; color:#888; margin-top:4px;">前のTierを1つ以上習得すると次のTierが解放されます</div>
          </div>
          <div class="research-list">${researchHtml}</div>
        `;
        break;
        
      case 'info':
        const staffInfo = this.staff.length > 0 
          ? this.staff.map(s => `<div>${STAFF_TYPES[s.type].icon} ${STAFF_TYPES[s.type].name} Lv${s.level || 1} (EXP:${s.exp || 0}/${(s.level || 1) * 100}) (${s.homeX},${s.homeY})</div>`).join('')
          : '<div style="color: #999;">まだ雇っていません</div>';
        
        const achieveCards = ACHIEVEMENTS.map(a => {
          const unlocked = this.achievements.includes(a.id);
          return `<div class="achieve-card ${unlocked ? 'unlocked' : 'locked'}">
            <div class="achieve-card-icon">${unlocked ? a.icon : '❓'}</div>
            <div class="achieve-card-name">${unlocked ? a.name : '???'}</div>
            <div class="achieve-card-desc">${unlocked ? a.desc : '未達成'}</div>
          </div>`;
        }).join('');
        const achieveCount = this.achievements.length;
        const achieveTotal = ACHIEVEMENTS.length;
        
        content.innerHTML = `
          <div class="info-section">
            <div class="info-title">⭐ 評判詳細 (総合: ${this.reputation})</div>
            ${this.renderReputationBars()}
          </div>
          
          <div class="info-section">
            <div class="info-title">🌤️ 季節・天気</div>
            <div>${this.getWeatherLabel()}</div>
            <div style="font-size:11px;color:#666;">季節は30日ごとに変化します</div>
          </div>
          
          <div class="info-section">
            <div class="info-title">🏅 実績 (${achieveCount}/${achieveTotal})</div>
            <div class="achievement-grid">${achieveCards}</div>
          </div>
          
          <div class="info-section">
            <div class="info-title">📊 売上推移</div>
            ${this.dayHistory.length >= 2 ? `
              <div class="chart-container">
                <canvas id="history-chart" class="chart-canvas" width="420" height="160"></canvas>
                <div class="chart-legend">
                  <div class="chart-legend-item"><span class="chart-legend-dot" style="background:#4caf50;"></span>売上</div>
                  <div class="chart-legend-item"><span class="chart-legend-dot" style="background:#2196f3;"></span>純利益</div>
                  <div class="chart-legend-item"><span class="chart-legend-dot" style="background:#ff9800;"></span>来客</div>
                </div>
              </div>
            ` : '<div style="color:#999;font-size:12px;">2日目以降にグラフが表示されます</div>'}
            ${this.renderAnalyticsCards()}
          </div>
          
          <div class="info-section">
            <div class="info-title">統計</div>
            <div>総客数: ${this.stats.totalCustomers}人</div>
            <div>総売上: ${this.stats.totalRevenue}円</div>
            <div>満足客: ${this.stats.satisfiedCustomers}人</div>
