<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>回転寿司マスター - Sushi Master</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
html,body{width:100%;height:100%;overflow:hidden;background:#F5E6D0;font-family:'Hiragino Sans','Meiryo',sans-serif}
canvas{display:block;width:100%;height:100%}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');

// === Audio ===
let audioCtx=null;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()}
function playSound(type){
  if(!audioCtx)return;
  const now=audioCtx.currentTime;
  const osc=audioCtx.createOscillator();
  const gain=audioCtx.createGain();
  osc.connect(gain);gain.connect(audioCtx.destination);
  switch(type){
    case'grip':osc.frequency.setValueAtTime(200,now);osc.frequency.exponentialRampToValueAtTime(100,now+0.1);gain.gain.setValueAtTime(0.3,now);gain.gain.exponentialRampToValueAtTime(0.01,now+0.15);osc.start(now);osc.stop(now+0.15);break;
    case'take':{const o2=audioCtx.createOscillator();const g2=audioCtx.createGain();o2.connect(g2);g2.connect(audioCtx.destination);osc.type='sine';osc.frequency.setValueAtTime(800,now);osc.frequency.setValueAtTime(1200,now+0.05);gain.gain.setValueAtTime(0.2,now);gain.gain.exponentialRampToValueAtTime(0.01,now+0.2);o2.type='sine';o2.frequency.setValueAtTime(1600,now+0.1);g2.gain.setValueAtTime(0.15,now+0.1);g2.gain.exponentialRampToValueAtTime(0.01,now+0.3);osc.start(now);osc.stop(now+0.2);o2.start(now+0.1);o2.stop(now+0.3);break}
    case'waste':osc.frequency.setValueAtTime(400,now);osc.frequency.exponentialRampToValueAtTime(100,now+0.3);gain.gain.setValueAtTime(0.2,now);gain.gain.exponentialRampToValueAtTime(0.01,now+0.3);osc.start(now);osc.stop(now+0.3);break;
    case'angry':osc.type='sawtooth';osc.frequency.setValueAtTime(100,now);gain.gain.setValueAtTime(0.2,now);gain.gain.exponentialRampToValueAtTime(0.01,now+0.4);osc.start(now);osc.stop(now+0.4);break;
    case'clear':{const notes=[523,659,784,1047];notes.forEach((f,i)=>{const o=audioCtx.createOscillator();const g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.frequency.setValueAtTime(f,now+i*0.12);g.gain.setValueAtTime(0.2,now+i*0.12);g.gain.exponentialRampToValueAtTime(0.01,now+i*0.12+0.3);o.start(now+i*0.12);o.stop(now+i*0.12+0.3)});return}
  }
}

// === Constants ===
const SUSHI_TYPES=[
  {id:'kappa',name:'かっぱ',emoji:'🥒',price:100,color:'#4CAF50',tier:1,gripTime:1000},
  {id:'tamago',name:'たまご',emoji:'🥚',price:100,color:'#4CAF50',tier:1,gripTime:1000},
  {id:'maguro',name:'まぐろ',emoji:'🐟',price:200,color:'#2196F3',tier:2,gripTime:1000},
  {id:'salmon',name:'サーモン',emoji:'🍣',price:200,color:'#2196F3',tier:2,gripTime:1000},
  {id:'ebi',name:'えび',emoji:'🦐',price:300,color:'#F44336',tier:3,gripTime:2000},
  {id:'ikura',name:'いくら',emoji:'🔴',price:300,color:'#F44336',tier:3,gripTime:2000},
  {id:'engawa',name:'えんがわ',emoji:'🐡',price:500,color:'#FFC107',tier:4,gripTime:2000},
  {id:'uni',name:'うに',emoji:'🟠',price:500,color:'#FFC107',tier:4,gripTime:2000},
];

const STAGES=[
  {name:'開店！',customers:2,tiers:[1],quota:500,time:60,orderTimer:15,desc:'初日はお客さんも少なめ。落ち着いて握ろう！',changeMind:0,fastRotation:false},
  {name:'ランチタイム',customers:4,tiers:[1,2],quota:2000,time:90,orderTimer:12,desc:'お昼のラッシュ！注文が増えてきた！',changeMind:0,fastRotation:false},
  {name:'高級ネタ解禁',customers:4,tiers:[1,2,3],quota:4000,time:90,orderTimer:10,desc:'高級ネタで一気に稼げ！でも握るのに時間がかかる…',changeMind:0,fastRotation:false},
  {name:'わがまま客',customers:5,tiers:[1,2,3,4],quota:6000,time:120,orderTimer:8,desc:'注文がコロコロ変わる！対応力が試される',changeMind:0.1,fastRotation:false},
  {name:'閉店ラッシュ',customers:6,tiers:[1,2,3,4],quota:10000,time:120,orderTimer:7,desc:'閉店間際の大ラッシュ！全力で握れ！',changeMind:0.05,fastRotation:true},
];

const CUSTOMER_NAMES=['太郎','花子','次郎','美咲','健太','さくら','翔太','愛子','大輔','七海','拓也','葵','和也','結衣','誠','凛'];

// === Game State ===
let W,H,dpr;
let state='title'; // title, stageIntro, playing, stageClear, gameOver, endless
let stageIndex=0;
let score=0;
let timeLeft=0;
let customers=[];
let laneSushi=[];
let effects=[];
let menuButtons=[];
let cooldowns={};
let quotaReached=false;
let endlessUnlocked=false;
let endlessHighScore=parseInt(localStorage.getItem('sushiMasterHS')||'0');
let endlessTime=0;
let endlessDifficulty=1;
let lastTime=0;
let touchStartY=0;

// Layout regions (computed on resize)
let statusBarH,customerAreaY,customerAreaH,laneY,laneH,menuY,menuH;

function resize(){
  dpr=window.devicePixelRatio||1;
  W=window.innerWidth;H=window.innerHeight;
  canvas.width=W*dpr;canvas.height=H*dpr;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  // Layout
  statusBarH=Math.max(40,H*0.06);
  const remainH=H-statusBarH;
  customerAreaY=statusBarH;
  customerAreaH=remainH*0.35;
  laneY=customerAreaY+customerAreaH;
  laneH=Math.max(60,remainH*0.15);
  menuY=laneY+laneH;
  menuH=H-menuY;
  buildMenuButtons();
}

function buildMenuButtons(){
  menuButtons=[];
  const stage=stageIndex<STAGES.length?STAGES[stageIndex]:STAGES[STAGES.length-1];
  const available=state==='endless'?SUSHI_TYPES:SUSHI_TYPES.filter(s=>stage.tiers.includes(s.tier));
  const cols=Math.min(4,available.length);
  const rows=Math.ceil(available.length/cols);
  const pad=6;
  const bw=(W-pad*(cols+1))/cols;
  const bh=Math.min((menuH-pad*(rows+1))/rows,70);
  const totalH=rows*bh+(rows-1)*pad;
  const startY=menuY+(menuH-totalH)/2;
  available.forEach((s,i)=>{
    const col=i%cols;const row=Math.floor(i/cols);
    const actualCols=row===rows-1?(available.length-row*cols):cols;
    const rowW=actualCols*bw+(actualCols-1)*pad;
    const startX=(W-rowW)/2;
    menuButtons.push({
      x:startX+col*(bw+pad),y:startY+row*(bh+pad),w:bw,h:bh,sushi:s,pressed:false,pressAnim:0
    });
  });
}

// === Customer Logic ===
function createCustomer(seatIndex,totalSeats){
  const stage=getCurrentStage();
  const available=SUSHI_TYPES.filter(s=>stage.tiers.includes(s.tier));
  const order=available[Math.floor(Math.random()*available.length)];
  const name=CUSTOMER_NAMES[Math.floor(Math.random()*CUSTOMER_NAMES.length)];
  const seatW=W/totalSeats;
  return{
    seatIndex,x:seatW*seatIndex+seatW/2,
    name,order,face:'😐',
    orderTimer:stage.orderTimer,orderTimeLeft:stage.orderTimer,
    satisfied:false,angry:false,leaving:false,leaveTimer:0,
    enterAnim:1,faceTimer:0,sparkles:[],angryMarks:[],
    hasOrder:true,waitForOrder:false,bonusTaken:false
  };
}

function getCurrentStage(){
  if(state==='endless'){
    const s=Object.assign({},STAGES[STAGES.length-1]);
    s.customers=Math.min(6,4+Math.floor(endlessDifficulty/2));
    s.orderTimer=Math.max(4,7-endlessDifficulty*0.3);
    s.changeMind=Math.min(0.2,0.05+endlessDifficulty*0.02);
    s.tiers=[1,2,3,4];
    return s;
  }
  return STAGES[Math.min(stageIndex,STAGES.length-1)];
}

function initCustomers(){
  customers=[];
  const stage=getCurrentStage();
  for(let i=0;i<stage.customers;i++){
    customers.push(createCustomer(i,stage.customers));
  }
}

function replaceCustomer(idx){
  const stage=getCurrentStage();
  const c=createCustomer(idx,stage.customers);
  c.enterAnim=1;
  customers[idx]=c;
}

// === Lane Logic ===
function addSushiToLane(sushiType){
  laneSushi.push({x:-30,sushi:sushiType,taken:false,takenAnim:0,wasteAnim:0});
}

// === Effects ===
function addEffect(x,y,text,color,duration){
  effects.push({x,y,text,color,life:duration||1.5,maxLife:duration||1.5,vy:-40});
}

// === Drawing ===
function drawRoundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

function drawStatusBar(){
  ctx.fillStyle='#8B4513';ctx.fillRect(0,0,W,statusBarH);
  ctx.fillStyle='#A0522D';ctx.fillRect(0,0,W,statusBarH-2);
  ctx.fillStyle='#FFF';ctx.font='bold '+Math.max(14,statusBarH*0.4)+'px sans-serif';
  ctx.textAlign='left';ctx.textBaseline='middle';
  const mid=statusBarH/2;
  if(state==='endless'){
    ctx.fillText('⏱ '+formatTime(endlessTime),10,mid);
    ctx.textAlign='center';ctx.fillText('💰 '+score+'円',W/2,mid);
    ctx.textAlign='right';ctx.fillText('🏆 '+endlessHighScore+'円',W-10,mid);
  }else{
    const stage=STAGES[stageIndex];
    ctx.fillText('⏱ '+formatTime(timeLeft),10,mid);
    ctx.textAlign='center';
    const quotaColor=score>=stage.quota?'#4CAF50':'#FFF';
    ctx.fillStyle=quotaColor;
    ctx.fillText('💰 '+score+'円',W/2,mid);
    ctx.fillStyle='#FFF';ctx.textAlign='right';
    ctx.fillText('🎯 '+stage.quota+'円',W-10,mid);
  }
}

function formatTime(s){
  const m=Math.floor(s/60);const sec=Math.floor(s%60);
  return m+':'+(sec<10?'0':'')+sec;
}

function drawCustomers(dt){
  const stage=getCurrentStage();
  const seatW=W/Math.max(1,customers.length);
  // Counter background
  ctx.fillStyle='#D2B48C';ctx.fillRect(0,customerAreaY,W,customerAreaH);
  // Wood grain lines
  ctx.strokeStyle='#C4A882';ctx.lineWidth=1;
  for(let i=0;i<5;i++){
    const y=customerAreaY+customerAreaH*0.3+i*12;
    ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();
  }
  // Counter edge
  ctx.fillStyle='#8B4513';
  const counterEdgeY=laneY-8;
  ctx.fillRect(0,counterEdgeY,W,8);

  const faceSize=Math.min(36,seatW*0.35);
  const fontSize=faceSize;

  customers.forEach((c,i)=>{
    if(!c)return;
    const cx=seatW*i+seatW/2;
    const bodyY=counterEdgeY-faceSize*0.3;
    const headY=bodyY-faceSize*1.2;

    // Enter animation
    const anim=c.enterAnim>0?1-c.enterAnim:1;
    ctx.globalAlpha=anim;

    // Body
    ctx.fillStyle='#FFE4C4';
    ctx.beginPath();ctx.ellipse(cx,bodyY,faceSize*0.5,faceSize*0.4,0,Math.PI,0);ctx.fill();

    // Face
    ctx.font=fontSize+'px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(c.face,cx,headY);

    // Sparkles
    c.sparkles.forEach(sp=>{
      ctx.globalAlpha=sp.life*anim;
      ctx.font=(fontSize*0.4)+'px sans-serif';
      ctx.fillText('✨',cx+sp.x,headY+sp.y);
    });
    // Angry marks
    c.angryMarks.forEach(sp=>{
      ctx.globalAlpha=sp.life*anim;
      ctx.font=(fontSize*0.4)+'px sans-serif';
      ctx.fillText('💢',cx+sp.x,headY+sp.y);
    });
    ctx.globalAlpha=anim;

    // Name
    ctx.font='bold '+Math.max(10,faceSize*0.3)+'px sans-serif';
    ctx.fillStyle='#333';ctx.fillText(c.name,cx,bodyY+faceSize*0.15);

    // Speech bubble with order
    if(c.hasOrder&&c.order){
      const bubbleW=Math.max(50,seatW*0.6);
      const bubbleH=faceSize*1.1;
      const bubbleX=cx-bubbleW/2;
      const bubbleY=headY-faceSize*0.8-bubbleH;

      ctx.fillStyle='#FFF';ctx.strokeStyle='#333';ctx.lineWidth=2;
      drawRoundRect(bubbleX,bubbleY,bubbleW,bubbleH,8);
      ctx.fill();ctx.stroke();

      // Triangle
      ctx.beginPath();
      ctx.moveTo(cx-6,bubbleY+bubbleH);
      ctx.lineTo(cx,bubbleY+bubbleH+8);
      ctx.lineTo(cx+6,bubbleY+bubbleH);
      ctx.fillStyle='#FFF';ctx.fill();
      ctx.stroke();
      ctx.beginPath();ctx.moveTo(cx-5,bubbleY+bubbleH-1);ctx.lineTo(cx+5,bubbleY+bubbleH-1);
      ctx.strokeStyle='#FFF';ctx.lineWidth=3;ctx.stroke();ctx.lineWidth=2;

      // Order emoji + name
      ctx.font=(faceSize*0.5)+'px sans-serif';
      ctx.fillStyle='#333';ctx.textAlign='center';
      ctx.fillText(c.order.emoji+' '+c.order.name,cx,bubbleY+bubbleH*0.45);

      // Timer bar
      const barW=bubbleW-10;
      const barH=5;
      const barX=bubbleX+5;
      const barY=bubbleY+bubbleH-10;
      const ratio=c.orderTimeLeft/c.orderTimer;
      ctx.fillStyle='#EEE';
      drawRoundRect(barX,barY,barW,barH,2);ctx.fill();
      const barColor=ratio>0.5?'#4CAF50':ratio>0.25?'#FFC107':'#F44336';
      ctx.fillStyle=barColor;
      drawRoundRect(barX,barY,barW*Math.max(0,ratio),barH,2);ctx.fill();
    }
    ctx.globalAlpha=1;
  });
}

let beltOffset=0;
function drawLane(dt){
  beltOffset=(beltOffset+dt*120)%20;
  // Belt
  ctx.fillStyle='#888';ctx.fillRect(0,laneY,W,laneH);
  ctx.fillStyle='#777';
  for(let x=-beltOffset;x<W;x+=20){
    ctx.fillRect(x,laneY,10,laneH);
  }
  // Belt edges
  ctx.fillStyle='#666';ctx.fillRect(0,laneY,W,3);ctx.fillRect(0,laneY+laneH-3,W,3);

  // Direction arrows
  ctx.fillStyle='rgba(255,255,255,0.15)';
  ctx.font=(laneH*0.3)+'px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  const laneMid=laneY+laneH/2;
  for(let x=50;x<W;x+=120){
    ctx.fillText('→',x,laneMid);
  }

  // Sushi on lane
  const plateR=Math.min(28,laneH*0.35);
  laneSushi.forEach(s=>{
    if(s.taken){
      ctx.globalAlpha=1-s.takenAnim;
      const scale=1+s.takenAnim*0.5;
      ctx.save();ctx.translate(s.x,laneMid);ctx.scale(scale,scale);
      drawPlate(0,0,plateR,s.sushi);
      ctx.restore();
      ctx.globalAlpha=1;
    }else if(s.wasteAnim>0){
      ctx.globalAlpha=1-s.wasteAnim;
      ctx.save();ctx.translate(s.x,laneMid);ctx.scale(1-s.wasteAnim*0.5,1-s.wasteAnim*0.5);
      drawPlate(0,0,plateR,s.sushi);
      ctx.restore();
      ctx.globalAlpha=1;
    }else{
      drawPlate(s.x,laneMid,plateR,s.sushi);
    }
  });
}

function drawPlate(x,y,r,sushi){
  // Plate
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fillStyle=sushi.color+'44';ctx.fill();
  ctx.strokeStyle=sushi.color;ctx.lineWidth=3;ctx.stroke();
  // Inner circle
  ctx.beginPath();ctx.arc(x,y,r*0.7,0,Math.PI*2);
  ctx.fillStyle='#FFF';ctx.fill();
  // Emoji
  ctx.font=(r*0.9)+'px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(sushi.emoji,x,y);
}

function drawMenu(){
  ctx.fillStyle='#E8D5B7';ctx.fillRect(0,menuY,W,menuH);
  // Separator
  ctx.fillStyle='#8B4513';ctx.fillRect(0,menuY,W,3);

  menuButtons.forEach(b=>{
    const cd=cooldowns[b.sushi.id]||0;
    const onCooldown=cd>0;
    const press=b.pressAnim;

    ctx.save();
    if(press>0){
      ctx.translate(b.x+b.w/2,b.y+b.h/2);
      ctx.scale(1-press*0.05,1-press*0.05);
      ctx.translate(-(b.x+b.w/2),-(b.y+b.h/2));
    }

    ctx.globalAlpha=onCooldown?0.4:1;
    // Button bg
    ctx.fillStyle=onCooldown?'#999':b.sushi.color;
    drawRoundRect(b.x,b.y,b.w,b.h,10);ctx.fill();
    // Lighter inner
    ctx.fillStyle=onCooldown?'#AAA':b.sushi.color+'88';
    drawRoundRect(b.x+2,b.y+2,b.w-4,b.h-4,8);ctx.fill();

    // Content
    const fs=Math.min(18,b.h*0.35);
    ctx.font='bold '+fs+'px sans-serif';ctx.fillStyle='#FFF';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(b.sushi.emoji+' '+b.sushi.name,b.x+b.w/2,b.y+b.h*0.38);
    ctx.font=(fs*0.8)+'px sans-serif';
    ctx.fillText(b.sushi.price+'円',b.x+b.w/2,b.y+b.h*0.72);

    // Cooldown overlay
    if(onCooldown){
      const stage=getCurrentStage();
      const maxCd=b.sushi.gripTime;
      const ratio=cd/maxCd;
      ctx.fillStyle='rgba(0,0,0,0.3)';
      drawRoundRect(b.x,b.y,b.w*ratio,b.h,10);ctx.fill();
    }

    ctx.globalAlpha=1;
    ctx.restore();
  });
}

function drawEffects(dt){
  effects.forEach(e=>{
    const alpha=e.life/e.maxLife;
    ctx.globalAlpha=alpha;
    ctx.font='bold 20px sans-serif';
    ctx.fillStyle=e.color;ctx.textAlign='center';
    ctx.fillText(e.text,e.x,e.y);
    e.y+=e.vy*dt;
    e.life-=dt;
  });
  ctx.globalAlpha=1;
  effects=effects.filter(e=>e.life>0);
}

// === Title Screen ===
function drawTitle(){
  ctx.fillStyle='#F5E6D0';ctx.fillRect(0,0,W,H);

  // Decorative sushi
  ctx.font='40px sans-serif';ctx.textAlign='center';
  const emojis=['🍣','🐟','🦐','🥚','🥒','🐡'];
  emojis.forEach((e,i)=>{
    const angle=Date.now()/2000+i*Math.PI/3;
    const rx=W/2+Math.cos(angle)*Math.min(120,W*0.3);
    const ry=H*0.3+Math.sin(angle)*40;
    ctx.fillText(e,rx,ry);
  });

  ctx.fillStyle='#8B4513';
  ctx.font='bold '+Math.min(36,W*0.08)+'px sans-serif';
  ctx.fillText('🍣 回転寿司マスター 🍣',W/2,H*0.3);

  ctx.fillStyle='#666';
  ctx.font=Math.min(18,W*0.04)+'px sans-serif';
  ctx.fillText('Sushi Master',W/2,H*0.37);

  // Start button
  const btnW=Math.min(220,W*0.6);const btnH=50;
  const btnX=W/2-btnW/2;const btnY=H*0.48;
  ctx.fillStyle='#F44336';
  drawRoundRect(btnX,btnY,btnW,btnH,12);ctx.fill();
  ctx.fillStyle='#FFF';ctx.font='bold 20px sans-serif';
  ctx.fillText('▶ はじめる',W/2,btnY+btnH/2);

  // Endless button (if unlocked)
  if(endlessUnlocked||localStorage.getItem('sushiMasterEndless')==='1'){
    endlessUnlocked=true;
    const eBtnY=H*0.62;
    ctx.fillStyle='#FF9800';
    drawRoundRect(btnX,eBtnY,btnW,btnH,12);ctx.fill();
    ctx.fillStyle='#FFF';ctx.font='bold 20px sans-serif';
    ctx.fillText('♾ エンドレス',W/2,eBtnY+btnH/2);
    ctx.font='14px sans-serif';ctx.fillStyle='#666';
    ctx.fillText('ハイスコア: '+endlessHighScore+'円',W/2,eBtnY+btnH+20);
  }

  // Credits
  ctx.fillStyle='#999';ctx.font='12px sans-serif';
  ctx.fillText('ぷちゲーム部-AIラボ',W/2,H*0.92);
}

function drawStageIntro(){
  const stage=STAGES[stageIndex];
  ctx.fillStyle='#F5E6D0';ctx.fillRect(0,0,W,H);

  ctx.fillStyle='#8B4513';
  ctx.font='bold '+Math.min(28,W*0.06)+'px sans-serif';ctx.textAlign='center';
  ctx.fillText('ステージ '+(stageIndex+1),W/2,H*0.25);

  ctx.font='bold '+Math.min(32,W*0.07)+'px sans-serif';
  ctx.fillText('「'+stage.name+'」',W/2,H*0.34);

  ctx.fillStyle='#666';ctx.font=Math.min(16,W*0.04)+'px sans-serif';
  ctx.fillText(stage.desc,W/2,H*0.44);

  ctx.fillStyle='#333';ctx.font=Math.min(18,W*0.04)+'px sans-serif';
  ctx.fillText('🎯 ノルマ: '+stage.quota+'円',W/2,H*0.54);
  ctx.fillText('⏱ 制限時間: '+stage.time+'秒',W/2,H*0.60);
  ctx.fillText('👥 お客さん: '+stage.customers+'人',W/2,H*0.66);

  const btnW=Math.min(200,W*0.5);const btnH=50;
  ctx.fillStyle='#4CAF50';
  drawRoundRect(W/2-btnW/2,H*0.76,btnW,btnH,12);ctx.fill();
  ctx.fillStyle='#FFF';ctx.font='bold 20px sans-serif';
  ctx.fillText('スタート！',W/2,H*0.76+btnH/2);
}

function drawStageClear(){
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(0,0,W,H);

  const boxW=Math.min(300,W*0.8);const boxH=220;
  const boxX=W/2-boxW/2;const boxY=H/2-boxH/2;
  ctx.fillStyle='#FFF';drawRoundRect(boxX,boxY,boxW,boxH,16);ctx.fill();

  ctx.fillStyle='#4CAF50';ctx.font='bold 24px sans-serif';ctx.textAlign='center';
  ctx.fillText('🎉 ステージクリア！',W/2,boxY+40);

  ctx.fillStyle='#333';ctx.font='18px sans-serif';
  ctx.fillText('売上: '+score+'円',W/2,boxY+80);
  ctx.fillText('ノルマ: '+STAGES[stageIndex].quota+'円',W/2,boxY+110);

  const btnW2=Math.min(180,boxW*0.7);const btnH2=44;
  if(stageIndex<STAGES.length-1){
    ctx.fillStyle='#2196F3';
    drawRoundRect(W/2-btnW2/2,boxY+140,btnW2,btnH2,10);ctx.fill();
    ctx.fillStyle='#FFF';ctx.font='bold 18px sans-serif';
    ctx.fillText('次のステージへ →',W/2,boxY+140+btnH2/2);
  }else{
    ctx.fillStyle='#FF9800';
    drawRoundRect(W/2-btnW2/2,boxY+140,btnW2,btnH2,10);ctx.fill();
    ctx.fillStyle='#FFF';ctx.font='bold 18px sans-serif';
    ctx.fillText('🏆 全クリア！',W/2,boxY+140+btnH2/2);
  }
}

function drawGameOver(){
  ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,0,W,H);

  const boxW=Math.min(300,W*0.8);const boxH=state==='endless'?240:220;
  const boxX=W/2-boxW/2;const boxY=H/2-boxH/2;
  ctx.fillStyle='#FFF';drawRoundRect(boxX,boxY,boxW,boxH,16);ctx.fill();

  if(state==='endless'){
    ctx.fillStyle='#FF9800';ctx.font='bold 24px sans-serif';ctx.textAlign='center';
    ctx.fillText('♾ エンドレス終了',W/2,boxY+40);
    ctx.fillStyle='#333';ctx.font='18px sans-serif';
    ctx.fillText('売上: '+score+'円',W/2,boxY+80);
    ctx.fillText('ハイスコア: '+endlessHighScore+'円',W/2,boxY+110);
    if(score>=endlessHighScore&&score>0){
      ctx.fillStyle='#F44336';ctx.font='bold 16px sans-serif';
      ctx.fillText('🎉 NEW RECORD!',W/2,boxY+140);
    }
  }else{
    ctx.fillStyle='#F44336';ctx.font='bold 24px sans-serif';ctx.textAlign='center';
    ctx.fillText('😢 ノルマ未達成…',W/2,boxY+40);
    ctx.fillStyle='#333';ctx.font='18px sans-serif';
    ctx.fillText('売上: '+score+'円',W/2,boxY+80);
    ctx.fillText('ノルマ: '+STAGES[stageIndex].quota+'円',W/2,boxY+110);
  }

  const btnW2=Math.min(180,boxW*0.7);const btnH2=44;
  // Retry
  ctx.fillStyle='#F44336';
  drawRoundRect(W/2-btnW2/2,boxY+boxH-70,btnW2,btnH2,10);ctx.fill();
  ctx.fillStyle='#FFF';ctx.font='bold 18px sans-serif';
  ctx.fillText('🔄 もう一度',W/2,boxY+boxH-70+btnH2/2);
}

// === Game Logic ===
function startStage(){
  const stage=STAGES[stageIndex];
  score=0;timeLeft=stage.time;quotaReached=false;
  laneSushi=[];effects=[];cooldowns={};
  buildMenuButtons();
  initCustomers();
  state='playing';
  lastTime=performance.now();
}

function startEndless(){
  state='endless';
  score=0;endlessTime=0;endlessDifficulty=1;
  laneSushi=[];effects=[];cooldowns={};quotaReached=false;
  buildMenuButtons();
  initCustomers();
  lastTime=performance.now();
}

function update(dt){
  if(state!=='playing'&&state!=='endless')return;

  const stage=getCurrentStage();
  const laneSpeed=W/8; // px per second

  // Time
  if(state==='playing'){
    timeLeft-=dt;
    if(timeLeft<=0){
      timeLeft=0;
      if(score>=STAGES[stageIndex].quota){
        state='stageClear';
        playSound('clear');
        if(stageIndex===STAGES.length-1){
          endlessUnlocked=true;
          localStorage.setItem('sushiMasterEndless','1');
        }
        return;
      }else{
        state='gameOver';
        playSound('angry');
        return;
      }
    }
  }else{
    endlessTime+=dt;
    endlessDifficulty=1+endlessTime/60;
  }

  // Cooldowns
  Object.keys(cooldowns).forEach(k=>{
    cooldowns[k]=Math.max(0,cooldowns[k]-dt*1000);
  });

  // Button animations
  menuButtons.forEach(b=>{
    if(b.pressAnim>0)b.pressAnim=Math.max(0,b.pressAnim-dt*8);
  });

  // Move sushi
  laneSushi.forEach(s=>{
    if(!s.taken&&s.wasteAnim===0){
      s.x+=laneSpeed*dt;
    }
    if(s.taken)s.takenAnim=Math.min(1,s.takenAnim+dt*4);
    if(s.wasteAnim>0)s.wasteAnim=Math.min(1,s.wasteAnim+dt*3);
  });

  // Check sushi vs customers
  const seatW=W/Math.max(1,customers.length);
  laneSushi.forEach(s=>{
    if(s.taken||s.wasteAnim>0)return;
    customers.forEach((c,ci)=>{
      if(!c||s.taken||s.wasteAnim>0)return;
      const cx=seatW*ci+seatW/2;
      if(Math.abs(s.x-cx)<seatW*0.4){
        if(c.hasOrder&&c.order&&c.order.id===s.sushi.id){
          // Correct order!
          s.taken=true;
          const satisfaction=1+Math.random()*0.5;
          const earned=Math.round(s.sushi.price*satisfaction);
          score+=earned;
          c.face='🤩';c.faceTimer=2;c.hasOrder=false;
          c.sparkles=Array.from({length:4},()=>({x:(Math.random()-0.5)*40,y:(Math.random()-0.5)*30,life:1}));
          addEffect(s.x,laneY-10,'+'+earned+'円','#4CAF50');
          playSound('take');
          // New order after delay
          setTimeout(()=>{
            if(customers[ci]===c&&(state==='playing'||state==='endless')){
              if(stage.fastRotation){
                replaceCustomer(ci);
              }else{
                const available=SUSHI_TYPES.filter(st=>stage.tiers.includes(st.tier));
                c.order=available[Math.floor(Math.random()*available.length)];
                c.orderTimeLeft=stage.orderTimer;c.hasOrder=true;c.face='😐';
              }
            }
          },1500);
        }else if(c.hasOrder&&c.order&&c.order.id!==s.sushi.id){
          // Wrong sushi - 50% take at half price
          if(Math.random()<0.5){
            s.taken=true;
            const earned=Math.round(s.sushi.price*0.5);
            score+=earned;
            c.face='😐';c.faceTimer=1;
            addEffect(s.x,laneY-10,'+'+earned+'円','#FF9800');
            playSound('take');
          }
        }else if(!c.hasOrder&&!c.bonusTaken&&Math.random()<0.02){
          // Idle customer randomly takes
          s.taken=true;
          const earned=s.sushi.price;
          score+=earned;
          c.face='😊';c.faceTimer=1.5;c.bonusTaken=true;
          addEffect(s.x,laneY-10,'+'+earned+'円 ボーナス!','#9C27B0');
          playSound('take');
        }
      }
    });

    // Off screen = waste
    if(s.x>W+40&&!s.taken&&s.wasteAnim===0){
      s.wasteAnim=0.01;
      score=Math.max(0,score-50);
      addEffect(W-40,laneY-10,'-50円','#F44336');
      playSound('waste');
    }
  });

  // Remove finished sushi
  laneSushi=laneSushi.filter(s=>!(s.takenAnim>=1||s.wasteAnim>=1));

  // Customer timers
  customers.forEach((c,ci)=>{
    if(!c)return;
    if(c.enterAnim>0)c.enterAnim=Math.max(0,c.enterAnim-dt*3);
    if(c.faceTimer>0){c.faceTimer-=dt;if(c.faceTimer<=0)c.face='😐';}
    c.sparkles.forEach(sp=>sp.life-=dt);
    c.sparkles=c.sparkles.filter(sp=>sp.life>0);
    c.angryMarks.forEach(sp=>sp.life-=dt);
    c.angryMarks=c.angryMarks.filter(sp=>sp.life>0);

    if(c.hasOrder){
      c.orderTimeLeft-=dt;
      // Change mind
      if(stage.changeMind>0&&Math.random()<stage.changeMind*dt){
        const available=SUSHI_TYPES.filter(st=>stage.tiers.includes(st.tier));
        const newOrder=available[Math.floor(Math.random()*available.length)];
        if(newOrder.id!==c.order.id){
          c.order=newOrder;
          c.face='🤔';c.faceTimer=0.5;
        }
      }
      if(c.orderTimeLeft<=0){
        // Angry!
        c.face='😠';c.faceTimer=2;c.hasOrder=false;
        c.angryMarks=Array.from({length:3},()=>({x:(Math.random()-0.5)*40,y:(Math.random()-0.5)*30,life:1.2}));
        playSound('angry');
        // Customer leaves, new one comes
        setTimeout(()=>{
          if(state==='playing'||state==='endless'){
            replaceCustomer(ci);
          }
        },2000);
      }
    }
  });

  // Check quota (visual feedback only in stage mode)
  if(state==='playing'&&!quotaReached&&score>=STAGES[stageIndex].quota){
    quotaReached=true;
    addEffect(W/2,H/2,'🎉 ノルマ達成！','#FFD700',2);
    playSound('clear');
  }

  // Endless - check if all customers gone (shouldn't happen, but safety)
  if(state==='endless'){
    while(customers.length<getCurrentStage().customers){
      customers.push(createCustomer(customers.length,getCurrentStage().customers));
    }
  }
}

// === Input ===
function handleClick(x,y){
  initAudio();

  if(state==='title'){
    const btnW=Math.min(220,W*0.6);const btnH=50;
    const btnX=W/2-btnW/2;
    // Start
    if(x>=btnX&&x<=btnX+btnW&&y>=H*0.48&&y<=H*0.48+btnH){
      stageIndex=0;state='stageIntro';return;
    }
    // Endless
    if(endlessUnlocked&&x>=btnX&&x<=btnX+btnW&&y>=H*0.62&&y<=H*0.62+btnH){
      startEndless();return;
    }
    return;
  }

  if(state==='stageIntro'){
    const btnW=Math.min(200,W*0.5);const btnH=50;
    if(x>=W/2-btnW/2&&x<=W/2+btnW/2&&y>=H*0.76&&y<=H*0.76+btnH){
      startStage();
    }
    return;
  }

  if(state==='stageClear'){
    const boxW=Math.min(300,W*0.8);const boxH=220;
    const boxY=H/2-boxH/2;
    const btnW2=Math.min(180,boxW*0.7);const btnH2=44;
    if(x>=W/2-btnW2/2&&x<=W/2+btnW2/2&&y>=boxY+140&&y<=boxY+140+btnH2){
      if(stageIndex<STAGES.length-1){
        stageIndex++;state='stageIntro';
      }else{
        state='title';
      }
    }
    return;
  }

  if(state==='gameOver'){
    const boxW=Math.min(300,W*0.8);const boxH=state==='endless'?240:220;
    const boxY=H/2-boxH/2;
    const btnW2=Math.min(180,boxW*0.7);const btnH2=44;
    if(x>=W/2-btnW2/2&&x<=W/2+btnW2/2&&y>=boxY+boxH-70&&y<=boxY+boxH-70+btnH2){
      state='title';
    }
    return;
  }

  // Endless game over (repurpose)
  if(state==='endlessOver'){
    state='title';return;
  }

  if(state==='playing'||state==='endless'){
    // Check menu buttons
    menuButtons.forEach(b=>{
      if(x>=b.x&&x<=b.x+b.w&&y>=b.y&&y<=b.y+b.h){
        const cd=cooldowns[b.sushi.id]||0;
        if(cd<=0){
          addSushiToLane(b.sushi);
          cooldowns[b.sushi.id]=b.sushi.gripTime;
          b.pressAnim=1;
          playSound('grip');
        }
      }
    });
  }
}

canvas.addEventListener('pointerdown',(e)=>{
  e.preventDefault();
  const rect=canvas.getBoundingClientRect();
  handleClick(e.clientX-rect.left,e.clientY-rect.top);
});

// Prevent scrolling
document.addEventListener('touchmove',(e)=>e.preventDefault(),{passive:false});

// === Main Loop ===
function gameLoop(now){
  const dt=Math.min(0.1,(now-lastTime)/1000);
  lastTime=now;

  ctx.clearRect(0,0,W,H);

  if(state==='title'){
    drawTitle();
  }else if(state==='stageIntro'){
    drawStageIntro();
  }else if(state==='playing'||state==='endless'){
    update(dt);
    // BG
    ctx.fillStyle='#F5E6D0';ctx.fillRect(0,0,W,H);
    drawStatusBar();
    drawCustomers(dt);
    drawLane(dt);
    drawMenu();
    drawEffects(dt);

    if(state==='stageClear'){drawStageClear();}
    if(state==='gameOver'){
      if(state==='endless'){
        if(score>endlessHighScore){
          endlessHighScore=score;
          localStorage.setItem('sushiMasterHS',String(score));
        }
      }
      drawGameOver();
    }
  }else if(state==='stageClear'){
    ctx.fillStyle='#F5E6D0';ctx.fillRect(0,0,W,H);
    drawStatusBar();drawCustomers(0);drawLane(0);drawMenu();
    drawStageClear();
  }else if(state==='gameOver'){
    ctx.fillStyle='#F5E6D0';ctx.fillRect(0,0,W,H);
    drawStatusBar();drawCustomers(0);drawLane(0);drawMenu();
    drawGameOver();
  }

  requestAnimationFrame(gameLoop);
}

window.addEventListener('resize',resize);
resize();
lastTime=performance.now();
requestAnimationFrame(gameLoop);
</script>
