<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Maze Architect</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{width:100%;height:100%;overflow:hidden;font-family:system-ui,-apple-system,sans-serif;background:radial-gradient(ellipse at center,#F6F6F5 0%,#ECECEC 100%)}
#app{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center}
canvas{display:block;touch-action:none}
.screen{display:none;flex-direction:column;align-items:center;justify-content:center;width:100%;height:100%;padding:16px}
.screen.active{display:flex}
.btn{background:#2F2B2A;color:#fff;border:none;border-radius:12px;padding:14px 28px;font-size:16px;font-family:system-ui;cursor:pointer;margin:6px;min-width:200px;text-align:center;transition:transform .1s,opacity .1s}
.btn:active{transform:scale(0.96);opacity:0.8}
.btn-secondary{background:#fff;color:#2F2B2A;border:2px solid #E0E0E0}
.btn-small{padding:10px 16px;font-size:14px;min-width:auto;border-radius:10px}
.btn-dungeon{background:#5B4FCF}
h1{font-size:28px;color:#2F2B2A;margin-bottom:4px}
h2{font-size:20px;color:#2F2B2A;margin-bottom:8px}
.subtitle{color:#888;font-size:14px;margin-bottom:20px}
.game-header{display:flex;justify-content:space-between;align-items:center;width:100%;max-width:420px;padding:8px 4px;font-size:13px;color:#555;flex-shrink:0}
.game-header .info{display:flex;gap:12px}
.game-header .stage-name{font-weight:700;color:#2F2B2A;font-size:15px}
.game-footer{display:flex;gap:8px;padding:8px 4px;flex-shrink:0;flex-wrap:wrap;justify-content:center}
.canvas-wrap{flex:1;display:flex;align-items:center;justify-content:center;width:100%;min-height:0;overflow:hidden;position:relative}
.stage-card{background:#fff;border-radius:16px;padding:20px;width:280px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,0.06);position:relative}
.stage-card .badge{display:inline-block;padding:3px 10px;border-radius:8px;font-size:12px;font-weight:700;margin-bottom:8px}
.stage-nav{display:flex;align-items:center;gap:16px;margin-top:16px}
.nav-btn{width:44px;height:44px;border-radius:50%;background:#fff;border:2px solid #E0E0E0;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#2F2B2A}
.nav-btn:active{background:#f0f0f0}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#2F2B2A;color:#fff;padding:10px 20px;border-radius:10px;font-size:14px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:100}
.toast.show{opacity:1}
.result-box{background:#fff;border-radius:16px;padding:24px;text-align:center;box-shadow:0 2px 16px rgba(0,0,0,0.08);max-width:320px;width:90%}
.result-box .big{font-size:48px;margin:8px 0}
.result-box .score-val{font-size:32px;font-weight:700;color:#2F2B2A}
.result-box .detail{font-size:13px;color:#888;margin:4px 0}
.star-row{display:flex;justify-content:center;gap:8px;margin:12px 0 4px}
.star{font-size:40px;opacity:0;transform:scale(0.3) rotate(-30deg);transition:opacity .4s ease-out,transform .4s cubic-bezier(0.34,1.56,0.64,1);display:inline-block}
.star.show{opacity:1;transform:scale(1) rotate(0deg)}
.star.empty{filter:grayscale(1) opacity(0.3)}
.star-label{font-size:13px;font-weight:600;margin-bottom:4px}
.free-options{display:flex;flex-direction:column;gap:12px;width:100%;max-width:300px;margin:12px 0}
.free-options label{font-size:14px;color:#555;font-weight:600}
.free-options select{padding:10px;border-radius:10px;border:2px solid #E0E0E0;font-size:15px;font-family:system-ui;background:#fff;color:#2F2B2A}
.dungeon-grid{display:flex;flex-wrap:wrap;gap:8px;width:100%;max-width:360px;justify-content:center;margin:12px 0}
.dungeon-floor{background:#fff;border-radius:12px;padding:10px 16px;text-align:center;box-shadow:0 1px 6px rgba(0,0,0,0.06);cursor:pointer;border:2px solid transparent;transition:border-color .2s,transform .1s;min-width:70px}
.dungeon-floor:active{transform:scale(0.97)}
.dungeon-floor.cleared{border-color:#4ED26D;background:#F0FFF4}
.dungeon-floor.current{border-color:#5B4FCF;background:#F5F3FF}
.dungeon-floor.locked{opacity:0.35;pointer-events:none}
.dungeon-floor .df-name{font-size:15px;font-weight:700;color:#2F2B2A}
.dungeon-floor .df-info{font-size:10px;color:#888;margin-top:2px}
.dungeon-floor .df-status{font-size:14px;margin-top:2px}
.dungeon-desc{background:#fff;border-radius:12px;padding:12px 16px;margin:8px 0;max-width:340px;width:100%;text-align:center;box-shadow:0 1px 6px rgba(0,0,0,0.04)}
.dungeon-desc .dd-title{font-weight:700;font-size:15px;color:#2F2B2A;margin-bottom:4px}
.dungeon-desc .dd-text{font-size:12px;color:#888}
.minimap-wrap{position:absolute;top:4px;right:4px;display:flex;gap:2px;padding:4px;background:rgba(255,255,255,0.85);border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,0.1)}
.minimap-floor{border:1px solid #ccc;border-radius:3px;background:#fafafa}
.minimap-floor.mm-active{border-color:#5B4FCF;box-shadow:0 0 4px #5B4FCF88}
.minimap-floor.mm-done{border-color:#4ED26D}
.floor-indicator{font-size:13px;color:#5B4FCF;font-weight:700;padding:4px 0}
.stairs-overlay{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.6);z-index:50;opacity:0;transition:opacity .2s;pointer-events:none}
.stairs-overlay.show{opacity:1}
.stairs-overlay .stairs-text{color:#fff;font-size:28px;font-weight:700;text-shadow:0 2px 8px rgba(0,0,0,0.4)}
.stairs-overlay .stairs-icon{font-size:64px;margin-bottom:8px}
.confetti-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:200}
.float-score{position:absolute;pointer-events:none;font-weight:700;font-size:18px;color:#FF9500;text-shadow:0 1px 4px rgba(0,0,0,0.15);z-index:60;animation:floatUp .9s ease-out forwards}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}50%{opacity:1;transform:translateY(-24px) scale(1.2)}100%{opacity:0;transform:translateY(-48px) scale(0.8)}}
@keyframes shakeCanvas{0%,100%{transform:translate(0,0)}15%{transform:translate(-3px,2px)}30%{transform:translate(3px,-2px)}45%{transform:translate(-2px,3px)}60%{transform:translate(2px,-1px)}75%{transform:translate(-1px,2px)}}
.wall-ripple{position:absolute;pointer-events:none;border-radius:50%;z-index:55;animation:wallRipple .45s ease-out forwards}
@keyframes wallRipple{0%{transform:translate(-50%,-50%) scale(0.2);opacity:0.8}100%{transform:translate(-50%,-50%) scale(1);opacity:0}}
.goal-pulse{animation:goalPulse 2s ease-in-out infinite}
@keyframes goalPulse{0%,100%{opacity:0.3}50%{opacity:0.7}}
.dead-end-badge{position:absolute;top:8px;left:8px;background:#FF950022;color:#FF9500;font-size:13px;font-weight:700;padding:4px 10px;border-radius:8px;pointer-events:none;transition:opacity .3s}
@keyframes deadEndPulse{0%,100%{transform:scale(1);opacity:0.7}50%{transform:scale(1.3);opacity:1}}
</style>
</head>
<body>
<div id="app">
  <!-- Title -->
  <div class="screen active" id="titleScreen">
    <h1>🏗️ Maze Architect</h1>
    <div class="subtitle">迷路を作って、AIを迷わせろ！</div>
    <button class="btn" onclick="showStageSelect()">🗺️ ステージモード</button>
    <button class="btn btn-dungeon" onclick="showDungeonSelect()">🏰 ダンジョンモード</button>
    <button class="btn btn-secondary" onclick="showFreeMode()">🏗️ フリーモード</button>
    <button class="btn btn-secondary btn-small" id="muteBtnTitle" onclick="toggleMute()" style="margin-top:12px">🔊 サウンド ON</button>
  </div>
  <!-- Stage Select -->
  <div class="screen" id="stageScreen">
    <h2>ステージ選択</h2>
    <div class="stage-card" id="stageCard"></div>
    <div class="stage-nav">
      <button class="nav-btn" onclick="navStage(-1)">◀</button>
      <span id="stageNum" style="font-size:14px;color:#888">1/8</span>
      <button class="nav-btn" onclick="navStage(1)">▶</button>
    </div>
    <button class="btn" style="margin-top:16px" onclick="startStage()">▶ はじめる</button>
    <button class="btn btn-secondary btn-small" style="margin-top:4px" onclick="showTitle()">戻る</button>
  </div>
  <!-- Dungeon Select -->
  <div class="screen" id="dungeonScreen">
    <h2>🪜 ダンジョン</h2>
    <div class="subtitle">階層を潜り、迷宮を築け！</div>
    <div class="dungeon-grid" id="dungeonGrid"></div>
    <div class="dungeon-desc" id="dungeonDesc"></div>
    <button class="btn btn-dungeon" id="dungeonStartBtn" onclick="startDungeon()" style="margin-top:4px">▶ この階の壁を編集</button>
    <button class="btn btn-secondary btn-small" style="margin-top:4px" onclick="showTitle()">← 戻る</button>
  </div>
  <!-- Free Mode Options -->
  <div class="screen" id="freeScreen">
    <h2>🏗️ フリーモード</h2>
    <div class="free-options">
      <label>グリッドサイズ</label>
      <select id="freeSize">
        <option value="5">5×5</option>
        <option value="8" selected>8×8</option>
        <option value="10">10×10</option>
        <option value="12">12×12</option>
        <option value="15">15×15</option>
      </select>
      <label>攻略者アルゴリズム</label>
      <select id="freeAlgo">
        <option value="random">🟢 ランダムウォーク</option>
        <option value="righthand">🟡 右手法</option>
        <option value="bfs">🔴 BFS</option>
        <option value="astar">💀 A*</option>
      </select>
    </div>
    <button class="btn" onclick="startFree()">▶ スタート</button>
    <button class="btn btn-secondary btn-small" onclick="showTitle()">戻る</button>
  </div>
  <!-- Game -->
  <div class="screen" id="gameScreen">
    <div class="game-header">
      <span class="stage-name" id="gameName"></span>
      <div class="info">
        <span id="wallCount">🧱 0</span>
        <span id="pathLen" style="color:#5B4FCF;font-weight:600">📏 --</span>
        <span id="timerDisp">⏱ 0.0s</span>
      </div>
    </div>
    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="gameCanvas"></canvas>
      <div class="dead-end-badge" id="deadEndBadge" style="opacity:0">🚧 行き止まり: <span id="deadEndNum">0</span></div>
      <div class="minimap-wrap" id="minimapWrap" style="display:none"></div>
      <div class="stairs-overlay" id="stairsOverlay">
        <div class="stairs-icon">🪜</div>
        <div class="stairs-text" id="stairsText">B2Fへ…</div>
      </div>
    </div>
    <div class="floor-indicator" id="floorIndicator" style="display:none"></div>
    <div class="game-footer" id="gameFooter">
      <button class="btn btn-small" id="startBtn" onclick="runSolver()">▶ スタート</button>
      <button class="btn btn-small btn-secondary" id="testRunBtn" onclick="testFloorRun()" style="display:none">🔄 この階テスト</button>
      <button class="btn btn-small btn-secondary" id="speedBtn" onclick="cycleSpeed()" style="display:none">⏩ 1x</button>
      <button class="btn btn-small btn-secondary" onclick="undoWall()">↩️ 戻す</button>
      <button class="btn btn-small btn-secondary" onclick="resetWalls()">🗑️ リセット</button>
      <button class="btn btn-small btn-secondary" id="muteBtn" onclick="toggleMute()">🔊</button>
      <button class="btn btn-small btn-secondary" onclick="backFromGame()">🏠</button>
    </div>
  </div>
  <!-- Result -->
  <div class="screen" id="resultScreen">
    <div class="result-box">
      <div id="resultEmoji" class="big">🎉</div>
      <div id="resultTitle" style="font-size:20px;font-weight:700;margin-bottom:8px">クリア！</div>
      <div id="resultTime" class="detail"></div>
      <div class="score-val" id="resultScore">0</div>
      <div id="resultBreakdown" class="detail"></div>
      <div class="star-row" id="starRow"></div>
      <div class="star-label" id="starLabel"></div>
      <div style="margin-top:16px;display:flex;flex-direction:column;gap:8px;align-items:center">
        <button class="btn btn-small" id="nextStageBtn" onclick="nextStage()">次のステージ ▶</button>
        <button class="btn btn-small btn-dungeon" id="nextDungeonBtn" onclick="nextDungeonFloor()" style="display:none">次の階へ ▶</button>
        <button class="btn btn-small btn-secondary" onclick="retryStage()">🔄 リトライ</button>
        <button class="btn btn-small btn-secondary" onclick="backFromResult()">🏠 戻る</button>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ── Audio ──
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
let muted=false;
try{muted=localStorage.getItem('maze_architect_muted')==='true'}catch(e){}
function ensureAudio(){if(!audioCtx)audioCtx=new AudioCtx()}
function playTone(freq,dur,type,vol){
  if(muted)return;
  ensureAudio();
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=type||'square';o.frequency.value=freq;
  g.gain.setValueAtTime(vol||0.08,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
  o.connect(g);g.connect(audioCtx.destination);
  o.start();o.stop(audioCtx.currentTime+dur);
}
function sfxWall(){playTone(600,0.08,'square',0.06)}
function sfxRemove(){playTone(400,0.08,'square',0.05)}
function sfxStart(){playTone(880,0.15,'sine',0.1);setTimeout(()=>playTone(1100,0.2,'sine',0.1),150)}
function sfxClear(){playTone(660,0.15,'sine',0.12);setTimeout(()=>playTone(880,0.15,'sine',0.12),150);setTimeout(()=>playTone(1100,0.3,'sine',0.12),300)}
function sfxFail(){playTone(330,0.2,'sawtooth',0.08);setTimeout(()=>playTone(260,0.3,'sawtooth',0.08),200)}
function sfxStairs(){playTone(440,0.12,'sine',0.1);setTimeout(()=>playTone(550,0.12,'sine',0.1),120);setTimeout(()=>playTone(660,0.15,'sine',0.1),240)}
function sfxDeadEnd(){playTone(520,0.06,'square',0.07);setTimeout(()=>playTone(700,0.1,'sine',0.09),60)}

function toggleMute(){
  muted=!muted;
  try{localStorage.setItem('maze_architect_muted',muted?'true':'false')}catch(e){}
  updateMuteUI();
  if(!muted){ensureAudio();playTone(880,0.1,'sine',0.08)}
}
function updateMuteUI(){
  const gb=document.getElementById('muteBtn');
  const tb=document.getElementById('muteBtnTitle');
  if(gb)gb.textContent=muted?'🔇':'🔊';
  if(tb)tb.textContent=muted?'🔇 サウンド OFF':'🔊 サウンド ON';
}
// Init mute UI on load
document.addEventListener('DOMContentLoaded',updateMuteUI);

// ── Wall ripple effect ──
function spawnWallRipple(wallObj, isRemove){
  const wrap=document.getElementById('canvasWrap');
  const rect=canvas.getBoundingClientRect();
  const wrapRect=wrap.getBoundingClientRect();
  const [r,c,d]=wallObj.key.split(',');
  const ri=+r, ci=+c;
  let cx,cy;
  if(d==='h'){cx=ci*cellSize+cellSize/2;cy=ri*cellSize}
  else{cx=ci*cellSize;cy=ri*cellSize+cellSize/2}
  cx+=(rect.left-wrapRect.left);
  cy+=(rect.top-wrapRect.top);
  const el=document.createElement('div');
  el.className='wall-ripple';
  const sz=cellSize*1.6;
  el.style.width=sz+'px';el.style.height=sz+'px';
  el.style.left=cx+'px';el.style.top=cy+'px';
  el.style.background=isRemove?'radial-gradient(circle,rgba(255,59,48,0.4) 0%,transparent 70%)':'radial-gradient(circle,rgba(91,79,207,0.4) 0%,transparent 70%)';
  wrap.appendChild(el);
  setTimeout(()=>el.remove(),500);
}

// ── Float score popup ──
function showFloatScore(r,c,text,color){
  const wrap=document.getElementById('canvasWrap');
  const rect=canvas.getBoundingClientRect();
  const wrapRect=wrap.getBoundingClientRect();
  const x=c*cellSize+cellSize/2+(rect.left-wrapRect.left);
  const y=r*cellSize+(rect.top-wrapRect.top);
  const el=document.createElement('div');
  el.className='float-score';
  el.textContent=text;
  if(color)el.style.color=color;
  el.style.left=x+'px';el.style.top=y+'px';
  el.style.transform='translateX(-50%)';
  wrap.appendChild(el);
  setTimeout(()=>el.remove(),950);
}

// ── Screen shake ──
function shakeScreen(){
  canvas.style.animation='none';
  canvas.offsetHeight; // reflow
  canvas.style.animation='shakeCanvas 0.3s ease';
  setTimeout(()=>{canvas.style.animation='none'},350);
}

// ── Stage definitions ──
const STAGES=[
  {name:'はじめての壁',grid:5,algo:'random',target:5,desc:'壁をタップして配置！攻略者を迷わせよう'},
  {name:'行き止まり',grid:6,algo:'random',target:10,desc:'行き止まりを作ると攻略者が引き返すよ'},
  {name:'壁伝いの敵',grid:7,algo:'righthand',target:8,desc:'この攻略者は壁を伝って進む。螺旋状に迷わせろ！'},
  {name:'広い迷路',grid:8,algo:'righthand',target:12,desc:'広いフィールド。長い回り道を作れ！'},
  {name:'探索者',grid:8,algo:'bfs',target:6,desc:'⚠️ この攻略者は最短経路を見つける！'},
  {name:'大迷宮',grid:10,algo:'bfs',target:8,desc:'大きな迷路で最短経路を遠回りさせろ！'},
  {name:'天才',grid:10,algo:'astar',target:5,desc:'💀 A*アルゴリズム。ほぼ最短で来る。壁を最大限に活用しろ！'},
  {name:'究極の迷宮',grid:12,algo:'astar',target:7,desc:'最大フィールド。究極の迷路を設計せよ！'},
];

// ── Dungeon quest definitions ──
const QUESTS=[
  {name:'B1F',gridN:5,algo:'random',goalTime:5,desc:'地下1階。まずは基本の迷路を作ろう'},
  {name:'B2F',gridN:5,algo:'random',goalTime:8,desc:'地下2階。ランダムウォークはまだ楽勝'},
  {name:'B3F',gridN:6,algo:'righthand',goalTime:10,desc:'⚠️ 壁伝いで来る！螺旋で迷わせろ'},
  {name:'B4F',gridN:6,algo:'righthand',goalTime:12,desc:'右手法の攻略者。回り道を増やせ'},
  {name:'B5F',gridN:7,algo:'bfs',goalTime:8,desc:'💀 最短経路を見つけてくる！'},
  {name:'B6F',gridN:7,algo:'bfs',goalTime:10,desc:'BFS探索者。壁を最大限に活用しろ'},
  {name:'B7F',gridN:8,algo:'astar',goalTime:6,desc:'🔥 A*アルゴリズム。ほぼ最短で来る'},
  {name:'B8F',gridN:8,algo:'astar',goalTime:8,desc:'最深部。究極の迷宮を設計せよ！'},
];

const ALGO_INFO={random:{label:'🟢 ランダム',color:'#4ED26D'},righthand:{label:'🟡 右手法',color:'#F5A623'},bfs:{label:'🔴 BFS',color:'#FF3B30'},astar:{label:'💀 A*',color:'#8B5CF6'}};

// ── Global state ──
let curStageIdx=0, mode='stage', curConfig=null;
let gridN=5, walls=new Set(), wallHistory=[], usedWalls=0;
let running=false, timer=0, timerStart=0, animId=null;
let solverState=null, explored=new Set(), shortestPath=[], deadEndCount=0, realtimeWallPenalty=0;
let solverTrail=[];  // [{r,c,time}] for trail effect
const TRAIL_MAX=40, TRAIL_DURATION=1200;

// ── Dungeon state ──
let dungeonFloorIdx=0;          // currently selected floor for editing
let dungeonWalls=[];             // dungeonWalls[i] = Array of wall keys
let dungeonCleared=[];           // dungeonCleared[i] = bool
let dungeonSelectedFloor=0;      // selected in dungeon select screen
let dungeonRunFloorIdx=0;        // which floor the solver is currently on during full run
let dungeonRunning=false;        // is a full dungeon run in progress
let dungeonTestMode=false;       // single-floor test run
let userSpeedLevel=0;            // 0=1x, 1=2x, 2=4x
const SPEED_LABELS=['1x','2x','4x'];
const SPEED_MULTIPLIERS=[1,2,4];

function initDungeonState(){
  dungeonWalls=[];
  dungeonCleared=[];
  for(let i=0;i<QUESTS.length;i++){
    dungeonWalls.push([]);
    dungeonCleared.push(false);
  }
}
initDungeonState();

// ── LocalStorage persistence for dungeon progress ──
const SAVE_KEY='maze_architect_dungeon';
function saveDungeon(){
  try{
    const data={walls:dungeonWalls,cleared:dungeonCleared};
    localStorage.setItem(SAVE_KEY,JSON.stringify(data));
  }catch(e){}
}
function loadDungeon(){
  try{
    const raw=localStorage.getItem(SAVE_KEY);
    if(!raw)return;
    const data=JSON.parse(raw);
    if(data.walls&&Array.isArray(data.walls)){
      for(let i=0;i<Math.min(data.walls.length,QUESTS.length);i++){
        dungeonWalls[i]=Array.isArray(data.walls[i])?data.walls[i]:[];
      }
    }
    if(data.cleared&&Array.isArray(data.cleared)){
      for(let i=0;i<Math.min(data.cleared.length,QUESTS.length);i++){
        dungeonCleared[i]=!!data.cleared[i];
      }
    }
  }catch(e){}
}

// ── Game Init ──
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
let cellSize=40, offsetX=0, offsetY=0;
let hoverWall=null; // preview wall {r,c,d,key}

function initGame(cfg){
  stopSolver();
  gridN=cfg.grid;
  walls=new Set();wallHistory=[];usedWalls=0;
  running=false;timer=0;explored=new Set();shortestPath=[];deadEndCount=0;realtimeWallPenalty=0;
  solverState=null;dungeonRunning=false;solverTrail=[];
  document.getElementById('gameName').textContent=cfg.name;
  document.getElementById('startBtn').disabled=false;
  document.getElementById('minimapWrap').style.display='none';
  document.getElementById('floorIndicator').style.display='none';
  document.getElementById('stairsOverlay').classList.remove('show');
  resizeCanvas();
  updateUI();
  draw();
}

function resizeCanvas(){
  const wrap=document.getElementById('canvasWrap');
  const w=wrap.clientWidth-16, h=wrap.clientHeight-16;
  const canvasSize=Math.min(w, h, window.innerWidth-20, window.innerHeight*0.55);
  cellSize=Math.floor(canvasSize/gridN);
  if(cellSize<28) cellSize=28;
  if(cellSize>60) cellSize=60;
  const totalW=cellSize*gridN;
  const totalH=cellSize*gridN;
  const dpr=window.devicePixelRatio||1;
  canvas.width=totalW*dpr;canvas.height=totalH*dpr;
  canvas.style.width=totalW+'px';canvas.style.height=totalH+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  offsetX=0;offsetY=0;
}

function calcShortestPath(wallSet, gn){
  const visited=new Set();
  const parent=new Map();
  const q=[[0,0]];visited.add('0,0');
  const goal=`${gn-1},${gn-1}`;
  while(q.length){
    const [r,c]=q.shift();
    const k=`${r},${c}`;
    if(k===goal){
      let len=0,cur=goal;
      while(cur){len++;cur=parent.get(cur)}
      return len-1; // steps, not nodes
    }
    for(const [nr,nc] of neighborsIn(wallSet,gn,r,c)){
      const nk=`${nr},${nc}`;
      if(!visited.has(nk)){visited.add(nk);parent.set(nk,k);q.push([nr,nc])}
    }
  }
  return -1;
}

let previewPath=[]; // BFS shortest path for preview overlay

// ── Dead-end detection for preview ──
let deadEndCells=[];
function detectDeadEnds(){
  deadEndCells=[];
  for(let r=0;r<gridN;r++){
    for(let c=0;c<gridN;c++){
      if(r===0&&c===0)continue; // start
      if(r===gridN-1&&c===gridN-1)continue; // goal
      const nb=neighborsIn(walls,gridN,r,c);
      if(nb.length===1) deadEndCells.push([r,c]);
    }
  }
  const badge=document.getElementById('deadEndBadge');
  const num=document.getElementById('deadEndNum');
  if(deadEndCells.length>0&&!running){
    badge.style.opacity='1';
    num.textContent=deadEndCells.length;
  } else {
    badge.style.opacity='0';
  }
}

function updatePathPreview(){
  const len=calcShortestPath(walls,gridN);
  const el=document.getElementById('pathLen');
  const minPath=(gridN-1)*2; // Manhattan distance
  if(len<0){el.textContent='📏 --';previewPath=[];return}
  const ratio=len/minPath;
  // Color: green when long, red when short
  if(ratio>=2.5) el.style.color='#4ED26D';
  else if(ratio>=1.5) el.style.color='#F5A623';
  else el.style.color='#FF3B30';
  el.textContent=`📏 ${len}歩`;
  // Compute actual path for preview
  const visited=new Set();const par=new Map();
  const q=[[0,0]];visited.add('0,0');
  const goal=`${gridN-1},${gridN-1}`;
  let found=false;
  while(q.length){
    const [r,c]=q.shift();const k=`${r},${c}`;
    if(k===goal){found=true;break}
    for(const [nr,nc] of neighborsIn(walls,gridN,r,c)){
      const nk=`${nr},${nc}`;
      if(!visited.has(nk)){visited.add(nk);par.set(nk,k);q.push([nr,nc])}
    }
  }
  if(found){
    const p=[];let cur=goal;
    while(cur){p.unshift(cur.split(',').map(Number));cur=par.get(cur)}
    previewPath=p;
  } else {previewPath=[]}
}

function updateUI(){
  document.getElementById('wallCount').textContent=`🧱 ${usedWalls}`;
  document.getElementById('timerDisp').textContent=`⏱ ${timer.toFixed(1)}s`;
  if(!running){updatePathPreview();detectDeadEnds();}
}

// ── Wall helpers (parameterized for dungeon multi-grid) ──
function wallKey(r,c,d){return `${r},${c},${d}`}

function hasWallIn(wallSet,gn,r,c,d){
  if(d==='h'){if(r===0||r===gn)return true}
  if(d==='v'){if(c===0||c===gn)return true}
  return wallSet.has(wallKey(r,c,d));
}
function hasWall(r,c,d){return hasWallIn(walls,gridN,r,c,d)}

function canPassIn(wallSet,gn,r1,c1,r2,c2){
  if(r2<0||r2>=gn||c2<0||c2>=gn)return false;
  if(r2===r1-1&&c2===c1)return !hasWallIn(wallSet,gn,r1,c1,'h');
  if(r2===r1+1&&c2===c1)return !hasWallIn(wallSet,gn,r1+1,c1,'h');
  if(r2===r1&&c2===c1-1)return !hasWallIn(wallSet,gn,r1,c1,'v');
  if(r2===r1&&c2===c1+1)return !hasWallIn(wallSet,gn,r1,c1+1,'v');
  return false;
}
function canPass(r1,c1,r2,c2){return canPassIn(walls,gridN,r1,c1,r2,c2)}

function neighborsIn(wallSet,gn,r,c){
  const n=[];
  [[-1,0],[1,0],[0,-1],[0,1]].forEach(([dr,dc])=>{
    const nr=r+dr,nc=c+dc;
    if(canPassIn(wallSet,gn,r,c,nr,nc))n.push([nr,nc]);
  });
  return n;
}
function neighbors(r,c){return neighborsIn(walls,gridN,r,c)}

function isReachableIn(wallSet,gn){
  const visited=new Set();
  const q=[[0,0]];visited.add('0,0');
  const goal=`${gn-1},${gn-1}`;
  while(q.length){
    const [r,c]=q.shift();
    if(`${r},${c}`===goal)return true;
    for(const [nr,nc] of neighborsIn(wallSet,gn,r,c)){
      const k=`${nr},${nc}`;
      if(!visited.has(k)){visited.add(k);q.push([nr,nc])}
    }
  }
  return false;
}
function isReachable(){return isReachableIn(walls,gridN)}

// ── Wall placement via tap ──
function getWallFromPos(x,y){
  const tapRadius=Math.max(12, cellSize*0.3);
  let bestDist=tapRadius, bestWall=null;
  for(let r=1;r<gridN;r++){
    const wy=r*cellSize;
    const dy=Math.abs(y-wy);
    if(dy<bestDist){
      const col=Math.floor(x/cellSize);
      if(col>=0&&col<gridN){
        bestDist=dy;bestWall={r,c:col,d:'h',key:wallKey(r,col,'h')};
      }
    }
  }
  for(let c=1;c<gridN;c++){
    const wx=c*cellSize;
    const dx=Math.abs(x-wx);
    if(dx<bestDist){
      const row=Math.floor(y/cellSize);
      if(row>=0&&row<gridN){
        bestDist=dx;bestWall={r:row,c,d:'v',key:wallKey(row,c,'v')};
      }
    }
  }
  return bestWall;
}

function handleTap(ex,ey){
  if(running)return;
  hoverWall=null;
  const rect=canvas.getBoundingClientRect();
  const x=ex-rect.left, y=ey-rect.top;
  const w=getWallFromPos(x,y);
  if(!w)return;
  ensureAudio();
  if(walls.has(w.key)){
    walls.delete(w.key);usedWalls--;
    wallHistory.push({key:w.key,action:'remove'});
    sfxRemove();
    spawnWallRipple(w, true);
  } else {
    walls.add(w.key);
    if(!isReachable()){
      walls.delete(w.key);
      showToast('⚠️ 経路がなくなります');
      return;
    }
    usedWalls++;
    wallHistory.push({key:w.key,action:'add'});
    sfxWall();
    spawnWallRipple(w, false);
  }
  // Auto-save dungeon walls
  if(mode==='dungeon'){
    dungeonWalls[dungeonFloorIdx]=[...walls];
    saveDungeon();
  }
  updateUI();draw();
}

// ── Drag-to-place walls (swipe gesture) ──
let isDragging=false, dragMode=null, draggedWalls=new Set();

canvas.addEventListener('pointerdown',e=>{
  e.preventDefault();
  if(running)return;
  isDragging=true;dragMode=null;draggedWalls.clear();
  handleDrag(e.clientX,e.clientY);
});
canvas.addEventListener('pointermove',e=>{
  if(running)return;
  if(isDragging){handleDrag(e.clientX,e.clientY)}
  const rect=canvas.getBoundingClientRect();
  const x=e.clientX-rect.left, y=e.clientY-rect.top;
  const w=getWallFromPos(x,y);
  const newKey=w?w.key:null;
  if((hoverWall?hoverWall.key:null)!==newKey){hoverWall=w;draw()}
});
canvas.addEventListener('pointerup',()=>{isDragging=false;dragMode=null});
canvas.addEventListener('pointerleave',()=>{
  isDragging=false;dragMode=null;
  if(hoverWall){hoverWall=null;draw()}
});

function handleDrag(ex,ey){
  if(running)return;
  hoverWall=null;
  const rect=canvas.getBoundingClientRect();
  const x=ex-rect.left, y=ey-rect.top;
  const w=getWallFromPos(x,y);
  if(!w)return;
  if(draggedWalls.has(w.key))return;
  ensureAudio();
  if(dragMode===null){dragMode=walls.has(w.key)?'remove':'add'}
  if(dragMode==='add'&&!walls.has(w.key)){
    walls.add(w.key);
    if(!isReachable()){walls.delete(w.key);showToast('⚠️ 経路がなくなります');return}
    usedWalls++;wallHistory.push({key:w.key,action:'add'});
    sfxWall();spawnWallRipple(w,false);draggedWalls.add(w.key);
  } else if(dragMode==='remove'&&walls.has(w.key)){
    walls.delete(w.key);usedWalls--;
    wallHistory.push({key:w.key,action:'remove'});
    sfxRemove();spawnWallRipple(w,true);draggedWalls.add(w.key);
  }
  if(mode==='dungeon'){dungeonWalls[dungeonFloorIdx]=[...walls];saveDungeon()}
  updateUI();draw();
}

function resetWalls(){
  if(running)return;
  walls.clear();wallHistory=[];usedWalls=0;explored.clear();shortestPath=[];
  if(mode==='dungeon'){dungeonWalls[dungeonFloorIdx]=[];saveDungeon();}
  updateUI();draw();
}
function undoWall(){
  if(running)return;
  if(!wallHistory.length)return;
  const last=wallHistory.pop();
  if(last.action==='add'){walls.delete(last.key);usedWalls--}
  else{walls.add(last.key);usedWalls++}
  if(mode==='dungeon'){dungeonWalls[dungeonFloorIdx]=[...walls];saveDungeon();}
  updateUI();draw();
}
function backFromGame(){
  stopSolver();
  if(mode==='stage')showStageSelect();
  else if(mode==='dungeon')showDungeonSelect();
  else showTitle();
}
function backFromResult(){
  if(mode==='dungeon')showDungeonSelect();
  else showTitle();
}

// ── Drawing ──
function draw(){
  const W=cellSize*gridN, H=cellSize*gridN;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawGrid(0,0,gridN,walls,explored,shortestPath,solverState,curConfig?curConfig.algo:'random',1.0);
}

function drawGrid(ox,oy,gn,wallSet,exploredSet,path,solver,algo,alpha){
  const W=cellSize*gn, H=cellSize*gn;
  ctx.save();
  ctx.translate(ox,oy);
  ctx.globalAlpha=alpha;

  // Background
  ctx.fillStyle='#FAFAF9';ctx.fillRect(0,0,W,H);

  // Explored cells overlay
  if(exploredSet&&exploredSet.size){
    const col=ALGO_INFO[algo].color;
    ctx.fillStyle=col+'22';
    exploredSet.forEach(k=>{
      const [r,c]=k.split(',').map(Number);
      if(r<gn&&c<gn) ctx.fillRect(c*cellSize+1,r*cellSize+1,cellSize-2,cellSize-2);
    });
  }

  // Dead-end cell indicators (only during wall placement)
  if(!running&&deadEndCells.length>0&&alpha>=1.0){
    const now=Date.now();
    const pulse=0.35+0.15*Math.sin(now*0.004);
    for(const [dr,dc] of deadEndCells){
      if(dr>=gn||dc>=gn)continue;
      const cx=dc*cellSize+cellSize/2, cy=dr*cellSize+cellSize/2;
      const rad=cellSize*0.32;
      // Pulsing orange circle
      ctx.save();
      ctx.globalAlpha=alpha*pulse;
      ctx.fillStyle='#FF9500';
      ctx.beginPath();ctx.arc(cx,cy,rad,0,Math.PI*2);ctx.fill();
      ctx.restore();
      ctx.globalAlpha=alpha;
      // Small skull/trap icon
      ctx.font=`${cellSize*0.35}px system-ui`;ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('🚧',cx,cy);
    }
  }

  // Solver trail (fading footprints)
  if(solverTrail.length>1&&alpha>=1.0){
    const now=Date.now();
    const col=ALGO_INFO[algo].color;
    for(let i=1;i<solverTrail.length;i++){
      const t=solverTrail[i];
      const age=now-t.time;
      if(age>TRAIL_DURATION)continue;
      const fade=1-age/TRAIL_DURATION;
      const prev=solverTrail[i-1];
      const x1=prev.c*cellSize+cellSize/2, y1=prev.r*cellSize+cellSize/2;
      const x2=t.c*cellSize+cellSize/2, y2=t.r*cellSize+cellSize/2;
      ctx.strokeStyle=col;
      ctx.globalAlpha=alpha*fade*0.5;
      ctx.lineWidth=Math.max(2,cellSize*0.15*fade);
      ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
    }
    ctx.globalAlpha=alpha;
  }

  // Shortest path
  if(path&&path.length>1){
    const col=ALGO_INFO[algo].color;
    ctx.strokeStyle=col+'88';ctx.lineWidth=3;ctx.lineCap='round';
    ctx.beginPath();
    path.forEach(([r,c],i)=>{
      const px=c*cellSize+cellSize/2, py=r*cellSize+cellSize/2;
      if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);
    });
    ctx.stroke();
  }

  // Preview path (only during wall placement, not during solver run)
  if(!running&&previewPath.length>1&&alpha>=1.0){
    ctx.strokeStyle='#5B4FCF33';ctx.lineWidth=Math.max(2,cellSize*0.18);ctx.lineCap='round';
    ctx.setLineDash([cellSize*0.2,cellSize*0.15]);
    ctx.beginPath();
    previewPath.forEach(([r,c],i)=>{
      const px=c*cellSize+cellSize/2, py=r*cellSize+cellSize/2;
      if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);
    });
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Grid lines
  ctx.strokeStyle='#E0E0E0';ctx.lineWidth=1;
  for(let r=0;r<=gn;r++){ctx.beginPath();ctx.moveTo(0,r*cellSize);ctx.lineTo(W,r*cellSize);ctx.stroke()}
  for(let c=0;c<=gn;c++){ctx.beginPath();ctx.moveTo(c*cellSize,0);ctx.lineTo(c*cellSize,H);ctx.stroke()}

  // Walls
  ctx.strokeStyle='#2F2B2A';ctx.lineWidth=4;ctx.lineCap='round';
  ctx.strokeRect(1,1,W-2,H-2);
  wallSet.forEach(k=>{
    const [r,c,d]=k.split(',');
    const ri=+r,ci=+c;
    ctx.beginPath();
    if(d==='h'){ctx.moveTo(ci*cellSize,ri*cellSize);ctx.lineTo((ci+1)*cellSize,ri*cellSize)}
    else{ctx.moveTo(ci*cellSize,ri*cellSize);ctx.lineTo(ci*cellSize,(ri+1)*cellSize)}
    ctx.stroke();
  });

  // Hover preview wall
  if(hoverWall&&alpha>=1.0&&!running){
    const hk=hoverWall.key;
    const [hr,hc,hd]=hk.split(',');
    const hri=+hr,hci=+hc;
    const isRemove=wallSet.has(hk);
    ctx.strokeStyle=isRemove?'#FF3B3088':'#5B4FCF88';
    ctx.lineWidth=6;ctx.lineCap='round';
    ctx.setLineDash(isRemove?[6,4]:[]);
    ctx.beginPath();
    if(hd==='h'){ctx.moveTo(hci*cellSize,hri*cellSize);ctx.lineTo((hci+1)*cellSize,hri*cellSize)}
    else{ctx.moveTo(hci*cellSize,hri*cellSize);ctx.lineTo(hci*cellSize,(hri+1)*cellSize)}
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.lineWidth=4;
  }

  // Start & Goal
  const sr=cellSize*0.3;
  ctx.fillStyle='#4ED26D';ctx.beginPath();ctx.arc(cellSize/2,cellSize/2,sr,0,Math.PI*2);ctx.fill();
  // Goal = stairs icon for dungeon, red dot otherwise
  // Goal pulse glow
  const goalPulse=0.15+0.15*Math.sin(Date.now()*0.004);
  if(mode==='dungeon'){
    ctx.save();ctx.globalAlpha=alpha*goalPulse;
    ctx.fillStyle='#5B4FCF';ctx.beginPath();ctx.arc((gn-0.5)*cellSize,(gn-0.5)*cellSize,sr*2,0,Math.PI*2);ctx.fill();
    ctx.restore();ctx.globalAlpha=alpha;
    ctx.font=`${cellSize*0.5}px system-ui`;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('🪜',(gn-0.5)*cellSize,(gn-0.5)*cellSize);
  } else {
    ctx.save();ctx.globalAlpha=alpha*goalPulse;
    ctx.fillStyle='#FF3B30';ctx.beginPath();ctx.arc((gn-0.5)*cellSize,(gn-0.5)*cellSize,sr*2,0,Math.PI*2);ctx.fill();
    ctx.restore();ctx.globalAlpha=alpha;
    ctx.fillStyle='#FF3B30';ctx.beginPath();ctx.arc((gn-0.5)*cellSize,(gn-0.5)*cellSize,sr,0,Math.PI*2);ctx.fill();
  }

  // Solver agent
  if(solver&&solver.pos&&alpha>=1.0){
    const col=ALGO_INFO[algo].color;
    const [pr,pc]=solver.pos;
    let dr=0,dc=0;
    if(solver.lerp<1&&solver.prev){
      dr=(pr-solver.prev[0])*(1-solver.lerp);
      dc=(pc-solver.prev[1])*(1-solver.lerp);
    }
    const ax=(pc-dc)*cellSize+cellSize/2, ay=(pr-dr)*cellSize+cellSize/2;
    // Pulse glow ring
    const pulse=0.3+0.3*Math.sin(Date.now()*0.005);
    ctx.save();
    ctx.globalAlpha=alpha*pulse;
    ctx.fillStyle=col;
    ctx.beginPath();ctx.arc(ax,ay,sr*1.5,0,Math.PI*2);ctx.fill();
    ctx.restore();
    ctx.globalAlpha=alpha;
    ctx.fillStyle=col;ctx.beginPath();ctx.arc(ax,ay,sr*0.9,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.font=`${sr*0.9}px system-ui`;ctx.textAlign='center';ctx.textBaseline='middle';
    if(solver.exclaim&&Date.now()-solver.exclaimTime<500){
      ctx.fillStyle=col;ctx.font=`bold ${sr*1.5}px system-ui`;ctx.fillText('!',ax,ay-cellSize*0.6);
    }
  }

  ctx.restore();
}

// ── Minimap for dungeon runs ──
function renderMinimap(activeFloor, totalFloors){
  const wrap=document.getElementById('minimapWrap');
  wrap.style.display='flex';
  wrap.innerHTML='';
  const mmSize=28;
  for(let i=0;i<totalFloors;i++){
    const q=QUESTS[i];
    const c=document.createElement('canvas');
    const gn=q.gridN;
    const cs=Math.floor(mmSize/gn);
    const sz=cs*gn;
    c.width=sz;c.height=sz;c.style.width=sz+'px';c.style.height=sz+'px';
    c.className='minimap-floor'+(i===activeFloor?' mm-active':'')+(i<activeFloor?' mm-done':'');
    const mctx=c.getContext('2d');
    mctx.fillStyle='#fafafa';mctx.fillRect(0,0,sz,sz);
    // Draw walls
    const wSet=new Set(dungeonWalls[i]||[]);
    mctx.strokeStyle='#2F2B2A';mctx.lineWidth=1.5;
    mctx.strokeRect(0,0,sz,sz);
    wSet.forEach(k=>{
      const [r,col,d]=k.split(',');
      const ri=+r,ci=+col;
      mctx.beginPath();
      if(d==='h'){mctx.moveTo(ci*cs,ri*cs);mctx.lineTo((ci+1)*cs,ri*cs)}
      else{mctx.moveTo(ci*cs,ri*cs);mctx.lineTo(ci*cs,(ri+1)*cs)}
      mctx.stroke();
    });
    wrap.appendChild(c);
  }
}

function updateFloorIndicator(activeFloor, totalFloors){
  const ind=document.getElementById('floorIndicator');
  ind.style.display='block';
  let parts=[];
  for(let i=0;i<totalFloors;i++){
    if(i===activeFloor) parts.push(`[${QUESTS[i].name}]`);
    else parts.push(QUESTS[i].name);
  }
  ind.textContent='🪜 '+parts.join(' → ');
}

// ── Solver ──
function stopSolver(){
  running=false;dungeonRunning=false;
  if(animId)cancelAnimationFrame(animId);animId=null;
  document.getElementById('speedBtn').style.display='none';
}

// ── Test run: single floor with its own algo ──
function testFloorRun(){
  if(running)return;
  if(mode!=='dungeon')return;
  dungeonTestMode=true;
  dungeonRunning=false;
  // Save walls
  dungeonWalls[dungeonFloorIdx]=[...walls];
  saveDungeon();
  ensureAudio();sfxStart();
  running=true;timer=0;timerStart=Date.now();
  explored.clear();shortestPath=[];deadEndCount=0;realtimeWallPenalty=0;
  document.getElementById('startBtn').disabled=true;
  document.getElementById('testRunBtn').disabled=true;
  document.getElementById('gameName').textContent=`🔄 ${QUESTS[dungeonFloorIdx].name} テスト走行`;
  userSpeedLevel=0;
  {const sb=document.getElementById('speedBtn');sb.style.display='inline-block';sb.textContent='⏩ 1x';}
  const algo=QUESTS[dungeonFloorIdx].algo;
  curConfig.algo=algo;
  runAlgo(algo, walls, gridN);
}

// ── Full dungeon run ──
function runSolver(){
  if(running)return;
  ensureAudio();sfxStart();

  if(mode==='dungeon'){
    // Save current floor walls
    dungeonWalls[dungeonFloorIdx]=[...walls];
    saveDungeon();
    dungeonTestMode=false;
    dungeonRunning=true;
    running=true;timer=0;timerStart=Date.now();
    explored.clear();shortestPath=[];deadEndCount=0;realtimeWallPenalty=0;
    document.getElementById('startBtn').disabled=true;
    document.getElementById('testRunBtn').disabled=true;
    userSpeedLevel=0;
    {const sb=document.getElementById('speedBtn');sb.style.display='inline-block';sb.textContent='⏩ 1x';}
    const algo=QUESTS[dungeonFloorIdx].algo;
    curConfig.algo=algo;
    // Start from floor 0
    dungeonRunFloorIdx=0;
    renderMinimap(0, dungeonFloorIdx+1);
    updateFloorIndicator(0, dungeonFloorIdx+1);
    runDungeonFloor(0);
    tickTimer();
    return;
  }

  // Stage / Free mode
  running=true;timer=0;timerStart=Date.now();
  explored.clear();shortestPath=[];deadEndCount=0;realtimeWallPenalty=0;
  document.getElementById('startBtn').textContent='実行中…';
  document.getElementById('startBtn').disabled=true;
  userSpeedLevel=0;
  const speedBtn=document.getElementById('speedBtn');
  speedBtn.style.display='inline-block';speedBtn.textContent='⏩ 1x';
  const algo=curConfig.algo;
  runAlgo(algo, walls, gridN);
}

function runDungeonFloor(floorIdx){
  if(!running)return;
  const q=QUESTS[floorIdx];
  const gn=q.gridN;
  const floorWalls=new Set(dungeonWalls[floorIdx]||[]);
  const algo=q.algo; // Each floor uses its own algorithm

  // Switch display to this floor
  gridN=gn;
  walls=floorWalls;
  explored.clear();shortestPath=[];
  solverState=null;solverTrail=[];
  curConfig.grid=gn;
  curConfig.algo=algo;
  const ai=ALGO_INFO[algo];
  document.getElementById('gameName').textContent=`🪜 ${q.name} ${ai.label} 走行中`;
  resizeCanvas();
  renderMinimap(floorIdx, dungeonFloorIdx+1);
  updateFloorIndicator(floorIdx, dungeonFloorIdx+1);
  draw();

  // Run algo on this floor, with callback on finish
  runAlgoWithCallback(algo, floorWalls, gn, ()=>{
    // Floor cleared
    if(floorIdx<dungeonFloorIdx){
      // More floors to go - show stairs transition
      showStairsTransition(q.name, QUESTS[floorIdx+1].name, ()=>{
        dungeonRunFloorIdx=floorIdx+1;
        runDungeonFloor(floorIdx+1);
      });
    } else {
      // Final floor reached - finish
      finishDungeonRun();
    }
  });
}

function showStairsTransition(fromFloor, toFloor, cb){
  sfxStairs();
  const overlay=document.getElementById('stairsOverlay');
  document.getElementById('stairsText').textContent=`${toFloor}へ…`;
  overlay.classList.add('show');
  setTimeout(()=>{
    overlay.classList.remove('show');
    cb();
  },700);
}

function finishDungeonRun(){
  running=false;dungeonRunning=false;
  timer=(Date.now()-timerStart)/1000;
  document.getElementById('speedBtn').style.display='none';
  updateUI();

  // Restore editing floor
  const targetFloor=dungeonFloorIdx;
  const q=QUESTS[targetFloor];
  gridN=q.gridN;
  walls=new Set(dungeonWalls[targetFloor]||[]);
  curConfig.grid=q.gridN;

  const passed=timer>=q.goalTime;

  if(passed){
    dungeonCleared[targetFloor]=true;
    saveDungeon();
  }

  // Score
  const base=Math.round(timer*100);
  const deadEndBonus=deadEndCount*30;
  const total=Math.max(0,base+deadEndBonus);

  document.getElementById('resultEmoji').textContent=passed?'🎉':'😅';
  document.getElementById('resultTitle').textContent=passed?`${q.name} クリア！`:'もう少し迷わせよう…';
  document.getElementById('resultTime').textContent=`通し合計: ${timer.toFixed(1)}秒 / 目標: ${q.goalTime}秒`;
  document.getElementById('resultScore').textContent=total.toLocaleString();
  let bd=`ベース: ${base}`;
  if(deadEndBonus)bd+=` | 行き止まり: +${deadEndBonus}`;
  document.getElementById('resultBreakdown').textContent=bd;

  document.getElementById('nextStageBtn').style.display='none';
  document.getElementById('nextDungeonBtn').style.display=(passed&&targetFloor<QUESTS.length-1)?'block':'none';

  const starInfo=calcStars(timer, q.goalTime);
  showStars(starInfo.stars, starInfo.label);

  if(passed){sfxClear();spawnConfetti()}else sfxFail();
  showScreen('resultScreen');
}

// ── Algorithm runners ──
function runAlgo(algo, wallSet, gn){
  // Set global state for algo
  walls=wallSet;gridN=gn;
  if(algo==='random')startRandomWalk();
  else if(algo==='righthand')startRightHand();
  else if(algo==='bfs')startBFS();
  else if(algo==='astar')startAStar();
  if(!dungeonRunning) tickTimer();
}

function runAlgoWithCallback(algo, wallSet, gn, onFinish){
  // Set global state
  walls=wallSet;gridN=gn;
  explored.clear();shortestPath=[];
  solverState=null;
  // Override finishSolver for callback
  dungeonFloorCallback=onFinish;
  if(algo==='random')startRandomWalk();
  else if(algo==='righthand')startRightHand();
  else if(algo==='bfs')startBFS();
  else if(algo==='astar')startAStar();
}

let dungeonFloorCallback=null;

// ── Random Walk ──
function startRandomWalk(){
  solverState={pos:[0,0],prev:null,lerp:1,exclaim:false,exclaimTime:0};
  let lastPos=null;
  const step=()=>{
    if(!running)return;
    const [r,c]=solverState.pos;
    if(r===gridN-1&&c===gridN-1){finishSolver();return}
    const nb=neighbors(r,c);
    let choices=nb;
    if(lastPos&&nb.length>1){
      const filtered=nb.filter(([nr,nc])=>!(nr===lastPos[0]&&nc===lastPos[1]));
      if(Math.random()>0.3||filtered.length===0)choices=nb;else choices=filtered;
    }
    if(nb.length<=1&&!(r===0&&c===0)){
      deadEndCount++;solverState.exclaim=true;solverState.exclaimTime=Date.now();
      sfxDeadEnd();showFloatScore(r,c,'+30',ALGO_INFO[curConfig.algo].color);shakeScreen();
    }
    const pick=choices[Math.floor(Math.random()*choices.length)];
    lastPos=[r,c];
    explored.add(`${pick[0]},${pick[1]}`);
    animateMove(pick,300,step);
  };
  explored.add('0,0');
  step();
}

// ── Right Hand ──
function startRightHand(){
  const DR=[-1,0,1,0],DC=[0,1,0,-1];
  let dir=2;
  solverState={pos:[0,0],prev:null,lerp:1,exclaim:false,exclaimTime:0};
  const step=()=>{
    if(!running)return;
    const [r,c]=solverState.pos;
    if(r===gridN-1&&c===gridN-1){finishSolver();return}
    const tryOrder=[(dir+1)%4, dir, (dir+3)%4, (dir+2)%4];
    let moved=false;
    for(const d of tryOrder){
      const nr=r+DR[d], nc=c+DC[d];
      if(canPass(r,c,nr,nc)){
        dir=d;
        const nb=neighbors(r,c);
        if(nb.length<=1&&!(r===0&&c===0)){
          deadEndCount++;solverState.exclaim=true;solverState.exclaimTime=Date.now();
          sfxDeadEnd();showFloatScore(r,c,'+30',ALGO_INFO[curConfig.algo].color);shakeScreen();
        }
        explored.add(`${nr},${nc}`);
        animateMove([nr,nc],250,step);
        moved=true;break;
      }
    }
    if(!moved){finishSolver()}
  };
  explored.add('0,0');
  step();
}

// ── BFS ──
function startBFS(){
  solverState={pos:null,prev:null,lerp:1,exclaim:false,exclaimTime:0};
  const parent=new Map();
  const queue=[[0,0]];
  const visited=new Set(['0,0']);
  let found=false;
  const exploreStep=()=>{
    if(!running)return;
    if(!queue.length){finishSolver();return}
    const batch=Math.min(queue.length,Math.ceil(3*getSpeedMultiplier()));
    for(let i=0;i<batch;i++){
      if(!queue.length)break;
      const [r,c]=queue.shift();
      explored.add(`${r},${c}`);
      if(r===gridN-1&&c===gridN-1){found=true;break}
      for(const [nr,nc] of neighbors(r,c)){
        const k=`${nr},${nc}`;
        if(!visited.has(k)){visited.add(k);parent.set(k,`${r},${c}`);queue.push([nr,nc])}
      }
    }
    draw();
    if(found){
      const path=[];let cur=`${gridN-1},${gridN-1}`;
      while(cur){path.unshift(cur.split(',').map(Number));cur=parent.get(cur)}
      shortestPath=path;
      walkPath(path,0);
    } else {
      setTimeout(exploreStep,50);
    }
  };
  exploreStep();
}

// ── A* ──
function startAStar(){
  solverState={pos:null,prev:null,lerp:1,exclaim:false,exclaimTime:0};
  const goal=[gridN-1,gridN-1];
  const h=(r,c)=>Math.abs(r-goal[0])+Math.abs(c-goal[1]);
  const open=[{r:0,c:0,g:0,f:h(0,0)}];
  const gScore=new Map();gScore.set('0,0',0);
  const parent=new Map();
  const closed=new Set();
  let found=false;
  const exploreStep=()=>{
    if(!running)return;
    if(!open.length){finishSolver();return}
    const batch=Math.min(open.length,Math.ceil(5*getSpeedMultiplier()));
    for(let i=0;i<batch;i++){
      if(!open.length)break;
      let minIdx=0;
      for(let j=1;j<open.length;j++){if(open[j].f<open[minIdx].f)minIdx=j}
      const cur=open.splice(minIdx,1)[0];
      const ck=`${cur.r},${cur.c}`;
      if(closed.has(ck))continue;
      closed.add(ck);explored.add(ck);
      if(cur.r===goal[0]&&cur.c===goal[1]){found=true;break}
      for(const [nr,nc] of neighbors(cur.r,cur.c)){
        const nk=`${nr},${nc}`;
        if(closed.has(nk))continue;
        const ng=cur.g+1;
        if(!gScore.has(nk)||ng<gScore.get(nk)){
          gScore.set(nk,ng);parent.set(nk,ck);
          open.push({r:nr,c:nc,g:ng,f:ng+h(nr,nc)});
        }
      }
    }
    draw();
    if(found){
      const path=[];let cur=`${gridN-1},${gridN-1}`;
      while(cur){path.unshift(cur.split(',').map(Number));cur=parent.get(cur)}
      shortestPath=path;
      walkPath(path,0);
    } else {
      setTimeout(exploreStep,30);
    }
  };
  exploreStep();
}

// ── Walk a computed path ──
function walkPath(path,idx){
  if(!running)return;
  if(idx>=path.length){finishSolver();return}
  const [r,c]=path[idx];
  if(r===gridN-1&&c===gridN-1){
    solverState.pos=[r,c];solverState.prev=idx>0?path[idx-1]:null;solverState.lerp=1;
    draw();finishSolver();return;
  }
  const speed=curConfig.algo==='astar'?150:200;
  animateMove([r,c],speed,()=>walkPath(path,idx+1));
}

function cycleSpeed(){
  userSpeedLevel=(userSpeedLevel+1)%SPEED_LABELS.length;
  const btn=document.getElementById('speedBtn');
  btn.textContent='⏩ '+SPEED_LABELS[userSpeedLevel];
}

function getSpeedMultiplier(){
  const userMul=SPEED_MULTIPLIERS[userSpeedLevel]||1;
  const elapsed=(Date.now()-timerStart)/1000;
  let auto=1;
  if(elapsed>=10&&elapsed<20) auto=1+(elapsed-10)/10*3;
  else if(elapsed>=20) auto=Math.min(8,4+(elapsed-20)/10*4);
  return auto*userMul;
}

function animateMove(target,duration,cb){
  const speedMul=getSpeedMultiplier();
  const adjDuration=Math.max(20,duration/speedMul);
  const prev=solverState.pos?[...solverState.pos]:target;
  // Record trail
  solverTrail.push({r:target[0],c:target[1],time:Date.now()});
  if(solverTrail.length>TRAIL_MAX) solverTrail.shift();
  solverState.prev=prev;solverState.pos=target;solverState.lerp=0;
  const start=performance.now();
  const tick=(t)=>{
    if(!running)return;
    const p=Math.min(1,(t-start)/adjDuration);
    solverState.lerp=p;
    draw();
    if(p<1)animId=requestAnimationFrame(tick);
    else{solverState.lerp=1;cb()}
  };
  animId=requestAnimationFrame(tick);
}

function tickTimer(){
  if(!running)return;
  timer=(Date.now()-timerStart)/1000;
  updateUI();
  setTimeout(()=>{if(running)tickTimer()},100);
}

function finishSolver(){
  // If dungeon full run, delegate to floor callback
  if(dungeonRunning&&dungeonFloorCallback){
    const cb=dungeonFloorCallback;
    dungeonFloorCallback=null;
    cb();
    return;
  }

  running=false;
  timer=(Date.now()-timerStart)/1000;
  document.getElementById('speedBtn').style.display='none';
  updateUI();draw();

  // If dungeon test mode, just show toast and reset
  if(mode==='dungeon'&&dungeonTestMode){
    dungeonTestMode=false;
    showToast(`テスト完了: ${timer.toFixed(1)}秒`);
    document.getElementById('startBtn').disabled=false;
    document.getElementById('testRunBtn').disabled=false;
    document.getElementById('gameName').textContent=`🪜 ${QUESTS[dungeonFloorIdx].name} - 壁配置中`;
    return;
  }

  // Score
  const base=Math.round(timer*100);
  const deadEndBonus=deadEndCount*30;
  const penalty=realtimeWallPenalty*200;
  const total=Math.max(0,base+deadEndBonus-penalty);

  const passed=curConfig.target!==Infinity&&timer>=curConfig.target;

  document.getElementById('resultEmoji').textContent=passed?'🎉':'😅';
  document.getElementById('resultTitle').textContent=passed?'クリア！':'もう少し迷わせよう…';
  document.getElementById('resultTime').textContent=`経過時間: ${timer.toFixed(1)}秒${curConfig.target!==Infinity?' / 目標: '+curConfig.target+'秒':''}`;
  document.getElementById('resultScore').textContent=total.toLocaleString();
  let bd=`ベース: ${base}`;
  if(deadEndBonus)bd+=` | 行き止まり: +${deadEndBonus}`;
  if(penalty)bd+=` | ペナルティ: -${penalty}`;
  document.getElementById('resultBreakdown').textContent=bd;

  document.getElementById('nextStageBtn').style.display=(mode==='stage'&&curStageIdx<7)?'block':'none';
  document.getElementById('nextDungeonBtn').style.display='none';

  const starInfo=calcStars(timer, curConfig.target);
  showStars(starInfo.stars, starInfo.label);

  if(passed){sfxClear();spawnConfetti()}else sfxFail();
  showScreen('resultScreen');
}

function retryStage(){
  if(mode==='stage')startStage();
  else if(mode==='dungeon')startDungeon();
  else startFree();
}
function nextStage(){
  if(curStageIdx<7){curStageIdx++;startStage()}
}

// ── Star Rating ──
function calcStars(time, target){
  if(target===Infinity) return {stars:0, label:''};
  const ratio=time/target;
  if(ratio>=2.0) return {stars:3, label:'完璧！ 🏆'};
  if(ratio>=1.5) return {stars:2, label:'いい迷路！'};
  if(ratio>=1.0) return {stars:1, label:'クリア！'};
  return {stars:0, label:'もう少し…'};
}
function showStars(stars, label){
  const row=document.getElementById('starRow');
  const lbl=document.getElementById('starLabel');
  row.innerHTML='';
  lbl.textContent=label;
  for(let i=0;i<3;i++){
    const s=document.createElement('span');
    s.className='star'+(i<stars?'':' empty');
    s.textContent='⭐';
    row.appendChild(s);
    setTimeout(()=>s.classList.add('show'), 200+i*200);
  }
}

// ── Confetti Effect ──
function spawnConfetti(){
  const cvs=document.createElement('canvas');
  cvs.className='confetti-canvas';
  document.body.appendChild(cvs);
  const cctx=cvs.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  cvs.width=window.innerWidth*dpr;cvs.height=window.innerHeight*dpr;
  cvs.style.width=window.innerWidth+'px';cvs.style.height=window.innerHeight+'px';
  cctx.setTransform(dpr,0,0,dpr,0,0);
  const W=window.innerWidth,H=window.innerHeight;
  const colors=['#FF3B30','#FF9500','#FFCC00','#4ED26D','#5AC8FA','#5B4FCF','#FF2D55'];
  const particles=[];
  for(let i=0;i<80;i++){
    particles.push({
      x:W*0.5+(Math.random()-0.5)*W*0.3,
      y:H*0.4,
      vx:(Math.random()-0.5)*8,
      vy:-Math.random()*12-4,
      w:Math.random()*8+4,
      h:Math.random()*6+3,
      rot:Math.random()*Math.PI*2,
      rv:(Math.random()-0.5)*0.3,
      color:colors[Math.floor(Math.random()*colors.length)],
      gravity:0.25+Math.random()*0.1,
      alpha:1
    });
  }
  const startT=performance.now();
  const duration=2200;
  function tick(t){
    const elapsed=t-startT;
    if(elapsed>duration){cvs.remove();return;}
    cctx.clearRect(0,0,W,H);
    const fade=elapsed>duration*0.6?1-(elapsed-duration*0.6)/(duration*0.4):1;
    for(const p of particles){
      p.vy+=p.gravity;
      p.x+=p.vx;p.y+=p.vy;
      p.rot+=p.rv;
      p.vx*=0.99;
      p.alpha=fade;
      cctx.save();
      cctx.translate(p.x,p.y);
      cctx.rotate(p.rot);
      cctx.globalAlpha=p.alpha;
      cctx.fillStyle=p.color;
      cctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      cctx.restore();
    }
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

// Resize handler
window.addEventListener('resize',()=>{
  if(document.getElementById('gameScreen').classList.contains('active')){
    resizeCanvas();draw();
  }
});
