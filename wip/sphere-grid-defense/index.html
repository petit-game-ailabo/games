<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>スフィアグリッド・ローグ</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a1a;touch-action:none;-webkit-user-select:none;user-select:none}
canvas{display:block;width:100%;height:100%}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';
const C=document.getElementById('c');
const ctx=C.getContext('2d');
let W,H,dpr;

function resize(){
  dpr=Math.min(window.devicePixelRatio||1,3);
  W=window.innerWidth;H=window.innerHeight;
  C.width=W*dpr;C.height=H*dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
  RUNNER_H=Math.floor(H*0.18);
  GRID_Y=RUNNER_H+HUD_H;
  GRID_H=H-GRID_Y;
  if(gridNodes.length) positionGridNodes();
}

let RUNNER_H=0;
const HUD_H=36;
let GRID_Y=0, GRID_H=0;

// ===== AUDIO =====
const actx=new (window.AudioContext||window.webkitAudioContext)();
function playTone(freq,dur,vol=0.3,type='sine'){
  const o=actx.createOscillator(),g=actx.createGain();
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+dur);
  o.connect(g);g.connect(actx.destination);
  o.start();o.stop(actx.currentTime+dur);
}
function sfxHit(){playTone(300,0.08,0.2,'square');}
function sfxDeath(){playTone(180,0.3,0.3,'sawtooth');setTimeout(()=>playTone(120,0.4,0.3,'sawtooth'),200);}
function sfxUnlock(){playTone(523,0.15,0.3,'triangle');setTimeout(()=>playTone(659,0.12,0.3,'triangle'),100);}
function sfxKill(){playTone(440,0.1,0.2,'triangle');}
function sfxSkill(){playTone(784,0.2,0.4,'sine');setTimeout(()=>playTone(988,0.15,0.35,'sine'),120);setTimeout(()=>playTone(1175,0.25,0.3,'sine'),240);}

// ===== GAME STATE =====
const STATE={TITLE:0,PLAY:1};
let state=STATE.TITLE;

// Active skills/spells (from sphere grid)
let activeSkills=[]; // {name, icon, cooldownMax, dmgMult, effect, cd:0}
let skillEffects=[]; // visual effects on runner

// Player stats
let stats={
  hp:30, maxHp:30,
  atk:5, def:1, spd:1.2, critRate:0.05, critDmg:1.5,
  regen:0, lifeSteal:0, dodge:0,
  multiHit:1,
};

// Run state
let runX=0, runDist=0, bestDist=0;
let runAlive=true, runDeathTimer=0;
let runEnemies=[], runParticles=[], runDmgNums=[];
let sp=0, totalRuns=0, totalKills=0;
let attackCooldown=0, attackCooldownMax=50;
let fighting=false; // true when engaged with enemy
let camX=0;
let bgBuildings=[];

// ===== SPHERE GRID =====
let gridNodes=[], gridEdges=[];
let gridScroll={x:0,y:0,dragging:false,startX:0,startY:0,scrollStartX:0,scrollStartY:0};
let selectedNode=null;
let gridCenterX=0, gridCenterY=0;

// Node types: 'stat' (small buff), 'skill' (magic/ability - big & flashy), 'start'
function buildSphereGrid(){
  gridNodes=[];gridEdges=[];
  const raw=[
    // Center
    {id:0,gx:0,gy:0,type:'start',unlocked:true,label:'START'},

    // === ATK Branch (right) ===
    {id:1,gx:2,gy:0,type:'stat',cost:1,stat:'atk',val:2,label:'ATK+2',cat:'atk'},
    {id:2,gx:4,gy:-0.8,type:'stat',cost:1,stat:'atk',val:3,label:'ATK+3',cat:'atk'},
    {id:3,gx:4,gy:0.8,type:'skill',cost:3,skill:'powerStrike',label:'剛撃',cat:'atk',
      desc:'ATK×3の一撃',icon:'⚔️',tier:1},
    {id:4,gx:6,gy:-0.8,type:'stat',cost:2,stat:'atk',val:5,label:'ATK+5',cat:'atk'},
    {id:5,gx:6,gy:0.8,type:'stat',cost:2,stat:'multiHit',val:1,label:'連撃+1',cat:'atk'},
    {id:6,gx:8,gy:0,type:'skill',cost:5,skill:'berserker',label:'狂戦士',cat:'atk',
      desc:'ATK×5 全体攻撃',icon:'🔥',tier:2},

    // === DEF Branch (upper-left) ===
    {id:7,gx:-1,gy:-2,type:'stat',cost:1,stat:'def',val:1,label:'DEF+1',cat:'def'},
    {id:8,gx:-2.5,gy:-3,type:'stat',cost:1,stat:'maxHp',val:15,label:'HP+15',cat:'def'},
    {id:9,gx:-1,gy:-4,type:'skill',cost:3,skill:'ironWall',label:'鉄壁',cat:'def',
      desc:'3秒間ダメージ無効',icon:'🛡️',tier:1},
    {id:10,gx:-3,gy:-4.5,type:'stat',cost:2,stat:'maxHp',val:25,label:'HP+25',cat:'def'},
    {id:11,gx:-2,gy:-6,type:'stat',cost:2,stat:'def',val:3,label:'DEF+3',cat:'def'},
    {id:12,gx:-1,gy:-7,type:'skill',cost:6,skill:'aegis',label:'聖盾',cat:'def',
      desc:'5秒無敵+HP全回復',icon:'✨',tier:2},
    {id:13,gx:0,gy:-3,type:'stat',cost:2,stat:'dodge',val:0.08,label:'回避+8%',cat:'def'},

    // === SPD Branch (lower-left) ===
    {id:14,gx:-1,gy:2,type:'stat',cost:1,stat:'spd',val:0.2,label:'SPD+0.2',cat:'spd'},
    {id:15,gx:-2.5,gy:3,type:'skill',cost:3,skill:'haste',label:'疾風',cat:'spd',
      desc:'5秒間速度2倍',icon:'💨',tier:1},
    {id:16,gx:-1,gy:4,type:'stat',cost:2,stat:'spd',val:0.3,label:'SPD+0.3',cat:'spd'},
    {id:17,gx:-3,gy:4.5,type:'stat',cost:2,stat:'dodge',val:0.1,label:'回避+10%',cat:'spd'},
    {id:18,gx:-2,gy:6,type:'skill',cost:6,skill:'galeForce',label:'烈風陣',cat:'spd',
      desc:'10秒速度3倍+回避50%',icon:'🌪️',tier:2},
    {id:19,gx:0,gy:3,type:'stat',cost:1,stat:'spd',val:0.15,label:'SPD+0.15',cat:'spd'},

    // === CRIT Branch (upper-right) ===
    {id:20,gx:1,gy:-2,type:'stat',cost:1,stat:'critRate',val:0.08,label:'会心+8%',cat:'crit'},
    {id:21,gx:2.5,gy:-3,type:'stat',cost:2,stat:'critDmg',val:0.4,label:'会心ダメ+40%',cat:'crit'},
    {id:22,gx:1,gy:-4,type:'skill',cost:3,skill:'critSlash',label:'裂空斬',cat:'crit',
      desc:'確定クリティカル×3連撃',icon:'⚡',tier:1},
    {id:23,gx:3,gy:-4.5,type:'stat',cost:2,stat:'critRate',val:0.12,label:'会心+12%',cat:'crit'},
    {id:24,gx:2,gy:-6,type:'stat',cost:3,stat:'critDmg',val:0.6,label:'会心ダメ+60%',cat:'crit'},
    {id:25,gx:1,gy:-7,type:'skill',cost:7,skill:'phantasm',label:'幻影殺法',cat:'crit',
      desc:'5連撃 各100%クリティカル',icon:'👻',tier:3},

    // === SPECIAL Branch (lower-right) ===
    {id:26,gx:1,gy:2,type:'stat',cost:1,stat:'lifeSteal',val:0.08,label:'吸血+8%',cat:'special'},
    {id:27,gx:2.5,gy:3,type:'skill',cost:3,skill:'drain',label:'吸魂',cat:'special',
      desc:'大ダメージ+HP大回復',icon:'💀',tier:1},
    {id:28,gx:1,gy:4,type:'stat',cost:2,stat:'regen',val:1,label:'再生+1',cat:'special'},
    {id:29,gx:3,gy:4.5,type:'stat',cost:2,stat:'lifeSteal',val:0.12,label:'吸血+12%',cat:'special'},
    {id:30,gx:2,gy:6,type:'stat',cost:2,stat:'maxHp',val:20,label:'HP+20',cat:'special'},
    {id:31,gx:1,gy:7,type:'skill',cost:7,skill:'soulBurst',label:'魂爆',cat:'special',
      desc:'HP50%消費→超火力全体攻撃',icon:'💥',tier:3},

    // === ULTIMATE (center-bottom, needs multiple branches) ===
    {id:32,gx:0,gy:9,type:'skill',cost:10,skill:'transcend',label:'超越',cat:'ultimate',
      desc:'全ステ2倍 15秒',icon:'🌟',tier:3},
  ];

  for(const r of raw){
    gridNodes.push({...r,unlocked:r.unlocked||false,applied:false});
  }

  gridEdges=[
    [0,1],[0,7],[0,14],[0,20],[0,26],
    // ATK
    [1,2],[1,3],[2,4],[3,5],[4,6],[5,6],
    // DEF
    [7,8],[7,13],[8,9],[8,10],[10,11],[11,12],[9,13],
    // SPD
    [14,15],[14,19],[15,16],[16,17],[17,18],[16,19],
    // CRIT
    [20,21],[20,22],[21,23],[22,23],[23,24],[24,25],
    // SPECIAL
    [26,27],[26,28],[27,29],[28,29],[29,30],[30,31],
    // Cross connections
    [13,20],[7,14],[1,20],[1,26],[19,26],
    // Ultimate connections
    [18,32],[31,32],[12,25],
  ];

  positionGridNodes();
}

function positionGridNodes(){
  const spacing=Math.min(W*0.1,38);
  gridCenterX=W/2;
  gridCenterY=GRID_Y+GRID_H*0.35;
  for(const n of gridNodes){
    n.x=gridCenterX+n.gx*spacing;
    n.y=gridCenterY+n.gy*spacing;
  }
}

function canUnlock(nodeId){
  const neighbors=[];
  for(const [a,b] of gridEdges){
    if(a===nodeId) neighbors.push(b);
    if(b===nodeId) neighbors.push(a);
  }
  return neighbors.some(nid=>gridNodes[nid].unlocked);
}

// Skill definitions
const SKILLS={
  powerStrike:{cd:300,dmgMult:3,hits:1,effect:'slash'},
  berserker:{cd:600,dmgMult:5,hits:1,effect:'explode',aoe:true},
  ironWall:{cd:500,dmgMult:0,hits:0,effect:'shield',buffDur:180,buff:'invuln'},
  aegis:{cd:900,dmgMult:0,hits:0,effect:'holyShield',buffDur:300,buff:'invuln',heal:true},
  haste:{cd:400,dmgMult:0,hits:0,effect:'speed',buffDur:300,buff:'haste'},
  galeForce:{cd:800,dmgMult:0,hits:0,effect:'tornado',buffDur:600,buff:'galeForce'},
  critSlash:{cd:400,dmgMult:1,hits:3,effect:'lightning',forceCrit:true},
  phantasm:{cd:700,dmgMult:1,hits:5,effect:'phantom',forceCrit:true},
  drain:{cd:400,dmgMult:4,hits:1,effect:'drain',healPct:0.5},
  soulBurst:{cd:600,dmgMult:10,hits:1,effect:'soulExplode',aoe:true,hpCost:0.5},
  transcend:{cd:1200,dmgMult:0,hits:0,effect:'transcend',buffDur:900,buff:'transcend'},
};

function unlockNode(node){
  if(node.unlocked||!canUnlock(node.id)||sp<node.cost) return false;
  node.unlocked=true;
  sp-=node.cost;
  node.applied=true;

  if(node.type==='stat'){
    if(node.stat==='maxHp'){
      stats.maxHp+=node.val;
      stats.hp=Math.min(stats.hp+node.val,stats.maxHp);
    } else if(stats[node.stat]!==undefined){
      stats[node.stat]+=node.val;
    }
  } else if(node.type==='skill'){
    const sk=SKILLS[node.skill];
    activeSkills.push({name:node.label,icon:node.icon,skill:node.skill,
      cooldownMax:sk.cd,cd:0,desc:node.desc});
  }

  if(node.type==='skill') sfxSkill(); else sfxUnlock();
  return true;
}

// ===== Buffs =====
let buffs={}; // {invuln:timer, haste:timer, galeForce:timer, transcend:timer}

function updateBuffs(){
  for(const k in buffs){
    if(buffs[k]>0) buffs[k]--;
    else delete buffs[k];
  }
}

function getEffectiveSpd(){
  let s=stats.spd;
  if(buffs.haste) s*=2;
  if(buffs.galeForce) s*=3;
  if(buffs.transcend) s*=2;
  return s;
}

function getEffectiveAtk(){
  let a=stats.atk;
  if(buffs.transcend) a*=2;
  return a;
}

function getEffectiveDef(){
  let d=stats.def;
  if(buffs.transcend) d*=2;
  return d;
}

function getEffectiveDodge(){
  let d=stats.dodge;
  if(buffs.galeForce) d=Math.min(d+0.5,0.9);
  return d;
}

// ===== RUNNER =====
const GROUND_Y_RATIO=0.78;
let groundY=0;

function initRun(){
  runAlive=true;
  stats.hp=stats.maxHp;
  runX=0;runDist=0;camX=0;
  runEnemies=[];runParticles=[];runDmgNums=[];
  attackCooldown=0;
  fighting=false;
  buffs={};
  skillEffects=[];
  attackCooldownMax=Math.max(15,50-stats.spd*8);
  groundY=RUNNER_H*GROUND_Y_RATIO;
  genBuildings();
  totalRuns++;
  // Reset skill cooldowns
  for(const s of activeSkills) s.cd=0;
}

function genBuildings(){
  bgBuildings=[];
  for(let i=0;i<50;i++){
    bgBuildings.push({
      x:i*120+Math.random()*60,
      w:40+Math.random()*50,
      h:20+Math.random()*60,
      color:`hsl(${220+Math.random()*30},15%,${10+Math.random()*8}%)`
    });
  }
}

function spawnRunEnemy(x){
  const dist=runDist;
  const tier=Math.floor(dist/500);
  const types=['slime','goblin','knight','demon'];
  const typeIdx=Math.min(tier,types.length-1);
  const type=types[typeIdx];
  const scale=1+tier*0.25;
  let hp,atk,spd,size,color,emoji;
  switch(type){
    case'slime':hp=10*scale;atk=3*scale;spd=0.3;size=10;color='#4caf50';emoji='🟢';break;
    case'goblin':hp=20*scale;atk=6*scale;spd=0.5;size=11;color='#ff9800';emoji='👺';break;
    case'knight':hp=45*scale;atk=9*scale;spd=0.3;size=13;color='#78909c';emoji='🛡';break;
    case'demon':hp=80*scale;atk=14*scale;spd=0.4;size=14;color='#e53935';emoji='👹';break;
  }
  runEnemies.push({x,y:groundY,hp,maxHp:hp,atk,spd,size,color,emoji,type,alive:true,hitCd:0,flashTimer:0});
}

function updateRunner(){
  if(!runAlive){
    runDeathTimer--;
    if(runDeathTimer<=0) initRun();
    return;
  }

  updateBuffs();

  // Auto-use skills
  for(const s of activeSkills){
    if(s.cd>0){s.cd--;continue;}
    const sk=SKILLS[s.skill];
    // Use offensive skills when fighting, defensive/buff skills when HP low or on cooldown ready
    const shouldUse=
      (sk.hits>0 && fighting && runEnemies.some(e=>e.alive&&Math.abs(e.x-runX)<80)) ||
      (sk.buff==='invuln' && stats.hp<stats.maxHp*0.4) ||
      (sk.buff==='haste' && !buffs.haste && !buffs.galeForce) ||
      (sk.buff==='galeForce' && !buffs.galeForce) ||
      (sk.buff==='transcend' && runDist>300) ||
      (sk.heal && stats.hp<stats.maxHp*0.5) ||
      (sk.hpCost && stats.hp>stats.maxHp*0.6 && fighting);

    if(shouldUse){
      s.cd=s.cooldownMax;
      executeSkill(s,sk);
    }
  }

  // Check if fighting
  const nearEnemy=runEnemies.find(e=>e.alive&&e.x-runX<30&&e.x-runX>-20);
  fighting=!!nearEnemy;

  // Movement - stop when fighting
  if(!fighting){
    const moveSpd=getEffectiveSpd();
    runX+=moveSpd;
    runDist+=moveSpd;
    camX=runX-W*0.25;
    if(runDist>bestDist) bestDist=runDist;
  } else {
    camX=runX-W*0.25;
  }

  // Regen
  if(stats.regen>0){
    stats.hp=Math.min(stats.hp+stats.regen*0.016,stats.maxHp);
  }

  // Spawn enemies - reduced frequency
  const spawnInterval=Math.max(120,350-runDist*0.08);
  if(Math.random()<1/spawnInterval){
    spawnRunEnemy(runX+W*0.9+Math.random()*150);
  }
  // Guaranteed enemies every 300px (was 150)
  if(runDist%300<getEffectiveSpd()+0.1){
    spawnRunEnemy(runX+W*0.8+Math.random()*80);
  }

  // Player normal attack
  attackCooldown--;
  if(attackCooldown<=0 && fighting){
    const targets=runEnemies.filter(e=>e.alive&&Math.abs(e.x-runX)<50);
    if(targets.length>0){
      attackCooldown=attackCooldownMax;
      const hits=Math.min(stats.multiHit,targets.length);
      for(let i=0;i<hits;i++){
        const t=targets[i%targets.length];
        let dmg=getEffectiveAtk()-t.atk*0.05;
        let isCrit=Math.random()<stats.critRate;
        if(isCrit) dmg*=stats.critDmg;
        dmg=Math.max(1,Math.floor(dmg));
        t.hp-=dmg;t.flashTimer=6;
        if(stats.lifeSteal>0) stats.hp=Math.min(stats.hp+dmg*stats.lifeSteal,stats.maxHp);
        const ex=t.x-camX;
        runDmgNums.push({x:ex,y:t.y-t.size-5,text:isCrit?`💥${dmg}`:`${dmg}`,
          color:isCrit?'#ffeb3b':'#fff',life:30,vy:-1.2});
        sfxHit();
        if(t.hp<=0){
          t.alive=false;sp++;totalKills++;sfxKill();
          for(let j=0;j<6;j++){
            runParticles.push({x:ex,y:t.y,vx:(Math.random()-0.5)*3,vy:-Math.random()*3,
              color:t.color,life:20,size:3});
          }
        }
      }
    }
  }

  // Enemy attack player
  for(const e of runEnemies){
    if(!e.alive) continue;
    if(e.x>runX+15) e.x-=e.spd;
    if(Math.abs(e.x-runX)<25){
      e.hitCd--;
      if(e.hitCd<=0){
        e.hitCd=70;
        if(buffs.invuln){
          runDmgNums.push({x:W*0.25,y:groundY-20,text:'無効',color:'#64b5f6',life:25,vy:-1});
        } else if(Math.random()<getEffectiveDodge()){
          runDmgNums.push({x:W*0.25,y:groundY-20,text:'MISS',color:'#81d4fa',life:25,vy:-1});
        } else {
          let dmg=Math.max(1,Math.floor(e.atk-getEffectiveDef()));
          stats.hp-=dmg;
          runDmgNums.push({x:W*0.25,y:groundY-20,text:`-${dmg}`,color:'#e53935',life:25,vy:-1});
        }
      }
    }
  }

  // Death
  if(stats.hp<=0){
    runAlive=false;runDeathTimer=90;sfxDeath();
    for(let i=0;i<15;i++){
      runParticles.push({x:W*0.25,y:groundY,vx:(Math.random()-0.5)*4,vy:-Math.random()*4,
        color:'#e53935',life:30,size:3+Math.random()*3});
    }
  }

  runEnemies=runEnemies.filter(e=>e.alive&&e.x>camX-100);
  for(const p of runParticles){p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life--;}
  runParticles=runParticles.filter(p=>p.life>0);
  for(const d of runDmgNums){d.y+=d.vy;d.life--;}
  runDmgNums=runDmgNums.filter(d=>d.life>0);

  // Skill effects
  for(const e of skillEffects){e.life--;e.frame++;}
  skillEffects=skillEffects.filter(e=>e.life>0);
}

function executeSkill(s,sk){
  // HP cost
  if(sk.hpCost) stats.hp*=(1-sk.hpCost);
  // Buff
  if(sk.buff) buffs[sk.buff]=(sk.buffDur||300);
  // Heal
  if(sk.heal) stats.hp=stats.maxHp;
  if(sk.healPct){
    const targets=runEnemies.filter(e=>e.alive&&Math.abs(e.x-runX)<100);
    if(targets.length>0){
      const healAmt=getEffectiveAtk()*sk.dmgMult*sk.healPct;
      stats.hp=Math.min(stats.hp+healAmt,stats.maxHp);
    }
  }
  // Damage
  if(sk.hits>0){
    const targets=sk.aoe?runEnemies.filter(e=>e.alive&&e.x-runX<120&&e.x>camX):
      runEnemies.filter(e=>e.alive&&Math.abs(e.x-runX)<80);
    for(let h=0;h<sk.hits;h++){
      for(const t of targets){
        let dmg=getEffectiveAtk()*sk.dmgMult;
        if(sk.forceCrit) dmg*=stats.critDmg;
        dmg=Math.max(1,Math.floor(dmg));
        t.hp-=dmg;t.flashTimer=8;
        if(stats.lifeSteal>0) stats.hp=Math.min(stats.hp+dmg*stats.lifeSteal,stats.maxHp);
        const ex=t.x-camX;
        runDmgNums.push({x:ex+(Math.random()-0.5)*10,y:t.y-t.size-8-h*12,
          text:`✦${dmg}`,color:'#ffeb3b',life:35,vy:-1.5});
        if(t.hp<=0){
          t.alive=false;sp++;totalKills++;sfxKill();
          for(let j=0;j<8;j++){
            runParticles.push({x:ex,y:t.y,vx:(Math.random()-0.5)*4,vy:-Math.random()*4,
              color:t.color,life:25,size:3+Math.random()*2});
          }
        }
      }
    }
  }
  // Visual effect
  skillEffects.push({type:sk.effect,life:30,frame:0,icon:s.icon,name:s.name});
  sfxSkill();
}

// ===== DRAW =====
function drawTitle(){
  ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,W,H);
  const t=Date.now()*0.001;
  for(let i=0;i<20;i++){
    const a=i/20*Math.PI*2+t*0.2;
    const r=60+Math.sin(t*0.5+i*0.7)*25;
    const nx=W/2+Math.cos(a)*r;
    const ny=H*0.38+Math.sin(a)*r*0.7;
    ctx.beginPath();ctx.arc(nx,ny,5,0,Math.PI*2);
    ctx.fillStyle=`hsla(${i*18},60%,55%,0.5)`;ctx.fill();
    const a2=(i+1)/20*Math.PI*2+t*0.2;
    const r2=60+Math.sin(t*0.5+(i+1)*0.7)*25;
    ctx.beginPath();ctx.moveTo(nx,ny);
    ctx.lineTo(W/2+Math.cos(a2)*r2,H*0.38+Math.sin(a2)*r2*0.7);
    ctx.strokeStyle=`hsla(${i*18},60%,55%,0.15)`;ctx.lineWidth=1;ctx.stroke();
  }
  ctx.fillStyle='rgba(20,25,40,0.8)';ctx.fillRect(0,H*0.08,W,H*0.12);
  const ry=H*0.08+H*0.12*0.75;
  ctx.fillStyle='#1a237e';ctx.fillRect(0,ry,W,H*0.12*0.25);
  const px=W*0.3+Math.sin(t*5)*3;
  ctx.fillStyle='#64b5f6';ctx.fillRect(px-4,ry-14,8,14);
  ctx.fillStyle='#e0e0e0';ctx.beginPath();ctx.arc(px,ry-18,5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#e0e0e0';ctx.font='bold 26px sans-serif';ctx.textAlign='center';
  ctx.fillText('スフィアグリッド',W/2,H*0.58);
  ctx.fillText('ローグ',W/2,H*0.64);
  ctx.font='13px sans-serif';ctx.fillStyle='#9e9e9e';
  ctx.fillText('死んで覚えて、盤で育てる',W/2,H*0.70);
  ctx.fillStyle='rgba(63,81,181,0.8)';
  roundRect(ctx,W/2-80,H*0.77,160,44,8);ctx.fill();
  ctx.fillStyle='#fff';ctx.font='bold 18px sans-serif';
  ctx.fillText('START',W/2,H*0.77+28);
}

function drawRunner(){
  ctx.save();
  ctx.beginPath();ctx.rect(0,0,W,RUNNER_H);ctx.clip();
  ctx.fillStyle='#0c1024';ctx.fillRect(0,0,W,RUNNER_H);
  const skyGrd=ctx.createLinearGradient(0,0,0,groundY);
  skyGrd.addColorStop(0,'#0a0a20');skyGrd.addColorStop(1,'#141430');
  ctx.fillStyle=skyGrd;ctx.fillRect(0,0,W,groundY);
  for(const b of bgBuildings){
    const sx=b.x-camX*0.3;
    if(sx>-b.w&&sx<W+b.w){
      ctx.fillStyle=b.color;ctx.fillRect(sx,groundY-b.h,b.w,b.h);
      ctx.fillStyle='rgba(255,200,100,0.15)';
      for(let wy=groundY-b.h+4;wy<groundY-4;wy+=8){
        for(let wx=sx+4;wx<sx+b.w-4;wx+=8){ctx.fillRect(wx,wy,3,3);}
      }
    }
  }
  ctx.fillStyle='#1a237e';ctx.fillRect(0,groundY,W,RUNNER_H-groundY);
  ctx.fillStyle='rgba(255,255,255,0.05)';ctx.fillRect(0,groundY,W,1);

  // Skill effects
  for(const ef of skillEffects){
    const alpha=ef.life/30;
    ctx.globalAlpha=alpha;
    if(ef.type==='slash'||ef.type==='lightning'||ef.type==='phantom'){
      ctx.strokeStyle=ef.type==='lightning'?'#ffeb3b':ef.type==='phantom'?'#ab47bc':'#fff';
      ctx.lineWidth=3;
      for(let i=0;i<3;i++){
        const sx=W*0.25+10+Math.random()*30;
        const sy=groundY-20+Math.random()*15;
        ctx.beginPath();ctx.moveTo(sx,sy-10);ctx.lineTo(sx+15,sy+10);ctx.stroke();
      }
    }
    if(ef.type==='explode'||ef.type==='soulExplode'){
      const r=ef.frame*2;
      ctx.beginPath();ctx.arc(W*0.35,groundY-5,r,0,Math.PI*2);
      ctx.fillStyle=ef.type==='soulExplode'?'rgba(171,71,188,0.4)':'rgba(255,112,67,0.4)';
      ctx.fill();
    }
    if(ef.type==='shield'||ef.type==='holyShield'){
      ctx.beginPath();ctx.arc(W*0.25,groundY-10,18+Math.sin(ef.frame*0.3)*3,0,Math.PI*2);
      ctx.strokeStyle=ef.type==='holyShield'?'#ffd54f':'#64b5f6';ctx.lineWidth=3;ctx.stroke();
    }
    if(ef.type==='speed'||ef.type==='tornado'){
      for(let i=0;i<3;i++){
        ctx.fillStyle='rgba(129,212,250,0.5)';
        ctx.fillRect(W*0.25-20-ef.frame*2-i*8,groundY-8+i*3,12,3);
      }
    }
    if(ef.type==='transcend'){
      const r=20+Math.sin(ef.frame*0.2)*5;
      ctx.beginPath();ctx.arc(W*0.25,groundY-10,r,0,Math.PI*2);
      ctx.fillStyle='rgba(255,215,0,0.3)';ctx.fill();
      ctx.strokeStyle='#ffd700';ctx.lineWidth=2;ctx.stroke();
    }
    // Skill name flash
    if(ef.frame<20){
      ctx.font='bold 12px sans-serif';ctx.textAlign='center';
      ctx.fillStyle='#fff';
      ctx.fillText(`${ef.icon}${ef.name}`,W*0.5,groundY-35+ef.frame*0.5);
    }
    ctx.globalAlpha=1;
  }

  // Enemies
  for(const e of runEnemies){
    if(!e.alive) continue;
    const ex=e.x-camX;
    if(ex<-20||ex>W+20) continue;
    ctx.globalAlpha=e.flashTimer>0?0.5:1;
    ctx.font=`${e.size*1.5}px sans-serif`;ctx.textAlign='center';
    ctx.fillText(e.emoji,ex,e.y);
    ctx.globalAlpha=1;
    if(e.hp<e.maxHp){
      const bw=e.size*2;
      ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(ex-bw/2,e.y-e.size*1.8,bw,3);
      ctx.fillStyle=e.hp/e.maxHp>0.5?'#4caf50':'#e53935';
      ctx.fillRect(ex-bw/2,e.y-e.size*1.8,bw*(e.hp/e.maxHp),3);
    }
    if(e.flashTimer>0) e.flashTimer--;
  }

  // Player
  const px=W*0.25;
  if(runAlive){
    const t=Date.now()*0.008;
    const bobY=fighting?0:Math.sin(t*2)*2;
    // Buff glow
    if(buffs.transcend){
      ctx.beginPath();ctx.arc(px,groundY-10+bobY,16,0,Math.PI*2);
      ctx.fillStyle='rgba(255,215,0,0.15)';ctx.fill();
    }
    if(buffs.invuln){
      ctx.beginPath();ctx.arc(px,groundY-10+bobY,14,0,Math.PI*2);
      ctx.strokeStyle='rgba(100,181,246,0.6)';ctx.lineWidth=2;ctx.stroke();
    }
    ctx.fillStyle=buffs.transcend?'#ffd700':(buffs.haste||buffs.galeForce)?'#81d4fa':'#64b5f6';
    ctx.fillRect(px-4,groundY-14+bobY,8,12);
    ctx.fillStyle='#e0e0e0';
    ctx.beginPath();ctx.arc(px,groundY-18+bobY,5,0,Math.PI*2);ctx.fill();
    if(attackCooldown>attackCooldownMax-10){
      const swA=(attackCooldownMax-attackCooldown)/10*Math.PI;
      ctx.strokeStyle='#fff176';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(px+5,groundY-10+bobY);
      ctx.lineTo(px+5+Math.cos(swA-0.5)*15,groundY-10+bobY-Math.sin(swA-0.5)*12);
      ctx.stroke();
    }
    const hpPct=stats.hp/stats.maxHp;
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(px-15,groundY-28,30,4);
    ctx.fillStyle=hpPct>0.5?'#4caf50':hpPct>0.25?'#ff9800':'#e53935';
    ctx.fillRect(px-15,groundY-28,30*hpPct,4);
  } else {
    ctx.globalAlpha=runDeathTimer/90;
    ctx.font='16px sans-serif';ctx.textAlign='center';
    ctx.fillText('💀',px,groundY-8);
    ctx.globalAlpha=1;
  }

  for(const p of runParticles){
    ctx.globalAlpha=p.life/30;ctx.fillStyle=p.color;
    ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);
  }
  ctx.globalAlpha=1;
  for(const d of runDmgNums){
    ctx.globalAlpha=d.life/30;ctx.fillStyle=d.color;
    ctx.font='bold 11px sans-serif';ctx.textAlign='center';
    ctx.fillText(d.text,d.x,d.y);
  }
  ctx.globalAlpha=1;
  ctx.fillStyle='rgba(255,255,255,0.4)';ctx.font='10px sans-serif';ctx.textAlign='right';
  ctx.fillText(`${Math.floor(runDist)}m`,W-5,12);
  ctx.restore();
}

function drawHUD(){
  const y=RUNNER_H;
  ctx.fillStyle='rgba(10,15,30,0.95)';ctx.fillRect(0,y,W,HUD_H);
  ctx.fillStyle='rgba(100,181,246,0.15)';ctx.fillRect(0,y+HUD_H-1,W,1);
  ctx.font='bold 12px sans-serif';ctx.textAlign='left';
  ctx.fillStyle='#fff176';ctx.fillText(`SP:${sp}`,8,y+23);
  ctx.fillStyle='#9e9e9e';ctx.fillText(`Run#${totalRuns}`,70,y+23);
  ctx.fillStyle='#64b5f6';ctx.fillText(`Kill:${totalKills}`,140,y+23);
  ctx.textAlign='right';
  ctx.fillStyle='#e0e0e0';ctx.fillText(`Best:${Math.floor(bestDist)}m`,W-8,y+23);
}

const CAT_COLORS={
  atk:'#e53935',def:'#42a5f5',spd:'#66bb6a',crit:'#ffeb3b',special:'#ab47bc',ultimate:'#ffd700'
};

function drawSphereGrid(){
  const y=GRID_Y;
  ctx.save();
  ctx.beginPath();ctx.rect(0,y,W,GRID_H);ctx.clip();
  ctx.fillStyle='#080810';ctx.fillRect(0,y,W,GRID_H);
  const grd=ctx.createRadialGradient(gridCenterX+gridScroll.x,gridCenterY+gridScroll.y,0,
    gridCenterX+gridScroll.x,gridCenterY+gridScroll.y,200);
  grd.addColorStop(0,'rgba(26,35,80,0.12)');grd.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=grd;ctx.fillRect(0,y,W,GRID_H);

  const ox=gridScroll.x,oy=gridScroll.y;
  const time=Date.now()*0.001;

  // Edges
  for(const [a,b] of gridEdges){
    const na=gridNodes[a],nb=gridNodes[b];
    const ax=na.x+ox,ay=na.y+oy,bx=nb.x+ox,by=nb.y+oy;
    ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(bx,by);
    if(na.unlocked&&nb.unlocked){
      ctx.strokeStyle='rgba(100,181,246,0.35)';ctx.lineWidth=2.5;
      ctx.shadowColor='#42a5f5';ctx.shadowBlur=4;
    } else {
      ctx.strokeStyle='rgba(60,60,80,0.2)';ctx.lineWidth=1;ctx.shadowBlur=0;
    }
    ctx.stroke();ctx.shadowBlur=0;
  }

  // Nodes
  for(const n of gridNodes){
    const nx=n.x+ox,ny=n.y+oy;
    if(ny<y-40||ny>y+GRID_H+40||nx<-40||nx>W+40) continue;

    const isSkill=n.type==='skill';
    const r=isSkill?(n.tier>=3?24:n.tier>=2?20:18):14;
    const selected=selectedNode===n.id;
    const canDo=!n.unlocked&&canUnlock(n.id);

    if(n.type==='start'){
      ctx.beginPath();ctx.arc(nx,ny,16,0,Math.PI*2);
      ctx.fillStyle='#42a5f5';ctx.shadowColor='#42a5f5';ctx.shadowBlur=12;
      ctx.fill();ctx.shadowBlur=0;
      ctx.fillStyle='#fff';ctx.font='bold 9px sans-serif';ctx.textAlign='center';
      ctx.fillText('START',nx,ny+3);
    } else if(isSkill){
      // SKILL NODE - always flashy, even when locked
      const catColor=CAT_COLORS[n.cat]||'#fff';
      const pulse=Math.sin(time*2+n.id)*0.15+0.85;

      // Outer glow ring (always visible)
      ctx.beginPath();ctx.arc(nx,ny,r+6,0,Math.PI*2);
      ctx.strokeStyle=n.unlocked?catColor+'88':catColor+'33';
      ctx.lineWidth=1.5;ctx.stroke();

      // Pulsing glow
      ctx.beginPath();ctx.arc(nx,ny,r+3,0,Math.PI*2);
      ctx.shadowColor=catColor;ctx.shadowBlur=n.unlocked?20:8;
      ctx.fillStyle=n.unlocked?catColor:`rgba(40,40,60,${0.6*pulse})`;
      ctx.fill();ctx.shadowBlur=0;

      // Inner circle
      ctx.beginPath();ctx.arc(nx,ny,r,0,Math.PI*2);
      ctx.fillStyle=n.unlocked?catColor:`rgba(50,50,80,${0.8*pulse})`;
      ctx.fill();
      ctx.strokeStyle=selected?'#fff':(n.unlocked?'rgba(255,255,255,0.4)':catColor+'66');
      ctx.lineWidth=selected?3:2;ctx.stroke();

      // Icon (always visible)
      ctx.font=`${r*0.9}px sans-serif`;ctx.textAlign='center';
      ctx.globalAlpha=n.unlocked?1:0.6;
      ctx.fillText(n.icon,nx,ny+r*0.3);
      ctx.globalAlpha=1;

      // Name below
      ctx.font='bold 9px sans-serif';
      ctx.fillStyle=n.unlocked?'#fff':catColor+'aa';
      ctx.fillText(n.label,nx,ny+r+13);

      // Tier stars
      if(n.tier>=2){
        const stars='★'.repeat(n.tier);
        ctx.font='8px sans-serif';
        ctx.fillStyle=n.unlocked?'#ffd700':catColor+'66';
        ctx.fillText(stars,nx,ny-r-4);
      }

      // Cost (locked)
      if(!n.unlocked&&canDo){
        ctx.fillStyle=sp>=n.cost?'#fff176':'#e57373';
        ctx.font='bold 10px sans-serif';
        ctx.fillText(`${n.cost}SP`,nx,ny+r+25);
      }
    } else if(n.unlocked){
      // Stat node - unlocked
      const catColor=CAT_COLORS[n.cat]||'#fff';
      ctx.beginPath();ctx.arc(nx,ny,r,0,Math.PI*2);
      ctx.fillStyle=catColor;
      ctx.shadowColor=catColor;ctx.shadowBlur=selected?15:6;
      ctx.fill();ctx.shadowBlur=0;
      ctx.strokeStyle=selected?'#fff':'rgba(255,255,255,0.3)';
      ctx.lineWidth=selected?2.5:1;ctx.stroke();
      ctx.fillStyle='#fff';ctx.font='bold 8px sans-serif';ctx.textAlign='center';
      ctx.fillText(n.label,nx,ny+3);
    } else {
      // Stat node - locked
      ctx.beginPath();ctx.arc(nx,ny,r,0,Math.PI*2);
      ctx.fillStyle=canDo?'rgba(60,60,90,0.7)':'rgba(30,30,50,0.5)';
      ctx.fill();
      ctx.strokeStyle=selected?(sp>=n.cost?'#fff176':'#ff9800'):(canDo?'rgba(150,150,180,0.4)':'rgba(60,60,80,0.25)');
      ctx.lineWidth=selected?2.5:1;ctx.stroke();
      ctx.fillStyle=canDo?'rgba(200,200,220,0.7)':'rgba(120,120,140,0.35)';
      ctx.font='bold 8px sans-serif';ctx.textAlign='center';
      ctx.fillText(n.label,nx,ny+2);
      if(canDo){
        ctx.fillStyle=sp>=n.cost?'#fff176':'#e57373';
        ctx.font='9px sans-serif';
        ctx.fillText(`${n.cost}SP`,nx,ny+r+12);
      }
    }
  }

  // Selected node info popup
  if(selectedNode!==null){
    const n=gridNodes[selectedNode];
    if(!n.unlocked&&canUnlock(n.id)){
      const isSkill=n.type==='skill';
      const panelH=isSkill?60:40;
      const panelW=isSkill?200:150;
      const px_=Math.max(10,Math.min(W-panelW-10,n.x+ox-panelW/2));
      const py_=Math.min(y+GRID_H-panelH-10,Math.max(y+5,n.y+oy+(isSkill?35:25)));

      ctx.fillStyle='rgba(15,15,35,0.95)';
      roundRect(ctx,px_,py_,panelW,panelH,8);ctx.fill();
      ctx.strokeStyle=(CAT_COLORS[n.cat]||'#64b5f6')+'66';ctx.lineWidth=1;
      roundRect(ctx,px_,py_,panelW,panelH,8);ctx.stroke();

      ctx.fillStyle='#e0e0e0';ctx.font='bold 11px sans-serif';ctx.textAlign='left';
      ctx.fillText(`${isSkill?n.icon+' ':''}${n.label}`,px_+8,py_+16);
      if(isSkill&&n.desc){
        ctx.font='10px sans-serif';ctx.fillStyle='#9e9e9e';
        ctx.fillText(n.desc,px_+8,py_+32);
      }

      const btnY=py_+panelH-32;
      if(sp>=n.cost){
        ctx.fillStyle='rgba(76,175,80,0.85)';
        roundRect(ctx,px_+panelW-65,btnY,55,24,5);ctx.fill();
        ctx.fillStyle='#fff';ctx.font='bold 10px sans-serif';ctx.textAlign='center';
        ctx.fillText('解放',px_+panelW-37,btnY+16);
      } else {
        ctx.fillStyle='#e57373';ctx.font='10px sans-serif';ctx.textAlign='left';
        ctx.fillText(`SP不足(${n.cost})`,px_+panelW-80,btnY+16);
      }
    }
  }

  ctx.restore();
  drawStatsBar();
}

function drawStatsBar(){
  const bh=28;const by=H-bh;
  ctx.fillStyle='rgba(10,15,30,0.92)';ctx.fillRect(0,by,W,bh);
  ctx.font='10px sans-serif';ctx.textAlign='left';
  ctx.fillStyle='#e57373';ctx.fillText(`ATK${Math.floor(getEffectiveAtk())}`,5,by+18);
  ctx.fillStyle='#64b5f6';ctx.fillText(`DEF${getEffectiveDef()}`,55,by+18);
  ctx.fillStyle='#66bb6a';ctx.fillText(`SPD${getEffectiveSpd().toFixed(1)}`,105,by+18);
  ctx.fillStyle='#ffeb3b';ctx.fillText(`会心${Math.floor(stats.critRate*100)}%`,165,by+18);
  // Active skills icons
  let sx=220;
  for(const s of activeSkills){
    const onCd=s.cd>0;
    ctx.globalAlpha=onCd?0.4:1;
    ctx.font='12px sans-serif';
    ctx.fillText(s.icon,sx,by+18);
    ctx.globalAlpha=1;
    sx+=18;
  }
  ctx.textAlign='right';
  ctx.fillStyle='#4caf50';ctx.fillText(`HP${Math.floor(stats.hp)}/${stats.maxHp}`,W-5,by+18);
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

// ===== INPUT =====
function getXY(e){
  const rect=C.getBoundingClientRect();
  const touch=e.touches?e.touches[0]:e;
  return{x:touch.clientX-rect.left,y:touch.clientY-rect.top};
}

let touchStartTime=0,touchMoved=false;

C.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(actx.state==='suspended') actx.resume();
  const pos=getXY(e);
  touchStartTime=Date.now();touchMoved=false;
  if(state===STATE.TITLE) return;
  if(pos.y>GRID_Y){
    gridScroll.dragging=true;
    gridScroll.startX=pos.x;gridScroll.startY=pos.y;
    gridScroll.scrollStartX=gridScroll.x;gridScroll.scrollStartY=gridScroll.y;
  }
},{passive:false});

C.addEventListener('touchmove',e=>{
  e.preventDefault();
  const pos=getXY(e);
  if(gridScroll.dragging){
    const dx=pos.x-gridScroll.startX,dy=pos.y-gridScroll.startY;
    if(Math.abs(dx)>5||Math.abs(dy)>5) touchMoved=true;
    gridScroll.x=gridScroll.scrollStartX+dx;
    gridScroll.y=gridScroll.scrollStartY+dy;
  }
},{passive:false});

C.addEventListener('touchend',e=>{
  e.preventDefault();
  gridScroll.dragging=false;
  if(state===STATE.TITLE){
    state=STATE.PLAY;buildSphereGrid();resize();initRun();return;
  }
  if(!touchMoved&&Date.now()-touchStartTime<300){
    const pos=getXY_last(e);
    if(pos&&pos.y>GRID_Y) handleGridTap(pos);
  }
},{passive:false});

C.addEventListener('click',e=>{
  const pos=getXY(e);
  if(state===STATE.TITLE){
    state=STATE.PLAY;buildSphereGrid();resize();initRun();return;
  }
  if(pos.y>GRID_Y) handleGridTap(pos);
});

function getXY_last(e){
  const rect=C.getBoundingClientRect();
  if(e.changedTouches&&e.changedTouches[0]){
    return{x:e.changedTouches[0].clientX-rect.left,y:e.changedTouches[0].clientY-rect.top};
  }
  return null;
}

function handleGridTap(pos){
  const ox=gridScroll.x,oy=gridScroll.y;
  if(selectedNode!==null){
    const n=gridNodes[selectedNode];
    if(!n.unlocked&&canUnlock(n.id)&&sp>=n.cost){
      const isSkill=n.type==='skill';
      const panelW=isSkill?200:150;
      const panelH=isSkill?60:40;
      const px_=Math.max(10,Math.min(W-panelW-10,n.x+ox-panelW/2));
      const py_=Math.min(GRID_Y+GRID_H-panelH-10,Math.max(GRID_Y+5,n.y+oy+(isSkill?35:25)));
      if(pos.x>px_+panelW-65&&pos.x<px_+panelW-10&&pos.y>py_+panelH-32&&pos.y<py_+panelH-8){
        unlockNode(n);return;
      }
    }
  }
  for(const n of gridNodes){
    const nx=n.x+ox,ny=n.y+oy;
    const hitR=n.type==='skill'?26:22;
    if(Math.hypot(pos.x-nx,pos.y-ny)<hitR){
      if(selectedNode===n.id){
        if(!n.unlocked&&canUnlock(n.id)&&sp>=n.cost) unlockNode(n);
        selectedNode=null;
      } else {
        selectedNode=n.id;
      }
      return;
    }
  }
  selectedNode=null;
}

// ===== LOOP =====
function loop(){
  if(state===STATE.TITLE) drawTitle();
  else if(state===STATE.PLAY){
    updateRunner();drawRunner();drawHUD();drawSphereGrid();
  }
  requestAnimationFrame(loop);
}

resize();loop();
</script>
