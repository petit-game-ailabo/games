<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Sphere Grid Rogue</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a1a;touch-action:none;-webkit-user-select:none;user-select:none}
canvas{display:block;width:100%;height:100%}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';
const C=document.getElementById('c'),ctx=C.getContext('2d');
let W,H,dpr;
function resize(){
  dpr=Math.min(window.devicePixelRatio||1,3);
  W=window.innerWidth;H=window.innerHeight;
  C.width=W*dpr;C.height=H*dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
  RUNNER_H=Math.floor(H*0.18);
  GRID_Y=RUNNER_H+HUD_H;GRID_H=H-GRID_Y;
  if(gN.length) posGrid();
}
let RUNNER_H=0;const HUD_H=34;let GRID_Y=0,GRID_H=0;

// Audio
const ac=new(window.AudioContext||window.webkitAudioContext)();
function tone(f,d,v=0.3,t='sine'){const o=ac.createOscillator(),g=ac.createGain();o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+d);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+d);}
function sfxHit(){tone(300,0.08,0.2,'square');}
function sfxDie(){tone(180,0.3,0.3,'sawtooth');setTimeout(()=>tone(120,0.4,0.3,'sawtooth'),200);}
function sfxUnlock(){tone(523,0.12,0.3,'triangle');setTimeout(()=>tone(659,0.1,0.3,'triangle'),80);}
function sfxKill(){tone(440,0.1,0.2,'triangle');}
function sfxCast(){tone(600+Math.random()*300,0.1,0.2,'sine');}
function sfxSkill(){tone(784,0.15,0.35,'sine');setTimeout(()=>tone(988,0.12,0.3,'sine'),100);}

// State
const ST={TITLE:0,CAST:1,PLAY:2};
let state=ST.TITLE;

// Stats
let base={hp:30,mhp:30,atk:5,def:1,spd:1.2,cr:0.05,cd:1.5,reg:0,ls:0,dg:0,mh:1};
let st={...base};
let learned=[];let buffs={};

// Run
let rx=0,rd=0,best=0,alive=true,dTimer=0;
let enemies=[],parts=[],dnums=[];
let sp=0,runs=0,kills=0,atkCd=0,atkCdMax=50,fight=false,camX=0;
let bgs=[];

// Cast
let castQ=[],castTxts=[],castT=0;

// Grid
let gN=[],gE=[];
let gs={x:0,y:0,drag:false,sx:0,sy:0,ox:0,oy:0};
let selN=null,gcx=0,gcy=0;

// ===== SPHERE GRID - FF10 style with circular clusters =====
function buildGrid(){
  gN=[];gE=[];
  // Helper to create a ring of nodes around a center point
  const S=Math.min(W*0.055,24); // spacing unit
  let id=0;
  
  // We'll build the grid with circular clusters connected by paths
  // Each cluster is a ring of stat nodes around a skill node
  
  const nodes=[];
  const edges=[];
  
  function addN(gx,gy,type,opts={}){
    const n={id:id++,gx,gy,type,unlocked:false,applied:false,...opts};
    nodes.push(n);
    return n.id;
  }
  function addE(a,b){edges.push([a,b]);}
  
  // ===== CENTER HUB =====
  const start=addN(0,0,'start',{unlocked:true,label:'START'});
  
  // Inner ring around start - 5 exits
  const c1=addN(0,-1.8,'stat',{cost:1,stat:'mhp',val:8,label:'HP+8',cat:'guard'});
  const c2=addN(1.7,-0.6,'stat',{cost:1,stat:'atk',val:1,label:'ATK+1',cat:'might'});
  const c3=addN(1.1,1.5,'stat',{cost:1,stat:'cr',val:0.04,label:'CRT+4%',cat:'arcane'});
  const c4=addN(-1.1,1.5,'stat',{cost:1,stat:'ls',val:0.04,label:'吸血+4%',cat:'dark'});
  const c5=addN(-1.7,-0.6,'stat',{cost:1,stat:'spd',val:0.1,label:'SPD+',cat:'swift'});
  addE(start,c1);addE(start,c2);addE(start,c3);addE(start,c4);addE(start,c5);
  // Inner ring connections
  addE(c1,c2);addE(c2,c3);addE(c3,c4);addE(c4,c5);addE(c5,c1);
  
  // ===== MIGHT CLUSTER (right) =====
  const m0=addN(3.5,-0.3,'stat',{cost:1,stat:'atk',val:2,label:'ATK+2',cat:'might'});
  const m1=addN(5,0.5,'stat',{cost:1,stat:'atk',val:2,label:'ATK+2',cat:'might'});
  const m2=addN(5,-1.2,'stat',{cost:2,stat:'mh',val:1,label:'Twin Edge',cat:'might'});
  // Might skill ring
  const ms1=addN(6.5,0,'skill',{cost:3,skill:'powerStrike',label:'Brave Strike',cat:'might',desc:'ATK×3',icon:'⚔️',tier:1});
  const m3=addN(7.5,1.2,'stat',{cost:2,stat:'atk',val:3,label:'ATK+3',cat:'might'});
  const m4=addN(7.5,-1.2,'stat',{cost:2,stat:'atk',val:3,label:'ATK+3',cat:'might'});
  const m5=addN(8.8,0,'stat',{cost:2,stat:'mh',val:1,label:'Triple Edge',cat:'might'});
  addE(c2,m0);addE(m0,m1);addE(m0,m2);addE(m1,ms1);addE(m2,ms1);
  addE(ms1,m3);addE(ms1,m4);addE(m3,m5);addE(m4,m5);
  // Might tier 2 ring
  const m6=addN(10,1,'stat',{cost:2,stat:'atk',val:4,label:'ATK+4',cat:'might'});
  const m7=addN(10,-1,'stat',{cost:2,stat:'atk',val:4,label:'ATK+4',cat:'might'});
  const ms2=addN(11.5,0,'skill',{cost:6,skill:'berserker',label:'Draconic Fury',cat:'might',desc:'ATK×5全体',icon:'🐉',tier:2});
  addE(m5,m6);addE(m5,m7);addE(m6,ms2);addE(m7,ms2);
  // Might tier 3
  const m8=addN(13,0.8,'stat',{cost:3,stat:'atk',val:6,label:'ATK+6',cat:'might'});
  const m9=addN(13,-0.8,'stat',{cost:3,stat:'mh',val:1,label:'Quad Edge',cat:'might'});
  const ms3=addN(14.5,0,'skill',{cost:9,skill:'ragnarok',label:'Ragnarök',cat:'might',desc:'ATK×8全体殲滅',icon:'💀',tier:3});
  addE(ms2,m8);addE(ms2,m9);addE(m8,ms3);addE(m9,ms3);
  
  // ===== GUARD CLUSTER (upper-left) =====
  const g0=addN(-1.5,-3,'stat',{cost:1,stat:'def',val:1,label:'DEF+1',cat:'guard'});
  const g1=addN(-0.5,-4.5,'stat',{cost:1,stat:'mhp',val:12,label:'HP+12',cat:'guard'});
  const g2=addN(-2.5,-4.5,'stat',{cost:1,stat:'def',val:1,label:'DEF+1',cat:'guard'});
  addE(c1,g0);addE(g0,g1);addE(g0,g2);
  // Guard skill ring 1
  const gs1=addN(-1.5,-6,'skill',{cost:3,skill:'ironWall',label:'Infinity Wall',cat:'guard',desc:'3秒完全防御',icon:'🛡️',tier:1});
  const g3=addN(-3.5,-6,'stat',{cost:2,stat:'mhp',val:15,label:'HP+15',cat:'guard'});
  const g4=addN(0,-6.5,'stat',{cost:2,stat:'dg',val:0.06,label:'回避+6%',cat:'guard'});
  addE(g1,gs1);addE(g2,gs1);addE(g2,g3);addE(g1,g4);
  // Guard ring 2
  const g5=addN(-2.5,-7.5,'stat',{cost:2,stat:'def',val:2,label:'DEF+2',cat:'guard'});
  const g6=addN(-0.5,-7.5,'stat',{cost:2,stat:'mhp',val:20,label:'HP+20',cat:'guard'});
  const gs2=addN(-1.5,-9,'skill',{cost:6,skill:'aegis',label:'Radiant Aegis',cat:'guard',desc:'5秒無敵+全回復',icon:'✨',tier:2});
  addE(gs1,g5);addE(gs1,g6);addE(g3,g5);addE(g4,g6);addE(g5,gs2);addE(g6,gs2);
  // Guard tier 3
  const g7=addN(-2.5,-10.5,'stat',{cost:3,stat:'def',val:3,label:'DEF+3',cat:'guard'});
  const g8=addN(-0.5,-10.5,'stat',{cost:3,stat:'mhp',val:30,label:'HP+30',cat:'guard'});
  const gs3=addN(-1.5,-12,'skill',{cost:9,skill:'immortal',label:'Immortal Bastion',cat:'guard',desc:'10秒無敵+再生MAX',icon:'🏰',tier:3});
  addE(gs2,g7);addE(gs2,g8);addE(g7,gs3);addE(g8,gs3);
  
  // ===== SWIFT CLUSTER (lower-left) =====
  const sw0=addN(-1.5,3,'stat',{cost:1,stat:'spd',val:0.15,label:'SPD+',cat:'swift'});
  const sw1=addN(-0.5,4.5,'stat',{cost:1,stat:'spd',val:0.15,label:'SPD+',cat:'swift'});
  const sw2=addN(-2.5,4.5,'stat',{cost:1,stat:'dg',val:0.05,label:'回避+5%',cat:'swift'});
  addE(c5,sw0);addE(sw0,sw1);addE(sw0,sw2);
  // Swift skill ring 1
  const sws1=addN(-1.5,6,'skill',{cost:3,skill:'haste',label:'Haste',cat:'swift',desc:'5秒速度2倍',icon:'💨',tier:1});
  const sw3=addN(-3.5,6,'stat',{cost:2,stat:'dg',val:0.08,label:'回避+8%',cat:'swift'});
  const sw4=addN(0,6.5,'stat',{cost:2,stat:'spd',val:0.2,label:'SPD+',cat:'swift'});
  addE(sw1,sws1);addE(sw2,sws1);addE(sw2,sw3);addE(sw1,sw4);
  // Swift ring 2
  const sw5=addN(-2.5,7.5,'stat',{cost:2,stat:'spd',val:0.25,label:'SPD+',cat:'swift'});
  const sw6=addN(-0.5,7.5,'stat',{cost:2,stat:'dg',val:0.1,label:'回避+10%',cat:'swift'});
  const sws2=addN(-1.5,9,'skill',{cost:6,skill:'gale',label:'Gale Force',cat:'swift',desc:'8秒速度3倍+回避',icon:'🌪️',tier:2});
  addE(sws1,sw5);addE(sws1,sw6);addE(sw3,sw5);addE(sw4,sw6);addE(sw5,sws2);addE(sw6,sws2);
  // Swift tier 3
  const sw7=addN(-2.5,10.5,'stat',{cost:3,stat:'dg',val:0.12,label:'回避+12%',cat:'swift'});
  const sw8=addN(-0.5,10.5,'stat',{cost:3,stat:'spd',val:0.4,label:'SPD+',cat:'swift'});
  const sws3=addN(-1.5,12,'skill',{cost:9,skill:'phantom',label:'Phantom Shift',cat:'swift',desc:'10秒速度5倍+回避80%',icon:'👻',tier:3});
  addE(sws2,sw7);addE(sws2,sw8);addE(sw7,sws3);addE(sw8,sws3);
  
  // ===== ARCANE CLUSTER (upper-right) =====
  const a0=addN(1.5,-3,'stat',{cost:1,stat:'cr',val:0.05,label:'CRT+5%',cat:'arcane'});
  const a1=addN(0.5,-4.5,'stat',{cost:1,stat:'cd',val:0.2,label:'CRD+20%',cat:'arcane'});
  const a2=addN(2.5,-4.5,'stat',{cost:1,stat:'cr',val:0.05,label:'CRT+5%',cat:'arcane'});
  addE(c1,a0);addE(a0,a1);addE(a0,a2);
  // Arcane ring 1
  const as1=addN(1.5,-6,'skill',{cost:3,skill:'critSlash',label:'Void Slash',cat:'arcane',desc:'確定CRT×3連',icon:'⚡',tier:1});
  const a3=addN(3.5,-6,'stat',{cost:2,stat:'cd',val:0.3,label:'CRD+30%',cat:'arcane'});
  const a4=addN(0,-6.5,'stat',{cost:2,stat:'cr',val:0.08,label:'CRT+8%',cat:'arcane'});
  addE(a1,as1);addE(a2,as1);addE(a2,a3);addE(a1,a4);
  // Arcane ring 2
  const a5=addN(2.5,-7.5,'stat',{cost:2,stat:'cd',val:0.4,label:'CRD+40%',cat:'arcane'});
  const a6=addN(0.5,-7.5,'stat',{cost:2,stat:'cr',val:0.1,label:'CRT+10%',cat:'arcane'});
  const as2=addN(1.5,-9,'skill',{cost:6,skill:'execute',label:'Executioner',cat:'arcane',desc:'5連100%CRT',icon:'🗡️',tier:2});
  addE(as1,a5);addE(as1,a6);addE(a3,a5);addE(a4,a6);addE(a5,as2);addE(a6,as2);
  // Arcane tier 3
  const a7=addN(2.5,-10.5,'stat',{cost:3,stat:'cd',val:0.6,label:'CRD+60%',cat:'arcane'});
  const a8=addN(0.5,-10.5,'stat',{cost:3,stat:'cr',val:0.15,label:'CRT+15%',cat:'arcane'});
  const as3=addN(1.5,-12,'skill',{cost:10,skill:'eclipse',label:'Eclipse Zero',cat:'arcane',desc:'7連CRD×3',icon:'🌑',tier:3});
  addE(as2,a7);addE(as2,a8);addE(a7,as3);addE(a8,as3);
  
  // ===== DARK CLUSTER (lower-right) =====
  const d0=addN(1.5,3,'stat',{cost:1,stat:'ls',val:0.05,label:'吸血+5%',cat:'dark'});
  const d1=addN(0.5,4.5,'stat',{cost:1,stat:'reg',val:0.3,label:'再生+',cat:'dark'});
  const d2=addN(2.5,4.5,'stat',{cost:1,stat:'ls',val:0.05,label:'吸血+5%',cat:'dark'});
  addE(c3,d0);addE(d0,d1);addE(d0,d2);
  // Dark ring 1
  const ds1=addN(1.5,6,'skill',{cost:3,skill:'drain',label:'Soul Drain',cat:'dark',desc:'大ダメ+HP回復',icon:'💀',tier:1});
  const d3=addN(3.5,6,'stat',{cost:2,stat:'ls',val:0.08,label:'吸血+8%',cat:'dark'});
  const d4=addN(0,6.5,'stat',{cost:2,stat:'reg',val:0.8,label:'再生+',cat:'dark'});
  addE(d1,ds1);addE(d2,ds1);addE(d2,d3);addE(d1,d4);
  // Dark ring 2
  const d5=addN(2.5,7.5,'stat',{cost:2,stat:'ls',val:0.1,label:'吸血+10%',cat:'dark'});
  const d6=addN(0.5,7.5,'stat',{cost:2,stat:'mhp',val:20,label:'HP+20',cat:'dark'});
  const ds2=addN(1.5,9,'skill',{cost:6,skill:'darkPact',label:'Dark Pact',cat:'dark',desc:'HP半減→ATK3倍',icon:'🩸',tier:2});
  addE(ds1,d5);addE(ds1,d6);addE(d3,d5);addE(d4,d6);addE(d5,ds2);addE(d6,ds2);
  // Dark tier 3
  const d7=addN(2.5,10.5,'stat',{cost:3,stat:'ls',val:0.15,label:'吸血+15%',cat:'dark'});
  const d8=addN(0.5,10.5,'stat',{cost:3,stat:'mhp',val:30,label:'HP+30',cat:'dark'});
  const ds3=addN(1.5,12,'skill',{cost:10,skill:'soulBurst',label:'Abyss Nova',cat:'dark',desc:'HP70%消費→超火力全体',icon:'💥',tier:3});
  addE(ds2,d7);addE(ds2,d8);addE(d7,ds3);addE(d8,ds3);
  
  // ===== CROSS CONNECTIONS between adjacent clusters (via stat nodes) =====
  // Guard-Arcane bridge (top)
  const br1=addN(0,-5.5,'stat',{cost:2,stat:'mhp',val:10,label:'HP+10',cat:'guard'});
  addE(g4,br1);addE(a4,br1);
  // Swift-Dark bridge (bottom)  
  const br2=addN(0,5.5,'stat',{cost:2,stat:'reg',val:0.5,label:'再生+',cat:'dark'});
  addE(sw4,br2);addE(d4,br2);
  // Might-Arcane bridge
  const br3=addN(4,-2.5,'stat',{cost:2,stat:'atk',val:2,label:'ATK+2',cat:'might'});
  addE(m2,br3);addE(a2,br3);
  // Might-Dark bridge
  const br4=addN(4,2.5,'stat',{cost:2,stat:'atk',val:2,label:'ATK+2',cat:'might'});
  addE(m1,br4);addE(d2,br4);
  // Guard-Swift bridge (left)
  const br5=addN(-3,0,'stat',{cost:2,stat:'def',val:1,label:'DEF+1',cat:'guard'});
  addE(c5,br5);addE(g2,br5);addE(sw2,br5);
  
  // ===== ULTIMATE - deep end, requires traversing long paths =====
  // Two separate ultimate approach paths
  const u1=addN(0,14,'stat',{cost:4,stat:'atk',val:5,label:'ATK+5',cat:'ultimate'});
  const u2=addN(0,15.5,'stat',{cost:4,stat:'mhp',val:25,label:'HP+25',cat:'ultimate'});
  const ult=addN(0,17,'skill',{cost:15,skill:'transcend',label:'Transcendence',cat:'ultimate',desc:'全ステ2倍 20秒',icon:'🌟',tier:3});
  addE(sws3,u1);addE(ds3,u1);addE(u1,u2);addE(u2,ult);
  
  gN=nodes;gE=edges;
  posGrid();
}

function posGrid(){
  const S=Math.min(W*0.055,24);
  gcx=W/2;gcy=GRID_Y+GRID_H*0.35;
  for(const n of gN){n.x=gcx+n.gx*S;n.y=gcy+n.gy*S;}
}

function canUL(id){for(const[a,b]of gE){if(a===id&&gN[b].unlocked)return true;if(b===id&&gN[a].unlocked)return true;}return false;}

// Skills
const SK={
  powerStrike:{cd:300,dm:3,h:1},
  berserker:{cd:600,dm:5,h:1,aoe:1},
  ragnarok:{cd:900,dm:8,h:1,aoe:1},
  ironWall:{cd:500,bf:'inv',bd:180},
  aegis:{cd:900,bf:'inv',bd:300,heal:1},
  immortal:{cd:1200,bf:'inv',bd:600,heal:1,rboost:5},
  haste:{cd:400,bf:'hst',bd:300},
  gale:{cd:700,bf:'gal',bd:480},
  phantom:{cd:1000,bf:'phm',bd:600},
  critSlash:{cd:400,dm:1,h:3,fc:1},
  execute:{cd:700,dm:1,h:5,fc:1},
  eclipse:{cd:1000,dm:3,h:7,fc:1},
  drain:{cd:400,dm:4,h:1,hp2:0.5},
  darkPact:{cd:600,bf:'dpk',bd:600,hpc:0.5},
  soulBurst:{cd:800,dm:12,h:1,aoe:1,hpc:0.7},
  transcend:{cd:1500,bf:'trs',bd:1200},
};

const PNAMES={atk:'Greater Fortitude',def:'Iron Fortress',mhp:'Life Essence',spd:'Sensory Boost',
  cr:'Hawk Eye',cd:'Penetrate Boost',reg:'Regeneration Field',ls:'Blood Covenant',
  dg:'Paranormal Intuition',mh:'Twin Blade Mastery'};

function unlockN(n){
  if(n.unlocked||!canUL(n.id)||sp<n.cost)return false;
  n.unlocked=true;sp-=n.cost;n.applied=true;
  if(n.type==='stat'){
    if(n.stat==='mhp'){base.mhp+=n.val;st.mhp+=n.val;st.hp=Math.min(st.hp+n.val,st.mhp);}
    else if(base[n.stat]!==undefined){base[n.stat]+=n.val;st[n.stat]+=n.val;}
  } else if(n.type==='skill'){
    learned.push({...n,cd:0});sfxSkill();return true;
  }
  sfxUnlock();return true;
}

// Buffs
function updBuf(){for(const k in buffs){if(buffs[k]>0)buffs[k]--;else delete buffs[k];}}
function gSpd(){let s=st.spd;if(buffs.hst)s*=2;if(buffs.gal)s*=3;if(buffs.phm)s*=5;if(buffs.trs)s*=2;return s;}
function gAtk(){let a=st.atk;if(buffs.dpk)a*=3;if(buffs.trs)a*=2;return a;}
function gDef(){let d=st.def;if(buffs.trs)d*=2;return d;}
function gDdg(){let d=st.dg;if(buffs.gal)d=Math.min(d+0.3,0.85);if(buffs.phm)d=Math.min(d+0.8,0.95);return d;}

// ===== CASTING =====
function startCast(){
  state=ST.CAST;castQ=[];castTxts=[];castT=0;
  const ul=gN.filter(n=>n.unlocked&&n.type!=='start');
  const ps=ul.filter(n=>n.type==='stat');
  const sk=ul.filter(n=>n.type==='skill').sort((a,b)=>(a.tier||1)-(b.tier||1));
  for(const n of ps)castQ.push({name:PNAMES[n.stat]||n.label,color:CC[n.cat]||'#aaa',sk:false});
  for(const s of sk)castQ.push({name:s.label,color:CC[s.cat]||'#ffd700',sk:true,icon:s.icon});
  if(castQ.length===0)endCast();
}

function updCast(){
  castT++;
  const iv=castQ.length>15?5:castQ.length>8?7:10;
  if(castT%iv===0&&castQ.length>0){
    const s=castQ.shift();sfxCast();
    castTxts.push({...s,y:groundY-12,a:1,age:0});
  }
  for(const t of castTxts){t.age++;t.y-=0.7;t.a=t.age<12?1:Math.max(0,1-(t.age-12)/20);}
  castTxts=castTxts.filter(t=>t.a>0);
  if(castQ.length===0&&castTxts.length===0)endCast();
}

function endCast(){
  state=ST.PLAY;
  initRun();
}

// Runner
const GYR=0.78;let groundY=0;

function initRun(){
  st={...base};st.hp=st.mhp;
  alive=true;rx=0;rd=0;camX=0;
  enemies=[];parts=[];dnums=[];
  atkCd=0;fight=false;buffs={};
  atkCdMax=Math.max(15,50-st.spd*8);
  groundY=RUNNER_H*GYR;
  genBg();runs++;
  for(const s of learned)s.cd=0;
}

function genBg(){bgs=[];for(let i=0;i<60;i++)bgs.push({x:i*120+Math.random()*60,w:40+Math.random()*50,h:20+Math.random()*60,c:`hsl(${220+Math.random()*30},15%,${10+Math.random()*8}%)`});}

function spawnE(x){
  const t=Math.floor(rd/500),tp=['slime','goblin','knight','demon'][Math.min(t,3)],sc=1+t*0.25;
  let hp,ak,sz,c,em;
  switch(tp){
    case'slime':hp=10*sc;ak=3*sc;sz=10;c='#4caf50';em='🟢';break;
    case'goblin':hp=20*sc;ak=6*sc;sz=11;c='#ff9800';em='👺';break;
    case'knight':hp=45*sc;ak=9*sc;sz=13;c='#78909c';em='🛡';break;
    case'demon':hp=80*sc;ak=14*sc;sz=14;c='#e53935';em='👹';break;
  }
  enemies.push({x,y:groundY,hp,mhp:hp,ak,sz,c,em,tp,alive:true,hcd:0,fl:0});
}

function updRun(){
  if(!alive){dTimer--;if(dTimer<=0)startCast();return;}
  updBuf();
  // Auto skills
  for(const s of learned){
    if(s.cd>0){s.cd--;continue;}
    const k=SK[s.skill];if(!k)continue;
    const use=(k.h>0&&k.dm>0&&fight&&enemies.some(e=>e.alive&&Math.abs(e.x-rx)<80))||
      (k.bf==='inv'&&st.hp<st.mhp*0.4)||(k.bf==='hst'&&!buffs.hst&&!buffs.gal&&!buffs.phm)||
      (k.bf==='gal'&&!buffs.gal&&!buffs.phm)||(k.bf==='phm'&&!buffs.phm)||
      (k.bf==='trs'&&rd>300)||(k.bf==='dpk'&&fight&&st.hp>st.mhp*0.6)||
      (k.heal&&st.hp<st.mhp*0.5)||(k.hpc&&!k.bf&&st.hp>st.mhp*0.75&&fight);
    if(use){s.cd=k.cd;exeSkill(s,k);}
  }
  if(buffs.rboost)st.hp=Math.min(st.hp+5*0.016,st.mhp);
  
  const ne=enemies.find(e=>e.alive&&e.x-rx<30&&e.x-rx>-20);
  fight=!!ne;
  if(!fight){const spd=gSpd();rx+=spd;rd+=spd;if(rd>best)best=rd;}
  camX=rx-W*0.25;
  if(st.reg>0)st.hp=Math.min(st.hp+st.reg*0.016,st.mhp);
  // Spawn
  if(Math.random()<1/Math.max(150,400-rd*0.06))spawnE(rx+W*0.9+Math.random()*150);
  if(rd%350<gSpd()+0.5)spawnE(rx+W*0.8+Math.random()*80);
  // Attack
  atkCd--;
  if(atkCd<=0&&fight){
    const tg=enemies.filter(e=>e.alive&&Math.abs(e.x-rx)<50);
    if(tg.length){
      atkCd=atkCdMax;
      for(let i=0;i<Math.min(st.mh,tg.length);i++){
        const t=tg[i%tg.length];let d=gAtk()-t.ak*0.05;
        const cr=Math.random()<st.cr;if(cr)d*=st.cd;
        d=Math.max(1,Math.floor(d));hitE(t,d,cr);
      }
    }
  }
  // Enemy attack
  for(const e of enemies){
    if(!e.alive)continue;if(e.x>rx+15)e.x-=0.4;if(e.fl>0)e.fl--;
    if(Math.abs(e.x-rx)<25){
      e.hcd--;if(e.hcd<=0){e.hcd=70;
        if(buffs.inv){dnums.push({x:W*0.25,y:groundY-22,t:'NULLIFIED',c:'#64b5f6',l:25,vy:-1});}
        else if(Math.random()<gDdg()){dnums.push({x:W*0.25,y:groundY-22,t:'EVADE',c:'#81d4fa',l:25,vy:-1});}
        else{const d=Math.max(1,Math.floor(e.ak-gDef()));st.hp-=d;dnums.push({x:W*0.25,y:groundY-22,t:`-${d}`,c:'#e53935',l:25,vy:-1});}
      }
    }
  }
  if(st.hp<=0){alive=false;dTimer=70;sfxDie();
    for(let i=0;i<15;i++)parts.push({x:W*0.25,y:groundY,vx:(Math.random()-0.5)*4,vy:-Math.random()*4,c:'#e53935',l:30,s:3+Math.random()*3});}
  enemies=enemies.filter(e=>e.alive&&e.x>camX-100);
  for(const p of parts){p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.l--;}
  parts=parts.filter(p=>p.l>0);
  for(const d of dnums){d.y+=d.vy;d.l--;}
  dnums=dnums.filter(d=>d.l>0);
}

function hitE(t,d,cr){
  t.hp-=d;t.fl=8;
  if(st.ls>0)st.hp=Math.min(st.hp+d*st.ls,st.mhp);
  const ex=t.x-camX;
  dnums.push({x:ex,y:t.y-t.sz-5,t:cr?`💥${d}`:`${d}`,c:cr?'#ffeb3b':'#fff',l:30,vy:-1.2});
  sfxHit();
  if(t.hp<=0){t.alive=false;sp++;kills++;sfxKill();
    for(let j=0;j<6;j++)parts.push({x:ex,y:t.y,vx:(Math.random()-0.5)*3,vy:-Math.random()*3,c:t.c,l:20,s:3});}
}

function exeSkill(s,k){
  if(k.hpc)st.hp*=(1-k.hpc);
  if(k.bf){buffs[k.bf]=k.bd||300;}
  if(k.heal)st.hp=st.mhp;
  if(k.rboost)buffs.rboost=k.bd||600;
  if(k.h>0&&k.dm>0){
    const tg=k.aoe?enemies.filter(e=>e.alive&&e.x-rx<150&&e.x>camX):enemies.filter(e=>e.alive&&Math.abs(e.x-rx)<80);
    for(let h=0;h<k.h;h++){for(const t of tg){
      let d=gAtk()*k.dm;if(k.fc)d*=st.cd;d=Math.max(1,Math.floor(d));
      t.hp-=d;t.fl=8;if(st.ls>0)st.hp=Math.min(st.hp+d*st.ls,st.mhp);
      const ex=t.x-camX;
      dnums.push({x:ex+(Math.random()-0.5)*10,y:t.y-t.sz-8-h*10,t:`✦${d}`,c:'#ffeb3b',l:35,vy:-1.5});
      if(t.hp<=0){t.alive=false;sp++;kills++;sfxKill();
        for(let j=0;j<8;j++)parts.push({x:ex,y:t.y,vx:(Math.random()-0.5)*4,vy:-Math.random()*4,c:t.c,l:25,s:3});}
    }}
  }
  if(k.hp2){st.hp=Math.min(st.hp+gAtk()*k.dm*k.hp2,st.mhp);}
  dnums.push({x:W*0.5,y:groundY-35,t:`${s.icon||'✦'} ${s.label}`,c:'#ffd700',l:40,vy:-0.5});
  sfxSkill();
}

function drawTitle(){

  drawHUD();drawGrid_();

function drawRun(){
  ctx.save();ctx.beginPath();ctx.rect(0,0,W,RUNNER_H);ctx.clip();
  ctx.fillStyle='#0c1024';ctx.fillRect(0,0,W,RUNNER_H);
  for(const b of bgs){const sx=b.x-camX*0.3;if(sx>-b.w&&sx<W+b.w){ctx.fillStyle=b.c;ctx.fillRect(sx,groundY-b.h,b.w,b.h);}}
  ctx.fillStyle='#1a237e';ctx.fillRect(0,groundY,W,RUNNER_H-groundY);
  // Enemies
  for(const e of enemies){
    if(!e.alive)continue;const ex=e.x-camX;if(ex<-20||ex>W+20)continue;
    ctx.font=`${e.sz*1.5}px sans-serif`;ctx.textAlign='center';ctx.fillText(e.em,ex,e.y);
    if(e.fl>0){ctx.globalAlpha=0.4;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(ex,e.y-e.sz*0.5,e.sz,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;}
    if(e.hp<e.mhp){const bw=e.sz*2;ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(ex-bw/2,e.y-e.sz*1.8,bw,3);ctx.fillStyle=e.hp/e.mhp>0.5?'#4caf50':'#e53935';ctx.fillRect(ex-bw/2,e.y-e.sz*1.8,bw*(e.hp/e.mhp),3);}
  }
  // Player
  const px=W*0.25;
  if(alive){
    const t=Date.now()*0.008,by=fight?0:Math.sin(t*2)*2;
    if(buffs.trs){ctx.beginPath();ctx.arc(px,groundY-10+by,16,0,Math.PI*2);ctx.fillStyle='rgba(255,215,0,0.15)';ctx.fill();}
    if(buffs.inv){ctx.beginPath();ctx.arc(px,groundY-10+by,14,0,Math.PI*2);ctx.strokeStyle='rgba(100,181,246,0.6)';ctx.lineWidth=2;ctx.stroke();}
    if(buffs.phm){ctx.globalAlpha=0.2;ctx.fillStyle='#81d4fa';ctx.fillRect(px-12,groundY-14+by,8,12);ctx.fillRect(px-20,groundY-14+by,8,12);ctx.globalAlpha=1;}
    ctx.fillStyle=buffs.trs?'#ffd700':buffs.dpk?'#e53935':(buffs.hst||buffs.gal||buffs.phm)?'#81d4fa':'#64b5f6';
    ctx.fillRect(px-4,groundY-14+by,8,12);ctx.fillStyle='#e0e0e0';ctx.beginPath();ctx.arc(px,groundY-18+by,5,0,Math.PI*2);ctx.fill();
    if(atkCd>atkCdMax-10){const sw=(atkCdMax-atkCd)/10*Math.PI;ctx.strokeStyle='#fff176';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(px+5,groundY-10+by);ctx.lineTo(px+5+Math.cos(sw-0.5)*15,groundY-10+by-Math.sin(sw-0.5)*12);ctx.stroke();}
    const hp=st.hp/st.mhp;ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(px-15,groundY-28,30,4);ctx.fillStyle=hp>0.5?'#4caf50':hp>0.25?'#ff9800':'#e53935';ctx.fillRect(px-15,groundY-28,30*hp,4);
  } else {ctx.globalAlpha=dTimer/70;ctx.font='16px sans-serif';ctx.textAlign='center';ctx.fillText('💀',px,groundY-8);ctx.globalAlpha=1;}
  for(const p of parts){ctx.globalAlpha=p.l/30;ctx.fillStyle=p.c;ctx.fillRect(p.x-p.s/2,p.y-p.s/2,p.s,p.s);}ctx.globalAlpha=1;
  for(const d of dnums){ctx.globalAlpha=Math.min(1,d.l/20);ctx.fillStyle=d.c;ctx.font='bold 11px sans-serif';ctx.textAlign='center';ctx.fillText(d.t,d.x,d.y);}ctx.globalAlpha=1;
  ctx.fillStyle='rgba(255,255,255,0.4)';ctx.font='10px sans-serif';ctx.textAlign='right';ctx.fillText(`${Math.floor(rd)}m`,W-5,12);
  ctx.restore();
}

function drawHUD(){
  const y=RUNNER_H;ctx.fillStyle='rgba(10,15,30,0.95)';ctx.fillRect(0,y,W,HUD_H);
  ctx.fillStyle='rgba(100,181,246,0.15)';ctx.fillRect(0,y+HUD_H-1,W,1);
  ctx.font='bold 12px sans-serif';ctx.textAlign='left';
  ctx.fillStyle='#fff176';ctx.fillText(`SP:${sp}`,8,y+22);
  ctx.fillStyle='#9e9e9e';ctx.fillText(`Run#${runs}`,70,y+22);
  ctx.fillStyle='#64b5f6';ctx.fillText(`Kill:${kills}`,140,y+22);
  ctx.textAlign='right';ctx.fillStyle='#e0e0e0';ctx.fillText(`Best:${Math.floor(best)}m`,W-8,y+22);
}

const CC={might:'#e53935',guard:'#42a5f5',swift:'#66bb6a',arcane:'#ffeb3b',dark:'#ab47bc',ultimate:'#ffd700'};

function drawGrid_(){
  const y=GRID_Y;ctx.save();ctx.beginPath();ctx.rect(0,y,W,GRID_H);ctx.clip();
  ctx.fillStyle='#080810';ctx.fillRect(0,y,W,GRID_H);
  const ox=gs.x,oy=gs.y,tm=Date.now()*0.001;
  // Edges
  for(const[a,b]of gE){
    const na=gN[a],nb=gN[b];ctx.beginPath();ctx.moveTo(na.x+ox,na.y+oy);ctx.lineTo(nb.x+ox,nb.y+oy);
    if(na.unlocked&&nb.unlocked){ctx.strokeStyle='rgba(100,181,246,0.35)';ctx.lineWidth=2.5;ctx.shadowColor='#42a5f5';ctx.shadowBlur=4;}
    else{ctx.strokeStyle='rgba(60,60,80,0.2)';ctx.lineWidth=1;ctx.shadowBlur=0;}
    ctx.stroke();ctx.shadowBlur=0;
  }
  // Nodes
  for(const n of gN){
    const nx=n.x+ox,ny=n.y+oy;
    if(ny<y-40||ny>y+GRID_H+40||nx<-40||nx>W+40)continue;
    const isSk=n.type==='skill',r=isSk?(n.tier>=3?20:n.tier>=2?17:15):11;
    const sel=selN===n.id,can=!n.unlocked&&canUL(n.id),cc=CC[n.cat]||'#aaa';
    if(n.type==='start'){
      ctx.beginPath();ctx.arc(nx,ny,14,0,Math.PI*2);ctx.fillStyle='#42a5f5';ctx.shadowColor='#42a5f5';ctx.shadowBlur=10;ctx.fill();ctx.shadowBlur=0;
      ctx.fillStyle='#fff';ctx.font='bold 8px sans-serif';ctx.textAlign='center';ctx.fillText('START',nx,ny+3);
    } else if(isSk){
      const p=Math.sin(tm*2.5+n.id)*0.2+0.8;
      ctx.beginPath();ctx.arc(nx,ny,r+4,0,Math.PI*2);ctx.strokeStyle=n.unlocked?cc+'88':cc+'44';ctx.lineWidth=1.5;ctx.stroke();
      ctx.beginPath();ctx.arc(nx,ny,r,0,Math.PI*2);ctx.shadowColor=cc;ctx.shadowBlur=n.unlocked?18:(can?10:4);
      ctx.fillStyle=n.unlocked?cc:`rgba(45,45,70,${0.8*p})`;ctx.fill();ctx.shadowBlur=0;
      ctx.strokeStyle=sel?'#fff':(n.unlocked?'rgba(255,255,255,0.35)':cc+'55');ctx.lineWidth=sel?3:1.5;ctx.stroke();
      ctx.globalAlpha=n.unlocked?1:(can?0.65:0.35);ctx.font=`${r*0.8}px sans-serif`;ctx.textAlign='center';ctx.fillText(n.icon,nx,ny+r*0.3);ctx.globalAlpha=1;
      ctx.font='bold 7px sans-serif';ctx.fillStyle=n.unlocked?'#fff':cc+(can?'bb':'55');ctx.fillText(n.label,nx,ny+r+10);
      if(n.tier>=2){ctx.font='6px sans-serif';ctx.fillStyle=n.unlocked?'#ffd700':cc+'44';ctx.fillText('★'.repeat(n.tier),nx,ny-r-2);}
      if(!n.unlocked&&can){ctx.fillStyle=sp>=n.cost?'#fff176':'#e57373';ctx.font='bold 8px sans-serif';ctx.fillText(`${n.cost}SP`,nx,ny+r+19);}
    } else if(n.unlocked){
      ctx.beginPath();ctx.arc(nx,ny,r,0,Math.PI*2);ctx.fillStyle=cc;ctx.shadowColor=cc;ctx.shadowBlur=sel?10:4;ctx.fill();ctx.shadowBlur=0;
      ctx.strokeStyle=sel?'#fff':'rgba(255,255,255,0.2)';ctx.lineWidth=sel?2:0.8;ctx.stroke();
      ctx.fillStyle='#fff';ctx.font='bold 6px sans-serif';ctx.textAlign='center';ctx.fillText(n.label,nx,ny+2);
    } else {
      ctx.beginPath();ctx.arc(nx,ny,r,0,Math.PI*2);ctx.fillStyle=can?'rgba(55,55,85,0.7)':'rgba(30,30,50,0.45)';ctx.fill();
      ctx.strokeStyle=sel?(sp>=n.cost?'#fff176':'#ff9800'):(can?'rgba(140,140,170,0.35)':'rgba(55,55,70,0.2)');ctx.lineWidth=sel?2:0.8;ctx.stroke();
      ctx.fillStyle=can?'rgba(200,200,220,0.6)':'rgba(110,110,130,0.25)';ctx.font='bold 6px sans-serif';ctx.textAlign='center';ctx.fillText(n.label,nx,ny+2);
      if(can){ctx.fillStyle=sp>=n.cost?'#fff176':'#e57373';ctx.font='7px sans-serif';ctx.fillText(`${n.cost}SP`,nx,ny+r+9);}
    }
  }
  // Info popup
  if(selN!==null){
    const n=gN[selN];
    if(!n.unlocked&&canUL(n.id)){
      const iS=n.type==='skill',pw=iS?180:130,ph=iS?50:35;
      const px_=Math.max(8,Math.min(W-pw-8,n.x+ox-pw/2));
      const py_=Math.min(y+GRID_H-ph-8,Math.max(y+4,n.y+oy+(iS?30:20)));
      ctx.fillStyle='rgba(10,10,28,0.95)';rr(ctx,px_,py_,pw,ph,6);ctx.fill();
      ctx.strokeStyle=(CC[n.cat]||'#64b5f6')+'44';ctx.lineWidth=1;rr(ctx,px_,py_,pw,ph,6);ctx.stroke();
      ctx.fillStyle='#e0e0e0';ctx.font='bold 10px sans-serif';ctx.textAlign='left';
      ctx.fillText(`${iS?n.icon+' ':''}${n.label}`,px_+6,py_+13);
      if(iS&&n.desc){ctx.font='9px sans-serif';ctx.fillStyle='#9e9e9e';ctx.fillText(n.desc,px_+6,py_+26);}
      if(sp>=n.cost){ctx.fillStyle='rgba(76,175,80,0.85)';rr(ctx,px_+pw-52,py_+ph-24,45,20,4);ctx.fill();ctx.fillStyle='#fff';ctx.font='bold 9px sans-serif';ctx.textAlign='center';ctx.fillText('解放',px_+pw-30,py_+ph-10);}
      else{ctx.fillStyle='#e57373';ctx.font='9px sans-serif';ctx.textAlign='right';ctx.fillText(`${n.cost}SP要`,px_+pw-6,py_+ph-10);}
    }
  }
  ctx.restore();
  // Stats bar
  const bh=24,by_=H-bh;ctx.fillStyle='rgba(10,15,30,0.92)';ctx.fillRect(0,by_,W,bh);
  ctx.font='9px sans-serif';ctx.textAlign='left';
  ctx.fillStyle='#e57373';ctx.fillText(`ATK${Math.floor(gAtk())}`,4,by_+15);
  ctx.fillStyle='#64b5f6';ctx.fillText(`DEF${gDef()}`,48,by_+15);
  ctx.fillStyle='#66bb6a';ctx.fillText(`SPD${gSpd().toFixed(1)}`,92,by_+15);
  ctx.fillStyle='#ffeb3b';ctx.fillText(`CRT${Math.floor(st.cr*100)}%`,145,by_+15);
  let sx=195;for(const s of learned){ctx.globalAlpha=s.cd>0?0.3:1;ctx.font='10px sans-serif';ctx.fillText(s.icon||'✦',sx,by_+15);ctx.globalAlpha=1;sx+=14;}
  ctx.textAlign='right';ctx.fillStyle='#4caf50';ctx.fillText(`HP${Math.floor(st.hp)}/${st.mhp}`,W-4,by_+15);
}

function rr(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();}

// Input
function getP(e){const r=C.getBoundingClientRect();const t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top};}
let ts=0,tm_=false;
C.addEventListener('touchstart',e=>{e.preventDefault();if(ac.state==='suspended')ac.resume();const p=getP(e);ts=Date.now();tm_=false;if(state===ST.TITLE)return;if(p.y>GRID_Y){gs.drag=true;gs.sx=p.x;gs.sy=p.y;gs.ox=gs.x;gs.oy=gs.y;}},{passive:false});
C.addEventListener('touchmove',e=>{e.preventDefault();const p=getP(e);if(gs.drag){const dx=p.x-gs.sx,dy=p.y-gs.sy;if(Math.abs(dx)>5||Math.abs(dy)>5)tm_=true;gs.x=gs.ox+dx;gs.y=gs.oy+dy;}},{passive:false});
C.addEventListener('touchend',e=>{e.preventDefault();gs.drag=false;if(state===ST.TITLE){startG();return;}if(!tm_&&Date.now()-ts<300){const r=C.getBoundingClientRect();if(e.changedTouches&&e.changedTouches[0]){const p={x:e.changedTouches[0].clientX-r.left,y:e.changedTouches[0].clientY-r.top};if(p.y>GRID_Y)gridTap(p);}}},{passive:false});
C.addEventListener('click',e=>{const p=getP(e);if(state===ST.TITLE){startG();return;}if(p.y>GRID_Y)gridTap(p);});

function startG(){state=ST.PLAY;buildGrid();resize();initRun();}

function gridTap(pos){
  const ox=gs.x,oy=gs.y;
  if(selN!==null){
    const n=gN[selN];
    if(!n.unlocked&&canUL(n.id)&&sp>=n.cost){
      const iS=n.type==='skill',pw=iS?180:130,ph=iS?50:35;
      const px_=Math.max(8,Math.min(W-pw-8,n.x+ox-pw/2));
      const py_=Math.min(GRID_Y+GRID_H-ph-8,Math.max(GRID_Y+4,n.y+oy+(iS?30:20)));
      if(pos.x>px_+pw-52&&pos.x<px_+pw-7&&pos.y>py_+ph-24&&pos.y<py_+ph-4){unlockN(n);return;}
    }
  }
  for(const n of gN){
    const nx=n.x+ox,ny=n.y+oy;
    if(Math.hypot(pos.x-nx,pos.y-ny)<(n.type==='skill'?24:18)){
      if(selN===n.id){if(!n.unlocked&&canUL(n.id)&&sp>=n.cost)unlockN(n);selN=null;}
      else selN=n.id;return;
    }
  }
  selN=null;
}

// Loop
function loop(){
  if(state===ST.TITLE)drawTitle();
  else if(state===ST.CAST){updCast();drawCast();}
  else{updRun();drawRun();drawHUD();drawGrid_();}
  requestAnimationFrame(loop);
}
resize();loop();
</script>
