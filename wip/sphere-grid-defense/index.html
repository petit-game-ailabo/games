<canvas id="c"></canvas>

'use strict';
const C=document.getElementById('c');
const ctx=C.getContext('2d');
let W,H,dpr;

function resize(){
  dpr=Math.min(window.devicePixelRatio||1,3);
  W=window.innerWidth;H=window.innerHeight;
  C.width=W*dpr;C.height=H*dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
  RUNNER_H=Math.floor(H*0.18);
  GRID_Y=RUNNER_H+HUD_H;
  GRID_H=H-GRID_Y;
  if(gridNodes.length) positionGridNodes();
}

let RUNNER_H=0;
const HUD_H=36;
let GRID_Y=0,GRID_H=0;

// ===== AUDIO =====
const actx=new(window.AudioContext||window.webkitAudioContext)();
function playTone(freq,dur,vol=0.3,type='sine'){
  const o=actx.createOscillator(),g=actx.createGain();
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+dur);
  o.connect(g);g.connect(actx.destination);
  o.start();o.stop(actx.currentTime+dur);
}
function sfxHit(){playTone(300,0.08,0.2,'square');}
function sfxDeath(){playTone(180,0.3,0.3,'sawtooth');setTimeout(()=>playTone(120,0.4,0.3,'sawtooth'),200);}
function sfxUnlock(){playTone(523,0.15,0.3,'triangle');setTimeout(()=>playTone(659,0.12,0.3,'triangle'),100);}
function sfxKill(){playTone(440,0.1,0.2,'triangle');}
function sfxCast(){playTone(660+Math.random()*200,0.12,0.25,'sine');}
function sfxSkill(){playTone(784,0.2,0.4,'sine');setTimeout(()=>playTone(988,0.15,0.35,'sine'),120);}

// ===== STATE =====

// ===== SPHERE GRID - FF10 STYLE =====

    [10,11],[11,12],[12,13],[12,14],[13,14],[14,15],[15,16],[16,17],

    [18,19],[19,20],[20,21],[20,22],[21,22],[22,23],[23,24],[24,25],
    // ARCANE
    [26,27],[27,28],[28,29],[29,30],[30,31],[31,32],[32,33],
    // DARK
    [34,35],[35,36],[36,37],[37,38],[38,39],[39,40],[40,41],
    // Cross connectors
    [10,42],[26,42],[42,12],[42,28],

  positionGridNodes();

function positionGridNodes(){
  const spacing=Math.min(W*0.09,36);
  gridCenterX=W/2;
  gridCenterY=GRID_Y+GRID_H*0.32;
  for(const n of gridNodes) {n.x=gridCenterX+n.gx*spacing;n.y=gridCenterY+n.gy*spacing;}
}

function canUnlock(id){
  for(const[a,b]of gridEdges){
    if(a===id&&gridNodes[b].unlocked) return true;
    if(b===id&&gridNodes[a].unlocked) return true;
  }
  return false;
}

// ===== SKILL DEFINITIONS =====
const SKILLS={
  powerStrike:{cd:300,dmgMult:3,hits:1,effect:'slash',castName:'Brave Strike'},
  berserker:{cd:600,dmgMult:5,hits:1,effect:'explode',aoe:true,castName:'Draconic Fury'},
  ragnarok:{cd:900,dmgMult:8,hits:1,effect:'ragnarok',aoe:true,castName:'Ragnarök'},
  ironWall:{cd:500,buff:'invuln',buffDur:180,castName:'Infinity Wall'},
  aegis:{cd:900,buff:'invuln',buffDur:300,heal:true,castName:'Radiant Aegis'},
  immortal:{cd:1200,buff:'invuln',buffDur:600,heal:true,regenBoost:5,castName:'Immortal Bastion'},
  haste:{cd:400,buff:'haste',buffDur:300,castName:'Haste'},
  gale:{cd:700,buff:'gale',buffDur:480,castName:'Gale Force'},
  phantom:{cd:1000,buff:'phantom',buffDur:600,castName:'Phantom Shift'},
  critSlash:{cd:400,dmgMult:1,hits:3,forceCrit:true,castName:'Void Slash'},
  execute:{cd:700,dmgMult:1,hits:5,forceCrit:true,castName:'Executioner'},
  eclipse:{cd:1000,dmgMult:3,hits:7,forceCrit:true,castName:'Eclipse Zero'},
  drain:{cd:400,dmgMult:4,hits:1,healPct:0.5,castName:'Soul Drain'},
  darkPact:{cd:600,buff:'darkPact',buffDur:600,hpCost:0.5,castName:'Dark Pact'},
  soulBurst:{cd:800,dmgMult:12,hits:1,aoe:true,hpCost:0.7,castName:'Abyss Nova'},
  transcend:{cd:1500,buff:'transcend',buffDur:1200,castName:'Transcendence'},
};

// Passive buff names for casting animation (applied from stat nodes)
const PASSIVE_CAST_NAMES={
  atk:'Greater Fortitude',
  def:'Iron Fortress',
  maxHp:'Life Essence',
  spd:'Sensory Boost',
  critRate:'Hawk Eye',
  critDmg:'Penetrate Boost',
  regen:'Regeneration Field',
  lifeSteal:'Blood Covenant',
  dodge:'Paranormal Intuition',
  multiHit:'Twin Blade Mastery',
};

function unlockNode(node){
  if(node.unlocked||!canUnlock(node.id)||sp<node.cost) return false;
  node.unlocked=true;sp-=node.cost;node.applied=true;
  applyNodeEffect(node);
  if(node.type==='skill'){
    learnedSkills.push({...node,cd:0});
    sfxSkill();
  } else sfxUnlock();
  return true;
}

function applyNodeEffect(node){
  if(node.type==='start') return;
  if(node.type==='stat'){
    if(node.stat==='maxHp'){baseStats.maxHp+=node.val;stats.maxHp+=node.val;stats.hp=Math.min(stats.hp+node.val,stats.maxHp);}
    else if(baseStats[node.stat]!==undefined){baseStats[node.stat]+=node.val;stats[node.stat]+=node.val;}
  }
}

// ===== CASTING SEQUENCE =====
function startCasting(){
  state=STATE.CASTING;
  castQueue=[];castTexts=[];castTimer=0;

  // Gather all unlocked nodes for casting
  const unlocked=gridNodes.filter(n=>n.unlocked&&n.type!=='start');
  
  // Sort: stat nodes first (passives), then skills by tier
  const passives=unlocked.filter(n=>n.type==='stat');
  const skills=unlocked.filter(n=>n.type==='skill').sort((a,b)=>(a.tier||1)-(b.tier||1));

  // Build cast queue
  for(const n of passives){
    const name=PASSIVE_CAST_NAMES[n.stat]||n.label;
    castQueue.push({name,color:CAT_COLORS[n.cat]||'#aaa',isSkill:false});
  }
  for(const s of skills){
    castQueue.push({name:s.label,color:CAT_COLORS[s.cat]||'#ffd700',isSkill:true,icon:s.icon});
  }

  if(castQueue.length===0){
    // No buffs to cast, just start
    finishCasting();
  }
}

function updateCasting(){
  castTimer++;
  const interval=castQueue.length>15?6:castQueue.length>8?8:12;
  
  if(castTimer%interval===0 && castQueue.length>0){
    const spell=castQueue.shift();
    sfxCast();
    castTexts.push({...spell,y:groundY-15,alpha:1,scale:1,age:0});
  }
  
  for(const t of castTexts){
    t.age++;t.y-=0.8;
    t.alpha=t.age<15?1:Math.max(0,1-(t.age-15)/25);
    t.scale=t.age<5?0.5+t.age*0.1:1;
  }
  castTexts=castTexts.filter(t=>t.alpha>0);
  
  if(castQueue.length===0 && castTexts.length===0){
    finishCasting();
  }
}

function finishCasting(){
  state=STATE.PLAY;
  // Reset skill cooldowns
  for(const s of learnedSkills) s.cd=0;
}

// ===== BUFFS =====
function updateBuffs(){
  for(const k in activeBuffs){
    if(activeBuffs[k]>0) activeBuffs[k]--;
    else delete activeBuffs[k];
  }
}

function getSpd(){let s=stats.spd;if(activeBuffs.haste)s*=2;if(activeBuffs.gale)s*=3;if(activeBuffs.phantom)s*=5;if(activeBuffs.transcend)s*=2;return s;}
function getAtk(){let a=stats.atk;if(activeBuffs.darkPact)a*=3;if(activeBuffs.transcend)a*=2;return a;}
function getDef(){let d=stats.def;if(activeBuffs.transcend)d*=2;return d;}
function getDodge(){let d=stats.dodge;if(activeBuffs.gale)d=Math.min(d+0.3,0.85);if(activeBuffs.phantom)d=Math.min(d+0.8,0.95);return d;}

// ===== RUNNER =====
const GROUND_Y_RATIO=0.78;
let groundY=0;

function initRun(){
  // Reset runtime stats to base
  stats={...baseStats};
  stats.hp=stats.maxHp;
  runAlive=true;runX=0;runDist=0;camX=0;
  runEnemies=[];runParticles=[];runDmgNums=[];
  attackCooldown=0;fighting=false;
  activeBuffs={};
  attackCooldownMax=Math.max(15,50-stats.spd*8);
  groundY=RUNNER_H*GROUND_Y_RATIO;
  genBuildings();
  totalRuns++;
}

function genBuildings(){
  bgBuildings=[];
  for(let i=0;i<60;i++){
    bgBuildings.push({x:i*120+Math.random()*60,w:40+Math.random()*50,
      h:20+Math.random()*60,color:`hsl(${220+Math.random()*30},15%,${10+Math.random()*8}%)`});
  }
}

function spawnRunEnemy(x){
  const tier=Math.floor(runDist/500);
  const types=['slime','goblin','knight','demon'];
  const type=types[Math.min(tier,3)];
  const scale=1+tier*0.25;
  let hp,atk,size,color,emoji;
  switch(type){
    case'slime':hp=10*scale;atk=3*scale;size=10;color='#4caf50';emoji='🟢';break;
    case'goblin':hp=20*scale;atk=6*scale;size=11;color='#ff9800';emoji='👺';break;
    case'knight':hp=45*scale;atk=9*scale;size=13;color='#78909c';emoji='🛡';break;
    case'demon':hp=80*scale;atk=14*scale;size=14;color='#e53935';emoji='👹';break;
  }
  runEnemies.push({x,y:groundY,hp,maxHp:hp,atk,size,color,emoji,type,alive:true,hitCd:0,flash:0});
}

function updateRunner(){
  if(!runAlive){
    runDeathTimer--;
    if(runDeathTimer<=0) startCasting();
    return;
  }
  updateBuffs();

  // Auto-use skills
  for(const s of learnedSkills){
    if(s.cd>0){s.cd--;continue;}
    const sk=SKILLS[s.skill];if(!sk)continue;
    const shouldUse=
      (sk.dmgMult>0&&sk.hits>0&&fighting&&runEnemies.some(e=>e.alive&&Math.abs(e.x-runX)<80))||
      (sk.buff==='invuln'&&stats.hp<stats.maxHp*0.4)||
      (sk.buff==='haste'&&!activeBuffs.haste&&!activeBuffs.gale&&!activeBuffs.phantom)||
      (sk.buff==='gale'&&!activeBuffs.gale&&!activeBuffs.phantom)||
      (sk.buff==='phantom'&&!activeBuffs.phantom)||
      (sk.buff==='transcend'&&runDist>300)||
      (sk.buff==='darkPact'&&fighting&&stats.hp>stats.maxHp*0.6)||
      (sk.heal&&stats.hp<stats.maxHp*0.5)||
      (sk.hpCost&&!sk.buff&&stats.hp>stats.maxHp*0.75&&fighting);
    if(shouldUse){s.cd=sk.cd;executeSkill(s,sk);}
  }

  // Extra regen from immortal buff
  if(activeBuffs.immortal_regen){
    stats.hp=Math.min(stats.hp+5*0.016,stats.maxHp);
  }

  const nearEnemy=runEnemies.find(e=>e.alive&&e.x-runX<30&&e.x-runX>-20);
  fighting=!!nearEnemy;

  if(!fighting){
    const spd=getSpd();runX+=spd;runDist+=spd;
    if(runDist>bestDist)bestDist=runDist;
  }
  camX=runX-W*0.25;

  if(stats.regen>0) stats.hp=Math.min(stats.hp+stats.regen*0.016,stats.maxHp);

  // Spawn enemies - low frequency
  if(Math.random()<1/Math.max(150,400-runDist*0.06)){
    spawnRunEnemy(runX+W*0.9+Math.random()*150);
  }
  if(runDist%350<getSpd()+0.5){
    spawnRunEnemy(runX+W*0.8+Math.random()*80);
  }

  // Player attack
  attackCooldown--;
  if(attackCooldown<=0&&fighting){
    const targets=runEnemies.filter(e=>e.alive&&Math.abs(e.x-runX)<50);
    if(targets.length){
      attackCooldown=attackCooldownMax;
      const hits=Math.min(stats.multiHit,targets.length);
      for(let i=0;i<hits;i++){
        const t=targets[i%targets.length];
        let dmg=getAtk()-t.atk*0.05;
        const crit=Math.random()<stats.critRate;
        if(crit)dmg*=stats.critDmg;
        dmg=Math.max(1,Math.floor(dmg));
        hitEnemy(t,dmg,crit);
      }
    }
  }

  // Enemy attack
  for(const e of runEnemies){
    if(!e.alive)continue;
    if(e.x>runX+15)e.x-=0.4;
    if(e.flash>0)e.flash--;
    if(Math.abs(e.x-runX)<25){
      e.hitCd--;
      if(e.hitCd<=0){
        e.hitCd=70;
        if(activeBuffs.invuln){
          runDmgNums.push({x:W*0.25,y:groundY-22,text:'NULLIFIED',color:'#64b5f6',life:25,vy:-1});
        } else if(Math.random()<getDodge()){
          runDmgNums.push({x:W*0.25,y:groundY-22,text:'EVADE',color:'#81d4fa',life:25,vy:-1});
        } else {
          const dmg=Math.max(1,Math.floor(e.atk-getDef()));
          stats.hp-=dmg;
          runDmgNums.push({x:W*0.25,y:groundY-22,text:`-${dmg}`,color:'#e53935',life:25,vy:-1});
        }
      }
    }
  }

  if(stats.hp<=0){
    runAlive=false;runDeathTimer=70;sfxDeath();
    for(let i=0;i<15;i++) runParticles.push({x:W*0.25,y:groundY,vx:(Math.random()-0.5)*4,vy:-Math.random()*4,color:'#e53935',life:30,size:3+Math.random()*3});
  }

  runEnemies=runEnemies.filter(e=>e.alive&&e.x>camX-100);
  for(const p of runParticles){p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life--;}
  runParticles=runParticles.filter(p=>p.life>0);
  for(const d of runDmgNums){d.y+=d.vy;d.life--;}
  runDmgNums=runDmgNums.filter(d=>d.life>0);
}

function hitEnemy(t,dmg,crit){
  t.hp-=dmg;t.flash=8;
  if(stats.lifeSteal>0) stats.hp=Math.min(stats.hp+dmg*stats.lifeSteal,stats.maxHp);
  const ex=t.x-camX;
  runDmgNums.push({x:ex,y:t.y-t.size-5,text:crit?`💥${dmg}`:`${dmg}`,color:crit?'#ffeb3b':'#fff',life:30,vy:-1.2});
  sfxHit();
  if(t.hp<=0){
    t.alive=false;sp++;totalKills++;sfxKill();
    for(let j=0;j<6;j++) runParticles.push({x:ex,y:t.y,vx:(Math.random()-0.5)*3,vy:-Math.random()*3,color:t.color,life:20,size:3});
  }
}

function executeSkill(s,sk){
  if(sk.hpCost) stats.hp*=(1-sk.hpCost);
  if(sk.buff){activeBuffs[sk.buff]=sk.buffDur||300;}
  if(sk.heal) stats.hp=stats.maxHp;
  if(sk.regenBoost) activeBuffs.immortal_regen=sk.buffDur||600;
  if(sk.hits>0&&sk.dmgMult>0){
    const targets=sk.aoe?runEnemies.filter(e=>e.alive&&e.x-runX<150&&e.x>camX):
      runEnemies.filter(e=>e.alive&&Math.abs(e.x-runX)<80);
    for(let h=0;h<sk.hits;h++){
      for(const t of targets){
        let dmg=getAtk()*sk.dmgMult;
        if(sk.forceCrit) dmg*=stats.critDmg;
        dmg=Math.max(1,Math.floor(dmg));
        t.hp-=dmg;t.flash=8;
        if(stats.lifeSteal>0) stats.hp=Math.min(stats.hp+dmg*stats.lifeSteal,stats.maxHp);
        const ex=t.x-camX;
        runDmgNums.push({x:ex+(Math.random()-0.5)*10,y:t.y-t.size-8-h*10,text:`✦${dmg}`,color:'#ffeb3b',life:35,vy:-1.5});
        if(t.hp<=0){t.alive=false;sp++;totalKills++;sfxKill();
          for(let j=0;j<8;j++) runParticles.push({x:ex,y:t.y,vx:(Math.random()-0.5)*4,vy:-Math.random()*4,color:t.color,life:25,size:3});}
      }
    }
  }
  if(sk.healPct){
    const heal=getAtk()*sk.dmgMult*(sk.healPct||0.5);
    stats.hp=Math.min(stats.hp+heal,stats.maxHp);
  }
  // Skill cast text in runner
  runDmgNums.push({x:W*0.5,y:groundY-35,text:`${s.icon||'✦'} ${s.label}`,color:'#ffd700',life:40,vy:-0.5});
  sfxSkill();
}

// ===== DRAW =====
function drawTitle(){
  ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,W,H);
  const t=Date.now()*0.001;
  for(let i=0;i<20;i++){
    const a=i/20*Math.PI*2+t*0.2,r=60+Math.sin(t*0.5+i*0.7)*25;
    const nx=W/2+Math.cos(a)*r,ny=H*0.38+Math.sin(a)*r*0.7;
    ctx.beginPath();ctx.arc(nx,ny,5,0,Math.PI*2);
    ctx.fillStyle=`hsla(${i*18},60%,55%,0.5)`;ctx.fill();
  }
  ctx.fillStyle='#e0e0e0';ctx.font='bold 26px sans-serif';ctx.textAlign='center';
  ctx.fillText('Sphere Grid',W/2,H*0.56);
  ctx.fillText('Rogue',W/2,H*0.62);
  ctx.font='13px sans-serif';ctx.fillStyle='#9e9e9e';
  ctx.fillText('死んで覚えて、盤で育てる',W/2,H*0.68);
  ctx.fillStyle='rgba(63,81,181,0.8)';
  roundRect(ctx,W/2-80,H*0.75,160,44,8);ctx.fill();
  ctx.fillStyle='#fff';ctx.font='bold 18px sans-serif';
  ctx.fillText('START',W/2,H*0.75+28);
}

function drawCasting(){
  // Draw runner background (dark, stationary)
  ctx.fillStyle='#0c1024';ctx.fillRect(0,0,W,RUNNER_H);
  const skyGrd=ctx.createLinearGradient(0,0,0,groundY);
  skyGrd.addColorStop(0,'#0a0a20');skyGrd.addColorStop(1,'#141430');
  ctx.fillStyle=skyGrd;ctx.fillRect(0,0,W,groundY);
  ctx.fillStyle='#1a237e';ctx.fillRect(0,groundY,W,RUNNER_H-groundY);

  // Character with growing aura
  const px=W*0.25;
  const auraR=12+castTexts.length*1.5;
  const t=Date.now()*0.005;
  ctx.beginPath();ctx.arc(px,groundY-10,auraR,0,Math.PI*2);
  ctx.fillStyle=`rgba(100,181,246,${0.05+castTexts.length*0.01})`;ctx.fill();
  ctx.strokeStyle=`rgba(100,181,246,${0.2+Math.sin(t)*0.1})`;ctx.lineWidth=1.5;ctx.stroke();

  // Character
  ctx.fillStyle='#64b5f6';ctx.fillRect(px-4,groundY-14,8,12);
  ctx.fillStyle='#e0e0e0';ctx.beginPath();ctx.arc(px,groundY-18,5,0,Math.PI*2);ctx.fill();

  // Floating cast texts
  for(const ct of castTexts){
    ctx.globalAlpha=ct.alpha;
    ctx.font=ct.isSkill?'bold 11px sans-serif':'10px sans-serif';
    ctx.textAlign='center';
    ctx.fillStyle=ct.isSkill?'#ffd700':ct.color;
    const prefix=ct.isSkill?`${ct.icon} `:'';
    ctx.fillText(`${prefix}${ct.name}`,px+40,ct.y);
    // Glow line to character
    ctx.strokeStyle=ct.color+'44';ctx.lineWidth=0.5;
    ctx.beginPath();ctx.moveTo(px+10,groundY-10);ctx.lineTo(px+25,ct.y-3);ctx.stroke();
  }
  ctx.globalAlpha=1;

  // "Casting..." text
  if(castQueue.length>0){
    ctx.fillStyle='rgba(200,200,255,0.6)';ctx.font='10px sans-serif';ctx.textAlign='center';
    ctx.fillText(`Enchanting... (${castQueue.length})`,W/2,RUNNER_H-4);
  }

  drawHUD();
  drawSphereGrid();
}

function drawRunner(){
  ctx.save();
  ctx.beginPath();ctx.rect(0,0,W,RUNNER_H);ctx.clip();
  ctx.fillStyle='#0c1024';ctx.fillRect(0,0,W,RUNNER_H);
  const skyGrd=ctx.createLinearGradient(0,0,0,groundY);
  skyGrd.addColorStop(0,'#0a0a20');skyGrd.addColorStop(1,'#141430');
  ctx.fillStyle=skyGrd;ctx.fillRect(0,0,W,groundY);
  for(const b of bgBuildings){
    const sx=b.x-camX*0.3;
    if(sx>-b.w&&sx<W+b.w){
      ctx.fillStyle=b.color;ctx.fillRect(sx,groundY-b.h,b.w,b.h);
      ctx.fillStyle='rgba(255,200,100,0.15)';
      for(let wy=groundY-b.h+4;wy<groundY-4;wy+=8)
        for(let wx=sx+4;wx<sx+b.w-4;wx+=8) ctx.fillRect(wx,wy,3,3);
    }
  }
  ctx.fillStyle='#1a237e';ctx.fillRect(0,groundY,W,RUNNER_H-groundY);
  ctx.fillStyle='rgba(255,255,255,0.05)';ctx.fillRect(0,groundY,W,1);

  // Enemies
  for(const e of runEnemies){
    if(!e.alive)continue;
    const ex=e.x-camX;
    if(ex<-20||ex>W+20)continue;
    // Fix: no globalAlpha changes for flash, use color tint instead
    ctx.font=`${e.size*1.5}px sans-serif`;ctx.textAlign='center';
    ctx.fillText(e.emoji,ex,e.y);
    // White overlay flash
    if(e.flash>0){
      ctx.globalAlpha=0.4;ctx.fillStyle='#fff';
      ctx.beginPath();ctx.arc(ex,e.y-e.size*0.5,e.size,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=1;
    }
    if(e.hp<e.maxHp){
      const bw=e.size*2;
      ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(ex-bw/2,e.y-e.size*1.8,bw,3);
      ctx.fillStyle=e.hp/e.maxHp>0.5?'#4caf50':'#e53935';
      ctx.fillRect(ex-bw/2,e.y-e.size*1.8,bw*(e.hp/e.maxHp),3);
    }
  }

  // Player
  const px=W*0.25;
  if(runAlive){
    const t=Date.now()*0.008;
    const bobY=fighting?0:Math.sin(t*2)*2;
    // Buff auras
    if(activeBuffs.transcend){
      ctx.beginPath();ctx.arc(px,groundY-10+bobY,16,0,Math.PI*2);
      ctx.fillStyle='rgba(255,215,0,0.15)';ctx.fill();
      ctx.strokeStyle='#ffd700';ctx.lineWidth=1.5;ctx.stroke();
    }
    if(activeBuffs.invuln){
      ctx.beginPath();ctx.arc(px,groundY-10+bobY,14,0,Math.PI*2);
      ctx.strokeStyle='rgba(100,181,246,0.6)';ctx.lineWidth=2;ctx.stroke();
    }
    if(activeBuffs.phantom){
      // After-images
      ctx.globalAlpha=0.2;ctx.fillStyle='#81d4fa';
      ctx.fillRect(px-12,groundY-14+bobY,8,12);
      ctx.fillRect(px-20,groundY-14+bobY,8,12);
      ctx.globalAlpha=1;
    }
    ctx.fillStyle=activeBuffs.transcend?'#ffd700':activeBuffs.darkPact?'#e53935':
      (activeBuffs.haste||activeBuffs.gale||activeBuffs.phantom)?'#81d4fa':'#64b5f6';
    ctx.fillRect(px-4,groundY-14+bobY,8,12);
    ctx.fillStyle='#e0e0e0';ctx.beginPath();ctx.arc(px,groundY-18+bobY,5,0,Math.PI*2);ctx.fill();
    if(attackCooldown>attackCooldownMax-10){
      const swA=(attackCooldownMax-attackCooldown)/10*Math.PI;
      ctx.strokeStyle='#fff176';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(px+5,groundY-10+bobY);
      ctx.lineTo(px+5+Math.cos(swA-0.5)*15,groundY-10+bobY-Math.sin(swA-0.5)*12);ctx.stroke();
    }
    const hpPct=stats.hp/stats.maxHp;
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(px-15,groundY-28,30,4);
    ctx.fillStyle=hpPct>0.5?'#4caf50':hpPct>0.25?'#ff9800':'#e53935';
    ctx.fillRect(px-15,groundY-28,30*hpPct,4);
  } else {
    ctx.font='16px sans-serif';ctx.textAlign='center';
    ctx.globalAlpha=runDeathTimer/70;
    ctx.fillText('💀',px,groundY-8);
    ctx.globalAlpha=1;
  }

  for(const p of runParticles){
    ctx.globalAlpha=p.life/30;ctx.fillStyle=p.color;
    ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);
  }
  ctx.globalAlpha=1;
  for(const d of runDmgNums){
    ctx.globalAlpha=Math.min(1,d.life/20);ctx.fillStyle=d.color;
    ctx.font='bold 11px sans-serif';ctx.textAlign='center';
    ctx.fillText(d.text,d.x,d.y);
  }
  ctx.globalAlpha=1;
  ctx.fillStyle='rgba(255,255,255,0.4)';ctx.font='10px sans-serif';ctx.textAlign='right';
  ctx.fillText(`${Math.floor(runDist)}m`,W-5,12);
  ctx.restore();
}

const CAT_COLORS={might:'#e53935',guard:'#42a5f5',swift:'#66bb6a',arcane:'#ffeb3b',dark:'#ab47bc',ultimate:'#ffd700'};

function drawSphereGrid(){
  const y=GRID_Y;
  ctx.save();ctx.beginPath();ctx.rect(0,y,W,GRID_H);ctx.clip();
  ctx.fillStyle='#080810';ctx.fillRect(0,y,W,GRID_H);
  const grd=ctx.createRadialGradient(gridCenterX+gridScroll.x,gridCenterY+gridScroll.y,0,
    gridCenterX+gridScroll.x,gridCenterY+gridScroll.y,200);
  grd.addColorStop(0,'rgba(26,35,80,0.12)');grd.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=grd;ctx.fillRect(0,y,W,GRID_H);

  const ox=gridScroll.x,oy=gridScroll.y;
  const time=Date.now()*0.001;

  // Edges
  for(const[a,b]of gridEdges){
    const na=gridNodes[a],nb=gridNodes[b];
    ctx.beginPath();ctx.moveTo(na.x+ox,na.y+oy);ctx.lineTo(nb.x+ox,nb.y+oy);
    if(na.unlocked&&nb.unlocked){ctx.strokeStyle='rgba(100,181,246,0.35)';ctx.lineWidth=2.5;ctx.shadowColor='#42a5f5';ctx.shadowBlur=4;}
    else{ctx.strokeStyle='rgba(60,60,80,0.2)';ctx.lineWidth=1;ctx.shadowBlur=0;}
    ctx.stroke();ctx.shadowBlur=0;
  }

  // Nodes
  for(const n of gridNodes){
    const nx=n.x+ox,ny=n.y+oy;
    if(ny<y-40||ny>y+GRID_H+40||nx<-40||nx>W+40)continue;
    const isSkill=n.type==='skill';
    const r=isSkill?(n.tier>=3?22:n.tier>=2?19:17):13;
    const sel=selectedNode===n.id;
    const can=!n.unlocked&&canUnlock(n.id);
    const catC=CAT_COLORS[n.cat]||'#aaa';

    if(n.type==='start'){
      ctx.beginPath();ctx.arc(nx,ny,15,0,Math.PI*2);
      ctx.fillStyle='#42a5f5';ctx.shadowColor='#42a5f5';ctx.shadowBlur=12;ctx.fill();ctx.shadowBlur=0;
      ctx.fillStyle='#fff';ctx.font='bold 9px sans-serif';ctx.textAlign='center';ctx.fillText('START',nx,ny+3);
    } else if(isSkill){
      const pulse=Math.sin(time*2.5+n.id)*0.2+0.8;
      // Outer ring (always)
      ctx.beginPath();ctx.arc(nx,ny,r+5,0,Math.PI*2);
      ctx.strokeStyle=n.unlocked?catC+'88':catC+'44';ctx.lineWidth=1.5;ctx.stroke();
      // Pulsing glow
      ctx.beginPath();ctx.arc(nx,ny,r+2,0,Math.PI*2);
      ctx.shadowColor=catC;ctx.shadowBlur=n.unlocked?20:(can?12:5);
      ctx.fillStyle=n.unlocked?catC:`rgba(50,50,80,${0.6*pulse})`;ctx.fill();ctx.shadowBlur=0;
      // Inner
      ctx.beginPath();ctx.arc(nx,ny,r,0,Math.PI*2);
      ctx.fillStyle=n.unlocked?catC:`rgba(45,45,70,${0.85*pulse})`;ctx.fill();
      ctx.strokeStyle=sel?'#fff':(n.unlocked?'rgba(255,255,255,0.4)':catC+'66');
      ctx.lineWidth=sel?3:2;ctx.stroke();
      // Icon
      ctx.globalAlpha=n.unlocked?1:(can?0.7:0.4);
      ctx.font=`${r*0.85}px sans-serif`;ctx.textAlign='center';
      ctx.fillText(n.icon,nx,ny+r*0.3);
      ctx.globalAlpha=1;
      // Name
      ctx.font='bold 8px sans-serif';ctx.fillStyle=n.unlocked?'#fff':catC+(can?'cc':'66');
      ctx.fillText(n.label,nx,ny+r+12);
      // Stars
      if(n.tier>=2){ctx.font='7px sans-serif';ctx.fillStyle=n.unlocked?'#ffd700':catC+'55';
        ctx.fillText('★'.repeat(n.tier),nx,ny-r-3);}
      // Cost
      if(!n.unlocked&&can){ctx.fillStyle=sp>=n.cost?'#fff176':'#e57373';ctx.font='bold 9px sans-serif';
        ctx.fillText(`${n.cost}SP`,nx,ny+r+22);}
    } else if(n.unlocked){
      ctx.beginPath();ctx.arc(nx,ny,r,0,Math.PI*2);
      ctx.fillStyle=catC;ctx.shadowColor=catC;ctx.shadowBlur=sel?12:5;ctx.fill();ctx.shadowBlur=0;
      ctx.strokeStyle=sel?'#fff':'rgba(255,255,255,0.25)';ctx.lineWidth=sel?2:1;ctx.stroke();
      ctx.fillStyle='#fff';ctx.font='bold 7px sans-serif';ctx.textAlign='center';ctx.fillText(n.label,nx,ny+3);
    } else {
      ctx.beginPath();ctx.arc(nx,ny,r,0,Math.PI*2);
      ctx.fillStyle=can?'rgba(60,60,90,0.7)':'rgba(30,30,50,0.5)';ctx.fill();
      ctx.strokeStyle=sel?(sp>=n.cost?'#fff176':'#ff9800'):(can?'rgba(150,150,180,0.4)':'rgba(60,60,80,0.25)');
      ctx.lineWidth=sel?2.5:1;ctx.stroke();
      ctx.fillStyle=can?'rgba(200,200,220,0.65)':'rgba(120,120,140,0.3)';
      ctx.font='bold 7px sans-serif';ctx.textAlign='center';ctx.fillText(n.label,nx,ny+2);
      if(can){ctx.fillStyle=sp>=n.cost?'#fff176':'#e57373';ctx.font='8px sans-serif';
        ctx.fillText(`${n.cost}SP`,nx,ny+r+10);}
    }
  }

  // Selected info popup
  if(selectedNode!==null){
    const n=gridNodes[selectedNode];
    if(!n.unlocked&&canUnlock(n.id)){
      const isS=n.type==='skill';
      const pw=isS?200:150,ph=isS?55:38;
      const px_=Math.max(10,Math.min(W-pw-10,n.x+ox-pw/2));
      const py_=Math.min(y+GRID_H-ph-10,Math.max(y+5,n.y+oy+(isS?32:22)));
      ctx.fillStyle='rgba(12,12,30,0.95)';roundRect(ctx,px_,py_,pw,ph,8);ctx.fill();
      ctx.strokeStyle=(catC||'#64b5f6')+'55';ctx.lineWidth=1;roundRect(ctx,px_,py_,pw,ph,8);ctx.stroke();
      ctx.fillStyle='#e0e0e0';ctx.font='bold 10px sans-serif';ctx.textAlign='left';
      ctx.fillText(`${isS?n.icon+' ':''}${n.label}`,px_+8,py_+14);
      if(isS&&n.desc){ctx.font='9px sans-serif';ctx.fillStyle='#9e9e9e';ctx.fillText(n.desc,px_+8,py_+28);}
      if(sp>=n.cost){
        ctx.fillStyle='rgba(76,175,80,0.85)';roundRect(ctx,px_+pw-58,py_+ph-28,50,22,5);ctx.fill();
        ctx.fillStyle='#fff';ctx.font='bold 9px sans-serif';ctx.textAlign='center';ctx.fillText('解放',px_+pw-33,py_+ph-13);
      } else {
        ctx.fillStyle='#e57373';ctx.font='9px sans-serif';ctx.textAlign='right';ctx.fillText(`${n.cost}SP必要`,px_+pw-8,py_+ph-12);
      }
    }
  }

  ctx.restore();
  // Stats bar
  const bh=26,by=H-bh;
  ctx.fillStyle='rgba(10,15,30,0.92)';ctx.fillRect(0,by,W,bh);
  ctx.font='9px sans-serif';ctx.textAlign='left';
  ctx.fillStyle='#e57373';ctx.fillText(`ATK${Math.floor(getAtk())}`,4,by+16);
  ctx.fillStyle='#64b5f6';ctx.fillText(`DEF${getDef()}`,50,by+16);
  ctx.fillStyle='#66bb6a';ctx.fillText(`SPD${getSpd().toFixed(1)}`,96,by+16);
  ctx.fillStyle='#ffeb3b';ctx.fillText(`CRT${Math.floor(stats.critRate*100)}%`,150,by+16);
  let sx=200;
  for(const s of learnedSkills){
    ctx.globalAlpha=s.cd>0?0.3:1;ctx.font='11px sans-serif';ctx.fillText(s.icon||'✦',sx,by+16);ctx.globalAlpha=1;sx+=16;
  }
  ctx.textAlign='right';ctx.fillStyle='#4caf50';ctx.fillText(`HP${Math.floor(stats.hp)}/${stats.maxHp}`,W-4,by+16);
}

function roundRect(c,x,y,w,h,r){
  c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);
  c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);c.lineTo(x+r,y+h);
  c.quadraticCurveTo(x,y+h,x,y+h-r);c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();
}

// ===== INPUT =====
function getXY(e){const r=C.getBoundingClientRect();const t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top};}
let touchStart=0,touchMoved=false;

C.addEventListener('touchstart',e=>{
  e.preventDefault();if(actx.state==='suspended')actx.resume();
  const p=getXY(e);touchStart=Date.now();touchMoved=false;
  if(state===STATE.TITLE)return;
  if(p.y>GRID_Y){gridScroll.dragging=true;gridScroll.startX=p.x;gridScroll.startY=p.y;gridScroll.sx=gridScroll.x;gridScroll.sy=gridScroll.y;}
},{passive:false});
C.addEventListener('touchmove',e=>{
  e.preventDefault();const p=getXY(e);
  if(gridScroll.dragging){const dx=p.x-gridScroll.startX,dy=p.y-gridScroll.startY;
    if(Math.abs(dx)>5||Math.abs(dy)>5)touchMoved=true;
    gridScroll.x=gridScroll.sx+dx;gridScroll.y=gridScroll.sy+dy;}
},{passive:false});
C.addEventListener('touchend',e=>{
  e.preventDefault();gridScroll.dragging=false;
  if(state===STATE.TITLE){startGame();return;}
  if(state===STATE.CASTING){/* skip cast? */}
  if(!touchMoved&&Date.now()-touchStart<300){
    const r=C.getBoundingClientRect();
    if(e.changedTouches&&e.changedTouches[0]){
      const p={x:e.changedTouches[0].clientX-r.left,y:e.changedTouches[0].clientY-r.top};
      if(p.y>GRID_Y)handleGridTap(p);
    }
  }
},{passive:false});
C.addEventListener('click',e=>{
  const p=getXY(e);
  if(state===STATE.TITLE){startGame();return;}
  if(p.y>GRID_Y)handleGridTap(p);
});

function startGame(){
  state=STATE.PLAY;buildSphereGrid();resize();initRun();
}

function handleGridTap(pos){
  const ox=gridScroll.x,oy=gridScroll.y;
  // Check unlock button
  if(selectedNode!==null){
    const n=gridNodes[selectedNode];
    if(!n.unlocked&&canUnlock(n.id)&&sp>=n.cost){
      const isS=n.type==='skill';const pw=isS?200:150,ph=isS?55:38;
      const px_=Math.max(10,Math.min(W-pw-10,n.x+ox-pw/2));
      const py_=Math.min(GRID_Y+GRID_H-ph-10,Math.max(GRID_Y+5,n.y+oy+(isS?32:22)));
      if(pos.x>px_+pw-58&&pos.x<px_+pw-8&&pos.y>py_+ph-28&&pos.y<py_+ph-6){
        unlockNode(n);return;
      }
    }
  }
  for(const n of gridNodes){
    const nx=n.x+ox,ny=n.y+oy;
    if(Math.hypot(pos.x-nx,pos.y-ny)<(n.type==='skill'?26:20)){
      if(selectedNode===n.id){
        if(!n.unlocked&&canUnlock(n.id)&&sp>=n.cost)unlockNode(n);
        selectedNode=null;
      } else selectedNode=n.id;
      return;
    }
  }
  selectedNode=null;
}

// ===== LOOP =====
function loop(){
  if(state===STATE.TITLE) drawTitle();
  else if(state===STATE.CASTING){updateCasting();drawCasting();}
  else if(state===STATE.PLAY){updateRunner();drawRunner();drawHUD();drawSphereGrid();}
  requestAnimationFrame(loop);
}
resize();loop();
</script>
