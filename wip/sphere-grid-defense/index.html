<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Sphere Grid Rogue</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a1a;touch-action:none;-webkit-user-select:none;user-select:none}
canvas{display:block;width:100%;height:100%}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';
const C=document.getElementById('c'),ctx=C.getContext('2d');
let W,H,dpr;
function resize(){
  dpr=Math.min(window.devicePixelRatio||1,3);
  W=window.innerWidth;H=window.innerHeight;
  C.width=W*dpr;C.height=H*dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
  RUNNER_H=Math.floor(H*0.18);
  GRID_Y=RUNNER_H+HUD_H;GRID_H=H-GRID_Y;
  if(gN.length) posGrid();
}
let RUNNER_H=0;const HUD_H=66;let GRID_Y=0,GRID_H=0;

// Audio
const ac=new(window.AudioContext||window.webkitAudioContext)();
function tone(f,d,v=0.3,t='sine'){const o=ac.createOscillator(),g=ac.createGain();o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+d);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+d);}
function sfxHit(){tone(300,0.08,0.2,'square');}
function sfxDie(){tone(180,0.3,0.3,'sawtooth');setTimeout(()=>tone(120,0.4,0.3,'sawtooth'),200);}
function sfxUnlock(){tone(523,0.12,0.3,'triangle');setTimeout(()=>tone(659,0.1,0.3,'triangle'),80);}
function sfxKill(){tone(440,0.1,0.2,'triangle');}
function sfxCast(){tone(600+Math.random()*300,0.1,0.2,'sine');}
function sfxSkill(){tone(784,0.15,0.35,'sine');setTimeout(()=>tone(988,0.12,0.3,'sine'),100);}

// State
const ST={TITLE:0,CAST:1,PLAY:2};
let state=ST.TITLE;

// Stats
let base={hp:30,mhp:30,atk:5,def:1,spd:1.2,cr:0.05,cd:1.5,reg:0,ls:0,dg:0,mh:1};
let st={...base};
let learned=[];let buffs={};

// Run
let rx=0,rd=0,best=0,alive=true,dTimer=0;
let enemies=[],parts=[],dnums=[];
let sp=0,runs=0,kills=0,atkCd=0,atkCdMax=50,fight=false,camX=0;
let bgs=[];

// Cast
let castQ=[],castTxts=[],castT=0;

// Grid
let gN=[],gE=[];
let gs={x:0,y:0,drag:false,sx:0,sy:0,ox:0,oy:0,zoom:1,zoomStart:1,pinchDist:0};
let selN=null,gcx=0,gcy=0;

// ===== SPHERE GRID - 16方向 (8基本職 + 8組み合わせ職) =====
function buildGrid(){
  gN=[];gE=[];let id=0;const nodes=[],edges=[];
  function N(gx,gy,type,opts={}){const n={id:id++,gx,gy,type,unlocked:false,applied:false,...opts};nodes.push(n);return n.id;}
  function E(a,b){edges.push([a,b]);}

  // ===== CENTER START =====
  const s0=N(0,0,'start',{unlocked:true,label:'START'});

  // Inner ring (8 nodes around start, aligned to dir angles)
  const dirAngs=[270,315,0,45,90,135,180,225]; // match dirs order
  const innerStats=[
    {stat:'atk',val:1,label:'ATK+1',cat:'attack'},
    {stat:'def',val:1,label:'DEF+1',cat:'defense'},
    {stat:'mhp',val:5,label:'HP+5',cat:'heal'},
    {stat:'cr',val:0.03,label:'CRT+3%',cat:'magic'},
    {stat:'spd',val:0.08,label:'SPD+',cat:'buffer'},
    {stat:'ls',val:0.03,label:'吸血+3%',cat:'debuffer'},
    {stat:'dg',val:0.04,label:'回避+4%',cat:'evade'},
    {stat:'mhp',val:5,label:'HP+5',cat:'counter'}
  ];
  const inner=[];
  for(let i=0;i<8;i++){
    const ang=dirAngs[i]*Math.PI/180;
    const gx=Math.cos(ang)*1.8,gy=Math.sin(ang)*1.8;
    const nid=N(gx,gy,'stat',{cost:1,...innerStats[i]});
    inner.push(nid);
    E(s0,nid);
  }
  for(let i=0;i<8;i++)E(inner[i],inner[(i+1)%8]);

  // ===== 16方向の定義 =====
  // 8つの基本職 (0, 45, 90, 135, 180, 225, 270, 315度)
  const dirs=[
    {name:'攻撃',ang:270,cat:'attack',stats:[{s:'atk',base:1},{s:'mhp',base:8}],
      t1:'powerStrike',t1l:'Brave Strike',t1i:'⚔️',t1d:'ATK×3',
      t2:'battleMaster',t2l:'Battle Master',t2i:'👊',t2d:'ATK×6全体',
      t3:'ragnarok',t3l:'Ragnarök',t3i:'💀',t3d:'ATK×8殲滅'},
    {name:'防御',ang:315,cat:'defense',stats:[{s:'def',base:1},{s:'mhp',base:10}],
      t1:'ironWall',t1l:'Infinity Wall',t1i:'🛡️',t1d:'3秒完全防御',
      t2:'guardian',t2l:'Guardian',t2i:'🏛️',t2d:'DEF2倍+5秒無敵',
      t3:'immortal',t3l:'Immortal',t3i:'🏰',t3d:'10秒無敵+再生'},
    {name:'回復',ang:0,cat:'heal',stats:[{s:'reg',base:0.2},{s:'mhp',base:8}],
      t1:'blessing',t1l:'Blessing',t1i:'💚',t1d:'HP30%回復',
      t2:'archbishop',t2l:'Archbishop',t2i:'✝️',t2d:'HP60%回復+再生',
      t3:'holyNova',t3l:'Holy Nova',t3i:'🌟',t3d:'HP全回復+再生MAX'},
    {name:'攻撃魔法',ang:45,cat:'magic',stats:[{s:'cr',base:0.04},{s:'cd',base:0.15}],
      t1:'critSlash',t1l:'Void Slash',t1i:'⚡',t1d:'確定CRT×3連',
      t2:'archmage',t2l:'Archmage',t2i:'🔮',t2d:'CRT×4全体',
      t3:'eclipse',t3l:'Eclipse Zero',t3i:'🌑',t3d:'7連CRD×3'},
    {name:'バッファー',ang:90,cat:'buffer',stats:[{s:'spd',base:0.1},{s:'dg',base:0.04}],
      t1:'haste',t1l:'Haste',t1i:'💨',t1d:'5秒速度2倍',
      t2:'tactician',t2l:'Tactician',t2i:'🎯',t2d:'全能力UP',
      t3:'transcend',t3l:'Transcendence',t3i:'✨',t3d:'全ステ2倍20秒'},
    {name:'デバッファー',ang:135,cat:'debuffer',stats:[{s:'ls',base:0.04},{s:'reg',base:0.2}],
      t1:'drain',t1l:'Soul Drain',t1i:'💀',t1d:'大ダメ+HP回復',
      t2:'hexMaster',t2l:'Hex Master',t2i:'☠️',t2d:'3連呪撃',
      t3:'soulBurst',t3l:'Abyss Nova',t3i:'💥',t3d:'HP70%消費→超火力'},
    {name:'回避',ang:180,cat:'evade',stats:[{s:'dg',base:0.05},{s:'spd',base:0.12}],
      t1:'gale',t1l:'Gale Force',t1i:'🌪️',t1d:'速度3倍+回避UP',
      t2:'phantom',t2l:'Phantom',t2i:'👻',t2d:'速度5倍+回避80%',
      t3:'mirageWalk',t3l:'Mirage Walk',t3i:'🌫️',t3d:'超回避+超速度'},
    {name:'反撃',ang:225,cat:'counter',stats:[{s:'atk',base:1},{s:'cr',base:0.03}],
      t1:'execute',t1l:'Execute',t1i:'🗡️',t1d:'確定CRT×2',
      t2:'counter',t2l:'Counter',t2i:'⚡',t2d:'反撃ATK×4',
      t3:'devastate',t3l:'Devastate',t3i:'💫',t3d:'ATK×10確定CRT'}
  ];
  
  // 8つの組み合わせ職 (中間角度: 22.5, 67.5, 112.5, ...)
  const hybrid=[
    {name:'重戦士',ang:292.5,cat:'berserker',base1:0,base2:1,t2:'berserker',t2l:'Juggernaut',t2i:'⚔️',t2d:'ATK×5全体'},
    {name:'パラディン',ang:337.5,cat:'paladin',base1:1,base2:2,t2:'aegis',t2l:'Paladin',t2i:'⚜️',t2d:'無敵+全回復'},
    {name:'賢者',ang:22.5,cat:'sage',base1:2,base2:3,t2:'sageBlast',t2l:'Sage',t2i:'📖',t2d:'魔撃+回復'},
    {name:'黒魔術士',ang:67.5,cat:'darkmage',base1:3,base2:4,t2:'darkPact',t2l:'Warlock',t2i:'🦇',t2d:'HP半減→ATK3倍'},
    {name:'巫女',ang:112.5,cat:'priestess',base1:4,base2:5,t2:'sanctify',t2l:'Priestess',t2i:'🙏',t2d:'回復+再生バフ'},
    {name:'盗賊',ang:157.5,cat:'rogue',base1:5,base2:6,t2:'assassinate',t2l:'Assassin',t2i:'🎭',t2d:'CRT7倍'},
    {name:'忍者',ang:202.5,cat:'ninja',base1:6,base2:7,t2:'ninjaBlade',t2l:'Ninja',t2i:'🥷',t2d:'5連CRT'},
    {name:'狂戦士',ang:247.5,cat:'warlord',base1:7,base2:0,t2:'warlord',t2l:'Warlord',t2i:'🔥',t2d:'AOE+ATKバフ'}
  ];

  const paths=[];
  const t1Nodes=[]; // Tier1 skill node IDs for hybrid gate check
  
  // Label helper
  function LB(s,v){const fv=typeof v==='number'&&v%1?parseFloat(v.toFixed(2)):v;return`${s.toUpperCase()}+${fv}`;}

  // ===== 8方向の基本職パス (同心円リング構造) =====
  // Concentric hexagonal/octagonal rings with radial spokes
  // Ring radii: 3, 5.5, 8, 10.5, 13
  const RINGS=[3, 5.5, 8, 10.5, 13];
  // Each ring has nodes at regular angular intervals around each direction's sector
  // Sector width = 45 degrees = PI/4
  const SEC=Math.PI/4;
  
  for(let di=0;di<dirs.length;di++){
    const d=dirs[di];
    const path=[];
    const ba=d.ang*Math.PI/180; // center angle of this direction's sector

    // --- Ring 0 (r=3): Entry arc - 3 nodes in a small arc ---
    const a0L=ba-SEC*0.25, a0C=ba, a0R=ba+SEC*0.25;
    const n0L=N(Math.cos(a0L)*RINGS[0],Math.sin(a0L)*RINGS[0],'stat',{cost:1,stat:d.stats[0].s,val:d.stats[0].base,label:LB(d.stats[0].s,d.stats[0].base),cat:d.cat});
    const n0C=N(Math.cos(a0C)*RINGS[0],Math.sin(a0C)*RINGS[0],'stat',{cost:1,stat:d.stats[1].s,val:d.stats[1].base,label:LB(d.stats[1].s,d.stats[1].base),cat:d.cat});
    const n0R=N(Math.cos(a0R)*RINGS[0],Math.sin(a0R)*RINGS[0],'stat',{cost:1,stat:d.stats[0].s,val:d.stats[0].base,label:LB(d.stats[0].s,d.stats[0].base),cat:d.cat});
    E(inner[di],n0C); E(n0L,n0C); E(n0C,n0R);
    // Connect to adjacent direction's ring0 for cross-paths
    E(inner[di],n0L); E(inner[di],n0R);

    // --- Ring 1 (r=5.5): 5 nodes in arc + T1 skill at center ---
    const r1=RINGS[1];
    const r1n=[];
    for(let k=-2;k<=2;k++){
      const a=ba+k*SEC*0.14;
      const s=d.stats[Math.abs(k)%2];
      const v=s.base*(1+Math.abs(k));
      r1n.push(N(Math.cos(a)*r1,Math.sin(a)*r1,'stat',{cost:1,stat:s.s,val:v,label:LB(s.s,v),cat:d.cat}));
    }
    // Arc connections
    for(let k=0;k<4;k++) E(r1n[k],r1n[k+1]);
    // Radial from ring 0
    E(n0L,r1n[0]); E(n0C,r1n[2]); E(n0R,r1n[4]);
    // T1 Skill between ring1 and ring2
    const t1=N(Math.cos(ba)*6.7,Math.sin(ba)*6.7,'skill',{cost:3,skill:d.t1,label:d.t1l,cat:d.cat,tier:1,icon:d.t1i,desc:d.t1d});
    E(r1n[1],t1); E(r1n[2],t1); E(r1n[3],t1);
    t1Nodes.push(t1);
    // Dead-end spur
    const de1a=ba-SEC*0.35;
    const de1=N(Math.cos(de1a)*r1,Math.sin(de1a)*r1,'stat',{cost:1,stat:d.stats[0].s,val:d.stats[0].base*3,label:LB(d.stats[0].s,d.stats[0].base*3),cat:d.cat});
    E(r1n[0],de1);

    // --- Ring 2 (r=8): 5 nodes arc ---
    const r2=RINGS[2];
    const r2n=[];
    for(let k=-2;k<=2;k++){
      const a=ba+k*SEC*0.15;
      const s=d.stats[Math.abs(k)%2];
      const v=s.base*(2+Math.abs(k));
      r2n.push(N(Math.cos(a)*r2,Math.sin(a)*r2,'stat',{cost:2,stat:s.s,val:v,label:LB(s.s,v),cat:d.cat}));
    }
    for(let k=0;k<4;k++) E(r2n[k],r2n[k+1]);
    // Radial from T1
    E(t1,r2n[2]);
    // Also connect ring1 edges to ring2 edges (bypass T1 via arc)
    E(r1n[0],r2n[0]); E(r1n[4],r2n[4]);
    // Dead-end spur
    const de2a=ba+SEC*0.35;
    const de2=N(Math.cos(de2a)*r2,Math.sin(de2a)*r2,'stat',{cost:2,stat:d.stats[0].s,val:d.stats[0].base*4,label:LB(d.stats[0].s,d.stats[0].base*4),cat:d.cat});
    E(r2n[4],de2);

    // T2 Skill between ring2 and ring3
    const t2=N(Math.cos(ba)*9.3,Math.sin(ba)*9.3,'skill',{cost:6,skill:d.t2,label:d.t2l,cat:d.cat,tier:2,icon:d.t2i,desc:d.t2d});
    E(r2n[1],t2); E(r2n[2],t2); E(r2n[3],t2);

    // --- Ring 3 (r=10.5): 5 nodes arc ---
    const r3=RINGS[3];
    const r3n=[];
    for(let k=-2;k<=2;k++){
      const a=ba+k*SEC*0.15;
      const s=d.stats[Math.abs(k)%2];
      const v=s.base*(3+Math.abs(k));
      r3n.push(N(Math.cos(a)*r3,Math.sin(a)*r3,'stat',{cost:3,stat:s.s,val:v,label:LB(s.s,v),cat:d.cat}));
    }
    for(let k=0;k<4;k++) E(r3n[k],r3n[k+1]);
    E(t2,r3n[2]);
    E(r2n[0],r3n[0]); E(r2n[4],r3n[4]);

    // --- Ring 4 (r=13): 3 nodes arc + T3 skill ---
    const r4=RINGS[4];
    const r4L=N(Math.cos(ba-SEC*0.12)*r4,Math.sin(ba-SEC*0.12)*r4,'stat',{cost:3,stat:d.stats[0].s,val:d.stats[0].base*5,label:LB(d.stats[0].s,d.stats[0].base*5),cat:d.cat});
    const r4R=N(Math.cos(ba+SEC*0.12)*r4,Math.sin(ba+SEC*0.12)*r4,'stat',{cost:3,stat:d.stats[1].s,val:d.stats[1].base*5,label:LB(d.stats[1].s,d.stats[1].base*5),cat:d.cat});
    E(r3n[1],r4L); E(r3n[3],r4R); E(r4L,r4R);
    
    // T3 Skill
    const t3=N(Math.cos(ba)*15,Math.sin(ba)*15,'skill',{cost:9,skill:d.t3,label:d.t3l,cat:d.cat,tier:3,icon:d.t3i,desc:d.t3d});
    E(r4L,t3); E(r4R,t3);

    path.push(n0L,n0C,n0R);
    path.push(...r1n,t1);
    path.push(...r2n,t2);
    path.push(...r3n);
    path.push(r4L,r4R,t3);
    path._t1=t1;path._t2=t2;path._t3=t3;
    // Store ring nodes for hybrid connections
    path._r1=r1n;path._r2=r2n;path._r3=r3n;
    paths[di]=path;
  }

  // ===== 8方向の組み合わせ職パス =====
  // Requires BOTH adjacent Tier1 skills to access
  function midAng(a,b){let d=b-a;if(d>Math.PI)d-=Math.PI*2;if(d<-Math.PI)d+=Math.PI*2;return a+d*0.5;}

  for(let hi=0;hi<hybrid.length;hi++){
    const h=hybrid[hi];
    const hAngRad=h.ang*Math.PI/180;
    const hcx=Math.cos(hAngRad),hcy=Math.sin(hAngRad);
    const hpx=-Math.sin(hAngRad),hpy=Math.cos(hAngRad); // perpendicular
    const hpath=[];
    
    const req1=dirs[h.base1].t1l;
    const req2=dirs[h.base2].t1l;
    
    // Winding path (r=7-12)
    const hLayout=[
      {r:7.5,z:0.4},{r:8.3,z:-0.3},{r:9,z:0.5},{r:9.8,z:-0.4},{r:10.5,z:0.3}
    ];
    for(let k=0;k<hLayout.length;k++){
      const L=hLayout[k];
      const gx=hcx*L.r+hpx*L.z;
      const gy=hcy*L.r+hpy*L.z;
      const us=k%2===0?dirs[h.base1].stats[0]:dirs[h.base2].stats[0];
      const val=us.base*2;
      hpath.push(N(gx,gy,'stat',{cost:3,stat:us.s,val,label:LB(us.s,val),cat:h.cat}));
    }
    // Hybrid Tier2 Skill at r=12
    const ht2=N(hcx*12,hcy*12,'skill',{cost:8,skill:h.t2,label:h.t2l,cat:h.cat,tier:2,icon:h.t2i,
      desc:h.t2d+`\n要:${req1}+${req2}`});
    hpath.push(ht2);
    
    // Connect: T1 skill of base1 → gate → hpath[0]
    //          T1 skill of base2 → gate → hpath[2]
    // This forces having BOTH T1 skills to reach the hybrid T2
    const p1=paths[h.base1];
    const p2=paths[h.base2];
    const t1_1=p1._t1; // Tier1 skill node
    const t1_2=p2._t1;
    
    const b1AngRad=dirs[h.base1].ang*Math.PI/180;
    const b2AngRad=dirs[h.base2].ang*Math.PI/180;
    const g1a=midAng(b1AngRad,hAngRad);
    const g2a=midAng(b2AngRad,hAngRad);
    const gate1=N(Math.cos(g1a)*7,Math.sin(g1a)*7,'stat',{cost:2,stat:dirs[h.base1].stats[0].s,val:dirs[h.base1].stats[0].base,label:'→'+h.name,cat:h.cat,
      desc:`要:${req1}`});
    const gate2=N(Math.cos(g2a)*7,Math.sin(g2a)*7,'stat',{cost:2,stat:dirs[h.base2].stats[0].s,val:dirs[h.base2].stats[0].base,label:'→'+h.name,cat:h.cat,
      desc:`要:${req2}`});
    E(t1_1,gate1);E(gate1,hpath[0]);
    E(t1_2,gate2);E(gate2,hpath[Math.min(2,hpath.length-1)]);
    for(let i=0;i<hpath.length-1;i++)E(hpath[i],hpath[i+1]);
  }

  // ===== 最外周リング (Tier3同士を繋ぐ高コストリング) =====
  const outerRing=[];
  for(let di=0;di<dirs.length;di++){
    const d=dirs[di];
    const nextD=dirs[(di+1)%dirs.length];
    let ang1=d.ang*Math.PI/180;
    let ang2=nextD.ang*Math.PI/180;
    // Fix wrap-around: ensure we interpolate the short way around
    let diff=ang2-ang1;
    if(diff>Math.PI)diff-=Math.PI*2;
    if(diff<-Math.PI)diff+=Math.PI*2;
    const t3node=paths[di]._t3;
    const nextT3=paths[(di+1)%dirs.length]._t3;
    
    const numNodes=6;
    const ringNodes=[];
    for(let i=1;i<=numNodes;i++){
      const ratio=i/(numNodes+1);
      const ang=ang1+diff*ratio;
      const r=17;
      const gx=Math.cos(ang)*r,gy=Math.sin(ang)*r;
      const stats=['atk','mhp','spd','cr','def','ls','dg','reg'][i%8];
      const vals=[1,5,0.05,0.01,1,0.02,0.02,0.1][i%8];
      ringNodes.push(N(gx,gy,'stat',{cost:6,stat:stats,val:vals,label:`${stats.toUpperCase()}+${vals}`,cat:'outer'}));
    }
    
    E(t3node,ringNodes[0]);
    for(let i=0;i<ringNodes.length-1;i++)E(ringNodes[i],ringNodes[i+1]);
    E(ringNodes[ringNodes.length-1],nextT3);
    outerRing.push(...ringNodes);
  }

  gN=nodes;gE=edges;posGrid();
}

function posGrid(){
  const S=Math.min(W*0.032,14)*gs.zoom;
  gcx=W/2;gcy=GRID_Y+GRID_H*0.4;
  for(const n of gN){n.x=gcx+n.gx*S;n.y=gcy+n.gy*S;}
}

function canUL(id){for(const[a,b]of gE){if(a===id&&gN[b].unlocked)return true;if(b===id&&gN[a].unlocked)return true;}return false;}

// Skills
const SK={
  powerStrike:{cd:300,dm:3,h:1},
  battleMaster:{cd:600,dm:6,h:1,aoe:1},
  ragnarok:{cd:900,dm:8,h:1,aoe:1},
  ironWall:{cd:500,bf:'inv',bd:180},
  guardian:{cd:700,bf:'inv',bd:300,heal:0.5},
  immortal:{cd:1200,bf:'inv',bd:600,heal:1,rboost:5},
  blessing:{cd:400,heal:0.3,bf:'reg',bd:200},
  archbishop:{cd:700,heal:0.6,bf:'reg',bd:400},
  holyNova:{cd:1000,heal:1,bf:'reg',bd:600,aoe:1},

const PNAMES={atk:'Greater Fortitude',def:'Iron Fortress',mhp:'Life Essence',spd:'Sensory Boost',
  cr:'Hawk Eye',cd:'Penetrate Boost',reg:'Regeneration Field',ls:'Blood Covenant',
  dg:'Paranormal Intuition',mh:'Twin Blade Mastery'};

function unlockN(n){
  if(n.unlocked||!canUL(n.id)||sp<n.cost)return false;
  n.unlocked=true;sp-=n.cost;n.applied=true;
  if(n.type==='stat'){
    if(n.stat==='mhp'){base.mhp+=n.val;st.mhp+=n.val;st.hp=Math.min(st.hp+n.val,st.mhp);}
    else if(base[n.stat]!==undefined){base[n.stat]+=n.val;st[n.stat]+=n.val;}
  } else if(n.type==='skill'){
    learned.push({...n,cd:0});sfxSkill();return true;
  }
  sfxUnlock();return true;
}

// Buffs
function updBuf(){for(const k in buffs){if(buffs[k]>0)buffs[k]--;else delete buffs[k];}}
function gSpd(){let s=st.spd;if(buffs.hst)s*=2;if(buffs.gal)s*=3;if(buffs.phm)s*=5;if(buffs.trs)s*=2;return s;}
function gAtk(){let a=st.atk;if(buffs.dpk)a*=3;if(buffs.trs)a*=2;if(buffs.atkboost)a*=(1+buffs.atkboost);return a;}
function gDef(){let d=st.def;if(buffs.trs)d*=2;return d;}
function gDdg(){let d=st.dg;if(buffs.gal)d=Math.min(d+0.3,0.85);if(buffs.phm)d=Math.min(d+0.8,0.95);return d;}

// ===== CASTING =====
let castSt={hp:30,mhp:30,atk:5,def:1,spd:1.2,cr:0.05,cd:1.5,reg:0,ls:0,dg:0,mh:1};

function startCast(){
  state=ST.CAST;castQ=[];castTxts=[];castT=0;
  castSt={hp:30,mhp:30,atk:5,def:1,spd:1.2,cr:0.05,cd:1.5,reg:0,ls:0,dg:0,mh:1};
  const ul=gN.filter(n=>n.unlocked&&n.type!=='start');
  const ps=ul.filter(n=>n.type==='stat');
  const sk=ul.filter(n=>n.type==='skill').sort((a,b)=>(a.tier||1)-(b.tier||1));
  for(const n of ps)castQ.push({name:PNAMES[n.stat]||n.label,color:CC[n.cat]||'#aaa',sk:false,node:n});
  for(const s of sk)castQ.push({name:s.label,color:CC[s.cat]||'#ffd700',sk:true,icon:s.icon,node:s});
  if(castQ.length===0)endCast();
}

function updCast(){
  castT++;
  const iv=castQ.length>15?5:castQ.length>8?7:10;
  if(castT%iv===0&&castQ.length>0){
    const s=castQ.shift();sfxCast();
    castTxts.push({...s,y:groundY-12,a:1,age:0});
    const n=s.node;
    if(n&&n.type==='stat'&&n.stat){
      if(n.stat==='mhp'){castSt.mhp+=n.val;castSt.hp=castSt.mhp;}
      else if(castSt[n.stat]!==undefined)castSt[n.stat]+=n.val;
    }
  }
  for(const t of castTxts){t.age++;t.y-=0.7;t.a=t.age<12?1:Math.max(0,1-(t.age-12)/20);}
  castTxts=castTxts.filter(t=>t.a>0);
  if(castQ.length===0&&castTxts.length===0)endCast();
}

function endCast(){
  state=ST.PLAY;
  initRun();
}

// Runner
const GYR=0.78;let groundY=0;

function initRun(){
  st={...base};st.hp=st.mhp;
  alive=true;rx=0;rd=0;camX=0;
  enemies=[];parts=[];dnums=[];
  atkCd=0;fight=false;buffs={};
  atkCdMax=Math.max(15,50-st.spd*8);
  groundY=RUNNER_H*GYR;
  genBg();runs++;
  for(const s of learned)s.cd=0;
}

function genBg(){bgs=[];for(let i=0;i<60;i++)bgs.push({x:i*120+Math.random()*60,w:40+Math.random()*50,h:20+Math.random()*60,c:`hsl(${220+Math.random()*30},15%,${10+Math.random()*8}%)`});}

function spawnE(x){
  const t=Math.floor(rd/500),tp=['slime','goblin','knight','demon'][Math.min(t,3)],sc=1+t*0.25;
  let hp,ak,sz,c,em;
  switch(tp){
    case'slime':hp=10*sc;ak=3*sc;sz=10;c='#4caf50';em='🟢';break;
    case'goblin':hp=20*sc;ak=6*sc;sz=11;c='#ff9800';em='👺';break;
    case'knight':hp=45*sc;ak=9*sc;sz=13;c='#78909c';em='🛡';break;
    case'demon':hp=80*sc;ak=14*sc;sz=14;c='#e53935';em='👹';break;
  }
  enemies.push({x,y:groundY,hp,mhp:hp,ak,sz,c,em,tp,alive:true,hcd:0,fl:0});
}

function updRun(){
  if(!alive){dTimer--;if(dTimer<=0)startCast();return;}
  updBuf();
  for(const s of learned){
    if(s.cd>0){s.cd--;continue;}
    const k=SK[s.skill];if(!k)continue;
    const use=(k.h>0&&k.dm>0&&fight&&enemies.some(e=>e.alive&&Math.abs(e.x-rx)<80))||
      (k.bf==='inv'&&st.hp<st.mhp*0.4)||(k.bf==='hst'&&!buffs.hst&&!buffs.gal&&!buffs.phm)||
      (k.bf==='gal'&&!buffs.gal&&!buffs.phm)||(k.bf==='phm'&&!buffs.phm)||
      (k.bf==='trs'&&rd>300)||(k.bf==='dpk'&&fight&&st.hp>st.mhp*0.6)||
      (k.heal&&st.hp<st.mhp*0.5)||(k.hpc&&!k.bf&&st.hp>st.mhp*0.75&&fight)||
      (k.bf==='reg'&&st.hp<st.mhp*0.7);
    if(use){s.cd=k.cd;exeSkill(s,k);}
  }
  if(buffs.rboost)st.hp=Math.min(st.hp+5*0.016,st.mhp);
  
  const ne=enemies.find(e=>e.alive&&e.x-rx<30&&e.x-rx>-20);
  fight=!!ne;
  if(!fight){const spd=gSpd();rx+=spd;rd+=spd;if(rd>best)best=rd;}
  camX=rx-W*0.25;
  if(st.reg>0)st.hp=Math.min(st.hp+st.reg*0.016,st.mhp);
  if(Math.random()<1/Math.max(150,400-rd*0.06))spawnE(rx+W*0.9+Math.random()*150);
  if(rd%350<gSpd()+0.5)spawnE(rx+W*0.8+Math.random()*80);
  atkCd--;
  if(atkCd<=0&&fight){
    const tg=enemies.filter(e=>e.alive&&Math.abs(e.x-rx)<50);
    if(tg.length){
      atkCd=atkCdMax;
      for(let i=0;i<Math.min(st.mh,tg.length);i++){
        const t=tg[i%tg.length];let d=gAtk()-t.ak*0.05;
        const cr=Math.random()<st.cr;if(cr)d*=st.cd;
        d=Math.max(1,Math.floor(d));hitE(t,d,cr);
      }
    }
  }
  for(const e of enemies){
    if(!e.alive)continue;if(e.x>rx+15)e.x-=0.4;if(e.fl>0)e.fl--;
    if(Math.abs(e.x-rx)<25){
      e.hcd--;if(e.hcd<=0){e.hcd=70;
        if(buffs.inv){dnums.push({x:W*0.25,y:groundY-22,t:'NULLIFIED',c:'#64b5f6',l:25,vy:-1});}
        else if(Math.random()<gDdg()){dnums.push({x:W*0.25,y:groundY-22,t:'EVADE',c:'#81d4fa',l:25,vy:-1});}
        else{const d=Math.max(1,Math.floor(e.ak-gDef()));st.hp-=d;dnums.push({x:W*0.25,y:groundY-22,t:`-${d}`,c:'#e53935',l:25,vy:-1});}
      }
    }
  }
  if(st.hp<=0){alive=false;dTimer=70;sfxDie();
    for(let i=0;i<15;i++)parts.push({x:W*0.25,y:groundY,vx:(Math.random()-0.5)*4,vy:-Math.random()*4,c:'#e53935',l:30,s:3+Math.random()*3});}
  enemies=enemies.filter(e=>e.alive&&e.x>camX-100);
  for(const p of parts){p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.l--;}
  parts=parts.filter(p=>p.l>0);
  for(const d of dnums){d.y+=d.vy;d.l--;}
  dnums=dnums.filter(d=>d.l>0);
}

function hitE(t,d,cr){
  t.hp-=d;t.fl=8;
  if(st.ls>0)st.hp=Math.min(st.hp+d*st.ls,st.mhp);
  const ex=t.x-camX;
  dnums.push({x:ex,y:t.y-t.sz-5,t:cr?`💥${d}`:`${d}`,c:cr?'#ffeb3b':'#fff',l:30,vy:-1.2});
  sfxHit();
  if(t.hp<=0){t.alive=false;sp++;kills++;sfxKill();
    for(let j=0;j<6;j++)parts.push({x:ex,y:t.y,vx:(Math.random()-0.5)*3,vy:-Math.random()*3,c:t.c,l:20,s:3});}
}

function exeSkill(s,k){
  if(k.hpc)st.hp*=(1-k.hpc);
  if(k.bf){buffs[k.bf]=k.bd||300;if(k.atkboost)buffs.atkboost=k.atkboost;}
  if(k.heal)st.hp=Math.min(st.hp+st.mhp*k.heal,st.mhp);
  if(k.rboost)buffs.rboost=k.bd||600;
  if(k.h>0&&k.dm>0){
    const tg=k.aoe?enemies.filter(e=>e.alive&&e.x-rx<150&&e.x>camX):enemies.filter(e=>e.alive&&Math.abs(e.x-rx)<80);
    for(let h=0;h<k.h;h++){for(const t of tg){
      let d=gAtk()*k.dm;if(k.fc)d*=st.cd;d=Math.max(1,Math.floor(d));
      t.hp-=d;t.fl=8;if(st.ls>0)st.hp=Math.min(st.hp+d*st.ls,st.mhp);
      const ex=t.x-camX;
      dnums.push({x:ex+(Math.random()-0.5)*10,y:t.y-t.sz-8-h*10,t:`✦${d}`,c:'#ffeb3b',l:35,vy:-1.5});
      if(t.hp<=0){t.alive=false;sp++;kills++;sfxKill();
        for(let j=0;j<8;j++)parts.push({x:ex,y:t.y,vx:(Math.random()-0.5)*4,vy:-Math.random()*4,c:t.c,l:25,s:3});}
    }}
  }
  if(k.hp2){st.hp=Math.min(st.hp+gAtk()*k.dm*k.hp2,st.mhp);}
  dnums.push({x:W*0.5,y:groundY-35,t:`${s.icon||'✦'} ${s.label}`,c:'#ffd700',l:40,vy:-0.5});
  sfxSkill();
}

// ===== DRAW =====
function drawTitle(){
  ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,W,H);
  const t=Date.now()*0.001;
  for(let i=0;i<20;i++){
    const a=i/20*Math.PI*2+t*0.2,r=60+Math.sin(t*0.5+i*0.7)*25;
    const nx=W/2+Math.cos(a)*r,ny=H*0.38+Math.sin(a)*r*0.7;
    ctx.beginPath();ctx.arc(nx,ny,5,0,Math.PI*2);
    ctx.fillStyle=`hsla(${i*18},60%,55%,0.5)`;ctx.fill();
  }
  ctx.fillStyle='#e0e0e0';ctx.font='bold 26px sans-serif';ctx.textAlign='center';
  ctx.fillText('Sphere Grid',W/2,H*0.56);ctx.fillText('Rogue',W/2,H*0.62);
  ctx.font='13px sans-serif';ctx.fillStyle='#9e9e9e';ctx.fillText('死んで覚えて、盤で育てる',W/2,H*0.68);
  ctx.fillStyle='rgba(63,81,181,0.8)';rr(ctx,W/2-80,H*0.75,160,44,8);ctx.fill();
  ctx.fillStyle='#fff';ctx.font='bold 18px sans-serif';ctx.fillText('START',W/2,H*0.75+28);
}

function drawCast(){
  ctx.fillStyle='#0c1024';ctx.fillRect(0,0,W,RUNNER_H);
  ctx.fillStyle='#1a237e';ctx.fillRect(0,groundY,W,RUNNER_H-groundY);
  const px=W*0.25,t=Date.now()*0.005;
  const ar=12+castTxts.length*1.5;
  ctx.beginPath();ctx.arc(px,groundY-10,ar,0,Math.PI*2);
  ctx.fillStyle=`rgba(100,181,246,${0.05+castTxts.length*0.01})`;ctx.fill();
  ctx.strokeStyle=`rgba(100,181,246,${0.2+Math.sin(t)*0.1})`;ctx.lineWidth=1.5;ctx.stroke();
  ctx.fillStyle='#64b5f6';ctx.fillRect(px-4,groundY-14,8,12);
  ctx.fillStyle='#e0e0e0';ctx.beginPath();ctx.arc(px,groundY-18,5,0,Math.PI*2);ctx.fill();
  for(const ct of castTxts){
    ctx.globalAlpha=ct.a;ctx.font=ct.sk?'bold 11px sans-serif':'10px sans-serif';
    ctx.textAlign='center';ctx.fillStyle=ct.sk?'#ffd700':ct.color;
    ctx.fillText(`${ct.sk?(ct.icon+' '):''}${ct.name}`,px+45,ct.y);
    ctx.strokeStyle=ct.color+'44';ctx.lineWidth=0.5;
    ctx.beginPath();ctx.moveTo(px+10,groundY-10);ctx.lineTo(px+30,ct.y-3);ctx.stroke();
  }
  ctx.globalAlpha=1;
  if(castQ.length>0){ctx.fillStyle='rgba(200,200,255,0.5)';ctx.font='11px sans-serif';ctx.textAlign='center';ctx.fillText(`Enchanting... (${castQ.length})`,W/2,RUNNER_H-4);}
  drawHUD(true);drawGrid_();
}

function drawRun(){
  ctx.save();ctx.beginPath();ctx.rect(0,0,W,RUNNER_H);ctx.clip();
  ctx.fillStyle='#0c1024';ctx.fillRect(0,0,W,RUNNER_H);
  for(const b of bgs){const sx=b.x-camX*0.3;if(sx>-b.w&&sx<W+b.w){ctx.fillStyle=b.c;ctx.fillRect(sx,groundY-b.h,b.w,b.h);}}
  ctx.fillStyle='#1a237e';ctx.fillRect(0,groundY,W,RUNNER_H-groundY);
  for(const e of enemies){
    if(!e.alive)continue;const ex=e.x-camX;if(ex<-20||ex>W+20)continue;
    ctx.font=`${e.sz*1.5}px sans-serif`;ctx.textAlign='center';ctx.fillText(e.em,ex,e.y);
    if(e.fl>0){ctx.globalAlpha=0.4;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(ex,e.y-e.sz*0.5,e.sz,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;}
    if(e.hp<e.mhp){const bw=e.sz*2;ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(ex-bw/2,e.y-e.sz*1.8,bw,3);ctx.fillStyle=e.hp/e.mhp>0.5?'#4caf50':'#e53935';ctx.fillRect(ex-bw/2,e.y-e.sz*1.8,bw*(e.hp/e.mhp),3);}
  }
  const px=W*0.25;
  if(alive){
    const t=Date.now()*0.008,by=fight?0:Math.sin(t*2)*2;
    if(buffs.trs){ctx.beginPath();ctx.arc(px,groundY-10+by,16,0,Math.PI*2);ctx.fillStyle='rgba(255,215,0,0.15)';ctx.fill();}
    if(buffs.inv){ctx.beginPath();ctx.arc(px,groundY-10+by,14,0,Math.PI*2);ctx.strokeStyle='rgba(100,181,246,0.6)';ctx.lineWidth=2;ctx.stroke();}
    if(buffs.phm){ctx.globalAlpha=0.2;ctx.fillStyle='#81d4fa';ctx.fillRect(px-12,groundY-14+by,8,12);ctx.fillRect(px-20,groundY-14+by,8,12);ctx.globalAlpha=1;}
    ctx.fillStyle=buffs.trs?'#ffd700':buffs.dpk?'#e53935':(buffs.hst||buffs.gal||buffs.phm)?'#81d4fa':'#64b5f6';
    ctx.fillRect(px-4,groundY-14+by,8,12);ctx.fillStyle='#e0e0e0';ctx.beginPath();ctx.arc(px,groundY-18+by,5,0,Math.PI*2);ctx.fill();
    if(atkCd>atkCdMax-10){const sw=(atkCdMax-atkCd)/10*Math.PI;ctx.strokeStyle='#fff176';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(px+5,groundY-10+by);ctx.lineTo(px+5+Math.cos(sw-0.5)*15,groundY-10+by-Math.sin(sw-0.5)*12);ctx.stroke();}
    const hp=st.hp/st.mhp;ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(px-15,groundY-28,30,4);ctx.fillStyle=hp>0.5?'#4caf50':hp>0.25?'#ff9800':'#e53935';ctx.fillRect(px-15,groundY-28,30*hp,4);
  } else {ctx.globalAlpha=dTimer/70;ctx.font='16px sans-serif';ctx.textAlign='center';ctx.fillText('💀',px,groundY-8);ctx.globalAlpha=1;}
  for(const p of parts){ctx.globalAlpha=p.l/30;ctx.fillStyle=p.c;ctx.fillRect(p.x-p.s/2,p.y-p.s/2,p.s,p.s);}ctx.globalAlpha=1;
  for(const d of dnums){ctx.globalAlpha=Math.min(1,d.l/20);ctx.fillStyle=d.c;ctx.font='bold 11px sans-serif';ctx.textAlign='center';ctx.fillText(d.t,d.x,d.y);}ctx.globalAlpha=1;
  ctx.fillStyle='rgba(255,255,255,0.4)';ctx.font='12px sans-serif';ctx.textAlign='right';ctx.fillText(`${Math.floor(rd)}m`,W-5,12);
  ctx.restore();
}

function drawHUD(casting){
  const y=RUNNER_H;ctx.fillStyle='rgba(10,15,30,0.95)';ctx.fillRect(0,y,W,HUD_H);
  ctx.fillStyle='rgba(100,181,246,0.15)';ctx.fillRect(0,y+HUD_H-1,W,1);
  // Row 1: SP, Run, Kill, Best
  ctx.font='bold 11px sans-serif';ctx.textAlign='left';
  ctx.fillStyle='#fff176';ctx.fillText(`SP:${sp}`,6,y+14);
  ctx.fillStyle='#9e9e9e';ctx.fillText(`Run#${runs}`,65,y+14);
  ctx.fillStyle='#64b5f6';ctx.fillText(`Kill:${kills}`,130,y+14);
  ctx.textAlign='right';ctx.fillStyle='#e0e0e0';ctx.fillText(`Best:${Math.floor(best)}m`,W-6,y+14);
  // Row 2: Main stats
  const s=casting?castSt:st;
  ctx.font='10px sans-serif';ctx.textAlign='left';
  ctx.fillStyle='#e57373';ctx.fillText(`ATK${Math.floor(casting?s.atk:gAtk())}`,6,y+32);
  ctx.fillStyle='#64b5f6';ctx.fillText(`DEF${casting?s.def:gDef()}`,52,y+32);
  ctx.fillStyle='#4caf50';ctx.fillText(`HP${Math.floor(s.hp)}/${s.mhp}`,98,y+32);
  ctx.fillStyle='#66bb6a';ctx.fillText(`SPD${(casting?s.spd:gSpd()).toFixed(1)}`,178,y+32);
  // Row 3: Secondary stats
  ctx.fillStyle='#ffeb3b';ctx.fillText(`CRT${Math.floor(s.cr*100)}%`,6,y+50);
  ctx.fillStyle='#ffa726';ctx.fillText(`CD${s.cd.toFixed(1)}x`,58,y+50);
  if(s.ls>0){ctx.fillStyle='#ab47bc';ctx.fillText(`吸${Math.floor(s.ls*100)}%`,110,y+50);}
  if(s.dg>0){ctx.fillStyle='#81d4fa';ctx.fillText(`避${Math.floor((casting?s.dg:gDdg())*100)}%`,160,y+50);}
  if(s.reg>0){ctx.fillStyle='#66bb6a';ctx.fillText(`再${s.reg.toFixed(1)}`,210,y+50);}
  // Skill icons
  let sx=260;
  for(const sk of learned){ctx.globalAlpha=sk.cd>0?0.3:1;ctx.font='12px sans-serif';ctx.fillText(sk.icon||'✦',sx,y+50);ctx.globalAlpha=1;sx+=16;}
}

const CC={attack:'#e53935',defense:'#42a5f5',heal:'#66bb6a',magic:'#ffeb3b',buffer:'#ab47bc',
  debuffer:'#ff7043',evade:'#26c6da',counter:'#ffa726',berserker:'#d32f2f',paladin:'#1976d2',
  sage:'#43a047',darkmage:'#6a1b9a',priestess:'#f57c00',rogue:'#00695c',ninja:'#00838f',
  warlord:'#bf360c',outer:'#616161'};

function drawGrid_(){
  const y=GRID_Y;ctx.save();ctx.beginPath();ctx.rect(0,y,W,GRID_H);ctx.clip();
  ctx.fillStyle='#080810';ctx.fillRect(0,y,W,GRID_H);
  const ox=gs.x,oy=gs.y,tm=Date.now()*0.001;
  // Edges
  for(const[a,b]of gE){
    const na=gN[a],nb=gN[b];ctx.beginPath();ctx.moveTo(na.x+ox,na.y+oy);ctx.lineTo(nb.x+ox,nb.y+oy);
    if(na.unlocked&&nb.unlocked){ctx.strokeStyle='rgba(100,181,246,0.35)';ctx.lineWidth=2.5;ctx.shadowColor='#42a5f5';ctx.shadowBlur=4;}
    else{ctx.strokeStyle='rgba(100,100,120,0.5)';ctx.lineWidth=1.8;ctx.shadowBlur=0;}
    ctx.stroke();ctx.shadowBlur=0;
  }
  // Nodes
  for(const n of gN){
    const nx=n.x+ox,ny=n.y+oy;
    if(ny<y-40||ny>y+GRID_H+40||nx<-40||nx>W+40)continue;
    const isSk=n.type==='skill',r=isSk?(n.tier>=3?20:n.tier>=2?17:15):11;
    const sel=selN===n.id,can=!n.unlocked&&canUL(n.id),cc=CC[n.cat]||'#aaa';
    if(n.type==='start'){
      ctx.beginPath();ctx.arc(nx,ny,14,0,Math.PI*2);ctx.fillStyle='#42a5f5';ctx.shadowColor='#42a5f5';ctx.shadowBlur=10;ctx.fill();ctx.shadowBlur=0;
      ctx.fillStyle='#fff';ctx.font='bold 11px sans-serif';ctx.textAlign='center';ctx.fillText('START',nx,ny+3);
    } else if(isSk){
      const p=Math.sin(tm*2.5+n.id)*0.2+0.8;
      ctx.beginPath();ctx.arc(nx,ny,r+4,0,Math.PI*2);ctx.strokeStyle=n.unlocked?cc+'88':cc+'44';ctx.lineWidth=1.5;ctx.stroke();
      ctx.beginPath();ctx.arc(nx,ny,r,0,Math.PI*2);ctx.shadowColor=cc;ctx.shadowBlur=n.unlocked?18:(can?10:4);
      ctx.fillStyle=n.unlocked?cc:`rgba(45,45,70,${0.8*p})`;ctx.fill();ctx.shadowBlur=0;
      ctx.strokeStyle=sel?'#fff':(n.unlocked?'rgba(255,255,255,0.35)':cc+'55');ctx.lineWidth=sel?3:1.5;ctx.stroke();
      ctx.globalAlpha=n.unlocked?1:(can?0.65:0.35);ctx.font=`${r*0.8}px sans-serif`;ctx.textAlign='center';ctx.fillText(n.icon,nx,ny+r*0.3);ctx.globalAlpha=1;
      ctx.font='bold 12px sans-serif';ctx.fillStyle=n.unlocked?'#fff':cc+(can?'bb':'55');ctx.fillText(n.label,nx,ny+r+10);
      if(n.tier>=2){ctx.font='11px sans-serif';ctx.fillStyle=n.unlocked?'#ffd700':cc+'44';ctx.fillText('★'.repeat(n.tier),nx,ny-r-2);}
      if(!n.unlocked&&can){ctx.fillStyle=sp>=n.cost?'#fff176':'#e57373';ctx.font='bold 11px sans-serif';ctx.fillText(`${n.cost}SP`,nx,ny+r+19);}
    } else if(n.unlocked){
      ctx.beginPath();ctx.arc(nx,ny,r,0,Math.PI*2);ctx.fillStyle=cc;ctx.shadowColor=cc;ctx.shadowBlur=sel?10:4;ctx.fill();ctx.shadowBlur=0;
      ctx.strokeStyle=sel?'#fff':'rgba(255,255,255,0.2)';ctx.lineWidth=sel?2:0.8;ctx.stroke();
      ctx.fillStyle='#fff';ctx.font='bold 10px sans-serif';ctx.textAlign='center';ctx.fillText(n.label,nx,ny+2);
    } else {
      ctx.beginPath();ctx.arc(nx,ny,r,0,Math.PI*2);ctx.fillStyle=can?'rgba(55,55,85,0.7)':'rgba(30,30,50,0.45)';ctx.fill();
      ctx.strokeStyle=sel?(sp>=n.cost?'#fff176':'#ff9800'):(can?'rgba(140,140,170,0.35)':'rgba(55,55,70,0.2)');ctx.lineWidth=sel?2:0.8;ctx.stroke();
      ctx.fillStyle=can?'rgba(200,200,220,0.6)':'rgba(110,110,130,0.25)';ctx.font='bold 10px sans-serif';ctx.textAlign='center';ctx.fillText(n.label,nx,ny+2);
      if(can){ctx.fillStyle=sp>=n.cost?'#fff176':'#e57373';ctx.font='11px sans-serif';ctx.fillText(`${n.cost}SP`,nx,ny+r+9);}
    }
  }
  if(selN!==null){
    const n=gN[selN];
    if(n.type!=='start'){
      const iS=n.type==='skill';
      const can=!n.unlocked&&canUL(n.id);
      const pw=iS?190:140,ph=iS?55:40;
      const px_=Math.max(8,Math.min(W-pw-8,n.x+ox-pw/2));
      const py_=Math.min(y+GRID_H-ph-8,Math.max(y+4,n.y+oy+(iS?30:20)));
      const cc=CC[n.cat]||'#64b5f6';
      ctx.fillStyle='rgba(10,10,28,0.95)';rr(ctx,px_,py_,pw,ph,6);ctx.fill();
      ctx.strokeStyle=cc+'44';ctx.lineWidth=1;rr(ctx,px_,py_,pw,ph,6);ctx.stroke();
      ctx.fillStyle=n.unlocked?'#8f8':'#e0e0e0';ctx.font='bold 11px sans-serif';ctx.textAlign='left';
      const prefix=iS?(n.icon+' '):'';
      const suffix=n.unlocked?' ✓':'';
      ctx.fillText(`${prefix}${n.label}${suffix}`,px_+6,py_+13);
      if(n.desc){
        ctx.font='10px sans-serif';ctx.fillStyle='#ffab40';
        // Split on newline for multi-line desc
        const lines=n.desc.split('\n');
        for(let li=0;li<lines.length;li++)ctx.fillText(lines[li],px_+6,py_+26+li*12);
      } else if(n.type==='stat'){
        const sn=PNAMES[n.stat]||'';
        if(sn){ctx.font='10px sans-serif';ctx.fillStyle='#9e9e9e';ctx.fillText(sn,px_+6,py_+26);}
      }
      if(!n.unlocked&&can&&sp>=n.cost){
        ctx.fillStyle='rgba(76,175,80,0.85)';rr(ctx,px_+pw-52,py_+ph-24,45,20,4);ctx.fill();
        ctx.fillStyle='#fff';ctx.font='bold 10px sans-serif';ctx.textAlign='center';ctx.fillText('解放',px_+pw-30,py_+ph-10);
      } else if(!n.unlocked&&can){
        ctx.fillStyle='#e57373';ctx.font='10px sans-serif';ctx.textAlign='right';ctx.fillText(`${n.cost}SP要`,px_+pw-6,py_+ph-10);
      } else if(!n.unlocked){
        ctx.fillStyle='#666';ctx.font='10px sans-serif';ctx.textAlign='right';ctx.fillText(`${n.cost}SP`,px_+pw-6,py_+ph-10);
      }
    }
  }
  ctx.restore();
}

function rr(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();}

// Input
function getP(e){const r=C.getBoundingClientRect();const t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top};}
let ts=0,tm_=false;
function pinchDist(e){const t=e.touches;if(t.length<2)return 0;return Math.hypot(t[0].clientX-t[1].clientX,t[0].clientY-t[1].clientY);}
let pinching=false;
C.addEventListener('touchstart',e=>{e.preventDefault();if(ac.state==='suspended')ac.resume();
  if(e.touches.length===2&&state!==ST.TITLE){
    pinching=true;gs.pinchDist=pinchDist(e);gs.zoomStart=gs.zoom;tm_=true;return;
  }
  const p=getP(e);ts=Date.now();tm_=false;if(state===ST.TITLE)return;
  if(p.y>GRID_Y){gs.drag=true;gs.sx=p.x;gs.sy=p.y;gs.ox=gs.x;gs.oy=gs.y;}
},{passive:false});
C.addEventListener('touchmove',e=>{e.preventDefault();
  if(pinching&&e.touches.length===2){
    const d=pinchDist(e);if(gs.pinchDist>0){
      gs.zoom=Math.max(0.15,Math.min(4,gs.zoomStart*(d/gs.pinchDist)));
      posGrid();
    }
    return;
  }
  const p=getP(e);if(gs.drag){const dx=p.x-gs.sx,dy=p.y-gs.sy;if(Math.abs(dx)>5||Math.abs(dy)>5)tm_=true;gs.x=gs.ox+dx;gs.y=gs.oy+dy;}
},{passive:false});
C.addEventListener('touchend',e=>{e.preventDefault();
  if(pinching){if(e.touches.length<2)pinching=false;return;}
  gs.drag=false;if(state===ST.TITLE){startG();return;}
  if(!tm_&&Date.now()-ts<300){const r=C.getBoundingClientRect();if(e.changedTouches&&e.changedTouches[0]){const p={x:e.changedTouches[0].clientX-r.left,y:e.changedTouches[0].clientY-r.top};if(p.y>GRID_Y)gridTap(p);}}
},{passive:false});
C.addEventListener('wheel',e=>{if(state===ST.TITLE)return;e.preventDefault();
  gs.zoom=Math.max(0.15,Math.min(4,gs.zoom*(e.deltaY>0?0.9:1.1)));posGrid();
},{passive:false});
C.addEventListener('click',e=>{const p=getP(e);if(state===ST.TITLE){startG();return;}if(p.y>GRID_Y)gridTap(p);});

function startG(){state=ST.PLAY;buildGrid();resize();initRun();}

function gridTap(pos){
  const ox=gs.x,oy=gs.y;
  if(selN!==null){
    const n=gN[selN];
    if(!n.unlocked&&canUL(n.id)&&sp>=n.cost){
      const iS=n.type==='skill',pw=iS?190:140,ph=iS?55:40;
      const px_=Math.max(8,Math.min(W-pw-8,n.x+ox-pw/2));
      const py_=Math.min(GRID_Y+GRID_H-ph-8,Math.max(GRID_Y+4,n.y+oy+(iS?30:20)));
      if(pos.x>px_+pw-52&&pos.x<px_+pw-7&&pos.y>py_+ph-24&&pos.y<py_+ph-4){unlockN(n);selN=null;return;}
    }
  }
  for(const n of gN){
    const nx=n.x+ox,ny=n.y+oy;
    if(Math.hypot(pos.x-nx,pos.y-ny)<(n.type==='skill'?24:18)){
      if(selN===n.id){
        if(!n.unlocked&&canUL(n.id)&&sp>=n.cost)unlockN(n);
        selN=null;
      } else {
        selN=n.id;
      }
      return;
    }
  }
  selN=null;
}

// Loop
function loop(){
  if(state===ST.TITLE)drawTitle();
  else if(state===ST.CAST){updCast();drawCast();}
  else{updRun();drawRun();drawHUD(false);drawGrid_();}
  requestAnimationFrame(loop);
}
resize();loop();
</script>
