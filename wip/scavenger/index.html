<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>スカベンジャー - ローグライクダンジョン</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
body{background:#0a0a1a;color:#e0e0e0;font-family:'Segoe UI',sans-serif;display:flex;justify-content:center;overflow:hidden;height:100vh;height:100dvh}
#app{width:100%;max-width:460px;height:100vh;height:100dvh;display:flex;flex-direction:column;background:#1a1a2e;position:relative}
.status-bar{padding:4px 8px;background:#12122a;font-size:12px;line-height:1.6;border-bottom:1px solid #2a2a4e;flex-shrink:0}
.status-row{display:flex;justify-content:space-between;gap:4px}
.status-row span{white-space:nowrap}
.hp-bar-wrap{width:60px;height:10px;background:#333;border-radius:3px;display:inline-block;vertical-align:middle}
.hp-bar{height:100%;background:#e74c3c;border-radius:3px;transition:width .2s}
.map-container{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;min-height:0}
.map-viewport{position:relative;overflow:hidden}
.map-grid{display:grid;position:absolute}
.tile{width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:16px;position:relative}
.tile-wall{background:#2a2a3e;border:1px solid #1f1f35}
.tile-floor{background:#1a1a2e}
.tile-floor::after{content:'·';color:#2a2a3e;font-size:10px;position:absolute}
.tile-stairs{background:#2a1a3e;color:#a855f7;font-size:18px}
.tile-exit{background:#1a2a1e;color:#22c55e;font-size:18px}
.tile-dark{background:#000}
.tile-dim{opacity:.35}
.tile .entity{position:absolute;font-size:18px;z-index:2}
.tile .item-icon{position:absolute;font-size:14px;z-index:1}
.float-dmg{position:absolute;font-size:12px;font-weight:bold;z-index:10;pointer-events:none;animation:floatUp .8s ease-out forwards}
@keyframes floatUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-24px)}}
.log-bar{padding:4px 8px;font-size:11px;background:#12122a;border-top:1px solid #2a2a4e;min-height:24px;flex-shrink:0;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.controls{padding:8px;background:#12122a;border-top:1px solid #2a2a4e;flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:16px}
.dpad{display:grid;grid-template-columns:52px 52px 52px;grid-template-rows:52px 52px;gap:2px}
.dpad button{width:52px;height:52px;border:1px solid #3a3a5e;background:#222244;color:#e0e0e0;font-size:20px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:manipulation}
.dpad button:active{background:#3a3a6e}
.bag-btn{width:56px;height:56px;border:1px solid #3a3a5e;background:#2a2244;color:#e0e0e0;font-size:28px;border-radius:50%;cursor:pointer;touch-action:manipulation;display:flex;align-items:center;justify-content:center}
.bag-btn:active{background:#4a3a6e}
.overlay{position:absolute;inset:0;background:rgba(10,10,26,.75);z-index:20;display:flex;flex-direction:column;overflow-y:auto;backdrop-filter:blur(2px)}
.overlay .status-bar{background:#12122aee;flex-shrink:0;transition:background .15s}
.overlay .status-bar.dmg-flash{background:#e74c3c55;animation:dmgPulse .4s ease-out}
@keyframes dmgPulse{0%{background:rgba(231,76,60,.4)}100%{background:rgba(18,18,42,.93)}}
.overlay-header{padding:8px 12px;display:flex;justify-content:space-between;align-items:center;font-size:16px;border-bottom:1px solid #2a2a4e}
.overlay-header button{background:none;border:1px solid #555;color:#e0e0e0;padding:4px 10px;border-radius:4px;font-size:14px;cursor:pointer}
.inv-section{padding:8px 12px}
.inv-grid{display:inline-grid;border:1px solid #3a3a5e;background:#111128;gap:0}
.inv-cell{width:38px;height:38px;border:1px solid #2a2a4e;position:relative;cursor:pointer}
.inv-cell.occupied{border-color:#4a4a6e}
.inv-cell.preview-ok .preview-shape{position:absolute;inset:0;background:rgba(34,197,94,.35);border-radius:2px;pointer-events:none}
.inv-cell.preview-bad .preview-shape{position:absolute;inset:0;background:rgba(239,68,68,.35);border-radius:2px;pointer-events:none}
.inv-cell.preview-ok{background:rgba(34,197,94,.25);border-color:#22c55e}
.inv-cell.preview-bad{background:rgba(239,68,68,.25);border-color:#ef4444}
.inv-cell .item-in-cell{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:18px;pointer-events:none}
.inv-cell.selected{border-color:#f59e0b;box-shadow:0 0 4px #f59e0b}
.item-actions{display:flex;gap:6px;flex-wrap:wrap;padding:4px 0}
.item-actions button{padding:6px 10px;background:#222244;border:1px solid #3a3a5e;color:#e0e0e0;border-radius:4px;font-size:13px;cursor:pointer}
.item-actions button:active{background:#3a3a6e}
.warn-turns{color:#f59e0b;font-size:12px;padding:4px 12px}
.loot-section{padding:8px 12px;border-bottom:1px solid #2a2a4e}
.loot-grid{display:inline-grid;grid-template-columns:repeat(3,38px);border:1px solid #3a3a5e;background:#1a1122;gap:0}
.loot-cell{width:38px;height:38px;border:1px solid #2a2a3e;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer}
.loot-cell.selected{border-color:#f59e0b;box-shadow:0 0 4px #f59e0b}
.title-screen{position:absolute;inset:0;background:#1a1a2e;z-index:30;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.title-screen h1{font-size:28px;color:#a855f7}
.title-screen p{font-size:14px;color:#888;text-align:center;padding:0 20px}
.title-screen button{padding:12px 32px;font-size:18px;background:#7c3aed;border:none;color:#fff;border-radius:8px;cursor:pointer}
.title-screen button:active{background:#6d28d9}
.base-screen{position:absolute;inset:0;background:#1a1a2e;z-index:25;display:flex;flex-direction:column;padding:16px;gap:12px;overflow-y:auto}
.base-screen h2{font-size:20px;color:#a855f7;text-align:center}
.base-section{background:#12122a;border:1px solid #2a2a4e;border-radius:8px;padding:12px}
.base-section h3{font-size:14px;color:#888;margin-bottom:8px}
.shop-item{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #1a1a2e}
.shop-item button{padding:4px 12px;background:#222244;border:1px solid #3a3a5e;color:#e0e0e0;border-radius:4px;font-size:12px;cursor:pointer}
.shop-item button:disabled{opacity:.4;cursor:default}
.base-btn{padding:12px;font-size:16px;background:#7c3aed;border:none;color:#fff;border-radius:8px;cursor:pointer;text-align:center}
.base-btn:active{background:#6d28d9}
.sell-items{display:flex;flex-wrap:wrap;gap:6px}
.sell-item{padding:4px 8px;background:#222244;border:1px solid #3a3a5e;border-radius:4px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:4px}
.game-over{position:absolute;inset:0;background:rgba(10,10,26,.95);z-index:28;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.game-over h2{font-size:24px;color:#e74c3c}
.game-over p{color:#888;font-size:14px;text-align:center;padding:0 20px}
.game-over button{padding:10px 24px;font-size:16px;background:#7c3aed;border:none;color:#fff;border-radius:8px;cursor:pointer}
.rotate-btn{padding:6px 12px;background:#222244;border:1px solid #3a3a5e;color:#e0e0e0;border-radius:4px;font-size:13px;cursor:pointer;margin:4px 12px}
.home-section{background:#12122a;border:1px solid #2a2a4e;border-radius:8px;padding:12px}
.home-section h3{font-size:14px;color:#888;margin-bottom:8px}
.storage-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:12px;color:#888}
.storage-bar-bg{height:6px;background:#333;border-radius:3px;flex:1;margin-left:8px;overflow:hidden}
.storage-bar-fg{height:100%;background:#7c3aed;border-radius:3px;transition:width .2s}
.storage-list{display:flex;flex-direction:column;gap:4px;max-height:200px;overflow-y:auto}
.storage-item{display:flex;justify-content:space-between;align-items:center;padding:6px 8px;background:#1a1a2e;border:1px solid #2a2a4e;border-radius:4px;font-size:13px}
.storage-item .si-info{display:flex;align-items:center;gap:6px}
.storage-item .si-slots{color:#888;font-size:11px}
.storage-item button{padding:4px 10px;background:#222244;border:1px solid #3a3a5e;color:#e0e0e0;border-radius:4px;font-size:12px;cursor:pointer}
.storage-item button:active{background:#3a3a6e}
.storage-empty{color:#555;font-size:12px;text-align:center;padding:12px}
.storage-place-screen{position:absolute;inset:0;background:#1a1a2e;z-index:25;display:flex;flex-direction:column;overflow-y:auto}
.base-tabs{display:flex;gap:0;border-bottom:1px solid #2a2a4e;flex-shrink:0}
.base-tab{flex:1;padding:10px 8px;text-align:center;font-size:13px;background:#12122a;color:#888;cursor:pointer;border:none;border-bottom:2px solid transparent}
.base-tab.active{color:#a855f7;border-bottom-color:#a855f7;background:#1a1a2e}
.base-tab:active{background:#222244}
.item-preview-modal{position:absolute;inset:0;background:rgba(10,10,26,.95);z-index:22;display:flex;align-items:center;justify-content:center}
.item-preview-card{background:#1e1e3a;border:1px solid #3a3a5e;border-radius:12px;padding:16px;width:280px;max-width:90%;display:flex;flex-direction:column;gap:10px}
.item-preview-card .ipv-header{display:flex;align-items:center;gap:10px;font-size:18px}
.item-preview-card .ipv-header .ipv-icon{font-size:32px}
.item-preview-card .ipv-header .ipv-name{font-weight:bold;color:#e0e0e0}
.ipv-shape-grid{display:inline-grid;gap:1px;justify-self:center;margin:4px auto}
.ipv-shape-cell{width:22px;height:22px;border-radius:2px}
.ipv-shape-cell.filled{background:#7c3aed;border:1px solid #a855f7}
.ipv-shape-cell.empty{background:transparent}
.ipv-details{font-size:13px;color:#aaa;display:flex;flex-direction:column;gap:4px}
.ipv-details .ipv-effect{color:#22c55e}
.ipv-details .ipv-value{color:#f59e0b}
.ipv-details .ipv-rarity{font-size:11px;text-transform:uppercase;letter-spacing:1px}
.ipv-buttons{display:flex;gap:8px;justify-content:center;margin-top:4px}
.ipv-buttons button{flex:1;padding:10px;font-size:15px;border:none;border-radius:6px;cursor:pointer;color:#fff}
.ipv-buttons .ipv-pickup{background:#7c3aed}
.ipv-buttons .ipv-pickup:active{background:#6d28d9}
.ipv-buttons .ipv-ignore{background:#333;border:1px solid #555}
.ipv-buttons .ipv-ignore:active{background:#444}
.loot-item-info{display:flex;align-items:center;gap:6px;padding:2px 8px;font-size:11px;color:#aaa}
.loot-item-info .loot-shape-mini{display:inline-grid;gap:1px}
.loot-shape-mini-cell{width:10px;height:10px;border-radius:1px}
.loot-shape-mini-cell.filled{background:#7c3aed}
.loot-shape-mini-cell.empty{background:transparent}
.item-detail-panel{background:#1e1e3a;border:1px solid #3a3a5e;border-radius:10px;margin:4px 12px;padding:12px;display:flex;flex-direction:column;gap:8px}
.item-detail-panel .idp-header{display:flex;align-items:center;gap:10px;font-size:16px}
.item-detail-panel .idp-icon{font-size:28px}
.item-detail-panel .idp-name{font-weight:bold;color:#e0e0e0}
.item-detail-panel .idp-rarity{font-size:10px;text-transform:uppercase;letter-spacing:1px;padding:2px 6px;border-radius:3px;background:rgba(255,255,255,.08)}
.item-detail-panel .idp-info{font-size:12px;color:#aaa;display:flex;flex-direction:column;gap:4px}
.item-detail-panel .idp-info .idp-effect{color:#22c55e;font-size:13px}
.item-detail-panel .idp-info .idp-equipped{color:#f59e0b;font-size:12px}
.item-detail-panel .idp-info .idp-value{color:#f59e0b}
.item-detail-panel .idp-actions{display:flex;gap:6px;margin-top:2px}
.item-detail-panel .idp-actions button{flex:1;padding:8px;font-size:13px;border:none;border-radius:6px;cursor:pointer;color:#fff}
.item-detail-panel .idp-actions .idp-use{background:#2e7d32}
.item-detail-panel .idp-actions .idp-use:active{background:#1b5e20}
.item-detail-panel .idp-actions .idp-drop{background:#444;border:1px solid #666}
.item-detail-panel .idp-actions .idp-drop:active{background:#555}
.item-detail-panel .idp-actions .idp-close{background:#333;border:1px solid #555}
.item-detail-panel .idp-actions .idp-close:active{background:#444}
</style>
</head>
<body>
<div id="app">
<div class="title-screen" id="titleScreen">
<h1>🏚️ スカベンジャー</h1>
<p>ローグライク × テトリスインベントリ<br>廃墟ダンジョンを探索し、アイテムを持ち帰れ！<br><br>⚠️ バックパック操作中もターンが進行する！</p>
<button onclick="startNewGame()">はじめる</button>
<button onclick="loadGame()" style="background:#333;font-size:14px;padding:8px 24px;margin-top:-4px">つづきから</button>
</div>
</div>
<script>
'use strict';
// ═══════════════════════════════════════
// CONSTANTS & DATA
// ═══════════════════════════════════════
const MW=30,MH=25,VW=13,VH=9,CELL=28,FOV_R=6;
const WALL=0,FLOOR=1,STAIRS=2,EXIT=3;
const ENEMY_TYPES={
rat:{name:'ネズミ',icon:'🐀',hp:15,atk:5,def:0,exp:3,loot:['bandage','battery'],level:1},
dog:{name:'野犬',icon:'🐺',hp:25,atk:8,def:1,exp:5,loot:['cannedfood','bandage','bolt'],level:1},
thug:{name:'チンピラ',icon:'👤',hp:40,atk:12,def:3,exp:10,loot:['knife','ammo','flashlight'],level:2},
bandit:{name:'盗賊',icon:'🔫',hp:60,atk:16,def:5,exp:18,loot:['rifle','medkit','compass'],level:3},
soldier:{name:'武装兵',icon:'🎖️',hp:80,atk:22,def:8,exp:30,loot:['rifle','electronics','radio'],level:4},
robot:{name:'警備ロボ',icon:'🤖',hp:120,atk:28,def:12,exp:50,loot:['goldbar','document','electronics'],level:5},
};
const ITEMS={
bandage:{name:'包帯',icon:'🩹',shape:[[1,1]],value:15,usable:true,heal:20},
medkit:{name:'医療キット',icon:'💊',shape:[[1,1],[1,0]],value:60,usable:true,heal:50},
cannedfood:{name:'缶詰',icon:'🥫',shape:[[1],[1]],value:20,usable:true,food:30},
water:{name:'水筒',icon:'🧴',shape:[[1],[1]],value:15,usable:true,food:15},
battery:{name:'電池',icon:'🔋',shape:[[1]],value:10},
bolt:{name:'ボルト',icon:'🔩',shape:[[1]],value:5},
knife:{name:'ナイフ',icon:'🔪',shape:[[1],[1],[1]],value:40,weapon:true,atkBonus:7},
ammo:{name:'弾薬',icon:'🎯',shape:[[1,1]],value:25},
flashlight:{name:'懐中電灯',icon:'🔦',shape:[[1],[1]],value:30},
rifle:{name:'ライフル',icon:'🔫',shape:[[1,1,1],[0,1,0]],value:120,weapon:true,atkBonus:15,needsAmmo:true},
compass:{name:'コンパス',icon:'🧭',shape:[[1,1],[1,0]],value:45},
electronics:{name:'電子部品',icon:'💾',shape:[[1,1],[1,1]],value:80},
radio:{name:'無線機',icon:'📻',shape:[[1,1],[0,1]],value:90},
goldbar:{name:'金塊',icon:'🥇',shape:[[1,1],[1,1]],value:200},
document:{name:'機密文書',icon:'📄',shape:[[1,1,1]],value:150},
};
const FLOOR_ENEMIES={
1:['rat','dog'],2:['rat','dog'],3:['rat','dog','thug'],4:['dog','thug'],
5:['thug','bandit'],6:['thug','bandit'],7:['bandit','soldier'],8:['bandit','soldier'],
9:['soldier','robot'],10:['robot'],
};
const FLOOR_ITEMS_POOL={
1:['bandage','battery','bolt','water','cannedfood'],
2:['bandage','battery','bolt','water','cannedfood'],
3:['bandage','cannedfood','flashlight','ammo','bolt'],
4:['bandage','cannedfood','flashlight','ammo','knife'],
5:['medkit','ammo','knife','compass','flashlight'],
6:['medkit','ammo','knife','compass','electronics'],
7:['medkit','ammo','rifle','compass','electronics'],
8:['medkit','ammo','rifle','radio','electronics'],
9:['medkit','rifle','radio','electronics','goldbar'],
10:['medkit','rifle','radio','document','goldbar'],
};

// ═══════════════════════════════════════
// GAME STATE
// ═══════════════════════════════════════
let player={x:0,y:0,hp:100,maxHp:100,atk:8,def:2,level:1,exp:0,fullness:100,money:0,floor:1,turnCount:0};
let map=[], seen=[], enemies=[], mapItems=[], lootBags=[];
let inventory=[], invW=6, invH=4;
let rooms=[];
let gameState='title'; // title, dungeon, base, dead, inventory, looting
let logMsg='';
let bagExpansions=0, armorUpgrade=0, hasDetector=false;
// Base stats (permanent, persist across dungeon runs)
let baseMaxHp=100, baseAtk=8, baseDef=2;
// Storage box (home)
let storageBox=[]; // [{itemId},...] — simple list, no tetris
let storageCapacity=20; // slots (each item costs its cell count)
let storageExpansions=0;
let baseTab='home'; // 'home' | 'shop'
let storagePlaceMode=false; // when taking from storage, placing in bag
let selectedInvItem=null, selectedLootItem=null, invRotation=0;
let currentLootBag=null;
let pendingFloorItem=null; // {itemId, mapItemIdx} — item on floor awaiting pickup/ignore decision
let pendingLootItem=null; // {itemId, lootIdx} — loot bag item awaiting preview decision
let relocatingItem=null; // {itemId, cells, rot, invIdx} — item being relocated (original position for cancel)
let floorPickupItemId=null; // itemId if current selectedLootItem came from a floor pickup (for return-to-floor)
let audioCtx=null;
let floatingDmgs=[];
let overlayDmgFlash=false;
let lastDpadTime=0;
const DPAD_DEBOUNCE_MS=150;

// ═══════════════════════════════════════
// AUDIO
// ═══════════════════════════════════════
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()}
function playSound(type){
  if(!audioCtx)return;
  try{
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.connect(g);g.connect(audioCtx.destination);
  const t=audioCtx.currentTime;
  g.gain.setValueAtTime(0.15,t);
  switch(type){
    case'move':o.frequency.setValueAtTime(200,t);o.frequency.setValueAtTime(150,t+.03);g.gain.setValueAtTime(.08,t);g.gain.linearRampToValueAtTime(0,t+.06);o.start(t);o.stop(t+.06);break;
    case'hit':o.type='sawtooth';o.frequency.setValueAtTime(300,t);o.frequency.linearRampToValueAtTime(100,t+.12);g.gain.linearRampToValueAtTime(0,t+.12);o.start(t);o.stop(t+.12);break;
    case'hurt':o.type='sawtooth';o.frequency.setValueAtTime(150,t);o.frequency.linearRampToValueAtTime(80,t+.15);g.gain.linearRampToValueAtTime(0,t+.2);o.start(t);o.stop(t+.2);break;
    case'kill':o.type='square';o.frequency.setValueAtTime(400,t);o.frequency.linearRampToValueAtTime(60,t+.3);g.gain.linearRampToValueAtTime(0,t+.3);o.start(t);o.stop(t+.3);break;
    case'pickup':o.type='sine';o.frequency.setValueAtTime(500,t);o.frequency.setValueAtTime(700,t+.08);g.gain.linearRampToValueAtTime(0,t+.15);o.start(t);o.stop(t+.15);break;
    case'levelup':o.type='sine';o.frequency.setValueAtTime(400,t);o.frequency.setValueAtTime(500,t+.1);o.frequency.setValueAtTime(600,t+.2);o.frequency.setValueAtTime(800,t+.3);g.gain.linearRampToValueAtTime(0,t+.4);o.start(t);o.stop(t+.4);break;
    case'stairs':o.type='triangle';o.frequency.setValueAtTime(400,t);o.frequency.linearRampToValueAtTime(200,t+.3);g.gain.linearRampToValueAtTime(0,t+.4);o.start(t);o.stop(t+.4);break;
    default:o.frequency.setValueAtTime(220,t);g.gain.linearRampToValueAtTime(0,t+.1);o.start(t);o.stop(t+.1);
  }}catch(e){}
}

// ═══════════════════════════════════════
// MAP GENERATION (BSP)
// ═══════════════════════════════════════
function generateMap(floorNum){
  map=[];seen=[];enemies=[];mapItems=[];lootBags=[];rooms=[];
  for(let y=0;y<MH;y++){map[y]=[];seen[y]=[];for(let x=0;x<MW;x++){map[y][x]=WALL;seen[y][x]=false;}}
  // BSP
  const leaves=[];
  function splitBSP(x,y,w,h,depth){
    if(depth>=3||w<9||h<7){leaves.push({x,y,w,h});return;}
    const horiz=w>h?false:h>w?true:Math.random()<.5;
    if(horiz&&h>=14){const sp=y+Math.floor(h*.3)+Math.floor(Math.random()*Math.floor(h*.4));splitBSP(x,y,w,sp-y,depth+1);splitBSP(x,sp,w,h-(sp-y),depth+1);}
    else if(!horiz&&w>=16){const sp=x+Math.floor(w*.3)+Math.floor(Math.random()*Math.floor(w*.4));splitBSP(x,y,sp-x,h,depth+1);splitBSP(sp,y,w-(sp-x),h,depth+1);}
    else leaves.push({x,y,w,h});
  }
  splitBSP(1,1,MW-2,MH-2,0);
  // Place rooms in leaves
  for(const lf of leaves){
    const rw=Math.min(lf.w-2,4+Math.floor(Math.random()*5));
    const rh=Math.min(lf.h-2,3+Math.floor(Math.random()*4));
    const rx=lf.x+1+Math.floor(Math.random()*(lf.w-rw-2));
    const ry=lf.y+1+Math.floor(Math.random()*(lf.h-rh-2));
    const room={x:rx,y:ry,w:rw,h:rh,cx:Math.floor(rx+rw/2),cy:Math.floor(ry+rh/2)};
    rooms.push(room);
    for(let dy=0;dy<rh;dy++)for(let dx=0;dx<rw;dx++)map[ry+dy][rx+dx]=FLOOR;
  }
  // Connect rooms with corridors
  for(let i=1;i<rooms.length;i++){
    const a=rooms[i-1],b=rooms[i];
    let cx=a.cx,cy=a.cy;
    while(cx!==b.cx){cx+=cx<b.cx?1:-1;if(cy>=0&&cy<MH&&cx>=0&&cx<MW)map[cy][cx]=FLOOR;}
    while(cy!==b.cy){cy+=cy<b.cy?1:-1;if(cy>=0&&cy<MH&&cx>=0&&cx<MW)map[cy][cx]=FLOOR;}
  }
  // Place stairs in last room, exit in first
  const lastR=rooms[rooms.length-1];
  map[lastR.cy][lastR.cx]=STAIRS;
  const firstR=rooms[0];
  map[firstR.cy][firstR.cx]=EXIT;
  // Player start
  player.x=firstR.x+1;player.y=firstR.y+1;
  if(map[player.y][player.x]===WALL){player.x=firstR.cx;player.y=firstR.cy+1;if(player.y>=MH||map[player.y][player.x]===WALL){player.y=firstR.cy;player.x=firstR.cx+1;}}
  // Items
  const pool=FLOOR_ITEMS_POOL[Math.min(floorNum,10)]||FLOOR_ITEMS_POOL[10];
  const itemCount=3+Math.floor(Math.random()*6);
  for(let i=0;i<itemCount;i++){
    const room=rooms[Math.floor(Math.random()*rooms.length)];
    const ix=room.x+Math.floor(Math.random()*room.w);
    const iy=room.y+Math.floor(Math.random()*room.h);
    if(map[iy][ix]===FLOOR&&!(ix===player.x&&iy===player.y)){
      const itemId=pool[Math.floor(Math.random()*pool.length)];
      mapItems.push({x:ix,y:iy,itemId});
    }
  }
  // Enemies (not in first room)
  const ePool=FLOOR_ENEMIES[Math.min(floorNum,10)]||FLOOR_ENEMIES[10];
  const eCount=3+Math.floor(Math.random()*4);
  for(let i=0;i<eCount;i++){
    const rIdx=1+Math.floor(Math.random()*(rooms.length-1));
    const room=rooms[rIdx]||rooms[rooms.length-1];
    const ex=room.x+Math.floor(Math.random()*room.w);
    const ey=room.y+Math.floor(Math.random()*room.h);
    if(map[ey][ex]===FLOOR&&!(ex===player.x&&ey===player.y)){
      const type=ePool[Math.floor(Math.random()*ePool.length)];
      const et=ENEMY_TYPES[type];
      enemies.push({x:ex,y:ey,type,name:et.name,icon:et.icon,hp:et.hp,maxHp:et.hp,atk:et.atk,def:et.def,exp:et.exp,loot:et.loot});
    }
  }
}

// ═══════════════════════════════════════
// FOV (simple distance + wall check)
// ═══════════════════════════════════════
function isVisible(px,py,tx,ty){
  const dx=tx-px,dy=ty-py;
  const dist=Math.sqrt(dx*dx+dy*dy);
  if(dist>FOV_R)return false;
  // Bresenham line check
  const steps=Math.max(Math.abs(dx),Math.abs(dy));
  if(steps===0)return true;
  for(let i=1;i<steps;i++){
    const cx=Math.round(px+dx*i/steps);
    const cy=Math.round(py+dy*i/steps);
    if(cx>=0&&cx<MW&&cy>=0&&cy<MH&&map[cy][cx]===WALL)return false;
  }
  return true;
}
function updateFOV(){
  for(let dy=-FOV_R;dy<=FOV_R;dy++){
    for(let dx=-FOV_R;dx<=FOV_R;dx++){
      const tx=player.x+dx,ty=player.y+dy;
      if(tx>=0&&tx<MW&&ty>=0&&ty<MH&&isVisible(player.x,player.y,tx,ty))seen[ty][tx]=true;
    }
  }
}

// ═══════════════════════════════════════
// INVENTORY SYSTEM
// ═══════════════════════════════════════
function getRotatedShape(shape,rot){
  let s=shape.map(r=>[...r]);
  for(let r=0;r<(rot%4);r++){
    const rows=s.length,cols=s[0].length;
    const ns=[];
    for(let c=0;c<cols;c++){ns[c]=[];for(let rr=rows-1;rr>=0;rr--)ns[c].push(s[rr][c]);}
    s=ns;
  }
  return s;
}
function canPlace(itemId,gx,gy,rot){
  const shape=getRotatedShape(ITEMS[itemId].shape,rot);
  for(let r=0;r<shape.length;r++){
    for(let c=0;c<shape[r].length;c++){
      if(!shape[r][c])continue;
      const cx=gx+c,cy=gy+r;
      if(cx<0||cx>=invW||cy<0||cy>=invH)return false;
      if(inventory.some(it=>it.cells.some(cl=>cl[0]===cx&&cl[1]===cy)))return false;
    }
  }
  return true;
}
function placeItem(itemId,gx,gy,rot){
  const shape=getRotatedShape(ITEMS[itemId].shape,rot);
  const cells=[];
  for(let r=0;r<shape.length;r++)for(let c=0;c<shape[r].length;c++)if(shape[r][c])cells.push([gx+c,gy+r]);
  inventory.push({itemId,cells,rot});
  return true;
}
function removeInvItem(idx){inventory.splice(idx,1);}
function hasItem(itemId){return inventory.some(it=>it.itemId===itemId);}
function countItem(itemId){return inventory.filter(it=>it.itemId===itemId).length;}
function consumeItem(itemId){
  const idx=inventory.findIndex(it=>it.itemId===itemId);
  if(idx>=0){inventory.splice(idx,1);return true;}return false;
}
function getPlayerAtk(){
  let a=player.atk;
  if(hasItem('knife'))a+=7;
  if(hasItem('rifle')&&countItem('ammo')>0)a+=15;
  a+=armorUpgrade>0?0:0; // armor is defense
  return a;
}
function getPlayerDef(){return player.def+(armorUpgrade*5);}

// ═══════════════════════════════════════
// TURN PROCESSING
// ═══════════════════════════════════════
function processTurn(){
  player.turnCount++;
  // HP regen / fullness
  if(player.fullness>0){
    if(player.turnCount%5===0&&player.hp<player.maxHp)player.hp++;
  }else{
    player.hp--;
    if(player.hp<=0){playerDeath();return;}
  }
  if(player.turnCount%10===0&&player.fullness>0)player.fullness--;
  // Loot bag decay
  lootBags=lootBags.filter(b=>(player.turnCount-b.turnPlaced)<30);
  // Enemy AI
  processEnemies();
  // Level up check (dungeon-only bonuses — reset on return to base)
  while(player.exp>=player.level*20){
    player.exp-=player.level*20;
    player.level++;
    player.maxHp+=10;player.hp=Math.min(player.hp+10,player.maxHp);
    player.atk+=2;player.def+=1;
    logMsg=`レベルアップ！ Lv${player.level}（ダンジョン内のみ有効）`;
    playSound('levelup');
  }
  updateFOV();
}
function processEnemies(){
  for(const e of enemies){
    if(e.hp<=0)continue;
    const dx=player.x-e.x,dy=player.y-e.y;
    const dist=Math.abs(dx)+Math.abs(dy);
    // Adjacent? Attack
    if(dist===1){
      const dmg=Math.max(1,e.atk-getPlayerDef()+Math.floor(Math.random()*5)-2);
      player.hp-=dmg;
      addFloatDmg(player.x,player.y,dmg,'#e74c3c');
      playSound('hurt');
      logMsg=`${e.name}から${dmg}ダメージ！`;
      // Keep bag open but flash the status bar to alert player
      if(gameState==='inventory'||gameState==='looting'){
        overlayDmgFlash=true;
      }
      if(player.hp<=0){playerDeath();return;}
      continue;
    }
    // Can see player? Chase
    const canSee=Math.sqrt(dx*dx+dy*dy)<=6&&isVisible(e.x,e.y,player.x,player.y);
    if(canSee){
      // Move toward player
      const mx=dx===0?0:(dx>0?1:-1);
      const my=dy===0?0:(dy>0?1:-1);
      // Prefer axis with larger distance
      let moved=false;
      if(Math.abs(dx)>=Math.abs(dy)){
        if(tryMoveEnemy(e,mx,0))moved=true;
        else if(my!==0&&tryMoveEnemy(e,0,my))moved=true;
      }else{
        if(tryMoveEnemy(e,0,my))moved=true;
        else if(mx!==0&&tryMoveEnemy(e,mx,0))moved=true;
      }
    }else{
      // Wander
      if(Math.random()<.5){
        const dirs=[[0,-1],[0,1],[-1,0],[1,0]];
        const d=dirs[Math.floor(Math.random()*4)];
        tryMoveEnemy(e,d[0],d[1]);
      }
    }
  }
}
function tryMoveEnemy(e,dx,dy){
  const nx=e.x+dx,ny=e.y+dy;
  if(nx<0||nx>=MW||ny<0||ny>=MH)return false;
  if(map[ny][nx]===WALL)return false;
  if(nx===player.x&&ny===player.y)return false;
  if(enemies.some(o=>o!==e&&o.hp>0&&o.x===nx&&o.y===ny))return false;
  e.x=nx;e.y=ny;return true;
}

function playerDeath(){
  gameState='dead';
  // Lose half inventory
  const removeCount=Math.floor(inventory.length/2);
  for(let i=0;i<removeCount;i++){
    const idx=Math.floor(Math.random()*inventory.length);
    inventory.splice(idx,1);
  }
  playSound('hurt');
  render();
}

// ═══════════════════════════════════════
// PLAYER ACTIONS
// ═══════════════════════════════════════
function movePlayer(dx,dy){
  if(gameState!=='dungeon')return;
  initAudio();
  const nx=player.x+dx,ny=player.y+dy;
  if(nx<0||nx>=MW||ny<0||ny>=MH)return;
  if(map[ny][nx]===WALL)return;
  // Enemy at target?
  const enemy=enemies.find(e=>e.hp>0&&e.x===nx&&e.y===ny);
  if(enemy){
    attackEnemy(enemy);
    processTurn();
    render();
    return;
  }
  player.x=nx;player.y=ny;
  playSound('move');
  // Check tile
  if(map[ny][nx]===STAIRS){
    player.floor++;
    logMsg=`${player.floor}階に降りた`;
    playSound('stairs');
    generateMap(player.floor);
    updateFOV();
    processTurn();
    render();
    return;
  }
  if(map[ny][nx]===EXIT){
    gameState='base';
    // シレン式: 拠点に戻ると基礎ステータスに戻る（レベルボーナス消失）
    player.level=1;player.exp=0;
    player.maxHp=baseMaxHp;player.atk=baseAtk;player.def=baseDef;
    player.hp=player.maxHp;player.fullness=100;
    logMsg='拠点に帰還した（ステータスリセット）';
    render();
    return;
  }
  // Item on floor?
  const itemIdx=mapItems.findIndex(i=>i.x===nx&&i.y===ny);
  if(itemIdx>=0){
    pickupFloorItem(itemIdx);
  }
  // Loot bag?
  const bagIdx=lootBags.findIndex(b=>b.x===nx&&b.y===ny);
  if(bagIdx>=0){
    openLootBag(bagIdx);
  }
  logMsg=logMsg||'移動';
  processTurn();
  render();
}
function waitTurn(){
  if(gameState!=='dungeon')return;
  initAudio();
  logMsg='待機';
  processTurn();
  render();
}
function attackEnemy(e){
  const totalAtk=getPlayerAtk();
  const dmg=Math.max(1,totalAtk-e.def+Math.floor(Math.random()*5)-2);
  e.hp-=dmg;
  addFloatDmg(e.x,e.y,dmg,'#22c55e');
  playSound('hit');
  logMsg=`${e.name}に${dmg}ダメージ！`;
  if(e.hp<=0){
    logMsg=`${e.name}を倒した！ +${e.exp}EXP`;
    player.exp+=e.exp;
    playSound('kill');
    // Consume ammo if rifle used
    if(hasItem('rifle')&&countItem('ammo')>0)consumeItem('ammo');
    // Drop loot bag
    const lootItems=[];
    const numLoot=1+Math.floor(Math.random()*2);
    for(let i=0;i<numLoot;i++){
      const lid=e.loot[Math.floor(Math.random()*e.loot.length)];
      lootItems.push(lid);
    }
    lootBags.push({x:e.x,y:e.y,items:lootItems,turnPlaced:player.turnCount});
  }
}
function addFloatDmg(tx,ty,dmg,color){
  floatingDmgs.push({x:tx,y:ty,dmg,color,t:Date.now()});
  setTimeout(()=>{floatingDmgs=floatingDmgs.filter(f=>Date.now()-f.t<800);render();},800);
}
function pickupFloorItem(idx){
  const mi=mapItems[idx];
  // Skip confirmation — go straight to inventory placement
  selectedLootItem=mi.itemId;
  floorPickupItemId=mi.itemId;
  mapItems.splice(idx,1);
  pendingFloorItem=null;
  gameState='inventory';
  invRotation=0;
  logMsg=`${ITEMS[mi.itemId].name}を拾った — 鞄に配置してください`;
  playSound('pickup');
}
function confirmPickupFloorItem(){
  if(!pendingFloorItem)return;
  const mi=mapItems[pendingFloorItem.mapItemIdx];
  if(!mi){pendingFloorItem=null;gameState='dungeon';render();return;}
  selectedLootItem=pendingFloorItem.itemId;
  floorPickupItemId=pendingFloorItem.itemId; // track that this came from the floor
  mapItems.splice(pendingFloorItem.mapItemIdx,1);
  pendingFloorItem=null;
  gameState='inventory';
  invRotation=0;
  logMsg=`${ITEMS[selectedLootItem].name}を拾った — 鞄に配置してください`;
  render();
}
function ignoreFloorItem(){
  if(!pendingFloorItem)return;
  logMsg=`${ITEMS[pendingFloorItem.itemId].name}を無視した`;
  pendingFloorItem=null;
  gameState='dungeon';
  render();
}
function openLootBag(idx){
  currentLootBag=lootBags[idx];
  lootBags.splice(idx,1);
  gameState='looting';
  selectedLootItem=null;
  selectedInvItem=null;
  invRotation=0;
  logMsg='ルートバッグを開いた';
}

// ═══════════════════════════════════════
// INVENTORY ACTIONS (each costs a turn)
// ═══════════════════════════════════════
function invPlaceAttempt(gx,gy){
  const itemId=selectedLootItem;
  if(!itemId)return;
  if(canPlace(itemId,gx,gy,invRotation)){
    placeItem(itemId,gx,gy,invRotation);
    selectedLootItem=null;
    floorPickupItemId=null; // successfully placed, clear floor tracker
    invRotation=0;
    playSound('pickup');
    logMsg=`${ITEMS[itemId].name}を配置した`;
    processTurn();
    // Keep bag open after placement (don't switch to dungeon)
    render();
  }
}
function returnItemToFloor(){
  if(!floorPickupItemId)return;
  mapItems.push({x:player.x,y:player.y,itemId:floorPickupItemId});
  logMsg=`${ITEMS[floorPickupItemId].name}を床に戻した`;
  floorPickupItemId=null;
  selectedLootItem=null;
  invRotation=0;
  gameState='dungeon';
  render();
}
function invLootPlaceAttempt(gx,gy){
  if(!selectedLootItem)return;
  if(canPlace(selectedLootItem,gx,gy,invRotation)){
    placeItem(selectedLootItem,gx,gy,invRotation);
    if(currentLootBag){
      const li=currentLootBag.items.indexOf(selectedLootItem);
      if(li>=0)currentLootBag.items.splice(li,1);
    }
    selectedLootItem=null;
    invRotation=0;
    playSound('pickup');
    processTurn();
    render();
  }
}
function useItem(itemId){
  const item=ITEMS[itemId];
  if(!item||!item.usable)return;
  if(item.heal){
    player.hp=Math.min(player.hp+item.heal,player.maxHp);
    logMsg=`${item.name}を使った！ HP+${item.heal}`;
  }
  if(item.food){
    player.fullness=Math.min(player.fullness+item.food,100);
    logMsg=`${item.name}を使った！ 満腹度+${item.food}`;
  }
  consumeItem(itemId);
  playSound('pickup');
  processTurn();
  render();
}
function rotateItem(){invRotation=(invRotation+1)%4;render();updatePreviewDOM();}
function toggleBag(){
  initAudio();
  if(gameState==='dungeon'){gameState='inventory';selectedLootItem=null;selectedInvItem=null;invRotation=0;previewOrigin=null;relocatingItem=null;}
  else if(gameState==='inventory'||gameState==='looting'||gameState==='loot_preview'){
    // Cancel any ongoing relocation
    if(relocatingItem){cancelRelocate();}
    // If a floor item was picked up but not placed, return it to the floor
    if(floorPickupItemId){
      mapItems.push({x:player.x,y:player.y,itemId:floorPickupItemId});
      logMsg=`${ITEMS[floorPickupItemId].name}を床に戻した`;
      floorPickupItemId=null;
    }
    gameState='dungeon';currentLootBag=null;selectedLootItem=null;selectedInvItem=null;pendingLootItem=null;previewOrigin=null;relocatingItem=null;
  }
  render();
}
function closeLoot(){
  // If a loot item was selected but not placed, put it back in the bag
  if(selectedLootItem&&currentLootBag){
    currentLootBag.items.push(selectedLootItem);
    selectedLootItem=null;
  }
  // Put remaining items back as a bag on player's tile
  if(currentLootBag&&currentLootBag.items.length>0){
    currentLootBag.x=player.x;currentLootBag.y=player.y;
    lootBags.push(currentLootBag);
  }
  currentLootBag=null;gameState='dungeon';selectedLootItem=null;render();
}
function dropInvItem(idx){
  const it=inventory[idx];
  mapItems.push({x:player.x,y:player.y,itemId:it.itemId});
  removeInvItem(idx);
  selectedInvItem=null;
  relocatingItem=null;
  processTurn();
  render();
}
function startRelocate(idx){
  const it=inventory[idx];
  // Save original position for cancel
  relocatingItem={itemId:it.itemId, cells:[...it.cells.map(c=>[...c])], rot:it.rot, invIdx:idx};
  // Remove from grid temporarily
  removeInvItem(idx);
  // Set as selected loot item for placement
  selectedLootItem=relocatingItem.itemId;
  invRotation=0;
  selectedInvItem=null;
  previewOrigin=null;
  logMsg=`${ITEMS[relocatingItem.itemId].name}を移動中...`;
  render();
}
function cancelRelocate(){
  if(!relocatingItem)return;
  // Restore item to original position
  const ri=relocatingItem;
  inventory.push({itemId:ri.itemId, cells:ri.cells, rot:ri.rot});
  relocatingItem=null;
  selectedLootItem=null;
  invRotation=0;
  previewOrigin=null;
  logMsg='移動をキャンセルした';
  render();
}
function completeRelocate(gx,gy){
  if(!relocatingItem)return false;
  if(canPlace(relocatingItem.itemId,gx,gy,invRotation)){
    placeItem(relocatingItem.itemId,gx,gy,invRotation);
    const itemName=ITEMS[relocatingItem.itemId].name;
    relocatingItem=null;
    selectedLootItem=null;
    invRotation=0;
    previewOrigin=null;
    playSound('pickup');
    logMsg=`${itemName}を再配置した`;
    processTurn();
    render();
    return true;
  }
  return false;
}

// ═══════════════════════════════════════
// BASE / SHOP
// ═══════════════════════════════════════
function sellItem(idx){
  const it=inventory[idx];
  const val=ITEMS[it.itemId].value;
  player.money+=val;
  removeInvItem(idx);
  playSound('pickup');
  render();
}
function buyUpgrade(type){
  switch(type){
    case'bag':if(player.money>=200&&bagExpansions<3){player.money-=200;bagExpansions++;invW=6;invH=4+bagExpansions;playSound('levelup');}break;
    case'armor':if(player.money>=300&&armorUpgrade<3){player.money-=300;armorUpgrade++;playSound('levelup');}break;
    case'detector':if(player.money>=500&&!hasDetector){player.money-=500;hasDetector=true;playSound('levelup');}break;
  }
  render();
}
// ═══════════════════════════════════════
// STORAGE BOX
// ═══════════════════════════════════════
function getItemCellCount(itemId){
  const item=ITEMS[itemId];
  return item.shape.reduce((s,r)=>s+r.filter(c=>c).length,0);
}
function getStorageUsed(){
  return storageBox.reduce((s,si)=>s+getItemCellCount(si.itemId),0);
}
function canStoreItem(itemId){
  return getStorageUsed()+getItemCellCount(itemId)<=storageCapacity;
}
function storeItemFromBag(invIdx){
  const it=inventory[invIdx];
  if(!canStoreItem(it.itemId)){logMsg='収納箱がいっぱいです！';render();return;}
  storageBox.push({itemId:it.itemId});
  removeInvItem(invIdx);
  selectedInvItem=null;
  playSound('pickup');
  logMsg=`${ITEMS[it.itemId].name}を収納箱に入れた`;
  render();
}
function takeItemFromStorage(storIdx){
  const si=storageBox[storIdx];
  // Enter placement mode — need to place in bag
  selectedLootItem=si.itemId;
  invRotation=0;
  storagePlaceMode=true;
  storageBox.splice(storIdx,1);
  gameState='storage_place';
  logMsg=`${ITEMS[si.itemId].name}を鞄に配置してください`;
  render();
}
function returnItemToStorage(){
  if(!storagePlaceMode||!selectedLootItem)return;
  storageBox.push({itemId:selectedLootItem});
  selectedLootItem=null;
  storagePlaceMode=false;
  invRotation=0;
  gameState='base';
  logMsg='アイテムを収納箱に戻した';
  render();
}
function storagePlaceAttempt(gx,gy){
  if(!selectedLootItem||!storagePlaceMode)return;
  if(canPlace(selectedLootItem,gx,gy,invRotation)){
    placeItem(selectedLootItem,gx,gy,invRotation);
    logMsg=`${ITEMS[selectedLootItem].name}を鞄に入れた`;
    selectedLootItem=null;
    storagePlaceMode=false;
    invRotation=0;
    playSound('pickup');
    gameState='base';
    render();
  }
}
function restAtHome(){
  player.hp=player.maxHp;
  playSound('pickup');
  logMsg='自宅で休憩した — HP全回復！';
  render();
}
function enterDungeon(){
  // シレン式: ダンジョン突入時にレベル1にリセット
  player.level=1;player.exp=0;
  player.maxHp=baseMaxHp;player.hp=baseMaxHp;
  player.atk=baseAtk;player.def=baseDef;
  player.floor=1;player.fullness=100;player.turnCount=0;
  generateMap(1);updateFOV();
  gameState='dungeon';logMsg='ダンジョンに入った（Lv1から開始）';
  render();
}

// ═══════════════════════════════════════
// SAVE / LOAD
// ═══════════════════════════════════════
function saveGame(){
  try{const saveState=gameState==='dead'?'base':gameState==='item_preview'?'dungeon':gameState==='loot_preview'?'looting':gameState==='storage_place'?'base':gameState;
  localStorage.setItem('scavenger_save',JSON.stringify({
    player,inventory,invW,invH,bagExpansions,armorUpgrade,hasDetector,
    baseMaxHp,baseAtk,baseDef,
    storageBox,storageCapacity,storageExpansions,
    map,seen,enemies,mapItems,lootBags,rooms,gameState:saveState,
  }));}catch(e){}
}
function loadGame(){
  try{
    const d=JSON.parse(localStorage.getItem('scavenger_save'));
    if(!d){logMsg='セーブデータがありません';return;}
    Object.assign(player,d.player);inventory=d.inventory||[];invW=d.invW||6;invH=d.invH||4;
    bagExpansions=d.bagExpansions||0;armorUpgrade=d.armorUpgrade||0;hasDetector=d.hasDetector||false;
    baseMaxHp=d.baseMaxHp||100;baseAtk=d.baseAtk||8;baseDef=d.baseDef||2;
    storageBox=d.storageBox||[];storageCapacity=d.storageCapacity||20;storageExpansions=d.storageExpansions||0;
    map=d.map||[];seen=d.seen||[];enemies=d.enemies||[];mapItems=d.mapItems||[];
    lootBags=d.lootBags||[];rooms=d.rooms||[];
    gameState=d.gameState||'base';
    if(gameState==='dungeon')updateFOV();
    render();
  }catch(e){logMsg='ロード失敗';}
}
function startNewGame(){
  player={x:0,y:0,hp:100,maxHp:100,atk:8,def:2,level:1,exp:0,fullness:100,money:0,floor:1,turnCount:0};
  inventory=[];invW=6;invH=4;bagExpansions=0;armorUpgrade=0;hasDetector=false;
  baseMaxHp=100;baseAtk=8;baseDef=2;
  storageBox=[];storageCapacity=20;storageExpansions=0;
  gameState='base';logMsg='';baseTab='home';
  render();
}

// RENDER
// ═══════════════════════════════════════
function render(){
  const app=document.getElementById('app');
  // Remove everything except title
  const title=document.getElementById('titleScreen');
  if(gameState==='title'){if(title)title.style.display='flex';return;}
  if(title)title.style.display='none';
  // Build HTML
  let html='';
  if(gameState==='dungeon'||gameState==='inventory'||gameState==='looting'||gameState==='item_preview'||gameState==='loot_preview'){
    html+=renderDungeonUI();
  }else if(gameState==='base'){
    html+=renderBaseUI();
  }else if(gameState==='storage_place'){
    html+=renderStoragePlaceUI();
  }else if(gameState==='dead'){
    html+=renderDeadUI();
  }
  // Remove old content (keep title)
  const children=[...app.children];
  for(const c of children)if(c.id!=='titleScreen')c.remove();
  app.insertAdjacentHTML('beforeend',html);
  // Attach events
  attachEvents();
  // Auto-save
  saveGame();
}

function renderDungeonUI(){
  const hpPct=Math.max(0,Math.round(player.hp/player.maxHp*100));
  let h=`<div class="status-bar">
<div class="status-row"><span>F${player.floor} 💰${player.money}</span><span>❤️${player.hp}/${player.maxHp} <span class="hp-bar-wrap"><span class="hp-bar" style="width:${hpPct}%"></span></span></span><span>🍖${player.fullness}</span></div>
<div class="status-row"><span>Lv${player.level} ⚔️${getPlayerAtk()} 🛡️${getPlayerDef()}</span><span>T:${player.turnCount}</span></div>
</div>`;
  // Map viewport
  h+=`<div class="map-container"><div class="map-viewport" style="width:${VW*CELL}px;height:${VH*CELL}px">`;
  h+=`<div class="map-grid" style="grid-template-columns:repeat(${VW},${CELL}px);grid-template-rows:repeat(${VH},${CELL}px)">`;
  const ox=player.x-Math.floor(VW/2);
  const oy=player.y-Math.floor(VH/2);
  for(let vy=0;vy<VH;vy++){
    for(let vx=0;vx<VW;vx++){
      const tx=ox+vx,ty=oy+vy;
      if(tx<0||tx>=MW||ty<0||ty>=MH){h+=`<div class="tile tile-dark"></div>`;continue;}
      const vis=isVisible(player.x,player.y,tx,ty);
      const wasSeen=seen[ty][tx];
      if(!wasSeen&&!vis){h+=`<div class="tile tile-dark"></div>`;continue;}
      const dim=!vis&&wasSeen?' tile-dim':'';
      const tileType=map[ty][tx];
      let cls='tile-floor',content='';
      if(tileType===WALL){cls='tile-wall';content='';}
      else if(tileType===STAIRS){cls='tile-stairs';content='▼';}
      else if(tileType===EXIT){cls='tile-exit';content='△';}
      // Player
      if(tx===player.x&&ty===player.y)content=`<span class="entity">😎</span>`;
      // Enemies (only if visible)
      if(vis){
        const enemy=enemies.find(e=>e.hp>0&&e.x===tx&&e.y===ty);
        if(enemy)content=`<span class="entity">${enemy.icon}</span>`;
      }
      // Items
      if(vis||wasSeen){
        const mi=mapItems.find(i=>i.x===tx&&i.y===ty);
        if(mi)content+=`<span class="item-icon">${ITEMS[mi.itemId].icon}</span>`;
        const lb=lootBags.find(b=>b.x===tx&&b.y===ty);
        if(lb)content+=`<span class="item-icon">🎒</span>`;
      }
      // Float dmg
      const fd=floatingDmgs.filter(f=>f.x===tx&&f.y===ty);
      for(const f of fd)content+=`<span class="float-dmg" style="color:${f.color}">${f.dmg}</span>`;
      h+=`<div class="tile ${cls}${dim}">${content}</div>`;
    }
  }
  h+=`</div></div></div>`;
  h+=`<div class="log-bar">${logMsg||'―'}</div>`;
  // Controls
  h+=`<div class="controls"><div class="dpad">
<div></div><button data-dir="up">↑</button><div></div>
<button data-dir="left">←</button><button data-dir="wait">●</button><button data-dir="right">→</button>
<div></div><button data-dir="down">↓</button><div></div>
</div><button class="bag-btn" data-action="bag">🎒</button></div>`;
  // Overlays
  if(gameState==='inventory')h+=renderInventoryOverlay();
  if(gameState==='looting'||gameState==='loot_preview')h+=renderLootOverlay();
  if(gameState==='item_preview')h+=renderItemPreviewModal();
  if(gameState==='loot_preview')h+=renderLootPreviewModal();
  return h;
}

function renderInventoryOverlay(){
  let h=`<div class="overlay">${renderOverlayStatusBar()}<div class="overlay-header"><span>🎒 バックパック</span><button data-action="closebag">×閉じる</button></div>`;
  if(selectedLootItem){
    const slItem=ITEMS[selectedLootItem];
    const slRarity=getItemRarity(selectedLootItem);
    const slShape=getRotatedShape(slItem.shape,invRotation);
    h+=`<div style="padding:4px 12px;color:#f59e0b;display:flex;align-items:center;gap:8px;flex-wrap:wrap">${relocatingItem?'移動':'配置'}: ${slItem.icon} ${slItem.name} `;
    h+=renderShapeGrid(slShape,14,slRarity.color);
    if(relocatingItem){
      h+=`<button class="rotate-btn" data-action="cancel-relocate" style="margin:0;background:#c62828;border-color:#e53935">✕ キャンセル</button>`;
    }
    if(floorPickupItemId&&!relocatingItem){
      h+=`<button class="rotate-btn" data-action="return-to-floor" style="margin:0;background:#555;border-color:#777">↩ 床に戻す</button>`;
    }
    h+=`</div>`;
  }
  h+=`<button class="rotate-btn" data-action="rotate">回転🔄</button>`;
  h+=`<div class="inv-section">${renderInvGrid(true)}</div>`;
  // Usable items
  const usables=inventory.filter(it=>ITEMS[it.itemId].usable);
  if(usables.length>0){
    h+=`<div class="item-actions" style="padding:4px 12px">`;
    const seen=new Set();
    for(const it of usables){
      if(seen.has(it.itemId))continue;seen.add(it.itemId);
      const item=ITEMS[it.itemId];
      h+=`<button data-use="${it.itemId}">${item.icon}${item.name}</button>`;
    }
    h+=`</div>`;
  }
  // Detail panel for selected item
  if(selectedInvItem!==null&&selectedInvItem<inventory.length){
    h+=renderItemDetailPanel(selectedInvItem);
  }
  h+=`<div class="warn-turns">⚠️ ターンは進行中！</div></div>`;
  return h;
}

function renderLootOverlay(){
  let h=`<div class="overlay">${renderOverlayStatusBar()}<div class="overlay-header"><span>🎒 ルート</span><button data-action="closeloot">完了</button></div>`;
  if(currentLootBag){
    h+=`<div class="loot-section"><div style="font-size:12px;color:#888;margin-bottom:4px">敵のドロップ:</div><div class="loot-grid">`;
    for(let i=0;i<9;i++){
      const itemId=currentLootBag.items[i]||null;
      const sel=selectedLootItem===itemId&&itemId?'selected':'';
      if(itemId)h+=`<div class="loot-cell ${sel}" data-loot="${i}">${ITEMS[itemId].icon}</div>`;
      else h+=`<div class="loot-cell"></div>`;
    }
    h+=`</div>`;
    // Show shape info for each loot item
    const seenLoot=new Set();
    for(const itemId of currentLootBag.items){
      if(!itemId||seenLoot.has(itemId))continue;
      seenLoot.add(itemId);
      const item=ITEMS[itemId];
      const rarity=getItemRarity(itemId);
      const cols=Math.max(...item.shape.map(r=>r.length));
      h+=`<div class="loot-item-info">`;
      h+=`<div class="loot-shape-mini" style="grid-template-columns:repeat(${cols},10px)">`;
      for(let r=0;r<item.shape.length;r++)for(let c=0;c<cols;c++){
        const filled=item.shape[r]&&item.shape[r][c];
        h+=`<div class="loot-shape-mini-cell ${filled?'filled':'empty'}" style="${filled?`background:${rarity.color}`:''}""></div>`;
      }
      h+=`</div>`;
      h+=`<span>${item.icon} ${item.name}</span><span style="color:${rarity.color}">${item.value}G</span>`;
      h+=`</div>`;
    }
    h+=`</div>`;
  }
  if(selectedLootItem){
    const slItem2=ITEMS[selectedLootItem];
    const slRarity2=getItemRarity(selectedLootItem);
    const slShape2=getRotatedShape(slItem2.shape,invRotation);
    h+=`<div style="padding:4px 12px;color:#f59e0b;display:flex;align-items:center;gap:8px">配置: ${slItem2.icon} ${slItem2.name} `;
    h+=renderShapeGrid(slShape2,14,slRarity2.color);
    h+=`</div>`;
  }
  h+=`<button class="rotate-btn" data-action="rotate">回転🔄</button>`;
  h+=`<div class="inv-section">${renderInvGrid(gameState==='looting')}</div>`;
  h+=`<div class="warn-turns">⚠️ ターンは進行中！各操作で1ターン経過</div></div>`;
  return h;
}

let previewOrigin=null; // {gx,gy} cell currently being previewed

function renderInvGrid(interactive){
  // Compute preview cells if we have a selected item and preview origin
  const previewCells=new Map(); // "gx,gy" -> 'ok'|'bad'
  if(selectedLootItem&&interactive&&previewOrigin){
    const shape=getRotatedShape(ITEMS[selectedLootItem].shape,invRotation);
    const ok=canPlace(selectedLootItem,previewOrigin.gx,previewOrigin.gy,invRotation);
    for(let r=0;r<shape.length;r++){
      for(let c=0;c<shape[r].length;c++){
        if(!shape[r][c])continue;
        const cx=previewOrigin.gx+c,cy=previewOrigin.gy+r;
        if(cx>=0&&cx<invW&&cy>=0&&cy<invH){
          previewCells.set(`${cx},${cy}`,ok?'ok':'bad');
        }
      }
    }
  }

  let h=`<div class="inv-grid" style="grid-template-columns:repeat(${invW},38px)">`;
  for(let gy=0;gy<invH;gy++){
    for(let gx=0;gx<invW;gx++){
      const occ=inventory.findIndex(it=>it.cells.some(c=>c[0]===gx&&c[1]===gy));
      let cls='inv-cell';
      let content='';
      let inlineStyle='';
      if(occ>=0){
        cls+=' occupied';
        if(selectedInvItem===occ)cls+=' selected';
        // Rarity-based border color for occupied cells
        const rarityColor=getItemRarity(inventory[occ].itemId).color;
        inlineStyle=`border-color:${rarityColor}`;
        // Show icon only on first cell of item
        const it=inventory[occ];
        const isFirst=it.cells[0][0]===gx&&it.cells[0][1]===gy;
        if(isFirst)content=`<span class="item-in-cell">${ITEMS[it.itemId].icon}</span>`;
        else{
          content=`<span class="item-in-cell" style="background:${rarityColor}22;border-radius:2px"></span>`;
        }
      }
      // Preview overlay
      const pvKey=`${gx},${gy}`;
      if(previewCells.has(pvKey)){
        const pvType=previewCells.get(pvKey);
        cls+=pvType==='ok'?' preview-ok':' preview-bad';
        content+=`<span class="preview-shape"></span>`;
      }
      h+=`<div class="${cls}" data-gx="${gx}" data-gy="${gy}" style="${inlineStyle}">${content}</div>`;
    }
  }
  h+=`</div>`;
  return h;
}

function updatePreviewDOM(){
  // Lightweight preview update — only touches inv-cell classes, no full re-render
  if(!selectedLootItem){return;}
  const cells=document.querySelectorAll('.inv-cell');
  // Compute which cells are in preview
  const previewMap=new Map();
  if(previewOrigin){
    const shape=getRotatedShape(ITEMS[selectedLootItem].shape,invRotation);
    const ok=canPlace(selectedLootItem,previewOrigin.gx,previewOrigin.gy,invRotation);
    for(let r=0;r<shape.length;r++){
      for(let c=0;c<shape[r].length;c++){
        if(!shape[r][c])continue;
        const cx=previewOrigin.gx+c,cy=previewOrigin.gy+r;
        if(cx>=0&&cx<invW&&cy>=0&&cy<invH){
          previewMap.set(`${cx},${cy}`,ok?'ok':'bad');
        }
      }
    }
  }
  cells.forEach(cell=>{
    const gx=cell.dataset.gx,gy=cell.dataset.gy;
    const key=`${gx},${gy}`;
    // Remove old preview classes and child
    cell.classList.remove('preview-ok','preview-bad');
    const oldSpan=cell.querySelector('.preview-shape');
    if(oldSpan)oldSpan.remove();
    // Add new preview
    if(previewMap.has(key)){
      const pvType=previewMap.get(key);
      cell.classList.add(pvType==='ok'?'preview-ok':'preview-bad');
      const span=document.createElement('span');
      span.className='preview-shape';
      cell.appendChild(span);
    }
  });
}

function getItemEffectText(itemId){
  const item=ITEMS[itemId];
  const effects=[];
  if(item.heal)effects.push(`HP+${item.heal} 回復`);
  if(item.food)effects.push(`満腹度+${item.food}`);
  if(item.weapon){
    effects.push(`攻撃力+${item.atkBonus}`);
    if(item.needsAmmo)effects.push('(弾薬が必要)');
  }
  if(item.usable&&!item.heal&&!item.food)effects.push('使用可能');
  if(effects.length===0)effects.push('素材 / 売却用');
  return effects.join(' ');
}

function getItemRarity(itemId){
  const v=ITEMS[itemId].value;
  if(v>=150)return {label:'LEGENDARY',color:'#ff9800'};
  if(v>=80)return {label:'RARE',color:'#2196f3'};
  if(v>=30)return {label:'UNCOMMON',color:'#4caf50'};
  return {label:'COMMON',color:'#aaa'};
}

function renderShapeGrid(shape,cellSize,colorFill){
  const rows=shape.length,cols=Math.max(...shape.map(r=>r.length));
  let h=`<div class="ipv-shape-grid" style="grid-template-columns:repeat(${cols},${cellSize}px)">`;
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const filled=shape[r]&&shape[r][c];
      h+=`<div class="ipv-shape-cell ${filled?'filled':'empty'}" style="${filled?`background:${colorFill||'#7c3aed'};border:1px solid ${colorFill?'rgba(255,255,255,.3)':'#a855f7'}`:''}""></div>`;
    }
  }
  h+=`</div>`;
  return h;
}

function renderItemDetailPanel(invIdx){
  const invItem=inventory[invIdx];
  if(!invItem)return '';
  const itemId=invItem.itemId;
  const item=ITEMS[itemId];
  const rarity=getItemRarity(itemId);
  const cells=item.shape.reduce((s,r)=>s+r.filter(c=>c).length,0);
  let h=`<div class="item-detail-panel" style="border-color:${rarity.color}">`;
  // Header: icon + name + rarity
  h+=`<div class="idp-header"><span class="idp-icon">${item.icon}</span><span class="idp-name">${item.name}</span><span class="idp-rarity" style="color:${rarity.color}">${rarity.label}</span></div>`;
  // Shape preview (small grid)
  h+=renderShapeGrid(item.shape,16,rarity.color);
  // Info section
  h+=`<div class="idp-info">`;
  h+=`<span class="idp-effect">📋 ${getItemEffectText(itemId)}</span>`;
  // Weapon equipped status
  if(item.weapon){
    const isEquipped=true; // weapons in bag are always active
    h+=`<span class="idp-equipped">⚔️ 装備中 → 攻撃力+${item.atkBonus}</span>`;
    if(item.needsAmmo){
      const ammoCount=countItem('ammo');
      h+=`<span class="idp-equipped">🎯 弾薬残: ${ammoCount}個${ammoCount===0?' (弾切れ！)':''}</span>`;
    }
  }
  h+=`<span class="idp-value">💰 売値: ${item.value}G</span>`;
  h+=`<span>📐 ${item.shape[0].length}×${item.shape.length} (${cells}マス)</span>`;
  h+=`</div>`;
  // Action buttons
  h+=`<div class="idp-actions">`;
  h+=`<button class="idp-use" data-detail-relocate="${invIdx}" style="background:#1565c0">📦 移動</button>`;
  if(item.usable){
    h+=`<button class="idp-use" data-detail-use="${itemId}">✨ 使う</button>`;
  }
  h+=`<button class="idp-drop" data-detail-drop="${invIdx}">🗑️ 捨てる</button>`;
  h+=`<button class="idp-close" data-detail-close>✕</button>`;
  h+=`</div>`;
  h+=`</div>`;
  return h;
}

function renderBaseUI(){
  let h=`<div class="base-screen">`;
  h+=`<h2>🏚️ 拠点</h2>`;
  h+=`<div class="base-section"><div style="display:flex;justify-content:space-between"><span>💰 ${player.money}G</span><span>❤️ ${player.hp}/${player.maxHp}</span><span>Lv${player.level}</span></div></div>`;
  // Sell items
  if(inventory.length>0){
    h+=`<div class="base-section"><h3>💰 アイテムを売る</h3><div class="sell-items">`;
    for(let i=0;i<inventory.length;i++){
      const it=inventory[i];
      const item=ITEMS[it.itemId];
      h+=`<div class="sell-item" data-sell="${i}">${item.icon} ${item.name} (${item.value}G)</div>`;
    }
    h+=`</div></div>`;
  }
  // Shop
  h+=`<div class="base-section"><h3>🛒 ショップ</h3>`;
  h+=`<div class="shop-item"><span>🎒 バッグ拡張 (${bagExpansions}/3)</span><button data-buy="bag" ${player.money<200||bagExpansions>=3?'disabled':''}>200G</button></div>`;
  h+=`<div class="shop-item"><span>🛡️ 防護服+${armorUpgrade*5} (${armorUpgrade}/3)</span><button data-buy="armor" ${player.money<300||armorUpgrade>=3?'disabled':''}>300G</button></div>`;
  h+=`<div class="shop-item"><span>📡 探知機 ${hasDetector?'✓':''}</span><button data-buy="detector" ${player.money<500||hasDetector?'disabled':''}>500G</button></div>`;
  h+=`</div>`;
  h+=`<button class="base-btn" data-action="enter">⚔️ 探索開始</button>`;
  h+=`</div>`;
  return h;
}

function renderDeadUI(){
  let h=`<div class="game-over"><h2>💀 力尽きた...</h2>`;
  h+=`<p>アイテムの半分を失った。<br>拠点に戻ります。</p>`;
  h+=`<button data-action="respawn">拠点に戻る</button></div>`;
  return h;
}

// ═══════════════════════════════════════
// EVENT HANDLERS
// ═══════════════════════════════════════
function attachEvents(){
  // D-pad (debounced, prevents click+touchstart double-fire)
  document.querySelectorAll('[data-dir]').forEach(b=>{
    const execDir=()=>{
      const now=Date.now();
      if(now-lastDpadTime<DPAD_DEBOUNCE_MS)return;
      lastDpadTime=now;
      const d=b.dataset.dir;
      if(d==='up')movePlayer(0,-1);else if(d==='down')movePlayer(0,1);
      else if(d==='left')movePlayer(-1,0);else if(d==='right')movePlayer(1,0);
      else if(d==='wait')waitTurn();
    };
    b.addEventListener('touchstart',e=>{e.preventDefault();execDir();},{passive:false});
    b.addEventListener('click',e=>{e.preventDefault();execDir();});
  });
  // Bag button
  document.querySelectorAll('[data-action="bag"]').forEach(b=>b.addEventListener('click',toggleBag));
  document.querySelectorAll('[data-action="closebag"]').forEach(b=>b.addEventListener('click',toggleBag));
  document.querySelectorAll('[data-action="closeloot"]').forEach(b=>b.addEventListener('click',closeLoot));
  document.querySelectorAll('[data-action="rotate"]').forEach(b=>b.addEventListener('click',rotateItem));
  // Detail panel actions
  document.querySelectorAll('[data-detail-use]').forEach(b=>b.addEventListener('click',()=>{selectedInvItem=null;useItem(b.dataset.detailUse);}));
  document.querySelectorAll('[data-detail-drop]').forEach(b=>b.addEventListener('click',()=>{const idx=parseInt(b.dataset.detailDrop);selectedInvItem=null;dropInvItem(idx);}));
  document.querySelectorAll('[data-detail-relocate]').forEach(b=>b.addEventListener('click',()=>{const idx=parseInt(b.dataset.detailRelocate);startRelocate(idx);}));
  document.querySelectorAll('[data-detail-close]').forEach(b=>b.addEventListener('click',()=>{selectedInvItem=null;render();}));
  document.querySelectorAll('[data-action="cancel-relocate"]').forEach(b=>b.addEventListener('click',cancelRelocate));
  document.querySelectorAll('[data-action="return-to-floor"]').forEach(b=>b.addEventListener('click',returnItemToFloor));
  document.querySelectorAll('[data-action="enter"]').forEach(b=>b.addEventListener('click',enterDungeon));
  document.querySelectorAll('[data-action="respawn"]').forEach(b=>b.addEventListener('click',()=>{
    // シレン式: 死亡時も基礎ステータスに戻る
    player.level=1;player.exp=0;
    player.maxHp=baseMaxHp;player.atk=baseAtk;player.def=baseDef;
    player.hp=player.maxHp;player.fullness=100;gameState='base';render();
  }));
  // Item preview modal
  document.querySelectorAll('[data-action="confirm-pickup"]').forEach(b=>b.addEventListener('click',confirmPickupFloorItem));
  document.querySelectorAll('[data-action="ignore-item"]').forEach(b=>b.addEventListener('click',ignoreFloorItem));
  // Use items
  document.querySelectorAll('[data-use]').forEach(b=>b.addEventListener('click',()=>useItem(b.dataset.use)));
  // Sell items
  document.querySelectorAll('[data-sell]').forEach(b=>b.addEventListener('click',()=>sellItem(parseInt(b.dataset.sell))));
  // Buy
  document.querySelectorAll('[data-buy]').forEach(b=>b.addEventListener('click',()=>buyUpgrade(b.dataset.buy)));
  // Inventory grid clicks + preview hover/touch
  document.querySelectorAll('.inv-cell').forEach(cell=>{
    const gx=parseInt(cell.dataset.gx),gy=parseInt(cell.dataset.gy);
    // Show placement preview on hover/touch
    const showPreview=(cx,cy)=>{
      if(!selectedLootItem)return;
      if(!previewOrigin||previewOrigin.gx!==cx||previewOrigin.gy!==cy){
        previewOrigin={gx:cx,gy:cy};
        updatePreviewDOM();
      }
    };
    cell.addEventListener('pointerenter',()=>showPreview(gx,gy));
    cell.addEventListener('touchmove',e=>{
      e.preventDefault();
      const touch=e.touches[0];
      const el=document.elementFromPoint(touch.clientX,touch.clientY);
      if(el&&el.dataset&&el.dataset.gx!==undefined){
        showPreview(parseInt(el.dataset.gx),parseInt(el.dataset.gy));
      }
    },{passive:false});
    cell.addEventListener('click',()=>{
      if(selectedLootItem){
        previewOrigin={gx,gy};
        if(relocatingItem){
          completeRelocate(gx,gy);
        } else if(gameState==='looting'){
          invLootPlaceAttempt(gx,gy);
        } else {
          invPlaceAttempt(gx,gy);
        }
        return;
      }
      // Select/deselect existing item
      const occ=inventory.findIndex(it=>it.cells.some(c=>c[0]===gx&&c[1]===gy));
      if(occ>=0){selectedInvItem=selectedInvItem===occ?null:occ;render();}
    });
  });
  // Loot cell clicks — show preview modal first
  document.querySelectorAll('.loot-cell[data-loot]').forEach(cell=>{
    cell.addEventListener('click',()=>{
      const idx=parseInt(cell.dataset.loot);
      if(currentLootBag&&currentLootBag.items[idx]){
        pendingLootItem={itemId:currentLootBag.items[idx],lootIdx:idx};
        gameState='loot_preview';
        render();
      }
    });
  });
  // Loot preview modal buttons
  document.querySelectorAll('[data-action="confirm-loot-pickup"]').forEach(b=>b.addEventListener('click',confirmLootPickup));
  document.querySelectorAll('[data-action="ignore-loot-item"]').forEach(b=>b.addEventListener('click',ignoreLootItem));
}

// ═══════════════════════════════════════
// KEYBOARD & SWIPE
// ═══════════════════════════════════════
document.addEventListener('keydown',e=>{
  if(gameState==='title'||gameState==='base'||gameState==='dead'||gameState==='item_preview'||gameState==='loot_preview')return;
  switch(e.key){
    case'ArrowUp':case'w':case'W':movePlayer(0,-1);break;
    case'ArrowDown':case's':case'S':movePlayer(0,1);break;
    case'ArrowLeft':case'a':case'A':movePlayer(-1,0);break;
    case'ArrowRight':case'd':case'D':movePlayer(1,0);break;
    case' ':waitTurn();break;
    case'i':case'I':toggleBag();break;
  }
});

let touchStartX=0,touchStartY=0,touchStartTime=0;
document.addEventListener('touchstart',e=>{
  if(e.target.closest('.dpad,.bag-btn,.overlay,.base-screen,.title-screen,.game-over'))return;
  touchStartX=e.touches[0].clientX;touchStartY=e.touches[0].clientY;touchStartTime=Date.now();
},{passive:true});
document.addEventListener('touchend',e=>{
  if(e.target.closest('.dpad,.bag-btn,.overlay,.base-screen,.title-screen,.game-over,.item-preview-modal'))return;
  if(gameState==='loot_preview')return;
  if(gameState!=='dungeon')return;
  const dx=e.changedTouches[0].clientX-touchStartX;
  const dy=e.changedTouches[0].clientY-touchStartY;
  const dt=Date.now()-touchStartTime;
  if(dt>500||Math.abs(dx)<20&&Math.abs(dy)<20)return;
  if(Math.abs(dx)>Math.abs(dy)){movePlayer(dx>0?1:-1,0);}
  else{movePlayer(0,dy>0?1:-1);}
},{passive:true});

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
render();
</script>
</body>
</html>
