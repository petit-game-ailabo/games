<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>宝箱バトル - 今日のミニゲーム</title>
    <meta name="description" content="CPUと対戦！良い箱を取られる前に選べ！">
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(180deg, #ffd89b 0%, #19547b 100%);
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        
        #game-container {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        canvas {
            display: block;
            margin: 0 auto;
        }
        
        .credits {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.7);
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <div class="credits">Powered by Phaser</div>
    
    <script>
        // 効果音
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        
        function playOpenSound() {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            oscillator.frequency.value = 800;
            oscillator.type = 'sine';
            gainNode.gain.setValueAtTime(0.2, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.2);
        }
        
        function playSelectSound() {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            oscillator.frequency.value = 1200;
            oscillator.type = 'square';
            gainNode.gain.setValueAtTime(0.15, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.15);
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.15);
        }
        
        function playPassSound() {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            oscillator.frequency.value = 400;
            oscillator.type = 'sine';
            gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.1);
        }

        const config = {
            type: Phaser.AUTO,
            width: 400,
            height: 700,
            parent: 'game-container',
            backgroundColor: '#1a1a2e',
            scale: {
                mode: Phaser.Scale.FIT,
                autoCenter: Phaser.Scale.CENTER_BOTH
            },
            scene: {
                create: create,
                update: update
            }
        };

        const game = new Phaser.Game(config);
        
        let boxes = [];
        let currentBox = 0;
        let currentPlayer = 0; // 0: プレイヤー, 1: CPU1, 2: CPU2
        let playerScores = [-1, -1, -1]; // 各プレイヤーの選んだ箱のindex
        let gameStarted = false;
        let gameOver = false;
        let boxText;
        let scoreText;
        let hintText;
        let turnText;
        let resultText;
        let selectButton;
        let passButton;
        let startText;
        let cpuNames = ['CPU(慎重派)', 'CPU(欲張り派)'];

        function create() {
            // 背景グラデーション
            const graphics = this.add.graphics();
            graphics.fillGradientStyle(0xffd89b, 0xffd89b, 0x19547b, 0x19547b, 1);
            graphics.fillRect(0, 0, 400, 700);
            
            // タイトル
            this.add.text(200, 40, '🎁 宝箱バトル', {
                fontSize: '42px',
                fill: '#fff',
                fontStyle: 'bold',
                stroke: '#000',
                strokeThickness: 4
            }).setOrigin(0.5);
            
            // ターン表示
            turnText = this.add.text(200, 100, '', {
                fontSize: '28px',
                fill: '#FFD700',
                fontStyle: 'bold'
            }).setOrigin(0.5);
            
            // 進捗表示
            boxText = this.add.text(200, 140, '', {
                fontSize: '32px',
                fill: '#fff',
                fontStyle: 'bold'
            }).setOrigin(0.5);
            
            // 得点表示
            scoreText = this.add.text(200, 280, '', {
                fontSize: '72px',
                fill: '#fff',
                fontStyle: 'bold',
                stroke: '#000',
                strokeThickness: 5
            }).setOrigin(0.5);
            
            // ヒントテキスト
            hintText = this.add.text(200, 380, '', {
                fontSize: '20px',
                fill: '#FFD700',
                align: 'center'
            }).setOrigin(0.5);
            
            // スタート画面
            startText = this.add.text(200, 280, '🎁 宝箱ガチャ - CPU対戦\n\nあなた vs CPU2体の3人対戦！\n\n順番に箱を開けて選ぶ\n選ばれた箱は他の人は取れない\n\n⚠️ 一度パスしたら戻れない！\n良い箱はCPUに取られるかも...\n\n💡戦略💡\n最初の3～4個は見送って\nその後ベストが来たら即決！\n\nタップしてスタート', {
                fontSize: '22px',
                fill: '#fff',
                align: 'center',
                lineSpacing: 10
            }).setOrigin(0.5);
            
            // ボタン
            selectButton = this.add.text(200, 500, '✨ これにする！', {
                fontSize: '32px',
                fill: '#FFD700',
                fontStyle: 'bold',
                backgroundColor: '#2d5016',
                padding: { x: 30, y: 15 }
            }).setOrigin(0.5).setInteractive();
            selectButton.setVisible(false);
            
            passButton = this.add.text(200, 580, '➡️ 次へ', {
                fontSize: '32px',
                fill: '#fff',
                fontStyle: 'bold',
                backgroundColor: '#444',
                padding: { x: 30, y: 15 }
            }).setOrigin(0.5).setInteractive();
            passButton.setVisible(false);
            
            // イベント
            selectButton.on('pointerdown', () => handleSelect(this));
            passButton.on('pointerdown', () => handlePass(this));
            this.input.on('pointerdown', (pointer) => {
                if (!gameStarted && !gameOver) {
                    startGame(this);
                } else if (gameOver) {
                    resetGame(this);
                }
            });
        }

        function startGame(scene) {
            gameStarted = true;
            startText.setVisible(false);
            
            // 10個の箱を生成（1～100のランダムな得点）
            boxes = [];
            for (let i = 0; i < 10; i++) {
                boxes.push({
                    score: Math.floor(Math.random() * 100) + 1,
                    taken: false,
                    takenBy: -1
                });
            }
            
            currentBox = 0;
            currentPlayer = 0;
            playerScores = [-1, -1, -1];
            showBox(scene);
        }

        function showBox(scene) {
            // 次の空いてる箱を探す
            while (currentBox < boxes.length && boxes[currentBox].taken) {
                currentBox++;
            }
            
            // 全員選んだ、または箱が尽きたらゲーム終了
            if (currentBox >= boxes.length || playerScores.every(s => s >= 0)) {
                endGame(scene);
                return;
            }
            
            // 現在のプレイヤー名
            const playerName = currentPlayer === 0 ? 'あなた' : cpuNames[currentPlayer - 1];
            turnText.setText(`${playerName}のターン`);
            
            playOpenSound();
            
            const box = boxes[currentBox];
            boxText.setText(`宝箱 ${currentBox + 1} / 10`);
            scoreText.setText(box.score + '点');
            
            if (currentPlayer === 0) {
                // プレイヤーのターン
                // ヒント表示
                const availableBoxes = boxes.filter(b => !b.taken);
                const maxSoFar = Math.max(...availableBoxes.map(b => b.score));
                if (currentBox < 3) {
                    hintText.setText('💡 まだ見送った方がいいかも...');
                } else if (box.score === maxSoFar) {
                    hintText.setText('🔥 残りで最高！');
                } else {
                    hintText.setText('');
                }
                
                selectButton.setVisible(true);
                passButton.setVisible(true);
            } else {
                // CPUのターン
                hintText.setText('CPUが考え中...');
                selectButton.setVisible(false);
                passButton.setVisible(false);
                
                scene.time.delayedCall(1000, () => {
                    cpuDecision(scene);
                });
            }
        }

        function cpuDecision(scene) {
            const availableBoxes = boxes.filter(b => !b.taken);
            const maxAvailable = Math.max(...availableBoxes.map(b => b.score));
            const currentScore = boxes[currentBox].score;
            
            let decision = false;
            
            if (currentPlayer === 1) {
                // CPU1（慎重派）: 最初の40%はパス、その後ベストなら選ぶ
                const passedCount = boxes.slice(0, currentBox).filter(b => !b.taken).length;
                if (passedCount >= 4 && currentScore === maxAvailable) {
                    decision = true;
                }
            } else if (currentPlayer === 2) {
                // CPU2（欲張り派）: 70点以上なら選ぶ、またはランダム
                if (currentScore >= 70 || (Math.random() < 0.3 && currentScore >= 50)) {
                    decision = true;
                }
            }
            
            if (decision) {
                handleSelect(scene);
            } else {
                handlePass(scene);
            }
        }

        function handleSelect(scene) {
            playSelectSound();
            playerScores[currentPlayer] = currentBox;
            boxes[currentBox].taken = true;
            boxes[currentBox].takenBy = currentPlayer;
            
            selectButton.setVisible(false);
            passButton.setVisible(false);
            
            currentPlayer = (currentPlayer + 1) % 3;
            currentBox++;
            
            scene.time.delayedCall(500, () => showBox(scene));
        }

        function handlePass(scene) {
            playPassSound();
            
            selectButton.setVisible(false);
            passButton.setVisible(false);
            
            currentPlayer = (currentPlayer + 1) % 3;
            currentBox++;
            
            scene.time.delayedCall(500, () => showBox(scene));
        }

        function endGame(scene) {
            gameOver = true;
            gameStarted = false;
            
            turnText.setText('');
            boxText.setText('');
            scoreText.setText('');
            hintText.setText('');
            selectButton.setVisible(false);
            passButton.setVisible(false);
            
            // 各プレイヤーの得点
            const scores = playerScores.map(idx => idx >= 0 ? boxes[idx].score : 0);
            
            // ランキング
            const rankings = [
                { player: 0, name: 'あなた', score: scores[0] },
                { player: 1, name: cpuNames[0], score: scores[1] },
                { player: 2, name: cpuNames[1], score: scores[2] }
            ].sort((a, b) => b.score - a.score);
            
            let rank, message;
            if (rankings[0].player === 0) {
                rank = '🏆 1位';
                message = '完璧！CPUに勝った！';
            } else if (rankings[1].player === 0) {
                rank = '🥈 2位';
                message = '惜しい！もう少しで勝てた！';
            } else {
                rank = '🥉 3位';
                message = 'CPUに負けちゃった...';
            }
            
            const resultLines = [
                `結果: ${rank}`,
                '',
                ...rankings.map(r => `${r.name}: ${r.score}点`),
                '',
                message,
                '',
                '全10箱の得点:',
                boxes.map((b, i) => {
                    if (b.takenBy === 0) return `[${b.score}]`;
                    if (b.takenBy === 1) return `(${b.score})`;
                    if (b.takenBy === 2) return `<${b.score}>`;
                    return b.score;
                }).join(', '),
                '[あなた] (CPU1) <CPU2>',
                '',
                'タップで再プレイ'
            ];
            
            resultText = scene.add.text(200, 300, resultLines.join('\n'), {
                fontSize: '24px',
                fill: '#fff',
                fontStyle: 'bold',
                align: 'center',
                lineSpacing: 8,
                stroke: '#000',
                strokeThickness: 3
            }).setOrigin(0.5);
        }

        function resetGame(scene) {
            if (resultText) {
                resultText.destroy();
            }
            gameOver = false;
            turnText.setText('');
            boxText.setText('');
            scoreText.setText('');
            hintText.setText('');
            startText.setVisible(true);
        }

        function update() {}
    </script>
</body>
</html>
