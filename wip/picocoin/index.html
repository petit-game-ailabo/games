<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🪙 PicoCoin Miner</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0e27;font-family:'Segoe UI',sans-serif;color:#e0e0ff;touch-action:none}
#gameCanvas{display:block;width:100%;cursor:default}

</style>

<body>
<div id="titleScreen">
<canvas id="titleCanvas"></canvas>

<button id="startBtn">▶ スタート</button>
</div>
<canvas id="gameCanvas"></canvas>
<div id="ui">

<div id="shop"></div>
</div>
<script>
'use strict';

// ===== AUDIO =====
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function ensureAudio(){if(!audioCtx)audioCtx=new AudioCtx()}
function playSound(type){
  ensureAudio();
  const ctx=audioCtx,now=ctx.currentTime;
  const o=ctx.createOscillator(),g=ctx.createGain();
  o.connect(g);g.connect(ctx.destination);
  switch(type){
    case'place':o.type='sine';o.frequency.setValueAtTime(600,now);o.frequency.exponentialRampToValueAtTime(900,now+0.08);g.gain.setValueAtTime(0.3,now);g.gain.exponentialRampToValueAtTime(0.01,now+0.15);o.start(now);o.stop(now+0.15);break;
    case'connect':o.type='sawtooth';o.frequency.setValueAtTime(1200,now);o.frequency.exponentialRampToValueAtTime(400,now+0.12);g.gain.setValueAtTime(0.15,now);g.gain.exponentialRampToValueAtTime(0.01,now+0.12);o.start(now);o.stop(now+0.12);break;
    case'mine':o.type='sine';o.frequency.setValueAtTime(800,now);o.frequency.setValueAtTime(1000,now+0.05);o.frequency.setValueAtTime(1200,now+0.1);g.gain.setValueAtTime(0.2,now);g.gain.exponentialRampToValueAtTime(0.01,now+0.3);o.start(now);o.stop(now+0.3);break;
    case'malware':o.type='square';o.frequency.setValueAtTime(150,now);g.gain.setValueAtTime(0.2,now);g.gain.exponentialRampToValueAtTime(0.01,now+0.4);o.start(now);o.stop(now+0.4);break;
    case'cure':o.type='sine';o.frequency.setValueAtTime(500,now);o.frequency.exponentialRampToValueAtTime(2000,now+0.15);g.gain.setValueAtTime(0.2,now);g.gain.exponentialRampToValueAtTime(0.01,now+0.2);o.start(now);o.stop(now+0.2);break;
    case'buy':o.type='triangle';o.frequency.setValueAtTime(400,now);o.frequency.setValueAtTime(600,now+0.05);o.frequency.setValueAtTime(800,now+0.1);g.gain.setValueAtTime(0.25,now);g.gain.exponentialRampToValueAtTime(0.01,now+0.15);o.start(now);o.stop(now+0.15);break;
    case'error':o.type='square';o.frequency.setValueAtTime(200,now);g.gain.setValueAtTime(0.15,now);g.gain.exponentialRampToValueAtTime(0.01,now+0.15);o.start(now);o.stop(now+0.15);break;
  }
}

// ===== CONSTANTS =====
const WIN_W = 150;
const TITLE_H = 24;
const LINE_H = 20;
const FONT_SIZE = 11;
const PORT_R = 6;

// ===== NODE TYPES =====
const NODE_TYPES = {
  blockchain:{name:'ブロックチェーン',emoji:'⛓️',price:0,titleColor:'#3366cc',watt:0},
  pc:{name:'PC',emoji:'💻',price:0,titleColor:'#2a7a4a',watt:0},
  cpu:{name:'CPU',emoji:'🔲',price:5,titleColor:'#aa9922',watt:5},
  power:{name:'電源',emoji:'🔌',price:3,titleColor:'#aa3333',watt:0,supply:20},
  wallet:{name:'ウォレット',emoji:'👛',price:0,titleColor:'#aa8822',watt:0},
  cooler:{name:'冷却',emoji:'🧊',price:10,titleColor:'#4499aa',watt:3},
  ssd:{name:'SSD',emoji:'💾',price:15,titleColor:'#339955',watt:2},
  network:{name:'ネットワーク',emoji:'📡',price:20,titleColor:'#7744aa',watt:2},
  ai:{name:'AI',emoji:'🤖',price:50,titleColor:'#aa4477',watt:10},
  firewall:{name:'ファイアウォール',emoji:'🛡️',price:25,titleColor:'#bb6622',watt:1},
  ln:{name:'LNノード',emoji:'⚡',price:30,titleColor:'#ff9900',watt:0},
};

const PC_INPUTS = ['cpu','power','cooler','ssd','network','ai','firewall'];
const PC_OUTPUTS = ['blockchain','wallet','ln'];

// ===== GAME STATE =====
let nodes = [];
let connections = [];
let effects = [];
let particles = [];
let balance = 0;
let difficulty = 1.0;
let difficultyTimer = 0;
let malwareTimer = 0;
let blackoutTimer = 0;
let gameTime = 0;
let miningCheckTimer = 0;
let selectedShopItem = null;
let gameStarted = false;
let nextNodeId = 1;
let canvasW, canvasH, gameAreaTop, gameAreaBottom;
let hintShown = true;
let hintTimer = 0;

// Drag state
let dragMode = null; // 'move' | 'port' | null
let dragNode = null;
let dragOffX = 0, dragOffY = 0;
let dragPort = null; // {node, portIndex}
let dragLineEnd = null; // {x, y}
let hoverPort = null; // {node, portIndex} for highlight
let lastPointerX = null, lastPointerY = null;

// Animated power display per PC
let animatedPower = {}; // nodeId -> current display value

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resize(){
  const dpr = window.devicePixelRatio || 1;
  canvasW = window.innerWidth;
  canvasH = window.innerHeight;
  canvas.width = canvasW * dpr;
  canvas.height = canvasH * dpr;
  canvas.style.width = canvasW + 'px';
  canvas.style.height = canvasH + 'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  gameAreaTop = 42;
  const bp = document.getElementById('bottomPanel');
  gameAreaBottom = canvasH - (bp ? bp.offsetHeight : 60);
}
window.addEventListener('resize', resize);

// ===== TITLE SCREEN =====
(function titleAnim(){
  const tc = document.getElementById('titleCanvas');
  const tctx = tc.getContext('2d');
  const dpr = window.devicePixelRatio||1;
  function resizeTitle(){tc.width=window.innerWidth*dpr;tc.height=window.innerHeight*dpr;tctx.setTransform(dpr,0,0,dpr,0,0)}
  resizeTitle();
  const lines=[];
  for(let i=0;i<30;i++)lines.push({x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,l:50+Math.random()*100,a:Math.random()*Math.PI*2,s:0.2+Math.random()*0.5});
  function drawTitle(){
    if(gameStarted)return;
    const w=window.innerWidth,h=window.innerHeight;
    tctx.fillStyle='#0a0e27';tctx.fillRect(0,0,w,h);
    tctx.strokeStyle='#1a2050';tctx.lineWidth=0.5;
    for(let x=0;x<w;x+=40){tctx.beginPath();tctx.moveTo(x,0);tctx.lineTo(x,h);tctx.stroke()}
    for(let y=0;y<h;y+=40){tctx.beginPath();tctx.moveTo(0,y);tctx.lineTo(w,y);tctx.stroke()}
    const t=Date.now()*0.001;
    lines.forEach(ln=>{
      tctx.strokeStyle='rgba(74,106,255,'+(0.15+0.1*Math.sin(t+ln.x))+')';
      tctx.lineWidth=1;
      tctx.beginPath();tctx.moveTo(ln.x,ln.y);
      tctx.lineTo(ln.x+Math.cos(ln.a)*ln.l,ln.y+Math.sin(ln.a)*ln.l);
      tctx.stroke();
    });
    requestAnimationFrame(drawTitle);
  }
  drawTitle();
})();

document.getElementById('startBtn').addEventListener('click', ()=>{
  ensureAudio();
  document.getElementById('titleScreen').style.display='none';
  gameStarted=true;
  initGame();
});

// ===== NODE WINDOW HELPERS =====
// Get the status lines for a node
function getNodeLines(n){
  const nt = NODE_TYPES[n.type];
  const lines = [];
  if(n.type === 'pc'){
    const stats = getPCStats(n);
    const isMining = stats.canMine && !n.infected && stats.powerOk;
    lines.push({text: '状態: '+(n.infected?'🦠 感染中':(isMining?'⛏️ マイニング中':'⏹ 停止'))});
    // Power line with bar
    const used = stats.powerUsed;
    const supply = stats.powerSupply;
    lines.push({text: '電力: '+used+'/'+supply+'W', bar: supply>0?Math.min(used/supply,1.5):0, barOk: used<=supply, port:'power'});
    lines.push({text: 'CPU: '+stats.cpus+'個', port:'cpu'});
    lines.push({text: '→ ブロックチェーン', port:'blockchain'});
    lines.push({text: '→ ウォレット', port:'wallet'});
    lines.push({text: '→ LNノード', port:'ln'});
  } else if(n.type === 'cpu'){
    lines.push({text: '演算力: +1'});
    lines.push({text: '消費電力: '+nt.watt+'W'});
    lines.push({text: '→ PC接続', port:'pc'});
  } else if(n.type === 'power'){
    lines.push({text: '供給: '+(n.blackout?'0':'20')+'W'+(n.blackout?' ⚡停電':'')});
    lines.push({text: '→ PC接続', port:'pc'});
  } else if(n.type === 'wallet'){
    lines.push({text: '残高: '+balance+'₱'});
    lines.push({text: '← PC接続', port:'pc'});
  } else if(n.type === 'blockchain'){
    lines.push({text: '難易度: '+difficulty.toFixed(2)+'x'});
    const pcCount = nodes.filter(nd=>nd.type==='pc'&&connections.some(c=>c.from===nd.id&&c.to===n.id)).length;
    lines.push({text: '接続PC: '+pcCount+'台'});
    lines.push({text: '← PC接続', port:'pc'});
  } else if(n.type === 'cooler'){
    lines.push({text: '効果: CPU効率1.5倍'});
    lines.push({text: '消費電力: '+nt.watt+'W'});
    lines.push({text: '→ PC接続', port:'pc'});
  } else if(n.type === 'ssd'){
    lines.push({text: '効果: 速度1.3倍'});
    lines.push({text: '消費電力: '+nt.watt+'W'});
    lines.push({text: '→ PC接続', port:'pc'});
  } else if(n.type === 'network'){
    lines.push({text: '効果: 通信1.2倍'});
    lines.push({text: '消費電力: '+nt.watt+'W'});
    lines.push({text: '→ PC接続', port:'pc'});
  } else if(n.type === 'ai'){
    lines.push({text: '効果: 処理2倍(CPU2必要)'});
    lines.push({text: '消費電力: '+nt.watt+'W'});
    lines.push({text: '→ PC接続', port:'pc'});
  } else if(n.type === 'firewall'){
    lines.push({text: '効果: マルウェア自動駆除'});
    lines.push({text: '消費電力: '+nt.watt+'W'});
    lines.push({text: '→ PC接続', port:'pc'});
  } else if(n.type === 'ln'){
    const lnBal = n.lnBalance || 0;
    lines.push({text: 'LN残高: '+lnBal.toFixed(1)+'₱'});
    lines.push({text: '手数料収入: +'+(lnBal>=5?'0.1':'0')+'₱/s'});
    lines.push({text: '← PC接続', port:'pc'});
  }
  return lines;
}

function getNodeHeight(n){
  return TITLE_H + getNodeLines(n).length * LINE_H + 4;
}

// Get port positions for a node (returns array of {x, y, portType, lineIndex})
function getNodePorts(n){
  const lines = getNodeLines(n);
  const ports = [];
  lines.forEach((line, i) => {
    if(line.port){
      ports.push({
        x: n.x + WIN_W - 12,
        y: n.y + TITLE_H + i * LINE_H + LINE_H/2,
        portType: line.port,
        lineIndex: i,
        nodeId: n.id,
        nodeType: n.type
      });
    }
  });
  return ports;
}

// Check if a port is connected
function isPortConnected(n, portType){
  if(n.type === 'pc'){
    if(portType === 'power') return connections.some(c=>c.to===n.id&&nodes.find(nd=>nd.id===c.from)?.type==='power');
    if(portType === 'cpu') return connections.some(c=>c.to===n.id&&nodes.find(nd=>nd.id===c.from)?.type==='cpu');
    if(portType === 'blockchain') return connections.some(c=>c.from===n.id&&nodes.find(nd=>nd.id===c.to)?.type==='blockchain');
    if(portType === 'wallet') return connections.some(c=>c.from===n.id&&nodes.find(nd=>nd.id===c.to)?.type==='wallet');
    if(portType === 'ln') return connections.some(c=>c.from===n.id&&nodes.find(nd=>nd.id===c.to)?.type==='ln');
  } else {
    if(portType === 'pc'){
      if(PC_INPUTS.includes(n.type)) return connections.some(c=>c.from===n.id&&nodes.find(nd=>nd.id===c.to)?.type==='pc');
      if(PC_OUTPUTS.includes(n.type)) return connections.some(c=>c.to===n.id&&nodes.find(nd=>nd.id===c.from)?.type==='pc');
    }
  }
  return false;
}

// ===== HIT TESTING =====
function hitTestPort(x, y){
  for(let i = nodes.length - 1; i >= 0; i--){
    const ports = getNodePorts(nodes[i]);
    for(const p of ports){
      if(Math.hypot(x - p.x, y - p.y) < PORT_R + 4){
        return {node: nodes[i], port: p};
      }
    }
  }
  return null;
}

function hitTestTitleBar(x, y){
  for(let i = nodes.length - 1; i >= 0; i--){
    const n = nodes[i];
    if(x >= n.x && x <= n.x + WIN_W && y >= n.y && y <= n.y + TITLE_H){
      return n;
    }
  }
  return null;
}

function hitTestNode(x, y){
  for(let i = nodes.length - 1; i >= 0; i--){
    const n = nodes[i];
    const h = getNodeHeight(n);
    if(x >= n.x && x <= n.x + WIN_W && y >= n.y && y <= n.y + h){
      return n;
    }
  }
  return null;
}

// ===== CONNECTION LOGIC =====
function canConnectPorts(portA, portB){
  if(portA.nodeId === portB.nodeId) return false;
  const nA = nodes.find(n=>n.id===portA.nodeId);
  const nB = nodes.find(n=>n.id===portB.nodeId);
  if(!nA || !nB) return false;
  // Check existing connection
  if(connections.some(c=>(c.from===nA.id&&c.to===nB.id)||(c.from===nB.id&&c.to===nA.id))) return false;
  // PC port to component port
  if(nA.type==='pc' && portA.portType==='cpu' && nB.type==='cpu') return true;
  if(nB.type==='pc' && portB.portType==='cpu' && nA.type==='cpu') return true;
  if(nA.type==='pc' && portA.portType==='power' && nB.type==='power') return true;
  if(nB.type==='pc' && portB.portType==='power' && nA.type==='power') return true;
  if(nA.type==='pc' && portA.portType==='blockchain' && nB.type==='blockchain') return true;
  if(nB.type==='pc' && portB.portType==='blockchain' && nA.type==='blockchain') return true;
  if(nA.type==='pc' && portA.portType==='wallet' && nB.type==='wallet') return true;
  if(nB.type==='pc' && portB.portType==='wallet' && nA.type==='wallet') return true;
  if(nA.type==='pc' && portA.portType==='ln' && nB.type==='ln') return true;
  if(nB.type==='pc' && portB.portType==='ln' && nA.type==='ln') return true;
  // PC cpu port accepts any PC_INPUT type
  if(nA.type==='pc' && portA.portType==='cpu' && PC_INPUTS.includes(nB.type)) return true;
  if(nB.type==='pc' && portB.portType==='cpu' && PC_INPUTS.includes(nA.type)) return true;
  // Non-PC component to PC (generic port match)
  if(nA.type==='pc' && PC_INPUTS.includes(nB.type) && portB.portType==='pc') return true;
  if(nB.type==='pc' && PC_INPUTS.includes(nA.type) && portA.portType==='pc') return true;
  if(nA.type==='pc' && PC_OUTPUTS.includes(nB.type) && portB.portType==='pc') return true;
  if(nB.type==='pc' && PC_OUTPUTS.includes(nA.type) && portA.portType==='pc') return true;
  return false;
}

function addConnection(nA, nB){
  let from, to, lineType;
  if(nA.type==='pc' && PC_OUTPUTS.includes(nB.type)){
    from=nA.id; to=nB.id; lineType=nB.type==='wallet'?'coin':(nB.type==='ln'?'lightning':'data');
  } else if(nB.type==='pc' && PC_OUTPUTS.includes(nA.type)){
    from=nB.id; to=nA.id; lineType=nA.type==='wallet'?'coin':(nA.type==='ln'?'lightning':'data');
  } else if(nB.type==='pc'){
    from=nA.id; to=nB.id; lineType=nA.type==='power'?'power':'data';
  } else if(nA.type==='pc'){
    from=nB.id; to=nA.id; lineType=nB.type==='power'?'power':'data';
  } else return;
  connections.push({from, to, lineType, progress:0});
  effects.push({type:'connectAnim',from,to,t:0,dur:0.3});
  playSound('connect');
  // Hide hint after first connection
  if(hintShown){ hintShown=false; document.getElementById('hint').style.opacity='0'; }
}

// ===== PC MINING ANALYSIS =====
function getPCStats(pc){
  const attached = connections.filter(c=>c.to===pc.id).map(c=>nodes.find(n=>n.id===c.from)).filter(Boolean);
  const outputs = connections.filter(c=>c.from===pc.id).map(c=>nodes.find(n=>n.id===c.to)).filter(Boolean);
  const cpus = attached.filter(n=>n.type==='cpu');
  const powers = attached.filter(n=>n.type==='power'&&!n.blackout);
  const coolers = attached.filter(n=>n.type==='cooler');
  const ssds = attached.filter(n=>n.type==='ssd');
  const networks = attached.filter(n=>n.type==='network');
  const ais = attached.filter(n=>n.type==='ai');
  const firewalls = attached.filter(n=>n.type==='firewall');
  const hasBlockchain = outputs.some(n=>n.type==='blockchain');
  const hasWallet = outputs.some(n=>n.type==='wallet');

  // Power calculation
  let powerUsed = 0;
  attached.forEach(n => { powerUsed += NODE_TYPES[n.type].watt || 0; });
  let powerSupply = 0;
  powers.forEach(n => { powerSupply += NODE_TYPES[n.type].supply || 0; });
  const powerOk = powerSupply >= powerUsed && powerSupply > 0;

  const canMine = cpus.length>0 && powers.length>0 && hasBlockchain && hasWallet && powerOk;
  let hashrate = cpus.length;
  let mult = 1;
  if(coolers.length>0) mult *= 1.5;
  if(ssds.length>0) mult *= 1.3;
  if(networks.length>0) mult *= 1.2;
  if(ais.length>0 && cpus.length>=2) mult *= 2;
  if(pc.infected) mult *= 0.25;
  const effectiveRate = hashrate * mult;
  const successRate = effectiveRate * 0.03 / difficulty;
  return {cpus:cpus.length, powers:powers.length, coolers:coolers.length, ssds:ssds.length,
    networks:networks.length, ais:ais.length, firewalls:firewalls.length,
    hasBlockchain, hasWallet, canMine, hashrate, mult, effectiveRate, successRate,
    hasFW: firewalls.length>0, powerUsed, powerSupply, powerOk};
}

// ===== SHOP =====
function buildShop(){
  const shop = document.getElementById('shop');
  shop.innerHTML = '';
  const items = ['pc','cpu','power','wallet','ln','cooler','ssd','network','ai','firewall'];
  items.forEach(t=>{
    const nt = NODE_TYPES[t];
    const div = document.createElement('div');
    div.className = 'shopItem' + (balance<nt.price&&nt.price>0?' disabled':'') + (selectedShopItem===t?' selected':'');
    div.innerHTML = '<span class="emoji">'+nt.emoji+'</span><span class="name">'+nt.name+'</span><span class="price">'+(nt.price>0?nt.price+'₱':'無料')+'</span>';
    div.onclick = ()=>{
      if(balance<nt.price&&nt.price>0){playSound('error');return}
      selectedShopItem = selectedShopItem===t ? null : t;
      buildShop();
    };
    shop.appendChild(div);
  });
}

// ===== INIT =====
function initGame(){
  resize();
  const cx = canvasW/2, cy = (gameAreaTop + gameAreaBottom)/2;
  nodes=[];connections=[];effects=[];particles=[];animatedPower={};
  balance=0;difficulty=1;difficultyTimer=0;malwareTimer=0;blackoutTimer=0;gameTime=0;miningCheckTimer=0;
  nextNodeId=1;selectedShopItem=null;hintShown=true;hintTimer=0;
  document.getElementById('hint').style.opacity='1';

  // Place initial nodes UNCONNECTED
  addNode('blockchain', cx - 75, cy - 120);
  addNode('pc', cx - 75, cy);
  addNode('wallet', cx + 100, cy);
  addNode('cpu', cx - 200, cy - 80);
  addNode('power', cx - 200, cy + 60);

  buildShop();
  updateUI();
  requestAnimationFrame(gameLoop);
}

function addNode(type, x, y){
  const n = {id:nextNodeId++, type, x, y, scale:0, infected:false, infectedTime:0, blackout:false, blackoutTime:0, lnBalance:0};
  nodes.push(n);
  effects.push({type:'spawn',x:x+WIN_W/2,y:y+30,t:0,dur:0.3});
  return n;
}

function resetGame(){
  if(confirm('ゲームをリセットしますか？')){
    localStorage.removeItem('picocoin_save');
    initGame();
  }
}

// ===== GAME LOOP =====
let lastTime = 0;
function gameLoop(ts){
  if(!gameStarted) return;
  const dt = Math.min((ts-(lastTime||ts))/1000, 0.1);
  lastTime = ts;
  gameTime += dt;
  update(dt);
  draw();
  requestAnimationFrame(gameLoop);
}

function update(dt){
  // Node spawn animation
  nodes.forEach(n=>{ if(n.scale<1) n.scale=Math.min(1, n.scale+dt*5); });

  // Animated power bars
  nodes.filter(n=>n.type==='pc').forEach(pc=>{
    const stats = getPCStats(pc);
    const target = stats.powerSupply > 0 ? stats.powerUsed / stats.powerSupply : 0;
    const cur = animatedPower[pc.id] || 0;
    animatedPower[pc.id] = cur + (target - cur) * Math.min(1, dt * 2);
  });

  // Difficulty increase every 5 min
  difficultyTimer += dt;
  if(difficultyTimer >= 300){ difficultyTimer=0; difficulty*=1.2; }

  // Mining check every second
  miningCheckTimer += dt;
  if(miningCheckTimer >= 1){
    miningCheckTimer = 0;
    let totalHash = 0;
    nodes.filter(n=>n.type==='pc').forEach(pc=>{
      const stats = getPCStats(pc);
      totalHash += stats.effectiveRate;
      if(stats.canMine && !pc.infected){
        if(Math.random() < stats.successRate){
          balance++;
          playSound('mine');
          effects.push({type:'sparkle',x:pc.x+WIN_W/2,y:pc.y+TITLE_H/2,t:0,dur:0.6});
          const wallet = nodes.find(n=>n.type==='wallet');
          if(wallet){
            particles.push({x:pc.x+WIN_W/2,y:pc.y+TITLE_H,tx:wallet.x+WIN_W/2,ty:wallet.y+TITLE_H,t:0,dur:0.8,text:'+1₱'});
          }
          buildShop(); updateUI();
        }
      }
    });
    document.getElementById('hashrateText').textContent = totalHash.toFixed(1);
  }

  // LN routing fee income
  nodes.filter(n=>n.type==='ln').forEach(ln=>{
    if(!ln.lnBalance) ln.lnBalance = 0;
    // Check if connected to a PC
    const connectedPC = connections.some(c=>c.from!==ln.id&&c.to===ln.id&&nodes.find(nd=>nd.id===c.from)?.type==='pc');
    if(connectedPC && ln.lnBalance >= 5){
      // Earn routing fees proportional to balance (more balance = route bigger txs)
      const fee = 0.1 * dt * Math.min(ln.lnBalance / 20, 3);
      ln.lnBalance += fee;
      // Periodically show routing animation
      if(Math.random() < 0.02){
        effects.push({type:'sparkle',x:ln.x+WIN_W/2,y:ln.y+TITLE_H/2,t:0,dur:0.4});
      }
    }
  });

  // Malware every 30s
  malwareTimer += dt;
  if(malwareTimer >= 30){
    malwareTimer = 0;
    nodes.filter(n=>n.type==='pc'&&!n.infected).forEach(pc=>{
      if(Math.random() < 0.1){
        const stats = getPCStats(pc);
        if(stats.hasFW){
          effects.push({type:'cure',x:pc.x+WIN_W/2,y:pc.y+30,t:0,dur:0.5});
          playSound('cure');
        } else {
          pc.infected = true; pc.infectedTime = 0;
          effects.push({type:'malware',x:pc.x+WIN_W/2,y:pc.y+30,t:0,dur:1});
          playSound('malware');
        }
      }
    });
  }

  // Blackout every 2 min
  blackoutTimer += dt;
  if(blackoutTimer >= 120){
    blackoutTimer = 0;
    const powers = nodes.filter(n=>n.type==='power'&&!n.blackout);
    if(powers.length>0 && Math.random()<0.05){
      const p = powers[Math.floor(Math.random()*powers.length)];
      p.blackout = true; p.blackoutTime = 30;
      effects.push({type:'blackout',x:p.x+WIN_W/2,y:p.y+30,t:0,dur:1});
    }
  }

  // Update blackout timers
  nodes.filter(n=>n.blackout).forEach(n=>{
    n.blackoutTime -= dt;
    if(n.blackoutTime <= 0) n.blackout = false;
  });

  // Hint auto-hide after 10s
  if(hintShown){
    hintTimer += dt;
    if(hintTimer > 10){ hintShown=false; document.getElementById('hint').style.opacity='0'; }
  }

  // Update effects
  effects.forEach(e=>e.t+=dt);
  effects = effects.filter(e=>e.t<e.dur);

  // Update particles
  particles.forEach(p=>p.t+=dt);
  particles = particles.filter(p=>p.t<p.dur);
}

function updateUI(){
  document.getElementById('balanceText').textContent = balance;
  document.getElementById('diffText').textContent = difficulty.toFixed(2);
}

// ===== DRAWING =====
function draw(){
  ctx.fillStyle = '#0a0e27';
  ctx.fillRect(0, 0, canvasW, canvasH);
  drawGrid();
  drawConnections();
  drawNodes();
  drawEffects();
  drawParticles();
  drawDragLine();
}

function drawGrid(){
  ctx.strokeStyle = '#0f1535';
  ctx.lineWidth = 0.5;
  for(let x=0;x<canvasW;x+=30){ ctx.beginPath();ctx.moveTo(x,gameAreaTop);ctx.lineTo(x,gameAreaBottom);ctx.stroke(); }
  for(let y=gameAreaTop;y<gameAreaBottom;y+=30){ ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(canvasW,y);ctx.stroke(); }
}

function drawConnections(){
  const t = gameTime;
  connections.forEach(c=>{
    const fromN = nodes.find(n=>n.id===c.from);
    const toN = nodes.find(n=>n.id===c.to);
    if(!fromN || !toN) return;

    // Find port positions
    let fx, fy, tx, ty;
    // from node's port that connects to toN
    const fromPorts = getNodePorts(fromN);
    const toPorts = getNodePorts(toN);

    // Determine which ports to use
    if(fromN.type === 'pc'){
      // PC output -> blockchain/wallet
      const outPort = fromPorts.find(p => {
        if(toN.type === 'blockchain' && p.portType === 'blockchain') return true;
        if(toN.type === 'wallet' && p.portType === 'wallet') return true;
        if(toN.type === 'ln' && p.portType === 'ln') return true;
        return false;
      });
      const inPort = toPorts.find(p => p.portType === 'pc');
      fx = outPort ? outPort.x : fromN.x + WIN_W;
      fy = outPort ? outPort.y : fromN.y + TITLE_H;
      tx = inPort ? inPort.x : toN.x + WIN_W;
      ty = inPort ? inPort.y : toN.y + TITLE_H;
    } else {
      // Component -> PC
      const outPort = fromPorts.find(p => p.portType === 'pc');
      let inPort;
      if(fromN.type === 'power'){
        inPort = toPorts.find(p => p.portType === 'power');
      } else {
        inPort = toPorts.find(p => p.portType === 'cpu');
      }
      fx = outPort ? outPort.x : fromN.x + WIN_W;
      fy = outPort ? outPort.y : fromN.y + TITLE_H;
      tx = inPort ? inPort.x : toN.x;
      ty = inPort ? inPort.y : toN.y + TITLE_H;
    }

    // Bezier control point
    const mx = (fx + tx) / 2;
    const my = (fy + ty) / 2 - 30;

    let col = '#4488ff';
    if(c.lineType === 'power') col = '#dd4444';
    else if(c.lineType === 'coin') col = '#ddaa22';
    else if(c.lineType === 'lightning') col = '#ff9900';

    ctx.strokeStyle = col;
    ctx.lineWidth = 2;
    ctx.globalAlpha = 0.6;
    ctx.beginPath();
    ctx.moveTo(fx, fy);
    ctx.quadraticCurveTo(mx, my, tx, ty);
    ctx.stroke();
    ctx.globalAlpha = 1;

    // Flowing particles
    for(let i=0;i<3;i++){
      const p = ((t*0.5+i/3)%1);
      const px = bezierPoint(fx,mx,tx,p);
      const py = bezierPoint(fy,my,ty,p);
      ctx.fillStyle = col;
      ctx.globalAlpha = 0.8;
      ctx.beginPath();ctx.arc(px,py,2.5,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha = 1;
    }
  });
}

function bezierPoint(p0,p1,p2,t){return(1-t)*(1-t)*p0+2*(1-t)*t*p1+t*t*p2}

function drawNodes(){
  nodes.forEach(n=>{
    const nt = NODE_TYPES[n.type];
    const h = getNodeHeight(n);
    const s = n.scale;
    if(s < 0.01) return;

    ctx.save();
    if(s < 1){
      ctx.globalAlpha = s;
      ctx.translate(n.x + WIN_W/2, n.y + h/2);
      ctx.scale(s, s);
      ctx.translate(-(n.x + WIN_W/2), -(n.y + h/2));
    }

    // Window shadow / glow
    ctx.shadowColor = 'rgba(60,80,180,0.3)';
    ctx.shadowBlur = 8;

    // Infected glow
    if(n.infected){
      const blink = Math.sin(gameTime*8) > 0 ? 1 : 0.3;
      ctx.shadowColor = 'rgba(255,0,0,'+blink+')';
      ctx.shadowBlur = 12;
    }

    // Blackout dim
    if(n.blackout) ctx.globalAlpha = (ctx.globalAlpha || 1) * 0.4;

    // Window body
    ctx.fillStyle = 'rgba(20,25,40,0.9)';
    ctx.strokeStyle = 'rgba(60,80,180,0.4)';
    ctx.lineWidth = 1;
    roundRect(ctx, n.x, n.y, WIN_W, h, 4);
    ctx.fill();
    ctx.stroke();

    ctx.shadowBlur = 0;

    // Title bar
    ctx.fillStyle = n.blackout ? '#333' : nt.titleColor;
    ctx.beginPath();
    ctx.moveTo(n.x + 4, n.y);
    ctx.lineTo(n.x + WIN_W - 4, n.y);
    ctx.arcTo(n.x + WIN_W, n.y, n.x + WIN_W, n.y + 4, 4);
    ctx.lineTo(n.x + WIN_W, n.y + TITLE_H);
    ctx.lineTo(n.x, n.y + TITLE_H);
    ctx.lineTo(n.x, n.y + 4);
    ctx.arcTo(n.x, n.y, n.x + 4, n.y, 4);
    ctx.closePath();
    ctx.fill();

    // Title text
    ctx.fillStyle = '#fff';
    ctx.font = 'bold '+FONT_SIZE+'px sans-serif';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText(nt.emoji+' '+nt.name, n.x+6, n.y+TITLE_H/2+1);

    // Status lines
    const lines = getNodeLines(n);
    ctx.font = FONT_SIZE+'px sans-serif';
    ctx.fillStyle = '#ccc';

    lines.forEach((line, i)=>{
      const ly = n.y + TITLE_H + i * LINE_H;

      // Line separator
      if(i > 0){
        ctx.strokeStyle = 'rgba(60,80,140,0.2)';
        ctx.lineWidth = 0.5;
        ctx.beginPath();ctx.moveTo(n.x+4,ly);ctx.lineTo(n.x+WIN_W-4,ly);ctx.stroke();
      }

      // Text
      ctx.fillStyle = '#ccc';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'middle';
      const textX = n.x + 6;
      const textY = ly + LINE_H/2;
      ctx.fillText(line.text, textX, textY);

      // Power bar
      if(line.bar !== undefined){
        const barX = n.x + 90;
        const barY = ly + 5;
        const barW = 36;
        const barH = 10;
        const animated = animatedPower[n.id] || 0;
        const fillW = Math.min(animated, 1) * barW;
        ctx.fillStyle = 'rgba(40,50,80,0.8)';
        ctx.fillRect(barX, barY, barW, barH);
        ctx.fillStyle = line.barOk ? '#44cc66' : '#dd4444';
        ctx.fillRect(barX, barY, fillW, barH);
        ctx.strokeStyle = 'rgba(80,100,160,0.5)';
        ctx.lineWidth = 0.5;
        ctx.strokeRect(barX, barY, barW, barH);
      }

      // Port
      if(line.port){
        const px = n.x + WIN_W - 12;
        const py = ly + LINE_H/2;
        const connected = isPortConnected(n, line.port);
        const isHover = hoverPort && hoverPort.node.id === n.id && hoverPort.port.portType === line.port;

        ctx.beginPath();
        ctx.arc(px, py, PORT_R, 0, Math.PI*2);
        if(connected){
          ctx.fillStyle = '#44cc66';
        } else if(isHover){
          ctx.fillStyle = '#ddcc44';
        } else {
          ctx.fillStyle = '#444455';
        }
        ctx.fill();
        ctx.strokeStyle = 'rgba(100,120,180,0.6)';
        ctx.lineWidth = 1;
        ctx.stroke();
      }
    });

    // Mining LED on title bar
    if(n.type === 'pc'){
      const stats = getPCStats(n);
      if(stats.canMine && !n.infected && stats.powerOk){
        ctx.fillStyle = Math.sin(gameTime*4)>0 ? '#44ff88' : '#226644';
        ctx.beginPath();ctx.arc(n.x+WIN_W-10, n.y+TITLE_H/2, 3, 0, Math.PI*2);ctx.fill();
      }
    }

    // Infected skull
    if(n.infected){
      ctx.font = '14px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('💀', n.x+WIN_W/2, n.y-8);
    }

    // Blackout icon
    if(n.blackout){
      ctx.globalAlpha = 1;
      ctx.font = '14px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('⚡', n.x+WIN_W/2, n.y-8);
    }

    ctx.restore();
  });
}

function roundRect(ctx, x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
}

function drawEffects(){
  effects.forEach(e=>{
    const p = e.t / e.dur;
    if(e.type === 'sparkle'){
      for(let i=0;i<6;i++){
        const a = Math.PI*2*i/6 + gameTime;
        const d = 20*p;
        ctx.fillStyle = 'rgba(255,215,0,'+(1-p)+')';
        ctx.beginPath();ctx.arc(e.x+Math.cos(a)*d, e.y+Math.sin(a)*d, 3*(1-p), 0, Math.PI*2);ctx.fill();
      }
      ctx.font = '12px sans-serif';ctx.fillStyle = 'rgba(255,215,0,'+(1-p)+')';ctx.textAlign='center';
      ctx.fillText('✨', e.x, e.y-15-p*20);
    }
    if(e.type === 'spawn'){
      ctx.strokeStyle = 'rgba(255,255,255,'+(0.5*(1-p))+')';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(e.x,e.y,30*p,0,Math.PI*2);ctx.stroke();
    }
    if(e.type === 'malware'){
      ctx.fillStyle = 'rgba(255,0,0,'+(0.3*(1-p))+')';
      ctx.beginPath();ctx.arc(e.x,e.y,40*p,0,Math.PI*2);ctx.fill();
    }
    if(e.type === 'cure'){
      ctx.strokeStyle = 'rgba(0,255,200,'+(1-p)+')';ctx.lineWidth=2;
      for(let i=0;i<4;i++){
        const a = Math.PI/2*i + p*2;
        ctx.beginPath();ctx.moveTo(e.x,e.y);
        ctx.lineTo(e.x+Math.cos(a)*30*p,e.y+Math.sin(a)*30*p);ctx.stroke();
      }
    }
  });
}

function drawParticles(){
  particles.forEach(p=>{
    const prog = p.t / p.dur;
    const ease = 1 - Math.pow(1-prog, 3);
    const px = p.x + (p.tx-p.x)*ease;
    const py = p.y + (p.ty-p.y)*ease - Math.sin(prog*Math.PI)*30;
    ctx.font = 'bold 14px sans-serif';
    ctx.fillStyle = 'rgba(255,215,0,'+(1-prog*0.5)+')';
    ctx.textAlign = 'center';
    ctx.fillText(p.text, px, py);
  });
}

function drawDragLine(){
  if(dragMode === 'port' && dragPort && dragLineEnd){
    ctx.strokeStyle = 'rgba(74,106,255,0.4)';
    ctx.lineWidth = 2;
    ctx.setLineDash([5,5]);
    ctx.beginPath();
    ctx.moveTo(dragPort.port.x, dragPort.port.y);
    ctx.lineTo(dragLineEnd.x, dragLineEnd.y);
    ctx.stroke();
    ctx.setLineDash([]);
  }
}

// ===== INPUT =====
function getPos(e){
  const r = canvas.getBoundingClientRect();
  const touch = e.touches ? e.touches[0] : e;
  return {x: touch.clientX - r.left, y: touch.clientY - r.top};
}

canvas.addEventListener('pointerdown', e=>{
  ensureAudio();
  const pos = getPos(e);
  lastPointerX = pos.x;
  lastPointerY = pos.y;

  if(pos.y < gameAreaTop || pos.y > gameAreaBottom){
    // Check if placing from shop
    return;
  }

  // Priority 1: Port drag (connection)
  const portHit = hitTestPort(pos.x, pos.y);
  if(portHit){
    dragMode = 'port';
    dragPort = portHit;
    dragLineEnd = {x: pos.x, y: pos.y};
    // Bring node to front
    const idx = nodes.indexOf(portHit.node);
    if(idx >= 0){ nodes.splice(idx,1); nodes.push(portHit.node); }
    return;
  }

  // Priority 2: Title bar drag (move)
  const titleHit = hitTestTitleBar(pos.x, pos.y);
  if(titleHit){
    dragMode = 'move';
    dragNode = titleHit;
    dragOffX = pos.x - titleHit.x;
    dragOffY = pos.y - titleHit.y;
    // Bring node to front
    const idx = nodes.indexOf(titleHit);
    if(idx >= 0){ nodes.splice(idx,1); nodes.push(titleHit); }
    return;
  }

  // Priority 3: Click on node body (cure malware / deposit to LN)
  const bodyHit = hitTestNode(pos.x, pos.y);
  if(bodyHit){
    if(bodyHit.infected){
      bodyHit.infected = false;
      effects.push({type:'cure',x:bodyHit.x+WIN_W/2,y:bodyHit.y+30,t:0,dur:0.5});
      playSound('cure');
    } else if(bodyHit.type === 'ln'){
      // Deposit 1₱ from wallet to LN
      if(balance >= 1){
        balance -= 1;
        if(!bodyHit.lnBalance) bodyHit.lnBalance = 0;
        bodyHit.lnBalance += 1;
        effects.push({type:'sparkle',x:bodyHit.x+WIN_W/2,y:bodyHit.y+TITLE_H/2,t:0,dur:0.4});
        playSound('buy');
        updateUI(); buildShop();
      } else {
        playSound('error');
      }
    }
    return;
  }

  // Priority 4: Place from shop
  if(selectedShopItem){
    const nt = NODE_TYPES[selectedShopItem];
    if(balance >= nt.price){
      balance -= nt.price;
      addNode(selectedShopItem, pos.x - WIN_W/2, pos.y - 20);
      playSound(nt.price > 0 ? 'buy' : 'place');
      updateUI(); buildShop();
    }
  }
});

canvas.addEventListener('pointermove', e=>{
  const pos = getPos(e);
  lastPointerX = pos.x;
  lastPointerY = pos.y;

  if(dragMode === 'move' && dragNode){
    dragNode.x = pos.x - dragOffX;
    dragNode.y = Math.max(gameAreaTop, Math.min(gameAreaBottom - 40, pos.y - dragOffY));
  } else if(dragMode === 'port'){
    dragLineEnd = {x: pos.x, y: pos.y};
    // Highlight target port
    const targetPort = hitTestPort(pos.x, pos.y);
    if(targetPort && targetPort.node.id !== dragPort.node.id){
      hoverPort = targetPort;
    } else {
      hoverPort = null;
    }
  } else {
    // Hover highlight
    const ph = hitTestPort(pos.x, pos.y);
    hoverPort = ph || null;
  }
});

canvas.addEventListener('pointerup', e=>{
  const pos = getPos(e);

  if(dragMode === 'port' && dragPort){
    // Try to connect
    const targetPort = hitTestPort(pos.x, pos.y);
    if(targetPort && targetPort.node.id !== dragPort.node.id){
      if(canConnectPorts(dragPort.port, targetPort.port)){
        addConnection(dragPort.node, targetPort.node);
      } else {
        playSound('error');
      }
    }
  }

  dragMode = null;
  dragNode = null;
  dragPort = null;
  dragLineEnd = null;
  hoverPort = null;
});

canvas.addEventListener('pointerleave', ()=>{
  dragMode = null;
  dragNode = null;
  dragPort = null;
  dragLineEnd = null;
  hoverPort = null;
  lastPointerX = null;
  lastPointerY = null;
});

// ===== SAVE/LOAD =====
function saveGame(){
  try{
    const data = {
      nodes: nodes.map(n=>({id:n.id, type:n.type, x:n.x, y:n.y, infected:n.infected, blackout:n.blackout, blackoutTime:n.blackoutTime, lnBalance:n.lnBalance||0})),
      connections: connections.map(c=>({from:c.from, to:c.to, lineType:c.lineType})),
      balance, difficulty, gameTime, nextNodeId
    };
    localStorage.setItem('picocoin_save', JSON.stringify(data));
  }catch(e){}
}

function loadGame(){
  try{
    const raw = localStorage.getItem('picocoin_save');
    if(!raw) return false;
    const data = JSON.parse(raw);
    nodes = data.nodes.map(n=>({...n, scale:1, infectedTime:0, blackout:n.blackout||false, blackoutTime:n.blackoutTime||0, lnBalance:n.lnBalance||0}));
    connections = data.connections.map(c=>({...c, progress:1}));
    balance = data.balance;
    difficulty = data.difficulty;
    gameTime = data.gameTime || 0;
    nextNodeId = data.nextNodeId || 100;
    animatedPower = {};
    return true;
  }catch(e){return false}
}

setInterval(saveGame, 30000);

// Override initGame to try load first
const origInit = initGame;
initGame = function(){
  resize();
  if(!loadGame()){
    origInit();
    return;
  }
  hintShown = false;
  document.getElementById('hint').style.opacity = '0';
  buildShop(); updateUI();
  requestAnimationFrame(gameLoop);
};

resize();
</script>
