<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0e27;font-family:'Segoe UI',sans-serif;color:#e0e0ff;touch-action:none}
#gameCanvas{display:block;width:100%;cursor:default}
#ui{position:absolute;top:0;left:0;width:100%;pointer-events:none}
#statusBar{display:flex;justify-content:space-between;align-items:center;padding:8px 16px;background:rgba(10,14,39,0.9);border-bottom:1px solid #1a2050;pointer-events:auto;font-size:14px;z-index:10}
#statusBar .balance{font-size:20px;font-weight:bold;color:#ffd700}
#statusBar .difficulty{color:#88aaff;font-size:13px}
#statusBar .hashrate{color:#44ff88;font-size:13px}
#bottomPanel{position:absolute;bottom:0;left:0;width:100%;pointer-events:auto;z-index:10}
#shopTabs{display:flex;gap:0;background:rgba(15,20,45,0.95);border-top:1px solid #1a2050;border-bottom:1px solid #1a2050}
.shopTab{flex:1;padding:8px 4px;text-align:center;font-size:12px;color:#668;background:rgba(15,20,45,0.95);border:none;cursor:pointer;transition:all .2s;border-right:1px solid #1a2050}
.shopTab:last-child{border-right:none}
.shopTab.active{color:#fff;background:rgba(40,50,100,0.9);font-weight:bold}
#shop{display:flex;gap:6px;padding:8px;background:rgba(10,14,39,0.95);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
#shop::-webkit-scrollbar{display:none}
.shopItem{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;padding:6px 10px;border:1px solid #334;border-radius:8px;background:#151a3a;cursor:grab;min-width:64px;transition:all .2s;touch-action:none}
.shopItem.disabled{opacity:0.35;cursor:not-allowed}
.shopItem .emoji{font-size:22px;pointer-events:none}
.shopItem .name{font-size:10px;color:#aac;margin-top:2px;white-space:nowrap;pointer-events:none}
.shopItem .price{font-size:11px;color:#ffd700;font-weight:bold;pointer-events:none}
#shopDragPreview{position:fixed;pointer-events:none;z-index:200;opacity:0.7;display:none;padding:8px 14px;border:2px solid #4a6aff;border-radius:10px;background:rgba(20,25,50,0.9);box-shadow:0 0 20px rgba(74,106,255,0.6);text-align:center;font-size:18px;transform:translate(-50%,-50%)}

#startBtn{padding:16px 48px;font-size:22px;background:linear-gradient(135deg,#2a3a8a,#4a6aff);color:#fff;border:none;border-radius:12px;cursor:pointer;box-shadow:0 0 30px rgba(74,106,255,0.4);transition:transform .2s;margin-bottom:16px}
#startBtn:hover{transform:scale(1.05)}
#resetTitleBtn{padding:8px 20px;font-size:13px;background:transparent;color:#666;border:1px solid #333;border-radius:8px;cursor:pointer;transition:all .2s}

.rp-tree-node{position:absolute;width:110px;padding:6px 4px;border:2px solid #334;border-radius:8px;background:rgba(25,30,55,0.95);text-align:center;cursor:pointer;transition:all .2s;font-size:11px}

.rp-tree-node.available{border-color:#ddcc44;box-shadow:0 0 8px rgba(221,204,68,0.3)}

.rp-tree-node .rtn-cost{font-size:9px;color:#ffd700}
.rp-detail-popup{position:absolute;bottom:0;left:0;right:0;background:rgba(20,25,50,0.98);border-top:1px solid #4a6aff;padding:12px 16px;border-radius:0 0 12px 12px;z-index:5}

<script>
'use strict';

// ===== AUDIO =====
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function ensureAudio(){if(!audioCtx)audioCtx=new AudioCtx()}
function playSound(type){
  ensureAudio();
  const ctx=audioCtx,now=ctx.currentTime;
  const o=ctx.createOscillator(),g=ctx.createGain();
  o.connect(g);g.connect(ctx.destination);
  switch(type){
    case'place':o.type='sine';o.frequency.setValueAtTime(600,now);o.frequency.exponentialRampToValueAtTime(900,now+0.08);g.gain.setValueAtTime(0.3,now);g.gain.exponentialRampToValueAtTime(0.01,now+0.15);o.start(now);o.stop(now+0.15);break;
    case'connect':o.type='sawtooth';o.frequency.setValueAtTime(1200,now);o.frequency.exponentialRampToValueAtTime(400,now+0.12);g.gain.setValueAtTime(0.15,now);g.gain.exponentialRampToValueAtTime(0.01,now+0.12);o.start(now);o.stop(now+0.12);break;
    case'mine':o.type='sine';o.frequency.setValueAtTime(800,now);o.frequency.setValueAtTime(1000,now+0.05);o.frequency.setValueAtTime(1200,now+0.1);g.gain.setValueAtTime(0.2,now);g.gain.exponentialRampToValueAtTime(0.01,now+0.3);o.start(now);o.stop(now+0.3);break;
    case'malware':o.type='square';o.frequency.setValueAtTime(150,now);g.gain.setValueAtTime(0.2,now);g.gain.exponentialRampToValueAtTime(0.01,now+0.4);o.start(now);o.stop(now+0.4);break;
    case'cure':o.type='sine';o.frequency.setValueAtTime(500,now);o.frequency.exponentialRampToValueAtTime(2000,now+0.15);g.gain.setValueAtTime(0.2,now);g.gain.exponentialRampToValueAtTime(0.01,now+0.2);o.start(now);o.stop(now+0.2);break;
    case'buy':o.type='triangle';o.frequency.setValueAtTime(400,now);o.frequency.setValueAtTime(600,now+0.05);o.frequency.setValueAtTime(800,now+0.1);g.gain.setValueAtTime(0.25,now);g.gain.exponentialRampToValueAtTime(0.01,now+0.15);o.start(now);o.stop(now+0.15);break;
    case'error':o.type='square';o.frequency.setValueAtTime(200,now);g.gain.setValueAtTime(0.15,now);g.gain.exponentialRampToValueAtTime(0.01,now+0.15);o.start(now);o.stop(now+0.15);break;
    case'delete':o.type='sawtooth';o.frequency.setValueAtTime(400,now);o.frequency.exponentialRampToValueAtTime(100,now+0.2);g.gain.setValueAtTime(0.2,now);g.gain.exponentialRampToValueAtTime(0.01,now+0.25);o.start(now);o.stop(now+0.25);break;
  }
}

// ===== CONSTANTS =====
const WIN_W = 195;
const TITLE_H = 32;
const LINE_H = 24;
const FONT_SIZE = 12;
const PORT_R = 8;

const PORT_CATEGORY_COLORS = {
  power: '#dd4444',
  data: '#4488ff',
  coin: '#ddaa22',
  network: '#9944dd',
  connected: '#44cc66'
};

const PORT_ICONS = {
  cpu: '🔲', power: '🔌', cooler: '🧊', ssd: '💾', firewall: '🛡️',
  network: '📡', ai: '🤖',
  blockchain: '⛓️', wallet: '👛',
  to_pc: '→💻', to_lnwallet: '→💰',
  from_pc: '←💻', from_server: '←🖥️', from_ln: '←⚡', from_wallet: '←👛',
  ln_node: '⚡'
};

function getPortCategory(portType){
  if(['power'].indexOf(portType)>=0) return 'power';
  if(['cpu','cooler','ssd','firewall','ai','from_pc','from_server'].indexOf(portType)>=0) return 'data';
  if(['wallet','to_lnwallet','from_wallet','from_ln'].indexOf(portType)>=0) return 'coin';
  if(['blockchain','network','ln_node'].indexOf(portType)>=0) return 'network';
  return 'data';
}

function getPortCategoryForNode(nodeType, portType){
  if(portType === 'to_pc'){
    if(nodeType === 'power') return 'power';
    return 'data';
  }
  if(portType === 'power') return 'power';
  if(['cpu','cooler','ssd','firewall','ai'].indexOf(portType)>=0) return 'data';
  if(['blockchain','from_pc'].indexOf(portType)>=0) return 'network';
  if(['wallet','to_lnwallet','from_wallet','from_ln'].indexOf(portType)>=0) return 'coin';
  if(['network','ln_node','from_server'].indexOf(portType)>=0) return 'network';
  return 'data';
}

function isMultiPort(nodeType, portType){
  if(nodeType === 'mining_pc' && portType === 'cpu') return true;
  if(nodeType === 'mining_pc' && portType === 'power') return true;
  if(nodeType === 'blockchain' && portType === 'from_pc') return true;
  if(nodeType === 'wallet' && portType === 'from_pc') return true;
  if(nodeType === 'server' && portType === 'cpu') return true;
  return false;
}

function countPortConnections(nodeId, portType, side){
  return connections.filter(function(c){
    if(side === 'right') return c.to === nodeId && c.toPort === portType;
    return c.from === nodeId && c.fromPort === portType;
  }).length;
}

var compatiblePorts = [];
function updateCompatiblePorts(fromPort){
  compatiblePorts = [];
  if(!fromPort) return;
  nodes.forEach(function(n){
    var ports = getNodePortPositions(n);
    ports.forEach(function(p){
      if(fromPort.side === 'left' && p.side === 'right'){
        if(canConnect(fromPort, p)) compatiblePorts.push({nodeId:p.nodeId, defIndex:p.defIndex});
      } else if(fromPort.side === 'right' && p.side === 'left'){
        if(canConnect(p, fromPort)) compatiblePorts.push({nodeId:p.nodeId, defIndex:p.defIndex});
      }
    });
  });
}
function isCompatiblePort(nodeId, defIndex){
  return compatiblePorts.some(function(cp){return cp.nodeId===nodeId && cp.defIndex===defIndex});
}

const MINING_PC_OUTPUTS = ['blockchain','wallet'];

const SERVER_OUTPUTS = ['ln_node'];

function getPortDefs(nodeType){
  switch(nodeType){
    case 'mining_pc': return [
      {side:'right',type:'cpu',label:'CPU'},
      {side:'right',type:'cooler',label:'冷却'},

// ===== RESEARCH TREE (NEW) =====
const RESEARCH_TREE = [
  // Mining tree

let researchCompleted = ['basic_mining'];

// ===== CAMERA =====
let camera = {x:0, y:0, zoom:1};

// ===== GAME STATE =====
let nodes = [];

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resize(){
  const dpr = window.devicePixelRatio || 1;
  canvasW = window.innerWidth;
  canvasH = window.innerHeight;
  canvas.width = canvasW * dpr;
  canvas.height = canvasH * dpr;
  canvas.style.width = canvasW + 'px';
  canvas.style.height = canvasH + 'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  gameAreaTop = 42;
  const bp = document.getElementById('bottomPanel');
  gameAreaBottom = canvasH - (bp ? bp.offsetHeight : 80);
}
window.addEventListener('resize', resize);

function screenToWorld(sx, sy){
  return {
    x: (sx - canvasW/2) / camera.zoom + camera.x + canvasW/2,
    y: (sy - canvasH/2) / camera.zoom + camera.y + canvasH/2
  };
}

function worldToScreen(wx, wy){
  return {
    x: (wx - camera.x - canvasW/2) * camera.zoom + canvasW/2,
    y: (wy - camera.y - canvasH/2) * camera.zoom + canvasH/2
  };
}

function centerCameraOnBlockchain(){
  var bc = nodes.find(function(n){return n.type === 'blockchain'});
  if(bc){
    camera.x = bc.x + WIN_W/2 - canvasW/2;
    camera.y = bc.y + 30 - canvasH/2;
  }
  camera.zoom = 1.0;
}

// ===== TITLE SCREEN =====
(function titleAnim(){
  const tc = document.getElementById('titleCanvas');
  const tctx = tc.getContext('2d');
  const dpr = window.devicePixelRatio||1;
  function resizeTitle(){tc.width=window.innerWidth*dpr;tc.height=window.innerHeight*dpr;tctx.setTransform(dpr,0,0,dpr,0,0)}
  resizeTitle();
  const lines=[];
  for(let i=0;i<30;i++)lines.push({x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,l:50+Math.random()*100,a:Math.random()*Math.PI*2,s:0.2+Math.random()*0.5});
  function drawTitle(){
    if(gameStarted)return;
    const w=window.innerWidth,h=window.innerHeight;
    tctx.fillStyle='#0a0e27';tctx.fillRect(0,0,w,h);
    tctx.strokeStyle='#1a2050';tctx.lineWidth=0.5;
    for(let x=0;x<w;x+=40){tctx.beginPath();tctx.moveTo(x,0);tctx.lineTo(x,h);tctx.stroke()}
    for(let y=0;y<h;y+=40){tctx.beginPath();tctx.moveTo(0,y);tctx.lineTo(w,y);tctx.stroke()}
    const t=Date.now()*0.001;
    lines.forEach(function(ln){
      tctx.strokeStyle='rgba(74,106,255,'+(0.15+0.1*Math.sin(t+ln.x))+')';
      tctx.lineWidth=1;
      tctx.beginPath();tctx.moveTo(ln.x,ln.y);
      tctx.lineTo(ln.x+Math.cos(ln.a)*ln.l,ln.y+Math.sin(ln.a)*ln.l);
      tctx.stroke();
    });
    requestAnimationFrame(drawTitle);
  }
  drawTitle();
})();

    lines.push({text:'電力: '+stats.powerUsed+'/'+stats.powerSupply+'W', bar:stats.powerSupply>0?Math.min(stats.powerUsed/stats.powerSupply,1.5):0, barOk:stats.powerOk, rightPort:1});

// ===== PORT POSITIONS =====
function getNodePortPositions(n){
  var portDefs = getPortDefs(n.type);
  var nodeLines = getNodeLines(n);
  var result = [];

  var leftPorts = [];
  var rightPorts = [];
  nodeLines.forEach(function(line, i){
    if(line.leftPort !== undefined) leftPorts.push({lineIdx:i, portIdx:line.leftPort});
    if(line.rightPort !== undefined) rightPorts.push({lineIdx:i, portIdx:line.rightPort});
  });

  var leftDefIdx = 0, rightDefIdx = 0;
  portDefs.forEach(function(pd, pi){
    var px, py;
    if(pd.side === 'left'){
      if(leftDefIdx < leftPorts.length){
        var lp = leftPorts[leftDefIdx];
        px = n.x;
        py = n.y + TITLE_H + lp.lineIdx * LINE_H + LINE_H/2;
        leftDefIdx++;
      } else {
        px = n.x;
        py = n.y + TITLE_H + (nodeLines.length - 1) * LINE_H + LINE_H/2;
      }
    } else {
      if(rightDefIdx < rightPorts.length){
        var rp = rightPorts[rightDefIdx];
        px = n.x + WIN_W;
        py = n.y + TITLE_H + rp.lineIdx * LINE_H + LINE_H/2;
        rightDefIdx++;
      } else {
        px = n.x + WIN_W;
        py = n.y + TITLE_H + (nodeLines.length - 1) * LINE_H + LINE_H/2;
      }
    }
    result.push({x:px, y:py, side:pd.side, type:pd.type, label:pd.label, defIndex:pi, nodeId:n.id, nodeType:n.type});
  });

  return result;
}

// ===== CONNECTION VALIDATION =====
function canConnect(fromPort, toPort){
  if(fromPort.side !== 'left' || toPort.side !== 'right') return false;
  if(fromPort.nodeId === toPort.nodeId) return false;

  var fromNode = nodes.find(function(nd){return nd.id===fromPort.nodeId});
  var toNode = nodes.find(function(nd){return nd.id===toPort.nodeId});
  if(!fromNode || !toNode) return false;

  var exists = connections.some(function(c){
    return c.from===fromPort.nodeId && c.to===toPort.nodeId && c.fromPort===fromPort.type && c.toPort===toPort.type;
  });
  if(exists) return false;

  if(['cpu','power','cooler','ssd','firewall'].indexOf(fromNode.type) >= 0 && fromPort.type === 'to_pc'){
    if(toNode.type === 'mining_pc' && toPort.type === fromNode.type) return true;
  }
  if(['cpu','power','network','firewall'].indexOf(fromNode.type) >= 0 && fromPort.type === 'to_pc'){
    if(toNode.type === 'server' && toPort.type === fromNode.type) return true;
  }
  if(fromNode.type === 'ai' && fromPort.type === 'to_pc'){
    if(toNode.type === 'mining_pc' && toPort.type === 'cpu') return true;
  }
  if(fromNode.type === 'mining_pc' && fromPort.type === 'blockchain'){
    if(toNode.type === 'blockchain' && toPort.type === 'from_pc') return true;
  }
  if(fromNode.type === 'mining_pc' && fromPort.type === 'wallet'){
    if(toNode.type === 'wallet' && toPort.type === 'from_pc') return true;
  }
  if(fromNode.type === 'server' && fromPort.type === 'ln_node'){
    if(toNode.type === 'ln_node' && toPort.type === 'from_server') return true;
  }
  if(fromNode.type === 'ln_node' && fromPort.type === 'to_lnwallet'){
    if(toNode.type === 'ln_wallet' && toPort.type === 'from_ln') return true;
  }
  if(fromNode.type === 'wallet' && fromPort.type === 'to_lnwallet'){
    if(toNode.type === 'ln_wallet' && toPort.type === 'from_wallet') return true;
  }

  return false;
}

function addConnection(fromPort, toPort){
  var lineType = 'data';
  if(fromPort.type === 'to_pc'){
    var fromNode = nodes.find(function(nd){return nd.id===fromPort.nodeId});
    if(fromNode && fromNode.type === 'power') lineType = 'power';
  }
  if(fromPort.type === 'blockchain') lineType = 'data';
  if(fromPort.type === 'wallet') lineType = 'coin';
  if(fromPort.type === 'ln_node') lineType = 'lightning';
  if(fromPort.type === 'to_lnwallet') lineType = 'lightning';

  connections.push({
    from: fromPort.nodeId,
    to: toPort.nodeId,
    fromPort: fromPort.type,
    toPort: toPort.type,
    fromDefIndex: fromPort.defIndex,
    toDefIndex: toPort.defIndex,
    lineType: lineType
  });
  playSound('connect');
  if(hintShown){hintShown=false;hintFadeState='hidden';document.getElementById('hint').style.opacity='0';}
}

// ===== PC STATS (with new research effects) =====
function getPCStats(pc){
  if(pc.type !== 'mining_pc') return {};
  var attached = connections.filter(function(c){return c.to===pc.id}).map(function(c){return nodes.find(function(n){return n.id===c.from})}).filter(Boolean);
  var outputs = connections.filter(function(c){return c.from===pc.id}).map(function(c){return nodes.find(function(n){return n.id===c.to})}).filter(Boolean);

  var cpus = attached.filter(function(n){return n.type==='cpu'});
  var powers = attached.filter(function(n){return n.type==='power'&&!n.blackout});
  var coolers = attached.filter(function(n){return n.type==='cooler'});
  var ssds = attached.filter(function(n){return n.type==='ssd'});
  var ais = attached.filter(function(n){return n.type==='ai'});
  var firewalls = attached.filter(function(n){return n.type==='firewall'});
  var hasBlockchain = outputs.some(function(n){return n.type==='blockchain'});
  var hasWallet = outputs.some(function(n){return n.type==='wallet'});

  var powerUsed = 0;
  attached.forEach(function(n){powerUsed += NODE_TYPES[n.type].watt || 0;});
  var powerSupply = 0;
  powers.forEach(function(n){powerSupply += NODE_TYPES[n.type].supply || 0;});
  // Research: power efficiency
  if(researchCompleted.indexOf('green_energy')>=0) powerUsed = Math.ceil(powerUsed * 0.7);
  // Research: power supply boost
  if(researchCompleted.indexOf('fusion_power')>=0) powerSupply = Math.floor(powerSupply * 3);
  else if(researchCompleted.indexOf('solar_panel')>=0) powerSupply = Math.floor(powerSupply * 1.5);
  var powerOk = powerSupply >= powerUsed && powerSupply > 0;
  var canMine = cpus.length > 0 && powers.length > 0 && hasBlockchain && hasWallet && powerOk;

  var hashrate = cpus.length;
  var mult = 1;
  if(researchCompleted.indexOf('gpu_boost')>=0) mult *= 1.5;
  // Cooler research: cooling_tech → 2x, liquid_nitrogen → 3x (replaces)
  if(coolers.length>0){
    if(researchCompleted.indexOf('liquid_nitrogen')>=0) mult *= 3;
    else if(researchCompleted.indexOf('cooling_tech')>=0) mult *= 2;
    else mult *= 1.5;
  }
  if(ssds.length>0) mult *= 1.3;
  if(ais.length>0 && cpus.length>=2) mult *= 2;
  if(pc.infected) mult *= 0.25;
  // Research: quantum → 2x, tpu_boost → 5x (stacks)
  if(researchCompleted.indexOf('quantum')>=0) mult *= 2;
  if(researchCompleted.indexOf('tpu_boost')>=0) mult *= 5;
  var effectiveRate = hashrate * mult;
  var gaugeSpeed = effectiveRate * 0.06 / difficulty;
  if(researchCompleted.indexOf('ai_mining')>=0) gaugeSpeed *= 2;

  return {cpus:cpus.length,powers:powers.length,coolers:coolers.length,ssds:ssds.length,ais:ais.length,
    firewalls:firewalls.length,hasBlockchain:hasBlockchain,hasWallet:hasWallet,canMine:canMine,
    hashrate:hashrate,mult:mult,effectiveRate:effectiveRate,gaugeSpeed:gaugeSpeed,
    hasFW:firewalls.length>0,powerUsed:powerUsed,powerSupply:powerSupply,powerOk:powerOk};
}

function getServerStats(sv){
  if(sv.type !== 'server') return {};
  var attached = connections.filter(function(c){return c.to===sv.id}).map(function(c){return nodes.find(function(n){return n.id===c.from})}).filter(Boolean);
  var outputs = connections.filter(function(c){return c.from===sv.id}).map(function(c){return nodes.find(function(n){return n.id===c.to})}).filter(Boolean);

  var cpus = attached.filter(function(n){return n.type==='cpu'});
  var powers = attached.filter(function(n){return n.type==='power'&&!n.blackout});
  var networks = attached.filter(function(n){return n.type==='network'});
  var firewalls = attached.filter(function(n){return n.type==='firewall'});
  var hasLN = outputs.some(function(n){return n.type==='ln_node'});

  var powerUsed = 0;
  attached.forEach(function(n){powerUsed += NODE_TYPES[n.type].watt || 0;});
  var powerSupply = 0;
  powers.forEach(function(n){powerSupply += NODE_TYPES[n.type].supply || 0;});
  if(researchCompleted.indexOf('green_energy')>=0) powerUsed = Math.ceil(powerUsed * 0.7);
  if(researchCompleted.indexOf('fusion_power')>=0) powerSupply = Math.floor(powerSupply * 3);
  else if(researchCompleted.indexOf('solar_panel')>=0) powerSupply = Math.floor(powerSupply * 1.5);
  var powerOk = powerSupply >= powerUsed && powerSupply > 0;
  var processingPower = cpus.length + (networks.length > 0 ? 2 : 0);
  var canRoute = cpus.length > 0 && powers.length > 0 && hasLN && powerOk;

  return {cpus:cpus.length,powers:powers.length,networks:networks.length,firewalls:firewalls.length,
    hasLN:hasLN,canRoute:canRoute,processingPower:processingPower,
    hasFW:firewalls.length>0,powerUsed:powerUsed,powerSupply:powerSupply,powerOk:powerOk};
}

// ===== SHOP (Drag & Drop) =====
var SHOP_TABS = {
  pc: ['mining_pc','server'],
  parts: ['cpu','power','cooler','ssd','network','ai','firewall'],
  network: ['blockchain','wallet','ln_node','ln_wallet','exchange']
};

function switchTab(tab, el){
  currentShopTab = tab;
  document.querySelectorAll('.shopTab').forEach(function(t){t.classList.remove('active')});
  el.classList.add('active');
  buildShop();
}

function buildShop(){
  var shop = document.getElementById('shop');
  shop.innerHTML = '';
  var items = SHOP_TABS[currentShopTab] || [];
  items.forEach(function(t){
    var nt = NODE_TYPES[t];
    var canBuy = balance >= nt.price || nt.price === 0;
    var div = document.createElement('div');
    div.className = 'shopItem' + (canBuy ? '' : ' disabled');
    div.setAttribute('data-type', t);
    div.innerHTML = '<span class="emoji">'+nt.emoji+'</span><span class="name">'+nt.name+'</span><span class="price">'+(nt.price>0?nt.price+'₱':'無料')+'</span>';
    // Drag start handler
    div.addEventListener('pointerdown', function(e){
      if(!canBuy){playSound('error');return}
      e.preventDefault();
      e.stopPropagation();
      ensureAudio();
      isShopDragging = true;
      shopDragType = t;
      shopDragStartX = e.clientX;
      shopDragStartY = e.clientY;
      shopDragMoved = false;
      var preview = document.getElementById('shopDragPreview');
      preview.innerHTML = '<span class="rtn-emoji">'+nt.emoji+'</span><div class="sdp-name">'+nt.name+'</div>';
      preview.style.left = e.clientX + 'px';
      preview.style.top = e.clientY + 'px';
      preview.style.display = 'block';
    });
    shop.appendChild(div);
  });
}

// Global handlers for shop drag
document.addEventListener('pointermove', function(e){
  if(!isShopDragging) return;
  var dx = e.clientX - shopDragStartX;
  var dy = e.clientY - shopDragStartY;
  if(Math.abs(dx) > 5 || Math.abs(dy) > 5) shopDragMoved = true;
  var preview = document.getElementById('shopDragPreview');
  preview.style.left = e.clientX + 'px';
  preview.style.top = e.clientY + 'px';
});

document.addEventListener('pointerup', function(e){
  if(!isShopDragging) return;
  isShopDragging = false;
  var preview = document.getElementById('shopDragPreview');
  preview.style.display = 'none';
  if(!shopDragMoved || !shopDragType) return;
  // Check if drop position is over the game canvas area
  var r = canvas.getBoundingClientRect();
  var sx = e.clientX - r.left;
  var sy = e.clientY - r.top;
  if(sx < 0 || sy < 0 || sx > r.width || sy > r.height) return;
  if(sy < gameAreaTop || sy > gameAreaBottom) return;
  var nt = NODE_TYPES[shopDragType];
  if(balance < nt.price && nt.price > 0){playSound('error');return}
  var world = screenToWorld(sx, sy);
  balance -= nt.price;
  addNode(shopDragType, world.x - WIN_W/2, world.y - 20);
  playSound(nt.price > 0 ? 'buy' : 'place');
  updateUI();buildShop();
});

// ===== DELETE FUNCTIONALITY =====
function deleteNodeConfirm(node){
  if(node.type === 'blockchain' || node.type === 'wallet'){
    alert('システムノードは削除できません');
    return;
  }
  var nt = NODE_TYPES[node.type];
  var refund = Math.floor(nt.price * 0.5);
  var msg = nt.emoji + ' ' + nt.name + ' を削除しますか？';
  if(refund > 0) msg += '\n（返金: ' + refund + '₱）';
  if(confirm(msg)){
    connections = connections.filter(function(c){
      return c.from !== node.id && c.to !== node.id;
    });
    nodes = nodes.filter(function(n){return n.id !== node.id});
    balance += refund;
    playSound('delete');
    effects.push({type:'spawn',x:node.x+WIN_W/2,y:node.y+30,t:0,dur:0.4});
    updateUI();buildShop();
  }
}

// ===== CONNECTION GUIDE =====
function showConnectionGuide(){
  var guide = document.getElementById('connectionGuide');
  var bubble = document.getElementById('guideBubble');
  var arrow = document.getElementById('guideArrow');
  if(!guide) return;
  var cpu = nodes.find(function(n){return n.type==='cpu'});
  var pc = nodes.find(function(n){return n.type==='mining_pc'});
  if(!cpu || !pc){guide.style.display='none';return;}
  var cpuPorts = getNodePortPositions(cpu);
  var pcPorts = getNodePortPositions(pc);
  var cpuOut = cpuPorts.find(function(p){return p.type==='to_pc'});
  var pcIn = pcPorts.find(function(p){return p.type==='cpu'});
  if(!cpuOut || !pcIn){guide.style.display='none';return;}
  var sp1 = worldToScreen(cpuOut.x, cpuOut.y);
  var sp2 = worldToScreen(pcIn.x, pcIn.y);
  var midX = (sp1.x + sp2.x) / 2;
  var midY = (sp1.y + sp2.y) / 2;
  bubble.style.left = midX + 'px';
  bubble.style.top = (midY - 40) + 'px';
  bubble.style.transform = 'translateX(-50%)';
  arrow.style.left = (sp1.x + 10) + 'px';
  arrow.style.top = (sp1.y - 14) + 'px';
  guide.classList.add('visible');
  setTimeout(function(){
    guide.classList.remove('visible');
    setTimeout(function(){guide.style.display='none';}, 600);
  }, 5000);
}

function initGame(){
  resize();
  var cy = (gameAreaTop + gameAreaBottom)/2;
  nodes=[];connections=[];effects=[];particles=[];animatedPower={};
  balance=0;difficulty=1;difficultyTimer=0;malwareTimer=0;blackoutTimer=0;gameTime=0;miningCheckTimer=0;
  nextNodeId=1;selectedShopItem=null;hintShown=true;hintTimer=0;hintFadeState='waiting';hintFadeTimer=0;researchCompleted=['basic_mining'];
  camera={x:0,y:0,zoom:1};

  addNode('blockchain', 100, cy);
  addNode('mining_pc', 350, cy);
  addNode('cpu', 550, cy - 60);
  addNode('power', 550, cy + 60);
  addNode('wallet', 350, cy + 120);

  buildShop();
  updateUI();

  var hintEl = document.getElementById('hint');
  hintEl.style.opacity = '0';
  hintFadeState = 'waiting';
  hintFadeTimer = 0;
  setTimeout(function(){
    if(hintShown){
      hintEl.style.opacity = '1';
      hintFadeState = 'visible';
      setTimeout(function(){
        if(hintShown){
          hintEl.style.opacity = '0';
          hintFadeState = 'fading';
          setTimeout(function(){hintShown=false;hintFadeState='hidden';},1000);
        }
      }, 5000);
    }
  }, 300);

  showConnectionGuide();
  centerCameraOnBlockchain();
  requestAnimationFrame(gameLoop);
}

function addNode(type, x, y){
  var n = {id:nextNodeId++, type:type, x:x, y:y, scale:0, infected:false, infectedTime:0, blackout:false, blackoutTime:0, lnBalance:0, lnwBalance:0, exBalance:0, exLocked:0, exLockTime:0, exHacked:false, exHackTime:0, exLockCooldown:0, miningProgress:0};
  nodes.push(n);
  effects.push({type:'spawn',x:x+WIN_W/2,y:y+30,t:0,dur:0.3});
  return n;
}

// ===== RESEARCH UI (TREE) =====
let currentResearchTab = 'mining';
let selectedResearchId = null;

function toggleResearch(){
  var panel = document.getElementById('researchPanel');
  if(panel.classList.contains('open')){panel.classList.remove('open');selectedResearchId=null}
  else{renderResearchPanel();panel.classList.add('open')}
}

function renderResearchPanel(){
  var panel = document.getElementById('researchPanel');
  var html = '<div class="rp-header"><h3>🔬 研究ツリー</h3><button class="rp-close" onclick="toggleResearch()">✕</button></div>';
  // Tabs
  html += '<div class="rp-tabs">';
  html += '<button class="rp-tab'+(currentResearchTab==='mining'?' active':'')+'" onclick="switchResearchTab(\'mining\')">⛏️ マイニング</button>';
  html += '<button class="rp-tab'+(currentResearchTab==='power'?' active':'')+'" onclick="switchResearchTab(\'power\')">⚡ 電力</button>';
  html += '<button class="rp-tab'+(currentResearchTab==='network'?' active':'')+'" onclick="switchResearchTab(\'network\')">🌐 ネットワーク</button>';
  html += '</div>';

  // Get items for current tree
  var treeItems = RESEARCH_TREE.filter(function(r){return r.tree === currentResearchTab});

  // Determine layout dimensions
  var nodeW = 110, nodeH = 50, gapX = 15, gapY = 20, padX = 16, padY = 16;
  var maxRow = 0, maxCol = 0;
  treeItems.forEach(function(r){
    if(r.row > maxRow) maxRow = r.row;
    if(r.col > maxCol) maxCol = r.col;
  });
  // For mining tree: 3 columns (0,1,2), for others: 1 column (0)
  var cols = maxCol + 1;
  var containerW = 400 - 32; // panel width minus padding
  var colW = cols > 1 ? containerW / cols : containerW;
  var containerH = (maxRow + 1) * (nodeH + gapY) + padY * 2;

  html += '<div class="rp-tree-container" style="height:'+containerH+'px">';
  // SVG for lines
  html += '<svg style="width:100%;height:'+containerH+'px">';
  treeItems.forEach(function(r){
    if(!r.prereq) return;
    var parent = treeItems.find(function(p){return p.id === r.prereq});
    if(!parent) return;
    var px1 = padX + parent.col * colW + (colW - nodeW) / 2 + nodeW / 2;
    var py1 = padY + parent.row * (nodeH + gapY) + nodeH;
    var px2 = padX + r.col * colW + (colW - nodeW) / 2 + nodeW / 2;
    var py2 = padY + r.row * (nodeH + gapY);
    var done = researchCompleted.indexOf(r.id) >= 0;
    var prereqMet = researchCompleted.indexOf(r.prereq) >= 0;
    var lineColor = done ? '#44cc66' : (prereqMet ? '#ddcc44' : '#333');
    html += '<line x1="'+px1+'" y1="'+py1+'" x2="'+px2+'" y2="'+py2+'" stroke="'+lineColor+'" stroke-width="2" stroke-dasharray="'+(done?'':'4,3')+'"/>';
  });
  html += '</svg>';

  // Nodes
  treeItems.forEach(function(r){
    var done = researchCompleted.indexOf(r.id) >= 0;
    var prereqMet = !r.prereq || researchCompleted.indexOf(r.prereq) >= 0;
    var available = !done && prereqMet;
    var cls = done ? 'done' : (available ? 'available' : 'locked');
    var nx = padX + r.col * colW + (colW - nodeW) / 2;
    var ny = padY + r.row * (nodeH + gapY);
    var selected = selectedResearchId === r.id;
    var borderExtra = selected ? ';outline:2px solid #fff;outline-offset:2px' : '';
    html += '<div class="rp-tree-node '+cls+'" style="left:'+nx+'px;top:'+ny+'px;width:'+nodeW+'px'+borderExtra+'" onclick="selectResearch(\''+r.id+'\')">';
    html += '<div class="rtn-emoji">'+r.emoji+'</div>';
    html += '<div class="rtn-name">'+r.name+'</div>';
    if(!done && r.cost > 0) html += '<div class="rtn-cost">'+r.cost+'₱</div>';
    if(done) html += '<div class="rtn-cost" style="color:#44cc66">✅</div>';
    html += '</div>';
  });

  html += '</div>'; // rp-tree-container

  // Detail popup for selected research
  if(selectedResearchId){
    var sr = RESEARCH_TREE.find(function(r){return r.id === selectedResearchId});
    if(sr){
      var done = researchCompleted.indexOf(sr.id) >= 0;
      var prereqMet = !sr.prereq || researchCompleted.indexOf(sr.prereq) >= 0;
      var available = !done && prereqMet;
      var canAfford = balance >= sr.cost;
      html += '<div class="rp-detail-popup">';
      html += '<button class="rdp-close-btn" onclick="selectedResearchId=null;renderResearchPanel()">✕</button>';
      html += '<div class="rdp-name">'+sr.emoji+' '+sr.name+(done?' ✅':'')+'</div>';
      html += '<div class="rdp-desc">'+sr.desc+'</div>';
      html += '<div class="rdp-effect">効果: '+sr.effect+'</div>';
      if(!done){
        html += '<div class="rdp-cost">コスト: '+sr.cost+'₱'+(sr.cost===0?' (無料)':'')+'</div>';
        if(available){
          html += '<button class="ri-btn" '+(canAfford?'onclick="doResearch(\''+sr.id+'\')"':'disabled')+'>'+(canAfford?'🔬 研究する':'💰 資金不足')+'</button>';
        } else {
          var prereqName = RESEARCH_TREE.find(function(r){return r.id===sr.prereq});
          html += '<div style="font-size:11px;color:#888;margin-top:4px">🔒 前提: '+(prereqName?prereqName.name:'不明')+'</div>';
        }
      }
      html += '</div>';
    }
  }

  panel.innerHTML = html;
}

function switchResearchTab(tab){
  currentResearchTab = tab;
  selectedResearchId = null;
  renderResearchPanel();
}

function selectResearch(id){
  selectedResearchId = (selectedResearchId === id) ? null : id;
  renderResearchPanel();
}

function doResearch(id){
  var r = RESEARCH_TREE.find(function(x){return x.id===id});
  if(!r||researchCompleted.indexOf(id)>=0) return;
  if(r.prereq && researchCompleted.indexOf(r.prereq)<0) return;
  if(balance < r.cost) return;
  balance -= r.cost;
  researchCompleted.push(id);
  playSound('buy');
  effects.push({type:'sparkle',x:canvasW/2,y:canvasH/2,t:0,dur:0.8});
  selectedResearchId = null;
  updateUI();buildShop();renderResearchPanel();
}

// ===== L-SHAPED PATH UTILITIES =====
function getLPathPoint(fromX, fromY, toX, toY, t){
  var midX = (fromX + toX) / 2;
  var seg1 = Math.abs(midX - fromX);
  var seg2 = Math.abs(toY - fromY);
  var seg3 = Math.abs(toX - midX);
  var total = seg1 + seg2 + seg3;
  if(total === 0) return {x:fromX, y:fromY};
  var d = t * total;
  if(d <= seg1){
    var p = seg1 > 0 ? d / seg1 : 0;
    return {x: fromX + (midX - fromX) * p, y: fromY};
  }
  d -= seg1;
  if(d <= seg2){
    var p = seg2 > 0 ? d / seg2 : 0;
    return {x: midX, y: fromY + (toY - fromY) * p};
  }
  d -= seg2;
  var p = seg3 > 0 ? d / seg3 : 0;
  return {x: midX + (toX - midX) * p, y: toY};
}

// ===== GAME LOOP =====
var lastTime = 0;
function gameLoop(ts){
  if(!gameStarted) return;
  var dt = Math.min((ts-(lastTime||ts))/1000, 0.1);
  lastTime = ts;
  gameTime += dt;
  update(dt);
  draw();
  requestAnimationFrame(gameLoop);
}

function update(dt){
  nodes.forEach(function(n){if(n.scale<1)n.scale=Math.min(1,n.scale+dt*5)});

  nodes.filter(function(n){return n.type==='mining_pc'||n.type==='server'}).forEach(function(pc){
    var stats = pc.type==='mining_pc' ? getPCStats(pc) : getServerStats(pc);
    var target = stats.powerSupply > 0 ? stats.powerUsed / stats.powerSupply : 0;
    var cur = animatedPower[pc.id] || 0;
    animatedPower[pc.id] = cur + (target - cur) * Math.min(1, dt * 2);
  });

  // Difficulty: 10 min intervals, 1.15x multiplier (was 5min/1.2x)
  difficultyTimer += dt;
  if(difficultyTimer >= 600){difficultyTimer=0;difficulty*=1.15;}

  // Mining gauge
  var totalHash = 0;
  nodes.filter(function(n){return n.type==='mining_pc'}).forEach(function(pc){
    var stats = getPCStats(pc);
    totalHash += stats.effectiveRate;
    if(!pc.miningProgress) pc.miningProgress = 0;

    if(stats.canMine && !pc.infected && stats.powerOk){
      pc.miningProgress += stats.gaugeSpeed * dt;
      if(pc.miningProgress >= 1){
        pc.miningProgress = 0;
        balance++;
        playSound('mine');
        var gaugeLineIdx = 5;
        var gaugeY = pc.y + TITLE_H + gaugeLineIdx * LINE_H + LINE_H/2;
        for(var gi=0;gi<6;gi++){
          var angle = Math.random()*Math.PI*2;
          effects.push({type:'gold_burst',x:pc.x+WIN_W/2,y:gaugeY,t:0,dur:0.7,angle:angle,dist:15+Math.random()*25});
        }
        effects.push({type:'sparkle',x:pc.x+WIN_W/2,y:pc.y+TITLE_H/2,t:0,dur:0.6});
        var wallet = nodes.find(function(n){return n.type==='wallet'});
        if(wallet) particles.push({x:pc.x+WIN_W/2,y:pc.y+TITLE_H,tx:wallet.x+WIN_W/2,ty:wallet.y+TITLE_H,t:0,dur:0.8,text:'+1₱'});
        updateUI();buildShop();
      }
    } else {
      pc.miningProgress = Math.max(0, pc.miningProgress - 0.05 * dt);
    }
  });

  miningCheckTimer += dt;
  if(miningCheckTimer >= 1){
    miningCheckTimer = 0;
    document.getElementById('hashrateText').textContent = totalHash.toFixed(1);
  }

  // LN routing fee income (with research bonuses)
  nodes.filter(function(n){return n.type==='ln_node'}).forEach(function(ln){
    if(!ln.lnBalance) ln.lnBalance = 0;
    var connectedServer = connections.some(function(c){return c.to===ln.id && nodes.find(function(nd){return nd.id===c.from&&nd.type==='server'})});
    if(connectedServer && ln.lnBalance >= 5){
      var fee = 0.1 * dt * Math.min(ln.lnBalance / 20, 3);
      // Research: LN fee multipliers
      if(researchCompleted.indexOf('distributed_routing')>=0) fee *= 3;
      else if(researchCompleted.indexOf('channel_opt')>=0) fee *= 2;
      else if(researchCompleted.indexOf('ln_basics')>=0) fee *= 1.5;
      ln.lnBalance += fee;
      if(Math.random() < 0.02) effects.push({type:'sparkle',x:ln.x+WIN_W/2,y:ln.y+TITLE_H/2,t:0,dur:0.4});
    }
  });

  // Exchange logic
  nodes.filter(function(n){return n.type==='exchange'}).forEach(function(ex){
    if(!ex.exBalance) ex.exBalance = 0;
    if(!ex.exLocked) ex.exLocked = 0;
    if(!ex.exLockTime) ex.exLockTime = 0;
    if(!ex.exLockCooldown) ex.exLockCooldown = 0;
    if(!ex.exHacked) ex.exHacked = false;
    if(!ex.exHackTime) ex.exHackTime = 0;

    var connectedPC = connections.some(function(c){return c.to===ex.id && nodes.find(function(nd){return nd.id===c.from&&nd.type==='mining_pc'})});
    if(!connectedPC) return;

    if(ex.exHacked){ex.exHackTime-=dt;if(ex.exHackTime<=0)ex.exHacked=false;return}

    if(balance >= 1){
      var drain = Math.min(0.5*dt, balance);
      balance -= drain;
      ex.exBalance += drain;
      updateUI();buildShop();
    }

    ex.exLockCooldown -= dt;
    if(ex.exBalance >= 10 && ex.exLocked <= 0 && ex.exLockCooldown <= 0){
      ex.exLocked = ex.exBalance;
      ex.exBalance = 0;
      ex.exLockTime = 30;
      effects.push({type:'sparkle',x:ex.x+WIN_W/2,y:ex.y+TITLE_H/2,t:0,dur:0.5});
    }

    if(ex.exLocked > 0){
      ex.exLockTime -= dt;
      if(ex.exLockTime <= 0){
        var interest = ex.exLocked * 0.05;
        var payout = ex.exLocked + interest;
        balance += Math.floor(payout);
        effects.push({type:'sparkle',x:ex.x+WIN_W/2,y:ex.y+TITLE_H/2,t:0,dur:0.6});
        playSound('mine');
        ex.exLocked=0;ex.exLockTime=0;ex.exLockCooldown=10;
        updateUI();buildShop();
      }
    }

    if(Math.random() < 0.0007 && (ex.exBalance > 0 || ex.exLocked > 0)){
      ex.exBalance=0;ex.exLocked=0;ex.exLockTime=0;
      ex.exHacked=true;ex.exHackTime=15;
      effects.push({type:'malware',x:ex.x+WIN_W/2,y:ex.y+30,t:0,dur:1});
      playSound('malware');
    }
  });

  // Malware every 30s
  malwareTimer += dt;
  if(malwareTimer >= 30){
    malwareTimer = 0;
    nodes.filter(function(n){return (n.type==='mining_pc'||n.type==='server')&&!n.infected}).forEach(function(pc){
      if(Math.random() < 0.1){
        var stats = pc.type==='mining_pc' ? getPCStats(pc) : getServerStats(pc);
        if(stats.hasFW){
          effects.push({type:'cure',x:pc.x+WIN_W/2,y:pc.y+30,t:0,dur:0.5});
          playSound('cure');
        } else {
          pc.infected = true;
          effects.push({type:'malware',x:pc.x+WIN_W/2,y:pc.y+30,t:0,dur:1});
          playSound('malware');
        }
      }
    });
  }

  // Blackout every 2 min
  blackoutTimer += dt;
  if(blackoutTimer >= 120){
    blackoutTimer = 0;
    var powers = nodes.filter(function(n){return n.type==='power'&&!n.blackout});
    if(powers.length>0 && Math.random()<0.05){
      var p = powers[Math.floor(Math.random()*powers.length)];
      p.blackout=true;p.blackoutTime=30;
    }
  }
  nodes.filter(function(n){return n.blackout}).forEach(function(n){n.blackoutTime-=dt;if(n.blackoutTime<=0)n.blackout=false});

  effects.forEach(function(e){e.t+=dt});
  effects = effects.filter(function(e){return e.t<e.dur});
  particles.forEach(function(p){p.t+=dt});
  particles = particles.filter(function(p){return p.t<p.dur});
}

function updateUI(){
  document.getElementById('balanceText').textContent = balance;
  document.getElementById('diffText').textContent = difficulty.toFixed(2);
}

// ===== DRAWING =====
function draw(){
  ctx.fillStyle = '#0a0e27';
  ctx.fillRect(0, 0, canvasW, canvasH);

  ctx.save();
  ctx.translate(canvasW/2, canvasH/2);
  ctx.scale(camera.zoom, camera.zoom);
  ctx.translate(-canvasW/2 - camera.x, -canvasH/2 - camera.y);

  drawGrid();
  drawConnections();
  drawNodes();
  drawEffects();
  drawParticles();
  drawDragLine();

  ctx.restore();
}

function drawGrid(){
  ctx.strokeStyle = '#0f1535';
  ctx.lineWidth = 0.5;
  var step = 30;
  var startX = Math.floor((camera.x - canvasW/camera.zoom) / step) * step;
  var endX = camera.x + canvasW*2/camera.zoom;
  var startY = Math.floor((camera.y - canvasH/camera.zoom) / step) * step;
  var endY = camera.y + canvasH*2/camera.zoom;
  for(var x=startX;x<endX;x+=step){ctx.beginPath();ctx.moveTo(x,startY);ctx.lineTo(x,endY);ctx.stroke()}
  for(var y=startY;y<endY;y+=step){ctx.beginPath();ctx.moveTo(startX,y);ctx.lineTo(endX,y);ctx.stroke()}
}

function drawLPath(fromX, fromY, toX, toY){
  var midX = (fromX + toX) / 2;
  ctx.beginPath();
  ctx.moveTo(fromX, fromY);
  ctx.lineTo(midX, fromY);
  ctx.lineTo(midX, toY);
  ctx.lineTo(toX, toY);
  ctx.stroke();
}

function drawConnections(){
  var t = gameTime;
  connections.forEach(function(c){
    var fromN = nodes.find(function(n){return n.id===c.from});
    var toN = nodes.find(function(n){return n.id===c.to});
    if(!fromN || !toN) return;

    var fromPorts = getNodePortPositions(fromN);
    var toPorts = getNodePortPositions(toN);

    var fp = fromPorts.find(function(p){return p.type===c.fromPort && p.defIndex===c.fromDefIndex});
    var tp = toPorts.find(function(p){return p.type===c.toPort && p.defIndex===c.toDefIndex});

    if(!fp) fp = fromPorts.find(function(p){return p.type===c.fromPort});
    if(!tp) tp = toPorts.find(function(p){return p.type===c.toPort});

    if(!fp || !tp) return;

    var fx = fp.x, fy = fp.y, tx = tp.x, ty = tp.y;

    var col = '#4488ff';
    var lineW = 1.5;
    var dashStyle = null;
    if(c.lineType === 'power'){ col = '#dd4444'; lineW = 2.5; }
    else if(c.lineType === 'coin'){ col = '#ddaa22'; lineW = 1.5; dashStyle = [6,4]; }
    else if(c.lineType === 'lightning'){ col = '#9944dd'; lineW = 1.5; }

    ctx.strokeStyle = col;
    ctx.lineWidth = lineW;
    ctx.globalAlpha = 0.7;
    if(dashStyle) ctx.setLineDash(dashStyle);
    drawLPath(fx, fy, tx, ty);
    if(dashStyle) ctx.setLineDash([]);
    ctx.globalAlpha = 1;

    for(var i=0;i<3;i++){
      var p = ((t*0.5+i/3)%1);
      var pt = getLPathPoint(fx, fy, tx, ty, p);
      ctx.fillStyle = col;
      ctx.globalAlpha = 0.8;
      ctx.beginPath();ctx.arc(pt.x,pt.y,2.5,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha = 1;
    }
  });
}

function drawNodes(){
  nodes.forEach(function(n){
    var nt = NODE_TYPES[n.type];
    var h = getNodeHeight(n);
    var s = n.scale;
    if(s < 0.01) return;

    ctx.save();
    if(s < 1){
      ctx.globalAlpha = s;
      ctx.translate(n.x + WIN_W/2, n.y + h/2);
      ctx.scale(s, s);
      ctx.translate(-(n.x + WIN_W/2), -(n.y + h/2));
    }

    ctx.shadowColor = 'rgba(60,80,180,0.3)';
    ctx.shadowBlur = 8;
    if(n.infected){
      var blink = Math.sin(gameTime*8) > 0 ? 1 : 0.3;
      ctx.shadowColor = 'rgba(255,0,0,'+blink+')';
      ctx.shadowBlur = 12;
    }
    if(n.blackout) ctx.globalAlpha = (ctx.globalAlpha || 1) * 0.4;

    ctx.fillStyle = 'rgba(20,25,45,0.92)';
    ctx.strokeStyle = 'rgba(70,90,190,0.45)';
    ctx.lineWidth = 1.5;
    roundRect(ctx, n.x, n.y, WIN_W, h, 6);
    ctx.fill();
    ctx.stroke();
    ctx.shadowBlur = 0;

    ctx.fillStyle = n.blackout ? '#333' : nt.titleColor;
    ctx.beginPath();
    ctx.moveTo(n.x+4,n.y);ctx.lineTo(n.x+WIN_W-4,n.y);
    ctx.arcTo(n.x+WIN_W,n.y,n.x+WIN_W,n.y+4,4);ctx.lineTo(n.x+WIN_W,n.y+TITLE_H);
    ctx.lineTo(n.x,n.y+TITLE_H);ctx.lineTo(n.x,n.y+4);ctx.arcTo(n.x,n.y,n.x+4,n.y,4);
    ctx.closePath();ctx.fill();

    ctx.font = '18px sans-serif';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText(nt.emoji, n.x+6, n.y+TITLE_H/2+1);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold '+FONT_SIZE+'px sans-serif';
    ctx.fillText(nt.name, n.x+28, n.y+TITLE_H/2+1);

    var nodeLines = getNodeLines(n);
    ctx.font = FONT_SIZE+'px sans-serif';

    nodeLines.forEach(function(line, i){
      var ly = n.y + TITLE_H + i * LINE_H;
      if(i > 0){
        ctx.strokeStyle = 'rgba(60,80,140,0.15)';
        ctx.lineWidth = 0.5;
        ctx.beginPath();ctx.moveTo(n.x+6,ly);ctx.lineTo(n.x+WIN_W-6,ly);ctx.stroke();
      }

      if(line.text){
        ctx.fillStyle = '#d8d8f0';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'middle';
        ctx.fillText(line.text, n.x+10, ly+LINE_H/2);
      }

      if(line.bar !== undefined){
        var barX = n.x + WIN_W - 62;
        var barY = ly + 5;
        var barW = 44;
        var barH = 14;
        var animated = animatedPower[n.id] || 0;
        var fillW = Math.min(animated, 1) * barW;
        ctx.fillStyle = 'rgba(30,35,60,0.9)';
        roundRect(ctx, barX, barY, barW, barH, 3);ctx.fill();
        if(fillW > 0){
          var bGrad = ctx.createLinearGradient(barX, barY, barX+fillW, barY);
          if(line.barOk){ bGrad.addColorStop(0,'#22aa44');bGrad.addColorStop(1,'#66ee88'); }
          else { bGrad.addColorStop(0,'#cc2222');bGrad.addColorStop(1,'#ff5544'); }
          ctx.fillStyle = bGrad;
          ctx.fillRect(barX+1, barY+1, fillW-2, barH-2);
        }
        ctx.strokeStyle = line.barOk ? 'rgba(80,200,120,0.6)' : 'rgba(220,80,80,0.6)';
        ctx.lineWidth = 1;
        ctx.strokeRect(barX, barY, barW, barH);
      }

      if(line.miningGauge !== undefined){
        var gx = n.x + 8;
        var gy = ly + 4;
        var gw = WIN_W - 16;
        var gh = 16;
        var prog = Math.min(line.miningGauge, 1);
        ctx.fillStyle = 'rgba(30,35,60,0.9)';
        roundRect(ctx, gx, gy, gw, gh, 4);ctx.fill();
        if(prog > 0){
          var grad = ctx.createLinearGradient(gx, gy, gx + gw * prog, gy);
          grad.addColorStop(0, '#2266ff');
          grad.addColorStop(0.5, '#22aacc');
          grad.addColorStop(1, '#22ee66');
          ctx.fillStyle = grad;
          ctx.fillRect(gx+2, gy+2, (gw-4) * prog, gh-4);
        }
        ctx.strokeStyle = line.isMining ? 'rgba(80,220,140,0.8)' : 'rgba(80,100,160,0.4)';
        ctx.lineWidth = line.isMining ? 1.5 : 0.5;
        ctx.strokeRect(gx, gy, gw, gh);
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 10px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(Math.floor(prog*100)+'%', n.x+WIN_W/2, gy+gh/2);
        ctx.font = FONT_SIZE+'px sans-serif';
      }
    });

    // Draw ports
    var ports = getNodePortPositions(n);
    ports.forEach(function(p){
      var connected = isPortConnected(n, p);
      var isHover = hoverPort && hoverPort.nodeId === n.id && hoverPort.defIndex === p.defIndex;
      var isCompat = dragMode === 'port' && isCompatiblePort(n.id, p.defIndex);
      var category = getPortCategoryForNode(n.type, p.type);
      var catColor = PORT_CATEGORY_COLORS[category] || '#4466aa';
      var multi = isMultiPort(n.type, p.type);
      var connCount = countPortConnections(n.id, p.type, p.side);

      if(isCompat){
        ctx.save();
        ctx.shadowColor = '#ffee44';
        ctx.shadowBlur = 14;
        ctx.beginPath();ctx.arc(p.x, p.y, PORT_R+4, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(255,238,68,0.25)';ctx.fill();
        ctx.restore();
      }
      if(dragMode === 'port' && !isCompat && p.nodeId !== dragPort.nodeId){
        ctx.globalAlpha = 0.3;
      }

      if(multi){
        ctx.beginPath();ctx.arc(p.x, p.y, PORT_R+3, 0, Math.PI*2);
        ctx.strokeStyle = connected ? PORT_CATEGORY_COLORS.connected : catColor;
        ctx.lineWidth = 1.5;
        ctx.stroke();
      }

      ctx.beginPath();
      ctx.arc(p.x, p.y, PORT_R, 0, Math.PI*2);
      if(connected){
        ctx.fillStyle = PORT_CATEGORY_COLORS.connected;
      } else if(isHover || isCompat){
        ctx.fillStyle = '#ddcc44';
      } else {
        ctx.fillStyle = catColor;
      }
      ctx.fill();
      ctx.strokeStyle = 'rgba(150,170,220,0.7)';
      ctx.lineWidth = 1;
      ctx.stroke();

      ctx.fillStyle = '#fff';
      ctx.font = 'bold 9px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(p.side === 'left' ? '→' : '←', p.x, p.y);

      if(multi && connCount > 0){
        ctx.font = 'bold 8px sans-serif';
        ctx.fillStyle = '#fff';
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 2;
        ctx.strokeText(connCount+'', p.x + PORT_R + 3, p.y - PORT_R - 1);
        ctx.fillText(connCount+'', p.x + PORT_R + 3, p.y - PORT_R - 1);
      }

      var icon = PORT_ICONS[p.type] || '';
      if(icon){
        ctx.font = '9px sans-serif';
        ctx.fillStyle = 'rgba(200,210,240,0.8)';
        ctx.textAlign = p.side === 'left' ? 'right' : 'left';
        var iconX = p.side === 'left' ? p.x - PORT_R - 5 : p.x + PORT_R + 5;
        ctx.fillText(icon, iconX, p.y);
      }

      ctx.globalAlpha = 1;
    });

    if(n.type === 'mining_pc'){
      var stats = getPCStats(n);
      if(stats.canMine && !n.infected && stats.powerOk){
        ctx.fillStyle = Math.sin(gameTime*4)>0 ? '#44ff88' : '#226644';
        ctx.beginPath();ctx.arc(n.x+WIN_W-10, n.y+TITLE_H/2, 3, 0, Math.PI*2);ctx.fill();
      }
    }
    if(n.type === 'server'){
      var svStats = getServerStats(n);
      if(svStats.canRoute && !n.infected && svStats.powerOk){
        ctx.fillStyle = Math.sin(gameTime*4)>0 ? '#4488ff' : '#223366';
        ctx.beginPath();ctx.arc(n.x+WIN_W-10, n.y+TITLE_H/2, 3, 0, Math.PI*2);ctx.fill();
      }
    }

    if(n.infected){
      ctx.font = '14px sans-serif';ctx.textAlign = 'center';
      ctx.fillText('💀', n.x+WIN_W/2, n.y-8);
    }
    if(n.blackout){
      ctx.globalAlpha = 1;ctx.font = '14px sans-serif';ctx.textAlign = 'center';
      ctx.fillText('⚡', n.x+WIN_W/2, n.y-8);
    }

    ctx.restore();
  });
}

function isPortConnected(n, port){
  return connections.some(function(c){
    if(port.side === 'left'){
      return c.from === n.id && c.fromPort === port.type && c.fromDefIndex === port.defIndex;
    } else {
      return c.to === n.id && c.toPort === port.type && c.toDefIndex === port.defIndex;
    }
  });
}

function roundRect(ctx, x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
}

function drawEffects(){
  effects.forEach(function(e){
    var p = e.t / e.dur;
    if(e.type === 'sparkle'){
      for(var i=0;i<6;i++){
        var a = Math.PI*2*i/6 + gameTime;
        var d = 20*p;
        ctx.fillStyle = 'rgba(255,215,0,'+(1-p)+')';
        ctx.beginPath();ctx.arc(e.x+Math.cos(a)*d, e.y+Math.sin(a)*d, 3*(1-p), 0, Math.PI*2);ctx.fill();
      }
    }
    if(e.type === 'spawn'){
      ctx.strokeStyle = 'rgba(255,255,255,'+(0.5*(1-p))+')';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(e.x,e.y,30*p,0,Math.PI*2);ctx.stroke();
    }
    if(e.type === 'malware'){
      ctx.fillStyle = 'rgba(255,0,0,'+(0.3*(1-p))+')';
      ctx.beginPath();ctx.arc(e.x,e.y,40*p,0,Math.PI*2);ctx.fill();
    }
    if(e.type === 'cure'){
      ctx.strokeStyle = 'rgba(0,255,200,'+(1-p)+')';ctx.lineWidth=2;
      for(var i=0;i<4;i++){
        var a = Math.PI/2*i + p*2;
        ctx.beginPath();ctx.moveTo(e.x,e.y);
        ctx.lineTo(e.x+Math.cos(a)*30*p,e.y+Math.sin(a)*30*p);ctx.stroke();
      }
    }
    if(e.type === 'gold_burst'){
      var ease = 1 - Math.pow(1-p, 2);
      var dx = Math.cos(e.angle) * e.dist * ease;
      var dy = Math.sin(e.angle) * e.dist * ease;
      ctx.fillStyle = 'rgba(255,215,0,'+(1-p)+')';
      ctx.beginPath();ctx.arc(e.x+dx, e.y+dy, 3*(1-p*0.5), 0, Math.PI*2);ctx.fill();
    }
  });
}

function drawParticles(){
  particles.forEach(function(p){
    var prog = p.t / p.dur;
    var ease = 1 - Math.pow(1-prog, 3);
    var px = p.x + (p.tx-p.x)*ease;
    var py = p.y + (p.ty-p.y)*ease - Math.sin(prog*Math.PI)*30;
    ctx.font = 'bold 14px sans-serif';
    ctx.fillStyle = 'rgba(255,215,0,'+(1-prog*0.5)+')';
    ctx.textAlign = 'center';
    ctx.fillText(p.text, px, py);
  });
}

function drawDragLine(){
  if(dragMode === 'port' && dragPort && dragLineEnd){
    var fx = dragPort.x, fy = dragPort.y;
    var tx = dragLineEnd.x, ty = dragLineEnd.y;
    var midX = (fx + tx) / 2;

    ctx.strokeStyle = 'rgba(74,106,255,0.6)';
    ctx.lineWidth = 2;
    ctx.setLineDash([5,5]);
    ctx.beginPath();
    ctx.moveTo(fx, fy);
    ctx.lineTo(midX, fy);
    ctx.lineTo(midX, ty);
    ctx.lineTo(tx, ty);
    ctx.stroke();
    ctx.setLineDash([]);
  }
}

// ===== INPUT =====
function getWorldPos(e){
  var r = canvas.getBoundingClientRect();
  var touch = e.touches ? e.touches[0] : e;
  var sx = touch.clientX - r.left;
  var sy = touch.clientY - r.top;
  return screenToWorld(sx, sy);
}

function getScreenPos(e){
  var r = canvas.getBoundingClientRect();
  var touch = e.touches ? e.touches[0] : e;
  return {x: touch.clientX - r.left, y: touch.clientY - r.top};
}

function hitTestPort(wx, wy){
  for(var i = nodes.length - 1; i >= 0; i--){
    var ports = getNodePortPositions(nodes[i]);
    for(var j = 0; j < ports.length; j++){
      var p = ports[j];
      if(Math.hypot(wx - p.x, wy - p.y) < PORT_R + 6){
        return p;
      }
    }
  }
  return null;
}

function hitTestTitleBar(wx, wy){
  for(var i = nodes.length - 1; i >= 0; i--){
    var n = nodes[i];
    if(wx >= n.x && wx <= n.x + WIN_W && wy >= n.y && wy <= n.y + TITLE_H) return n;
  }
  return null;
}

function hitTestNode(wx, wy){
  for(var i = nodes.length - 1; i >= 0; i--){
    var n = nodes[i];
    var h = getNodeHeight(n);
    if(wx >= n.x && wx <= n.x + WIN_W && wy >= n.y && wy <= n.y + h) return n;
  }
  return null;
}

// Touch events for pinch/zoom
canvas.addEventListener('touchstart', function(e){
  if(e.touches.length === 2){
    e.preventDefault();
    pinching = true;
    var t1 = e.touches[0], t2 = e.touches[1];
    pinchDist = Math.hypot(t2.clientX-t1.clientX, t2.clientY-t1.clientY);
    pinchMidX = (t1.clientX+t2.clientX)/2;
    pinchMidY = (t1.clientY+t2.clientY)/2;
    dragMode = null;
  }
}, {passive:false});

canvas.addEventListener('touchmove', function(e){
  if(pinching && e.touches.length === 2){
    e.preventDefault();
    var t1 = e.touches[0], t2 = e.touches[1];
    var newDist = Math.hypot(t2.clientX-t1.clientX, t2.clientY-t1.clientY);
    var newMidX = (t1.clientX+t2.clientX)/2;
    var newMidY = (t1.clientY+t2.clientY)/2;

    var scale = newDist / pinchDist;
    var newZoom = Math.max(0.3, Math.min(3.0, camera.zoom * scale));

    var r = canvas.getBoundingClientRect();
    var wx = (pinchMidX - r.left - canvasW/2) / camera.zoom + camera.x + canvasW/2;
    var wy = (pinchMidY - r.top - canvasH/2) / camera.zoom + camera.y + canvasH/2;

    camera.zoom = newZoom;
    camera.x = wx - canvasW/2 - (pinchMidX - r.left - canvasW/2) / camera.zoom;
    camera.y = wy - canvasH/2 - (pinchMidY - r.top - canvasH/2) / camera.zoom;

    pinchDist = newDist;
    pinchMidX = newMidX;
    pinchMidY = newMidY;
  }
}, {passive:false});

canvas.addEventListener('touchend', function(e){
  if(e.touches.length < 2) pinching = false;
}, {passive:false});

// Mouse wheel zoom
canvas.addEventListener('wheel', function(e){
  e.preventDefault();
  var r = canvas.getBoundingClientRect();
  var sx = e.clientX - r.left;
  var sy = e.clientY - r.top;
  var wx = (sx - canvasW/2) / camera.zoom + camera.x + canvasW/2;
  var wy = (sy - canvasH/2) / camera.zoom + camera.y + canvasH/2;

  var factor = e.deltaY > 0 ? 0.9 : 1.1;
  camera.zoom = Math.max(0.3, Math.min(3.0, camera.zoom * factor));

  camera.x = wx - canvasW/2 - (sx - canvasW/2) / camera.zoom;
  camera.y = wy - canvasH/2 - (sy - canvasH/2) / camera.zoom;
}, {passive:false});

canvas.addEventListener('pointerdown', function(e){
  if(pinching || isShopDragging) return;
  ensureAudio();
  var screen = getScreenPos(e);
  var world = screenToWorld(screen.x, screen.y);

  lastPointerX = screen.x;
  lastPointerY = screen.y;
  pointerStartX = screen.x;
  pointerStartY = screen.y;

  // Port drag
  var portHit = hitTestPort(world.x, world.y);
  if(portHit){
    dragMode = 'port';
    dragPort = portHit;
    dragLineEnd = {x:world.x, y:world.y};
    updateCompatiblePorts(portHit);
    var idx = nodes.indexOf(nodes.find(function(nd){return nd.id===portHit.nodeId}));
    if(idx >= 0){nodes.push(nodes.splice(idx,1)[0])}
    return;
  }

  // Double-tap detection for delete
  var nodeHit = hitTestNode(world.x, world.y);
  if(nodeHit){
    var now = Date.now();
    if(lastTapNodeId === nodeHit.id && now - lastTapTime < 400){
      // Double tap detected
      deleteNodeConfirm(nodeHit);
      lastTapNodeId = null;
      lastTapTime = 0;
      return;
    }
    lastTapNodeId = nodeHit.id;
    lastTapTime = now;
  } else {
    lastTapNodeId = null;
    lastTapTime = 0;
  }

  // Title bar move
  var titleHit = hitTestTitleBar(world.x, world.y);
  if(titleHit){
    dragMode = 'move';
    dragNode = titleHit;
    dragOffX = world.x - titleHit.x;
    dragOffY = world.y - titleHit.y;
    var idx = nodes.indexOf(titleHit);
    if(idx >= 0){nodes.push(nodes.splice(idx,1)[0])}
    return;
  }

  // Click on node body
  var bodyHit = hitTestNode(world.x, world.y);
  if(bodyHit){
    if(bodyHit.infected){
      bodyHit.infected = false;
      effects.push({type:'cure',x:bodyHit.x+WIN_W/2,y:bodyHit.y+30,t:0,dur:0.5});
      playSound('cure');
    } else if(bodyHit.type === 'ln_node'){
      if(balance >= 1){
        balance -= 1;
        if(!bodyHit.lnBalance) bodyHit.lnBalance = 0;
        bodyHit.lnBalance += 1;
        effects.push({type:'sparkle',x:bodyHit.x+WIN_W/2,y:bodyHit.y+TITLE_H/2,t:0,dur:0.4});
        playSound('buy');updateUI();buildShop();
      } else { playSound('error') }
    }
    return;
  }

  // Camera drag (no more shop tap-to-place)
  dragMode = 'camera';
  cameraStartX = camera.x;
  cameraStartY = camera.y;
});

canvas.addEventListener('pointermove', function(e){
  if(pinching || isShopDragging) return;
  var screen = getScreenPos(e);
  var world = screenToWorld(screen.x, screen.y);

  if(dragMode === 'move' && dragNode){
    dragNode.x = world.x - dragOffX;
    dragNode.y = world.y - dragOffY;
  } else if(dragMode === 'port'){
    dragLineEnd = {x:world.x, y:world.y};
    var tp = hitTestPort(world.x, world.y);
    hoverPort = (tp && tp.nodeId !== dragPort.nodeId) ? tp : null;
  } else if(dragMode === 'camera'){
    var dx = screen.x - pointerStartX;
    var dy = screen.y - pointerStartY;
    camera.x = cameraStartX - dx / camera.zoom;
    camera.y = cameraStartY - dy / camera.zoom;
  } else {
    var ph = hitTestPort(world.x, world.y);
    hoverPort = ph || null;
  }

  lastPointerX = screen.x;
  lastPointerY = screen.y;
});

canvas.addEventListener('pointerup', function(e){
  if(pinching || isShopDragging) return;
  var screen = getScreenPos(e);
  var world = screenToWorld(screen.x, screen.y);

  if(dragMode === 'port' && dragPort){
    var tp = hitTestPort(world.x, world.y);
    if(tp && tp.nodeId !== dragPort.nodeId){
      if(canConnect(dragPort, tp)){
        addConnection(dragPort, tp);
      } else if(canConnect(tp, dragPort)){
        addConnection(tp, dragPort);
      } else {
        playSound('error');
      }
    }
  }

  dragMode = null;
  dragNode = null;
  dragPort = null;
  dragLineEnd = null;
  hoverPort = null;
  compatiblePorts = [];
});

canvas.addEventListener('pointerleave', function(){
  dragMode = null;dragNode = null;dragPort = null;dragLineEnd = null;hoverPort = null;
});

// ===== SAVE/LOAD =====
function saveGame(){
  try{
    var data = {
      nodes: nodes.map(function(n){return{id:n.id,type:n.type,x:n.x,y:n.y,infected:n.infected,blackout:n.blackout,blackoutTime:n.blackoutTime||0,lnBalance:n.lnBalance||0,lnwBalance:n.lnwBalance||0,exBalance:n.exBalance||0,exLocked:n.exLocked||0,exLockTime:n.exLockTime||0,exHacked:n.exHacked||false,exHackTime:n.exHackTime||0,miningProgress:n.miningProgress||0}}),
      connections: connections.map(function(c){return{from:c.from,to:c.to,fromPort:c.fromPort,toPort:c.toPort,fromDefIndex:c.fromDefIndex,toDefIndex:c.toDefIndex,lineType:c.lineType}}),
      balance:balance, difficulty:difficulty, gameTime:gameTime, nextNodeId:nextNodeId, researchCompleted:researchCompleted,
      camera:{x:camera.x,y:camera.y,zoom:camera.zoom}
    };
    localStorage.setItem('picocoin_save', JSON.stringify(data));
  }catch(e){}
}

function loadGame(){
  try{
    var raw = localStorage.getItem('picocoin_save');
    if(!raw) return false;
    var data = JSON.parse(raw);
    nodes = data.nodes.map(function(n){return Object.assign({scale:1,infectedTime:0,miningProgress:0}, n)});
    connections = data.connections;
    balance = data.balance;
    difficulty = data.difficulty;
    gameTime = data.gameTime || 0;
    nextNodeId = data.nextNodeId || 100;
    researchCompleted = data.researchCompleted || ['basic_mining'];
    animatedPower = {};
    return true;
  }catch(e){return false}
}

setInterval(saveGame, 30000);

var origInit = initGame;
initGame = function(){
  resize();
  if(!loadGame()){
    origInit();
    return;
  }
  hintShown = false;
  hintFadeState = 'hidden';
  document.getElementById('hint').style.opacity = '0';
  buildShop();updateUI();
  centerCameraOnBlockchain();
  requestAnimationFrame(gameLoop);
};

resize();
</script>
