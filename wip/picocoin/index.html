<script>
'use strict';

// ===== AUDIO =====
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function ensureAudio(){if(!audioCtx)audioCtx=new AudioCtx()}
function playSound(type){
  ensureAudio();
  const ctx=audioCtx,now=ctx.currentTime;
  const o=ctx.createOscillator(),g=ctx.createGain();
  o.connect(g);g.connect(ctx.destination);
  switch(type){
    case'place':o.type='sine';o.frequency.setValueAtTime(600,now);o.frequency.exponentialRampToValueAtTime(900,now+0.08);g.gain.setValueAtTime(0.3,now);g.gain.exponentialRampToValueAtTime(0.01,now+0.15);o.start(now);o.stop(now+0.15);break;
    case'connect':o.type='sawtooth';o.frequency.setValueAtTime(1200,now);o.frequency.exponentialRampToValueAtTime(400,now+0.12);g.gain.setValueAtTime(0.15,now);g.gain.exponentialRampToValueAtTime(0.01,now+0.12);o.start(now);o.stop(now+0.12);break;
    case'mine':o.type='sine';o.frequency.setValueAtTime(800,now);o.frequency.setValueAtTime(1000,now+0.05);o.frequency.setValueAtTime(1200,now+0.1);g.gain.setValueAtTime(0.2,now);g.gain.exponentialRampToValueAtTime(0.01,now+0.3);o.start(now);o.stop(now+0.3);break;
    case'malware':o.type='square';o.frequency.setValueAtTime(150,now);g.gain.setValueAtTime(0.2,now);g.gain.exponentialRampToValueAtTime(0.01,now+0.4);o.start(now);o.stop(now+0.4);break;
    case'cure':o.type='sine';o.frequency.setValueAtTime(500,now);o.frequency.exponentialRampToValueAtTime(2000,now+0.15);g.gain.setValueAtTime(0.2,now);g.gain.exponentialRampToValueAtTime(0.01,now+0.2);o.start(now);o.stop(now+0.2);break;
    case'buy':o.type='triangle';o.frequency.setValueAtTime(400,now);o.frequency.setValueAtTime(600,now+0.05);o.frequency.setValueAtTime(800,now+0.1);g.gain.setValueAtTime(0.25,now);g.gain.exponentialRampToValueAtTime(0.01,now+0.15);o.start(now);o.stop(now+0.15);break;
    case'error':o.type='square';o.frequency.setValueAtTime(200,now);g.gain.setValueAtTime(0.15,now);g.gain.exponentialRampToValueAtTime(0.01,now+0.15);o.start(now);o.stop(now+0.15);break;
  }
}

// ===== CONSTANTS =====
const WIN_W = 170;
const TITLE_H = 26;
const LINE_H = 22;
const FONT_SIZE = 11;
const PORT_R = 7;

// ===== NODE TYPES =====
// Ports: left=output, right=input
// For PC/Server: right ports receive from parts, left ports output to network nodes
const NODE_TYPES = {
  mining_pc:{name:'マイニングPC',emoji:'💻',price:0,titleColor:'#2a7a4a',watt:0,category:'pc'},
  server:{name:'サーバー',emoji:'🖥️',price:30,titleColor:'#2a5a7a',watt:0,category:'pc'},
  cpu:{name:'CPU',emoji:'🔲',price:5,titleColor:'#aa9922',watt:5,category:'parts'},
  power:{name:'電源',emoji:'🔌',price:3,titleColor:'#aa3333',watt:0,supply:20,category:'parts'},
  cooler:{name:'冷却',emoji:'🧊',price:10,titleColor:'#4499aa',watt:3,category:'parts'},
  ssd:{name:'SSD',emoji:'💾',price:15,titleColor:'#339955',watt:2,category:'parts'},
  network:{name:'ネットワーク',emoji:'📡',price:20,titleColor:'#7744aa',watt:2,category:'parts'},
  ai:{name:'AI',emoji:'🤖',price:50,titleColor:'#aa4477',watt:10,category:'parts'},
  firewall:{name:'FW',emoji:'🛡️',price:25,titleColor:'#bb6622',watt:1,category:'parts'},
  blockchain:{name:'ブロックチェーン',emoji:'⛓️',price:0,titleColor:'#3366cc',watt:0,category:'network'},
  wallet:{name:'ウォレット',emoji:'👛',price:0,titleColor:'#aa8822',watt:0,category:'network'},
  ln_node:{name:'LN',emoji:'⚡',price:30,titleColor:'#ff9900',watt:0,category:'network'},
  ln_wallet:{name:'LNウォレット',emoji:'💰',price:20,titleColor:'#ddaa00',watt:0,category:'network'},
  exchange:{name:'取引所',emoji:'🏦',price:100,titleColor:'#6633cc',watt:0,category:'network'},
};

// Connection rules: which types can connect where
// mining_pc inputs (right ports): cpu, power, cooler, ssd, firewall
// mining_pc outputs (left ports): blockchain, wallet
// server inputs (right ports): cpu, power, network, firewall
// server outputs (left ports): ln_node
// Parts (cpu, power, cooler, ssd, network, ai, firewall): left port only → connects to PC/server right port
// blockchain: right port only ← from mining_pc left port
// wallet: right port only ← from mining_pc left port, AND left port → ln_wallet right port
// ln_node: right port ← from server left port, left port → ln_wallet right port
// ln_wallet: right ports ← from ln_node left port AND wallet left port

const MINING_PC_INPUTS = ['cpu','power','cooler','ssd','firewall'];
const MINING_PC_OUTPUTS = ['blockchain','wallet'];
const SERVER_INPUTS = ['cpu','power','network','firewall'];
const SERVER_OUTPUTS = ['ln_node'];

// ===== PORT DEFINITIONS PER NODE TYPE =====
// Each port: {side:'left'|'right', type:string, label:string}
function getPortDefs(nodeType){
  switch(nodeType){
    case 'mining_pc': return [
      {side:'right',type:'cpu',label:'CPU'},
      {side:'right',type:'power',label:'電源'},
      {side:'right',type:'cooler',label:'冷却'},
      {side:'right',type:'ssd',label:'SSD'},
      {side:'right',type:'firewall',label:'FW'},
      {side:'left',type:'blockchain',label:'BC'},
      {side:'left',type:'wallet',label:'ウォレット'},
    ];
    case 'server': return [
      {side:'right',type:'cpu',label:'CPU'},
      {side:'right',type:'power',label:'電源'},
      {side:'right',type:'network',label:'NET'},
      {side:'right',type:'firewall',label:'FW'},
      {side:'left',type:'ln_node',label:'LN'},
    ];
    case 'cpu': return [{side:'left',type:'to_pc',label:'→PC'}];
    case 'power': return [{side:'left',type:'to_pc',label:'→PC'}];
    case 'cooler': return [{side:'left',type:'to_pc',label:'→PC'}];
    case 'ssd': return [{side:'left',type:'to_pc',label:'→PC'}];
    case 'network': return [{side:'left',type:'to_pc',label:'→PC'}];
    case 'ai': return [{side:'left',type:'to_pc',label:'→PC'}];
    case 'firewall': return [{side:'left',type:'to_pc',label:'→PC'}];
    case 'blockchain': return [{side:'right',type:'from_pc',label:'←PC'}];
    case 'wallet': return [
      {side:'right',type:'from_pc',label:'←PC'},
      {side:'left',type:'to_lnwallet',label:'→LNW'},
    ];
    case 'ln_node': return [
      {side:'right',type:'from_server',label:'←サーバー'},
      {side:'left',type:'to_lnwallet',label:'→LNW'},
    ];
    case 'ln_wallet': return [
      {side:'right',type:'from_ln',label:'←LN'},
      {side:'right',type:'from_wallet',label:'←ウォレット'},
    ];
    case 'exchange': return [
      {side:'right',type:'from_pc',label:'←PC'},
    ];
    default: return [];
  }
}

// ===== RESEARCH TREE =====
const RESEARCH_TREE = [
  {id:'basic_mining',name:'基本マイニング',emoji:'⛏️',desc:'マイニングの基礎を習得',cost:0,prereq:null,effect:'初期状態で解放済み'},
  {id:'gpu_boost',name:'GPU最適化',emoji:'🎮',desc:'CPU効率+50%アップ',cost:20,prereq:'basic_mining',effect:'全CPUの演算力1.5倍'},
  {id:'ai_mining',name:'AIマイニング',emoji:'🧠',desc:'AI補助で採掘精度向上',cost:80,prereq:'gpu_boost',effect:'マイニング成功率2倍'},
  {id:'quantum',name:'量子コンピュータ',emoji:'⚛️',desc:'究極の演算力を解放',cost:200,prereq:'ai_mining',effect:'全ハッシュレート3倍'},
  {id:'overclock',name:'オーバークロック',emoji:'🔥',desc:'CPUを限界まで回す',cost:30,prereq:'basic_mining',effect:'CPU演算力2倍'},
  {id:'green_energy',name:'省エネ技術',emoji:'🌱',desc:'電力効率を改善',cost:40,prereq:'overclock',effect:'全パーツ消費電力-30%'},
];

let researchCompleted = ['basic_mining'];

// ===== CAMERA =====
let camera = {x:0, y:0, zoom:1};

// ===== GAME STATE =====
let nodes = [];
let connections = [];
let effects = [];
let particles = [];
let balance = 0;
let difficulty = 1.0;
let difficultyTimer = 0;
let malwareTimer = 0;
let blackoutTimer = 0;
let gameTime = 0;
let miningCheckTimer = 0;
let selectedShopItem = null;
let currentShopTab = 'pc';
let gameStarted = false;
let nextNodeId = 1;
let canvasW, canvasH, gameAreaTop, gameAreaBottom;
let hintShown = true;
let hintTimer = 0;

// Drag state
let dragMode = null; // 'move' | 'port' | 'camera' | null
let dragNode = null;
let dragOffX = 0, dragOffY = 0;
let dragPort = null; // {node, portDef, portIndex, x, y}
let dragLineEnd = null;
let hoverPort = null;
let lastPointerX = null, lastPointerY = null;
let cameraStartX = 0, cameraStartY = 0;
let pointerStartX = 0, pointerStartY = 0;

// Pinch state
let pinchDist = 0;
let pinching = false;
let pinchMidX = 0, pinchMidY = 0;

// Animated power display per PC
let animatedPower = {};

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resize(){
  const dpr = window.devicePixelRatio || 1;
  canvasW = window.innerWidth;
  canvasH = window.innerHeight;
  canvas.width = canvasW * dpr;
  canvas.height = canvasH * dpr;
  canvas.style.width = canvasW + 'px';
  canvas.style.height = canvasH + 'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  gameAreaTop = 42;
  const bp = document.getElementById('bottomPanel');
  gameAreaBottom = canvasH - (bp ? bp.offsetHeight : 80);
}
window.addEventListener('resize', resize);

// ===== COORDINATE TRANSFORMS =====
function screenToWorld(sx, sy){
  return {
    x: (sx - canvasW/2) / camera.zoom + camera.x + canvasW/2,
    y: (sy - canvasH/2) / camera.zoom + camera.y + canvasH/2
  };
}

function worldToScreen(wx, wy){
  return {
    x: (wx - camera.x - canvasW/2) * camera.zoom + canvasW/2,
    y: (wy - camera.y - canvasH/2) * camera.zoom + canvasH/2
  };
}

// ===== TITLE SCREEN =====
(function titleAnim(){
  const tc = document.getElementById('titleCanvas');
  const tctx = tc.getContext('2d');
  const dpr = window.devicePixelRatio||1;
  function resizeTitle(){tc.width=window.innerWidth*dpr;tc.height=window.innerHeight*dpr;tctx.setTransform(dpr,0,0,dpr,0,0)}
  resizeTitle();
  const lines=[];
  for(let i=0;i<30;i++)lines.push({x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,l:50+Math.random()*100,a:Math.random()*Math.PI*2,s:0.2+Math.random()*0.5});
  function drawTitle(){
    if(gameStarted)return;
    const w=window.innerWidth,h=window.innerHeight;
    tctx.fillStyle='#0a0e27';tctx.fillRect(0,0,w,h);
    tctx.strokeStyle='#1a2050';tctx.lineWidth=0.5;
    for(let x=0;x<w;x+=40){tctx.beginPath();tctx.moveTo(x,0);tctx.lineTo(x,h);tctx.stroke()}
    for(let y=0;y<h;y+=40){tctx.beginPath();tctx.moveTo(0,y);tctx.lineTo(w,y);tctx.stroke()}
    const t=Date.now()*0.001;
    lines.forEach(function(ln){
      tctx.strokeStyle='rgba(74,106,255,'+(0.15+0.1*Math.sin(t+ln.x))+')';
      tctx.lineWidth=1;
      tctx.beginPath();tctx.moveTo(ln.x,ln.y);
      tctx.lineTo(ln.x+Math.cos(ln.a)*ln.l,ln.y+Math.sin(ln.a)*ln.l);
      tctx.stroke();
    });
    requestAnimationFrame(drawTitle);
  }
  drawTitle();
})();

document.getElementById('startBtn').addEventListener('click', function(){
  ensureAudio();
  document.getElementById('titleScreen').style.display='none';
  gameStarted=true;
  initGame();
});

function resetGame(){
  if(confirm('全データを初期化しますか？')){
    localStorage.removeItem('picocoin_save');
    location.reload();
  }
}

// ===== NODE DISPLAY LINES =====
function getNodeLines(n){
  var nt = NODE_TYPES[n.type];
  var lines = [];
  if(n.type === 'mining_pc'){
    var stats = getPCStats(n);
    var isMining = stats.canMine && !n.infected && stats.powerOk;
    lines.push({text:'状態: '+(n.infected?'🦠感染':(isMining?'⛏️マイニング中':'⏹停止'))});
    lines.push({text:'ハッシュレート: '+stats.effectiveRate.toFixed(1), rightPort:0}); // CPU port
    lines.push({text:'電力: '+stats.powerUsed+'/'+stats.powerSupply+'W', bar:stats.powerSupply>0?Math.min(stats.powerUsed/stats.powerSupply,1.5):0, barOk:stats.powerOk, rightPort:1}); // power port
    // left ports at bottom
    lines.push({text:'', leftPort:0}); // blockchain
    lines.push({text:'', leftPort:1}); // wallet
  } else if(n.type === 'server'){
    var stats = getServerStats(n);
    var isRouting = stats.canRoute && !n.infected && stats.powerOk;
    lines.push({text:'状態: '+(n.infected?'🦠感染':(isRouting?'📡ルーティング中':'⏹停止'))});
    lines.push({text:'処理力: '+stats.processingPower, rightPort:0}); // CPU
    lines.push({text:'電力: '+stats.powerUsed+'/'+stats.powerSupply+'W', bar:stats.powerSupply>0?Math.min(stats.powerUsed/stats.powerSupply,1.5):0, barOk:stats.powerOk, rightPort:1}); // power
    lines.push({text:'', leftPort:0}); // ln_node
  } else if(n.type === 'cpu'){
    lines.push({text:'演算力: +1 / '+nt.watt+'W', leftPort:0});
  } else if(n.type === 'power'){
    lines.push({text:'供給: '+(n.blackout?'0':'20')+'W'+(n.blackout?' ⚡停電':''), leftPort:0});
  } else if(n.type === 'cooler'){
    lines.push({text:'効率1.5倍 / '+nt.watt+'W', leftPort:0});
  } else if(n.type === 'ssd'){
    lines.push({text:'速度1.3倍 / '+nt.watt+'W', leftPort:0});
  } else if(n.type === 'network'){
    lines.push({text:'通信UP / '+nt.watt+'W', leftPort:0});
  } else if(n.type === 'ai'){
    lines.push({text:'処理2倍 / '+nt.watt+'W (CPU2個必要)', leftPort:0});
  } else if(n.type === 'firewall'){
    lines.push({text:'自動駆除 / '+nt.watt+'W', leftPort:0});
  } else if(n.type === 'blockchain'){
    lines.push({text:'難易度: '+difficulty.toFixed(2)+'x'});
    var pcCount = connections.filter(function(c){
      var fromN = nodes.find(function(nd){return nd.id===c.from});
      return fromN && fromN.type==='mining_pc' && c.toPort==='from_pc' && c.toNodeId===n.id;
    }).length;
    lines.push({text:'PC接続: '+pcCount+'台', rightPort:0});
  } else if(n.type === 'wallet'){
    lines.push({text:'残高: '+balance+'₱', rightPort:0});
    lines.push({text:'', leftPort:0}); // to ln_wallet
  } else if(n.type === 'ln_node'){
    var lnBal = n.lnBalance || 0;
    lines.push({text:'ルーティング手数料', rightPort:0});
    lines.push({text:'チャネル容量: '+lnBal.toFixed(1)+'₱'});
    lines.push({text:'', leftPort:0}); // to ln_wallet
  } else if(n.type === 'ln_wallet'){
    var lnwBal = n.lnwBalance || 0;
    lines.push({text:'残高: '+lnwBal.toFixed(1)+'₱', rightPort:0}); // from ln
    lines.push({text:'', rightPort:1}); // from wallet
  } else if(n.type === 'exchange'){
    var exBal = n.exBalance || 0;
    var locked = n.exLocked || 0;
    var hacked = n.exHacked || false;
    var statusText = hacked ? '🔓ハッキング！' : (locked>0 ? '🔒ロック中' : '📈運用中');
    lines.push({text:statusText});
    lines.push({text:'預金: '+exBal.toFixed(1)+'₱', rightPort:0});
  }
  return lines;
}

function getNodeHeight(n){
  return TITLE_H + getNodeLines(n).length * LINE_H + 4;
}

// ===== PORT POSITIONS =====
// Returns actual port positions based on node position and port definitions
function getNodePortPositions(n){
  var portDefs = getPortDefs(n.type);
  var nodeLines = getNodeLines(n);
  var result = [];
  var leftIdx = 0, rightIdx = 0;

  // Count left and right ports from lines
  var leftPorts = [];
  var rightPorts = [];
  nodeLines.forEach(function(line, i){
    if(line.leftPort !== undefined) leftPorts.push({lineIdx:i, portIdx:line.leftPort});
    if(line.rightPort !== undefined) rightPorts.push({lineIdx:i, portIdx:line.rightPort});
  });

  // Map port defs to positions
  var leftDefIdx = 0, rightDefIdx = 0;
  portDefs.forEach(function(pd, pi){
    var px, py;
    if(pd.side === 'left'){
      if(leftDefIdx < leftPorts.length){
        var lp = leftPorts[leftDefIdx];
        px = n.x;
        py = n.y + TITLE_H + lp.lineIdx * LINE_H + LINE_H/2;
        leftDefIdx++;
      } else {
        px = n.x;
        py = n.y + TITLE_H + (nodeLines.length - 1) * LINE_H + LINE_H/2;
      }
    } else {
      if(rightDefIdx < rightPorts.length){
        var rp = rightPorts[rightDefIdx];
        px = n.x + WIN_W;
        py = n.y + TITLE_H + rp.lineIdx * LINE_H + LINE_H/2;
        rightDefIdx++;
      } else {
        px = n.x + WIN_W;
        py = n.y + TITLE_H + (nodeLines.length - 1) * LINE_H + LINE_H/2;
      }
    }
    result.push({x:px, y:py, side:pd.side, type:pd.type, label:pd.label, defIndex:pi, nodeId:n.id, nodeType:n.type});
  });

  return result;
}

// ===== CONNECTION VALIDATION =====
function canConnect(fromPort, toPort){
  // Must be left→right
  if(fromPort.side !== 'left' || toPort.side !== 'right') return false;
  if(fromPort.nodeId === toPort.nodeId) return false;

  var fromNode = nodes.find(function(nd){return nd.id===fromPort.nodeId});
  var toNode = nodes.find(function(nd){return nd.id===toPort.nodeId});
  if(!fromNode || !toNode) return false;

  // Check duplicate connection between same nodes with same port types
  var exists = connections.some(function(c){
    return c.from===fromPort.nodeId && c.to===toPort.nodeId && c.fromPort===fromPort.type && c.toPort===toPort.type;
  });
  if(exists) return false;

  // Parts → mining_pc
  if(['cpu','power','cooler','ssd','firewall'].indexOf(fromNode.type) >= 0 && fromPort.type === 'to_pc'){
    if(toNode.type === 'mining_pc' && toPort.type === fromNode.type) return true;
  }
  // Parts → server
  if(['cpu','power','network','firewall'].indexOf(fromNode.type) >= 0 && fromPort.type === 'to_pc'){
    if(toNode.type === 'server' && toPort.type === fromNode.type) return true;
  }
  // AI → mining_pc (via cpu port since AI needs CPU)
  if(fromNode.type === 'ai' && fromPort.type === 'to_pc'){
    if(toNode.type === 'mining_pc' && toPort.type === 'cpu') return true;
  }
  // mining_pc → blockchain
  if(fromNode.type === 'mining_pc' && fromPort.type === 'blockchain'){
    if(toNode.type === 'blockchain' && toPort.type === 'from_pc') return true;
  }
  // mining_pc → wallet
  if(fromNode.type === 'mining_pc' && fromPort.type === 'wallet'){
    if(toNode.type === 'wallet' && toPort.type === 'from_pc') return true;
  }
  // server → ln_node
  if(fromNode.type === 'server' && fromPort.type === 'ln_node'){
    if(toNode.type === 'ln_node' && toPort.type === 'from_server') return true;
  }
  // ln_node → ln_wallet
  if(fromNode.type === 'ln_node' && fromPort.type === 'to_lnwallet'){
    if(toNode.type === 'ln_wallet' && toPort.type === 'from_ln') return true;
  }
  // wallet → ln_wallet
  if(fromNode.type === 'wallet' && fromPort.type === 'to_lnwallet'){
    if(toNode.type === 'ln_wallet' && toPort.type === 'from_wallet') return true;
  }

  return false;
}

function addConnection(fromPort, toPort){
  var lineType = 'data';
  if(fromPort.type === 'to_pc'){
    var fromNode = nodes.find(function(nd){return nd.id===fromPort.nodeId});
    if(fromNode && fromNode.type === 'power') lineType = 'power';
  }
  if(fromPort.type === 'blockchain') lineType = 'data';
  if(fromPort.type === 'wallet') lineType = 'coin';
  if(fromPort.type === 'ln_node') lineType = 'lightning';
  if(fromPort.type === 'to_lnwallet') lineType = 'lightning';

  connections.push({
    from: fromPort.nodeId,
    to: toPort.nodeId,
    fromPort: fromPort.type,
    toPort: toPort.type,
    fromDefIndex: fromPort.defIndex,
    toDefIndex: toPort.defIndex,
    lineType: lineType
  });
  playSound('connect');
  if(hintShown){hintShown=false;document.getElementById('hint').style.opacity='0';}
}

// ===== PC STATS =====
function getPCStats(pc){
  if(pc.type !== 'mining_pc') return {};
  var attached = connections.filter(function(c){return c.to===pc.id}).map(function(c){return nodes.find(function(n){return n.id===c.from})}).filter(Boolean);
  var outputs = connections.filter(function(c){return c.from===pc.id}).map(function(c){return nodes.find(function(n){return n.id===c.to})}).filter(Boolean);

  var cpus = attached.filter(function(n){return n.type==='cpu'});
  var powers = attached.filter(function(n){return n.type==='power'&&!n.blackout});
  var coolers = attached.filter(function(n){return n.type==='cooler'});
  var ssds = attached.filter(function(n){return n.type==='ssd'});
  var ais = attached.filter(function(n){return n.type==='ai'});
  var firewalls = attached.filter(function(n){return n.type==='firewall'});
  var hasBlockchain = outputs.some(function(n){return n.type==='blockchain'});
  var hasWallet = outputs.some(function(n){return n.type==='wallet'});

  var powerUsed = 0;
  attached.forEach(function(n){powerUsed += NODE_TYPES[n.type].watt || 0;});
  var powerSupply = 0;
  powers.forEach(function(n){powerSupply += NODE_TYPES[n.type].supply || 0;});
  if(researchCompleted.indexOf('green_energy')>=0) powerUsed = Math.ceil(powerUsed * 0.7);
  var powerOk = powerSupply >= powerUsed && powerSupply > 0;
  var canMine = cpus.length > 0 && powers.length > 0 && hasBlockchain && hasWallet && powerOk;

  var hashrate = cpus.length;
  if(researchCompleted.indexOf('overclock')>=0) hashrate *= 2;
  var mult = 1;
  if(researchCompleted.indexOf('gpu_boost')>=0) mult *= 1.5;
  if(coolers.length>0) mult *= 1.5;
  if(ssds.length>0) mult *= 1.3;
  if(ais.length>0 && cpus.length>=2) mult *= 2;
  if(pc.infected) mult *= 0.25;
  if(researchCompleted.indexOf('quantum')>=0) mult *= 3;
  var effectiveRate = hashrate * mult;
  var successRate = effectiveRate * 0.03 / difficulty;
  if(researchCompleted.indexOf('ai_mining')>=0) successRate *= 2;

  return {cpus:cpus.length,powers:powers.length,coolers:coolers.length,ssds:ssds.length,ais:ais.length,
    firewalls:firewalls.length,hasBlockchain:hasBlockchain,hasWallet:hasWallet,canMine:canMine,
    hashrate:hashrate,mult:mult,effectiveRate:effectiveRate,successRate:successRate,
    hasFW:firewalls.length>0,powerUsed:powerUsed,powerSupply:powerSupply,powerOk:powerOk};
}

function getServerStats(sv){
  if(sv.type !== 'server') return {};
  var attached = connections.filter(function(c){return c.to===sv.id}).map(function(c){return nodes.find(function(n){return n.id===c.from})}).filter(Boolean);
  var outputs = connections.filter(function(c){return c.from===sv.id}).map(function(c){return nodes.find(function(n){return n.id===c.to})}).filter(Boolean);

  var cpus = attached.filter(function(n){return n.type==='cpu'});
  var powers = attached.filter(function(n){return n.type==='power'&&!n.blackout});
  var networks = attached.filter(function(n){return n.type==='network'});
  var firewalls = attached.filter(function(n){return n.type==='firewall'});
  var hasLN = outputs.some(function(n){return n.type==='ln_node'});

  var powerUsed = 0;
  attached.forEach(function(n){powerUsed += NODE_TYPES[n.type].watt || 0;});
  var powerSupply = 0;
  powers.forEach(function(n){powerSupply += NODE_TYPES[n.type].supply || 0;});
  if(researchCompleted.indexOf('green_energy')>=0) powerUsed = Math.ceil(powerUsed * 0.7);
  var powerOk = powerSupply >= powerUsed && powerSupply > 0;
  var processingPower = cpus.length + (networks.length > 0 ? 2 : 0);
  var canRoute = cpus.length > 0 && powers.length > 0 && hasLN && powerOk;

  return {cpus:cpus.length,powers:powers.length,networks:networks.length,firewalls:firewalls.length,
    hasLN:hasLN,canRoute:canRoute,processingPower:processingPower,
    hasFW:firewalls.length>0,powerUsed:powerUsed,powerSupply:powerSupply,powerOk:powerOk};
}

// ===== RESEARCH UI =====
function toggleResearch(){
  var panel = document.getElementById('researchPanel');
  if(panel.classList.contains('open')){panel.classList.remove('open')}
  else{renderResearchPanel();panel.classList.add('open')}
}

function renderResearchPanel(){
  var panel = document.getElementById('researchPanel');
  var html = '<div class="rp-header"><h3>🔬 研究ツリー</h3><button class="rp-close" onclick="toggleResearch()">✕</button></div>';
  RESEARCH_TREE.forEach(function(r,i){
    var done = researchCompleted.indexOf(r.id)>=0;
    var prereqMet = !r.prereq || researchCompleted.indexOf(r.prereq)>=0;
    var canAfford = balance >= r.cost;
    var available = !done && prereqMet;
    var statusClass = done ? 'done' : (available ? 'available' : 'locked');
    var statusText = done ? '✅完了' : (available ? '🔓解放可能' : '🔒未解放');
    if(r.prereq && !done) html += '<div class="research-connector">↓</div>';
    html += '<div class="research-item">';
    html += '<div class="ri-top"><span class="ri-emoji">'+r.emoji+'</span><span class="ri-name">'+r.name+'</span><span class="ri-status '+statusClass+'">'+statusText+'</span></div>';
    html += '<div class="ri-desc">'+r.desc+'</div>';
    html += '<div class="ri-desc" style="color:#aaf">効果: '+r.effect+'</div>';
    if(!done){
      html += '<div class="ri-cost">コスト: '+r.cost+'₱</div>';
      if(available) html += '<button class="ri-btn" '+(canAfford?'onclick="doResearch(\''+r.id+'\')"':'disabled')+'>'+(canAfford?'研究する':'資金不足')+'</button>';
    }
    html += '</div>';
  });
  panel.innerHTML = html;
}

function doResearch(id){
  var r = RESEARCH_TREE.find(function(x){return x.id===id});
  if(!r||researchCompleted.indexOf(id)>=0) return;
  if(r.prereq && researchCompleted.indexOf(r.prereq)<0) return;
  if(balance < r.cost) return;
  balance -= r.cost;
  researchCompleted.push(id);
  playSound('buy');
  effects.push({type:'sparkle',x:canvasW/2,y:canvasH/2,t:0,dur:0.8});
  updateUI();buildShop();renderResearchPanel();
}

// ===== GAME LOOP =====
var lastTime = 0;
function gameLoop(ts){
  if(!gameStarted) return;
  var dt = Math.min((ts-(lastTime||ts))/1000, 0.1);
  lastTime = ts;
  gameTime += dt;
  update(dt);
  draw();
  requestAnimationFrame(gameLoop);
}

function update(dt){
  nodes.forEach(function(n){if(n.scale<1)n.scale=Math.min(1,n.scale+dt*5)});

  // Animated power bars
  nodes.filter(function(n){return n.type==='mining_pc'||n.type==='server'}).forEach(function(pc){
    var stats = pc.type==='mining_pc' ? getPCStats(pc) : getServerStats(pc);
    var target = stats.powerSupply > 0 ? stats.powerUsed / stats.powerSupply : 0;
    var cur = animatedPower[pc.id] || 0;
    animatedPower[pc.id] = cur + (target - cur) * Math.min(1, dt * 2);
  });

  difficultyTimer += dt;
  if(difficultyTimer >= 300){difficultyTimer=0;difficulty*=1.2;}

  miningCheckTimer += dt;
  if(miningCheckTimer >= 1){
    miningCheckTimer = 0;
    var totalHash = 0;
    nodes.filter(function(n){return n.type==='mining_pc'}).forEach(function(pc){
      var stats = getPCStats(pc);
      totalHash += stats.effectiveRate;
      if(stats.canMine && !pc.infected && stats.powerOk){
        if(Math.random() < stats.successRate){
          balance++;
          playSound('mine');
          effects.push({type:'sparkle',x:pc.x+WIN_W/2,y:pc.y+TITLE_H/2,t:0,dur:0.6});
          var wallet = nodes.find(function(n){return n.type==='wallet'});
          if(wallet) particles.push({x:pc.x+WIN_W/2,y:pc.y+TITLE_H,tx:wallet.x+WIN_W/2,ty:wallet.y+TITLE_H,t:0,dur:0.8,text:'+1₱'});
          buildShop();updateUI();
        }
      }
    });
    document.getElementById('hashrateText').textContent = totalHash.toFixed(1);
  }

  // LN routing fee income
  nodes.filter(function(n){return n.type==='ln_node'}).forEach(function(ln){
    if(!ln.lnBalance) ln.lnBalance = 0;
    var connectedServer = connections.some(function(c){return c.to===ln.id && nodes.find(function(nd){return nd.id===c.from&&nd.type==='server'})});
    if(connectedServer && ln.lnBalance >= 5){
      var fee = 0.1 * dt * Math.min(ln.lnBalance / 20, 3);
      ln.lnBalance += fee;
      if(Math.random() < 0.02) effects.push({type:'sparkle',x:ln.x+WIN_W/2,y:ln.y+TITLE_H/2,t:0,dur:0.4});
    }
  });

  // Exchange logic
  nodes.filter(function(n){return n.type==='exchange'}).forEach(function(ex){
    if(!ex.exBalance) ex.exBalance = 0;
    if(!ex.exLocked) ex.exLocked = 0;
    if(!ex.exLockTime) ex.exLockTime = 0;
    if(!ex.exLockCooldown) ex.exLockCooldown = 0;
    if(!ex.exHacked) ex.exHacked = false;
    if(!ex.exHackTime) ex.exHackTime = 0;

    var connectedPC = connections.some(function(c){return c.to===ex.id && nodes.find(function(nd){return nd.id===c.from&&nd.type==='mining_pc'})});
    if(!connectedPC) return;

    if(ex.exHacked){ex.exHackTime-=dt;if(ex.exHackTime<=0)ex.exHacked=false;return}

    if(balance >= 1){
      var drain = Math.min(0.5*dt, balance);
      balance -= drain;
      ex.exBalance += drain;
      updateUI();buildShop();
    }

    ex.exLockCooldown -= dt;
    if(ex.exBalance >= 10 && ex.exLocked <= 0 && ex.exLockCooldown <= 0){
      ex.exLocked = ex.exBalance;
      ex.exBalance = 0;
      ex.exLockTime = 30;
      effects.push({type:'sparkle',x:ex.x+WIN_W/2,y:ex.y+TITLE_H/2,t:0,dur:0.5});
    }

    if(ex.exLocked > 0){
      ex.exLockTime -= dt;
      if(ex.exLockTime <= 0){
        var interest = ex.exLocked * 0.05;
        var payout = ex.exLocked + interest;
        balance += Math.floor(payout);
        effects.push({type:'sparkle',x:ex.x+WIN_W/2,y:ex.y+TITLE_H/2,t:0,dur:0.6});
        playSound('mine');
        ex.exLocked=0;ex.exLockTime=0;ex.exLockCooldown=10;
        updateUI();buildShop();
      }
    }

    if(Math.random() < 0.0007 && (ex.exBalance > 0 || ex.exLocked > 0)){
      ex.exBalance=0;ex.exLocked=0;ex.exLockTime=0;
      ex.exHacked=true;ex.exHackTime=15;
      effects.push({type:'malware',x:ex.x+WIN_W/2,y:ex.y+30,t:0,dur:1});
      playSound('malware');
    }
  });

  // Malware every 30s
  malwareTimer += dt;
  if(malwareTimer >= 30){
    malwareTimer = 0;
    nodes.filter(function(n){return (n.type==='mining_pc'||n.type==='server')&&!n.infected}).forEach(function(pc){
      if(Math.random() < 0.1){
        var stats = pc.type==='mining_pc' ? getPCStats(pc) : getServerStats(pc);
        if(stats.hasFW){
          effects.push({type:'cure',x:pc.x+WIN_W/2,y:pc.y+30,t:0,dur:0.5});
          playSound('cure');
        } else {
          pc.infected = true;
          effects.push({type:'malware',x:pc.x+WIN_W/2,y:pc.y+30,t:0,dur:1});
          playSound('malware');
        }
      }
    });
  }

  // Blackout every 2 min
  blackoutTimer += dt;
  if(blackoutTimer >= 120){
    blackoutTimer = 0;
    var powers = nodes.filter(function(n){return n.type==='power'&&!n.blackout});
    if(powers.length>0 && Math.random()<0.05){
      var p = powers[Math.floor(Math.random()*powers.length)];
      p.blackout=true;p.blackoutTime=30;
    }
  }
  nodes.filter(function(n){return n.blackout}).forEach(function(n){n.blackoutTime-=dt;if(n.blackoutTime<=0)n.blackout=false});

  if(hintShown){hintTimer+=dt;if(hintTimer>10){hintShown=false;document.getElementById('hint').style.opacity='0'}}

  effects.forEach(function(e){e.t+=dt});
  effects = effects.filter(function(e){return e.t<e.dur});
  particles.forEach(function(p){p.t+=dt});
  particles = particles.filter(function(p){return p.t<p.dur});
}

function updateUI(){
  document.getElementById('balanceText').textContent = balance;
  document.getElementById('diffText').textContent = difficulty.toFixed(2);
}

// ===== DRAWING =====
function draw(){
  ctx.fillStyle = '#0a0e27';
  ctx.fillRect(0, 0, canvasW, canvasH);

  ctx.save();
  // Apply camera
  ctx.translate(canvasW/2, canvasH/2);
  ctx.scale(camera.zoom, camera.zoom);
  ctx.translate(-canvasW/2 - camera.x, -canvasH/2 - camera.y);

  drawGrid();
  drawConnections();
  drawNodes();
  drawEffects();
  drawParticles();
  drawDragLine();

  ctx.restore();
}

function drawGrid(){
  ctx.strokeStyle = '#0f1535';
  ctx.lineWidth = 0.5;
  var step = 30;
  var startX = Math.floor((camera.x - canvasW/camera.zoom) / step) * step;
  var endX = camera.x + canvasW*2/camera.zoom;
  var startY = Math.floor((camera.y - canvasH/camera.zoom) / step) * step;
  var endY = camera.y + canvasH*2/camera.zoom;
  for(var x=startX;x<endX;x+=step){ctx.beginPath();ctx.moveTo(x,startY);ctx.lineTo(x,endY);ctx.stroke()}
  for(var y=startY;y<endY;y+=step){ctx.beginPath();ctx.moveTo(startX,y);ctx.lineTo(endX,y);ctx.stroke()}
}

function drawBezier(fromX, fromY, toX, toY){
  var dx = Math.abs(toX - fromX) * 0.5;
  if(dx < 40) dx = 40;
  ctx.beginPath();
  ctx.moveTo(fromX, fromY);
  ctx.bezierCurveTo(fromX - dx, fromY, toX + dx, toY, toX, toY);
  ctx.stroke();
}

function bezierPointCubic(p0, c1, c2, p3, t){
  var mt = 1-t;
  return mt*mt*mt*p0 + 3*mt*mt*t*c1 + 3*mt*t*t*c2 + t*t*t*p3;
}

function drawConnections(){
  var t = gameTime;
  connections.forEach(function(c){
    var fromN = nodes.find(function(n){return n.id===c.from});
    var toN = nodes.find(function(n){return n.id===c.to});
    if(!fromN || !toN) return;

    var fromPorts = getNodePortPositions(fromN);
    var toPorts = getNodePortPositions(toN);

    var fp = fromPorts.find(function(p){return p.type===c.fromPort && p.defIndex===c.fromDefIndex});
    var tp = toPorts.find(function(p){return p.type===c.toPort && p.defIndex===c.toDefIndex});

    if(!fp) fp = fromPorts.find(function(p){return p.type===c.fromPort});
    if(!tp) tp = toPorts.find(function(p){return p.type===c.toPort});

    if(!fp || !tp) return;

    var fx = fp.x, fy = fp.y, tx = tp.x, ty = tp.y;
    var dx = Math.abs(tx - fx) * 0.5;
    if(dx < 40) dx = 40;
    var c1x = fx - dx, c1y = fy;
    var c2x = tx + dx, c2y = ty;

    var col = '#4488ff';
    if(c.lineType === 'power') col = '#dd4444';
    else if(c.lineType === 'coin') col = '#ddaa22';
    else if(c.lineType === 'lightning') col = '#ff9900';

    ctx.strokeStyle = col;
    ctx.lineWidth = 2;
    ctx.globalAlpha = 0.6;
    ctx.beginPath();
    ctx.moveTo(fx, fy);
    ctx.bezierCurveTo(c1x, c1y, c2x, c2y, tx, ty);
    ctx.stroke();
    ctx.globalAlpha = 1;

    // Flowing particles along bezier
    for(var i=0;i<3;i++){
      var p = ((t*0.5+i/3)%1);
      var px = bezierPointCubic(fx, c1x, c2x, tx, p);
      var py = bezierPointCubic(fy, c1y, c2y, ty, p);
      ctx.fillStyle = col;
      ctx.globalAlpha = 0.8;
      ctx.beginPath();ctx.arc(px,py,2.5,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha = 1;
    }
  });
}

function drawNodes(){
  nodes.forEach(function(n){
    var nt = NODE_TYPES[n.type];
    var h = getNodeHeight(n);
    var s = n.scale;
    if(s < 0.01) return;

    ctx.save();
    if(s < 1){
      ctx.globalAlpha = s;
      ctx.translate(n.x + WIN_W/2, n.y + h/2);
      ctx.scale(s, s);
      ctx.translate(-(n.x + WIN_W/2), -(n.y + h/2));
    }

    ctx.shadowColor = 'rgba(60,80,180,0.3)';
    ctx.shadowBlur = 8;
    if(n.infected){
      var blink = Math.sin(gameTime*8) > 0 ? 1 : 0.3;
      ctx.shadowColor = 'rgba(255,0,0,'+blink+')';
      ctx.shadowBlur = 12;
    }
    if(n.blackout) ctx.globalAlpha = (ctx.globalAlpha || 1) * 0.4;

    // Body
    ctx.fillStyle = 'rgba(20,25,40,0.9)';
    ctx.strokeStyle = 'rgba(60,80,180,0.4)';
    ctx.lineWidth = 1;
    roundRect(ctx, n.x, n.y, WIN_W, h, 4);
    ctx.fill();
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Title bar
    ctx.fillStyle = n.blackout ? '#333' : nt.titleColor;
    ctx.beginPath();
    ctx.moveTo(n.x+4,n.y);ctx.lineTo(n.x+WIN_W-4,n.y);
    ctx.arcTo(n.x+WIN_W,n.y,n.x+WIN_W,n.y+4,4);ctx.lineTo(n.x+WIN_W,n.y+TITLE_H);
    ctx.lineTo(n.x,n.y+TITLE_H);ctx.lineTo(n.x,n.y+4);ctx.arcTo(n.x,n.y,n.x+4,n.y,4);
    ctx.closePath();ctx.fill();

    ctx.fillStyle = '#fff';
    ctx.font = 'bold '+FONT_SIZE+'px sans-serif';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText(nt.emoji+' '+nt.name, n.x+6, n.y+TITLE_H/2+1);

    // Lines
    var nodeLines = getNodeLines(n);
    ctx.font = FONT_SIZE+'px sans-serif';

    nodeLines.forEach(function(line, i){
      var ly = n.y + TITLE_H + i * LINE_H;
      if(i > 0){
        ctx.strokeStyle = 'rgba(60,80,140,0.2)';
        ctx.lineWidth = 0.5;
        ctx.beginPath();ctx.moveTo(n.x+4,ly);ctx.lineTo(n.x+WIN_W-4,ly);ctx.stroke();
      }

      if(line.text){
        ctx.fillStyle = '#ccc';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'middle';
        ctx.fillText(line.text, n.x+8, ly+LINE_H/2);
      }

      // Power bar
      if(line.bar !== undefined){
        var barX = n.x + WIN_W - 56;
        var barY = ly + 6;
        var barW = 36;
        var barH = 10;
        var animated = animatedPower[n.id] || 0;
        var fillW = Math.min(animated, 1) * barW;
        ctx.fillStyle = 'rgba(40,50,80,0.8)';
        ctx.fillRect(barX, barY, barW, barH);
        ctx.fillStyle = line.barOk ? '#44cc66' : '#dd4444';
        ctx.fillRect(barX, barY, fillW, barH);
        ctx.strokeStyle = 'rgba(80,100,160,0.5)';
        ctx.lineWidth = 0.5;
        ctx.strokeRect(barX, barY, barW, barH);
      }
    });

    // Draw ports
    var ports = getNodePortPositions(n);
    ports.forEach(function(p){
      var connected = isPortConnected(n, p);
      var isHover = hoverPort && hoverPort.nodeId === n.id && hoverPort.defIndex === p.defIndex;

      ctx.beginPath();
      ctx.arc(p.x, p.y, PORT_R, 0, Math.PI*2);
      if(connected){
        ctx.fillStyle = '#44cc66';
      } else if(isHover){
        ctx.fillStyle = '#ddcc44';
      } else {
        ctx.fillStyle = p.side === 'left' ? '#4466aa' : '#444455';
      }
      ctx.fill();
      ctx.strokeStyle = 'rgba(100,120,180,0.6)';
      ctx.lineWidth = 1;
      ctx.stroke();

      // Small direction indicator
      ctx.fillStyle = '#fff';
      ctx.font = '8px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(p.side === 'left' ? '→' : '←', p.x, p.y);
    });

    // Mining LED
    if(n.type === 'mining_pc'){
      var stats = getPCStats(n);
      if(stats.canMine && !n.infected && stats.powerOk){
        ctx.fillStyle = Math.sin(gameTime*4)>0 ? '#44ff88' : '#226644';
        ctx.beginPath();ctx.arc(n.x+WIN_W-10, n.y+TITLE_H/2, 3, 0, Math.PI*2);ctx.fill();
      }
    }
    // Server LED
    if(n.type === 'server'){
      var svStats = getServerStats(n);
      if(svStats.canRoute && !n.infected && svStats.powerOk){
        ctx.fillStyle = Math.sin(gameTime*4)>0 ? '#4488ff' : '#223366';
        ctx.beginPath();ctx.arc(n.x+WIN_W-10, n.y+TITLE_H/2, 3, 0, Math.PI*2);ctx.fill();
      }
    }

    if(n.infected){
      ctx.font = '14px sans-serif';ctx.textAlign = 'center';
      ctx.fillText('💀', n.x+WIN_W/2, n.y-8);
    }
    if(n.blackout){
      ctx.globalAlpha = 1;ctx.font = '14px sans-serif';ctx.textAlign = 'center';
      ctx.fillText('⚡', n.x+WIN_W/2, n.y-8);
    }

    ctx.restore();
  });
}

function isPortConnected(n, port){
  return connections.some(function(c){
    if(port.side === 'left'){
      return c.from === n.id && c.fromPort === port.type && c.fromDefIndex === port.defIndex;
    } else {
      return c.to === n.id && c.toPort === port.type && c.toDefIndex === port.defIndex;
    }
  });
}

function roundRect(ctx, x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
}

function drawEffects(){
  effects.forEach(function(e){
    var p = e.t / e.dur;
    if(e.type === 'sparkle'){
      for(var i=0;i<6;i++){
        var a = Math.PI*2*i/6 + gameTime;
        var d = 20*p;
        ctx.fillStyle = 'rgba(255,215,0,'+(1-p)+')';
        ctx.beginPath();ctx.arc(e.x+Math.cos(a)*d, e.y+Math.sin(a)*d, 3*(1-p), 0, Math.PI*2);ctx.fill();
      }
    }
    if(e.type === 'spawn'){
      ctx.strokeStyle = 'rgba(255,255,255,'+(0.5*(1-p))+')';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(e.x,e.y,30*p,0,Math.PI*2);ctx.stroke();
    }
    if(e.type === 'malware'){
      ctx.fillStyle = 'rgba(255,0,0,'+(0.3*(1-p))+')';
      ctx.beginPath();ctx.arc(e.x,e.y,40*p,0,Math.PI*2);ctx.fill();
    }
    if(e.type === 'cure'){
      ctx.strokeStyle = 'rgba(0,255,200,'+(1-p)+')';ctx.lineWidth=2;
      for(var i=0;i<4;i++){
        var a = Math.PI/2*i + p*2;
        ctx.beginPath();ctx.moveTo(e.x,e.y);
        ctx.lineTo(e.x+Math.cos(a)*30*p,e.y+Math.sin(a)*30*p);ctx.stroke();
      }
    }
  });
}

function drawParticles(){
  particles.forEach(function(p){
    var prog = p.t / p.dur;
    var ease = 1 - Math.pow(1-prog, 3);
    var px = p.x + (p.tx-p.x)*ease;
    var py = p.y + (p.ty-p.y)*ease - Math.sin(prog*Math.PI)*30;
    ctx.font = 'bold 14px sans-serif';
    ctx.fillStyle = 'rgba(255,215,0,'+(1-prog*0.5)+')';
    ctx.textAlign = 'center';
    ctx.fillText(p.text, px, py);
  });
}

function drawDragLine(){
  if(dragMode === 'port' && dragPort && dragLineEnd){
    var fx = dragPort.x, fy = dragPort.y;
    var tx = dragLineEnd.x, ty = dragLineEnd.y;
    var dx = Math.abs(tx - fx) * 0.5;
    if(dx < 40) dx = 40;

    ctx.strokeStyle = 'rgba(74,106,255,0.6)';
    ctx.lineWidth = 2;
    ctx.setLineDash([5,5]);
    if(dragPort.side === 'left'){
      ctx.beginPath();ctx.moveTo(fx,fy);
      ctx.bezierCurveTo(fx-dx,fy,tx+dx,ty,tx,ty);ctx.stroke();
    } else {
      ctx.beginPath();ctx.moveTo(fx,fy);
      ctx.bezierCurveTo(fx+dx,fy,tx-dx,ty,tx,ty);ctx.stroke();
    }
    ctx.setLineDash([]);
  }
}

// ===== INPUT =====
function getWorldPos(e){
  var r = canvas.getBoundingClientRect();
  var touch = e.touches ? e.touches[0] : e;
  var sx = touch.clientX - r.left;
  var sy = touch.clientY - r.top;
  return screenToWorld(sx, sy);
}

function getScreenPos(e){
  var r = canvas.getBoundingClientRect();
  var touch = e.touches ? e.touches[0] : e;
  return {x: touch.clientX - r.left, y: touch.clientY - r.top};
}

function hitTestPort(wx, wy){
  for(var i = nodes.length - 1; i >= 0; i--){
    var ports = getNodePortPositions(nodes[i]);
    for(var j = 0; j < ports.length; j++){
      var p = ports[j];
      if(Math.hypot(wx - p.x, wy - p.y) < PORT_R + 6){
        return p;
      }
    }
  }
  return null;
}

function hitTestTitleBar(wx, wy){
  for(var i = nodes.length - 1; i >= 0; i--){
    var n = nodes[i];
    if(wx >= n.x && wx <= n.x + WIN_W && wy >= n.y && wy <= n.y + TITLE_H) return n;
  }
  return null;
}

function hitTestNode(wx, wy){
  for(var i = nodes.length - 1; i >= 0; i--){
    var n = nodes[i];
    var h = getNodeHeight(n);
    if(wx >= n.x && wx <= n.x + WIN_W && wy >= n.y && wy <= n.y + h) return n;
  }
  return null;
}

// Touch events for pinch/zoom
canvas.addEventListener('touchstart', function(e){
  if(e.touches.length === 2){
    e.preventDefault();
    pinching = true;
    var t1 = e.touches[0], t2 = e.touches[1];
    pinchDist = Math.hypot(t2.clientX-t1.clientX, t2.clientY-t1.clientY);
    pinchMidX = (t1.clientX+t2.clientX)/2;
    pinchMidY = (t1.clientY+t2.clientY)/2;
    dragMode = null; // Cancel any single-finger drag
  }
}, {passive:false});

canvas.addEventListener('touchmove', function(e){
  if(pinching && e.touches.length === 2){
    e.preventDefault();
    var t1 = e.touches[0], t2 = e.touches[1];
    var newDist = Math.hypot(t2.clientX-t1.clientX, t2.clientY-t1.clientY);
    var newMidX = (t1.clientX+t2.clientX)/2;
    var newMidY = (t1.clientY+t2.clientY)/2;

    var scale = newDist / pinchDist;
    var newZoom = Math.max(0.3, Math.min(3.0, camera.zoom * scale));

    // Zoom toward pinch center
    var r = canvas.getBoundingClientRect();
    var wx = (pinchMidX - r.left - canvasW/2) / camera.zoom + camera.x + canvasW/2;
    var wy = (pinchMidY - r.top - canvasH/2) / camera.zoom + camera.y + canvasH/2;

    camera.zoom = newZoom;
    camera.x = wx - canvasW/2 - (pinchMidX - r.left - canvasW/2) / camera.zoom;
    camera.y = wy - canvasH/2 - (pinchMidY - r.top - canvasH/2) / camera.zoom;

    pinchDist = newDist;
    pinchMidX = newMidX;
    pinchMidY = newMidY;
  }
}, {passive:false});

canvas.addEventListener('touchend', function(e){
  if(e.touches.length < 2) pinching = false;
}, {passive:false});

// Mouse wheel zoom
canvas.addEventListener('wheel', function(e){
  e.preventDefault();
  var r = canvas.getBoundingClientRect();
  var sx = e.clientX - r.left;
  var sy = e.clientY - r.top;
  var wx = (sx - canvasW/2) / camera.zoom + camera.x + canvasW/2;
  var wy = (sy - canvasH/2) / camera.zoom + camera.y + canvasH/2;

  var factor = e.deltaY > 0 ? 0.9 : 1.1;
  camera.zoom = Math.max(0.3, Math.min(3.0, camera.zoom * factor));

  camera.x = wx - canvasW/2 - (sx - canvasW/2) / camera.zoom;
  camera.y = wy - canvasH/2 - (sy - canvasH/2) / camera.zoom;
}, {passive:false});

canvas.addEventListener('pointerdown', function(e){
  if(pinching) return;
  ensureAudio();
  var screen = getScreenPos(e);
  var world = screenToWorld(screen.x, screen.y);

  lastPointerX = screen.x;
  lastPointerY = screen.y;
  pointerStartX = screen.x;
  pointerStartY = screen.y;

  // Port drag
  var portHit = hitTestPort(world.x, world.y);
  if(portHit){
    dragMode = 'port';
    dragPort = portHit;
    dragLineEnd = {x:world.x, y:world.y};
    var idx = nodes.indexOf(nodes.find(function(nd){return nd.id===portHit.nodeId}));
    if(idx >= 0){nodes.push(nodes.splice(idx,1)[0])}
    return;
  }

  // Title bar move
  var titleHit = hitTestTitleBar(world.x, world.y);
  if(titleHit){
    dragMode = 'move';
    dragNode = titleHit;
    dragOffX = world.x - titleHit.x;
    dragOffY = world.y - titleHit.y;
    var idx = nodes.indexOf(titleHit);
    if(idx >= 0){nodes.push(nodes.splice(idx,1)[0])}
    return;
  }

  // Click on node body
  var bodyHit = hitTestNode(world.x, world.y);
  if(bodyHit){
    if(bodyHit.infected){
      bodyHit.infected = false;
      effects.push({type:'cure',x:bodyHit.x+WIN_W/2,y:bodyHit.y+30,t:0,dur:0.5});
      playSound('cure');
    } else if(bodyHit.type === 'ln_node'){
      if(balance >= 1){
        balance -= 1;
        if(!bodyHit.lnBalance) bodyHit.lnBalance = 0;
        bodyHit.lnBalance += 1;
        effects.push({type:'sparkle',x:bodyHit.x+WIN_W/2,y:bodyHit.y+TITLE_H/2,t:0,dur:0.4});
        playSound('buy');updateUI();buildShop();
      } else { playSound('error') }
    }
    return;
  }

  // Place from shop or camera drag
  if(selectedShopItem){
    var nt = NODE_TYPES[selectedShopItem];
    if(balance >= nt.price){
      balance -= nt.price;
      addNode(selectedShopItem, world.x - WIN_W/2, world.y - 20);
      playSound(nt.price > 0 ? 'buy' : 'place');
      updateUI();buildShop();
    }
    return;
  }

  // Camera drag
  dragMode = 'camera';
  cameraStartX = camera.x;
  cameraStartY = camera.y;
});

canvas.addEventListener('pointermove', function(e){
  if(pinching) return;
  var screen = getScreenPos(e);
  var world = screenToWorld(screen.x, screen.y);

  if(dragMode === 'move' && dragNode){
    dragNode.x = world.x - dragOffX;
    dragNode.y = world.y - dragOffY;
  } else if(dragMode === 'port'){
    dragLineEnd = {x:world.x, y:world.y};
    var tp = hitTestPort(world.x, world.y);
    hoverPort = (tp && tp.nodeId !== dragPort.nodeId) ? tp : null;
  } else if(dragMode === 'camera'){
    var dx = screen.x - pointerStartX;
    var dy = screen.y - pointerStartY;
    camera.x = cameraStartX - dx / camera.zoom;
    camera.y = cameraStartY - dy / camera.zoom;
  } else {
    var ph = hitTestPort(world.x, world.y);
    hoverPort = ph || null;
  }

  lastPointerX = screen.x;
  lastPointerY = screen.y;
});

canvas.addEventListener('pointerup', function(e){
  if(pinching) return;
  var screen = getScreenPos(e);
  var world = screenToWorld(screen.x, screen.y);

  if(dragMode === 'port' && dragPort){
    var tp = hitTestPort(world.x, world.y);
    if(tp && tp.nodeId !== dragPort.nodeId){
      // Try both directions
      if(canConnect(dragPort, tp)){
        addConnection(dragPort, tp);
      } else if(canConnect(tp, dragPort)){
        addConnection(tp, dragPort);
      } else {
        playSound('error');
      }
    }
  }

  dragMode = null;
  dragNode = null;
  dragPort = null;
  dragLineEnd = null;
  hoverPort = null;
});

canvas.addEventListener('pointerleave', function(){
  dragMode = null;dragNode = null;dragPort = null;dragLineEnd = null;hoverPort = null;
});

// ===== SAVE/LOAD =====
function saveGame(){
  try{
    var data = {
      nodes: nodes.map(function(n){return{id:n.id,type:n.type,x:n.x,y:n.y,infected:n.infected,blackout:n.blackout,blackoutTime:n.blackoutTime||0,lnBalance:n.lnBalance||0,lnwBalance:n.lnwBalance||0,exBalance:n.exBalance||0,exLocked:n.exLocked||0,exLockTime:n.exLockTime||0,exHacked:n.exHacked||false,exHackTime:n.exHackTime||0}}),
      connections: connections.map(function(c){return{from:c.from,to:c.to,fromPort:c.fromPort,toPort:c.toPort,fromDefIndex:c.fromDefIndex,toDefIndex:c.toDefIndex,lineType:c.lineType}}),
      balance:balance, difficulty:difficulty, gameTime:gameTime, nextNodeId:nextNodeId, researchCompleted:researchCompleted,
      camera:{x:camera.x,y:camera.y,zoom:camera.zoom}
    };
    localStorage.setItem('picocoin_save', JSON.stringify(data));
  }catch(e){}
}

function loadGame(){
  try{
    var raw = localStorage.getItem('picocoin_save');
    if(!raw) return false;
    var data = JSON.parse(raw);
    nodes = data.nodes.map(function(n){return Object.assign({scale:1,infectedTime:0}, n)});
    connections = data.connections;
    balance = data.balance;
    difficulty = data.difficulty;
    gameTime = data.gameTime || 0;
    nextNodeId = data.nextNodeId || 100;
    researchCompleted = data.researchCompleted || ['basic_mining'];
    if(data.camera){camera.x=data.camera.x;camera.y=data.camera.y;camera.zoom=data.camera.zoom}
    animatedPower = {};
    return true;
  }catch(e){return false}
}

setInterval(saveGame, 30000);

var origInit = initGame;
initGame = function(){
  resize();
  if(!loadGame()){
    origInit();
    return;
  }
  hintShown = false;
  document.getElementById('hint').style.opacity = '0';
  buildShop();updateUI();
  requestAnimationFrame(gameLoop);
};

resize();
</script>
