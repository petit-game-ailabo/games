<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ジャストパリィ - 今日のミニゲーム</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; }
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #0a0a1a; overflow: hidden; }
    </style>
</head>
<body>
<div id="game-container"></div>
<script>
const W = 400, H = 700;
const game = new Phaser.Game({
    type: Phaser.AUTO, width: W, height: H,
    parent: 'game-container', backgroundColor: '#0a0e1a',
    scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
    scene: { create, update }
});

const C = { blue: 0x88ccff, purple: 0x9b6dff, pink: 0xff6b9d, green: 0x6bff8e, red: 0xff4757, yellow: 0xffe66b, white: 0xffffff };

let state = 'title';
let gfx, ui = {}, endObjs = [], sceneRef;

// プレイヤー
const PY = 520; // プレイヤーY座標
let hp = 5, maxHp = 5;
let score = 0, combo = 0, maxCombo = 0, parries = 0, perfects = 0;

// 敵の攻撃
let attacks = [];      // {x, y, speed, size, type, warning, warningDone}
let attackTimer = 0;
let attackInterval = 80;
let wave = 0;
let bossMode = false;
let bossHp = 0, bossMaxHp = 0;

// パリィ
let parryActive = false;
let parryTimer = 0;
const PARRY_WINDOW = 8;      // パリィ判定フレーム
const PERFECT_WINDOW = 3;    // ジャスト判定フレーム
let parryCD = 0;              // クールダウン
const PARRY_CD = 15;

// 育成
let shieldLv = 0, counterLv = 0, auraLv = 0;
let coins = 0;
const UPG = {
    shield:  { icon: '🛡', name: 'シールド', costs: [30, 60, 100], desc: 'HP+1' },
    counter: { icon: '⚔', name: 'カウンター', costs: [40, 80, 140], desc: '反撃力UP' },
    aura:    { icon: '✨', name: 'オーラ', costs: [50, 100, 180], desc: 'パリィ幅+' },
};

// エフェクト
let particles = [];
let screenShake = 0;

// 音
const actx = new (window.AudioContext || window.webkitAudioContext)();
function snd(f,t='sine',d=0.1,v=0.15){const o=actx.createOscillator(),g=actx.createGain();o.connect(g);g.connect(actx.destination);o.frequency.value=f;o.type=t;g.gain.setValueAtTime(v,actx.currentTime);g.gain.exponentialRampToValueAtTime(0.01,actx.currentTime+d);o.start();o.stop(actx.currentTime+d);}
function sndParry(){snd(800,'square',0.04,0.2);setTimeout(()=>snd(1200,'sine',0.06,0.15),30);}
function sndPerfect(){snd(1000,'sine',0.05,0.2);setTimeout(()=>snd(1400,'sine',0.05,0.2),40);setTimeout(()=>snd(1800,'sine',0.08,0.15),80);}
function sndHit(){snd(100,'sawtooth',0.2,0.2);snd(80,'square',0.15,0.1);}
function sndBossDie(){for(let i=0;i<5;i++)setTimeout(()=>snd(200+i*100,'square',0.08,0.15),i*60);}
function sndUpg(){snd(880,'square',0.05);setTimeout(()=>snd(1100,'square',0.05),50);setTimeout(()=>snd(1320,'square',0.1),100);}

function create() {
    sceneRef = this;
    gfx = this.add.graphics();

    // 背景
    const bg = this.add.graphics();
    bg.lineStyle(1, 0x111825, 0.5);
    for (let y = 0; y < H; y += 40) bg.lineBetween(0, y, W, y);
    for (let x = 0; x < W; x += 40) bg.lineBetween(x, 0, x, H);

    // === ゲームUI ===
    ui.hpText = this.add.text(15, 12, '❤❤❤❤❤', { fontSize: '20px' });
    ui.scoreText = this.add.text(W-15, 12, '0', { fontSize: '18px', fill: '#fff', fontFamily: 'monospace', fontStyle: 'bold' }).setOrigin(1, 0);
    ui.comboText = this.add.text(W/2, 40, '', { fontSize: '16px', fill: '#ff6b9d', fontStyle: 'bold' }).setOrigin(0.5);
    ui.waveText = this.add.text(W/2, 12, 'WAVE 1', { fontSize: '13px', fill: '#9b6dff', fontFamily: 'monospace' }).setOrigin(0.5);
    ui.coinText = this.add.text(15, 38, '💰 0', { fontSize: '12px', fill: '#ffe66b', fontFamily: 'monospace' });

    // ボスHP
    ui.bossBar = this.add.rectangle(W/2, 70, 300, 12, 0x333);
    ui.bossBarFill = this.add.rectangle(W/2, 70, 300, 12, C.red);
    ui.bossName = this.add.text(W/2, 58, '', { fontSize: '11px', fill: '#ff6b9d', fontFamily: 'monospace' }).setOrigin(0.5, 1);

    // 操作ヒント
    ui.hint = this.add.text(W/2, PY + 80, '⬇ タップでパリィ ⬇', { fontSize: '14px', fill: '#555', fontFamily: 'monospace' }).setOrigin(0.5);

    // 育成ボタン
    const upY = 650;
    ui.upBtns = {};
    ['shield','counter','aura'].forEach((key, i) => {
        const x = 70 + i * 130;
        const bg = this.add.rectangle(x, upY, 115, 42, 0x0a0e1a, 0.9);
        bg.setStrokeStyle(1, C.purple, 0.4);
        bg.setInteractive(); bg.on('pointerdown', () => buyUpg(key));
        const icon = this.add.text(x, upY-8, `${UPG[key].icon}${UPG[key].name}`, { fontSize: '11px', fill: '#bbb', fontStyle: 'bold' }).setOrigin(0.5);
        const cost = this.add.text(x, upY+10, `${UPG[key].costs[0]}c`, { fontSize: '10px', fill: '#ffe66b', fontFamily: 'monospace' }).setOrigin(0.5);
        const lv = this.add.text(x+52, upY-18, 'Lv0', { fontSize: '9px', fill: '#9b6dff', fontFamily: 'monospace' }).setOrigin(1,0);
        ui.upBtns[key] = { bg, icon, cost, lv };
    });

    setGameUIVisible(false);

    // === タイトル ===
    ui.startBg = this.add.rectangle(W/2, H/2, W, H, 0x0a0e1a);

    // ピコ剣士
    const pc = this.add.container(W/2, 140);
    pc.add(this.add.ellipse(0, 15, 50, 60, 0x88ccff));
    pc.add(this.add.circle(0, -20, 25, 0xffddbb));
    pc.add(this.add.circle(-25, -15, 12, 0x9b6dff));
    pc.add(this.add.circle(25, -15, 12, 0x9b6dff));
    pc.add(this.add.circle(-8, -22, 3, 0x333));
    pc.add(this.add.circle(8, -22, 3, 0x333));
    pc.add(this.add.text(0, -15, '‿', { fontSize: '10px', fill: '#cc8877' }).setOrigin(0.5));
    // 剣
    pc.add(this.add.rectangle(35, -5, 6, 45, 0xcccccc).setAngle(-30));
    pc.add(this.add.rectangle(35, -25, 14, 4, 0xffe66b).setAngle(-30));
    ui.picoChar = pc;
    this.tweens.add({ targets: pc, y: 135, duration: 1500, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });

    ui.titleText = this.add.text(W/2, 230, 'ジャストパリィ', {
        fontSize: '30px', fill: '#fff', fontStyle: 'bold', stroke: '#0a0a1a', strokeThickness: 4
    }).setOrigin(0.5);
    ui.titleSub = this.add.text(W/2, 265, 'JUST PARRY', { fontSize: '11px', fill: '#9b6dff', fontFamily: 'monospace' }).setOrigin(0.5);

    // 剣エフェクト
    ui.titleDeco = this.add.text(W/2, 330, '⚔️✨🛡️', { fontSize: '30px' }).setOrigin(0.5);

    ui.titleDesc = this.add.text(W/2, 420,
        '敵の攻撃が来たらタップ！\n\n⚔ ジャストタイミングで弾け\n✨ パーフェクトで大ダメージ\n🛡 HPが0になったら終了\n💰 コインでスキル強化', {
        fontSize: '14px', fill: '#bdc3c7', align: 'center', lineSpacing: 5
    }).setOrigin(0.5);

    let bs='';try{const b=localStorage.getItem('parry_best');if(b)bs=`BEST: ${b}点`;}catch(e){}
    ui.titleBest = this.add.text(W/2, 510, bs, { fontSize: '16px', fill: '#ffe66b', fontFamily: 'monospace', fontStyle: 'bold' }).setOrigin(0.5);

    ui.titleStart = this.add.text(W/2, 560, '▶ TAP TO START', {
        fontSize: '22px', fill: '#88ccff', fontStyle: 'bold', fontFamily: 'monospace'
    }).setOrigin(0.5);
    this.tweens.add({ targets: ui.titleStart, alpha: 0.3, duration: 800, yoyo: true, repeat: -1 });

    this.add.text(W/2, H-10, 'Powered by Phaser', { fontSize: '10px', fill: '#fff' }).setOrigin(0.5).setAlpha(0.2);

    // パリィ入力
    this.input.on('pointerdown', () => {
        if (state === 'title') { startGame(this); return; }
        if (state === 'playing' && parryCD <= 0) {
            parryActive = true;
            parryTimer = PARRY_WINDOW + auraLv * 2;
            parryCD = PARRY_CD;
        }
    });
}

function setGameUIVisible(v) {
    [ui.hpText, ui.scoreText, ui.comboText, ui.waveText, ui.coinText,
     ui.bossBar, ui.bossBarFill, ui.bossName, ui.hint].forEach(e => e.setVisible(v));
    Object.values(ui.upBtns).forEach(b => Object.values(b).forEach(o => o.setVisible(v)));
}

function startGame(scene) {
    state = 'playing';
    [ui.startBg, ui.picoChar, ui.titleText, ui.titleSub, ui.titleDeco, ui.titleDesc, ui.titleBest, ui.titleStart].forEach(o => o.setVisible(false));
    scene.tweens.killAll();
    setGameUIVisible(true);

    hp = 5; maxHp = 5; score = 0; combo = 0; maxCombo = 0; parries = 0; perfects = 0; coins = 0;
    attacks = []; attackTimer = 60; attackInterval = 70; wave = 1;
    bossMode = false; bossHp = 0;
    shieldLv = 0; counterLv = 0; auraLv = 0;
    parryActive = false; parryTimer = 0; parryCD = 0;
    particles = []; screenShake = 0;

    ui.bossBar.setVisible(false);
    ui.bossBarFill.setVisible(false);
    ui.bossName.setVisible(false);
    updateHUD();
    updateUpgUI();
}

const BOSSES = [
    { name: '🔥 炎の騎士', hp: 8, color: 0xff4444 },
    { name: '💀 闇の魔導士', hp: 12, color: 0x9944cc },
    { name: '⚡ 雷帝', hp: 16, color: 0xffcc00 },
    { name: '🐉 古龍', hp: 20, color: 0x44ccff },
];

function spawnAttack() {
    // 攻撃タイプ
    let type = 'normal';
    let speed = 3 + wave * 0.3;
    let size = 20;

    const roll = Math.random();
    if (wave >= 3 && roll < 0.15) {
        type = 'fast'; speed *= 1.8; size = 15;
    } else if (wave >= 2 && roll < 0.3) {
        type = 'big'; speed *= 0.7; size = 35;
    }

    const x = Phaser.Math.Between(50, W - 50);

    attacks.push({
        x, y: 90, speed, size, type,
        warningY: PY - 60, // 警告ライン
        warned: false,
    });
}

function checkWave() {
    // 5パリィごとにウェーブアップ
    if (parries > 0 && parries % 8 === 0 && !bossMode) {
        wave++;
        attackInterval = Math.max(25, 70 - wave * 5);
        ui.waveText.setText(`WAVE ${wave}`);

        // 4ウェーブごとにボス
        if (wave % 4 === 0) {
            const bossIdx = Math.min(Math.floor(wave / 4) - 1, BOSSES.length - 1);
            const boss = BOSSES[bossIdx];
            bossMode = true;
            bossHp = boss.hp;
            bossMaxHp = boss.hp;
            ui.bossName.setText(boss.name).setVisible(true);
            ui.bossBar.setVisible(true);
            ui.bossBarFill.setVisible(true).setFillStyle(boss.color);
            attackInterval = 45;

            const fx = sceneRef.add.text(W/2, H/2, boss.name, {
                fontSize: '28px', fill: '#fff', fontStyle: 'bold', stroke: '#000', strokeThickness: 3
            }).setOrigin(0.5);
            sceneRef.tweens.add({ targets: fx, scale: 1.5, alpha: 0, duration: 1000, onComplete: () => fx.destroy() });
        }
    }
}

function update() {
    if (state !== 'playing') return;

    // クールダウン
    if (parryCD > 0) parryCD--;
    if (parryTimer > 0) parryTimer--;
    else parryActive = false;

    // 攻撃スポーン
    attackTimer--;
    if (attackTimer <= 0) {
        spawnAttack();
        attackTimer = attackInterval;
        if (bossMode) {
            // ボスは複数弾
            if (Math.random() < 0.3) {
                setTimeout(() => { if (state === 'playing') spawnAttack(); }, 200);
            }
        }
    }

    // 攻撃更新
    for (let i = attacks.length - 1; i >= 0; i--) {
        const a = attacks[i];
        a.y += a.speed;

        // 警告
        if (!a.warned && a.y > a.warningY) {
            a.warned = true;
        }

        // パリィ判定エリア
        const parryZone = PY - 20;
        const hitZone = PY + 10;

        if (parryActive && a.y >= parryZone - 15 && a.y <= hitZone + 10) {
            // パリィ成功！
            const isPerfect = Math.abs(a.y - parryZone) < 15;
            if (isPerfect) {
                // パーフェクト
                perfects++;
                combo++;
                const pts = 15 + combo * 3 + counterLv * 5;
                score += pts;
                coins += Math.floor(pts * 0.5);
                sndPerfect();
                spawnParticles(a.x, a.y, C.yellow, 15);
                screenShake = 6;

                const fx = sceneRef.add.text(a.x, a.y, `✨PERFECT +${pts}`, {
                    fontSize: '16px', fill: '#ffe66b', fontStyle: 'bold', stroke: '#000', strokeThickness: 2
                }).setOrigin(0.5);
                sceneRef.tweens.add({ targets: fx, y: a.y - 50, alpha: 0, duration: 600, onComplete: () => fx.destroy() });

                if (bossMode) {
                    bossHp -= 2 + counterLv;
                }
            } else {
                // 通常パリィ
                combo++;
                const pts = 8 + combo * 2;
                score += pts;
                coins += Math.floor(pts * 0.4);
                sndParry();
                spawnParticles(a.x, a.y, C.blue, 8);
                screenShake = 3;

                const fx = sceneRef.add.text(a.x, a.y, `⚔ PARRY +${pts}`, {
                    fontSize: '14px', fill: '#88ccff', fontStyle: 'bold', stroke: '#000', strokeThickness: 2
                }).setOrigin(0.5);
                sceneRef.tweens.add({ targets: fx, y: a.y - 40, alpha: 0, duration: 500, onComplete: () => fx.destroy() });

                if (bossMode) {
                    bossHp -= 1 + Math.floor(counterLv * 0.5);
                }
            }

            parries++;
            maxCombo = Math.max(maxCombo, combo);
            attacks.splice(i, 1);
            checkWave();

            // ボス撃破チェック
            if (bossMode && bossHp <= 0) {
                bossMode = false;
                ui.bossBar.setVisible(false);
                ui.bossBarFill.setVisible(false);
                ui.bossName.setVisible(false);
                score += 50;
                coins += 30;
                sndBossDie();
                screenShake = 12;
                spawnParticles(W/2, 100, C.pink, 30);

                const fx = sceneRef.add.text(W/2, 200, '💥 BOSS撃破! +50', {
                    fontSize: '22px', fill: '#ff6b9d', fontStyle: 'bold', stroke: '#000', strokeThickness: 3
                }).setOrigin(0.5);
                sceneRef.tweens.add({ targets: fx, y: 160, alpha: 0, scale: 1.3, duration: 800, onComplete: () => fx.destroy() });
            }

            continue;
        }

        // 被弾
        if (a.y > hitZone + 20) {
            hp--;
            combo = 0;
            sndHit();
            screenShake = 8;
            spawnParticles(a.x, PY, C.red, 10);
            attacks.splice(i, 1);

            if (hp <= 0) {
                endGame(sceneRef);
                return;
            }
        }
    }

    // ボスHPバー
    if (bossMode) {
        const ratio = Math.max(0, bossHp / bossMaxHp);
        ui.bossBarFill.setDisplaySize(300 * ratio, 12);
    }

    // パーティクル更新
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy;
        p.vy += 0.15; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
    }

    // 画面シェイク
    if (screenShake > 0) screenShake--;

    // 描画
    draw();
    updateHUD();
    updateUpgUI();
}

function draw() {
    gfx.clear();
    const sx = screenShake > 0 ? Phaser.Math.Between(-3, 3) : 0;
    const sy = screenShake > 0 ? Phaser.Math.Between(-3, 3) : 0;

    // パリィゾーン表示
    const zoneAlpha = parryCD <= 0 ? 0.15 : 0.05;
    gfx.fillStyle(C.blue, zoneAlpha);
    gfx.fillRect(sx, PY - 25 + sy, W, 40);
    gfx.lineStyle(1, C.blue, parryCD <= 0 ? 0.3 : 0.1);
    gfx.lineBetween(sx, PY - 25 + sy, W + sx, PY - 25 + sy);

    // プレイヤー（ピコ）
    const px = W / 2 + sx, py = PY + sy;
    // 体
    gfx.fillStyle(0x88ccff, 1);
    gfx.fillEllipse(px, py + 5, 35, 42);
    // 顔
    gfx.fillStyle(0xffddbb, 1);
    gfx.fillCircle(px, py - 15, 18);
    // ツインテ
    gfx.fillStyle(0x9b6dff, 1);
    gfx.fillCircle(px - 18, py - 10, 9);
    gfx.fillCircle(px + 18, py - 10, 9);
    // 目
    gfx.fillStyle(0x333333, 1);
    gfx.fillCircle(px - 6, py - 17, 2);
    gfx.fillCircle(px + 6, py - 17, 2);

    // パリィアクティブなら盾エフェクト
    if (parryActive) {
        gfx.lineStyle(3, C.yellow, 0.8);
        gfx.strokeCircle(px, py - 5, 30 + auraLv * 3);
        gfx.fillStyle(C.yellow, 0.1);
        gfx.fillCircle(px, py - 5, 30 + auraLv * 3);
    }

    // 攻撃弾
    attacks.forEach(a => {
        const ax = a.x + sx, ay = a.y + sy;
        let color = C.red;
        if (a.type === 'fast') color = C.pink;
        if (a.type === 'big') color = 0xcc44cc;

        // 警告線
        if (a.warned && a.y < PY - 30) {
            gfx.lineStyle(1, color, 0.2);
            gfx.lineBetween(ax, ay, ax, PY + sy);
        }

        // 弾本体
        gfx.fillStyle(color, 0.9);
        gfx.fillCircle(ax, ay, a.size);
        gfx.fillStyle(C.white, 0.3);
        gfx.fillCircle(ax - a.size * 0.2, ay - a.size * 0.2, a.size * 0.3);

        // 軌跡
        gfx.fillStyle(color, 0.15);
        gfx.fillCircle(ax, ay - a.speed * 2, a.size * 0.7);
        gfx.fillStyle(color, 0.08);
        gfx.fillCircle(ax, ay - a.speed * 4, a.size * 0.5);
    });

    // パーティクル
    particles.forEach(p => {
        gfx.fillStyle(p.color, p.life / p.maxLife);
        gfx.fillCircle(p.x + sx, p.y + sy, p.size);
    });
}

function spawnParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
        particles.push({
            x, y,
            vx: Phaser.Math.FloatBetween(-4, 4),
            vy: Phaser.Math.FloatBetween(-6, 1),
            size: Phaser.Math.Between(2, 5),
            color, life: Phaser.Math.Between(15, 30),
            maxLife: 30,
        });
    }
}

function updateHUD() {
    let hearts = '';
    for (let i = 0; i < maxHp; i++) hearts += i < hp ? '❤' : '🖤';
    ui.hpText.setText(hearts);
    ui.scoreText.setText(String(score));
    ui.coinText.setText(`💰 ${coins}`);
    ui.waveText.setText(`WAVE ${wave}`);
    if (combo > 1) ui.comboText.setText(`🔥 ${combo}コンボ`); else ui.comboText.setText('');
    ui.hint.setAlpha(parryCD <= 0 ? 0.5 : 0.15);
}

function buyUpg(key) {
    if (state !== 'playing') return;
    const lv = key === 'shield' ? shieldLv : key === 'counter' ? counterLv : auraLv;
    const costs = UPG[key].costs;
    if (lv >= costs.length || coins < costs[lv]) { snd(100,'square',0.1,0.1); return; }
    coins -= costs[lv];
    if (key === 'shield') { shieldLv++; maxHp++; hp++; }
    else if (key === 'counter') counterLv++;
    else auraLv++;
    sndUpg();
    updateUpgUI();

    const lvNow = key === 'shield' ? shieldLv : key === 'counter' ? counterLv : auraLv;
    const fx = sceneRef.add.text(W/2, 620, `${UPG[key].icon} Lv${lvNow}!`, {
        fontSize: '18px', fill: '#9b6dff', fontStyle: 'bold', stroke: '#000', strokeThickness: 2
    }).setOrigin(0.5);
    sceneRef.tweens.add({ targets: fx, y: 600, alpha: 0, scale: 1.2, duration: 600, onComplete: () => fx.destroy() });
}

function updateUpgUI() {
    const lvs = { shield: shieldLv, counter: counterLv, aura: auraLv };
    for (const [key, b] of Object.entries(ui.upBtns)) {
        const lv = lvs[key]; const u = UPG[key];
        b.lv.setText(`Lv${lv}`);
        if (lv >= u.costs.length) { b.cost.setText('MAX'); b.bg.setAlpha(0.4); }
        else {
            b.cost.setText(`${u.costs[lv]}c`);
            const can = coins >= u.costs[lv];
            b.bg.setAlpha(can ? 0.9 : 0.4);
            [b.icon, b.cost].forEach(e => e.setAlpha(can ? 1 : 0.4));
        }
    }
}

function endGame(scene) {
    state = 'over';
    attacks = [];
    gfx.clear();
    setGameUIVisible(false);

    const prev = parseInt(localStorage.getItem('parry_best') || '0');
    const isNew = score > prev;
    if (isNew) try { localStorage.setItem('parry_best', String(score)); } catch(e){}

    let rank = 'D';
    if (score >= 400) rank = 'S';
    else if (score >= 250) rank = 'A';
    else if (score >= 120) rank = 'B';
    else if (score >= 40) rank = 'C';
    const rc = { D: '#ff6b9d', C: '#ffe66b', B: '#88ccff', A: '#6bff8e', S: '#9b6dff' };

    endObjs = [];
    endObjs.push(scene.add.rectangle(W/2, H/2, W, H, 0x000000, 0.85));
    const card = scene.add.rectangle(W/2, H/2, 350, 450, 0x0a0e1a, 0.95);
    card.setStrokeStyle(2, C.purple, 0.5);
    endObjs.push(card);

    endObjs.push(scene.add.text(W/2, 165, '⚔ GAME OVER', { fontSize: '26px', fill: '#fff', fontStyle: 'bold' }).setOrigin(0.5));
    endObjs.push(scene.add.text(W/2, 205, 'スコア', { fontSize: '13px', fill: '#888', fontFamily: 'monospace' }).setOrigin(0.5));
    endObjs.push(scene.add.text(W/2, 240, `${score}`, {
        fontSize: '42px', fill: '#ffe66b', fontStyle: 'bold', fontFamily: 'monospace'
    }).setOrigin(0.5));
    endObjs.push(scene.add.text(W/2, 280, 'RANK', { fontSize: '13px', fill: '#888', fontFamily: 'monospace' }).setOrigin(0.5));
    endObjs.push(scene.add.text(W/2, 315, rank, { fontSize: '48px', fill: rc[rank], fontStyle: 'bold', fontFamily: 'monospace' }).setOrigin(0.5));
    endObjs.push(scene.add.text(W/2, 370,
        `⚔ パリィ: ${parries}回  ✨ PERFECT: ${perfects}\n🔥 最大コンボ: ${maxCombo}  🌊 WAVE: ${wave}\n🛡 Lv${shieldLv}  ⚔ Lv${counterLv}  ✨ Lv${auraLv}`, {
        fontSize: '12px', fill: '#bbb', fontFamily: 'monospace', align: 'center', lineSpacing: 5
    }).setOrigin(0.5));

    if (isNew) {
        const nb = scene.add.text(W/2, 415, '🎉 NEW BEST!', { fontSize: '16px', fill: '#ffe66b', fontStyle: 'bold' }).setOrigin(0.5);
        scene.tweens.add({ targets: nb, scale: 1.2, duration: 500, yoyo: true, repeat: -1 });
        endObjs.push(nb);
    }

    const btn = scene.add.rectangle(W/2, 465, 170, 48, C.purple);
    btn.setStrokeStyle(2, 0xffffff, 0.4);
    btn.setInteractive(); btn.on('pointerdown', () => resetGame(scene));
    endObjs.push(btn);
    endObjs.push(scene.add.text(W/2, 465, '▶ RETRY', { fontSize: '18px', fill: '#fff', fontStyle: 'bold', fontFamily: 'monospace' }).setOrigin(0.5));
}

function resetGame(scene) {
    for (const o of endObjs) o.destroy();
    endObjs = []; scene.tweens.killAll(); gfx.clear();
    state = 'title';
    const b = localStorage.getItem('parry_best');
    ui.titleBest.setText(b ? `BEST: ${b}点` : '');
    [ui.startBg, ui.picoChar, ui.titleText, ui.titleSub, ui.titleDeco, ui.titleDesc, ui.titleBest, ui.titleStart].forEach(o => o.setVisible(true));
    scene.tweens.add({ targets: ui.titleStart, alpha: 0.3, duration: 800, yoyo: true, repeat: -1 });
    scene.tweens.add({ targets: ui.picoChar, y: 135, duration: 1500, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });
}
</script>
</body>
</html>
