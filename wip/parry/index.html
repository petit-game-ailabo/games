<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ジャストパリィ - 今日のミニゲーム</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; }
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(135deg, #0a0a2e 0%, #16213e 100%); overflow: hidden; }
    </style>
</head>
<body>
<div id="game-container"></div>
<script>
const W = 400, H = 700;
const game = new Phaser.Game({
    type: Phaser.AUTO, width: W, height: H,
    parent: 'game-container', backgroundColor: '#0a0e1a',
    scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
    scene: { preload, create, update }
});

const C = { blue: 0x88ccff, purple: 0x9b6dff, pink: 0xff6b9d, green: 0x6bff8e, red: 0xff4757, yellow: 0xffe66b, white: 0xffffff, orange: 0xffa502 };

let state = 'title';
let gfx, ui = {}, endObjs = [], sceneRef;
let picoImg, bulletImg;

// プレイヤー
const PY = 520; // プレイヤーY座標
let hp = 5, maxHp = 5;
let score = 0, combo = 0, maxCombo = 0, parries = 0, perfects = 0;

// 敵の攻撃
let attacks = [];      // {x, y, speed, size, type, warning, warningDone}
let attackTimer = 0;
let attackInterval = 80;
let wave = 0;
let bossMode = false;
let bossHp = 0, bossMaxHp = 0;

// パリィ
let parryActive = false;
let parryTimer = 0;
const PARRY_WINDOW = 8;      // パリィ判定フレーム
const PERFECT_WINDOW = 3;    // ジャスト判定フレーム
let parryCD = 0;              // クールダウン
const PARRY_CD = 15;

// 育成
let shieldLv = 0, counterLv = 0, auraLv = 0;
let coins = 0;
const UPG = {
    shield:  { icon: '🛡', name: 'シールド', costs: [30, 60, 100], desc: 'HP+1' },
    counter: { icon: '⚔', name: 'カウンター', costs: [40, 80, 140], desc: '反撃力UP' },
    aura:    { icon: '✨', name: 'オーラ', costs: [50, 100, 180], desc: 'パリィ幅+' },
};

// エフェクト
let particles = [];
let screenShake = 0;
let trails = [];

// 音
const actx = new (window.AudioContext || window.webkitAudioContext)();
function snd(f,t='sine',d=0.1,v=0.15){const o=actx.createOscillator(),g=actx.createGain();o.connect(g);g.connect(actx.destination);o.frequency.value=f;o.type=t;g.gain.setValueAtTime(v,actx.currentTime);g.gain.exponentialRampToValueAtTime(0.01,actx.currentTime+d);o.start();o.stop(actx.currentTime+d);}
function sndParry(){snd(800,'square',0.04,0.25);setTimeout(()=>snd(1200,'sine',0.06,0.2),30);}
function sndPerfect(){snd(1000,'sine',0.05,0.25);setTimeout(()=>snd(1400,'sine',0.05,0.25),40);setTimeout(()=>snd(1800,'sine',0.1,0.2),80);}
function sndHit(){snd(100,'sawtooth',0.25,0.25);snd(80,'square',0.2,0.12);}
function sndBossDie(){for(let i=0;i<5;i++)setTimeout(()=>snd(200+i*100,'square',0.1,0.18),i*60);}
function sndUpg(){snd(880,'square',0.05);setTimeout(()=>snd(1100,'square',0.05),50);setTimeout(()=>snd(1320,'square',0.12),100);}

// SVG画像: かわいいピコ（ツインテ、大きな目、小さな口）
const PICO_SVG = `<svg width="70" height="80" xmlns="http://www.w3.org/2000/svg">
  <!-- 体 -->
  <ellipse cx="35" cy="50" rx="22" ry="26" fill="#88ccff"/>
  <!-- 顔 -->
  <circle cx="35" cy="28" r="20" fill="#ffddbb"/>
  <!-- ツインテール左 -->
  <circle cx="15" cy="24" r="10" fill="#9b6dff"/>
  <ellipse cx="10" cy="30" rx="6" ry="12" fill="#9b6dff"/>
  <!-- ツインテール右 -->
  <circle cx="55" cy="24" r="10" fill="#9b6dff"/>
  <ellipse cx="60" cy="30" rx="6" ry="12" fill="#9b6dff"/>
  <!-- 目（大きめ） -->
  <circle cx="28" cy="26" r="4" fill="#333"/>
  <circle cx="42" cy="26" r="4" fill="#333"/>
  <circle cx="29" cy="25" r="1.5" fill="#fff"/>
  <circle cx="43" cy="25" r="1.5" fill="#fff"/>
  <!-- 小さな口 -->
  <ellipse cx="35" cy="32" rx="3" ry="2" fill="#ff9999"/>
  <!-- ほっぺ -->
  <circle cx="22" cy="30" r="3" fill="#ffaacc" opacity="0.5"/>
  <circle cx="48" cy="30" r="3" fill="#ffaacc" opacity="0.5"/>
</svg>`;

// SVG画像: カッコいい敵弾（エネルギー弾風）
const BULLET_SVG = `<svg width="50" height="50" xmlns="http://www.w3.org/2000/svg">
  <!-- 外側のオーラ -->
  <circle cx="25" cy="25" r="23" fill="#ff4757" opacity="0.3"/>
  <!-- メイン -->
  <circle cx="25" cy="25" r="18" fill="#ff4757"/>
  <!-- 光沢 -->
  <circle cx="20" cy="20" r="6" fill="#fff" opacity="0.6"/>
  <circle cx="30" cy="28" r="3" fill="#fff" opacity="0.4"/>
  <!-- エネルギーライン -->
  <path d="M 15 25 Q 25 20, 35 25 Q 25 30, 15 25" fill="#ffcc00" opacity="0.5"/>
</svg>`;

const BULLET_FAST_SVG = `<svg width="40" height="40" xmlns="http://www.w3.org/2000/svg">
  <circle cx="20" cy="20" r="18" fill="#ff6b9d" opacity="0.3"/>
  <circle cx="20" cy="20" r="14" fill="#ff6b9d"/>
  <circle cx="16" cy="16" r="5" fill="#fff" opacity="0.7"/>
  <polygon points="20,10 25,20 20,30 15,20" fill="#ffe66b" opacity="0.6"/>
</svg>`;

const BULLET_BIG_SVG = `<svg width="70" height="70" xmlns="http://www.w3.org/2000/svg">
  <circle cx="35" cy="35" r="33" fill="#9944cc" opacity="0.2"/>
  <circle cx="35" cy="35" r="28" fill="#9944cc"/>
  <circle cx="28" cy="28" r="8" fill="#fff" opacity="0.5"/>
  <circle cx="40" cy="38" r="4" fill="#fff" opacity="0.3"/>
  <path d="M 20 35 L 35 25 L 50 35 L 35 45 Z" fill="#cc44ff" opacity="0.4"/>
</svg>`;

function preload() {
    // SVGをdata URIに変換してロード
    const picoDataUri = 'data:image/svg+xml;base64,' + btoa(PICO_SVG);
    const bulletDataUri = 'data:image/svg+xml;base64,' + btoa(BULLET_SVG);
    const bulletFastDataUri = 'data:image/svg+xml;base64,' + btoa(BULLET_FAST_SVG);
    const bulletBigDataUri = 'data:image/svg+xml;base64,' + btoa(BULLET_BIG_SVG);
    
    this.load.image('pico', picoDataUri);
    this.load.image('bullet', bulletDataUri);
    this.load.image('bullet_fast', bulletFastDataUri);
    this.load.image('bullet_big', bulletBigDataUri);
}

function create() {
    sceneRef = this;
    gfx = this.add.graphics();

    // 背景（グリッド強化）
    const bg = this.add.graphics();
    bg.lineStyle(1, 0x1a2332, 0.6);
    for (let y = 0; y < H; y += 40) {
        bg.lineBetween(0, y, W, y);
    }
    for (let x = 0; x < W; x += 40) {
        bg.lineBetween(x, 0, x, H);
    }
    // 十字線強調
    bg.lineStyle(2, C.purple, 0.15);
    bg.lineBetween(W/2, 0, W/2, H);

    // === ゲームUI ===
    ui.hpText = this.add.text(15, 12, '❤❤❤❤❤', { fontSize: '22px' });
    ui.scoreText = this.add.text(W-15, 12, '0', { fontSize: '20px', fill: '#fff', fontFamily: 'monospace', fontStyle: 'bold' }).setOrigin(1, 0);
    ui.comboText = this.add.text(W/2, 45, '', { fontSize: '18px', fill: '#ff6b9d', fontStyle: 'bold', stroke: '#000', strokeThickness: 2 }).setOrigin(0.5);
    ui.waveText = this.add.text(W/2, 12, 'WAVE 1', { fontSize: '14px', fill: '#9b6dff', fontFamily: 'monospace', fontStyle: 'bold' }).setOrigin(0.5);
    ui.coinText = this.add.text(15, 42, '💰 0', { fontSize: '13px', fill: '#ffe66b', fontFamily: 'monospace' });

    // ボスHP
    ui.bossBar = this.add.rectangle(W/2, 75, 300, 14, 0x1a1a2e);
    ui.bossBar.setStrokeStyle(2, C.purple, 0.6);
    ui.bossBarFill = this.add.rectangle(W/2, 75, 300, 14, C.red);
    ui.bossName = this.add.text(W/2, 62, '', { fontSize: '12px', fill: '#ff6b9d', fontFamily: 'monospace', fontStyle: 'bold' }).setOrigin(0.5, 1);

    // 操作ヒント
    ui.hint = this.add.text(W/2, PY + 85, '⬇ タップでパリィ ⬇', { fontSize: '15px', fill: '#666', fontFamily: 'monospace' }).setOrigin(0.5);

    // 育成ボタン
    const upY = 650;
    ui.upBtns = {};
    ['shield','counter','aura'].forEach((key, i) => {
        const x = 70 + i * 130;
        const bg = this.add.rectangle(x, upY, 115, 45, 0x0a0e1a, 0.95);
        bg.setStrokeStyle(2, C.purple, 0.5);
        bg.setInteractive(); bg.on('pointerdown', () => buyUpg(key));
        const icon = this.add.text(x, upY-10, `${UPG[key].icon}${UPG[key].name}`, { fontSize: '11px', fill: '#ccc', fontStyle: 'bold' }).setOrigin(0.5);
        const cost = this.add.text(x, upY+12, `${UPG[key].costs[0]}c`, { fontSize: '11px', fill: '#ffe66b', fontFamily: 'monospace' }).setOrigin(0.5);
        const lv = this.add.text(x+52, upY-20, 'Lv0', { fontSize: '10px', fill: '#9b6dff', fontFamily: 'monospace' }).setOrigin(1,0);
        ui.upBtns[key] = { bg, icon, cost, lv };
    });

    setGameUIVisible(false);

    // === タイトル ===
    ui.startBg = this.add.rectangle(W/2, H/2, W, H, 0x0a0e1a, 0.98);

    // ピコキャラクター（SVG画像使用）
    ui.picoChar = this.add.image(W/2, 140, 'pico').setScale(1.8);
    this.tweens.add({ targets: ui.picoChar, y: 135, duration: 1500, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });

    ui.titleText = this.add.text(W/2, 240, 'ジャストパリィ', {
        fontSize: '34px', fill: '#fff', fontStyle: 'bold', stroke: '#0a0a1a', strokeThickness: 5
    }).setOrigin(0.5);
    
    ui.titleSub = this.add.text(W/2, 280, 'JUST PARRY', { fontSize: '12px', fill: '#9b6dff', fontFamily: 'monospace', letterSpacing: 2 }).setOrigin(0.5);

    // 剣エフェクト
    ui.titleDeco = this.add.text(W/2, 340, '⚔️✨🛡️✨⚔️', { fontSize: '28px' }).setOrigin(0.5);
    this.tweens.add({ targets: ui.titleDeco, angle: -5, duration: 1000, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });

    ui.titleDesc = this.add.text(W/2, 430,
        '敵の攻撃が来たらタップ！\n\n⚔ ジャストタイミングで弾け\n✨ パーフェクトで大ダメージ\n🛡 HPが0になったら終了\n💰 コインでスキル強化', {
        fontSize: '15px', fill: '#bdc3c7', align: 'center', lineSpacing: 6
    }).setOrigin(0.5);

    let bs='';try{const b=localStorage.getItem('parry_best');if(b)bs=`BEST: ${b}点`;}catch(e){}
    ui.titleBest = this.add.text(W/2, 525, bs, { fontSize: '18px', fill: '#ffe66b', fontFamily: 'monospace', fontStyle: 'bold' }).setOrigin(0.5);

    ui.titleStart = this.add.text(W/2, 580, '▶ TAP TO START', {
        fontSize: '24px', fill: '#88ccff', fontStyle: 'bold', fontFamily: 'monospace'
    }).setOrigin(0.5);
    this.tweens.add({ targets: ui.titleStart, alpha: 0.3, duration: 800, yoyo: true, repeat: -1 });

    this.add.text(W/2, H-12, 'Powered by Phaser', { fontSize: '10px', fill: '#fff' }).setOrigin(0.5).setAlpha(0.25);

    // パリィ入力
    this.input.on('pointerdown', () => {
        if (state === 'title') { startGame(this); return; }
        if (state === 'playing' && parryCD <= 0) {
            parryActive = true;
            parryTimer = PARRY_WINDOW + auraLv * 2;
            parryCD = PARRY_CD;
        }
    });
}

function setGameUIVisible(v) {
    [ui.hpText, ui.scoreText, ui.comboText, ui.waveText, ui.coinText,
     ui.bossBar, ui.bossBarFill, ui.bossName, ui.hint].forEach(e => e.setVisible(v));
    Object.values(ui.upBtns).forEach(b => Object.values(b).forEach(o => o.setVisible(v)));
}

function startGame(scene) {
    state = 'playing';
    [ui.startBg, ui.picoChar, ui.titleText, ui.titleSub, ui.titleDeco, ui.titleDesc, ui.titleBest, ui.titleStart].forEach(o => o.setVisible(false));
    scene.tweens.killAll();
    setGameUIVisible(true);

    hp = 5; maxHp = 5; score = 0; combo = 0; maxCombo = 0; parries = 0; perfects = 0; coins = 0;
    attacks = []; attackTimer = 60; attackInterval = 70; wave = 1;
    bossMode = false; bossHp = 0;
    shieldLv = 0; counterLv = 0; auraLv = 0;
    parryActive = false; parryTimer = 0; parryCD = 0;
    particles = []; trails = []; screenShake = 0;

    ui.bossBar.setVisible(false);
    ui.bossBarFill.setVisible(false);
    ui.bossName.setVisible(false);
    updateHUD();
    updateUpgUI();
}

const BOSSES = [
    { name: '🔥 炎の騎士', hp: 8, color: 0xff4444 },
    { name: '💀 闇の魔導士', hp: 12, color: 0x9944cc },
    { name: '⚡ 雷帝', hp: 16, color: 0xffcc00 },
    { name: '🐉 古龍', hp: 20, color: 0x44ccff },
];

function spawnAttack() {
    // 攻撃タイプ
    let type = 'normal';
    let speed = 3 + wave * 0.3;
    let size = 20;

    const roll = Math.random();
    if (wave >= 3 && roll < 0.15) {
        type = 'fast'; speed *= 1.8; size = 15;
    } else if (wave >= 2 && roll < 0.3) {
        type = 'big'; speed *= 0.7; size = 35;
    }

    const x = Phaser.Math.Between(50, W - 50);

    attacks.push({
        x, y: 90, speed, size, type,
        warningY: PY - 60,
        warned: false,
        rotation: 0,
    });
}

function checkWave() {
    // 5パリィごとにウェーブアップ
    if (parries > 0 && parries % 8 === 0 && !bossMode) {
        wave++;
        attackInterval = Math.max(25, 70 - wave * 5);
        ui.waveText.setText(`WAVE ${wave}`);

        // 4ウェーブごとにボス
        if (wave % 4 === 0) {
            const bossIdx = Math.min(Math.floor(wave / 4) - 1, BOSSES.length - 1);
            const boss = BOSSES[bossIdx];
            bossMode = true;
            bossHp = boss.hp;
            bossMaxHp = boss.hp;
            ui.bossName.setText(boss.name).setVisible(true);
            ui.bossBar.setVisible(true);
            ui.bossBarFill.setVisible(true).setFillStyle(boss.color);
            attackInterval = 45;

            const fx = sceneRef.add.text(W/2, H/2, boss.name, {
                fontSize: '32px', fill: '#fff', fontStyle: 'bold', stroke: '#000', strokeThickness: 4
            }).setOrigin(0.5);
            sceneRef.tweens.add({ targets: fx, scale: 1.6, alpha: 0, duration: 1200, onComplete: () => fx.destroy() });
        }
    }
}

function update() {
    if (state !== 'playing') return;

    // クールダウン
    if (parryCD > 0) parryCD--;
    if (parryTimer > 0) parryTimer--;
    else parryActive = false;

    // 攻撃スポーン
    attackTimer--;
    if (attackTimer <= 0) {
        spawnAttack();
        attackTimer = attackInterval;
        if (bossMode) {
            // ボスは複数弾
            if (Math.random() < 0.35) {
                setTimeout(() => { if (state === 'playing') spawnAttack(); }, 180);
            }
        }
    }

    // 攻撃更新
    for (let i = attacks.length - 1; i >= 0; i--) {
        const a = attacks[i];
        a.y += a.speed;
        a.rotation += 0.05;

        // トレイル追加
        if (Math.random() < 0.3) {
            trails.push({ x: a.x, y: a.y, size: a.size * 0.6, life: 10, maxLife: 10, type: a.type });
        }

        // 警告
        if (!a.warned && a.y > a.warningY) {
            a.warned = true;
        }

        // パリィ判定エリア
        const parryZone = PY - 20;
        const hitZone = PY + 10;

        if (parryActive && a.y >= parryZone - 15 && a.y <= hitZone + 10) {
            // パリィ成功！
            const isPerfect = Math.abs(a.y - parryZone) < 15;
            if (isPerfect) {
                // パーフェクト
                perfects++;
                combo++;
                const pts = 15 + combo * 3 + counterLv * 5;
                score += pts;
                coins += Math.floor(pts * 0.5);
                sndPerfect();
                spawnParticles(a.x, a.y, C.yellow, 20);
                spawnParticles(a.x, a.y, C.orange, 10);
                screenShake = 8;

                const fx = sceneRef.add.text(a.x, a.y, `✨PERFECT +${pts}`, {
                    fontSize: '18px', fill: '#ffe66b', fontStyle: 'bold', stroke: '#000', strokeThickness: 3
                }).setOrigin(0.5);
                sceneRef.tweens.add({ targets: fx, y: a.y - 60, alpha: 0, scale: 1.2, duration: 700, onComplete: () => fx.destroy() });

                if (bossMode) {
                    bossHp -= 2 + counterLv;
                }
            } else {
                // 通常パリィ
                combo++;
                const pts = 8 + combo * 2;
                score += pts;
                coins += Math.floor(pts * 0.4);
                sndParry();
                spawnParticles(a.x, a.y, C.blue, 12);
                spawnParticles(a.x, a.y, C.white, 5);
                screenShake = 4;

                const fx = sceneRef.add.text(a.x, a.y, `⚔ PARRY +${pts}`, {
                    fontSize: '16px', fill: '#88ccff', fontStyle: 'bold', stroke: '#000', strokeThickness: 2
                }).setOrigin(0.5);
                sceneRef.tweens.add({ targets: fx, y: a.y - 45, alpha: 0, duration: 600, onComplete: () => fx.destroy() });

                if (bossMode) {
                    bossHp -= 1 + Math.floor(counterLv * 0.5);
                }
            }

            parries++;
            maxCombo = Math.max(maxCombo, combo);
            attacks.splice(i, 1);
            checkWave();

            // ボス撃破チェック
            if (bossMode && bossHp <= 0) {
                bossMode = false;
                ui.bossBar.setVisible(false);
                ui.bossBarFill.setVisible(false);
                ui.bossName.setVisible(false);
                score += 50;
                coins += 30;
                sndBossDie();
                screenShake = 15;
                spawnParticles(W/2, 100, C.pink, 40);
                spawnParticles(W/2, 100, C.purple, 20);

                const fx = sceneRef.add.text(W/2, 200, '💥 BOSS撃破! +50', {
                    fontSize: '26px', fill: '#ff6b9d', fontStyle: 'bold', stroke: '#000', strokeThickness: 4
                }).setOrigin(0.5);
                sceneRef.tweens.add({ targets: fx, y: 160, alpha: 0, scale: 1.4, duration: 1000, onComplete: () => fx.destroy() });
            }

            continue;
        }

        // 被弾
        if (a.y > hitZone + 20) {
            hp--;
            combo = 0;
            sndHit();
            screenShake = 10;
            spawnParticles(a.x, PY, C.red, 15);
            spawnParticles(a.x, PY, 0x444, 8);
            attacks.splice(i, 1);

            // ダメージフラッシュ
            const flash = sceneRef.add.rectangle(W/2, H/2, W, H, 0xff0000, 0.3);
            sceneRef.tweens.add({ targets: flash, alpha: 0, duration: 200, onComplete: () => flash.destroy() });

            if (hp <= 0) {
                endGame(sceneRef);
                return;
            }
        }
    }

    // トレイル更新
    for (let i = trails.length - 1; i >= 0; i--) {
        const t = trails[i];
        t.life--;
        if (t.life <= 0) trails.splice(i, 1);
    }

    // ボスHPバー
    if (bossMode) {
        const ratio = Math.max(0, bossHp / bossMaxHp);
        ui.bossBarFill.setDisplaySize(300 * ratio, 14);
    }

    // パーティクル更新
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy;
        p.vy += 0.2; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
    }

    // 画面シェイク
    if (screenShake > 0) screenShake--;

    // 描画
    draw();
    updateHUD();
    updateUpgUI();
}

function draw() {
    gfx.clear();
    const sx = screenShake > 0 ? Phaser.Math.Between(-screenShake/2, screenShake/2) : 0;
    const sy = screenShake > 0 ? Phaser.Math.Between(-screenShake/2, screenShake/2) : 0;

    // パリィゾーン表示（強化）
    const zoneAlpha = parryCD <= 0 ? 0.2 : 0.06;
    const zoneColor = parryActive ? C.yellow : C.blue;
    gfx.fillStyle(zoneColor, zoneAlpha);
    gfx.fillRect(sx, PY - 30 + sy, W, 50);
    gfx.lineStyle(2, zoneColor, parryCD <= 0 ? 0.4 : 0.12);
    gfx.lineBetween(sx, PY - 30 + sy, W + sx, PY - 30 + sy);
    gfx.lineBetween(sx, PY + 20 + sy, W + sx, PY + 20 + sy);

    // パリィアクティブなら盾エフェクト
    if (parryActive) {
        const radius = 35 + auraLv * 4;
        gfx.lineStyle(4, C.yellow, 0.9);
        gfx.strokeCircle(W/2 + sx, PY + sy, radius);
        gfx.lineStyle(2, C.white, 0.6);
        gfx.strokeCircle(W/2 + sx, PY + sy, radius - 4);
        gfx.fillStyle(C.yellow, 0.15);
        gfx.fillCircle(W/2 + sx, PY + sy, radius);

        // 回転エフェクト
        const angle = Date.now() * 0.005;
        for (let i = 0; i < 4; i++) {
            const a = angle + (Math.PI / 2) * i;
            const ex = W/2 + Math.cos(a) * (radius + 8);
            const ey = PY + Math.sin(a) * (radius + 8);
            gfx.fillStyle(C.orange, 0.7);
            gfx.fillCircle(ex + sx, ey + sy, 4);
        }
    }

    // トレイル描画
    trails.forEach(t => {
        const alpha = t.life / t.maxLife * 0.2;
        let color = C.red;
        if (t.type === 'fast') color = C.pink;
        if (t.type === 'big') color = 0xcc44cc;
        gfx.fillStyle(color, alpha);
        gfx.fillCircle(t.x + sx, t.y + sy, t.size);
    });

    // 攻撃弾（画像 + エフェクト）
    attacks.forEach(a => {
        const ax = a.x + sx, ay = a.y + sy;
        
        // 警告線（改善）
        if (a.warned && a.y < PY - 35) {
            let color = C.red;
            if (a.type === 'fast') color = C.pink;
            if (a.type === 'big') color = 0xcc44cc;
            gfx.lineStyle(2, color, 0.25);
            gfx.lineBetween(ax, ay, ax, PY + sy);
            // 矢印
            gfx.fillStyle(color, 0.4);
            gfx.fillTriangle(ax, PY - 35 + sy, ax - 5, PY - 45 + sy, ax + 5, PY - 45 + sy);
        }

        // 画像選択
        let imgKey = 'bullet';
        if (a.type === 'fast') imgKey = 'bullet_fast';
        if (a.type === 'big') imgKey = 'bullet_big';
        
        // 弾の画像を描画（回転付き）
        const bullet = sceneRef.add.image(ax, ay, imgKey);
        bullet.setRotation(a.rotation);
        bullet.setDepth(100);
    });

    // プレイヤー（ピコ画像）
    const px = W / 2 + sx, py = PY + sy;
    const pico = sceneRef.add.image(px, py, 'pico').setScale(1.2);
    pico.setDepth(200);

    // パーティクル
    particles.forEach(p => {
        gfx.fillStyle(p.color, p.life / p.maxLife * 0.8);
        gfx.fillCircle(p.x + sx, p.y + sy, p.size);
    });
}

function spawnParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
        particles.push({
            x, y,
            vx: Phaser.Math.FloatBetween(-5, 5),
            vy: Phaser.Math.FloatBetween(-7, 1),
            size: Phaser.Math.Between(2, 6),
            color, life: Phaser.Math.Between(20, 40),
            maxLife: 40,
        });
    }
}

function updateHUD() {
    let hearts = '';
    for (let i = 0; i < maxHp; i++) hearts += i < hp ? '❤' : '🖤';
    ui.hpText.setText(hearts);
    ui.scoreText.setText(String(score));
    ui.coinText.setText(`💰 ${coins}`);
    ui.waveText.setText(`WAVE ${wave}`);
    if (combo > 1) ui.comboText.setText(`🔥 ${combo}コンボ`); else ui.comboText.setText('');
    ui.hint.setAlpha(parryCD <= 0 ? 0.6 : 0.2);
}

function buyUpg(key) {
    if (state !== 'playing') return;
    const lv = key === 'shield' ? shieldLv : key === 'counter' ? counterLv : auraLv;
    const costs = UPG[key].costs;
    if (lv >= costs.length || coins < costs[lv]) { snd(100,'square',0.1,0.1); return; }
    coins -= costs[lv];
    if (key === 'shield') { shieldLv++; maxHp++; hp++; }
    else if (key === 'counter') counterLv++;
    else auraLv++;
    sndUpg();
    updateUpgUI();

    const lvNow = key === 'shield' ? shieldLv : key === 'counter' ? counterLv : auraLv;
    const fx = sceneRef.add.text(W/2, 620, `${UPG[key].icon} Lv${lvNow}!`, {
        fontSize: '20px', fill: '#9b6dff', fontStyle: 'bold', stroke: '#000', strokeThickness: 3
    }).setOrigin(0.5);
    sceneRef.tweens.add({ targets: fx, y: 595, alpha: 0, scale: 1.3, duration: 700, onComplete: () => fx.destroy() });
}

function updateUpgUI() {
    const lvs = { shield: shieldLv, counter: counterLv, aura: auraLv };
    for (const [key, b] of Object.entries(ui.upBtns)) {
        const lv = lvs[key]; const u = UPG[key];
        b.lv.setText(`Lv${lv}`);
        if (lv >= u.costs.length) { b.cost.setText('MAX'); b.bg.setAlpha(0.5); }
        else {
            b.cost.setText(`${u.costs[lv]}c`);
            const can = coins >= u.costs[lv];
            b.bg.setAlpha(can ? 0.95 : 0.5);
            [b.icon, b.cost].forEach(e => e.setAlpha(can ? 1 : 0.5));
        }
    }
}

function endGame(scene) {
    state = 'over';
    attacks = [];
    gfx.clear();
    setGameUIVisible(false);

    const prev = parseInt(localStorage.getItem('parry_best') || '0');
    const isNew = score > prev;
    if (isNew) try { localStorage.setItem('parry_best', String(score)); } catch(e){}

    let rank = 'D';
    if (score >= 400) rank = 'S';
    else if (score >= 250) rank = 'A';
    else if (score >= 120) rank = 'B';
    else if (score >= 40) rank = 'C';
    const rc = { D: '#ff6b9d', C: '#ffe66b', B: '#88ccff', A: '#6bff8e', S: '#9b6dff' };

    endObjs = [];
    endObjs.push(scene.add.rectangle(W/2, H/2, W, H, 0x000000, 0.9));
    const card = scene.add.rectangle(W/2, H/2, 360, 470, 0x0a0e1a, 0.97);
    card.setStrokeStyle(3, C.purple, 0.6);
    endObjs.push(card);

    endObjs.push(scene.add.text(W/2, 170, '⚔ GAME OVER', { fontSize: '30px', fill: '#fff', fontStyle: 'bold', stroke: '#000', strokeThickness: 3 }).setOrigin(0.5));
    endObjs.push(scene.add.text(W/2, 210, 'スコア', { fontSize: '14px', fill: '#999', fontFamily: 'monospace' }).setOrigin(0.5));
    endObjs.push(scene.add.text(W/2, 250, `${score}`, {
        fontSize: '48px', fill: '#ffe66b', fontStyle: 'bold', fontFamily: 'monospace'
    }).setOrigin(0.5));
    endObjs.push(scene.add.text(W/2, 295, 'RANK', { fontSize: '14px', fill: '#999', fontFamily: 'monospace' }).setOrigin(0.5));
    endObjs.push(scene.add.text(W/2, 335, rank, { fontSize: '56px', fill: rc[rank], fontStyle: 'bold', fontFamily: 'monospace' }).setOrigin(0.5));
    endObjs.push(scene.add.text(W/2, 390,
        `⚔ パリィ: ${parries}回  ✨ PERFECT: ${perfects}\n🔥 最大コンボ: ${maxCombo}  🌊 WAVE: ${wave}\n🛡 Lv${shieldLv}  ⚔ Lv${counterLv}  ✨ Lv${auraLv}`, {
        fontSize: '13px', fill: '#bbb', fontFamily: 'monospace', align: 'center', lineSpacing: 6
    }).setOrigin(0.5));

    if (isNew) {
        const nb = scene.add.text(W/2, 435, '🎉 NEW BEST!', { fontSize: '18px', fill: '#ffe66b', fontStyle: 'bold' }).setOrigin(0.5);
        scene.tweens.add({ targets: nb, scale: 1.25, duration: 500, yoyo: true, repeat: -1 });
        endObjs.push(nb);
    }

    const btn = scene.add.rectangle(W/2, 485, 180, 52, C.purple);
    btn.setStrokeStyle(3, 0xffffff, 0.5);
    btn.setInteractive(); btn.on('pointerdown', () => resetGame(scene));
    endObjs.push(btn);
    endObjs.push(scene.add.text(W/2, 485, '▶ RETRY', { fontSize: '20px', fill: '#fff', fontStyle: 'bold', fontFamily: 'monospace' }).setOrigin(0.5));
}

function resetGame(scene) {
    for (const o of endObjs) o.destroy();
    endObjs = []; scene.tweens.killAll(); gfx.clear();
    state = 'title';
    const b = localStorage.getItem('parry_best');
    ui.titleBest.setText(b ? `BEST: ${b}点` : '');
    [ui.startBg, ui.picoChar, ui.titleText, ui.titleSub, ui.titleDeco, ui.titleDesc, ui.titleBest, ui.titleStart].forEach(o => o.setVisible(true));
    scene.tweens.add({ targets: ui.titleStart, alpha: 0.3, duration: 800, yoyo: true, repeat: -1 });
    scene.tweens.add({ targets: ui.picoChar, y: 135, duration: 1500, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });
    scene.tweens.add({ targets: ui.titleDeco, angle: -5, duration: 1000, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });
}
</script>
