<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>バルーン割り - 今日のミニゲーム</title>
<meta name="description" content="浮かぶ風船をタップして割れ！30秒でハイスコアを目指せ🎈">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
body{background:#1a1a2e;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;font-family:'Segoe UI',sans-serif}
canvas{display:block;touch-action:none}
#ui{position:fixed;top:0;left:0;width:100%;display:flex;justify-content:space-between;align-items:center;padding:10px 20px;pointer-events:none;z-index:10}
#scoreDisplay{font-size:2em;font-weight:bold;color:#fff;text-shadow:0 0 10px rgba(255,255,255,0.5)}
#timerDisplay{font-size:2em;font-weight:bold;color:#fff;text-shadow:0 0 10px rgba(255,255,255,0.5)}
#comboDisplay{position:fixed;top:70px;left:50%;transform:translateX(-50%);font-size:1.4em;font-weight:bold;color:#FFD700;text-shadow:0 0 15px #FFD700;z-index:10;pointer-events:none;transition:opacity 0.3s}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;color:#fff;text-align:center;padding:20px}
#overlay h1{font-size:2.5em;margin-bottom:8px}
#overlay .sub{font-size:1em;color:#aaa;margin-bottom:30px}
#overlay .result-score{font-size:3em;font-weight:bold;color:#FFD700;margin-bottom:8px}
#overlay .result-label{font-size:1em;color:#aaa;margin-bottom:30px}
#startBtn{padding:16px 48px;font-size:1.3em;font-weight:bold;border:none;border-radius:50px;background:linear-gradient(135deg,#f093fb,#f5576c);color:#fff;cursor:pointer;box-shadow:0 4px 20px rgba(240,93,108,0.5);transition:transform 0.1s}
#startBtn:active{transform:scale(0.95)}
.balloon-emoji{font-size:3em;margin-bottom:10px;animation:float 2s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
#highScore{font-size:0.9em;color:#aaa;margin-top:15px}
</style>
</head>
<body>
<div id="ui">
  <div id="scoreDisplay">0</div>
  <div id="timerDisplay">30</div>
</div>
<div id="comboDisplay"></div>
<canvas id="c"></canvas>

<div id="overlay">
  <div class="balloon-emoji">🎈</div>
  <h1>バルーン割り</h1>
  <p class="sub">浮かぶ風船をタップして割れ！<br>小さいほど高得点💥</p>
  <button id="startBtn">スタート！</button>
  <div id="highScore"></div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const scoreEl = document.getElementById('scoreDisplay');
const timerEl = document.getElementById('timerDisplay');
const comboEl = document.getElementById('comboDisplay');
const startBtn = document.getElementById('startBtn');
const highScoreEl = document.getElementById('highScore');

// ---- Audio ----
const AC = new (window.AudioContext || window.webkitAudioContext)();
function playPop(freq = 440, vol = 0.3) {
  const o = AC.createOscillator(), g = AC.createGain();
  o.connect(g); g.connect(AC.destination);
  o.type = 'sine'; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + 0.15);
  o.start(); o.stop(AC.currentTime + 0.15);
}
function playCombo(n) {
  [0, 100, 200].forEach((d, i) => {
    setTimeout(() => playPop(440 + n * 30 + i * 60, 0.25), d);
  });
}
function playMiss() {
  const o = AC.createOscillator(), g = AC.createGain();
  o.connect(g); g.connect(AC.destination);
  o.type = 'sawtooth'; o.frequency.value = 200;
  g.gain.setValueAtTime(0.1, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + 0.1);
  o.start(); o.stop(AC.currentTime + 0.1);
}

// ---- Size ----
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// ---- State ----
const COLORS = ['#f94144','#f3722c','#f8961e','#f9c74f','#90be6d','#43aa8b','#4361ee','#7b2d8b','#ff6b9d','#00d2ff'];
let balloons = [], particles = [], score = 0, timeLeft = 30, running = false;
let combo = 0, comboTimer = null, lastComboTime = 0;
let spawnTimer = 0, diffLevel = 1, raf = null, lastTime = 0, timerInterval = null;
let highScore = parseInt(localStorage.getItem('balloon_hs') || '0');

function updateHighScore() {
  highScoreEl.textContent = `ハイスコア: ${highScore} 点`;
}
updateHighScore();

class Balloon {
  constructor() {
    this.r = Math.random() * 25 + 18; // 18~43px
    this.x = Math.random() * (canvas.width - this.r * 2) + this.r;
    this.y = canvas.height + this.r + 10;
    this.vy = -(Math.random() * 1.5 + 1.0 + diffLevel * 0.3);
    this.vx = (Math.random() - 0.5) * 0.8;
    this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
    this.alpha = 1;
    this.popped = false;
    this.wobble = Math.random() * Math.PI * 2;
  }
  get points() { return Math.ceil((50 - this.r) / 5) + 1; } // 小→高得点
  update(dt) {
    this.wobble += 0.04;
    this.x += this.vx + Math.sin(this.wobble) * 0.3;
    this.y += this.vy;
  }
  draw() {
    ctx.save();
    ctx.globalAlpha = this.alpha;
    // 風船本体
    ctx.beginPath();
    ctx.ellipse(this.x, this.y, this.r, this.r * 1.2, 0, 0, Math.PI * 2);
    ctx.fillStyle = this.color;
    ctx.fill();
    // ハイライト
    ctx.beginPath();
    ctx.ellipse(this.x - this.r * 0.3, this.y - this.r * 0.35, this.r * 0.25, this.r * 0.3, -0.5, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.45)';
    ctx.fill();
    // ひも
    ctx.beginPath();
    ctx.moveTo(this.x, this.y + this.r * 1.2);
    ctx.quadraticCurveTo(this.x + 5, this.y + this.r * 1.7, this.x - 5, this.y + this.r * 2.2);
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    // 点数表示
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.font = `bold ${Math.max(10, this.r * 0.55)}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('+' + this.points, this.x, this.y);
    ctx.restore();
  }
  isOffScreen() { return this.y < -this.r * 3; }
}

class Particle {
  constructor(x, y, color) {
    this.x = x; this.y = y; this.color = color;
    this.vx = (Math.random() - 0.5) * 8;
    this.vy = (Math.random() - 0.5) * 8;
    this.r = Math.random() * 6 + 3;
    this.alpha = 1;
    this.life = 1;
  }
  update() {
    this.x += this.vx; this.y += this.vy;
    this.vy += 0.2;
    this.life -= 0.04;
    this.alpha = this.life;
  }
  draw() {
    ctx.save();
    ctx.globalAlpha = Math.max(0, this.alpha);
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fillStyle = this.color;
    ctx.fill();
    ctx.restore();
  }
}

function popBalloon(b, px, py) {
  b.popped = true;
  // パーティクル
  for (let i = 0; i < 10; i++) particles.push(new Particle(b.x, b.y, b.color));
  // コンボ
  const now = Date.now();
  if (now - lastComboTime < 800) {
    combo++;
  } else {
    combo = 1;
  }
  lastComboTime = now;

  const pts = b.points * (combo >= 3 ? combo : 1);
  score += pts;
  scoreEl.textContent = score;
  playPop(300 + b.points * 40);

  if (combo >= 3) {
    comboEl.textContent = `${combo} COMBO! ×${combo}`;
    comboEl.style.opacity = '1';
    playCombo(combo);
    clearTimeout(comboTimer);
    comboTimer = setTimeout(() => { comboEl.style.opacity = '0'; }, 1000);
  } else {
    comboEl.style.opacity = '0';
  }

  // スコアポップ
  const sp = { x: b.x, y: b.y, text: `+${pts}`, life: 1, color: combo >= 3 ? '#FFD700' : '#fff' };
  scorePopups.push(sp);
}

let scorePopups = [];

function spawnBalloon() {
  balloons.push(new Balloon());
}

function loop(ts) {
  if (!running) return;
  const dt = Math.min((ts - lastTime) / 16, 3);
  lastTime = ts;

  // 背景
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
  grad.addColorStop(0, '#0a0a1a');
  grad.addColorStop(1, '#1a1a3a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // スポーン
  spawnTimer += dt;
  const interval = Math.max(30, 80 - diffLevel * 8);
  if (spawnTimer >= interval) {
    spawnTimer = 0;
    spawnBalloon();
    if (Math.random() < 0.3 + diffLevel * 0.05) spawnBalloon(); // たまに2個
  }

  // 更新
  for (let b of balloons) b.update(dt);
  for (let p of particles) p.update();

  // 画面外に出た風船（ミス）
  const before = balloons.length;
  balloons = balloons.filter(b => !b.isOffScreen() && !b.popped);
  const missed = before - balloons.length;

  // 描画
  for (let b of balloons) b.draw();
  for (let p of particles) p.draw();
  particles = particles.filter(p => p.life > 0);

  // スコアポップ
  scorePopups = scorePopups.filter(sp => sp.life > 0);
  for (let sp of scorePopups) {
    ctx.save();
    ctx.globalAlpha = sp.life;
    ctx.fillStyle = sp.color;
    ctx.font = 'bold 22px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(sp.text, sp.x, sp.y - (1 - sp.life) * 40);
    ctx.restore();
    sp.life -= 0.04;
    sp.y -= 0.5;
  }

  raf = requestAnimationFrame(loop);
}

function startGame() {
  if (AC.state === 'suspended') AC.resume();
  balloons = []; particles = []; scorePopups = [];
  score = 0; timeLeft = 30; combo = 0; diffLevel = 1; spawnTimer = 0;
  scoreEl.textContent = '0';
  timerEl.textContent = '30';
  comboEl.style.opacity = '0';
  running = true;
  overlay.style.display = 'none';

  lastTime = performance.now();
  raf = requestAnimationFrame(loop);

  timerInterval = setInterval(() => {
    timeLeft--;
    timerEl.textContent = timeLeft;
    diffLevel = 1 + (30 - timeLeft) / 10; // 徐々に難化
    if (timeLeft <= 0) endGame();
  }, 1000);
}

function endGame() {
  running = false;
  clearInterval(timerInterval);
  cancelAnimationFrame(raf);

  if (score > highScore) {
    highScore = score;
    localStorage.setItem('balloon_hs', highScore);
  }

  // 結果画面
  overlay.innerHTML = `
    <div class="balloon-emoji">🎈</div>
    <h1>ゲーム終了！</h1>
    <div class="result-score">${score} 点</div>
    <div class="result-label">ハイスコア: ${highScore} 点</div>
    <button id="startBtn" onclick="location.reload()">もう一度</button>
    <div style="margin-top:15px;font-size:0.85em;color:#aaa">
      <a href="../" style="color:#aaa">← ゲーム一覧</a>
    </div>
  `;
  overlay.style.display = 'flex';
}

// タッチ/クリック
function handlePointer(e) {
  if (!running) return;
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const points = e.changedTouches ? e.changedTouches : [e];
  for (let pt of points) {
    const px = pt.clientX - rect.left;
    const py = pt.clientY - rect.top;
    let hit = false;
    for (let b of balloons) {
      if (b.popped) continue;
      const dx = px - b.x, dy = py - b.y;
      if (Math.sqrt(dx * dx + dy * dy) < b.r * 1.2) {
        popBalloon(b, px, py);
        hit = true;
        break;
      }
    }
    if (!hit) playMiss();
  }
}

canvas.addEventListener('touchstart', handlePointer, { passive: false });
canvas.addEventListener('mousedown', handlePointer);
startBtn.addEventListener('click', startGame);

// 初期描画（タイトル画面の背景）
function drawBg() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
  grad.addColorStop(0, '#0a0a1a');
  grad.addColorStop(1, '#1a1a3a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}
drawBg();
</script>
</body>
</html>
