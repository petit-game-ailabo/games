<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>にぎにぎリズム！</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #111;
  font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
  width: 390px;
  height: 844px;
  overflow: hidden;
  position: relative;
  margin: 0 auto;
  user-select: none;
  -webkit-user-select: none;
}

.screen {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.screen.hidden { display: none; }

/* ===== TITLE ===== */
#screen-title {
  background: linear-gradient(160deg, #0d0d1a 0%, #1a0a40 100%);
  gap: 32px;
  padding: 40px;
}
.title-logo {
  font-size: 48px;
  font-weight: 900;
  color: #fff;
  text-align: center;
  line-height: 1.2;
  text-shadow: 0 0 30px #aa44ff;
}
.title-sub {
  font-size: 15px;
  color: #998;
  text-align: center;
  line-height: 1.7;
}
.btn-start {
  background: linear-gradient(135deg, #7722ff, #ff44aa);
  border: none;
  border-radius: 50px;
  padding: 20px 72px;
  font-size: 24px;
  font-weight: 900;
  color: #fff;
  cursor: pointer;
  box-shadow: 0 4px 40px rgba(120,50,255,0.6);
  letter-spacing: 3px;
}
.btn-start:active { transform: scale(0.95); }

/* ===== GAME SCREEN ===== */
#screen-game {
  background: #0a0a14;
  flex-direction: column;
  justify-content: flex-start;
  padding: 0;
}

.game-header {
  width: 100%;
  padding: 24px 28px 8px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}
.score-block { text-align: left; }
.score-val {
  font-size: 36px;
  font-weight: 900;
  color: #fff;
  line-height: 1;
}
.score-lbl { font-size: 11px; color: #555; margin-top: 2px; }
.combo-block { text-align: right; }
.combo-val {
  font-size: 28px;
  font-weight: 900;
  color: #ffcc00;
  line-height: 1;
}
.combo-lbl { font-size: 11px; color: #555; margin-top: 2px; }

.phase-label {
  width: 100%;
  text-align: center;
  font-size: 18px;
  font-weight: 900;
  letter-spacing: 3px;
  padding: 4px 0 8px;
}
.phase-label.preview { color: #44ccff; }
.phase-label.playing { color: #ff8844; }

/* progress dots */
.dots-row {
  display: flex;
  gap: 8px;
  justify-content: center;
  padding: 0 0 16px;
}
.dot {
  width: 28px;
  height: 6px;
  border-radius: 3px;
  background: #222;
  transition: background 0.15s;
}
.dot.done { background: #7722ff; }
.dot.current { background: #fff; }

/* center stage */
.stage {
  flex: 1;
  width: 100%;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* beat ring */
#beat-ring {
  position: absolute;
  width: 160px;
  height: 160px;
  border-radius: 50%;
  border: 3px solid #222;
  transition: border-color 0.05s, box-shadow 0.05s;
  pointer-events: none;
}
#beat-ring.pulse {
  border-color: #7722ff;
  box-shadow: 0 0 30px #7722ff88;
}

/* arrow element */
#arrow-el {
  position: absolute;
  font-size: 96px;
  line-height: 1;
  text-align: center;
  pointer-events: none;
  will-change: transform, opacity;
  opacity: 0;
}

/* judgment */
#judg-el {
  position: absolute;
  bottom: 40px;
  left: 0; right: 0;
  text-align: center;
  font-size: 46px;
  font-weight: 900;
  pointer-events: none;
  opacity: 0;
  letter-spacing: 2px;
}
#judg-el.perfect { color: #ffdd00; text-shadow: 0 0 20px #ffaa00; }
#judg-el.ok      { color: #44ffaa; text-shadow: 0 0 16px #22cc88; }
#judg-el.miss    { color: #ff4444; text-shadow: 0 0 16px #cc2222; }

/* ready screen */
#screen-ready {
  background: #0a0a14;
  gap: 16px;
}
.ready-text {
  font-size: 52px;
  font-weight: 900;
  color: #fff;
  text-shadow: 0 0 30px #7722ff;
  letter-spacing: 4px;
}
.ready-sub {
  font-size: 18px;
  color: #888;
  letter-spacing: 2px;
}

/* ===== RESULT ===== */
#screen-result {
  background: linear-gradient(160deg, #0d0d1a 0%, #1a0a40 100%);
  gap: 16px;
  padding: 40px 32px;
}
.result-emoji { font-size: 80px; animation: bounce 0.9s ease infinite alternate; }
@keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-14px); } }
.result-rank {
  font-size: 28px;
  font-weight: 900;
  color: #fff;
  text-shadow: 0 0 20px #aa44ff;
}
.result-score-big {
  font-size: 56px;
  font-weight: 900;
  color: #ffdd44;
  text-shadow: 0 0 20px #ffaa00;
}
.result-score-lbl { font-size: 13px; color: #777; }
.result-stats {
  display: flex;
  gap: 16px;
}
.stat-box {
  text-align: center;
  background: rgba(255,255,255,0.06);
  border-radius: 12px;
  padding: 10px 20px;
}
.stat-val { font-size: 26px; font-weight: 900; color: #fff; }
.stat-lbl { font-size: 11px; color: #666; }
.result-speech {
  background: rgba(255,255,255,0.07);
  border-radius: 16px;
  padding: 16px 22px;
  font-size: 16px;
  font-weight: 700;
  color: #eee;
  text-align: center;
  line-height: 1.7;
  max-width: 300px;
}
.result-speech::before { content: '💬 '; }
.result-btns { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
.btn-retry {
  background: linear-gradient(135deg, #7722ff, #ff44aa);
  border: none; border-radius: 50px;
  padding: 16px 44px; font-size: 20px; font-weight: 900;
  color: #fff; cursor: pointer; letter-spacing: 2px;
  box-shadow: 0 4px 24px rgba(120,50,255,0.5);
}
.btn-share {
  background: rgba(255,255,255,0.08);
  border: 2px solid rgba(255,255,255,0.18);
  border-radius: 50px;
  padding: 14px 32px; font-size: 17px; font-weight: 900;
  color: #fff; cursor: pointer;
}
.btn-retry:active, .btn-share:active { transform: scale(0.95); }
</style>
</head>
<body>

<!-- TITLE -->
<div id="screen-title" class="screen">
  <div class="title-logo">🍙<br>にぎにぎ<br>リズム！</div>
  <div class="title-sub">お手本を見て→<br>リズムに乗って矢印を入力！</div>
  <button class="btn-start" id="btn-start">スタート！</button>
</div>

<!-- GAME -->
<div id="screen-game" class="screen hidden">
  <div class="game-header">
    <div class="score-block">
      <div class="score-val" id="score-val">0</div>
      <div class="score-lbl">SCORE</div>
    </div>
    <div class="combo-block">
      <div class="combo-val" id="combo-val"></div>
      <div class="combo-lbl" id="combo-lbl"></div>
    </div>
  </div>
  <div class="phase-label" id="phase-label"></div>
  <div class="dots-row" id="dots-row"></div>
  <div class="stage">
    <div id="beat-ring"></div>
    <div id="arrow-el"></div>
    <div id="judg-el"></div>
  </div>
</div>

<!-- READY -->
<div id="screen-ready" class="screen hidden">
  <div class="ready-text" id="ready-text">本番！</div>
  <div class="ready-sub">いくよ！</div>
</div>

<!-- RESULT -->
<div id="screen-result" class="screen hidden">
  <div class="result-emoji" id="result-emoji"></div>
  <div class="result-rank" id="result-rank"></div>
  <div class="result-score-big" id="result-score-big"></div>
  <div class="result-score-lbl">SCORE</div>
  <div class="result-stats">
    <div class="stat-box"><div class="stat-val" id="stat-perfect">0</div><div class="stat-lbl">PERFECT</div></div>
    <div class="stat-box"><div class="stat-val" id="stat-ok">0</div><div class="stat-lbl">OK</div></div>
    <div class="stat-box"><div class="stat-val" id="stat-miss">0</div><div class="stat-lbl">MISS</div></div>
  </div>
  <div class="result-speech" id="result-speech"></div>
  <div class="result-btns">
    <button class="btn-retry" id="btn-retry">もう一回！</button>
    <button class="btn-share" id="btn-share">シェア 📣</button>
  </div>
</div>

<script>
(function () {
'use strict';

// ===== CONFIG =====
const BPM = 120;
const BEAT_MS = 60000 / BPM; // 500ms
const SEQ_LEN = 8;
const HIT_WINDOW_PERFECT = 120; // ms
const HIT_WINDOW_OK = 260;      // ms
const MISS_TIMEOUT = 380;       // ms past expected beat

const DIRS = ['↑', '↓', '←', '→'];

// ===== STATE =====
let state = 'title'; // title | preview | ready | playing | result
let sequence = [];
let score = 0;
let combo = 0;
let cntPerfect = 0;
let cntOk = 0;
let cntMiss = 0;

// ===== ELEMENTS =====
const screens = {
  title:  document.getElementById('screen-title'),
  game:   document.getElementById('screen-game'),
  ready:  document.getElementById('screen-ready'),
  result: document.getElementById('screen-result'),
};
const scoreVal   = document.getElementById('score-val');
const comboVal   = document.getElementById('combo-val');
const comboLbl   = document.getElementById('combo-lbl');
const phaseLabel = document.getElementById('phase-label');
const dotsRow    = document.getElementById('dots-row');
const beatRing   = document.getElementById('beat-ring');
const arrowEl    = document.getElementById('arrow-el');
const judgEl     = document.getElementById('judg-el');
const readyText  = document.getElementById('ready-text');

function showScreen(name) {
  Object.entries(screens).forEach(([k, el]) => {
    el.classList.toggle('hidden', k !== name);
  });
}

// ===== AUDIO =====
let ac = null;
function getAC() {
  if (!ac) ac = new (window.AudioContext || window.webkitAudioContext)();
  return ac;
}
function resumeAC() {
  const a = getAC();
  if (a.state === 'suspended') a.resume();
  return a;
}

function kick(a, t) {
  const o = a.createOscillator(), g = a.createGain();
  o.connect(g); g.connect(a.destination);
  o.frequency.setValueAtTime(150, t);
  o.frequency.exponentialRampToValueAtTime(40, t + 0.12);
  g.gain.setValueAtTime(1.0, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
  o.start(t); o.stop(t + 0.25);
}
function snare(a, t) {
  const buf = a.createBuffer(1, a.sampleRate * 0.15, a.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/d.length, 2);
  const s = a.createBufferSource(); s.buffer = buf;
  const g = a.createGain(); g.gain.setValueAtTime(0.45, t); g.gain.exponentialRampToValueAtTime(0.001, t+0.15);
  s.connect(g); g.connect(a.destination); s.start(t); s.stop(t+0.15);
}
function hat(a, t) {
  const buf = a.createBuffer(1, a.sampleRate * 0.05, a.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * (1 - i/d.length);
  const s = a.createBufferSource(); s.buffer = buf;
  const f = a.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = 7000;
  const g = a.createGain(); g.gain.setValueAtTime(0.3, t); g.gain.exponentialRampToValueAtTime(0.001, t+0.05);
  s.connect(f); f.connect(g); g.connect(a.destination); s.start(t); s.stop(t+0.05);
}
function note(a, freq, t, dur) {
  const o = a.createOscillator(), g = a.createGain();
  o.type = 'triangle'; o.frequency.value = freq;
  g.gain.setValueAtTime(0.25, t); g.gain.exponentialRampToValueAtTime(0.001, t + dur * 0.8);
  o.connect(g); g.connect(a.destination); o.start(t); o.stop(t + dur);
}
function sfxHit(a) {
  const o = a.createOscillator(), g = a.createGain();
  o.type = 'sine'; o.frequency.setValueAtTime(880, a.currentTime);
  o.frequency.exponentialRampToValueAtTime(440, a.currentTime + 0.08);
  g.gain.setValueAtTime(0.3, a.currentTime); g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + 0.1);
  o.connect(g); g.connect(a.destination); o.start(); o.stop(a.currentTime + 0.1);
}
function sfxMiss(a) {
  const o = a.createOscillator(), g = a.createGain();
  o.type = 'sawtooth'; o.frequency.value = 120;
  g.gain.setValueAtTime(0.2, a.currentTime); g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + 0.15);
  o.connect(g); g.connect(a.destination); o.start(); o.stop(a.currentTime + 0.15);
}

const MELODY = [523.25, 587.33, 659.25, 523.25, 659.25, 783.99, 880, 783.99];
let bgmStop = false;

function startBGM(delayMs) {
  bgmStop = false;
  const a = resumeAC();
  const t0 = a.currentTime + (delayMs || 0) / 1000;
  const beats = (SEQ_LEN + 4) * 2; // enough beats
  for (let i = 0; i < beats; i++) {
    if (bgmStop) break;
    const t = t0 + i * BEAT_MS / 1000;
    const b = i % 4;
    if (b === 0 || b === 2) kick(a, t);
    if (b === 1 || b === 3) snare(a, t);
    hat(a, t);
    note(a, MELODY[i % 8], t, BEAT_MS / 1000 * 0.65);
  }
  return a.currentTime * 1000 + (delayMs || 0); // absolute start ms (performance-based approx)
}
function stopBGM() { bgmStop = true; }

// ===== BEAT VISUAL =====
let beatRaf = null;
let bgmStartWall = 0; // performance.now() when beat 0 starts

function startBeatVisual(wallStart) {
  bgmStartWall = wallStart;
  let lastBeat = -1;
  function tick() {
    const elapsed = performance.now() - bgmStartWall;
    const beat = Math.floor(elapsed / BEAT_MS);
    if (beat !== lastBeat) {
      lastBeat = beat;
      beatRing.classList.add('pulse');
      setTimeout(() => beatRing.classList.remove('pulse'), 80);
    }
    beatRaf = requestAnimationFrame(tick);
  }
  beatRaf = requestAnimationFrame(tick);
}
function stopBeatVisual() {
  cancelAnimationFrame(beatRaf);
  beatRaf = null;
  beatRing.classList.remove('pulse');
}

// ===== SEQUENCE =====
function buildSequence() {
  const seq = [];
  let last = '';
  for (let i = 0; i < SEQ_LEN; i++) {
    let d;
    do { d = DIRS[Math.floor(Math.random() * DIRS.length)]; } while (d === last);
    last = d;
    seq.push(d);
  }
  return seq;
}

// ===== DOTS =====
function buildDots() {
  dotsRow.innerHTML = '';
  for (let i = 0; i < SEQ_LEN; i++) {
    const d = document.createElement('div');
    d.className = 'dot';
    d.id = 'dot-' + i;
    dotsRow.appendChild(d);
  }
}
function setDot(i, cls) {
  const el = document.getElementById('dot-' + i);
  if (el) { el.className = 'dot ' + cls; }
}

// ===== ARROW ANIMATION =====
const DIR_OFFSET = { '↑': [0, -180], '↓': [0, 180], '←': [-200, 0], '→': [200, 0] };

function showArrowCenter(dir) {
  arrowEl.textContent = dir;
  arrowEl.style.transition = 'none';
  arrowEl.style.transform = 'translate(-50%, -50%)';
  arrowEl.style.left = '50%';
  arrowEl.style.top = '50%';
  arrowEl.style.opacity = '1';
}

function slideArrowOut(dir) {
  const [dx, dy] = DIR_OFFSET[dir];
  arrowEl.style.transition = `transform ${BEAT_MS * 0.45}ms ease-in, opacity ${BEAT_MS * 0.45}ms ease-in`;
  arrowEl.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
  arrowEl.style.opacity = '0';
}

function hideArrow() {
  arrowEl.style.transition = 'none';
  arrowEl.style.opacity = '0';
}

// shake for playing phase
function shakeArrow(dir) {
  const [dx, dy] = DIR_OFFSET[dir];
  const sx = dx !== 0 ? 10 : 0;
  const sy = dy !== 0 ? 10 : 0;
  arrowEl.style.animation = 'none';
  // tiny nudge towards dir
  requestAnimationFrame(() => {
    arrowEl.style.transition = `transform ${BEAT_MS * 0.15}ms ease-out`;
    arrowEl.style.transform = `translate(calc(-50% + ${sx}px), calc(-50% + ${sy}px))`;
    setTimeout(() => {
      arrowEl.style.transform = 'translate(-50%, -50%)';
    }, BEAT_MS * 0.15);
  });
}

// ===== JUDGMENT DISPLAY =====
let judgTimer = null;
function showJudg(type) {
  judgEl.textContent = type === 'PERFECT' ? 'PERFECT!' : type === 'OK' ? 'OK!' : 'MISS...';
  judgEl.className = type.toLowerCase();
  judgEl.style.opacity = '1';
  if (judgTimer) clearTimeout(judgTimer);
  judgTimer = setTimeout(() => { judgEl.style.opacity = '0'; }, 500);
}

// ===== SCORE =====
function addScore(type) {
  if (type === 'PERFECT') {
    combo++;
    const mult = combo >= 15 ? 2.0 : combo >= 10 ? 1.5 : combo >= 5 ? 1.2 : 1.0;
    score += Math.round(100 * mult);
    cntPerfect++;
    sfxHit(resumeAC());
  } else if (type === 'OK') {
    combo++;
    score += 50;
    cntOk++;
    sfxHit(resumeAC());
  } else {
    combo = 0;
    cntMiss++;
    sfxMiss(resumeAC());
  }
  scoreVal.textContent = score;
  if (combo >= 2) {
    comboVal.textContent = combo;
    comboLbl.textContent = 'COMBO';
  } else {
    comboVal.textContent = '';
    comboLbl.textContent = '';
  }
  showJudg(type);
}

// ===== PREVIEW PHASE =====
let timers = [];
function clearTimers() { timers.forEach(clearTimeout); timers = []; }

function runPreview() {
  state = 'preview';
  showScreen('game');
  phaseLabel.textContent = '👀 お手本！';
  phaseLabel.className = 'phase-label preview';
  scoreVal.textContent = '0';
  comboVal.textContent = '';
  comboLbl.textContent = '';
  buildDots();
  hideArrow();
  judgEl.style.opacity = '0';

  const wallStart = performance.now();
  startBGM(0);
  startBeatVisual(wallStart);

  for (let i = 0; i < SEQ_LEN; i++) {
    const dir = sequence[i];
    const t = i * BEAT_MS;

    timers.push(setTimeout(() => {
      if (state !== 'preview') return;
      setDot(i, 'current');
      showArrowCenter(dir);
    }, t));

    timers.push(setTimeout(() => {
      if (state !== 'preview') return;
      setDot(i, 'done');
      slideArrowOut(dir);
    }, t + Math.round(BEAT_MS * 0.5)));
  }

  timers.push(setTimeout(() => {
    if (state !== 'preview') return;
    stopBGM();
    stopBeatVisual();
    hideArrow();
    startReadyPhase();
  }, SEQ_LEN * BEAT_MS + BEAT_MS));
}

// ===== READY PHASE =====
function startReadyPhase() {
  state = 'ready';
  showScreen('ready');
  readyText.textContent = '本番！';
  timers.push(setTimeout(() => {
    if (state !== 'ready') return;
    runPlaying();
  }, BEAT_MS * 2));
}

// ===== PLAYING PHASE =====
let currentIdx = -1;
let expectedWall = 0; // wall time (performance.now) when current note is expected
let missTimer = null;
let playWallStart = 0;

function runPlaying() {
  state = 'playing';
  showScreen('game');
  phaseLabel.textContent = '🔥 本番！';
  phaseLabel.className = 'phase-label playing';
  buildDots();
  hideArrow();
  judgEl.style.opacity = '0';
  currentIdx = -1;

  const wallStart = performance.now();
  playWallStart = wallStart;
  startBGM(0);
  startBeatVisual(wallStart);

  scheduleNext(0, wallStart);
}

function scheduleNext(idx, wallStart) {
  if (idx >= SEQ_LEN) return;
  const delay = idx * BEAT_MS;

  timers.push(setTimeout(() => {
    if (state !== 'playing') return;
    currentIdx = idx;
    expectedWall = wallStart + delay;
    setDot(idx, 'current');
    showArrowCenter(sequence[idx]);
    shakeArrow(sequence[idx]);

    // auto-miss if no input
    missTimer = setTimeout(() => {
      if (state !== 'playing' || currentIdx !== idx) return;
      addScore('MISS');
      setDot(idx, 'done');
      hideArrow();
      currentIdx = -1;
      advanceAfter(idx, wallStart);
    }, MISS_TIMEOUT);

  }, delay));
}

function advanceAfter(idx, wallStart) {
  scheduleNext(idx + 1, wallStart);
  if (idx + 1 >= SEQ_LEN) {
    timers.push(setTimeout(() => {
      if (state !== 'playing') return;
      endGame();
    }, BEAT_MS + 300));
  }
}

function handleInput(dir) {
  if (state !== 'playing' || currentIdx < 0) return;
  const idx = currentIdx;
  const diff = Math.abs(performance.now() - expectedWall);

  if (missTimer) { clearTimeout(missTimer); missTimer = null; }
  currentIdx = -1;
  setDot(idx, 'done');
  hideArrow();

  if (sequence[idx] !== dir) {
    addScore('MISS');
  } else if (diff <= HIT_WINDOW_PERFECT) {
    addScore('PERFECT');
  } else if (diff <= HIT_WINDOW_OK) {
    addScore('OK');
  } else {
    addScore('MISS');
  }

  advanceAfter(idx, playWallStart);
}

// ===== END =====
function endGame() {
  if (state === 'result') return;
  state = 'result';
  stopBGM();
  stopBeatVisual();
  clearTimers();
  hideArrow();

  const total = cntPerfect + cntOk + cntMiss;
  const pRate = total > 0 ? cntPerfect / total : 0;

  let emoji, rank, speech;
  if (pRate >= 0.8)      { emoji = '🍙✨'; rank = '神おにぎり ★★★'; speech = 'さいっっっきょうだよ！！\nシェアして自慢して！✨'; }
  else if (pRate >= 0.5) { emoji = '🍙';   rank = 'うまいおにぎり ★★'; speech = 'うまい！センスあるじゃん！\nもう一回どう？'; }
  else if (pRate >= 0.3) { emoji = '🍙';   rank = 'ふつうおにぎり ★'; speech = 'まあまあかな〜。\n練習あるのみ！'; }
  else                   { emoji = '😢';   rank = 'ぐちゃおにぎり'; speech = '…ぐちゃぐちゃやん。\nでも食べるよ？😂'; }

  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-rank').textContent = rank;
  document.getElementById('result-score-big').textContent = score;
  document.getElementById('stat-perfect').textContent = cntPerfect;
  document.getElementById('stat-ok').textContent = cntOk;
  document.getElementById('stat-miss').textContent = cntMiss;
  document.getElementById('result-speech').textContent = speech;

  showScreen('result');
}

// ===== START =====
function startGame() {
  score = 0; combo = 0; cntPerfect = 0; cntOk = 0; cntMiss = 0;
  sequence = buildSequence();
  clearTimers();
  stopBGM();
  stopBeatVisual();
  if (missTimer) { clearTimeout(missTimer); missTimer = null; }
  currentIdx = -1;
  runPreview();
}

// ===== INPUT =====
let touchX0 = 0, touchY0 = 0;

function onTouchStart(e) {
  const t = e.changedTouches ? e.changedTouches[0] : e;
  touchX0 = t.clientX;
  touchY0 = t.clientY;
}

function onTouchEnd(e) {
  const t = e.changedTouches ? e.changedTouches[0] : e;
  const dx = t.clientX - touchX0;
  const dy = t.clientY - touchY0;
  const absDx = Math.abs(dx), absDy = Math.abs(dy);
  const dist = Math.sqrt(dx*dx + dy*dy);
  if (dist < 30) return; // too small

  let dir;
  if (absDx >= absDy) {
    dir = dx > 0 ? '→' : '←';
  } else {
    dir = dy > 0 ? '↓' : '↑';
  }
  handleInput(dir);
}

document.addEventListener('touchstart', onTouchStart, { passive: true });
document.addEventListener('touchend', onTouchEnd, { passive: true });
document.addEventListener('mousedown', onTouchStart);
document.addEventListener('mouseup', onTouchEnd);

document.getElementById('btn-start').addEventListener('click', () => { resumeAC(); startGame(); });
document.getElementById('btn-retry').addEventListener('click', () => { resumeAC(); startGame(); });
document.getElementById('btn-share').addEventListener('click', () => {
  const pRate = (cntPerfect + cntOk + cntMiss) > 0 ? Math.round(cntPerfect / (cntPerfect + cntOk + cntMiss) * 100) : 0;
  const text = `🍙 にぎにぎリズム！\n${document.getElementById('result-rank').textContent}\nスコア: ${score}pt  PERFECT率: ${pRate}%\n#にぎにぎリズム`;
  if (navigator.share) { navigator.share({ text }); }
  else { navigator.clipboard.writeText(text).then(() => alert('コピーしました！')); }
});

// ===== RECORD MODE =====
const isRecord = location.search.includes('record=1');
if (isRecord) {
  window._recordCtrl = {
    start: () => { resumeAC(); startGame(); },
    stop: () => ({ score, combo, cntPerfect, cntOk, cntMiss, state }),
  };
}

// ===== RESIZE =====
function resize() {
  const s = Math.min(window.innerWidth / 390, window.innerHeight / 844);
  document.body.style.transform = `scale(${s})`;
  document.body.style.transformOrigin = 'top left';
  document.body.style.left = ((window.innerWidth - 390 * s) / 2) + 'px';
  document.body.style.position = 'absolute';
  document.body.style.top = ((window.innerHeight - 844 * s) / 2) + 'px';
}
resize();
window.addEventListener('resize', resize);

})();
</script>
