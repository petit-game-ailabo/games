<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>にぎにぎリズム！</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a0a2e;
    color: #fff;
    font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    width: 390px;
    height: 844px;
    overflow: hidden;
    position: relative;
    margin: 0 auto;
    user-select: none;
    -webkit-user-select: none;
  }

  .screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .screen.hidden { display: none; }

  /* ===== TITLE ===== */
  #screen-title {
    background: linear-gradient(160deg, #1a0a2e 0%, #2d1060 100%);
  }
  .title-logo {
    font-size: 42px;
    font-weight: 900;
    text-align: center;
    line-height: 1.2;
    text-shadow: 0 0 20px #ff88cc, 0 0 40px #ff44aa;
    margin-bottom: 8px;
  }
  .title-sub {
    font-size: 16px;
    color: #cc88ff;
    margin-bottom: 32px;
  }
  .legend {
    background: rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 20px 28px;
    margin-bottom: 32px;
    width: 100%;
    max-width: 320px;
  }
  .legend-title {
    font-size: 13px;
    color: #aaa;
    text-align: center;
    margin-bottom: 14px;
    letter-spacing: 1px;
  }
  .legend-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    font-size: 18px;
  }
  .legend-row:last-child { border-bottom: none; }
  .legend-emoji { font-size: 28px; width: 36px; text-align: center; }
  .legend-name { flex: 1; font-size: 15px; font-weight: 700; }
  .legend-dir { font-size: 24px; }

  .btn-start {
    background: linear-gradient(135deg, #ff44aa, #aa22ff);
    border: none;
    border-radius: 50px;
    padding: 18px 60px;
    font-size: 22px;
    font-weight: 900;
    color: #fff;
    cursor: pointer;
    box-shadow: 0 4px 30px rgba(255,68,170,0.5);
    letter-spacing: 2px;
  }
  .btn-start:active { transform: scale(0.96); }

  /* ===== GAME SCREEN ===== */
  #screen-game {
    background: #1a0a2e;
    flex-direction: column;
    justify-content: flex-start;
    padding: 0;
  }

  .game-header {
    width: 100%;
    padding: 20px 24px 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: relative;
    z-index: 10;
  }
  .score-display {
    font-size: 28px;
    font-weight: 900;
    color: #fff;
    text-shadow: 0 0 10px #ff88cc;
  }
  .score-label { font-size: 11px; color: #888; display: block; }
  .combo-display {
    font-size: 22px;
    font-weight: 900;
    color: #ffdd44;
    text-align: right;
  }
  .combo-label { font-size: 11px; color: #888; display: block; }

  .phase-banner {
    width: 100%;
    text-align: center;
    padding: 6px 0 2px;
    font-size: 20px;
    font-weight: 900;
    letter-spacing: 2px;
    position: relative;
    z-index: 10;
  }
  .phase-banner.preview { color: #44ddff; text-shadow: 0 0 14px #44ddff; }
  .phase-banner.playing { color: #ffaa22; text-shadow: 0 0 14px #ffaa22; }

  .progress-row {
    width: 100%;
    padding: 8px 24px;
    display: flex;
    gap: 6px;
    justify-content: center;
    position: relative;
    z-index: 10;
  }
  .progress-dot {
    width: 24px;
    height: 8px;
    border-radius: 4px;
    background: rgba(255,255,255,0.15);
    transition: background 0.2s;
  }
  .progress-dot.done { background: #ff44aa; }
  .progress-dot.current { background: #fff; }

  /* ===== CENTER STAGE ===== */
  .center-stage {
    flex: 1;
    width: 100%;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Direction arrows hint */
  .dir-hints {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }
  .dir-hint {
    position: absolute;
    font-size: 36px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .dir-hint.up    { top: 30px;  left: 50%; transform: translateX(-50%); }
  .dir-hint.down  { bottom: 30px; left: 50%; transform: translateX(-50%); }
  .dir-hint.left  { left: 20px; top: 50%; transform: translateY(-50%); }
  .dir-hint.right { right: 20px; top: 50%; transform: translateY(-50%); }
  .dir-hints.show .dir-hint { opacity: 0.18; }

  /* The ingredient element */
  #ingredient-el {
    position: absolute;
    font-size: 80px;
    text-align: center;
    line-height: 1;
    pointer-events: none;
    will-change: transform, opacity;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
  }

  /* judgment text */
  #judgment-el {
    position: absolute;
    bottom: 60px;
    left: 0; right: 0;
    text-align: center;
    font-size: 44px;
    font-weight: 900;
    pointer-events: none;
    opacity: 0;
  }
  #judgment-el.perfect { color: #ffdd00; text-shadow: 0 0 20px #ffaa00; }
  #judgment-el.ok      { color: #44ffaa; text-shadow: 0 0 16px #22cc88; }
  #judgment-el.miss    { color: #ff4444; text-shadow: 0 0 16px #cc2222; }

  /* ===== RESULT ===== */
  #screen-result {
    background: linear-gradient(160deg, #1a0a2e 0%, #2d1060 100%);
  }
  .result-char {
    font-size: 80px;
    margin-bottom: 8px;
    animation: bounce 0.8s ease infinite alternate;
  }
  @keyframes bounce {
    from { transform: translateY(0); }
    to   { transform: translateY(-12px); }
  }
  .result-rank {
    font-size: 28px;
    font-weight: 900;
    margin-bottom: 6px;
    text-shadow: 0 0 16px currentColor;
  }
  .result-stars { font-size: 32px; margin-bottom: 12px; }
  .result-score-big {
    font-size: 52px;
    font-weight: 900;
    color: #ffdd44;
    text-shadow: 0 0 20px #ffaa00;
    margin-bottom: 4px;
  }
  .result-score-label { font-size: 13px; color: #aaa; margin-bottom: 16px; }
  .result-stats {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
  }
  .stat-box {
    text-align: center;
    background: rgba(255,255,255,0.07);
    border-radius: 12px;
    padding: 10px 18px;
  }
  .stat-val { font-size: 24px; font-weight: 900; }
  .stat-lbl { font-size: 11px; color: #aaa; }
  .result-speech {
    background: rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 16px 20px;
    font-size: 16px;
    font-weight: 700;
    line-height: 1.6;
    margin-bottom: 24px;
    text-align: center;
    max-width: 320px;
    white-space: pre-line;
  }
  .result-speech::before {
    content: '💬';
    font-size: 20px;
    display: block;
    margin-bottom: 6px;
  }
  .btn-retry, .btn-share {
    border: none;
    border-radius: 50px;
    padding: 14px 40px;
    font-size: 18px;
    font-weight: 900;
    cursor: pointer;
    margin: 6px;
  }
  .btn-retry {
    background: linear-gradient(135deg, #ff44aa, #aa22ff);
    color: #fff;
    box-shadow: 0 4px 20px rgba(255,68,170,0.4);
  }
  .btn-share {
    background: rgba(255,255,255,0.1);
    color: #fff;
    border: 2px solid rgba(255,255,255,0.2);
  }
  .btn-retry:active, .btn-share:active { transform: scale(0.96); }

  /* ready countdown */
  #screen-ready {
    background: #1a0a2e;
  }
  .ready-text {
    font-size: 36px;
    font-weight: 900;
    text-align: center;
    line-height: 1.6;
    white-space: pre-line;
    animation: rpulse 0.5s ease infinite alternate;
  }
  @keyframes rpulse {
    from { transform: scale(1); opacity: 1; }
    to   { transform: scale(1.06); opacity: 0.8; }
  }
  @keyframes wiggle {
    from { transform: translate(-50%, -50%) scale(1) rotate(-4deg); }
    to   { transform: translate(-50%, -50%) scale(1.06) rotate(4deg); }
  }
  @keyframes judgment-pop {
    0%   { opacity: 1; transform: scale(1.3); }
    60%  { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(0.9); }
  }
</style>
</head>
<body>

<!-- TITLE -->
<div id="screen-title" class="screen">
  <div class="title-logo">🍙<br>にぎにぎリズム！</div>
  <div class="title-sub">BGMに合わせてスワイプ！</div>
  <div class="legend">
    <div class="legend-title">具材とスワイプ方向</div>
    <div class="legend-row">
      <span class="legend-emoji">🐟</span>
      <span class="legend-name">鮭（さけ）</span>
      <span class="legend-dir">➡️ 右</span>
    </div>
    <div class="legend-row">
      <span class="legend-emoji">🖤</span>
      <span class="legend-name">おかか</span>
      <span class="legend-dir">⬅️ 左</span>
    </div>
    <div class="legend-row">
      <span class="legend-emoji">🔴</span>
      <span class="legend-name">梅（うめ）</span>
      <span class="legend-dir">⬆️ 上</span>
    </div>
    <div class="legend-row">
      <span class="legend-emoji">🟤</span>
      <span class="legend-name">昆布（こんぶ）</span>
      <span class="legend-dir">⬇️ 下</span>
    </div>
  </div>
  <button class="btn-start" id="btn-start">スタート！</button>
</div>

<!-- READY -->
<div id="screen-ready" class="screen hidden">
  <div class="ready-text" id="ready-text">本番！&#10;いくよ！</div>
</div>

<!-- GAME -->
<div id="screen-game" class="screen hidden">
  <div class="game-header">
    <div>
      <span class="score-label">スコア</span>
      <span class="score-display" id="score-el">0</span>
    </div>
    <div style="text-align:right">
      <span class="combo-label">コンボ</span>
      <span class="combo-display" id="combo-el">0</span>
    </div>
  </div>
  <div class="phase-banner" id="phase-banner"></div>
  <div class="progress-row" id="progress-row"></div>

  <div class="center-stage" id="center-stage">
    <div class="dir-hints" id="dir-hints">
      <div class="dir-hint up">⬆️</div>
      <div class="dir-hint down">⬇️</div>
      <div class="dir-hint left">⬅️</div>
      <div class="dir-hint right">➡️</div>
    </div>
    <div id="ingredient-el"></div>
    <div id="judgment-el"></div>
  </div>
</div>

<!-- RESULT -->
<div id="screen-result" class="screen hidden">
  <div class="result-char" id="result-char">🍙</div>
  <div class="result-rank" id="result-rank"></div>
  <div class="result-stars" id="result-stars"></div>
  <div class="result-score-big" id="result-score-big">0</div>
  <div class="result-score-label">点</div>
  <div class="result-stats">
    <div class="stat-box">
      <div class="stat-val" id="stat-perfect">0</div>
      <div class="stat-lbl">PERFECT</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" id="stat-ok">0</div>
      <div class="stat-lbl">OK</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" id="stat-miss">0</div>
      <div class="stat-lbl">MISS</div>
    </div>
  </div>
  <div class="result-speech" id="result-speech"></div>
  <div>
    <button class="btn-retry" id="btn-retry">もう一回！</button>
    <button class="btn-share" id="btn-share">シェア 📢</button>
  </div>
</div>

<script>
(function () {
  'use strict';

  // ===== STATE =====
  // 'title' | 'preview' | 'ready' | 'playing' | 'result'
  let state = 'title';
  function setState(s) { state = s; }

  // ===== INGREDIENTS =====
  const INGREDIENTS = [
    { emoji: '🐟', name: '鮭',   dir: 'right' },
    { emoji: '🖤', name: 'おかか', dir: 'left'  },
    { emoji: '🔴', name: '梅',   dir: 'up'    },
    { emoji: '🟤', name: '昆布', dir: 'down'  },
  ];
  const SEQUENCE_LEN = 8;
  const BPM = 120;
  const BEAT_MS = 60000 / BPM; // 500ms

  // ===== GAME DATA =====
  let sequence = [];
  let score = 0;
  let combo = 0;
  let perfects = 0;
  let oks = 0;
  let misses = 0;
  let currentIdx = 0;
  let inputEnabled = false;
  let judged = false;
  let missTimer = null;
  let noteAppearTime = 0;

  // ===== AUDIO =====
  let audioCtx = null;
  let bgmInterval = null;
  let nextBeatAcTime = 0;
  let beatCount = 0;

  function getAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }

  function playKick(t) {
    const ac = getAudio();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.frequency.setValueAtTime(150, t);
    osc.frequency.exponentialRampToValueAtTime(40, t + 0.15);
    gain.gain.setValueAtTime(1.0, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
    osc.start(t); osc.stop(t + 0.2);
  }

  function playSnare(t) {
    const ac = getAudio();
    const len = Math.floor(ac.sampleRate * 0.15);
    const buf = ac.createBuffer(1, len, ac.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < len; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ac.sampleRate * 0.04));
    }
    const src = ac.createBufferSource();
    const gain = ac.createGain();
    src.buffer = buf;
    src.connect(gain); gain.connect(ac.destination);
    gain.gain.setValueAtTime(0.45, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
    src.start(t); src.stop(t + 0.15);
  }

  function playHihat(t) {
    const ac = getAudio();
    const len = Math.floor(ac.sampleRate * 0.05);
    const buf = ac.createBuffer(1, len, ac.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < len; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ac.sampleRate * 0.01));
    }
    const src = ac.createBufferSource();
    const filt = ac.createBiquadFilter();
    const gain = ac.createGain();
    filt.type = 'highpass'; filt.frequency.value = 8000;
    src.buffer = buf;
    src.connect(filt); filt.connect(gain); gain.connect(ac.destination);
    gain.gain.setValueAtTime(0.2, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
    src.start(t); src.stop(t + 0.05);
  }

  const MELODY = [523.25, 587.33, 659.25, 783.99, 880, 783.99, 659.25, 587.33];

  function playMelody(t, freq) {
    const ac = getAudio();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(freq, t);
    gain.gain.setValueAtTime(0.15, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.38);
    osc.connect(gain); gain.connect(ac.destination);
    osc.start(t); osc.stop(t + 0.38);
  }

  function scheduleBeat(acTime, n) {
    const beat = n % 4;
    if (beat === 0 || beat === 2) playKick(acTime);
    if (beat === 1 || beat === 3) playSnare(acTime);
    playHihat(acTime);
    playMelody(acTime, MELODY[n % MELODY.length]);
  }

  function startBGM() {
    stopBGM();
    const ac = getAudio();
    nextBeatAcTime = ac.currentTime + 0.05;
    beatCount = 0;

    function pump() {
      const ac = getAudio();
      while (nextBeatAcTime < ac.currentTime + 0.12) {
        scheduleBeat(nextBeatAcTime, beatCount);
        nextBeatAcTime += BEAT_MS / 1000;
        beatCount++;
      }
    }
    pump();
    bgmInterval = setInterval(pump, 25);
  }

  function stopBGM() {
    if (bgmInterval) { clearInterval(bgmInterval); bgmInterval = null; }
  }

  // ===== GENERATE SEQUENCE =====
  function generateSequence() {
    const seq = [];
    for (let i = 0; i < SEQUENCE_LEN; i++) {
      let pool = INGREDIENTS.slice();
      if (i > 0) pool = pool.filter(p => p !== seq[i - 1]);
      seq.push(pool[Math.floor(Math.random() * pool.length)]);
    }
    return seq;
  }

  // ===== DOM =====
  const screenTitle  = document.getElementById('screen-title');
  const screenReady  = document.getElementById('screen-ready');
  const screenGame   = document.getElementById('screen-game');
  const screenResult = document.getElementById('screen-result');
  const ingEl        = document.getElementById('ingredient-el');
  const judgEl       = document.getElementById('judgment-el');
  const scoreEl      = document.getElementById('score-el');
  const comboEl      = document.getElementById('combo-el');
  const phaseBanner  = document.getElementById('phase-banner');
  const progressRow  = document.getElementById('progress-row');
  const dirHints     = document.getElementById('dir-hints');

  function showScreen(name) {
    [screenTitle, screenReady, screenGame, screenResult].forEach(s => s.classList.add('hidden'));
    const map = { title: screenTitle, ready: screenReady, game: screenGame, result: screenResult };
    map[name].classList.remove('hidden');
  }

  // ===== PROGRESS =====
  function buildProgress() {
    progressRow.innerHTML = '';
    for (let i = 0; i < SEQUENCE_LEN; i++) {
      const d = document.createElement('div');
      d.className = 'progress-dot';
      d.id = 'pdot-' + i;
      progressRow.appendChild(d);
    }
  }

  function updateProgress(idx) {
    for (let i = 0; i < SEQUENCE_LEN; i++) {
      const d = document.getElementById('pdot-' + i);
      if (!d) continue;
      d.className = 'progress-dot' + (i < idx ? ' done' : i === idx ? ' current' : '');
    }
  }

  // ===== INGREDIENT ANIMATIONS =====
  function placeCenter() {
    ingEl.style.transition = 'none';
    ingEl.style.transform = 'translate(-50%, -50%) scale(1)';
    ingEl.style.opacity = '1';
    ingEl.style.left = '50%';
    ingEl.style.top = '50%';
  }

  function slideOut(dir) {
    const dist = 180;
    let tx = 0, ty = 0;
    if (dir === 'right') tx =  dist;
    if (dir === 'left')  tx = -dist;
    if (dir === 'up')    ty = -dist;
    if (dir === 'down')  ty =  dist;
    ingEl.style.transition = 'transform 0.32s cubic-bezier(0.4,0,0.2,1), opacity 0.32s';
    ingEl.style.transform = `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) scale(0.4)`;
    ingEl.style.opacity = '0';
  }

  function startWobble() {
    ingEl.style.animation = 'none';
    void ingEl.offsetWidth;
    ingEl.style.animation = 'wiggle 0.38s ease infinite alternate';
  }

  function stopWobble() {
    ingEl.style.animation = 'none';
  }

  // ===== JUDGMENT =====
  let judgTimer = null;
  function showJudgment(type) {
    if (judgTimer) clearTimeout(judgTimer);
    const texts = { perfect: 'PERFECT！', ok: 'OK！', miss: 'MISS...' };
    judgEl.className = '';
    void judgEl.offsetWidth;
    judgEl.textContent = texts[type];
    judgEl.className = type;
    judgEl.style.opacity = '1';
    judgEl.style.animation = 'none';
    void judgEl.offsetWidth;
    judgEl.style.animation = 'judgment-pop 0.7s ease forwards';
    judgTimer = setTimeout(() => {
      judgEl.style.animation = 'none';
      judgEl.style.opacity = '0';
    }, 720);
  }

  // ===== SCORE =====
  function addScore(type) {
    if (type === 'perfect') {
      const mult = Math.min(1 + Math.floor(combo / 4) * 0.5, 3);
      score += Math.round(100 * mult);
      combo++;
      perfects++;
    } else if (type === 'ok') {
      score += 50;
      combo++;
      oks++;
    } else {
      combo = 0;
      misses++;
    }
    scoreEl.textContent = score;
    comboEl.textContent = combo > 1 ? combo + 'x' : combo;
  }

  // ===== PREVIEW PHASE =====
  let previewTimers = [];

  function clearPreviewTimers() {
    previewTimers.forEach(t => clearTimeout(t));
    previewTimers = [];
  }

  function runPreview() {
    setState('preview');
    showScreen('game');
    phaseBanner.textContent = '👀 お手本！';
    phaseBanner.className = 'phase-banner preview';
    dirHints.classList.remove('show');
    buildProgress();
    ingEl.textContent = '';
    ingEl.style.opacity = '0';
    ingEl.style.animation = 'none';
    judgEl.style.opacity = '0';
    judgEl.style.animation = 'none';

    startBGM();

    for (let i = 0; i < SEQUENCE_LEN; i++) {
      const ing = sequence[i];
      const delay = i * BEAT_MS;

      // Show ingredient
      previewTimers.push(setTimeout(() => {
        if (state !== 'preview') return;
        updateProgress(i);
        ingEl.style.animation = 'none';
        ingEl.textContent = ing.emoji;
        placeCenter();
      }, delay));

      // Slide out at 55% of beat
      previewTimers.push(setTimeout(() => {
        if (state !== 'preview') return;
        slideOut(ing.dir);
      }, delay + Math.round(BEAT_MS * 0.55)));
    }

    // End of preview
    previewTimers.push(setTimeout(() => {
      if (state !== 'preview') return;
      stopBGM();
      ingEl.style.opacity = '0';
      ingEl.style.animation = 'none';
      startReadyPhase();
    }, SEQUENCE_LEN * BEAT_MS + BEAT_MS));
  }

  // ===== READY PHASE =====
  function startReadyPhase() {
    setState('ready');
    showScreen('ready');
    setTimeout(() => {
      if (state !== 'ready') return;
      runPlaying();
    }, BEAT_MS * 2);
  }

  // ===== PLAYING PHASE =====
  let noteTimers = [];

  function clearNoteTimers() {
    noteTimers.forEach(t => clearTimeout(t));
    noteTimers = [];
    if (missTimer) { clearTimeout(missTimer); missTimer = null; }
  }

  function runPlaying() {
    setState('playing');
    showScreen('game');
    phaseBanner.textContent = '🎵 本番！';
    phaseBanner.className = 'phase-banner playing';
    dirHints.classList.add('show');
    buildProgress();
    ingEl.textContent = '';
    ingEl.style.opacity = '0';
    ingEl.style.animation = 'none';
    judgEl.style.opacity = '0';
    judgEl.style.animation = 'none';
    currentIdx = 0;
    inputEnabled = false;
    judged = false;

    startBGM();

    for (let i = 0; i < SEQUENCE_LEN; i++) {
      const delay = i * BEAT_MS;
      noteTimers.push(setTimeout(() => {
        if (state !== 'playing') return;
        presentNote(i);
      }, delay));
    }

    // After all notes + buffer → show result
    noteTimers.push(setTimeout(() => {
      if (state !== 'playing') return;
      stopBGM();
      showResult();
    }, SEQUENCE_LEN * BEAT_MS + BEAT_MS));
  }

  function presentNote(i) {
    // Resolve any previous unjudged note as miss
    if (i > 0 && !judged) {
      judged = true;
      inputEnabled = false;
      if (missTimer) { clearTimeout(missTimer); missTimer = null; }
      stopWobble();
      showJudgment('miss');
      addScore('miss');
    }

    currentIdx = i;
    judged = false;
    inputEnabled = true;
    updateProgress(i);

    const ing = sequence[i];
    ingEl.style.animation = 'none';
    ingEl.textContent = ing.emoji;
    placeCenter();
    startWobble();
    noteAppearTime = performance.now();

    // Auto-MISS timeout: BEAT_MS + 300ms from note appear
    if (missTimer) clearTimeout(missTimer);
    missTimer = setTimeout(() => {
      if (state !== 'playing' || judged || currentIdx !== i) return;
      judged = true;
      inputEnabled = false;
      stopWobble();
      showJudgment('miss');
      addScore('miss');
      ingEl.style.transition = 'opacity 0.15s';
      ingEl.style.opacity = '0';
    }, BEAT_MS + 300);
  }

  // ===== SWIPE HANDLING =====
  let touchStartX = 0, touchStartY = 0;
  let mouseStartX = 0, mouseStartY = 0;
  let mouseDown = false;

  document.addEventListener('touchstart', (e) => {
    touchStartX = e.changedTouches[0].clientX;
    touchStartY = e.changedTouches[0].clientY;
  }, { passive: true });

  document.addEventListener('touchend', (e) => {
    if (state !== 'playing' || !inputEnabled || judged) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 40) return;
    let dir;
    if (Math.abs(dx) >= Math.abs(dy)) {
      dir = dx > 0 ? 'right' : 'left';
    } else {
      dir = dy > 0 ? 'down' : 'up';
    }
    handleSwipe(dir);
  }, { passive: true });

  document.addEventListener('mousedown', (e) => {
    mouseDown = true;
    mouseStartX = e.clientX;
    mouseStartY = e.clientY;
  });
  document.addEventListener('mouseup', (e) => {
    if (!mouseDown) return;
    mouseDown = false;
    if (state !== 'playing' || !inputEnabled || judged) return;
    const dx = e.clientX - mouseStartX;
    const dy = e.clientY - mouseStartY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 40) return;
    let dir;
    if (Math.abs(dx) >= Math.abs(dy)) {
      dir = dx > 0 ? 'right' : 'left';
    } else {
      dir = dy > 0 ? 'down' : 'up';
    }
    handleSwipe(dir);
  });

  function handleSwipe(dir) {
    if (!inputEnabled || judged) return;
    judged = true;
    inputEnabled = false;
    if (missTimer) { clearTimeout(missTimer); missTimer = null; }

    const ing = sequence[currentIdx];
    const elapsed = performance.now() - noteAppearTime;

    let judgeType;
    if (dir !== ing.dir) {
      judgeType = 'miss';
    } else if (elapsed <= 200) {
      judgeType = 'perfect';
    } else if (elapsed <= 400) {
      judgeType = 'ok';
    } else {
      judgeType = 'miss';
    }

    stopWobble();
    showJudgment(judgeType);
    addScore(judgeType);

    if (judgeType !== 'miss') {
      slideOut(ing.dir);
    } else {
      ingEl.style.transition = 'opacity 0.15s';
      ingEl.style.opacity = '0';
    }
  }

  // ===== RESULT =====
  function showResult() {
    setState('result');
    stopBGM();
    clearNoteTimers();
    clearPreviewTimers();

    const total = perfects + oks + misses;
    const rate = total > 0 ? perfects / total : 0;

    let rank, stars, char, speech;
    if (rate >= 0.8) {
      rank = '神おにぎり'; stars = '★★★'; char = '✨🍙✨';
      speech = 'さいっっっきょうだよ！！\nシェアして自慢して！✨';
    } else if (rate >= 0.5) {
      rank = 'うまいおにぎり'; stars = '★★'; char = '😄🍙';
      speech = 'うまい！センスあるじゃん！\nもう一回どう？';
    } else if (rate >= 0.3) {
      rank = 'ふつうおにぎり'; stars = '★'; char = '🙂🍙';
      speech = 'まあまあかな〜。\n練習あるのみ！';
    } else {
      rank = 'ぐちゃおにぎり'; stars = ''; char = '😅🍙';
      speech = '…ぐちゃぐちゃやん。\nでも食べるよ？😂';
    }

    document.getElementById('result-char').textContent = char;
    document.getElementById('result-rank').textContent = rank;
    document.getElementById('result-stars').textContent = stars;
    document.getElementById('result-score-big').textContent = score;
    document.getElementById('stat-perfect').textContent = perfects;
    document.getElementById('stat-ok').textContent = oks;
    document.getElementById('stat-miss').textContent = misses;
    document.getElementById('result-speech').textContent = speech;

    showScreen('result');
  }

  // ===== SHARE =====
  document.getElementById('btn-share').addEventListener('click', () => {
    const total = perfects + oks + misses;
    const rate = total > 0 ? Math.round(perfects / total * 100) : 0;
    const text = `🍙にぎにぎリズム！\n${score}点 / PERFECT率${rate}%\n#にぎにぎリズム`;
    if (navigator.share) {
      navigator.share({ text }).catch(() => {});
    } else if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(() => {
        alert('クリップボードにコピーしました！');
      }).catch(() => alert(text));
    } else {
      alert(text);
    }
  });

  // ===== START / RETRY =====
  function initGame() {
    sequence = generateSequence();
    score = 0; combo = 0; perfects = 0; oks = 0; misses = 0;
    currentIdx = 0; inputEnabled = false; judged = false;
    scoreEl.textContent = '0';
    comboEl.textContent = '0';
    clearPreviewTimers();
    clearNoteTimers();
    stopBGM();
    runPreview();
  }

  document.getElementById('btn-start').addEventListener('click', () => {
    getAudio();
    initGame();
  });
  document.getElementById('btn-retry').addEventListener('click', () => {
    getAudio();
    initGame();
  });

  // ===== RECORD CTRL (?record=1) =====
  if (new URLSearchParams(location.search).get('record') === '1') {
    window._recordCtrl = {
      start: () => { getAudio(); initGame(); },
      stop:  () => { stopBGM(); setState('result'); showResult(); },
    };
  }

  // ===== INIT =====
  showScreen('title');

}());
</script>
</body>
</html>
