<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>⛳ ゴルフスコア管理</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f7f0; color: #2d3436; min-height: 100vh; }
.header { background: linear-gradient(135deg, #2d6a4f, #40916c); color: white; padding: 16px; text-align: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
.header h1 { font-size: 1.3em; }
.header .subtitle { font-size: 0.8em; opacity: 0.8; margin-top: 4px; }
.nav { display: flex; justify-content: center; gap: 8px; padding: 12px; background: #e8f5e9; }
.nav button { padding: 8px 20px; border: 2px solid #2d6a4f; background: white; color: #2d6a4f; border-radius: 20px; font-size: 0.9em; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.nav button.active { background: #2d6a4f; color: white; }
.container { max-width: 500px; margin: 0 auto; padding: 12px; }
.card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.card h2 { font-size: 1em; color: #2d6a4f; margin-bottom: 12px; }
.input-group { margin-bottom: 12px; }
.input-group label { display: block; font-size: 0.8em; color: #666; margin-bottom: 4px; }
.input-group input, .input-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 1em; }
.score-summary { display: flex; justify-content: space-around; text-align: center; padding: 12px 0; }
.score-summary .item { }
.score-summary .value { font-size: 1.8em; font-weight: 700; color: #2d6a4f; }
.score-summary .label { font-size: 0.75em; color: #888; }
.score-diff { font-size: 1.2em; font-weight: 700; }
.score-diff.over { color: #e74c3c; }
.score-diff.under { color: #2980b9; }
.score-diff.even { color: #2d6a4f; }
.hole-table { width: 100%; }
.hole-row { display: flex; align-items: center; padding: 8px 0; border-bottom: 1px solid #f0f0f0; }
.hole-row:last-child { border-bottom: none; }
.hole-num { width: 40px; font-weight: 700; color: #2d6a4f; font-size: 0.9em; }
.hole-par { width: 50px; font-size: 0.8em; color: #888; text-align: center; }
.hole-controls { display: flex; align-items: center; gap: 8px; margin-left: auto; }
.hole-controls button { width: 36px; height: 36px; border-radius: 50%; border: none; font-size: 1.2em; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.btn-minus { background: #ffebee; color: #e74c3c; }
.btn-plus { background: #e8f5e9; color: #2d6a4f; }
.btn-minus:active { background: #e74c3c; color: white; }
.btn-plus:active { background: #2d6a4f; color: white; }
.hole-score { width: 36px; text-align: center; font-size: 1.1em; font-weight: 700; }
.hole-score.birdie { color: #2980b9; }
.hole-score.bogey { color: #e74c3c; }
.hole-score.eagle { color: #8e44ad; }
.hole-score.par-score { color: #2d6a4f; }
.half-label { background: #2d6a4f; color: white; padding: 6px 12px; border-radius: 8px; font-size: 0.85em; font-weight: 600; margin: 8px 0; text-align: center; }
.half-subtotal { display: flex; justify-content: space-between; padding: 8px 12px; background: #f8fdf8; border-radius: 8px; margin: 4px 0 12px; font-weight: 600; font-size: 0.9em; }
.btn-save { width: 100%; padding: 14px; background: linear-gradient(135deg, #2d6a4f, #40916c); color: white; border: none; border-radius: 12px; font-size: 1em; font-weight: 700; cursor: pointer; margin-top: 8px; transition: opacity 0.2s; }
.btn-save:active { opacity: 0.8; }
.btn-save:disabled { background: #ccc; }
.history-item { padding: 12px; border-bottom: 1px solid #f0f0f0; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: background 0.15s; }
.history-item:active { background: #f0f7f0; }
.history-item:last-child { border-bottom: none; }
.history-item .info { }
.history-item .course { font-weight: 600; font-size: 0.95em; }
.history-item .date { font-size: 0.8em; color: #888; margin-top: 2px; }
.history-item .total { font-size: 1.4em; font-weight: 700; color: #2d6a4f; }
.empty-state { text-align: center; padding: 40px 20px; color: #aaa; }
.empty-state .icon { font-size: 3em; margin-bottom: 12px; }
.modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 200; justify-content: center; align-items: center; }
.modal-overlay.show { display: flex; }
.modal { background: white; border-radius: 16px; padding: 20px; width: 90%; max-width: 450px; max-height: 80vh; overflow-y: auto; }
.modal h2 { color: #2d6a4f; margin-bottom: 16px; text-align: center; }
.modal-close { background: #f0f0f0; border: none; padding: 10px; width: 100%; border-radius: 8px; font-size: 0.9em; cursor: pointer; margin-top: 12px; }
.btn-delete { background: #ffebee; color: #e74c3c; border: none; padding: 8px 16px; border-radius: 8px; font-size: 0.8em; cursor: pointer; margin-top: 8px; }
.par-edit { display: flex; align-items: center; gap: 4px; }
.par-select { width: 55px; padding: 4px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.85em; text-align: center; }
.toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #2d6a4f; color: white; padding: 10px 24px; border-radius: 20px; font-size: 0.9em; z-index: 300; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
.toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="header">
  <h1>⛳ ゴルフスコア管理</h1>
  <div class="subtitle" id="headerSub">新しいラウンドを始めよう</div>
</div>

<div class="nav">
  <button class="active" onclick="showTab('score')">スコア入力</button>
  <button onclick="showTab('history')">履歴</button>
</div>

<div class="container" id="scoreTab">
  <div class="card">
    <h2>📋 ラウンド情報</h2>
    <div class="input-group">
      <label>コース名</label>
      <input type="text" id="courseName" placeholder="例: 東京ゴルフ倶楽部">
    </div>
    <div class="input-group">
      <label>日付</label>
      <input type="date" id="roundDate">
    </div>
  </div>

  <div class="card">
    <div class="score-summary">
      <div class="item">
        <div class="value" id="totalScore">0</div>
        <div class="label">トータル</div>
      </div>
      <div class="item">
        <div class="value" id="totalPar">72</div>
        <div class="label">パー</div>
      </div>
      <div class="item">
        <div class="score-diff even" id="scoreDiff">±0</div>
        <div class="label">パー比</div>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>🏌️ スコア入力 <span style="font-size:0.75em;color:#888;">（パーをタップで変更可）</span></h2>
    <div id="holeList"></div>
  </div>

  <button class="btn-save" id="saveBtn" onclick="saveRound()">💾 ラウンドを保存</button>
</div>

<div class="container" id="historyTab" style="display:none;">
  <div class="card">
    <h2>📊 ラウンド履歴</h2>
    <div id="historyList"></div>
  </div>
</div>

<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <h2 id="modalTitle">ラウンド詳細</h2>
    <div id="modalContent"></div>
    <button class="btn-delete" id="modalDelete" onclick="deleteRound()">🗑 このラウンドを削除</button>
    <button class="modal-close" onclick="closeModal()">閉じる</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const DEFAULT_PARS = [4,4,3,4,5,4,3,4,5, 4,4,3,4,5,4,3,4,5];
let pars = [...DEFAULT_PARS];
let scores = new Array(18).fill(0);
let currentDetailId = null;

function init() {
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('roundDate').value = today;
  renderHoles();
  updateSummary();
}

function renderHoles() {
  const list = document.getElementById('holeList');
  let html = '';
  for (let i = 0; i < 18; i++) {
    if (i === 0) html += '<div class="half-label">OUT（1〜9）</div>';
    if (i === 9) {
      const outScore = scores.slice(0,9).reduce((a,b)=>a+b,0);
      const outPar = pars.slice(0,9).reduce((a,b)=>a+b,0);
      html += `<div class="half-subtotal"><span>OUT合計</span><span>${outScore} / Par ${outPar}</span></div>`;
      html += '<div class="half-label">IN（10〜18）</div>';
    }
    const scoreClass = getScoreClass(scores[i], pars[i]);
    html += `<div class="hole-row">
      <div class="hole-num">${i+1}H</div>
      <div class="hole-par">
        <select class="par-select" onchange="changePar(${i}, this.value)">
          <option value="3" ${pars[i]===3?'selected':''}>P3</option>
          <option value="4" ${pars[i]===4?'selected':''}>P4</option>
          <option value="5" ${pars[i]===5?'selected':''}>P5</option>
        </select>
      </div>
      <div class="hole-controls">
        <button class="btn-minus" onclick="changeScore(${i},-1)">−</button>
        <div class="hole-score ${scoreClass}" id="score${i}">${scores[i] || '−'}</div>
        <button class="btn-plus" onclick="changeScore(${i},1)">＋</button>
      </div>
    </div>`;
  }
  const inScore = scores.slice(9,18).reduce((a,b)=>a+b,0);
  const inPar = pars.slice(9,18).reduce((a,b)=>a+b,0);
  html += `<div class="half-subtotal"><span>IN合計</span><span>${inScore} / Par ${inPar}</span></div>`;
  list.innerHTML = html;
}

function getScoreClass(score, par) {
  if (score === 0) return '';
  const diff = score - par;
  if (diff <= -2) return 'eagle';
  if (diff === -1) return 'birdie';
  if (diff === 0) return 'par-score';
  return 'bogey';
}

function changeScore(hole, delta) {
  scores[hole] = Math.max(0, scores[hole] + delta);
  renderHoles();
  updateSummary();
}

function changePar(hole, val) {
  pars[hole] = parseInt(val);
  renderHoles();
  updateSummary();
}

function updateSummary() {
  const total = scores.reduce((a,b) => a+b, 0);
  const parTotal = pars.reduce((a,b) => a+b, 0);
  const played = scores.filter(s => s > 0).length;
  const playedPar = scores.reduce((sum, s, i) => s > 0 ? sum + pars[i] : sum, 0);
  const diff = total - playedPar;

  document.getElementById('totalScore').textContent = total;
  document.getElementById('totalPar').textContent = parTotal;

  const diffEl = document.getElementById('scoreDiff');
  if (played === 0) {
    diffEl.textContent = '±0';
    diffEl.className = 'score-diff even';
  } else if (diff > 0) {
    diffEl.textContent = `+${diff}`;
    diffEl.className = 'score-diff over';
  } else if (diff < 0) {
    diffEl.textContent = `${diff}`;
    diffEl.className = 'score-diff under';
  } else {
    diffEl.textContent = 'E';
    diffEl.className = 'score-diff even';
  }

  const sub = played > 0 ? `${played}H消化 / スコア ${total}` : '新しいラウンドを始めよう';
  document.getElementById('headerSub').textContent = sub;
}

function saveRound() {
  const course = document.getElementById('courseName').value || '名称未設定';
  const date = document.getElementById('roundDate').value;
  const total = scores.reduce((a,b) => a+b, 0);
  if (total === 0) { showToast('スコアを入力してください'); return; }

  const rounds = JSON.parse(localStorage.getItem('golfRounds') || '[]');
  rounds.unshift({
    id: Date.now(),
    course, date, scores: [...scores], pars: [...pars], total,
    outScore: scores.slice(0,9).reduce((a,b)=>a+b,0),
    inScore: scores.slice(9,18).reduce((a,b)=>a+b,0)
  });
  localStorage.setItem('golfRounds', JSON.stringify(rounds));

  showToast('✅ ラウンドを保存しました');
  scores = new Array(18).fill(0);
  pars = [...DEFAULT_PARS];
  document.getElementById('courseName').value = '';
  init();
}

function showTab(tab) {
  document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
  if (tab === 'score') {
    document.getElementById('scoreTab').style.display = '';
    document.getElementById('historyTab').style.display = 'none';
    document.querySelectorAll('.nav button')[0].classList.add('active');
  } else {
    document.getElementById('scoreTab').style.display = 'none';
    document.getElementById('historyTab').style.display = '';
    document.querySelectorAll('.nav button')[1].classList.add('active');
    renderHistory();
  }
}

function renderHistory() {
  const rounds = JSON.parse(localStorage.getItem('golfRounds') || '[]');
  const list = document.getElementById('historyList');
  if (rounds.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="icon">⛳</div><p>まだラウンド記録がありません</p></div>';
    return;
  }
  list.innerHTML = rounds.map(r => `
    <div class="history-item" onclick="showDetail(${r.id})">
      <div class="info">
        <div class="course">${r.course}</div>
        <div class="date">${r.date} ｜ OUT ${r.outScore} / IN ${r.inScore}</div>
      </div>
      <div class="total">${r.total}</div>
    </div>
  `).join('');
}

function showDetail(id) {
  const rounds = JSON.parse(localStorage.getItem('golfRounds') || '[]');
  const r = rounds.find(x => x.id === id);
  if (!r) return;
  currentDetailId = id;
  document.getElementById('modalTitle').textContent = r.course;

  const parTotal = r.pars.reduce((a,b)=>a+b,0);
  const diff = r.total - parTotal;
  const diffStr = diff > 0 ? `+${diff}` : diff === 0 ? 'E' : `${diff}`;

  let html = `<div style="text-align:center;margin-bottom:12px;">
    <div style="font-size:0.85em;color:#888;">${r.date}</div>
    <div style="font-size:2em;font-weight:700;color:#2d6a4f;">${r.total}</div>
    <div style="font-size:1em;color:#888;">Par ${parTotal}（${diffStr}）</div>
    <div style="font-size:0.85em;color:#888;margin-top:4px;">OUT ${r.outScore} / IN ${r.inScore}</div>
  </div>`;

  html += '<div style="font-size:0.85em;">';
  for (let i = 0; i < 18; i++) {
    if (i === 0) html += '<div style="font-weight:600;margin:8px 0 4px;color:#2d6a4f;">OUT</div>';
    if (i === 9) html += '<div style="font-weight:600;margin:8px 0 4px;color:#2d6a4f;">IN</div>';
    const sc = r.scores[i];
    const p = r.pars[i];
    const d = sc - p;
    const col = d <= -2 ? '#8e44ad' : d === -1 ? '#2980b9' : d === 0 ? '#2d6a4f' : '#e74c3c';
    html += `<div style="display:flex;justify-content:space-between;padding:3px 8px;${i%2===0?'background:#f8fdf8;':''}border-radius:4px;">
      <span>${i+1}H (Par${p})</span>
      <span style="font-weight:600;color:${col}">${sc}</span>
    </div>`;
  }
  html += '</div>';

  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('detailModal').classList.add('show');
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('show');
  currentDetailId = null;
}

function deleteRound() {
  if (!currentDetailId) return;
  if (!confirm('このラウンドを削除しますか？')) return;
  let rounds = JSON.parse(localStorage.getItem('golfRounds') || '[]');
  rounds = rounds.filter(r => r.id !== currentDetailId);
  localStorage.setItem('golfRounds', JSON.stringify(rounds));
  closeModal();
  renderHistory();
  showToast('🗑 削除しました');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

init();
</script>
</body>
</html>
