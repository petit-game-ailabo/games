<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0e27;font-family:'Segoe UI',sans-serif;color:#e0e0ff;touch-action:none}
#gameCanvas{display:block;width:100%;cursor:default}
#ui{position:absolute;top:0;left:0;width:100%;pointer-events:none}
#statusBar{display:flex;justify-content:space-between;align-items:center;padding:8px 16px;background:rgba(10,14,39,0.9);border-bottom:1px solid #1a2050;pointer-events:auto;font-size:14px;z-index:10;flex-wrap:wrap;gap:4px}
#statusBar .balance{font-size:20px;font-weight:bold;color:#ffd700}
#statusBar .difficulty{color:#88aaff;font-size:13px}

#bottomPanel{position:absolute;bottom:0;left:0;width:100%;pointer-events:auto;z-index:10}
#shopTabs{display:flex;gap:0;background:rgba(15,20,45,1);border-top:1px solid #1a2050;border-bottom:1px solid #1a2050}
.shopTab{flex:1;padding:8px 4px;text-align:center;font-size:12px;color:#668;background:rgba(15,20,45,1);border:none;cursor:pointer;transition:all .2s;border-right:1px solid #1a2050}
.shopTab:last-child{border-right:none}
.shopTab.active{color:#fff;background:rgba(40,50,100,0.9);font-weight:bold}
#shop{display:flex;gap:6px;padding:8px;background:rgba(10,14,39,1);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
#shop::-webkit-scrollbar{display:none}
.shopItem{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;padding:6px 10px;border:1px solid #334;border-radius:8px;background:#151a3a;cursor:grab;min-width:64px;transition:all .2s;touch-action:none}
.shopItem.disabled{opacity:0.35;cursor:not-allowed}

.shopItem .price{font-size:11px;color:#ffd700;font-weight:bold;pointer-events:none}
#shopDragPreview{position:fixed;pointer-events:none;z-index:200;opacity:0.7;display:none;padding:8px 14px;border:2px solid #4a6aff;border-radius:10px;background:rgba(20,25,50,0.9);box-shadow:0 0 20px rgba(74,106,255,0.6);text-align:center;font-size:18px;transform:translate(-50%,-50%)}

#titleScreen{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0a0e27;z-index:100}

#startBtn{padding:16px 48px;font-size:22px;background:linear-gradient(135deg,#2a3a8a,#4a6aff);color:#fff;border:none;border-radius:12px;cursor:pointer;box-shadow:0 0 30px rgba(74,106,255,0.4);transition:transform .2s;margin-bottom:16px}
#startBtn:hover{transform:scale(1.05)}
#resetTitleBtn{padding:8px 20px;font-size:13px;background:transparent;color:#666;border:1px solid #333;border-radius:8px;cursor:pointer;transition:all .2s}
#resetTitleBtn:hover{color:#999;border-color:#555}
#titleCanvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:-1}
#hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(10,14,39,0.8);color:#fff;font-size:14px;pointer-events:none;z-index:5;text-align:center;padding:12px 24px;border-radius:8px;text-shadow:0 0 10px #4af;opacity:0;transition:opacity 1s}

#connectionGuide .guide-bubble{position:absolute;background:rgba(74,106,255,0.85);color:#fff;padding:8px 16px;border-radius:12px;font-size:13px;font-weight:bold;white-space:nowrap;box-shadow:0 0 20px rgba(74,106,255,0.5);animation:guidePulse 1.5s ease-in-out infinite}

@keyframes guidePulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes guideSlide{0%,100%{opacity:0.4;transform:translateX(0)}50%{opacity:1;transform:translateX(10px)}}
#researchBtn{display:inline-flex;align-items:center;gap:4px;height:36px;padding:0 14px;background:linear-gradient(135deg,#5a2d82,#7b3fa0);border:1px solid rgba(160,100,220,0.5);border-radius:8px;color:#fff;font-size:13px;font-weight:bold;cursor:pointer;pointer-events:auto;z-index:20;position:relative;white-space:nowrap;margin-left:auto;flex-shrink:0;transition:box-shadow .3s}

<body>
<div id="titleScreen">

<script>
'use strict';

// ===== AUDIO =====
var AudioCtx = window.AudioContext || window.webkitAudioContext;
var audioCtx = null;
function ensureAudio(){if(!audioCtx)audioCtx=new AudioCtx()}
function playSound(type){
  ensureAudio();
  var ctx2=audioCtx,now=ctx2.currentTime;
  var o=ctx2.createOscillator(),g=ctx2.createGain();
  o.connect(g);g.connect(ctx2.destination);
  switch(type){
    case'place':o.type='sine';o.frequency.setValueAtTime(600,now);o.frequency.exponentialRampToValueAtTime(900,now+0.08);g.gain.setValueAtTime(0.3,now);g.gain.exponentialRampToValueAtTime(0.01,now+0.15);o.start(now);o.stop(now+0.15);break;
    case'connect':o.type='sawtooth';o.frequency.setValueAtTime(1200,now);o.frequency.exponentialRampToValueAtTime(400,now+0.12);g.gain.setValueAtTime(0.15,now);g.gain.exponentialRampToValueAtTime(0.01,now+0.12);o.start(now);o.stop(now+0.12);break;
    case'mine':o.type='sine';o.frequency.setValueAtTime(800,now);o.frequency.setValueAtTime(1000,now+0.05);o.frequency.setValueAtTime(1200,now+0.1);g.gain.setValueAtTime(0.2,now);g.gain.exponentialRampToValueAtTime(0.01,now+0.3);o.start(now);o.stop(now+0.3);break;
    case'malware':o.type='square';o.frequency.setValueAtTime(150,now);g.gain.setValueAtTime(0.2,now);g.gain.exponentialRampToValueAtTime(0.01,now+0.4);o.start(now);o.stop(now+0.4);break;
    case'cure':o.type='sine';o.frequency.setValueAtTime(500,now);o.frequency.exponentialRampToValueAtTime(2000,now+0.15);g.gain.setValueAtTime(0.2,now);g.gain.exponentialRampToValueAtTime(0.01,now+0.2);o.start(now);o.stop(now+0.2);break;
    case'buy':o.type='triangle';o.frequency.setValueAtTime(400,now);o.frequency.setValueAtTime(600,now+0.05);o.frequency.setValueAtTime(800,now+0.1);g.gain.setValueAtTime(0.25,now);g.gain.exponentialRampToValueAtTime(0.01,now+0.15);o.start(now);o.stop(now+0.15);break;
    case'error':o.type='square';o.frequency.setValueAtTime(200,now);g.gain.setValueAtTime(0.15,now);g.gain.exponentialRampToValueAtTime(0.01,now+0.15);o.start(now);o.stop(now+0.15);break;
    case'delete':o.type='sawtooth';o.frequency.setValueAtTime(400,now);o.frequency.exponentialRampToValueAtTime(100,now+0.2);g.gain.setValueAtTime(0.2,now);g.gain.exponentialRampToValueAtTime(0.01,now+0.25);o.start(now);o.stop(now+0.25);break;
    case'research':o.type='sine';o.frequency.setValueAtTime(600,now);o.frequency.setValueAtTime(900,now+0.1);o.frequency.setValueAtTime(1200,now+0.2);g.gain.setValueAtTime(0.25,now);g.gain.exponentialRampToValueAtTime(0.01,now+0.4);o.start(now);o.stop(now+0.4);break;
  }
}

// ===== CONSTANTS =====
var WIN_W = 195;
var TITLE_H = 32;
var LINE_H = 24;
var FONT_SIZE = 12;
var PORT_R = 8;

var PORT_CATEGORY_COLORS = {
  power:'#dd4444', data:'#4488ff', coin:'#ddaa22', network:'#9944dd', connected:'#44cc66'
};

function getPortCategoryForNode(nodeType, portType){
  if(portType==='to_pc'){
    if(nodeType==='power'||nodeType==='power_mk2'||nodeType==='solar_power'||nodeType==='fusion_power') return 'power';
    return 'data';
  }
  if(portType==='power') return 'power';
  if(['cpu','cooler','ssd','firewall','ai','tpu'].indexOf(portType)>=0) return 'data';
  if(['blockchain','from_pc'].indexOf(portType)>=0) return 'network';
  if(['wallet','to_lnwallet','from_wallet','from_ln','to_staking','to_defi','to_exchange'].indexOf(portType)>=0) return 'coin';
  if(['network','ln_node','from_server','from_research'].indexOf(portType)>=0) return 'network';
  return 'data';
}

function isMultiPort(nodeType, portType){
  if(nodeType==='mining_pc' && (portType==='cpu'||portType==='power')) return true;
  if(nodeType==='blockchain' && portType==='from_pc') return true;
  if(nodeType==='wallet' && portType==='from_pc') return true;
  if(nodeType==='server' && portType==='cpu') return true;
  if(nodeType==='research_lab' && portType==='from_pc') return true;
  return false;
}

function countPortConnections(nodeId, portType, side){
  return connections.filter(function(c){
    if(side==='right') return c.to===nodeId && c.toPort===portType;
    return c.from===nodeId && c.fromPort===portType;
  }).length;
}

var compatiblePorts = [];
function updateCompatiblePorts(fromPort){
  compatiblePorts = [];
  if(!fromPort) return;
  nodes.forEach(function(n){
    var ports = getNodePortPositions(n);
    ports.forEach(function(p){
      if(fromPort.side==='left' && p.side==='right'){
        if(canConnect(fromPort,p)) compatiblePorts.push({nodeId:p.nodeId,defIndex:p.defIndex});
      } else if(fromPort.side==='right' && p.side==='left'){
        if(canConnect(p,fromPort)) compatiblePorts.push({nodeId:p.nodeId,defIndex:p.defIndex});
      }
    });
  });
}
function isCompatiblePort(nodeId, defIndex){
  return compatiblePorts.some(function(cp){return cp.nodeId===nodeId && cp.defIndex===defIndex});
}

// ===== NODE TYPES =====
var NODE_TYPES = {
  mining_pc:{name:'マイニングPC',emoji:'💻',price:0,titleColor:'#2a7a4a',watt:0,category:'pc'},

  power_mk2:{name:'電源Mk2',emoji:'🔌',price:5,titleColor:'#cc4444',watt:0,supply:50,category:'parts',requireResearch:'hi_power'},
  solar_power:{name:'ソーラー電源',emoji:'☀️',price:8,titleColor:'#ccaa22',watt:0,supply:10,isSolar:true,category:'parts',requireResearch:'solar_panel'},

  network:{name:'ネットワーク',emoji:'📡',price:8,titleColor:'#7744aa',watt:2,category:'parts',requireResearch:'network_tech'},
  ai:{name:'AI',emoji:'🤖',price:30,titleColor:'#aa4477',watt:10,category:'parts',requireResearch:'ai_mining'},
  tpu:{name:'TPU',emoji:'🔧',price:50,titleColor:'#6688cc',watt:15,category:'parts',requireResearch:'tpu_boost'},
  firewall:{name:'FW',emoji:'🛡️',price:10,titleColor:'#bb6622',watt:1,category:'parts',requireResearch:'security_basics'},
  blockchain:{name:'ブロックチェーン',emoji:'⛓️',price:0,titleColor:'#3366cc',watt:0,category:'network'},

  research_lab:{name:'研究施設',emoji:'🔬',price:10,titleColor:'#2288aa',watt:0,category:'network',requireResearch:'_lab_unlock'},

  ln_wallet:{name:'LNウォレット',emoji:'💰',price:20,titleColor:'#ddaa00',watt:0,category:'network',requireResearch:'ln_basics'},
  staking:{name:'ステーキング',emoji:'📌',price:15,titleColor:'#44aa66',watt:0,category:'network',requireResearch:'staking_intro'},
  defi:{name:'DeFi',emoji:'📊',price:25,titleColor:'#6644aa',watt:0,category:'network',requireResearch:'defi'},
  nft:{name:'NFT',emoji:'🎨',price:20,titleColor:'#cc44aa',watt:0,category:'network',requireResearch:'nft_market'},
  exchange:{name:'取引所',emoji:'🏦',price:40,titleColor:'#6633cc',watt:0,category:'network',requireResearch:'exchange'},

function getPortDefs(nodeType){
  switch(nodeType){
    case 'mining_pc': return [
      {side:'right',type:'cpu',label:'CPU'},
      {side:'right',type:'cooler',label:'冷却'},
      {side:'right',type:'ssd',label:'SSD'},
      {side:'right',type:'firewall',label:'FW'},
      {side:'right',type:'power',label:'電源'},
      {side:'left',type:'blockchain',label:'BC'},
      {side:'left',type:'wallet',label:'ウォレット'},
      {side:'left',type:'to_nft',label:'NFT'},
      {side:'left',type:'to_research',label:'研究'},
    ];
    case 'server': return [
      {side:'right',type:'cpu',label:'CPU'},
      {side:'right',type:'power',label:'電源'},
      {side:'right',type:'network',label:'NET'},
      {side:'right',type:'firewall',label:'FW'},
      {side:'left',type:'ln_node',label:'LN'},
    ];
    case 'cpu': return [{side:'left',type:'to_pc',label:'→PC'}];
    case 'cpu_mk2': return [{side:'left',type:'to_pc',label:'→PC'}];
    case 'quantum_cpu': return [{side:'left',type:'to_pc',label:'→PC'}];
    case 'power': return [{side:'left',type:'to_pc',label:'→PC'}];
    case 'power_mk2': return [{side:'left',type:'to_pc',label:'→PC'}];
    case 'solar_power': return [{side:'left',type:'to_pc',label:'→PC'}];
    case 'fusion_power': return [{side:'left',type:'to_pc',label:'→PC'}];
    case 'cooler': return [{side:'left',type:'to_pc',label:'→PC'}];
    case 'ssd': return [{side:'left',type:'to_pc',label:'→PC'}];
    case 'network': return [{side:'left',type:'to_pc',label:'→PC'}];
    case 'ai': return [{side:'left',type:'to_pc',label:'→PC'}];
    case 'tpu': return [{side:'left',type:'to_pc',label:'→PC'}];
    case 'firewall': return [{side:'left',type:'to_pc',label:'→PC'}];
    case 'blockchain': return [{side:'right',type:'from_pc',label:'←PC'}];
    case 'wallet': return [
      {side:'right',type:'from_pc',label:'←PC'},
      {side:'left',type:'to_lnwallet',label:'→LNW'},
      {side:'left',type:'to_staking',label:'→Stk'},
      {side:'left',type:'to_defi',label:'→DeFi'},

function resize(){

  canvas.height = canvasH * dpr;

  gameAreaBottom = canvasH - (bp ? bp.offsetHeight : 80);
}

function screenToWorld(sx, sy){
  return {
    x: (sx - canvasW/2) / camera.zoom + camera.x + canvasW/2,
    y: (sy - canvasH/2) / camera.zoom + camera.y + canvasH/2
  };
}

function worldToScreen(wx, wy){
  return {
    x: (wx - camera.x - canvasW/2) * camera.zoom + canvasW/2,
    y: (wy - camera.y - canvasH/2) * camera.zoom + canvasH/2
  };
}

function centerCameraOnBlockchain(){
  if(nodes.length === 0) return;
  var sumX = 0, sumY = 0;
  nodes.forEach(function(n){ sumX += n.x + WIN_W/2; sumY += n.y + 30; });
  var cx = sumX / nodes.length;
  var cy = sumY / nodes.length;
  camera.x = cx - canvasW/2;
  camera.y = cy - canvasH/2;
  camera.zoom = 1;
}

(function titleAnim(){
  var tc = document.getElementById('titleCanvas');
  var tctx = tc.getContext('2d');
  var dpr = window.devicePixelRatio||1;
  function resizeTitle(){tc.width=window.innerWidth*dpr;tc.height=window.innerHeight*dpr;tctx.setTransform(dpr,0,0,dpr,0,0)}
  resizeTitle();
  var lines=[];
  for(var i=0;i<30;i++)lines.push({x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,l:50+Math.random()*100,a:Math.random()*Math.PI*2,s:0.2+Math.random()*0.5});
  function drawTitle(){
    if(gameStarted)return;
    var w=window.innerWidth,h=window.innerHeight;
    tctx.fillStyle='#0a0e27';tctx.fillRect(0,0,w,h);
    tctx.strokeStyle='#1a2050';tctx.lineWidth=0.5;
    for(var x=0;x<w;x+=40){tctx.beginPath();tctx.moveTo(x,0);tctx.lineTo(x,h);tctx.stroke()}
    for(var y2=0;y2<h;y2+=40){tctx.beginPath();tctx.moveTo(0,y2);tctx.lineTo(w,y2);tctx.stroke()}
    var t=Date.now()*0.001;
    lines.forEach(function(ln){
      tctx.strokeStyle='rgba(74,106,255,'+(0.15+0.1*Math.sin(t+ln.x))+')';
      tctx.lineWidth=1;
      tctx.beginPath();tctx.moveTo(ln.x,ln.y);
      tctx.lineTo(ln.x+Math.cos(ln.a)*ln.l,ln.y+Math.sin(ln.a)*ln.l);
      tctx.stroke();
    });
    requestAnimationFrame(drawTitle);
  }
  drawTitle();
})();

function getNodeHeight(n){
  return TITLE_H + getNodeLines(n).length * LINE_H + 4;
}

function getEffectiveSupply(n){
  var base = NODE_TYPES[n.type].supply || 0;
  if(n.type==='solar_power') return n.solarOutput || 10;
  if(researchCompleted.indexOf('power_eff')>=0) base = Math.floor(base * 1.25);
  return base;
}

function getLabRPRate(lab){
  var connectedPCs = connections.filter(function(c){return c.to===lab.id && c.toPort==='from_pc'});
  var totalRate = 0;
  connectedPCs.forEach(function(conn){
    var pc = nodes.find(function(nd){return nd.id===conn.from});
    if(pc && pc.type==='mining_pc'){
      var s = getPCStats(pc);
      totalRate += s.effectiveRate * 0.1;
    }
  });
  return totalRate;
}

// ===== PORT POSITIONS =====
function getNodePortPositions(n){
  var portDefs = getPortDefs(n.type);
  var nodeLines = getNodeLines(n);
  var result = [];
  var leftPorts = [];
  var rightPorts = [];
  nodeLines.forEach(function(line, i){
    if(line.leftPort !== undefined) leftPorts.push({lineIdx:i, portIdx:line.leftPort});
    if(line.rightPort !== undefined) rightPorts.push({lineIdx:i, portIdx:line.rightPort});
  });

  var leftDefIdx = 0, rightDefIdx = 0;
  portDefs.forEach(function(pd, pi){
    var px, py;
    if(pd.side==='left'){
      if(leftDefIdx < leftPorts.length){
        var lp = leftPorts[leftDefIdx];
        px = n.x; py = n.y + TITLE_H + lp.lineIdx * LINE_H + LINE_H/2;
        leftDefIdx++;
      } else { px = n.x; py = n.y + TITLE_H + (nodeLines.length-1)*LINE_H + LINE_H/2; }
    } else {
      if(rightDefIdx < rightPorts.length){
        var rp = rightPorts[rightDefIdx];
        px = n.x + WIN_W; py = n.y + TITLE_H + rp.lineIdx * LINE_H + LINE_H/2;
        rightDefIdx++;
      } else { px = n.x + WIN_W; py = n.y + TITLE_H + (nodeLines.length-1)*LINE_H + LINE_H/2; }
    }
    result.push({x:px, y:py, side:pd.side, type:pd.type, label:pd.label, defIndex:pi, nodeId:n.id, nodeType:n.type});
  });
  return result;
}

// ===== CONNECTION VALIDATION =====
function canConnect(fromPort, toPort){
  if(fromPort.side!=='left' || toPort.side!=='right') return false;
  if(fromPort.nodeId===toPort.nodeId) return false;
  var fromNode = nodes.find(function(nd){return nd.id===fromPort.nodeId});
  var toNode = nodes.find(function(nd){return nd.id===toPort.nodeId});
  if(!fromNode || !toNode) return false;
  var exists = connections.some(function(c){
    return c.from===fromPort.nodeId && c.to===toPort.nodeId && c.fromPort===fromPort.type && c.toPort===toPort.type;
  });
  if(exists) return false;

  var cpuTypes = ['cpu','cpu_mk2','quantum_cpu'];
  var powerTypes = ['power','power_mk2','solar_power','fusion_power'];
  var partTypes = cpuTypes.concat(powerTypes).concat(['cooler','ssd','network','firewall','ai','tpu']);

  // Parts → PC
  if(partTypes.indexOf(fromNode.type)>=0 && fromPort.type==='to_pc'){
    if(toNode.type==='mining_pc'){
      if(cpuTypes.indexOf(fromNode.type)>=0 && toPort.type==='cpu') return true;
      if(powerTypes.indexOf(fromNode.type)>=0 && toPort.type==='power') return true;
      if(fromNode.type==='cooler' && toPort.type==='cooler') return true;
      if(fromNode.type==='ssd' && toPort.type==='ssd') return true;
      if(fromNode.type==='firewall' && toPort.type==='firewall') return true;
      if(fromNode.type==='ai' && toPort.type==='cpu') return true;
      if(fromNode.type==='tpu' && toPort.type==='cpu') return true;
    }
    if(toNode.type==='server'){
      if(cpuTypes.indexOf(fromNode.type)>=0 && toPort.type==='cpu') return true;
      if(powerTypes.indexOf(fromNode.type)>=0 && toPort.type==='power') return true;
      if(fromNode.type==='network' && toPort.type==='network') return true;
      if(fromNode.type==='firewall' && toPort.type==='firewall') return true;
    }
  }
  // PC → Blockchain/Wallet/NFT/Research
  if(fromNode.type==='mining_pc'){
    if(fromPort.type==='blockchain' && toNode.type==='blockchain' && toPort.type==='from_pc') return true;
    if(fromPort.type==='wallet' && toNode.type==='wallet' && toPort.type==='from_pc') return true;
    if(fromPort.type==='to_nft' && toNode.type==='nft' && toPort.type==='from_pc') return true;
    if(fromPort.type==='to_research' && toNode.type==='research_lab' && toPort.type==='from_pc') return true;
  }
  // Server → LN
  if(fromNode.type==='server' && fromPort.type==='ln_node' && toNode.type==='ln_node' && toPort.type==='from_server') return true;
  // LN → LNWallet
  if(fromNode.type==='ln_node' && fromPort.type==='to_lnwallet' && toNode.type==='ln_wallet' && toPort.type==='from_ln') return true;
  // Wallet → LNWallet
  if(fromNode.type==='wallet' && fromPort.type==='to_lnwallet' && toNode.type==='ln_wallet' && toPort.type==='from_wallet') return true;
  // Wallet → Staking
  if(fromNode.type==='wallet' && fromPort.type==='to_staking' && toNode.type==='staking' && toPort.type==='from_wallet') return true;
  // Wallet → DeFi
  if(fromNode.type==='wallet' && fromPort.type==='to_defi' && toNode.type==='defi' && toPort.type==='from_wallet') return true;
  // Wallet → Exchange
  if(fromNode.type==='wallet' && fromPort.type==='to_exchange' && toNode.type==='exchange' && toPort.type==='from_wallet') return true;

  return false;
}

function addConnection(fromPort, toPort){
  var lineType = 'data';
  var fromNode = nodes.find(function(nd){return nd.id===fromPort.nodeId});
  if(fromPort.type==='to_pc' && fromNode){
    var powerTypes = ['power','power_mk2','solar_power','fusion_power'];
    if(powerTypes.indexOf(fromNode.type)>=0) lineType = 'power';
  }
  if(fromPort.type==='wallet'||fromPort.type==='to_lnwallet'||fromPort.type==='to_staking'||fromPort.type==='to_defi'||fromPort.type==='to_exchange') lineType = 'coin';
  if(fromPort.type==='ln_node') lineType = 'lightning';
  if(fromPort.type==='blockchain') lineType = 'data';
  if(fromPort.type==='to_nft'||fromPort.type==='to_research') lineType = 'data';

  connections.push({
    from:fromPort.nodeId, to:toPort.nodeId,
    fromPort:fromPort.type, toPort:toPort.type,
    fromDefIndex:fromPort.defIndex, toDefIndex:toPort.defIndex,
    lineType:lineType
  });
  playSound('connect');
  if(hintShown){hintShown=false;hintFadeState='hidden';document.getElementById('hint').style.opacity='0';}
}

// ===== PC STATS =====
function getPCStats(pc){
  if(pc.type!=='mining_pc') return {};
  var attached = connections.filter(function(c){return c.to===pc.id}).map(function(c){return nodes.find(function(n2){return n2.id===c.from})}).filter(Boolean);
  var outputs = connections.filter(function(c){return c.from===pc.id}).map(function(c){return nodes.find(function(n2){return n2.id===c.to})}).filter(Boolean);

  var cpuTypes = ['cpu','cpu_mk2','quantum_cpu'];
  var powerTypes = ['power','power_mk2','solar_power','fusion_power'];

  var cpuNodes = attached.filter(function(n2){return cpuTypes.indexOf(n2.type)>=0});
  var powerNodes = attached.filter(function(n2){return powerTypes.indexOf(n2.type)>=0 && !n2.blackout});
  var coolers = attached.filter(function(n2){return n2.type==='cooler'});
  var ssds = attached.filter(function(n2){return n2.type==='ssd'});
  var ais = attached.filter(function(n2){return n2.type==='ai'});
  var tpus = attached.filter(function(n2){return n2.type==='tpu'});
  var firewalls = attached.filter(function(n2){return n2.type==='firewall'});
  var hasBlockchain = outputs.some(function(n2){return n2.type==='blockchain'});
  var hasWallet = outputs.some(function(n2){return n2.type==='wallet'});
  var hasNFT = outputs.some(function(n2){return n2.type==='nft'});
  var hasResearch = outputs.some(function(n2){return n2.type==='research_lab'});

  var powerUsed = 0;
  attached.forEach(function(n2){powerUsed += NODE_TYPES[n2.type].watt || 0});
  var powerSupply = 0;
  powerNodes.forEach(function(n2){powerSupply += getEffectiveSupply(n2)});
  var powerOk = powerSupply >= powerUsed && powerSupply > 0;
  var canMine = cpuNodes.length > 0 && powerNodes.length > 0 && hasBlockchain && hasWallet && powerOk;

  var hashrate = 0;
  cpuNodes.forEach(function(c){
    if(c.type==='cpu') hashrate += 1;
    else if(c.type==='cpu_mk2') hashrate += 3;
    else if(c.type==='quantum_cpu') hashrate += 20;
  });
  var mult = 1;
  if(researchCompleted.indexOf('gpu_boost')>=0) mult *= 1.5;
  if(coolers.length>0) mult *= 1.5;
  if(ssds.length>0) mult *= 1.3;
  var aiMult = researchCompleted.indexOf('ai_mining')>=0 ? 3 : 2;
  if(ais.length>0 && cpuNodes.length>=2){
    var aiEff = aiMult;
    if(tpus.length>0) aiEff *= 5;
    mult *= aiEff;
  }
  if(pc.infected) mult *= 0.25;
  var effectiveRate = hashrate * mult;
  var gaugeSpeed = effectiveRate * 0.06 / difficulty;

  return {cpus:cpuNodes.length,powers:powerNodes.length,coolers:coolers.length,ssds:ssds.length,ais:ais.length,tpus:tpus.length,
    firewalls:firewalls.length,hasBlockchain:hasBlockchain,hasWallet:hasWallet,hasNFT:hasNFT,hasResearch:hasResearch,canMine:canMine,
    hashrate:hashrate,mult:mult,effectiveRate:effectiveRate,gaugeSpeed:gaugeSpeed,
    hasFW:firewalls.length>0,powerUsed:powerUsed,powerSupply:powerSupply,powerOk:powerOk};
}

function getServerStats(sv){
  if(sv.type!=='server') return {};
  var attached = connections.filter(function(c){return c.to===sv.id}).map(function(c){return nodes.find(function(n2){return n2.id===c.from})}).filter(Boolean);
  var outputs = connections.filter(function(c){return c.from===sv.id}).map(function(c){return nodes.find(function(n2){return n2.id===c.to})}).filter(Boolean);
  var cpuTypes = ['cpu','cpu_mk2','quantum_cpu'];
  var powerTypes = ['power','power_mk2','solar_power','fusion_power'];
  var cpuNodes = attached.filter(function(n2){return cpuTypes.indexOf(n2.type)>=0});
  var powerNodes = attached.filter(function(n2){return powerTypes.indexOf(n2.type)>=0 && !n2.blackout});
  var networks = attached.filter(function(n2){return n2.type==='network'});
  var firewalls = attached.filter(function(n2){return n2.type==='firewall'});
  var hasLN = outputs.some(function(n2){return n2.type==='ln_node'});
  var powerUsed = 0;
  attached.forEach(function(n2){powerUsed += NODE_TYPES[n2.type].watt || 0});
  var powerSupply = 0;
  powerNodes.forEach(function(n2){powerSupply += getEffectiveSupply(n2)});
  var powerOk = powerSupply >= powerUsed && powerSupply > 0;
  var processingPower = 0;
  cpuNodes.forEach(function(c){
    if(c.type==='cpu') processingPower += 1;
    else if(c.type==='cpu_mk2') processingPower += 3;

  return {cpus:cpuNodes.length,powers:powerNodes.length,networks:networks.length,firewalls:firewalls.length,

var SHOP_TABS = {
  pc:['mining_pc','server'],
  parts:['cpu','cpu_mk2','quantum_cpu','power','power_mk2','solar_power','fusion_power','cooler','ssd','network','ai','tpu','firewall'],

function isNodeUnlocked(type){
  var nt = NODE_TYPES[type];
  if(!nt) return false;
  if(!nt.requireResearch) return true;
  return researchCompleted.indexOf(nt.requireResearch) >= 0;
}

function switchTab(tab, el){
  currentShopTab = tab;
  document.querySelectorAll('.shopTab').forEach(function(t){t.classList.remove('active')});
  el.classList.add('active');
  buildShop();
}

function buildShop(){
  var shop = document.getElementById('shop');
  shop.innerHTML = '';
  var items = SHOP_TABS[currentShopTab] || [];
  items.forEach(function(t){
    if(!isNodeUnlocked(t)) return;
    var nt = NODE_TYPES[t];
    var canBuy = balance >= nt.price || nt.price === 0;
    var div = document.createElement('div');
    div.className = 'shopItem' + (canBuy ? '' : ' disabled');
    div.setAttribute('data-type', t);
    div.innerHTML = '<span class="emoji">'+nt.emoji+'</span><span class="name">'+nt.name+'</span><span class="price">'+(nt.price>0?nt.price+'₱':'無料')+'</span>';
    div.addEventListener('pointerdown', function(e){
      if(!canBuy){playSound('error');return}
      e.preventDefault();e.stopPropagation();ensureAudio();
      isShopDragging = true;shopDragType = t;
      shopDragStartX = e.clientX;shopDragStartY = e.clientY;shopDragMoved = false;
      var preview = document.getElementById('shopDragPreview');
      preview.innerHTML = '<span class="rtn-emoji">'+nt.emoji+'</span><div class="sdp-name">'+nt.name+'</div>';
      preview.style.left = e.clientX + 'px';preview.style.top = e.clientY + 'px';preview.style.display = 'block';
    });
    shop.appendChild(div);
  });
}

document.addEventListener('pointermove', function(e){
  if(!isShopDragging) return;
  var dx = e.clientX - shopDragStartX;
  var dy = e.clientY - shopDragStartY;
  if(Math.abs(dx)>5||Math.abs(dy)>5) shopDragMoved = true;
  var preview = document.getElementById('shopDragPreview');
  preview.style.left = e.clientX + 'px';preview.style.top = e.clientY + 'px';
});

document.addEventListener('pointerup', function(e){
  if(!isShopDragging) return;
  isShopDragging = false;
  document.getElementById('shopDragPreview').style.display = 'none';
  if(!shopDragMoved || !shopDragType) return;
  var r = canvas.getBoundingClientRect();
  var sx = e.clientX - r.left;
  var sy = e.clientY - r.top;
  if(sx<0||sy<0||sx>r.width||sy>r.height) return;
  if(sy<gameAreaTop||sy>gameAreaBottom) return;
  var nt = NODE_TYPES[shopDragType];
  if(balance<nt.price&&nt.price>0){playSound('error');return}
  var world = screenToWorld(sx, sy);
  balance -= nt.price;
  addNode(shopDragType, world.x - WIN_W/2, world.y - 20);
  playSound(nt.price>0?'buy':'place');
  updateUI();buildShop();
});

function deleteNodeConfirm(node){

  var nt = NODE_TYPES[node.type];
  var refund = Math.floor(nt.price * 0.5);
  var msg = nt.emoji+' '+nt.name+' を削除しますか？';
  if(refund>0) msg += '\n（返金: '+refund+'₱）';

    connections = connections.filter(function(c){return c.from!==node.id && c.to!==node.id});
    nodes = nodes.filter(function(n2){return n2.id!==node.id});
    balance += refund;
    playSound('delete');
    effects.push({type:'spawn',x:node.x+WIN_W/2,y:node.y+30,t:0,dur:0.4});
    updateUI();buildShop();
  }
}

var currentResearchTab = 'mining';

function toggleResearch(){
  var panel = document.getElementById('researchPanel');
  if(panel.classList.contains('open')){panel.classList.remove('open');selectedResearchId=null}
  else{renderResearchPanel();panel.classList.add('open')}
}

function checkResearchConditions(r){
  if(!r.conditions) return {met:true, text:''};
  var conds = r.conditions;
  var texts = [];
  var allMet = true;
  if(conds.minTotalMined!==undefined){
    var ok = stats.totalMined >= conds.minTotalMined;
    if(!ok) allMet = false;
    texts.push((ok?'✅':'❌')+' マイニング成功'+conds.minTotalMined+'回以上 (現在:'+stats.totalMined+')');
  }
  if(conds.minTotalCoins!==undefined){
    var ok2 = stats.totalCoinsEarned >= conds.minTotalCoins;
    if(!ok2) allMet = false;
    texts.push((ok2?'✅':'❌')+' 累計'+conds.minTotalCoins+'₱獲得 (現在:'+stats.totalCoinsEarned.toFixed(0)+')');
  }
  if(conds.minNodeCount){
    var counts = getNodeCounts();
    for(var nt in conds.minNodeCount){
      var need = conds.minNodeCount[nt];
      var have = counts[nt]||0;
      var ok3 = have >= need;
      if(!ok3) allMet = false;
      var name = NODE_TYPES[nt] ? NODE_TYPES[nt].name : nt;
      texts.push((ok3?'✅':'❌')+' '+name+need+'個以上設置 (現在:'+have+')');
    }
  }
  return {met:allMet, text:texts.join('\n')};
}

function renderResearchPanel(){
  var panel = document.getElementById('researchPanel');
  var html = '<div class="rp-header"><h3>🔬 研究ツリー (RP: '+Math.floor(stats.researchPoints)+')</h3><button class="rp-close" onclick="toggleResearch()">✕</button></div>';
  html += '<div class="rp-tabs">';
  var tabs = [{id:'mining',emoji:'⛏️',label:'マイニング'},{id:'power',emoji:'⚡',label:'電力'},{id:'network',emoji:'🌐',label:'ネットワーク'},{id:'revenue',emoji:'💰',label:'収益'}];
  tabs.forEach(function(tab){
    html += '<button class="rp-tab'+(currentResearchTab===tab.id?' active':'')+'" onclick="switchResearchTab(\''+tab.id+'\')">'+tab.emoji+' '+tab.label+'</button>';
  });
  html += '</div>';

  var treeItems = RESEARCH_TREE.filter(function(r){return r.tree===currentResearchTab});
  var nodeW = 100, nodeH = 42, gapY = 3, padX = 16, padY = 12;
  var maxRow = 0, maxCol = 0;
  treeItems.forEach(function(r){if(r.row>maxRow)maxRow=r.row;if(r.col>maxCol)maxCol=r.col});
  var cols = maxCol + 1;
  var containerW = 420 - 32;
  var colW = cols > 1 ? containerW / cols : containerW;
  var containerH = (maxRow+1)*(nodeH+gapY)+padY*2;

  html += '<div class="rp-tree-container" style="height:'+containerH+'px">';
  html += '<svg style="width:100%;height:'+containerH+'px">';
  treeItems.forEach(function(r){
    if(!r.prereq) return;
    var parent = treeItems.find(function(p){return p.id===r.prereq});
    if(!parent) return;
    var px1 = padX + parent.col*colW + (colW-nodeW)/2 + nodeW/2;
    var py1 = padY + parent.row*(nodeH+gapY) + nodeH;
    var px2 = padX + r.col*colW + (colW-nodeW)/2 + nodeW/2;
    var py2 = padY + r.row*(nodeH+gapY);
    var done = researchCompleted.indexOf(r.id)>=0;
    var prereqMet = researchCompleted.indexOf(r.prereq)>=0;
    var lineColor = done ? '#44cc66' : (prereqMet ? '#ddcc44' : '#333');
    html += '<line x1="'+px1+'" y1="'+py1+'" x2="'+px2+'" y2="'+py2+'" stroke="'+lineColor+'" stroke-width="2" stroke-dasharray="'+(done?'':'4,3')+'"/>';
  });
  html += '</svg>';

  treeItems.forEach(function(r){
    var done = researchCompleted.indexOf(r.id)>=0;
    var prereqMet = !r.prereq || researchCompleted.indexOf(r.prereq)>=0;
    var condResult = checkResearchConditions(r);
    var available = !done && prereqMet && condResult.met;
    var cls = done ? 'done' : (available ? 'available' : 'locked');
    var nx = padX + r.col*colW + (colW-nodeW)/2;
    var ny = padY + r.row*(nodeH+gapY);
    var selected = selectedResearchId===r.id;
    var borderExtra = selected ? ';outline:2px solid #fff;outline-offset:2px' : '';
    html += '<div class="rp-tree-node '+cls+'" style="left:'+nx+'px;top:'+ny+'px;width:'+nodeW+'px'+borderExtra+'" onclick="selectResearch(\''+r.id+'\')">';
    html += '<div class="rtn-emoji">'+r.emoji+'</div>';
    html += '<div class="rtn-name">'+r.name+'</div>';
    if(!done && r.cost>0) html += '<div class="rtn-cost">RP:'+r.cost+'</div>';
    if(done) html += '<div class="rtn-cost" style="color:#44cc66">✅</div>';
    html += '</div>';
  });
  html += '</div>';

  if(selectedResearchId){
    var sr = RESEARCH_TREE.find(function(r){return r.id===selectedResearchId});
    if(sr){
      var done = researchCompleted.indexOf(sr.id)>=0;
      var prereqMet = !sr.prereq || researchCompleted.indexOf(sr.prereq)>=0;
      var condResult = checkResearchConditions(sr);
      var available = !done && prereqMet && condResult.met;
      var canAfford = stats.researchPoints >= sr.cost;
      html += '<div class="rp-detail-popup">';
      html += '<button class="rdp-close-btn" onclick="selectedResearchId=null;renderResearchPanel()">✕</button>';
      html += '<div class="rdp-name">'+sr.emoji+' '+sr.name+(done?' ✅':'')+'</div>';
      html += '<div class="rdp-desc" style="white-space:pre-line">'+sr.desc+'</div>';
      html += '<div class="rdp-effect">効果: '+sr.effect+'</div>';
      if(!done){
        html += '<div class="rdp-cost">コスト: '+(sr.cost>0?sr.cost+' RP':'無料')+' (所持: '+Math.floor(stats.researchPoints)+' RP)</div>';
        if(condResult.text) html += '<div class="rdp-cond" style="white-space:pre-line">条件:\n'+condResult.text+'</div>';
        if(!prereqMet){
          var prereqName = RESEARCH_TREE.find(function(r){return r.id===sr.prereq});
          html += '<div style="font-size:11px;color:#888;margin-top:4px">🔒 前提: '+(prereqName?prereqName.name:'不明')+'</div>';
        } else if(available){
          html += '<button class="ri-btn" '+(canAfford?'onclick="doResearch(\''+sr.id+'\')"':'disabled')+'>'+(canAfford?'🔬 研究する ('+sr.cost+' RP)':'🔬 RP不足')+'</button>';
        } else {
          html += '<div style="font-size:11px;color:#888;margin-top:4px">🔒 条件未達成</div>';
        }
      }
      html += '</div>';
    }
  }
  panel.innerHTML = html;
}

function switchResearchTab(tab){currentResearchTab=tab;selectedResearchId=null;renderResearchPanel()}
function selectResearch(id){selectedResearchId=(selectedResearchId===id)?null:id;renderResearchPanel()}

function doResearch(id){
  var r = RESEARCH_TREE.find(function(x){return x.id===id});
  if(!r||researchCompleted.indexOf(id)>=0) return;
  if(r.prereq && researchCompleted.indexOf(r.prereq)<0) return;
  var condResult = checkResearchConditions(r);
  if(!condResult.met) return;
  if(stats.researchPoints < r.cost) return;
  stats.researchPoints -= r.cost;
  researchCompleted.push(id);
  if(id==='_lab_unlock'){labUnlocked=true;labUnlockShown=true;}
  playSound('research');
  effects.push({type:'sparkle',x:canvasW/2,y:canvasH/2,t:0,dur:0.8});
  showUnlockMsg('🔬 研究完了: '+r.name+'！');
  selectedResearchId = null;
  updateUI();buildShop();renderResearchPanel();
}

// ===== L-SHAPED PATH =====
function getLPathPoint(fromX, fromY, toX, toY, t){
  var midX = (fromX+toX)/2;
  var seg1 = Math.abs(midX-fromX);
  var seg2 = Math.abs(toY-fromY);
  var seg3 = Math.abs(toX-midX);
  var total = seg1+seg2+seg3;
  if(total===0) return {x:fromX,y:fromY};
  var d = t*total;
  if(d<=seg1){var p=seg1>0?d/seg1:0;return{x:fromX+(midX-fromX)*p,y:fromY}}
  d-=seg1;if(d<=seg2){var p=seg2>0?d/seg2:0;return{x:midX,y:fromY+(toY-fromY)*p}}
  d-=seg2;var p=seg3>0?d/seg3:0;return{x:midX+(toX-midX)*p,y:toY};
}

// ===== GAME LOOP =====
var lastTime = 0;
function gameLoop(ts){
  if(!gameStarted) return;
  var dt = Math.min((ts-(lastTime||ts))/1000, 0.1);
  lastTime = ts;
  gameTime += dt;
  update(dt);
  draw();
  requestAnimationFrame(gameLoop);
}

function update(dt){
  nodes.forEach(function(n){if(n.scale<1)n.scale=Math.min(1,n.scale+dt*5)});

  nodes.filter(function(n){return n.type==='mining_pc'||n.type==='server'}).forEach(function(pc){
    var s = pc.type==='mining_pc' ? getPCStats(pc) : getServerStats(pc);
    var target = s.powerSupply>0 ? s.powerUsed/s.powerSupply : 0;
    var cur = animatedPower[pc.id]||0;
    animatedPower[pc.id] = cur + (target-cur)*Math.min(1,dt*2);
  });

  // Solar variation
  nodes.filter(function(n){return n.type==='solar_power'}).forEach(function(n){
    n.solarOutput = Math.round(5 + Math.sin(gameTime*0.3+n.id)*5 + Math.random()*2);
    n.solarOutput = Math.max(5, Math.min(15, n.solarOutput));
  });

  // Difficulty
  difficultyTimer += dt;
  if(difficultyTimer>=600){difficultyTimer=0;difficulty*=1.15}

  // Research lab RP generation
  nodes.filter(function(n){return n.type==='research_lab'}).forEach(function(lab){
    var rpRate = getLabRPRate(lab);
    if(rpRate > 0){
      stats.researchPoints += rpRate * dt;
    }
  });

  // Mining
  var totalHash = 0;
  nodes.filter(function(n){return n.type==='mining_pc'}).forEach(function(pc){
    var s = getPCStats(pc);
    totalHash += s.effectiveRate;
    if(!pc.miningProgress) pc.miningProgress = 0;
    if(s.canMine && !pc.infected && s.powerOk){
      pc.miningProgress += s.gaugeSpeed * dt;
      if(pc.miningProgress >= 1){
        pc.miningProgress = 0;
        balance++;
        stats.totalMined++;
        stats.totalCoinsEarned++;
        playSound('mine');
        var gaugeLineIdx = 5;
        var gaugeY = pc.y + TITLE_H + gaugeLineIdx*LINE_H + LINE_H/2;
        for(var gi=0;gi<6;gi++){
          var angle = Math.random()*Math.PI*2;
          effects.push({type:'gold_burst',x:pc.x+WIN_W/2,y:gaugeY,t:0,dur:0.7,angle:angle,dist:15+Math.random()*25});
        }
        effects.push({type:'sparkle',x:pc.x+WIN_W/2,y:pc.y+TITLE_H/2,t:0,dur:0.6});
        var wallet = nodes.find(function(n2){return n2.type==='wallet'});
        if(wallet) particles.push({x:pc.x+WIN_W/2,y:pc.y+TITLE_H,tx:wallet.x+WIN_W/2,ty:wallet.y+TITLE_H,t:0,dur:0.8,text:'+1₱'});
        updateUI();buildShop();
      }
    } else {
      pc.miningProgress = Math.max(0, pc.miningProgress - 0.05*dt);
    }
  });

  miningCheckTimer += dt;
  if(miningCheckTimer >= 1){
    miningCheckTimer = 0;
    document.getElementById('rpText').textContent = Math.floor(stats.researchPoints);
    var minedEl = document.getElementById('minedText');
    if(minedEl) minedEl.textContent = stats.totalMined;
    updateResearchBtn();
  }

  // LN routing
  nodes.filter(function(n){return n.type==='ln_node'}).forEach(function(ln){
    if(!ln.lnBalance) ln.lnBalance = 0;
    var connectedServer = connections.some(function(c){return c.to===ln.id && nodes.find(function(nd){return nd.id===c.from&&nd.type==='server'})});
    if(connectedServer && ln.lnBalance >= 5){
      var fee = 0.1 * dt * Math.min(ln.lnBalance/20, 3);
      if(researchCompleted.indexOf('dist_routing')>=0) fee *= 3;
      else if(researchCompleted.indexOf('channel_opt')>=0) fee *= 2;
      ln.lnBalance += fee;
      stats.totalCoinsEarned += fee;
      if(Math.random()<0.02) effects.push({type:'sparkle',x:ln.x+WIN_W/2,y:ln.y+TITLE_H/2,t:0,dur:0.4});
    }
  });

  // Staking
  nodes.filter(function(n){return n.type==='staking'}).forEach(function(st){
    if(!st.stakingBalance) st.stakingBalance = 0;
    var connWallet = connections.some(function(c){return c.to===st.id && c.toPort==='from_wallet'});
    if(connWallet && balance >= 0.5){
      var drain = Math.min(0.5*dt, balance);
      balance -= drain;
      st.stakingBalance += drain;
      updateUI();
    }
    if(st.stakingBalance > 0){
      var interest = st.stakingBalance * 0.05 / 3600 * dt;
      st.stakingBalance += interest;
      stats.totalCoinsEarned += interest;
      if(Math.random()<0.01) effects.push({type:'sparkle',x:st.x+WIN_W/2,y:st.y+TITLE_H/2,t:0,dur:0.3});
    }
  });

  // DeFi
  nodes.filter(function(n){return n.type==='defi'}).forEach(function(df){
    if(!df.defiBalance) df.defiBalance = 0;
    var connWallet = connections.some(function(c){return c.to===df.id && c.toPort==='from_wallet'});
    if(connWallet && balance >= 0.5){
      var drain = Math.min(0.5*dt, balance);
      balance -= drain;
      df.defiBalance += drain;
      updateUI();
    }
    if(df.defiBalance > 0){
      var yield2 = df.defiBalance * 0.15 / 3600 * dt;
      df.defiBalance += yield2;
      stats.totalCoinsEarned += yield2;
      // Impermanent loss risk
      if(Math.random() < 0.0005){
        var loss = df.defiBalance * (0.05 + Math.random()*0.1);
        df.defiBalance -= loss;
        effects.push({type:'malware',x:df.x+WIN_W/2,y:df.y+30,t:0,dur:0.5});
        showUnlockMsg('⚠️ インパーマネントロス: -'+loss.toFixed(1)+'₱');
      }
      if(Math.random()<0.01) effects.push({type:'sparkle',x:df.x+WIN_W/2,y:df.y+TITLE_H/2,t:0,dur:0.3});
    }
  });

  // NFT
  nodes.filter(function(n){return n.type==='nft'}).forEach(function(nf){
    if(!nf.nftTimer) nf.nftTimer = 15;
    if(!nf.nftCount) nf.nftCount = 0;
    var connPC = connections.some(function(c){return c.to===nf.id && c.toPort==='from_pc'});
    if(connPC){
      nf.nftTimer -= dt;
      if(nf.nftTimer <= 0){
        nf.nftTimer = 10 + Math.random()*10;
        nf.nftCount++;
        var salePrice = 1 + Math.floor(Math.random()*10);
        balance += salePrice;
        stats.totalCoinsEarned += salePrice;
        effects.push({type:'sparkle',x:nf.x+WIN_W/2,y:nf.y+TITLE_H/2,t:0,dur:0.6});
        particles.push({x:nf.x+WIN_W/2,y:nf.y,tx:nf.x+WIN_W/2,ty:nf.y-40,t:0,dur:1,text:'🎨+'+salePrice+'₱'});
        playSound('mine');
        updateUI();buildShop();
      }
    }
  });

  // Exchange
  nodes.filter(function(n){return n.type==='exchange'}).forEach(function(ex){
    if(!ex.exBalance) ex.exBalance = 0;
    if(!ex.exLocked) ex.exLocked = 0;
    if(!ex.exLockTime) ex.exLockTime = 0;
    if(!ex.exLockCooldown) ex.exLockCooldown = 0;
    if(!ex.exHacked) ex.exHacked = false;
    if(!ex.exHackTime) ex.exHackTime = 0;
    var connWallet = connections.some(function(c){return c.to===ex.id && c.toPort==='from_wallet'});
    if(!connWallet) return;
    if(ex.exHacked){ex.exHackTime-=dt;if(ex.exHackTime<=0)ex.exHacked=false;return}
    if(balance >= 1){
      var drain = Math.min(0.5*dt, balance);
      balance -= drain;ex.exBalance += drain;updateUI();buildShop();
    }
    ex.exLockCooldown -= dt;
    if(ex.exBalance>=10&&ex.exLocked<=0&&ex.exLockCooldown<=0){
      ex.exLocked=ex.exBalance;ex.exBalance=0;ex.exLockTime=30;
      effects.push({type:'sparkle',x:ex.x+WIN_W/2,y:ex.y+TITLE_H/2,t:0,dur:0.5});
    }
    if(ex.exLocked>0){
      ex.exLockTime-=dt;
      if(ex.exLockTime<=0){
        var interest=ex.exLocked*0.05;var payout=ex.exLocked+interest;
        balance+=Math.floor(payout);stats.totalCoinsEarned+=payout;
        effects.push({type:'sparkle',x:ex.x+WIN_W/2,y:ex.y+TITLE_H/2,t:0,dur:0.6});
        playSound('mine');ex.exLocked=0;ex.exLockTime=0;ex.exLockCooldown=10;
        updateUI();buildShop();
      }
    }
    if(Math.random()<0.0007&&(ex.exBalance>0||ex.exLocked>0)){
      ex.exBalance=0;ex.exLocked=0;ex.exLockTime=0;
      ex.exHacked=true;ex.exHackTime=15;
      effects.push({type:'malware',x:ex.x+WIN_W/2,y:ex.y+30,t:0,dur:1});
      playSound('malware');showUnlockMsg('🔓 取引所がハッキングされました！');
    }
  });

  // Malware every 30s
  malwareTimer += dt;
  if(malwareTimer>=30){
    malwareTimer=0;
    nodes.filter(function(n){return(n.type==='mining_pc'||n.type==='server')&&!n.infected}).forEach(function(pc){
      if(Math.random()<0.1){
        var s=pc.type==='mining_pc'?getPCStats(pc):getServerStats(pc);
        if(s.hasFW){effects.push({type:'cure',x:pc.x+WIN_W/2,y:pc.y+30,t:0,dur:0.5});playSound('cure')}
        else{pc.infected=true;effects.push({type:'malware',x:pc.x+WIN_W/2,y:pc.y+30,t:0,dur:1});playSound('malware')}
      }
    });
  }

  // Blackout every 2 min
  blackoutTimer += dt;
  if(blackoutTimer>=120){
    blackoutTimer=0;
    var powers=nodes.filter(function(n){return(n.type==='power'||n.type==='power_mk2')&&!n.blackout});
    if(powers.length>0&&Math.random()<0.05){
      var p=powers[Math.floor(Math.random()*powers.length)];
      p.blackout=true;p.blackoutTime=30;
    }
  }
  nodes.filter(function(n){return n.blackout}).forEach(function(n){n.blackoutTime-=dt;if(n.blackoutTime<=0)n.blackout=false});

  effects.forEach(function(e){e.t+=dt});
  effects=effects.filter(function(e){return e.t<e.dur});
  particles.forEach(function(p){p.t+=dt});
  particles=particles.filter(function(p){return p.t<p.dur});
}

function scrollShop(dir){
  var shop = document.getElementById('shop');
  shop.scrollBy({left:dir*120,behavior:'smooth'});
}

function updateUI(){
  document.getElementById('balanceText').textContent = balance;
  document.getElementById('diffText').textContent = difficulty.toFixed(2);
  document.getElementById('rpText').textContent = Math.floor(stats.researchPoints);
  var minedEl = document.getElementById('minedText');
  if(minedEl) minedEl.textContent = stats.totalMined;
  updateResearchBtn();
}

function updateResearchBtn(){
  var btn = document.getElementById('researchBtn');
  if(!btn) return;
  var hasAvailable = false;
  var canAffordAny = false;
  RESEARCH_TREE.forEach(function(r){
    if(researchCompleted.indexOf(r.id)>=0) return;
    var prereqMet = !r.prereq || researchCompleted.indexOf(r.prereq)>=0;
    if(!prereqMet) return;
    var condResult = checkResearchConditions(r);
    if(condResult.met){
      hasAvailable = true;
      if(stats.researchPoints >= r.cost) canAffordAny = true;
    }
  });
  var badge = btn.querySelector('.research-badge');
  if(hasAvailable){
    if(!badge){badge=document.createElement('span');badge.className='research-badge';badge.textContent='!';btn.appendChild(badge)}
  } else {
    if(badge) badge.remove();
  }
  if(canAffordAny) btn.classList.add('pulse');
  else btn.classList.remove('pulse');
}

// ===== DRAWING =====
function draw(){
  ctx.fillStyle = '#0a0e27';
  ctx.fillRect(0,0,canvasW,canvasH);
  ctx.save();
  ctx.translate(canvasW/2,canvasH/2);
  ctx.scale(camera.zoom,camera.zoom);
  ctx.translate(-canvasW/2-camera.x,-canvasH/2-camera.y);
  drawGrid();drawConnections();drawNodes();drawEffects();drawParticles();drawDragLine();
  ctx.restore();
}

function drawGrid(){
  ctx.strokeStyle='#0f1535';ctx.lineWidth=0.5;
  var step=30;
  var startX=Math.floor((camera.x-canvasW/camera.zoom)/step)*step;
  var endX=camera.x+canvasW*2/camera.zoom;
  var startY=Math.floor((camera.y-canvasH/camera.zoom)/step)*step;
  var endY=camera.y+canvasH*2/camera.zoom;
  for(var x=startX;x<endX;x+=step){ctx.beginPath();ctx.moveTo(x,startY);ctx.lineTo(x,endY);ctx.stroke()}
  for(var y=startY;y<endY;y+=step){ctx.beginPath();ctx.moveTo(startX,y);ctx.lineTo(endX,y);ctx.stroke()}
}

function drawLPath(fromX,fromY,toX,toY){
  var midX=(fromX+toX)/2;
  ctx.beginPath();ctx.moveTo(fromX,fromY);ctx.lineTo(midX,fromY);ctx.lineTo(midX,toY);ctx.lineTo(toX,toY);ctx.stroke();
}

function drawConnections(){
  var t=gameTime;
  connections.forEach(function(c){
    var fromN=nodes.find(function(n){return n.id===c.from});
    var toN=nodes.find(function(n){return n.id===c.to});
    if(!fromN||!toN) return;
    var fromPorts=getNodePortPositions(fromN);
    var toPorts=getNodePortPositions(toN);
    var fp=fromPorts.find(function(p){return p.type===c.fromPort&&p.defIndex===c.fromDefIndex});
    var tp=toPorts.find(function(p){return p.type===c.toPort&&p.defIndex===c.toDefIndex});
    if(!fp) fp=fromPorts.find(function(p){return p.type===c.fromPort});
    if(!tp) tp=toPorts.find(function(p){return p.type===c.toPort});
    if(!fp||!tp) return;
    var fx=fp.x,fy=fp.y,tx=tp.x,ty=tp.y;
    var col='#4488ff';var lineW=1.5;var dashStyle=null;
    if(c.lineType==='power'){col='#dd4444';lineW=2.5}
    else if(c.lineType==='coin'){col='#ddaa22';lineW=1.5;dashStyle=[6,4]}
    else if(c.lineType==='lightning'){col='#9944dd';lineW=1.5}
    ctx.strokeStyle=col;ctx.lineWidth=lineW;ctx.globalAlpha=0.7;
    if(dashStyle) ctx.setLineDash(dashStyle);
    drawLPath(fx,fy,tx,ty);
    if(dashStyle) ctx.setLineDash([]);
    ctx.globalAlpha=1;
    for(var i=0;i<3;i++){
      var p=((t*0.5+i/3)%1);
      var pt=getLPathPoint(fx,fy,tx,ty,p);
      ctx.fillStyle=col;ctx.globalAlpha=0.8;
      ctx.beginPath();ctx.arc(pt.x,pt.y,2.5,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=1;
    }
  });
}

function drawNodes(){
  nodes.forEach(function(n){
    var nt=NODE_TYPES[n.type];
    if(!nt) return;
    var h=getNodeHeight(n);
    var s=n.scale;
    if(s<0.01) return;
    ctx.save();
    if(s<1){ctx.globalAlpha=s;ctx.translate(n.x+WIN_W/2,n.y+h/2);ctx.scale(s,s);ctx.translate(-(n.x+WIN_W/2),-(n.y+h/2))}
    ctx.shadowColor='rgba(60,80,180,0.3)';ctx.shadowBlur=8;
    if(n.infected){var blink=Math.sin(gameTime*8)>0?1:0.3;ctx.shadowColor='rgba(255,0,0,'+blink+')';ctx.shadowBlur=12}
    if(n.blackout) ctx.globalAlpha=(ctx.globalAlpha||1)*0.4;
    ctx.fillStyle='rgba(20,25,45,0.92)';ctx.strokeStyle='rgba(70,90,190,0.45)';ctx.lineWidth=1.5;
    roundRect(ctx,n.x,n.y,WIN_W,h,6);ctx.fill();ctx.stroke();ctx.shadowBlur=0;
    ctx.fillStyle=n.blackout?'#333':nt.titleColor;
    ctx.beginPath();ctx.moveTo(n.x+4,n.y);ctx.lineTo(n.x+WIN_W-4,n.y);
    ctx.arcTo(n.x+WIN_W,n.y,n.x+WIN_W,n.y+4,4);ctx.lineTo(n.x+WIN_W,n.y+TITLE_H);
    ctx.lineTo(n.x,n.y+TITLE_H);ctx.lineTo(n.x,n.y+4);ctx.arcTo(n.x,n.y,n.x+4,n.y,4);
    ctx.closePath();ctx.fill();
    ctx.font='18px sans-serif';ctx.textAlign='left';ctx.textBaseline='middle';
    ctx.fillText(nt.emoji,n.x+6,n.y+TITLE_H/2+1);
    ctx.fillStyle='#fff';ctx.font='bold '+FONT_SIZE+'px sans-serif';
    ctx.fillText(nt.name,n.x+28,n.y+TITLE_H/2+1);

    var nodeLines=getNodeLines(n);
    ctx.font=FONT_SIZE+'px sans-serif';
    nodeLines.forEach(function(line,i){
      var ly=n.y+TITLE_H+i*LINE_H;
      if(i>0){ctx.strokeStyle='rgba(60,80,140,0.15)';ctx.lineWidth=0.5;ctx.beginPath();ctx.moveTo(n.x+6,ly);ctx.lineTo(n.x+WIN_W-6,ly);ctx.stroke()}
      if(line.text){ctx.fillStyle='#d8d8f0';ctx.textAlign='left';ctx.textBaseline='middle';ctx.fillText(line.text,n.x+10,ly+LINE_H/2)}
      if(line.bar!==undefined){
        var barX=n.x+WIN_W-62,barY=ly+5,barW=44,barH=14;
        var animated=animatedPower[n.id]||0;var fillW=Math.min(animated,1)*barW;
        ctx.fillStyle='rgba(30,35,60,0.9)';roundRect(ctx,barX,barY,barW,barH,3);ctx.fill();
        if(fillW>0){
          var bGrad=ctx.createLinearGradient(barX,barY,barX+fillW,barY);
          if(line.barOk){bGrad.addColorStop(0,'#22aa44');bGrad.addColorStop(1,'#66ee88')}
          else{bGrad.addColorStop(0,'#cc2222');bGrad.addColorStop(1,'#ff5544')}
          ctx.fillStyle=bGrad;ctx.fillRect(barX+1,barY+1,fillW-2,barH-2);
        }
        ctx.strokeStyle=line.barOk?'rgba(80,200,120,0.6)':'rgba(220,80,80,0.6)';ctx.lineWidth=1;ctx.strokeRect(barX,barY,barW,barH);
      }
      if(line.miningGauge!==undefined){
        var gx=n.x+8,gy=ly+4,gw=WIN_W-16,gh=16;var prog=Math.min(line.miningGauge,1);
        ctx.fillStyle='rgba(30,35,60,0.9)';roundRect(ctx,gx,gy,gw,gh,4);ctx.fill();
        if(prog>0){
          var grad=ctx.createLinearGradient(gx,gy,gx+gw*prog,gy);
          grad.addColorStop(0,'#2266ff');grad.addColorStop(0.5,'#22aacc');grad.addColorStop(1,'#22ee66');
          ctx.fillStyle=grad;ctx.fillRect(gx+2,gy+2,(gw-4)*prog,gh-4);
        }
        ctx.strokeStyle=line.isMining?'rgba(80,220,140,0.8)':'rgba(80,100,160,0.4)';
        ctx.lineWidth=line.isMining?1.5:0.5;ctx.strokeRect(gx,gy,gw,gh);
        ctx.fillStyle='#fff';ctx.font='bold 10px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText(Math.floor(prog*100)+'%',n.x+WIN_W/2,gy+gh/2);ctx.font=FONT_SIZE+'px sans-serif';
      }
    });

    // Draw ports
    var ports=getNodePortPositions(n);
    ports.forEach(function(p){
      var connected=isPortConnected(n,p);
      var isCompat=dragMode==='port'&&isCompatiblePort(n.id,p.defIndex);
      var category=getPortCategoryForNode(n.type,p.type);
      var catColor=PORT_CATEGORY_COLORS[category]||'#4466aa';
      var multi=isMultiPort(n.type,p.type);
      var connCount=countPortConnections(n.id,p.type,p.side);

      if(isCompat){
        ctx.save();ctx.shadowColor='#ffee44';ctx.shadowBlur=14;
        ctx.beginPath();ctx.arc(p.x,p.y,PORT_R+4,0,Math.PI*2);
        ctx.fillStyle='rgba(255,238,68,0.25)';ctx.fill();ctx.restore();
      }
      if(dragMode==='port'&&!isCompat&&p.nodeId!==dragPort.nodeId) ctx.globalAlpha=0.3;
      if(multi){ctx.beginPath();ctx.arc(p.x,p.y,PORT_R+3,0,Math.PI*2);ctx.strokeStyle=connected?PORT_CATEGORY_COLORS.connected:catColor;ctx.lineWidth=1.5;ctx.stroke()}
      ctx.beginPath();ctx.arc(p.x,p.y,PORT_R,0,Math.PI*2);
      if(connected) ctx.fillStyle=PORT_CATEGORY_COLORS.connected;
      else if(isCompat) ctx.fillStyle='#ddcc44';
      else ctx.fillStyle=catColor;
      ctx.fill();ctx.strokeStyle='rgba(150,170,220,0.7)';ctx.lineWidth=1;ctx.stroke();
      ctx.fillStyle='#fff';ctx.font='bold 9px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(p.side==='left'?'→':'←',p.x,p.y);
      if(multi&&connCount>0){ctx.font='bold 8px sans-serif';ctx.fillStyle='#fff';ctx.strokeStyle='#000';ctx.lineWidth=2;ctx.strokeText(connCount+'',p.x+PORT_R+3,p.y-PORT_R-1);ctx.fillText(connCount+'',p.x+PORT_R+3,p.y-PORT_R-1)}
      ctx.globalAlpha=1;
    });

    if(n.type==='mining_pc'){var ms=getPCStats(n);if(ms.canMine&&!n.infected&&ms.powerOk){ctx.fillStyle=Math.sin(gameTime*4)>0?'#44ff88':'#226644';ctx.beginPath();ctx.arc(n.x+WIN_W-10,n.y+TITLE_H/2,3,0,Math.PI*2);ctx.fill()}}
    if(n.type==='server'){var svs=getServerStats(n);if(svs.canRoute&&!n.infected&&svs.powerOk){ctx.fillStyle=Math.sin(gameTime*4)>0?'#4488ff':'#223366';ctx.beginPath();ctx.arc(n.x+WIN_W-10,n.y+TITLE_H/2,3,0,Math.PI*2);ctx.fill()}}
    if(n.type==='research_lab'){var rpRate=getLabRPRate(n);if(rpRate>0){ctx.fillStyle=Math.sin(gameTime*3)>0?'#44ddff':'#225566';ctx.beginPath();ctx.arc(n.x+WIN_W-10,n.y+TITLE_H/2,3,0,Math.PI*2);ctx.fill()}}
    if(n.infected){ctx.font='14px sans-serif';ctx.textAlign='center';ctx.fillText('💀',n.x+WIN_W/2,n.y-8)}
    if(n.blackout){ctx.globalAlpha=1;ctx.font='14px sans-serif';ctx.textAlign='center';ctx.fillText('⚡',n.x+WIN_W/2,n.y-8)}
    ctx.restore();
  });
}

function isPortConnected(n,port){
  return connections.some(function(c){
    if(port.side==='left') return c.from===n.id&&c.fromPort===port.type&&c.fromDefIndex===port.defIndex;
    return c.to===n.id&&c.toPort===port.type&&c.toDefIndex===port.defIndex;
  });
}

function roundRect(ctx2,x,y,w,h,r){
  ctx2.beginPath();ctx2.moveTo(x+r,y);ctx2.lineTo(x+w-r,y);ctx2.arcTo(x+w,y,x+w,y+r,r);
  ctx2.lineTo(x+w,y+h-r);ctx2.arcTo(x+w,y+h,x+w-r,y+h,r);ctx2.lineTo(x+r,y+h);ctx2.arcTo(x,y+h,x,y+h-r,r);
  ctx2.lineTo(x,y+r);ctx2.arcTo(x,y,x+r,y,r);ctx2.closePath();
}

function drawEffects(){
  effects.forEach(function(e){
    var p=e.t/e.dur;
    if(e.type==='sparkle'){for(var i=0;i<6;i++){var a=Math.PI*2*i/6+gameTime;var d=20*p;ctx.fillStyle='rgba(255,215,0,'+(1-p)+')';ctx.beginPath();ctx.arc(e.x+Math.cos(a)*d,e.y+Math.sin(a)*d,3*(1-p),0,Math.PI*2);ctx.fill()}}
    if(e.type==='spawn'){ctx.strokeStyle='rgba(255,255,255,'+(0.5*(1-p))+')';ctx.lineWidth=2;ctx.beginPath();ctx.arc(e.x,e.y,30*p,0,Math.PI*2);ctx.stroke()}
    if(e.type==='malware'){ctx.fillStyle='rgba(255,0,0,'+(0.3*(1-p))+')';ctx.beginPath();ctx.arc(e.x,e.y,40*p,0,Math.PI*2);ctx.fill()}
    if(e.type==='cure'){ctx.strokeStyle='rgba(0,255,200,'+(1-p)+')';ctx.lineWidth=2;for(var i=0;i<4;i++){var a=Math.PI/2*i+p*2;ctx.beginPath();ctx.moveTo(e.x,e.y);ctx.lineTo(e.x+Math.cos(a)*30*p,e.y+Math.sin(a)*30*p);ctx.stroke()}}
    if(e.type==='gold_burst'){var ease=1-Math.pow(1-p,2);var dx=Math.cos(e.angle)*e.dist*ease;var dy=Math.sin(e.angle)*e.dist*ease;ctx.fillStyle='rgba(255,215,0,'+(1-p)+')';ctx.beginPath();ctx.arc(e.x+dx,e.y+dy,3*(1-p*0.5),0,Math.PI*2);ctx.fill()}
  });
}

function drawParticles(){
  particles.forEach(function(p){
    var prog=p.t/p.dur;var ease=1-Math.pow(1-prog,3);
    var px=p.x+(p.tx-p.x)*ease;var py=p.y+(p.ty-p.y)*ease-Math.sin(prog*Math.PI)*30;
    ctx.font='bold 14px sans-serif';ctx.fillStyle='rgba(255,215,0,'+(1-prog*0.5)+')';
    ctx.textAlign='center';ctx.fillText(p.text,px,py);
  });
}

function drawDragLine(){
  if(dragMode==='port'&&dragPort&&dragLineEnd){
    var fx=dragPort.x,fy=dragPort.y,tx=dragLineEnd.x,ty=dragLineEnd.y;
    var midX=(fx+tx)/2;
    ctx.strokeStyle='rgba(74,106,255,0.6)';ctx.lineWidth=2;ctx.setLineDash([5,5]);
    ctx.beginPath();ctx.moveTo(fx,fy);ctx.lineTo(midX,fy);ctx.lineTo(midX,ty);ctx.lineTo(tx,ty);ctx.stroke();
    ctx.setLineDash([]);
  }
}

// ===== INPUT =====
function getScreenPos(e){
  var r=canvas.getBoundingClientRect();
  var touch=e.touches?e.touches[0]:e;
  return{x:touch.clientX-r.left,y:touch.clientY-r.top};
}

function hitTestPort(wx,wy){
  for(var i=nodes.length-1;i>=0;i--){
    var ports=getNodePortPositions(nodes[i]);
    for(var j=0;j<ports.length;j++){
      var p=ports[j];
      if(Math.hypot(wx-p.x,wy-p.y)<PORT_R+6) return p;
    }
  }
  return null;
}

function hitTestTitleBar(wx,wy){
  for(var i=nodes.length-1;i>=0;i--){
    var n=nodes[i];
    if(wx>=n.x&&wx<=n.x+WIN_W&&wy>=n.y&&wy<=n.y+TITLE_H) return n;
  }
  return null;
}

function hitTestNode(wx,wy){
  for(var i=nodes.length-1;i>=0;i--){
    var n=nodes[i];var h=getNodeHeight(n);
    if(wx>=n.x&&wx<=n.x+WIN_W&&wy>=n.y&&wy<=n.y+h) return n;
  }
  return null;
}

canvas.addEventListener('touchstart',function(e){
  if(e.touches.length===2){
    e.preventDefault();pinching=true;
    var t1=e.touches[0],t2=e.touches[1];
    pinchDist=Math.hypot(t2.clientX-t1.clientX,t2.clientY-t1.clientY);
    pinchMidX=(t1.clientX+t2.clientX)/2;pinchMidY=(t1.clientY+t2.clientY)/2;
    dragMode=null;
  }
},{passive:false});

canvas.addEventListener('touchmove',function(e){
  if(pinching&&e.touches.length===2){
    e.preventDefault();
    var t1=e.touches[0],t2=e.touches[1];
    var newDist=Math.hypot(t2.clientX-t1.clientX,t2.clientY-t1.clientY);
    var scale=newDist/pinchDist;
    var newZoom=Math.max(0.3,Math.min(3.0,camera.zoom*scale));
    var r=canvas.getBoundingClientRect();
    var wx=(pinchMidX-r.left-canvasW/2)/camera.zoom+camera.x+canvasW/2;
    var wy=(pinchMidY-r.top-canvasH/2)/camera.zoom+camera.y+canvasH/2;
    camera.zoom=newZoom;
    camera.x=wx-canvasW/2-(pinchMidX-r.left-canvasW/2)/camera.zoom;
    camera.y=wy-canvasH/2-(pinchMidY-r.top-canvasH/2)/camera.zoom;
    pinchDist=newDist;
  }
},{passive:false});

canvas.addEventListener('touchend',function(e){if(e.touches.length<2)pinching=false},{passive:false});

canvas.addEventListener('wheel',function(e){
  e.preventDefault();
  var r=canvas.getBoundingClientRect();var sx=e.clientX-r.left;var sy=e.clientY-r.top;
  var wx=(sx-canvasW/2)/camera.zoom+camera.x+canvasW/2;
  var wy=(sy-canvasH/2)/camera.zoom+camera.y+canvasH/2;
  var factor=e.deltaY>0?0.9:1.1;
  camera.zoom=Math.max(0.3,Math.min(3.0,camera.zoom*factor));
  camera.x=wx-canvasW/2-(sx-canvasW/2)/camera.zoom;
  camera.y=wy-canvasH/2-(sy-canvasH/2)/camera.zoom;
},{passive:false});

canvas.addEventListener('pointerdown',function(e){
  if(pinching||isShopDragging) return;
  ensureAudio();
  var screen=getScreenPos(e);var world=screenToWorld(screen.x,screen.y);
  lastPointerX=screen.x;lastPointerY=screen.y;pointerStartX=screen.x;pointerStartY=screen.y;

  var portHit=hitTestPort(world.x,world.y);
  if(portHit){
    dragMode='port';dragPort=portHit;dragLineEnd={x:world.x,y:world.y};
    updateCompatiblePorts(portHit);
    var idx=nodes.indexOf(nodes.find(function(nd){return nd.id===portHit.nodeId}));
    if(idx>=0){nodes.push(nodes.splice(idx,1)[0])}
    return;
  }

  var nodeHit=hitTestNode(world.x,world.y);
  if(nodeHit){
    var now=Date.now();
    if(lastTapNodeId===nodeHit.id&&now-lastTapTime<400){
      deleteNodeConfirm(nodeHit);lastTapNodeId=null;lastTapTime=0;return;
    }
    lastTapNodeId=nodeHit.id;lastTapTime=now;
  } else {lastTapNodeId=null;lastTapTime=0}

  var titleHit=hitTestTitleBar(world.x,world.y);
  if(titleHit){
    dragMode='move';dragNode=titleHit;dragOffX=world.x-titleHit.x;dragOffY=world.y-titleHit.y;
    var idx2=nodes.indexOf(titleHit);if(idx2>=0){nodes.push(nodes.splice(idx2,1)[0])}
    return;
  }

  var bodyHit=hitTestNode(world.x,world.y);
  if(bodyHit){
    if(bodyHit.infected){bodyHit.infected=false;effects.push({type:'cure',x:bodyHit.x+WIN_W/2,y:bodyHit.y+30,t:0,dur:0.5});playSound('cure')}
    else if(bodyHit.type==='ln_node'){
      if(balance>=1){balance-=1;if(!bodyHit.lnBalance)bodyHit.lnBalance=0;bodyHit.lnBalance+=1;effects.push({type:'sparkle',x:bodyHit.x+WIN_W/2,y:bodyHit.y+TITLE_H/2,t:0,dur:0.4});playSound('buy');updateUI();buildShop()}
      else{playSound('error')}
    }
    else if(bodyHit.type==='staking'&&bodyHit.stakingBalance>1){
      var withdraw=Math.floor(bodyHit.stakingBalance);bodyHit.stakingBalance-=withdraw;balance+=withdraw;
      effects.push({type:'sparkle',x:bodyHit.x+WIN_W/2,y:bodyHit.y+TITLE_H/2,t:0,dur:0.4});playSound('mine');updateUI();buildShop();
    }
    else if(bodyHit.type==='defi'&&bodyHit.defiBalance>1){
      var withdraw2=Math.floor(bodyHit.defiBalance);bodyHit.defiBalance-=withdraw2;balance+=withdraw2;
      effects.push({type:'sparkle',x:bodyHit.x+WIN_W/2,y:bodyHit.y+TITLE_H/2,t:0,dur:0.4});playSound('mine');updateUI();buildShop();
    }
    return;
  }

  dragMode='camera';cameraStartX=camera.x;cameraStartY=camera.y;
});

canvas.addEventListener('pointermove',function(e){
  if(pinching||isShopDragging) return;
  var screen=getScreenPos(e);var world=screenToWorld(screen.x,screen.y);
  if(dragMode==='move'&&dragNode){dragNode.x=world.x-dragOffX;dragNode.y=world.y-dragOffY}
  else if(dragMode==='port'){
    dragLineEnd={x:world.x,y:world.y};
    var tp=hitTestPort(world.x,world.y);
    hoverPort=(tp&&tp.nodeId!==dragPort.nodeId)?tp:null;
  }
  else if(dragMode==='camera'){
    var dx=screen.x-pointerStartX;var dy=screen.y-pointerStartY;
    camera.x=cameraStartX-dx/camera.zoom;camera.y=cameraStartY-dy/camera.zoom;
  }
  else{var ph=hitTestPort(world.x,world.y);hoverPort=ph||null}
  lastPointerX=screen.x;lastPointerY=screen.y;
});

canvas.addEventListener('pointerup',function(e){
  if(pinching||isShopDragging) return;
  var screen=getScreenPos(e);var world=screenToWorld(screen.x,screen.y);
  if(dragMode==='port'&&dragPort){
    var tp=hitTestPort(world.x,world.y);
    if(tp&&tp.nodeId!==dragPort.nodeId){
      if(canConnect(dragPort,tp)) addConnection(dragPort,tp);
      else if(canConnect(tp,dragPort)) addConnection(tp,dragPort);
      else playSound('error');
    }
  }
  dragMode=null;dragNode=null;dragPort=null;dragLineEnd=null;hoverPort=null;compatiblePorts=[];
});

canvas.addEventListener('pointerleave',function(){dragMode=null;dragNode=null;dragPort=null;dragLineEnd=null;hoverPort=null});

// ===== SAVE/LOAD =====
function saveGame(){
  try{
    var data={
      nodes:nodes.map(function(n){return{id:n.id,type:n.type,x:n.x,y:n.y,infected:n.infected,blackout:n.blackout,blackoutTime:n.blackoutTime||0,
        lnBalance:n.lnBalance||0,lnwBalance:n.lnwBalance||0,exBalance:n.exBalance||0,exLocked:n.exLocked||0,exLockTime:n.exLockTime||0,
        exHacked:n.exHacked||false,exHackTime:n.exHackTime||0,miningProgress:n.miningProgress||0,solarOutput:n.solarOutput||10,
        stakingBalance:n.stakingBalance||0,defiBalance:n.defiBalance||0,nftCount:n.nftCount||0,nftTimer:n.nftTimer||15}}),
      connections:connections.map(function(c){return{from:c.from,to:c.to,fromPort:c.fromPort,toPort:c.toPort,fromDefIndex:c.fromDefIndex,toDefIndex:c.toDefIndex,lineType:c.lineType}}),
      balance:balance,difficulty:difficulty,gameTime:gameTime,nextNodeId:nextNodeId,
      researchCompleted:researchCompleted,stats:stats,labUnlocked:labUnlocked,labUnlockShown:labUnlockShown,
      camera:{x:camera.x,y:camera.y,zoom:camera.zoom}
    };
    localStorage.setItem('picocoin_save',JSON.stringify(data));
  }catch(e2){}
}

function loadGame(){
  try{
    var raw=localStorage.getItem('picocoin_save');
    if(!raw) return false;
    var data=JSON.parse(raw);
    nodes=data.nodes.map(function(n){return Object.assign({scale:1,infectedTime:0,miningProgress:0,solarOutput:10,stakingBalance:0,defiBalance:0,nftCount:0,nftTimer:15},n)});
    connections=data.connections;
    balance=data.balance;difficulty=data.difficulty;gameTime=data.gameTime||0;nextNodeId=data.nextNodeId||100;
    researchCompleted=data.researchCompleted||['basic_mining'];
    stats=data.stats||{totalMined:0,totalCoinsEarned:0,researchPoints:0};
    labUnlocked=data.labUnlocked||false;labUnlockShown=data.labUnlockShown||false;
    // Migrate old saves: if lab was unlocked but research not completed, add it
    if(labUnlocked && researchCompleted.indexOf('_lab_unlock')<0) researchCompleted.push('_lab_unlock');
    animatedPower={};
    return true;
  }catch(e2){return false}
}

setInterval(saveGame,30000);

var origInit=initGame;
initGame=function(){
  resize();
  if(!loadGame()){origInit();return}
  hintShown=false;hintFadeState='hidden';
  document.getElementById('hint').style.opacity='0';
  buildShop();updateUI();centerCameraOnBlockchain();
  requestAnimationFrame(gameLoop);
};

resize();
</script>
